            num: 172,
            title: `第172章番外：公孫篇`,
            content: `齊姝冒名頂替自己表兄進書院的事,終究還是被發現了。\n她那個不靠譜的表兄，鬥雞同一員外兒子起了爭執，把人給打傷了,員外郎帶著兒子上門去討說法，安知府這才知道兒子原來沒去書院，一直在外邊野。\n安旭被自家老爹給提溜了回去,齊姝代他進書院的事,自然也瞞不住了。\n齊姝貴為公主,安知府哪怕是她舅舅,也不敢對她不敬,派人稟了還在廣陵寺禮佛的安太皇太妃,是安太皇太妃身邊的老嬤嬤，親自去書院「請」齊姝回去的。\n出了這等事，安知府自然也不好意思再讓兒子去書院讀書，為了書院的名聲,對外也只稱安旭是自己退學的。\n齊姝被母妃身邊的嬤嬤「請」上馬車時，馬車都快離開書院了，這一路都安安靜靜極為配合的她，卻忽地跳下了馬車,拎起裙擺直接朝御書樓而去。\n身邊的婢子和護衛要去追,因著不熟悉書院地形，一時半會兒都沒追上。\n安太皇太妃派去的老嬤嬤是齊姝的乳娘，知道她的脾性，最終只嘆了聲：「讓她去吧。」\n齊姝從來都沒跑那麼快過，呼進的空氣刺得她肺部生疼，但她一刻也不敢停下。\n她想，再見他一眼也好,至少，讓他知道，她就是在風雨廊亭同他下過棋的那個姑娘。\n若是就這般不明不白地走了，這輩子她大抵都會遺憾的。\n今日休沐，書院也放了一日的假，學子們有的外出了，有的留在了書院，通往課舍和御書樓的大道上，時不時有人經過，瞧見那一身霞紅羅裙急促奔來的年輕姑娘時，皆是駐足看得痴了。\n江南多美人，卻鮮少見到這般明若鮫珠、豔若霞光的美人，仿佛山河為衣披在她身上都不為過。\n齊姝徑直進了御書樓，奔上那木質扶梯時同人擦肩而過，說了不知多少聲「借過」，被她撞到的學子無一人起了怒色，相反露出了幾分夢遊似的茫然來，生怕是自己看書看出幻覺來了。\n齊姝無暇顧及這些，她終於爬上第七層的雅間時，已累得上氣不接下氣，叩開那間房門，急急喚那個在舌尖打轉了不知多少遍的名字：「公孫鄞……」\n她的聲音戛然而止，那一身白衣的男子，依舊坐在他平日裡看書下棋的窗邊，只是這次手持墨筆在書寫著什麼。\n見到她時，抬起頭淺淡一笑：「我還想著，這份棋譜默完，託人帶去安府應該能送到你手裡，未料你親自來了。」\n他的平靜讓齊姝一怔：「你……早就知曉我的身份？」\n公孫鄞筆尖微頓，答：「身份是今日才知曉的。」\n那寫的最後一字被墨跡暈開了一個小點，但到底還是寫完了，公孫鄞停了筆，捻起紙張抖幹上邊的墨跡：「我知你是個姑娘家，卻不知你竟是當朝公主。」\n不知為何，齊姝覺得喉間有點發哽了，她問：「那你知道，同你在廣陵寺的風雨廊亭對弈的，也是我嗎？」\n公孫鄞望著她，極為溫和地笑開：「知道。」\n只這一句話，一滴淚倏地從齊姝眼眶砸了下來，在木質的地板上暈開一小團溼印。\n公孫鄞將寫好的棋譜折好，遞與她時，她沒接，只用一雙朦朧淚眼固執地望著他：「我是為了一個人來這書院的。」\n公孫鄞眼眸微垂，沉默著不再接話。\n那一瞬間，齊姝心底驀地生出了一股巨大的委屈，她是公主，生來就要什麼有什麼，從沒嘗到過被人拒絕的滋味。\n最終她連那幾頁棋譜殘卷也沒要，紅著眼頭也不回地跑了。\n一月後她同安太妃啟程回京前，收到一封從麓原書院寄到安府的信件，裡邊裝的，正是那幾張棋譜殘卷。\n無人知曉，她在夜深人靜時，捧著那捲棋譜掉過多少次淚。\n……\n從回憶中回過神來，齊姝看在簷下飛洩的雨線，忽地苦澀一笑。\n她被那張棋譜困了這麼多年，棋譜早已託阿玉還給了那人，她也該走出來了。\n-\n轉眼便是六月，安太皇太妃召沈家老太太進宮說過幾次話，沈家那邊似乎也樂意娶個公主兒媳。\n齊姝隨安太皇太妃去行宮避暑時，安排的隨行將領便是沈慎。\n沈慎有個和公孫鄞極像的點，他也很喜歡笑，但並不是公孫鄞那般讓人瞧著如沐春風卻又遊刃有餘的笑，而是本性開朗。\n每每他笑起來，便只讓人覺著赤誠熱烈，這樣的人，似乎欺騙他都是一種罪過。\n齊姝常覺著他的性子和樊長玉很像，明明不是兄妹，卻勝似兄妹。\n在行宮時，他常會帶著侍衛去附近山上打些山雞或是從野溪裡抓魚回來，交與廚房的人做些美味。\n安太皇太妃為了撮合二人，時常想讓齊姝也跟去，但齊姝嫌太陽曬，又嫌山路難走，更討厭熱出一身汗，總是推拒。\n安太皇太妃拿她沒法子，最後聽說七夕節有燈會，又讓沈慎護著齊姝去燈會上看看。\n燈會擁擠，齊姝一身華服，自是不願意去街上的擠的，便租了一條畫舫，遠遠地在船上看七夕燈景和那些放河燈的少男少女。\n齊姝全程都有些意興闌珊，沈慎在邊上作陪，話也極少，二人都不自在。\n出於禮節，齊姝勉強陪沈慎在船頭站了一陣，打算回船艙時，河岸兩邊忽地響起一片少女的驚呼聲，齊姝抬眼看去，便見遠處的水面飄來一葉橫舟，船翁在船尾撐著長篙，船頭立著一神仙公子般的人物。\n白衣墨發，手持摺扇，嘴角似噙了分笑意，在這燈火闌珊的江岸邊，恍若入了畫卷一般。\n齊姝在看清來人時，呼吸都淺淺一窒。\n大胤的風俗，七夕這日，少男少女們是可以向心儀之人擲花以表心意的。\n公孫鄞的扁舟從岸邊路過時候，岸邊的少女們都爭相朝他拋花枝，奈何距離太遠，大多都拋進了水中，只有零星幾朵落在了舟上。\n公孫鄞並未去撿，只朝著岸邊淺淺拱手一揖，算是見禮。\n岸上的姑娘們又是一片驚呼，俏臉羞紅一片，爭相問那是哪家郎君。\n齊姝靜靜看著，只覺心口有些澀然，但最終又全歸於了平靜，準備轉身時，卻遠遠聽得一聲：「微臣見過公主。」\n夜風送來的嗓音，溫潤清雅。\n齊姝抬眸看向靠近畫舫的那葉扁舟。\n站在船頭的人揖手矜雅地朝她一禮，廣袖和衣角都被夜風吹得翩飛，更顯得飄然若仙。\n齊姝微微頷首，清淡回了句：「少師大人。」\n扁舟靠得愈近了些，公孫鄞從袖中取出一支白裡透粉的牡丹花，拱手遞與齊姝：「聽聞七夕可贈花與心上人，鄞鬥膽，贈與公主。」\n齊姝看了他手中那朵嬌豔的牡丹花兩息，最終只笑笑道：「少師來晚了，本宮已收了沈將軍贈的花。」\n言罷便由婢子攙扶著往船艙去，沈慎愣了一愣，看著執花靜立在船頭的公孫鄞，最終只乾咳了一聲：「那個……公孫兄，失陪了。」\n公孫鄞嘴角還是帶著那分笑意，只是看著落寞了幾分，朝他淺淺頷首道：「是鄞叨擾了。」\n扁舟遠去，沈慎掀簾進畫舫時，分明瞧見了齊姝眼底的一抹淚意，發現他進來，才急急用帕子拭了下眼角。\n沈慎在齊姝對面坐下道：「沈某冒昧，並未備花，也沒想過贈公主花。」\n他這話委實無禮了些，齊姝身邊的宮婢正要出言呵斥，他卻繼續道：「我知公主今日來遊湖，是太皇太妃的意思，沈某一屆武夫，也無多少雅性，公主同沈某在一起，委實委屈了些。」\n齊姝忙道：「沈將軍莫要妄自菲薄，今日是本宮自願前來的。」\n沈慎只是看著齊姝笑：「沈某是個粗人，說話也就不講究了，公主莫要介懷，沈某有個胞妹，性子同公主相似，沈某看公主同少師鬧彆扭，也像看自家胞妹一般。沈某雖不知公主和少師之間有何誤會，但婚姻大事，不可一時賭氣為之。」\n齊姝忍著竄上鼻尖的酸意搖頭，「本宮不是賭氣。」\n沈慎淺嘆了聲：「公主若是真放下了，便不會這般難過了。」\n-\n七夕同遊畫舫後，齊姝同沈慎關係緩和了不少，但無關風月，對於這樣一個和樊長玉相似的人，齊姝倒更像是把他當成了兄長。\n安太皇太妃不知這些，見二人關係有進展，倒是極為高興。\n快入秋時，北境又傳來急報，大胤皇位易主，一直鎮守邊境的武安侯回京輔佐幼帝，北厥人覺著這是千載難逢的機會，幾番騷擾錦州附近的大胤百姓，戰事一觸即發。\n齊煜尚年幼，若沒有謝徵於京中坐鎮，朝堂必亂。朝中商議後，先派了平西大將軍唐培義領兵前去北境，懷化大將軍樊長玉押糧草隨後而至。\n齊姝和安太皇太妃得了消息，也早早地趕回了宮中。\n樊長玉此番去北境是為打仗，自然不能把長寧也帶著，長寧聽說要和長姐分別一年數載，扒著她的腰哭成了個淚包。\n樊長玉同她約好，每隔一月就用海東青給她寄信回來，才把小淚包哄好了。\n俞淺淺知道謝徵要處理的事物多如牛毛，怕是分不出多少心思照顧長寧，提出把長寧接入宮中，趙大娘也被恩準一同進宮。\n樊長玉離京的前兩日，長寧還是哭鬧得厲害，齊姝得空便也去慈寧宮幫著哄小孩。\n偶爾齊煜也在，大抵小孩心性相通些，他總有法子哄好長寧。\n那粉雕玉琢的女娃娃，一雙葡萄大眼已腫成了個核桃，揉著眼睛委屈巴巴問：「公孫先生什麼時候才回來授課？阿姐走前交代寧娘要好好念書，寧娘要聽阿姐的話……」\n她說著又開始吸鼻子，烏黑大眼裡的淚就跟流不幹似的，又開始往外冒，她自己用胖手胡亂抹了抹，看得人心疼。\n齊煜說：「公孫先生病了，近日的朝會都是強撐著病體來的，等他病好了，就來崇文殿授課。」\n齊姝給長寧擦完淚，捏著絹帕的手倏地一緊，問：「少師病了？」\n齊煜點頭，說：「先生病了一月有餘了，太醫去看了都沒好。」\n從慈寧宮回去的一路，齊姝都在失神，那枯靜了許久的心，忽地又有些不得安寧。\n一月有餘？算起來，正是七夕後病的。\n他怎麼會病了呢？是那日在江上被江風吹病的嗎？\n-\n此後數日，齊姝一得空便去慈寧宮帶長寧玩，長寧記性好得很，便是一時半會兒地被齊姝帶去的新鮮玩意兒吸引了注意力，一回頭找不著她，那顆小糰子總又是坐在院中的臺階上，藕節似的手肘撐在膝頭，胖掌拖著自己的下顎，仰著扎了滿頭揪揪的腦袋看天。\n偶爾看到一隻鷹隼飛過，她眼中便亮晶晶的，發現不是海東青後，小臉又黯然了下來。\n她甚至極為懂事地都不在人前哭了，只偶爾晨起或是午睡醒來，像是沒想起來長姐出徵要一年數載才能回來，等記起了，眼中一下子湧出金豆豆，但還不等人發現，她便自己偷偷擦掉了。\n齊姝是真心疼這個孩子，將收在自己宮裡的各種兒時小玩意全贈給了她。\n因為去得勤了，倒也常從太后母子口中聽到一些朝堂上的消息。\n比如北境的戰事並不順利，平西大將軍唐培義一路急行軍趕往北境，在初戰中因太過疲乏一時不慎受了重傷，幸得樊長玉帶著援軍及時趕到，如今北境局勢才穩定了下來，但抵禦外敵的重擔也一下子全落到了樊長玉身上。\n又比如攝政王手段愈發殘酷狠佞，在關於北境的各項軍需補給上，文武百官是不敢出半點紕漏，就怕攝政王拿他們開涮。\n再比如少師又教了齊煜些什麼，想出了什麼新國策……\n雖只有那個人一星半點的消息，但齊姝心中也莫名寬慰了。\n攝政王每隔半旬都會抽空在崇文殿見長寧一次，通常這天俞淺淺都會讓身邊的嬤嬤送長寧過去的，但這日不巧俞淺淺身邊的嬤嬤老毛病犯了，腰疼下不得地。\n齊姝近日已同長寧玩得極好，便提出送長寧過去。\n不知不覺，這皇城竟已又入冬了。\n齊姝在殿外等長寧時，一道冷風颳過，她竟覺著寒意徹骨。\n攏了攏手中的黃銅絞絲暖壺，她正打算在附近走走，卻見一身白衣的公孫鄞和幾名官員從漢白玉石階下方走來，似要去崇文殿議政。\n幾人瞧見她，皆是揖手道：「見過大長公主。」\n後宮不問前朝之事，齊姝便只頷首回禮。\n公孫鄞卻站在原地沒動，對幾名同僚道：「諸位先去偏殿等鄞片刻。」\n幾名朝臣神色各異，但還是應聲先去了偏殿。\n齊姝捧著手爐，入冬了明明冷得厲害，她手心卻忽地出了一層汗。\n公孫鄞看向她的目光極為溫和平靜，他似乎還在病中，氣色並不好，人也清瘦了許多，身上卻添了幾分沉穩：「公主可否借一步說話？」\n-\n二人緩步走在崇文殿外的小花園裡，公孫鄞道：「聽聞公主和沈將軍好事將近了？」\n齊姝捧著暖爐的手一緊，她頓住腳步，美目一片清冷，問：「少師特地喚本宮出來問這個，就為了提前向本宮道聲恭喜嗎？」\n公孫鄞定定看了她幾許，那張俊雅溫和的面孔上，分明有了難過的情緒，他說：「若是真的，微臣自該向公主道聲恭喜的，但微臣還有些話想同公主說。」\n他抬腳繼續往前，齊姝遲疑片刻後，到底還是邁步跟上了。\n今日刮的是西南風，公孫鄞大病未愈，偶爾吸進一口冷風，便止不住地低咳：「百年前，公孫家也曾鼎盛一時，成祖元後，宣帝繼後，都是公孫家的姑娘，只是後來到底樹大招風，百年前的公孫家，下場比十七年前的戚家還慘些，東宮搜出龍袍，邵陽太子被貶為庶人，公孫家兩代皇后自縊於皇宮……公孫家主家一脈，盡數被抄家流放，就連麓原書院『御書樓』的那塊匾，都險些被皇家收回……最後查出來，卻只是樁皇子栽贓的冤案。」\n公孫鄞說到此處便是苦笑：「天底下哪有這般天衣無縫的栽贓？不過是當年龍椅上那位帝王已容不得公孫家罷了。公孫家的旁支守著麓原書院苟延殘喘百年，給族人定下的族規第一條便是『不得入仕』。」\n齊姝怔住。\n公孫鄞望著她徐徐道：「當年你來書院的第一天，我便瞧出了你是個姑娘；你在御書樓同我下那局棋時，我才知當初在廣陵寺風雨廊亭中的也是你。」\n他唇角彎彎，眼中多了幾許時過境遷的晦澀：「我心慕那個姑娘，後來才知她是當朝公主。」\n多年前她在麓原書院御書樓問出的話，終在今日得到了答案，齊姝卻只覺著喉頭髮哽。\n公孫鄞仍舊只是望著她淺笑，只是那笑在稀薄的日光下也多了幾許破碎：「我此生不會入仕，又豈敢誤她？」\n齊姝眼眶已發紅，呼吸都隱隱有些發抖，她盯著他：「你如今同本宮說這些，又是何意？」\n冷風拂動公孫鄞雪白的衣袍，他站在那裡，似一棵蒼勁的瘦松：「助九衡扳倒魏嚴和李家後，我回河間同祖父秉燭徹談了個日夜，終說動祖父改了族規，允族人入仕。只未免重蹈覆轍，將來陛下羽翼漸豐時，便是我請辭之時。」\n「公主回京那年，鄞考了探花郎入宮，見過了公主所住的巍峨宮闕，終不敢妄問公主可否願同鄞遊歷山河，隱居一隅。今日，鄞想鬥膽問問，他日鄞辭官回鄉，公主可願同鄞做一對閒雲野鶴？」\n他又笑了笑：「公孫家百年經營，尚有薄資，不會苦了公主，只河間到底比不得京中繁華……」\n從前他的笑總是溫雅又帶著幾分狐狸似的算計，這一刻卻仿佛只是張易碎的面具，勉強遮著底下支離破碎的情緒。\n齊姝冷冷抬眸：「我若說不願意呢？」\n公孫鄞嘴角笑意微僵，最後只拱手艱難道：「是鄞妄言了。」\n齊姝沒再理他，捧著手爐急步往回走。\n公孫鄞立在原地，只覺心口沁涼，掩唇止不住地低咳。\n「公孫木頭！」\n身後有人嬌聲喚他。\n公孫鄞蒼白著臉回頭，便見齊姝臉上已繃不住笑意，有些嬌蠻地道：「本公主要你家藏書樓的萬棟藏書做聘禮！」\n公孫鄞先是一怔，隨即也慢慢笑開，應聲說：「好。」\n……\n見完姐夫的長寧和齊煜一起躲在假山後，瞧見這一幕悄聲問齊煜：「公孫叔叔是要娶公主嗎？」\n齊煜點了點頭，小臉微沉，抿著唇角說：「朕將來掌權了也不會動攝政王和公孫先生。」\n他不太高興地道：「無能的皇帝才會猜忌臣子。」\n為了方便偷看，長寧是蹲在假山邊上的，齊煜站在她身後。\n她仰起頭問他：「那你將來能不能封我個公主當啊？」\n齊煜垂眸看她：「你想當公主？」\n長寧滿懷期待地點頭：「嗯！像姝姑姑一樣，可威風啦！駙馬得拿出家底做聘禮！」\n齊煜皺了皺眉，道：「這天下都是朕的，沒誰比朕更有家底，你要不當朕的皇后好了。」\n長寧「誒」了一聲，睜大了烏黑的圓眼：「那你要拿這皇宮給我當聘禮？」\n齊煜說：「是江山。」\n長寧不太理解：「江山是什麼？」\n齊煜道：「從你阿姐打仗的地方，到這皇宮，到更南邊的地界，都是朕的，你給朕當皇后，就也是你的了。」\n長寧想像了一下那塊地得有多大，扳著手指頭數了半天，才一臉震驚地道：「隼隼都得飛好幾天才能飛到？」\n齊煜點頭。\n長寧最終勉為其難地道：「那好吧，未免你反悔，咱們拉個勾勾。」\n「拉勾，上吊，一百年，不許變！誰騙人誰是小狗！」\n-\n這一年的除夕，長寧是在宮裡和俞淺淺母子、趙大娘一起過的，她姐夫將京中一切事物處理妥善後，盡數交與了公孫鄞和一眾親信打理，自己抽出半月空閒，快馬加鞭趕赴北境找她阿姐去了。\n次年秋，大長公主與少師完婚。\n年後，懷化大將軍戍邊凱旋，年裡她抵禦北厥大小進攻二十餘次，在北境繼「謝」字旗後，又樹起了一面讓北厥人聞之色變的「懷化」帥旗，朝廷因其曾乃清平縣人士，封她為清平侯。\n同年，年方十二的幼帝親政，謝徵辭去攝政王一銜，攜妻清平侯樊長玉一道回北境戍邊。\n夫婦二人離京的那天，城內百姓一如他們當年大婚時那般，自發出城送行。\n少年天子也車輦出城為其送別，這幾年裡身量已竄高了許多的長寧在馬車上朝他揮手。\n齊煜上前將太后交與他的送行禮物遞到長寧手中時，小拇指輕輕勾了勾她的，沉默著看了她一會兒說：「記著我們的約定。」\n長寧捧著他遞過來的包裹不說話，避開他視線時臉頰慢慢紅了。\n樊長玉同一樣出城來送行的齊姝道完別，駕馬回車邊，少年帝王才看向她和她身後的冷峻男人，「長玉姑姑和姑丈此去一路順風。」\n樊長玉笑道：「謝陛下吉言。」\n謝徵也微微點頭：「四海已定，寰宇之內，陛下想做什麼，便放開手腳去做吧，朝中有公孫、沈慎、賀修筠、陸白等諸多良臣，陛下凡事同他們多商便是，臣與臣妻去替陛下守著北境。」\n少年帝王朝著這位把持朝政數載便徹底放權給他的武侯鄭重一揖：「姑丈和姑姑的大恩，煜兒銘記在心，煜兒會做個好皇帝，方不負姑丈和公孫先生的教誨。」\n謝徵沒再言語，只拍了拍少年帝王尚還單薄的肩。\n大軍啟程北上，樊長玉駕馬同馬車並行，看向趴在車窗邊已出落得少女模樣的胞妹，笑問：「陛下同寧娘說了什麼？」\n長寧望著長姐眯起一雙笑眼：「是秘密。」\n樊長玉淺笑，也不再追問，拍馬追上駕馬走在前邊的謝徵。\n夕陽西下，芳草幽幽，二人並駕而行，遨遊在天際的海東青，也多了一隻毛色略花的白隼作伴。\n樊長玉問身側的人：「此番回北境先去哪兒？」\n「燕州。」\n她挑眉：「為何？」\n男人輕掣韁繩，箭袖下緊實的小臂肌理微鼓，俊美的面容縱使冷煞，出城這一路也引得道旁行人頻頻注目。\n他只在看向身側的女子時眼底才見些許柔情：「帶你去燕山看日出。」\n樊長玉便笑了：「再去徽州獵場打獵？」\n謝徵淺淺「嗯」了一聲。\n那是他曾許諾與她的。\n斜陽下，二人跑馬遠離大軍一段路後，馬背上的女侯拽過身側夫婿的領口，仰頭吻了上去。\n鳥鳴啾啾，山野間繁花開遍，正是一年好春景。\n永平十六年的那個秋日，他們曾在漫山蘆花中走散。\n永興四年春，她們北上同歸，從此再未分離過。\n番外：齊旻篇（不喜勿訂）……\n（一）\n齊旻還是東宮那個無憂無慮的皇長孫時,每日所思不過如何完成父王留下的課業，所愁也只是怎麼在母妃那裡撒個嬌,才能多玩一會兒蹴鞠。\n錦州城破,父王身死的戰報傳回京時，便徹底擊垮了東宮表面維持的那份安穩。\n父王死了，他很難過,但母妃難過的原因似乎比他深沉得多。\n東宮總是在陸陸續續地死人。\n父王的客卿們常秘密來東宮同母妃商議什麼要事，每每送走那些人後,母妃看他的眼神都愈發凝重。\n他尚年幼,並不知道那意味著什麼，但夜裡母妃守著他，時常整晚整晚地睡不著。\n便是淺寐著了，他偶爾翻身的動靜便能驚醒他母妃,她總是抱他抱得很緊,口中喃喃念著什麼「一定會讓他活下去的」，不經意間便已淚流滿面。\n那年他不過也才四五歲，以為母妃是傷心父王的死,輕拍著母妃的肩，說自己長大了會保護她，母妃卻抱著他哭得更厲害。\n直到東宮那場大火來臨，他才明白母妃所謀劃的一切。\n遠處宮殿燃燒的火光映紅了他的眼，而他被母妃親自摁進了炭盆裡,炭火的溫度燒得他骨隙都痙.攣著疼，他哭嚎到嗓子裡再也發不出任何聲音。\n母妃在他耳邊哭著說「一定要活下去」，可他當時腦子裡唯一的念頭是：太疼了，活著太疼了，不如讓他死了吧。\n他痛到幾欲昏闕,臉上熾熱的溫度似乎鑽進了腦仁兒裡，燙得他腦髓都跟著炙疼。\n父王留下的影衛抱著他往安全的地方撤時，他趴在對方肩頭，看著母妃推倒了炭盆，火舌很快燎燃了垂絲桌布，他母妃還端起燭臺點燃了這主殿內掛了層層疊疊的帷幔。\n火光慢慢吞噬了整座宮殿，他已痛到發不出聲音了，只下意識地朝著母妃伸出手，想救母妃，但母妃只是在火光裡溫柔地朝著他笑，隔得太遠他聽不見母妃在說什麼了，依稀從嘴型辨出她說的是「活下去」。\n（二）\n再次醒來是在全然陌生的地方，他還是好疼，渾身都疼，特別是臉和腦袋，仿佛是有炙火在皮下燒一般，痛得他恨不能碰柱碰個頭破血流，眼前視物都不甚清晰。\n他意識並不清醒，只下意識孱弱地喚「母妃」。\n但這次沒有那個溫暖的懷抱，也沒有那隻溫柔的手來撫慰他了。\n在嘈雜而陌生的諸多聲音裡，他聽見有人帶著哭腔說：「可憐的淮哥兒，王妃已經沒了啊……」\n後來那些人都走了，只剩一人坐在床邊握著他的手，低聲同他說：「殿下，奴婢蘭氏，原是太子妃娘娘身邊的人，太子妃娘娘把您託付給了奴婢的。從今往後，您的母妃不是太子妃娘娘，是長信王妃，在這長信王府，您除了奴婢，誰都不要信，奴婢會護著您的。」\n他還是疼，眼角滾落巖漿一樣的液體，滑進了兩鬢，水澤划過的地方，燙得他麵皮火辣辣的更疼。\n他聽見那個聲音繼續輕柔地同他說：「別哭。」\n齊旻也不知道自己是疼哭的，還是想起母妃已死在了大火裡，難過哭的，他只覺得好疼，好疼好疼，從裡到外都疼……\n握著他的那隻手也溫暖，但一點都不像母妃的手。\n從此以後，他不僅沒有父王，也沒有母妃了。\n（三）\n燙傷加上最後的記憶裡母妃葬身火海的緣故，齊旻雙眼能視物後，變得極為怕火。\n夜裡屋內點燈燭他都會歇斯底裡尖叫，摔打身邊一切能摔的東西。\n從此他的院落裡，一入夜便是漆黑一片，下人們怕驚擾了他，走路都不敢發出半點聲音，他住的地方仿佛成了一座死宅。\n一切熾熱的東西都能引發他的恐懼，飯食湯藥他只喝冷的，甚至洗漱沐浴的水，也一定要是冷的。\n他寧可凍出一身風寒，也不敢再接觸任何溫熱的物件。\n在失去母妃後的不知第幾個日夜裡，他變成了母妃當初在東宮的樣子，夜不能寐，屋外颳風的動靜都能驚醒他。\n他的神經總是時刻緊繃著，甚至一度不敢入睡——怕自己在噩夢裡夢囈說出了什麼。\n後來他傷好了些，纏在他身上的那一圈圈白色紗布能解開了，進來送水伺候他洗漱的婢子，嚇得驚叫一聲打翻了水盆。\n年老的嬤嬤進來看發生了什麼事，瞧見他時，也是嚇得腿軟。\n最終是蘭姨呵斥走了那些人，親自打水來服侍他洗漱。\n屋裡所有能反光的東西都被收走了，他看不清自己是何模樣，但手臂上留下的燒傷疤痕，坑坑窪窪的一片肉紅色，確實醜陋又噁心。\n他的繼母——他「母妃」的妹妹嫁進王府後來看過他一次，也是嚇得門都沒敢進，只站在門口便變了臉色，聽說回去後幾天都吃不下飯。\n他一直都默不作聲，只在一天蘭姨伺候他洗漱後，忘了及時收走臉盆時，借著盆裡的水照了一眼自己的樣子。\n水光照得不是很清晰，但他還是嚇得一腳踹翻了銅盆。\n他太久沒說話，嗓子裡只能發出沙啞又刺耳的尖叫聲。\n那不是他，他記得自己從前的樣子，父王還請畫師為他和母妃作過畫，他眉目清秀，唇紅齒白，他不是水盆裡那個醜東西的樣子！\n蘭姨聞聲進來，抱著他安慰了很久。\n但他性情還是越來越陰暗孤戾，喜怒無常，近身伺候的婢子稍露出個驚恐的眼神，便能引得他勃然大怒，下令將那婢子亂棍打死。\n他變得敏感，暴躁，易怒，害怕見人，也害怕那些或驚恐或驚訝的目光。\n齊旻覺得自己都不是過街老鼠，而是一隻渾身長滿了皮癬，身上的皮毛都快掉光斑駁得令人噁心的病老鼠。\n那身燙傷唯一的好處，便是讓長信王夫婦都輕易不再來看他。\n繼王妃不知的確是同先王妃姊妹情深，還是看出他雖為長信王「嫡長子」，但已然是個廢人，對她和她肚子裡的孩子將來都沒威脅，倒是願意給自己攬一身賢名，哪怕不曾再去看他，倒也半點沒短他院子裡的吃穿用度。\n蘭姨的夫家是商賈之流，人脈頗廣，很快便給他找到了一名江湖神醫。\n神醫說幸好他年歲尚小，那些被燒傷的皮，換掉後，還能長好。\n剝皮之痛作為十大酷刑之一，可見其殘酷血腥，他燒傷的範圍極大，不可能一次換完。\n他身上那些死皮，陸陸續續用了好幾年才徹底換完。\n切膚之痛，唯有親身經歷，才能明白有多痛苦。\n手腳在床上被綁得死死的，塞在嘴裡的木塞都被咬到變形。\n太疼了。\n他無數次地想，就這麼死掉好了，但偏偏又死不掉。\n那就報仇吧，這些痛，都是拜他的仇人們所賜，母妃也是為了他才死的，他必須要報仇！\n（四）\n齊旻那一身燒傷的皮肉徹底換完時，繼王妃的兒子已經能下地跑了。\n這些年，府上的人已習慣了他的陰晴不定，因為他臉上有燒傷，前些年便一直帶著面具，臉上換皮長好後，他還是不曾在長信王府的人跟前取下面具。\n府上的人以為神醫沒醫好他，怕犯了他的忌諱，也從不敢妄議此事。\n繼王妃也極聰明地不提此事，她的兒子已被封為世子，許是看他這個「姐姐的遺孤」可憐，倒也願意施捨他幾分憐憫，常說些讓她那健康活潑的兒子同他交好的話。\n齊旻心中只有厭惡。\n整個長信王府都是他的仇人！\n她那健康可愛的兒子，只會讓他想起自己這副不人不鬼模樣，心中嫉恨。\n隨元青能習武，能騎馬能拉弓射箭，他卻一身頑疾，日日湯藥不斷。\n他也想習武，但一向什麼都站在他這邊的蘭姨卻不同意，說他身體太弱了。\n只有父王留下的影衛傅青肯偷偷教他。\n從那時他便隱約知道，只有傅青會無條件服從他的命令，蘭姨對他忠心，但也是會拒絕他的。\n（五）\n齊旻真正開始懷疑蘭氏對他的忠心，是他十七歲因偷偷練武，勞損過度再次誘發了頑疾的時候。\n病來如山倒，大夫說他的情況不容樂觀。\n他昏沉著，意識卻清醒，聽見底下人跟蘭氏說，不該讓他換皮，經歷那麼多痛苦，愈發敗壞了身體。\n他一直以為蘭氏替他找神醫，是因為不忍心看他那般，但他聽到蘭氏說，若不換皮，他燒毀了容貌，將來如何坐回那把龍椅？\n原來，並不是為了他，只是為了那把龍椅。\n蘭氏還說，趁他如今身子還行，得挑幾個女人，讓他留下血脈，將來他若有什麼不測，才不會出大亂子。\n齊旻從未覺得如此諷刺，心口一片寒涼，冷得他發慌。\n原來蘭氏對他並不忠心啊，她忠心的只是他承德太子血脈這個身份。\n就算不是他，而是另一個有著父王血脈的人，蘭氏也會這般盡心盡力去服侍。\n他身體稍好些，環肥燕瘦的美人就被送到了他院子裡。\n他發了很大一通脾氣，蘭氏似乎很敬他，但在要他留下子嗣這事上，卻從未改變過主意。\n蘭氏總說，這是為了復仇大業，他冷笑著問蘭氏是不是盼著他死？蘭氏跪下說不敢，聲淚俱下，甚至列舉了許多諸侯爭位的例子給他，言子嗣就是舉事最大的底氣。\n他最終妥協了，但並不是被蘭氏那番言論說服。\n只是他實力還沒到能完全掌控趙家的地步，母妃給他留下的人馬，都唯蘭氏馬首是瞻。\n他能用的，只有父王留在東宮的那批影衛。但把蘭氏母子殺光了，趙家這盤棋便下不走了，所以他得留著蘭氏母子的性命，讓他們先繼續替自己做事。\n他滿懷厭惡地在蘭氏送來的美人裡，選了一個最膽小老實的。\n大概是他陰狠暴戾的名聲在外，那個女人很怕他，來他房裡時，整個人都在發抖，全程不敢看他。\n齊旻覺得噁心，不僅對於留子嗣這件事，他突然覺得自己的身份也噁心。\n繼王妃養了一隻波斯貓，是番邦進貢的寵物，繼王妃是很喜歡，為了留下那隻貓兒的名貴血脈，繼王妃專程命人找了幾隻漂亮的白貓同波斯貓配種。\n齊旻覺得自己就像那隻被拉去配種的波斯貓。\n那個來伺候他的女人，他連她樣貌都沒看清。蘭氏怕他身子不好，還給他用了藥，他對中間發生的事幾乎是毫無印象的。\n醒來發現床帳中一片血腥，那個女人臉色慘白地暈在他身邊，不知是被嚇暈過去的還是痛暈過去的。\n齊旻只覺天旋地轉，那股噁心感更甚，讓他恨不能把身上的皮都剝掉一層。\n他當真只似一頭牲口，被人下藥也只為成事。\n他發了有史以來最大的一通脾氣，那間屋子裡能燒的東西都被他命人燒了個乾淨，他在冰冷的湖水裡把自己泡到手腳皮膚發皺，仍覺著洗不去那滿身的髒汙和黏穢。\n伺候他的女人回去便大病了一場，人也木木的，像是成了個傻子。\n底下的人暗地裡都說是被他嚇傻的，對他愈發懼怕。\n齊旻心底只有厭惡和噁心，他沒有一刻不想殺了那個女人——她見過自己被當成牲口下藥的樣子。\n每每意識到這點，他渾身的暴戾便壓不住，唯有殺人才能稍稍緩解。\n蘭氏在這事後，似乎也明白徹底犯了他的忌諱，收斂了許多，在他跟前伺候時，也總是擺出一副是為了復仇大業，對他忠心卻被他曲解的苦相。\n齊旻卻只想把她那張菩薩似的臉碾進泥地裡，再給她也下藥讓她明白被當成配種的牲口是個什麼滋味。\n他想殺那個伺候過他的女人，底下的人都以為是那女人沒伺候好他，不敢置喙。\n蘭氏也沒再阻攔，算是一定程度上的讓步。\n只不過那個女人還真是命好啊，她葵水沒來，被診出了孕脈。\n他殺不了她了。\n他知道，蘭氏很快就可以有別的選擇了。\n也是從這時起，他愈發忌憚起蘭氏母子。\n只要那女人生下一個男嬰，那麼他的位置便隨時都可以被取代。\n繼王妃那邊得知他的一個妾室有了身孕，也開始提防他，打著給他的院子裡添幾個人手的名義，安插了眼線過來。\n他的身子不好，不能同隨元青爭什麼了，他有了兒子可就不一定了。\n那繼王妃看著大度，長信王府上姬妾無數，也不見她爭風吃醋，可長信王的姬妾們給他生了一堆女兒，卻沒一個生出了兒子。\n長信王可能懷疑過什麼，只是又拿不出證據，所以有一段時間在外邊養了一堆女人，那些女人裡，便有給他生下了兒子的。\n王府的子嗣，自然不可能在外邊被些不三不四的人教養，全都會被接回王府，同他的「好弟弟」隨元青一般，自小就由武師傅教養。\n只是那些被接回府的孩子，總是因為各種各樣的夭折，要麼就是同他一樣，病體孱弱。\n齊旻覺得長信王肯定是知道了什麼，但為何沒同王妃鬧崩，想來還是為了王妃娘家的勢力。\n長信王只有隨元青一個能堪大用的兒子，自然得好生教養，被魏嚴養在身邊的謝臨山之子謝徵學什麼，長信王后腳便會給隨元青也安排上。\n齊旻當然知道他父王的死就是出自魏嚴和長信王這兩大惡人之手，他對他們恨之入骨，可這二人，一人權傾朝野，架空了皇權，一人於西北封王，當起了土皇帝，他當下還奈何不了這二人。\n但齊旻敏銳地察覺到，魏嚴和長信王必然是鬧崩了，只是兩人曾狼狽為奸，彼此手上都捏著對方的把柄，這才一直維持表面上的相安無事。\n長信王一直把隨元青照著謝徵養，就是為了能讓隨元青知己知彼，將來在戰場上克住魏嚴鍛出的那柄刀。\n齊旻一直按兵不動，對於復仇，卻隱隱有了初步的計劃。\n他得將長信王和魏嚴之間的紛爭挑大，先讓他們狗咬狗，找到他們狼狽為奸的證據後，再一舉揭發這二人。\n朝堂上有賢名且同魏、隨兩黨不對付，便是有著清流之首之稱的李家。\n可惜坐了那把龍椅的傀儡皇帝也有野心，早早地便娶了李家的女兒，李太傅又為帝師。\n他貿然去接洽李家，比起同李太傅已有了師生情誼和姻親關係的傀儡皇帝，他不過一外人。\n所以，要想拉攏李家這個靠山，那他必須得先瓦解李家同小皇帝的聯盟。\n（六）\n齊旻和那個懷了自己子嗣的女人再有交集，是在那女人被診出孕脈三月後的一個月夜。\n這期間他要提防著蘭氏母子和繼王妃，也要開始著手布局進一步引發隨、魏兩家的矛盾，再離間傀儡皇帝和李家，當真是機關算盡。\n他也明白自己不能依賴蘭氏和趙家了，他必須得拓展自己新的勢力，才能不會再被當做一個只有留種用途的牲口。\n儘管再怕火，他也逼著自己去面對，只是他的手段委實殘忍。\n他克服恐懼的法子，是親手燒死底下叛變的人或是露出馬腳的細作。\n那些尖銳悽厲的慘叫刺激著他耳膜，那一張張被燒到扭曲的臉，從痛哭流涕求饒到對他各種謾罵詛咒，空氣裡血肉燒焦的肉香慢慢變成焦糊味兒。\n那火離他遠遠的，他還是覺得曾經被燒傷的地方又開始灼痛，這種時候他是不允許任何人瞧見自己那副狼狽樣子的。\n他屏退所有人，把自己關進石室裡，在鐵柵欄外留一堆讓他恐懼的篝火，像一頭畜生一樣蜷縮在角落裡，獨自面對來自幼年東宮那場大火的夢魘。\n記憶裡母妃被燒死在東宮的臉，有時候會變成他曾在水盆裡看到過的自己那被燒傷後模糊卻駭人的模樣，有時候又變成了被他燒死的那些人的臉。\n他日復一日地把自己關進石室，從那滿是火光和炭火燒傷痕跡的噩夢中掙扎醒來，每次都臉色蒼白，身上的衣物被冷汗溼透。性情肉眼可見地變得越來越偏執、暴戾、陰鬱。\n又一次他在獨自面對火光的恐懼時，受激發了狂。\n曾經被燒傷的地方，只要看到火，便會炙痛難忍，仿佛又回到了當年險些被燒死的時候。\n神醫給他看診過，也拿不出醫治的法子。\n他已跟著影衛暗中習武多年，發狂後撞開了石室的大門，守在外邊的影衛怕傷了他，一時沒攔下他，反而被他奪了刀捅成重傷。\n幻痛讓他渾身都疼，他覺得自己快被燒死了，想也沒想便跳進了寒潭裡，極致疼痛下，他甚至忘了屏住呼吸，冰冷的水流嗆入鼻腔。\n他已沒力氣去掙扎自救，那一刻他以為自己真會死在那裡。\n但有一隻纖細卻溫暖的手拽住了在冰冷的潭水中不斷下墜的他。\n他初時並不知道救他的女人是誰，只覺她那麼瘦弱，卻還是在努力帶著他往寒潭邊上鳧去。\n把他拖上了岸，他力竭幾乎睜不開眼，對方以為他是嗆了水，一直按壓他胸腹，隨即又不知為何低下頭來吻他。\n齊旻沒有跟任何人這般親密過的記憶，他僅有的一次跟人同房，也是被下了藥，那醒來後一室血腥和甜膩媚香混在一起的味道，迄今想起來仍讓他噁心。\n此後他甚至厭惡同女人接觸。\n但眼前這個人不一樣，她的唇是軟的，溫熱的，身上的味道也不難聞。\n她親了他一陣，又用力按壓他胸腹，溼透的長髮墜下冰冷的水珠砸在他臉上，語氣有些焦急：「醒來啊，你別就這麼死在這裡啊！」\n齊旻躺了許久，終於恢復了些力氣，他吐出一口水掀開眼皮，就著月色看清了救他的女子。\n很乖順。\n這是他對那個女人的第一印象，從眉眼到五官的輪廓，都帶著幾分順從服帖的乖巧意味，只她的眼神裡偏偏又透著一股毫無尊卑的膽大和肆意，仿佛從來都沒被什麼規矩束縛過。\n齊旻頭一回知道了被人一個眼神，鉤在了心坎上是個什麼滋味。\n她只是這麼看著他，他便覺著心口發癢。\n對方發現他醒了，鬆了口氣後，毫無顧忌地一屁股坐在了地上，擰著自己那溼透的裙子和頭髮嘀咕：「還好醒了，菩薩在上，我這也算是救人一命了，還望菩薩保佑我，讓我一切順利……」\n齊旻聽著她的碎碎念，吃力問：「你是誰？」\n對方見過他如此狼狽的模樣，按理說，他是該殺了她的。\n可是他這一刻心中出乎意料地平靜，甚至對她膽大包天地吻了他那麼久，都沒生出多少厭惡來。\n可能是她才救了自己，也可能她是這些年來，唯一一個看著自己時，眼底沒有見了什麼怪物一樣恐懼情緒的人。\n亦或者是他現在太虛弱了。\n總之，齊旻腦子裡暫時並沒有生出想殺了她的念頭。\n那女子眼珠轉了轉，不答反問：「你又是誰？大半夜跑這池子裡來尋短見作甚？」\n她看著乖軟，倒也有幾分腦子。\n齊旻的院子本就建在王府最僻靜之地，這寒潭後的紫竹林連著後山。\n他料想這女子半夜既能出現在自己院落的地界，看服飾又是粗使丫鬟，應當就是他院子裡的粗使丫鬟了，便扯了個謊話道：「我是府上的侍衛，公子想吃魚，命我來潭中抓。」\n那女子驚愕瞪大了眼：「大晚上的想吃魚？」\n他譏誚勾了勾唇角，說：「是啊，抓不到，我明日大抵便活不了了。」\n府上的下人談起他便色變，懼他如厲鬼羅剎，他這番說辭，大抵能哄得她說出不少罵他的話。\n但那女子擰了擰眉毛，只是低罵了聲：「這吃人的鬼地方。」\n卻又不再多說，拎起下水前放到一旁的大包袱朝他道：「這黑燈瞎火的，你也別下水抓魚了，我走了，我救你一命，你也幫我個忙，今晚就當沒見過我。」\n齊旻看著她手上的包袱，終於明白她深更半夜為何會出現在此處。\n他從地上半坐起來，靠著一株紫竹說：「私逃出府的奴才，被抓回來後會活生生打死，以儆效尤。」\n那女子豪邁的步伐明顯一滯，有點狐疑地偏過頭看著他：「我救了你，你該不會想去揭發我吧？」\n他難得好脾氣，甚至彎唇笑了笑同她說：「不會，我只是提醒你府規。」\n女子在原地站了一會兒，突然朝他走了過來，她包裹裡沒有繩索，掏了半天，只掏出幾身衣物的腰帶，她就用那腰帶將他雙手綁了在了他背靠的那棵竹子上，又拿出一件罩衫團吧團吧堵住了他的嘴。\n齊旻被她這番動作弄得愣住，若非剛經歷一場幻痛，又落了水身體虛弱，不然他肯定在她動手時就擰斷了她脖子。\n女子做完這一切後，才蹲在他跟前對他道：「多謝提醒，我不認得你，也不可能帶著你一起逃，未免你告密，我還是先把你綁起來吧，這樣你明日被人發現了，也好脫身，省得被冤枉成我的同夥。」\n他被塞住了嘴，眼睛冷得像冰，又似淬了火，發出兩聲唔語。\n女子伸手指了指自己：「我啊？這你就不用操心啦，等明天府上的人發現我不見時，我應該已經出崇州城門了！」\n她重新挎起自己的包袱，往紫竹林深處走去，背朝他格外瀟灑地揮了揮手。\n齊旻怔怔地看著她的背影，生平頭一回被這般對待，他本該是要生氣的，但不知何故，突然又一點也氣不起來。\n那女子對他沒有半點惡意，身上還有種莫名的東西在吸引著他。\n她自然也是沒能成功逃出王府的。\n她走後不久，發現石室那邊變故的影衛便尋著痕跡找了過來，大驚失色給他鬆了綁。\n齊旻罕見地沒有大發脾氣，而是讓他們帶著府上的侍衛去將一從後山逃走的婢女毫髮無傷地帶回來。\n影衛們辦事效率很高，他回房剛更衣完，那女子就被抓回來了。\n並且還帶回了另一個消息：她不是什麼粗使婢子，而是孕育了他血脈的那個女人。\n這個答案讓齊旻怔愣了很久。\n第一想法竟然是，那個女人竟也不認得他？\n這個認知讓他不太高興。\n他是噁心下藥後同他成事的那女人的，還極度厭惡她腹中那個尚未出世的孩子——儘管那是他的骨血。\n沒誰會喜歡一個隨時會威脅到自己性命和地位的人。\n幼虎長大後，在有同虎王一較高下的實力前，也會被趕出領地。\n在這一晚之前，他只想著什麼時候弄死那女人和腹中的孩子。\n這夜之後，他突然對那個女人有了幾分興趣。\n她都懷上身孕了，還敢跑，她似乎也不願被圈禁在這裡？\n他在她身上看到了自己也渴慕的東西：自由。\n（七）\n齊旻沒有急著去見那女人，也沒讓人罰她。\n準確來說，他是還沒想好要怎麼處置她。\n蘭氏也摸不清他對那女人的心思，但見他似乎沒有之前那般厭惡那女子了，還是主動告訴了他不少信息，比如那女人姓俞，沒有名字，家中貧苦，是被爹娘賣了的。\n齊旻對這些並不上心，他在有條不紊地慢慢加劇魏嚴和長信王之間的摩擦。\n只偶爾夜深人靜，獨自練武后在寒潭邊上泡澡緩解那一身練武磕碰到的疼痛時，莫名地會想起那女人的吻。\n那是他的第一個女人，他似乎也沒那麼噁心她？\n時隔一月，齊旻終於問起那女人的近況。\n底下的人神色有些微妙，只說她一切都好。\n齊旻不懂「一切都好」是何意，親自去那女人住過的院子裡看了一遭，終於明白了。\n她總是安靜又悠閒地做著自己的事，嫌廚房做出的滋補膳食不好吃，自己在孕中又不願沾油煙，還會指導起灶上的廚娘怎麼做菜。\n仿佛跟當初那個半夜挎著包袱要偷跑的不是同一個人。\n嗯，她變乖了。\n亦或者說，她總是在儘量讓自己過得舒服。\n她知道他就是傳說中那個「大公子」後，確實也驚訝了許久，但很快就平靜了下來，該認的錯她立馬就認，該吃的飯也是一口不落。\n齊旻有種一拳打在棉花上的錯覺。\n不過，也挺有意思的。\n她是這府上唯一一個真正不怕他的人，哪怕他就坐在她對面，她依舊能敞開肚子吃吃喝喝，半點不把他當回事。\n就是這份隨意，反而讓齊旻愈發喜歡同她待在一起。\n她對他恭敬，卻又沒那麼恭敬。\n像是一隻時刻都想炸毛，但又不得已要按捺住自己脾氣，任人搓揉扁圓的貓兒。\n有時候，他甚至會覺得，自己的長子是這樣一個女人生的，似乎也沒那麼難以接受了。\n因為從她這裡得到的那份寧靜與平和，他連當初被下藥後的那份屈辱和憎惡都在慢慢淡去。\n只是他很快便嘗到了背叛的滋味。\n那女人逃了。\n卷了他賞賜下去的所有金銀首飾，帶著貼身伺候的人和長信王府上一個經常幫她跑腿的侍衛，遁得無影無蹤。\n他派了影衛去找，也只查到她們跟著商隊出了關外，去了西域。\n齊旻恨得咬牙切齒。\n足足五年，他一直在利用趙家的人脈，往關外找人。\n這期間，蘭氏倒也不是沒有催他另選幾個合眼緣的侍妾。\n只是他到底已培養起了自己的勢力，不再如從前一般，處處都只能聽任蘭氏安排了。\n他怎麼可能再容忍自己被當做一個傀儡。\n蘭氏碰了硬釘子，也察覺出他對趙家和自己已多有不滿，到底是不敢再強求。\n（八）\n再次有那女人的消息，是在清平縣。\n齊旻收到趙詢的傳書時，幾乎氣笑了，他一直以為，她躲去了關外，沒想到當年她故意留下的行蹤才是障眼法，這麼多年，竟是一直躲在薊州。\n那女人還給他生了個兒子。\n蘭氏母子極為高興，齊旻在動身前往薊州時，卻只是意興闌珊想著，那個小賤種，到底是殺還是留？\n彼時隨元青假扮了朝廷徵糧的官兵，正在試圖把薊州的水越攪越渾，激起民憤後，讓暴民裡應外合，助力長信王奪下薊州。\n得知他那逃跑的侍妾在清平縣開起了酒樓，隨元青直接控制了當地的縣令，將酒樓裡的人全都押進了大獄，再傳信與他。\n他再次見到那個女人，是在清平縣民眾暴動的那天夜裡。\n她被他的人秘密帶到了莊子上。\n他才知道原來她有了自己的名字，叫俞淺淺。\n他問她兒子的下落，她不肯說。\n時隔五年，他第二次碰她，帶著他自己也說不清的怒意和失而復得的喜悅。\n他突然發現，其實他也並沒有那麼厭惡男女之事的，前提是和她。\n她在他床榻上被綁了一夜，第二日隨元青落敗生死不明的消息便傳回了別院裡。\n他雖已派了趙詢明朝暗訪了她許久，但她曾完美地瞞過自己的眼睛逃跑過，所以這次他也不打算直接帶她回去。\n一是她給他生的兒子還沒找到，二是他想知道她這些年裡，還藏了哪些勢力。\n於是他故意露出破綻，做出一副是隨元青落敗之後，他們也必須儘快撤離薊州的假象，讓她有機會逃跑。\n他的人一直暗中跟著她，看著她匆匆折價賣掉了自己的酒樓，遣散了樓裡的人，只帶著幾個忠心的婢子和護衛逃。\n她把兒子果然藏得隱秘，竟是託付給了鎮上一戶殺豬的孤女。\n確定了俞淺淺再沒有任何底牌後，他才帶著軍隊在她前往江南的必經要道處截下了她。\n看著她眼底從滿是希翼到認命的灰敗，其實也很有意思。\n他想，他得罰罰她，她才能長記性，打消繼續逃跑的念頭。\n知道她對那孩子看中，他便讓底下人將她們分開關著。\n初時他覺著她順眼，是因為她對自己無所求，她從來沒想過要從他這兒拿走什麼。\n跟她在一起，他覺得自己才是放鬆、安全的。\n可如今，她還是對他無所求，他反倒躁鬱一日勝過一日。\n——對他無所求，就意味著他身上沒有什麼能讓她為他留下。\n除了孩子，也只有那個孩子。\n齊旻是憎惡俞寶兒的，不僅因為他曾是他被當做牲口一樣下藥屈辱的產物，還因為他健康、活潑，有母親的疼愛。\n最重要的是，他似乎一個人佔據了俞淺淺所有的愛。\n他就是在陰暗地嫉妒自己的孩子。\n（九）\n很快他便嘗到了甜頭。\n他在崇州留了一座空城，發兵盧城時，俞淺淺第一次對他服軟。\n孟叔遠的外孫女在城外血戰死守，他知道她是在拖延時間，一開始還想讓底下的影衛活捉了她，好歹也能成為一個同武安侯對上時的籌碼，但眼見時間越拖越久，盧城還沒被攻下，他便也真起了殺心。\n是她故意弄出了動靜，引他前去。\n她求他留那孟氏女的性命。\n天知道他當時心中有多愉悅，但又被一股不知名的怒火裹挾著，心口燒得慌。\n在她那裡，果真是誰都比他重要的。\n他突然就想知道，被她放在心尖上，究竟是個什麼滋味。\n光是想想，他便覺著心口發燙，整個人都愉悅了起來。\n只可惜他後來也一直沒機會。\n奪盧城的計劃還是失敗了，誰也沒料到，一直在康城的謝徵，為何會突然出現在盧城。\n一如十七年前母妃為了讓他活下去，讓他成為了隨元淮。\n他一招金蟬脫殼，便也結束了這反賊之子的身份。\n他帶著她躲進了李家一早就安排好的地方，成功避開了武安侯那邊一次又一次的搜查。\n期間還發生了一件讓齊旻極為生氣的事——趙詢叛變了。\n他想，他早就該對蘭氏母子下手的，不然也不至於在趙詢找到武安侯這個靠山後，他一時拿趙家無法。\n早些年他為了瓦解傀儡皇帝和李家的結盟做的那些事，終究也是替武安侯做了嫁衣。\n趙家雖是商賈之流，但也委實有些本事，連傀儡皇帝身邊總管太監的線都能搭上。\n皇權衰落，在宮裡當差的那些太監，便也都替自己多謀著一條生路。\n早些年趙家便打探到了一些消息，比如李家送進宮的姑娘，數載都還沒有身孕，顯然傀儡皇帝在魏嚴架空他的權勢後，便面上雖依附李家，背地裡卻也提防著李家的。\n傀儡皇帝也怕李家將來成為第二個魏家。\n齊旻還曾自嘲，龍椅那位傀儡皇帝的處境，同他還真是像。\n他們都不敢有自己的子嗣，怕自己輕易便被取代掉。\n能徹底擊垮傀儡皇帝和李家結盟的，便是總管太監手上的那十餘封關於關中和江南大旱大澇的急報。\n負責前去賑災的是魏嚴手底下的人，李黨派了監察同往。底層官員貪墨，李黨的監察毫無作為，甚至幫著瞞報災情。\n那是傀儡皇帝和李家一開始就謀劃好的，藉此大災多死些人，屆時問罪魏嚴，便能又斷魏嚴一臂。\n只是李太傅行事謹慎，怕將來傀儡皇帝得勢時，反扣李家一項監察不力的大罪，寫了十幾封急報送往京城。\n總管太監是個人精，當然知道皇帝是不願看到那些急報的，若是看到了，要麼原定的計劃沒法繼續了，要麼，皇帝吃了李家這個啞巴虧，將這份帝德有虧的汙點背了，只是他這個總管太監便也做到頭了。\n所以總管太監只能把腦袋別在褲腰帶上，暫且當這個中間人，扣下了所有的急報。\n拿到那些急報，便是拿到了帝德有虧的證據，也是拿到了李家的一處命脈。\n齊旻一直想要總管太監手中的這份罪證，最後卻被趙詢捧給了謝徵。\n以至於後來蘭氏為了保護他，死在血衣騎劍下時，他心底升不起一絲一毫的波瀾。\n——她忠心的不是自己，只是承德太子的這股血脈。\n齊旻甚至自嘲地想，若不是俞寶兒還在謝徵手中，蘭氏只怕是不會豁出性命來保自己周全的。\n破廟那場刺殺裡，他還殺了隨元青。\n隨元青到死都恨極了他，他可以把當年的真相和盤託出的，可以同他說長信王隨拓和魏嚴一起幹了什麼豬狗不如的事的，也可以同他說，他的母親，為了他能活下來，將自己燒死在東宮，所受的痛苦，一點也不比真正死去的長信王妃母子少。\n但他什麼都沒說，他吝嗇給出這個答案。\n說了真相，他似乎就是條為了報仇在長信王府蟄伏這麼久的可憐蟲。\n就是要隨元青帶著一腔恨意和委屈死去，才快意不是麼？\n（十）\n同血衣騎交鋒後，齊旻設計，終於把俞淺淺搶了回來，可惜沒能成功殺死落在謝徵手上的俞寶兒。\n俞淺淺受了很重的傷，他發了一通脾氣，讓傷了俞淺淺的影衛下去領了罰。\n俞淺淺對他前所未有的冷漠，她還是不能理解他為什麼一定要殺她的孩子。\n她使性子，不肯喝藥，也不肯治傷，似乎知道他手上已沒有了俞寶兒，奈何不了她了。\n也是那時，齊旻突然發現，俞淺淺對這個世界其實是沒有留戀的。\n除卻她在乎的人，她憎惡這裡的一切。\n她不配合治傷，他便碰她。\n兩人間，其實她才是真正厭惡房事的那個。\n在他這樣的逼迫下，她終於肯吃藥治傷，那時她總是很平靜地告訴他：「你不讓我死，終有一天，我會殺了你的。」\n齊旻記得那天的日頭很好，他端著藥碗坐在榻邊，常年冷白的指尖被太陽光照著，竟也感受到了幾分暖意。\n他笑著回答：「人總有一死的，比起死在旁人手上，死在你手上似乎還不錯。」\n他攪了攪湯匙，同她閒聊一般道：「到時候給我煲個湯，在湯裡下毒吧。」\n當時俞淺淺只是用看瘋子的眼神看著他。\n後來，她真的帶著她煲的湯來送他最後一程了。\n（十一）\n逼宮失敗這件事，對齊旻的打擊倒也沒多大。\n真正塵埃落定的那一刻，他心底反倒有幾分解脫的快意。\n他這一生太累了，幼年靠燒毀整張臉和半身的皮肉，親眼看著母妃葬身火海，才偷來幾十載光陰苟延殘喘。\n這十幾年裡，他忍受著火燒的幻痛，日日如履薄冰……他常覺著這和死了有什麼區別？\n可是他不敢提死，甚至不能在任何人面前表現出半點脆弱。\n他是承德太子的後人，將來是要重新奪回皇位的，儲君要有儲君之威，豈可在人前示弱？\n他也不能死，母妃賠上了自己的性命才為他換來的一線生機，他得把他的仇家一個個地拖進地獄裡，把京城那把龍椅搶回來才行。\n如今，倒是徹底解脫了。\n胸口的箭傷折磨著他，明知謝徵是故意吊著他一口氣，他也沒想過自我了結，他想見俞淺淺最後一面。\n他們約好了的，他得喝她煲的湯走才行。\n她來時，她想替旁人問的陳年舊事，他答了，她煲的湯，他也喝了。\n他想問她究竟是誰，她卻避而不答。\n明白過來她待自己從未有過半分真心後，他也不懂自己為何就生出了一股滔天的委屈和憤怒。\n他就要死了啊，她竟是連做做樣子騙騙她都不肯！\n恨到了極致的時候，他甚至想，帶她一起走好了。\n這是她欠他的！\n只是他終究太虛弱了，他根本傷不了她。\n後來她蹲在他身前，平靜地同他說他不配被人喜歡的時候，他恍惚間也是覺著難過的。\n他想說，他母妃去得太早了，他的整個童年到少年時期都是在疼痛中度過的，身邊的人敬他、懼他，同他說得最多的便是復仇，沒人怎麼教他什麼是喜歡，也沒人教他要體諒下人。\n一個要同他爭位乃至威脅到他性命的孩子，他自然也是留不得的。\n他像陰溝裡的老鼠一般提心弔膽才度過了這麼多年，他成不了她口中那類光明磊落的人。\n這世間，除了母妃，的確也沒誰真心實意地對他好過。\n她看到他眼中的淚，似乎怔了一下，然後就頭也不回地走了。\n齊旻獨自一人躺在空曠的大殿裡，感受著五臟六腑慢慢被毒素侵蝕，嘴角溢出了大股大股的鮮血。\n許是幼年便經受過火燒之痛，這些年裡又一直被幻痛折磨，毒藥遊走在四肢百骸，一點點吞噬他生命時，他反倒沒覺著多難受。\n意識在昏沉，身體像是在無邊的黑暗裡墜落，拖著他墜入一個再也不可能醒來的夢裡。\n一如當初他險些溺死在寒潭中那般。\n只這次再也沒有一隻溫暖的手將他拉起來了。\n眼角澀疼，心口的地方空得厲害。\n恍惚間，他聽到殿外傳來了她的聲音。\n「長玉，我有個秘密。」\n「我從一個很遠很遠的地方來到了這裡，再也回不去了。」\n她聲音很沉，不知是在說給外邊的人聽，還是在藉機說給他聽：「從現在開始走，走上千百年，才能回到那裡去。」\n空得發慌的心口，似乎沒那麼難受了。\n齊旻染著鮮血的嘴角艱難地牽了牽，那已開始渙散的眸子緩緩合上。\n他要的答案，得到了。\n174番外：李懷安篇次年春，整座山上的桃……\n永和十八年年初,李、魏兩黨謀逆不成，皆已伏法。\n族中被判了斬立決的，暫押於天牢秋後問斬,流放的，則於三月初便由官差押送往流放之地。\n李家犯的乃謀逆大罪，九族算下來，牽連甚廣,其中不乏各種盤根錯雜的姻親關係，當真是把半個朝堂和許多致仕的大儒都含括了進去。\n新帝繼位，為表仁德,大赦天下,最終謀逆的李、魏兩家,都只誅了三族,即血親和姻親一脈，姥族一脈,爺族一脈。\n三族開外，九族以內的,全都流放三千裡。\n李懷安作為李太傅之孫,在五族之內。\n他於薊州落於謝徵之手後，便一直被關押了起來，期間也受過刑,瞧著不過一文弱仕子，嘴倒是極硬,公孫鄞親自去套過他的話，都沒問出什麼來。\n彼時，他渾身是傷躺在牢房的草垛裡，因為冬日嚴寒,吐息間都是一團白霧。\n對著前來勸說他的公孫鄞，只是苦笑：「先生盛名在外，懷安早有耳聞，只未曾想，初見先生竟是如此境地。」\n「李家所犯，是十惡不赦之大罪，天底下誰都能唾罵李家，誰都可以推李家這堵搖搖欲墜的危牆一把，但懷安不可以。懷安受族中恩澤庇佑二十餘載，李家大廈將傾，懷安可碎骨於覆巢之下，卻不能做那覆巢之力。懷安自知是罪人，死後也願下阿鼻地獄，望先生……成全。」\n公孫鄞看著青袍上布著凌亂血痕的人，緩緩道：「李家已棄了你，這般，值得嗎？」\n李懷安淺笑著答：「二十載養育之恩，夠了。」\n他一心求死，身子骨又不如習武之人結實，終是沒法再用刑逼問。\n李家定罪後，他才一併被轉到了大理寺牢房裡。\n這年春，天子繼位後不久，李懷安便和李家三族開外的族人一起踏上了流放之路。\n一群生來便錦衣玉食的人，在被抄家收押天牢時，便以為天都塌了，等真正踏上流放之路，才知曉這世間的苦難多了去了，他們曾經所經受的，壓根不算什麼。\n官差嚴苛，每日走多少裡路都有嚴格的規劃，走慢了會挨鞭子，那不知什麼皮革做成的鞭子，因為常年使用，甚至油光發亮，挨上一鞭，半個肩背都能浮起一條腫痕，幾日才消。\n在大牢裡時，給獄卒使些銀錢，還能吃一頓像樣的飯，流放路上條件有限，他們私藏的體己錢基本上也在牢裡時就被獄卒們榨乾了，拿不出多少來孝敬官差，每日吃的食物，也都是硬得幾乎咬不動的黑面窩頭，大多數時候還吃不飽。\n不過幾日下來，被流放的李氏族人們個個都瘦了一圈，神色憔悴，形容枯槁，再無了從前金尊玉貴的模樣。\n稚兒年幼，走不了太多路，一路上都是大人們輪換著背。\n腳上的鞋子磨破了沒有新的，連日的趕路下來，李懷安腳上都磨出了幾個血泡，更何況同被流放的女眷。\n他親眼看著幾個年幼的侄兒相繼病倒，卻無能為力。\n他身上已拿不出一個銅板，想說動族中還藏有體己錢的族人給孩子們湊一副藥錢，收到的卻也只是一片買慘聲和咒罵聲。\n李太傅的兒女們都被判了秋後斬首，李懷安這個李家長孫，成了李家唯一的嫡系，所有被牽連的旁支和五族開外的親戚，曾經依附李家這課大樹，如今樹已被連根拔起，面對抄家流放的結局，無一不是咒罵怨恨李家。\n李懷安跪在地上磕頭，祈求族親們湊體己錢救幾個高熱不退的侄兒時，被啐過，也被對李家主家一脈心懷怨恨的族親拳打腳踢過。\n若不是官差及時制止，怕是李懷安也得傷得幾天走不了路。\n那個春寒料峭的夜裡，他把身上唯一禦寒的破襖給高熱燒到迷糊的侄兒裹上禦寒，自己抱著侄兒靠著驛站破舊的門板，望著門縫外漆黑一片的夜空出神。\n小侄兒縮在他懷中，明明已雙頰燒到通紅，卻還是一個勁兒地說冷。\n李懷安徒勞地將侄兒身上的破襖裹緊了些，自己嘴臉都已凍得青白，單衣下甚至能看到凸起的肩胛骨，嶙峋得像是一株快枯死的竹，他輕拍著侄兒的後背，低聲安撫。\n小孩虛弱地掀開眼皮，問他：「小叔在看什麼？」\n李懷安聲線沙啞：「在看李家的罪孽。」\n小孩聲音弱的跟快夭折的幼貓一樣，眼皮也在慢慢合上：「那是什麼？」\n李懷安心口艱澀，喉間發苦，望著夜幕愴然道：「李家曾做錯了很多事，害死了很多無辜的人，小叔在想，那些因李家遭難的尋常百姓，在歷經生離死別時，是不是也是這般悽惶無助……」\n他有些說不下去了，低頭時，發現懷中的侄兒已咽了氣，終是再也抑制不住心中的悲意，埋首在侄兒身前，「嗬」地哭出聲來。\n「該死的人是我……該遭報應的是我啊……」\n那一夜驛站柴房裡，一直傳出斷斷續續壓抑到了極點的哭聲。\n小侄兒死後，李懷安也大病了一場。\n當真是形銷骨瘦，雙目無神，再也看不到半點曾經那個清貴端雅的李家公子的影子。\n押送這批流放犯人的官差都以為他要挺不過來了，可李懷安偏偏又活了下來，還一路走到了肅州。\n他變得寡言少語，通常一天也不見他同誰說一句話。\n但他又默默做了很多事，流放的犯人自己吃食尚且不夠，大家為了避免挨餓，一個窩頭都得扮成兩半，留一半揣懷裡餓到不行的時候再吃。\n他流放路上遇上乞兒，常把自己都捨不得吃的半個窩頭都施捨給乞兒。\n偶爾遇上膽大敢同他說兩句話的，他還會教對方幾個字，甚至也幫幾個乞兒取過名字。\n隨行的官差和流放的犯人都只把他當個笑話看，覺著他這是泥菩薩過河，自身都難保，還有閒心去同情那些乞兒。\n李懷安從不解釋什麼，只依舊固執地做著這些。\n有族親看到他總是剩半個窩頭，留著施捨給去下一個地方遇到的乞兒，乾脆直接搶了他的。\n他挨了一頓打，去河邊洗臉上的血跡時，看守他的官差瞧不慣他這副平靜泰然的樣子，出言挖苦：「李大公子，您自個兒都落魄到這份上了，還假仁假善給誰看呢？合著當年關中大旱，江南水患的貪墨案，同反賊勾結的盧城血案，都不是你們李家一手促成的？」\n水聲潺潺，李懷安看著自己在流水中模糊不清的倒影，垂下的髒發遮住了臉上微苦的神情：「官爺說得不錯，李家的罪，關係著成千上萬百姓的性命，贖不完的。但罪民心中愧疚，比起死了一了百了，還是想替被李家辜負過的百姓，做些事，償還罪孽。」\n官差聽得他這番言辭，先是一愣，隨即便譏諷笑了聲。\n但李懷安對這些譏嘲聲一直都無動於衷，只默默做自己的事，一開始官差和隨行的犯人還拿他當個樂子，後來不知是不是覺著他的反應無趣，便也懶得再拿這些話去刺他了。\n流放之徒艱苦，李懷安腳上的布鞋在離京不到兩月，破得徹底不能穿後，他跟著驛站裡打雜的老翁學會了編草鞋，那雙曾經踩慣了錦靴的腳，在磨出血泡和一層又一層厚繭後，如今穿草鞋也不覺紮腳了。\n那曾經執筆作畫的手，也早粗糙皸裂得不成樣。\n這一路，他替隨行的不少族人也編過草鞋。\n可在這年十二月，李氏族人終於抵達肅州時，來時的百餘口人，活下來的依舊寥寥無幾。\n這便是「死罪可免，活罪難逃」的流放。\n肅州地處西北西境，荒涼苦寒，放眼望去四處都是荒漠，只在有水源的地方築黃土為城，聚居起了人口。\n城內大多都是戍邊的兵卒和流放過來的犯人，聚留在這苦寒之地的本地人極少。\n新帝繼位，鎮守關外的武安侯回京輔佐幼帝當了攝政王，關外蠻族又蠢蠢欲動。\n肅州邊城在幾番被蠻族騷擾後，守將下令先加固城防，李懷安這一批剛至肅州的流放犯人，便被趕去修城牆。\n李懷安一文弱書生，手不能提肩部能抗，去的頭一天便狠吃了一頓鞭子，滿背鞭痕，第二日依舊要被趕起來去修城防。\n單薄的背脊扛不起那些沉甸甸的厚重磚石，不慎摔到在地，磕壞了一塊磚石，監工的官兵便恨不得要吃人，鞭子劈頭蓋臉地落下來，被打到的地方似被毒蠍蟄過，火辣辣的疼。\n好多次李懷安都懷疑自己會被打死在這裡，但他心裡升不起一絲一毫的怨恨。\n侄兒病死的那個寒夜，他突然就明白了那些因李家的計謀家破人亡的普通百姓，當年有多無助。\n這世間的許多苦，終是切身嘗過了，才明白是何滋味的。\n修城牆的苦和累，比起城破時死於亂刀和馬蹄下，又算不了什麼了。\n可就是戰爭這樣的人間煉獄，李家甚至親手操縱過一場。\n昔年李懷安作為監軍去前線督過戰，他見過那等殘像，心中也憐憫動搖過，可想起祖父說的，扳倒魏嚴，是為了讓天下更多百姓過上好日子，他又冷眼旁觀了。\n如今砌這一磚一石的成了自己，他終體會到了那些被李家冷漠犧牲的百姓和將士，經歷過怎樣的磨難和掙扎。\n也懂了當初樊長玉和謝徵在得知一切都是李家操盤時的憤怒。\n他們一個來自民間最底層，一個少年時便去了軍中，沒人比他們更清楚，底層的百姓和兵卒，過的是什麼樣的日子。\n李家的計謀，又輕而易舉就摧毀多少個苦苦支撐的家庭。\n越是明白這些，身上那座罪孽的大山便壓得李懷安愈沉。\n終是他醒悟得太晚。\n死在這裡，緩解不了他心中萬分之一的罪孽，卻是他最好的歸宿。\n但他終究是沒死成。\n守城的小將聽說他是李太傅之孫，雖對他橫挑鼻子豎挑眼，但鑑於整個邊城識字的，一隻手都能數過來，他在修築城防之餘，也被叫去整理流放犯人和底下兵卒的名冊。\n那看起來五大三粗，脾氣極不好的小頭目說：「你給老子好好整理這些名冊，到了老子手底下的人，甭管是兵卒還是罪人，只要是蠻子來了死在城樓上的，就有資格被記住名字！」\n流放的這一路經歷過那些疾苦後，李懷安本以為自己心底再也不會有半分觸動了，卻因為小頭目這話，一股澀然和敬意從胸口直躥到了喉腔。\n他對著小頭目鄭重一揖，垂首時眼眶溼潤了，「罪民，定不辱命。」\n是愧疚。\n盧城一戰，李家的計謀，害死了不知多少這樣的將軍和兵卒。\n-\n永興二年年初，肅州邊城遭遇了一場敵襲，那是李懷安頭一回直面蠻人冰冷的刀口和猙獰咆哮的臉孔，當真手腳麻痺發軟，整個人直接木在了城樓上，不知逃，也不知提刀，任守城的小頭目吼破了喉嚨，他們那些流放過去的人也動彈不了分毫。\n血跟下雨一樣四處迸濺，上一秒還活生生的人，下一秒變成了刀口下一具死屍。\n還沒完工的城防擋不住蠻賊猛烈的攻勢，那炮仗脾氣的小頭目最後見黃土壘成的邊陲小城守不住了，咆哮著讓底下兵卒做擋，讓其餘人帶著百姓往後方的肅州城撤。\n最後那一場突襲，因肅州援軍來得及時，蠻子打下那邊陲小城後也沒過多停留，搜颳了些錢財糧食後便撤了。\n但是那守城的小頭目死在了城樓上，當初修城防時對著李懷安揮鞭子的官兵也戰死在城門下，還有許許多多，李懷安認得的、不認得的兵卒，他們用性命拖到了肅州援軍來。\n自流放途中侄兒病死那個夜晚後，李懷安又一次泣不成聲。\n這次不是為血親，是為滿地忠骨。\n他不僅愧疚，他還從未像此刻一般後悔過從前的行徑。\n無數將士用命才守住的這份安穩，怎可因朝廷內鬥便再挑起紛爭？\n他在這場仗裡，被蠻子砍瘸了一條腿，但替一民婦救下了一名嬰童。\n民婦死在了蠻子刀下，死前只同他說，孩子爹在軍中，姓程。\n後來援軍至，李懷安護著孩子撿回一條命，在軍中尋孩子父親時，才知孩子的父親也死在了城樓上。\n孩子成了個孤兒。\n李懷安收養了孩子，替孩子取名程琅。\n琅，如玉的美石也。\n都說君子如玉，他希望孩子將來能夠長成一個真正的正人君子。\n北厥異動愈發頻繁，這年不僅肅州，錦州、燕州也頻頻受擾。\n入秋時，唐培義掛帥前來鎮壓愈發猖獗的異族，已封了大將軍的樊長玉押送糧草隨後而至。\n再次聽到樊長玉的消息，李懷安竟有種隔世之感了，聽聞她和謝徵成了親，李懷安心口微苦之後，便是釋然。\n這世間，除卻武安侯，他的確想不出第二人能配得上她的雄才。\n那二人，從出生便被宿命糾葛到了一起，當真才是天造地設的一對。\n他在肅州的邊陲小城，替新來的守城小頭目整理文書和出謀劃策如何修建城防，因為他言之有物，涉獵頗廣，儘管還是一罪人身份，那小頭目倒也破例提拔他當了個主簿，見他腿腳不好，也不讓他再幹修城防那些苦力活了。\n但李懷安謝恩後，還是每日雷打不動地去城門那邊搬遞城磚，或是給工匠打下手。\n唯有身心具疲，他方心安幾分，才覺得自己是在贖罪。\n此後經年，他都呆在那邊陲小城，送走了一任又一任被調過來的小將，小將們受他輔佐良多，走前都想帶他離開這邊陲之地，留他當個長久幕僚，但都被李懷安婉拒。\n他說，他是個罪人，來這裡，就是為了贖罪的。\n後來仗打完了，那個獨自在西北支撐數年的女將軍，打退了北厥無數次進攻，甚至後來北厥人看到她帥旗都不敢再來犯，她也終以軍功封侯。\n邊城不打仗了，城防也修築完畢，李懷安在自家簡陋的農院裡辦起了私塾，不收束脩，教當地的孩童們讀書識字。\n那位女侯和她夫侯一起從朝堂急流勇退，回了西北，共同守著大胤這道大關。\n肅州和徽州不過數百裡之遙，李懷安卻再也沒見過那二人。\n他無顏見故人。\n但聽說了很多關於那二人的事跡，女侯在永興六年誕下一對龍鳳胎，嫡長女取名謝從韞（yùn），嫡子取名孟行川。\n當年冤屈死於錦州一案的兩家忠骨血脈，將會永遠傳下去。\n李懷安還聽人說，他們收養了很多將士遺孤，知道本家姓氏的，沿用本家姓氏，不知道本家姓氏的，改姓謝、姓樊、姓孟的都有，皆同親生子女一般教養。\n……\n十六載風霜雨雪晃眼而過。\n李懷安剛到不惑之年，便已重病纏身，兩鬢斑白同六旬老者無異。\n連日大雪，他入冬後再感風寒，臥床半月也沒見好轉。\n昔年被他收養的孩子，如今已及冠。\n程琅打水進來給他擦臉時，他平靜又虛弱地吩咐自己的後事：「我去後，不必替我操辦喪事，就在後山草草埋了便好。」\n程琅眼眶一澀，強裝無事道：「先生胡說什麼，不過是場風寒，再喝幾貼藥便好了。」\n李懷安不讓程琅喚自己義父，他說自己一介罪人，此生還活到現在，就是為了贖罪的，只讓他喚自己先生。\n「我自己的身體，我自己有數……咳咳……」一句話沒說完，他便嗆咳起來，身形乾瘦佝僂，好似寒夜裡一盞隨時會被冷風吹滅的燃盡之燭。\n程琅替他拍背順氣，忍著發紅的眼眶道：「今年開春，城裡還有不少孩童都想來先生這裡開蒙呢，先生身體硬朗著，很快便會好起來的！」\n像是害怕李懷安再交代後事，他又道：「今日城主府接待了兩位貴客，其中一位雖是女流，劉大人卻皆喚她們二人小侯爺，倒也是稀奇，想來應當是徽州謝家的人了。那姑娘聽劉大人說了先生您十餘載一直在鄉鄰間免束脩教書的事跡，還說改日想來看看您……」\n程琅還在絮絮叨叨說著自己在城主府的見聞，李懷安卻已什麼都聽不清了。\n被流放到這苦寒之地二十載，他再未見過故人一面，如今時日無多，倒是故人子女來了此地。\n他瘡痍愧疚之餘，忽又有一股愴然涕下之感。\n便是在此時，院外傳來了敲門聲。\n「李夫子在家嗎？」\n程琅放下手中巾帕朝外看了一眼：「我去開門。」\n院門打開，是城主府的人和一眾少男少女立在外邊，為首的那對雙生姐弟程琅見過，正是今日在城主府有過一面之緣的那兩位貴客。\n兩人雖是孿生姐弟，樣貌和性情卻並不像。\n一人緋色騎裝，杏眼瓊鼻，燦若驕陽，一人玄衣勁裝，清雋內斂，少年老成。\n程琅雖在城主府做事，卻還從未見過這般尊貴的人物，一時間不知如何招呼。\n城主府的公子忙道：「程兄你今日早早離去後，兩位小侯爺聽說先生病重，這才特來看望先生。」\n那緋衣少女當即一抱拳：「未曾提前告知，叨擾了。」\n程琅連說沒有，引著二人進院。\n李懷安在屋內已聽到外邊的聲響了，在程琅領著二人進屋時，瞧見那那一身紅衣的明豔少女，仍是怔忡良久。\n當真和多年前那位女侯，是一個模子刻出來的。\n少女和少年朝著李懷安抱拳：「叨擾老先生了。」\n李懷安卻只是望著他們笑，笑著笑著，已有些渾濁的眼裡，便有了淚光，他說：「李家的罪，我贖不完了……」\n少女似乎知曉他是誰，道：「當年之禍，非老先生一己之力鑄成，老先生留在此地二十餘載，每逢戰時便前往城門督戰出謀獻策，多年來嘔心瀝血替城內百姓謀求商路，也教無數貧寒學子讀書認字，老先生的功績，消不了李家曾經的過錯，卻也可以無愧於心了。」\n李懷安看向少女身旁站著的玄衣少年。\n少年的眉眼也像極了威懾北厥二十餘載的那位武侯，他朝著李懷安淺淺一點頭。\n李懷安好似透過他們瞧見了故人，雙目依舊淚漣漣，只是又笑了起來，笑容裡帶著解脫的釋然。\n那天夜裡，這位贖罪了半生的老者，嘴角噙著笑離開了人世。\n後事依他遺言一切從簡，當地百姓知曉他半生的懺悔和愧疚，也未頌其功德，只有受過他教化的那些學子，在他葬身的那片後山，每人種了一株桃樹或李樹。\n次年春，整座山上的桃李花開繽紛。\n175番外：魏嚴篇塵歸土定，枯骨無話……\n初春天寒,冰雪剛消。\n暗沉如水的夜色中，魏府書房還亮著一豆燈火，管家叩了門,在書房外稟報：「相爺，表少爺又魘著了，哭鬧不止……」\n書房內是一室冷清,黃花梨書案旁置了一尊銅鶴燭臺,鶴頂的銅盤中已積了不少斑駁燭淚,半截蠟燭暈出一片昏沉的黃光，魏嚴坐於書案之後，清瘦的下頜線條在暖黃的燭光裡也只顯冷硬。\n他似在看書,聞聲從書頁中抬起頭來,微微側目望著銅鶴燭臺中快燃盡的一小截蠟燭出神,好一會兒才冷聲道：「底下伺候的人幹什麼吃的？連個孩童都哄不好？」\n管家遲疑了一下，說：「表少爺哭著要小姐,想起小姐已隨姑爺去了,又哭著要舅舅……老奴這才鬥膽前來尋相爺。」\n聽到「舅舅」兩個字，魏嚴臉上的猙獰和痛苦一閃而過,他閉目平復了許久,才起身拉開了書房大門,面上已瞧不出一絲情緒：「隨我去看看。」\n護國大將軍謝臨山和承德太子戰死錦州,謝夫人前不久因受不了夫君戰死的事實,選擇了「殉情」，將年方四歲的幼子託付給了兄長魏嚴。\n謝家的小公子被接來了魏府照料,住的便是麟軒閣。\n魏嚴剛踏入院中，便聽見了房中傳出的稚子哭聲：「舅舅……我要舅舅……」\n斷斷續續，嗓音都已有些嘶啞了,像是啼血的幼獸。\n管家聽見這哭聲，眼底都閃過許多黯然和心疼的情緒。\n魏嚴臉上卻仍是一片冷漠，側臉鍍著冷月的清輝，仿佛是覆了一層寒霜。\n他抬手推開房門，屋內一團稚氣的孩童瞧見他，這才止住了哭聲，極為依賴地朝他伸出手要抱：「舅舅……」\n幾個哄著他的婆子也紛紛朝魏嚴見禮：「相爺。」\n個個都低著頭，顯得惶然又急促，似怕魏嚴怪罪她們照顧表少爺不力。\n魏嚴冷眼看著哭得眼都腫了的外甥，開口便是嚴厲的訓斥：「堂堂男兒，哭什麼？」\n小謝徵似被他的冷硬的斥責聲驚到，伸向他的手收了回去，無措地攥緊了身下被衾，蓄滿了淚水的烏黑大眼怔怔地看著眼前面沉如霜的青年男子，唇抿得緊緊的，不敢再哭出聲，豆大的淚珠子卻還是不受控制地砸了下來，在被面上泅出幾個水印。\n怕魏嚴斥責，他忙低下了頭去，自己抬起藕節似的小胳膊狼狽抹了一把眼。\n爹爹死了，娘親不要他了，從前對他最好的舅舅，如今也不喜歡他了……\n照顧小謝徵的婆子瞧著心中不忍，小聲道：「表少爺是做了噩夢，魘著了……」\n魏嚴冷冷一道眼風掃過去，那婆子立馬禁了聲，垂首不敢再出一言。\n他寒聲吩咐：「將麟軒閣伺候的下人全換成小廝，此子養於婦人之手，難成大器。」\n屋內幾個婆子連忙跪下求饒，小謝徵意識到什麼後，也顧不得害怕，攥住了魏嚴一角袖袍，抽噎著道：「舅舅……別趕走嬤嬤她們，徵兒以後不哭了……」\n魏嚴垂眼凝視著外甥，目光冷得像冰：「做個噩夢都能哭哭啼啼半宿，你爹被北厥人開膛剖腹掛在城樓上的血仇，你拿什麼去替他報？謝家生不出孬種，我魏家也生不出！」\n那尖錐一樣的視線刺在稚童身上：「你要是一輩子就這副孬樣，靠著你爹留下的軍功，朝廷也能養豬狗一樣養你一輩子，你此生倒是可以諸事不愁了。」\n言罷直接摔門而去。\n管家聽著這番話尚且直皺眉，看看魏嚴大步離去的背影，又看看坐在床上似被魏嚴這番話罵得呆住的稚兒，低低一嘆，對著小謝徵道：「表少爺莫要往心裡去，相爺……相爺只是因為小姐剛去，心中不好受，故盼著表少爺早日成才，北徵奪回錦州，替謝將軍報仇雪恨。」\n四歲的稚童低著頭，稚嫩單薄的雙肩因為哽咽而顫動著，像是一張用幼嫩的枝條做成的弓，承受不住驟加上來的力道幾欲折斷。\n「舅舅……恨我……」\n他牙關咬得緊緊的，嗓音稚嫩又沙啞，恍若泣血：「若不是我出去吃桂花糕，離開了母親……母親不會獨自在房裡尋短見……」\n他哽咽得厲害：「是我沒看好母親……舅舅恨我……」\n管家神色更複雜了些，寬慰道：「這是小姐自己選的路，不怪表少爺，相爺……也沒怪您。」\n小謝徵只是搖頭，背過身去在床上蜷縮成一團，瘦小的背影看得人揪心。\n管家嘆了聲，替他掖好被角，步履沉重地出了房門。\n-\n抄手遊廊的盡頭，有人負手靜立在冷風中，身姿煢煢。\n管家上前道：「表少爺尚年幼，您這般嚴厲，只徒惹得表少爺傷心罷了，表少爺一直自責當日沒看好小姐，覺著……您是因此恨他……」\n魏嚴看著隨夜風婆娑浮動的竹影，冷漠道：「那便讓他這麼覺著。」\n管家神色發苦：「您這又是何苦？」\n廊下的燈籠也被冷風吹得搖晃，灑下一片昏黃影綽的光暈，緇色的衣袍攬風鼓若船帆，更襯得魏嚴身形挺拔清瘦，他緩緩道：「這朝堂，是池渾水，坑窪詭譎，暗潮洶湧，他將來若只當個富貴閒人，我大可縱著他。他要去戰場，還要踏入朝堂，我不磨礪他，便是送他去給別人祭刀。」\n「魏全，他若不心狠，將來坐不上我這個位置。」\n「便是我讓與他了，旁人也會讓著他嗎？」\n管家知曉主子的用心良苦，沉默了下來，許久才惆悵說了句：「您就讓表少爺這麼怨著您？」\n魏嚴卻淺淺笑了聲：「他恨我、怨我才好。」\n管家怔住看著魏嚴。\n卻只聽得他極輕地說了句：「終有一日，他會查到那些事的。」\n那一樁樁，由先帝扣到他身上的，他窮極一生也無法再抹去的大罪。\n管家想到魏綰的死，眼底又多了幾許黯然。\n大小姐至死都是怨著相爺的，認定相爺是害死謝將軍和太子的罪魁禍首……\n-\n四更天時，起了疾風，吹得沒關嚴實的窗葉一下一下拍打著窗欞，床榻上的幼童似又陷入了夢魘中，無意識抓扯著被衾，口中含糊不清喚著「爹，娘親」。\n在角落的太師椅上坐了不知多久的男人起身，走到窗前關上了窗，又借著拔步床外一盞油燈照出的微弱亮光，沉默地看著床榻上冷汗已爬滿額頭的幼童。\n他取了巾帕似想上前替他擦去額上的冷汗，但稚童發出一聲短促的尖叫後，忽地驚坐起來，大口大口地喘氣。\n魏嚴將持帕的那隻手負到了身後，立在床邊，依舊用一副冰冷的神情看著渾身被冷汗溼透、恍若溺水的外甥。\n小小的人兒看著他，張嘴似想喚他，瞧見他的臉色，又禁了聲。\n看向他的眼神裡，帶著茫然的戒備和敬畏，再無了從前的依賴。\n像是一頭被驅逐的幼獸。\n魏嚴聲線冷硬：「替你尋了武師傅，明日便去精武院習武。」\n-\n步出房門時，守在屋外的親衛將披風遞與他披上，低聲詢問：「相爺守了表少爺半宿沒合眼，可要回房歇會兒？」\n魏嚴看了一眼天色，道：「備朝服，該去宮裡了。」\n行至垂花門處，死士頭目魏勝匆匆來報：「相爺，半夜又抓到了幾個意圖夜闖相府的宵小，皆為謝氏舊部，也關進地牢裡嗎？」\n魏嚴眼底閃過一抹厲色，「謝家舊部，不都被阿綰譴回徽州了？」\n魏勝抱拳道：「是謝家旁支的人，不知從哪兒得來的風聲，被抓後唾口大罵相爺，還說……休想要表少爺認賊作父……」\n魏嚴攏肩頭披風的動作微頓，臉色愈發冷戾：「審訊是何人給他們透露的風聲，問出來了，便也不必留活口了。」\n魏勝微微一愣，不懂之前抓到這些人，總是下令關起來的主子，為何突然要滅口永絕後患。\n思及那些人是為接近表少爺，而大小姐也是在從他們口中得知真相後，又逢賈家細作將表少爺推下荷塘，做出是相爺要殺表少爺的假象，才迫得大小姐為保表少爺和謝家一幹不知情的舊部，留下遺書自縊而去，魏勝有一瞬倒也明白主子的恨了。\n主子恨在背後攛掇謝家舊部的隨、賈兩家，也恨那些拿著「真相」去逼大小姐的謝氏舊部。\n大小姐已去，主子是容不得他們再接近表少爺的。\n謝家那批直系舊部，已被大小姐在自縊前就打發回了徽州老宅，大小姐此舉，是為了保護謝氏僅存的一點勢力，也是在給表少爺將來鋪路。\n如今找上門來這些謝氏旁支，無疑是撞主子戾氣口上了。\n魏勝領命退下後，魏嚴大步往府門走去，管家前來送他出府，魏嚴在坐上官轎時，忽而又吩咐了句：「讓木犀苑那孩子搬去麟軒閣。」\n管家點頭應是，明白了魏嚴的用意，含笑道：「宣少爺平日裡鬧騰，表少爺剛失了雙親，有個玩伴陪著，想來也能開朗些，不至於夜夜夢魘了。」\n魏嚴沒說話，放下轎簾，死士出身的轎夫起轎，抬著官轎四平八穩地走向了還灰濛濛的長街。\n官轎兩側也跟隨者十餘名腰佩長劍的府衛，個個氣息綿長，下盤穩健，都是從死士中層層篩選出來的好手。\n幼帝繼位，魏嚴挾天子以令諸侯，錦州以南戰事吃緊，隨家雖率兵抵擋著北厥人南下，卻也藉此機會獅子大開口，找朝廷要錢要糧，京城內還有賈家這條死而不僵的百足之蟲，隨時都準備回蟄魏嚴一口，從他手中奪權。\n自魏嚴做上丞相之位，代為監國起，所經歷的刺殺便已有十餘次。\n所有人都在尋他的錯處，找他的死穴，一旦他行將踏錯一步，整個魏氏和謝氏都將萬劫不復。\n官轎行至銅雀街，冷箭和疾風一道襲向轎中。\n數十名黑影從兩側高樓躍下，手中刀刃在轎簷的風燈下映出一片寒光。\n護在官轎周圍的府衛拔劍舞出一張密不透風的劍網，擋下了所有淬了劇毒的箭矢，再迎面和兩側高樓躍下的黑衣人廝殺上去。\n迸出的鮮血染紅了銅雀大街上覆著一層薄霜的青石板地磚。\n一名黑衣人趁官轎周圍的死士都被拖住，提刀刺向官轎，強勁的刀風刺破了錦帛面料的轎簾，刀刃卻再也沒法往前推進一寸。\n那黑衣人額角的青筋都因角力而凸起幾條，轎中單手捏住刀鋒的人只是一轉腕，便帶得那名黑衣人也跟在在空中一個翻轉，刀身不堪重負「鏗」一聲斷裂開來，那黑衣人剛落地，便被轎中擲出的半截刀刃結果了性命。\n轎外的死士也了結了最後一名黑衣人，濺出的鮮血噴在了半邊轎簾上。\n魏嚴掀簾走出，錦靴踏入一片黏稠暗紅的鮮血中，初陽從東邊升起，噴薄而出的紅，也似這滿地血色一般，掙扎著從灰濛濛的雲靄中躍出，給遠處宮城的瓊樓殿宇鍍上一層金輝。\n魏嚴逆著那萬丈霞光，俊美的臉上只餘冷漠陰鷙。\n他抬腳，踏著晨曦裡的血色，一步步邁向那巍峨的皇宮。\n這一走，便是十八載。\n昔年大仇，他逐一報了。\n鎮河山，誅宵小，也鍛出了這世間最利的一把刀，他都無法折斷，這世間便也沒有再能撼動那柄刀的人了。\n此去得見故人，倒也無愧。\n歸處是瑤臺，還是煉獄，皆心安泰然。\n這一生功過榮辱，後人評之，判之，罵之，嘆之，塵歸土定，枯骨無話，又與他何幹？\n176番外：if線青梅竹馬（1）\n暴雪如絮,嗚嗚的風聲好似鬼哭狼嚎。\n魏嚴合眼躺在枯草堆中，心下好笑，當真是人老念舊了，這天牢外的風聲,竟讓他生出幾分是在塞北的錯覺。\n他被老頭子綁去戚家軍營,和謝臨山一起在北地戍邊,都是多少年前的事了。\n只不過,那時候的確好啊。\n戚老將軍健在，容音不曾入宮,臨山和太子也沒身死錦州……\n他半生的快意，都是那些時日了。\n眼皮發沉,魏嚴就這麼放任自己在那陣陣風饕雪虐聲中睡了過去。\n恍惚間有人靠近，將什麼東西搭在了他身上,抵禦那似要將人皮肉都刮下一層來的寒風。\n魏嚴暗忖莫不是天牢的獄卒？\n但他一介罪人，獄卒是不會輕易給他添衣加被的，莫非是獄卒得了陶太傅或是謝徵示意？\n正囫圇思索間，那給他身上搭了衣物的人卻並未離開,而是遲疑著伸出手,似想觸碰他，魏嚴隱約嗅到了一股似幽蘭又似山茶花的香氣。\n多年如履薄冰養成的警惕，讓他幾乎是本能地抬手截住了那隻手，凜冽鳳目霍地掀開。\n看到的卻是一個只在午夜夢回才能見到的人。\n女子一身梨花白繡著千葉蓮的襖衣，肩若削成,腰如約素,眉目盈盈好似一副山水畫卷，那隻手還被他扼在掌中，她白皙的臉上半是惶然半是被他撞破的羞赧,咬了下唇道：「我見三哥睡在此處，給三哥拿了件氅衣過來……」\n魏嚴有個早夭的兄長，上邊還有個庶兄，他在家中排行第三。\n魏、戚兩家交好，戚容音自小便喚他三哥。\n他定定看了眼前女子許久，才出聲：「你許多年不曾入我夢了，今夜是知我大限將至，專程來看我的？」\n戚容音皺了皺眉，顧不得抱赧，被魏嚴扼住腕的那隻手微微用力，溫潤細膩的掌心貼上了他前額，喃喃道：「三哥怎說起了胡話？莫不是感染風寒起了瘟症？」\n掌心接觸到的肌理，的確是一片滾燙，戚容音當即變了臉色，喚守在城牆拐角處的武婢：「攬月，快去叫軍醫，三哥感染了風寒！」\n魏嚴抬眼望見滿天星幕，以及城樓上那杆被火盆裡的火光照得分明的「戚」字旗，這才發現自己是靠城牆垛而眠的，周圍還有不少抱著刀戟坐眠的將士，臉上身上的血澤未乾，顯然是剛經歷一場惡戰。\n他只覺這夢太真切了些，當真是和那些年在北地所經歷的一樣。\n戚容音剛要起身，便又被魏嚴拽住了手。\n戚容音不解地看著從醒來便不太對勁兒的人，疑惑出聲：「三哥？」\n魏嚴緩緩道：「別走，讓我再看看你，十八載，你每每入夢來，都不曾好好同我說過話……」\n「三哥在說什麼？什麼十八年？」戚容音越聽，眼底惑色越多，卻還是安撫道：「我不走，我去打水來，給三哥擦擦臉。」\n風寒的緣故，魏嚴現在腦仁兒的確一抽一抽地疼著，他抬起另一隻手按住了額角。\n戚容音見狀，抽離了被他攥住的那隻手，步下城樓去打水。\n魏嚴視線下意識緊盯著她，生怕她就這麼不見了，身旁一名臉上布著血跡和汗塵假寐的將軍睜眼笑了起來：「魏中郎怕是好事將近了吧？」\n魏嚴記得自己在戚家軍營時，曾任中郎將，軍中同袍也多以「魏中郎」稱呼自己。\n眼前這人面生得緊，他眯眼仔細看了一會兒，才辨出對方乃後來的陝西都護使，自己同他在戚家軍營時，的確有過一段同袍之誼。\n只是後來便寡交了。\n真是怪哉，他夢見戚容音也就罷了，怎還會夢見此人？\n隱約之中，魏嚴察覺到今夜這夢，是和以往的不太一樣。\n他撐著牆根想起身，手上傳來一陣銳痛，低頭一瞧，才發現掌心纏著一圈染血的紗布。\n他先前睜眼便瞧見戚容音，被佔據了所有心神，連手上的痛感都未察覺，此刻又用力握了一下掌心，針扎一樣綿密的細痛再次傳來，魏嚴終於意識到了不對勁兒。\n在夢裡的痛覺，也是這般真切的嗎？\n戚容音端著水盆，引著軍醫往城樓上來，溫聲道：「魏三哥發起了高熱，眼下父兄追敵未歸，三哥萬不能再病倒了，勞軍醫替他看看。」\n魏嚴聽到此處不由皺眉，戚老將軍和少將軍都追敵未歸？\n在他記憶中，只有戚老將軍誤得軍情那一次，才是父子幾人一同去追敵的，也正是那一次追敵，戚家父子都身死疆場。\n軍醫給魏嚴把脈時，他尚還陷在一片混沌的思緒中不曾回過神來。\n等軍醫把完脈，從隨身攜帶的針包中取了一枚銀針：「城內治傷寒的藥物早已告罄，中郎高熱不退，老朽也只能用商陽穴放血的法子替中郎緩解一二了。」\n銀針刺入指尖，那痛愈發清晰。\n真實的不像是做夢！\n一個猜測在魏嚴心中形成，恍若一柄利劍將靈臺間混沌的層層霧靄劈開，一股狂喜湧上魏嚴心頭。\n在軍醫取出銀針時，他顧不得指尖的刺痛，用力攥緊了戚容音了手，素來冷沉的眼底隱約有淚光浮現：「容音，容音……真的是你……」\n他手上的力道太大，握得戚容音手骨都有些發疼。\n她遠山一樣的秀眉輕蹙：「自然是我，三哥這是怎麼了？不過在城樓上小憩了一會兒，醒來便總說胡話……」\n戚家是戍邊重臣，此番北厥來犯，戚容音特帶領府醫前來城門這邊救治傷兵。\n魏嚴滄聲笑開，狼狽又歡喜。\n戚容音和城樓上的將士們皆是面面相覷。\n魏嚴卻很快撐著城牆垛爬起來，對戚容音道：「我現在沒法同你解釋太多，速點三千精兵與我出城！」\n若他當真是重生了，這便是戚老將軍父子見北厥王子敗走前去追敵，欲生擒北厥王子，卻中了埋伏死於大漠的那一仗！\n戚容音跟著父兄在這關外，對軍中事務也很是敏銳，當即就意識到了不對：「我父兄有危險？」\n魏嚴忍著因記憶紛雜而脹痛的腦仁兒，不答反問：「他們出城多久了？」\n戚容音答：「已有一個時辰了。」\n魏嚴臉色便也沉了下來，此去不知還能不能挽回戚家父子戰死的定局，但上蒼讓他重來一回，總歸要拼勁全力去搏上一搏，他沉聲吩咐：「點兵，備馬！」\n戚容音一顆心怦怦狂跳起來，冥冥之中，她是感覺有什麼地方不對。\n戰場上，有時候多一刻鐘半刻鐘的先機，便能決定一場仗的勝負。\n事關父兄的安危，她也顧不得追問太多，忙讓城內留守的副將去點城內還能作戰的兵卒。\n奈何城內將士才經歷過一場惡戰，所剩精銳都隨戚家父子追敵去了，把勉強還能上戰場的傷兵也算上，方才湊足三千人馬，其中大部分將士都還疲敝不堪。\n此番長途奔襲而去，就算趕上了救援戚家父子，對上兇惡如豺狼的北厥蠻人，是不是羊入虎口還難說。\n但魏嚴記得上一世謝臨山在此時已得了燕州被困的消息，正帶著徽州謝家鐵騎在趕來的路上。\n前世自己便是因這場風寒病倒，等謝臨山帶著援軍至，得知燕州此戰已勝，老將軍父子追敗寇、生擒北厥王子去了，久等不見戚老將軍歸來，前去查探，尋著大軍繞路的痕跡，兜了個大圈，才在馬王坡瞧見染血的「戚」字旗和遍地死卒。\n北厥人伏擊的地點就在馬王坡，他此去全速行軍，能省下不少尋著馬蹄印找軍隊兜圈的時間，只要再多拖上個一時半刻，再差斥侯前去尋謝臨山的軍隊，謝家鐵騎一到，北厥人這場陰謀便沒勝算了。\n魏嚴駕馬出城時，便喚來自己的心腹，讓他快馬加鞭往徽州來燕州的必經之道趕去，遇上謝臨山便讓他往馬王坡去。\n心腹聽得命令，沒頭沒腦地問了句：「主子，您怎知謝將軍會率援軍來？」\n魏嚴一道冷厲的眼風掃過去，心腹只覺脊背一寒，再不敢多問，連忙抱拳：「屬下這就去傳信！」\n言罷一拍馬臀往徽州要道奔去。\n魏嚴扯著馬韁，卻有了片刻失神，是了，在錦州血案之前，他身邊的人還敢這般冒失同他說話的。\n後來，跟著他的這些人，都死光了，再選到他身邊的人，從不敢同他妄言一句。\n想多了便心中發苦，魏嚴收斂了心神，正要下令讓大軍出發，卻又聽得城門口處傳來的一聲急切呼喚：「三哥！」\n魏嚴馭住戰馬回頭，便見戚容音披著雪狐大氅，踏著一地雪泥朝他急奔而來。\n因為跑得急，她雙頰都被風吹得有些發紅。\n魏嚴一掣韁繩，調轉馬頭便朝戚容音衝了過去，戰馬在距戚容音五步開外被他勒住了韁繩，馬兒的前蹄高高揚起，抖落不少雪沫。\n戚容音將一枚墜著絡子的平安符遞與他：「三哥，你帶上這平安符，一定要平安歸來！」\n她不知魏嚴為何突然急急地要調兵出城，但她能感覺到他此去定然危險。\n魏嚴俯身去抓那平安符時，連帶著將戚容音那隻被凍得通紅的手也緊緊握住了，他臉上還帶著上一場仗留下來的血跡，用一種戚容音看不懂的、深沉又裹挾著痛苦和悲意的目光望著她：「容音，等這場仗打完，我們成親好不好？」\n不過二八年華的少女呆在了原地，好一會兒才挽起唇角，說：「好啊。」\n她臉上被風吹出來的凍紅掩住了羞意。\n魏嚴又用力握了握她的手，才抓起那枚平安符，調轉馬頭大喝一聲：「往馬王坡全速行軍！」\n武婢撐開油紙傘，替戚容音擋著鵝毛一般飄下的漫天飛雪，勸道：「小姐，先回城吧。」\n戚容音纖白的手按在了自己心口的位置，看著魏嚴率著城內三千殘軍遠去的影子，眉間籠上一抹憂色：「攬月，不知為何，從三哥說要點兵出城起，我這心口便一直發慌。三哥醒來便怪怪的，他肯定瞞了我什麼……」\n-\n大軍行至馬王坡附近，便已見遍地死屍。\n隨行的將士瞧見這副又經歷過一場惡戰後的慘象，都呆住了。\n他們追敵的大軍遭受了伏擊？\n魏嚴瞧見此景，也是渾身的血都冷了下來，只不過居高位十餘載練出的城府，讓他在此刻面上也難辨情緒，只沉聲吩咐：「找帥旗在何處！」\n底下的人忙在遍地死屍的戰場去尋帥旗。\n片刻後回來復命：「中郎，戚家帥旗不在此處！也沒找到戚大將軍等人！」\n魏嚴只覺壓在心口的那塊巨石驟輕了不少——帥旗不在此處，戚家父子也不在此處，就說明他們極有可能還活著。\n只是突圍了出去後，又被北厥人咬上了。\n他沉喝：「所有斥侯出動，尋著戰場周圍找撤走的馬蹄印。」\n軍中的斥侯駕馬四下奔走查探。\n很快便有一名斥侯急奔回來：「中郎，在山那邊有凌亂的馬蹄印！」\n魏嚴狠狠一夾馬腹，冷峻的臉都有些猙獰了：「追！」\n跑過一片緩坡，便隱約聽見了山那邊傳來的震天廝殺聲。\n大軍加速翻過山嶺，魏嚴立於陡坡上，瞧見了下方在北厥人不斷縮小的的包圍圈下苦苦支撐的戚家軍。\n出城時的上萬大軍，眼下瞧著，竟已只剩幾百人。\n「戚」家軍旗被護在最中央屹立不倒，但北厥人圍著他們以太極陣跑馬，沿著包圍圈奔走間，人借馬勢砍殺了一層又一層護在最外圍的將士。\n戚家軍被逼到這地步，精疲力盡，又知求生無路，哪還有還擊之力，幾乎是任人宰割。\n隨行的副將看得心急如焚，同魏嚴道：「中郎，咱們快去救大將軍他們啊！」\n魏嚴咬緊下頜，死死盯著下方不斷縮圈的北厥軍隊，喝道：「調整軍陣，務必用這三千人給我佔滿前邊的整個山頭，後方灌木林裡也全插上軍旗，再把所有戰鼓擺出來。」\n他帶來的是三千殘軍，就這麼衝下去，不過是送死。\n唯有製造聲勢，先恐嚇北厥兵卒，才能多幾分勝算。\n副將聞言，趕緊下去部署。\n眼見戰鼓架起來了，魏嚴又下令：「吹角。」\n腰間掛著銅製獸角的小卒拿起角，深吸一口氣後，「嗚——嗚——」\n綿長又渾厚的角聲頓時傳遍了下方戰場。\n也幸得這處山坳是個喇叭形地勢，角聲被北風卷著帶下去時，仿佛四面八方都有了回音。\n還在試圖縮圈的北厥軍隊也緩了下來，回頭往坡上看來。\n「擂鼓！」\n魏嚴又是一聲沉喝。\n手拿鼓槌守在足足有一人高的大鼓跟前的小卒，當即也揮槌捶向了鼓面。\n「咚——」\n「咚咚——」\n鼓聲厚重，恍若驚雷墜地。\n下方的北厥軍陣明顯有了騷動，畢竟乍一眼瞧去，整面坡上都是大胤援軍，後方灌木林裡也軍旗林立，前來的不知是多少人馬，北厥人不免被震住。\n所有聲勢都已做足，剩下的便唯有死戰了。\n魏嚴狠狠一夾馬腹，一馬當先往山下衝了去，手提一柄精鐵所制的偃月長刀斬盡塞北寒風，嘶聲長嘯：「殺——」\n他身後三千兵卒緊跟其後，從馬王坡上縱馬俯衝而下。\n三千人的衝鋒做不出千軍萬馬疾馳的地動山搖，好在有雷鳴般的戰鼓聲做掩護，倒也嚇破了不少北厥兵卒的膽。\n有這份先機在，魏嚴很快將北厥人的包圍圈撕開了一個口子。\n奈何三千疲敝兵馬所能造成的傷害實在是有限。\n雖虛張聲勢打了個北厥措手不及，等北厥將領那邊發現他們人的馬並不像他們營造出來的那般多後，很快調整軍陣，讓先前被打得潰敗的兵卒退居其後，左右翼軍隊從兩側包攏，意圖將這支突然冒出來的援軍也困死在他們的包圍圈裡。\n副將意識到了北厥人的目的，在艱難廝殺之際同魏嚴道：「中郎，這幫蠻子想把我們也封死在裡邊！」\n遠處被北厥軍圍得死死的戚家軍中也有人嘶聲喊話：「魏中郎，大將軍有令，命您帶著援軍撤！」\n魏嚴橫刀劈開一名擋路的北厥小將，眼底隱隱有了猩意，繼續往前衝殺。\n副將咬牙衝魏嚴道：「魏中郎，撤吧，莫要意氣用事！留著這些大好兒郎的性命，來日何懼不能讓北厥血償此債？等蠻子把缺口徹底堵住了，我等便是白送性命了！」\n魏嚴已殺紅了眼，扭頭嘲副將嘶吼道：「有援軍！再撐一刻鐘！」\n副將知道戚、魏兩家是世交，關係匪淺，只當他是想救戚老將軍才扯了個謊話，正急得想罵人。\n馬蹄之下的地皮卻開始顫動，滿山碎石顛簸，這次當真是地動山搖了。\n渾厚的鼓聲裡，身後傳來排山倒海般的嘶吼聲：「殺——」\n光是那聲浪便震得人耳膜發疼。\n副將驚惶回頭望去，便見一支浩浩蕩蕩的黑鐵騎兵，恍若洪流過境一般，從馬王坡上俯衝而來。\n雪天相接處，一桿迎風招展的「謝」字旗隨著黑鐵洪流一齊逼近。\n為首那銀鞍白馬的青年將軍，面似神祇，色如修羅，身後猩紅的披風在白毛寒風裡翻飛，震人心魂。\n山下還在試圖縮小包圍圈的北厥人聽得身後傳來的廝殺咆哮聲，回頭瞧見此景，也是驚得肝膽具顫，尚不及調整陣型迎擊，便被山上如一柄尖錐直刺而下的謝家鐵騎將軍陣徹底撕開。\n被困在敵陣中央，已耗得精疲力盡的戚家軍瞧見「謝」字旗，也幾欲喜極而泣：「謝家鐵騎！是謝將軍率援軍來了！」\n不知是誰率先長嘯一聲，明明雙臂都已因持刀拼殺太久，酸軟到麻痺，卻還是舉起了刀劍，繼續同北厥人廝殺，往援軍的方向艱緩移動過去。\n魏嚴看到謝家軍旗，懸在心口的那塊大石頭也終落地，高熱又經了幾場大戰的身體疲敝不堪，讓他整個人都有了幾分恍惚。\n副將驚愕問他：「中郎，你怎知謝將軍的援軍在後邊？」\n魏嚴不答，提刀繼續向著戚家軍的包圍圈殺去。\n等兩軍交匯，他一眼便看到了被一眾親兵護在中央的戚老將軍，只是戚老將軍手捂著腰腹，手背已被鮮血染紅。\n明顯是受了重傷。\n魏嚴心中一緊，策馬上前，喚道：「大將軍！」\n戚老將軍鬚髮斑白，面相看著很是孔武威嚴，只不過此刻嘴唇已泛白，被長子扶著才能站穩。\n眼見來者是魏嚴，他面上的神情稍松怔了些許，道：「你和臨山來了。」\n魏嚴翻下馬背，看著戚老將軍血流不止的腰腹，再也繃不住面上的沉痛之色，逼得他眼眶也發澀：「您……怎麼傷的？」\n戚老將軍於他而言，亦師亦父。\n上一世，便是因為他那句言禍，致使本就對戚家忌憚不已的老皇帝起了殺心，為了剪除太子羽翼，率先對戚家下了手。\n可恨一直到北厥再次攻打錦州，收回了戚家兵權的老皇帝不得已又將戚家兵權交與了謝臨山，他們才慢慢查出了戚家父子的死，也是出自老皇帝之手。\n重來一次，還是救不了戚將軍嗎？\n戚家長子戚獻琿扶著戚老將軍，雙目猩紅：「徐策那狗賊，他傷父親的這一劍之仇，便是他墜馬被踏死於亂蹄之下，也難消我心頭大恨！」\n魏嚴猛地抬眼：「是徐策傷的老將軍？」\n戚獻琿咬牙切齒道：「那叛徒偷襲了父親！」\n他看著戚老將軍因失血過多而逐漸灰敗的臉色，氣得唇都有些發抖，別過臉去，才強忍下了眼中的淚意。\n魏嚴前世只查出是戚家軍的徐策得老皇帝授意，謊報軍情，在明知北厥人有伏的情況下，還誘戚家父子前去追敵，卻不知戚老將軍身上的致命傷，竟也是拜徐策所賜。\n怒意裹挾著渾身的血逆湧，他勉強讓自己冷靜，說：「先回燕州城，大將軍的傷需要即刻醫治。」\n北厥人也懂得見好就收，眼見大胤援軍來了，謝家鐵騎銳不可當，在想困死戚家軍無望，當即鳴金收兵。\n-\n謝臨山披一身血甲過來時，瞧見戚老將軍面如土色，神色也是一凜：「大將軍受傷了？」\n魏嚴抬眼瞧向那清朗意氣的青年將軍，叫白毛北風吹得發澀的眼底，透出幾分微紅，他喚了聲：「臨山？」\n十八載月寒日暖，煎這人壽，他幾乎已記不清昔日好友的模樣了，只記得他的屍首從燕州運回時，那滿身的刀斧鑿傷和發黑的箭孔，以及破開後用針線縫起來的胸腹……\n那是戚老將軍都曾斷言，此子再磨礪幾年，往後的成就未必不能越過他去的少年將才啊，最後卻落得個那般下場！\n如今，當真是隔世再見了。\n謝臨山瞧著魏嚴發紅的一雙眼，以為他是擔憂戚老將軍，當即就問：「以圭，大將軍是被何人所傷的？」\n魏嚴勉強斂下心神，道：「戚家軍中出了叛徒，此事說來話長，大將軍傷勢緊急，回城再說。」\n謝臨山也知戚老將軍的傷勢拖不得，點了頭。\n-\n等魏嚴和謝臨山護著戚家殘軍回到燕州城時，已是暮時。\n戚容音在城樓上瞧見了大軍凱旋，奔下城樓來，見兄長滿臉血跡，戚老將軍則是被親兵用樹枝和藤條綁成的擔架抬回來的，臉色霎時間就是一白。\n她拎著裙擺上前，強自鎮定問：「父親怎麼了？」\n戚獻琿喉間發哽，對著胞妹也說不出一句寬慰的話來，只把臉側做一邊，強忍悲意。\n還是魏嚴道：「大將軍被叛徒徐策所傷，先讓軍醫看看傷勢。」\n一行人抬著戚老將軍進了城主府，軍醫前來醫治時，戚容音和兄長寸步不離地守在床邊。\n下人端著水盆進來，不多時又端著一盆盆血水出去，沒人說一句話，屋內氣氛壓抑到了極點。\n誰都知道戚老將軍的傷勢不容樂觀。\n魏嚴和謝臨山抱臂立在門口，謝臨山看了守在內間的戚家兄妹一眼，對魏嚴道：「以圭，可否借一步說話？」\n魏嚴知道謝臨山想問什麼，點了頭同他一道離去。\n到了僻靜處，謝臨山直接開門見山問：「以圭，你怎知我率軍來燕州了？又知北厥人伏擊大將軍的地點在馬王坡？回城時，我派斥侯去查探過地形了，大將軍是被北厥人引著兜了個大圈才到馬王坡去的。」\n這一場救援雖說是趕上了，但謝臨山十分清楚，若不是魏嚴提前派人給自己傳了信，讓他直接趕往馬王坡，等他尋著大軍行軍路跡找過去，無論如何都是來不及的。\n魏嚴望著好友，眼底閃過許多晦澀情緒，最終只道：「臨山，你知我不信鬼神之說，但在我身上，的確是發生了怪力亂神之事。」\n「我不過是在一場戮戰後，抵不過疲乏於城樓上合眼小憩了片刻，便如走馬觀花般看完了後半輩子的事。今日戚老將軍父子身陷險境，當真只是一個徐策謀劃得了的嗎？」\n謝臨山聽出弦外之音，眼神一厲：「是賈家？」\n賈貴妃聖寵正濃，賈家跟著雞犬升天，十六皇子意圖同太子爭位，賈家和戚家明裡暗裡過招，也不是一日兩日了。\n魏嚴卻搖頭，時隔兩世，終將那份折磨了自己大半輩子的愧疚說與故人：「是我那『禪位』之言，傳到了陛下耳中。」\n謝臨山瞳孔一縮，驟然轉眸看向魏嚴：「要戚家死的人，是陛下？」\n魏嚴沉重閉目道：「戚家重兵在握，宮裡那位忌憚太子如斯，又得東宮客卿洩露了我那『禪位』之言，要對付太子，最先要除去的，便是戚家。沒了兵權，太子在民間的聲望再高，終究也只能是『太子』。」\n謝臨山聽完沉默了下來，臉色嚴峻得可怕。\n魏嚴繼續道：「若一切皆如我夢中所見，戚家滿門戰死只是個開始，等太子查到真相之日，太子、謝家、魏嚴，都會被龍椅上那位無德之君一手拔除。」\n謝臨山皺眉：「殿下被立為太子以來，一直寬厚仁德，幾番被十六皇子和賈家打壓，也不曾激進行事，便是你那冒失之言傳入宮中了，他除了愈發猜忌，能拿什麼錯處，一手扳倒東宮和魏、謝兩家？」\n聯想老皇帝對戚家做的事，謝臨山神色一冷：「是給太子按了個謀逆汙名？」\n歷來唯有謀逆大罪，方能徹底剷除一位儲君的勢力。\n魏嚴苦笑：「比你所言更甚。」\n謝臨山不由怔住，想不通還能有什麼罪大過謀逆去。\n魏嚴道：「不久後北厥人會再犯錦州，戚家無人，你替代戚家鎮守錦州，那昏君迫不得已將戚家兵權交與你。戚皇后病重，未免自己去後，戚家徹底失了在後宮的勢力，太子孤掌難鳴，召容音進宮。十六皇子嫉恨太子在民間的聲望，煽動百姓為其修生祠，那昏君藉此機會發作太子，奪太子監國之權。」\n「太子為謀出路，自請北上親徵，在戚家軍中查到了戚家滿門戰死的真相，昏君狗急跳牆，為掩蓋自己的醜行，設計拖住運送糧草的援軍。最終錦州城破，你和太子皆死於北戎人刀下。延誤送糧之責，錦州城破之失，皆被栽贓到了我身上。」\n謝臨山聽得渾身汗毛都快豎了起來，喝道：「荒唐！」\n緩了片刻後，他才問：「可有證據？證明徐策是受宮裡指使的證據。」\n魏嚴道：「徐策已死在了戰場上，但今年春闈，其子會名列一甲前十。徐策之子，並無大才，臨山若有心，尋些他平日裡所做的詩詞文章，便知此人才學深淺了。」\n老皇帝行事手段縝密，上一世魏嚴和謝臨山也沒能輕易查到徐策身上，畢竟徐策和戚家父子連同當日追敵的上萬將士，都死在了北厥人的伏擊裡，還被賜予了忠烈之名。\n是後來太子飽受老皇帝打壓，又自請來了錦州，留守京城的太子黨羽皆已不得聖心，他們試圖從朝臣中再梳攏幾個純臣，做京城那邊的「耳朵」、「眼睛」時，才篩選到了徐策之子。\n春闈中一甲前十的成績，放哪兒都算得上一方人物。\n當時徐策之子雖只是個翰林院編修，但若心懷抱負，往後多的是大展宏圖的機會，其父又是戚家忠將，挑來選去，他們認為接洽徐策之子再合適不過。\n豈料就是在細查此人時，發現了他才學平庸，怎麼看都不是能考進一甲的人。\n又順藤摸瓜，方查出了戚家父子戰死的真相。\n-\n距離春闈放榜還有一月，魏嚴和謝臨山商議之後，暫且瞞住了炮仗脾氣的戚獻琿。\n戚老將軍傷勢嚴重，勉強撿回一條命，此後都不得再動武了，怕惹得戚老將軍心寒，眼下又無確鑿證據，在塵埃落定之前，二人也並未告知老將軍。\n但他們已開始著手查徐策之子。\n待春闈放榜，宣他們進京受封的聖旨也下來了。\n戚老將軍有傷在身，不能長途跋涉，便由其子戚獻琿代為進京，老將軍自知老了，還將虎符也交與長子，讓他代為交還給皇帝。\n老皇帝當初能坐上帝位，全仰仗戚家的兵權，如今戚老將軍雖上不得戰場，戚獻琿卻還立著。\n他若真收回虎符了，便是讓所有朝臣都看清他鳥盡弓藏的心思，老皇帝不會這般操之過急，讓自己失了臣心。\n因此這虎符，多半還是會交到戚獻琿手裡。\n-\n三人進京後，魏嚴和謝臨山常常結伴出入各大酒樓，惹得戚獻琿頗為不快。\n從前三人在軍中，那都是好兄弟，怎地回了京，突然就有了親疏之別，吃酒都不叫他了？\n戚獻琿給了二人幾天臉色，奈何兩人似乎壓根沒察覺到，氣得戚獻琿練槍時，將進奏院的青岡石地磚都戳碎了好幾塊。\n他又觀察了兩日，發現魏、謝二人很不對勁！\n他們出個門，中途還要換一次馬車，簡直鬼鬼祟祟！\n戚獻琿索性暗中跟蹤，這才發現二人竟是結伴去了青樓。\n氣得他也直接進了青樓，去踢房門了。\n他隨了戚老將軍，生得孔武高大，那蠻力十足的一腳踢下去，房門連著門框都給拆了。\n嗓門更是粗獷，震得桌上茶水都在晃動：「姓魏的我告訴你！想娶我妹妹還敢逛青樓，真當我戚家軍十萬兒郎裡給她挑不出個如意夫郎？無怪乎這幾日你二人都躲著我，原來是尋花問柳來了！」\n一直在明察暗訪秘密布局的魏嚴和謝臨山被這麼劈頭蓋臉地一頓罵，當下也顧不得其他的，一人上前拽著戚獻琿進屋，省得杵在外邊引人看熱鬧，一人則捂住了他嘴。\n這般又拖又拽，總算是把戚獻琿弄進屋了。\n樓裡的管事眼見事態不對，出來控場，將看熱鬧的人都哄走了，調侃說是大舅哥捉到了準妹夫逛青樓大發雷霆，又命機靈的小廝守在了附近幾個樓口，以防有人前來偷聽。\n魏嚴去把拆掉的門板先擋回去，謝臨山一人摁著戚獻琿，不妨鬆了捂著他的嘴。\n戚獻琿仰著脖子嘶叫：「你們別想讓老子跟你們同流合汙，老子是有家室的人！老子要潔身自好！」\n謝臨山果斷抽出桌布給他嘴堵上了。\n戚獻琿唔唔叫著，一雙眼簡直要噴火。\n謝臨山道：「獻琿兄，得罪了，我同以圭兄來此，並非是為尋花問柳，而是有要事要謀，進奏院耳目眾多，不得已才出此下策。」\n他說著將一摞書文放到了戚獻琿跟前：「獻琿兄請看。」\n戚獻琿翻了兩頁便嚷道：「老子生平最恨讀書，你們給老子看著些詩文作甚？」\n魏嚴道：「素日裡只寫得出此等粗詞劣藻的人，在此番春闈名列一甲前十，獻琿兄不覺著蹊蹺麼？」\n戚獻琿眉頭一擰：「這人科舉舞弊了？」\n魏嚴道：「此人乃徐策之子。」\n戚獻琿臉色當即猙獰了起來：「徐策那叛徒，老子已代父親寫了戰報呈與陛下，一罪人之子，還妄想靠科考舞弊入仕？」\n魏嚴和謝臨山對視一眼，皆默了一息。\n謝臨山說：「殿試由陛下親自監察，舞不了弊。」\n戚獻琿慢半拍地終於反應過來了：「是陛下幫著他拿到了這個名次？」\n這個結果顯然超出他的認知了，他抬頭看謝、魏二人，問：「為何？為何陛下幫一叛賊之子舞弊？」\n魏嚴這才道：「那封狀告徐策的戰報，暫由太子扣下了，還未送到陛下眼前。」\n戚獻琿腦子裡已成了一團亂麻。\n陛下還不知徐策是叛徒的事，又幫著徐策之子舞弊……\n一股寒意爬上脊背，戚獻琿道：「徐策是陛下的人？」\n謝、魏二人皆不做聲，算是默認。\n戚獻琿狠狠一砸八仙桌，罵道：「荒唐！戚家為他出生入死，他憑什麼……」\n他還要再大聲喧嚷，被魏嚴及時捂了嘴：「我知獻琿兄心中悲憤，但這含煙樓也並非全無耳目，還是慎言。」\n戚獻琿終於冷靜了下來。\n見他不再做聲，魏嚴才鬆了捂他嘴的手。\n戚獻琿額角青筋暴凸，強壓著怒氣和恨意問：「你們是如何盤算的？」\n魏嚴和謝臨山對視一眼後道：「殿下已知曉了你和大將軍都險些身死燕州的事，你有戚家十萬兵馬的虎符在手，臨山手上也有徽州謝家軍，如今只等殿下那邊點頭了。」\n點頭做什麼，自是不言而喻。\n老皇帝已容不得戚家，要殺戚家滿門來奪回兵權，沒了戚家，太子什麼都不是。\n皇帝這是已經把刀架到了太子脖子上了。\n魏嚴知道以太子軟仁的性情，做這個決策會掙扎很久，但掙扎完了，他還是只有那一條路可走。\n畢竟，再讓，就是把東宮和戚家再次送上死路了。\n戚獻琿雖才被皇帝要害自己滿門的消息激得心中震怒，可聽魏嚴和謝臨山平靜地說出所謀之事後，他還是覺著手腳陣陣發涼。\n謀逆，誅九族的大罪，稍有不慎，便是滿門抄斬。\n可想到死在戰場上的那些戚家軍，自己和父親也是從鬼門關撿回一條命來，魏嚴和謝臨山都能豁出去搏，他戚家還怕什麼？\n戚獻琿很快握緊雙拳道：「此等昏君，不配我戚家為他血灑疆場！」\n他看向魏嚴：「京中除了五軍營，還有神機營是個狠茬兒。」\n魏嚴道：「這交與我和臨山。」\n-\n經此一謀後，對於讓老皇帝「禪位」，謝、魏、戚三家，基本上站到了同一條線上。\n只不過因為戚獻琿當日那大嗓門的一吼，魏嚴和謝臨山逛青樓的事，還是傳了出去。\n京中不少貴女為此哭紅了眼，難以置信這京城「雙璧」，竟也是眠花宿柳之人！\n次日魏嚴在進奏院碰上戚容音，正要同她說話，戚容音卻看都沒看他一眼，手持團扇冷著臉徑直走了。\n謝臨山來尋魏嚴時，手上還抱著一大扎西府海棠，見了魏嚴，尷尬地摸摸鼻子：「阿綰聽說了我去青樓的事，不肯見我了，這西府海棠，你幫我交給阿綰，再……替我說說好話。」\n魏嚴說：「你倒是提醒我了，我讓獻琿去容音那裡幫我求求情。」\n等魏嚴找上戚獻琿，說明來意後，戚獻琿苦著個臉：「我的東西都叫夫人從房裡扔完了，和離書都擬了讓我落名。」\n謝臨山：「……」\n魏嚴：「……」\n頓生一股同病相憐的慘澹。\n戚獻琿頗為頭疼地道：「容音昨夜和她嫂嫂哭了一宿，也說要悔婚，那事未成，我也不敢告訴她們實情。今日慶國公府設了百花宴，夫人帶著容音出門了，說是還約了魏姑娘，要一同去宴會上挑如意郎君。」\n魏嚴和謝臨山臉色都狠狠一變，齊齊抱拳：「告辭。」\n……\n啟順十六年春末，老皇帝染「重疾」，十六皇子和賈家意圖謀反，被承德太子率魏嚴、謝臨山、戚獻琿等重將所擒。\n先帝受不了寵妃和最寵愛的皇子都是此等狼子野心的刺激，一口氣沒「緩」過來，歸西了。\n承德太子這位名正言順的儲君，由百官跪請，登基為皇，改年號為慶和。\n同年，新帝替魏嚴和謝臨山兩位重臣賜了婚，並親自當了二人的證婚人。\n不久後，北厥再次來犯，謝臨山攜妻魏綰前往錦州戍邊，魏嚴留守京中，但心疼妹妹，將手中得力家將魏祁林撥到了謝臨山手底下，令其護魏綰周全。\n三年後，北境大定，四海昇平，謝臨山攜妻回京省親，還帶了個神清骨俊的奶娃娃。\n孩子是魏綰在他外出徵戰時所生，過路的方士言此子命格極為強硬，取名尋常了只怕壓不住命格，謝臨山便以「徵」字做了孩子的名字。\n魏綰回家小住時，魏祁林求到魏嚴跟前：「主子，末將心悅一位姑娘，想求主子替末將做媒。」\n彼時魏嚴一身溫雅儒袍，正在書房作畫，聞言筆尖微頓，問他：「哪家姑娘？」\n魏祁林答：「謝將軍麾下的常山將軍，孟叔遠孟老將軍家中的獨女。」\n魏嚴抬眸：「要娶人家姑娘？」\n皮肉糙實的將軍嘿嘿一笑，說：「末將入贅。」\n清風從大開的檻窗吹進，拂動書案上作畫的宣紙。\n魏嚴似乎也笑了笑，道：「好。」\n177番外：if線青梅竹馬（2）\n秋風習習,滿院丹桂飄香。\n年方四歲的謝徵拿著一柄小木劍在院中練習戳刺的動作，不斷地揮劍，手臂都已發酸,他還是不曾停下。\n日頭正曬,他帶著嬰兒肥的臉上一片緋紅,腦門子上也布了一層細汗，眼神中滿是與他年齡不符的執拗和認真。\n魏綰坐在廊下的美人靠上，手持一柄墜著青玉流蘇的花鳥團扇徐徐扇著,有些無奈地同坐在她身側的孟麗華道：「前兩日被他父親指出劍招練得不紮實，這些天除了吃飯、念書、睡覺,一得空便抱著他的木劍練,打小性子就執拗成這般，當真是一點不像我,也不像他爹,倒是像他舅舅。」\n魏祁林是魏嚴撥給魏綰的，算是她娘家的人,在謝臨山手底下頗得重用,又同謝臨山麾下老將孟叔遠成了翁婿,謝、孟兩家的關係可以說是極為親近了。\n魏祁林要隨謝臨山去巡視邊防,幾月不著家,魏綰得孟麗華身子重了,怕她一人在家悶得慌,便邀她來府上做客，同她說話解乏，念念育兒經。\n一來一去的，一人倒也成了閨中密友。\n孟麗華聽了魏綰的話便笑：「外甥像舅這話可不是白說的。」\n她摸了摸自己圓滾的腹部，「我肚子裡這個疲懶得很,都到這月份了也鮮少有動靜，我想著應是個不愛鬧騰的閨女。它爹逗它時，它弄出的動靜又頗大，嚇得它爹一宿沒睡著，第一日愁眉苦臉問我要是個小子怎麼辦。」\n魏綰不由也跟著笑開：「魏將軍想要個閨女？」\n孟麗華眼裡帶了幾分無奈：「從剛診出喜脈他便開始想名字了，大字不識幾個的人，抓著他底下一眾主簿幫著翻了好幾天書後，一臉嘚瑟地同我說，要是個閨女，就叫長玉。從孩子滿月到周歲的衣物，他也斷斷續續搜羅了好幾箱。」\n魏綰笑問：「若是個小子呢？」\n孟麗華神色變得有點一言難盡，「他說小子皮實，生了就先鐵蛋、鐵牛地叫著吧，等大了再讓孩子外公給取名。」\n魏綰沒料到平日裡看著穩重踏實的魏祁林，私底下竟是這麼個人，倚著美人靠，笑得眼淚都快出來了，她道：「看來魏將軍是真喜歡閨女。」\n美目一轉，看向了廊外練劍的幼子，又說：「我聽聞民間有個土法子，未滿五歲的孩童能辨出懷胎婦人腹中是閨女還是小子。」\n孟麗華驚疑道：「還有此等奇事？」\n魏綰笑言：「要不試試？」\n她說著喚起了幼子：「徵兒，到娘親這裡來。」\n謝徵聞聲回過頭，見母親在廊下衝自己招手，便收了木劍往廊下去：「娘親找我？」\n魏綰用帕子擦去他臉上的汗，溫聲道：「日頭這般大，不怕曬？瞧瞧這一頭汗。」\n謝徵自己抬起胳膊胡亂抹了一把臉，說：「不曬。」\n魏綰讓下人倒了杯蜂蜜花茶水給他喝，又問：「徵兒想不想要個弟弟或妹妹？」\n謝徵很乾脆地道：「不想。」\n魏綰問：「為何？」\n稚童小眉頭皺了皺，說：「哭，煩人。」\n謝臨山麾下的重將這些年都陸陸續續成了家，因著他們時不時便要徵戰，這塞外又沒個像樣的學府，為了讓底下將軍們沒後顧之憂，謝臨山便做主讓他們家中適年的孩童都到謝府私塾開蒙讀書。\n謝徵在學堂裡，聽得最多的便是那些小毛頭的哭嚷聲，一哭就是半日，沒完沒了。\n他一點也不想要個弟弟或妹妹，要是家裡也有個天天扯著嗓子嚎的小東西了，他怕是睡覺都不安生。\n魏綰也就隨口一問，怎料孩子卻給了她這麼個答覆，頓時失笑不已。\n她哄著幼子道：「那孟姨家以後有個弟弟或妹妹陪你玩好不好？你覺得孟姨肚子裡的是弟弟還是妹妹？」\n謝徵側頭望著孟麗華襦裙下隆起的滾圓腹部，繃著小臉答了聲：「妹妹。」\n他也不知道這肚子裡的娃娃是男是女，只覺著是個妹妹應該就沒那麼煩人了，不然像劉參將家的小子，老是惹他，被他揍了，又嚎得跟殺豬一樣回家告狀，傳到他爹耳朵裡了，他又得挨揍。\n孟麗華輕撫著腹部，笑容溫婉：「我也盼著是個閨女。」\n魏綰打趣兒子：「要真是個妹妹，以後你把人娶回來，給娘親當兒媳好不好？」\n小小的孩子還不知何謂嫁娶，只皺起小眉頭：「為什麼要給娘親當兒媳？」\n魏綰和孟麗華都被他這無忌童言逗笑。\n魏綰捏捏兒子微嘟的臉頰說：「因為娘親喜歡她啊。」\n謝徵似乎認真考慮了一下，然後說聲了：「好。」\n此言一出，魏綰和孟麗華更是啼笑皆非。\n-\n三月後，孟麗華果真生下一女。\n消息傳到謝府時，魏綰還有些詫異，隨即極為歡喜地備了不少禮物命人送去孟府賀喜。\n坐在窗前溫書的謝徵見母親忙前忙後，突然問了句：「娘親，是孟姨生了嗎？」\n「是啊，徵兒惦記著小媳婦呢？」魏綰壞心眼地繼續逗兒子。\n謝徵抿著唇，小手握著書卷默不吭聲。\n這晚回房，他卻從自己小書案裡的抽屜裡，翻了一本空白的冊子出來，研了墨，在第一頁寫上一行小字：生辰，慶和五年正月十一。\n-\n一直到百日宴，謝徵才正式見到了那個在孟姨肚子裡呆了足足十月的妹妹。\n喧嚷的前廳裡，一群婦人都圍著那個在襁褓裡的小不點說笑，謝徵跟在母親身邊，覺得無聊透了，抬眼打量那小不點，卻發現她也是個疲懶的，雖生得玉雪可愛，但眼皮總是半耷拉著，一副馬上就要睡過去的模樣，任誰抱她她也不哭。\n婦人們都誇這孩子是個省心的，隨即又你一言我一語地說起自家孩子有多磨人。\n孟麗華含笑應著，見女兒沒什麼精神頭，以為孩子是犯困了，她得招呼女客們走不開，便把女兒交給了帶孩子的嬤嬤，讓嬤嬤帶去廂房睡。\n謝徵覺得那小人兒是懶，不是困。\n眼見小人兒被抱走，他也跟著走出了前廳，想去外邊轉轉。\n嬤嬤發現了他，笑呵呵問：「小公子跟來看小妹妹的嗎？外邊風雪大，到屋子裡來看吧。」\n謝徵覺得回絕了倒顯得自己口是心非似的，稍作考慮，便邁著小腿進了那間廂房。\n小人兒被放進了搖床裡，發現有生人進來，只睜著那雙懶困的眼靜靜看著他。\n嬤嬤給她蓋上了綢被，又把搖床裡虎頭布囊，撥浪鼓之類的小玩意撿做一邊。\n見謝徵站在床邊，遞給他一個撥浪鼓笑著道：「小公子可拿著逗逗我們姑娘。」\n謝徵記得自己三歲時，母親還拿這東西逗自己玩，他只覺這東西咚咚咚的響起來，吵得厲害，伸手去抓，想讓母親別搖了。\n偏生大人們看他一聽這東西響便去抓，卻以為他是喜歡，愈發起勁兒地搖鼓逗他。\n那實在不是什麼愉快的經歷。\n謝徵沒接那撥浪鼓，說：「我就看看。」\n他盯著小人兒，小人兒也盯著他。\n嬤嬤道：「我們姑娘是個好性子的，極少哭鬧，只貪睡了些。一會兒姑娘睡著了，小公子可不能去吵姑娘了。」\n謝徵說：「她不困。」\n他伸手在小人兒跟前晃了晃，大抵是出生到現在，見到的都是大人，突然來了個小好幾號的人逗自己，搖床裡的女娃娃突然伸手抓住了那在自己跟前晃動的手指。\n謝徵試著掙脫了下，沒掙脫。\n怕弄哭這軟乎乎一團的小傢伙，也不敢太用力。\n不過抓著他手指的那隻小胖手，軟得跟奶豆腐似的，勁兒卻挺足，抓得也穩。\n謝徵只覺新奇，便也沒抽出來，還捏了捏她胖嘟嘟的手背。\n小人兒似乎也極歡喜，蹬蹬腿兒，又伸了伸另一隻胳膊，還咧嘴笑了起來。\n一旁的嬤嬤笑道：「咱們姑娘喜歡小公子呢！」\n下一瞬，卻見那搖床裡的小不點直接抓著謝徵的手指塞進了自己嘴裡。\n謝徵臉色當即就變了，用力把手抽了出來，瞧著指尖的涎水，沉著臉直接去臉盆旁洗手。\n搖床裡的小人兒不知是被嚇到了還是因為沒了玩具，突然嚎啕大哭了起來，那哭聲也不似一般嬰孩尖細，而是運勁兒十足，以至哭聲也十分嘹亮。\n嬤嬤用撥浪鼓和虎頭布囊也哄不好她，把人抱起來，在屋內轉著哄了一圈，還是無果。\n剛洗乾淨了手指的謝徵沉著臉望著那小人兒，最後認命般走過去，把那根手指又塞進小人兒嘴裡了。\n小人兒果真就不哭了，長睫上還掛著淚珠子，開始使勁兒吮他手指。\n謝徵先是一愣，隨即看向嬤嬤：「她餓了。」\n嬤嬤也愣了愣，「夫人小半個時辰前才餵過姑娘呢，應該沒這麼快餓才是。」\n雖這般說著，卻還是差人去去廚房熱了一碗羊奶來。\n孟麗華偶爾身子不爽利，不能給孩子餵乳，便是用溫羊奶暫餵孩子。\n今日賓客眾多，嬤嬤知道孟麗華怕是抽不開身，這才先用羊奶哄小娃娃。\n丫鬟很快便端著一碗溫好的羊奶過來，嬤嬤用湯匙沾了一點往孩子嘴邊送去，她果真就吐了手指，去追那湯匙。\n嬤嬤驚愕道：「姑娘還真是餓了。」\n她用湯匙舀著羊奶給孩子餵了大半碗，小人兒才躲著湯匙不願意喝了。\n嬤嬤用絹帕給小人擦了嘴，笑呵呵道：「飯量大才好，身子骨長得結實，姑娘這小手小腳的，可有勁兒了。」\n搖床裡的奶娃娃不知是不是知道大人在逗她，很給面子地又蹬了蹬蓋在身上的綢被，還舞了下胖乎乎的小手。\n謝徵覺著這次小孩應該是真困了，那胖爪子舞著舞著就沒勁兒了，眼皮也在慢慢合上。\n吃飽了就睡，他覺著這小娃娃還真是懶。\n不過她哭起來，似乎也             const select = document.getElementById('chapterSelect');
            chapters.forEach((chapter, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${chapter.title}`;
                select.appendChild(option);
            });
            
            if (chapters.length > 0) {
                displayChapter(0);
            }
        }

        function displayChapter(index) {
            if (index < 0 || index >= chapters.length) return;
            
            currentChapter = index;
            const chapter = chapters[index];
            
            const contentArea = document.getElementById('contentArea');
            const paragraphs = chapter.content.split('\\n')
                .filter(p => p.trim() !== '')
                .map(p => `<p>${escapeHtml(p)}</p>`)
                .join('');
            
            contentArea.innerHTML = `
                <div class="chapter-title">${escapeHtml(chapter.title)}</div>
                <div class="chapter-content">
                    ${paragraphs}
                </div>
                <div class="chapter-info">
                    章节 ${index + 1} / ${chapters.length}
                </div>
            `;
            
            // Update select
            document.getElementById('chapterSelect').value = index;
            
            // Update buttons
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === chapters.length - 1;
            
            // Scroll to top
            window.scrollTo(0, 0);
            
            // Save progress
            localStorage.setItem('lastChapter', index);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function goToChapter(index) {
            if (index !== '') {
                displayChapter(parseInt(index));
            }
        }

        function nextChapter() {
            if (currentChapter < chapters.length - 1) {
                displayChapter(currentChapter + 1);
            }
        }

        function prevChapter() {
            if (currentChapter > 0) {
                displayChapter(currentChapter - 1);
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') {
                prevChapter();
            } else if (e.key === 'ArrowRight') {
                nextChapter();
            }
        });

        // Initialize on load
        window.onload = function() {
            initChapters();
            
            // Resume last chapter
            const lastChapter = localStorage.getItem('lastChapter');
            if (lastChapter !== null) {
                displayChapter(parseInt(lastChapter));
            }
        };
    </script>
</body>
</html>
