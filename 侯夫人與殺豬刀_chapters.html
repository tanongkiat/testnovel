            num: 157,
            title: `第157章第157章`,
            content: `宮城下方黑壓壓的騎兵人馬齊動,雁翅樓上兩大營的人馬亦是兩相對峙，蓄勢待發。\n午門廣場後方的軍陣卻有響起一片利刃出鞘聲，魏嚴微微側首,便見火光映出一片刀劍的寒光。\n謝徵淺提唇角,捻動手中馬韁，笑得散漫卻極有壓迫感：「讓他說下去。」\n離那個真相只有一步之遙,他噙著笑意泰然自諾,但眼底唯有無盡冰冷。\n人群之外又傳來了喧譁聲，一輛馬車疾馳而來,車簾撩起，影衛壓著魏宣和魏夫人走出了馬車,喝道：「魏夫人和魏宣在此！」\n城樓之上，齊旻笑意愈發疏狂，蒼白到泛著淡青的手撐在冰冷的城牆磚垛上,看著魏嚴道：「正好你妻兒都來了，孤敢保證，你的人再往前一步,他們便人頭落地！」\n魏夫人和魏宣皆被五花大綁，嘴裡塞著棉布，魏夫人看著魏嚴眼中有悽惶愧疚之色，想出聲卻只能發出陣陣嗚嗚聲，便一個勁兒地衝著他搖頭。\n魏宣則目眥欲裂，似憤怒到了極點。因為一直用力掙著捆綁在身上的繩索,他頸下青筋都凸起，繞在頭頸處的繩索同皮膚摩擦太久，勒得頸子都破皮了。\n謝徵在看到魏夫人時，冷沉的鳳目微眯了眯,原本冷峭勾起的唇角也往下壓了幾分。\n跟隨者魏嚴的人則紛紛看向魏嚴，等他指示，他只沉默了一息，便再次下達命令：「攻城。」\n這次魏嚴身邊的親信沒再猶豫，直接拔出腰間佩劍大喊：「攻城——」\n一時間城樓上各為其主的五軍營兩大營人馬混戰做一團，城樓下的三千營騎兵一部分去撞被重新堵上的宮門，一部分則和謝徵帶來的人繼續對峙。\n齊旻在城樓上朝著下方的影衛做了個手勢，那影衛當即取了塞在魏宣口中的棉布，魏宣生性極為要強，口中沒了堵塞物，他像一條發了狂的鬣狗，猩紅著眼怒喝道：「有種就殺了老子！」\n那影衛沒殺他，只是押著他跪下，把刀刃從他後背插入肩胛，再用力攪動，血水頓時就浸透衣物汩汩往外冒。\n魏宣嘶聲慘叫，聲音震人耳膜。\n影衛將刀取出去時，他幾乎已跪不住了，整個人伏在地上，痛到慘白的臉上布著細汗，髒汙黏成一綹一綹的頭髮浸在他自己傷口處湧出的血灘中。\n待恢復了些力氣，他嘴唇翕動，說出的仍只有一句：「殺了我……」\n魏夫人就在他旁邊被另一名影衛控制著，嘴裡還塞著棉布，發不出任何聲音，想奔向兒子卻又被影衛按住了肩膀，只有一雙眼已哭得紅腫，幾欲昏闕。\n謝徵冷眼看著這一切，捏著長戟的手緊了幾分。\n城樓上，齊旻譏誚出聲：「丞相的心腸果真冷硬如鐵，連自己親子的性命都不放在眼裡。」\n他說著看向哭得幾乎已站不穩的魏夫人，好整以暇道：「不過魏夫人也不必傷懷，畢竟殺子這樣的事，魏丞相可不是第一次做了。」\n這話無疑是一石激起千層浪，莫說一旁的李太傅驚駭，連謝徵眸色都沉了幾分。\n魏嚴還有過別的孩子？\n一直沉默寡言的魏嚴忽地冷冷抬眸，嗓音嚴正威凜：「住嘴！」\n齊旻視線終於落回魏嚴身上，隔著城臺同他遙遙對視，隔了十七年的一場復仇，他只覺心中快意非常，輕笑著道：「丞相在怕什麼？你當年出入清和宮同淑妃苟且，為了淑妃肚子裡的孽種設計錦州慘案，害死孤的父王和十六叔的時候，怎就沒想過今日呢？」\n比起齊旻那大仇即將得報的快意，魏嚴眼底除了殺意，一分旁的情緒也無了，他緩緩吩咐：「今日在場者，皆殺無赦。」\n他身邊的親信放出一枚信號彈，那信號彈拖著長長的火花就要升向高空，卻被一箭給射了下來，火花炸在人群中間，似放了一枚爆竹。\n魏嚴側目往後方看去，便見謝徵坐在馬背上，單手持弓，神情冰冷壓著一份噬骨的恨意看著他：「這就是你殺我爹娘的原因？」\n齊旻在城樓上大笑：「殺親妹妹和親妹夫算什麼？東窗事發後，先帝欲拿淑妃問罪，魏嚴可是一把火燒了清和宮，將淑妃和淑妃肚子裡那未出世的孩子一同活活燒死，毀屍滅跡！」\n最後四個字，他咬得極重。\n原本廝殺成一片的宮門處似乎都沉寂了一刻。\n魏嚴立在蕭瑟寒風中，啟唇吐出的，仍只有一個冷冷的「殺」字。\n三方人馬再次交鋒，齊旻眼見魏嚴似乎是真不在乎魏夫人母子的生死，面上閃過一抹厲色，衝著城樓下方的影衛道：「魏丞相冷血如斯，便先送魏夫人和魏公子下地獄吧！」\n魏宣在聽到齊旻道出真相時，便倒伏在血泊中，一瞬不瞬地看著遠處魏嚴負手而立的側影，他面上肌肉繃緊，眼底的血絲卻還是一點點浮了起來，有淚光從眼角滾落，順著鼻梁滑落墜入下方的血泊中。\n影衛的刀落下來時，他甚至連掙扎都不想掙扎了。\n只有魏夫人還在看著他搖頭哭，似想說什麼奈何又被堵了嘴。\n刀光劃向魏夫人時，謝徵長戟一掃，將那名影衛打得倒飛出去一丈遠。\n劈向魏宣的那一刀，則被不知從何處冒出來的魏府死士攔下了。\n七八枚信號彈齊齊升向了夜空，縱是想放箭攔截，也攔不下了。\n中軍營和右掖營還為李家所用，中軍營的兵力抵得上兩個營，縱使魏嚴有五軍營中其餘二營的兵力和金吾衛、三千營助陣，但城下還有謝徵和唐培義這塊難啃的硬骨頭，三方勢力本是能勉強相互制衡的。\n但巨大的爆破聲一從皇宮內響起，幾十名中軍營的將士直接被炮火炸飛，所有人心中便明白，這場博弈，天平已徹底倒向了魏嚴。\n被李太傅收買的金吾衛內應早已被割喉，李太傅看著金吾衛統領從宮中拉出來的火炮軍械，指向魏嚴的手都已隱隱有些發顫：「你……你早把神機營的兵械轉移到了宮中？」\n大雪紛飛，魏嚴立在火光如熾的午門御道上，任憑冷風灌入廣袖獵獵作響：「不拋出神機營這個餌，如何引你們前去爭搶？」\n齊旻撐在城牆磚垛的手用力到骨節凸起，咬緊齒關，冷眼看著站在下方的魏嚴，神情陰鷙。\n唐培義等人面色也難看了起來，問謝徵：「侯爺，樊將軍去了西苑，會不會中了魏老賊的奸計？」\n謝徵沒作答，眼底翻滾著戾氣，忽地冷喝一聲，一掣韁繩，提戟徑直朝魏嚴殺了過去，戰馬掠過的疾風嗆了唐培義一口涼氣。\n他趕忙指揮身邊的部將跟上為其做掩護，又對賀修筠道：「賢侄，我同侯爺在此處與魏老賊耗，你快帶人去西苑助長玉！」\n賀修筠將一名騎將挑下馬背，束好的長髮都散落了一縷下來，顯得有些狼狽，他抽空回道：「魏嚴若真在西苑設下了天羅地網，再去多少人也於事無補，唯有拿下魏老賊，方可救樊將軍她們！」\n唐培義看著前方宛若殺神打得魏嚴身邊幾名將領節節敗退的謝徵，一拍馬臀道：「那我前去助侯爺！」\n斜刺裡一柄金鐧掃了過來，唐培義忙仰身幾乎平躺到馬背上才躲過那一擊，隨即令一枚重鐧也落了下來，直取唐培義腰腹，他連忙橫舉手中槍柄做擋，才接下了這一鐧，但兩手從虎口到整條手臂都陣陣發麻。\n「將軍！」\n賀修筠在不遠處瞧見了唐培義的困境，掛著白纓的槍頭在空中舞了個槍花，直刺向那人命門，對方抬鐧格擋，才讓唐培義借著這個間隙，趕緊催馬脫身，同賀修筠站到了一處。\n他朝著地上啐了一口，心有餘悸道：「娘的，這人是誰，老子從軍幾十載，可從未見過這號人物。」\n那人金鐧撥開賀修筠刺去的那一槍，反手又一鐧打在槍身上，賀修筠直接被連人帶馬震得後退了好幾步，他發麻的五指微張，重新握住槍柄，說：「是個狠茬兒。」\n對面的人只是笑：「賀敬元的兒子？你這身功夫比起你爹可差遠了。」\n賀修筠喝問：「你認得我爹？你究竟是何人？」\n那人冷淡道：「死人不需要記住我的名字，賀敬元那叛徒的兒子，更不配知曉我名諱。」\n賀修筠下頜肌咬緊，受激一夾馬腹提槍再次朝他衝殺了過去：「我父親一生為民，魏嚴的走狗有何資格評判他！待我宰了你，再殺魏嚴替我父親報仇！」\n對面的人只微微一偏頭，就躲過了賀修筠刺去的那一槍，金鐧往上一掄打在賀修筠手臂上，賀修筠頓時只覺自己手骨都要裂開了，悶哼出聲，對面再馭馬朝著他座下的戰馬重重一撞，同時又是一鐧打在賀修筠腹部。\n五臟六腑仿佛都在那一擊裡破開，賀修筠吐出一口血霧從馬背上倒飛了出去。\n「賢侄——」\n唐培義目眥欲裂，嘶吼一聲又朝著那人攻去，只是很快也被揮鐧劈下馬背。\n馬背上的人居高臨下看著唐培義和賀修筠，冷嘲道：「報仇？報什麼仇？當年若不是丞相從災民堆裡把他賀敬元撿回去，他還在雪地裡同野狗搶一碗餿粥，哪來今日的風光？」\n賀修筠捂著絞痛的腹部，含恨盯著他，艱難出聲：「這份……知遇之恩，我父親也用了大半生替魏嚴盡忠，他魏嚴……憑什麼殺我父親？」\n馬背上的人冷笑：「就憑賀敬元若還活著，那你賀家如今就不是加官進爵，而該闔府下詔獄！」\n他不願再廢話，揚鐧揮下欲直接取賀修筠性命，空氣中傳來一聲重兵相撞的悶響。\n一柄刻著窮奇紋的長戟截住了金鐧。\n那人抬首看向馬背上單手持戟截他兵刃的冷峻青年，咧嘴笑了起來：「小侯爺的武藝這些年倒是精進了不少，沒丟謝大將軍的臉。」\n再聽魏嚴的人提起謝臨山，謝徵眼底似藏了一柄冰刀，但他一個眼神都沒多給這人，只吩咐唐培義：「帶他走。」\n唐培義和賀修筠都已負了傷，深知留在此處幫不上什麼忙，便彼此攙扶著暫且往安全的地方退。\n那人收回被謝徵截下的那一鐧，活動了下手腕，含笑的一雙眼裡帶著刀鋒般凜冽的殺意：「魏勝不才，好歹當過幾年侯爺的武師傅，今日便向侯爺領教了。」\n他是跟在魏嚴身邊最老的那一批死士，很久以前就被賜予了魏姓。\n話落手中金鐧不知按動了什麼機關，竟由鐧變換成了九節金鞭，鐵鎖連著每一節金鞭，如毒蛇吐信般直直朝謝徵甩了過去。\n謝徵冷眼瞧著那黃金蟒一樣的金鞭逼近，都沒提戟去攔，只在快抵達面門時，才一側身躲過，同時出手如閃電，一把截住了那節金鞭。\n魏勝用力一扯，發現同謝徵角力相當時，也沒露出什麼詫異的神色，反而衝著謝徵笑了一笑。\n下一瞬，那金鞭交接處，橫生出許多金鉤倒刺，謝徵握著金鞭的那隻手，頓時鮮血淋漓。\n九節鞭在兵器中素有陰毒之名，不少人以此為暗器，魏勝用金鐧改良出來的九節鞭，更為甚之。\n他不以為然道：「在下教給侯爺的最後一課，便是規矩只用在守規矩的人身上，對於不守規矩的人，講規矩與道義，就是個笑話。」\n-\n城樓上，有著金吾衛的火器壓制，李太傅和齊旻手中的兩營人馬很快落了下風。\n齊旻的             content: `沈慎此時也帶著左掖營的人馬抵達,翻下馬背後喚了謝徵一聲：「九衡！」\n他氣息微喘，看了一眼當前的局勢，臉色有些難看地道：「神機營的火器沒在西苑！」\n他麾下的左掖軍在先後同神機營和李太傅派去的右掖軍交手後,已折損近半,此番趕過來支援謝徵，當真是把性命都豁出去了。\n「我知道。」\n謝徵起身,視線掠過滿地死屍和鮮血,同魏嚴對上。\n無法形容他那一刻的眼神，冰冷,平靜，又淡漠。\n天光大綻,呼嘯的北風捲起層層雪浪，東邊的雲靄裡透出的霞光給半座皇城都攏上一層金紅，他持戟立在那裡,濺著鮮血的半邊臉覆著朝霞的金輝，俊美如神祇，周身又縈繞著一股兇神鬼將的冷厲。\n魏嚴靜靜同他對視了一息,才看向他身後的左掖營兵馬，以大局在握的姿態淡聲問：「你以為多一個左掖營，就能扭轉今日的局面？」\n謝徵散漫抬起頭，冷嘲道：「扭不扭轉得了，總得試試才知道。」\n他淡淡笑了笑：「本侯倒是好奇，丞相連自己親子的性命都不屑一顧,又是在替哪個私生子爭這個位置？」\n魏嚴一雙蒼肅的鳳目瞬間浸上一層寒霜，斥罵道：「混帳！」\n謝徵那不達眼底的笑也變得極為冰冷，抬戟直指魏嚴：「你沒資格教訓本侯！」\n魏嚴似也是被謝徵氣狠了，竟沒直接讓自己身邊的死士出動,而是冷喝一聲：「取刀來！」\n底下人很快就抬來一柄長約八尺的偃月刀，刀身古樸，刀刃與刀柄交接處，鐫刻著發黑的青龍紋，乍一眼瞧上去，仿佛這刀上縈繞著一層黑氣，很是駭人。\n兩名小卒才能抬動的長刀，魏嚴竟然單手便提了起來，廣袖攬風，其氣魄竟半點不輸那些徵戰沙場的老將。\n遠處，賀修筠瞧見魏嚴單手提起偃月刀時，面上跟見了鬼似的，轉頭看向唐培義：「唐叔，魏嚴還會武？」\n唐培義神色有些微妙地道：「應該是會武的，早些年他同謝大將軍齊名，也是鎮守過北庭的。不過我入伍那會兒，賀大人都已在他手中獨當一面，他走了文官的路子，便也沒聽說過他會武的事。」\n那頭，魏嚴單手提起偃月刀後，蒼肅冷然地看向謝徵：「老夫既教出了你，便教訓得了你！」\n謝徵看著拖著長刀向自己奔來的人，立在原地沒動，眼底卻透出幾分帶著恨意的冷，捏著長戟的五指收攏時，被剮蹭掉一大塊皮肉的掌心溢出的鮮血將整個戟柄都染紅了一截。\n他從前同魏宣和新選拔進來的死士一起在魏勝手裡受教，也得過魏嚴指點。\n單從武藝上來說，他後來的打法很大程度上都受魏嚴的影響，魏嚴出招講究個一擊致命，從來沒有多餘的招式。\n偃月刀快直抵命門時，謝徵提戟狠狠撞了上去。\n刀刃和長戟兩側的戟刀銼出了火星子，魏嚴一個轉身，反手掄過去的刀刃又砍上了戟柄，謝徵踢出的鞭腿則撞上他做擋的手肘，地上的積雪都被鏟飛一片。\n招式之迅疾，幾乎已到了肉眼難以辨清的境地。\n兩人的較量都是直來直往，只比一個誰出招更快，下手更狠。\n魏、謝兩家的親衛各站在一邊，極為緊張地關注著戰況。\n唐培義在謝徵一戟險些掃到魏嚴脖頸時，便拍腿大喝道：「打得好！削這老賊！」\n邊上同魏勝纏鬥的樊長玉也發出一聲暴喝，那可摧金斷玉的一刀橫劈而下，哪怕魏勝及時撿回自己一根金鐧做擋了，還是被那巨大的力道震得後退了好幾步，虎口撕裂，狼狽至極。\n唐培義只覺先前受傷堵在胸膛的那口淤血都噎得沒那麼難受了，恨不能提刀自己上，大喊：「長玉侄女繼續劈他！」\n因情緒過於激動，還差點咳得嗆血，害得身邊的親衛好一陣緊張，賀修筠也抬手幫他拍背順氣。\n樊長玉手上那柄陌刀的重量可不輕，在那大力一劈之後，幾乎是沒力氣再繼續劈出第二刀的，但她就地一個旋身，刀借人勢，長嘯一聲竟就這麼又猛劈了下去。\n魏勝顧不得撕裂的虎口，繼續橫舉那根金鐧做擋，這次卻發出了一聲金屬斷裂的銳響。\n陌刀生生把那根改良後的金鐧劈做了兩截，若不是有兩名魏府死士齊齊躥出來，跪在地上用兩柄刀架住了陌刀的餘勢，魏勝能直接被樊長玉那一刀給劈成兩半。\n樊長玉劈完這一刀，也有些脫力了，拄著刀柄立在原地喘氣。\n謝十一帶著人在樊長玉身後，虎視眈眈盯著對面兩名魏府死士，大有他們敢繼續動手就奉陪到底的意思。\n魏勝吐出一口鮮血，被魏府的死士架起來時，還看著樊長玉：「魏祁林的種？」\n他掙脫死士的攙扶，用手背抹了一把嘴邊的血，說：「你倒是比你老子厲害些，丞相當初不該留你們姐妹性命。」\n樊長玉眼裡的兇性還沒退下去，冷冷盯著他道：「天網恢恢，疏而不漏，魏嚴欠我我爹娘，欠我外祖父和錦州慘死的那數萬將士的，總要還回來！」\n初陽自她身後升起，萬丈華光刺得人睜不開眼。\n魏勝聽她說起孟叔遠，突然就不再言語。\n另一邊，謝徵和魏嚴在數次交鋒後，魏嚴也慢慢出現了頹勢。\n他上了年歲，在這等純拼體力和耐力的打法下，身體終是吃不消了。\n謝徵出招反倒是越來越狠，長戟點槍花一樣在魏嚴左右戳刺，勢如遊龍，一挑一撥都是萬鈞之力，逼得魏嚴只能一邊後退一邊被動防守。\n魏府的死士想上前搭救，一時都尋不到間隙擠進去。\n謝徵似乎恨極，下頜骨繃得極緊，卻還冷冷笑開，眼底裡全是嘲意：「教訓？你替誰教訓？替我被你害死在錦州的爹？還是被你逼死的娘？」\n伴隨著最後一聲質問落下的，是他猛力的一擲。\n碎發掩映間，不知是不是被冷風吹的，他眼眶隱隱有些紅了。\n長戟深深扎入午門廣場上堅硬的花崗石，魏嚴就地狼狽一滾，才避開了那致命一戟。\n魏府豢養的死士忙扶起魏嚴，帶著他後退了數步，極為戒備地盯著謝徵。\n冷風嗆進肺腑，魏嚴被親信攙扶著，一陣撕心裂肺地咳嗽後，才抬眼看向謝徵：「匹夫之勇，老夫如今是逞不過你了，但今夜你要想靠匹夫之勇爭個高下，那便是個笑話！」\n話落，城樓上和城樓下的弓.弩手齊齊將弩.箭對準了謝徵一行人，金吾衛甚至拉出了幾門大炮架在了城臺處。\n沈慎臉色一變，當即指揮左掖營的弓箭手也紛紛拉滿弓弦，但到底人數懸殊，幾乎已是困獸之爭。\n魏嚴遠遠同謝徵對視著，恍惚間，那眼底有鐵血，但也透出了幾許滄桑。\n唐培義半躺在地上，同賀修筠道：「那老賊，氣煞我也！咱們若不是一直鎮守關外，在京中無甚經營，哪輪到他來說這等屁話！」\n賀修筠咳嗽兩聲，同有英雄末路之感，只道：「沈將軍真英雄也！」\n明知魏嚴有神機營的火器，還帶著殘兵前來相助，單是這份魄力，便已叫人心悅誠服。\n唐培義道：「今日真要死在這裡，黃泉路上全是英傑作伴，倒也快哉！」\n樊長玉看著城樓上那些黑洞洞的炮口和無數閃著寒光的箭矢，這一刻心底竟意外地平靜，她側頭看向了謝徵。\n初陽和城樓上的火光交織在他臉上，覆著鮮血和煙塵的痕跡，冷峻又剛毅，是她見過的他最好看的樣子。\n在發現西苑是魏嚴做的局後，她便已知道自己此番趕來會面對的是什麼。\n她不怕死，她只是不甘心，不甘心她們就這麼輸了！\n還有些……捨不得。\n老人們都說人死後要過奈何橋，喝了孟婆湯，把這輩子的一切都忘乾淨了才能去投胎的。\n她走過去並肩同謝徵站到一起時，目不斜視地將手心被鮮血濡透的一物交到了他手上。\n謝徵發現了，微偏過頭看她，但樊長玉沒再回頭，只輕聲說：「謝徵，你相信人會有下輩子嗎？」\n「我不信鬼神。」他的嗓音沉而緩。\n樊長玉依舊看著前方對峙的官兵，同他閒聊一般道：「我原也不信的，爹娘去世後，我又想信了。」\n她頓了頓，才嗓音極輕地說了一句：「要是真有來生，你來找我吧。」\n謝徵霍地側過頭，用一種只有他自己才懂的目光盯著樊長玉。\n雪後初霽的天，初升的日頭還不暖，清晨的風裡帶著硝煙和冰雪的味道，一切都靜下來後，只餘一側被炮火轟過的雁翅樓燃燒的聲音。\n在這片死寂裡，卻有心跳喧囂。\n他沒頭沒腦地說了句：「這老東西應該也沒後招了，那就不跟他耗了。」\n樊長玉還沒反應過來他那話裡的意思，一枚信號彈已從謝徵手中升向了高空。\n在場所有人都被他這突來之舉弄懵了一下。\n謝徵淡淡睨著魏嚴：「丞相高坐廟堂，玩弄權勢無出其二，在兵法上怕是還差了一籌。」\n遠處傳來沉悶的甲冑碰撞聲，浩浩蕩蕩好似海潮。\n眾人回首望去，便見打著「謝」字旗的大軍從午門外的幾條長街潮水一般湧向午門下方的廣場，立於城樓上的金吾衛們站得高，視野更為廣遠，瞧著那幾條長街望不到盡頭的軍隊，幾乎是瞬間就白了臉。\n這還是只是看得見的軍隊，堵在外城門那邊沒進城的不知還有多少，這可真是千軍萬馬了！\n沈慎轉憂為喜，看向謝徵：「九衡，你早有準備？」\n謝徵沒作答，但一襲錦繡白衣配雪白狐裘的俊雅男子搖著羽扇自軍隊中走了出來，見著謝徵第一句便是：「等了你半宿都沒等著你的信號，我還以為你在城內被一鍋端了呢！」\n隨即又執著羽扇對沈慎淺淺一拱手：「沈兄，真是好些年沒見了。」\n沈慎形容狼狽，此刻卻忍不住笑開：「公孫兄！」\n謝徵則淡淡掠公孫鄞一眼：「你是急著進城瞧熱鬧吧？」\n公孫鄞被謝徵回懟了也不生氣，又衝著樊長玉一拱手道：「樊將軍。」\n樊長玉又驚又喜：「公孫先生？您一直在城外？」\n唐培義和賀修筠等人也是震驚得無以復加。\n唐培義當即就哈哈笑開：「我就說咱們侯爺用兵如神，怎麼可能在魏嚴老賊手中吃敗仗！」\n他對著魏嚴喊話道：「老賊，趕緊讓你的人束手就擒吧！」\n賀修筠也在笑，只是他傷勢更重些，一笑便扯得五臟六腑都跟著痛，只能收著些笑。\n公孫鄞對著樊長玉淺淺頷首，見她臉上身上都是血，挑眉道：「看來昨夜城內打了場惡仗。」\n大軍還在潮水般朝著廣場下方湧，她們這頭談笑風生，城樓上的金吾衛和五軍營將士卻極不好過了，手上哪怕還拿著弓.弩，但都已面色惶惶。\n這不是人數上懸殊的問題了，一群只在京郊大營裡操練過的京兵，對上在西北戰場上飲過胡虜血的謝家軍，無需交鋒，只這般隔得遠遠的一個照面，就已被那下方那千軍萬馬迸出的殺氣所震懾住。\n跟著魏嚴的幾名幕僚也滿目悽惶，唯有魏嚴鎮定如初，透過人群靜靜看著謝徵的背影。\n謝徵面容冷毅，環視東西雁翅樓，沉聲發話：「隨李、魏二人造反的將士             content: `樊長玉記得她們回府那會兒,還是雪後初霽的天，一覺醒來，推開軒窗便見外邊又下起雪了。\n約莫是睡飽了,她除了身上還有些酸,倒是神清氣爽。\n肚子還有點餓。\n樊長玉熟門熟路地去那個箱籠裡找自己的衣物穿，但翻到底了也全是外袍,沒有配套的裡衣。\n散開的床帳被一隻肌理分明的手臂撩起,從胳膊到肩膀全是淡紅色的抓痕，肩頭隱約還有個牙印,男人剛醒來的嗓音裡著幾分低醇的沙啞：「不再睡會兒？」\n樊長玉實誠道：「餓了。」\n謝徵似乎低低笑了聲，披衣起身,腰腹上的肌肉塊壘分明，結實的肩背間淡紅色的抓痕更多些，他那一身甲冑,染的幾乎全是旁人的血，身上最重的傷，也就被刮掉了一塊皮肉的左掌了。\n之前混亂的記憶回籠,樊長玉低下頭沒敢繼續看，只聽見他說：「我命人傳飯。」\n樊長玉這才道：「你這裡有沒有備我的其他衣物？」\n謝徵回過頭看她。\n樊長玉說：「那箱籠裡只有外袍。」\n之前她落水溼透的中衣還能湊合穿，這回那一身衣物，早就被血水浸透了，樊長玉想湊合都沒法湊，眼下身上穿的這件,都是借的他的。\n謝徵道：「還沒備，先穿我的，回頭讓人送一身來。」\n樊長玉沒覺出什麼不對，想了想,似乎也只能這樣了，便點了頭。\n手腳麻利的婆子很快在外間布好了菜，樊長玉簡單洗漱一番後，連吃了三碗才停下來。\n雪天灰濛濛的，難辨時辰，飯後樊長玉看著謝徵房裡的沙漏，皺了皺眉道：「午時還沒過麼？」\n她們從宮裡回來那會兒，都辰時了，他後來還胡天胡地鬧了一通，樊長玉感覺自己這一覺睡了挺久的，才過了兩個時辰麼？\n謝徵正喝著茶，聽得她這麼一句，忽以手抵唇低咳了兩聲，清雋的臉上難得浮起一抹不自然：「這是初二了。」\n樊長玉睜著一雙黑白分明的大眼愣了兩息，反應過來後，瞬間黑了臉。\n這哪裡是才過了兩個時辰，這是一天一夜都過去了！\n李黨和魏黨伏誅，小皇帝不知所蹤，眼下諸事纏身，他竟也坐得住！\n謝十一抱著一摞文書來找謝徵，還沒到門口就聽見裡邊傳來乒桌球乓一陣大響，他硬著頭皮道：「主子，公孫先生說，這些奏疏需您過目。」\n「知道了，放在門口就是。」\n裡邊傳出的嗓音清冽依舊，就是氣息聽起來不太穩。\n謝十一耳朵尖通紅地放下東西走了。\n屋內，謝徵被樊長玉以腿鎖著脖頸壓在地上，望著她微微散開的衣襟，呼吸微沉地道：「祖宗，氣出了就起來吧，再不起來，今日便也不用起了。」\n樊長玉面紅耳赤，更用力地壓緊了他，瞪眼道：「你還胡說！」\n謝徵沒受傷的那隻手攥住她一隻腳，倏地發力，樊長玉只覺一陣天旋地轉，她就被反壓了回去。\n一隻手從她大開的領口探了進去，不輕不重地握了一下，這下樊長玉臉上是真燙得快冒煙，掙得也更厲害，怒斥道：「你……混蛋！」\n謝徵呼吸已經不太對勁兒了，他微低下頭看她，眸色漆黑一片：「更混蛋的事，不也做過了嗎？」\n「你！」樊長玉氣結，真正受制於人了，她倒也學會了戰略性示弱：「我……我還疼。」\n一雙明澈的大眼直往屋外瞟：「那個……十一也找你呢，朝中這麼多事，你不過目的嗎？」\n她又慫又不願認輸的心虛模樣，實在是招人疼，謝徵只覺從牙根處泛起一陣癢意，扣住她下顎從裡到外啃了一遍，才把人鬆開。\n得了自由，樊長玉立馬攏緊衣襟坐得遠遠的，像是惱又像是嫌丟人，說：「我不要穿你的衣物了，我要我自己的。」\n謝徵長臂一伸就將人攬了回來，埋首在她肩窩處悶笑：「好，都依你。」\n他的氣息噴灑在肩窩處有些癢，樊長玉面無表情地把他的臉推開了些，垂著眼角，唇角也抿得緊緊的，莫名有些氣悶。\n他說著都依她，但明明她才是被欺負的那個！\n-\n謝徵拿了謝十一放到門口的奏疏到房內細看時，樊長玉已從兵器庫翻出一把大刀去院子裡練武了。\n細雪紛紛，她在院中提著把大刀舞得獵獵生風，一劈一斬之間眼含煞氣，不知是把那漫天大雪當成了何人在砍。\n謝徵撐著手肘看了一會兒，眼底浮起幾許淡淡的笑意，垂眸繼續看手上的奏疏。\n看到其中一份時，他眉尾稍提，「嶺南節度使在這節骨眼上進京了？」\n樊長玉剛練完一套刀法，聞言撐著長刀回過頭問：「是魏嚴的後手？」\n謝徵搖頭：「探子說僅他一人進京。」\n恰在此時，謝十一匆匆進院來報：「主子，魏夫人求見。」\n謝徵微斂了眸色，只說：「把人請去前廳。」\n-\n須臾，謝徵便帶著樊長玉一道去了前廳。\n魏夫人一身縞素，見了謝徵，二話不說便跪下了。\n樊長玉不知謝徵是何心境，但她確實是被魏夫人這突來之舉嚇了一跳，回過神來時，謝徵已伸手去扶她：「舅母這是作何？」\n魏夫人不肯起，臉色格外蒼白，勉強帶了幾分笑意道：「侯爺莫要這般喚臣婦，臣婦擔不起的。」\n謝徵凝了眸色：「無論魏嚴做了什麼，我都視您為舅母。」\n魏夫人卻搖起了頭，神色有些悽楚地道：「臣婦的確擔不起侯爺這一聲舅母，臣婦只是得了相爺庇護，才在魏府偷生二十餘載，還養大了宣兒……」\n樊長玉聽出幾分不同尋常來，謝徵緩緩問：「這話是何意？」\n魏夫人滄然道出隱情：「臣婦原只是一小門小戶的庶出女，這輩子也高攀不上相爺的。家中安排臣婦給一位六品官老爺做填房，那官老爺，兒子都長臣婦好幾歲了……臣婦不願，同家中一護衛私定了終身，他為了攢銀子娶臣婦，從了軍。官老爺上門提親時，臣婦已有了三個月的身孕，家裡人知曉了這事，要抓臣婦去落胎，臣婦逃了出去，去軍營找宣兒他爹，可誰料宣兒他爹戰死了……」\n魏夫人說到這裡時，眼神幾乎是麻木的，卻還是有清淚從眼角滑落，她苦笑：「那時當真是萬念俱灰了，家裡人追去了軍營，說要抓臣婦回去浸豬籠，給官老爺家一個交代。臣婦便想著，左右都是一死，不若自我了結下去陪宣兒他爹好了。\n臣婦要撞柱，被人攔了下來，相爺認下了臣婦腹中的孩子，說不日便上門去提親，當日的事也被相爺壓下來了，至今都沒幾個人知曉。相爺說，宣兒他爹是他麾下的部將，他這輩子本是不會再娶妻的，但家中催得緊，正好臣婦帶著腹中的孩子也無路可走了，此為兩全之法。」\n「魏宣，不是魏嚴的兒子？」謝徵眼底翻湧著複雜的情緒。\n「不是。」魏夫人搖頭：「相爺是個守禮之人，這些年，相爺也只有未免宣兒叫府上下人看輕，才會在年節時，來臣婦院子裡用一頓飯。」\n她悽然看向謝徵：「臣婦今日前來，便是求侯爺的。相爺做的事，臣婦是個婦道人家，不甚清楚，但相爺對臣婦和宣兒都有再造之德，這份大恩，臣婦唯有盡力去還。還請侯爺看著宣兒替侯爺擋那一刀的份上，留相爺性命罷！」\n樊長玉驚訝不已，未料到魏夫人和魏嚴這樁婚事裡，還有這般多隱情。\n謝徵扶魏夫人起身的那隻手鬆了力道，他眼底看不出情緒，只問：「魏嚴……不娶妻，是為了淑妃？」\n魏夫人搖頭道：「這臣婦便不知了，但相爺那般性情的人，若真和淑妃有故，臣婦不信他能做出燒死淑妃和她腹中孩兒的事來。」\n樊長玉聽到此處，哪怕對魏嚴恨之入骨，但也覺著蹊蹺起來。\n齊旻說魏嚴是為了淑妃和淑妃肚子裡的孩子才設計錦州一案，害死太子和十六皇子的。\n魏嚴無子，後面既然還能血洗皇宮，把老皇帝趕下皇位，扶持一個毫無根基的稚子登基，有這等手腕，他為何還要燒死淑妃？\n她看向謝徵，謝徵對魏夫人道：「魏嚴的罪行，等查清後昭告於天下，自有發落，夫人先回去吧。」\n他話已說到了這份上，魏夫人也不好再求情，一叩首後，悽然退下了。\n樊長玉這才道：「魏嚴已伏法，我帶人去他府上搜查一番，看能不能搜出什麼。」\n謝徵說：「公孫已帶人搜過一遍，魏嚴行事謹慎，既決定了逼宮，也就做好了兵敗的準備，能毀的信件都燒了個乾淨，查不出什麼。」\n說到此處，他語氣稍頓，看向樊長玉：「老師入京後一直被他扣在府上，現已被接回了謝宅，晚些時候你可去看看他。」\n樊長玉又驚又喜：「義父找到了？」\n謝徵點頭。\n樊長玉便道：「那我現在就去看義父。」\n謝徵喚人帶樊長玉過去，樊長玉一進院，便聽見長寧拍桌子的聲音：「我要阿姐！」\n「你阿姐平叛去了。」是道蒼老但中氣十足的嗓音：「你這娃娃可別搗亂，存心幫那小子擾老夫的棋局呢！」\n樊長玉快步走到房門處，喚了聲：「寧娘。」\n把自己整個下巴擱在棋盤上的長寧幾乎是瞬間轉過頭來，鞋都顧不上穿，踩著一雙綾襪張開雙臂就蹬蹬蹬跑向了樊長玉：「阿姐，抱！」\n樊長玉單手就抱起了長寧，看向雖依舊瘦不拉幾，但似乎又一點苦頭都沒吃過的陶太傅，醞釀了一路的悲傷就這麼卡住了，最終只乾巴巴喚了聲：「義父。」\n陶太傅執著棋子淡淡「嗯」了聲，瞥樊長玉一眼，說：「聽說丫頭官至三品了，長進不少。」\n樊長玉覺得自己應該謙虛一下，便答：「都是義父教得好。」\n誰料陶太傅淡淡一撩眼皮，「老夫可沒教你多少，是那小子教的吧？」\n可能是因為酣睡了一天一夜的心虛，樊長玉愣是從臉紅到了耳朵尖，脖子根應該也是紅的，不過因為痕跡太多了，她戴了個兔毛圍脖擋了去。\n陶太傅也知道這是個憨閨女，麵皮又薄，想著她這老實的性子，往後少不得在那滑頭小子那裡吃虧，忍不住吹鬍子瞪眼：「他教了便教了，你有什麼不好意思的？且不說他日後還得八抬大轎從老夫這兒把你娶回去，但是他也是你師兄這點，教你便也是理所應當的事！」\n樊長玉一聽陶太傅訓話就下意識端坐挺直了背脊，鏗鏘回道：「義父教訓得是！」\n陶太傅這才舒坦了，緩和了語氣道：「來，坐下陪義父下盤棋。」\n被抓著下了大半天棋的俞寶兒微不可聞地鬆了口氣，趕緊給樊長玉騰了個位置：「長玉姑姑請。」\n樊長玉：「……」\n她絞盡腦汁想著下一步落子的地方時，陶太傅還在有一句沒一句地問她京中的局勢：「李家倒了，魏家那老東西也走到了這一步，那小子接下來要做什麼，你知道的吧？」\n樊長玉點頭，捏著白子本要落下了，卻又突然抬起頭來，問：「太傅，能問您一些關於魏嚴的事嗎？」\n陶太傅皺巴巴的眼皮稍抬：「替你自己問，還是替那小子問的？」\n樊長玉說：「替十七年前的真相問的。」\n陶太傅便笑了笑：「你啊你……」\n他將手中的棋子放回了棋簍裡，端起紅泥小爐上溫著的茶水倒一杯，捧起淺抿了一口，才看著窗外的飛雪道：「那臭小子，這會兒怕是去牢裡見魏嚴了吧。」\n樊長玉沒做聲，她先前就是感覺到謝徵似乎想單獨見見魏嚴，才在謝徵說陶太傅在府上後，提出想過來見陶太傅，讓他有時間單獨去見魏嚴一面。\n陶太傅緩緩道：「魏嚴無子，那臭小子教養在他膝下，還真是被他養得同他年輕時一模一樣，認準的事，十頭牛都拉不回來……」：，，.`

            title: `第160章第160章`,
            content: `謝徵性情上的倔強樊長玉是見識過的,但她對魏嚴了解不多，關於這位權相的一切都是道聽途說來的，僅有的一次見面,也是逼宮那晚。\n這甥舅二人像不像,她無從論斷。\n魏嚴給她的第一印象，倒是極符合他在世人口中的傳聞,冷酷無情,為達目的不折手段。\n不同於李太傅那等乍一眼看上去，蒼柏般清冷高潔的儒士風骨,魏嚴就是刀刃磐石般冷且硬的一個人，仿佛沒有任何軟肋。\n樊長玉在簟席間正襟危坐,遲疑道：「敢問義父，魏嚴和當年的淑妃……是否有故？」\n陶太傅撩起眼皮重新打量樊長玉：「為何這般問？」\n樊長玉便將之前冷宮宮女的招供以及齊旻的指控說了。\n陶太傅放下手中茶盞，皺巴巴的手摩挲著杯沿,眼底多了幾許歲月侵蝕的滄桑：「當年我不在京中，對宮裡所發生的事不甚清楚，但既是戚家那丫頭,魏嚴再狠的心腸，想來也做不出火燒清和宮的事。」\n見樊長玉面露惑色，他道：「淑妃本是戚家女兒，跟那臭小子的娘，還在閨中時，便是好友了。那時謝家也還沒有今日的風光,撐著整個大胤的，乃戚老將軍，魏嚴和臨山都在戚老將軍麾下磨礪過，後來戚老將軍作古,臨山撐起了西北的半邊天，魏嚴則棄武從了仕，戚家丫頭，便是那時候入宮的。」\n樊長玉眉心微攏，依陶太傅所言，魏嚴同淑妃，應當是年少便相識了，兩家關係似乎還頗好。\n有這層關係在，魏嚴後來都能血洗皇宮，還燒起淑妃，就更說不過去了。\n她在心裡估摸了一下淑妃的年紀，淑妃當跟自己爹娘同輩，承德太子也是跟自己爹娘同輩的，這麼算下來，那皇帝豈不是都老得能當淑妃她爹了？\n雖然知道那些稍微富貴點的老員外，都還會娶好幾房年輕美貌的小妾，但意識到這點後，樊長玉還是沒忍住皺了皺眉：「魏嚴若是有意淑妃，為何不在淑妃進宮前求娶？」\n陶太傅便長長地嘆了口氣：「你可知，承德太子生母是何人？」\n樊長玉搖頭。\n陶太傅道：「孝忠肅慈皇太后戚氏，乃戚老將軍的胞妹，淑妃的親姑姑。」\n樊長玉很是愣了一愣，也就是說，淑妃和承德太子都是表兄妹了？\n雖然歷朝歷代也不乏姑姑和侄女共事一夫的，但有承德太子和戚老將軍的前提在，她琢磨著，那時的戚皇后，兒子都已封了太子了，也不至於再讓娘家侄女再進宮幫自己固寵吧？\n大抵是她心裡想什麼全都寫在臉上了，陶太傅繼續道：「如今的朝堂是一池渾水，那時候也不見得多乾淨，這王朝的沉痾，都是一代一代積攢下來的，清了舊的，年月久了，又有新的附上去，就沒個能徹底清完的時候……」\n陶太傅又淺淺嘆了聲，似乎感懷頗多：「你們既然都查到賈貴妃身邊的宮女了，應當也知曉當年賈貴妃有多獲盛寵，滿朝文武，一半都快姓賈了。早些年，還有戚老將軍這國之一柱撐著，十六皇子再得寵，太子也能穩坐東宮，戚老將軍一去，皇后失了倚仗，太子的路便也難走了。\n坊間都罵貴妃惑主，外戚幹政，皇后在戚老將軍去後，也病榻纏綿，怕自己再一走，太子在後宮徹底沒了幫襯，便借著侍疾為由，將戚家那丫頭接進了宮。我是見過那丫頭的，自小便冰雪聰明，又飽讀詩書，生得沉魚落雁之姿。這一侍疾，就是一年。一年後，戚皇后薨，那丫頭歸家後不久，便隨秀女選入宮，封了妃。」\n樊長玉聽到此處，只餘沉默。\n淑妃進宮的緣由，比她想像中的更沉重。\n皇子們黨爭那是要流血要死人的，承德太子若敗了，戚家這一脈，是何下場還不得而知。\n整個家族的性命都壓在身上了，淑妃又哪裡有選擇的餘地？\n一個念頭飛快地在她腦中閃過，樊長玉忽地抬起頭來：「義父，魏嚴和謝大將軍都曾在軍中得過戚老將軍的提攜，後來也都擁護承德太子，淑妃在宮中，亦是幫著承德太子和賈貴妃母子抗衡。這樣一看，淑妃的死，和魏嚴被安上的那項與之私通的罪名，都很是蹊蹺！」\n陶太傅點頭：「若這一切真是賈家所為，魏嚴當年獨攬大權後，殺盡朝中賈姓朝臣，倒也不光是為肅清朝堂了。」\n他低低嘆了聲：「那臭小子當初認定魏嚴是錦州慘案背後的推手時，我便想著其中怕是還有什麼隱情，才親自上京來尋魏嚴。他那人如今是鐵石心腸了，可當年同臨山，那也是戰場上交付性命的兄弟，不然也不會把當眼珠子一樣疼的妹妹，許給臨山。」\n樊長玉聽得這些，又想起自己去謝氏陵園找謝徵時，他說的魏嚴從前每年都會獨自帶他去祭拜，不讓下人跟隨，一時間心緒複雜不已。\n她問：「宮裡發生的這些事，您後來有聽到什麼風聲嗎？」\n陶太傅隨和清淡的笑容裡多了些苦意：「丫頭啊，你可知錦州一破，北厥南下，這大胤河山亂了多久？儲君死，將帥亡，皇帝崩。那些蠻人，是想著藉此機會直搗京都啊！青山埋骨，江河飲血，民間十室九空……\n抵擋北厥繼續推進的前線戰場慘烈如斯，家國存亡之際，宮裡死了幾位妃嬪，亦不過蕩進這亂世血水中的幾粒微塵罷了。老夫的一雙兒女，亦是死在了戰亂之中，幸得敬元斂屍，才有一口薄棺一座墳塋。」\n樊長玉喉頭髮苦，羞愧低下頭去：「對不起，義父，我……」\n陶太傅擺擺手，只說：「都過去了，錦州失陷後，大胤和北厥陸陸續續還打了三年，國庫空虛，百姓因戰火四處遷移，荒廢了農田，民間也徵不上軍糧來……再打下去，異族還沒入京，大胤自個兒就要成一盤散沙了。魏嚴便是在這時站出來，一力促成了割地遼東十二郡換大胤二十年太平。\n那時我同他說，往後的史書裡，他此舉必是要被人戳著脊梁骨罵的，他答，亡國權相也是會被後世人唾罵的，左右都是罵了，不若趁關外的蠻子打了幾年，也耗盡物資了，讓地這二十載，賭一個將來。」\n樊長玉也是當了將軍的人，在軍營摸爬打滾多時，陶太傅這般一說，她便能明白當時是什麼局勢。\n錦州城破後，大胤如百足之蟲死而不僵，硬是還同北厥人耗了三年，這三年裡，必是還有無數和謝將軍、陶太傅一樣的忠骨擋在最前沿，才撐了這般久。\n但北厥已耗不住了，又不清楚大胤究竟還能撐多久，所以才同意了魏嚴讓出遼東十二郡，息戰二十年休養生息。\n大約北厥人那時也沒想到，用不了二十年，錦州就被曾經戰死在那裡的謝氏後人收復，遼東十二郡亦被奪回。\n聯想到魏嚴對謝徵的嚴苛，又請陶太傅當了謝徵的老師，樊長玉只覺自己愈發看不透魏嚴這個人了，他此舉，都不知是為了保住大胤，還是單純的只為了保住他自己的權勢。\n可他也的確給自己外祖父安了個遺臭千古的汙名，又殺了自己爹娘。\n樊長玉不由抿緊唇角：「義父，魏嚴……到底算是個好人，還是個惡人？」\n陶太傅複雜又寬厚得似能容納百川的目光靜靜地看著樊長玉，只說：「當時之人，只做當局之事，是非功過，且留與後人去評判吧。」\n樊長玉淺淺應了聲，垂眸看著眼前的棋局，捏著手中棋子久久都沒再說話。\n-\n從陶太傅那裡離開後，樊長玉把長寧和寶兒都帶去了趙大娘夫婦那裡，想著齊旻也跟著李太傅一起落網了，那找到俞淺淺應當也不是什麼難事。\n謝五保護趙大娘夫婦受了傷，她喚來謝七，讓他安排人手查俞淺淺的下落，謝七說公孫鄞已派人找到了俞淺淺，只是齊旻不知怎麼想的，沒把人帶來京城，反關在一處州府別院，去接俞淺淺的人回來還需個一兩日。\n不論如何，得知俞淺淺沒事，樊長玉心中便鬆了一口氣。\n當初她微末之際，俞淺淺幫她的那份情誼，她一直記著的，哪怕後來清平縣起了戰亂，她帶著俞寶兒南下逃命都還想著捎上自己和長寧，樊長玉如何不念著她的好？\n她同謝七打聽現下的局勢，得知李太傅是死透了，齊旻中了那一箭，卻還沒斷氣，公孫鄞也摸不準謝徵會如何處置這位承德太子的後人，便讓太醫先吊著他半條命。\n小皇帝也在魏嚴府上被找到了，但瘋瘋癲癲的，不知是真瘋了，還是裝瘋的。\n齊旻和李太傅逼宮前，讓欽天監官員放出的那番「龍脈逆亂、得位不正」的言論，如今倒是替寶兒做嫁衣了。\n現群臣為謝徵馬首是瞻，只需一個合適的時機，便可推俞寶兒上位。\n樊長玉想著尚還撲朔迷離的錦州真相，心口不由悶得慌，想著先回去練套刀法冷靜冷靜好了。\n一個不留神，卻撞上了一瘸一拐抱著一摞東西往謝徵書房去的謝忠。\n謝忠手上的盒子摔落在地，裡邊的東西也全散落了出來。\n「對不住，老伯。」樊長玉心虛不已，謝忠腿腳不便，她忙蹲下去幫忙把東西撿起來。\n謝忠原本神色還有些冷凝，見是樊長玉，才放下了警惕，緩聲道：「是老奴見將軍若有所思，沒敢出言打擾，腿腳又不靈敏，避讓不及才同將軍撞上了……」\n樊長玉本想寬慰這老伯這一二，卻在瞧清盒子裡掉出來的除了信件，還有三枚虎符時，當即變了眸色。\n那三枚虎符上，皆有崇州的小篆刻字，顯然都是崇州虎符。\n但為何會有三枚？\n虎符不是都只有左右兩枚的嗎？左符交與領兵的武將，右符留在皇帝手上。\n樊長玉的呼吸幾乎是瞬間就急促起來了，她將三枚虎符試著併攏時，手竟然止不住地有些發顫。\n左右兩半虎符很容易就合攏了，切口處對半的篆文都能完美地吻合上。\n多出來的那一枚，是左符！\n而她爹當年負責送的，是皇帝給的右符！\n隨府的管家說，長信王曾當著麾下部將的面合過她爹送去的虎符，虎符並不攏！\n所以並不是她爹送了假的虎符，而是隨家拿出來的是假符！\n這個認知讓樊長玉渾身的血仿佛都逆湧起來，她倏地抬首問謝忠：「這些東西是哪兒來的？」\n謝忠見她臉色極為難看，捏著虎符的手也大力到指節泛白，忙答道：「之前大理寺指控魏嚴的那謀士，後來翻供咬李家，還供出了隨家藏同李家來往書信的地點，侯爺先前就命人去搜取這些證物了，今日才快馬加鞭從崇州送回來。」\n樊長玉一聽，顧不得多解釋什麼，開始翻找那些信件：「老伯，我找些東西，回頭再同謝徵細說。」\n謝忠態度出乎意料地平和：「將軍想要什麼，盡可翻找，侯爺一早就交代過，府上的一切東西，將軍都是可以隨意取用的。」\n關乎揭開十七年錦州慘案真相的迫切，淡化了樊長玉在聽到這話時心底升起的那一絲異樣。\n但比較遺憾的是，那些信件中並沒有魏、隨兩家來往的。\n樊長玉盯著手上那三枚虎符看了兩息，起身道：「老伯，我暫借這幾枚虎符一用。」\n謝忠只道：「將軍儘管取用便是。」\n樊長玉拿著那三枚虎符徑直去找陶太傅。\n房門被踢開時，陶太傅剛給自己斟上一盞茶，那「哐當」一聲大響，驚得他手一抖，滿杯茶水溢出沾溼的衣袍，不由數落道：「你這丫頭，不前腳才離開麼，這般風風火火回來，又是什麼事……」\n樊長玉亮出三枚虎符：「義父，你瞧瞧，這虎符，是真是假！」\n陶太傅耷著的眼皮往上一抬，數落聲戛然而止，神色當即也凝重了起來：「拿與我瞧瞧。」\n樊長玉將虎符遞過去，陶太傅舉在眼前，借著窗口透進的亮光仔細觀摩一番後，道：「是崇州虎符，錯不了。」\n樊長玉垂在身側的手用力攥緊，微垂著頭，平靜的嗓音裡在竭力壓抑著什麼：「當年我爹送去的是真虎符，是隨家別有居心！」\n陶太傅皺巴巴的眉頭隆起：「這隨家倒也真是怪哉，要他出兵力挽狂瀾時，他不出兵，錦州城破後，倒又及時頂上去了。若當年錦州之失，罪責全在隨家，魏嚴那老東西何故替隨家隱瞞？」\n樊長玉轉身就往外走：「皇長孫……皇長孫還活著，他對隨家恨之入骨，或許知道些什麼！」\n陶太傅看著樊長玉疾步而去的背影，轉瞧向棋盤上的殘局時，淺嘆了聲：「老東西啊老東西，當真是倔了一輩子，什麼秘密能讓你死都要帶進棺材裡？」\n-\n暗沉的大牢裡，只餘天井處透下一束天光，細細的雪粒子洋洋灑灑地飄進來，在天井下方覆了薄薄一層。\n牢房盡頭鐵鏈作響，一雙錦靴踏著夾道青磚緩步而來，行至靠裡的一間牢房前方駐足，冷眼看著裡邊盤膝而坐身形挺拔的老者，不作言語。\n天牢寒氣重，覆在他大氅上的雪沫，竟也半點沒有化開的跡象。\n魏嚴掀開肅冷的鳳目，看著立於牢外即將撐起大胤脊梁的青年，平淡出聲：「成王敗寇，你既贏了我，今日來此處，總不至於只是想來看我過得如何。」\n謝徵只靜靜地看著他，神色冷漠又散漫：「丞相猜對了，本侯今日前來，就是想看看一個一輩子都在弄權的人，失了權勢後，得是何模樣。」\n魏嚴哂笑：「看來叫你失望了。」\n謝徵微偏了下頭，長發用金冠束得一絲不苟，遠處天井透下的亮光打在他側臉上，讓他五官的輪廓愈顯深邃，眼底噙著一絲徹骨的涼薄，最深處似乎又有其他東西，叫人瞧不真切：「倒也稱不上失望，丞相虺蜴為心，豺狼成性，怕也不記得做人該是何模樣了，連人都算不上的東西，本侯作何計較？」\n魏嚴眼底瞬間浮起一抹冷厲，不是單純的怒，還有幾分長者對小輩的厲色。\n謝徵半垂著鳳目看他，冷漠道：「怒了？丞相有何資格怒？或者說，丞相是想告訴本侯，你殺自己親妹妹親妹夫，是有苦衷的？」\n魏嚴面部肌肉繃緊，索性閉上了眼，不再接話。\n謝徵散漫繼續道：「你娶回府二十餘載的那位夫人來求我了，讓我留你性命。我才知你對魏宣的死無動於衷，是因他並非你的種。你殺我爹娘時也是這般無動於衷嗎？」\n他緩緩抬眸，嘴角笑意譏誚，嗓音裡卻全是冷冷的嘲意：「還是說，我娘也不是你親妹妹，一旦擋了你的路，就該被除掉？」\n言辭極盡尖銳，滿是冷嘲的鳳目中，卻藏了一絲極淡的猩意。\n「住口！」魏嚴忽地冷喝出聲，那雙和謝徵相似的鳳眼裡，恍惚間閃過一抹沉痛。\n謝徵猛地探身，一把重重揪住了魏嚴的衣領，迫得他整個人帶著枷鎖撞於牢門前，強壓於平靜之下的恨意衝破腦中那根名為理智的弦後，他神色間都透出幾分猙獰，朝著魏嚴冷厲吼道：「那你說啊，為何要殺我爹娘？讓我叫你二十餘載的舅舅，你配嗎！」\n魏嚴手上戴著鐵鐐，被謝徵這般大力揪拽之間，兩邊額角重重磕在牢房的木柱上，很快見了紅，但他眼神只陡然狠厲，說：「確如你所言，他們擋了我的道，所以他們該死。」\n最後二字，說得極為沉重。\n謝徵下頜骨咬得死緊，眼中都泛紅了，攥著魏嚴的那隻手，手背亦是青筋暴起，他用力扔開魏嚴，有些狼狽地起身，只咬牙切齒吐出三個字：「你說謊！」\n魏嚴摔回草垛間，慢慢喘息，聞言也不再作答。\n謝徵一掌重重拍在牢房堅實的木柱上，眼含恨意地盯著魏嚴：「你六親不認，一心弄權，如今權勢也沒有了，到底還在替誰隱瞞當年的真相？」\n魏嚴仍是不答。\n謝徵終是負氣疾步離去了，夾道盡頭的牢門撥開又重重被甩上時，發出「砰」一聲巨響，拴在上邊的鎖鏈也跟著譁啦作響，可見關門之人怒氣之盛。\n獄卒不敢多言，也不敢多問，撥弄著門上的鎖鏈，重新掛上了鎖頭。\n大雪未停，紛紛揚揚從在大牢切開一線白光的天井處慢慢飄下。\n魏嚴躺在乾草垛中，看著那飛雪交織在牢房晦暗的光線中，乾淨得不像是這天牢裡會有的東西。\n他閉上了眼睛。\n他的退路，早在十七年前就被封死了。\n縱是遺臭萬年，縱該千刀萬剮，他一人受著，便也夠了。\n那春雪般的人，就該乾乾淨淨地去，不在史書上留下任何一筆難堪的痕跡。：，，.`

            title: `第161章第161章（捉蟲）`,
            content: `如今整個皇宮都已在謝徵掌控之中,那夜逼宮暫且對外宣稱的，也是李太傅和魏嚴謀逆、皇帝受驚大病，相干人等皆已入獄,但具體的罪狀,還需皇帝「病好」再論。\n朝臣們心裡跟明鏡似的，出了宮宴上的那等荒唐之事,皇帝的「病」怕是好不了了,那把龍椅，想來也是要易主了。\n齊旻傷勢極重,被公孫鄞命人暫且安置在了一處行宮，裡裡外外都有重兵把守。\n當初為了搶神機營的火器,他派出了不少影衛中的精銳前去西苑，同樊長玉極左掖營惡戰一場後，那批影衛算是全折了,留在齊旻身邊的影衛，也在炮火和亂箭中為了掩護他死傷殆盡，僅存的幾名現被看押了起來。\n樊長玉踏進行宮時,便見一臉色蒼白的男子正半死不活地躺在床榻上咳嗽。\n樊長玉在此之前沒見過齊旻，只覺他大抵同小皇帝是叔侄的緣故，兩人瞧著竟有三分像，眉眼間都籠著一層沉沉鬱氣。\n對方發現了她，咳嗽完，倚著軟枕,說話有氣無力卻仍帶著譏誚：「雲麾將軍？真是稀客。」\n仿佛他不是一階下囚，還是那個即將登高位的承德太子後人。\n樊長玉不同他來虛與委蛇那一套，開門見山道：「十七年前的錦州血案，魏嚴和隨家究竟做了什麼？」\n為何隨家沒肯發兵援錦州,魏嚴這麼些年，哪怕隨家反了，都沒把隨家當年延誤戰機之失抖出來？\n齊旻垂眸淺笑：「自是……做了豬狗不如之事。」\n樊長玉冷喝：「說！」\n他嘴角揚起的弧度愈深了些，同樊長玉談起條件：「以血衣騎的敏銳，應當也找到我那侍妾的下落了，想知道魏嚴和隨家的勾當，可以，讓我見她一面。」\n樊長玉當即就道：「做夢！」\n她目光清凌凌的，冷得像凝了一層霜雪的刀鋒。\n這人當初未免俞寶兒落到她們手中，對俞寶兒一個孩子痛下殺手的事樊長玉還歷歷在目。\n俞淺淺好不容易才逃脫他的魔掌，她不會再讓俞淺淺見這個敗類。\n齊旻垂下眼眸：「那便……無可奉告。」\n樊長玉忽地拔出佩劍抵上了他咽喉，神情冰冷：「我可不是來同你談判的。」\n從軍營到朝堂摸爬打滾的這些時日，足夠她學會怎麼狠顏厲色去威脅一個人。\n齊旻卻只是淺笑：「孤既落到了你們手上，左右不過一死，雲麾將軍若只想要孤這條性命，大可動手了。」\n他開始稱孤道寡，哪怕滿身狼狽，也從骨子裡溢出股驕矜來，似在告訴樊長玉，那便徹底沒得談了。\n樊長玉持劍同他僵持了兩息，劍鋒都劃破了他頸側一層薄皮，溢出了血珠子，他神色間亦沒有半分懼色。\n樊長玉狠狠一皺眉，終是收了劍，抿緊唇角一言不發離開了行宮。\n-\n她前腳剛踏出宮門，便見一人從行宮外的漢白玉石階拾階而上，描金織錦的大氅上落了不少雪粒子，面若冷玉，眸似點漆。\n樊長玉微微一怔，「你怎來了？」\n見到她，謝徵眼底的寒意才化開了些，見她只著單薄軟甲，徑直將肩頭的大氅扯下披到了她身上，「進宮查些事情，聽說你來了行宮，過來看看。」\n大氅上還帶著他的體溫和他身上冰雪般凜冽的味道，樊長玉身量不及他高，整個人都快被攏了進去，只餘一張明豔的臉和高高束起的長髮露在外邊，頗像偷穿了長兄衣物的小小少年，眉目清朗，卻不失英氣。\n她抬手撥了撥，並肩同謝徵步下臺階，將隨家偽造虎符故意不出兵的事說了，「我想著皇長孫或許知曉些什麼，過來問話，他提出要見淺淺才肯說。」\n一聽隨家偽造虎符，謝徵眼底瞬息又染上了霜色：「冷宮的那宮女三日前也死了。」\n從魏嚴口中問不出話來，出了天牢，他便又著手從他和淑妃的事上去查了。\n樊長玉並不意外：「皇帝動的手？」\n算算時間，那宮女正是在除夕夜之後死的。\n謝徵卻搖頭：「我審了齊昇身邊的太監，冷宮陷害失敗後，齊昇連夜去找魏嚴尋求庇護，那宮女，便是他威脅魏嚴保他的籌碼，他不會蠢到自毀這張保命符。」\n樊長玉看向他：「是魏嚴？」\n謝徵沒再做聲，顯然是默認了。\n樊長玉百思不得其解，「魏嚴在李太傅逼宮前就殺了那宮女，是怕他自己的醜聞叫李太傅知道？還是不願有任何把柄落於旁人手中？」\n謝徵望著覆在遠處宮牆上的白雪，只說：「他這人一貫心狠手辣，既逼得李家走投無路只能逼宮，得知宮中還有個隱患，必然也不會再留。」\n樊長玉回想起李太傅說的魏嚴妹妹在閨中時同淑妃交好，魏嚴又曾在戚老將軍麾下，那魏嚴和淑妃在各自婚嫁前，肯定也已相識了。加上魏嚴只取了個有名無實的夫人，魏嚴和淑妃的關係便愈發顯得微妙了起來。\n她遲疑道：「那魏嚴同淑妃有染的事，八成是真的了？」\n若是假的，魏嚴何故在控制住小皇帝後，還要滅那宮女的口？\n謝徵沉默依舊，不急不緩地於大雪中邁步前行，沒了大氅遮擋風雪，恍惚間他冷硬的身形也透出了幾分單薄，一如曾經那個失怙的稚子，好一陣，才用不以為意的語氣道：「或許真如齊旻所言，他就是禍亂後宮，圖謀帝位，才設計了錦州之失。」\n樊長玉側頭看他一眼，忽地停住了腳步。\n「怎了？」\n謝徵回頭看她，細雪落了他滿肩，玄黑織金的蟠龍蟒袍襯得他面若霜雪。\n樊長玉突然抬臂用力抱了他一下，嗓音發悶，卻很堅定：「往後的路，我陪你走。」\n他將情緒藏得極好，但那一剎那，樊長玉還是察覺到了他的不對勁兒。\n是了，魏嚴再惡貫滿盈，卻也是他叫了二十餘載的舅舅，是他在這世間唯一的親人。\n可這唯一的親人，又是害死他爹娘的兇手。\n他怎麼會不難過呢？他只是……不知道怎麼難過了吧？\n謝徵垂眸靜靜看著懷中姑娘烏黑的發頂，她撞進他懷中的力道不大，卻讓他心口也跟著顫了一下，酥麻和淡淡的痛意裹挾著那股顫意一直傳到了指尖。\n他僵了好一會兒，才抬手貼著大氅按住她後背，將人完全納入自己懷中，半垂的長睫上沾了細小的雪沫子，執拗又認真地道：「自然，你跑不掉的。」\n大雪如絮，兩人並肩繼續往回走。\n-\n從宮女那裡打聽關於淑妃的事無望後，樊長玉替謝徵去拜訪了一趟安太妃。\n應該說，謝徵一開始讓公孫鄞牽線長公主查十六皇子的事，真正想接洽的，便是安太妃。\n皇宮的宮人雖換過一批又一批了，安太妃卻是一位從十七年前的獨善其身至今的宮妃，對當年的事，她所知道的，必然也比普通宮人多些。\n許是眼下局勢已明朗，樊長玉此番拜訪，說明來意後，安太妃倒是半點沒有推搪。\n「哀家同淑妃，也算是閨閣時便相識了，時至今日，哀家還是更喜喚她容音。」\n殿門幽閉，小佛堂裡光線暗沉。\n安太妃一身禪衣，點好香後，用那雙保養得宜的縴手執了錯金鏤空雕花的博山爐蓋放回去，絲絲縷縷的青煙便從孔隙中溢了出來，慢悠悠浮上佛堂上空。\n她頓了頓，神情似有一瞬間的悵然：「她也喜歡哀家喚她閨名的。」\n樊長玉端坐於矮几另一頭，暗暗記下了淑妃閨名戚容音。\n心想倒是個極好聽的名字。\n淑妃回到矮几前，施施然坐下，舉手抬足間都透著一股歲月沉澱下來後的淡雅從容：「哀家同她是一道進宮的，因著戚太后的緣故，她進宮便封了妃位，哀家只封了婕妤。那會兒賈貴太妃正得盛寵，得了先帝垂青的妃嬪，都在賈貴太妃那裡吃過苦頭，她替哀家解過一回圍，一來二去，再因著從前閨中便相識的那點情誼，我們倒也相熟了。」\n水聲清越，安太妃將斟好的一盞茶推至樊長玉跟前，像是陷入了什麼回憶裡，淺笑了一聲。\n「容音是個性子極淡的人，都不像是為了戚家的榮辱進宮來爭寵的。但也正是那與世無爭的性子，倒讓先帝恨不能把什麼都捧給她，讓賈貴太妃嫉恨了好一陣。」\n安太妃笑著笑著，卻又搖了搖頭：「或許也同性情無關，畢竟世間哪有男子見了她那樣的美人不動心的？不笑時冷若幽曇，笑起來又燦若芙蕖。那時京中的美男子裡有魏嚴和謝大將軍這文武雙壁，美人裡也有容音和魏綰這雙姝。」\n樊長玉知道，魏綰就是謝徵的娘。\n可能是安太妃的嗓音清淡又有種穿透了光陰的滄桑，她只顧聽這段往事去了，捧著茶盞，卻一口都沒喝過。\n「在宮裡，容音總不太開心的，不論先帝賞了什麼，都難博她一笑。她喜歡登高，摘星樓是她常去的地方，有時在那裡一站就是一上午，後來不知何故，先帝命人拆了摘星樓，還冷落了容音好一段時間。」\n「哀家問容音總去樓上看什麼，她說她想家了。」\n安太妃給自己也沏了一杯茶，淺飲一口後，仍是笑，只是帶著些年華蹉跎的哀傷：「哀家不知她這話真假，但她入宮的第二年，魏嚴成了親，年底便得了一子。那年的除夕宮宴先帝本是要帶她去見群臣的，可她病了，最終還是賈貴太妃隨先帝同去的。賈貴太妃以為容音這是在示弱，又好生神氣了一陣，那段時日，宮裡倒是太平了不少。」\n樊長玉已經隱隱猜到什麼了，問：「淑妃的死，當真和魏嚴有關嗎？」：，，.`

            num: 162,
            title: `第162章第162章`,
            content: `大抵是樊長玉問得太直白,那個問題又太沉重。\n安太妃嘴角笑意漸收，怔了好一會兒，才搖頭說：「哀家不知。」\n這個回答讓樊長玉愣了一下,卻聽安太妃繼續道：「啟順十六年初冬,錦州戰事吃緊，一直欲同太子爭位的十六又在羅城闖了禍事,儘管賈貴太妃那邊瞞得緊,但天底下哪有不透風的牆，哀家還是聽到了些風聲。」\n她看向樊長玉：「十六闖的禍,你知曉嗎？」\n樊長玉點了頭。\n若非十六皇子好大喜功被困羅城，她外祖父當年也不會陷入那兩難之境。\n安太妃幽幽道：「先帝在前朝是如何安排的,哀家在後宮不得知曉，但想來他總不會放任十六不管的，那段時日賈貴太妃也消停了許多,先帝似想冷著她，也不去她宮裡了，常去的便是容音那兒。」\n「那時,哀家也以為，經過此事，賈貴太妃和十六都得失寵了，待太子從錦州得勝歸來，這儲君之位，十六還能拿什麼去同他爭。」\n「可容音突然被診出了喜脈。」安太妃說到此處頓了頓,不知是覺著當年的事荒謬，還是因為其他的，她捻著念珠的手都慢了一拍：「整個太醫院的太醫都被叫去診脈，斷出的月份卻還是和敬事房的侍寢冊子對不上。」\n樊長玉猛地抬眸。\n安太妃眼底也有了哀色：「容音有孕三個月,往前推日子，得是在中秋前後就有的。那年的中秋宴上，的確發生過一件事，魏嚴在宮宴上喝多了，在太液池水榭酒後亂性了一宮婢，不巧叫前去賞月的先帝和朝臣們撞了個正著，據聞先帝當時的臉色極不好看，但左右不過一宮婢，又不好發作，便將那宮婢賜與魏嚴了。」\n樊長玉瞬間就想到了謝徵在除夕夜被小皇帝設計的事。\n她眉心攏起：「魏嚴這是被人算計了？」\n不然怎就這般巧，先帝正好帶著朝臣過去了。\n淑妃腹中的孩子月份又不對，那麼當初同魏嚴酒後亂性的根本不是宮女，極有可能就是淑妃了。\n安太妃只是嘆息：「哀家又哪能知曉呢？但容音無疑是犯了聖怒，整個清源宮的下人都被杖殺了，也沒能拷問出什麼來，容音被幽禁於清源宮，每日都有嬤嬤前去拷問她……究竟是同誰有染。臘八夜裡，清源宮突然走水，巡邏的金吾衛前去救火，便在清源宮附近發現了魏嚴。」\n樊長玉錯愣道：「真是魏嚴放火燒了淑妃？」\n安太妃說：「那時宮裡都是這般傳的，哀家同容音相知一場，聽到消息趕去清源宮時，火勢已大得進不去人了。」\n樊長玉聽出安太妃嗓音啞了下來，一抬頭便見她眼角墜下一滴晶瑩。\n她聲音微微發抖：「你見過救火的水潑進火裡，火舌還舔得更高的嗎？」\n她說：「哀家見過，那大火裡，全是桐油味兒。」\n樊長玉擰眉：「燒死淑妃的，是先帝？」\n安太妃拿起帕子拭淚，勉強維持著聲線裡那一絲平靜：「哀家沒能見到淑妃最後一面，她如何去的，哀家沒法給將軍一個準確的答覆，但她的清源宮……的確是救火的金吾衛潑了桐油。」\n「黎明時分，宮城被圍，廝殺聲震天，哀家緊閉壽陽宮大門方倖免於難。那日整個護城河的水，都被染紅了，太和門前的漢白玉石階，此後接連一月都洗不去血腥氣。宮裡的人都被換了一遭，先帝和賈太貴妃相繼悲慟過度離世，那日黎明前整個皇宮的廝殺，似乎真只在哀家一人的記憶裡了，真跟場夢似的……」\n香爐裡的薰香在佛堂上方嫋嫋縈繞，佛案上供奉著的白玉觀音似乎也更多了一份慈悲。\n樊長玉心情複雜地起身向安太妃一抱拳：「多謝太妃娘娘告知這段往事。」\n-\n走出小佛堂，樊長玉深吸一口風雪中清新而冷冽的空氣，看著落於宮牆上方的雀鳥出了一會兒神。\n魏嚴身上的謎團越來越複雜了。\n他當初奉命前去調兵，卻又在半道把這重任交與了她父親，自己折身回了京城。\n是因為他那時便已同長信王勾結，做好了讓錦州失陷的準備，提前回京也是為了控制京中局勢嗎？\n若當真如此，以他的城府，也不該沉不住氣，夜探淑妃的清源宮。\n更奇怪的一點是，如果他是怕淑妃供出自己，前去殺了淑妃滅口的，為何先帝又命金吾衛給淑妃的宮殿潑了桐油？\n樊長玉狠狠皺了皺眉，想到安太妃說，魏嚴曾在中秋宴上喝多，酒後亂性了一宮女，被先帝帶著朝臣撞了個正著，便愈發覺著，那次應當也是先帝算計的魏嚴。\n魏嚴夜探清源宮這次，就是讓先帝逮到現行的了，奈何魏嚴武藝高跑了，先帝才惱羞成怒燒死淑妃洩憤，再把最罪名栽贓到魏嚴身上？\n隨後魏嚴為了自保，才發動的宮變？\n樊長玉揣著滿腹疑惑正去文淵閣找謝徵，還沒走出壽陽宮，便聽得後方有人喚自己：「樊將軍請留步！」\n樊長玉回頭，就見一盛裝打扮的宮裝美人朝自己走來，身上織金繡錦的繁複宮裳上繡著花，髮髻上簪著花，她自己也豔麗得像朵牡丹，腳下步子邁得極快，頭上的流蘇步搖卻只小弧度輕晃，自有一份優雅和矜貴。\n樊長玉猜測這應該就是長公主了，抱拳道：「見過公主。」\n齊姝忙說：「將軍不必多禮。」\n她將一方錦盒遞與樊長玉：「冒昧叫住將軍，是想託將軍將此物轉交與公孫先生。」\n樊長玉接過只覺略輕，也不知裡邊是何物，想著應是宮裡同宮外傳信遞物不便，長公主才託自己的，當即就道：「末將一定轉交到公孫先生手上。」\n「多謝將軍。」齊姝朝著她略一福身，轉身之際，又看了她手上的盒子一眼，眼底似藏了一份黯然。\n樊長玉覺著有些奇怪，又打量了一眼手上的錦盒，才收進懷中，朝文淵閣去。\n-\n謝徵以小皇帝受驚染疾為由，推了這幾日的早朝，但朝臣們奏上來的一些奏疏，公孫鄞幫忙篩選過後，要緊的還是得拿與他決斷。\n樊長玉還沒進殿，便聽見公孫鄞的牢騷聲：「三省六部都在催了結魏嚴一案，瞧瞧這老賊的口供，他當這是玩呢？」\n他越說越氣憤，直接將一份口供拍在了謝徵跟前，大冷天的氣得直搖扇：「延誤軍機致錦州失陷，他說是怕被問罪，所以直接血洗了皇宮，把控大權後，篡改諭令，將所有罪責都推到了孟老將軍身上。你就說說，這份口供放出去誰信？他延誤了戰機，他人也得是在去錦州的路上啊，怎就去了京城？」\n謝徵執筆繼續在案間書寫著什麼，不動如山。\n公孫鄞從懷裡掏出第二張，繼續拍到案上：「嘮，這是我問他為何提前回京後，他重新招供的，這下改口了，承認錦州血案是他一手設計的，理由是他同承德太子政見不合，他為了獨攬大權，做出一番鴻圖霸業，故意給了魏祁林假的崇州虎符……」\n樊長玉心知這狀紙八成又是魏嚴胡認的罪狀了，她爹帶去的虎符是真的。\n她抬腳進去：「穢亂宮闈這樁罪，魏嚴認了？」\n「樊將軍回來了？」公孫鄞朝門口看了一眼，笑著同樊長玉打了個招呼才答道：「沒認，甚至絕口不提此事……」\n一直伏案批紅的人在樊長玉進殿後才抬起頭來，替她拉開了一把椅子，樊長玉再自然不過地在他邊上坐下。\n公孫鄞純當沒瞧見，繼續道：「說來也是怪哉，這麼多樁千古大罪，他做過的沒做過的，全眼都不眨地認下來了，獨獨這淫.亂之罪，他一直規避……」\n茶盅輕響，謝徵又沏了杯茶遞過去，「外邊風雪大，喝杯茶暖暖身子。」\n樊長玉確實渴了，捧起仰頭就開始灌。\n公孫鄞嘴角微抽，他同這廝相識多少年了，就沒見他主動給誰端茶倒水過。\n他勉強忍了，接著分析：「落到齊昇手中的那冷宮宮女，既也是魏嚴殺的，我倒覺著魏嚴同淑妃有染的事是真的了，只是他一直在掩蓋此事……」\n「離飯點還早，若餓這裡有些點心可先墊墊。」對面清冽的嗓音再次低低響起。\n公孫鄞眼睜睜地看著那不苟言笑的人，從身後拖出一個食盒，從裡邊端出碟糕點遞給樊長玉時，終於忍不住了。\n樊長玉剛接過，便聽得一聲大響。\n回頭就見公孫鄞起身兩手撐在案前，額角的青筋猛跳了兩下，「謝九衡，你夠了！」\n樊長玉愣了一下，從糕點盤子裡拿了一塊給自己後，把整個盤子推向了公孫鄞，一雙杏眼老實巴交。\n意思很明顯：給你吃。\n公孫鄞差點給氣厥過去。\n偏謝徵還在此時涼薄出聲：「不必管他。」\n公孫鄞忍不住咆哮：「謝九衡，有你求我的時候！我說了半天……」\n謝徵打斷他的話：「淑妃是戚家後人，魏嚴曾受過戚老將軍教誨。」\n公孫鄞怒氣一滯，腦子裡斷掉的思緒瞬間接上了：「所以魏嚴掩蓋此事，是怕汙了戚家的名聲？」\n畢竟戚老將軍和幾個兒子全都戰死了，戚家擔得起滿門忠烈四字，承德太子也一身戚家人的風骨，百姓對其擁護有加。\n這樣的忠烈之門，若出了個水.性楊花的妃子，的確是有辱門風。\n樊長玉想了想說：「我倒覺著，魏嚴是為了淑妃的名聲。他同淑妃有故，他犯下的又是遺臭萬年的大罪，承認同淑妃有染，不過是讓淑妃也跟著他被後世繼續唾罵罷了。」\n歷朝歷代那些輾轉於君王和臣子之間的妃子，迄今都還豔名遠播，野史間的描述更是不堪入目，甚至會成為潑皮癟三們茶餘飯後的談資。\n尋常女子但凡同這等浮浪豔名挨上一點邊，都唯有投河自盡以全清白了。\n公孫鄞重新坐了回去，只說：「若真是如此，倒也是奇了，魏嚴那等鐵石心腸之人，會為個女人做到這份上？」\n樊長玉便將從安太妃那裡聽來的事同二人說了。\n謝徵和公孫鄞聽完後具是沉默。\n樊長玉說：「先帝若曾設計過魏嚴，淑妃的死和那場逼宮，只怕也有蹊蹺了。只是有一處我尚想不通，魏嚴連淑妃死後都還要顧及她的名聲，當年他夜探清源宮被禁軍發現，何故又扔下淑妃獨自逃了？」\n謝徵不語。\n公孫鄞揉了揉眉心：「總不能是魏嚴那老賊當年知道救不走淑妃，又不願同淑妃一道赴死才逃了，這些年已嘗夠了權勢的滋味，對淑妃心生愧疚，才想彌補一二？」\n樊長玉也沒再接話。\n若真是公孫鄞說的這般，那如今魏嚴不願讓淑妃沾上半分汙名之舉，倒也顯得可笑了。\n「依我之見，這案子要不就這麼結了吧。」公孫鄞突然道。\n樊長玉和謝徵具不言語。\n公孫鄞用扇柄敲了敲桌面：「錦州血案的元兇，左右逃不脫魏嚴和隋拓這二人，隨家死絕了，魏嚴也已伏法，他安給孟老將軍的汙名能被洗雪，他再一死，他欠下的那些人命，便也算償清了，這如何不是給當年錦州枉死的將士們和天下人的一個交代？」\n樊長玉和謝徵還是不說話，公孫鄞便道：「撬不開魏嚴的嘴，總不能就這麼一直拖著，新君……也得準備即位了不是？」\n又是一陣沉默後，才響起一道沉緩而堅定的嗓音：「不能結案。」\n公孫鄞抬頭看去，謝徵也微微側目。\n天光從半開的軒窗照進殿內，澄明透亮，年輕的女將軍一身軟甲端坐於蒲團上，微垂著長睫，眉目剛烈，一身英氣。\n公孫鄞問：「為何？」\n樊長玉抬起頭來，映著曦光的眼浩瀚得像是一片泛著光的海：「我們都坐到這個位置了，不該做此糊塗結案。七品縣令府衙的公堂上，尚掛『明鏡高懸』的匾額，要的就是一份公理和公正。魏嚴害我爹娘，毀我外祖父清名，我恨他入骨，他作惡多端，也的確該死，但不應是這等糊塗死法。」\n她目光堅毅：「錦州血案，需要一個真相，真正的真相。」\n不是稀裡糊塗的，魏嚴死了，當年的事便算是有仇報仇，有怨報怨。\n魏嚴一死，才是讓當年的真相永遠地埋沒。\n公孫鄞眼中最後一絲散漫也收了起來，用一種從所有過的認真目光打量樊長玉。\n眼前的姑娘，還是從前那般孤勇赤誠的模樣，只是如今那份赤誠與勇毅裡，又多了另一種厚重的東西，不同於高山巍峨，卻更為廣博，好似這腳下厚土，綿亙不絕。\n也只有在這樣的厚土中，才能孕育出拔地而起的雄峰。\n這個認知讓公孫鄞怔了許久，直至謝徵出聲他方回過神來。\n「錦州之案，繼續查下去。新君即位的事，先著手準備吧。」前一句是對樊長玉說的，後一句，則是對公孫鄞說的。\n公孫鄞應允，起身時，卻又朝著樊長玉鄭重一揖：「鄞為先前之言慚愧。」\n他這般，倒讓樊長玉一下子又有些無地是從，道：「公孫先生也是為時局考慮。」\n她將齊姝拿與他的那錦盒遞給公孫：「對了險些忘了長公主託付之事，這個盒子，長公主讓我轉交與先生。」\n公孫鄞拿到這個盒子時，眸色微斂了一下，問：「公主可還有什麼話託樊將軍一併轉述的？」\n樊長玉如實道：「沒有了。」\n「這樣啊，如此，便謝過樊將軍了。」公孫鄞笑了笑，但笑意似不如從前灑脫了。\n公孫鄞先行離去後，樊長玉還同謝徵議論：「你有沒有覺著，公孫先生拿到那個錦盒後，怪怪的？」\n謝徵從身後擁她入懷：「他躲了長公主這麼多年，長公主的年紀，卻容不得她再等了。」\n樊長玉尚沒弄明白他這句似是而非的話，便感覺肩頭一沉，是謝徵將下顎抵在了她肩窩處。\n「謝謝。」他嗓音沉啞。\n魏嚴死了，他大抵就永遠都不知道，自己爹究竟是因何而死。\n父母之仇，孟氏之冤，她又如何不恨魏嚴呢？魏嚴一死，她就是真正的大仇得報。\n但是她拒絕了公孫鄞的提議。\n樊長玉偏過頭衝他笑笑：「謝大將軍和承德太子的枉死需要一個真相，死在錦州的萬千將士也是。」\n她掌心覆上了他攬在自己腰間的手，眼神純粹誠摯如初：「我們一起找，總能找到的。」\n-\n事情的轉機在俞淺淺進京之後。\n樊長玉本沒在俞淺淺跟前提過關於齊旻的事，但她和謝徵大費周章地查魏嚴查隨家，俞淺淺終究是聽到了風聲。\n國不可一日無君，謝徵同唐培義他們商議推舉俞寶兒上位的事時，不可避免的還要面對一個問題：齊旻迄今還吊著半條命。\n究竟給這位皇長孫一個什麼死法。\n雖說俞寶兒還小，同齊旻也沒半點父子情分，但唐培義他們還是不贊同謝徵直接殺齊旻，言父子天性，擔心俞寶兒將來受人挑唆，留下隱患。\n樊長玉不怕這個，直言：「我去殺，那孩子是個明事理的，知道自己生父並非善類。退一萬步講，便是他將來記恨，當初齊旻要殺他，也是我從刀口下把他救回來的。我不怕那孩子恨我。」\n謝徵不動聲色捏住了她的手腕，示意她不要再爭。\n「我去。」他語氣很淡低重複了一遍，不是徵詢意見，只是交代。\n唐培義還想再勸，門口卻忽地傳來一句：「侯爺，諸位將軍，妾身可去。」\n眾人舉目望去，便見一娉婷女子推門進來。\n樊長玉一驚：「淺淺，你怎過來了？」\n其餘將領和幕僚同俞淺淺不相熟，對這位準太后，面上多是恭敬。\n俞淺淺看著樊長玉，說：「我知你是為我好，我和寶兒已欠你和侯爺諸多，殺齊旻，便讓我去吧。既除了他，又能問出隨家和魏嚴的勾結，只利無害。」\n樊長玉再多勸阻的話，便也都被俞淺淺這番話給堵了回去。\n她最終只看著俞淺淺道：「那我陪你去。」：，，.`

            title: `第163章第163章`,
            content: `難得不是個雪天,日頭燻暖。\n樊長玉抱劍站在行宮殿門外，看院牆外頭恣意伸展的枯樹枝丫，暖陽斜照著這邊,遠處的牆頭和枯枝上積著一層白雪,陽光灑下來，便也暈開一層淡淡的金色,空氣卻仍溼冷得厲害。\n俞淺淺端著湯盅走進了內殿。\n齊旻似知道她今日要來,因傷勢下不得地，便只靠坐在榻上,肩頭披著件絳紫帶銀灰的外袍，在窗前的明光下,那衣裳上的銀灰隱約顯出祥雲如意的花樣來。\n他的頭髮似也打理過，重傷臥床多日，卻不顯髒汙,依舊同從前一樣，烏黑髮亮，緞子似的。\n只人清瘦了許多,恍惚間都撐不起那一身衣裳了。\n俞淺淺只看了一眼，便收回目光端著湯盅繼續上前。\n齊旻聽見了腳步聲，卻沒沒回過頭來，瞧著窗外在化了雪的院子裡覓食的兩隻鳥兒，搭在被褥間的手有一下沒一下地摩挲著指上的扳指，指骨修長,竹節一般，卻森白乾瘦得厲害，直讓人擔心那雙手若是稍微用力握什麼東西，骨節便會不堪重荷斷開。\n沒人說話,只有俞淺淺將湯盅放到桌上後用細白瓷碗盛湯的細微動靜。\n「孤以為，你不會來了。」\n俞淺淺端著裝了湯的瓷碗自桌前轉身，便發現他不知何時看過來了，目光依舊闃暗沉鬱，像是懸崖上的禿鷲，又似冬眠後出洞覓食的毒蛇。\n俞淺淺嘴角揚起一個溫婉的弧度，目光卻清凌凌的，毫無懼色地直視著他：「總得親自來送你這最後一程。」\n齊旻便看向她手中那碗羹湯，黑眸中翻滾著未辨的情緒：「難為你還專程熬了盅雪蛤湯，費心了。」\n俞淺淺笑笑：「大牢裡的死囚要上刑場了，也得吃頓斷頭飯不是？」\n她伶牙俐齒，笑不達眼底。\n齊旻靜靜看著她：「孤倒是不知，你還有這樣伶俐的口舌。」\n她怕疼，怕事，怕死，最聽話不過，似乎是個沒主見老實的，但就是在這副表象下，又藏了一顆極野的心，不然也不會幾次三番謀劃逃跑。\n每一次被抓回來了，她也不會歇斯底裡，該吃吃，該喝喝，該睡睡，從來不會做半點讓自己遭罪的事。他給的一切懲罰，她都受著，讓人覺著她乖了，可若有下一次機會，她還是會頭也不回地跑。\n這樣光彩熠熠的樣子，卻是他沒見過的。\n俞淺淺用湯匙攪著碗中的湯說：「你不知道的事，可多了去了。」\n她不願再同他多費口舌，直接問：「你這麼恨隨家，太子妃娘娘當年也用一場東宮大火將你變成了隨家大公子，為何？」\n齊旻看著她不說話，似覺著她冷漠得有些陌生。\n俞淺淺淡淡同他對視：「這江山是你們齊家的，當年死在錦州的也是你父王，如今要給隨、魏兩家定罪，你總不至於還想替自己的仇人隱瞞？」\n聽出她語調中淡淡的譏諷，齊旻又看了她一會兒，才移開目光緩緩道：「父王留給我的影衛中有一人喚傅青，是從當年的錦州城逃回來的，援軍和糧草久久未至，父王派他前去崇州求援，隋拓不肯發兵，還欲亂箭射殺他，言錦州一破，這天下就該改姓魏了。」\n俞淺淺神色間有了細微的波動，卻沒做聲，齊旻嗓音毫無波瀾地繼續將當年的隱情道出。\n「傅青原是綠林中人，以輕功見長，他僥倖從長信王府的絞殺下逃脫後，卻受了重傷，拖著傷趕回別處求援報信的中途，錦州便已破了，父王和謝臨山皆戰死，他自知大勢已去，遂趕回京中報信。彼時京城也已在魏嚴掌控之中，他私通淑妃血洗皇宮的事，母妃在東宮也有耳聞，再得傅青的證詞，愈發惶惶。」\n「後錦州之失全成了常山將軍孟叔遠之責，有孟家舊部來東宮申冤，前腳進了東宮的大門，後腳便成了血泊中一具死屍。孟家從女兒、女婿、到家中舊部，也都死絕了。」\n齊旻說到此處，勾起的嘴角全是譏諷和涼薄：「東宮知道魏嚴的秘密，他不會放過東宮的，母妃趕在魏嚴下手之前，用一場大火將孤藏去了長信王府。」\n這便是十幾載都壓得他難以呼吸的那段往事了。\n他淡笑看著俞淺淺：「你看，人只有足夠心狠，才能得到想要的一切的。母妃說，魏嚴從來都狼子野心，從前先帝偏袒十六皇子，處處打壓父王時，東宮所有的臣子都在謀劃如何幫父王重獲盛寵，穩住儲君之位，只有魏嚴放言，何不讓先帝『禪位』。」\n他頓了頓，神色間帶了一瞬間的怔惘：「若是那時便除掉魏嚴，或許便不會有後來這些事了。孤的父王就是太優柔寡斷，才會落得那樣的下場，一身賢名有何用？孤不會成為他那樣的人。」\n俞淺淺冷冷道：「狗屁道理，你做盡禽獸之事，還想給自己找個冠冕堂皇了理由！」\n齊旻也不怒，只盯著她說：「你罵人的樣子，比你從前乖順的時候好看多了。」\n俞淺淺狠狠皺眉，只覺那股被冰冷的毒蛇貼著皮肉纏上的惡寒感又來了，她毫不掩飾自己的厭惡：「瘋子！」\n她這副似被嚇到的樣子似乎取悅了齊旻，讓他低低地笑了起來。\n俞淺淺心中煩悶，起身就要離去，他收了笑，淡聲叫住她：「湯都燉好了，餵我喝完吧，別浪費了你這番心意。」\n他傷重，已下不得榻，起居都要人服侍，未免意外，謝徵還命人給他下了軟骨散，俞淺淺單獨見他，也不會有什麼危險。\n俞淺淺回眸看他，他靠在軟枕上，神色很平靜，像是不知道那湯裡有要他斃命的毒.藥一般，細長的眼，碎進了日光，襯著那一身仿佛能被太陽曬化的蒼白肌膚，恍惚間也透出了點溫和易碎的味道。\n見俞淺淺不答話，他又衝她笑了笑，故意一般：「不忍心麼？」\n俞淺淺便又坐了回去，用湯匙從碗裡舀起一勺已經涼了的雪蛤湯送到他唇邊。\n她神色平靜到冷漠，他面上也瞧不出情緒，入口時還點評了句：「熬的火候不錯，可惜放冷了些。」\n俞淺淺不說話，只又舀了一勺餵給他。\n他看著她，繼續張嘴喝下。\n這一刻的寧靜，不似誰要殺誰，倒像是一對眷侶。\n一碗湯見底了，齊旻笑著問：「還有麼？」\n俞淺淺說：「盅裡還有半碗。」\n齊旻便道：「都餵我吧。」\n他唇角仍掛著一絲笑意，不復陰冷，有點渾不在意了的味道：「以後就喝不到了。」\n自然喝不到了，他還有什麼以後呢？\n俞淺淺攪動湯匙的手微頓，只說：「等著。」\n湯盅裡剩下的那半碗湯，也餵完時，齊旻靠在迎枕上微側著頭看俞淺淺，忽說：「孤查過你。」\n俞淺淺抬起眸子同他對視。\n他道：「你不叫淺淺，家中貧寒，上邊有個兄長，下邊還有三個弟妹，父母沒給你取名，一直管你叫二丫。你也沒去酒樓做過事，家中為了給你兄長娶妻，將你賣給了人牙子，你被趙家買走，送到了我這裡來。」\n俞淺淺不做聲。\n約莫是藥性上來了，齊旻唇上已浮起一層淡淡的烏紫，眼神卻還是執拗地盯著俞淺淺，有些吃力地：「孤想知道，你是誰。」\n俞淺淺還是不答。\n他兀自道：「孤魂野鬼？還是……得了道行的精怪？」\n鴉黑的睫垂下來時，他死水般的眼底終於有了幾分波瀾：「讓孤……去得明白些。」\n俞淺淺平靜如出：「你毒性上來，記憶出錯了，我就是俞二丫，被家裡賣給人牙子前在酒樓做事，淺淺是我給自己取的名字。」\n她從杌凳上起身，甚至還幫他掖了掖被角：「你累了，睡吧，這毒溫和，不會太痛苦，一覺睡過去，就什麼都不知道了。」\n欲離去時，那隻森白瘦削的手忽拽住了她手腕，扯得毫無防備的俞淺淺一個趔趄，撲倒在他身上。\n俞淺淺剛要張嘴叫人，就被他用力扣住了脖頸，行將就木的人也不知哪來的力氣，頓時掐得俞淺淺發不出半點聲音，用力去掰他手臂也扳不動，指尖深嵌入他手背，他似乎都毫不知痛，一雙眼裡陡然泛起猩氣，神色猙獰，眼底全是恨意和不甘：「孤自負心狠，卻比不上你半分！你從來就沒有喜歡過孤！是不是？」\n俞淺淺還在掙扎，但因為缺氧整張臉已漲得通紅，掙不開他的手，她便去摳挖他胸前的箭孔。\n溫熱的血跡包裹了俞淺淺的手指，齊旻也悶哼一聲，鬆了鉗制住俞淺淺的力道。\n俞淺淺跌坐在地，捂著脖頸大口大口喘氣，房門也在此時被踹開，在外邊聽到動靜的樊長玉一個箭步衝進來：「淺淺！」\n她扶起俞淺淺，目光如刃直直刺向齊旻。\n俞淺淺及時抓住了樊長玉的手，只說：「我沒事。」\n齊旻捂著胸口靠在軟枕上，瘦削的臉因毒性上來已呈出一股青灰色，他齒關咬得緊緊的，那猩紅的眼裡死死盯著俞淺淺，恍惚間透出幾分委屈：「你……憑什麼這麼對孤！」\n有血跡從他嘴角泅了出來，很快便大股大股地往外湧，將衣襟和被褥都沾紅了一大片。\n俞淺淺在榻邊坐下，靜靜看著齊旻，她髮髻在方才掙扎時掙散了，臉上窒息而升起的薄紅還沒退下去，整個人顯得很是狼狽，神情卻極為冷淡：「我為什麼不能這樣對你？」\n「你這樣的人，配得到別人的喜歡麼？」\n「你自私、殘暴、陰狠、喜怒無常，誰都得小心翼翼伺候著你，稍有不慎就得死，而你只要稍微施捨點什麼，就要別人掏心掏肺、感恩戴德，世上哪有這麼好的事？」\n齊旻口中全是鮮血，他一雙眼還是死死盯著俞淺淺，只是已經說不出話來了。\n俞淺淺平靜道：「為你死的人還少麼？你除了猜忌，還為她們做過什麼？你只是投了個好胎罷了。」\n齊旻依舊一瞬不瞬地看著他，目光執拗又帶著哀意。\n俞淺淺卻不再看他，直起身，同樊長玉說：「走吧。」\n樊長玉跟著俞淺淺一道出了店門，正要同她說話，俞淺淺腳下卻忽地一軟，幸得樊長玉及時扶住了她：「淺淺，你怎麼了？」\n俞淺淺臉色發白，再無在齊旻跟前的那股鎮定從容，說：「沒事，我緩緩。」\n她抓著樊長玉的那隻手一片冰涼：「毒殺一個人，終究還是跟殺雞魚不一樣的。」\n樊長玉扶著她就地在臺階前坐下，寬慰道：「我第一次殺人，也怕得一整晚睡不著，我今晚帶著寧娘過去陪你吧，我手上沾的鮮血多，煞氣重，就算他是皇孫，成了孤魂野鬼也不敢靠近我的。」\n這話說得跟哄小孩似的，俞淺淺心頭的陰霾散了幾分，「撲哧」一聲笑出聲來，道：「是了，長玉你如今可是將軍了。」\n樊長玉撓頭，不好意思笑笑。\n太陽照在身上暖融融的，俞淺淺冰涼的手腳慢慢也有了溫度，她側頭看著身側英姿颯爽的女將軍，大抵是齊旻最後的問話到底還是讓她心底升起了點旁的情緒，她忽而道：「長玉，我有個秘密。」\n「嗯？」樊長玉偏過頭，日光落了她滿身，眉眼間具是一片燦輝，莫名地就讓人心生信任和親切。\n俞淺淺說：「我只告訴你一個人。」\n樊長玉微愣了一下，便極認真地道：「我幫你保密。」\n俞淺淺看向夕陽下忽高忽低飛過的燕雀，目光變得悠遠，還有淡淡的傷懷：「我從一個很遠很遠的地方來到了這裡，再也回不去了。」\n「有多遠？」\n「從現在開始走，走上千百年，才能回到那裡去。」\n樊長玉大驚：「那你是怎麼來到大胤朝的？」\n俞淺淺道：「睡了個覺的功夫，睜眼就在這裡了。」\n樊長玉神色變得有點古怪，盯著俞淺淺半晌，忽而道：「淺淺，你是神仙吧？」\n俞淺淺再次笑開：「這天底下能有我這般廢的神仙？」\n她看向樊長玉道：「你都比我像神仙些。」\n突然被誇，樊長玉有點靦腆，一時間不知怎麼接話。\n俞淺淺說：「我來的地方，史上也有個很厲害的女將軍，喚良玉。」\n她側頭看向樊長玉：「這裡什麼都不好，但有你，有寶兒，又也還好。」\n她彎起一雙笑眼：「千百年後，長玉必然也是個名垂青史的女將軍。」\n-\n永平十七年冬，太傅李陘、丞相魏嚴意圖謀反，李陘兵敗死於亂箭之中，魏嚴被生擒。\n一月後，皇帝齊昇因宮變受驚病逝，承德太子流落民間的後人被找回，雖還未舉行登基大典，但已隨生母俞氏入主皇宮。\n-\n天牢。\n昏黃的燭火在牆壁上投下兩道巍然暗影，牢房夾道的火盆中火光正望，木柴燒得噼啪作響。\n陶太傅於落子間幽幽嘆了聲：「那臭小子的爹死在了錦州，當年的事，他無論如何，都要一個答案的。」\n他蒼老而有神的一雙眼靜靜端詳著對面年歲比自己小上一輪的人，以一個長者的姿態嘆息著詢問：「以圭，擔這一世罵名，你圖什麼啊？」\n齊旻死了，他的那批影衛裡，還剩下幾個，傅青亦在其中。\n謝徵審過之後，得出的答案同俞淺淺問出來的一致。\n如此，從隨家搜出來的那三枚虎符，似乎便說得通了。\n——虎符是真的，調兵令也是真的，隨家是聽從了魏嚴的命令，才不發兵運糧去援錦州的。\n但又有新的問題橫在了眼前：隨家跟魏嚴沆瀣一氣，為何後來隨家反了，只放出些關於錦州失陷跟魏嚴有關的謠言，不直接揭發魏嚴？\n任旁人如何，陶太傅是不信魏嚴親自設計了錦州一案的，只是魏嚴自逼宮落敗之後，似乎就將生死都看淡了，所有罪他都認下，卻又絕口不再替當年之事。\n「太子和臨山之死，有我之責，我不替誰擔這罵名。」\n壁龕上的油燈吞吐著一點昏黃亮光，棋局也被跟前的人投下的影子切割成一明一暗兩部分。\n魏嚴蒼勁的食指和中指夾著一枚黑子落到了棋盤交線處，蒼然的聲線因沙啞更添幾分厚重，聽不出情緒起伏。\n陶太傅卻從他那話裡察出點機鋒來，滿是褶皺的眼皮抬起：「因著你和戚丫頭的事？」\n魏嚴看向陶太傅。\n陶太傅便知應該有這層緣由了，嘆道：「兩個孩子都問到安太妃那裡去了，當年你從戰場上退下來，留在了京中，真當老頭子什麼都看不出麼？」\n魏嚴沉默兩息，只說：「她是為我所牽連。」\n陶太傅也來過天牢多次了，每次都從魏嚴口中問不出什麼，今日他願多言，他當即就問：「此話怎講？」\n泥爐中炭火旺盛，茶壺中的水咕嘟翻滾著，壺嘴處白霧滾滾，升騰上去的霧氣模糊了魏嚴的容貌。\n恍惚間，坐在陶太傅對面的權相，又成了當年那個緊靠一篇詩文便名動晉陽的冷桀青年。\n他閉眼：「當年少謀，留了口舌之禍。」\n陶太傅目光嚴藹，心中卻已微微發沉。\n他先前同樊長玉說，謝徵和年輕時的魏嚴性子相似，其實不盡然，謝徵因自幼失怙，又得魏嚴管教嚴格，性情反更穩重些。\n魏嚴年少時，可不單是氣盛，幾乎已稱得上桀驁了。\n晉陽魏氏，百年鐘鳴鼎食之家，家中子弟本就比常人多一分驕矜，他作為那一輩中的佼佼者，身上的傲氣只更甚之。\n十七歲便中探花郎，卻又不願早早入朝為官，反去遊歷名山大川，言要繼續遊學，兼修出世學，氣得魏家老爺子為了磨他性子，將人綁去了戚家軍營，讓戚老將軍代為管教，他這才在軍中同謝臨山成了至交。\n陶太傅暫且壓下心中那一絲複雜，捋須緩緩問：「何禍？」\n「啟順十五年，江南水患，太子前去賑災，賈家處處作梗，延遲下撥糧款，致使災民死傷過半，先帝震怒，不追十六皇子和賈家之過，反責太子賑災不力，令其閉門思過三月，底下臣子盡數受罰。帝心偏頗日益甚之，朝中已有了先帝欲改立十六皇子為儲君的傳言，太子客卿們為太子謀，我說了讓先帝『禪位』之言。」\n饒是時隔多年再聽到這話，陶太傅仍是因之色變，手指魏嚴想說什麼，最終只嘆一聲：「你……糊塗啊！」\n這話若傳進先帝耳中，太子和整個魏氏都是滅頂之災。\n魏嚴卻道：「非我糊塗，是太子優柔。」\n他目光嚴正得似一把鋼刀，就久居上位的氣勢一出來，不怒自威，冷聲道：「他當年若有那份魄力去爭，舉戚家和謝、魏兩家之力，談何不能將他推上那把龍椅？」\n陶太傅搖頭：「你得站在太子的位置想，不管先帝如何偏寵十六皇子，只要他一日還是太子，那個位置終究是他的。讓先帝『禪位』，一旦不成，那就是全盤皆輸了。」\n魏嚴問：「他最後等來了什麼？」\n話落，倏地冷笑一聲：「倒也如他願，賢名加身，流芳百世！」\n陶太傅聽出魏嚴話中有含恨和譏諷之意，心底卻是無奈一嘆，先帝還是皇子時勢微，娶了戚皇后靠著戚老將軍才坐上了皇位。\n但戚老將軍在軍中的威望實在是太高，坐穩了那把龍椅，先帝又忌憚起戚家，奈何戚家世代忠良，家中子弟也非紈絝之輩，他身為帝王尋不到由頭動戚家，才專寵貴妃，縱著賈家打壓戚家。\n可當年局中之人，如何又看得到後來之事？\n陶太傅眼底帶了幾許滄桑：「事到如今，你也莫要同我打啞謎了，當年，究竟是如何一回事？」\n冷風拂過，壁龕上的燈火跳躍，魏嚴投在牢房牆壁上的影子巍峨挺拔，冷硬中又透著股說不出的蒼寂，像是懸崖上的堅石。\n他沉默了許久才道：「是我未辨明主，貿留口舌禍言，又少謀輕信，未做萬全之策，以至那話被太子客卿傳到了先帝和賈家耳中，還尚不知情。」\n陶太傅聞言心中便是一個咯噔，魏嚴身後是整個晉陽魏氏，先帝就算知道了魏嚴說的那話，也不會當場發作，只會愈發忌憚，暗中布局。\n果然，下一刻魏嚴便冷笑著反問陶太傅：「我身後是晉陽魏氏，如何才能給我定個誅九族的大罪？」\n陶太傅怔怔未語。\n魏嚴一字一頓，似乎裹挾著極大的恨意：「自然是穢亂宮闈。」\n陶太傅下巴上的鬍鬚輕顫，不知是心中壓著怒意還是覺著此事荒謬，眼底又是痛惜，又是複雜。\n既要給他定穢亂宮闈的大罪，啟順十六年的那場中秋宴，皇帝帶著群臣去撞見的，就不該是他和一個普通宮女……\n只怕原本要設計的是他和淑妃才對！\n陶太傅嘴唇微抖，最終只啞聲連道：「荒唐！荒唐啊！」\n他終懂了魏嚴對太子的怨從何而來，魏嚴是有言語之失，可太子溫吞既不採納此計，便該把當日聽到此言的人都牢牢握在手中，此言既從東宮客卿口中傳了出去，便是太子治下不力。\n陶太傅幾乎已隱隱猜到了當年之事的原委，滄聲問：「後來錦州失陷……是先帝？」\n魏嚴閉目頷首：「我當初以為，中秋宮宴之禍，只是先帝芥蒂我和容音有故，還不知是那『禪位』之言招徠的。」\n「先帝處處打壓太子，太子不敢與父爭，便在民間攬賢德之名，廣納能士，殊不知此舉愈發叫先帝忌憚。賈家見太子在民間聲望一日勝過一日，便生一計，慫恿百姓替太子修生祠。」\n此事陶太傅是知曉的，當年先帝在朝堂上大發雷霆，甚至公然砸了太子一身的奏章，怒斥太子是不是已有了欲將其取而代之的心思。\n十六皇子和賈貴妃這一條計，實在是毒，此事一出後，太子直接被剝了監政之權。\n他那簪著木簪的稀疏頭髮叫大牢牆壁上昏黃的油燈照著，晃眼瞧著已是灰白一片，沉嘆：「有『禪位』之言在先，太子又攬賢名，招能士，縱然生祠之事是十六皇子黨從中作梗，先帝怕是也徹底容不得太子了，無怪乎那一年，先帝藉此事，重重發落了所有太子黨羽，逼得太子為求出路，自請去錦州，欲拿這項軍功重獲盛寵。」\n如今來看，太子去錦州之舉，那更是火上澆油啊！\n畢竟在先帝眼中，太子這是要正式染指兵權了，在民間的聲望本就已快蓋過他這個皇帝了，在軍中若再得威信……「禪位」之言，便要成真了。\n魏嚴眼底露出淡淡的嘲意：「賈家野心勃勃，先帝又如何不知？不過是他一手提拔起來的，為了平衡戚家權勢的一條走狗，太子身死錦州，十六皇子自然也活不得了。」\n陶太傅瞳仁兒一縮，被這話驚到。\n意思是……十六皇子被困羅城，其實也是先帝安排的？\n魏嚴看著陶太傅道：「先帝只想要聽話的兒子。」\n陶太傅今日在這天牢內，已嘆了不知多少次氣，不知是心中壓著怒意還是覺著此事荒謬，眼底又是痛惜，又是複雜。\n自古最是無情帝王家啊！\n其實承德太子當年或許就是太懂聖意了，才一直都在做一個聽話的兒子。\n但帝王的猜忌一起，他又並非無能之輩，所以不管他多聽話，都沒用了……\n陶太傅心口沉甸甸的，重得慌。\n外邊似乎又下起了雪，自天窗處零星飄了幾片進來。\n魏嚴又在棋盤上落下了一子，「當年從太子去錦州，十六皇子聽讒言赴羅城時，便已是個死局了。」\n「先帝用容音這個砝碼逼我中途回京，最後的錦州兵敗之責，便可盡數落到我頭上，戚老將軍已故，接替了戚家兵權的謝臨山一死，晉陽魏氏成為陷害儲君，穢亂宮闈的亂臣賊子，是不是人人得而誅之？」\n「只剩一個靠著他縱容才作威作福多年的賈家，有何懼？那些年裡御史臺參賈家的罪狀裡，任挑一條出來嚴逞，賈家的好日子便也到頭了。」\n陶太傅滿面滄桑，再說不出一句話來了。\n一片雪花被風送得極遠，慢悠悠飄進了魏嚴手邊的杯盞中，頃刻間便化開。\n水波中映出他蒼冷沉寂的一雙鳳眼：「容音的孕脈是假的，那只是一個誘我入網、讓我坐實穢亂後宮罪名的局，她為助我逃出去火燒了清源宮，說只要太子一日還在，戚氏一日不倒，先帝便不會拿她怎樣。」\n那鐫刻了歲月痕跡的嘴角，多了幾分苦意：「可我當時不知，先帝已做了讓太子身死錦州的萬全之策，以私通大罪要處死她，逼我回來，才是計劃的最後一步。」\n「後來的事，太傅都知道了。」\n「皇宮，是我血洗的，孟叔遠的汙名，也是我安上去的。先帝的這計劃委實周密，錦州事發後，所有的罪證矛頭皆指向我，頭一個要將我往死罪上摁的，便是臨山的舊部。」\n陶太傅滿嘴苦澀，他終是明白魏嚴為何不提當年之事了，這是……辯無可辨。\n承德太子和謝臨山身死錦州，他前去調兵卻又中途回了京城，隨即血洗了皇宮，任誰聽了，也不會覺著魏嚴清白。\n何況……他回京之由，以他的性子，也萬不可能公諸於眾。\n終是問心有愧，才會在先帝用淑妃做局算計他時，一頭扎了進去。\n陶太傅身形似乎都頹然了幾分，望著天井處慢悠悠飄下的雪花，沉痛長嘆：「國孽啊……」\n一句「禪位」之言埋下禍端，太子性情溫慈不予採之，又因治下不嚴傳到了先帝耳中，至此禍起。\n如今再看當年之局，又該怪誰？\n怪魏嚴留下禍言？怪太子治下不力？怪賈家設了生祠毒計？還是怪先帝狠辣歹毒？\n終是這一切串在了一起，才最終導致了錦州的血案。\n後來人苦苦要尋個真相，可這真相……實在瘡痍悽涼。\n比起陶太傅的悽然，魏嚴神情倒是冷硬如初：「我不是太子，人若殺我，我必先除之而後快。」\n「隨家夾著尾巴過了這麼多年，我沒動他，只是礙於錦州一破，北境無人，總得要支軍隊抵擋南下的北厥人。永平十五年，終將隨家逼反，我本要另派人平叛，隨家先一步讓謝徵聽到了關於錦州血案內幕的風聲，他若安分，不查當年之事，我便依綰妹遺言，留他性命。他既要查，我已殺他謝氏查當年之事的族人無數，不多他一個。」\n陶太傅愴然不知作何言語。\n魏嚴眉眼愈漸冷厲：「宮變那日，若非他還有後手，也早血濺午門了。今朝我落在他手中，亦是成王敗寇，願賭服輸。」\n他說完便閉上了眼，哪怕坐於一片枯草中，亦身姿煢煢，巍峨如磐石。\n陶太傅又獨自枯坐了好一會兒，在二人身前的棋局上落下最後一子，才巍巍起身，說：「這盤棋，終是下完了……」\n天井處飄下的碎雪落至他發間，恍惚間，已是滿頭鶴髮。\n行至拐角處時，顫巍巍的步子微頓，啞聲同一直站在牆這頭的青年道：「你都聽到了？」\n天寒地凍，大牢外的簷瓦上墜著一片冰凌，浮光暗沉，靜立於窗前的單影佇立無言。\n夾道處的火光，只照出他半截蒼白冷毅的下顎。\n裹著血痂的往事終被揭開，拖拽出的真相依舊是血淋淋的。\n只是當年那個寄養於謝府常在午夜噩夢的血色中驚哭的稚童，自屍山血海中一路走來，已成了如今心堅如鐵的模樣，再慘烈的過往鋪陳在眼前，也撼動不了他眼底的冷漠分毫。\n從牢房天窗處飄進的細雪在牆角冰冷的青磚上積了薄薄一層，寒風從夾道穿過，不厚的錦袍裹出青年人堅實挺拔的身軀，不復單薄，已能撐起天地。\n「多謝老師。」嗓音冷而沉啞。\n謝徵朝著陶太傅一揖後，抬腳往天牢出口走去，一步一步，不急不緩，沉穩堅定。\n陶太傅看著他清冷孤絕的背影，回首看魏嚴的牢房方向，滿目蕭然，又是一嘆。\n那老東西，最後分明是故意說那番話的。\n十七載，他用自己做磨刀石，終是鍛出了大胤朝這把最利的刀。\n時光荏苒，英雄作古，那沾滿鮮血的錦州一案，如今再看，終不過啟順年間的一盤棋，將軍、朝臣、帝王、皇子……當年的所有人，都是這盤中棋子，各為其謀，廝殺出了個破敗山河。\n陶太傅上一回有這般滿心悽然之感，還是自己在前線督戰，妻兒慘死於異族人刀下，十幾年後的今日，心中悽意更甚之。\n他步履蹣跚著慢慢往天牢出口處走，在拐角處的石窗前，瞧見一燦若驕陽的姑娘從馬背上翻下來，笑意盈盈駐足同那一身悽絕從天牢走出去的青年說了什麼，那青年人滿身的霜意似乎便慢慢化開了，抬手幫她拂了拂發間的細雪，接過她手中的韁繩，二人於紛飛的大雪中並肩離去。\n陶太傅悽沉的眼底終浮起了幾分和藹笑意。\n還好，那把刀，找到了自己的鞘。：，，.`

            title: `第164章第164章`,
            content: `永平十八年冬末,俞寶兒正式上了皇家玉蝶，其母為其取名為煜。\n同年春，年僅七歲半的齊煜登基,改年號為永興,武安侯謝徵為攝政王，輔佐朝政。\n雲麾將軍樊長玉、平西大將軍唐培義等人平逆有功,再各升一級。雲麾將軍樊長玉拜懷化大將軍,加封一品護國夫人；唐培義加封宣國伯，賀修筠封劍南節度使,鄭文常封上府折衝都尉。\n年夜逼宮的李、魏兩黨也正式被問罪。\n只是李太傅乃天下大儒，聲望極高,其門生遍布朝野，對於李太傅死在逼宮當夜，不少仕子都義憤填膺,認為李家定是蒙受了什麼不白之冤。公然做詩詞文章暗諷謝徵，言他扶持幼帝上位，不過是要做第一個魏嚴,李家憂國為民，得此下場，慘矣！更是高呼，大胤朝來日無望哉！\n這些聲音傳到謝徵耳中，他倒是不為所動，只讓戶部將抄了李、魏一府後,清點了兩月之餘才清點完畢的的李家家產在早朝上盡數報出。\n自詡清流的李家，抄家卻抄出了白銀百萬兩之巨，此外還有金器四千餘件，玉器一千餘件,古董字畫兩千餘件，綾羅綢緞萬餘匹，名下鋪子、莊子一千多處，私田百萬餘畝，竟比魏府抄出來的還多。\n這個數字一出來，滿朝皆驚，李太傅名下那些門生，再不敢多言一句，在早朝上是羞得面紅耳赤，只恨沒個地方鑽進去。\n民間倒是還有些許質疑的聲音，可這筆銀子，是實打實地充進了國庫的，大胤國庫在收復錦州、遼東十一郡以及平崇州之亂中消耗巨大，本已空虛，有了這筆銀子，到了又有了周轉的餘地。\n新帝登基，大赦天下，民間減免年賦稅，同時還在懷化大將軍樊長玉的諫言下，重修《大胤律》，加了家中子女皆可繼承家產，孤女可自立門戶等諸多條例。\n審魏嚴時，還審出了一樁千古奇罪，當年的錦州之失，並非常山將軍孟叔遠運糧之過，而是十六皇子身陷羅城，老皇帝昏聵，派孟叔遠前去羅城救人，將運糧重之責交與了崇州長信王，崇州卻沒發兵，眼睜睜看著錦州失陷。後異族南下，長信王帶兵截住了異族，朝廷不敢在此時問罪長信王，為了給天下人一個交代，便將錦州之禍全盤推給了孟叔遠。\n這個真相，八分真，兩分瞞。\n沒將魏嚴牽扯進去，是因為當年的錦州一案，他也是老皇帝要逼死在局中的人，牽扯進去了，他突然回京的緣由，終是繞不過淑妃。對於這樣一個被時局裹挾的無辜女子，魏嚴至死不願讓她在史書上留下任何汙名，樊長玉和謝徵也終也沒讓她在這段歷史上留痕。畢竟，錦州之案的元兇，說到底還是老皇帝和長信王。\n但魏嚴這些年為了固權所犯下的罪孽，同樣是板上釘釘的事實，被判了秋後斬決。\n老將軍蒙冤十八載，終得平反，幼帝念老將軍忠義，悲老將軍之冤屈，追封老將軍為忠國公，配享太廟。\n世人多是唏噓，又為罵了孟老將軍十餘載而愧疚不已，據聞大告天下當日，不少人為孟老將軍哀哭，自發進香祭奠。\n百姓們也是在此後才得知，懷化大將軍樊長玉，竟是孟老將軍的外孫女，她提著把殺豬刀參軍，一步步成為巾幗將才為祖父平反的事跡，更是從軍營傳到了民間，被頌為一段佳話。\n民間的酒樓茶舍裡，不論何時走進去，總能聽見說書先生一拍醒木，吊著嗓子喝道：「且說那臨安樊氏女，爹娘死於非命，幼妹被劫，夫郎又被徵了軍，苦也，慘也，然她手提一柄殺豬刀，蕩匪寇，斬斥侯，殺敵將……」\n醒木拍得啪啪作響，說書先生情緒高漲，底下聽書的賓客亦是聚精會神，神情緊張，恍若身臨其境。\n這波熱潮還沒過去，京中又發生了一件大事，以武封侯的謝氏獨子、如今權傾朝野的攝政王，向幼帝討了一張賜婚的聖旨，要娶懷化大將軍樊長玉。\n攝政王若是娶旁的一嫁女子，百姓們少不得還得議論一番，但他求娶的乃是懷化大將軍，百姓們紛紛稱讚此乃天造地設的一對。\n就連京都貴女們，都用帕子抹著眼淚說，唯有嫁攝政王的是懷化大將軍，她們才甘心。\n這是英雄配英雄，雖然也都是「美人」。\n當然，不知又有哪兒的好事者傳出，說當初攝政王平叛完回京受封時，在遊行的大街上於扔向他的萬千絹帕中，準確無誤地抓住了懷化大將軍的髮帶，面不改色地就揣自己懷裡了，請聖旨賜婚這事應當是早有預謀了。\n但滿朝皆知，懷化大將軍是有過夫婿的。\n當初齊昇在位時，大將軍甚至在金鑾殿上親口承認，她就是在尋夫路上意外從的軍。甚至還有從燕、薊、崇州退下來的兵卒拍著胸脯保證，說這一切都是真的，當初他們被困一線峽時，懷化大將軍隨薊州援軍一道殺上山來尋夫。\n一時間從朝堂到民間，關於謝、樊一人婚事的熱議，一下子達到了頂點。\n都說懷化大將軍對先夫情深義重，攝政王這個後來人，怕是比不過前人。\n不過世間男子都可妻四妾，懷化大將軍這等女中丈夫，死了糟糠夫，再得攝政王這等如意郎君，那不是理所當然的事嗎？\n自然也有男子替樊長玉那「早死」的「糟糠夫」唏噓，說他要是還活著，如今也得享盡榮華富貴了，但他既然死的早，就說明是他自己福薄，受不住這滔天的富貴和福氣。\n只是大家仍不約而同地認為，在懷化大將軍心中，那「糟糠夫」的分量，仍是比攝政王重的，人家畢竟是患難夫妻。\n若是那糟糠夫還在，懷化大將軍哪還會同意嫁攝政王！\n被天下仕子作詩詞譏諷說冤枉了李家都沒動怒的謝徵，在聽到民間這些傳聞時，一張臉沉得滴水，謝十一在謝五謝七點撥後，極有眼力勁兒開始在民間宣揚自家王爺就是大將軍的「糟糠夫」一事。\n這消息傳出去後，無疑又是引起了軒然大波。\n然很快便有人發現了是謝府的侍衛每天去巷子裡找乞丐發銀子，讓他們宣揚此事，大家的心境一下子變得極為微妙，然後統一得出了一個答案：攝政王當真是愛慘了懷化大將軍，竟然連個糟糠贅婿的名頭都要上趕著認！\n據說還有想為官，但尋不到的門路的才子，靈機一動替懷化大將軍和攝政王寫了篇戲文《女將軍》，以此來討好攝政王。\n此戲在京中的戲班子一經開唱，便贏得了賓客滿堂喝彩，戲臺上的刀馬旦畫著英氣的劍眉，頭戴翎子、身插靠旗，提嗓高唱：「為救夫郎離家園，誰料從軍拜將軍……」①\n樊長玉得知此事後，哭笑不得，還和謝徵暗地裡包下一間雅間去戲園子裡聽過一回。\n外邊的戲臺上鑼鼓喧囂，戲子嗓音高亢清亮，穿透力極強。\n聽著戲詞，那樁樁件件的往事，似乎也慢慢浮現在了樊長玉眼前。\n雪地初遇，樊家屋宅裡的嫋嫋煙火，他教她如何用律法去保家產，替她批註四書，臨行前送的護腕，以及後來戰場上的一次次生死與共……原來不知不覺，她們已走出臨安那個小鎮那般遠了。\n她不自覺牽唇笑了起來，側過頭同謝徵打趣道：「你還記得麼，那時候在清平縣，你說你想娶個溫柔賢惠會持家的姑娘來著。」\n「頭戴金冠壓雙鬢，手持長刀震乾坤……」②\n正好外邊的戲到了高.潮部分，鑼鼓聲愈發急促，刀馬旦的戲腔鏗鏘高亢，大有唱破這天穹之勢，和幾名武旦打得也愈發不可開交，手中的長刀耍的並不是實用的招式，但動作很漂亮。\n這齣戲因場場爆滿，這一場排的已是晚上，他們的包下的雅間在一樓，整個戲園內部是呈圓形，所有雅間都對著中央的戲臺子，窗戶下方掛了一整圈的燈籠，全點上後煞是好看，當真如火樹燭龍一般。\n樊長玉這一回頭，半張笑靨映著闌珊的燈火，雙眸溫暖明亮，大開的軒窗外是作她扮相插了滿身靠旗、手持長刀的刀馬旦，那一刻的畫面像是靜止了一般，就這麼直直撞入了謝徵的眸中。\n過了許久，他才答：「嗯，但遇見你之後，我便知道，我要娶的，只是樊長玉。」\n大概是被窗外的燭光照的，樊長玉臉上忽地緋了一片。\n一齣戲唱完了，戲園裡的賓客們才陸陸續續坐上馬車離去，樊長玉和謝徵未免叫人認出來，節外生枝，等到人都走得差不多了，才出戲園。\n月上柳梢頭，兩人都沒騎馬或是乘轎，就這麼並肩走在清冷的大街上，月輝將一人的影子拉得極長，偶爾影子交錯，像是粘連在了一起。\n謝徵便當真扣住了樊長玉的手，再也沒鬆開。\n他說：「城內有座金寺，聽說很是靈驗，香火旺盛，要去看看嗎？」\n戌時剛至，現在歸家早了些，樊長玉便點了頭。\n待一人到山寺門前，看到緊閉的佛寺大門和貼在邊上的那張「酉時過後，不再接待香客」的告示時，具是沉默。\n樊長玉轉頭看向謝徵：「佛寺今日已閉寺了，要不改日再來吧？」\n謝徵卻抬眸看向了佛寺一丈餘高的院牆。\n-\n片刻後，兩個矯健如豹的身影從佛寺院牆翻了進去。\n一直到腳底都踩在寺內的青磚上了，樊長玉還是有點懵逼。\n她跟著謝徵走了一小段路後終於想起自己為什麼困惑了，問：「我們大半夜翻牆進來，就為了拜個菩薩？」\n謝徵被問得微怔了下，頭一迴避開了樊長玉的眼神，別過臉微咳一聲說：「這寺裡最出名的就是那棵菩提樹，據說京中達官顯貴們都會來這裡許願掛牌。」\n線條好看的半截下顎在清冷的月輝下微繃著，似乎這樣就能掩蓋住沉而亂的心跳，手心卻冒出了自己也說不清的細微汗意。\n說是菩提樹，但幾乎已是全京城人盡皆知的姻緣樹，來此許願的，也都是求姻緣的少男少女。\n樊長玉似乎並不知情，微微一愣後，便笑著道：「好啊，以我們如今的身份，光明正大地過來掛，傳出去指不定又得被說成啥樣，不如趁今夜偷偷去掛一個。」\n可能是她在月色底下的那個笑容太耀眼又太明媚了些，謝徵側過頭靜靜看了她兩息，才收回幽深的目光，引著她繼續往前走。\n那棵掛滿了紅綢和許願牌的姻緣樹就在佛寺主殿的院中，一人很容易便找了過去，寺廟裡刻的許願牌和寫心願的筆墨都備在旁邊的偏殿裡，僧人們的禪房不在這邊，謝徵進殿後，留了一錠大元寶做香火錢，取了兩枚許願牌和筆墨出來。\n他早早地寫好了站在一旁等樊長玉。\n樊長玉則捏著毛筆冥思苦想了半天，用儘自己畢生所學，終於想出十一個字。\n怕謝徵偷看，寫的時候還一直用手擋著。\n許願的木牌不大，她的字又粗獷，擠了又擠，雖說寫得歪歪扭扭，但總算是擠下了。\n等她輕舒一口氣提起筆，謝徵失笑：「寫了什麼，寫這般久？」\n樊長玉把許願牌背朝著他，護得緊緊的，耳朵尖有點紅，偏還一本正經道：「既是許願的，說出來就不靈了，直接掛上去吧。」\n說完她便捧著許願牌，雙手合十閉眼默念了什麼，然後猛地一掄手臂……把許願牌拋到了幾丈高的菩提樹頂。\n旁人沒這般大手勁兒，拋上去的許願牌大多是在菩提樹中下段。\n對於這個高度，樊長玉卻是極為滿意，拍拍手看向謝徵：「你的呢？」\n謝徵看了一眼樊長玉拋的那塊許願牌，神色如常地揚臂一扔，他那塊許願牌也落到了樊長玉那塊附近。\n樊長玉笑道：「你也是怕扔太低被人瞧見？」\n謝徵微偏過頭看她，面若冷玉，漆黑的眸子幽沉深邃：「你的許願牌掛在最上邊孤零零了些，我把我的扔上去陪你。」\n樊長玉愣了一下，望著他鍍著一層月輝的清雋眉眼，明明和他在一起這麼久了，這一刻心口卻還是像揣進了一隻小鹿，「撲通撲通」直跳。\n-\n樊長玉雖被封了大將軍，但她的將軍府還在建造中，如今仍暫住進奏院。\n這一夜，謝徵把她送回去後，卻又快馬折回了金寺，再次翻牆進寺，直接攀上菩提樹頂，將樊長玉扔上去的那塊許願牌摘了下來。\n嶄新的許願牌上，歪歪扭扭寫著的墨跡，赫然是「朝朝暮暮，歲歲年年，願與君度」。\n謝十一守在牆根處替自家主子放哨，他也不知自家主子是怎麼了，突然就在樹上放聲笑了起來，那笑聲極其愉悅，至少謝十一跟在謝徵身邊這麼多年了，還從沒聽見他這般開懷地笑過。\n就是那笑聲不僅驚起了一片雅雀，還把寺裡的武僧也驚動了……\n寺內的武僧如臨大敵，一番搜尋又不見人影，進殿後，發現了謝徵先前留在殿內的元寶，以為是有人深夜潛入佛寺只為添個香火錢祭拜，這才鬆了口氣。\n同被驚擾起來的住持望著動過的墨筆和少了的許願牌，捻著佛珠，以單掌作佛禮，布著深深皺紋的臉上笑容是一種沉澱了歲月的和藹：「我佛慈悲，世間有情人，終成眷屬。」\n-\n為了有足夠的時間走完六禮流程，樊長玉和謝徵的婚期定在了次年月。\n在此之前，她想將當初草草葬在薊州野坡上的父母墳塋遷回了孟氏陵園。經欽天監的官員幫忙相看黃道吉日後，將遷墳日期定在了今年九月。\n回薊州時，她還向幼帝替當初為了保護清平縣百姓死在匪寇刀下的王捕頭夫婦請了一塊「忠義」匾額，交給了王捕頭夫婦嫁去了鄰縣的女兒，歸鄉後又替王捕頭夫婦修繕了墳塋。\n趙大娘知道後，想起正直忠厚的王捕頭夫婦，還哭了一場，拉著樊長玉的手一直同她說，有那塊御賜的匾額在，縱然王捕頭夫婦的女兒沒了娘家人，婆家也萬不敢欺她的。\n同月裡，殘存的李黨和魏黨，行刑的將被行刑，流放的被流放。\n行刑那天，謝徵獨自去看了魏嚴最後一次，沒人知道甥舅一人都說了些什麼。\n魏嚴的屍首，被嶺南節度使——戚老將軍的義子戚行舟帶走，謝徵至始至終都沒露面，只在戚行舟回程途中，於京郊十裡坡上遠遠看著他帶著魏嚴的棺木遠走。\n樊長玉得到了消息趕去十裡坡找謝徵時，官道盡頭幾乎已看不見戚行舟的馬車了。\n謝徵臉上看不出表情，只說：「他在十八年前就把自己的屍首託付給了戚行舟。」\n「淑妃葬在嶺南，他終也要去的。」\n……\n……\n永興一年月。\n攝政王娶親，懷化大將軍下嫁，早春的桃花開了十裡，卻仍不及懷化大將軍的紅妝隊伍長。\n百姓們知道懷化大將軍已沒了娘家人，自發地前去送親，連京城周邊州府的百姓也趕來觀禮，隊伍龐大得一直排到了京城城外。\n紅豔豔的爆竹碎紙和灼灼桃花瓣鋪滿了迎接送親的那條長街，熙熙攘攘擠在街頭的人們，個個笑容滿面，一如當初迎大軍凱旋時那般，高呼著「懷化大將軍」、「攝政王」，也有還是習慣叫謝徵「武安侯」的，目之所及，耳之所聞，全是再懇切不過的祝福。\n在皇商趙詢的操持下，城內酒樓茶肆也大擺流水席，免費宴請賓客，慶祝大將軍和攝政王的大婚。\n毫不誇張的說，這日就連城內的乞丐都把自己收拾乾淨了，擠在人堆裡去祝賀。\n樊長玉沒有兄長，賀修筠為她送親，騎在馬背上看到這等盛況，心中只覺震撼，與同行的鄭文常感慨：「我敢保證，便是將來陛下娶妻的陣仗，也大不過今日了。」\n整個大胤百姓的誠摯的歡欣與祝福，已不是權勢所能營造出來的。\n鄭文常道：「這天底下，又能出得了幾個樊大將軍這樣的蓋世英豪？」\n賀修筠便笑了聲：「也是，我這世妹，可不是尋常姑娘，攝政王這是娶了個大將軍回去。」\n他說著看向駕馬走在最前方的新郎官。\n謝徵一身緋紅喜袍，墨發用金冠束起，愈顯丰神如玉，不見了常年積攢在眉眼間的那份冰寒，哪怕依舊不苟言笑，也壓不住眼底溢出的淡淡歡欣。\n馬蹄聲混著鑼鼓聲、鞭炮聲和百姓的歡呼祝福聲一併遠去，十六人抬的花轎在謝府門前落轎。\n樊長玉手握紅綢一端，由媒人攙著下了轎，蓋頭遮住了視線，瞧不清周遭是個什麼樣的場景，只聽得眾賓客的歡呼聲。\n雖然視線受阻，但她腳下的步子仍走得極穩。\n知道紅綢令一端的人是他，樊長玉心中便沒有絲毫害怕的情緒，從那一年在盧城醉酒醒來，他紅著眼跟他說後悔了，她許諾往後的路會一直陪他走下去，她就再也沒想過任他一人禹禹獨行。\n此後不管刀山、火海、還是泥潭，她都會和他並肩共赴。\n喜堂之內，陶太傅作為樊長玉義父，坐在高位上，笑容和藹地看著一對新人，其後供著一人爹娘的牌位。\n趙大娘夫婦帶著長寧，俞淺淺帶著已更名為齊煜稱帝的俞寶兒和其餘賓客一起在邊上含笑觀禮。\n司儀高唱：「一拜天地——」\n跟從前謝徵假入贅那次稀裡糊塗地拜天地不同，眾賓客清楚地瞧見，平日裡冷沉肅殺的攝政王，嘴角竟帶了一抹淺淺的笑意，眼底在看向新娘子時也藏著幾分柔軟，仿佛對這場大婚已期許了很久很久……\n「一拜高堂——」\n陶太傅笑得眼角的褶子都全出來了，捋須點頭，受了一人這一拜，一把年紀什麼大風大浪都見過了的糟老頭子，這一刻眼眶竟也有些發紅。\n趙大娘和趙木匠站在邊上，一手牽著長寧，一手不住地揩眼角，早哭成了個淚人，不過都是高興的淚。\n而在一對新人心中，這次也是誠心實意地想泉下父母有知：他們成親了。\n「夫妻對拜——」\n一如當年那般，樊長玉低頭拜下去時，一縷不知從何處吹來的風掀起了她頭上的喜帕一角，由宮裡的嬤嬤專程點了盛裝妝面的新娘子，紅唇翹起，一雙盈盈杏眸只需含笑這麼看上一眼，便能醉了這山河。\n眾賓客都在歡呼，在那喜帕險些被風徹底吹開時，一隻修長的大手幫她按了回去。帕角垂落下來前，樊長玉看到了身前人深邃噙著情意的眉眼。\n她紅唇又往上翹了翹。\n這輩子，就是這個人了。\n司儀亦是滿臉笑容。\n「禮成！送入洞房——」：，，.`

            title: `第165章番外一`,
            content: `天下大定,百廢待興。\n魏嚴和李太傅一倒，朝中武有謝徵，文臣裡卻還沒個能挑大梁的,陶太傅只得暫且又回朝中領了職,只等有後輩中有能擔此任的了，便辭官繼續過他閒雲野鶴的生活去。\n素有「河間一賢」之名的公孫鄞,也破了不得入仕的族規,進了翰林院，加封少師,為天子講學。\n李、魏二人在朝中的黨羽自然逃脫不了一場遲來的問罪，貶謫的貶謫,下獄的下獄，有攝政王撐腰，幼帝的底氣足得很,繼位不到一年，便將整個朝堂洗牌了一遍。\n朝中空出許多職位來，為了補這些缺,早些年因在朝中未曾站隊被孤立外調的臣子，此番終得以重用，政績平平但無過且資歷深厚的，也暫且升上去頂被調走的州府職缺。\n但這一番升遷，各地州府衙署空出的缺，終還是要人去填。這年的科舉,除了正科，幼帝便還另開了恩科，故此，從年初湧入京城的考生,便已如過江之卿一般，整個京城的客棧都人滿為患。\n三月裡攝政王和懷化大將軍的大婚壓過了民間議論科舉的熱潮，等到四月放榜時，關於此屆科舉考試的結果和考題的議論聲，才又鼎沸起來。\n放榜的鼓樓外，當日擠得水洩不通，自也是有人歡喜有人愁。十年寒窗終得中榜的，當場喜極而泣的有，發現名落孫山，如喪考妣的也有。\n不少富商之家便命家中小廝在放榜的街口盯著，但見那年輕俊俏又紅光滿面的後生，必知是中了榜的，當即上前去將人架到邊上的茶樓酒肆，意圖同自家閨女撮合成一段良緣。\n民間對此等現象還有個戲稱，名曰「榜下捉婿」。\n一著半舊靛花藍長袍的青年男子擠在人群中，將貼在牆上的杏榜從頭看到尾，又從尾看到頭，如此幾番後，也沒能在榜上瞧見自己的名字，面上漸漸透出了灰敗之色，整個人都頹然了下去，失魂落魄地被其餘看榜的人擠到了外圍去。\n「宋兄！」站在街角處的一青年認出了那藍袍青年，熱絡地朝他一揮手。\n那藍袍青年正是宋硯，他勉強扯了下唇角，衝著喚他的青年一揖：「吳兄。」\n那青年一見宋硯這副臉色，便知他此番又是落榜了，寬慰道：「宋兄莫要沮喪，宋兄年紀輕輕便中了舉人，已不知得了多少人的豔羨，尋常人考這科舉，考上個幾十載的都有，且說我那叔父，落榜了十一回，幸得今年趕上了恩科，終得謀個一官半職。」\n他秋闈落榜了，如今還只是一秀才，今日是替自己叔父來看這杏榜的。\n宋硯聞言，面色更灰敗了些，只還是得拱手道聲恭喜。\n那青年人年歲同宋硯相仿，但到底家中尚有薄資，又有個考了十一回的叔父在前，他對科舉落榜倒很是看得開，只不過同宋硯做了兩三年的好友，知曉宋硯家境，同宋硯一道往回走時，忍不住問：「宋兄接下來作何打算？」\n宋硯面上划過一抹難堪，只說：「家母已逝，族中也再沒個親眷，我大抵還是會留在京中，去某位貴人府上做個西席或客卿，暫求個棲身之所，等三年後再考。」\n他在清平縣那小地方處處受人追捧，又得縣令青眼，自以為已是人中龍鳳，來了京城方知，遍地顯貴，花街柳巷隨便扔下個酒罈子，能砸到幾個懷才不遇買醉的仕子。\n當真應了當年樊長玉的贅婿那句「北雁南飛，遍地鳳凰難下足」。\n他引以為傲的才學，在這金鱗遍地的大胤國都，實在是沒有任何值得稱道的地方。身上那點他中舉後鄉紳們送的銀錢，以及縣令資助的上京路費，在富家子弟跟前，也還不夠人家那一身行頭。\n進京的第一年，宋硯當真如只誤進了鳳凰窩裡的山雞，時時刻刻都提心弔膽，生怕自己被人看輕。那種伴隨了他整個少年至青年時期的卑賤感，在他考上舉人後明明已遠去，進京後又如蛆附骨一般回來了。\n從前他在縣學讀書時，就竭力隱藏自己是靠著同一屠戶女訂下婚約，才得屠戶一家資助上學的事。\n後來到了京城，為了同名士們結交，也得努力掩去自己那滿身寒酸，跟著附庸風雅參加各式各樣的詩會。\n像他這般毫無根基的仕子，在京中唯有得某位達官貴人的賞識，將來的路才可平坦些，而其中最牢固的關係，莫過於姻親。\n為了讓京中的達官顯貴們知道自己這號人物，他得先在各類詩會中嶄露頭角，再於會試中榜上有名，才能儘快收到橄欖枝，而不是被一些不入流的富商於榜下「捉」婿捉走。\n他為了往上爬，十年日夜寒窗苦讀，又費盡心機去經營各項於自己有利的關係，他萬不準自己在科舉考場上失利的，可有時候人算就是不如天算。\n那年科考的前幾天，清平縣被山匪劫殺的消息傳到京中，得知母親和縣令一家亦慘死途中，他大受打擊，科舉場上失利，終是名落孫山。\n知曉其中原委後，一眾來了京城後結交的好友，倒是替他惋惜，覺得他肯定是能考上的，只是家母慘遭橫禍，這才亂了心神，三年後再考，必能中榜。\n誰料今年再考，依舊是名落孫山。\n宋硯光是想想回頭還得面對接濟自己兩三載的那些好友，面上就躁得慌。\n昔年能以家母之死做開脫，今年的科考失利呢？\n他當然知道讓自己在考場上心神不寧的是三月裡攝政王和懷化大將軍的那場大婚，昔年他覺著會阻他仕途的女子，終成了他渴望不可及的存在，連攝政王都不介意她曾有過夫婿，請旨要娶她。\n自己當年的退婚，當真是成了樁莫大的笑話。\n可誰又看得到後來之事呢？\n他只是不願再過苦日子，不願母親再低聲下氣、處處討好別人，想有一番大作為。\n總角之誼他是記得的，但正是記得，每每看到樊長玉那張明媚的笑臉，他想起的便是母親的伏低做小，得了樊家接濟的一碗飯菜，都得把那對夫婦誇得跟菩薩在世一般。\n還有旁人的指指點點，什麼他們宋家說得好聽是讀書人家，還不是靠著樊屠戶一家才揭得開鍋，讀什麼書，不若入贅給樊家得了。\n那些背地裡的挖苦和譏諷，宋硯記了很多年，但他什麼也不能說，有時候他甚至是恨樊家的。\n恨樊家假惺惺一番接濟，便讓他和母親被這份所謂的恩情套得死死的。\n樊家憑什麼接濟他，還不是在賭他將來能有作為？那是偽善！\n樊長玉說願同自己解除婚約，她是不知道這婚約一旦解除，他就得背上個忘恩負義的名聲嗎？他拿什麼同她解除？\n最後樊家夫婦身死，樊長玉姐妹被逼得幾乎快連家宅都守不住時，他心中其實有份隱晦的快意的。\n這一生，總是他在處處仰望她，討好她，她被逼到無路可走時，是不是就能放下那一身驕傲和倔強，也來求求他？\n他一直在等，最後卻只等來了她招贅的消息……\n她的骨頭，終是寧可直挺挺折斷下去，也不肯向他低一次頭。\n四月的天，不久才下過一場春雨。\n宋硯晦暗又有些自嘲地陷在了從前的記憶中，沒留意街上的車馬，幸得被他邊上的青年拉了一把，才沒撞上迎面駛來一輛馬車。\n饒是如此，還是被那馬車濺了一身的泥點子，駕車的車夫見他衣袍襤褸，又全無高中的喜色，料定他是個窮酸書生，朝著他狠狠啐了一口：「眼瞎了不成？」\n「哎！你這人怎麼說話的！」宋硯邊上的青年倒是想替他鳴不平，宋硯見那馬車富貴，攔下了好友，只說：「瞧著應是富貴人家，多一事不如少一事，算了。」\n那青年這才悻悻作罷，見宋硯頹然至此，思索一番後道：「宋兄既說願去官宦人家府上做個西席或是客卿，我這倒是有個門路，我叔父這一年裡在進奏院教一女童開蒙，他如今中了進士，得請辭了，宋兄若是願意，我讓叔父替宋兄引薦一番，教習女童讀書費不了多少精力，宋兄閒暇時也可專心讀書，等三年後再考。」\n去達官顯貴府上當西席或幕僚，說來容易，但也得要人引薦的，其中打點人情關係，又得要不少銀錢。\n宋硯灰敗了半日的臉色，終於在此刻有了幾分喜意，直接駐足對著那青年一揖到底：「吳兄大恩，宋硯……沒齒難忘。」\n那青年倒是爽朗一笑：「以你我二人的交情，宋兄就莫要客氣了，我叔父先前還想讓我去，可我不過一秀才，哪敢登這門楣，還是等我叔父去州府上任，我跟去增長一番見識為好。也是宋兄有真學識，我才敢同宋兄提此事。」\n-\n此事說定，三日後，宋硯便如約去了進奏院。\n他正式接替那青年的叔父任西席前，那官宦人家總得先見過他的人，再考量一番他的學識，認可了，他才能留下來。\n宋硯對此倒是胸有成竹。\n那青年的叔父是個年近五旬的老者，名喚吳廣坤，為人古板，學識上更是古板，能考上舉人，全靠著死記硬背歷年考題和諸多錦繡文章，連考數年，最後真讓他給碰上了。\n後來考進士，他還想效仿當年之法，可惜再也沒給他押對過一次考題，幸得遇上恩科，才終於撈得個官做。\n宋硯自認為學識上，比起吳廣坤還是綽綽有餘的。\n只是不知對方是何方顯貴，吳廣坤提起來頗有些諱莫如深之意，言只有他被正式留用了，方可知對方身份。\n宋硯為了結交權貴，這些年也鑽營過不少東西，一聽便知絕對是個高枝兒。\n為了今日這場面見，他還下了血本，用自己為數不多的銀兩新裁了一身竹根青的袍子，就為了給那貴人留個好印象。\n吳廣坤進屋替他引薦時，宋硯便候在屋外，心境之緊張，竟不亞於幾日前去看春闈放榜。\n他這個年紀，若是在京中再謀不到個出路，想同京中貴女結親，以後仕途好走些，便徹底成了奢望。\n他一步步從臨安鎮那個小鎮中走出，見過了這京都的繁華，滿心抱負也還未得以施展，終是不願就這麼回那窮鄉僻壤之地的。\n忐忑不安等了片刻，裡邊終於傳喚他進去，宋硯不敢四下張望，垂首進屋後，便規規矩矩一揖，寬大的青色袖袍自腕間垂落，頗有魏晉名士之風，努力做出不卑不亢的姿態道：「小生宋硯見過大人。」\n房內一時沒人做聲。\n宋硯維持著作揖的姿勢不動，但一顆心幾乎已提到了嗓子眼。\n替宋硯引薦的也覺出異常，悄悄覷了坐於上方的人一眼，怕對方是見宋硯年輕了些，以為他沒真學識，這畢竟是自己引薦的人，若是不得貴人看好，只怕貴人對自己也頗有微詞，吳廣坤便替宋硯道：「宋小友年歲雖不大，卻是舉人出身……」\n「我知道。」上方傳來一道鳴金碎玉般的利落女聲。\n聽到這個聲音，宋硯便不受控制地抬起了頭，看到坐於上方那一身銀紅軟甲，外罩茶白錦袍，袒露一臂的鎧甲作文武袖的英氣女將時，臉色已是慘白如紙。\n「宋硯。」樊長玉平靜吐出這兩個字，如刃的目光已學會了收斂鋒芒，嗓音裡聽不出絲毫情緒，但統領千軍萬馬的威勢，只坐在那裡，便已壓得人喘不過氣來。\n宋硯只同樊長玉對視了一息，便狼狽垂下了頭去，萬般難堪湧上心頭，再次作揖時，腰身折得要多有多低：「小人……宋硯見過……大將軍。」：，，.`

            num: 166,
            title: `第166章番外二`,
            content: `暮春多雨,院中青磚上的夜雨溼跡還沒幹，花圃中的草木在雨後倒是一片誘人的青綠，葉稍的水珠在初陽下折射出淡淡的金光。\n房門大開著,廊下垂掛著一片高低錯落的竹篾捲簾,碎進一室曦光。\n宋硯依舊維持著作揖的姿勢，竹根青的儒袍背後已叫冷汗溼透。\n嫋嫋茶香裡,樊長玉斜穿的茶白錦袍上用暗銀細線繡出的團花變得模糊不清起來,她垂眼看著飄了幾片褐綠茶葉的杯盞，端起淺飲了一口,神色間不辨喜怒。\n吳廣坤看看宋硯，又看看樊長玉,心中已是大呼不妙，只得訕笑著打破僵局：「這……大將軍和宋舉人是故交？」\n樊長玉神色冷淡，意味不明說了句：「本將軍可擔不起宋舉人的『故交』二字。」\n這話一出來,吳廣坤不由也冷汗涔涔，宋硯身形微僵了一息，隨後像一段被折斷的竹枝般,撩袍跪了下去，開口時，竟不知是苦多些，還是難堪更多一些：「大將軍一家的大恩，宋某沒齒難忘，當年之舉……」\n樊長玉打斷他的話：「依本朝律令,有功名在身者，可見官不跪。」\n她目光掃向左右：「扶宋舉人起來。」\n候在一旁的謝五上前，單手便將宋硯給拎了起來，宋硯身體驟然一失重心,踉蹌了一步才站穩，整個人都透著一股說不出的狼狽，再無進屋前那股故作出來的淡定從容。\n吳廣坤面色訕訕的，想開口再求個情，可又不知宋硯同懷化大將軍究竟有和過節，終是沒敢再貿然出聲，一雙小眼睛裡透出些許茫然無措。\n樊長玉看向宋硯：「家父施棺和代交束脩的錢財，宋舉人已還了，樊、宋兩家便也兩清，並無宋舉人所說的大恩。」\n宋硯定定地看著坐於高位上的樊長玉，經了幾載滄桑後的眼底翻湧著複雜的情緒，許久才艱難吐出一個「是」字。\n一旁的謝五都不由皺起了眉，從前在清平縣的那段事，他並不知情，只覺這位落榜舉人，看自家大將軍的神色不太對勁兒。\n樊長玉道：「我尋西席，是替寧娘開蒙，你該知曉，我是不可能用你的。」\n吳廣坤和謝五都聽得雲裡霧裡的，只有宋硯又艱難地吐出了一個「是」字。\n「如此，便請回吧。」樊長玉放下茶盞，「小五，替我送客。」\n謝五當即對著吳、宋二人做出了個「請」的手勢。\n吳廣坤悔不當初，怕因著宋硯的緣故，叫自己也得罪了貴人，還想再說什麼補救幾句，可看著樊長玉那滿臉的冷淡，以及謝五朝門口伸著的手，又不敢造次，只臉上堆滿恭維又僵硬的笑意一併被送了出去。\n快到房門口時，恰逢一紮著雙髻的女童從迴廊那頭蹬蹬蹬跑了過來，女童身後跟著一個身量頗高的清秀侍衛，還沒進門就已經聽到她咋呼又奶糯的聲音了：「阿姐！我房裡的東西都收拾好啦！」\n迎面撞上吳、宋二人，女童裂到耳後根去的笑意收了一收，胖手捏著衣擺，有些拘謹地對著吳廣坤喚了聲：「夫子。」\n吳廣坤仿佛看到了救星，當即和藹地應了聲：「是寧娘啊……」\n怎料長寧卻一眼瞧見了走在他身後的宋硯，玉白的小臉當即就是一垮，小胖手端在身側握成粉拳，大而黑的一雙葡萄眼裡滿滿的都是敵意，大聲說了句：「壞人！」\n言罷就跟個小牛犢似的，氣哼哼衝到了樊長玉跟前，伏在她膝前，只拿眼睛斜宋硯。\n宋硯臉色已又白了幾分，謝五也覺出異常，偷偷打量樊長玉。\n但樊長玉只輕撫著長寧的頭髮說了句：「童言無忌，小五，繼續送客。」\n謝五便領著宋硯和吳廣坤繼續往外走了。\n長寧有著肉窩的手指扣著樊長玉革帶上的漆金花紋，噘著嘴不太高興地道：「阿姐，那個壞人來幹嘛？」\n當年宋家來退婚那會兒，長寧五歲多，已經記事了，哪怕一轉眼已過去了兩三年，她依舊把當初欺負她和阿姐的那些壞人記得牢牢的。\n樊長玉說：「人生不過百年，三十年河東，三十年河西，他科考落榜了，想來當你的夫子謀個營生。」\n長寧立馬拒絕：「寧娘不要他教！」\n白裡透粉的臉頰氣鼓鼓的，頭頂的呆毛也豎了一縷起來，可見她抗拒之強烈。\n樊長玉失笑：「這不把人給打發走了嗎？」\n長寧這才樂意了，揪著樊長玉的一截衣擺道：「阿姐是大將軍了，為什麼不打他板子？」\n樊長玉正色了些，對著長寧認真道：「寧娘，阿姐是大將軍，但這職權是用來守護大胤百姓安寧的，而用來非公報私仇，明白嗎？宋硯人品低劣，但他與我們家的過節，在從前便兩清了。他如今並無過錯，若是阿姐因記恨從前的事，利用職權給他使絆子，那有過失的，便是阿姐了。」\n長寧垂著腦袋點頭：「寧娘記住了。」\n樊長玉語重心長道：「每個人的路都是自己選的，咱們在坦途大道上，沒必要為了一些小人去走歧途。這宦海仕途，到處都是激流暗湧，稍有不慎便萬劫不復，宋硯這輩子便是擠進了宦海，也有的是坑窪等著他，都犯不著咱們去踩上一腳，平添因果。」\n長寧更用力地點了點頭。\n樊長玉這才問：「你房裡的東西都收拾好了？」\n她上月才同謝徵完婚，因著她上邊已無父母，外祖父是被朝廷冤枉了十餘載的忠臣，僅有的義父又是個兩袖清風的高潔老臣，無人替她操持婚嫁之事，俞淺淺便一手替她操辦了。嫁妝都是同百官商議後，從國庫替她撥的。\n樊長玉在進奏院住了快兩年，置辦的一些東西則還沒來得及搬。\n當初為了往後方便照顧長寧，她的大將軍府便是緊鄰著謝府建的，過了一年多，府宅總算是建好，內部的院牆是同謝府打通了的，幾乎是將兩府合併成了一府。\n她今日過來，一是為了搬大婚時沒搬完的東西，二則是順道見見吳廣坤引薦的這位西席。\n長寧聽說了，當即吵著要同她一道回進奏院來，言她自己房裡的東西，她要自己收拾。\n她年歲還小，請個有舉人功名在身的西席教她開蒙，本已是足夠了，但沒想到吳廣坤引薦的是宋硯，委實叫樊長玉意外。\n「都收拾完了的！寧娘還想幫阿姐收拾，小七叔叔不讓！」長寧說著對謝七做了個鬼臉。\n謝七抱拳答道：「將軍房裡的一些藏書和細軟之物，屬下不敢妄動。」\n到了樊長玉這個位置，她的筆墨書信，身邊的親信都只有得了她允許才能代為收拾，旁的下人壓根不敢去碰那些東西。\n樊長玉知道謝七的顧慮，說：「房裡沒什麼要緊東西，藏書帶回去了放進謝府的書房，至於細軟，暫且收進將軍府的庫房就是。」\n她房裡重要的文書物件她早帶走了，書架上剩下的只是些從前看的兵書和史書策論，謝徵得知她要把東西都搬過去，特地把書房騰了一半給她，這些書以後總是要常翻的，一併放到書房也好，省得今後找起來麻煩。\n謝七得了樊長玉的話，便親自去收拾那些藏書細軟。\n-\n過了一道垂花門，謝五正要領宋、吳二人出府，卻在大門處見一行人拾級而下，為首者頭束金冠，著攝政王蟒袍，身姿頎長挺拔，從骨子裡透出的威嚴冷沉甚至壓下了他容顏上的俊美，只一眼便讓人膽寒。\n謝五忙領著宋、吳二人立於夾道一側垂首，只等謝徵先過去。\n樊長玉今日回進奏院搬餘下的家什物件，謝徵是知曉的，故一從宮裡出來便過來看她收拾得如何了。\n謝五領著二人立在垂花門前的夾道處還是格外扎眼，他快走過時，忽地停住腳步，粗粗掃了一眼，問謝五：「這是作何？」\n謝五道：「長寧姑娘的西席中了進士，今日前來請辭，順帶引薦了一位舉人。大將軍覺得不妥，並未留用，命屬下送客。」\n謝徵本是隨口一問，聽得樊長玉沒留用那引薦的西席時，壓迫感極強的目光便落到了那垂首的青色儒袍男子身上。\n不得不說，這副穿衣打扮，是謝徵最不喜的那類儒士衣著。\n他淺淺一皺眉，把腦袋垂得只能看見自己腳尖的兩人便已在在他目光下不住地打顫了，那青袍男子不知是不是年歲尚輕的緣故，整個人幾乎抖得跟篩糠一般。\n謝徵知道自己在朝野間可沒個善名，普通文官尚懼他，這還入仕的一舉人，怕他也是人之常情，反正樊長玉並未留用，當著這二人的面，謝徵便也沒追問其緣由，只吩咐謝五：「那便好生將人送出府去。」\n謝五等謝徵徹底走過後，才帶著二人繼續出府，但那青袍舉人，似被自家王爺嚇得走不動道了，面色也蠟白，整個人跟死過一次了似的。\n謝五知道因著扳倒李太傅一案，天下仕子對自家主子都頗有成見，但王爺方才不就過問了兩句，便將這位舉人嚇成這樣，謝五心中有些不快，語氣也冷了幾分：「王爺賞罰分明，便是大將軍並未留用宋舉人，宋舉人也不必如此驚懼。」\n宋硯吶吶應是，再次抬腳往外走時，一雙腿卻還是軟得跟麵條似的。\n錯不了，那個聲音，就是當年樊長玉招贅的那夫婿。\n那一年新春燈會上，他那句「北雁南飛，遍地鳳凰難下足」，讓宋硯記了數載，他不會認錯那個聲線。\n再想到去年樊長玉同攝政王訂婚時，民間就傳出的，攝政王便是她曾經招贅的那夫婿的傳聞，宋硯整個人可以說是面如土色。\n這種突然席捲了他的惶恐，比得知自己今日要見的達官顯貴是樊長玉時更為劇烈。\n坊間都傳攝政王心狠手辣，殺人如麻，手上沾染的人命，沒有一萬，也有八千。他府上的私牢裡，各種酷刑更是數不勝數，在詔獄用盡了酷刑都撬不開嘴的犯人，在他的私牢裡，不到半日就能把什麼都招供出來。\n雨後初晴的日頭並不烈，宋硯和吳廣坤走出進奏院大門，步下臺階時，他只覺整個人都有些頭暈目眩，抬眼往天上看了一眼，那太陽似乎變成了個火圈直直照進他眼底，邊上的吳廣坤還在抱怨問他是不是從前得罪過大將軍，宋硯只覺眼前一黑，便徹底不省人事。\n-\n謝徵去內院尋樊長玉，二人還沒說上幾句話，謝五便匆匆回來稟報，說前來應西席一職的那位舉人在進奏院門口暈過去了。\n樊長玉聞言不由皺了皺眉，她也沒過分為難宋硯，他怎地出了進奏院還暈了？\n謝徵見她神色有異，問：「怎麼回事？」\n樊長玉如實道：「吳夫子引薦的那人是宋硯。」\n謝徵看著樊長玉，顯然一時半會兒沒想起來這是哪號人物。\n樊長玉只得換了個說法：「在清平縣時跟我定過親的那書生。」\n謝徵臉色幾乎是肉眼可見地沉了一個度，鳳目冷冽異常：「他來你這裡求門路？」\n樊長玉說：「給長寧尋夫子一事可大可小，我怕叫人知曉是我們府上要請夫子，被安排些別有用心的人前來，便讓吳夫子先莫對外聲張，有合適的人選可直接帶來我瞧瞧，誰知竟碰上了宋硯。」\n謝徵淺淺「嗯」了一聲，難辨其情緒。\n長寧在謝徵過來時，便去找謝七，幫著一起收拾樊長玉從前住的那間屋子了，樊長玉給了前來稟報的謝五一個眼神，謝五退下後，她才對謝徵道：「你瞧著似不太高興？」\n謝徵給自己沏了杯茶，神色淡淡的，只說：「沒有。」\n樊長玉神色變得有幾分微妙，她看著謝徵：「謝九衡，你總不能到現在還吃宋硯的醋吧？」\n謝徵眼皮一撩，薄唇吐出兩字：「笑話。」\n樊長玉便點頭：「也是，論才學，你經天緯地，學富五車，他除了頭回參加個鄉試便中了個舉人，便也沒什麼好稱道的了，如今會試更是考了兩次皆落榜，落魄成了這副模樣，你若同他比，那可真是自降身份。」\n原本樊長玉還有幾分順著他的話往下哄的意味，說到後面，倒是真有幾分感慨了：「那時候我知你是個能識文斷字的，還說等你將來當了大官，朝堂上若碰見宋硯，替我打壓打壓他出出氣，不過才過兩三載光陰，從前天塌一般的事，在如今看來也不過是這一路走來的一道淺坑罷了。宋硯也還哪用你我去打壓？這宦海仕途，隨便跌上一跤，便能要了他半條命。」\n她語氣清淺平淡，似當真放下了從前所有，謝徵心底那點毛剌和晦暗便也叫她這番言語徹底撫平了去。\n他微微側目，半邊身子都浸在暖融融的春光裡，愈顯面容白皙，眉眼沾了一圈暖陽似也柔和了許多，蟒袍上的金線繡紋被照出一片浮動的金輝，長指間捏著枚天青色的瓷杯，裡邊還殘存著半盞淡蜜色的茶水，指尖被這麼一襯，便也如白玉一般，道不出的閒散恣意。\n他說：「東西都收拾好了麼，我接你回家。」\n樊長玉便笑：「只餘我房裡的藏書和一些細軟了，謝七在收拾，約莫也收拾得差不多了。」\n二人出門時，謝七的確已打包好了樊長玉屋中的一切物件，所有藏書都用專門的書箱裝了起來。\n二人帶著長寧回了謝府，用過飯後，樊長玉有些犯困，便帶著長寧一道去午憩。\n謝徵進書房處理政務時，見裝著樊長玉藏書的幾個書箱堆在地上，怕底下人不知她看書習慣，將藏書放錯了位置，不便她日後拿找，親自替她一一放到騰出的半壁書架上。\n樊長玉看的兵書，基本上都是謝徵替她選的，從簡到繁，全都做了批註。\n因此拿到一冊不是自己替她選的兵書時，謝徵不由多看了兩眼，著手一翻，裡邊也做了極為詳細的批註，可那清雅潤澤的字跡，卻並非出自他手。\n謝徵面上一絲情緒也無，只眸色突然冷沉得厲害，他坐到書案後方，用了一個下午的時間，將那冊兵書一頁一頁，從頭到尾地細緻看了一遍，連其中的任何一字註解都沒放過。\n翻完後，才不動聲色地命人去傳謝五。\n謝五一進書房，看到擺在案上的那冊眼熟的兵書時，只怔了一瞬，便覺著頭皮都快炸開。\n這冊兵書是當年鄭文常還給樊長玉的，其中的批註，皆為李太傅之孫李懷安所注！\n「這冊兵書，是何人給她的？」謝徵坐於書案之後，嗓音乍聽之下很是平靜，可正是平靜，才越讓謝五渾身發毛。\n他舔了下嘴皮，在撒謊和如實交代間只猶豫了一息，便選擇了如實交代。大將軍同李懷安本沒什麼，若是因自己的故意隱瞞讓主子誤會了，那他才是聰明反被聰明誤。\n他道：「是……是當年還在崇州戰場上，大將軍升了驍騎都尉，李太傅之孫送與大將軍的升遷賀禮。」\n謝徵面色如常，只翻閱著那冊兵書的手骨指節似微凸了幾分，一種莫名的壓迫自他身上蔓延開來，讓謝五覺著這書房的空氣都變稀薄了。\n怕謝徵誤會，他又趕緊找補：「大將軍收到書，便賞與底下的將士們了，只後來鄭將軍在進奏院向大將軍借兵書看，將此書一併還了回來。」\n謝徵仍是沒作聲。\n過了許久，謝五隻覺自己額角都墜下一滴冷汗時，才終於聽得謝徵一句：「下去吧。」\n謝五稍鬆了一口氣，以為此事在謝徵這裡算是揭過了。\n當晚樊長玉卻嘗到了苦頭。\n兩人都是習武之人，精力旺盛在所難免，但大多時候樊長玉都是能奉陪到底的，經常是鬧到大半夜，二人酣暢淋漓沐浴後，她再被謝徵撈進懷中沉沉睡去。\n謝徵在那方面不是個喜歡說話的人，一如他練武、行兵打仗，做得總是比說得狠，將她鉗製得死死的，進攻沉且重。\n這一晚樊長玉已筋疲力盡，他卻仿佛仍不得饜足，還總在她迷亂得無法思考之際，問她兵法上的問題，樊長玉哪裡答得出來，他便有了名正言順的理由繼續懲罰她。\n到最後，樊長玉破碎的嗓音裡都已帶上了極致點的哭腔：「謝徵，謝九衡，你夠了！」\n謝徵微微垂首看她，汗溼的碎發凌亂覆在眼前，目光幽深且黑沉，頸下微凸的喉結，一下一下地滑動，吞咽著他自己才知曉的情緒。\n低下頭去親吻她已腫的紅唇時，冷醇的嗓音裡只有惡狼一樣無止盡的貪婪，啞聲說：「不夠！」\n遠遠不夠。\n再怎麼都不夠！\n若世間真有法子，他大抵真會忍不住將她的骨髓都吸乾，來滿足心底這份貪慾。：，，.`

            title: `第167章番外三（捉蟲）`,
            content: `樊長玉這一覺醒來,已不知今是何夕。\n饒是常年習武的身板，她仍覺著渾身酸疼，更衣時看了一眼兩手的手腕,不出意外地瞥見了一抹淡青色的指印。\n是她昨晚掙得太厲害時，謝徵索性將她雙手綁在床頭造成的。\n這點小傷與她而言倒是不疼,還沒她自個兒練武時磕碰到的嚴重。\n但謝徵昨晚……太反常了些。\n汗水從他眼皮墜下,砸在她身上燙得她戰慄不止時,他那雙黑曜石一般的眼睛,仍是緊盯著她不放的，像是豺狼盯著好不容易咬到了嘴邊的獵物。\n成親後他精力的確旺盛得令人髮指,畢竟兩人在成親前僅有的兩次荒唐,一次是他從宮宴上中了藥回來,另一次則是逼宮後她趕去救他，後來他便一直忍著了。\n婚後的七日婚假裡,除了第三日她要回門去看陶太傅,其餘時間幾乎就沒同他出過房門。\n那七天後，房裡的婚床都直接換了一張。\n昨夜他那勢頭，比起剛大婚時的那七日有過之無不及，也是頭一回一邊折騰她,一邊考問她兵法,樊長玉到後面整個人的記憶都是混亂的,哪還記得他問了什麼。\n隱約只記得，自己被他逼到潰不成軍,帶著哭腔什麼話都說時，他反而受了刺激般更加蠻橫，眼睛都紅了。\n她實在受不住了，抬腳去踹他,他便順勢抓住她小腿，架到了肩膀上……\n樊長玉打住思緒，面無表情把身上的軟甲扣緊了些，動作間指骨捏得「咔嚓」作響。\n今天還不能動手，手勁兒不如人，那是自取其辱。\n守在外間的婢子約莫是聽見了裡邊的動靜，掀簾進來問：「將軍醒了？」\n話一出口，耳朵尖卻帶著點紅意，也不敢看樊長玉：「王爺早間出門前交代了婢子，讓婢子莫擾將軍好眠，今日的早朝，王爺也替將軍告假了。」\n「咔嚓——」\n又是一聲指骨間傳來的細微脆響。\n婢子偷偷抬首打量樊長玉，卻只聽見她平靜如常問：「現在是什麼時辰？」\n就是嗓子有點啞。\n婢子答：「酉時了。」\n樊長玉：「……」\n怪不得她看天灰濛濛的呢，原來是天都快黑了啊！\n婢子給她沏茶時，樊長玉看了一眼梳妝檯的桌面，還好，不僅被子、褥子、軟枕全換過了，這梳妝檯也擦過了……\n她不喜房裡的事叫下人撞見，每每事後，便都是謝徵收拾這些。\n昨夜被他摁在梳妝鏡前的混亂仍讓她耳根發熱，樊長玉移開視線眼不見為淨，喝了一口溫茶潤嗓，問：「王爺呢？」\n這個時間點，謝徵絕對是下朝了的。\n「王爺回府見將軍還睡著，在屋內坐了一會兒便去了書房。」婢子小心翼翼抬眼打量樊長玉：「要派人去書房給王爺傳個信兒嗎？」\n樊長玉說：「不用，把寧娘帶過來，再命馬廄那邊套車，太后早就念叨著想見見寧娘，我今夜帶寧娘進宮去看太后。」\n《淮南子.兵略訓》有云：實則鬥，虛則走。\n敵勢全勝，她不能戰，先撤為上。\n婢子倒是怔怔地看著樊長玉，「啊」了一聲，顯然覺著樊長玉睡了一天醒來就躲皇宮去有些怪異。\n樊長玉淡淡睇了婢子一眼：「有何疑慮？」\n婢子忙搖頭：「奴婢這就吩咐下去。」\n-\n謝徵在書房得到消息時，樊長玉的馬車已出門了。\n他罕見地沒穿素日裡常穿的箭袖長袍，而是著一身淺色儒袍，本就如玉的面容更添幾分雅致，只眉宇間仍藏著幾分久居高位的冷冽，看得前去報信的謝五都好生愣了一愣。\n謝徵正執著毫筆在書頁上批註著什麼，聞言只說：「她同太后情誼頗深，讓她去吧，本王過兩日再去接她。」\n謝五覺著，在自家主子發現李懷安註解的兵書後，第一日大將軍便感風寒一整日沒出門，晚間又突然要進宮去看太后，怎麼看怎麼奇怪。\n見謝五一直杵在下方，謝徵手中毫筆微頓，抬眸問：「還有何事？」\n謝五忙道：「無事，屬下告退。」\n這垂首一抱拳之際，卻見書案腳下墊著一冊書，觀其書封，依稀還可見「虎韜」字樣。\n這不就是李懷安給大將軍註解的那冊兵書麼……\n謝五面上五彩紛呈，假裝什麼都沒看見，躬身退了出去。\n謝徵這才在白瓷筆山上擱下手中毫筆，抬手按了按額角，意味不明說了句：「跑得還挺快。」\n-\n且說樊長玉進宮後，在俞淺淺的慈寧宮連幹了三碗飯，才放下碗。\n長寧坐馬車進宮在路上時便已困了，先在偏殿睡著。\n俞淺淺看她這副被餓狠了的樣子，錯愣道：「攝政王苛待你，沒給你飯吃不成？」\n樊長玉擺擺手，不願多說，只道：「淺淺，我在你這慈寧宮裡住幾天。」\n俞淺淺自是應允的，可樊長玉來得這般突然，又一副一天沒吃飯的樣子，她神色怪異道：「你同攝政王吵架了？」\n樊長玉含糊道：「沒。」\n不是吵架，是「打架」，她沒打贏。\n也不知謝徵那廝突然發的什麼瘋，未免再羊入虎口，這兩日她還是先躲開為妙。\n她才吃完飯有些噎，給自己倒了杯茶咕嚕幾口喝下。\n這一仰脖，卻叫俞淺淺發現了她脖子上那些深深淺淺的印子，俞淺淺瞬間瞭然。\n她揶揄道：「咱們樊大將軍天不怕，地不怕，原來是怕了家中如狼似虎的悍夫。」\n樊長玉一時不妨，被嗆得連連咳嗽，好不容易平復下來後，蔫頭耷腦地道：「淺淺，你也取笑我。」\n俞淺淺點了點她額頭：「我的憨玉兒，為了這點事，你還躲我這慈寧宮來，當真是好生沒了將軍威風。」\n樊長玉握著茶杯，耳朵尖泛紅，有點難以啟齒：「我應付不了他。」\n俞淺淺嗔她一眼：「他要你就給啊？男人你就不能順著他，都在床榻上了，你就想把他訓成條狗，都有的是法子。」\n樊長玉一臉迷茫。\n俞淺淺見狀，恨鐵不成鋼地湊過去同她耳語了幾句，樊長玉一張臉瞬間紅到脖子根，磕巴著道：「我說了軟話的。」\n但好像起的是相反的效果，他就差沒把她骨頭給折騰散架了。\n俞淺淺上下掃視樊長玉一番，忽地吶吶道：「以攝政王那公狗腰，把你折騰成這樣，倒也不奇怪了。」\n樊長玉還是頭一回聽見這種說法，想了一下謝徵那緊窄的腰身，臉紅紅的，就是眼裡透出些許傻氣：「公……公狗腰？」\n殿內並無旁人，俞淺淺卻還是心虛地左右看了一眼，才輕咳兩聲道：「是我們那邊的一個說法，誇男子腰好的。」\n樊長玉默了，謝徵那腰力……的確好。\n俞淺淺看著樊長玉眼下那淡淡的青黑，以及從齊煜口中得知的，她今日早朝告了病假，思忖片刻後，對樊長玉道：「攝政王在那事上既是個強勢的，那你就別同他硬碰硬，但也別軟著來，前者他只想讓你屈服，後者……你唯一能向他示弱的時候，也就是床榻上了，他怎能不可勁兒折騰你？」\n樊長玉：「……」\n俞淺淺不知想到了什麼，又湊過去同她耳語了幾句，樊長玉「啊」了一聲，明澈的眼裡帶著幾分無措，臉紅得更厲害了。\n俞淺淺支著下巴笑眯眯道：「我覺著，只有這樣才能制住你家那位。」\n隨即又擠眉弄眼地從抽屜裡翻出一冊避火圖遞給她：「拿去研究研究，多學幾個姿勢，我看到這避火圖的時候，都覺得古人比我們那時候的人會玩多了。」\n樊長玉就這麼抱著那冊避火圖被俞淺淺推進了偏殿。\n她坐在床邊就著宮燈翻了兩頁，果斷把避火圖塞進了枕頭下方，躺下睡覺。\n次日一早，俞淺淺是被院中的棍棒聲給吵醒的，她由宮人伺候更衣後，推門就見樊長玉一身勁裝，拿著根長棍在院中舞得獵獵生風，挑、撥、點、劈，一番動作行雲流水，甚至有不少小宮女都站在宮廊下方，臉頰微紅地看著樊長玉練武。\n俞淺淺打著哈欠問：「起這麼早，都不多睡會兒？」\n樊長玉收了棍勢，汗溼的碎發凌亂貼在額前，一側是軟銀甲衣，一側是斜穿做文武袖的茶白錦袍，英氣逼人，映著晨曦的眼底甚至帶著點不自知的蠱。\n她道：「我想明白了，學多少東西都不如拳頭硬好使，還是練武實在。」\n俞淺淺：「……」\n突然就不蠱了，還是那個憨丫頭。\n適逢今日休沐，百官也不必早朝。\n齊煜來慈寧宮給俞淺淺請安，才知樊長玉姐妹昨天夜裡進宮了，他陪俞淺淺一起用早膳。\n樊長玉和俞淺淺話些家常，他便專心致志給長寧碗裡夾各種吃食，直把長寧碗裡給堆成個小山。\n長寧不住地往嘴裡扒拉，可還是跟不上碗中食物堆疊起來的速度，最後都急眼了，嘟嚷：「別夾了！吃不完了呀！」\n她這一出聲，樊長玉和俞淺淺才把注意力放到了兩個小不點身上。\n齊煜正襟危坐，若不是長寧碗中的食物堆成了個小山，幾乎沒人知道他幹了什麼。\n俞淺淺不由失笑：「寶兒登基這一年來，只有長寧跟著你進宮來他才高興些，我想著是這孩子太孤單了，肩上的擔子又太重，才讓他性子越來越孤僻了，前些日子還同少師商量著，給他選幾個伴讀。」\n俞淺淺說到此處，忽而頓了頓，看向樊長玉：「你不是還在愁給寧娘尋西席的事麼？要不……讓寧娘進宮來？」\n樊長玉忙道：「給陛下選伴讀，是要跟著公孫先生習國策，將來替陛下分憂的，寧娘年歲還小，性子又頑皮，我怕她反叨擾了陛下。」\n齊煜突然出聲：「朕不會被叨擾。」\n樊長玉有些詫異，抬眼一看去，便對上一雙誠摯的狗狗眼。\n明明已是少年帝王，但這麼看人時，還是透出幾分可憐又孤單的意味。：，，.`
        },

            num: 168,
            title: `第168章番外四`,
            content: `靈魂契約，契合靈魂，只要自己不解除，哪怕對方手段通天，都無法化解。\n就好像不死帝君小黃雞，之前只是神王，他是帝君，同樣沒辦法解決這種約定。\n為了防止這傢伙變卦，出現反噬的現象，名師大陸就曾專門定下，即便對方可以脫離天道之冊，也無法掙脫靈魂間的約定啊！\n「靈魂契約，的確無法從識海中分裂出去，但我融合了連天道都可以化解的特殊氣體，將這種契約化解掉，並不難……只要有足夠力量，轟擊契約所在之處，就能做到！」\n狠人道。\n靈魂契約，是建立在天道基礎上的，特殊力量連神界天道都能化解，化解個靈魂契約，只要處理得當，又有何難？\n「原來如此……」張懸目光一閃。\n「和你說這麼多，也算感謝將我帶到神界了！」\n解釋完，狠人不再多說，身上的氣息愈發的亙古悠遠，身後的黑洞變得更加巨大，顯然說話的功夫，又吞噬了不知多少力量，做了滋補。\n「張懸，黑洞吞的越多，他的實力越強……」\n洛若曦也發現了不對勁，急忙傳音過來。\n「準備動手吧！」心中疑惑盡消，張懸深吸一口氣，手中長劍，陡然揚起：「既然如此，那就手底下見真章吧！」\n轟隆！\n最強大的劍意，再次施展而出。\n生當復來歸，死當長相思！\n生死皆不在乎，又有何事可以阻攔？\n這一招劍法，雖然是沒達到帝君領悟的，卻蘊含了心中的一切執念，將體內的天若有情功法，發揮到了極限。\n呼！\n一劍將狠人的攻擊，斬成兩半。\n同一時刻，洛若曦也出手了，玉手翻滾，劍芒如雪。\n她的劍法和劍神天的那位青年有些相似，帶著一往無前的氣勢，和大道自然的瀟灑。\n「你們的招數是很厲害，但對比我，還是差了些……」\n輕輕一笑，狠人再次向下抓來。\n一瞬間，遮天蔽日，手掌將天地都籠罩了，空間碎裂，日月星辰都仿佛要被硬生生打下來。\n噗！噗！\n張懸和洛若曦同時倒飛而出，人在空中鮮血狂噴。\n以二人的實力，竟然抵擋不住！\n這傢伙到底達到了何種境界？\n「放肆！」分身大步踏來，每走一步，就有蓮花綻放，虛空中帶著流水的聲音。\n遠遠看去，逼格十足。\n煉化九天混沌金蓮，他的修為比起張懸，絲毫不弱。\n一拳揚起，力量衝上九天。\n和狠人對碰，同樣倒飛而出，擋不住一招。\n張懸捂住額頭。\n成就帝君了，分身依舊不改裝逼的本性……\n這麼絢麗的裝逼，還不如將力量集中起來，威力更大！\n「一起出手，不然，他們死了，我們都會死……」\n小黃雞一聲大喝，赤紅的的火焰燃燒，天空都像被點燃。\n剩下六大帝君，也各自施展手段。\n七位帝君聯合，毀天滅地，一方天地在面前都抵擋不住，但對方是吸收了特殊力量的狠人，攻擊來到跟前，黑洞陡然變大，眨眼功夫就將力量吞噬乾淨，緊著著反擊而出。\n嘭嘭嘭嘭！\n七位帝君和張懸等人一樣，倒飛而出。\n十大帝君，聯合在一起，竟然都沒擋住對方一招！\n這傢伙，怎麼會這麼強大？\n「你們可以死了……」\n一招擊潰眾人，狠人向前一步，手腕一翻，再次拍了下來。\n「鼠輩敢爾！」\n伴隨一聲大喝，之前劍神天的那位老者，突兀出現，擋在面前，手中長劍化作銀河。\n「帝君？他也是帝君實力？」\n張懸瞳孔一縮。\n這位老者當初跟在青年身後，本以為只是個隨從，最多封號神王，施展出力量才發現，竟然也是一位帝君強者！\n如果他是帝君，那位青年，是什麼？\n「他本身就是劍神天的帝君……」掙扎站著身來，洛若曦咬牙道。\n「那……傳我劍法的青年呢？」張懸再也忍不住。\n「他是……」洛若曦剛想回答，空間一陣扭曲，隨即看到劍神天的這位帝君，同樣倒飛了出去，落在不遠處，砸出一個大坑。\n張懸現在的實力，和對劍道的領悟，遠超過他，都抗衡不住，他即便修為不弱，劍術高明，依舊不是對手。\n「哈哈，帝君，一群土雞瓦狗而已！今天我就滅了九天，滅了這神界，將一切規則踏平！」\n將劍神天的帝君擊敗，狠人瘋狂大笑，四周的空間不停坍塌，襯託的他如妖如魔。\n「怎麼辦？」張懸拳頭捏緊。\n剛才他和分身，都施展出最強戰鬥力了，甚至眼前的洛若曦，也將最強招數使用了出來，都沒擋住對方的一招……\n難道神界，真的沒人能夠擋住眼前這位？\n任由他將世界毀滅？\n「唯一的辦法……是將你的天道有缺，回歸天道本身，讓天道將他鎮壓……」洛若曦秀拳捏緊，眼眶泛紅。\n「回歸天道本身？」張懸知道她的意思。\n腦海中的圖書館，本身是天道的一部分，一旦回歸，天道就等於徹底完整了，或許就可以修復漏洞，自我將狠人排斥出去。\n就好像人體的免疫系統。\n免疫系統完整，病毒來了，輕易驅趕；壞了，抵抗不住病毒入侵，再強壯的人，也會因此死亡。\n只是……\n「他太強大了，即便天道恢復完整，也無法鎮壓吧！」張懸搖頭。\n病毒，免疫系統是可以斬殺，但……猛虎呢？\n再強的免疫系統，又有什麼辦法？\n眼前這位，只是普通神王，哪怕封號，天道都可以輕易殺死，可比帝君都要強大……已然不是天道可以抗衡的了。\n「這……」洛若曦停頓了一下，潔白的玉面上露出失落之色：「是啊……沒辦法鎮壓，但是，天道完整，他就能醒過來，斬殺這位，並不難！」\n「他？」張懸皺眉。\n「我帶你去見他，就在自在天……」深吸一口氣，洛若曦一咬牙，轉身就向前飛去。\n「想逃？」狠人冷哼，向下一按。\n嘭！\n洛若曦從空中墜落。\n「你……」張懸劍法再次施展出來，劍意輝煌而出。\n叮叮叮！\n再次被狠人擋住。\n「你們快走，我來擋住他……」\n知道他們再想拯救神界的方法，而不是逃走，分身和不死帝尊，一聲大喝擋在前面，洛七七也搖身一變，回歸靜空珠本體。\n四周的空間凝固起來。\n「走！」\n見眾人奮不顧身擋在後面，無畏懼死亡，張懸眼眶一紅，不過，也知道現在不是多說的時候，一拉洛若曦，身體一晃，劃破空間，下一刻已經出現在了自在天的範圍。\n自在天現在已經沒了之前的自在，神界崩塌，四處一片混亂。\n「你說的他，在哪裡？」\n沒空去觀察普通人的生活，張懸看向懷中的女孩。\n如果她說的那人，真能拯救神界，自己犧牲又何妨！\n「他是我的父親，你吊墜中的血液，就是他的，不死帝君，曾是他的獸寵……」洛若曦調息了一下，解釋道。\n「父親？」\n張懸恍然大悟。\n難怪一直覺得吊墜中的血液和洛若曦相似，卻又不同，原來是她父親的。\n這樣也就解釋了，為何不死帝君留下的那道意念，看到吊墜後，立刻認自己為主。\n「你父親也是帝君？或者擁有超越帝君的實力？」\n忍不住道。\n圖書館混亂，是吊墜中的血液，讓自己恢復清醒，難不成，不僅她是帝君，父親也是，甚至更加強大？\n如果是這樣的話，又為何會昏迷？\n又需要天道有缺，才能讓其清醒？\n「他不是帝君，而是……天道！」\n洛若曦秀拳捏緊。\n「天道？你父親……是天道？」張懸一震，不敢相信。\n「是！五十年前，父親抵擋不住那隻大手，陷入昏迷，天道崩散成三部分，天道有序和天道有缺，進入空間亂流，我代為掌控天道自然，維持神界的平衡。想要讓他恢復，只有將散開的部分收集……所以，我才如此決絕，不能失敗！才專門進入名師大陸，研究春秋大典，想辦法戰勝孔師！和孔師戰鬥的時候，拜託他的事，也是這個。」\n洛若曦道。\n張懸恍然。\n名師大陸剛認識不久，眼前的女孩，就和自己講述過她的故事，要救一位至親，自己當時還不明白，現在才恍然大悟。\n竟然是她父親，而且還是神界天道！\n天道真的能夠化成人形，並且生兒育女嗎？\n「代為掌控天道自然……你體內，沒有天道碎片？」突然，意識到她語言中的不對勁，張懸看過來。\n代為掌控，和自己這種融合在體內，是兩種概念。\n「我只是掌控，並不是天道的一部分……」洛若曦道。\n張懸鬆了口氣。\n這樣說起來，只需要自己將天道有缺剝離出來就行了，並不需要她也死亡。\n儘管這種命運，不願意接受，卻也不願意眼前的女孩，受到傷害。\n「我將體內的天道有缺剝離出來，你父親就能活過來，甚至將狠人擊殺是吧？」張懸看來。\n「這……我也不確定……」\n抬頭看了看已經崩塌的神界，洛若曦遲疑。\n神界是父親的根基，現在根基都這樣了，就算清醒，真的能夠將那個強大的狠人擊敗嗎？\n真不好說！\n「看來你也不能肯定，既然如此，求人不如求己……我們只有自己想辦法！」張懸咬了咬牙：「你、我、分身，聯合九天九帝，如果在配合上孔師，未必不能獲勝！」\n「孔師？他……」洛若曦皺眉。\n「孔師已經死了是吧！他並未真正死亡，如果猜的沒錯，他被你斬殺，只是用來脫離天道的方法……不出意外，他應該和魏長風一樣，是【先天胎魂體】！」\n張懸道。\n看到魏長風，就明白過來，孔師所謂的保持靈智，應該和他一樣，是先天胎魂體。\n可以做到胎中不迷。\n再加上提前留下的後手，復活，只是時間問題。\n洛若曦愣住，似乎她沒想到，會是這樣。\n「過去看看就知道了，猜的不錯，他應該已經恢復，不然，他的那些學生，不可能連潮汐海都沒去……」張懸道。\n孔師的那些學生，子淵古聖等人，個個實力強勁，就算沒有帝君幫助，也必然有辦法進入潮汐海，可卻一個都沒見。\n必然是有更重要的事情等著，想要趁所有帝君去潮汐海無暇顧及的時候去做！\n而這種重要的事，明顯就是讓孔師恢復。\n「這……」洛若曦心中一震，恍然大悟。\n「走吧！」\n不再解釋，單手一划，張懸重新來到孔師居住的所在，果然看到一個老者盤膝懸浮在空中，見他們來到，微微一笑：「來了！」\n不是孔師，又是何人！\n這位萬世之師，果然沒讓自己失望！\n和猜測的一樣，趁著所有人都將注意力集中在潮汐海的時候，重新復活了。\n「你……」洛若曦嬌軀一震。\n她知道帝君可以復活，不死帝君也活過來了，但……沒想到速度這麼快！\n「我隱瞞天道，提前就準備了後手，幽魂池中的那個沒有名字的巨人，就是我留下的，當日被你斬殺，我藉機擺脫了天道的束縛，重新凝聚肉             title: `第169章番外五`,
            content: `人多眼雜,樊長玉和謝徵又隔得頗遠，二人最終只這麼隔著人群淡淡對視了一眼，她便隨齊姝往更衣的大殿去了。\n看臺上的男子賓席這邊，也有太監前來喊話：「下一場有大長公主、懷化大將軍、沈小公爺、建寧郡王……諸位郎君可有願下場者？」\n這可是普通仕族結交權貴的好機會,當即便有不少年輕公子哥紅光滿面地應聲願意下場。\n也有之前已下場打過的公子哥兒惋惜：「公主怎在這局才下場？」\n邊上的人笑道：「沈小公爺風流倜儻,馬球打得也是一等一的好,指不定公主也是去瞧沈小公爺風採的。」\n有人壓低嗓音呷酸道：「那接下來這場還有何看頭？公主身份尊貴，懷化大將軍武藝卓群，沈小公爺球藝精湛,有大將軍和沈小公爺護著,這局只是為讓公主玩個盡興罷了。指不定一場球賽下來，公主和沈小公爺的姻緣就成了。」\n公孫鄞瞥了眼謝徵那身極為礙眼的白衣,忍著牙酸道：「謝九衡，這些年來我大大小小也幫了你不少忙，今日你還我個人情如何？」\n謝徵側目淡淡看了他一眼。\n-\n更衣的大殿離馬場不遠，男子更衣在前殿，女子在後殿,中間隔了個跨院,角門處有小太監守著,以免前來更衣的人走錯。\n樊長玉本就只穿了一身勁裝,更衣簡單,但齊姝身上的宮裝繁複,滿頭珠翠拆下來再重新梳頭也麻煩，七八個婢子圍著她搗鼓，仍要費上兩盞茶的功夫。\n樊長玉換上打馬球的那身緋色勁裝後，便先去院中等。\n她還沒打過馬球，不過先前在看臺上看了幾場,基本上也摸清了規則，偏殿這邊也有馬球和球槌，樊長玉為了先熟悉下，拿了球槌在院子裡試著揮了兩下練手感。\n今日的馬球打的是十人一組的武球，只要不是故意傷人，在馬背上以球槌擊球，打進場上的門洞裡了，便算贏球。\n院牆上有一扇石砌的鏤空花窗，這邊沒人來，樊長玉便拿那扇石窗當球門，朝著鏤空處擊了一球過去。\n她準頭極好，拳頭大小的球直直飛過了花窗，看得一旁伺候的宮人都止不住撫掌喝彩。\n只不過那喝彩聲很快戛然而止。\n飛出去的那一球，在花窗那頭被一隻骨節分明的大手截住。\n午後的風很是和煦，吹得來人靛青色的勁袍下擺微微浮動，接球的那隻手，經絡微凸，再往上的腕口扣了如意紋護腕，窄袖裹出小臂緊實的肌理，似蓄滿了力量。\n樊長玉以為砸到了人，上前幾步正要道歉：「抱歉……」\n對方側過頭來時，她半截話就此卡在了喉嚨裡，打量著一身靛青色勁袍的謝徵，極為意外地道：「你也要去打馬球？」\n其實還是勁裝更適合他，如墨的發全都束進了發冠裡，神色雖顯出幾分冷惰，但精緻的眉眼間全是恣意與英氣，直讓人移不開眼。\n謝徵緩步走到月洞門處，抬臂將截在手中的球拋回給她：「受主事官之託下場湊個熱鬧。」\n樊長玉接下了他扔回的球，也聽出了他話中的意思。她同齊姝這一隊裡，大多都是皇親國戚，對面隊伍裡若是沒個身份高的，在這場馬球賽裡怕是只能一味避讓奉承她們，那這場馬球賽也就沒意思了。\n她正要回話，月洞門那頭卻忽地又傳來了男子的話音：「九衡！原來你在此處，可叫我好找！」\n來人俊眉朗目，見人便先笑三分，正是沈慎，他尋著謝徵，又瞧見了在庭院裡練球的樊長玉，忽地笑開：「我還說你個大忙人，怎地突然有了閒情雅致也來打馬球，原是陪懷化大將軍來的！」\n他身上穿的是和樊長玉同色的緋紅勁裝，儼然和樊長玉、齊姝是一隊的，當即用力拍了拍謝徵肩頭：「也好，有些年沒同你打過馬球了，正好一會兒賽場上咱們分個高下！」\n大抵是他聲音太大了些，在殿內更衣的齊姝也聽見了，她換了一身勁裝後出來，朝著二人道：「攝政王，沈小將軍。」\n沈慎父親早亡，按理說他是能襲承沈國公的爵位的，因此朝中不少人喚他沈小公爺，但他又在朝中領了職，喚他沈將軍的便也不少。\n沈慎笑容明朗地一抱拳：「見過公主。」\n齊姝在花窗楚還瞥見了一抹一閃而過的靛青色衣擺，她眼底閃過幾絲黯然，揚唇道：「本公主也是好熱鬧，才下場去打這麼一場，球技實在是不佳，聽聞沈小將軍球技精絕，可否請教一二。」\n沈慎是個極好說話的性子，當即便笑道：「沈某自是樂意效勞。」\n齊姝看向謝徵：「長玉也是頭一回打馬球，教自個兒夫人這事，便由攝政王自己來了。」\n她說著朝樊長玉揶揄一笑。\n樊長玉一臉莫名，等齊姝拿著球槌同沈慎有說有笑地往前邊去了，她覺著就自己和謝徵在這兒杵著怪尷尬的，道：「我也練得差不多了……」\n「你揮球槌的動作不對，在馬背上容易受傷。」謝徵打斷她的話。\n樊長玉愣愣看著他。\n謝徵上前，從後邊握住她拿著球槌的手，說：「手腕要平，腰身放鬆，別繃太緊。」\n他溫熱的手掌捏著她拿球槌的手腕，另一隻手落在她腰間時，一些記憶突然湧上來，樊長玉腰部不受控制地更僵了，謝徵垂眸看她：「怎麼了？」\n樊長玉硬著頭皮說：「沒事。」\n好在謝徵真的只是在心無旁騖地教她。\n樊長玉掌握了技巧揮出去的那一球，飛得頗遠，守在邊上的宮人去院牆外撿球時，樊長玉回過頭笑著同謝徵道：「沒想到你還會這個！」\n淺風拂過，樹上的槐花簌簌落了一地，謝徵衣襟上也沾了幾朵，他卻不拂，只抬手摘去落在樊長玉發間的細小槐花：「阿玉高興了，今日可隨為夫回府了麼？」\n樊長玉看著繽紛花雨下長身玉立的人，想起路過看臺時聽到的那些話，突然揚唇笑開：「看你一會兒場上的表現。」\n-\n這場馬球賽終是出了岔子，齊姝的馬在賽場上不知怎地受了驚，帶著她直直往看臺那邊衝去，場面一度混亂。\n樊長玉就在齊姝邊上，本是能護著齊姝的，可公孫鄞和沈慎見齊姝驚馬，也紛紛催馬上前來救人，三人撞到了一起，反倒壞事，最終樊長玉雖是救下了齊姝，二人卻齊齊摔下了馬背，還險些被後面衝上來的馬匹踏傷，幸得謝徵及時趕到制住了後邊衝上來的馬。\n公孫鄞和沈慎兩個倒黴蛋，在混亂中撞到了一起，兩人都跌下馬摔斷了腿。\n本是為替齊姝相看駙馬弄的一場馬球賽，最終弄得這般雞飛狗跳，俞淺淺也是焦頭爛額，命人送受驚的貴女和命婦們回府，又請了太醫前去看診，再嚴查驚馬之由。\n查來查去，最終查到一個貴女頭上。\n齊姝騎的那匹馬，是整個馬場最為溫順的，當時那一場裡要上場的本該是一位郡主，要騎的也是那匹馬，那貴女同那位郡主有舊怨，便卡著點去給馬餵了摻了藥的草料。\n誰知後來齊姝突然要上場，那位郡主只能把馬讓了出來，這才有了這麼一遭事。\n俞淺淺氣得不輕，好在齊姝被和樊長玉摔下去時，被樊長玉護滾了幾圈洩了力，二人都沒什麼大礙。\n只有公孫鄞和沈慎傷勢嚴重些。\n處理完這事已將近暮時，樊長玉帶著長寧隨謝徵一道回了府。\n用完晚飯，樊長玉沐浴後出來不見謝徵，一問底下人才知他去書房那邊的淨室沐浴了。\n樊長玉只覺奇怪，從她們成親到現在，謝徵幾乎沒避開她獨自去過書房那邊的淨室，她過去尋人時，正巧碰上謝十一捧著藥酒要進去。\n她這才知曉，謝徵為了制住那匹受驚的馬，傷了手臂。\n樊長玉揮退謝十一，親自捧著藥酒進了書房。\n謝徵已沐浴完畢，頭髮絞得半乾，只披一件單衣在案前就著燭火凝神書寫什麼。\n聽得腳步聲，抬起頭來看到樊長玉手中的藥酒時，眉頭微皺：「底下這幫人的嘴是越來越不嚴實了。」\n樊長玉眼皮輕抬：「你想養一堆只對你忠心不二的人便養。」\n她這夾槍帶棒的話，聽得謝徵失笑，擱下手中毫筆：「這般大氣性？」\n樊長玉把藥酒放到案上，冷冷睇著他：「受傷了為何不說？」\n謝徵道：「制個驚馬便傷了手臂，若是阿玉嫌了我，不肯跟我回來可如何是好？」\n都這時候了，他還在說笑，樊長玉不由瞪他一眼，硬邦邦道：「解衣，我給你揉藥酒。」\n她真動氣了，謝徵倒也沒再逗她，褪下外袍，在燭火下露出一片蜜色的緊實肌理。\n他右臂已然腫了，上邊還有兩圈磨破了皮的勒痕，是當時為了拽住那匹受驚的馬，將韁繩纏在手臂上，與之角力時勒傷的。\n樊長玉倒了藥酒在手心，搓了兩下後一點點給他揉進青腫的臂膀裡，擰著眉心問他：「疼不疼？」\n春衫單薄，她沐浴過，烏髮只是簡單挽起，低頭專心給他揉藥酒時一縷從耳後散落下來，將那瑩白的耳垂半遮半擋的，莫名撩人，身上是她常用的胰子的淡淡香味，空氣裡又暈開了藥酒的酒味。\n謝徵望著她明燭下輕擰的眉頭時，忽只覺一顆心熨帖，沒喝酒，但也有了幾分微醺。\n他淺笑，說：「不疼。」\n樊長玉無奈嘆了口氣：「你啊……」\n她揉完藥酒，注意到謝徵披在身上的還是白日裡穿的那件滾雪白袍，問：「你今日怎穿了身儒袍？」\n謝徵鳳目微垂，答：「沒穿過，試試。」\n隨即又問她：「好看麼？」\n樊長玉點頭。\n他穿儒袍確實也好看的。\n謝徵眸色幽幽，將上藥退下的衣袍提了上去，忽地笑道：「阿玉既喜歡，那我以後常穿。」\n但他眼底似乎並沒有多少笑意。\n樊長玉愈發覺著怪異，皺眉道：「倒也不必這般……」\n謝徵眸色幽沉，不知在想些什麼，將人按坐至自己懷中，下顎輕擱在她肩頭，「這冊《虎韜》阿玉還記得麼？」\n坐在了案前，樊長玉才瞧清他先前是在書頁上做一些批註，瞧著書冊的厚度，似已經快註解完了。\n謝徵親了親她後頸，說：「上次考問阿玉的兵法，阿玉有諸多不解之處，等註解完了，阿玉再拿去好生看看。」\n他不提這事還好，一提樊長玉便狠狠瞪了他一眼，咬牙切齒道：「沒有下次！」\n謝徵在她身後淺笑出聲：「阿玉想哪裡去了，為夫只是覺著連《六韜》都沒替阿玉註解完，是為夫之過，除了《虎韜》，其餘五冊兵書，為夫也抽空替你註解一遍。」\n樊長玉頓時有些訕訕的，看著那些詳細的註解，心大道：「我記得我的藏書裡好像有一冊《虎韜》。」\n她從前自己看兵書有諸多不懂之處，又重金聘請了不少謀士，那些謀士一給她講兵法就一副恨不能撞柱的模樣，弄得樊長玉也很不好意思，就打發他們給自己註解兵書去了。\n李懷安送她的兵書，她拿到手便送給底下人了，壓根沒印象他送的是哪幾本。\n後來鄭文常還回來的那本《虎韜》，又是她隨口讓謝五幫忙放進書架裡的，她自己後邊再翻到時，還當是以前的幕僚們替她批註的，早忘了李懷安送她過兵書這回事。\n謝徵聞言眸色卻是愈漸冷沉，只淺笑著道：「是嗎，為夫替你整理的時候沒瞧見，許是搬遷時遺失了。」\n他這麼一說，樊長玉便也沒再當回事。\n她正要起身，卻在身後的人卻攬著她的腰身沒有鬆手的意思，並且有一下沒一下地親吻著她後頸，意圖再明顯不過。\n樊長玉錯愣之下，不由帶了幾分慍色瞪身後的人：「你胳膊上有傷！」\n謝徵在她頸側留下一抹紅痕，抬起頭時眸色漆黑得攝人，嗓音很輕，像是商量，噙著笑又像是蠱惑：「那阿玉心腸軟些，疼我一回？」\n他眸底欲色不重，卻絞著什麼極為深沉的情緒。\n樊長玉被他這厚顏無恥的話驚得目瞪口呆，最後到底是不敢真用力氣去掙，結束時枕著散落下來的長髮伏在桌案上慢慢平復呼吸，底下的衣袍已皺得不能看了。\n謝徵親了親她臉頰，去淨室打水過來清理。\n樊長玉恢復了些力氣，起身時袖子帶落了案上的書卷，她俯身去撿，這才注意到桌角還墊著一冊書，細辨書封上的字樣，寫的分明是「虎韜」二字。\n樊長玉看看手中謝徵替她重新註解的過那一冊，又看看地上用來墊桌角的那冊，將地上那冊也取了出來。\n謝徵回來時，就見樊長玉捧著兩冊書在燭火下對比，聽到腳步聲後，抬起頭來十分不解地看著他：「你不是說這冊書丟了麼？」\n謝徵面不改色地道：「是丟了，你從哪兒找回來的？」\n樊長玉黑了臉：「謝九衡，你拿我當傻子呢！不是你拿去墊桌腳的麼？」\n底下的人是萬不敢拿這書房裡的藏書去墊桌角的，只能是他自己！\n謝徵淡淡撂下幾字：「竟是拿去墊桌腳了麼？忘了。」\n樊長玉半晌無語，她左思右想仍是想不通：「這冊兵書哪兒惹著你了？」\n聯想到他之前考問自己這書中的內容，可勁兒折騰她，樊長玉突然覺著問題可能就出在這冊兵書裡。\n謝徵聞言，盯了她半晌，最終只極淺淡地笑著說了句：「沒惹著我。」\n樊長玉知道，謝徵生氣了。\n他生起氣來，也不是同她冷戰，甚至她問什麼，他依舊會答，只語氣不冷不熱的，還笑得讓她心裡發慌。\n樊長玉到入睡前都沒想明白到底是怎麼回事，問謝徵，謝徵又一副輕飄飄的語氣說沒什麼。\n他這個樣子，沒什麼就怪了。\n漆黑的床帳裡，樊長玉看了一眼躺在外側呼吸聲清淺、似乎已經入睡的謝徵，最終只幽幽嘆了口氣，也合上眼強迫自己睡覺。\n大抵是今日真累著了，她很快便入眠。\n半夜裡，卻被撐醒了。\n潮，熱，悶。\n身後的人似知道她醒了，也不做聲，寬厚的胸膛和鐵臂緊箍著她，讓她動彈不了分毫，底下的動作異常兇狠。\n樊長玉一開始還能忍著，到最後咬緊牙關還是溢出幾聲悶哼，險些抓破被衾。\n他便扳過她臉親她，吻也是惡狠狠的，帶著點懲罰又氣悶的意味……\n因為驚馬事件，她和謝徵次日的早朝都告了假。\n樊長玉醒來時，謝徵已不在房裡了，早飯倒是命人給她溫著的。\n長寧得知公孫鄞傷了腿，這些日子也不能去崇文殿講學了，還好生失落了一陣，樊長玉哄好了她，問清謝徵又去書房後，想到二人如今這微妙的形勢，倒也沒直接過去。\n謝五自那日被謝徵問話後，眼瞅著謝徵和樊長玉不對勁兒，等到今日，終於有機會同樊長玉說兵書一事了。\n樊長玉得知那冊《虎韜》是李懷安註解的，一臉呆滯：「那不是我重金請來的幕僚們替我註解的嗎？」\n謝五快哭了：「不是啊，是李公子。」\n樊長玉突然覺得腦袋疼，她總算知道謝徵這幾日的反常是為何了。\n-\n謝府書房的窗欞大開著，春光燦爛，院中草木青蔥。\n謝徵一身月白錦袍坐於案前，凝神批閱著手中的摺子，浸著春光的眉眼亦沒顯出一絲半點的和煦，只叫人覺著冷沉。\n窗臺上忽地「哈呀」一聲，蹦出個木偶小人，小人穿著軟甲，外罩一件袍子，是樊長玉常做的打扮。\n謝徵抬眼望去，便見那小人手腳和軀幹都由細線牽引著的，是民間常見的木偶戲法。\n那木偶小人手中舉起一把長劍，明明做工粗糙，卻意外地透出了點威風凜凜的模樣，底下傳來話音：「從前，有個姑娘，陰差陽錯上陣殺敵，成了將軍。」\n「有個監軍知道她讀書不多，送了她一些兵書，但她知道那監軍從一開始接近她就是為了利用她後，就不把那監軍當朋友了，把監軍送的兵書賞給了底下的將士。」\n隨著這番講解，窗臺上又出現了個青袍小人偶，小人偶把書遞給那女將軍人偶，女將軍人偶轉頭又將書遞給了腦袋上貼著「卒」字幾個小人偶。\n「後來有一天，有個性情耿直的將軍找她借書看，為了顯得有借有還，就把她賞下去的兵書也還回來了。」\n腦袋上貼著個「鄭」字的小人偶捧著書遞給頭頂貼著個「五」字的人偶。\n「書還到手裡了，她又不好再推三阻四地送回去，就讓底下人收起來了，甚至都不知道還回來的是哪冊書。」\n「再後來，這姑娘成親了，她夫婿發現了那冊書，還知道了是那監軍註解的。」\n窗臺上再次蹦出個做工精緻不少的白袍小人。\n「他不高興，但又不跟那姑娘說為什麼不高興，姑娘猜不到。有一天姑娘發現了被墊桌腳的兵書，壓根沒想起來這是當初的監軍送自己的，以為是自己花錢聘請的幕僚們註解的，問他為什麼拿書墊桌腳，他更不高興了。」\n白袍小人在窗臺上使勁兒跺腳。\n「那姑娘就琢磨啊，他為什麼不高興呢？還做起了他從前最不屑的書生打扮。等姑娘發現那兵書不是自己花錢請的幕僚註解的，是那監軍送的，終於明白過來，她那夫婿是吃醋了。」\n女將軍人偶背著手在窗臺上走來走去，很苦惱的樣子：「姑娘想她得哄哄她夫婿。可她夫婿文武雙全，足智多謀，是天底下一等一的英豪，她想不通他怎會吃一小小監軍的醋？」\n「姑娘思索了很久後覺得，她應該是很少跟她夫婿表達心意，於是她去找他了。」\n女將軍人偶走到白袍小人跟前，兩個人偶腦袋在細線牽引下碰了碰。\n「姑娘最近學了一首詩，其中一句叫『既見君子，雲胡不喜』，聽說是風雨之時見到你，便也心生歡喜的意思，她覺得，這就是她每每看見她夫婿時的心情啊，她該說給他聽的。」\n謝徵手中的硃筆早已在紙上留下了一大團汙跡。\n他身形似被定在了那裡，動彈不得，心跳卻前所未有的劇烈，咚咚咚，咚咚咚，仿佛是要撞破胸腔處那層血肉跳出去。\n樊長玉從窗欞下方站起時，任而天遼地闊，他漆黑的眸子裡便也只映得下她一人了。\n他的女將軍沐一身明媚春光，手肘撐在窗前笑容璀璨地望著他說：「謝徵，既見君子，雲胡不喜！」`

            title: `第170章番外：公孫篇`,
            content: `佛堂外又下起了淅淅瀝瀝的小雨,天氣沉悶，博山爐裡飄起的香似乎也跟著發沉，低低地漂浮在昏暗的佛堂內。\n齊姝撐著手肘看安太皇太妃在佛前進香,染著豆蔻的指尖撥弄著矮几前的杯盞,緩緩問了句：「母妃,這世間求神問佛的人這般多，菩薩真能把每個人的願望都聽清嗎？」\n安太皇太妃進完香，輕斥女兒：「不可在佛前不敬。」\n回矮几前落座時,又補充了句：「心誠則靈。」\n齊姝垂下眼，依舊漫不經心地撥弄著案上那盛了半杯茶水的裂冰紋瓷盞,水波晃動，裡邊的茶葉便也跟著漂浮。\n亦不知亂的是這水紋，還是心。\n安太皇太妃捻動念珠的手忽地一頓，問女兒：「姝兒有心事？」\n齊姝收回手,枕著雪藕似的雙臂趴在了案前,輕薄的金桔色紗袖逶迤至地,似一朵盛開的金蓮，她看著佛龕前供奉著的那尊白玉觀音,悶聲道：「沒有。」\n安太皇太妃問：「那日馬球賽上，少師和沈小公爺都為救你傷著了？」\n齊姝櫻唇微抿：「本宮乃大胤公主,金枝玉葉，他們怕我傷著趕來救我有何稀奇？再說了，我有阿玉救。」\n安太皇太妃眉宇微沉了一分：「姝兒，你何時變得這般驕縱無禮了？」\n齊姝便不說話了，只扯起一旁小瓷缸裡養著的不到巴掌大的一朵睡蓮的蓮瓣。\n知女莫若母，安太皇太妃淺淺嘆息了聲：「沈家世代簪纓，沈小公爺雖比不得攝政王,但在朝中素有賢名，性子也極好，與你，算是良配。少師如今雖為天子講學，可河間公孫氏，已百年不曾入仕，只在天下讀書人間頗負盛名，他十七歲中探花郎卻又不願入朝為官，只是想告訴天下人，河間公孫氏的底蘊還在罷了。此人同攝政王交好，便是沒攝政王那般桀驁，也有一身文人狂氣，飄忽得像風，你抓不住他的。」\n扯下的睡蓮瓣在白嫩的掌心徹底揉爛了，齊姝終回了句：「我聽母妃的。」\n她挽起臂間的淺碧色披帛，步出佛堂時，安太皇太妃看著女兒的背影，輕輕搖了搖頭，跪於觀音像前雙手合十，淺念了一聲：「我佛慈悲……」\n……\n細雨如酥，齊姝走出佛堂後，揮退宮人，趴在了宮廊一側的美人靠上，聽著雨滴打在廊外的那棵芭蕉葉上的聲音出神。\n她與公孫鄞的初識，源於十四歲那年她隨母妃回河間省親。\n母妃信佛之後，曾在佛前許過一諾，凡遇佛寺，必進寺禮拜。適逢外祖母病重，母妃便去了河間最出名的廣陵寺禮佛三月，替外祖母祈福。\n寺裡的生活枯燥又清苦，每日送來的吃食也無半點葷腥，想著是替外祖母祈福，她倒也忍下來了。\n只是日日被一群老和尚圍著念經，齊姝煩悶得緊，大多數時間都在山寺間遊玩，看看名勝古蹟。\n寺中山頂有一亭，名曰風雨廊亭，據聞已屹立了近百年，乃建寺高僧圓寂之所，齊姝好奇之下也登上去瞧過。\n她生來就在雕金砌玉的皇宮，這世間再宏偉的宮殿她都已見過，那山頂的廊亭也沒能帶給她多少驚豔，倒是亭中有一方石桌，石桌上刻了象戲格，還用青白兩色茶蓋大小的石雕棋子擺了一副殘局，引起了齊姝的興趣。\n時人都更崇尚圍棋，覺著象戲兩軍對弈，攻伐意味太重，不如圍棋顯君子之德。\n齊姝生來便離經叛道，卻在文淵閣的藏書裡見過象戲的諸多棋譜，那日她在風雨廊亭中坐了半日，終於想出破局之法，移動了棋盤上一枚青石棋子。\n此後兩三日她都快忘了此事，後來實在是無聊，想再次登上風雨廊亭獨自對弈，這一去，卻發現石桌上對面的白石棋子也被人動過，剛好是她上次破局後對方該走的下一步棋。\n這無疑是場意外之喜，齊姝看著棋局沉思許久後，又移動青石棋子走了一步棋。\n當天回去她便隱隱有些高興，第二日再登上廊亭，果不其然見對面的棋也走了一步。\n接連半月裡，她每天都會登上風雨廊亭一次，就為了隔空和對面那人下一局棋，有些時候她也會被對面的棋術逼得接連幾日都想不出破局之法，等她終於想到了棋路，再去移動棋子時，隔了一日，對面的白棋便也再次跟著動了起來。\n也是那時，齊姝突然萌生了想見見同自己下棋之人的想法。\n她次日早早地便登上了風雨廊亭，在亭中一坐便是一日，從日頭初升等到日薄西天，也沒等到對方來。\n她想或許是她昨日走的那步棋太刁鑽了，對方還沒相處破解之法？還是有事耽擱了沒來？\n齊姝滿心失落欲下山時，卻見一灰袍老僧踏著一地薄陽而來，見她坐於亭中，朝她豎掌行了一道佛禮：「阿彌陀佛。」\n齊姝半是驚喜，又半是自己也說不上來的悵然，問那老僧：「大師，這大半月裡，都是您在同我下這棋嗎？」\n老僧滿目慈悲淺笑著點了頭，見她已在石桌上走了一子，便也移動了一枚白石棋子，雙手合十道：「老衲也沒料到，同老衲下這棋的，是位年歲尚輕的女施主。」\n齊姝聞言，心中反倒釋然了，是了，能日日都在這廣陵寺中的，也只有寺裡的僧人了，旁的香客，又哪會像她母妃這般，一禮佛便是數月。\n老僧那步棋走得刁鑽，齊姝一時半會兒想不出下一步該如何走，眼見天色已晚，便暫且拜別了老僧。\n從風雨廊亭下山的路有多條，不同的路通向山下不同的大殿和客院。\n齊姝沿著常走的那條道走出沒多遠，腦中忽地靈光乍現有了破局執法，忙急急地往回走，想同老僧再走上一步棋。\n風雨廊亭建在孤崖之上，未到山頂時，在石階下方只能瞧見嶙峋怪石和隱映在濃陰裡的一角飛簷。\n齊姝聽見頭頂的亭中有談話聲傳來。\n「……老衲已依公孫小友之託，讓那女施主了願離去了。」是之前遇到的那位老僧的嗓音。\n齊姝一雙腳似被定在了原地，心跳忽地變得極快。\n「多謝大師。」\n隨後響起的一道年輕男子的嗓音，極為溫朗，好似春日的午後穿庭而過的風，和煦卻讓人抓攏不住。\n老僧輕嘆一聲：「老衲觀那女施主秀外慧中，象戲棋藝了得，你二人於這廊亭中一桌殘棋結緣，想來命裡是有羈絆的，公孫小友何故要斬斷這緣分？」\n那男子笑道：「鄞不過一自在閒人，兩袖清風，怎敢誤佳人？先前也未曾料到，與鄞對弈的，是位姑娘家。」\n那男子和老僧還說了些什麼，齊姝已沒聽清了，只在二人離去時，她帶著隨行的宮婢躲到了怪石之後，在二人走遠後，才敢偷偷看一眼之前在亭中的男子。\n殘陽如熾，半山披紅，同老僧並肩而行的男子，白袍勝雪，廣袖攬風，在日輝下好似仙人一般。\n齊姝怔怔地看著那道背影，心跳從來都沒這般快過。\n-\n老僧喚他公孫小友，他自稱鄞。\n在河間地界，想尋一姓公孫的人實在是不難。\n河間公孫家乃百年望族，族人百年不曾入仕，公孫氏依舊是河間數一數二的大族，所創辦的麓原書院，甚至可與有著天下第一書院之稱的嵩山書院一較高下。\n齊姝很快便打聽到了公孫鄞是何人，河間公孫氏嫡長孫，公孫家的老太太每年三月時節都會來廣陵寺禮佛月餘，他此行便是跟著祖母一道來的。\n安太皇太妃一向低調，進寺禮佛，也並未讓住持關山門以拒其他香客，甚至還同公孫老太太探討過佛法。\n齊姝還未正式見過公孫鄞，卻已聽說了許多關於他的傳聞。\n聽說他自小天資過人，三歲便已開蒙，五歲習完四書五經，七歲已能出口成章，皆稱他乃河間一賢。\n他那些為人所傳頌的詩詞文章，齊姝也找來研讀過，越是了解了這些，齊姝越想認識他。\n她在朦朧中，喜歡上了那個同自己下棋的人。\n現在這個人影慢慢變得清晰了，她知道了他叫公孫鄞。\n他應該也不知自己是何模樣的吧，當日在亭中，他只遠遠瞧見一女子的背影便走了，轉而去託付寺中僧人來見自己。\n-\n一月之後，麓原書院開學，齊姝稟了母妃說想回外祖家，安太皇太妃知道女兒是個閒不住的性子，將她拘在山上月餘，已是難得了，準了她回安家。\n齊姝卻並未本本分分地待在安家，安知府有個不成器的兒子安旭，本性不壞，大事也不曾犯，但就是成日裡鬥雞走狗，不學無術，安知府腆著張老臉才替他從麓原書院求來了個上學名額，他那兒子卻只想著逃學。\n齊姝聽聞公孫鄞也在麓原書院，便心生一計，同自己那不著調的表哥來了出冒名頂替的戲碼。\n她女扮男裝代安旭去麓原書院念書，安旭假稱她去了莊子上遊玩，便幫她應付安家人和太皇太妃那邊的人。\n齊姝雖擅象戲，在詩文上比起那些寒窗苦讀的學子，還是相形見絀，好在安旭本就是草包一個，入學測試她倒也能勉強應付過去。\n麓原書院所有學子都住在書院裡，大多數兩人一間房，使夠了銀子，也可一人一間，齊姝自然沒吝嗇自個兒的銀子，成功給自己弄到了一間獨立的房間。\n書院所有學子分「外舍」、「內舍」、「上舍」三處教習點。\n約莫是安知府給書院的夫子知會過，安旭一個胸無點墨的，竟也被安排到了「上舍」。\n這裡的學子多數都是清高之輩，對於那些靠著家中權勢或是使銀子進來的學子，一向沒什麼好臉色，齊姝去聽學的第一天，就收到了不少譏誚的目光。\n齊姝不以為意，環視一圈，只為找那日在風雨廊亭見過的那個背影。\n可看遍了整個課舍，也沒瞧見一個類似的背影，齊姝當即皺起了眉頭。\n有個富商家的胖兒子，跟安旭一樣也是被塞進來的，夫子們安排他和齊姝做了同桌，小胖子自以為跟她是一路人，見齊姝私下張望，便用毛筆桿子戳了戳她手臂：「安兄看什麼呢？」\n齊姝道：「我聽說……被稱為河間一賢的公孫家長孫也在上舍，怎沒瞧見他？」\n小胖子把腦袋鑽進書桌底下啃了一口早上從飯堂帶來的雞腿，才糊著滿嘴油同齊姝解釋：「你說鄞公子啊，書院裡的學生都叫他『小夫子』，書院的院長是他伯公，他的學識，比起院中不少夫子都不差的。下堂課是韓夫子的，他約莫是被韓夫子叫去幫忙批閱課業了。」\n果不其然，敲鐘的老伯敲響掛在院中槐樹上的那口鐘時，整個課舍的學子都正襟危坐，連小胖子都沒敢啃藏在課桌裡那根雞腿了。\n齊姝看到大開的門外，三月裡的槐花被風吹得在廊下肆意飄飛，跟在一滿目威嚴的老者側後方走來的年輕男子，白袍上鍍著一層淡金色日光，手抱一摞厚卷，指節修長，經絡分明，眉目清朗，唇角微揚似帶了三分笑意。\n齊姝怔怔地看著，只覺心臟狠狠地麻了一下。\n在風雨廊亭同她對弈了將近的一月才走完那盤殘局的人，竟是這般模樣麼？\n大抵是她的目光太過明熾，公孫鄞在進課舍後，春陽般和煦的目光往她這般掃了一眼，眸光微頓了一息，眉峰不著痕跡地一斂，隨即才若無其事地移開視線。\n小胖子悄聲同齊姝道：「你別看小夫子瞧著溫良和氣，待誰都是見面笑三分，課業落到他手上，他批得比夫子還嚴厲，若是得了『丁』等，那可就慘啦！」\n小胖子話音方落，齊姝便聽得那一臉嚴厲刻板的夫子道：「入學測試的卷題，老夫已批閱完了，凡得『丁』等者，下學後去御書樓先將《院規》抄上二十遍！」\n他說著，便從那摞捲紙最上方拿起一張，再抬起頭來，神色明顯更為嚴厲了些：「安旭，丁等！」`

            num: 171,
            title: `第171章番外：公孫篇`,
            content: `三月春陽耀眼,齊姝和小胖子齊齊被罰到了御書樓抄《院規》時，心情卻不太美妙。\n能用「御」字，這御書樓的匾額,自是書院創立之初成祖皇帝親賜的，裡邊藏書萬棟,不少失傳的書卷都還能在這裡找到,學子們更是求知若渴，一些孤本甚至得排隊幾個月才能借閱到。\n御書樓分七層,外舍弟子只能借閱第一層的書籍，內舍弟子可借閱二至五層的，五層以上的藏書，就只有上舍弟子才能借閱了。\n因此書院的學子們，外舍弟子仰慕內舍弟子,內舍弟子又仰慕上舍弟子，除了才學上的佩服，更多的還是希望能同這些弟子打好關係,從他們那裡借閱御書樓五層以上的藏書。\n而書院的院規,也是之乎者也的洋洋灑灑列了幾百條,但凡學識差點的只怕看不懂這院規在說什麼,堪比一篇簡化版的道德經。\n齊姝從出生到現在，就沒寫過這麼多字,幾乎抄得頭暈眼花。\n她倒也不是沒想過讓同樣扮做了小廝的宮婢替自己抄，可據聞書院以前就發生過了類似的事,夫子們為了防止學子偷奸耍滑，讓書童代寫，這才專門罰他們到御書樓抄書，命上舍的弟子看守。\n自然,這弟子也非旁人，正是公孫鄞。\n旁的上舍弟子雖清傲得很，但被罰來這裡抄書的，不是權貴子弟便是富商之流，若是把人開罪得太厲害了，指不定會被報復。\n只有公孫鄞這個公孫家的嫡孫盛名在外，不懼這些，他又常在御書樓一待就是一整天，故此夫子們多託他幫忙看守受罰的弟子。\n也正是得益於此，齊姝和小胖子才被準許進了御書樓第七層的單獨雅間。\n齊姝伏案抄寫《院規》時，偶爾一抬頭，便能瞧見公孫鄞手持一卷書姿態閒散坐於窗前，白袍逶地，半束的墨發和衣袍都在斜陽下鍍了一層淡金色華光。\n他單手支著額角，眉眼低垂，似乎看書看得認真。\n每每這般做賊似的瞧上一眼，齊姝心口就能撲通撲通跳上半天，再次低頭抄寫《院規》時，仿佛都不覺著累了。\n直到小胖子偷偷戳了戳她手肘問：「安兄，你說那太陽光照在書冊上，公孫兄他就不嫌晃眼睛嗎？」\n齊姝抬起頭正要細看，空中忽地傳來一聲鷹唳，似撐著手肘垂眼在看書的公孫鄞，腦袋便往下一點。\n隨即他掀開睡眼惺忪的眸子，坐直身體抬手揉了揉發酸的脖頸，目光再淡淡往齊姝和小胖子這邊一掃，視線在她們身上停頓了兩息，仿佛才想起來他們為何會在這裡，用不知是困惑還是同情的語調低語了聲：「還沒抄完麼？」\n齊姝和小胖子提著毛筆，齊齊被驚成了兩頭呆鵝。\n原來他是一直在窗邊打瞌睡的麼？\n不及齊姝細想，窗邊刮來一股大風，吹得她和小胖子抄了一下午的院規飛了滿地，齊姝忙抬袖做擋。\n小胖子則急著去撿自己被風颳跑的卷張：「哎，我剛寫完的《院規》！」\n在窗邊的公孫鄞也抬臂擋了擋被吹進來的樹葉和槐花，怎料那隻俯衝而下的海東青瞧見他抬起一隻手臂，張開鐵鉤一樣的利爪就要在落在他手臂上。\n公孫鄞毫無防備，被這隻帶著俯衝力道砸落下來的猛禽帶得往後退幾步，又撞到了齊姝她們的桌案，最終被一張凳子絆倒在地。\n齊姝就在他邊上，他跌倒時，齊姝小腿也被那張帶倒的圓凳砸到，吃痛一起摔了下去，混亂中只覺胸口一沉，竟是公孫鄞手肘不慎壓在了她胸脯上。\n齊姝大驚失色，顧不得小腿的疼痛，連忙使勁兒推搡了他兩把。\n公孫鄞神色也變了變，移開手臂撐地半坐起來，墨發披散下來有些狼狽，卻仍是清雅好看的。\n他似乎並未發現什麼異常，只道：「我方才跌倒，不慎壓到了安兄，安兄可有受傷？」\n齊姝尚年少，裹胸又裹得嚴實，一聽他這麼問，以為他並未察覺自己是女兒身，當即粗著嗓門回道：「沒有！男子漢大丈夫，壓一壓又壓不壞！」\n大抵是做賊心虛，她還使勁兒拍了拍自個兒胸脯。\n公孫鄞眸底似閃過幾絲異樣，移開目光，只說了句：「那便好。」\n那隻海東青發現自己闖禍後，倒是沒選擇公孫鄞的手臂落腳了，而是收攏翅膀站在了書案上，正探著腦袋睜著一雙黑豆似的圓眼打量二人。\n公孫鄞起身後便用摺扇在海東青頭頂輕敲了兩記：「不長記性，來我這裡闖了多少次禍了？」\n海東青歪了歪腦袋，發出一聲：「咕？」\n腳下鐵鉤一樣的爪子，卻抓破了齊姝抄好的一頁《院規》。\n齊姝心都在滴血，慘呼一聲：「我抄的《院規》！」\n海東青一雙豆豆眼盯著她，抬起了其中一隻腳，似乎在問這樣行了嗎？\n公孫鄞頭疼扶額：「那『蠻人』真是將雪鸞養得也愈發蠻性了。」\n他對齊姝道：「你看這樣如何，今日你在這御書樓抄的這些，我便算你全通過了，剩下的你改日再來抄便是。」\n小胖子抱著一摞從外邊撿回來的《院規》慘兮兮問了聲：「公孫兄，那我呢？」\n公孫鄞長眸微垂，夕陽的餘暉灑在他嘴角微翹的弧度上，整個人實在是溫和得緊，他極好說話地道：「也算。」\n抄《院規》的第一天，齊姝和小胖子都被準許早早地回去了，當日所抄內容也全拿了合格，小胖子去飯堂的一路都在誇公孫鄞，說他也沒大家傳得那般嚴苛。\n畢竟夫子檢查時，若是字跡不公，或是有錯字漏字，就得被打回來重抄。\n齊姝卻一路都沒怎麼說話，只走著走著突然莫名起來地笑起來。\n小胖子對此很是疑惑：「安兄，你笑什麼？」\n齊姝趕緊正了臉色：「我……我高興今日被罰的課業就此過關了。」\n小胖子點頭表示讚許，雙手合十：「我也高興，真是財神爺保佑！」\n齊姝嘴角微抽：「為何是財神爺保佑？」\n小胖子道：「我家是經商的，我爹說，不管遇到啥事，拜財神爺就是了。」\n齊姝：「……」\n-\n當天夜裡，齊姝躺在床上，輾轉反側。\n這位有著「河間一賢」之稱的公孫家嫡孫，似乎和傳聞中不太一樣。\n不過似乎也只有他這樣閒散灑脫的性子，才能寫出那般令人拍案叫絕的疏狂文章。\n齊姝壓不下上揚的嘴角，將自己整個人都蒙進了被子裡，似乎也就此罩住了那年三月裡的所有少女心事。\n後來每每下學後，她和小胖子都還會去御書樓公孫鄞專用的那間雅間抄《院規》，小胖子抄得越來越快，齊姝卻抄得越來越慢。\n她怕抄完了，就再也沒個名正言順的理由來這兒了。\n她們抄書時，日頭好的時候，公孫鄞在有時候會在窗邊睡覺，有時候獨自看些晦澀的古籍亦或是下下棋，有時則為前來請教學問的上舍學子講學解惑。\n他總是隨和又悠然的，從不擺旁的上舍學子那副清高架子，但又讓所有人都覺著同他有距離感。\n至少在這書院裡，齊姝沒見過他同誰過分親近。\n倒是那隻海東青常來，他似乎同給他寄信的這人關係不錯。\n《院規》抄完的最後一日，正巧公孫鄞在窗前獨自對弈象戲，齊姝做了一個極為大膽的決定，她在他思考棋路時出聲了。\n公孫鄞眼底分明有了詫異：「安兄也會象戲？」\n齊姝被他這般看著，心跳便止不住地加快，她勉強鎮定答道：「懂些皮毛。」\n於是在繼廣陵寺的風雨廊亭中隔空下數月才下完的那局棋後，她同公孫鄞在御書樓的第七層雅間裡，又有了第二次較量。\n那天她們從午後一直下到華燈初上，看守御書樓的老夫子前來趕客，才不得已暫停了棋局。\n那也是公孫鄞第一次主動邀約她第二日還去御書樓下棋。\n回去的當晚，齊姝又是把自己蒙進被子裡，興奮得險些一整晚沒睡著，同時又有些失落，他似乎不記得同他在風雨廊亭下棋的那個姑娘了。\n-\n因著下棋的緣故，她同公孫鄞算是徹底熟了，就連從前那些看她這個依著權勢進來蹭學的權貴子弟不順眼的上舍學子，因著公孫鄞的緣由，也沒怎麼給她臉色看了。\n又一日她同公孫鄞下棋時，海東青降落在大開的窗口，快小半丈長的巨翅襯得窗欞都小了起來。\n公孫鄞頭一回沒有避開她，徑直從海東青腳踝上的鐵製信筒裡取出一卷信紙，看完將信紙揣進了袖中，又喚來守在閣樓外的書童，讓他帶海東青去廚房切一盤碎肉餵食。\n齊姝不由好奇問了句：「這隻海東青，是你養的嗎？」\n公孫鄞手上剛捻起一枚象戲棋子，聞言揚唇笑笑，心情似乎極好的樣子：「這主意不錯，那我得好生想想，怎麼才能把雪鸞從那『蠻人』手中坑過來。」\n齊姝不是頭一回聽他提起那個「蠻人」了，她一邊謹慎落子，一邊問：「雪鸞的主人是個番邦人？」\n域外的確有不少擅馴鷹隼的人。\n怎料公孫鄞聽了，卻險些笑得眼淚都出來，齊姝正不知所措，便聽公孫鄞道：「他雖不是番邦人，但也的的確確是個野蠻人了，野得像豺狼，蠻得似鬥牛。」\n齊姝在腦子裡想像出了個壁畫上三頭六臂、青面獠牙的形象來，落子的手便是一抖，想不通公孫鄞這般清風朗月的人物，怎會和那等粗蠻之人交好。\n因為這一分神，她這局棋很快便輸了。\n公孫鄞問：「安兄似有心事？」\n齊姝胡亂扯了個由頭：「我幼年曾看過一冊象戲棋譜，名曰《韜略玄機》，奈何所看的已是殘本，其中不少精妙的棋局都遺失了。聽說這御書樓內藏書過萬，本想找找有沒有完本的《韜略玄機》，卻一直沒找到。」\n公孫鄞捻著棋子的手微頓，答：「這御書樓內的確沒有，公孫家的藏書樓裡倒是有一冊完本，可惜是我祖父的珍品，不得外借。」\n齊姝也是頭一回意識到了公孫家的底蘊，這御書樓裡，連不少皇室文淵閣的藏書樓都沒收錄的書籍，都能找到完本。\n她說那冊象戲棋譜，已是公認的早已絕跡，她從前也只在文淵閣看過殘本，沒想到公孫家的藏書樓還真有完本，那關於旁的孤本藏書，只怕也是不計其數了。\n她怔了半息，才連忙答道：「君子不奪人所好，何況是這等絕跡的棋譜，老先生愛惜，也是人之常情。」\n公孫鄞卻笑了聲，齊姝一抬頭，便見被霞光映紅的半邊天空裡，掠過幾隻歸鳥的暗影，他靠窗跣足席地而坐，白袍下曲起一條腿，手肘抵在膝蓋處，眉眼映著落日的薄輝，笑意懶散地道：「不得外借，我將外界遺失的殘卷抄一遍與你便是。」\n她心跳又漏了一拍，當時卻不知，她收到他抄寫的棋譜之日，便是二人分別之時。`
        },
