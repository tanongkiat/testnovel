            num: 103,
            title: `第103章第103章`,
            content: `等終於能瞧見唐培義帶去的那支援軍的軍旗時,樊長玉和身後麻木廝殺的將士們頓時又覺著殺出去有望了。\n不少小卒都興奮起來，殺敵都勇猛了幾分。\n郭百戶亦是喜極大喝一聲：「老子差點以為這條命得交代在這裡了！」\n唐培義也看到了樊長玉這邊的前鋒旗，帶領著援軍往這邊靠，反賊一見圍剿他們無望後,行令官舉著令旗駕馬奔走,飛快地打著旗語。\n追著樊長玉等人的反賊咬得沒那般緊了,她們很快和唐培義帶去的援軍匯合。\n唐培義瞧見樊長玉，坐在馬背上不無意外地道：「在戰場上隨機應變,帶著右翼軍為前鋒殺進敵陣的就是你？」\n樊長玉眼下實在是狼狽,頭盔早就不知掉落在何處了，扎在頭頂的小髻倒是還沒散,一張臉糊滿鮮血和塵土,只有一雙眼睛依舊漆黑攝人,恍若下山的猛虎。\n她太累了,撐著陌刀才能站穩,聽到問話本要抱拳回答,唐培義看出她們一行人精疲力竭，抬手示意她不必抱拳,道：「右翼軍此番居功甚偉，等打完這一仗,本將軍親自去賀大人跟前替你們請功！」\n樊長玉身後滿臉疲態的將士們聞言具是精神一震,欣喜之色溢於言表。\n前方的戰場上卻在此時傳來騷亂,隔著重重人影，樊長玉她們瞧不清是發生了何事，但唐培義在馬背上扭頭看了一眼,神色很快嚴峻了起來,下令道：「反賊意圖圍住賀將軍,爾等隨我前去支援！」\n這次有唐培義麾下兵馬開道，樊長玉和右翼軍跟在後邊，終於得以緩口氣。\n唐培義率領騎兵開道，從後方包圍賀敬元那五千兵馬的反賊，很快叫他們撕開了個口子。\n樊長玉再帶著右翼軍從那個口子擠進去，廝殺兩邊的反賊小卒，把那個口子撐大，方便陷在陣中的薊州軍遇到不測隨時撤退。\n這次有唐培義、賀敬元等大將吸引反賊的主要兵力，她們只需要清掃周邊的小卒，比起之前輕鬆了不少。\n但唐培義帶領的那支騎兵，陣型不知何故忽而亂了起來，甚至讓兩翼夾擊的反賊殺進了騎兵陣裡。\n樊長玉等人都忍不住往軍陣中央看去，奈何人影憧憧，什麼也瞧不清。\n郭百戶罵了句：「他娘的，前邊怎了？」\n反賊那邊不知是誰吼了聲：「賀敬元已死！」\n吼聲一傳開，反賊們霎時興奮了起來。\n薊州軍裡，不管是唐培義帶領的那支騎兵，還是跟著樊長玉殺出來的右翼軍，面上都有片刻的怔愣和惶然。\n賀敬元作為此番攻打崇州的主帥，他都死了，這仗還怎麼打？\n樊長玉抿緊乾裂的唇，往前方混亂的戰場看了一眼，扭頭對她所帶的那一小隊裡倖存的兵卒們道：「你們留守此處保護百戶大人，不必再跟著我！」\n言罷竟是直接朝著戰場騷動傳來的方向殺了過去。\n謝徵曾告訴她，賀敬元是爹娘的故人。\n她來到崇州這麼久，一直本分呆在軍營，並未借著陶太傅或謝徵的名頭直接去找賀敬元問什麼，就是想靠自己把軍職升上去了，有資格同賀敬元見面了，再問他關於自己爹娘的事。\n她想自己替爹娘報仇，自然是靠自己的本事，在這事上，樊長玉不願太過倚仗陶太傅和謝徵。\n哪料到這第一場大戰，她沒事，竟是賀敬元這個主帥死了？\n不論如何，她都想殺到最前方去看一眼。\n謝五二話不說就跟著她往前去，有對樊長玉忠心的小卒見狀也提著兵刃要跟上，卻被剛砍下一名反賊腦袋的郭百戶拉住，他氣得鬍子都快歪了，罵咧道：「一個個的，腦袋在脖子上長得太安生了？」\n那小卒竟是被吼得一把鼻涕一把淚地哭了起來：「賀將軍死了，樊隊正應該是殺進去找賀將軍，我也想進去把賀將軍的屍首搶出來。」\n賀敬元是出了名的愛民、愛兵如子，薊州從軍到民，都十分擁戴他。\n在戰場上驟然聽到他戰死的消息，底下的小卒們才會一下子亂了陣腳。\n郭百戶直接一巴掌拍到了那小卒臉上，大罵道：「逞英雄也輪不到你去逞，自己幾斤幾兩心裡沒點數？給老子守好這缺口！」\n-\n樊長玉一路廝殺前行，為了能更好地看清前方的戰局，還從反賊手裡搶了一匹馬。\n她不認得賀敬元，但見唐培義在同一崇州大將纏鬥，便催馬殺了過去。\n唐培義一個回馬槍瞧見了樊長玉，忙大喊：「快救賀將軍回營！」\n樊長玉聽到唐培義這一聲，心下就安了大半。\n賀敬元沒死！\n之前的消息只怕是反賊那邊故意喊出去，亂他們軍心的。\n她四下掃了一眼，見不遠處還有一名跌下馬背在艱難同反賊小將們纏鬥的薊州將領，忙一路挑飛反賊小卒殺到那邊去，扯著嗓子大喝：「可是賀將軍？」\n那老將抬起頭來，哪怕下顎的鬍鬚已全被咳出的鮮血染紅，臉上也沾了不少血汙，樊長玉還是一眼就認出了他就是之前指點自己刀法的那名將軍。\n她心中大震，那一瞬間腦子裡閃過許多念頭，礙於戰場兇險，只得暫且壓下，陌刀劈砍，殺出一條血路衝至那名老將跟前，朝那老將伸出一隻手道：「將軍，末將帶您殺出去！」\n賀敬元劈倒一名反賊小卒後，兩手撐著長刀才能站穩，他抬起一雙蒼老滿是疲態的眼打量著樊長玉，眼底似有淡淡的欣慰，「是你啊……咳咳咳……」\n他掩唇狼狽咳了起來，哪怕努力掩飾，咳出的鮮血還是從指縫間溢了出去。\n樊長玉意識到賀敬元的情況只怕不太樂觀，她視線下移，瞧見賀敬元胸甲上插著一支被削斷了箭尾的箭，滲出的鮮血已經把那一塊甲冑都染紅了。\n眼見還有鬣狗一般圍上來的反賊將領，而賀敬元重傷似乎已揮不動刀了，她想也沒想，大喝一聲躍下馬背，提刀劈了過去。\n謝五趕來時，樊長玉便衝著他喊：「快帶賀將軍走！」\n賀敬元是認得謝五的，自然也明白他會出現在這戰場上，八成是奉謝徵之命保護樊長玉的。\n可能是察覺自己大限將至，賀敬元想到謝、樊兩家父輩的糾葛，再看著為了掩護自己同好幾名崇州小將纏鬥的樊長玉，只覺嘴裡發苦。\n謝五攙著賀敬元上了馬背，樊長玉且戰且退，努力不讓自己被困死在反賊的包圍圈裡。\n那頭，唐培義終是不敵長信王，被他一杖掃落馬背，就地一個翻滾，才躲過了底下小卒們見縫插針的扎刺。\n長信王見賀敬元被人救走，一夾馬腹便追了上來，大喝：「魏家犬哪裡走！」\n手中獅頭矛送了出去，謝五持兵刃去接，卻生生叫長信王這一杖給打得單膝跪了下去，半個膝蓋都陷入了黃土裡，刀背抵在肩膀，隔著甲冑都快讓肩膀滲出血來。\n謝五咬得牙根都浸出一股血腥味，握著刀柄的五指骨節泛白，仍沒法把架在自己刀刃上的那杆獅頭矛抬起分毫。\n長信王手上再一使勁兒，謝五被壓得噴出一口血來，卻仍沒鬆手，一雙眼死死盯著長信王。\n長信王哈哈大笑：「好小子，一個馬前卒尚且有如此本事，在薊州當真是埋沒了你，不如來本王麾下做事如何？」\n謝五狠狠「呸」了一聲。\n長信王面色一冷，喝道：「不識抬舉！」\n手中獅頭矛欲取謝五性命，卻叫馬背上的賀敬元強撐著提槍給擋了去。\n賀敬元身上不僅是箭傷，還有極重的內傷，一運勁兒便咳嗽不止，五臟六腑都快碎裂開一般。\n只擋了那一矛，他便已伏在馬背上咳嗽不止，催促謝五：「莫要管我了，你且快逃！」\n長信王冷笑：「怕什麼，爾等今日一個也逃不了！」\n他掄圓了手中獅頭矛，再次朝著謝五刺去，卻斜伸出一柄黑鐵長刀格開了他的兵器。\n長信王被兩兵相接迸發出的那股寸勁兒震得虎口一麻，詫異朝那突然冒出來的小子看去。\n對方一身殘破的薊州小卒兵服，臉上糊滿血汙和塵土，身形在男子中偏瘦小，拎著柄長刀站在那裡，卻有一夫當關，萬夫莫開的架勢。\n長信王納悶道：「今兒倒是奇了，這薊州軍裡，倒是馬前卒一個比一個厲害。」\n樊長玉沉喝：「殺你這等亂臣賊子，我等馬前卒便夠了！」\n她嗓音嘶啞得厲害，似少年人的聲音，一時間倒並未讓長信王懷疑起她的身份。\n長信王冷笑道：「狂妄小兒！吃我一矛！」\n他催馬上前，手中獅頭矛一串連刺，樊長玉且擋且躲，除去謝徵和賀敬元，她還是頭一回和這樣的大將交手，對方攻勢迅猛且角度刁鑽，樊長玉應付得格外狼狽。\n謝五見樊長玉落了下乘，也知曉長信王心狠手辣，必是不可能留情的，心急似火燎，在唐培義好不容易從那群小卒裡殺過來時，便讓唐培義護著賀敬元撤，自己衝過去幫樊長玉。\n唐培義擔心樊長玉他們，也憂心賀敬元的傷勢，護著賀敬元退到薊州軍中了，見賀敬元唇色都有些泛白了，不由大罵：「狗賊長信王，交手時偷襲算什麼？若非您中這一箭，未必不是他的對手。」\n賀敬元回想自己中的這一箭，臉色有些灰敗。\n戰場上被流箭所傷不是什麼罕見事，但他隱隱明白，真正放這一箭想讓他死在長信王刀下的是什麼人。\n丞相這般急著除掉他，是怕他把樊家夫婦的事說出去麼？\n那魏祁林在當年運糧失誤上，還無辜麼？\n他忽而攥住了唐培義的手，艱難道：「去，把那個孩子帶出來。」\n唐培義先是一愣，隨即猜到賀敬元說的大概是樊長玉，他也捨不得這麼好的一個苗子就這麼死在長信王手上，忙道：「我這就去助她，大人且先回營就醫！」\n-\n樊長玉和謝五聯手，應對長信王的攻勢仍格外艱難。\n她的刀法是有長進，可同長信王這類徵戰沙場幾十載的老將比起來，仍太青澀了些，加上身體太過疲憊，攻勢大不如先前。\n倒是長信王瞧出她的武功路數後，打量著樊長玉，忽然問了句：「賀敬元是你何人？」\n樊長玉撐著陌刀喘氣，喝道：「是我薊州軍主帥！」\n長信王冷笑：「這套刀法乃當年魏氏兩虎將，賀敬元和他的結義兄弟同創的，他那結義兄弟故去多年，如今只有賀敬元還會使這套刀法，小小一馬前卒能得他真傳？」\n樊長玉聽到這番話時，整個人都是一怔。\n這套刀法她爹教她的，當日賀敬元指點她時，對這套刀法又格外熟悉。\n莫非她爹就是賀敬元當年的結義兄弟？\n她尚未回過神來，長信王手中矛尖已一轉，徑直駕馬向她衝來：「待本王拿了你，趁賀敬元還吊著一口氣，去同他談幾個條件！」\n這人借馬勢的一擊，樊長玉還沒蠢到去硬扛，在謝五出聲提醒時，已一個閃身避開。\n正好唐培義駕馬返回來助他們，樊長玉在唐培義與長信王交手之際，仗著陌刀刀長，砍向長信王戰馬後腿。\n戰馬一個側翻，長信王矛尖點地躍起，並未摔到，落地後擺好攻勢，虎目威凜。\n唐培義那一記衝殺不成，又調轉馬頭大吼一聲：「反賊納命來！」\n只是短兵相接交錯之際 藥碗，謝五遲疑道：「隊正手上有傷，我餵隊正吧？」\n樊長玉更為怪異地看了他一眼。\n謝五垂下眼答：「軍醫說隊正兩隻手都傷到了經絡，若不好生調養，將來只怕再握兵器都難。」\n樊長玉便看了看自己被嚴嚴實實包起來的兩隻手，「原來我傷得這麼重。」\n她語氣裡倒是聽不出絲毫在意，只問：「咱們隊裡，傷亡如何？」\n謝五答：「戰死十三人，重傷十七人，其餘人都有輕傷。」\n似知曉樊長玉剛來軍中不久，可能還不清楚每次徵戰軍隊裡的傷亡情況，他補充了句：「前鋒軍全軍覆沒都是常事，傷亡過半已是幸事，隊正無需太過自責。」\n話雖如此，樊長玉心口卻還是重了重，道：「等軍中的撫恤金下來，連著我的那份賞金一起寄給他們家中人吧。」\n謝五看了樊長玉一眼道：「隊正殺了長信王，此戰立下首功，賞金至少也有千兩。」\n樊長玉怔住：「我殺的？」\n謝五頷首。\n樊長玉仔細回憶昏迷前的事，她記得長信王被她捅了一刀後，是被謝徵再補了一箭才徹底斷氣的。\n她眉頭皺起，問謝五：「他……沒來軍中嗎？我記得我在戰場上看到他了，還是他射了長信王一箭救的我。」\n謝五眸色出乎意料地沉寂，幽沉似千萬年不曾照射到日光的深海，道：「太傅上京遇到刺殺沒了蹤跡，侯爺擔心太傅安危，追查劫走太傅的人去了，並未在崇州。」\n樊長玉聞言，臉色當即也是一變：「義父！」\n她激動之下就想起身，卻又因渾身肌肉酸痛而跌坐了回去，謝五眼疾手快扶住了她，注意到自己食指上那一圈齒痕時，又在瞬間收回了手。\n樊長玉被太多事佔據了心神，沒發現謝五這一刻的異常，只喃喃自語道：「義父好好的，突然去京城作甚？」\n想到長信王的死，她又篤定道：「我只捅了長信王腋下一刀，他身上那一箭，不是我射的，是有人幫了我，一個獨眼的疤臉男人……」\n她其實想說那人應該就是謝徵的。\n謝五卻打斷她的話道：「我和唐將軍追上來時，隊正摔在馬下，手上還握著一截斷箭，是隊正殺的長信王無疑，隊正莫不是從戰場上下來，魘著了？」\n樊長玉聽到他這麼說，面上有剎那的迷茫。\n難不成真是她當時意識不清，記錯了？她自己用箭捅了長信王，潛意識裡卻以為是被人救了？\n她尚在失神中，帳外便有人尋了過來，粗聲詢問：「樊隊正可住這裡？」\n謝五便掀開帳簾回道：「是，不知這位兄弟找我家隊正何事？」\n對方道：「賀將軍傳樊隊正過去。」`

            title: `第104章第104章`,
            content: `樊長玉在帳內將這番對話聽得分明,關於自己爹娘的事，她的確揣了滿腹的疑惑想問賀敬元，當即就道：「勞請外邊的弟兄稍等片刻,我換身能見人的衣裳就過去。」\n她去尋乾淨的衣袍時,才猛然想起另一個問題,她當日從戰場上下來,身上的兵服早就髒得不能看了，她昏迷時是誰給她換的？\n而且眼下她一雙手被纏成了這個樣子，拿到了衣袍也沒法自個兒往身上套。\n樊長玉正皺眉,帳外就又傳來了一道嗓音：「長玉,方便大娘進來嗎？」\n聽出是趙大娘的聲音，樊長玉又驚又喜，忙道：「大娘進來就是。」\n趙大娘掀簾進來後，便拿了那套衣袍往樊長玉身上套,道：「聽說有位將軍喚你過去,小五讓我過來幫你換身衣裳。」\n樊長玉道：「小五做事倒是妥帖。」\n又問：「大娘何時來的軍中？」\n趙大娘嘆了口氣道：「兩日前被小五接來的,你這孩子，險些沒嚇死大娘,那一身衣裳血淋淋的，還好身上沒受什麼大傷。你要是有個好歹，寧娘可怎麼辦？」\n這麼看來,自己昏迷時的衣物也是趙大娘幫忙換的。\n但樊長玉記得謝五在戰場上受的傷也不比自己輕,他當天還能跑回家去接趙大娘？\n樊長玉眼底有淡淡的困惑,「小五身上沒傷？」\n趙大娘把外袍給樊長玉套上後，正在幫她束腰封,說：「那大娘可就不知道了,不過你昏迷這兩天,小五都守在你帳內，我怕他累著了，讓他下去歇著，可攆都攆不走。」\n說到這個話題，趙大娘抬起頭來時，神色間多了幾分古怪，看著樊長玉道：「他跟著你在戰場上出生入死的，長玉啊，小五別是動了其他心思吧？」\n她像是一下子頭疼了起來：「小五是個好孩子，可你已經有言正了啊，要不大娘回頭還是給小五說門親事吧？」\n樊長玉知道謝五和謝七都是謝徵的人，他們對自己忠心，無非是受命於謝徵罷了，無奈道：「大娘你別瞎想，不是你想的那樣。」\n不過趙大娘說謝五這兩日一直守著自己，還是讓樊長玉覺得有些怪怪的。\n換好衣物後，她便出帳先去見賀敬元。\n謝五如今算是她的親兵，跟著一道去了中軍帳，但只能在外邊候命，不能跟著一起進去。\n帶樊長玉過去的傳令官同中軍帳門口的守衛交涉過後，那守衛又進帳去稟報了什麼，才讓樊長玉一人進帳。\n掀開帳簾，樊長玉就聞到了一股濃鬱的藥味，她記著這些日子在軍中學到的禮儀，不可直視上峰，微垂下眼瞼抱拳道：「末將樊長玉，見過大人。」\n賀敬元在薊州為官多年，不管是下邊的百姓，還是他麾下的將領們，私底下都更習慣稱呼他一聲「大人」。\n說起來，還是他太儒雅溫和了些，不像武將，更像個文官。\n床榻那邊傳來一道明顯中氣不足的嗓音：「無需多禮……咳咳咳……」\n樊長玉見床榻上的人一句話沒說完，便伏到床邊咳得厲害，立在原地遲疑了片刻，還是上前用纏成球的手幫忙拍了拍背問：「大人，要不要傳軍醫？」\n也是站的近了，她才敢不動聲色地打量床榻上這位老將。\n他似乎已瘦了許多，兩頰下凹，面上的氣色很不好，原本黑髮間只飄著幾根銀絲，現在也是半黑半白，一下子滄桑了不少。\n樊長玉突然意識到他的情況很不好。\n賀敬元咳了好一陣，才勉強壓下了喉間的那陣癢意。\n躺回靠枕上時，喘了好幾息才緩過來。\n只不過胸前的那道箭傷，因為方才咳得太厲害，又滲出了血，將他雪白的中衣染紅了指甲蓋大小的一塊。\n他虛弱擺擺手，說：「傷到了肺腑，這兩日咳得是厲害了些。」\n注意到樊長玉兩隻手都被纏了起來，他問：「你傷勢如何？」\n樊長玉道：「末將身上也只有這兩隻手稱得上是大傷了。」\n賀敬元聞言，倒是笑了起來，只是笑著笑著，又止不住低咳起來，好在這次沒先前咳得厲害。\n他欣慰道：「後生可畏啊，長信王在大胤也是個響噹噹的人物，你手上這傷，換長信王一條命，怎麼著也是值了。」\n樊長玉腦海裡浮現的，卻是那疤臉人射了長信王一箭，駕馬疾馳過來接自己的情形。\n她記得他攬自己上馬的力道，也記得那熟悉的氣息。\n若是沒有他補的那一箭，就算長信王最終會因她那一刀刺破了臟器而死，她只怕也會力竭抓不住長信王的劍，死於劍下。\n但小五說謝徵壓根不在崇州。\n樊長玉覺得，要麼就是自己當真意識模糊記錯了，要麼，就是小五騙了自己。\n可能讓小五撒謊騙自己的，也只有謝徵了。\n想通這一點的時候，樊長玉幾乎是心口一跳，恨不能立馬回營逼問小五謝徵在何處。\n礙於賀敬元還在，才先行壓下了這念頭。\n謝徵如今的身份不方便暴露，樊長玉便也沒貿然說他易容上戰場救自己的事，只謙遜答道：「大人謬讚了，末將只是運氣好，才僥倖刺了長信王一刀。」\n賀敬元眼底欣慰更多了些：「你是個好孩子，有這份踏實在，往後的路，你能走得更遠的。」\n樊長玉拘謹道：「謝大人誇讚。」\n賀敬元看出她的拘束，指了指床榻邊上的一張小方凳，吃力道：「坐吧，有些話，也是時候同你說了。」\n樊長玉剛坐到凳上，聽到賀敬元這話，指尖下意識收攏，什麼也抓不到，才反應過來自己一雙手都被紗布纏成了個球。\n她不自覺繃直了背脊，問：「是關於我爹娘的事嗎？」\n賀敬元面露詫異，似沒料到樊長玉已經知曉自己同她爹娘的關係，隨即才緩緩點頭，「我聽文常說過，你查了薊州府的卷宗，想弄清楚真正害你爹娘的是誰……」\n他淺淺嘆了口氣：「你爹娘把你們姐妹倆託付與我時，就是不想讓你們再沾染上一輩的因果，只願你們平平淡淡過完一輩子，可惜世事難料啊。」\n樊長玉想起爹娘在世時候，一家人過的平淡溫馨的日子，以及爹娘突然離世和在清平縣遭遇的那幾場刺殺，心口沉了沉，問：「我爹娘……究竟是何身份？」\n賀敬元看著她，似透過她看到了幾分故人的影子，語氣裡不乏滄桑：「你爹曾是魏府家將，因能力出眾，被賜予了魏姓，喚祁林。丞相嫁妹與謝臨山將軍後，你爹跟去了謝將軍麾下做事，後來才入贅給了謝將軍麾下的孟老將軍。」\n樊長玉聽到此處，瞳孔不由一縮：「孟叔遠？」\n這個大胤朝三歲小兒都知曉的、導致了當年錦州慘的罪魁禍首。\n賀敬元明白她這一刻的心境，嘆息道：「孟老將軍是謝將軍最為倚仗的老將，你爹當年入贅給他的獨女，謝、魏兩家親上加親，本是一門喜事。只可惜後來錦州被困，孟老將軍押送糧草失誤，才鑄成了那等無法挽回的大錯。」\n知曉了自己外祖就是當年讓錦州十萬將士活活餓死、害得承德太子和謝臨山將軍戰死於城門下，讓朝廷被迫割地休戰的元兇，樊長玉整個人如置冰窖。\n那一瞬她腦子裡只有一個想法——她們全家都是大胤的罪人。\n她在謝徵跟前也是個罪人。\n謝徵那樣恨她外祖父，知曉了她就是孟家的後人，又會如何？\n樊長玉心裡亂糟糟的，下意識迴避這個問題，問：「所以魏嚴要殺我爹娘，就是為了給謝將軍報仇？」\n賀敬元卻搖了搖頭：「當年錦州失守後，你外祖便自刎謝罪了，其中延誤戰機是否有隱情，迄今也不得而知。但丞相當年的確下令讓你爹殺了你娘，你爹下不去手，這才帶著你娘假死脫身，求到我這裡來，讓我幫他們偽造個身份，隱匿行蹤。\n「但隔了十幾年，丞相突然再次對他們下了追殺令，卻是要找回一件東西。」\n樊長玉詫異抬頭看向他。\n後面的話，賀敬元突然有些說不出口了，他看著樊長玉，艱澀道：「丞相讓我去殺你爹娘時，你爹娘似乎早就料到那麼一天了，只求我留你們姐妹二人性命，又給了我一個盒子，讓我莫要打開，等丞相要的時候，再把那個盒子給他就是了。交代完這些，他們便自刎在我跟前了。」\n樊長玉手腳冰涼，她從未想過，自己一直想查清的爹娘死因背後，藏著這麼多沉重的東西。\n賀敬元說：「你家中幾次遭遇刺殺，便是丞相派人在找那個盒子。」\n一下子接受了這麼多爆炸性的信息，樊長玉只覺腦仁兒都悶悶地作疼，她艱難地捋著思緒。\n如今世人皆知的，是她外祖父運糧失誤才導致了錦州一戰的慘敗。但她爹曾是魏嚴的人，當年也授命於魏嚴要殺她娘，只是後來又背叛魏嚴，帶著她娘假死逃了。\n而她爹娘手上握著什麼東西，讓魏嚴隔了十幾年也要追殺他們拿回去。\n所以當年她外祖父運糧失誤，可能跟魏嚴也脫不了干係？\n但魏嚴只是一介臣子，那時候被困在錦州的，不僅有承德太子，還有他的妹夫謝將軍，他設計這一切圖什麼？\n可想到謝徵曾說魏嚴是他的仇人，他也險些死在魏嚴手上，而魏嚴如今大權在握，甚至直接架空了皇室，樊長玉又覺得自己的猜測沒錯。\n魏嚴要是不做賊心虛，他殺謝徵做什麼？\n想來她外祖父運糧失誤，應該真有魏嚴的緣故在裡邊。\n好一陣，樊長玉才問賀敬元：「之前在臨安鎮，我家遭遇了刺殺，卻有軍隊及時來援，是大人命人去護著我家的？」\n賀敬元點頭。\n樊長玉深知眼下唯一的線索只怕都在她爹娘留下的那個盒子了，斟酌片刻，還是問了賀敬元：「大人有看過我爹娘的那個盒子嗎？」\n賀敬元面上帶了幾分苦澀和嘲意：「我若是看了，莫說丞相不會留你們姐妹的性命，便是賀某自己，只怕也難逃一死。」\n樊長玉沉默片刻，道出自己的猜測：「我外祖父運糧延誤戰機，是魏嚴從中作梗對不對？」\n賀敬元嘆息：「當年錦州戰敗的大罪，全都蓋棺論定全扣在了你外祖頭上，我同陶太傅商討時，也覺孟老將軍那般謹慎的一個人，不可能不知道當時錦州是何情況，糊塗到冒著延誤戰機的風險，去救被困的那十萬災民。但丞相的把柄，是怎麼落到你父親手中的，就值得深思了。」\n樊長玉聽明白了他的言外之意——\n她外祖父不可能做出那等糊塗事，那麼興許就是她爹做了魏嚴的棋子，所以她爹手中才有讓魏嚴隔了十幾年也要殺了他們奪回去的東西。\n這個結果並沒有給樊長玉帶來多少安慰。\n外祖父不是罪魁禍首了，卻因為她爹給別人當棋子，被設計背負了那麼多年的罵名，樊長玉光是想想便覺心口呼吸不順。\n記憶裡爹爹一直都是沉默不善言辭的，也鮮少笑，哪怕做豬肉生意，連討價還價都不太會，只有在娘親跟前，他臉上的表情才會生動豐富起來。\n他總是默默地做很多事，笨拙地討她娘親歡心，就因為娘親怕冷，市面上又買不到貨真價實的貂皮大襖，他就一個人進山四五天，獵回一堆銀貂給母親做大氅。\n而娘親呢？平日裡雖是再溫柔不過，說話都細聲細氣的，可若是惹惱了她，那就另當別論了。\n樊長玉小時候就她娘舉著掃帚教訓過，她娘發起火來，連她爹都不敢勸。\n也正是因此，樊長玉才覺得以她娘的脾性，不可能會在知曉她爹害了她外祖父後，還選擇跟她爹一起歸隱。\n她突然問賀敬元：「大人，我娘去時，知曉那個盒子裡的秘密嗎？」\n賀敬元回想起當日那夫妻二人相繼自刎在雪地裡的情形，心中仍有幾分悲意，點了點頭，道：「夫人很是從容，想來是知曉的。」\n樊長玉便篤定道：「若是我爹害了我外祖父，我娘定不會原諒他，當年的事，可能另有隱情。」\n賀敬元有些意外，想說話卻又止不住喉間的癢意，咳了好一陣才道：「陶太傅也提出過質疑，奈何已過了十七年，除了這些猜測，拿不出切實的證據，便是想查也無從再查起，陶太傅才決定進京一趟，親自去見丞相，可惜至今沒有音訊傳回來。」\n他看著樊長玉，語重心長道：「你同侯爺的事，我已聽說過一二。這些事，我也想過爛在肚子裡，死了就帶進棺材裡的。上一輩人的事，就隨著上一輩人的死……塵歸塵，土歸土好了。\n「可我又怕……將來東窗事發，殺父之仇，放誰身上也是不能輕易揭過的。與其等到不可挽回的地步，不若提前告知你這一切，再讓你們去抉擇。」\n樊長玉心中百味陳雜，跪在賀敬元榻前，鄭重給他磕了一個頭：「多謝賀大人。」\n賀敬元拿手掩在唇邊咳了好一陣，才喘.息著說了句：「你若不恨我，便喚我一聲世伯吧，你父親與我，曾也是結義兄弟，你使的那套刀法，便是我當初和他一起創的。」\n樊長玉看著這個像是快遲暮的老人，眼眶有了淡淡的澀意，喚道：「世伯。」\n賀敬元似乎等這一天等了許多年了，笑得臉上的褶子都展開了許多，應了聲：「哎。」\n-\n從中軍帳出來，樊長玉只覺呼吸都是發沉的。\n她沒在帳外看到謝五，找了一圈也沒見人，便問守在外邊的親兵：「請問有看到跟我一同過來的那個小兄弟麼？」\n親兵道：「那高個兒小子是吧？他一刻鐘前便往那邊去了。」\n樊長玉不由皺了皺眉，謝五在她身邊有些時日了，但從未這般失禮過。\n猛然間，她像是想到了什麼，忙抬腳往親兵說的那個方向追了去。\n但沒跑出幾步，便瞧見了迎面走來的謝五。\n是真的謝五。\n沒有她剛醒來時瞧見的那麼高了，走路時大概是因為身上帶著傷，腳步也虛浮了幾分，見了她便喚道：「隊正。」\n他沒敢和樊長玉直視，撓撓後腦勺赧然一笑，主動解釋起提前離開的緣由：「我……我這兩天喝藥，水喝多了，方才找茅廁去了……」\n樊長玉卻沒再聽他瞎編的這些理由，竟是一把薅下纏在手上的紗布，拽住他的領口問：「他呢？」\n都找了真正的謝五過來了，他當是離開有一會兒了。\n樊長玉手勁兒出奇地大，之前空手去接長信王劍刃被割出的傷口，又開始滲血，她眼神卻冷得可怕。\n謝五頭一回瞧見這樣的樊長玉，心中驚駭不已，也怕她手上傷勢加重，忙道：「主子出營了。」\n樊長玉便扔下謝五，又去追謝徵。\n是她大意了，醒來時腦子不清醒，又被太多消息分散了心神，當時明明都覺出異常了，卻還是沒反應過來，那個小五就是謝徵假扮的。\n為何趕來戰場上救了她又不讓她知道？甚至連待在她身邊都要假扮成其他人？\n直覺告訴樊長玉，謝徵肯定是在來之前，就已查到了關於十七年前的一些事，才會選擇這樣做。\n她也不知道自己此刻追上去有什麼用，又能同他說什麼，但心底就是有個聲音在告訴她，必須要追上去。\n至少，代已故的長輩向他道個歉。\n再告訴他，哪怕他會因為父仇終止這段感情了，她還是會一直查下去。\n他不能理解她為何會因為娘親對爹爹的態度，就堅信她爹肯定是沒背叛過她娘和外祖父也沒關係，她會查下去的。\n她還會殺魏嚴替爹娘報仇。\n曾經他向她伸出手，她礙於前路的重重阻隔不敢同他走下去，他默默地去替她鋪好前路。\n那麼如今他想停下了，她也會堅定地一直向前走，直到把真相捧到他跟前，讓他知道那一切也不是他們之間的阻隔。\n樊長玉一路追到大營門口，都沒瞧見謝徵，又同站崗的守衛打聽了是不是有人出營，得知有個獨眼的疤臉男人前不久才駕馬出營後，忙借用了一匹馬，繼續追去。\n得虧她如今在薊州軍裡也稱得上個人物了，大營門口的守衛們不僅沒阻攔，還對她崇敬有加。\n手上的傷口很深，樊長玉攀著馬鞍翻上去的時候，就痛得白了臉，她沒理會新浸出的血跡又染紅了紗布，用力一甩馬鞭，喝了聲：「駕！」\n戰馬撒開四蹄奔了出去，樊長玉駕馬追出四五裡地，才在遠處的緩坡處瞧見一道騎馬的人影。\n她怕給謝徵招去禍事，沒敢喚他真名，只大聲喚他：「言正！」\n馬背上的人似乎回頭朝她看了一眼，她更用力地一夾馬腹，幾個呼吸間，終於到了能看清對方樣貌的距離。\n哪怕用眼罩罩住了一隻眼，臉上還帶著疤臉面具，但樊長玉就是一眼認出了他。\n戰馬放緩了速度，載著她徐徐前進。\n樊長玉握著韁繩，隔著幾丈距離同謝徵對視著，眼眶突然就是一酸，她啞聲道：「你來見我             title: `第105章第105章`,
            content: `太陽掩進了雲層裡,風吹動緩坡兩側的蘆葦，米黃的穗子低垂，少女一身騎裝的身影在整片山野的蘆葦浪中越走越遠,最後成了一個棕紅色的小點。\n謝徵馭馬立在原地，額前的碎發也因為淺風而跟著浮動,掩在碎發底下的,是一雙眼白充血恍若爬滿血色蛛網的眸子。\n遠處那個棕紅色的小點,最終也消失在了那被血絲纏繞的瞳孔深處。\n他面上卻似一絲情緒也無,掣韁繩調轉馬頭時,甚至渾不在意般淺喝了一聲「駕」，戰馬便往相反的方向慢跑了起來。\n攥著韁繩的那隻手卻青筋暴凸，細看之下，馬韁都被染上了一層胭脂色，顯然是掌心早就被五指摳破了。\n-\n樊長玉用力揮鞭,駕馬一路狂奔,直到前後再也看不見人影了才停下來。\n不冷不熱的天氣，連風都是靜悄悄的,只有蘆葦穗子上的細絨蘆花被風吹得輕輕飛舞。\n她坐在馬背上，抬頭望著這廣袤無垠的天地,用力大口大口地呼吸,心口似灌了鉛,沉得讓她喘不過氣來。\n除了爹娘去世時，她從未覺得這樣無助過。\n外祖父是個被世人痛罵了十七載的罪人,若是這冤屈沒法洗除，可能還會成為千古罪人。\n她曾經最敬仰的爹爹,是魏嚴的人,甚至當初入贅給她娘親都有可能是個陰謀。\n承德太子、謝將軍,還有那成千上萬的將士，都因援軍和糧草遲遲未至，城破後慘死錦州。\n這一樁樁的人命，壓得樊長玉整個人都昏昏沉沉的。\n她當然相信爹爹是不可能做出這等糊塗事來的，但是在沒有找到確鑿的證據前，她一廂情願的信任沒有任何用處。\n面對這樣的千古大罪，她又何嘗不惶然？\n哪怕仰著頭，眼淚也不受控制地從眼角滾落，擦過面頰，砸在這荒蕪的野地裡。\n她知道不該怪謝徵不信她，但還是止不住地難過。\n樊長玉伸出手狼狽地抹了一把面頰，終究是「荷」地一聲哭出聲來。\n坐下的戰馬似明白主人這一刻的心境，竟也沒再往前走，一人一馬就那麼立在蘆葦浮蕩的野地裡，只餘哭聲喑啞。\n-\n樊長玉回到軍營時，除了眼瞼下方還帶著幾分微紅，面上已瞧不出絲毫哭過的痕跡。\n謝五眼巴巴地候在軍營大門口，見到樊長玉歸來，稍作躊躇，便一如從前那般上前去幫樊長玉牽馬，小心翼翼喚道：「隊正。」\n樊長玉從馬背上翻下來，面色如常地往營地的方向走，離大門哨崗處遠了，她才問：「他讓你留下來的？」\n嗓音有些沙啞，除此之外倒是聽不出什麼異常了。\n謝五一聽，就猜到她肯定是追上謝徵了，道：「侯爺讓我和阿七跟著隊正來崇州時，我們就不會調回去了。」\n樊長玉腳步一頓，謝五解釋道：「在侯爺那裡，送人的東西，就不會再要回去了。」\n他看著樊長玉，有些尷尬地道：「隊正若是也不願留我和阿七了，我們離開也只能繼續從軍，從馬前卒做起。」\n樊長玉垂著眸子，誰也不知她這一刻在想什麼，好一會兒，她才道：「那你們二人就留下吧。」\n頓了頓，又說：「有我一分富貴，便不會少了你們的那份。」\n謝五連忙抱拳：「跟著隊正徵戰沙場，護得一方百姓安寧，便是我們的志向了。」\n樊長玉拍了拍他的肩，沒再說什麼。\n她手上的布條纏得沒之前厚了，眼下一雙手倒是可以簡要活動。\n謝五那話，便是徹底絕了她攆他和謝七走的心思。\n到目前為止，她還沒在軍中找到一個能媲美謝五和謝七的親兵，他們跟著謝徵身邊多年，對軍中的事物熟悉，把人攆走了，自己重新培養親兵，是個長久又麻煩的事。\n眼下百事纏身，正是用人之際，樊長玉不想為了爭這一口氣，給自己平添麻煩。\n何況長寧那裡，有謝七看著她也更放心些。\n-\n等回了營房，樊長玉發現不止郭百戶在，好些個不相熟的百戶也候在那裡，還客氣地給她帶了東西。\n她望著堆了一桌子的糕餅、酒水、補藥，還有那一張張熱絡的笑臉，總算是反應過來他們都是來探望自己的。\n只是這些人裡，還有拄著拐杖、吊著胳膊的，不由看得樊長玉一愣。\n她印象裡，自己跟他們可沒什麼交情，這些人瞧著傷得比她還重些，專程跑來看她？\n郭百戶見她神色怪異地看著這一屋子人不做聲，當前他好歹也還是樊長玉的頂頭上司，也是這一屋子人裡，跟樊長玉最熟的，便帶頭道：「你從戰場上回來，暈了兩天兩夜，大傢伙兒很是擔心你，今日聽說你醒了，這才商量著一起過來看看。」\n樊長玉便客氣道：「長玉在此謝過諸位大人。」\n一群人連忙擺手說她見外。\n樊長玉暗忖除了郭百戶，其餘人在今天之前，最多的怕是也只跟她見過三面，怎麼就不見外了？\n面上卻還是招呼他們落座：「諸位大人身上都有傷，莫要站著了，都坐吧。」\n眾人只是熱絡笑著，坐下了卻又幾乎無話可談。\n因樊長玉這裡凳子不夠，謝五還去別的軍帳借了幾條板凳過來。\n樊長玉覺得帳內的氣氛太詭異了些，每個人似乎都不那麼自在，卻又在努力表現出一副跟她很熟絡的樣子。\n只有郭百戶瞧上了別人送樊長玉的一壇酒，直言道：「樊隊正，大傢伙兒都在這裡，要不給大家開壇酒吧？」\n軍營裡的交情，除了是在戰場上打出來的，還有喝酒喝出來的。\n一壇酒喝完，不熟的人也能立馬推心置腹起來。\n樊長玉看郭屠戶還用白布纏著腦袋，遲疑道：「大傢伙兒身上都有傷……」\n一堆軍漢估摸著也都覺著氣氛怪尷尬的，齊聲說沒事，其中一人道：「從前開慶功宴時，大傢伙兒不也是一身傷，真要忌口啊，那酒和肉都沒得吃了！」\n這話說得其餘軍漢都鬨笑起來。\n也有機靈些的，瞧著樊長玉手上受了傷，又是個女兒家，道：「弟兄們胡鬧就是了，莫要帶樊隊正，樊隊正身上傷勢只怕不輕，還是莫要勸樊隊正飲酒了。」\n腦袋好使些的立馬反應過來了，跟著道：「對對對，弟兄們就是饞這一口酒，玩笑話說慣了，樊隊正莫要當真就是了。」\n給樊長玉送酒的那名百戶也適時道：「你們這些龜孫子，這酒可是老子藏了好久的杜康酒，饞酒都饞到樊隊正這兒來了！」\n樊長玉就是再不通人情世故，也看出他們在奉承迎合自己。\n稍作思量，便想通了其中緣由。\n崇州城下一戰，她算是出名了，軍中上下約莫也都心知肚明她要升官了，前兩日她昏沉不醒，沒法前來拜訪套近乎，今日她剛醒，就被叫去賀敬元那邊，任誰看了，也是她得了賀敬元的器重。\n這一升，可能也不是一級兩級地往上升。\n像郭百戶他們這樣的低階武官，若是不在封賞下來前就跟她套好近乎，將來只怕見面說上幾句話都難了。\n當日她初來軍中時，陶太傅在馬車上問她的話猶還在耳畔。\n是空要頭銜手底下無可用之人，還是從底層做起自己帶一批能用的人出來。\n她被封為隊正後，一門心思都在想著從自己手底下那幾十人裡選出能用的人來，而今方才真正明白陶太傅那番話裡的含義。\n她升上去後，真正能用的人是在這裡。\n她突然明白郭百戶為何要她請大傢伙兒喝酒了。\n樊長玉扭頭對謝五道：「去取酒碗來，我親自給諸位大人滿上！」\n謝五先是一怔，隨即也明白了樊長玉的用意，忙出去抱了一摞酒碗進來，在桌上挨著擺開。\n有幾人還在推辭，樊長玉道：「不醉不歸是不行了，諸位只當是嘗個味道解解饞。」\n話都說到這份上了，沒人再說掃興的話。\n樊長玉掌心有傷，不方便彎曲，謝五便幫著拆開了酒罈上封口的紅布，她再親自給每個酒碗滿上。\n等所有百戶都端起了酒碗，樊長玉也跟著端起一碗，對著他們鄭重道：「長玉初來軍中，多謝諸位大人這些日子裡的照拂，且盼來日也能同大家共飲一壇酒！」\n話中幾分真幾分假且不論，語罷便直接仰頭幹了個乾淨。\n今朝她敬帳中眾人酒，來日，便是旁人敬她了。\n百戶們見狀，也紛紛舉起酒碗道：「樊隊正過譽了，我等也是盼著能和樊隊正再喝一回酒的！」\n言罷也是一幹而淨。\n放下碗時，百戶們明顯喜笑顏開，神情比起剛來時也輕鬆了不少。\n這碗酒一喝，於他們而言，就是一場無言的站隊和結盟了。\n戰場上的軍功不是那麼好掙的，尤其是已坐到了百戶的位置，普通兵卒從軍十載，做到這個位置遇不上貴人，自己又沒有那驚世之才，基本上就到頭了。\n他們主動向樊長玉示好，便是也清楚她此番靠著軍功升上去，麾下尚無人可用，若是能提拔他們一二，他們也就算是遇到貴人了。\n眼下樊長玉明顯承了他們這份情。\n喝完酒，再閒聊幾句，眾人也就陸陸續續地散了。\n郭百戶是最後一個起身走的，樊長玉在營房內沒有旁人後，起身對著他鄭重一抱拳：「方才多謝郭大人提點。」\n郭百戶是個直爽性子，也不跟樊長玉繞彎子，直言不諱道：「別一口一個大人的了，聽著牙酸，那也算不上提點，你今日就是不跟那群大老粗喝酒，你手底下缺人的時候，他們也是願意走你的門路的。」\n他說著看了樊長玉一眼：「但畢竟都是些軍營裡的老油條子了，表面上服了你，背地裡也可能不服，連酒都不願跟他們喝一碗，那就是沒看得起他們，這就是軍營裡不成文的規矩。」\n樊長玉說：「我記住了。」\n又誠懇道：「往後再有不懂的，我可就直接請教郭百戶了，郭百戶莫要嫌麻煩。」\n這已經是不動聲色的拉攏了。\n郭百戶也爽利，說：「現在老子官職還比你大，說話也就不文縐縐地計較那麼多了，等你升上去了，只要用得上老子，老子跟著你幹，當初是老子看走了眼，以為你也是那類來混軍功的，老子打了這麼些年的仗，還沒在戰場上殺得這麼痛快過，本以為當個百戶這輩子就做到頭了，現在老子也想再掙個將軍噹噹！」\n等郭百戶一走，謝五對樊長玉道：「恭喜隊正！」\n她現在升上去，手底下也稱得上有一批能為自己所用的人了。\n樊長玉卻是有些疲憊地揉了揉眉心，說：「這見人說人話，見鬼說鬼話的本事，還真不是一般人能學會的。」\n謝五隻是笑：「隊正摸清軍營裡拉攏人脈的那一套了。」\n樊長玉掀開眼皮看向他：「我回營時同你說的那些話不是客氣話，你和小七，我都會編作親兵的。」\n說完，不等謝五答話，就吩咐道：「我有些頭疼，你先下去吧。」\n謝五看了樊長玉一眼，終是退了出去。\n樊長玉獨自坐著出了一會兒神，她隱約已能看見，自己將來要面對的，是更加複雜的一些東西。\n但是為了查清當年的真相，她必須還得往權力的中心靠得更近些。\n眼角餘光瞥過放在兵             content: `兩眼漠視前方的人,忽而冷冷側目瞥了他一眼。\n正好一股冷風襲來，公孫鄞也不知是被風給吹的，還是被那個眼神給看的,頓時只覺後背涼颼颼的。\n他趕緊調轉視線看向遠處的城樓，搖了兩下羽扇，轉移話題道：「城樓上的反賊已被弩兵挫盡了銳氣,可攻城了！」\n謝徵亦收回目光，再次看向被雷雲壓得顯出幾分低矮的康城城樓,薄唇吐出兩個字：「攻城。」\n身側的傳令官得了他指示,登上軍陣中臨時架起的高臺，大喝一聲：「攻城——」\n鋪展開的軍陣一直延伸向康城城門外的曠野,軍令僅憑吶喊是傳不到那般遠的,百十來名旗牌官自陣前聽得號令後，便舉著令旗駕馬沿著軍陣中留出的一條可供人馬同行的小道,飛奔向後方整齊陳列的各個方陣,高喊：「攻城——」\n一時間康城城樓下方，只見黑鐵大軍如潮水帶著摧枯拉朽之勢往前推進，黑沉沉的軍陣裡,猩紅的令旗如同遊龍在黑色的海波裡翻滾，廝殺聲撼得天幕那低垂的雷雲似乎都凹陷了幾分,遠處的康城城樓恍若成了這湧動的黑水軍潮裡一隻一個浪頭就能被掀翻的單薄小船。\n城樓上的守軍本就被先前那波飛蝗過境似的箭雨挫沒了士氣，此刻再瞧見下方如狼似虎撲來的燕州軍，一個個地嚇得臉都白了。\n哪怕燕州軍已進入了城樓的弓箭射程,城樓上都沒一個人反應過來放箭。\n所有人心中都只有一個念頭：完了。\n這場仗根本就沒有再打的必要了！\n隨元青氣得拔劍砍了一名離自己最近的弓兵,喝道：「愣著做什麼？放箭！」\n城樓上的守軍這才手腳發軟地搭箭拉弦想放箭,可一雙手實在是抖得厲害,幾乎連弓都拉不開,勉強放出去幾支箭，也是沒射出幾丈遠便掉落了下去，壓根沒有半點傷害性。\n副將好歹也是見過幾次大場面徵戰的，可看到城樓下方海潮一般湧來的燕州軍，還是被嚇得心魂俱顫。\n那軍陣末端，仿佛跟天上黑沉得快要壓下來了的雷雲連在了一起，只叫人覺著整個康城都被這片黑色包裹了去。\n莫說底下的小卒，便是他，也小腿肚發軟，哪還提得起半分戰意。\n他越過幾名在垛口處抖著手放箭的弓兵，尋到隨元青，惶恐道：「世子，康城勢必是守不住了，屬下掩護您快撤，留得青山在，不怕沒柴燒！」\n隨元青冷冷轉過一雙青黑陰沉的眸子，盯死物一般盯著那副將：「撤？還能往哪裡撤？」\n副將嘴邊的鬍子動了動，眼神飄忽不敢同隨元青對視，他當然知道除了崇州，隨家也只有康城這一條退路了。\n掩護隨元青撤是假，他自己不想在這場必敗的大戰裏白送了性命才是真。\n隨元青不知是不是看破了他的心思，忽然把那柄剛砍過弓兵的劍架到了副將脖子上。\n還帶著粘稠鮮血的冰冷劍鋒同頸側的皮膚相抵，副將脖子上幾乎是瞬間就起了無數雞皮疙瘩，眼底裡流露出驚恐之色。\n隨元青接手康城後，他好歹也在他手底下有些日子了，知道他一貫喜怒無常，瘋起來誰都殺。\n他的反應顯然取悅了隨元青，對方望著他勾唇笑了笑，嗓音聽起來溫和又陰森：「馬將軍若再說這等亂我軍心的話，本世子定斬了你這顆頭顱。」\n副將清楚隨元青的實力，就算他守不住康城，可在城破之前取自己性命還是綽綽有餘，當即就表忠：「末將便是死，也會死在這城樓上，末將只是擔心世子安危！」\n他說得冠冕堂皇，隨元青也不想再細究其中真假了，只似嘲非嘲地看著他道：「馬將軍一腔忠勇，本世子甚慰，指揮將士們守城去吧。」\n副將在刀口下撿回一條命，如釋重負，趕緊抱拳往別處去了。\n隨元青回首繼續望向下方的戰場時，臉色連那一絲冷笑也維持不住了，撐在城牆垛口石磚處的手青筋凸起，下頜咬得死緊。\n雷雨來臨前攻城，還弄出這般浩大的陣勢，從古至今大抵也只有他謝徵一人了。\n但凡讀過些兵書的，都知道不能在暴雨天氣裡打大型攻城戰，疾風和雨勢會大大銳減箭鏃的射程和傷害性。\n可謝徵就是反其道而行之，並且還成功了。\n弓箭的射程會因暴雨前的大風而受限，所以他用了比弓箭射程更遠，威力更大的踏.弩。\n黑雲壓城，燕州軍鋪開的軍陣亦是如一波赫色的汪洋，人借天勢，光是這股視覺上的衝擊力就已經嚇破了康城守軍的膽。\n兵法中的上策，從來都是攻心。\n在打這場仗前，他也從來沒想過，會有人把攻心之策，用得這般簡單直白又絕妙透頂。\n從前他總是不服謝徵的，覺得他不過是虛長自己幾歲，又有著他爹謝臨山在軍中留下的聲望，恰巧又有那等戰場上的機遇，才讓他立下了那些軍功。\n換了自己去，他做得不會比謝徵差。\n可幾回交手下來，他心底那股宿命感和挫敗感越來越強。\n他這一生，也成為不了謝徵。\n他靠學兵法奇謀才有今日，可謝徵是能再創兵法奇謀的人。\n這世間，最讓人嫉妒，也最讓人無力的，便是那份用盡十成努力也比不過的一成天賦。\n燕州軍已抵達城下，雲梯搭上城牆，城樓上的守軍倉惶放箭和投擲滾石，被攀爬雲梯的燕州軍用精鋼打造的圓盾擋了去。\n城門處，幾十人抬著攻城錘喊著行號正撞著城門，上方的守軍抬起圓木和石塊往下方砸，卻又有燕州軍把圓盾併攏到一處，護著抬攻城錘的將士組成一個半弧形的碩大鐵殼。\n城樓上投擲的那些石塊滾石落到盾上後，又滾落在地，城樓下方的燕州軍幾乎沒什麼傷亡。\n隨元青跟個局外人一般冷眼望著這一切，在刨去一切嫉妒、憤恨和不甘的情緒後看這場攻城戰，他幾乎想稱讚一聲完美。\n馬背上的將軍就該死在戰場上，若是死在這樣一場大戰裡，隨元青心底甚至生出幾分釋然和解脫的快意來。\n在一聲巨響後，城門終是被撞開，副將滿臉是血，撥開城牆上倉惶亂躥的守軍，尋到隨元青後，直接跪在了他跟前，「世子，城門破了，康城真的守不住了！」\n細雨下得更密了些，隨元青微偏過頭，望著他散漫笑笑，只吐出兩個字：「滾吧。」\n副將不解其意，隨元青卻已從親兵手中接過自己的兵器，在無頭蒼蠅一般四躥的守軍裡，逆著人流步履從容又散漫地往城樓下方走去。\n副將望著他的背影，暗嘆這人莫不是瘋了？\n-\n城門一破，城內守軍倉惶四逃。\n原本牛毛一般的細雨，慢慢也變成了豆子大小的雨粒，極為稀疏地從天際的黑雲裡墜了下來。\n謝徵馭馬帶著十幾名親衛隊進城，在甕城同隨元青遇上。\n隨元青單槍匹馬立在那裡，馬蹄下躺著十幾名燕州兵卒的屍首，他手中長.槍瀝著未乾的血色，挑釁般看著謝徵道：「謝氏豎子，可敢前來送死？」\n謝徵左右的親衛面露憤憤之色，當即就忍不住要催馬上前，被謝徵長戟一橫，攔了下來。\n他淡淡道：「退後。」\n幾十名親衛隊的人互看一眼，往後退了數丈。\n隨元青見狀，眼中的嗜血和興奮更甚，他抓著手中長.槍，用力一夾馬腹，大喝一聲便向著謝徵殺了過去。\n他這一擊，人借馬勢，幾乎是銳不可當。\n但謝徵駕馬立在原地，連動也不曾動過一分，他坐下的大宛烏蹄馬，跟著他廝殺戰場多年，見此情形竟也不驚懼。\n隨元青的兵刃快送到眼前時，謝徵才提戟格擋。\n一聲令人牙酸的銳響，長戟尖端下方的半月形戟刀牢牢卡住了隨元青的槍頭，兩股巨大的力道相撞，隨元青連人帶馬都後退了半步。\n他咬緊牙關，面目猙獰。\n然不等他拽出自己武器，那長戟的幾柄直接重重打在了他腰腹上。\n霎時間，隨元青只覺五臟六腑似被震碎一般，從馬背上倒飛出去時，一口血也噴了出來。\n摔在地上時，他眼前陣陣發黑，視物都出現了重影。\n只有豆子大的雨點落在臉上時，尚且還感知到幾分涼意。\n城牆上的「隨」字旗被攻上城樓的燕州軍砍斷旗杆，疾風裹著旌旗吹落至謝徵馬下。\n馬蹄毫不留情地踏了上去，纏著暗金色龍紋的戟刀抵上了隨元青脖子。\n謝徵單手持戟，於馬背上居高臨下望著他，眼底是看螻蟻般的漠然：「隨世子這十餘載的武藝，是都練在了嘴上？」\n隨元青沒理會這句嘲諷，他口中滿是鮮血，望著眼前這道山嶽一般不可攀的模糊人影，快意笑了起來，道：「殺了我，給個痛快的。」\n謝徵冷眼看著他，卻收回了長戟，吩咐身後親兵：「綁了，帶回去。」\n親兵上前去拖隨元青，他嘶聲道：「謝徵，要死，死在你刀下，老子也甘願些，那些劊子手，不配砍老子這顆頭顱！」\n雨點愈發密集，將地上的城磚暈出一個個蠶豆大小的水印。\n謝徵已駕馬往前走了幾步，聞言回首看了他一眼，冷漠道：「有個人，隨世子見了，興許就不這麼急著想死了。」\n隨元青很快被親衛們綁了帶走。\n公孫鄞姍姍來遲，用羽扇遮在頭頂，擋著愈來愈密集的雨點，「嘖」了聲：「還真是這雷雨一下起來，康城就被拿下了？」\n謝徵沒理會他，駕馬繼續往城內去，吩咐麾下部將：「大軍進城後，不得禍亂百姓。」\n眾部將紛紛抱拳應是。\n……\n那匯聚在康城上方的雷雲，最終是變成了一場下了一天一夜都未曾停歇的暴雨。\n室內明燭高燃，謝徵赤著上身，緊實的肌理在昏黃的燭火下愈顯塊壘分明。\n他後背有一道橫貫整個背部的斜長傷口，傷口首尾部分結痂了，中間部分又開裂來，黑褐色的痂和鮮紅的血肉混在一起，瞧著格外猙獰。\n他連藥都沒上，直接扯了乾淨的白布就往身上裹，明明痛得額角都冒出細密的冷汗了，卻連眼都沒眨一下。\n換下來的衣物亂糟糟堆在一旁的矮几上，裡邊一個雕工拙劣，高傲挑著眼尾的木雕小人格外扎眼。\n房門猝不及防地被推開，公孫鄞興奮前來同他匯報：「我帶那姓趙的去見過隨元青了，你是不知……」\n他的話音戛然而止，望著謝徵那血肉猙獰的後背，皺了皺眉問：「你何時受的這般重的傷？」\n謝徵面色極冷，幾下纏好紗布自己打了個結，披上外袍道：「捉趙詢的時候傷的。」\n公孫鄞很是驚奇：「趙家竟養得起那般厲害的守衛？」\n謝徵直接岔開話題：「隨元青那邊如何了？」\n公孫鄞已全無之前的興奮之色，只道：「不想死了，只想殺回崇州去斬他那假兄長，救她娘。」\n語畢，竟是又說起謝徵身上的傷來，他掃了一眼矮几，沒瞧見藥瓶，眉頭皺得更深了些，問謝徵：「你後背那傷裂成那樣？你不上藥？」\n他狐疑道：「我早就覺著你此番回來怪怪的，難不成是又同樊姑娘鬧了彆扭？」\n謝徵突然寒聲下了逐客令：「若無旁事便出去。」\n公孫鄞一愣，知曉自個兒是猜對了，他鮮少見謝徵臉色難看成這樣，暗忖只怕得是鬧了不小的矛盾，也沒了取笑的心思。\n多年的交情，他清楚眼前這人的脾性，不好在這時候多說什麼，只在退出房門時，瞟了矮几上那個人偶一樣。\n謝徵房裡是不會有這麼個醜不拉幾的擺件的，八成是他此番回來從崇州帶回來的。\n走出房門老遠後，公孫鄞才換來一名親兵，嘀嘀咕咕交代：「你去崇州一趟……」`
        },

            title: `第107章第107章`,
            content: `公孫鄞離去後,謝徵才緘默坐於矮几前。\n他沐浴後頭髮沒擦乾，溼漉漉的碎發一綹一綹地散落在額前，高挺的鼻梁在燭火下拉出一道陰影，薄唇輕抿著,顯出幾分倔強又悍野的味道。\n長指捏起那個醜萌高傲的人偶娃娃,看了好一會兒,才用指腹輕輕摩挲了兩下。\n矮几下方還放了一個大包裹，是親兵從燕州取來的。\n他打開繩結,裡邊有兩身衣物，沒穿過的雙線短靴，還有一包陳皮糖。\n正是當初樊長玉託趙木匠帶給他的那個包裹。\n雨天反潮，裡邊的東西都帶上了一股淡淡的潤意。\n謝徵拆開裝陳皮糖的油紙包，裡邊的糖果也有些化了，有的還粘連在一起。\n他像是沒瞧見一般，捻起一顆就放進了嘴裡，不是含著讓糖果慢慢化開，而是直接在齒間嚼碎，吞咽下去。\n咽下一顆,又捻起下一顆放進嘴裡繼續嚼。\n在舌尖蔓開的全是陳皮糖的甘酸和苦味。\n吃到後邊,幾乎已嘗不出甜,只剩酸和苦。\n-\n崇州。\n夜雨滂沱，一豆燈火阻隔了帳外裹挾著水氣的冷意。\n樊長玉盤腿坐在軍床上，望著邊上那個空空如也的箱籠發呆。\n裡邊的衣服已經全被她取出來放到床上了，但仍沒找到那個她粗劣雕完的木偶。\n這軍帳裡雖只有她一人住,但偶爾也會叫底下的什長、伍長們過來議個事什麼的,她私人的東西,她一貫收撿得很好。\n換洗的衣物都用箱籠裝了起來,那個木偶，她得閒時就拿出來雕，雕完又放進自己裝衣物的箱子裡。\n她先前隨意找了一身衣物換上去見賀敬元時，還未察覺。\n這會兒夜深人靜，想把那個木偶找出來再雕細緻些，卻找不著了。\n帳外傳來腳步聲，隨即是收攏油紙傘的聲音，須臾，趙大娘一手拿著往下瀝水的油紙傘，一手端著藥碗，用胳膊肘撩開帳簾走了進來，念叨道：「這雨大得怪嚇人哩！」\n把油紙傘靠帳篷邊放著了，端著藥碗朝樊長玉走來，見她把箱籠裡的衣物全都翻出來了，不由問道：「怎地把這些衣裳都拿出來了？」\n樊長玉想到自己昏迷這兩日都是趙大娘在照顧自己的起居，忙問：「大娘，你替我收拾衣物時，有瞧見箱籠裡一個木頭做的人偶嗎？」\n趙大娘搖頭：「沒瞧見有什麼木頭人偶。」\n看她失魂落魄的，又問：「怎麼了？」\n樊長玉只搖了搖頭，杏子似的一雙黑亮眼在燭火下透出幾分迷茫和澀然來。\n好好的，人偶怎麼會突然不見了呢？\n謝五雖是她親兵，但從不會逾越動她這些私人的物品。\n自己昏迷那兩日，還進過這軍帳的，就只有扮成謝五的謝徵了。\n人偶，是他拿走的嗎？\n趙大娘說：「先趁熱把這藥喝了，回頭我還得回你趙叔那邊去再幫他煎些藥。」\n樊長玉手上的傷還沒好，她這幾日便一直留在軍營這邊照料她起居，白日裡得空了，便去軍醫們那邊幫忙煎藥，亦或是幫那些傷重的將士清洗換下來的衣物。\n這場仗打下來，軍中傷亡不輕，就連趙木匠這個獸醫，也被叫去給傷兵們包紮救治。\n他原本還心中揣揣，怕自己醫術不精，醫壞了那些傷兵，等發現那些為了救治傷兵新招募上來的軍醫，開方子還沒自己清楚各種藥理藥性。\n一問才知都是些鄉下的土郎中，有的甚至只是識得草藥的採藥人，趙木匠心中不免有些突突的。\n但也明白這是沒法子的事，傷兵數以千計，隨軍的軍醫就那麼幾個，很多傷情又得講究一個救治及時，軍醫們哪裡忙得過來？\n只能把方圓百裡稍微懂點醫術藥理的人都抓來軍中，給傷兵們醫治。\n不管醫術如何，但有得醫總比沒得醫好。\n趙木匠憑著他當初救治謝徵那一身重傷的經驗，成功救回了不少傷兵，被破格提拔成了正式軍醫。\n軍中對軍醫素來禮遇，趙木匠也不用再幹木匠和獸醫的活兒，還有了自己的單獨軍帳。\n樊長玉回過神，前兩日她昏迷不醒，趙大娘夜裡沒法子，才一直守著她，如今她已醒了，也不用趙大娘再處處照顧，接過藥碗後便道：「下著暴雨，營地裡黑燈瞎火的只怕不好走，我讓小五送您過去，您忙完就歇在趙叔那邊，別回我這裡了。」\n她的軍帳離傷兵帳那邊還是有一段距離，老人家來回跑也折騰得慌。\n樊長玉明白趙大娘想為傷兵們做點什麼的那份心。\n趙大娘夫婦的兒子早年死在戰場上，她來了軍中見著傷病營裡那些將士，許是想起自己戰死的兒子，還哭了一場，直把那些傷兵們當自己的孩子看待，忙前忙後，一刻也閒不下來。\n或許是想彌補他們當年只知兒子戰死沙場，卻什麼也做不了的遺憾。\n趙大娘卻有些不放心，「那你夜裡一個人方便嗎？」\n樊長玉捧著碗道：「我手只是傷著了皮肉經絡，骨頭沒事，沒什麼大礙的。」\n趙大娘猶豫了一下道：「那成，你要是有什麼事，讓小五過來叫我就是。」\n樊長玉應好，又喚來謝五，讓他送趙大娘去趙木匠那邊。\n帳簾重新合攏，隔絕了雨幕和那無邊的暗色後，樊長玉整個人才沉寂了下來。\n她捧著藥碗，低頭時似有水澤掉入黑乎乎的藥汁裡，泛起了圈圈漣漪。\n她一口喝了個乾淨，也不管那藥汁苦得讓胃都有些痙.攣，把藥碗擱到床頭的矮凳上後，將床上那些衣物塞回箱籠裡，抖開薄被包裹住自己，直接蒙頭睡下。\n-\n斬殺長信王的戰報送往京城，再由欽差帶著封賞的聖旨抵達崇州時，已是半個月後的事。\n欽差入營時，樊長玉是唯一一個軍職在校尉以下，卻同在迎欽差隊伍裡的人。\n聖旨到如天子親臨，文武官員都必須著官服。\n賀敬元重傷未愈，強撐著穿上那一身厚重戎甲帶領眾部將在大營門口迎接欽差，臉上瘦得顴骨凸起，兩頰凹陷，甚至泛著幾分病氣的灰色，看得麾下一眾部將都心生不忍。\n樊長玉心中也發沉，賀敬元身上不僅是箭傷，同長信王交手時，他還替唐培義擋了長信王一獅頭矛，傷到了臟器，傷勢這才一直不見好轉。\n賀敬元在寫奏疏送往京城時，便已言明自己重傷，怕是不能再任攻打崇州的主將一職，此番這道聖旨帶來的，也不知是何旨意。\n她站在後邊，只瞧見大營外浩浩蕩蕩走來一群人，為首那人穿著一身她從未見過的官服，不像文官的，也不像武將的，臉上老得都堆起了褶子，卻面白無須，說不出的怪異。\n對方見了賀敬元，高傲吊著眼皮道：「薊州牧賀敬元接旨——」\n嗓音高亢尖細。\n樊長玉這才反應過來，這人應該就是傳說中那些在皇帝身邊伺候的太監。\n賀敬元帶著眾人跪了下去，樊長玉怕自己失禮給他招去什麼禍端，也沒敢再打量那宣旨太監，只垂眼看著自己跟前那塊地。\n「奉天承運皇帝，詔曰：崇州反賊亂我河山，欺我子民，薊州牧賀敬元匡扶社稷，誅殺反賊，朕心甚慰，今得知，卿傷重矣，特封為懷化大將軍，賞金千兩，暫交兵權與宣威將軍唐培義，準予回薊州頤養。」\n話音方落，跪在大營門口的眾人已是面色各異。\n這道聖旨是封了賀敬元一個軍職更高的虛銜，卻卸了他兵權。\n唐培義就跪在賀敬元左後側，他是賀敬元一手提拔上來的，對賀敬元很是敬重，聽到這道聖旨明顯有些焦灼，想同賀敬元說什麼，卻又礙於那太監還沒宣完旨，只能心急火燎地跪在原地。\n那太監繼續宣讀道：「宣威將軍唐培義，築水壩攔截反賊有功，崇州戰場上所訓右翼軍更是出奇制勝，有大將之才，特封為雲麾將軍，賞金五百兩。」\n「麾下部將亦驍勇非常，王大慶斬反賊先鋒，特封遊騎將軍，賞金百兩；苟四有斬反賊校尉，封致果校尉……」\n這道聖旨很是冗長，幾乎是把跪在大營門口的武將們都封賞了一遍，樊長玉這才明白自己也被叫來，是為了一同封賞的。\n那些所立軍功的戰報都是賀敬元寫了呈與皇帝的，想來對於皇帝會封賞哪些人，他心中也有數，所以才提前把這些人都叫了過來。\n只是遲遲都沒念到樊長玉的名字。\n她跪得膝蓋都有些發麻時，終於聽到那太監念到了自己：「右翼軍隊率樊長玉……」\n樊長玉一怔，下意識朝那太監看去，不巧對方也正看著她。\n那眼神似在笑，卻莫名地讓樊長玉一激靈，說不上來的感覺，但就是渾身不舒服，她忙低下了頭。\n那太監繼續宣讀：「斬殺長信王，立下奇功，封驍騎都尉，賞金三百兩。欽此！」\n樊長玉還不知這驍騎都尉是多大個官，但聽賞金比唐培義麾下那名叫王大慶的武將多了足足三倍，便暗忖這官只怕小不了。\n那太監念完了聖旨，臉上趾高氣揚的神色便收了起來，笑眯眯看著賀敬元道：「賀大人，接旨吧。」\n眼角餘光卻往樊長玉這邊也掃了一眼。\n賀敬元哪怕是在病中，聲線依舊鏗鏘：「賀敬元接旨！」\n那太監便把聖旨交與了賀敬元，臉上堆著看似親和卻讓人說不出膈應的笑，道：「恭喜大人，賀喜大人了。」\n賀敬元看著手中那份聖旨，眼底露出些許滄桑，笑著道：「是陛下垂憐。」\n唐培義當即就義憤填膺抱拳道：「大人，末將擔不起這主將一職，還請大人繼續掌兵！」\n賀敬元喝道：「休得胡言！你是想抗旨不成？」\n唐培義還想說什麼，看著一旁笑眯眯看戲般的太監，終究是忍了下去。\n賀敬元這才對那宣旨太監道：「公公遠道而來，一路辛勞，軍中已備下陋帳，若不嫌棄，且先下去修整一二。」\n太監笑呵呵道：「不辛苦不辛苦，賀大人這等在前線鞠躬盡瘁的肱骨之臣才辛苦，但不管是大人做臣子的，還是咱家這給陛下當奴才的，食君之祿，就得分君之憂不是？」\n賀敬元聽懂了這太監的言外之意，面上依舊不顯山水，只道：「公公所言甚是。」\n那太監看著賀敬元，臉上笑容便愈深了些：「賀大人明白就好。」\n等底下人領著那宣旨太監一行人走遠後，唐培義再也忍不住了，替賀敬元鳴不平道：「大人，陛下怎可直接奪了您兵權？」\n他半是負氣半是憤慨地垂下了頭：「我沒那本事接您的差！崇州這攤子我也收不了！」\n賀敬元只道：「糊塗！」\n「大人……」\n唐培義還想再說什麼，卻被賀敬元打斷了話，他說：「這兵權，不是落到你身上，便是朝中另派人來，比起後者，我倒更希望薊州軍是你接管。」\n他說著拍了拍唐培義的肩。\n唐培義一個八尺漢子，竟也紅了眼，道：「當日若不是大人為了救我……」\n賀敬元突然嘆息一聲道：「培義啊，我的確老了。」\n唐培義看著他這半月裡斑白了不少的鬢髮和瘦脫相的身形，眼中酸澀，終究是再也說不出一句拒絕的話來。\n樊長玉也瞧得頗不是滋味。\n自古以來，武將的下場似乎都是鳥盡弓藏。\n因為心裡揣著事，她被封了軍職，得了賞金，竟也半點高興不起來。\n賀敬元讓眾人各自散去，她也不知何故，杵在了原地沒走。\n賀敬元看到她，似並不意外，道：「隨世伯走走吧。」\n樊長玉「嗯」了一聲，落後半步跟在賀敬元身側。\n賀敬元因為傷勢，腳下步子緩慢，哪怕著一身戎甲，他身上那份儒雅溫和也壓不住。\n走出一段路後，四下僻靜，他緩緩道：「我沒瞞你殺長信王的事，現在整個朝野都知道了你，從今往後，你得自個兒警醒些了，暗處不知有多少雙眼睛在盯著你。」\n樊長玉道：「長玉明白。」\n賀敬元嘆息一聲：「丞相已容不得我，不知哪一日又會對你們姐妹下手，躲是躲不過去的，讓所有人都知道了你，丞相那邊再下手才會有所忌憚。」\n他頓了頓，又說：「李太傅一黨已經查到了你爹娘，他要扳倒魏嚴，眼下也會不惜一切代價保你的。李懷安以督軍的身份留在軍中，此子雖謙恭有禮，性行淑均，但畢竟是李家人，切兀輕信。」\n樊長玉能感受到眼前這位長者的良苦用心，心中感激，認真道：「長玉都記住了。」\n賀敬元這才望著她淺淺點了點頭，目光裡透出幾分長者對晚輩的慈愛和憐惜：「走這麼一條路，苦了你了。」\n樊長玉想到爹娘的死和外祖父這十七載的罵名，還有那日謝徵同自己分別的情景，黑色的杏眸沉寂卻又跳躍著薪火，堅定道：「不苦。」`

            num: 108,
            title: `第108章第108章`,
            content: `等樊長玉回去,她被封為驍騎都尉的事已經在營地裡傳開了。\n人人見了她，都道一句：「恭喜樊都尉！」\n樊長玉對著那些或相識或不相識的面孔,都只微微點頭示意。\n雖然早已有了心理準備,但這一天真正來臨時，她還是很不習慣。\n升了官，她的軍帳自然也是搬的，前來道喜的人遠比之前來的那些百戶多,大多數都還是將軍、校尉之內有官職的。\n樊長玉不敢怠慢,可人情世故裡的這份圓滑不是一朝一夕就能學會的,她實在是做不到遊刃有餘,好在這場仗還沒打完，軍中私下也不宜宴飲,這才不用擺酒宴招待這些人。\n面對一片道喜聲，她學著從前從說書先生那裡聽來的那些武將們升官後的樣子,抱拳挨個同道喜的人說聲「同喜」。\n她也是此時才知道,軍營裡也不乏會拍馬屁的人。\n幾個面生的武官就差把她吹捧成將星在世了。\n「早在薊州修大壩那會兒,我就聽說了樊都尉的名號,一介白身時便心懷天下,於雨夜截殺三名斥侯,這才讓引反賊走河谷,水淹反賊的大計得以實施！」\n「一線峽斬殺石虎那一仗打得也屬實精彩,拿著兩把殺豬刀,愣是砍了石虎的腦袋！此番更是立下奇功，救了賀大人,斬殺長信王！」\n眾人驚嘆連連,贊道：「英雄不論出處,老話果真不假！」\n樊長玉只謙遜道：「諸位謬讚了,我殺得了長信王，不過只是運氣好。」\n當即就有武官打斷她的話：「樊都尉莫要自謙了，便是運氣，也不是誰人都有這份運氣的！」\n眾人附和之餘，一名嘴角下顎各留了一撇小鬍子的五官替她惋惜起來：「按理說，斬長信王當乃首功，前鋒軍被打散後，帶著右翼軍殺進反賊軍陣腹地的，也是都尉，朝中怎地只封了都尉一個五品官職，賞金也才三百兩？」\n樊長玉微微一愣，暗道原來驍騎都尉是五品官職。\n想起之前謝徵扮成謝五時，同自己說的，斬殺了長信王，賞金當有千兩。\n可實際撥給她的只有三百兩。\n這等寫在了聖旨上的賞金，還是沒哪個官員吃了熊心豹子膽幹貪，那就只能是皇帝在決定給她封賞時，就只給了這麼多。\n一時間樊長玉也想不清其中緣由。\n但這人的話，大有說唐培義貪了她軍功的意思。\n這麼多人在這裡，好些甚至還是生面孔，那人的話傳出去無疑會讓她落人口舌。\n賀敬元提醒她的話猶在耳邊，樊長玉心中警惕，當即就道：「攻打崇州的戰術和排兵布陣都是賀大人和唐將軍的心血，他們才是居功甚偉，我一個小小隊率，一下子連升五級，本就是陛下皇恩浩蕩了。況且我在軍中資歷尚淺，擔這都尉一職，都心中惶惶，往後還得請諸位多多擔待。」\n軍營裡管著五十人的無品武官，準確來說應該稱呼其為隊率，但因為隊率有正副之分，所以底下人習慣性叫正隊率為隊正，副隊率為隊副。\n樊長玉這番話說得滴水不留，其餘武官在那人說出那句意義不明的話時，心中就已暗自捏了一把冷汗。\n他們只是從今往後要在樊長玉手底下做事，這才跟著前來道喜。\n若是那話傳到唐培義耳朵裡，叫唐培義不滿樊長玉了，頂頭上司都不得主將器重，那他們底下這些人還能有什麼盼頭？\n所以在聽到樊長玉這番自謙又抬舉賀、唐二人的話時，一屋子人都跟著鬆了一口氣，趕緊附和道：「都尉說得是，兩位將軍居功甚偉，但都尉在這個位置，也是德配其位！」\n此事算是就此揭過。\n樊長玉都準備送客時，帳外卻又來了一位不速之客。\n「都尉這裡好生熱鬧。」\n這道溫潤如三月清風的嗓音，實在是有辨識度。\n樊長玉一轉頭，便見書童撩起帳簾，一身天青色儒袍的人笑吟吟走了進來，正是李懷安。\n帳內的武官們一下子拘謹起來，樊長玉暗道他這時候過來難不成也是來恭喜自己升官的？面上卻還是做足了禮數，抱拳道：「李大人。」\n李懷安俊秀的眉尾輕挑，他眉色偏淡，眉尾帶著幾分微彎的弧度，讓他整個人看起來更溫和無害，因此這個在旁人做來大抵顯得輕佻的動作，放在他身上依舊是賞心悅目的。\n他淺笑著道：「樊都尉同懷安還是這般見外啊。」\n抬手從身後的書童手中接過一方錦盒，說：「得知樊都尉得了聖上封賞，懷安替都尉備了一份薄禮。」\n門神一樣守在門邊的謝五瞧見這一幕，瞪得眼都圓了，目光若是能轉為實質，他都能直接在李懷安後腦勺灼出兩個洞來。\n雖然侯爺眼下和都尉分開了，但公孫先生都派了謝十三來崇州跟他打探消息了，侯爺回去後直接拿康城反賊開涮，明顯也是放不下都尉的。\n都尉就更不用說了，他好幾次都撞見都尉一個人看著那柄烏鐵陌刀發呆。\n李懷安這時候來獻勞什子殷勤？\n趁火打劫？\n謝五一顆心七上八下地盯著樊長玉，盼著她可千萬別收那賀禮。\n樊長玉眉頭攏起，對李懷安道：「李大人的心意，在下心領了，但軍中不得私相授受，這份禮，我是萬萬不能收的。」\n之前來看她的百戶們，打的是探病的旗號，所帶的東西也都是些不貴重的糕餅酒水，談不上私相授受。\n今日來道喜的武官們，也沒蠢到直接在軍中給她送禮，所以大家都是空手過來的，因此樊長玉拒絕起來倒不是難事。\n李懷安聞言笑了笑，說：「都尉誤會了，這盒子裡的，不過是幾本懷安得閒時做了批註的兵書罷了。」\n他說著打開了錦盒，裡邊當真只有幾冊半舊的兵書，再無旁物。\n他指尖不動聲色叩了叩錦盒下方，面上笑意不減：「懷安的這份薄禮，當真是薄，讓都尉笑話了，還請都尉不要嫌棄才是。」\n他話都說到這份上了，裡邊又是幾冊書而已，樊長玉當真是再難找推拒的由頭。\n而且李懷安那不動聲色的動作，似乎是在暗示她先收下這錦盒。\n樊長玉想了想，覺著若只是單純送禮，他大可不必挑著一堆武官來給自己道喜時過來送禮。\n她視線淡淡地從之前挑唆她和唐培義的那小鬍子武官臉上掠過，回想著賀敬元同自己說的，李太傅一黨眼下不會害自己，遲疑片刻，還是收下了李懷安遞過來的錦盒，道：「那長玉就恭敬不如從命了。」\n李懷安面上神色似乎輕鬆了不少，他笑道：「懷安在兵法上造詣疏淺，只盼這註解的兵書能幫到都尉才是。」\n樊長玉只得再跟著客套一句：「大人太過自謙了。」\n好不容易把前來道喜的人都送走了，樊長玉癱在椅子上，只覺腦仁兒一陣陣燒疼。\n誰說軍中都是些五大三粗的糙漢的，這些從馬前卒一路摸爬打滾做到將官位置的人，沒一個是蠢的。\n那故意給她挖坑，意圖離間她和唐培義的武官，今後肯定是得提防著的，不過這類擺在明面上的釘子好拔，就怕還有暗釘。\n李懷安的舉動，也說不出地怪異。\n樊長玉在所有人走後，仔細看過那個盒子，並沒有暗閣什麼的，幾冊兵書裡也沒夾什麼紙條，註解在上邊的小字也當真只是註解而已。\n她一點頭緒也沒有，嘆了口氣問謝五：「小五，你說李懷安暗示我收下這些兵書究竟是何意？」\n樊長玉問的是正事，謝五隻得按捺下心底那點偏見，幫忙分析道：「眼下薊州兵權易主，底下的武將們雖信服於賀老將軍，但賀老將軍不管事了，他們也得在新的上峰那裡謀個出路。就跟之前那些百戶們前來向都尉示好一樣，都尉接受了他們的示好，便是一場站隊和拉攏。」\n他說到此處頓了頓，看了樊長玉一眼後，才繼續道：「李懷安……大抵也是在拉攏都尉。」\n樊長玉聽明白了：「我收下了他送來的這些兵書，我現在就是跟李家站在一條陣線的？」\n謝五點頭，又說：「但他故意在人前送禮，顯然就是特地想讓什麼人知曉。」\n樊長玉仔細琢磨了一通，想殺自己的只有魏嚴，但不管自己有沒有接受李太傅一黨的庇護，魏嚴都不可能收手。\n那麼讓能讓李懷安多此一舉做這事的，在這軍營裡，似乎也只有今日剛到的那宣旨太監了。\n可宣旨太監是皇帝的人。\n莫非皇帝意圖對自己不利？\n可皇帝為什麼要對自己不利？眼下賀敬元還沒被問審，也就說，她的真正身世還沒大白於朝野，就算皇帝是因外祖父遷怒自己，那他還封自己官做什麼？\n雖然這官職貌似是被壓了一壓的。\n樊長玉越琢磨越理不出個頭緒，煩躁得抓了一把頭髮。\n從前尚且還有陶太傅教她分析局勢，如今陶太傅音訊全無，賀敬元馬上又要被調回薊州，今後不管再遇到什麼事，都只能她自己瞎琢磨拿主意了。\n思及此處，樊長玉的目光不由落到桌上那擺在紅綢布託盤裡的三百兩黃金上。\n這金元寶一錠是十兩的分量，託盤裡一共有三十錠，金燦燦的，瞧著很是惹眼。\n她想了想，吩咐謝五：「你拿出十三錠元寶，和撥下來的撫恤金一起寄給陣亡的那十三名將士家眷。另拿出兩錠給重傷的將士們買些補品，再替我找幾個有真才實學的幕僚來，銀子你看著給就是了。」\n謝五點頭道：「都尉如今也是正五品的官階，身邊理當養幾個幕僚了。不過……撥給陣亡將士的，會不會太多了？」\n十兩黃金，換算成白銀得有一百兩了，再加上朝廷統一撥下的五兩撫恤金，就是一百零五兩。\n樊長玉說：「這是我承諾了將士們的。」\n以郭百戶為首的那批百戶，將來能為他所用，卻沒法成為她的親兵。\n她身邊可用又對她足夠忠誠的人，還是太少了。\n她想從自己帶的那些小卒裡，挑兩個出來當親兵。\n謝五聽到她那個答案怔了下，終是沒再說什麼。\n他要出門時，樊長玉卻又叫住他：「把這些兵書也拿去給底下將士們看吧。」\n謝五呆住。\n樊長玉說：「讓他們多讀些兵法，有益無害。」\n確定樊長玉是讓自己處理了那些書後，謝五幾乎是狂喜了，他笑容都快裂到耳根去，怕讓樊長瞧出端倪，才趕緊收斂了些，抱起那錦盒道：「好，我這就拿下去！」\n等謝五離開後，樊長玉望著放在兵器架上的那把陌刀出了一會兒神，才拿出從前謝徵幫她註解的書，慢慢翻看起來。\n讀書能使人變聰明，她要多讀書。\n李懷安送她做了註解的書一舉，不管是巧合還是有意，但他從當初在山道上遇見自己，再到後來幫著自己查爹娘遇害的卷宗，剛好就查出自己身世有問題，再順藤摸瓜地查出了賀敬元幫她爹娘偽造了各種文書的事，委實是太「巧合」了些。\n-\n皇宮。\n玉宇瓊樓間，一身海棠紅宮裝的明豔女子疾步走過，十六名梳著雙髻的宮娥垂著頭小步快走跟在她身後。\n守在上書房前的老太監遠遠瞧見那女子，滿是褶子的老臉上便已堆起了牽強的笑來，迎上前道：「這是什麼風把長             content: `賀敬元回薊州的這天,樊長玉和唐培義等一眾部將都親自去送他。\n賀敬元傷勢未愈，騎不得馬，候在營地外的是一輛青篷馬車。\n唐培義在賀敬元上馬車前鄭重一抱拳道：「大人回了薊州且安心休養,培義定破崇州，生擒那隨元淮,不負大人厚望！」\n賀敬元望著他點頭,欣慰拍了拍他肩,視線掃過樊長玉和昔日追隨他的一眾部將時，眼底多了幾許滄桑。\n今日前來的都是自己人,他說話也沒了太多顧忌，道：「培義啊，我這世侄女，今後也勞你多擔待些。」\n唐培義忙道：「樊都尉雖為女流，卻是軍中人人嘆服的虎將，當日也是樊都尉截殺那三名斥侯，才讓大計未遭破壞,否則盧城若失,末將便是也萬死難辭其咎,今後得是末將多倚仗樊都尉才是。」\n他被提拔上來當這主將,也有右翼軍立下的戰功在裡邊，這番話說得倒不全是漂亮話。\n賀敬元說：「這丫頭有時候軸得厲害，朝堂上的事，你多點點她。」\n唐培義這次沒再多說什麼,全盤應下。\n賀敬元便又看向樊長玉,樊長玉心中五味陳雜,喚了一聲：「世伯。」\n賀敬元說：「好好在唐將軍手底下做事,建功立業。」\n他眼裡還藏了關於十七年太多事的複雜情緒,但那些話，終究是不能在人前說了。\n樊長玉用力點了點頭。\n站在樊長玉身側的一名將領，下巴上須了一圈淡青色胡茬，整個人看起來很是英武，卻在此時紅了眼眶：「大人。」\n賀敬元看著他只是笑笑，說：「把你拘在我身邊這麼些年，你的性子也磨得差不多了。文常，跟著唐將軍在沙場上掙個前程去吧。」\n這漢子正是前不久才從薊州調過來的鄭文常。\n之前反賊欲取薊州，攻打薊州門戶盧城，賀敬元親自前往盧城督戰，薊州大小事宜便交與鄭文常打理，從另一種層面上，也是成為他在薊州的眼睛，監視李懷安。\n如今李懷安已查到他想要的東西，留在了崇州戰場，賀敬元又被調回薊州，賀敬元怕樊長玉在軍中孤掌難鳴，才把鄭文常也調了過來。\n昔日唐培義和鄭文常都是他部下，但唐培義同他到底只是上下級，沒有鄭文常這個學生來得親厚。\n如今唐培義大權在握，許多事，他自己得有分寸。\n一番道別後，賀敬元坐上了回薊州的馬車。\n樊長玉回營時看了一眼高遠的天空，心底生出幾許悵然來。\n這條路走到後面，親近的人似乎都離她而去了，但她必須得走下去。\n就在前一晚，賀敬元才單獨召見了她。\n讓她沉住氣，先在戰場上攢軍功，等剿滅反賊，回京受皇帝親自嘉獎，那時候他幫她父母偽造身份一事，也會重新被審。\n攀扯出魏嚴後，有皇帝和李家親審，十七年前的事，魏嚴便也瞞不住了。\n還告訴了她，鄭文常是他的人，她若有什麼難處，可向鄭文常求助。\n對於賀敬元這些體貼入微的安排，樊長玉心中無比感激。\n自從爹娘去世後，除了趙大娘一家，她再也沒有受到過長輩這樣的關照。\n她如今作為官職不低的將領，也可參與中軍帳內的議事了，但她兵書讀得不多，大多時候都是聽唐培義他們在沙盤前你一句我一句地講，底下的將領們偶爾說到激動處，唾沫星子噴得像是要打一架。\n樊長玉從一開始聽得雲裡霧裡，到現在已經能聽懂他們說什麼，但繼續攻打崇州的戰略還是沒定下來。\n不過有一點可以確定了，再上戰場，她是要當前鋒的。\n樊長玉手底下便被撥來了一支兩百人的騎兵隊，人數雖然不多，作為前鋒的矛尖兒還是夠了。\n統領這支騎兵的小頭目竟也是樊長玉有過幾面之緣的人。\n修大壩時，她被抓去採挖土石，那些被扣押起來的平民裡，有個力大無窮的漢子，每頓都能得雞腿。\n如今這騎兵隊的小頭目就是他。\n他見了樊長玉，可能是一早就知道要被分到她手底下了，倒是沒多少意外。\n只有他部下一名騎兵呆呆望著樊長玉：「俺地個娘哎，這不是大壩被毀反賊突襲那天，一腳就踹飛了女營房大門的那位姑奶奶嗎？」\n顯然這騎兵也是當日難民裡的人。\n為了能在戰場上有契合度，樊長玉現在除了操練步兵，還得抽出空來跟騎兵們磨合。\n不過好在騎兵們對她似乎頗為崇敬，不知是聽說了她斬長信王的勇跡，還是聽多了她當初挖土石的事跡。\n樊長玉還得頭疼地跟著謝五找來的幕僚們學時政天下大勢，也沒功夫細管底下的人閒來無事聊些什麼。\n等她一腳能踹塌城門的謠言傳遍軍中時，樊長玉整個人都是懵的。\n她問謝五：「我何時一腳踹塌過城門了？」\n謝五道：「聽說是反賊突襲修大壩的薊州軍時。」\n樊長玉震驚解釋道：「我踹的不是城門，是關押女子的營房大門。」\n謝五嘿嘿笑了兩聲，說：「就讓這謠言傳下去吧，反正對都尉是百利而無一害，將來同反賊陣前對峙，還能嚇嚇對方。」\n樊長玉最近讀了不少兵書，在幾個幕僚頭髮掉一半後，她總算也把三十六計學了個囫圇吞棗。\n可惜她翻了好幾倍的酬勞，幾個幕僚都不肯留下繼續教她了。\n此時倒也懂了謝五說的是攻心的一個法子，她不無感慨地道：「這所謂兵法，其實也是比誰心更黑吧？」\n謝五不好意思笑笑，「智鬥能少死些人，那就是好的。」\n樊長玉點了頭，又說：「那行，你再給我找幾個幕僚來。」\n謝五的笑僵在了臉上。\n可不能小瞧那些不入仕，專去給人府上做客卿的酸腐讀書人，他們之間消息靈通得很。\n他廢了不少力氣才給樊長玉找來幾個有真才實學的幕僚，對方聽說是去新晉女將麾下做事，雖有顧慮，但聽聞了樊長玉的戰績，倒也願意前來效勞。\n只可惜教了沒半天，就紛紛頭疼得想告辭。\n樊長玉連兵法都還沒讀完，這怎麼教？\n再說朝堂局勢，她連朝中有哪些官員都還是一問三不知，同她說哪些人是魏黨，哪些是李黨，哪些又是保持中立的純臣都費勁。\n幕僚們只覺著自己前途慘澹，光有勇武，而無明智的武將，別說官運亨達，不稀裡糊塗死在戰場上就是老天開眼了。\n他們被幾把大刀逼著，才愁雲慘澹地教樊長玉學完了《孫子兵法》，每天飯都少吃半碗，一個個地愁得肉眼可見地清減了下來。\n樊長玉半是心虛半是內疚，生怕這群教自己學兵法的老先生直接在她這裡抑鬱而終，終究還是同意了放他們走。\n幾個幕僚回去後酒入愁腸一訴苦，窮死也不能來給樊長玉但幕僚的名聲就這麼在讀書人中間傳開了。\n現在給樊長玉找幕僚，話還沒說完，那些讀書人就扛起行囊跑了。\n謝五斟酌道：「都尉，再找，只怕咱們銀子不夠了……」\n樊長玉聽出謝五這是說給她找幕僚，花好幾倍的銀子都找不到人了的意思，便幽幽嘆了口氣，說：「我義父那麼厲害，一開始都還想收我為徒，難不成是他老人家老眼昏花了？」\n謝五說：「都尉身上是有大智的，陶太傅必然也是看中了都尉這一點。」\n樊長玉知道有個詞叫大智若愚，這是說她看著就比較蠢麼？\n她一時間也不知道謝五這話到底是安慰呢，還是在繼續給她扎刀子，無奈道：「行了，你先下去吧。」\n轉頭就給家裡寫了一封信去，讓謝七給長寧請個西席。\n如今崇州打仗，私塾早就沒辦了，但大戶人家的公子小姐，是可以請西席教學的。\n樊長玉覺得，不能讓長寧步自己的後塵，必須得從小就讓長寧好好念書。\n-\n一隻信鴿撲稜著羽翼落到了鴿籠上方，木質鴿籠裡，隱約還能瞧見裡邊的鴿子從進出的圓孔處，探頭探腦地朝外張望。\n看守鴿籠的下人瞧見了這隻新飛回來的白鴿，忙上前取下信鴿信筒裡的信件，把鴿子放回鴿籠後，才匆匆朝軍帳內走去。\n「公子，是從崇州城內送來的信。」\n案前執筆寫著什麼的人，聞言擱了筆，伸出修竹般修長而白皙的手，接過了下人遞上來的捲成條狀的信件。\n不同於女子指尖的細嫩無骨，這雙手有著屬於男子的那份筋骨，卻又不似武將那般因常年習武而指關節突出，只是常年握筆，才在指節上布了一層薄繭。\n李懷安捻開信看完，俊秀的眉峰卻還是半蹙著，他低喃道：「魏嚴城府極深，不該這麼輕易就上鉤才是。」\n那信，正是被困於崇州城內的隨元淮送出的。\n李家查到賀敬元時，魏嚴怕皇帝審賀敬元，供出自己，想對賀敬元下殺手，卻沒能成功。\n如今賀敬元身邊不止有他自己的死士護著，還有李家的死士暗中護著，魏嚴那頭不能再下手了。\n隨元淮提出可以假意和魏嚴合作，魏嚴幫他保住崇州，他幫魏嚴穩薊州兵權。\n畢竟崇州一但被攻陷，隨元淮這個「反賊之子」就只能伏誅，而薊州和崇州的兵權，也會落到李家手上，對魏嚴而言，極為不利。\n眼下兩方合作，似乎才是最好的選擇。\n但魏嚴被隨元淮找上後，答應得這麼幹脆，卻讓李懷安有些遲疑起來。\n誘魏嚴跟崇州合作，是他們聯合隨元淮為了儘快扳倒魏嚴的一個計謀。\n原本他和祖父是想拿十七年前的事做文章，但查了這麼久，唯一的線索，那封信，又斷在了魏嚴那裡，便是他日對簿公堂，魏嚴也有一百種替他自己開脫的方式。\n他們這才又想到利用崇州和薊州的兵權歸屬做一個局。\n一旦魏嚴同意跟隨元淮那邊合作，他們這次拿到的證據就是鐵證。\n沒有十七年前的真相，一樣能藉此事扳倒魏嚴。\n可就是計劃進行得太過順利，才讓李懷安產生了一股，魏嚴似乎已經識破了這是他們的計謀，不過是將計就計在同他們做戲的錯覺。`
        },

            title: `第110章第110章`,
            content: `臨水而建的涼亭四面來風,蔥鬱的竹影透過半卷著的細蔑捲簾投映在裡邊的地磚上，點點日光碎落在對弈的那人垂落的衣擺間，錦緞的暗紋便也淌起了流光。\n蟬鳴聲躁,鋪滿蓮葉的湖面上，時不時有一尾錦鯉躍起,銜住一片怒放的蓮花瓣，又墜入水中，激起三千清波。\n謝徵結著暗痂的長指捻起一枚黑色的棋子落到了棋盤上，對面的白子便一下子被圍堵殆盡。\n謝忠舉著白子望了半天，再尋不到一處落子點，終是無奈失笑：「侯爺棋藝又精進了,屬下自愧不如。」\n坐於他對面的人並未束髮,因身上鞭痕和裂開的刀傷未愈,裡邊著了單衣後,只松松披了一件外袍，俊美的臉上還帶著絲絲病氣的蒼白,喉間竄上一股癢意,他掩唇低咳兩聲,說：「熟能生巧。」\n反覆開裂的刀傷加上那一百零八鞭,謝徵足足在床上趴了三日才能下地。\n大夫前來治傷時，都直搖頭，連聲說他後背連一塊好肉都沒有了，換了尋常人,疼都能活活疼死。\n但謝徵許是常年徵戰，在沙場上磨鍊出的意志,除了體力不支,不管多疼,他都暈不過去。\n大夫用鑷子一點點扯出他深陷進傷口裡的碎布時，他也是清醒的，只是全程都沒吭一聲，清理完傷口，因忍痛而滲出的冷汗都沾溼了身下床褥。\n大夫臨走前，說他這一身傷，怕是得趴個十天半月才能下地，但他只養了三日的傷便能自己下地了。\n謝忠以為他急著要回去，是因他養傷第一日，公孫鄞差人送來的消息——宮裡的太監帶著封賞和一道聖旨去了康城，公孫鄞藉口他巡視邊防去了，那太監便候在了康城。\n他道：「巡邊多則數月，少也要一月，有公孫先生暫且穩著宮裡來的人，侯爺將身上的傷養好再回去不遲。」\n謝徵將手中黑子扔回棋簍裡，鳳眼半垂，意興闌珊的模樣，他說：「小皇帝的一道聖旨，本侯還沒放在眼裡。」\n謝忠想了想，問：「是因崇州局勢的變化？」\n「長信王一死，攻破崇州便是早晚的事，但賀敬元突然重傷，朝中臨陣換了主將，薊州軍中的軍心潰散，只怕不比崇州城內的反賊好上多少。這一出，倒不知真是小皇帝的意思，還是魏嚴的意思。」\n謝徵反問，「忠叔覺著，賀敬元退下來後，魏嚴身邊還有誰能替他接管薊州兵權？」\n謝忠仔細想了想，搖頭道：「怕是沒人了。其子魏宣空有勇而無謀，眼下薊州和崇州的兵權，是李、魏兩黨必爭的一塊肥肉，魏嚴不會心大到把衝動易受人挑唆的魏宣放到崇州戰場去。皇帝升了唐培義作主將，唐培義雖是賀敬元一手提拔起來的，卻是實打實的純臣，薊州兵權在唐培義手上，想來皇帝也放心。」\n謝徵說：「崇州若破，薊州和崇州兩地的兵權，不歸李黨，也會落回小皇帝手中。魏嚴要想自己身上落下的這塊肥肉不被旁人叼走，就只能讓崇州的戰局繼續僵持下去，慢慢耗著，李家還有個李懷安在崇州當監軍，總能抓到李家的錯處的。」\n謝忠一驚：「侯爺的意思是，只怕魏嚴又會效仿之前對您和賀敬元都做過事的，故意在戰場上出什麼紕漏，以此來給李黨或唐培義定罪，慢慢拿回對薊州兵權的控制權？」\n謝徵卻搖頭：「同樣的伎倆，魏嚴不會用第三次。況且，我們能推出魏嚴的破局之法，李家養的那些謀士也不是吃白飯的，不至於連這點都想不到，隨元淮便是當初東宮大火裡逃出生天的皇長孫，眼下又已跟李太傅一黨結盟，崇州早已是李家囊中之物，他們為了再無後顧之憂，興許還會設套，故意引魏嚴去鑽。」\n謝徵說到此處頓了頓，眼神已一寸寸冷了下來：「要給魏嚴把罪定死，就必須讓百官和萬民都震怒，忠叔你說，能讓天下人震怒的，是什麼？」\n謝忠思索一番後，驚駭道：「那只能是魏嚴勾結反賊，殘害忠良。要想此事鬧大，死的人必須足夠多……」\n謝忠已經不敢再往下說下去了，只道：「李太傅應當還不至於膽大至此……」\n謝徵說：「他們若只是在朝堂上鬥個你死我活，薊、崇二州我拱手讓人都無妨。他們若想用底下萬千士卒的性命去構陷一樁千古大案奪權，我還不如把兵權收入囊中。」\n「反正……遲早都還得同他們撕咬一番的。」\n謝忠聽了，面上卻有幾分淡淡的欣慰，「侯爺深明大義，不墮謝氏風骨，將軍泉下若有知，也會以侯爺為傲的。」\n謝徵不答，只稍稍往後坐了幾分，墨發披散了滿肩，在一片翠竹的濃陰裡，望著水榭外的景致道：「當年忠叔若是晚些離開京城，在我母親故後帶我回徽州就好了。」\n沒有認賊作父的那十餘載，他心底興許會好受些。\n謝忠想起往事，有些唏噓道：「夫人在將軍故去後，悲痛難忍，性情大變，我等原也是想在將軍去後，替將軍守著京城謝家門楣的，奈何夫人悲慟之餘總是責怪我等未能護好將軍，每每見了我等便哀慟哭得近乎大病一場，夫人身邊的嬤嬤這才勸我等別留在京城了。」\n謝忠垂下頭，苦澀道：「為了夫人的身體，我們打道回了徽州。誰知不久後就聽聞夫人尋短見隨將軍去了，侯爺也被魏嚴帶回府上撫養。我等下人，自是無權質疑主子決策的，這才一直留在了徽州謝家。」\n謝徵背脊卻微僵了一瞬，他問：「是我母親……趕您回徽州的？」\n謝忠忙道：「不怪夫人，夫人也是心中悲切，又不知我當時斷了一臂，還折了腿，並未隨將軍前往錦州戰場，才怨我沒保護好將軍。我心中也的確愧疚，怕留在京中老是惹得夫人傷心，這才主動走的。」\n謝徵低垂著眸子似在想些什麼，久未出言。\n水榭外的竹簧幽徑裡，一名小廝疾步而來，在水榭外站住，躬身捧起一封書信道：「侯爺，公孫先生來信。」\n謝忠一瘸一拐地走出水榭，取了信拿回去遞給謝徵，謝徵拆開看後，冷沉的鳳目裡陡然升起一股戾氣。\n極致的憤怒讓他胸腔裡似堵了什麼，忍不住掩唇低咳起來，沉寂的嗓音後卻是無盡冰冷：「備車，回康城。」\n-\n前去康城宣旨的太監苦等了多日後，終於等來了謝徵回來的消息，當即浩浩蕩蕩帶著一眾人馬前去宣旨撥賞。\n他在謝徵暫住的城主府外，高唱一聲：「聖旨到——」\n門口的守衛看他一眼，倒是進門報信去了，但想像中的一群人惶恐又驚喜的情景根本沒出現。\n公孫鄞出了名的好脾氣，不管是有心還是無意，都願意拿些漂亮話把他哄得服服帖帖的，跟在謝徵身邊的這群人，脾性隨了正主，一個個竟是連戲都懶得做。\n宣旨太監站在大門外侯了足足三炷香的時間，才見裡邊有人出來，來者還不是謝徵，瞧身上的甲冑，應當只是個親兵。\n對方對著宣旨太監毫無懼色地道：「侯爺日前剿匪受了些輕傷，不便來府門前迎接公公，還請公公移步前廳吧。」\n宣旨太監面色當即難看了起來。\n身旁的小太監出門在外也沒受過這等冷遇，當即就指著親兵喝道：「你……」\n宣旨太監伸出一隻手攔住了那小太監，這是在康城，不是宮裡，他還是頗分得清利弊的，只皮笑肉不笑地看著那親兵道：「侯爺萬金之軀，自是不能有閃失的，咱家去前廳宣旨便是，勞小將軍帶路吧。」\n親兵也不多給那太監眼神，道：「公公請隨我來。」\n宣旨太監一行人便進了府門，往前廳去。\n外邊日頭毒辣，但這前廳的地勢，當初也不知匠人們是怎麼精巧設計的，一入內便覺著一股陰涼來襲，乍冷乍熱的，讓宣旨太監心頭莫名一激靈。\n他抬眼往高位上看去，便見一襲墨袍捻金紅雙線暗紋的青年男子沒什麼坐相地半倚著榻背而坐，面似冷玉，眼如寒潭。\n他不著戰甲坐在那裡，當真似百年世家蘊養的出的清貴公子。\n宣旨太監定了定心神，高聲道：「武安侯接旨——」\n坐在上方的人不為所動，就連分立在臺階兩側的裨將也目不斜視。\n宣旨太監心中的不妙感愈來愈重，卻萬不敢在此時開罪謝徵，只臉上堆起了笑道：「侯爺，您快接旨吧，都是陛下對您的封賞，您接了這旨，老奴才好回去交差啊。」\n謝徵鳳目半抬，終於緩慢開了口：「公公不念這聖旨，回京後還能說是旨意未宣。若是念了，本侯不接，公公可知意味著什麼？」\n宣旨太監被謝徵這番狂言嚇到了，指著他，且驚且怒道：「抗旨不遵？武……武安侯，你也想謀反不成？」\n此言剛一出，不知何時圍在了門外的鐵甲將士直接湧了進來，將宣旨太監一行人團團圍住。\n宣旨太監瞧著這陣勢，腿都嚇軟了，一張塗了脂粉的臉慘白慘白的，色厲內荏喝道：「你真要謀反？」\n謝徵拔出身側裨將的佩劍，一步步從高位上走下來，墨色的袍子拖曳在臺階上，仿佛墜著沉沉的血煞和戾氣。\n宣旨太監直接嚇得腿一軟，跌坐在地。\n謝徵在距他三步開外站定，用冷冰冰的劍尖兒拍了拍他的臉，鳳眸半垂，懶洋洋又難得好脾氣地道：\n「謝氏在大胤當了百年的忠臣，家父更是於十七年前慘死在錦州戰場，換得一世英烈之名，我不願墮了他的名聲，所以眼下也還願意好好當個臣子，回去給小皇帝帶句話吧。」\n「那皇位他若坐膩了，本侯不介意尋個人替他坐。」\n「十七年前魏嚴能捧他坐上龍椅，而今本侯也能拉他下來。」\n宣旨太監心神巨震，手指著謝徵，哆嗦著，極為驚怒地喊出一句：「你……謝氏！亂臣賊子！」\n「啊——」\n下一瞬，宣旨太監的慘叫聲便響徹整個城主府。\n謝徵一劍削掉了他一隻耳朵。\n宣旨太監單手捂著耳際，慘叫連連，不斷有血水從他指縫間流出，頃刻間就把袖子也染紅了一大片。\n他看著掉落在地的那隻血淋淋的耳朵，痛嚎得幾乎快暈過去。\n邊上扶著宣旨太監的小太監，渾身亦抖得跟篩糠一樣，兩眼發直地盯著地上那隻耳朵，襠下傳出一股腥騷味都還不自知。\n謝徵把劍丟給跟上來的親衛，懶洋洋直起身，嫌惡地看著一屋子鬼哭狼嚎的人，薄唇吐出一句：「滾回去傳話吧。」\n宣旨太監這才由小太監們攙扶著，連滾帶爬地往門外逃去。\n親衛看著宣旨太監一行人離去的背影，有些擔憂地同謝徵道：「侯爺，您就不怕陛下那邊……」\n謝徵也望著宣旨太監狼狽的身形，眼神懶散又冰冷：「本侯的確有意廢帝了。」`

            num: 111,
            title: `第111章第111章`,
            content: `公孫鄞聽說了那宣旨太監倉惶離開康城的事,忙來尋謝徵，一進書房便道：\n「那宣旨太監是御前總管王喜的乾兒子，他此番前來是奉皇命前,你削他一隻耳朵,無疑是往皇帝臉上打這一巴掌，當真要同朝廷那邊撕破臉了？」\n謝徵左臂倚著黃梨木太師椅的扶手坐於書案後，案上擺著一份大胤的兵力布防圖，他望著輿圖,嘴角掛著一絲薄笑，眼裡卻冒著寒氣：「小皇帝如今還在魏嚴手底下扮蠢弄拙，尚且不把替他徵戰沙場的武將性命當回事,他真正掌權之日,你以為會是善類？」\n公孫鄞一時語塞,沉默片刻後，如實道：「陛下被架空皇權多年，前有魏嚴，後有李太傅,論隱忍和心性，他在歷代帝王中，也算得上翹楚了,但正是隱忍了十餘載,只怕他對皇權的渴望也到了極點,心中已裝不下多少仁德，只剩收回皇權的不折手段了。」\n謝徵眉梢輕提：「你看人倒是一如既往地準。」\n語畢,一揚手扔了厚厚一卷文書給他。\n公孫鄞兩手接住,問：「這是什麼？」\n謝徵只道：「你看完便知曉了。」\n公孫鄞打開細看,眉頭頓時越皺越緊,最後面上已能見怒色，他問：「這些可都屬實？」\n謝徵答：「趙詢為了說動我擁護皇重孫，新拿與我的證據。」\n公孫鄞翻著那一摞文書，下頜繃緊，怒道：「前年的旱災，去年春江南一帶的澇災，死了多少人？李、魏二人黨爭也就罷了，李太傅派去的監察瞞報災情，就為了多死些人，好參魏嚴一本，竟是皇帝授意的？當年承德太子能為萬千軍民身死錦州，如今那已坐在龍椅上的人，為了皇權竟不惜拿數十萬計的災民性命填自己的野心？」\n前兩年，關中和江南先後大旱和大澇，朝廷撥款賑災幾乎掏空了國庫，銀子是經魏嚴底下那群人之手，可李黨好歹也派了監察同去，最後餓死病死的災民還是過半！\n天下人震怒，以李太傅為首的文人在朝堂上把魏黨罵得狗血淋頭。\n也是那一次，魏嚴迫於整個朝野和全天下人的壓力，頭一回在李太傅跟前鎩羽，推了自己手底下幾名大員出去頂了罪，才平息了此事。\n但魏嚴在民間已是臭名昭著，不亞於當年錦州慘案之後被痛批大奸臣的孟叔遠。\n謝徵神色極冷地道：「李家那老頭野心不比魏嚴小，只是他畢竟文人出身，更怕天下人的口誅筆伐。小皇帝想借他扳倒魏嚴，他也擔心有朝一日小皇帝的刀口落向李家，才仗著小皇帝當時無權，給自己留了後路。\n「他派去賑災的監察，一共寫了十一封急報送往京城，各地州府的驛站，都有快馬進京的卷宗記錄在案，只是宮裡沒有收到災情急報的記載。」\n話說到這份上，公孫鄞還有什麼不明白的。\n故意瞞報災情，以至災民死傷過半，不管何時重提都是一項大罪。\n皇帝想把這個鍋讓李太傅背嚴實，但李太傅老謀深算，讓底下人給京城送了急報，至於宮裡沒收到急報，將來東窗事發，這君臣二人各執一詞，就看世人如何評說了。\n公孫鄞不由問：「李太傅的人送去宮裡的那些急報，趙詢又是如何弄到手的？」\n謝徵淡淡一抬眼：「你以為宮裡替小皇帝背責的又是誰？」\n公孫鄞沉思片刻，說出了一個名字：「王喜？」\n謝徵沒再言語，算是默認。\n公孫鄞稍一尋思，倒也明白其中的各種利益牽扯了，皇權衰落，宮裡的太監，都不可能只給自己謀一條後路。\n那王喜當了多年的總管太監，沒惹到魏嚴，還能被小皇帝器重，可見是個心思玲瓏的。\n用賑災構陷一樁大案作為扳倒魏嚴的第一步，皇帝想讓李太傅背黑鍋，李太傅又想拉皇帝下水，送進宮的急報不能呈到小皇帝跟前去，王喜就只能把所有急報截斷在自己那裡。\n只要皇帝和李太傅還一致對外，不互揭老底，他就是安全的。\n等將來皇帝和李太傅卯上，誰贏他幫誰，同樣百利而無一害。\n小皇帝贏了，他銷毀了那十一封關於災情的急報，罪名就是穩穩扣在李太傅頭上的。\n李太傅贏了，他拿出那十一封急報，他自己再當個人證，那無疑就是小皇帝失德的鐵證。\n就算最後是魏嚴贏了，他趕緊拿出這些證據，還能替魏嚴找回名聲，把當年小皇帝和李太傅合謀構陷他的事公諸於眾。\n盛怒過後，公孫鄞心底忽地生出幾分悲意來，他嘆道：「大胤朝堂的這水，早就渾得不能看了。」\n魏黨或許是一群狗官，但為了扳倒魏嚴，用幾十萬災民的性命引得天下黎民百姓都震怒的皇帝和李太傅，同樣不是什麼好東西。\n他轉頭看向謝徵，道：「龍椅上那位失德至此，如今還打算在軍中做手腳，我知你必是不願效忠於這樣一位君主的。但就算跟趙詢合作，擁護皇重孫，再過個十幾年二十年的，誰又知道皇重孫會不會變成小皇帝這副模樣？」\n謝徵只說：「我不會成為第二個魏嚴。」\n公孫鄞道：「我當然知道你志不同魏嚴，可就算你遠走西北，將來不再過問朝堂之事，只要你手中還有兵權，坐在那把龍椅上的人長大了，總會惦記的。」\n這次謝徵久未出聲。\n公孫鄞靜站片刻後，嘆道：「罷了，要愁那也是十幾年後的事，眼下還是……」\n「新帝若有仁德愛民之心，到時候我交還兵權，做個自在閒人未嘗不可。謝氏不是生來就掌兵的，只要有人繼續守這大胤河山，我放權亦無妨。」\n公孫鄞的話被人打斷，他側首看去，只能瞧見太師椅上的人一個刀削般冷硬俊朗的側臉。\n謝徵半垂下眼：「他若成了小皇帝那副德行，我怎麼把人捧上龍椅的，也能怎麼把人踹下去，再擇新帝。」\n公孫鄞聽得這番話，先是一愣，隨即低笑出聲：「是了，這才像你。」\n他話鋒一轉，忽而道：「大長公主在寫與我的信中告知小皇帝要對樊姑娘下手，那樊姑娘再留在崇州，只怕極為不利，要不我多派些人手過去保護樊姑娘？」\n喉間又竄上一股癢意，謝徵抿緊唇角才忍下了本能的咳意，道：「不必。」\n這下公孫鄞的神情又變得極為怪異。\n他還以為，這傢伙這麼急著回來，是因為收到了自己的信，眼下看來似乎不是？\n他想著謝十三新送回來的消息，賤兮兮道：「也行，賀敬元雖不在崇州了，卻把自己的得意門生送了過去，那個叫鄭……鄭什麼文的，聽說不僅一表人才，還文武雙全，關鍵是樊姑娘在臨安鎮被魏嚴的死士追殺那會兒，那人帶兵去救過樊姑娘，這麼一看，也算是有過救命之恩了吧？」\n大拇指粗的狼毫筆筆桿在謝徵手中生生被折斷，他臉上仍一絲情緒也瞧不出，只平靜吐出兩字：「出去。」\n公孫鄞大概是不滿意他的反應，繼續煽風點火：「我尋思著，往後這兩人一同上戰場，那還得有無數次的生死之交，有個詞叫什麼來著？哦，日久生情！」\n謝徵忽而抬眸朝他看去，公孫鄞本能地往後退了一大步。\n但謝徵並未動怒，只說：「你三年不進京，長公主還能知曉你現居何處，是長公主手底下的人太過本事，還是你故意讓什麼人知曉你的行蹤？」\n公孫鄞臉上一絲浮浪的笑也沒有了，只有些意外地看著謝徵說：「都能拿這話來刺我，看來是真惹惱你了。」\n公孫鄞離去後，謝徵才扔開了手上那根被折斷的狼毫。\n細碎又尖利的木屑扎進了指尖，他面無表情地拔出，後背的刀傷和鞭痕依舊隱隱作痛，可前一刻聽公孫鄞說她會和旁人日久生情時，心底那壓不住的尖銳痛意和那一瞬間的毀滅欲同樣清晰。\n他突然一刻也不想等了。\n同她分別的時候，明明也知曉她那樣好的姑娘，今生就是遇不上他，也會遇到旁的好兒郎。\n但那一刻真正來臨的時候，他才驚覺自己渾身的血都在逆湧，那一瞬間腦子裡叫囂的只有無盡嫉妒和殺意，整個人卻冷靜得出奇。\n不過瞬息，他甚至連怎麼讓她喜歡上的人了無痕跡地死都想好了。\n冷靜下來的時候，整個人就只剩下極度的自厭，掌心全是黏膩的冷汗。\n他知道自己好像病得越來越嚴重了，他不想活成自己最厭惡的那類人。\n謝徵整個人往後仰，放任自己沒骨頭一樣癱靠在太師椅上，手臂搭在眼前，遮住了大半張臉，深色的箭袖襯得他帶著病氣的下顎愈顯蒼白，身上瀰漫著一股陰鬱之氣。\n在公孫鄞來這裡之前就得了他吩咐去調備人馬的親衛進屋來時，單膝點地抱拳道：「侯爺，押解隨元青的車馬已備好，大軍隨時可出發。」\n謝徵沉鬱出聲：「出發吧。」\n等公孫鄞再慢拍得知消息時，跑到城樓上看著遠去的軍隊，幾乎給氣得一蹦三尺高，他憤憤道：「難怪謝九衡那廝說不必增派人手，他都帶著軍隊過去了，還用增派什麼？」\n-\n崇州。\n長信王死後，薊州軍又和崇州城內的反賊小規模內短兵交接了兩次，每次都是薊州軍獲勝，雖然都是些小勝，但也算是鼓舞了一波士氣。\n樊長玉又一次進中軍帳旁聽作戰計劃後，得到了一道新的指令——她率領的前鋒軍將有一場大規模戰了。\n不知是不是唐培義礙於賀敬元當初的交代，特意安排的，負責輔助接應前鋒部隊的將領，正好是鄭文常。`
        },
        {
            num: 112,
            title: `第112章第112章`,
            content: `從中軍帳出來,一名小將恭賀樊長玉：「前邊幾場仗已大挫反賊銳氣，長信王一死，康城城破後那反賊世子隨元青也被侯爺所俘,崇州城內再無人可戰,明日樊都尉若破開城門立下這首功，我等便更加望塵莫及了。」\n這看似恭維，實則卻有幾分酸意。\n樊長玉在軍中根基尚淺,靠著幾場奇功得了上峰賞識，不少人明面上不說,暗地裡卻還是有些眼紅。\n樊長玉只道：「都是唐將軍和李大人他們日夜思量做出的戰局部署，我等不過憑著一腔膽氣陣前衝殺罷了,談何首功？將軍折煞我也。」\n她一搬出唐培義和李懷安說是,那小將也不敢再多說什麼,訕笑著應是。\n李懷安後腳從中軍帳中出來,不知將二人的談話聽去了多少，笑著道：「諸位將軍奮勇殺敵,陛下和唐將軍都是看在眼裡,放在心上的，大胤的太平,還得仰仗諸位將軍。」\n一句「看在眼裡，放在心上」讓那小將臉色都變了幾分,生怕自己先前那番說辭開罪了李懷安,抱拳連連應是。\n樊長玉也跟著抱拳應了聲是，面上倒是不卑不亢。\n李懷安掃了她一眼,沒再多說什麼,只道：「大戰在即,諸位將軍都下去歇著吧,養精蓄銳，明日勢必拿下崇州城。」\n樊長玉便跟著眾人再次一抱拳後，準備回自己營帳。\n走出一段路後，她才發現李懷安一直不遠不近地跟著自己，看著又像是隨意走走，恰巧同路了而已。\n中軍帳內議事，親兵又不得入內，其他將軍都是只身前來的，樊長玉也不好帶著小五讓他在外邊等著，此時也是孤身一人。\n她是個直來直去的性子，略一皺眉後，便頓住了腳步，直接轉身問了句：「大人似有什麼事想吩咐末將？」\n李懷安未料到樊長玉突然轉身發問，微怔了一瞬，才搖頭失笑：「你這又是大人，又是末將的，當真是一次比一次生分。」\n樊長玉說：「禮不可廢。」\n李懷安神色微斂，忽而問了句：「你在侯爺跟前，也是同他這般稱呼的麼？」\n樊長玉沉默著未答話。\n李懷安意識到自己失言，眉頭皺得緊了些，不知是不是在微惱一向溫雅自持的自己怎會說出這樣的話來，道：「是李某失言了，樊姑娘莫要介意……」\n樊長玉卻在此時抬起了頭，神色堅定又平和地道：「侯爺身份尊貴，末將自然也是不能失禮的。」\n這次李懷安怔得更久了些。\n樊長玉道：「大人若無旁事，末將便先行退下了。」\n李懷安叫住她：「你是因賀大人的事在怪我對吧？」\n樊長玉道：「末將不敢。」\n李懷安久久地望著她，他站的地方剛好是一處軍帳的暗影，半截衣袍在皎皎月光下被夜風輕輕吹拂著，眉眼卻隱在了一片暗色中，看不見了他臉上那面具似的溫雅笑容，他給人的感覺反而真實起來。\n他說：「樊姑娘爹娘守著的秘密，興許就是扳倒魏嚴的關鍵，魏嚴架空皇權多年，只有拔除魏黨，方可還大胤朝堂一片清明。賀大人能為忠義隱瞞，懷安卻不能，樊姑娘若怨怪，懷安也別無他法。」\n樊長玉抿緊唇角，說：「大人言重了，大人秉公執法，末將無權置喙。但大人利用末將查出了賀大人的錯處，害得恩人陷入如今這境地，卻還要末將心中毫無芥蒂，大人也委實讓末將難做。」\n李懷安聽得她這般說，似有些意外，道：「原來你都知道了。」\n樊長玉不答。\n夜風吹動他寬大的儒袍，裹出他修竹一樣的身姿，他嗓音幽幽的似一聲嘆息：「魏嚴的死士都折在了樊姑娘家中，懷安當初奉命去薊州徹查此事，在山道上巧遇樊姑娘是假，但時至今日，想誠心結交樊姑娘這個朋友卻是真。不管魏嚴那邊會如何對付樊姑娘，李家都會保樊姑娘安然無虞。」\n樊長玉只說：「李家的大恩，末將來日再報。」\n說是報恩，但李家願意保她，不也是為了對付魏嚴麼。\n這話在李懷安聽來，都覺著羞愧又有幾分可笑。\n看她這般疏離客氣地同李家劃清界限，李懷安也說不清心底是個什麼滋味，總之不太好受。\n不知是想到了什麼，他忽而道：「宮裡來的那個太監，樊姑娘也要多加小心。」\n樊長玉問：「陛下要對付我？」\n李懷安道：「賀大人窩藏你父母十七載的事，還未捅到陛下跟前去，但陛下已下了給侯爺和長公主賜婚的聖旨，聽聞侯爺落難時曾與樊姑娘做過患難夫妻，怕長公主介懷……」\n後面的話他沒再說，但意味已經很明顯了。\n樊長玉卻突然問：「如果我現在不是官職在身的武將，只是一個普通民女，是不是已經死了？」\n李懷安沒說話，似默認她的說法。\n樊長玉像是極其不理解一般，嗓音極低地道：「生在皇家，便可視平民生死如螻蟻了？」\n聽到這個消息的剎那，她心底除了謝徵被賜婚的難過，還有一下子看不清前路的茫然。\n皇帝，在平民百姓心中，那就是頭頂的天了。\n樊長玉從前寄望於給外祖父平反，是自己立下戰功後，像那些戲文裡唱的那般，在金鑾殿前陳述冤情，然後沉冤得雪，善惡有判。\n但眼前的現實，似乎和戲文裡出入極大，戲文裡最終判定善惡的高官或皇帝，都是公正無私的，而現實裡，皇帝也會有私心。\n那個遠在千裡之外，穩坐龍椅的帝王，甚至不知她的冤情，只因她可能會妨礙到公主出嫁，就想讓她死了。\n李懷安看出她臉色極為不好，有心安慰一二，但那些掉腦袋的話，終究是不能在此時便告知的，只給出一個承諾：「孟老將軍背負罵名十七載，若是魏嚴所害，李家一定會幫孟老將軍討回公道。」\n他沒多說關於她父親的事，似乎也默認她父親是魏嚴的人，當年幫著魏嚴構陷了她外祖父。\n樊長玉只麻木地道了謝，便言自己有些累了，先回營歇息了。\n李懷安看著她走遠的背影，失神良久，喃喃自語般說了句：「真是犯了蠢，何故要在此時告知她皇帝賜婚的消息？」\n大概……是實在不喜她對著自己禮貌又疏離的那副態度。\n可告訴她了，看著她眼底剎那間湧現出來的難過後，他心底似乎也沒好受多少。\n李懷安最終自嘲笑了笑。\n-\n樊長玉回去後，從未覺著這般疲憊過，渾身都發沉，好像是這月餘的疲憊都堆積到了這一刻來。\n合衣臥躺到軍床上時，只覺呼吸都是吃力的，一種窒悶感包裹了她，讓她整個人像是墜入了沼澤之中，拽著她的手腳讓她往下沉，無論如何都掙扎不開。\n她偏過頭看了一眼綁在自己袖口的鹿皮護腕，解開後想扔又沒捨得，擱到床邊放衣物的的矮凳上後，忍著胸腔因用力呼吸而帶起的陣陣鈍痛，深深呼出一口濁氣後，一隻手搭在眼前入眠。\n明日還有一場硬仗要打，她需要好好休息。\n但黑夜裡抖落的呼吸聲還是洩露了主人的情緒，從眼角沒入鬢髮的水澤，匯聚太多沾溼了枕巾。\n他當日離開時，把話說得那般明白又那般決絕，皇帝賜婚，他娶公主可以獲得更多的權勢對付魏嚴，於他而言是好事，他大抵不會拒絕的。\n明明把一切都看得很清楚了，但還是控制不住這一刻心底的難過。\n樊長玉搭在眼前的手一直沒拿開，她無聲地告訴自己，只準難過這一晚，今晚過後，那個人的事就與她再無甚干係了。\n皇帝在她這裡不是個好皇帝，但也不該讓天下百姓忍受更多的戰火，她會好好打明日那場仗。\n況且，也正是因為她成了朝中的武官，皇帝才不敢光明正大地對她下手，她要提防著皇帝放到軍中的那個太監，讓自己爬得更高。\n請來的那幾個幕僚給她講過朝中目前的制衡關係，皇帝那麼想除掉魏嚴，所有國事卻還是得過問魏嚴，就是因為魏嚴大權在握。\n能輕而易舉被抹殺的，都是因為手中權力還不夠大而已。\n樊長玉到現在還是不喜歡爭奪那所謂的權力，但如果那東西關乎自己和身邊的人性命，她也會豁出性命去爭去搶的。\n-\n第二天樊長玉起來時，一雙眼不出意料地腫了。\n謝五看到她都愣了愣：「都尉，你這……」\n樊長玉眼都不眨地扯了個謊話：「夜裡蚊蟲多，眼角被盯了。」\n謝五張了張嘴，最終又閉上了，只附和道：「蚊子是挺多的。」\n樊長玉沒再綁當初謝徵送她的那副鹿皮護腕，單手給自己扣上了同盔甲配套的精鐵臂韝，說：「你替我從我一手帶出來的那幾十人裡選幾個出來，放到長寧身邊去，交給小七管著，讓他們帶長寧和趙大娘回薊州。」\n謝五敏銳地察覺到了什麼：「都尉是怕長寧姑娘有危險？」\n樊長玉沒瞞謝五，但也沒多說，只道：「防患於未然。」\n不管是魏嚴，還是皇帝，都視她為眼中釘。\n樊長玉不怕他們對付自己，就怕他們卑劣對長寧下手。\n自己一旦上了戰場，就分身乏術，眼下薊州還是賀敬元的地盤，把長寧和趙大娘轉回薊州，對她們來說相對安全些。\n謝五得了她這話，也不墨跡，當即就下去安排。\n再次上戰場，並且是作為前鋒軍的主將，樊長玉心中倒是沒多少懼色，更多的是沉重。\n這麼多人把性命交付與自己，她想在打贏這場仗的同時，也讓那些她連名字都記不清的小卒還能活著回去。\n數萬大軍把崇州城四面圍得死死的。\n樊長玉負責攻東城門，她麾下的騎兵和步兵經過這段時日的操練和小規模作戰，配合已十分默契。\n但當她帶著前鋒軍朝著東城門逼近，已進入反賊的弓箭射程，城樓上的崇州小卒們卻顯得十分慌亂，勉強有幾個在試著射箭的，卻連弓都拉不開。\n那些小卒身後，有幾個身材更為高大的兵卒在揮著鞭子抽打他們，有的小卒甚至直接跪了下去，似在哀求。\n樊長玉坐在疾馳的戰馬上，望著對面的城樓，眼底浮起絲絲困惑。\n她後方的弓兵眼見已到了對城樓的射程後，弓兵陣的小將當即大喝一聲：「放箭！」\n箭矢如飛蝗朝著城樓上的反賊小卒們扎去，哀嚎聲四起，一群著崇州兵服的小卒在狹窄的城樓甬道上亂躥，甚至不知借住女牆做暫時掩護。\n城樓上有人聲嘶力竭大哭：「別放箭，咱們都是城內的百姓……」\n下一瞬那哭喊的人就被身後窮兇極惡的崇州兵卒砍下了腦袋。\n但看押那些百姓的崇州兵似乎只是少數，城樓上越來越多的人不顧那些崇州兵卒的施壓，哭喊著他們不是崇州軍，只是被抓來充數的城內百姓。\n樊長玉狠狠一勒韁繩，她坐下的戰馬嘶鳴一聲，高高揚起前蹄，她朝後做了一個暫停放箭的手勢，大喊：「射站在後排的那些崇州兵卒！」\n謝五跟在她身邊，近身保護她的同時，也擔旗牌官一職，當即就在馬背上打起了旗語。\n戰場上呼聲震天，行令啟節聲難以聽清，旗語卻看得分明。\n身後的弓兵們不再大規模放箭，而是瞄準了城樓上那些身形健壯了不少的小卒開弓。\n因城樓上填滿垛口的大多都是毫無作戰經驗的百姓，樊長玉帶著精銳部隊幾乎是沒費什麼力氣就穿越最危險的那道弓箭射程範圍。\n抵達城牆腳下，攻城雲梯搭上城牆垛口後，那些真正的崇州軍似乎也慌了，忙不斷揮鞭抽打那些平民讓他們搬起石塊往下砸。\n樊長玉貼著牆根儘量躲避石塊滾木，往上喊話：「城樓上的崇州百姓聽著，你們都是被逼的，城破後朝廷不會治你們的罪，反賊氣數已盡，爾等若助大軍殺敵，城破後論功行賞！」\n被迫上城樓的百姓們本就是被拿刀逼上去的，他們不敢反抗那些崇州兵卒，一來是骨子裡堆官兵的敬畏作祟，二來是城外大軍壓境，他們也不知道自己會不會被當做反賊一併處死。\n有了樊長玉那話後，哪怕大多數平民依舊膽小，但也有一腔血氣的漢子大喝一聲奪過反賊兵卒的刀劍，往對方身上招呼的。\n城樓上亂做一團後，城樓下方的薊州軍便更容易順著雲梯攻上去。\n樊長玉爬上去後，砍瓜切菜般砍倒幾名崇州小卒，眼見城樓後方人數也少得可憐，就已經意識到了大事不妙，掃視一周，瞧見一名著全甲的將軍模樣的人慾跑時，樊長玉劈開攔路的幾名小卒，人還未至，八尺長的烏鐵大刀就已經飛了過去。\n那將領被扎中小腿，痛得嗷嗷大叫，想撥開壓在腿上的大刀，碰到傷口卻又痛得更加厲害。\n這會兒功夫，樊長玉已追了上來，她一腳踩住將領受傷的腿，一手撿起陌刀，問：「長信王長子在哪兒？」\n小將痛苦嚎叫一聲：「腿……我的腿……」\n樊長玉鬆了力道，冷喝：「說！」\n眼見崇州城已破，那小將也顧不上旁的，和盤託出道：「大公子昨夜便出城門了。」\n樊長玉臉色巨變，陌刀刀尖直指他脖頸，喝道：「你說謊！」\n小將連連告饒：「姑奶奶，小的說沒說謊，你看這城內還剩多少兵，總做不得假吧？」\n這是實話，東城門作為崇州城的主城門，兵卒加上穿著兵服的普通百姓，才勉強站滿了整個牆頭，怎麼看都不對勁兒。\n樊長玉臉色難看地道：「四大城門都有重兵把守，城內反賊如何出得了城？」\n小將求饒道：「城內大軍就是昨夜從西城門撤走的，昨夜西城門的守軍哪兒去了，小的也不知啊！」\n樊長玉心知從這反賊小將嘴裡問不出什麼東西來了，讓人綁了他，又趕緊派斥侯去向唐培義報信。\n反賊昨夜一點動靜都沒弄出地從西城門跑了，這不是件小事。\n四大城門外，都遠離城樓上的弓箭和投石車射程，駐紮了五千兵馬。\n長信王長子要帶著軍隊跑，除非是飛天遁地。\n樊長玉腦子裡似散開了一團亂麻，她讓謝五看著城門這邊，嚴令進城的薊州軍不得騷擾城內百姓，自己捉了一名崇州小卒，令其帶路，帶著人殺去了長信王府。\n到了長信王府，才發現府裡也只剩一些僕役，樊長玉審了好幾個人，都說隨元淮昨天夜裡便跑了。\n樊長玉沒找到俞淺淺和俞寶兒，又審訊了一些僕役，才得知數月前，隨元淮是帶回一對母子，那女人也確實姓俞，但具體叫什麼名字他們就不清楚了，只知道那女人是隨元淮的侍妾，那孩子是她逃跑後生下的。\n問出了這麼個結果，樊長玉好一會兒都沒做聲。\n回神後讓手底下的兵卒先把長信王府上的人看押起來，自己坐在屋內發了好一會兒呆。\n是她遲鈍了，從長寧說在長信王府遇到俞寶兒後，她就該想到俞淺淺身份應該不簡單的。\n她同俞淺淺相識雖不久，但看得出俞淺淺是個極有主見的人，她既逃跑過，應當也不是自願給隨元淮當妾的。\n眼下麻煩的是她和俞寶兒都被隨元淮捉回來了，長信王府上的下人也都知道他有個兒子。\n樊長玉擔心隨元淮最終落網後，俞寶兒也會被牽連進去。\n造反那是要誅九族的。\n外邊傳來叩門聲，打斷了樊長玉的思緒。\n「都尉，唐將軍已帶著大軍進城了，正急召都尉前去議事。」是謝五的聲音。\n樊長玉道：「好，我這就過去。」\n-\n等樊長玉去了議事大廳，不出意料地發現氣氛異常凝重。\n唐培義面沉如水坐在上方，底下的將領們一個個都低垂著頭，樊長玉也垂著頭站到了最後一列。\n但她來得晚，進門時就叫唐培義注意到了，唐培義直接問她：「樊都尉，聽聞你在城破後就去了長信王府搜尋，可有查到什麼？」\n樊長玉出列抱拳道：「回稟將軍，府上只餘百來名僕役，都言長信王長子昨夜已出城，末將已命人查封了長信王府，便將府上所有下人暫且看押起來。」\n這個消息顯然沒讓唐培義臉色有什麼好轉，他擺手示意樊長玉退下。\n樊長玉剛退回列中，唐培義便一把掀翻了跟前的几案，矮几上的茶盞和著矮几一起重重砸在地上，碎瓷迸射，屋內所有人都嚇了一跳，愈發屏氣凝聲。\n誰都知道，這太荒唐了。\n反賊數萬兵馬，在圍城之後堂而皇之地棄城而走，這送往京城的戰報怕是都不知怎麼寫。\n天子一怒，唐培義這新上任的薊州軍主將，人頭保不保得住，也不好說。\n李懷安步入廳內，瞧見這一幕，平和道：「唐將軍莫要動怒，反賊昨夜從西城門潛逃的來龍去脈，已查清楚了。」\n唐培義這才抬眼，問：「怎麼回事？」\n李懷安答：「圍西城門振威校尉盧大義，同長信王麾下一名幕僚原是故交，二人一直暗中有來往，盧大義前幾次立下的戰功，也都是那幕僚暗中告知了他反賊那邊兵力部署的。昨夜將軍您定下今日攻城後，那幕僚連夜寫了投誠的書信，和著崇州城內的兵防圖一道綁在箭上，射去了盧大義營外，以此為投名狀，言子時夜開城門，助他不費一兵一卒就拿下崇州城，立下首功。」\n唐培義氣得眼都快紅了，厲喝道：「那蠢貨就這麼信了？」\n李懷安帶著幾分沉重緩緩點頭：「盧大義為奪這首功，怕行軍動靜引起了斥侯注意，撤走了西城門附近的斥侯，夜裡帶著西城門外的守軍跟著那幕僚偷偷進了城，被埋伏在城內暗巷的反賊亂箭射死，反賊再藉此機會出了城。」\n「盧大義身邊有一謀士，昨夜看到那信時便勸說他不可冒險行事，盧大義覺得是那謀士鼠膽，怕那謀士壞他的事，把人綁了留在帳中，我方才帶人去西城門查探情況，這才發現了他。」\n唐培義接過李懷安遞過去的那幕僚寫與盧大義的投誠信，大罵道：「他盧大義死有餘辜！這成事不足敗事有餘的東西！這等彌天大禍，誰替他背得了？」\n李懷安琥珀色的眸子微抬，意味不明說了句：「盧大義，是丞相舉薦的人。」\n唐培聞言，更是重重一拍太師椅的椅帽，那做工極為結實的一把椅子，就這麼成了一堆碎木，「他魏嚴狼子野心，賀大人將薊州兵權交與了我，那盧大義這般急著立功，是想替魏嚴奪回薊州兵權？」\n他憤而轉身回案前，咬牙切齒道：「本將軍捨得這一身剮，他魏嚴也別想置身事外！」\n李懷安垂眼道：「當務之急，還是要找到反賊的下一個落腳點。」\n唐培義幾乎是脫口而出：「盧城！反賊再往北，都是武安侯麾下的謝家軍，這無疑是自尋死路，長信王妃娘家康城也被武安侯所破，反賊眼下只能再往南，泰、薊兩州裡，泰州兵馬未動，薊州軍卻是全都趕赴了崇州的，破開薊州門戶盧城，反賊便可長驅南下！」\n他牙齒都在止不住地發顫：「即刻發兵，前往盧城。」\n李懷安搖頭：「反賊昨夜子時動的身，大軍全速追趕只怕也追不上了，只有先派斥候前去報信，再派騎兵隊先去支援。」\n唐培義已是急昏了頭，忙道：「對，對，就依賢侄所言。」\n鄭文常是薊州人士，又是賀敬元一手培養出來的，當即就出列道：「將軍，末將懇請領騎兵回盧城支援！」\n樊長玉知道賀敬元那一身傷怕是不能再戰的，加上早上才讓謝七帶長寧她們先回薊州，也怕她們路上遇上反賊的大軍出什麼意外，跟著出列道：「末將也願去援薊州。」\n唐培義看他們二人一眼，知道她們武藝過人，又都是對賀敬元都再敬重不過的，當即便道：「你二人領三千騎兵，先去盧城！」\n屋外卻在此時傳來一道尖細的嗓音：「慢著——」\n先前來軍營的那宣旨太監由一個小太監扶著，慢悠悠跨過門檻，走了進來。\n李懷安瞧見這太監，眉心就是一跳。\n唐培義這會兒正焦頭爛額，看到這太監也擺不出什麼好臉色，「不知公公前來有何指教？」\n那宣旨太監敷著一層厚厚脂粉的臉上綻開層層褶子，皮笑肉不笑道：「陛下讓咱家來慰勞薊州將士們時，也給了咱家一個監軍的名號，咱家在這裡說的話，唐將軍還是聽得的吧？」\n這已是在抬他的身份壓人了，監軍在軍中有監察之權，唐培義只能硬著頭皮道：「公公哪裡話，只是眼下軍情緊急，末將實在是……」\n「咱家就是因為軍情緊急，才特地來這一趟的。」太監打斷唐培義的話。\n他目光掠過樊長玉時，樊長玉只覺自己像是被毒蛇的尾巴掃了一記，那種冰涼又黏膩的感覺，讓人噁心又驚懼。\n樊長玉思忖著李懷安昨夜同自己說的那些話，心道難不成這死太監要在這時候給自己下什麼套？\n果不其然，下一刻就聽那太監慢悠悠道：「唐將軍麾下數萬大軍圍了崇州城多日，拿下反賊不過甕中捉鱉，卻弄成了如今這副局面，這三千騎兵派去盧城，能不能追上反賊還難說，便是追上了，僅憑就三千人馬，就能殺退反賊近兩萬大軍？」\n他皺巴巴的眼皮後半部分耷拉著，一副置身事外的模樣，不緊不慢開口：「這前線的戰況，咱家還是得儘快稟與陛下，才能讓兵部調遣人馬，在薊州以南儘快做好防備。」\n唐培義一聽他言辭間，壓根不覺薊州還能守住，面上便已是怒意難掩，冷硬道：「公公要回京稟與陛下，盡可稟與去，末將會帶著麾下部將，不惜一切代價馳援盧城。」\n那太監像是聽了個什麼笑話，笑眯眯道：「唐將軍有這份忠君愛國的心，咱家會在陛下跟前，替唐將軍多多美言幾句的，只是咱家就這麼上路，萬一遇上反賊，咱家怕是就沒法把這消息帶回去給陛下了。」\n他話鋒一轉，終於說出了此行的目的：「唐將軍麾下的騎兵，撥兩千與咱家，護著咱家回京復命。」\n唐培義目眥欲裂：「兩千？你要走了兩千人馬，我還拿什麼去馳援盧城？」\n太監吊著眼皮道：「唐將軍啊，你如今不過是自欺欺人，覺得薊州還未失守罷了，我問你，薊州若是失守了，你這三千騎兵抵達了盧城又能做什麼？撥與咱家兩千，咱家從泰州繞道趕回京城復命，還能先一步把消息送回去。」\n唐培義喝道：「你要回去報信，沒人攔你，要我兩千騎兵，沒有！」\n太監冷哼一聲，收起了臉上的笑：「唐培義，你這是要抗旨？」\n唐培義早已被怒氣衝得頭暈眼花，連言語上也不願再敷衍眼前這油頭粉面的太監了，喝道：「老子今天就抗旨了！你他娘一個斷了根的孬貨，在宮裡搬弄口舌也就罷了，把你那套拿到老子這兒來，老子今天就是宰了你，再上報陛下說你死在反賊手上，你又能奈我何？」\n他身上那股匪氣一上來，還真震懾到了太監。\n李懷安適時候出聲：「唐將軍，莫要衝動。」\n唐培義一把揮開李懷安，對著樊長玉和鄭文常道：「你二人，速速領兵前往盧城！」\n樊長玉知道眼下的局勢不是她和鄭文常能應付下來的，只要守住了盧城，唐培義就不會被治罪，薊州城內的百姓也能免遭戰亂，當即就和鄭文常一道抱拳後離去。\n太監還在身後大喝：「唐培義，你膽敢這般對待朝廷欽差……」\n唐培義回頭看了那太監一眼，吩咐左右：「綁了！把人扔屍堆裡，讓他看看這一場仗下來，死了多少人！」\n他雙目發狠地盯著那太監，繃緊下顎道：「信，我會派人送回京城，公公就和我手底下這些戰死的將士一起留在這兒吧！」\n言罷大喝一聲：「大軍開拔！」\n他離開前廳後，李懷安看了一眼被綁成粽子拖下去的太監一眼，神色莫名，跟上唐培義時，說了句：「唐將軍這又是何苦？」\n唐培義一個八尺男兒，竟因今日這些事又一次紅了眼眶，他說：「賢侄啊，你看，咱們這些人，拿命去換的一個太平，不過是陛下身邊那些人搬弄個口舌的事。」\n他咧嘴一笑：「不是老子看不起文人，自古漂亮話，都是文人說的，他們風不風骨，老子不知道。但戰場上的那些白骨，拼盡一身血肉，能不能換後世記得個名字都難說。」\n「那閹人覺得薊州必是守不住了，可我了解賀大人，他便是還有一口氣，也會守到援軍至。」\n「帶騎兵先一步去援的那兩個孩子，也都是一身赤膽，他們能多拖一刻，勝算就多一分。」\n李懷安想到這個祖父和皇孫聯手做的扳倒魏嚴的大計，心底忽生出無盡愧意來，他道：「薊州若失，情況興許也沒那般糟，總能再奪回來的。」\n唐培義看著他，面目威嚴道：「行軍打仗豈可兒戲？當年錦州失於異族，過了多少年，灑了多少大胤兒郎的鮮血才奪回來的？」\n正好親兵急步而來，對著唐培義一抱拳道：「將軍，大軍已開拔，您的戰馬也牽來了！」\n唐培義便對李懷安道：「崇州我便託付與賢侄了。」\n李懷安看著他邁著虎步走遠的背影，心緒翻湧萬千。\n若無意外，薊州此時已被隨元淮拿下了。\n他並不擔心薊州城內的百姓，是因為他知道隨元淮就是皇孫，他不會濫殺無辜。\n這不過是一場戲，原本勝券在握的一場仗，因為魏嚴手底下的人壞了事，讓反賊逃離糧草耗盡的崇州，佔據了薊州。\n不僅朝堂會震怒，全天下的人也會被挑起怒火，魏嚴會成為眾矢之的。\n隨後薊州很快又會被奪回，「反賊」被繩之以法，和盤託出一切，交代當初能逃離崇州，並非是魏嚴手底下的人貪功，而是他和魏嚴達成了合作，魏嚴幫他逃出重重封鎖的崇州，他幫魏嚴拖延崇州戰局，讓兵權不那麼快被收回。\n至於盧大義的死，自然是魏嚴殺人滅口。\n為了讓這場戲做得足夠逼真，必須瞞著唐培義這些在棋盤上的人，也只有死足夠多的人，才能讓這事被發酵得足夠大。\n不知是不是聽了唐培義那番話的緣故，李懷安忽而覺著格外心神不寧。\n他不斷地在心底問自己一個問題，為了扳倒魏嚴而設計此事，是對，還是錯？\n曾經他覺得，大胤朝政把持在魏嚴手中，魏嚴一日不除，大胤便一日沒有未來。\n為了除去魏嚴這個大奸臣，朝堂上的博弈又算得了什麼，這些年他們李家起勢，為了同魏嚴抗衡，已填了不知多少人進去，為何今日會因死去的那些將士生出愧意？\n他們死了，就能扳倒魏嚴，讓全天下的百姓過上好日子。\n舍小我而成大我，這不該是錯才對？\n李懷安閉上眼，不願再去深想。\n-\n一輛馬車在盤山官道上前行，雪白的海東青振翅在天際盤旋。\n馬車在途經山腳的河道時停了下來，一青年人去河邊取水，卻一腳踩空了，摔了個四腳朝天。\n護在馬車四周的另幾名青年人都笑了起來。\n那青年齜牙咧嘴爬起來，瞥見雜草掩蓋下炊煙的痕跡，念叨道：「這河灘邊上好好的，那來個灶坑？」\n他瞧著附近還有不少用雜草蓋住了，卻有明顯區別於附近野草的地方，走過去一一踹開，發現地下都是灶坑，他摸著後腦勺道：「怪了，這麼多灶坑，得是多少人在這裡做過飯？」\n馬車裡探出一個小腦袋，長寧捧著一隻毛茸茸的小黃鴨，興奮道：「要做飯了？」\n那青年人正是樊長玉派去保護長寧和趙大娘的親兵之一，是頭一回上戰場把錢交給樊長玉保管的那個，名喚秦勇。\n他看了一眼日頭，笑道：「在這裡做飯倒是省了刨坑的功夫。」\n謝七坐在車轅處，距離河灘還有一段距離，並未瞧見灶坑，一聽秦勇說河灘附近灶坑頗多，本能地警覺起來，跳下馬車問：「有多少灶坑？」\n秦勇便細數了河灘處的灶坑，道：「光是這邊就有七八個，全用雜草蓋了起來。」\n謝七在軍中做過斥侯，對環境的偵查更加敏銳，他沿著河谷走了一段，發現河谷兩邊延伸一兩裡地都有不少灶坑後，幾乎             title: `第113章第113章`,
            content: `走在前邊的鄭文常身形明顯踉蹌了一下,隨即撥開城牆臺階兩側還有些惶然的小卒，更快地往城樓上衝了去。\n樊長玉慢他一步，等上了城樓,看到跪了一地悲哭的兵將和埋頭擦淚的百姓，不知是太過悲慟還是剛從戰場上下來的疲乏，有一瞬她覺著整個人都天旋地轉，頭昏沉沉的，一股蒼涼感和彷徨油然而生。\n雖然在來的路上就已設想過盧城若破的局面,可親眼看到這位老者陣前拄劍而亡,那剎那間的悲意當真是山呼海嘯般湧了上來,攥得她難以呼吸。\n「大人？」\n鄭文常喉頭哽動,張嘴艱難喚了身形已僵硬的老者一聲，八尺來高的漢子,眼眶猩紅,在那一句出口後便已哽咽得不成聲。\n他抬手幫已故老者合上了那雙至死都還魏嚴怒睜著的眼後，跪了下去，重重向老者磕頭，直磕得額頭破開，涕泗橫流，口中只念著一句話：「學生來遲了，是學生回來遲了……」\n一旁的副將見狀，紅著眼,心生不忍，扶住鄭文常道：「文常，莫要如此，大人重傷未愈，又積勞成疾,得知反賊突襲盧城，不顧病體快馬加鞭趕來，以油盡燈枯之軀守到你們前來支援盧城，想來大人心中也是欣慰的。如今大敵在前，你莫要再糟踐自己身體，殺退反賊才是大人想看到的！」\n鄭文常抬起一雙充斥著血色的眼，看向城樓下方烏泱泱一片的反賊大軍，喃喃道：「對，反賊，他們該死！」\n他握拳的雙手，骨節被捏得吱嘎作響，起身後，直接下令：「眾將士聽令！隨我出城迎戰，斬殺隨元淮首級，替大人報仇！」\n副將忙勸道：「文常，不可魯莽！如今是兩萬賊兵圍城，受激出城迎戰，無異於以卵擊石！」\n樊長玉她們此番帶回來的騎兵只有千，經過殺進城內的那番激戰後，如今只剩兩千。\n兩千人馬對兩萬，守城尚可，開城門迎戰，那就是自尋死路。\n鄭文常手背青筋暴起，他看著城樓下方被萬千兵卒護在最中心的那輛八馬並駕的戰車，後槽牙咬得緊緊的：「我獨自出城去，取那隨元淮首級！」\n說完這話，他提起□□便要往城樓下方走去，他像是一頭髮了狂的鬥牛，副將伸手去拽都沒能拽住他。\n路過樊長玉跟前時，一直沉默的樊長玉突然發難，她出手如閃電，直接重重一手刀砍在了鄭文常後頸，後者眼前一黑便倒了下去。\n「文常！」\n副將忙扶住鄭文常，本還有些擔心，見他是暈了過去，很快也明白了樊長玉的苦心，如今整個西北，軍中只有一名女將，副將很容易就猜到了她的身份，他感激道：「多謝樊都尉出手相助！」\n樊長玉說：「扶鄭將軍下去，讓他好生歇會兒吧。」\n副將招手讓幾名小卒扶鄭文常下去，又喚人抬來擔架，小心地把賀敬元的屍首放了上去。\n老者合上了雙目後，面目依然威嚴，可眉宇間又透著一股祥和。\n樊長玉在小卒們抬賀敬元的屍首下去時，靜靜端詳了故去的老者一會兒，輕喚了一聲：「世伯。」\n隨即才許諾道：「我會守住盧城，不讓反賊踏進薊州一寸土。」\n前一句是以故人女兒的身份喚這位高風亮節的老者，後一句，是以下屬的身份給的承諾。\n副將瞧得頗不是滋味，只道：「樊都尉也節哀。」\n賀敬元的屍首已被小卒們抬了下去，樊長玉沉默著點了頭，剛要回身看城樓下方的情況，，一直盯著城下反賊動向的斥侯便跑來向副將報信：「將軍，反賊又在準備攻城了！」\n副將聞言大驚失色，忙走到女牆垛口處往下看。\n只見城下的反賊重整了被樊長玉她們那支騎兵衝散的陣型，再次以盾陣和弓兵開路，掩護著運雲梯的反賊朝著城樓逼近。\n副將焦頭爛額下達命令：「弓箭手，快快！填滿所有的垛口，兩人一組輪換！」\n轉頭又對樊長玉道：「樊都尉，騎兵中有多少擅長弓的？先調人把城樓上的垛口填滿！」\n樊長玉忙吩咐謝五：「把還能上戰場的弓兵都叫上城樓來。」\n能成為騎兵的大都已是普通兵卒中的佼佼者，弓兵要拉開長弓還得要不小的臂力，因此軍中擅騎射的兵卒更少。\n樊長玉帶回來的千騎兵裡，原本是有五百弓兵的，進城傷亡了不少，如今還剩百餘人能作戰，全被謝五帶了上來，填到了盧城城牆的垛口處。\n那些原本就在城樓上幫忙守城的百姓，則自發地去內城樓下方幫忙搬運兵器、石塊和滾木。\n樊長玉打過好幾次攻城戰了，這還是頭一回打守城戰。\n跟打攻城戰時，憑著一股悍勇一往無前朝前衝鋒不同，從城樓上往下看海潮一樣湧上來攻城的反賊，視覺上帶來的衝擊感更大，下方的軍陣鋪了多遠都能瞧清，心裡壓力巨增，很容易令人心生怯意。\n副將顯然是有經驗的，在反賊的弓盾陣逼近射程時扯著嗓門大喊給將士打氣：「反賊的前一輪攻城，咱們牆頭上不到一千人都能守住，如今有幾千精兵來援，閉著眼也要把反賊給老子打回去！」\n反賊的弓盾陣一到射程內，他便大喝一聲：「放箭！」\n霎時城樓上箭出如流星，一個城牆垛口處，站兩名弓兵，一人放箭之餘，另一人在後邊搭弦開弓，等前一名弓兵退下來了，後方的弓兵立馬補上去射箭，以此來保證城樓上射出的箭矢不斷。\n樊長玉跟著副將從垛口處往下瞧，發現反賊軍陣裡是不斷有兵卒倒下，可對方人多，前邊的人死了，後邊的人踏著屍體仍在朝前衝鋒。\n靠著這樣的人海戰術，終究是又一次把雲梯搭到了城牆上。\n經歷了前一場守城戰，這次城樓上的守軍反應很快，弓兵放箭之餘，其他兵卒和百姓也開始往下扔石塊、滾木，抬起火油桶往下倒，又一個火把下去，雲梯和攀爬雲梯的反賊小卒就都被大火包裹，小卒慘叫著撲自己身上的火，可衣物上沾了火油，終究是燒成了個火人，從雲梯上墜了下去。\n樊長玉初上戰場時，看到死屍都噁心得直作嘔，如今親眼目的這人間煉獄一樣的場景，她還是覺著噁心，只是不再反胃得想吐了。\n她甚至還能同副將分析戰況：「何將軍，我瞧著火油不多了，要不省著些用？有的雲梯能用石頭和滾木砸壞，就用石頭和滾木砸好了。」\n盧城內的軍需物資，在最初的盧城之圍解後，便隨著城內的守軍一齊運向了崇州。\n畢竟那時誰也沒想到，已是困獸之爭的反賊，還能在數萬大軍圍城下，潛逃出來反攻盧城。\n何副將嘆氣道：「我先前也是和樊都尉一樣想法的，是賀大人說，不能讓反賊知道咱們城內物資不夠，反賊強攻幾次，咱們都堵回去，縱使是人海戰術，他們也會疲乏的。若讓他們知曉城內物資不夠了，只會更急切地攻城。」\n樊長玉聞言便沉默了下來。\n何副將這番話說得在理，這場守城戰他們是弱勢一方，兵力本就不足，一旦物資再告罄，反賊那邊士氣必然大振，拿下盧城易如反掌。\n反賊的這一輪攻城，盧城靠著進城的兩千騎兵和城內百姓幫扶，終究是又一次守住了。\n看著反賊如喪家之犬鳴金收兵，城樓上的兵卒和百姓們都歡欣鼓舞。\n軍需官清點一圈城樓上所剩無幾的軍需物資後，卻一臉沉重找到何副將道：「將軍，咱們的箭已經不夠用了，火油也只剩下幾桶了。」\n何副將看了一眼城樓下方似乎在再次重整軍陣的反賊一眼，問樊長玉：「樊都尉，唐將軍的軍隊，還有多久能到？」\n樊長玉說：「盧城和崇州相隔百餘裡地，唐將軍那邊就是什麼都不帶，全速行軍，咱們至少也得再守兩個時辰。」\n何副將回望城下烽煙狼藉的戰場，只說：「那便再守兩個時辰。」\n跟在樊長玉身後的謝五面露異色，但什麼也沒說。\n整個城樓上，只有底層小卒在歡呼這一場短暫的勝利，上邊的兵將，似乎都知道箭矢、火油、石頭、滾木這些東西都不夠了，盧城是守不住的。\n每個人臉上都寫著沉重，但誰也沒多說什麼，依舊有條不紊做著自己該做的事。\n與其說是在準備下一輪守城戰，不如是在迎接一場壯烈的死亡。\n這種時候似乎連悲傷都變得多餘了。\n樊長玉看著那一張張或沉重或洋溢著燦爛笑容的臉，沉默兩息後，突然對何副將道：「末將有個法子，或許能讓盧城守久些。」\n何副將忙問：「什麼法子？」\n樊長玉道：「末將帶十幾人出城叫陣，單挑反賊那邊的將領，何將軍你趁此時澆封城門。」\n何副將一聽她這是要拿自己的命去換取多守這幾刻的時間，忙道：「不可！」\n樊長玉說：「這是末將眼下唯一能想到的，拖延時間的法子了。」\n她看著何副將：「反賊連夜出逃至此，軍需糧草必然也不夠，一旦讓他們入了城，遭殃的就是城內百姓。賀大人以亡軀才守住的盧城，怎可因我等惜命便破在我等手中。城內還需何將軍主持大局，故末將請戰。」\n何副將面露難色。\n謝五急道：「都尉若執意要出戰，屬下願代勞。」\n樊長玉頭一回對謝五說重話：「你還不夠格。」\n何副將為難道：「樊都尉……」\n樊長玉唇角微抿，抱拳說：「何將軍，末將孟長玉，乃常山將軍孟叔遠之後，欺君本已是大罪，末將此生不能查清當年的錦州真相，替先祖正名，為天下百姓做件好事，也算是續孟家清名了，望何將軍成全！」\n何副將心頭大震，一番掙扎後，終是狠心一閉眼道：「準了。」\n樊長玉感激道：「謝將軍。」\n言罷就往城樓下方去。\n謝五忙跟上去：「屬下同都尉一道出城叫陣。」\n樊長玉在人少處頓住腳步，開口出乎意料地心平氣和：「小五，從軍這些日子，多謝你幫襯了。我知道你和小七留在我身邊，是他的意思。但他都要娶公主了，再留你們，我自己都過不去心裡那關。」\n謝五一直跟著樊長玉身邊，還不知皇帝派了欽差去賜婚一事，驟然聽到這些，只覺怪異，同時心下又為樊長玉接下來要做的事惶恐，急道：「都尉，這其中肯定有什麼誤會，誰同都尉說的主子要娶公主了？」\n樊長玉不答，只道：「我不怨他，錦州慘案舉世皆驚，換誰也做不到原諒。我一直覺著自己爹和外祖父都是清白的，但那也只是我自己覺著罷了。今日我若身死盧城，權當是替他們贖罪了，只有一事，還想再拜託小五兄弟。我若去了，盧城得以守住，你避開宮裡和魏嚴的耳目，尋一戶好人家收養寧娘吧。」\n她頓了頓，好一會兒才說：「我如今放不下的，也只有她了。」\n心裡還有個人放不下的，只是這輩子早已緣盡了。\n謝五紅了眼：「都尉……」\n樊長玉對著他一抱拳：「拜託了。」\n不及謝五再說話，樊長玉已轉身朝著甕城下方集結好的隊伍走去。\n那十幾人都是薊州本地的，面上都帶著視死如歸的肅然。\n樊長玉目光一一從他們臉上掃過，說：「咱們出城去，若能多守一刻，等到大軍來援，那麼城內的袍澤手足、父老鄉親，就都不用死，咱們可能會被後世人記住名字，家裡人能得到朝廷一筆撫恤金，下半輩子吃穿不愁。」\n「若守不住，城破了，我們就只是黃沙底下萬千屍骨中的一具而已，家中的妻兒老小可能會在戰火中顛沛流離，也可能會死在反賊刀下。」\n說完了，她翻上馬背，衝看守城門的小卒們颯氣大喝一聲：「開城門！」\n厚重的城門在車軲轆滾動般的「吱呀」聲裡緩緩打開，樊長玉提刀駕馬從城內走出時，遠處黑壓壓一片的反賊小卒們明顯都愣住了。\n十六名精銳跟著出了城，呈雁陣分列在樊長玉身後，像是她背後生出的一雙羽翼。\n夕陽只剩最後一抹殘紅，城樓上的薊州旗被風吹得獵獵作響，在這一片死寂的戰場裡，樊長玉的嗓音撕裂長風，傳進每個人耳中：「孟叔遠之後孟長玉在此，賊將可敢出來迎戰？」：，，.`

            num: 114,
            title: `第114章第114章`,
            content: `戰場上除了浩浩風聲,只餘一片死寂。\n幾十丈開外，還在重整軍陣的賊兵短暫地停頓了下來，幾名馬背上的小將面色各異往後看,等著中軍陣那邊傳來的軍令。\n樊長玉高踞於馬背上，眸色沉靜,手中握緊了長刀,不露一絲怯意。\n不知何故,遠處敵營裡卻遲遲沒有傳出回信。\n樊長玉眉頭一蹙，石越石虎死於一線峽後,崇州斬長信王那次,反賊麾下也折了不少大將,如今隨元淮手底下幾乎沒有能擔大任的武將。\n自己出此下策,是為了拖延時間。\n若是隨元淮看出她的用意，不願再折損手底下的能將，直接讓大軍壓過來,她和身後這十幾名將士怕是抵擋不了多久。\n樊長玉稍做思量，便計上心頭，手中長刀一指,喝道：「對面的反賊聽著,長信王已是我刀下亡魂,隨元青於康城被擒,你們追隨的不過是一個刀都提不動的孬種,手底下連替他陣殺敵的勇將都數不出來一個，他有何本事帶你們打到京城？許你們榮華富貴？爾等若是棄暗投明,一切便可既往不咎！」\n這番話喊出去後，對面的反賊軍陣裡明顯有了不小的騷動。\n城樓上的何副將等人察覺樊長玉的目的，也跟著罵陣：「隨元淮就是個孬種！喪家之犬一樣從崇州逃至盧城,手底下一個能打的都沒有，就指望著你們這些雜兵拿命給他開出一條道，他好南遁逃命呢！」\n「隨家氣數早就盡了，隨元青好歹驍勇善戰，誰還不知他隨元淮就是個吊著一口氣的藥罐子？你們跟著隨元淮，那就是自尋死路！」\n反賊軍陣中的騷亂更大。\n斥侯匆匆向後方的軍陣跑去報信，他戰戰兢兢說完前方的戰況後，圍了數名高手的馬車內只傳出一聲冷嗤：「孟長玉？」\n車中人嗓音陰冷，好似漆黑密林裡的冷風拂過，叫人後頸皮都激起一層雞皮疙瘩。\n他似在低笑：「好一個挑撥離間，禍亂軍心。隨平，你帶人去，將那孟氏餘孽生擒回來。」\n守在馬車外的魁梧家將當即抱拳：「末將領命！」\n聞訊而來的軍師卻道：「大公子，不可！不可啊！」\n他陳以利弊：「對面那女將分明是在用激將法，如今軍中唯有隨平將軍可擔大任。隨平將軍若是有什麼不測，我等便是拿下了盧城，一旦唐培義和武安侯聞訊趕來，軍中無統帥，談何禦敵？不若抓緊時間攻城，拿屍山血海去填，也先填上盧城城樓。」\n一隻帶著白玉扳指的手撩起了車簾，常年久病不見日光的緣故，那隻手蒼白瘦削，手背青色的血管和經絡走向都清晰可見。\n一旁的斥候不經意瞧見這一幕，只覺心頭一哆嗦，忙垂下了頭去。\n軍中早有傳言，大公子頑疾纏身，性情陰鷙暴虐，身邊近侍者常有暴斃而亡的。\n車簾完全撩起，隨元淮肩頭搭著大氅，蒼白的臉上帶著明顯的病意，嘴角噙著一絲薄笑，整個人透著一股陰鬱的邪氣。\n他不急不緩道：「軍師勞苦，但連吃了多場敗仗，軍中士氣不可不振，那女將殺我父王，此仇不報，淮無顏見家父。」\n軍師仍有顧慮：「可是……」\n隨元淮抬手止住了軍師還想說的話，他眼皮稍抬，明明是個久病之人，同他眼神對上的剎那，軍師卻感到一股莫名的壓迫感。\n忙錯開了視線，暗忖這位大公子只怕並不像傳言中說的那般，只是個靠湯藥續命的草包。\n隨元淮將軍師的神色盡收眼底，唇角稍提，道：「大軍夜半出城，唐培義便是攻頗崇州城後發現蹊蹺，來追，少說也還有半日的路程才能抵達。武安侯盤踞康城，也不及相援，不過一女子爾，又何懼之？莫叫城樓上那些朝廷走狗看了笑話。」\n軍師只是想早些攻下盧城，省得夜長夢多，經隨元淮這麼一說後，也少了些許顧慮，一揖後退了下去。\n隨元淮看著軍師走遠，指節一下一下地扣著車窗，這才吩咐身邊的親衛：「你們也前去相助，只要孟氏女活著就行，其餘人格殺勿論。」\n圍在馬車周圍的高手霎時間撤去一半。\n趙詢之母蘭氏小心地看了隨元淮一眼，斟酌開口：「殿下是想借孟氏女，揭露魏嚴當年一手促成的錦州慘案？」\n隨元淮眼皮半撩，似笑非笑地看著蘭氏，並不說話。\n蘭氏心中不免忐忑，自從找回俞寶兒後，隨元淮對他們母子的戒備與日俱增，她明白隨元淮在擔心什麼，這些年，她也從未有過異心，但帝王家的人，懷疑的種子一旦種下了，始終就是長在心裡的一根刺。\n眼下趙詢那邊遲遲沒再傳回消息，只怕在隨元淮那裡，對她們母子的信任愈發少了。\n畢竟是自己看著長大的孩子，蘭氏心中還是有些不是滋味，當即就低下了頭：「是老奴多嘴了。」\n隨元淮身上的戾氣突然斂了去，換上一副溫和的面孔，親自替蘭氏斟了一杯茶道：「蘭姨同孤愈漸生分了，魏嚴老奸巨猾，便是孟氏女指認魏嚴，十七年前她尚未出生，唯一的證據又已落回魏嚴手中，魏嚴也有的是法子辯駁。孤只是困惑，蘭姨怎會覺著孤要用她來扳倒魏嚴？」\n他溫和起來的時候，身上當真有幾分承德太子的影子。\n蘭氏心中剛升起的那幾分難過頓時消散了去，問：「那殿下命人生擒她？」\n隨元淮唇角輕扯：「那鳩佔鵲巢的昏君想靠賜婚來拉攏武安侯，武安侯卻劍削傳旨太監一隻耳抗旨，消息雖被宮裡那位壓下來了，可天底下哪有不透風的牆。蘭姨說，武安侯是為誰拒了同長公主的賜婚？」\n蘭氏瞬間心領神會：「殿下是想拿那女子，來牽制武安侯？」\n她遲疑道：「可是……她既是孟叔遠的後人，哪怕當年孟叔遠是被人利用，她生父乃魏嚴的人，想來也和錦州一案脫不了干係，隔著這等血仇，武安侯還能在乎她死活？」\n隨元淮只是笑：「戲臺子都搭好了，接下來看戲便是。」\n蘭氏琢磨著他這句話裡的意思，但隨元淮並未再多言。\n從趙詢失蹤後，他的確更加忌憚這對母子了，此番聯手同李家做的這場構陷魏嚴的戲，亦是瞞著蘭氏的。\n自東宮大火後，他就再也不會全然相信任何人。\n後邊一輛馬車突然在此時有了動亂，隨元淮不耐一蹙眉：「怎麼回事？」\n馬車外的影衛不及前去打探消息，便有侍者前來相告：「主子，小少爺病了。」\n隨元淮眼底的厭惡之色一閃而過，冷冷道：「病了就叫軍醫過去，吵嚷什麼？」\n侍者小聲答道：「是……是俞姨娘鬧著要見主子。」\n隨元淮轉動著手上的扳指不做聲，前來傳話的侍者半低著頭，不過片刻的功夫，卻猶如芒刺在背，冷汗涔涔。\n蘭氏心下也有些奇怪，那位俞姨娘，向來對殿下避之不及，今日怎地突然主動要求見殿下？\n她看了一眼隨元淮，思忖著眼下兩軍交鋒，殿下應當是無暇顧及那女人的，便替隨元淮回道：「攻城在即，大公子眼下諸事纏身，我隨你過去看看小少爺便是。」\n怎料她話音剛落，隨元淮卻道：「我親自去看。」\n嘴角掛著一貫冷峭的笑，但眼底又多了幾分不可言說的興味，似乎心情不錯。\n蘭氏眉頭皺起，殿下在俞姨娘的事上，實在太過反覆無常了些。\n隨元淮由一名他最為信任的影衛扶著下了馬車，步履從容朝後邊那輛馬車走去。\n到了車前，早有侍者將車簾撩開，隨元淮踩著馬夫的背上了車，看著儘量貼著車角而坐的女子，他嘴角的笑多了一絲冷意。\n目光掃過雙目緊閉靠睡在她腿上，小小的身子卻微微有些瑟縮的俞寶兒，他玩味道：「不是說，這小畜生病了麼？」\n俞淺淺看著他，平和道：「寶兒沒病，是我想見你。」\n隨元淮嘴角的弧度僵硬了一瞬，他抬起眼，重新審視起面前的女子。\n她主動想見他？這簡直是個笑話。\n她從來不會主動見他，除非是有事相求。\n隨元淮眼底的陰鷙一閃而過，冷笑著開口：「有事求我？」\n俞寶兒不敢裝睡了，緊緊攥著俞淺淺的袖子。\n俞淺淺不動聲色地捏了捏他的小手，鎮定地和隨元淮對視。\n她額前平齊的碎發在這大半年的時間裡早已蓄了起來，全梳上去後，露出光潔的額頭，愈顯得一張臉銀盤似的，大氣又不失婉約。\n她說：「我與叫陣的那位女將軍曾是舊識，匹夫之爭，何故殃及女子？留她性命罷。」\n她還不知隨元淮早已下令要生擒樊長玉，整個西北只有一位赫赫有名的女將，俞淺淺聽說叫陣的那女將自稱孟長玉，便已猜到那是樊長玉了。\n隨元淮擁兵兩萬，盧城這僅剩的兩千殘兵哪裡抵擋得住。\n她救不了更多人，只想著從隨元淮那裡討一個人情，無論如何也要保下樊長玉。\n隨元淮聞言當即冷笑了兩聲，「你自身都難保，倒是還同情起外邊的阿貓阿狗來了？」\n俞淺淺豐潤的唇微抿，道：「所以我求你。」\n那蒼白又帶著涼意的手指毫無徵兆地捏住了她的下顎，俞淺淺被迫仰起頭來，對上隨元淮暗色的眸子，只覺整個人似被吐信的毒舌纏住，溼冷又黏膩，身形頓時僵硬。ＹuＳhugu.cOｍ\n隨元淮距她不過半尺睥睨著她，嘲諷道：「這就是你求人的態度？」\n他常年喝藥，身上都浸上一股清苦的藥味，靠得太近，俞淺淺呼吸間都全是他身上的藥味。\n被掐住的下顎上，他指尖微涼的觸感依舊清晰。\n俞淺淺秀氣的長眉蹙了蹙，看著眼前蒼白陰鬱的男人，問：「你想我怎麼求你？」\n隨元淮似乎沒料到她會這麼平靜地反問他，有一瞬他眼底恨意猙獰，不顧俞寶兒還在車內，突然就粗暴地低下頭去，吻住了眼前的人。\n俞淺淺只覺唇上刺痛，回過神來忙用手捂住了俞寶兒的眼睛。\n好在他很快便起身，俞淺淺用手擦過唇瓣，不出意外地見血了，有些疼，她蹙起了眉。\n看到她唇上的血跡，隨元淮底的陰鷙才少了幾分，半垂下眼帘，語調譏誚，又似在借譏誚來掩飾心底的什麼情緒一般，丟下一句：「今晚來我房裡。」\n直到他掀簾出了馬車，俞淺淺依舊沒做聲。\n俞寶兒大而黑的眼睛看著自己孱弱卻又堅韌的母親，小聲喚道：「娘親……」\n他一隻手緊緊攥著俞淺淺的袖子，唇也抿得緊緊的。\n他不想母親單獨去見那個人。\n俞淺淺把孩子擁進自己懷中，一下一下拍著他的後背：「不怕，沒事的，只要能救你長玉姑姑，這算什麼？」\n俞寶兒還是不說話。\n俞淺淺看著被風吹得一晃一晃的車窗簾，嗓音平和：「寧娘比你還小，她已經沒了爹娘，要是也沒了長姐，以後可怎麼辦？」\n俞寶兒漆黑的眼眸裡終於有了一點其他的情緒。\n俞淺淺摸摸他的頭，只道：「再忍忍。」\n*\n沙場上經過了幾輪罵陣後，樊長玉才見遠處的敵軍軍陣分開一條幾人共行的小道。\n一名魁梧武將縱馬而出，手持雙刃斧大喝：「休得猖狂，讓本將軍來會會你！」\n跟那名武             content: `樊長玉聽著那一聲輕笑,心弦莫名輕顫了一下。\n但她掩飾得極好，面上一絲情緒也無，維持著見禮的姿勢平靜答道：「侯爺。」\n話落,又是良久的沉寂。\n謝徵嘴角笑意不減，可就是個瞎子在這裡，怕是也能感受到他周身驟冷的氣壓。\n室內的空氣似乎都變得稀薄。\n何副將察覺二人之間的微妙,暗道不對勁兒,他想幫樊長玉，張了張嘴，卻又不知說什麼勸走謝徵。\n好在院外突然傳來急促的腳步聲。\n是謝徵的親兵,他一進院子便抱拳稟報導：「侯爺,反賊隨元淮已伏誅，隨他潛逃的妾室和獨子也被帶了回來！」\n樊長玉布著血色的瞳孔微微一縮,抱拳的手也緊了緊。\n俞淺淺和俞寶兒被帶回來了？\n亂臣賊子是要被誅九族的！\n她心中一時紛亂不已,下意識朝謝徵看去。\n謝徵聽得這消息不知何故皺著眉,面上卻再無多的情緒，緝拿反賊餘孽是首要大事,他最後再看了樊長玉一眼，目光在她血紅的一雙眼和纏著紗布的傷口處多停留了幾息。\n緊抿的薄唇動了動，最後卻什麼也沒說便轉身離去。\n何副將看著謝徵走遠的背影,急著要追上前,但方才謝徵那失態的逼問，屬實是反常,何副將忍不住問了樊長玉一句：「你同侯爺是舊識？」\n已到了如今這局面,樊長玉不想旁人誤會她和謝徵有什麼，只道：「不敢高攀侯爺，只是曾有幸得陶太傅賞識,被他老人家收作義女。」\n何副將點頭道：「原來如此。」\n心中卻還是覺著怪異，但想到二人之間隔著父仇，何副將又不敢亂猜，也不好再多問樊長玉什麼，只囑咐她好好養傷，便要去追謝徵。\n樊長玉卻叫住他問：「何將軍，反賊的家眷會作何處置？」\n眼下的盧城，除了謝徵，便是何副將說了算。\n她猜測何副將應該是清楚如何處置俞淺淺和俞寶兒的。\n何副將道：「自是斬立決。」\n聽到這個回答，樊長玉一顆心愈發沉了沉。\n她知道反賊該死，無數將士因他們戰死沙場，整個西北的百姓也因他們流離失所。\n但俞淺淺母子，什麼惡都沒做過，俞淺淺也不是自願跟那反賊的，罪不至此。\n她微抿了抿唇，問：「就沒有其他可能了嗎？」\n何副將怪異看她一眼，說：「反賊餘孽，怎能不斬草除根？長信王府上那些沒生養過的姬妾，倒是可以流放或發賣。樊都尉怎問起這些來了？」\n樊長玉搪塞道：「在軍中時日尚短，對這些律令還不熟悉，順口問問。」\n等何副將走後，樊長玉躺回床上又失神了好一陣。\n她要怎樣才能救俞淺淺和寶兒？\n-\n謝徵走出院落後，便問了一句：「她眼睛怎麼傷的？」\n跟在他身邊的親衛也是剛來盧城，還不知樊長玉身上發生的事，忙回道：「屬下這就去查。」\n已是暮時，風吹得簷下掛在的燈籠搖晃不已，矮牆邊種的一片文竹拖出道道雜亂的影子。謝徵停蒼白的面容在燈下也沒能添上幾分暖色，他沉聲吩咐：「尋最好的大夫給她治傷，找找謝五，看他是否還活著。」\n他當然能猜到她那一身傷，都是從戰場上帶下來的。\n但能讓她傷成那般，戰況究竟是有多慘烈？\n如果他沒能收到謝七的信趕來，她是不是就要死在這裡了？\n親衛領命退下後，謝徵一人負手在廊下靜立片刻，忽而重重一拳砸在了石牆上，堅硬的牆磚碎裂開來，掉落一地石渣。\n他手上也破了皮，溢出殷紅的血珠。\n隨行的另幾名親衛被這突來的變故嚇了一跳，但誰也不敢多言。\n-\n何副將趕去的時候，仵作已驗屍完畢。\n他探頭看了一眼蓋著白布，只在頭部掀開白布一角的屍首，問仵作：「確定此人是隨元淮？」\n仵作恭敬答道：「回將軍的話，隨元淮幼年曾在東宮那場大火裡被燒毀了容貌，這麼多年來，據聞從未出過王府，體弱全靠湯藥續命，因一張臉實在是醜陋駭人，府上的下人都少有見過他的。」\n「小人觀死者身上有陳年燒傷，五指瘦長無繭，應是養尊處優，舌苔發暗，且有清苦藥味，乃常年服藥所至，故小人斷定此人是隨元淮無疑。」\n何副將端詳著那張燒得面目全非的臉，瞧不出什麼頭緒，轉身看向坐在太師椅上面沉如霜的人，「侯爺，您以為如何？」\n謝徵周身縈繞著一股陰鬱之氣，聞言只抬眸道，「反賊餘孽伏誅，自是皆大歡喜。」\n這是認同了此乃隨元淮屍首的意思。\n有了謝徵點頭，何副將便鬆了口氣。\n至此，禍亂西北多時的反賊，就算是徹底清繳了。\n他小心翼翼問：「那隨元淮的妾室和獨子……」\n「押往京城，聽候朝廷發落。」\n何副將見謝徵臉色實在是難看，詢問道：「侯爺似乎並不高興？」\n謝徵冷笑著反問：「唐將軍數萬大軍圍了崇州城，城內叛軍是如何來的盧城？」\n樊長玉和鄭文常帶兵來援時已說了叛軍躲開崇州圍剿的緣由，他如實告知後，謝徵卻冷笑了聲，吩咐底下人：「把人帶進來。」\n被兩名親衛拖進來的是隨元淮手底下的一名幕僚，哪怕被五花大綁著，見了謝徵依舊叩頭如搗蒜，求饒道：「侯爺，小人當真是被逼無奈才留在長信王府的，小人原只是想謀個生計，故去長信王府當了幕僚，長信王造反後，小人便想逃了，可長信王怕我等洩密，提出離府的人都被滅口了，小人這才沒敢脫身。」\n謝徵身側的一名親衛喝問道：「隨元淮能率叛軍逃離崇州城，究竟是何緣由，從實招來！」\n那名幕僚趕緊道：「是魏嚴與隨元淮勾結！小人曾意外聽隨元淮和軍師密謀過此事，魏嚴安插在軍中的人會秘密幫他們出城。」\n盧大義正是魏嚴舉薦去軍中的人。\n一切證據似乎都指向了魏嚴勾結逆黨。\n何副將未料到盧城這場險些全軍覆沒的惡戰竟是一場政鬥，他眼都氣紅了，怒喝道：「混帳！賀大人竟是耗死在了那群敗類的陰謀裡！」\n他直接跪在了謝徵跟前：「求侯爺進京後，替賀大人，替盧城戰死的將士們，討一個公道！」\n謝徵半張臉都隱匿在燭火的陰影中，答：「這樁血債，本侯會討的。」\n得了謝徵這句話，何副將想到賀敬元的枉死，忍不住用袖子揩了揩淚。\n謝徵只說：「將軍節哀。」\n他目光落到覆著白布的屍首上，眼神冰寒徹骨。\n死的不是隨元淮。\n但此後，世間不會再有「隨元淮」這個人。\n十七年前的錦州真相雖撲朔迷離，盧城這樁血案，卻足以徹底扳倒魏黨。\n可真是因為這份證據太過完美，他又清楚隨元淮真正的身份，才愈發懷疑這場血案背後的真相。\n隨元淮同自己一樣跟魏嚴有仇，怎會和魏嚴合作？\n這興許又是一場跟十七年前的錦州慘案如出一轍的血案。\n只是始作俑者清楚他也對魏嚴恨之入骨，才故意把證據送到他手中，讓他去當砍下魏嚴頭顱的那柄刀！\n謝徵指尖用力，生生捏斷了太師椅一側的木質扶手。\n他此生最容不得的，便是這等拿萬千將士的性命做政鬥砝碼的「計謀」！\n-\n唐培義率領的大軍，戌時才至。\n進城後得知盧城雖守住了，賀敬元卻身死的消息，唐培義一個八尺男兒，直接「嗬」地一聲悲哭出聲，跪在剛設好的靈堂前自責道：「是末將無能，末將對不起大人，負了大人所託！」\n何副將等一幹其他曾在賀敬元手底下做過事的將領們紛紛勸唐培義節哀。\n「唐將軍，莫要自責，此事不怪你，是他魏嚴勾結反賊，其心可誅啊！」何副將悲慟之餘，憤慨出言，將隨元淮那名幕僚招供的事說與眾人。\n沙場出身的武將們最重血性，一聽今日兩輪苦戰死了這麼多弟兄，竟是遭奸人算計，無不痛罵出聲，誓要討伐魏嚴。\n李懷安跟著大軍來了盧城，在一片嘈雜的罵聲裡，他靜靜望著靈堂中央賀敬元的棺木，眼底翻湧著複雜的情緒。\n一切都在朝著扳倒魏嚴的計謀進行，只是他忽覺心口沉得慌。\n那棺木裡躺著的，是一個好官，也是一個可敬的長者。\n但是他死在了扳倒魏嚴的大計裡。\n他和家族選的這條路，是不是當真錯了？\n一名將軍重重拍上他肩，李懷安側身，只看到對方悲慟發紅的一雙眼：「李大人，您定要上書與陛下，替賀大人和盧城戰死的將士們討回公道。」\n李懷安看著那雙真摯又沉痛的眼睛，好一會兒才說出「分內之事，本該如此」幾字。\n問心有愧嗎？\n有的。\n只是他和李家都沒有退路了。\n靈堂外傳來一陣騷亂，那些嘈雜的哭聲和罵聲都小了下去。\n李懷安抬起頭看去，就見謝徵踏著濃厚的夜色從外邊走來，清冷的月光照在他臉上，似鍍了一層森寒的霜。\n他一來，所有人都不自覺禁了聲。\n李懷安只是下意識看過去，卻正好和謝徵的視線碰上。\n那眼神裡的冷戾讓他後背剎那間生出一股無法言喻的寒意。\n仿佛自己已：「侯爺，小人當真是被逼無奈才留在長信王府的，小人原只是想謀個生計，故去長信王府當了幕僚，長信王造反後，小人便想逃了，可長信王怕我等洩密，提出離府的人都被滅口了，小人這才沒敢脫身。」\n謝徵身側的一名親衛喝問道：「隨元淮能率叛軍逃離崇州城，究竟是何緣由，從實招來！」\n那名幕僚趕緊道：「是魏嚴與隨元淮勾結！小人曾意外聽隨元淮和軍師密謀過此事，魏嚴安插在軍中的人會秘密幫他們出城。」\n盧大義正是魏嚴舉薦去軍中的人。\n一切證據似乎都指向了魏嚴勾結逆黨。\n何副將未料到盧城這場險些全軍覆沒的惡戰竟是一場政鬥，他眼都氣紅了，怒喝道：「混帳！賀大人竟是耗死在了那群敗類的陰謀裡！」\n他直接跪在了謝徵跟前：「求侯爺進京後，替賀大人`

            title: `第116章第116章`,
            content: `夜涼如水,粼粼清波映在水榭的紅漆木柱上。\n亭中人背身負手而立，深色的衣袍似和這濃厚的夜色融為了一體。\n「遞往京城的摺子，李大人可想好了怎麼寫？」\n低沉的嗓音自水榭中傳來，裹挾著夜風,添了一分涼意。\n李懷安恭謹道：「自是如實上報與陛下。」\n他乃監軍,作為皇帝放到西北來的眼睛，前線的一切戰事進展,都得第一時間傳消息回京城。\n謝徵負手轉過身,一雙鳳眼冷銳逼人：「李大人作為監軍,當日又在崇州,反賊能夜出崇州城,李大人是不是也難辭其咎？」\n李懷安維持著作揖的姿勢，垂至膝前的廣袖被湖風吹動,依舊是端方君子的模樣。\n他頷首道：「的確是下官失了監查之職,下官會如實上奏陛下,自請責罰。」\n湖邊風大，二人隔著一丈距離對峙，長發和衣袂都被夜風吹動。\n謝徵高出李懷安半頭，因為對方揖禮，幾乎是半俯視眼前之人。\n他久未出言。\n那一身冷厲藏於那張清雋冷毅的面孔之下後，旁人捕捉不到他分毫外露的情緒,也無從揣測他的心思。\n但李懷安感受到的壓迫感卻半點不曾減輕。\n他不由得不動聲色地打量一丈開外的青年人。\n弱冠之年便封侯，說是天之驕子也不為過。\n在崇州之戰前，謝徵從無敗績，也從未收斂過自己的鋒芒，誰都知道他是大胤最鋒利的一把刀。\n可現在，他不再鋒芒畢露了,更似懸崖上經年累月受風吹日曬，卻依舊崢嶸的巖石。\n謝徵問他：「李大人學富五車，想來也聽過《戰城南》？」\n明明自己同眼前之人是平輩，不知何故，李懷安竟有了幾分在祖父跟前才有的緊張之感。\n他竭力壓下心中起伏的情緒，平靜和謝徵對視：「侯爺想說什麼？」\n謝徵道：「本侯想贈李大人《戰城南》中兩句詩詞，『士卒塗草莽，將軍空爾為。乃知兵者是兇器，聖人不得已而用之』。」\n語調冷沉，一字一句重重敲在李懷安心頭。\n雖然早有猜測，可親耳聽到這話，李懷安瞳孔還是猛地一縮。\n他果真什麼都知道了！\n負罪感和勘破真相後李家將背負萬世罵名的惶恐在心底相互撕扯，頃刻間就讓他汗溼了背脊。\n謝徵從水榭走出，路過李懷安身側時，腳步微頓：「希望李大人能好生參悟這首《戰城南》。」\n直到他走遠了，李懷安依舊立在原地沒動。\n從祖父決定和皇孫聯手用計扳倒魏嚴，他就知道會死很多人。\n但比起扳倒魏黨，肅清朝堂，在西北這邊陲之地死些兵卒，又算什麼呢？\n歷來變法，哪有不死人的？\n小變其治，當以人為本，法為末。大變其治，則法為本，人為末。①\n要徹底扳倒魏嚴，必須得有一場大的變革，才能讓腐朽敗壞的大胤官場重新煥發生機。\n人既為末了，犧牲便是在所難免的。\n只是在謝徵說出那句「聖人不得已而用之」後，他卻連辯駁一二，說是為匡扶社稷的勇氣都沒有了。\n從崇州到盧城，他跟著大軍一路走來，知道戰場有多殘酷，屍堆成山，血流漂杵。\n為了扳倒魏嚴，他們又親手設計了一場人間煉獄。\n李懷安以手掩面，忽而悲愴大笑出聲。\n他想，他們是錯了。\n-\n謝徵剛回到暫住的院落，謝十一便匆匆前來報信：「主子，已秘密安排趙詢去看過隨元淮的屍首了，如您所料，死的不是隨元淮，而是自幼就養在他身邊的一個替身。」\n蘭氏曾是太子妃身邊的人，行事謹慎，在東宮大火後，未免萬一，就給隨元淮準備了一個替身。\n那個替身不僅身形同隨元淮相似，未免被王府的人發現異常，他身上的傷疤甚至是照著隨元淮身上的燒傷，用烙鐵一點一點烙上去的。\n隨元淮為了將來能重新奪回那把龍椅，忍著劇痛一點一點把燒傷的皮都換掉了，替身則一直是被燒傷後的樣子。\n畢竟在隨元淮院子裡伺候的，都是蘭氏的人，隨元淮又有性情暴虐的名聲在外，長信王府其他下人輕易不敢去他的院子。\n他又極少見人，哪怕見長信王妃，也會帶上面具。\n因此這麼多年來，整個長信王府上下幾乎沒人見過隨元淮真容。\n想來蘭氏一開始替隨元淮準備替身，為的就是有朝一日金蟬脫殼，離開長信王府。\n謝徵褪下身上那件深色的外袍交與門口親衛，並未作聲。\n謝十一小心翼翼道：「趙詢去看了關押的那對母子，說也並非隨元淮的妾室和獨子。」\n謝徵行至書案後方坐下，給自己倒了一杯茶，說：「我知道。」\n隨元淮身邊的女人是俞淺淺，那對母子敢被抓回來，他就去看過了，並不是俞淺淺母子。\n他先前不知隨元淮攻打盧城是計，如今看來，隨元淮早就做好了金蟬脫殼的準備。\n連俞淺淺母子的替身也是一開始就找好的。\n他今日若沒能及時趕來，盧城會淪陷，但只要唐培義援軍一至，城內一幫烏合之眾守不住多久。\n可在此之前，那幫烏合之眾會殺很多人。\n隨元淮不會管制他們，他要的就是盧城城破後，城內哀鴻遍野。\n只有這樣，言官們在彈劾魏嚴時，那一樁樁慘案，才能成為他們唇舌下的利劍，將魏嚴釘死在這人神共憤的血案裡。\n正是想通了這些，謝徵眉眼才愈發冷凝了下來。\n謝十一見他面色不愉，以為是因為隨元淮和其身邊人竟都逃掉了，道：「謝一等人正在城內掘地三尺找人，想來不日便會有結果。」\n謝徵聞言，卻吩咐道：「讓他們先回來。」\n謝十一不解：「侯爺，這是為何？」\n謝徵黑眸裡映出銅臺上的兩盞燭火的影子：「隨元淮早和李家搭上了線，趙詢遲遲未回去，他若足夠小心，脫身後就不會再借趙家的勢力躲藏，只能先去李家尋庇護，他不主動現身，找也是白費力氣。」\n謝十一一聽，頓時明白事情不簡單，他問：「侯爺，那咱們眼下就只能等了？」\n謝徵不答反問：「長信王妃也死了？」\n謝十一點頭：「跟隨元淮那具替身的屍體一塊在帳內被發現的，皆是自刎而亡。」\n「自刎」，自然是為了避免活著抓走被審問出什麼。\n前去追逃兵的將軍們之所以能認定那具屍首就是隨元淮，除了衣著華貴和身上的燒傷，還因為死在他邊上的就是長信王妃。\n隨元淮逃出崇州都還帶著長信王妃，想來也是為了脫身時的萬無一失。\n謝徵道：「把這消息傳給隨元青。」\n謝十一是謝徵的親兵裡年紀最小的一個，行事沒有謝五他們穩重，撓了撓頭問：「侯爺，隨元青如今只是一階下囚，就算有這殺母之仇，找不到隨元淮，告訴他又有什麼用？」\n謝徵只道：「按我說的做就是。」\n他今夜同李懷安說那番話，是故意為之。\n李懷安不清楚他究竟查到了多少，只知道他們的計劃已經敗露了，一定會想法子聯繫隨元淮，共商對策。\n只要派人盯緊了李懷安，等他們自己把隨元淮的藏身之所暴露出來就行。\n謝十一正準備退下，猛地又想起還有一樁要緊事，看向謝徵遲疑道：「侯爺，樊姑娘的事，屬下也打聽清楚了……」\n-\n月光透過紗窗照進廂房，灑下一地銀霜。\n床榻上的少女烏髮披了滿枕，微側著頭，睡得很沉。\n窗前的圈椅上，靜坐了不知多久的人，被月光在床前投下一道纖長的影子。\n謝徵手上握著樊長玉換下來的暈著大片大片血跡的紗布，靜靜看著薄被下那團隆起的單薄身影。\n她瘦了很多，身上大大小小的傷不計其數。\n蜷縮著側躺的姿勢，像是一頭在睡夢裡也時刻戒備著的豹子。\n謝十一的話猶在耳畔：「先前反賊大軍壓境，樊姑娘怕盧城守不住，自請出城去單挑反賊將領拖延時間，據說樊姑娘自稱孟長玉，乃常山將軍孟叔遠之後，願以身死續先祖清名。」\n「反賊那邊對陣的十六人武功招式狠辣異常，瞧著不似軍中人，樊姑娘以一敵十六，寡不敵眾，險些命喪刀口……」\n每一個字都墜在謝徵心口，壓得他難以呼吸。\n胸腔裡生出尖銳又綿密的痛意，喉間發癢，謝徵怕驚擾她，以手掩唇低咳兩聲後才強壓下了那陣咳意。\n一想到她是真的存了死志出去的，自己若遲來一步，她就已是城樓下一具冰冷的屍體，他突然就克制不住骨隙裡都在狂嘯的怒意和後怕。\n衣簍裡她換藥時換下的那些帶血的紗布也變得無比刺目。\n白日裡他初見她，她傷口已經包紮好，瞧不出什麼端倪，聽謝十一她曾和隨元淮手中十餘名死士交手，他才知道她都經歷了些什麼。\n隨元淮身邊的那些死士，乃當年承德太子留給太子妃的，太子妃自焚於東宮後，那些影衛便聽命於隨元淮，個個都是絕頂高手，少有人能在他們手底下活下來。\n謝徵只覺牙根處一陣陣泛酸，血管裡像是有蟲蟻在噬咬，額角青筋凸起，連後背鞭痕裂開的痛都變得微乎其微。\n她差一點死去這個認知，像是曾經纏繞了他整個少年時期的噩夢甦醒過來，重新攥住了他。\n什麼都不重要了，只要她還活著就好。\n黑暗中，謝徵按著刺痛的額角，蒼白的面容在月輝下清冷又有種說不出的瑰麗，他漆黑的眸子一瞬不瞬看著床上熟睡的樊長玉。\n不知是不是在睡夢裡也感受到了他過分陰戾的目光，床上的人不適地瑟縮了一下。\n謝徵幫她把睡亂的一絲秀髮捋到耳後，指尖若即若離貼著她一側臉頰，似想觸碰卻又在極力克制著什麼，輕聲道：「這世上，誰都沒資格讓你死。」`

            title: `第117章第117章`,
            content: `樊長玉兩天一夜未曾好眠過,趕了一天的路，又在戰場上廝殺到力竭，這一覺與其說是睡過去的,不如說是半昏過去的。\n她再次醒來已是次日午後,除了那些見血的口子,全身肌肉的酸痛也在今天達到了頂點，動一下就疼得她齜牙咧嘴，樊長玉自己一個人險些下不得床。\n醫女阿茴前來給她換藥，她說後背怪疼的。\n阿茴看著她身上那些淤青和烏紫，心疼道：「都尉身上可不止刀斧劍傷，整個後背都青了，我用跌打腫傷的藥給都尉揉揉。」\n樊長玉向她道了謝。\n在戰場上被那些死士逼得摔下馬去，就地滾了好幾圈，期間還得躲避朝她劈刺來的長矛斧鉞,這樣的摔傷和撞傷，昨日不明顯，今天淤腫起來了，看著才怪嚇人的。\n為了方便阿茴上藥，樊長玉解下衣袍，坐在圓凳上,半伏在了桌子旁。\n她腹部那道刀傷不深，雖沒有傷到裡邊的臟器，可口子被拉得極長,幾乎一路抹向腰側，還好她被傷到的手臂也是這邊的，樊長玉平躺著壓到後邊的淤青也痛得厲害時，便側著另半邊身體睡。\n阿茴幫她把一頭烏髮撥到身前,用手挖了藥油幫她一點點揉後背淤青的地方，揉著揉著，就紅了眼。\n樊長玉的膚色偏暖白，因為受傷，少了幾分血色，那些淤青和傷口就變得尤為刺目起來。\n一滴淚砸在樊長玉後背時，她錯愣地回頭，看著眼睛紅得跟兔子似的小姑娘，問「怎麼了？」\n阿茴用袖子狼狽抹了一把眼，哽咽道：「都尉一定很疼吧？」\n反應過來小姑娘是在心疼自己，樊長玉微微一怔，隨即笑笑說：「其實也沒那麼疼。」\n她伏回桌前，含笑的嘴角慢慢抿成了一個落寞的弧度。\n怎麼會不疼呢？\n從前她跟著爹爹習武，偶爾弄傷了自己，她怕丟人，硬著頭皮說不疼，娘親把她拉到房裡給她上藥，她齜牙咧嘴地喊疼，母親溫柔的數落她，這一切仿佛是昨天才發生的事。\n可她已經沒有爹娘了，這世上也沒有在她受傷時，能毫無顧忌地喊疼的人了。\n阿茴沉默著給她後背的淤傷揉完藥油，突然「咦」了一聲：「都尉這裡也傷到了。」\n她用沾了藥油的手在樊長玉頸後靠肩的位置抹了抹，說：「紅紅的。」\n樊長玉沒在意：「可能是從馬背上摔下去時，被地上的石子硌到了。」\n阿茴盯著那兩團指甲蓋大小的淤紅多看了兩眼，都尉身上的其他硌傷，都是烏青或烏紫的，只有這兩團是紅的，像是弄上去沒多久的。\n她今年剛及笄，因著爹爹是軍醫，她從小也跟著耳濡目染習了醫術，樊長玉又是女子，才特意讓她來給樊長玉包紮換藥。\n她曾在一名看病的煙花女子脖子上看到過類似的紅痕，那煙火女子當時見她盯著看，便用絹帕掩著唇咯咯咯嬌笑。\n她娘瞧見了冷著臉訓斥她，後來告訴她那不是正經女子，讓她莫要過多接觸。\n阿茴問她娘，那女子脖子上有紅痕，是不是病了，她娘愈發嚴厲地訓斥了她一通，說姑娘家要知羞恥。\n阿茴至今不知那是什麼，但私心裡猜測肯定不是什麼好東西。可是都尉頸後也出現了那樣的紅痕……\n阿茴冥思苦想一番，沒想出個結果，只暗道都尉身上的紅痕應該也是從戰場上帶下來的，跟那煙花女子身上的不同。\n-\n樊長玉對這一切一無所知，午飯阿茴端了瘦肉粥來。\n軍醫說她久未進食，虛不勝補，眼下切忌暴飲暴食，需得少食多餐。\n樊長玉原先也沒覺著有多餓，一碗肉粥下肚卻沒有絲毫飽腹感，她捧著空碗看向阿茴，阿茴有點受不了她那等飯狗狗一樣的目光，糾結得眉毛直打架：「爹爹說了，都尉午間只能先喝一碗粥……」\n樊長玉也不好為難她一個小姑娘，把空碗交給阿茴後，問起謝五：「我那位兄弟如何了？」\n阿茴道：「還沒醒，但是今晨我給他餵藥時，他能下意識吞咽了，爹爹說吃得下東西了，命就算是保住了。」\n這大抵是這兩日來，對樊長玉來說最好的消息，她扶著床柱起身：「我去看看他。」\n阿茴忙過來扶她：「都尉你自己都還傷重著呢，爹爹說都尉得臥床休養個幾日才行。」\n樊長玉只道：「我皮糙肉厚，不妨事。」\n樊長玉的身量在女子中算高的，阿茴矮了她半頭不止。\n扶起她時，阿茴一側頭就能看到她線條好看的下顎，午後的日光灑在那張因重傷還顯蒼白的側臉上，細小的絨毛都清晰可見。\n阿茴瞧得臉一紅，吐舌道：「都尉才不皮糙肉厚，都尉是阿茴見過的最好看的姑娘。」\n她曾在城主府的院子裡見過一種蘭花，其葉如劍，鋒利又堅硬，鐵樹似的一大株，開出的花卻純白如雪，綻在劍葉堆疊的最中央，一大簇一大簇，美得驚心動魄。\n府上的下人想採摘，花叫劍葉擋著，都輕易摘採不到。\n見到渾身是傷，她幫忙包紮都害怕得直發抖，還反過來安慰她的樊長玉時，阿茴就想到了那葉片如劍的蘭花。\n她想，也只有話本子裡那樣的蓋世英雄，才配得上都尉這樣好的姑娘了。\n-\n謝五依舊昏迷著，樊長玉去看過他後，又親自問了軍醫謝五的情況，軍醫說傷成那樣，撿回一條命已是不易，他左臂挨了一刀，手臂雖還在，但裡邊的骨頭都斷了，便是傷好了，那隻手也廢了。\n樊長玉看著病榻上的少年，想到當日情\n況那般兇險，他還帶人出來救自己，心底便覺著難過。\n但他身中數刀，還能保住一條命，已是幸事了。\n樊長玉微紅著眼道：「只要人救回來了就好。」\n她怕軍醫這裡人手不夠，謝五得不到很好的照顧，想從軍中撥兩個人過來，阿茴卻說昨晚就有人來守著謝五了，她見對方眼生，問了兩句，對方說是謝五在軍中的兄弟。\n樊長玉瞬間就想到了謝徵。\n他都來盧城了，他那些親衛肯定也跟來了。\n昨晚來守著謝五的，八成就是他原來那些弟兄。\n知道謝五性命無虞後，樊長玉才有心思慢慢思考昨日的種種。\n她其實也沒料到會在盧城見到謝徵。\n李家和魏嚴開始爭奪崇州、薊州的兵權歸屬後，他借著捉拿反賊餘孽之由去了康城就再沒回來過。從康城到盧城，比從崇州趕來還要遠些，他能在這麼短的時間內趕來，大軍得是早就在路上了。\n他是提前得知了消息，還是大軍碰巧在盧城附近？\n樊長玉一肚子疑惑，而且……他聽自己喚他侯爺時，那冷笑的神態和那咄咄逼人的反問又是什麼意思？\n想到他臨走前看自己的那個眼神，樊長玉心中愈發不是滋味。\n她強行打住思緒，不然自己在想關於謝徵的事。\n謝五沒事了，現在的首要大事是怎麼救俞淺淺。\n軍醫和阿茴對樊長玉看得嚴，她藉口要去拜拜賀敬元，軍醫才鬆了口準她離開武將們養傷的院子，怕她傷勢重行動不便，還特地讓阿茴跟著。\n靈堂裡一片縞素，中間漆黑的棺木上一個偌大的「奠」字看得人心頭髮沉。\n樊長玉忍著腹部的傷痛，跪地磕了三個響頭，才給賀敬元上香。\n賀夫人親自扶起樊長玉，臉上難掩沉痛，卻還是和藹道：「你就是長玉吧，我常聽老爺提起你。」\n她今晨才得了消息，攜一雙子女風塵僕僕從薊州趕來，著一身白底黑色刺繡的孝衣，眉眼間難掩疲色，鬢角也隱約可見銀絲，但樊長玉打第一眼見到她，便覺著親近。\n她啞聲道：「伯母。」\n賀夫人傷懷地笑著應了一聲，隨即又安慰她：「好孩子，莫哭，盧城守住了，老爺泉下有知，也能含笑了。」\n樊長玉強忍著眼眶的澀意點頭。\n賀夫人嘆息一聲，又說：「聽說你也在軍中，若是見了文常那孩子，替我告他一聲，我和老爺都不怪他，叫他莫要自責。」\n樊長玉細問才知，原來她那一手刀劈得太重，鄭文常直至今晨才醒，醒來便來賀敬元靈前跪著了，不吃不喝，也不說話，直到賀夫人攜一雙子女趕來，他才避了出去，覺著無顏見賀夫人。\n樊長玉一口應下。\n她雖和鄭文常共事不久，卻也知道他對賀敬元敬重非常，賀敬元的死，對他來說，打擊不可謂不大。\n樊長玉還打算回頭去軍營找人，怎料出了靈堂，就在院牆根一處隱僻的爬藤處瞧見了人。\n對方眼神陰翳地看著她，似專程在等她。\n樊長玉準備過去，阿茴拉住了她的胳膊，結巴道：「都……都尉，那個人瞧著好兇，是和都尉有過節嗎？您現在有傷在身……」\n樊長玉說：「是鄭將軍，別怕。」\n阿茴這才鬆了一口氣。\n樊長玉由阿茴扶著走近後，喚了一聲：「鄭將軍。」\n鄭文常靠牆站著，大半張臉都隱在陰影中，下顎淡青色的胡茬橫生，整個人都透著一股頹態。\n「都尉逞了英雄，可得償所願了？」他抬起頭，目光譏諷地看著樊長玉。\n阿茴一聽這人詆毀樊長玉，顧不得害怕，當即就兇道：「你這人怎麼說話的？什麼叫逞英雄？你知不知道都尉是只剩半條命被人從戰場上抬回來的！若不是都尉，盧城也守不住侯爺帶大軍趕來！」\n鄭文常聽著這些數落，眼底的嘲意和哀慟卻更重，他盯著樊長玉道：「我寧可當時死在城外的是自己！也不想被人一把打暈，醒來後人人都告訴我戰事已結束，連替老師報仇都再無可能！活脫脫成了個笑話！」\n樊長玉當時劈暈他，就是怕他悲痛過度受激，衝動出城去白白送了性命。\n她冷聲道：「賀大人教出來的得意門生，要是意氣用事枉死在戰場上，那才是個笑話！」\n她出城去是用計拖延時間，等援軍前來。鄭文常出城去，就只會不管不顧地殺進敵陣，找隨元淮報仇。\n他一人，縱使武藝再高強，如何敵得過兩萬大軍？\n一波亂箭射下來，怕是就得被紮成個刺蝟。\n鄭文常被樊長玉的話激得下頜骨咬緊，他死死盯著樊長玉，突然逼近一步，阿茴嚇得大驚失色，怕他會對樊長玉動手，連忙大叫道：「你想做什麼！」\n鄭文常重重一拳砸在樊長玉身側的牆上，冷冷扔下一句：「等你傷好了，我們較量較量。」\n言罷就頭也不回地走了。\n但因為阿茴那一嗓子，今日前來悼念賀敬元的人又多，已引得不少人朝這邊看了過來。\n眾人議論紛紛：「那不是鄭將軍和樊都尉麼？這是怎麼了？」\n有人結巴著小聲道：「好……好像是鄭將軍把樊都尉逼到了牆角裡……」\n主要是鄭文常朝樊長玉身側砸的那一拳，因為角度問題，在遠處瞧著真像壁咚一樣。\n那人一說，便有人跟著道：「鄭將軍該不會喜歡樊都尉吧？」\n這話無異於是一石激起了千層浪，主要是男未婚，女未嫁的，二人又一起共事，在戰場上也算生死之交，仔細一琢磨，便覺著這事好像也沒什麼好意外的。\n樊長玉離開時並未聽見旁人議論這些，鄭文常那事，她也沒放心上去。\n等她為了探望被關押起來             content: `暗無天日的地牢。\n壁龕上的火光映出一地汙穢的血跡,擱置在木架上的各類刑具上，也覆著一層暗紅的血漬，腐朽腥臭的氣味瀰漫在慘叫聲連連的刑室裡。\n「招還是不招？」\n「招還是不招！」\n蛇皮鞭每次甩下,都帶起一片血沫子。\n被鐵鎖扣在刑架上的人蓬頭垢面,滿臉血汙，已連喘氣的力氣都快沒有了，在每一次被那毒蛇一樣的鞭子落到身上時，卻還是抑制不住發出聲嘶力竭的慘叫聲,最後疼得暈了過去。\n那被鮮血泅溼的囚服下方，已新添了一層血色，其間甚至摻雜著細小的碎肉。\n掌鞭的獄卒揮鞭已揮得兩臂酸軟，他恨恨看了一眼刑架上受了幾十鞭仍撬不開嘴的囚犯，額角覆著一層不甚明顯的冷汗,轉身心驚膽戰向後方觀刑之人抱拳道：「侯爺，這人嘴硬，還是沒肯招,再用刑下去，人只怕不行了。」\n久未聽到回答，他心中愈發惶恐,小心翼翼抬起頭朝暗處看去，卻見靠坐在太師椅上的人肘關擱在太師椅扶手處,半撐著額角，雙眸微垂，濃長的眼睫在眼瞼下方投下淡淡的陰翳，似在出神。\n獄卒只得壯著膽子又喚了一聲：「侯爺？」\n下一瞬，半垂著眸子仿若陷入了某種思緒裡的人陡然抬眸。\n那雙野狼一樣殘忍冷戾的眸子，看得獄卒心頭打了個哆嗦,下意識戰戰兢兢又複述了一遍：「所……所有的刑罰都用過了，還……還是沒招。」\n謝徵陰鬱冰冷的目光掃向刑架上半死不活的人，問：「行了多少鞭？」\n獄卒恭敬道：「四十七鞭了。」\n聽到這個數字，謝徵眼底一絲波瀾也沒有，只眉宇間多了幾分不耐之色，道：「十一。」\n立於他身旁的謝十一上前一步，衝著獄卒做了個手勢，立即有獄卒提來一桶冷水澆在了那渾身猶如被血洗過的人身上。\n昏死過去的人幽幽轉醒，溼成一綹一綹的髒發往下瀝著水，整個人全靠著綁在身上的鐵索才能站穩，他氣若遊絲，卻仍下意識回道：「我真的……什麼都不知道，什麼都不知道……」\n謝十一隻是笑笑，同他道：「你有個女兒，嫁去了濟南府高家。」\n聽到這話，渾身是血的人渙散無神的眼裡忽而浮現出幾絲驚恐之色。\n謝十一不緊不慢繼續道：「小兒子正在嵩山學院求學，讓我猜猜，李家是拿你一雙兒女的前途和性命要你守口如瓶的吧？你若死了，你兒子入仕後就能在李家得以重用？女婿也能被提拔進京？」\n「你……你怎麼知道？」被綁在刑架上的人驚恐道，意識到自己說漏了嘴，又連忙矢口否認：「我沒有子女，我孤寡一人，不知你在說些什麼……」\n後方，坐於太師椅上的謝徵已徹底失了耐性，涼薄道：「本侯的人既能找到你一雙子女，你以為李家那群偽善書生能保得下他們？新割下來的人頭快馬加鞭送至薊州府，應該用不了三日。」\n他說著施施然起身，微低下頭，同綁在刑架上的人視線平齊，凌厲的鳳眸散漫又冰冷：「本侯的耐性一向不好，劉大人可想清楚了？」\n渾身是血的人身體抖若篩糠，意志已徹底被摧垮，顫聲招供道：「人藏在得月山莊。」\n隨行做筆錄的兩名文官先是一驚，隨即狂喜，飛快地在狀紙上寫下了供詞。\n得到了這個答案，謝徵眼底覆上一層霜色，頭也不回地走出了地牢，謝十一連忙跟上。\n自那夜謝徵警告完李懷安後，便一直派人緊盯著李家的動靜，奈何李家老小都是成精的狐狸，行事謹慎得很，好不容易才逮到李懷安身邊一名主簿，怎料對方嘴硬得出奇。\n謝徵命人細查了其身份，才得知對方在李家做事後，便改名換姓了，想來是為了有朝一日事情敗露，家人不受牽連。而他那只有李家才知道的家人，也成了李家拿捏他的軟肋。\n謝十一匆匆跟上謝徵的腳步，問：「侯爺，即刻發兵前往得月山莊嗎？」\n走出大牢，迎面追來的風帶了幾分涼意。\n謝徵眯眸看著樹梢打著旋兒落下的黃葉。\n竟是已經入秋了。\n他散漫道：「從虎步營點三百精騎以捉拿盜匪之名去圍得月山莊，李家那邊繼續盯緊。」\n謝十一遲疑了一瞬道：「侯爺，此事茲事體大，要不還是讓血衣騎的人去吧？」\n謝徵麾下的八百血衣騎都是他一手帶出來的親兵，被賜了謝姓的前十九人，更是其中的佼佼者。\n藏在得月山莊的若真是承德太子的後人，此行去的必須得是謝徵麾下的嫡系才行。\n謝徵卻冷冷扯了下唇：「得月山莊不過是李家放出來的餌，急什麼？」\n謝十一半是驚駭半是疑惑，費了這麼大勁去查那姓劉的，莫非只是在將計就計，做戲給李家人看？\n他眼裡頃刻間迸出滿是崇敬的亮光，心潮澎湃正要跟上謝徵，卻聽得走在前方的人突兀吩咐了句：「賀敬元手底下那名姓鄭的武將，也派人盯緊些。」\n語氣冷得掉冰碴子。\n-\n李府。\n李懷安一身靛青色儒袍坐於案前，整個人有些疲倦地往後靠坐著，微仰著頭，修長的手指半搭在眉骨處，問回來報信的人：「武安侯手底下的人已去了得月山莊？」\n下方的人答道：「屬下親眼見到數百騎秘密離開了盧城。」\n李懷安掀開眼皮，淺色的眸子在日頭從窗欞格子透進來的浮光裡顯出琉璃一樣的色澤：「給別院那邊遞信去，讓他們儘快前往京城。」\n得月山莊不過是個幌子，武安侯的人被騙走後，皇孫那邊就能秘密進京了。\n這是一出調虎離山之計。\n彈劾魏嚴的摺子已送去了京城，只等魏嚴一倒，他們再說已尋到了承德太子的後人，「勸」陛下禪位，武安侯便是在西北掌兵一方，也再無力回天。\n除非他自己再舉旗造反。\n但謝氏滿門忠骨，他知道，便是為了謝氏先祖清名，謝徵也不會走到那一步。\n況且……這世間也並非再無牽制他之人。\n前來報信的人已退了出去，沒掩嚴實的軒窗叫晚風吹開，半丈夕陽便傾斜了進來。\n李懷安微鎖著眉心望著案上作好沒多久的畫。\n畫上滿山風雪壓青柏，一片茫茫雪色間，崎嶇官道上一豆小小的杏色成了畫中天地裡唯一一抹亮色。\n細看之下，那分明是一名著杏色襖裙的女子，背身前行在崎嶇官道間，看不清容貌，似乎在雪地裡行走得久了，烏髮間都染著霜雪，一隻沒穿鞋襪的腳，被凍得通紅。\n一將功成萬骨枯。\n李家行至這一步，已沒有退路了。\n只是直到現在，他仍不想把她也牽扯進來。\n那是他此生見過的，最赤誠又熱烈的姑娘，像是一輪太陽，照得世界所有骯髒齷齪都無處遁形。\n-\n樊長玉臥床休養的第四日，謝七和她派去的那幾名親兵終於護送長寧和趙大娘來了盧城，一行人沒費什麼功夫就打聽到了她的住處。\n長寧和趙大娘見樊長玉傷成那樣，抱著她幾乎哭成個淚人，樊長玉費了好大力氣才安撫好這一老一小。\n人多了，全都擠壓軍中撥給武將們養傷的小院子裡自然是不行的，樊長玉又讓謝七在城內找了處宅子，打點好後，便帶著同樣重傷的謝五過去和趙大娘她們一起住。\n謝五和謝七情同手足，有謝七照看著，外加趙大娘每天燉各式各樣的補湯，受傷期間消瘦下去的臉頰，頓時以肉眼可見的速度圓潤了起來。\n長寧聽說反賊已伏誅了，睜著黑圓的大眼，有些緊張地問樊長玉：「阿姐，那寶兒和他娘呢？」\n樊長玉也惦記掛著找俞淺淺的事，奈何一直被勒令在家養傷，對軍中的動向所知甚少。\n她只能摸摸長寧頭上的揪揪安慰道：「她們沒在軍中，許是提前逃了出去。」\n長寧胖嘟嘟的小臉立馬皺了起來：「這樣啊，咱們找不到寶兒她們，她們也找不到我們……」\n她攪著自己的手指小聲問：「那以後還能見到嗎？」\n樊長玉篤定道：「會的。」\n長寧這才重新高興了起來，說：「寧娘被帶走前，跟寶兒說會找阿姐和姐夫去救他的，寧娘不能失信。」\n樊長玉笑著揉了揉她的頭，眼底卻壓著諸多心事。\n她迄今沒聽到反賊餘孽尚存的消息，也不知謝徵是真不知，還是壓下了這消息。\n想到那日從大牢出來偶遇他的情形，心口仍有些悶悶的。\n她想或許是自己還沒習慣這樣的重逢。\n不過也不知他那日去大牢提審的是何人，總不至於是那對母子……\n她憂心忡忡，在賀敬元喪禮結束後，便提出回軍中任事，唐培義卻讓她趁此機會多休養一段時間，等京城那邊的封賞下來了再回軍中。\n樊長玉有口難言，她是想借軍中的勢力暗中找俞淺淺母子，也想知道，謝徵那邊有沒有暗中繼續追繳隨元淮。\n二人如今再無交集，經歷了盧城慘戰後，她也狠不下心再趕謝五謝七走，只把他們當自己的弟兄看待，眼下她對謝徵那邊的動向絲毫不知。\n謝徵要是想私下解決隨元淮，她們或許可以合作，只要能保俞淺淺母子性命就行。\n謝徵要是壓根不知此事，樊長玉覺著，那她得自己想辦法找到隨元淮，再了結了這禍害。\n俞淺淺已沒了溢香樓，帶著俞寶兒孤兒寡母的，怕是也無處可去，當年俞淺淺對她有恩，如今她已闖出一番天地，自是願意收留俞淺淺母子的。\n樊長玉不知道若干年後自己會不會後悔眼下這個決定，但是俞寶兒現在只是個什麼惡都沒做過的孩子，是跟俞淺淺一起被抓回長信王府的，他不該因為自己沒法選擇的出生就賠上性命。\n樊長玉也相信俞淺淺能把俞寶兒教得很好。\n若有那樣的萬一，將來俞寶兒會同隨家父子一樣劣性，試圖挑起天下戰火，那孩子就在自己眼皮子底下，她也不會留情讓他有機會鑄成大禍。\n-\n她喪氣居家養傷數日後，一名不速之客突然來訪。\n彼時她正被趙大娘逼著喝一碗新鮮出鍋的老母雞湯，謝七進屋說鄭文常來訪，正候在門外。\n樊長玉心道這廝突然登門拜訪作甚？\n難不成是來找自己比武的？\n要真是那樣，她這一身傷還沒好利落，比完怕是又得臥床休養個幾天。\n她說：「先把人請進來吧。」\n前不久二人才稀裡糊塗地在軍中被傳了一波謠言，樊長玉可不想叫人瞧見了，再生出什麼么蛾子。\n謝七卻一臉古怪地道：「都尉，您還是親自去看看吧。」\n樊長玉換了身見客的衣裳去大門處，瞧見赤膊背著一捆荊條跪在門口的鄭文常，眼皮也是狠狠跳了一跳。\n她忙示意謝七代自己去把人扶起來，「鄭將軍，您這是作甚？快快起來！」\n鄭文常跪在地上紋絲不動，見了樊長玉，才一抱拳道：「鄭某慚愧，特負荊來向樊都尉請罪。其罪之一，反賊攻城當日，都尉怕鄭某意氣用事，打暈鄭某，鄭某卻不識都尉好意，還險些在賀大人靈堂外同都尉動手，此為不義。」\n「其罪之二，與都尉的爭執叫旁人誤會了去，有損都尉聲名，此為不禮。還請都尉以荊條鞭笞之，否則鄭某實在是無顏見都尉，將來也無顏見賀大人！」\n鄭文常這個人，總是剛直嚴正得過於一板一眼。\n樊長玉嘆道：「鄭將軍無需介懷，賀大人待我同樣恩重如山，我明白鄭將軍當時的心境，並未將當日之事放心上。鄭將軍能重新振作起來，賀大人泉下有知，才是欣慰的。至於那等荒謬流言，更是無稽之談，作何理會？」\n鄭文常一向是個冷硬剛強之人，卻在今日面色露出幾分愧色，垂首道：「慚愧，枉鄭某在軍中歷練多時，眼界和心性卻還不及都尉。」\n樊長玉說：「賀大人的事上，鄭將軍是關心則亂，沒什麼可苛責的。流言我從未放眼裡過，鄭將軍也無需自責，你我二人既是同袍，又都受過賀大人教誨，本不該傷了和氣才是。他日共事，還請鄭將軍多多指教才是。」\n鄭文常再次朝她深深一抱拳：「不敢指教，他日願為都尉所驅使。」\n至此，她同鄭文常算是徹底和解了。\n雖說鄭文常這負荊請罪弄得誇張了些，但也徹底泯滅了之前那些留言。\n她同鄭文常，比起之前的袍澤關係，因為賀敬元的緣故，更多了幾分同門情誼。\n-\n半旬後，軍中開慶功宴。\n反賊已盡數伏誅，但這次的封賞遲遲沒下來，得進京去，在金鑾殿上由皇帝親自加封，並且朝廷已因彈劾魏嚴的摺子掀起了軒然大波，皇帝一時半會兒是抽不空擬封賞的摺子了。\n進京也不是所有將士都能跟著進京，所以慶功宴當然還是得在薊州軍營辦。\n樊長玉作為這次守盧城的功臣，官階雖只有五品，席位被安排得靠前，直接落坐在何副將之後，再往後一位，才是官階比她高了一級的鄭文常。\n跟著謝五出城的那幾名將士，職位雖低，也在席上有了座位，除去謝五，其餘人明顯半是欣喜半是惶然。\n樊長玉尋思著，這席位應該是按功勞大小來排的。\n最上方的首位空著的，明顯是給謝徵留的。\n右側文官席間的第一桌，竟也是空著的。\n樊長玉估摸著那個位置得是李懷安的。\n隨著武將們陸陸續續入席，這大廳內也慢慢熱鬧了起來，還沒開席，就已有不少武將前來向她敬酒，似都知道她此番又立了大功，進京後還得高升。\n樊長玉身上的傷勢雖好了大半，卻還是以身上有傷為由，堅持以茶代酒。\n一來是她傷的確沒好徹底，二來她酒量算不得海量，這一敬酒就停不下來，喝了這位將軍敬的酒，不喝那位將軍敬的酒，容易開罪人。\n全喝下來，怕是還沒開席，她就已經醉倒在席位上了。\n拒絕了敬酒，她左邊是何副將，右邊是鄭文常，樊長玉愣是連個攀談打發時間的人都找不到。\n若不是這席位是固定的，她都想直接擠去謝五他們那邊。\n好不容易盼到快開席，謝徵才踩著點過來，但對面李懷安的席位一直是空著的，樊長玉也不知對方這是遲到了，還是索性不來了。\n怕同謝徵的視線對上徒增尷尬，她全程只低著頭吃跟前的几案上早就擺好的涼菜。\n魚貫而入的侍女將香氣四溢的葷菜也依次擺上後，樊長玉已將那道醬肘子都啃了幾口，才聽見上方傳來謝徵低沉的嗓音：「李大人感染風寒，來不了這慶功宴了，今夜諸位仍要盡歡才是。崇州之亂歷時一載半，終得平定，諸位都是大胤的功臣，本侯先敬諸位一杯！」\n樊長玉眼尾餘光瞧見左右的人都舉杯站起來了，便也跟著舉杯起身，這一抬眸瞧見了立於大廳上方的謝徵，不知怎地，突然就想起到「天之驕子」四字。\n他一身墨緞平金繡蟒袍，長發用金冠半披半束，冷峭的眉眼間儘是威嚴，舉杯時垂下的廣袖上五色雲紋在燭火下燁燁生輝，仿佛山川湖海都盡在他袖間。\n曾幾何時，樊長玉怕的就是他在人群中熠熠生輝，而自己平凡不過砂中一礫，終會同他走散，所以才想著努力去追趕他，同他比肩。\n現在她已在這條路上走得足夠遠，支撐她繼續往前的卻早已不是他。\n那杯酒下肚後，驀地給樊長玉澆出幾分傷感來。\n樊長玉心道自己酒量可別差成這般，才一杯就開始醉了。\n開宴後，四下都是觥籌交錯聲，何副將、唐培義等一幹老將都去找謝徵敬酒去了，鄭文常大概是看樊長玉一直只埋頭吃菜，主動道：「鄭某敬樊都尉一杯。」\n樊長玉以茶代酒朝他遙舉了一下杯。\n喝完剛放下杯盞，便察覺一道冰冷有如實質的視線落在了自己頭頂，幾乎要將她頭皮鑿出個洞。\n樊長玉下意識抬頭朝謝徵看去，卻見他正側著臉在和唐培義說些什麼。\n樊長玉心中莫名，暗道難不成不是他？\n謝徵治下，軍中設宴一律不允舞女助興什麼的。\n酒過三巡後，眾人都已有些微醺，一些通音律的武將直接在席間奏起了胡琴，文官們那邊詩興上來，吟起了詩，到後邊，喝得醉醺醺的眾人直接唱起了軍中戰歌。\n「豈曰無衣？與子同袍。王於興師，修我戈矛……」①\n渾厚激昂的歌聲繞梁而上，這一路經歷過的戰役恍若還在昨日，樊長玉聽著，心中也頗為觸動。\n逝者已矣生者如斯，她們終還有更長的路要走的。\n一名武將醉醺醺地來找樊長玉敬酒，打著酒嗝道：「樊都尉，你必須……嗝……必須要跟我老陳喝一杯，老子打心眼裡佩服……佩服你，在遇見樊都尉前，老子都不信……嗝……有女人上得了戰場。」\n這人已經醉了，樊長玉再拿有傷在身不能飲酒說事，他也聽不進去，一直嚷著要敬樊長玉一杯。\n樊長玉推脫不了，終是喝下了對方敬的那杯酒。\n怎料這一喝就捅了馬蜂窩了，沒醉趴下的武將都搖搖晃晃地舉杯站起來，說要敬樊長玉。\n樊長玉強撐著喝了五六杯，就已經開始上頭了，她坨紅著臉擺手，說不能喝了。\n坐於上方的謝徵聽見動靜，瞥向這邊，眼底已染上一層霜色。\n謝五察覺情況，過來說替樊長玉喝，但他身份不夠，武將們不讓他替。\n樊長玉正打算趴桌子上裝醉，一旁的鄭文常忽而道：「樊都尉有傷在身，我替她喝。」\n言罷直接端起酒碗就喝了個乾淨。\n眾人先是一愣，隨即便起鬨發出陣陣揶揄的笑聲。\n他和樊長玉之間的流言雖在他上門負荊請罪後，便不攻自破了，但今日這突兀之舉，突然又叫他們覺出了幾分貓膩。\n樊長玉也沒料到鄭文常會幫自己，很是愣了一愣。\n唐培義聽見起鬨聲朝那邊看了一眼，同謝徵失笑道：「那小子……」\n謝徵卻笑不出來，手中杯盞直接被捏了個粉碎，碎瓷扎進指節，流出了汩汩鮮血。\n唐培義發現異樣回頭一看，謝徵只淡聲道：「不勝酒力，沒拿住杯盞，二位將軍且繼續宴飲，本侯失陪片刻。」\n唐培義看著謝徵從側門離開的背影，又看看被一眾武將圍住的樊長玉，用手肘拐了拐何副將：「老何啊，你有沒有覺著，侯爺同樊都尉之間，怪怪的？」\n何副將想起自己當日見到的情形，戳著盤子裡僅剩的幾顆花生米裝鵪鶉，含糊道：「我哪知道……」\n-\n被敬完那波酒後，樊長玉趕緊裝醉，由兩名婢子攙著離開了席間。\n到了僻靜處，樊長玉便揮退兩名婢子，打算找個地方坐著吹會兒風醒酒。\n但走了一段路，約莫是那酒的後勁兒上來了，先前她還只覺著臉上燙得厲害，這會兒步子都有些發飄了。\n樊長玉想著要不找水洗把臉，四下看了一圈，沒找到淨室，只在一處遠離前廳的牆根處找到一排蓄了滿水的水缸，這是預防走水用的。\n她頭重腳輕地走到水缸前，鞠了兩把水澆臉上，覺著臉還是燙，索性把腦袋直接埋進了水裡。\n剛覺著整個人清醒了一點，就被人拎住後領拽了起來，似乎是被誤以為醉後溺水了。\n樊長玉說了兩聲「沒醉」後，顧不上自己還被人拎在手中，茫然地盯著月輝下那一臉寒霜的人。\n好一陣，她終於反應過來這是誰，大腦在酒精的作用下，遲鈍思考了一陣後，才兩隻手勉強做出抱拳的姿勢，畢恭畢敬道：「見過侯爺。」\n拎住自己後領的那隻手倏地一松，樊長玉直接摔地上貼牆根坐著了。\n她現在整個人軟得跟一團棉花似的，摔地上了倒也不覺著疼，只下意識拍起身上沾到的灰。\n但也不知怎麼，拍著拍著，心中突然生出一股莫大的委屈，眼眶一酸，就砸下一滴淚來。\n樊長玉盯著落在自己手背的水珠子，甚至沒反應過來那是自己的淚。\n站在她邊上的人蹲下身來，映著月輝的一張臉好似冷玉雕而成，神色也極冷，抬手幫她抹去眼角溢出的淚，問她：「除了侯爺，你還會叫我什麼？」\n語氣似自嘲，又似壓著極大的恨意。\n他指尖有傷痕，縈繞著血腥味，是先前在宴會上被碎裂的杯盞割的。\n樊長玉醉酒了，整個人就變得極呆，她都不記得自己剛才為什麼突然想哭了，盯著眼前這張冠玉般的臉看了好一會兒，才說出兩個字：「言正。」\n她抬手摸了摸他頭，說：「你是言正啊！」\n謝徵落在她臉旁的手指一僵，漆黑的眸底瘋湧的情緒叫人膽寒。\n可惜樊長玉成了個醉鬼，看不見，她的注意力被血腥味引著落到了他滿是血口子的手上，俊秀的眉皺起，嘀咕：「流血了……」\n她垂下腦袋，扒拉自己衣袍，似在找哪個是裡衣，好不容易找到了，正要撕下一角來，下顎突然被人用力攥住，她有些吃痛地被迫仰起頭來，只瞧見一雙黑不見底的眸子，就被奪走了呼吸。\n齒關被強行撬開，唇舌被肆虐的時候，她終於後知後覺反應過來眼前這人在幹嘛，生氣地推了推，沒推動，反倒是她自己被對方摁在在了牆上。\n在樊長玉險些缺氧窒息前，眼前人終於放過了她。\n她唇上刺痛，腦子裡懵懵的，卻還記著在生氣，繼續推他，試圖把人推遠些，但也無果。\n她被對方大力扣進懷中，勒得身上的骨頭都隱隱作痛。\n那人埋首在她頸窩，明明強勢如斯，姿態卻脆弱又絕望，像是一個人在沙漠裡走了太久，終於看到了歸途。\n「樊長玉，我後悔了。」\n有溫熱的水澤浸透衣物，暈開在樊長玉肩頭。`

            content: `天剛破曉,庭院裡的紫竹葉稍凝著一層細小的晨露。\n樊長玉迷迷糊糊睜開眼，只覺腦仁兒脹痛。\n昨夜還是喝醉了麼？\n她皺著眉抬手揉了揉額角，呼吸間發現被褥上是陌生的味道，她頓時一激靈,徹底清醒過來,下意識垂眸看去，好在衣物都完好地穿在她身上。\n但入目是深色的菱花團窼鳥紋被面,繡著纏枝蓮紋的紗帳只放下了靠近床頭的那一半,金色的晨曦碎在上邊，好似上邊暗色的蓮花紋泛出的華光。\n樊長玉以為是自己醉倒後被暫且安置在了城主府,鬆了一口氣，撐著床鋪坐起來。\n「醒了？」一道低啞清冽的嗓音自床帳外響起。\n樊長玉身形一僵，轉頭朝外望去，隔著一道金絲紗帳,影影綽綽可瞧見對面的檻窗前坐著一人，蟒袍玉帶,墨發用金冠半披半束,不知在那裡坐了多久,在晨曦裡靜默如一尊雕像。\n謝徵？\n自己是在他房裡？\n好一陣，樊長玉腦子裡都是一片空白。\n宿醉後頭疼得厲害，她迫不得已伸出一隻手按了按額角，仔細回想昨夜的種種。\n她記得自己裝醉由婢子扶出了前廳,但後邊打算找地方醒酒時，似乎真醉了,她腦子裡最後的畫面是自己在水缸裡洗臉，被謝徵一把拎了起來。\n他撞見了醉酒的自己？\n以二人如今的關係，他為何不把差遣婢子送她去客房暫歇,反把自己帶回了他房中？\n樊長玉心中疑團眾多，奈何自己半點不記得醉酒後的事了，怕其中有什麼誤會，只得先道：「抱歉，我昨晚喝醉了，我……沒給侯爺添什麼麻煩吧？」\n隔著一道紗帳，她看不清坐於對面紅木椅上的人面上是何神情，卻能感覺到屋內氣壓驟然低了下來。\n樊長玉不知道是自己那句話叫他不高興了，還是自己昨晚確實有失禮之處。\n她聽見庭院裡已經有早起的僕役走動的聲響了，擔心再晚點，她從謝徵房裡出去會叫人看見，便撩開金絲紗帳起身，一邊往腳上套靴子一邊道：「昨夜若真有冒犯之處，末將改日再向侯爺賠罪……」\n一直靜默不語的人忽而哂笑了聲：「你能冒犯我什麼？」\n大抵是真在這裡坐了一夜，他嗓音啞得像是喉嚨裡灌了沙，話語卻又尖銳冰冷，仿佛了恨極了她這般時時同他劃清界限的樣子。\n樊長玉套長靴的手一頓，死一般的沉默在二人間蔓延開。\n她穿上靴子後抬起頭來，沒了那層紗幔阻擋視線，她清晰地看見了他蒼白的臉色，眼尾因熬了一宿後帶著幾分猩紅，垂在膝前的手，指尖結著血痂。\n是個人都能看出他此刻的疲憊，偏偏他又像是一張繃緊了的弓弦，叫人害怕那層假意的平靜崩裂後，從裂縫裡滲出的瘋狂和扭曲。\n看他這樣，樊長玉不知為何，感覺心裡悶悶地疼了一下。\n她印象裡的謝徵，一直都是高傲、目空一切的，哪怕當初命垂一線被他撿回去，他也從未露出過半點弱態。\n現在，卻讓她覺著，他那滿身尖刺一樣的高傲和刻薄，不過是湖面上凝起的薄冰，日頭稍稍一照，就能皸裂開來。似乎也意識到自己方才那話太過尖銳了些，謝徵沉默兩息，起身朝門口走去：「想吃什麼？」\n語氣自然得似乎他們本就該如此，從未因為父輩的仇怨有過什麼隔閡。\n二人從前相處的一些記憶被喚醒，樊長玉從前以為自己可以平靜面對的，這一刻卻還是被那股揪心的難過攥緊了。\n「謝徵。」\n手已搭在門栓上的人，因為她這一句，生生止住了行動。\n樊長玉看著他清雋的背影，深吸了一口氣，再開口時，嗓音裡卻還是帶上了一股啞意：「自崇州一別後，我們再沒好好說過話，不如就借著今日，把話說開吧。」\n背對著她的人沒作聲，但也沒有出門的意思了，似在等她繼續開口。\n樊長玉道：「謝將軍的死，我很抱歉。」\n提起謝臨山，謝徵沉默依舊，他背對著樊長玉，也叫樊長玉看不清這一刻他面上是何表情，但他抓在門栓上的手，明顯因太過用力而青筋凸起。\n「你當日做的選擇，說的那些話，我都不怪你。在十七年前的真相沒有徹底查清前，我也不會再同你說，讓你相信我外祖父和爹爹的話。你礙於陶太傅的情面，曾說今後只把我當同門師妹看，我卻做不到侯爺那般灑脫。」\n樊長玉盯著他的背影，眼中已止不住地泛酸，卻還是一字一頓，認真道：「往後還是形同陌路吧，今日我是叨擾了。」\n她娘在世的時候，一直說她是個心大的，可叫她真正放心上了的人，每失去一個都能要了她半條命。\n她輕易不會喜歡上一個人，喜歡了，又哪是說放下就能放下的？\n父仇，賜婚，他們中間已隔了太多，終究是再也回不去了。\n「咔嚓——」\n木頭的斷裂聲自門口傳來，是謝徵生生捏斷了門栓。\n樊長玉心口下意識跟著一跳。\n她看見他凝著血痂的手指，因用力又溢出了細小的血珠子，他卻渾然察覺不到疼一般，背對著她問：「若我說，我後悔了呢？」\n樊長玉瞳孔微張，一時間沒反應過來他話裡的意思，「什麼？」\n謝徵轉過身，眸子裡只餘黑漆漆一片，殷紅的血珠子划過他蒼白瘦長的指節，墜在地上迸成一朵小小的血花，好似一滴血淚。\n「我說，我後悔了。」\n他緩緩道，語調蒼白又執拗。\n這句話震得樊長玉心口發麻，隨即升起來的便是無盡苦意，她久久都沒有說話。\n門框擋住了屋外傾瀉進來的晨曦，謝徵站在那裡，整個人就像是融入了暗影中。樊長玉所站的地方正好是檻窗對面，朝陽盡數灑落在她身上，蓬勃又溫暖。\n一明一暗的分割線，仿佛是道不可跨越的鴻溝。\n好一陣，樊長玉才聽見自己啞聲問：「你後悔了，所以呢？」\n謝徵靜靜看著她，漆黑的瞳仁裡瞧不見一絲亮色：「我們還跟從前一樣，好不好？」\n他嘗試過放棄她，但他此生所受過的，最大的煎熬和痛苦，約莫也是這些時日了。\n一開始他以為自己會慢慢習慣的，就像幼年時無法接受爹娘相繼離世的事實一般，縱使再痛苦，他也能熬過來的。\n一天不行就一月，一月不行就一年……可他連一月都沒忍過去。\n心口的地方空得厲害，離開她越久，那種空洞感愈盛，幾乎要將他逼瘋。\n永無止境的殺戮和疼痛都沒法緩解分毫。\n很多時候，謝徵都覺得自己是不是已經死了。\n不，死了應該都比這樣的煎熬好受些。\n她似乎本就是他生命裡的一部分，所以一旦弄丟了她，他就失魂落魄，恍若行屍走肉。\n無數個日夜裡，她和十七年前謝臨山戰死錦州的慘象交替出現在他夢中，讓他在無盡的黑暗中掙扎得鮮血淋漓。\n他這一生，似乎本就只該為復仇而活，不配在這人間得到一絲一毫的歡欣和垂憐。\n可他在她那裡得到過最純粹最熾熱的愛。\n是她讓他知道，原來這人間，不是只有苦的。\n但謝臨山那被開膛掏光了臟器、最後只能由醫官用針線歪歪扭扭縫起來的腹部，那一道道刀劈斧砍深可見骨的傷痕，同樣時時壓得他喘不過氣來。\n被仇恨和愛念折磨得快瘋了的時候，他驚覺自己也是恨她的。\n她父輩害死了他父親！讓他痛苦了半生。\n她讓他知道了什麼是愛，卻叫那生出的情絲，日日夜夜折磨他，叫他整個後半生都再不得安寧！\n恨到極致的時候，他也想過，大仇得報後，帶著她一起去死好了。\n生不能同衾，那就死後同穴。\n他再不用經受這樣的痛苦和折磨，奈何橋上可以攥著她的手一起去來生。\n下輩子，他們大抵就不會隔著這樣的血海世仇了，他或許能同她總角相識，青梅竹馬……她喜歡讀書人，他就做個斯文的讀書人，考取功名，在她及笄之年，娶她為妻，生兒育女……\n可也只是想想罷了。\n他若捨得傷她分毫，當初就不會只說出此生不再見她這樣的話。\n再次見到她，得知她已從鬼門關走過了一遭時，那惶恐到齒關齟齬、渾身戰慄的憤怒和無力感，他此生再也不想經歷第二遍。\n謝徵看著站在晨光裡的戎裝少女，她連頭髮絲上都落著一層淡金色的浮光，像是誤入凡塵的神明。\n昨夜鄭文常在席間替她敬酒那一幕又浮現在他眼前，心底叫囂的妒意如野草般瘋長。\n能不能只做他一人的神明？\n久未聽到樊長玉的回答。\n謝徵無意識攥緊五指，指尖的傷口傳來的細微疼意，讓他愈發清醒，一雙黑眸也愈漸幽沉。\n樊長玉純粹是懵住了。\n跟從前一樣？\n如何跟從前一樣？\n他們中間隔著父仇，縱使十七年前的錦州慘案最終能查清，皇帝已經賜婚了，他就要娶公主了啊，他們這樣算什麼？\n樊長玉也聽說過一些達官貴人會養外室，難不成他想讓自己當外室？\n樊長玉頓覺有些喘不過氣來，一股尖銳的刺疼自心底升起，逼得她視物都有些模糊，她忍住眼眶瘋湧的澀意反問：「侯爺覺得，如何才能同從前一樣？」\n「是侯爺可以當錦州之事不復存在？還是可以讓陛下的賜婚收回成命？」\n說到最後一句時，縱使她咬緊牙關，強忍多時的一滴淚，終究是奪眶而出，重重砸落在地。\n謝徵聽得她前半句，眼神陰翳得可怕，聽完後半句，忽而狠狠一抬眸：「誰同你說，皇帝給我賜了婚？」`
