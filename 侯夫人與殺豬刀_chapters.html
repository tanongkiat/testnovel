            num: 22,
            title: `第22章尋仇來了`,
            content: `一直到樊長玉離開了房間，坐於書案前執筆寫著什麼的人也沒抬頭，只唇角抿得緊了些。\n聽著遠去的腳步聲，他擱了筆，整個人往椅背上一靠，黑漆漆的眸中一片暗沉。\n呼之即來，揮之即去？\n她倒是敢。\n-\n樊長玉交代好胞妹後在家不許亂跑後，跟鄰家趙大娘打了個招呼，便準備去縣衙。\n趙大娘卻道：「我跟你叔陪你去，那地方嚇人著呢，聽說一個不小心還得被打殺威棒，幾十個板子下來，不得皮開肉綻？我跟你叔在，若有個萬一，也能幫你想法子。」\n都說民不與官鬥，樊大搭上了跟樊長玉家有仇的師爺這條線，這幾日趙家老兩口也替樊長玉擔憂得睡不著覺。\n樊長玉雖有一身武藝，但上公堂這事，十幾年來也是頭一回，略做思量便也同意了。\n三人搭了個牛車往縣衙去，到了地方時辰還早，但門口已擠了不少看熱鬧的百姓。\n問審的流程樊長玉是知曉的，縣太爺升堂後，會先傳她和樊大進去，當堂再問一遍樊大所訴何事，由一旁的主簿老爺記錄問審供詞，若有辯駁，必要時還會傳證人。\n樊長玉尋的證人是樊家老宅那邊的鄰居，一般人肯定不願蹚這渾水，但樊大一家子確實不會做人，跟他們交惡的鄰裡不在少數，樊長玉去拜訪一趟，好幾家都不齒樊大的行徑，願意前來替他作證樊大是個賭鬼。\n時間一點點過去，擠在縣衙門口看熱鬧的人也越來越多，已經有衙役去公堂上方的桌案上擺籤桶和驚堂木，卻仍不見樊大這個原告來，樊長玉心中都不由有些疑惑了。\n升堂遲到了也是要挨板子的，樊大還能忘記今日要升堂這回事，睡過頭了不成？\n趙大娘看了一圈，也在小聲嘀咕：「怎不見樊大？」\n樊長玉不合時宜地想，難道是自己這兩日背律令背得太辛苦，怨念重到昨晚夢遊去把樊大綁了？\n隨著三聲堂鼓響起，她發散的思緒也瞬間收攏。\n三班衙役率先進大堂，呈雁形分列兩側，手中拿著根近乎一人高的刑棍，個個一臉兇相。\n公堂外圍觀的百姓們看到這些衙役就發出了一陣唏噓般的議論聲，顯然很怵這些人。\n樊長玉也發現了這些衙役都面生得緊，王捕頭手底下的捕快一個也沒有，不知是不是師爺做了什麼手腳，她一顆心也微微懸了起來。\n穿著官袍的縣令從側門步上高堂，坐於公案後方，胖得擠成一條縫的眼掃了一眼公堂下方，操起驚堂木重重一拍，喝道：「升堂！」\n衙役們手中的刑棍便齊齊杵地，低喝：「威武——」\n那刑棍杵地聲幾乎快和場外百姓的心跳聲混做一片去。\n蓄著八字須的師爺高喊：「帶原告被告上堂！」\n樊長玉雖說心中也怕，被衙役帶上公堂時，卻還是給了趙大娘夫婦一個安心的眼神。\n但直至此刻，樊大還是沒來，只有她這個被告孤零零地跪在堂下。\n胖縣令顯然也是頭一回遇上這樣的情形，側頭跟師爺對視一眼，都沒明白這是個什麼情況。\n場外的百姓也議論紛紛。\n這麼僵持著不是個辦法，最終縣令先問了樊長玉：「堂下所跪何人？」\n樊長玉答：「民女樊長玉。」\n縣令用那眯成一條縫的眼看了看狀紙，喝問：「原告樊大牛何在？」\n場內場外都沒人應聲。\n一片靜默聲中，就顯得外邊百姓刻意壓低了的議論聲都格外突兀。\n胖縣令重重一敲驚堂木：「豈有此理！本官斷案這麼多年，還是頭一回遇上原告直接不來這公堂的，簡直目無王法！」\n他邊上瘦得像根竹竿的師爺掃了樊長玉幾眼，勸道：「大人息怒，樊大牛區區一草民，定不敢遲到公堂，怕是有什麼內情，不如差衙役前去他家中問個話，以示大人明察秋毫！」\n胖縣令略一沉吟：「準了！」\n很快就有衙役前去樊大家中尋他，縣令下令中途停審，樊長玉倒也不用繼續跪在公堂上了。\n出了這麼個岔子，圍觀的百姓非但沒散去，反而更好奇樊大今日為何沒來公堂，擠在門口不肯走。\n樊長玉正坐在一個小馬紮上揉膝蓋，忽而一個小吏過來喚她：「王捕頭喚樊姑娘過去一趟。」\n樊長玉以為王捕頭是要交代什麼，跟著那小吏從側門離開，去了縣衙後邊的值房。\n那小吏想來是王捕頭的心腹，樊長玉進去後，他就一直在門口望風。\n王捕頭見了樊長玉也沒多廢話，直接開門見山問：「你大伯……是不是你綁走的？」\n樊長玉心說她一開始是這麼打算過，但後來有了其他法子，她壓根就沒動過這想法了啊，當即就搖了頭：「我怎會做出這等糊塗事。」\n王捕頭鬆了一口氣：「那就好。」\n他也是想起樊長玉之前問過他，對簿公堂時樊大若沒出現會怎樣，才特地私下問她一句。\n他壓低聲音道：「樊大走了何師爺的門路，就算用了這等法子，後邊他也會反咬你一口，一頂目無王法的帽子扣下來，下大獄都有可能。」\n樊長玉說：「我知道的。」\n衙門派人去尋樊大，都沒用王捕頭的人，其中意味已經很明顯了，王捕頭在這事上是半點幫不上忙的。\n離開了值房，樊長玉繼續回公堂等，但足足半個時辰過去了，去尋樊大的衙役還是沒回來。\n縣令等得不耐，命人去催，又過了半個時辰，衙役們才用擔架抬著個蓋了白布的人回來了。\n樊大媳婦劉氏和樊家二老一路跟著，哭聲震天。\n顯然那蓋著白布的人是樊大。\n樊長玉面露驚愕，樊大死了？\n圍在縣衙門口的百姓也議論紛紛，目光不斷往樊長玉身上掃。\n樊大欲圖謀她家產，偏偏在這節骨眼上死了，任誰也忍不住多想。\n「怎地就在對簿公堂這日死了？」\n「樊大體壯如牛，尋常人想害他性命只怕沒那般容易……」\n樊長玉感受著落在自己身上的那些形形色色的目光，微微抿了抿唇，心頭同樣驚疑萬分。\n誰殺的樊大？\n她腦海裡下意識閃過幾日前言正說的了結樊大的話，不過很快就被她否定了。\n且不提言正傷勢加重，這幾日屋子都鮮少出，單是他已教她背熟了公堂上可能會用到的所有律例，就不可能對樊大下手。\n再者，他只是假入贅與自己，跟樊大無冤無仇的，壓根沒理由殺他。\n縣令聽說原告樊大死了，官帽都沒戴穩就匆匆從耳房出來，胖得只剩條小縫的眼裡露出驚駭之色，似沒料到一個分家產的案子，竟能演變成一樁命案：「這……這是怎麼回事？還有沒有王法了？」\n前去尋樊大的一個捕快恭敬答話：「回大人的話，卑職等尋到樊大牛時，他已氣絕多時，身上有多處刀劍傷。」\n縣令命人掀開蓋在樊大身上的白布，只一眼就嚇得臉上的肥肉都直哆嗦，忙道：「傳仵作！」\n樊大媳婦劉氏伏在樊大屍首旁險些哭得當場暈厥過去，看到樊長玉，整個人撲過來向她索命一般：「是不是你殺的人！是不是你？」\n樊長玉後退一步避開，冷聲道：「大伯母可別血口噴人了，我大伯在外面欠了一堆賭債，指不定是落在了哪個要債的手裡遭了難，關我什麼事？」\n劉氏和樊老婆子繼續哭哭啼啼，縣令被她們吵得頭疼，讓衙役把她們先帶下去了。\n樊老頭子下去前，看著樊長玉欲言又止，整個唇都有些發白，像是想起了什麼可怕的事。\n樊長玉跟樊大有官司牽扯，不可避免地被迫留了下來。\n仵作驗屍後給出了結果，樊大應該是今早在來縣衙的路上死的，身上一共有十一道傷口，但真正致命的只有那穿心一劍。\n仵作道：「前邊那十道口子劃得極狠，卻又刀刀都避開了要害。兇手應是常年用刀劍之人，這幾道傷口若不是為了尋仇報復，瞧著像是在審訊什麼。」\n這個答案讓樊長玉眉頭一蹙。\n審訊？\n能審訊樊大什麼？\n逼他還錢？\n可目的若是逼他還錢，那也就不可能殺他了。\n一時間樊長玉只覺心頭迷霧重重。\n不過樊大既是在來縣城的路上遇害的，樊長玉倒也能洗脫嫌疑了，她那會兒也在趕路呢，趙家老夫妻和牛車車主都可作證。\n師爺卻並不打算放過樊長玉，對縣令道：「大人，樊大姑娘雖有不在場的證據，但萬一……是她買兇殺人呢？聽說她同臨安鎮上的街痞金老三那夥人可走得近。以防萬一，咱們要不還是派人去她家搜尋一番？」\n這過大年的突然來了樁命案，縣令也覺著晦氣得緊，此事涉及命案，他也顧不上心裡那點小九九了，點了辦案多年經驗頗豐的王捕頭：「你帶人去搜！」\n樊長玉身正不怕影子斜，去的又是王捕頭，她和師爺那黃鼠狼一樣的目光對上，半點不怵。\n-\n一眾衙役到了鎮西的民巷，北風這會兒颳得正大，一名衙役使勁兒嗅了嗅：「誰家殺豬了嗎？好濃的血腥味。」\n王捕頭也聞到了，但樊長玉家就住這邊，她又是以殺豬為生，一時間他也沒往別處想。\n等打開樊家院子的大門，看到那一地死屍時，饒是京城接觸各種命案的捕快們，也齊齊變了臉色。\n一地的死屍，鮮血直接染紅了滿院還沒來得及清掃的積雪。\n王捕頭和樊長玉父親是故交，知曉她家中還有個胞妹，沒在院中發現小孩的屍首，忙進屋去看。\n步上臺階就見堂屋門口仰躺著一個被什麼鉤爪抓碎了脖子的人，地上還掉落著幾根鵝毛大小的翎羽，門上也有刀劍劈砍過的痕跡。\n王捕頭心中一個咯噔，又往裡屋走，北屋的地上也倒伏著一個死透的人，背後還釘著一把菜刀。\n看砍入的位置，應該是正好砍在了脊骨上的，偏偏那菜刀幾乎沒過了刀刃的三分之二，顯然是直接釘入了脊骨裡，難以想像扔那把菜刀的人手勁兒有多大。\n王捕頭提著一顆心搜遍了所有房間，都不見樊家小女兒和那贅婿，一時間也不知是是喜是憂。\n他沉聲道：「怕是有人找樊家尋仇來了，快回縣衙報信！」\n-\n天灰濛濛的，鵝毛般的大雪飄飄灑灑，凝在松針上的積雪時不時往下抖落些許雪沫子。\n謝徵胸前的衣襟已全然叫鮮血濡溼，身後的密林裡寒鴉驚起，踏著積雪的凌亂腳步聲正羅網般朝著這邊收緊，他卻恍若未聞，背靠一棵針葉松，帶血的長劍斜插進雪地裡三寸，用撕下的布帶包紮著自己手上的傷口。\n蒼白的下顎上濺著幾點血漬，嘴角往下抿著，似乎心情糟透了。\n長寧和灰了兩個度的海東青都縮在他不遠處，海東青一隻爪子上還掛著淡粉色的碎肉，長寧斷斷續續抽噎著，一張小臉嚇得煞白。\n他冷冷抬眸：「不許哭。」\n長寧便連抽噎聲都不敢發出了，只淚珠子還大顆大顆地往下砸。\n「你們樊家到底是惹了什麼人？」\n眼前這個快被嚇傻的孩童自是不可能回答他的，謝徵這一句更像是自己在囈語。\n那凌亂的腳步聲終於逼近時，他也歪頭咬住布帶的一端打好了結，鮮血在舌尖化開淡淡的鐵鏽味兒。\n乖戾狠決的鳳眸裡，映著一群蒙面人提著刀劍自松林那頭圍過來的身影。`
        },

            num: 23,
            title: `第23章第23章`,
            content: `縣衙。\n樊長玉被扣在了臨時審訊房裡,門窗緊閉，裡邊的桌椅板凳仿佛都透著絲絲寒意。\n坐得久了，涼意從納了兩層厚墊的鞋底鑽上來,兩隻腳快被凍得沒知覺。\n樊長玉搓了搓手，往手心裡哈了口氣，小幅度跺了跺腳，試圖讓身上暖起來。\n審訊房外守著兩個當值的衙役，樊長玉隔著門試著和他們說過話，但那倆衙役顯然不是王捕頭的人,壓根沒搭理她。\n等待是難熬的,好不容易審訊房的大門開了，黑漆漆的房間裡才透進滿室天光，門口的衙役道：「你可以走了。」\n樊長玉以為是王捕頭帶人去搜查回來後，證明了自己的清白，心下驟松,出了審訊房。\n見到王捕頭時,他正焦頭爛額在吩咐底下衙役什麼，樊長玉這才注意到就連端茶送水的普通衙役都配上了刀，像是衙門裡所有人都隨時準備外出。\n王捕頭看到樊長玉,點頭示意那幾個衙役可以走了，說話時眉頭幾乎快皺成了個「川」字：「方才又有人來報官了，今日除了樊大慘死，還有幾戶人家也遭了毒手,身上的刀劍傷同樊大身上的一致,兇手應該是同一批人。但只有你家被兇手找了過去,不知是不是從樊大口中問出了些什麼,我帶人去你家看時,死了一地的人……」\n樊長玉聽到最後一句的時候，腦子裡就「嗡」地一聲，像是耳鳴了一般，只能看到王捕頭的嘴還在一張一合，卻聽不清他在說什麼。\n好一會兒，她才勉強了穩定了心神：「我妹妹……」\n話一出口，才驚覺嗓音啞得厲害，手腳也冰涼。\n王捕頭忙道：「沒找到你夫婿和你胞妹的屍體，屋裡屋外都找過了，不知是被那些歹徒抓走了，還是跑出去了，我已命衙役們去搜尋，只是這雪下的大，掩蓋了不少痕跡，到現在還沒音訊傳回來。」\n樊長玉心中那口氣只鬆了一半，奪步就往縣衙外走：「我也去找。」\n爹娘已經沒了，她不能再讓胞妹出事！\n言正雖有傷在身，但也是個練家子，之前他傷勢那般重，都還能對付金老三那幫人，王捕頭口中那些死在自家院子裡的人，若是被他殺的。\n那他肯定是帶著長寧躲出去了，他身上的傷支撐不了多久，自己必須在那之前找到他們！\n-\n風卷細雪，亦將整個松林間的血腥味送出老遠。\n劍光一晃，一抔熱血自頸間迸出，灑在了凝著霜雪的針葉松樹幹上，提著刀的人直挺挺地倒在了雪地裡，樹幹上粘稠的鮮血正慢慢往下滴著，在樹下的積雪裡砸出一個又一個淡紅色的小坑。\n謝徵都沒正眼瞧那人一眼，手腕輕抖，沾在長劍上的血珠子便被盡數甩了出去。\n他腳下十米之內，全是死屍。\n小長寧和海東青縮在一起，不知是被嚇得還是被凍得，臉色青白，甚至連哭都不會哭了。\n謝徵收了劍走回去，見此皺了皺眉，俯下身用指節碰了碰小孩的手背，果然凍得和冰塊一樣。\n他瞥了一眼自己身上的這件襖衣，已經被血濡溼得差不多了，穿在身上也沒什麼暖意，便把目光落在了不遠處被自己一件割喉的那人身上。\n那件衣服瞧著沒髒。\n他走過去，直接用劍挑開了那人身上的皮襖，腳下一踢，踹麻袋一般把死去的人踹得滾了一圈，劍尖再往上一挑，那件皮襖就到了他手中。\n這把劍是他從一個蒙面人手中奪來的，用著還算順手，便帶著了。\n謝徵把那件皮襖扔給小長寧，沾著血的一張臉比地上積雪還白上幾分，隨即整個人有些脫力地靠在了一顆雪松上，眸子半瞌，露出再明顯不過的疲態，語調卻依舊冷冰冰的：「穿上，活著等你長姐來找你。」\n遠處還有腳步聲在朝著松林這邊圍攏，好幾批，不知是和這些蒙面人一夥的，還是旁的勢力。\n謝徵不打算繼續往前了，他體力透支得厲害，帶著一個小孩也走不遠。\n留在原地休整片刻，恢復些力氣，興許還能支撐得久一些。\n「徵兒，桂花糕好吃嗎？」\n眼前的天光和松林都出現了殘影，恍惚間耳邊竟響起了那個溫婉端莊的婦人含笑的嗓音。\n謝徵眼皮顫了顫。\n小長寧看他渾身是血，靠著松樹幹閉著眼，怕他死了，用哭啞的嗓音哽咽喚他：「姐夫……」\n「別吵。」\n意識回籠，謝徵皺起眉，眼皮沉得厲害，四肢灌了鉛了一樣。\n這樣的感覺他並不陌生，上一次從魏家死士手裡脫身後，便是這般失去意識一頭倒在了雪地裡。\n他強行撐開眼皮，纏著布帶早已被鮮血染紅的手抓住劍身，用力劃下。\n兩側劍鋒在掌心割開深深的口子，鮮血再次溼透了布帶，從他緊握成拳的手心溢出，灑在雪地裡如一地落梅。\n刺痛總算讓他神智又清明了幾分。\n凌亂的腳步聲逼近，那閃著寒光的劍鋒直直像那小孩刺去時，他握劍的手反手格擋，發出「叮」地一聲脆響。\n兩劍相擦，甚至迸出了火星子。\n謝徵眼神一厲，長劍劃到劍柄處時，翻手在蒙面人肩臂上割出一道猙獰血痕，一腳將人踹出去丈餘遠。\n「躲到樹後去。」他冷冷吩咐，眼白部分都已泛起了絲絲血紅，像一頭被逼到了窮途末路的孤狼。\n十幾個蒙面人望著滿地同伴的死屍體，顯然也有些驚駭，對視一眼，提劍一擁而上前去對付謝徵，招招狠厲，直攻要害。\n小長寧躲到了樹後，雖已被謝徵斥過多次不許哭，瞧見此情形，卻還是忍不住眼淚吧嗒吧嗒往下掉，幾乎是本能地掏出藏在衣領底下的哨子用力吹了起來。\n這哨子是從前阿姐做給她的，有一回她和巷子裡的小孩玩，躲貓貓不小心跌進了枯井裡，哭得嗓子都啞了都沒人找到她。\n家裡人去找她時，她又哭啞了嗓子應不出聲。\n後來阿姐就做了個哨子給她，讓她再遇到危險就拿出來吹，這樣家裡人才能找到她。\n她被姐夫帶著逃命的這一路，就嚇得吹過一次，不過引來了壞人，被姐夫兇過一次，她後面才沒敢繼續吹了。\n眼下情況緊急，小長寧哪還顧得上對方的教訓。\n尖銳的哨音響徹了整個松林，像是啼血的雛鳥。\n一個蒙面人注意到了長寧，提著刀就向她走去，長寧站起來想跑，但裹在身上的那件蒙面人的皮襖太長，沒跑幾步就被絆了一跤。\n蒙面人舉刀就要揮下，不知從何處竄出一隻灰隼，直直地撞向蒙面人，鐵鉤似的爪子沒能抓到他脖頸，卻也把他臉抓了個稀巴爛，連帶蒙面的黑巾都被扯了下來。\n遠處的密林裡隱隱約約傳來了犬吠聲，此起彼伏，似乎不止一條，吠叫得極為兇惡，棲息在那邊林子裡的雀鳥都盡數飛了起來，映得整個雪空烏壓壓一片。\n長寧一雙眼晶亮，趕緊又鼓起腮幫子用力吹了幾聲竹哨。\n蒙面人一劍揮開灰隼，正要去抓長寧，破空的風聲從身後傳來，他幾乎是憑著本能往後一仰，避開了那把朝著他頭顱狠狠擲來的砍骨刀。\n黑鐵刀身大半都扎入了他身後的一顆針葉松樹幹上，樹身顫動，凝在松塔上的積雪簌簌抖落，頃刻間阻隔了視線。\n也就是在這瞬間，那蒙面人只覺自己心窩一涼，刀身抽出去的剎那，胸口的血汩汩往外冒。\n蒙面人殺過不少人，看到自己胸口那道口子的冒血量時，卻還是錯愣了一瞬。\n好狠辣的刀法。\n這刀口能在最快的時間裡放幹人身體裡的血。\n隔著簌簌落雪，他吃力抬起眼，視線落在那把往下瀝著鮮血的黑鐵兇器上。\n殺豬刀？\n再往上，渙散的瞳孔已看不清對方容貌了。\n但很顯然，那是名女子。\n蒙面人跪坐在雪地裡，軟軟垂下了頭顱，湧出的血將他身下的積雪都化掉了大半，幾乎是死在這裡的其他蒙面人兩個人的出血量。\n樊長玉第一次用手上的殺豬刀殺人，下意識用了殺豬的手法，只管往多了去放血。\n極度的緊張和保護欲讓她渾身的血都在往腦門上湧，指尖發麻發燙，甚至沒來得及升起任何關於殺人的其他情緒。\n長寧在看到長姐的瞬間就癟嘴想哭，但此刻情況實在是緊急。\n樊長玉眼見言正重傷不敵，胳臂上又被拉出了一道血口子，顧不上跟胞妹說一句話，取下砍在樹幹的砍骨刀就向著其中一名蒙面人擲去。\n怎料那人被同伴拉了一把躲過，他身後就是謝徵，那把砍骨刀直直地砍向謝徵，嚇得樊長玉心都提到了嗓子眼兒。\n還好謝徵反應極快，當即一偏頭，那把厚重的砍骨刀釘入了後邊的松樹幹。\n對方看過來時，樊長玉面色有點窘。\n一樹的積雪落下時，她也來不及再做多想，故技重施瞬間逼近，依舊用殺豬的手法接連捅了好幾個人，謝徵則是一劍割喉。\n混著雪沫子撒到地上的，是一抔又一抔的鮮血。\n這一樹的積雪落完，樊長玉和謝徵眼神對上，她尷尬解釋：「我方才……是扔那蒙面人來著。」\n謝徵沒作聲。\n十幾個人蒙面人已折損了大半，他也有了喘息的餘地，拄劍而立，髮絲凌亂垂落下來，面色蒼白如雪，嘴角沾著血跡，明明虛弱得仿佛下一刻就會昏倒，卻又愣是讓剩下幾個伺機而動的蒙面人分毫不敢輕舉妄動。\n犬吠聲已經近了，三四條獵犬從密林裡躍出，衝著蒙面人齜著一口兇牙狂吠。\n這獵犬是樊長玉找鎮上的獵戶借的，得虧這些獵犬，她才能順著血腥味找到這城外的松林裡來。\n聽到長寧的哨音後，她便拋下了獵犬，率先往這邊趕來的。\n樊長玉恐嚇對方：「縣衙的官兵很快就來了！」\n蒙面人們交換了個眼神，似乎也判定繼續纏鬥下去，在樊長玉和謝徵這兒討不著好，趕緊撤退。\n謝徵道：「抓一個活口。」\n樊長玉幾乎在他話落的瞬間，就衝了出去。\n這群人一身匪類打扮，殺了樊大，又闖入自己家，指不定就跟謀害她娘的是同一批人。\n她解下腰間的一掛繩索，邊跑邊飛快地打了個結套，用力朝著跑在最後的一名蒙面人一甩去，繩套勒住那蒙面人的脖子後，樊長玉再卯足了勁兒往後一拉，繩套瞬間收緊。\n蒙面人兩手死死扣著勒住脖頸的繩索，像個破布袋一般被樊長玉在雪地裡往後拖了去。\n謝徵瞧見這一幕面露異色。\n樊長玉一腳抵著棵雪松，拖死豬一樣用力往回拽繩索，解釋說：「這是套野馬或野牛常用的繩套，一旦被套住幾乎就掙脫不了，因為越用力掙扎，繩套就會收得越緊。」\n得虧王捕頭怕她跟著出來搜尋遇到危險，讓底下衙役給她拿了一套捕快的兵器。\n捕快的配置其實也就一把刀和一卷繩索。\n刀用來防身，繩索用來綁犯人。\n衙門的刀她用著還沒自己的殺豬刀用著順手，又不好拂了王捕頭的好意，這才拿了一卷繩索。\n謝徵默了一息，明明是性命攸關的時刻，但似乎只要她一說話，緊張的氣氛就能驟然鬆弛幾分。\n幾個蒙面人見同伴被捉，眼神短暫交流後，其中一個直接提起劍向著同伴擲去。\n被樊長玉套住的那 被劃出的淺口子，傷得雖不重，此刻一使勁兒卻還是泛起了綿密又火辣辣的疼意。\n樊長玉想說點什麼分散注意力，半開玩笑對背上那人道：「這是我第二次把你從雪地裡背回去了。」\n背上的人沒應聲，像是暈過去了。\n疼痛讓樊長玉額角出了一層細汗，她低聲說：「謝謝你。」\n謝謝你，替我救下了長寧。\n若沒有了胞妹，她在這世間最後一個親人便也沒有了，往後當真不知何去何從。\n風雪肆虐，她背著這人，在雪地裡留下一串深深的腳印。\n小長寧抱著海東青在先前那棵針葉松下等著，見樊長玉背著謝徵回來，忙小跑著上前：「阿姐。」\n樊長玉背著一個人，沒法再抱胞妹，一滴汗自額角滑下，浸過臉上被擦傷的地方，火辣辣地疼，她上下打量一番長寧問：「寧娘有沒有受傷？」\n長寧搖頭，看到她背上的人已經不省人事，眼眶就是一紅，哽咽道：「姐夫護著寧娘受傷了……」\n他帶自己破招時掌心溢出的血現在還殘留在她手上，像是被火燎過一樣滾燙，樊長玉心口泛起一絲澀意，她道：「別哭，我們帶他回去看大夫。」\n她似乎永遠都是冷靜、穩沉的。\n但長寧只要聽到長姐這麼說話，就心安了，什麼也不再怕。\n爹娘去世時，她哭得犯了病，幾乎喘不過氣來，也是長姐在床邊抱著她說：「別怕，你還有阿姐。」\n小長寧看著長姐被壓彎的背脊，用袖子狼狽抹了一把眼，抱著海東青在雪地裡深一腳淺一腳跟上了樊長玉的步子。\n-\n「這是我第二次把你從雪地裡背回去了。」\n「謝謝你。」\n謝徵意識混沌中聽見有人在同自己說話，這聲音他很熟悉，但一時想不起來是誰。\n眼皮太重了，腦子裡幾乎散成了一團漿糊，已沒辦法思考，整個人像是在無邊的暗色裡沉沉往下墜，陰寒的冷意直往骨頭縫隙裡鑽。\n抗拒這下墜的力道實在是艱難，順其自然整個人似乎瞬間就輕鬆了。\n「徵兒。」\n又有人在喚他。\n他其實已記不清那個溫婉婦人的音容相貌了，但每每夢見，他又知道是她。\n她來入夢做什麼？\n她不是不要他了麼？\n謝徵不想回答她，視線卻又不受控制地往前方看去，那婦人站在侯府後花園處，笑吟吟地牽著一個孩童的手，看院子裡練拳法的英武男子。\n「徵兒的父親是個頂天立地的大英雄，將來徵兒也要成為你父親那樣的人。」\n謝徵見那婦人言笑晏晏地望著自己，這才驚覺自己竟成了那個孩童。\n他還是不說話，只盯著婦人那張在夢裡再清晰不過、醒來腦海裡卻又只剩一個模糊輪廓的臉。\n他想她，但是她去得太早了，早得讓他連她模樣都記不清。\n院子裡練拳法的男子不見了，變成一尊棺木叫人從錦州戰場送了回來。\n那個婦人一身素縞伏在棺木前哭得肝腸寸斷，一屋子的丫鬟婆子都攔不住她。\n畫面一轉，她換了新衣，坐在銅鏡前描眉，遠山一般的黛眉輕蹙著，極美的一張臉，但任誰也看得出她不開心，她說：「他怎麼就不守信呢，說好了要回來替我畫眉的。」\n像是閨中少女約了心上人見面，對方卻食言未曾赴約而暗惱。\n她看到了他，笑著招呼他過去，謝徵沒動，一個四歲左右束著小金冠的幼童穿過他跑了過去，她遞給那幼童一盤桂花糕，嗓音一如既往地溫柔：「徵兒，桂花糕好吃嗎？」\n他終於開口，幾乎是帶著恨意地道：「不好吃。」\n那婦人像是根本聽不見他的話，抱起那幼童坐在自己膝上，溫柔的聲音變得很遙遠，「徵兒將來要成為你爹那樣頂天立地的大英雄。」\n「乖，去外邊吃桂花糕吧。」\n然後她點了妝，穿著她最好看的衣裳，只素著一對眉，用一根白綾將自己掛到了梁上。\n她的將軍不守信沒回來給她畫眉，她去尋他了。\n僕婦們撞開門，哭聲一片，那孩童站在門口，望見的只是半截掛在空中的豔麗裙擺。\n又一次從這個噩夢中掙扎著醒來，謝徵渾身幾乎叫冷汗溼透。\n瀰漫在唇齒間的是一股讓人舌根發麻的藥味，入目便是打著補丁的床帳，床邊逆光站著一個人。\n謝徵側目看去，就見那樊長玉神色震驚又有些茫然地看著他，手上捧著個藥碗，但另一隻手裡拿的藥匙已經不見了蹤影。\n謝徵視線低垂，在地上看到了那摔成一地碎瓷的藥匙。\n對方吶吶道：「藥肯定是不好吃的啊……」\n謝徵：「……」\n噩夢後比平日裡急促了不少的呼吸突然沒那麼喘了，那點陷在夢境裡的惡劣情緒也因她那句話奇蹟般地被壓了下去。\n他皺著眉，心情微妙地看了坐在床邊的女子一眼，強撐著坐起來，向她伸出蒼白瘦長的手：「給我。」\n他這張臉，哪怕一副病弱模樣，也是極好看的。\n樊長玉愣了一下，才反應過來對方是要她手中的藥碗。\n她瞥了一眼他手上纏著的紗布，好心提醒：「你這隻手叫劍劃出了兩道好深的口子，虎口也撕裂了，大夫說了眼下不能著力。」\n他換了另一隻手，樊長玉才把藥碗遞了過去。\n謝徵一口悶了那碗氣味令人作嘔的藥汁，把碗還給了她。\n樊長玉想起自己之前在他半昏迷時給他強灌藥汁，他咬牙切齒吼出的那句「不好吃」，心說這人平日裡悶不吭聲的，原來竟是個怕苦的。\n她從袖袋裡掏了掏，摸出一塊哄長寧的飴糖給他：「吃塊糖就沒那麼苦了。」\n謝徵喝了那麼多次藥，這是她唯一一次給糖，他就是個傻子也能猜到是為何，臉色頓時不太好看，他閉上了眼：「不用。」\n但下一瞬，就被人攥住下顎用巧勁兒迫使他張開了嘴，那塊飴糖就這麼被餵了進去。\n「你！」他怒目而視。\n樊長玉笑眯眯坐回遠處：「甜吧？怕苦又不是什麼丟人的事，你這個人啊，總是莫名其妙地犯倔！」\n可能是她身後的窗戶裡有冬陽淡淡的暖光照進來，以至於她那個笑容看起來格外明媚溫暖。\n——至少比他夢中見到的那個已記不清模樣的婦人的笑容溫暖得多。\n飴糖在唇齒間化開的絲絲甜味，驅散了縈繞在舌尖的清苦，像是長著斑駁溼蘚的陰霾之地也照進了豔陽。\n謝徵突然就禁了聲，偏過頭去，抿緊唇不再說話。\n他已很久不吃甜食了，自那個婦人哄他去外邊吃完一碟桂花糕，回來她卻已用一根白綾赴黃泉後。\n這些年裡，他心底一直深藏著一份怨恨和自厭。\n當初沒端著那碟桂花糕出去吃就好了，他一直守在她身邊，也許她就捨不得離開的。\n他厭惡桂花糕，厭惡甜食，久而久之，身邊的人便都不再呈給他了。\n樊長玉發現了他情緒低沉，但又不知其中緣由，便只囑咐道：「你這次的傷不比前一次輕，大夫再三交代了，一定要好生休養，至少傷好之前是不能再掂拿重物了。家裡死了不少人，官府正在查案，這段時間是沒法回去住了，先借住趙大娘家這閣樓養傷吧。」\n謝徵醒來就已瞧見了這是他之前在趙家養傷的閣樓，聞言只輕點了下頭。\n樊長玉頓了頓，又說：「謝謝你護著長寧。」\n這道話音和謝徵意識混沌前聽到的那一聲重合起來，他這才確定之前那並非是自己的幻聽。\n當時她似乎還說了一句話。\n「這是我第二次把你從雪地裡背回去了。」\n第一次受傷時，謝徵昏迷不省人事，這一次，他人雖昏沉著，卻隱隱有些意識。\n他能感覺到馱著自己的那道背脊有多單薄。\n以至於他此刻再看樊長玉，瞧見她瘦削的肩背和袖口下方隱約露出的一截紗布時，心口像是堵了一團溼棉花，窒悶又帶著潮意。\n她背他回來時，她身上也是有傷的。\n他動了動蒼白乾裂的唇，說：「你救我在先。」\n只這一句，便沒了下文，似乎潛意識裡不太想把這份恩情分得太清。\n那些人破門而入時，他以為是姓趙的暴露了，引來了殺手，但那些人除了想殺他和那小孩，只差把樊家掘地三尺了，顯然是在找什麼東西。\n想到從雪地裡撿起的那塊腰牌，謝徵眸色更沉了些。\n他問：「官府那邊查出什麼了嗎？」\n樊長玉搖頭，將那一日還有不少人家也遭此橫禍的事說了。\n樊大的死算是跟她半點關係沒有了，縣衙那邊已順利讓她過戶了她爹娘留下的所有房屋地契。\n手上銀錢寬裕了，這大概也是她眼下唯一值得舒心的事，至少給言正請大夫不用捉襟見肘了。\n謝徵聽聞縣裡還有其他人遭難，凝眉沉思了片刻，忽而問：「那些跟樊大一樣被殺的人，有什麼共同之處嗎？」\n樊長玉想了想，搖頭道：「一共是七戶人家遭了難，死者有男有女，有老人也有小孩，沒什麼共同之處。」\n謝徵鎖著眉一時沒有應聲。\n那些人一共找了七戶人家，最後卻只鎖定了樊長玉一家，顯然一開始是大範圍在找什麼，從樊大口中問出了想要的才找上了樊長玉姐妹。\n他以樊家中的情況逆推，猜了一個緣由問：「那些人家中可有從前在外謀生，後來才回臨安鎮的人？」\n樊長玉覺著若當真是這樣，那八成真是找她爹娘尋仇的了，只是她想不通，自己爹娘已故，那些人為何還不罷休，道：「我回頭問問王捕頭。」\n等樊長玉離開閣樓後，謝徵才強撐起身體，從堆放在床頭矮凳上那堆滿是血汙的衣物裡，摸出了他從雪地裡撿起的那塊腰牌。\n拿在手上擰眉看了一會兒，捏回了手心裡。\n那腰牌，是魏家死士所有。\n天地玄黃，此次前來的竟是玄字號的死士。\n可這些人又不是來殺他的，甚至壓根沒發現他躲在這裡，那頭目在最後關頭才認出了他。\n但為何認出他後是那樣一副神情，當即就自絕了？\n擺在眼前的謎團越來越大，唯一能揭開謎底的，似乎只有那女子父母真正的身份了。\n她那一身武藝尚且如此高強，她父親應當也不是泛泛之輩，只怕並非死於普通山賊之手，也是死於喬裝成山賊的死士之手。\n她母親牌位上那個沒有姓氏的名字背後也有乾坤麼？\n謝徵按了按眉心，有心想傳信給舊部，讓他們暗中查一查那女子父母的來歷，眼角餘光瞥向了翅膀上纏著紗布，正趴在樓板上大快朵頤一碗切碎的豬肉的海東青。\n那碗碎肉是樊長玉切的，海東青救了長寧，夥食從豬下水升級成了鮮肉碎。\n它在雪地裡滾過好幾圈，毛色總算是又白回來了，此刻張大了嘴喙剛叼起一大塊肉，一抬頭就見謝徵正盯著自己。\n海東青一雙豆豆眼同主人對視著，僵持了片刻，嘴邊的肉終究是「啪嗒」一聲掉回了碗裡，傻氣又無辜地看著他。\n謝徵冷著臉移開視線。\n罷了，魏家鷹犬已注意到了這邊，也不指望再用這蠢東西去送信。\n那姓趙的商人若當真是來投奔他的，倒是能借他名下商鋪將信件神不知鬼不覺地送出去。\n距新年還有幾日，他讓對方在年前將那銀票換做二十萬石米糧，想來過不了多久便會有回覆了。\n口中的飴糖化完了，舌尖只剩一股淡淡的甜味兒。\n他這才往窗外看了一眼，糖他已吃完了，給他糖的人卻還沒回來。\n-\n樊長玉去縣衙一趟，將謝徵說與她的思路告知了王捕頭，王捕頭聽後卻只沉默搖了搖頭，說：「這案子已經結了。」\n樊長玉詫異：「幕後兇手都還沒找出來，怎麼就結案了？」\n王捕頭道：「死在松林裡的那些人就是兇手，他們是清風寨的山匪，年節裡山匪謀財害命，再常見不過。」\n樊長玉心說那怎會是山匪呢，對方明顯是有備而來，本想爭辯一二，觸及王捕頭的眼神，到了嘴邊的所有的話又都咽了回去。\n她倒也不難猜測縣衙為何這般急著結案。\n馬上就要過年了，突然出了這麼多樁命案，且不說百姓怨聲載道，縣令向州府那邊也不好交差，必須需要儘快找到一個理由結案。\n剛好那些蒙面人又是山匪打扮，眼下死無對證，說是匪賊謀財害命，自然是最好的理由。\n縣令只需要貼一張告示說近日山匪猖獗，讓全城百姓都外出當心些，便安撫了民心。轉頭再寫一封請求剿匪的摺子遞去州府，其他責任也能推得乾乾淨淨。\n畢竟清風寨匪患多年未除，已是薊州一大結症。\n王捕頭只是一個小捕頭，縣令那頭施壓要結案，他又能說什麼。\n樊長玉心情有些沉重地向王捕頭辭行，王捕頭送她走到門口時，說了句：「要不你變賣了你家鄉下的豬棚和房地，先去別處避一避，我估摸著，是你爹早年在外邊走鏢得罪了什麼人。」\n樊長玉知道王捕頭是好心，向他道了謝說會回去好好考慮，心下卻有一瞬茫然起來。\n離開麼？\n她在臨安鎮住了十幾年，從鎮東頭的一塊石頭到鎮西邊的一棵樹，她都是熟悉的。\n留在這裡，她或許還有機會查清爹娘真正的死因，但再來這麼一場刺殺，她和胞妹能不能活命都不敢保證。\n背井離鄉，去外面闖蕩她是不怕的，只是爹娘葬在這裡，她和長寧的根便也埋在了這裡，離開她肯定是有些捨不得。\n走出縣衙大門後，樊長玉紛亂的思緒便已平靜了下來，她看了看雪後的長空，深深吐出一口濁氣。\n留得青山在，不怕沒柴燒。\n等言正的傷好些，她就同他說離開清水縣的事吧，他若不怕再有仇家來尋仇，願跟著她一起走，她就捎上他。他若有旁的打算，一紙和離書一寫，再給他些盤纏，她們二人也就算兩清了。\n-\n樊長玉回鎮上後便去肉鋪裡收拾了些東西，年後是鋪子轉讓的最佳時期，既然打算要走，就先把鋪子和鄉下的豬棚田地轉賣了。\n宅子樊長玉打算留著，將來若是回來，還有個歸處，那是她和爹娘住了十幾年的地方，樊長玉捨不得賣。\n她在鋪子裡乒桌球乓收拾東西，路過的人以為樊家肉鋪又開起來了，瞧見案板上沒擺東西，還有探頭問何時再開張的。\n樊長玉怕節外生枝，沒把要轉讓鋪子的事這時候嚷嚷出去，只說打算年後再開。\n正收拾著，鋪子外有人扣門，樊長玉頭也沒抬地道：「今兒不做生意。」\n門口傳來一道蒼老的話音：「我這老頭子的生意也不做了？」\n樊長玉抬頭一看，見是溢香樓的李廚子，有些歉疚地道：「抱歉李師傅，近日家中出了些事，到年底我都不打算開這鋪子了。」\n李廚子聞言擺擺手：「是我們東家想見見你。」：，，.`

            title: `第24章第24章`,
            content: `樊長玉跟著李廚子去了一趟溢香樓,進門便瞧見一道氣派十足的山水屏風，地上鋪著上好的雕花青磚，門窗上亦是雕琢了各式各樣的鏤空花草獸禽。\n這會兒不是飯點,樓裡沒什麼客人，一眼望去，光是底下大堂裡就已擺了十幾張鋪著綾羅綢布的大圓桌，那些椅子也很講究，並不是光禿禿的，而是都放置了配套的繡花軟墊和背枕,瞧著就氣派。\n無怪乎鎮上人都稱溢香樓為第一樓。\n李廚子引著樊長玉到了樓上一件雅間,道：「東家就在裡面，丫頭進去就是。」\n樊長玉遲疑片刻，推門而進，跟屋子擼起袖子拿著個醬肘子啃得正歡的年輕婦人大眼瞪小眼。\n那婦人跟前還擺了滿滿一桌的山珍海味。\n樊長玉又看了一眼門口，不太確定道：「您是溢香樓東家？」\n婦人放下手上的醬肘子,飛快地掏出帕子擦了擦臉上沾到的肘子油,輕咳一聲道：「你就是長玉了吧？隨意坐。」\n這話一出口，樊長玉便知這就是溢香樓東家了，她心說跟她想像中不太一樣,不過瞧著倒是挺和善的。\n她落座後道：「您認得我？」\n婦人笑著說：「聽李師傅提起過你，你做的滷子是一絕。」\n許是聽說過樊長玉去王記理論的事，她打量著樊長玉，露出一個笑來：「沒見你之前,倒是不知你竟是這麼個嬌嬌俏俏的漂亮姑娘。」\n樊長玉不知如何作答,只回了一個淺笑。\n那婦人笑眯眯的：「我姓俞,閨名淺淺,比你年長几歲,就佔你個便宜叫你一聲長玉妹妹了。想來你也知道，溢香樓跟王記的滷肉生意停了，你鋪子裡的滷肉，我也差人買來嘗過，確實比王記的強些。你若是有意，我想跟你做這筆滷肉生意。」\n這天降之喜，放在從前樊長玉是求之不得的，想到如今家中的處境，她思量片刻，還是婉拒了：「多謝俞掌柜看中，但這筆生意我委實是接不了了。」\n俞淺淺「誒」了一聲，問：「為何？」\n樊長玉如實道：「年後我就打算離開臨水鎮了。」\n俞淺淺直道可惜，又問：「那你可想好去哪兒了？」\n這個樊長玉確實還沒想好，便只道：「還在同我夫婿商量。」\n俞淺淺蔥白的指尖輕點著桌面，似有些惆悵地道：「你家的滷味沒了，那這鎮上就又少一美味了。」\n這話有些玩笑的意思在裡邊。\n樊長玉雖是第一次見這位女掌柜的，但覺著她很是親切，想著自己若帶著胞妹背井離鄉，再回來也不知是何年月，便道：「俞掌柜若是喜歡吃那滷肉，我把滷料方子教與掌柜的，掌柜的讓底下人做就是。」\n俞淺淺如今雖是酒樓掌柜了，但從前自己也是幹庖廚的，知道一個方子有多金貴，忙說不可，她有些無奈地看了樊長玉一眼：「你這丫頭，還真是實心眼，真要去了外鄉，可得留個心眼兒，別幾句話就把你自己都給賣了。」\n樊長玉能感覺到這位女掌柜的善意，笑著道：「不會，我願意把方子給掌柜的，是覺著掌柜的瞧著面善。」\n俞淺淺被她逗笑了，想了想說：「你看這樣行不行，我這樓裡快過年這幾天生意是最忙的，包席都排滿了，要的滷肉量確實也大，那些老饕一張嘴挑剔得很，最近一直說我樓裡的滷肉味道不如從前了。王記那邊做生意不厚道，先前背刺過我，如今又踩著溢香樓的名號跟其他酒樓合作上了，我是萬萬咽不下這口氣再去找王記的，要不你先幫我供給樓裡年前的滷肉，年後我再想辦法補上這個缺。」\n樊長玉沉思了片刻，想著去一個新地方還得置辦房屋宅院什麼的，少不得花銀子的地方，賣了鄉下的豬棚田地和城裡的鋪子，那點銀子也不一定夠，現在能再攢點銀子自是最好的，便點頭同意了。\n俞淺淺顯然極為高興：「你這也算幫我解了燃眉之急，溢香樓從前跟王記合作，定的是一年的單子，不論淡旺季，滷味都是按五十文一斤買進。過年這兩日肉價貴，我便算你六十文一斤，溢香樓一天至少能賣十個滷豬頭，你家中鍋灶若是不方便，可以直接到酒樓後廚滷，工錢日結。」\n樊長玉自家已被官府查封，確實不方便，他點了頭：「我在酒樓後廚現滷吧。」\n此時已臨近下午，樊長玉去一趟肉市，帶著溢香樓的小廝買了十個鮮豬頭。\n她家從前就在那邊開豬肉鋪子的，那條街肉鋪裡的屠戶基本上都認識她，見她買那般多豬頭，不免問一句：「長玉鋪子裡明日又要賣滷肉了？」\n跟著她去買肉的溢香樓小廝是個極為機靈的，當即就道：「樊姑娘的滷肉現只在我們溢香樓賣了。」\n溢香樓在鎮上可是個大招牌，就連王記爆出跟溢香樓的生意黃了後，在鎮上口碑都大不如前了。\n不少熟人都恭喜樊長玉。\n她家的豬肉鋪子不開了，旁的屠戶鋪子裡生意才好了起來，樊長玉去跟他們買豬頭，他們開的價錢都特地按便宜了算。\n市場上一個鮮豬頭二十文一斤，重六七斤左右，樊長玉買只要十八文一斤。\n借用溢香樓後廚的滷料和鍋灶，那定製的大鍋一鍋就能滷四五個豬頭，兩口鍋就能把所有豬頭滷完，而滷一整鍋的滷料加起來本錢不過三十文。\n樊長玉粗略算了算，她滷好這兩鍋豬頭肉，往少了算也能淨賺二兩五錢銀子左右。\n一時間心裡有點懵。\n她自己在鋪子裡賣時，每天起早摸黑忙活，賣肉時還得同買菜的大娘討價還價廢不少嘴皮子，一整天下來賺到的銀子刨去工本費，也只有二兩銀子左右。\n現在只要抽出一兩個時辰，去市場上選好豬頭肉再來溢香樓滷上，就能賺到這筆銀子，比從前輕鬆了不知多少倍。\n她想起那位女掌柜給自己開了六十文一斤的價，一時間心裡有點過意不去，找到同在後廚吊湯的李廚子，「李師傅，您回頭幫我跟掌柜的說一聲，這滷肉也按五十文一斤給我算錢就是了。」\n李廚子皺著張老臉問：「怎了？」\n樊長玉不好意思撓撓頭：「東家人好，但我覺著這錢給的太多了些，心裡不踏實。」\n李廚子睨她一眼：「東家給你開了這個價，便是覺著你家的滷肉值這個價，有什麼不踏實的？別看東家年輕，眼光老辣著呢，雖說這回遭了王記的黑手，但從前跟王記合作那會兒，也是穩賺不賠的，把你的心放回肚子裡去。」\n樊長玉好奇問：「王記跟樓裡的生意怎麼回事？」\n李廚子提起王記嘴裡就沒一句好話：「那眼裡只看得見錢的缺德老東西，東家先前在縣城裡打算再開一個酒樓，把溢香樓做大，跟王記定了十二個豬頭以示吉利，王記那邊答應得好好的，怎料開業當天，王記卻遲遲沒送豬頭來。」\n「東家遣人去王記催，王記那邊豬頭都還沒買回來呢！原訂的豬頭叫縣城裡另一家酒樓花高價買走了，還跟王記也定了好幾年的滷肉生意。開業誤了送豬頭的吉時，這是犯了多大的忌諱？東家氣得夠嗆，當天就停了樓裡跟王記的所有生意。」\n樊長玉未料到溢香樓跟王記斷了生意往來竟是有這層原由在裡邊，再想起王記少東家那副嘴臉，不免道：「王記也太不厚道了些。」\n李廚子冷哼：「見利忘義的小人。」\n他話風一轉：「我聽說王記還僱人去砸你店了？」\n樊長玉說：「他兒子找人砸的，不過我自個兒去討回公道了。」\n李廚子突然看著她笑了起來：「怪不得東家說喜歡你這丫頭，你這性子啊，有些地方跟東家還真是像。」\n樊長玉不太好意思，「東家是有本事的人，我哪能跟東家比。」\n李廚子卻嘆了口氣：「東家也是苦過來的，她當年大著個肚子來到臨安鎮，舉目無親，境遇還不如你呢。」\n樊長玉往常聽得最多的便是溢香樓掌柜如何厲害，這還是頭一回聽人說起她的過去，疑惑道：「東家的夫婿呢？」\n李廚子只是搖頭：「聽說是死了。」\n樊長玉不免唏噓，李廚子又看了她一眼：「樓裡這兩天生意忙，東家手邊事多如牛毛，那十文滷肉的差價，東家還沒放在眼裡，你也莫拿這事是去找東家了，東家是個爽快性子，忸怩做派反而會讓東家覺著麻煩。」\n他話都說到這份上了，樊長玉自然也打消了去尋俞淺淺的事。\n滷好肉出了溢香樓，天色已不早了。\n樊長玉想著之前買給胞妹的那包飴糖快吃完了，拿著日結的二兩七錢銀子，財大氣粗地進了糖果鋪子，飴糖、松子糖、橙皮糖各買了兩包。\n一想起言正竟然是個怕苦的，她嘴角就不自覺往上翹了翹。\n他疼都不怕，竟然怕喝苦藥。\n到家時，趙大娘已經煮上飯了。\n長寧跟個望姐石一樣，在門口扒拉著門框伸長了脖子往巷子外望著。\n發現樊長玉拎著大包小包回來，立馬跟個小圓球一樣，一顛一顛地跑過去接她：「阿姐回來了！」\n拎過紙包，發現裡邊好幾大包糖果，抬起一雙亮晶晶的圓眼問她：「都是寧娘的？」\n對上胞妹那期待的小眼神，樊長玉沒來由生出幾分心虛：「你姐夫喝藥怕苦，分給你姐夫一半？」\n之前一說「姐夫」兩個字，她就渾身不自在，這會兒哄起長寧，這兩字說出來倒是沒那麼燙嘴了。\n長寧很大方地「嗯」了一聲，她也經常喝藥，皺巴著一張圓臉道：「黑糊糊可苦啦！」\n黑糊糊是她對藥的特稱。\n趙大娘出來倒水，聽到了姐妹二人的對話，笑呵呵對樊長玉道：「知道疼相公了？」\n樊長玉的厚臉皮不免也被打趣得窘了一下。\n正好藥已經煎好了，樊長玉把幾包糖果拿上閣樓時，順手把藥碗也帶了上去。\n裡邊的人沒睡，她一進門，對方就看了過來，問了句：「回來這般晚？」\n很尋常的一句話，但莫名又有些怪怪的。\n「縣衙那邊有什麼新線索嗎？」他很快找補了一句。\n怪異的氣氛總算消退了幾分。\n樊長玉把藥碗遞過去，說：「已經結案了。」\n謝徵詫異抬眸，見她面上神色，瞬間便明白了大半。\n樊長玉說出自己的猜測：「大概是新年裡遇上這麼大幾樁命案，縣令怕烏紗不保，才急著把兇案扣到山匪頭上吧。」\n謝徵沒作聲。\n那塊腰牌是魏家的，如果是魏家想快速壓下這件事，讓州府給縣令施壓結案也不無可能。\n但不管怎樣，魏家已盯上了臨安鎮這塊地，不宜再久留。\n他看向樊長玉：「若是尋仇的，只怕後邊還會再來，你如何打算的？」\n樊長玉本想等他傷好些再同他說離開的事，此刻他主動問起，她便道：「我準備過完年就變賣家產，帶著寧娘先去別處躲一陣。」\n謝徵聽完後卻道：「要走宜早不宜遲。」\n他很清楚那人的手段，這麼多玄字號的死士都折在了臨安一個小鎮，肯定會引起那人的重視。\n樊長玉說：「離過年只差個幾日了，我在溢香樓接了個幫他們年前制滷肉的活兒，這幾日能賺點銀子，變賣家產各種文書過戶也需要時間，正好可以等到你傷好些後再動身。」\n話趕話都說到這兒了，她不免也得問他的打算：「你是如何想的？」\n謝徵以為她是在徵求自己的意見，正想勸她要走就儘快，話到了嘴邊才反應過來，她問的是他的去留。\n離開麼？\n沒來得及權衡任何利弊，他下意識地遲疑了片刻。\n樊長玉說：「我爹娘早些年在外邊估計是結了仇家，你跟著我一起走，可能還會被仇家找上。我想的是把和離書寫與你，再留一筆錢財給你當日後的盤纏，大娘和大叔都是極好的人，我會託他們照顧你到傷好。」\n趙大娘和趙大叔膝下無兒女，早年有個兒子徵兵被抓去打仗，後來再也沒回來，聽說是死在外邊了。\n樊長玉打算把鄉下的田地留一些給他們，方便他們向佃戶收租，這樣老兩口以後也有了保障。\n至於把言正也留在這裡，純粹是怕他再因自家的事受牽連。\n謝徵聽著她替自己計劃好的一切，心頭沒來由升起一股躁意，嗓音也不自覺冷了幾分：「我有我的打算，你不必替我操心。」\n樊長玉不知哪兒惹到了他，困惑盯了他一眼。\n謝徵也意識到自己方才語氣不對勁兒，他輕瞌上眸子，再睜眼時神色已平靜了下來，「你要走，最好是今明兩天，不必特地去辦路引，跟著商隊最為妥當，過城門之類的，能不留下戶籍信息就不留。」\n樊長玉就是再蠢，也知道這是為了隱蔽行蹤。\n她問他：「那你是打算跟我一起走，還是暫時留下養傷？」\n她這般直白問出來後，謝徵明顯愣了一下，眸色的眸子裡映著少女和燭光的影子，好一會兒他才避開視線說：「先同你一起走。」\n臨安鎮對他來說也不安全了，魏家死士在她家掘地三尺找的東西，他著實也好奇。\n做這樣的選擇，只是這兩個緣由罷了。\n樊長玉一聽他說的那個「先」字，便也明白了他的意思，他傷好後還是會離開。\n她說：「那行，我明日再去縣衙一趟，折價把鋪子和鄉下的豬棚抵給官府。」\n田地買賣，若直接賣給買家，價錢自然高些，只需要去官府過戶再給個制契書的錢。\n急於用錢的才會折價抵給官府，官府拿著低價收來的房地，轉頭還是會按市場價賣給有需要的人。\n溢香樓那邊，直接把方子給那掌柜好了。\n謝徵覺著那些死士要找的東西八成還沒找到，問：「你爹娘有什麼遺物要一併帶走的嗎？」\n樊長玉幾乎是理所當然地道：「肯定有啊！」\n謝徵眼底閃過一絲不易察覺的異色。\n緊接著就聽樊長玉道：「那套殺豬刀我去哪兒都得帶著，靠著那套傢伙我可以繼續殺豬謀生，路上若是遇上宵小，也能防身！」\n謝徵：「……」\n不過他的話倒也提醒了樊長玉，她說：「縣衙那邊已經結案了，但不知何故，我家大門上貼的封條到現在還沒官差來撕，一會兒我翻牆過去把地契拿出來。」\n謝徵眸色微動，說：「那日殺進你家的那些蒙面人，把你家屋內青磚都撬開好幾塊，似在找什麼東西。」\n樊長玉想不到自家還有什麼值錢物件了，她皺著眉道：「總不能也是為了找地契？」\n謝徵：「……應該不是。」\n樊長玉看了一眼窗外天色：「等天黑我就翻牆過去找找。」\n大白天的翻牆容易被人瞧見，她家現在也稱得上是個兇宅了，被封后非官府人員不能進去，萬一她翻牆被人告了，又得攤上事。\n謝徵問：「你爹娘從前就沒同你說過，有什麼是逃命也得帶上的？」\n樊長玉道：「我胞妹啊。」\n謝徵：「……」\n他修長的指節按了按眉心，突然就不想說話了。\n樊長玉見他藥碗還沒喝，倒是催促了一句：「藥再不喝就涼了。」\n藥放到現在，確實已經不燙了。\n謝徵端起碗喝了個乾淨，那頭立馬有人笑眯眯遞過來一顆橙皮糖：「這個我嘗過了，酸甜酸甜的，也能解苦味。」\n她那隻手很白皙，五指修長，不同於那些嬌養出的女子柔弱無骨，也不同於男子有突出的指節，像花和木有各自的筋骨區分，而她是界於兩者之間的另一種好看。\n橙色的陳皮糖躺在她手心，還沾著一層淡淡的白色糖霜，叫暖燭一照，謝徵腦子裡不合時宜地跳出了「秀色可餐」一詞。\n這個詞用在樊長玉身上……他自己都沉默了。\n不想腦子裡再浮現這些奇奇怪怪的想法，他撿起那顆陳皮糖丟進了嘴裡，繃著臉道了句：「多謝。」\n樊長玉以為他是怕苦覺著丟臉，心說這股彆扭勁兒還怪好笑的。\n她拿著空碗起身：「那我先下去了，一會兒再給你端飯上來。」\n門帘子一晃，人出去後，謝徵才皺著眉瞥了一眼自己拿陳皮糖時擦過她掌心的指尖。\n酥癢的厲害，還有些麻麻的。\n-\n樊長玉下樓就見胞妹拿著什麼東西在餵那隻矛隼，「給你吃……」\n那隻矛隼已經被逼到了角落裡，縮著纏了紗布的翅膀死活不肯張嘴，瞪著一雙驚恐的豆豆眼，頗像個被惡霸調戲卻又無力反抗的良家少女。\n樊長玉問：「寧娘在餵什麼？」\n長寧被姐姐抓包，心虛地把手背到了身後：「沒……沒什麼？」\n樊長玉看著她不說話，長寧最怕長姐這樣，頓時就乖乖把手伸了出來，低著頭小聲道：「我給隼隼餵了一顆糖。」\n糖可是稀罕東西，把糖拿給這隻大隼吃，肯定會被罵的。\n樊長玉看著胞妹這模樣，哪還捨得說重話，哭笑不得道：「矛隼不吃糖，它吃肉的。」\n長寧瞪             content: `夜幕深沉,北風吹得破舊的窗葉吱嘎作響。\n這樣的天氣，總容易讓人催生出一股鑽被窩的**。\n尤其這被窩已經被人睡得熱烘烘的，正散發著誘人的暖意。\n樊長玉攏了攏手臂,靠著床柱閉目小憩，耳朵卻一直聽著樓下的動靜。\n等趙大娘和趙木匠睡下了，她也趕緊回家拿了地契就扛著棉被過來打地鋪。\n自昨日樊大出事後，她幾乎就沒怎麼合過眼，身體其實已經很累了，只是精神一直緊繃著,不敢鬆懈片刻。\n身側的人呼吸一直很淺,不知是不是他吃了陳皮糖的緣故，樊長玉隱約能聞到他身上一股淡淡的陳皮清香。\n她下意識又想起了在松林時，他抓著自己的手教她出招在她耳邊說話時落下的吐息。\n耳朵莫名變得有些燙，不過還好在夜色裡什麼都瞧不出來。\n樊長玉想揉揉耳朵，手還沒抬起來,身側的人忽而無聲地坐起,不待她反應，一根修長只帶了點淡淡溫度的手指已抵在了她唇間，對方長發垂落下來,拂過她手背，帶起一陣輕微的酥癢和涼意。\n他靠她極近，身上那股陳皮的香味愈發濃烈。\n樊長玉先是一驚，聽到瓦片上傳來的貓兒一樣輕盈的腳步聲後,瞬間豎起了耳朵。\n謝徵見狀,未出一言,只收回了抵在她唇間的食指。\n指側觸到的那一抹紅,溫潤,柔軟，嬌嫩得像是清晨帶著露珠的花瓣。\n他微微擰眉，用力摩挲了一下指尖那一片發燙髮麻的肌膚，壓下心頭所有異樣。\n屋頂傳來的腳步聲輕盈而凌亂，似乎不止一人，片刻後一些腳步聲在不遠處停了，聽距離，是樊家的屋頂。\n一些則繼續往前，在趙家屋頂停了下來，隨即響起瓦片被撥動的輕微細響，一根極細的竹管從瓦縫裡伸了進來，飄出一股青煙。\n二人用衣領掩住口鼻在黑暗中借著窗戶透進來的淺暗昏光對視了一眼。\n破舊的窗戶傳來一陣響動，一道黑影無聲地潛了進來。\n樊長玉和謝徵分站在床帳兩側，原本還無聲地比劃著怎麼在那黑影靠近床榻後神不知鬼不覺地了結了對方，在接二連三從窗戶那裡潛進七八個人後，二人沒有任何計劃了。\n房間狹小，對方很快就能發現他們。\n樊長玉唇抿得緊緊的，不動聲色摸出了自己貼身藏著的一把剔骨刀。\n一名黑衣人持刀狠厲向著床榻砍去，刀砍進被褥鈍感讓他瞬間變了臉色：「有詐！」\n緊跟著腰腹一涼，一道人影快速從床帳側面竄過，一個猛頭扎向了窗戶，發出「砰」一聲大響。\n外邊一個順著綁在屋頂的繩索滑下來還沒進屋的黑衣人，直接被屋內竄出去的那道人影一併撞飛，當作肉墊砸在院子裡，地上的青磚都裂開了好幾塊。\n那人很快爬起來，竟是名女子。\n她趁地上的黑衣人摔懵了，趕緊一個大巴掌掄過去，黑衣人當場被扇暈了，那女子則撿起黑衣人的佩刀拔腿就往院外跑。\n這一切不過發生在瞬息之間，屋內的一眾黑衣人都看懵了，反應過來後連忙大喝：「追！」\n一群人下餃子一樣跳窗追了出去。\n躲在床帳另一側的謝徵未料到樊長玉竟隻身去犯險，隨即也明白她是為了保護自己和樓下的老夫妻同她胞妹，才故意去引開這些黑衣人的，心頭一時有些發沉。\n在屋內最後幾個黑衣人準備跳窗時，他指尖彈出一顆晶瑩剔透的陳皮糖。\n剛跳出窗外的黑衣人被打穿膝窩，整個人在空中失衡直接摔了下去。\n其餘幾人聽到身後的動靜，這才驚覺房間裡竟然還有一人，他們已是死士中的佼佼者，進屋後這麼久都沒發現他的存在，對方閉氣的本領那得是何等登峰造極？\n一時間也不敢掉以輕心，轉身劈刀就向他砍來。\n又是幾顆陳皮糖從謝徵指間彈出，打在那些人手肘、膝彎、腰腹的穴位上，讓他們動作慢了一拍，只慢這一息，就足夠讓他奪刀取命。\n解決了兩個黑衣人，手中奪來的刀已架在了受傷的那名黑衣人脖頸上。\n那名黑衣人正捂著自己腰側，滿手都是血。\n方才划過他腰腹的利器，尖而細長，不像是匕首，不知是什麼兵器，此刻被血刃抵住了脖頸，一時間也不敢妄動。\n謝徵正欲打暈了這人，暫且留個活口出去幫樊長玉。\n卻見巷子外的大街上忽而火光灼灼，馬蹄聲踏破整個夜幕裡的沉寂，步兵跑動時甲冑碰撞聲和腳步聲交織成一張羅網，「嗖嗖」的箭鏃聲聽得人心頭髮寒。\n追著樊長玉的那些黑衣人直接被亂箭射成了個篩子。\n謝徵微微皺起眉，心中疑慮重重。\n清平縣並無駐地營，這些官兵是如何這般快出現在清平縣下一個小鎮的？\n眼見樊長玉已安全，他也歇了追出去的心思，五指在自己制住的黑衣人下顎處一扣，逼他吐出了藏在齒間的毒囊，刀鋒下壓，寒聲問：「魏嚴派你們來尋何物？」\n黑衣人見他這般了解魏家死士□□囊的地方，細辨了一番他的聲音，不太確定道：「侯爺？」\n尖刀又往下壓了幾分，火光從被撞毀的窗欞透進來，經刀身折射到謝徵臉上，在一片粘稠溼冷的黑暗中切出一道亮弧，那微微下壓的嘴角，冰冷又不耐：「回話。」\n冷風卷著雪花吹進來，落在黑衣人頸間，而比飛雪更涼的，是已經割破他頸側一層薄皮的那把利刃。\n恐懼和壓迫如潮水般漫來，黑衣人艱難咽了咽口水，祈求道：「侯爺知曉相爺的手段，何苦為難小人……」\n下一瞬，那把刀已直接照著他腰腹被劃破的口子再度刺了進去，黑衣人極致痛苦地悶哼一聲，整個人都蜷縮了起來。\n謝徵垂下眼，蒼白結著暗痂的五指轉動刀把，幾乎是生生在他腹部絞下一團血肉來，他語調散漫又涼薄：「軍中細作的嘴可比你硬，刑部侍郎張素看過一場軍中的審訊，出了大營連膽汁都差點吐出來了，回去後還大病一場，你想試試軍中的刑罰？」\n刑部侍郎張素以用刑嚴酷聞名朝野，都說犯在他手上的人，不死也得脫成皮，人人稱之為「活閻王」。\n黑衣人抑制不住慘叫出聲，額頭冷汗涔涔，所有的感官幾乎都在腹部被攪碎的那團血肉裡了，溼透衣衫的不知是血還是汗，他不求活命了，只求能死得痛快些，精疲力盡道：「信……相爺讓我們來尋一封信……」\n謝徵眸色微斂：「什麼信？」\n黑衣人只是搖頭，整個人都癱在了地上，哀求道：「小人當真不知了……」\n劍鋒划過脖頸，黑衣人血流一地。\n信？\n謝徵擰眉，那女子家中有什麼信能讓魏嚴忌憚至此？\n他朝窗外燃了火把的整條街巷看去，那女子站在路邊，似在和官兵說明情況，老夫妻倆約莫是覺著安全了，又放心不下樊長玉，這才帶著那小孩一併去了院門口外看著。\n官兵們正在拖那些黑衣人的屍體，幾個沒死透的，動作極快的咬破了毒囊自絕了。\n馬背上的將領大喊著：「找個活口帶回去！」\n謝徵視線原本只是淡淡瞥過這人，瞧清他面容時，一雙鳳眸眯了起來。\n鄭文常？\n他乃薊州牧賀敬元的愛將，賀敬元又是魏黨。\n今夜這齣是大水衝了龍王廟，還是賀敬元也在幫魏嚴找那封信，才特意安排了這麼一出來截胡？\n但看那些黑衣人的架勢，分明又沒找到東西，薊州官兵來得這般巧，實在是耐人尋味……\n謝徵忽覺臨安鎮這不起眼的屠戶一家，背後隱藏的或許比自己想像中的還要多。\n-\n馬背上的將領正指使著部下快些把所有黑衣人的屍體都帶走，忽覺一道幽冷的視線落到了自己身上，像是雪夜在荒原被野狼盯上了一般，整個背脊都不自覺繃直了幾分。\n鄭文常四下巡視一周，卻又不見那道讓他脊背發涼的視線了，他注意到趙家閣樓的窗戶空蕩蕩的，問：「閣樓上還有人？」\n樊長玉之前為了保護趙大娘夫婦和胞妹，跳窗把黑衣人引出來了大半，本是抱著有去無回的心思，哪料大街上突然出現這麼一隊官兵，說是昨日接到縣令遞上去的清平縣匪患的摺子，特撥了一支軍隊過來視察，夜裡斥候發現異動，一隊官兵前來探虛實，這才趕巧救了她。\n此刻這軍爺一問，她想到言正身上有傷，裡邊不知有沒有黑衣人發現了他，忙往閣樓上跑：「我夫婿重傷，還在樓上。」\n鄭文常沒點底下小卒，反而自己親自下了馬，一手按在腰間的佩劍上，跟著上了閣樓：「本將軍同去看看。」\n樊長玉打著火把衝進閣樓時，就見屋子裡橫七豎八倒著好些個死去的黑衣人，謝徵也倒在血泊裡，身上的衣物被劃破了好幾道口子，朝上的半張臉亦糊滿了鮮血，幾乎看不出他原本的五官。\n樊長玉沒料到屋中竟還剩了這麼多黑衣人，見謝渾身是血，怕他死了，心口都揪了一下，撲過去看他的傷勢：「言正，你怎麼樣？」\n驚惶之下又伸手去探他的鼻息，發現人還活著才鬆了口氣，朝外大喊：「趙叔，您來給言正看看！」\n帶著兩個兵卒步入閣樓的鄭文常掃了一眼屋內的死人，視線落到謝徵滿是血汙的半張臉上，似在努力辨認什麼，皺眉問：「這些人都是你夫婿殺的？」：，，.`

            title: `第26章第26章`,
            content: `樊長玉已見過謝徵在松林殺人,倒是沒覺著奇怪，點了頭說：「我夫婿從前是鏢師，一身武藝還不賴。」\n她長這麼大沒見過幾個鏢師,她爹武藝就很高強，謝徵自稱以前也在鏢局做事，她便理所當然地認為鏢師功夫都是不錯的，畢竟要對付的都是些去劫鏢的亡命之徒。\n鄭文常盯著謝徵，神色莫名。\n趙木匠已經擠進了閣樓來，瞧見這一屋子的死人,當即「哎呀」一聲,心中也怵得慌，不過他和老伴早些年是經歷過戰亂的。\n那會兒民間十室九空，死在路邊的人比比皆是，眼下倒還算鎮定，怕加重謝徵身上的傷,沒貿然搬動他,而是蹲下扣住他一隻手把起了脈。\n只看半張滿是血汙的臉瞧得不是很真切，鄭文常突然道：「把人翻過來看看。」\n趙木匠不知這軍爺為何會提出這樣的要求，也不敢違抗他的命令,想著他們是軍中之人，為首這位披甲佩刀，一身氣派，看樣子官職也比縣令高,指不定能幫樊長玉查清是何仇家。\n他當即倒起了苦水：「軍爺可要替咱們做主啊,這丫頭是個命苦的,上個月才沒了爹娘,好不容易招贅個夫婿,如今她夫婿也被這些歹徒傷成了這樣，不查出這些歹徒的來歷，這往後的日子可怎麼過啊……」\n鄭文常一聽這人竟是個倒插門的，心中那點猜疑頃刻間就消了大半。\n那人何等脾性，莫說一朝落難，便是皇帝將他下昭獄，逼他娶公主入贅，他都不可能點這個頭。\n正好樓下傳來官兵的一聲驚呼：「大人，這還有個活口！」\n趙木匠還沒來得及將謝徵翻過來，鄭文常只覺自己先前的猜疑荒謬得緊，也沒了細看這人的心思，想起自家將軍的交代，匆匆下了樓，只吩咐兩個親兵把閣樓上的屍體也拖下去。\n樊長玉自是不知方才有多驚險，樓下有官兵看著，她倒也不擔心胞妹和趙大娘的安危，問趙木匠：「趙叔，他怎麼樣？」\n趙木匠把完脈，一度懷疑自己獸醫也有個十幾年沒幹了，醫術不精，把錯了。\n眼前這人渾身是血，瞧著似受了重傷的模樣，怎地脈象倒半點不兇險？\n他本就皺巴巴的額頭皺得更緊了些，凝神重新把脈。\n他這副凝重模樣，倒是把樊長玉嚇得不輕，以為謝徵沒救了，整個人有些頹然地坐在矮凳上：「我早就該把和離書寫與他，讓他自己去別處養傷的，不然哪能遭這些罪……」\n趙木匠又把了一次脈，發現脈象還是四平八穩，整個人陷入了深深的自我懷疑中，一張老臉神色愈發嚴峻，正要去看謝徵身上那些傷口。\n躺在地上的人剛好在此時悠悠轉醒。\n樊長玉眼眶都隱隱有些紅意了，見他醒了心情大起大落之下，沒忍住咧嘴笑開，驚喜道：「你醒了！」\n謝徵看到她發紅的眼眶和那個再驚喜不過的笑容，微怔了一瞬。\n她是怕自己出事，險些哭了麼？\n心口的異樣感愈重了些。\n他斂了眸色，虛弱低咳兩聲，沾著鮮血的唇裡溢出幾字：「我沒事。」\n他身上那些血，大部分都是那些黑衣人的，衣衫上的口子也是他為了偽造出受傷的樣子自己劃的，只破了淺淺一層皮肉。\n鄭文常雖不在自己麾下，但同他有過幾面之緣，若是認出了他，今夜要麼是他被對方帶回去交與魏嚴，要麼是他殺了鄭文常和他手底下那些兵卒再逃往別處。\n索性暫且躲了過去，那兩類最糟糕的情況都沒出現。\n他說著自己沒事，但已見過他兩次重傷的樊長玉和趙木匠還是極為緊張，把他扶到床上躺著後，又找來傷藥要給他包紮。\n外袍解開後，樊長玉發現謝徵裡邊的衣物並未像之前一樣全被鮮血濡溼，瞧著甚至比外袍上的乾淨不少，心下正有些奇怪，樓下趙大娘喚她下去，說是官兵要做一個口供。\n躺在床上的人，臉上的血跡只被淺淺擦去了一層，在燭光裡，那殘餘的血跡竟顯出幾分瑰麗，對方微微睜開眼看她，嗓音難得溫和：「你去吧。」\n樊長玉覺得一定是他太過虛弱的緣故，眼下怎麼看怎麼病弱惹人憐。\n她出門前還不放心地回頭看他一眼：「我很快回來。」\n死去的黑衣人已被官兵們拖到一處並排躺著，街巷裡的人聽到動靜，見滿大街都是官兵，披衣出來看熱鬧的不再少數。\n官兵們清點完黑衣人的人數，那唯一一個活口，還是先前被樊長玉一巴掌扇暈的那個。\n官兵們見過幾個黑衣人咬破藏在牙齒後邊的毒囊自盡，已有了經驗，發現他還有氣，就先把他嘴裡的毒囊取了出來，此刻人被五花大綁著，嘴裡也塞了滿滿一口布巾，自盡已然無望。\n那大官身邊的親衛問樊長玉什麼，樊長玉就老老實實答話，都是關於她家中的一些基本信息。\n問完話那大官便對她道：「且先等著消息，審訊出結果了，會由官府那邊通知你們。」\n經歷了今晚的事，樊長玉也再次見識到了那些人有多心狠手辣，怕對方再找來會連累趙大娘一家，道：「軍爺，這夥人若是再來尋仇如何是好？」\n那大官一時嘴快似要說什麼，卻又打住了話頭，擰著眉頭想了片刻後道：「本將軍會留幾名將士在這附近暗中守著，審訊結果沒出來前，便不會撤走。」\n樊長玉這才放心了，把那大官誇得天花亂墜。\n那大官離開前掃了她一眼，神情似有些微妙。\n官兵們離去後，樊長玉先去巷子口的井邊打水回來，把院子和閣樓上的血都洗乾淨，只不過聞著還是有一股淡淡的血腥味。\n樊長玉有心翻牆去自家拿些她娘從前調配的香燻一燻，想到那大官說的在這附近留了人暗中監察，又沒敢妄動。\n趙家老兩口被這麼一嚇，基本上沒了睡意，把堂屋的火塘子重新燒了起來，帶著長寧坐在那邊烤火，時不時嘆一口氣。\n長寧年歲還小，不知大人們在愁什麼，沒了危險就心大地繼續去看關在雞籠子裡的海東青。\n那籠子基本上已經是海東青的窩了。\n樊長玉問胞妹：「寧娘還困不困？」\n長寧搖頭，又指了指關海東青的籠子：「阿姐，隼隼很乖，以後別關隼隼了好不好？」\n上次她和姐夫在家中，就是她一時貪玩打開了雞籠子的門，後面殺進一群歹徒時，這隻大隼才抓死了一個壞人。\n她小腦袋裡想著，要是大隼沒被關住，今晚指不定也能抓傷壞人。\n這籠子還真不是樊長玉關的，趙大娘說：「掛在火塘子裡的肉昨天夜裡被啄下來了一塊，是我怕這大隼偷肉吃，睡前順手關上的。」\n樊長玉便道：「回頭再讓言正教教。」\n說起言正，她難免又想起了他那一身傷，問趙木匠：「趙叔，他身上的傷怎麼樣了？」\n趙木匠想說這回貌似都是些皮外傷，但又怕是自己誤診了，耽擱了言正的傷，嘆了口氣道：「你也曉得老頭子從前是給豬牛羊馬這些牲口看病的，給人治病多少看幾分運氣，我瞧著是不太兇險，但保險起見，改明兒還是去醫館請個大夫來看看吧。」\n樊長玉應好，去樓上看謝徵時，就見他臉上的血跡已經被擦乾淨了，正閉目躺在床上休憩。\n約莫是聽見了腳步聲，在她進門後就睜開了眼，問：「如何？」\n樊長玉說：「我瞧著這些官兵比縣令靠譜，聽說是縣令給州府那邊寫了摺子，州府的大人聽聞這邊匪患猖獗，這才派兵過來剿匪，正巧今夜叫他們碰上了。」\n談起這個，樊長玉還有幾分高興：「薊州匪患多年，看來官府當真是要整治那些山頭了，那位軍爺說會徹查這兩樁刺殺案，還派了官兵暗中保護咱們，這兩日你就安心養傷，先不急著離開。」\n謝徵臉上的神色實在是稱不上好看，「暗中保護？」\n樊長玉點頭：「對啊。」\n謝徵一口氣險些沒提上來，他好不容易才暫且瞞過了對方，現在薊州府的人更是直接在他眼皮子底下盯著他了？\n不過薊州府的突然這般行事，委實叫他也猜不透其中緣由。\n罷了，最危險的地方也是最安全的地方。\n他道：「這兩日把那隻隼放樓上來吧，莫要放出去，那東西野性難馴，沒馴好容易傷人。」\n樊長玉說：「難怪，大娘方才還說那隼昨夜裡偷吃了火塘子上方掛的肉呢！」\n謝徵：「……」\n樊長玉已經起身：「我現在就去拿上來！」\n謝徵這才淺淺應了一個「好」字。\n-\n天明時分，鄭文常便已快馬回了薊州府。\n他帶著審訊完那黑衣人的口供快步走過九曲迴廊，種了滿院雪松的院子裡，著甲的侍衛們看到來者是他，紛紛放行。\n鄭文常進了書房，在下方站定，不知是因為激動還是走得太急，聲音有些喘：「大人，依您之命，末將早早地帶人守在臨安鎮，的確於昨夜抓獲了在清平縣犯下多起命案的那些人，只是……」\n他呈上供詞的手微微發顫：「請大人過目供詞。」\n坐於案前的人鬚髮斑白，似乎早就知曉那些黑衣人的身份，平和道：「文常，你只是去抓山匪盜賊，有何懼之？」\n鄭文常垂下頭：「卑職惶恐。」\n「罷了，把供詞放下吧。」賀敬元停了筆，抬起眼來，明明是名武將，卻生得一副文臣的儒雅面孔，他知曉眼前愛將的顧慮，說：「你只當沒看過這份供詞，下去吧。」\n鄭文常抱拳：「卑職領命。」\n剛轉過身，卻又聽得一聲：「那戶人家家中，可有人受傷？」\n鄭文常想了想說：「那女子招贅了一個夫婿，他夫婿被那些人所傷。」\n賀敬元便只點了點頭。\n鄭文常壯著膽子問了句：「那戶人家，同大人有故？」\n「文常，老夫教你的為官之道是什麼？」\n只一句，嚇得鄭文常冷汗都出來了：「卑職失言了。」\n「退下吧。」賀敬元撿起案邊一封摺子看了起來，似乎並不關心那供詞上寫了什麼。\n等鄭文常退出書房，他一雙蒼老的眼才看向那份供詞，遲疑幾許，終究是打開了。\n看完後，一聲嘆息。\n他起身打開書架上的暗閣，取出一方錦盒，卻並未打開，不知對何人道：「你當初把這東西交與我的，便是猜到了這麼一天，想我替你護著些那兩孩子吧……」：，，.`

            num: 27,
            title: `第27章第27章`,
            content: `樊長玉一早去集市上轉了轉,買了只老母雞拿回去給言正補補。\n在巷子裡遇見相熟的人，她一如往常熱絡打招呼，對方卻有些避諱什麼似的,只勉強應個一兩聲。\n如今同宋家交好的婦人,則直接翻了個大白眼,避洪水猛獸一般離她遠遠的：「當真是個煞星，他大伯去她家幾次，就叫她給剋死了,她那上門的夫婿,也一直病懨懨的不見好,得虧宋家老姐姐特地去合了八字,不然宋硯要是真娶了她過門，宋家還不知會被她克成什麼樣呢！」\n原本同樊家關係還不錯的一些人,聽到這話,也不動聲色地離她遠了些。\n若說之前宋家退婚言她是個天煞孤星的命，還沒有多少人當回事，可這兩日她家殺禍不斷，昨夜要不是官兵來得及時，趙家那老兩口指不定也得跟著遭難,這左鄰右舍的，難免忌憚起來。\n換做往常，樊長玉早就懟回去了,但昨夜險些牽連趙家是事實,言正也的確受傷了。\n她抿緊唇,拎著手上買的雞沉默著往趙家的宅子走。\n路過方才那言語尖酸的婦人家門口,她前腳剛走過,對方後腳就潑了一盆淘米水到門外,冷冰冰的水珠子濺了不少到樊長玉繡鞋和裙擺上。\n樊長玉頓住腳步，抬起一雙沉靜的眼朝對方看去。\n那老婦人姓康，原先就跟宋家是鄰居，在宋硯考上舉人後，一直百般巴結宋家，為了哄宋母開心，時不時又上門去找宋母嘮嗑，說上樊長玉一簍子的壞話。\n大抵也是因為她還有這點陪宋母嘮嗑解乏的用處，宋家搬去縣城後，整個巷子裡，獨獨只有她去宋家的新宅吃過一回飯。\n康婆子以此為榮，回來後自然是逢人就誇宋家的新宅院有多漂亮，裡邊還有下人供宋母差遣使喚，誇宋硯是當真本事，順便再踩上樊長玉一兩腳。\n此刻見樊長玉看過來，康婆子直接把盆裡剩下的小半盆淘米水再次往門外潑了出去，罵道：「一大早的真晦氣，等會兒再找些幹柚子葉掛門口才行！」\n民間都說淘米水和柚子葉去晦氣。\n樊長玉嘴唇動了動，可看到其他鄰居或沉默或不動聲色離她遠些的模樣，最終只將唇抿得更緊了些，拎著東西快步往趙家走。\n淘米水沾溼了鞋襪，冰冷的溼意緊貼著腳踝，從皮肉往骨隙裡鑽，在心口冒出涼意。\n樊長玉進了趙家的院子後，趙大娘正在院子裡掃雪，見樊長玉裙擺和鞋襪都溼了，忙問：「這是怎麼弄的？」\n樊長玉徑直往廚房走，說：「路上雪沒化乾淨，踩到雪沾溼了。」\n趙大娘皺眉盯著樊長玉的背影，心知她必然沒說實話。\n樊長玉心亂得很，把老母雞殺了用瓦罐燉上後，怕被趙大娘追問，藉口給言正送藥去了閣樓上。\n「喝藥了。」\n她聲音不同於以往的朝氣，反而有些悶悶的。\n謝徵接過藥碗時，忍不住打量了一眼她的神色。\n她面上似乎看不出什麼，但他還是一眼看出她情緒不對勁兒，問：「發生了何事？」\n樊長玉只說沒事：「你趁熱把藥喝了，怕苦的話枕頭邊有陳皮糖。」\n她抱膝坐在矮凳上，就著炭盆子烤火，低著頭露出一段纖細脖頸，叫人看不清她面上的表情。\n謝徵注意到她裙擺下方和鞋襪似乎都有溼痕，說：「昨晚後半夜的雪下得挺大。」\n樊長玉含糊「嗯」了一聲。\n謝徵便皺了皺眉，昨晚後半夜壓根就沒下雪了，她今日太奇怪了些。\n她不做聲，謝徵喝完藥把碗放到床邊的圓凳上後，也沒說話。\n房間裡靜默好一陣後，樊長玉才突然道：「我給你找家客棧，給店小二多使些錢，讓店小二照顧你飲食起居如何？」\n謝徵按在床沿的指尖力道微重，問她：「為何？」\n樊長玉說：「官府還沒結案，我怕那些人再找上門來尋仇。」\n謝徵道：「你不是說，有官兵在暗中守著這邊麼？」\n樊長玉沉默了幾息後，抬頭看向他，鄭重道：「那你就先在這裡養傷，傷好後就離開。」\n她起身下閣樓後，謝徵捻起一顆陳皮糖，唇角抿緊，陳皮糖頃刻間在他指尖化作了齏粉。\n-\n一直到中午，住在巷子裡的康婆子突然罵罵咧咧來宋家討說法了，謝徵終於知曉她今日反常的緣由是什麼。\n「樊長玉！你給我出來！」康婆子嗓門大，罵街的本事堪稱一絕。\n她這一吼，就有不少人在趙家門口看起熱鬧。\n趙大娘聽到踹門一般的拍門聲後，就趕去開門了，見康婆子帶著孫子氣勢洶洶站在門口，問：「這是怎了？」\n康婆子把自個兒孫子往前一推，叉腰罵道：「讓樊長玉給我出來，她妹妹把我家虎頭推下臺階門牙都摔缺了一顆，你說怎麼了？」\n樊長玉在廚房燉雞，聽到外邊的叫罵聲後，便往外邊院子裡來了。\n瞧見康婆子那肥頭圓腦的孫子哭得兩眼泡腫，鼻孔下方還掛著兩串鼻涕，時不時吸進去，只是下一刻又掉了出來，下巴腫著，確實摔缺了一顆牙。\n她道：「我妹妹一向體弱，你家孫子又長我妹妹好幾歲，我妹妹如何推得動他？」\n康婆子一聽樊長玉竟然還想賴帳，頓時滿口唾沫星子噴了出來：「我還能訛你不成？你把你家寧娘叫出來問一問，不就知道是不是她推的了？」\n趙大娘見巷子裡不少人在探頭探腦看熱鬧，勸道：「有什麼事進屋說吧，小孩子打鬧磕磕絆絆是常有的事，在門口吵嚷著，叫街坊鄰居看笑話。」\n康婆子才不依：「我來替我孫兒討公道，我怕別人笑話什麼？」\n樊長玉知道這康婆子在巷子裡一向以潑辣刁鑽出名，她那兒媳婦都是生生叫她給磋磨跑的，到現在康婆子提起她兒媳婦都還一口一個賤貨罵著，說她跟野男人跑了，半點不知廉恥，全然不覺自己把兒媳婦當牛馬使喚有什麼不對。\n後來他兒子跟一個寡婦好上了，她又嫌那寡婦嫁過人，死過丈夫指不定克夫，這麼一攪和，那寡婦見勢不妙也趕緊同她兒子斷了，她兒子迄今還是個老光棍。\n樊長玉不願跟這人多費口舌，冷冷道，「這公道由不由得你討，我先問過了我胞妹再說。」\n樊長玉喚長寧：「寧娘，你出來。」\n小長寧磨磨蹭蹭從屋子裡走了出來，跟個小尾巴似的站到了樊長玉身後。\n樊長玉低頭問她：「你有推虎頭嗎？」\n長寧抿著唇，兩手緊緊捏著自己的衣角，點了頭又搖頭。\n康婆子尖聲道：「瞧瞧！這麼大點的孩子都會說謊了，你們樊家可真是好家風啊！她自己都點頭了，這會兒又搖頭……」\n「你給我閉嘴！」樊長玉一聲冷喝，聲音如暴雪瞬間蓋過了康婆子尖利的嗓音。\n康婆子早上潑了那盆淘米水，見樊長玉默不吭聲，還當她是個好拿捏的，此時突然被樊長玉這麼一吼，懵了一下，瞬間更尖銳地大叫起來：「還有沒有天理了？大伙兒看看啊，她樊家人好大的氣焰啊，把我孫子摔成這樣，還理直氣壯起來了！」\n閣樓上，謝徵都被那尖銳的叫罵聲吵得耳朵疼，不耐擰起了眉。\n這市井老婦都這般聒噪的麼？\n正心煩時，便聽得那女子冷且銳的嗓音：「繼續嚷，你看我會不會把你倒插著扔潲水缸裡去！」\n樊長玉眼角眉梢都透著冷意，今晨忍了康婆子，是她心中的確愧疚自家的仇人帶來的禍事，這會兒康婆子想蹬鼻子上臉，她可不慣著了。\n康婆子被樊長玉盯著，心頭沒來由地一陣發怵，她趕緊朝看熱鬧的人群看去，張嘴似乎還想再說什麼，利用圍觀的人給樊長玉壓力。\n樊長玉似乎早就知道她這點伎倆，冷冷道：「你跟宋家那老妖婆天天在背後編排我當我不知麼？我名聲反正已被你們編排得差到這份上了，你不會以為我還會忌憚旁人怎麼看吧？我真要動手，你覺得這些人裡會有幾個衝出來攔著？」\n這話打消了康婆子最後一點念頭，她咽了咽口水，往日罵街罵上一整天不帶喘氣的一張嘴，這會兒跟被針縫上了似的，愣是沒再憋出一句話。\n樊長玉這才蹲下問胞妹：「剛剛阿姐問你有沒有推虎頭，你為什麼點頭了又搖頭？」\n長寧黑而圓的一雙葡萄眼已經泛起了紅意，白胖細嫩的手指攥著自己衣角道：「我是推了他，但他太胖了，我沒推動，他來追我，自己滑倒從臺階上摔下去，才把門牙摔壞的。」\n康婆子頓時又嚷上了：「我家虎頭說就是你推的……」\n樊長玉一個眼神冷冷掃過去，康婆子這才又禁了聲。\n樊長玉繼續問胞妹：「寧娘為什麼要推他？」\n小長寧低著頭，豆大的淚珠子瞬間就從眼眶裡滾落出來：「他揪我頭髮，搶我的松子糖，還往我身上灑水，說他阿嬤早上才潑了阿姐一身淘米水去晦氣，我是喪門星的妹妹，也要潑水去晦氣……」\n聽完這番話，樊長玉臉色已冰寒得可怕。\n趙大娘氣得眼都紅了，她就說樊長玉今早回來鞋子和裙擺怎麼都溼了，原來是被這老賊婆潑了淘米水。\n那淘米水是動土了驅煞去邪的，她在樊長玉路過後潑淘米水，這得是多惡毒！\n趙大娘咬牙切齒罵道：「你這死了都沒個棺材板的腌臢老貨，你嘴上不給你自己積德，也給你兒孫積點德吧！也不怕將來見了閻羅王被鉤舌頭。」\n康婆子先是有些心虛，但幾十年來嘴上不饒人慣了，下巴一臺就忍不住咄咄逼人道：「我怎地不積德了？她爹娘是我害死的不成？這兩日她家死的那些人，也是我殺的麼？如今這鎮上，還有誰不曉得她是個喪門星？也就你跟你家老頭這沒人送終的，才巴巴地收留那災星一家，也不怕有朝一日自己也被她剋死了。要我說啊，她樊家就該早早地滾出這條巷子，誰知道她家的仇家什麼時候再尋來？」\n「你……」趙大娘被氣得直哆嗦。\n樊長玉用拇指抹去胞妹臉上的淚珠子，緩緩站起身來，眼神如冰刀：「我便是要克，那也得先克你這老不死的！」\n她冷笑：「要我搬出巷子，憑什麼？憑你這一嘴的唾沫星子爛肉會嚼舌根麼？既然這般怕，你怎地不自己搬走？」\n康婆子語塞，指著樊長玉還想回罵，卻聽樊長玉繼續道：「還有，管好你孫子，他下次再敢動我胞妹一根頭髮，他哪只手動的，我把他哪只手砍下來！」\n康婆子的孫子對上樊長玉那個兇戾的眼神，當即嚇得癟嘴大哭，鼻涕眼淚齊飛。\n康婆子把自己孫子護在身後，色厲內荏道：「嚇唬小孩子算什麼……」\n樊長玉唇角冷冷勾起：「嚇唬，我這可不是嚇唬。」\n她說著冷瞥了康婆子孫子的胳膊一眼：「我豬肘都能一刀砍斷，砍條胳膊更容易。」\n康婆子的孫子下意識捂住了自己一隻胳膊，哭著把康婆子往回扯：「阿嬤，回家……我要回家……」\n康婆子見孫子被嚇成這樣，又急又氣，偏偏又不敢跟樊長玉來硬的。\n只得罵罵咧咧帶著孫子往回走，走下趙家門口的臺階時，不知怎地膝彎一痛，她「哎喲」慘叫一聲，整個人也從臺階上摔了下去，下巴剛好磕在最末一級臺階上，半天沒爬起來，慘叫連連，滿嘴都是血。\n巷子裡看熱鬧的人面面相覷。\n樊長玉也錯愣了一瞬，下意識往趙家閣樓上看去，不出意料地看到一截一閃而過的藏青色衣角。\n趙大娘驚愕過後，趕緊道：「現世報！大伙兒可瞧見了，我跟長玉門口都沒出，這老賊婆是自個兒摔的！這就是現世報！」\n康婆子上了年紀，這一摔，磕掉了好幾顆牙，她爬坐起來，直接坐在地上大哭，指著樊長玉：「是她！一定是這喪門星踹的我！」\n在邊上看了半天熱鬧的鄰居們的確沒瞧見樊長玉出手，見康婆子這般胡攪蠻纏，忍不住幫腔：「行了，康婆子，大傢伙兒都看著呢，長玉站那兒就沒動過，你就是自己腳下打滑摔了的！」\n康婆子還想再爭辯，卻聽得樊長玉冷哼一聲：「你虧心事做多了，鬼推的你吧！」\n人上了年紀更容易信那些神神叨叨的東西。\n這話把康婆子嚇得一激靈，她的確感覺自己膝窩似被什麼狠狠撞了一下才摔倒的，聯想到樊長玉那天煞孤星的命格，頓時唇都哆嗦了起來，指著樊長玉大叫道：「就是你這喪門星克的我！」\n樊長玉雙手抱臂：「你不快些滾，一會兒指不定被我克得命都沒了。」\n康婆子這會兒是真怕了，捂著滿是血的下巴，帶著孫子狼狽離開了趙家大門。\n「她這當真是自作孽了！」\n「這巷子裡的人，誰沒被她那張嘴說過，當真是報應！」\n看熱鬧的人笑著說了幾句閒話，也搖著頭散去。\n院門重新合上後，樊長玉蹲下同胞妹視線平齊，語重心長道：「往後寧娘在外邊受了什麼欺負，都要第一時間給阿姐說，知道嗎？」\n長寧乖乖點頭。\n趙大娘想起康婆子罵的那些話，沒忍住偷偷替樊長玉哭了一場。\n樊長玉寬慰了趙大娘幾句，視線落在院門口那顆陳皮糖上，尋了個藉口去了閣樓上。\n她推門而進，謝徵果然沒在床上了，而是坐在臨窗一張竹椅上，面色雖還有些蒼白，但比起前兩日已好上了許多。\n不待她說話，對方視線已淡淡掃了過來：「你上午同我說那些，只是因為旁人幾句話？」`
        },

            title: `第28章第28章`,
            content: `窗欞半開著,太陽掛在天上只是一個沒什麼溫度的白影兒，灑下幾縷淡淡的金輝。\n謝徵半張臉映著日光,半張臉隱匿在陰影中,一雙眼沉靜無波。\n樊長玉想否認，對上他的目光卻沒能張開嘴，她抱膝坐到了一旁的矮凳上，嗓音有些悶：「我家的禍事,的確已兩次讓你牽連進來了,你早已不欠我什麼,同我家劃清界限,你或許還能安全些。」\n謝徵問她：「你信那無知老婦的那些話？」\n樊長玉抿了抿唇，沒做聲。\n她自然是不信的,可是爹娘去世，樊大被殺,長寧和言正也險些被害，昨晚若不是官兵來得及時，趙大娘和趙木匠會不會被牽連進來也不好說。\n也許……真如宋母和康婆子所說,她當真就是個天煞孤星的命,跟她親近的人都不會有好下場。\n謝徵見她沉默還有什麼不明白的，他好看的眉頭微擰,問：「你覺著為了我好,可以同我劃清界限,那你妹妹呢，你也要跟她劃清界限？」\n樊長玉擱在膝前交握的手緊了緊,心中成了一片亂麻。\n是啊,她為了不牽連趙家老兩口和言正,可以儘量遠離他們,那長寧呢？\n長寧才五歲，在世上只有自己一個親人了。\n她沉默之際，謝徵緩緩道：「這世上比鬼神命理之說更可怕的，是人心。」\n樊長玉抬起一雙杏眼，似有些困惑。\n謝徵精緻的嘴角輕扯，話音裡帶了些嘲意：「天底下哪有那麼多怪力亂神之事，國運之說都只是愚弄世人的，更何況命理之言。」\n樊長玉仍是不解：「什麼意思？」\n謝徵抬眸道：「一些人做了惡，喜歡用鬼神之說給自己做遮掩罷了。就如你方才唬那老婦的，說她是撞了邪摔的，老婦不知真相，心下惶恐便將信將疑了，但你我清楚，她是被松子糖打中才摔的。」\n樊長玉垂下眼，好一陣才道：「我當然知道宋家拿出的命格之說只是為了退婚，但家中禍事頻出也是事實，心中這才難安。」\n謝徵道：「你爹娘是早年結了仇家，不是惹了鬼神，你難安什麼？」\n樊長玉怔怔看著他，只覺這人嘴巴可真毒，不過心口那股鬱氣的確沒那麼堵了。\n她嘆了口氣，破罐子破摔道：「你說的這些我都明白，我就是聽了那些話一時難受，這股難受勁兒過了就好了。」\n謝徵半點不留情道：「誰讓你難受了你就教訓誰，同我說那些也就罷了，你若跟這老丈一家也疏遠了，且看他們是難過還是高興。」\n樊長玉垂著腦袋，悶聲道：「抱歉，之前是我一時衝動了。」\n謝徵睫羽在眼尾掃出一道好看的弧度，神色這才明朗了些，道：「你也不是個逆來順受的脾性，今晨回來被潑了水，不當場教訓回去，反回來生悶氣，出息。」\n樊長玉沉默了一息，才道：「我聽過一句話叫『法不責眾』，說是很多人犯了法，官府就不會所有人一起懲罰。如今畏懼我這天煞孤星命格的，是鎮上所有人，在背後議論我的，也是整個鎮子的人，我教訓得了一人，還能教訓得了所有人嗎？」\n謝徵微怔，心底有個隱秘的角落因為她這番話，觸開了一些塵封的記憶。\n他自幼父母雙亡，寄居魏府，自然也不是順風順水走到今日的。\n被那人之子帶人打斷肋骨，錦靴踩著臉摁進一地血泥裡的滋味，他迄今記得。\n徵戰沙場，幾經生死，用滿背的刀疤斧痕換來的軍功，只因他舅父是魏嚴，被人暗地裡唾罵他墮了謝家門風，給人當走狗也不是沒有過。\n他抬了抬眸子，薄唇溢出幾字：「那你還聽說過一個詞叫『殺雞儆猴』麼？」\n「人性本惡，你軟弱可欺，任你再善良，也少有人拉你一把。你若飛黃騰達，便是當真幹了傷天害理的事，也有一堆人上趕著巴結你，你那個前未婚夫不就是麼？」\n樊長玉聽著這些，再次沉默了下來，兩手抱著膝蓋望著鐵盆裡燒著的紅炭一聲不吭。\n謝徵輕扣著竹椅扶手的指節一頓，眸子半眯，話裡是自己都沒意識到的刻薄：「還沒放下你那前未婚夫，提起他又難受了？」\n樊長玉抬起頭盯了他一眼，心下正莫名其妙，隨即才想起自己之前為了不讓他誤會自己對他什麼不軌的心思，胡言說自己沒放下宋硯的事。\n撒謊果真是要付出代價的。\n她張了張嘴，最終只嘆了口氣道：「我確實有點難受，他是考取了功名的人，整個清平縣今年也只出了他一個舉人，縣令都捧著他，也怨不得旁人趨炎附勢。人家確實是飛黃騰達了，我拿什麼跟他比？」\n謝徵輕嗤一聲：「不過一舉人罷了，大胤一京十七府，每年要出多少舉人？你那前未婚夫算得了個什麼？」\n樊長玉忍不住看他一眼，說：「這些話你在我面前說說也就罷了，在外人跟前可別說了，會被笑話的。」\n謝徵皺眉：「笑話什麼？」\n樊長玉覺得這人還真是沒點自知之明，無奈道：「你連個秀才的功名都沒有，這般說人家考上了舉人的……」\n她頓了頓，又說：「我知道你說那些是為了哄我開心。」\n樊長玉覺得說這些有點矯情，抓了抓頭髮道：「其實我也就隨口一說，心裡沒真覺得有多難受，這日子始終都是自己過的，他中了舉飛黃騰達是他的事，跟我又有什麼關係？那些趨炎附勢踩我一腳的，說我幾句也不能讓她們從宋家那裡得到什麼好處，無非就是嘴碎罷了。」\n謝徵神色怪異道：「我哄你做甚，舉人當真算不得什麼。」\n樊長玉一哽：「你當你自己是個大官呢？」\n謝徵閉嘴不說話了。\n樊長玉心中好笑，想起他能識文斷字，還會寫時文，倒是替他謀划起來：「我覺著你也挺聰明的，寫的字又好看，你這一身傷反反覆覆，大夫也說了要是養不好以後八成會留下病根，走鏢那般兇險，你要不也讀書考科舉去吧，指不定也能中個舉人，以後撈個官兒噹噹呢！」\n謝徵：「……我志不在官場。」\n樊長玉嘆氣：「那倒是可惜了。」\n她半開玩笑道：「你以後要是有機會當了官，官職還比那姓宋的高的話，我還指望著你幫我給那宋的穿小鞋呢！」\n謝徵眉梢微不可見地往上一揚，說：「好。」\n這麼一插科打諢，之前的不快是半點沒有了。\n樊長玉想起自己還燉了雞湯，道：「我瓦罐裡還燉著雞湯，這會兒應該已經燉好了，我去給你盛上來。」\n起身時，瞧見他床邊的糖包已經癟下去了，她肉疼道：「我給你尋些小石子吧，今後打人可別再用糖果了，這東西貴著呢，多不划算！」\n她下樓後，謝徵盯著那幾個裝糖果的紙包，眉頭皺起。\n他不喜吃甜食，從前衣食住行也一向由底下親兵打理，他的確不知這東西價錢貴賤。\n她手中素來拮据，這糖既這般貴，她還給他買，只是因為那日她誤會他喝藥怕苦？\n謝徵心情有些複雜地合上了眸子。\n-\n兩日後，鄭文常帶著官兵再次來到了臨安這個小鎮。\n樊長玉得到消息後前去家門口相迎。\n鄭文常高居於馬背上道：「鎮上幾樁兇案已查明緣由，的確是山匪所為。」\n樊長玉聽到這個答案心中就是一個咯噔，她道：「可我家中兩次叫歹人闖進……」\n鄭文常打斷她的話：「你家兩次遇襲，緣於你爹當年押的一趟鏢，傳聞他那次押送的是前朝皇室的一張藏寶圖。十幾年前整個鏢局的人都叫搶奪藏寶圖的人殺盡了，你爹死裡逃生歸鄉後才安穩度過了這麼些年。近日崇州戰亂，關於那藏寶圖的事才又被人提了起來，有山匪查到了你爹的行蹤，這才幾次三番來你家找藏寶圖。」\n這個理由的確能解釋這些日子臨安鎮上發生的一切怪事，樊長玉問：「我爹娘也是死在了那些山匪手中？」\n鄭文常皺了皺眉，避開樊長玉的視線道：「自然。」\n得知了爹娘真正的死因，樊長玉心中還是有些沉重，想來爹當初教自己習武，又不許自己在人前動武，就是怕引來這些歹徒吧。\n她說：「我從來沒聽我爹娘提起過什麼關於藏寶圖的事，這其中是不是有什麼誤會？」\n鄭文常道：「藏寶圖在你爹手上的消息自然是假的，數日前崇州反賊才放出消息，說得到了那張藏寶圖，山匪不會再來鎮上了，你且放一百個心。」\n說著又做了個手勢，底下小卒捧出一個放了銀兩的託盤，他看樊長玉的目光裡帶著幾許不易叫人察覺的異樣：「薊州牧賀大人體恤民情，特命本官送來五十兩撫恤金。」\n樊長玉真心實意道了謝。\n鄰裡街坊也都稱讚：「賀大人當真是薊州府的青天啊，此番遭了那些山匪毒手的，家中死了人的，官府都撥了撫恤金！」\n有人問，「我怎聽說旁的人家都只得了二十五兩，只有樊二家得了五十兩？」\n當即就有人道：「那些家裡只死了一個人，樊二和他媳婦可都遭了毒手，得的銀子自然多些。」\n……\n此案已結，樊家大門上的封條也被揭走。\n樊長玉把家中裡裡外外都打掃了一遍，尤其是見了血的院子和幾間屋子，除了用水衝了好幾遍，還用柚子葉煮水後也灑了一遍，說是能驅邪避害。\n把家中一切都收拾妥當了，樊長玉才把長寧和謝徵都從鄰家接了回來。\n她點了一炷香插到爹娘牌位跟前，眼尾帶著輕微的澀意：「爹，娘，你們可以安息了。」\n只有謝徵一直皺著眉。\n他早已知曉那些人是魏家的死士，自然不肯能是鄭文常口中的山匪，他們要找的，也絕不是什麼狗屁藏寶圖。\n不過官府那邊為了結案還特地編了個像模像樣的謊話，又給被牽連的人家送了銀子，委實是費了些心思。\n謝徵百思不得其解。\n賀敬元若是也想替魏嚴拿到那封信，就該派官兵封鎖了樊家的宅院仔細搜查。\n現在卻把宅子還給了樊長玉，又大費周章平息了幾樁兇案，倒像是不想打破她家原本的生活，讓她繼續留在這鎮上。\n賀敬元意欲何為？\n還是說，他這樣做是因為魏家死士要找的那封信早就不在樊家了？\n謝徵看向供桌上的兩塊牌位，賀敬元應當知曉這夫妻二人真正的身份，那封信的秘密，他或許也知曉？`

            title: `第29章第29章`,
            content: `沒了那些隨時會來索命的黑衣人,樊長玉也不必再急著變賣家什離開臨安鎮。\n跟溢香樓那邊的生意索性談成了長期的，肉鋪重新開起來後,因為有溢香樓的招牌加持,滷肉生意比以往還好，隱隱有了蓋過王記的風頭。\n距離除夕夜的前一天，她從鋪子裡回家時，見巷子口停著一輛頗為氣派的馬車,還當是宋家母子又回這邊來了,進了巷子卻見自家門前圍著不少人。\n樊長玉還以為是家裡又出了什麼事,擠過人群：「讓讓,讓讓……」\n有鄰居問：「長玉，你家中是不是有什麼有錢的親戚啊？」\n樊長玉心中莫名,只說：「沒有啊。」\n那人又問：「莫非是你那夫婿家中的親戚，我瞧著停在巷子口的那馬車,比宋家上次搬遷的馬車還氣派呢！」\n樊長玉這才反應過來，停在門口的馬車主人，是來找自家的？\n邊上有人搭腔：「宋家搬遷那天的馬車哪裡是他們自己的,從車行租來的！」\n話語間竟已有幾分貶低宋家的意思。\n康婆子站在自家門口,豁著一口牙道：「一群捧高踩低的，等硯哥兒上京考中了狀元,要什麼馬車沒有！」\n樊長玉心中困惑,也沒理會街坊鄰居瑣碎的問話,進了家門後把院門一合上，才瞧見正屋的方桌前當真坐了個錦袍玉帶的貴公子。\n對方見了她,含笑點頭致意,樊長玉不知他身份,便也只學著他的樣子點了點頭。\n「今日天色已晚,便不打擾言公子和夫人了。」他說著起身向謝徵一揖，轉向樊長玉時，臉上笑意深了幾許。\n謝徵坐在方桌另一邊，面上神情淡淡的，雖是一身尋常布衣，氣度卻還隱隱壓了那貴公子一頭：「慢走，不送。」\n樊長玉知道言正就那副臭脾氣，他坐凳上沒動，樊長玉還是意思意思把人送到了大門口。\n重新合上大門，阻隔街坊鄰居那些窺探的視線後，樊長玉才問謝徵：「那人是誰？」\n謝徵道：「鎮上書肆的東家。」\n樊長玉拎起桌上的茶壺給自己倒水：「我記得鎮上書肆的東家是個留鬍子的老頭啊？」\n謝徵道：「那是掌柜的，真正的東家一直住在薊州主城那邊。」\n上回趙詢前來尋他時，這巷子裡的人都出去務工謀生了，並未看到。今日因是年底，家家戶戶都得閒在家，才一傳十十傳百地引起了這般大轟動。\n茶水倒了出來，樊長玉才發現竟是壺冷茶，她捧著冷茶喝了一口，又瞥了眼那貴公子方才坐的地方放了一個被喝掉一半的茶杯，忍不住道：「你就用冷茶招呼客人啊？」\n謝徵抬眸看她一眼，樊長玉從他那個眼神裡明晃晃地讀出了點「那不然呢」的意思，一時語塞。\n謝徵瞥見她又買回一包陳皮糖，把桌上用紅紙包起來的東西往她跟前一推：「寫時文賺了些銀子，你收著。」\n樊長玉拆開外邊那層紅紙一看，杏眸裡露出再驚異不過的神色來，裡邊竟是四個元寶！\n她沒開始賣滷肉前，肉鋪裡一個月也賺不了這麼多！\n樊長玉瞠目結舌：「寫時文這麼賺錢的嗎？」\n謝徵拿起自己跟前的粗瓷杯淺飲一口，脫落了暗痂的指節修竹一般，筋骨分明：「先前寫的那些時文賣得好，書肆給了些分紅，這四十兩裡，也有下一批時文的訂金。」\n他所著的那幾篇時文，的確在整個京城攪起了風雲，趙詢雖是商賈之流，但能在群狼環伺之下守住家業，倒也有幾分本事，在各大州府大肆拓印時文賣與仕子之餘，又隱匿了那些時文的出處。\n樊家遭難那幾日，他舅父還在地毯式搜索所有書肆，否則來這小鎮的死士，得多上一倍不止。\n這些銀兩也算不得是趙詢為了討好他特地給，單論他那幾篇時文，真要賣出去得值千金。\n趙家名下的所有書肆前些時日靠著拓印他的時文，已賺得盆滿缽滿。\n怕她起疑，他才特地只要了四十兩，沒想到她還是覺著多了。\n樊長玉看看手邊那幾個白花花的銀元寶，又看看謝徵：「這東家專程來找你，就是看中了你寫的時文？」\n謝徵點頭：「崇州戰事未捷，朝中黨爭不斷，我寫的崇州戰亂之象雖粗淺，卻是其他讀書人未經歷過的，故賣得好些。」\n見樊長玉看到銀子非但沒有高興，反而沉默了下來，他不自覺皺起眉心。\n下一瞬便聽樊長玉道：「其實你不用騙我，我都知道的。」\n謝徵捏在杯壁的指尖力道微重，問：「什麼？」\n樊長玉抬起眼看他：「你能得書肆東家青眼，必然文採了得，以前肯定是念過不少書的，你是怕我因為前未婚夫中舉後與我退婚，遷怒於你，才一直騙我說學識平平的吧？」\n聽她說的是這事，謝徵扣在杯壁的指尖力道這才鬆了幾分。\n未等他回話，樊長玉便皺著眉繼續道：「我沒你想的那麼小心眼兒，天底下讀書人多了去了，總不能因為我前未婚夫是個沒良心的，全天下的讀書人就都是沒良心的吧，這些道理我還是懂的，你沒必要擔心那些有的沒的。」\n謝徵垂眼道：「抱歉」。\n樊長玉擺擺手表示不妨事，她從前也瞞著街坊鄰居她會武的事呢，這是他自己的本事，告不告訴她，又不損害她的利益，她沒什麼好介意的。\n樊長玉只好奇問他：「你既讀過那麼多書，怎不去考科舉，反而去當了鏢師？」\n謝徵說：「我想做的事，習文幫不了我。」\n兩人相處也快一月了，樊長玉頭一回細問關於他的事，話趕話都說到這兒了，她便順著問了下去：「你想做什麼？」\n穿堂而過的風吹起謝徵鬢邊一縷碎發，他看向院牆上的厚厚的一層積雪和霧蒙蒙的天際，眸色變得深遠莫測：「像你想繼續開你爹留下的肉鋪一樣，我父親沒做完的事，我也想替他做下去。」\n樊長玉悶頭想了一會兒，驚訝瞪大了眼：「你家該不會是開鏢局的吧？」\n當鏢師的都是些苦命人，不然誰會拿命去掙那點銀子。\n他學識不錯，武藝也高，又是走鏢的，樊長玉思來想去，只有鏢局少東家才符合他身份了。\n謝徵遲疑片刻，點了頭。\n樊長玉恍然大悟：「怪不得你一直說，你傷好了就會走。」\n她把他那四十兩銀子推回去：「這些銀子你自己收著，重建鏢局花銀子的地方可多著呢！等你要走的時候，我看我手頭寬不寬裕，若是寬裕，再多給你點！」\n謝徵不是第一次聽她說二人分道揚鑣的事，他身上除了皮外傷那些口子太猙獰看著還沒好，內傷已調養了個七七八八，趙詢今日前來，也是告知他已買好二十萬石米糧。\n再過不久，他的確就要走了。\n此刻再聽她說起這些，心底升起幾分莫名的情緒。\n他抬手按住一錠元寶，止住了她往他這邊推的力道，語調帶著幾分強硬：「給你的，藥錢。」\n樊長玉還是推拒：「當初你同意假入贅時，我們就說好了的，我會給你治傷，怎麼能這時候收你錢呢，那多言而無信。你前些日子帶著傷頂著寒風在屋子裡寫時文，掙這些銀子也不容易……」\n他摁在元寶上的力道未收分毫，黑眸鎖著她：「糖錢？」\n樊長玉愣了一下，才反應過來他說這些是給他買糖果的錢，老實巴交道：「買糖也花不了這麼多銀子啊……」\n「那便先收著，往後再買。」\n「買到你傷好離開，也花不了這麼多銀子……」\n樊長玉話說到一半，自己突然沉默了下來。\n往後再買，是說她們還有以後的意思嗎？\n火塘子裡燃燒著的柴禾發出「噼啪」一聲炸響，火星子四射，終於打破了屋中的沉寂。\n對方還是那句話：「你收著。」\n樊長玉沒看他，而是盯著他摁著銀元寶的手看了一會兒，才問：「你喜歡什麼糖？」\n謝徵聽她這麼問，便回了手：「你看著買。」\n-\n這一夜樊長玉入睡時，一向好眠的她望著帳頂失眠了。\n她雖然心大，但也不是個木頭。\n言正雖然脾氣大了些，嘴巴毒了些，但心地很好，不然先前也不會在山賊殺進家門後，還帶著長寧跑。\n他長得好看，能識文斷字，還有一身極俊的功夫。\n她知道他只是暫居於此，終究是會走的，所以才一直把他當個過客看待。\n但今天他給了她這麼大一筆銀子，讓她以後也給他買糖吃？\n樊長玉突然覺得心口有些亂糟糟的。\n她翻來覆去跟烙餅似的，一直到天將明才迷迷糊糊睡過去。\n第二天不出意料地起遲了，眼下還有一團淡淡的青黑。\n不過好在除夕、元日這兩天肉鋪裡是不開張的，起遲了也無妨。\n樊長玉打著哈欠起床包湯圓子，外邊巷子裡還有孩童玩爆竹的聲響，整個鎮上都沉靜在一片新年的祥和氣氛裡。\n一州之隔的崇州，卻剛經歷一場慘敗。\n-\n京城。\n坊間張燈結彩，滿滿的年味。\n一封八百裡加急的戰報過了永定門，卻沒被送去皇宮，而是改道送去了魏丞相府。\n流星快馬從夾道飛馳而過，兩側榆楊霜雪壓枝。\n魏府門前一片森嚴，兩尊石獅按著寶珠面目猙獰，披甲執銳的守衛以雁陣排開，積雪落滿牆頭，連雀鳥都不願在這邊的枯枝上落腳。\n馬背上的驛者滾落在地，從懷中取出戰報高舉過頭頂，「崇州急報！」\n門口的守衛面色一變，取過戰報，匆匆步入府內，轉交與府內將士後，那將士才捧著戰報匆匆遞到書房：「大人，崇州急報！」\n不消片刻，書房侍者打開門，出來取走戰報。\n整個流程嚴密而迅速，每日送往魏府書房的信報，都是以這般形勢遞來的。\n書房侍者合上書房大門，走路時腳下幾乎沒有聲音，恭敬將戰報呈與紅木案後批閱奏章的長髯老者：「丞相，崇州來的八百裡急報。」\n一隻蒼勁而筋骨分明的手接過戰報，看完後重重往案上一擱：「我早該料到那逆子穩不住崇州戰局！秋收才過多久，整個西北為何徵不上糧來？」\n侍者不敢應聲。\n老者起身，著的竟不是錦衣，而是一身尋常布衣，負手望著窗外的深深雪景，一雙鳳眼細長，身形挺拔，正是把控了朝政十餘載的大胤丞相魏嚴。\n他稍作沉吟道：「讓那逆子給我滾回來，調賀敬元去先把崇州戰局頂上。」\n他手中曾有兩把用得最趁手的刀，一把是他親手養大的外甥，一把則是賀敬元，親子魏宣反而只是個空有野心卻剛愎自用的草包。\n侍者應是，正要退下時，卻聽得這位居丞相之位行帝令十餘載的掌權者問：「武安侯的屍首可尋到了？」\n侍者搖頭：「並未。」\n魏嚴沉沉嘆了口氣：「那孩子身上留著魏家的血，心性手段最像我，可惜了……」\n侍者在魏嚴身邊伺候多年，多少也能揣摩他幾分心思，想著他從前對武安侯的器重，可是遠勝大公子魏宣的，接了句：「侯爺說不定只是被那些奸佞小人蒙蔽了，您教養侯爺十六載，不是父子勝似父子，說您當年害死了承德太子和謝將軍，實乃無稽之談，證據呢？侯爺連證據都沒見到，此事應當還是有迴旋的餘地的，您又何必……」\n侍者說到一半突然禁了聲，抬眼對上魏嚴冷沉凜然的目光，忙用力抽了自己一耳光：「是老奴多嘴了！」\n魏嚴卻道：「他終有一日會知道的，他已起了疑心，不趁他未設防時了結了他，他日為魚肉的便是我魏家。」\n侍者先是愕然，隨即道：「丞相乃國之棟梁，便是侯爺也動不了您，何況侯爺已不在了。」\n魏嚴閉上眼沒作聲。\n轉身回書案後坐下時，面上已不見了那一絲悵然，問：「我命人去薊州取的東西，拿回來了嗎？」\n侍者嗓音低了幾度：「玄字號的死士，迄今未傳回任何消息。」\n魏嚴眉眼陡然一厲：「賀敬元那邊呢？」\n侍者答道：「安插在賀敬元身邊的細作先前來信，說賀敬元似乎並不知曉那東西的存在。」\n恰在此時，書房外又傳來通報聲：「大人，薊州牧快馬送了一方錦盒前來。」`

            title: `第30章第30章`,
            content: `侍者當即小心翼翼觀察起魏嚴神色。\n他沉聲說了句：「取來。」\n侍者這才去書房門口將那一方錦盒捧到了書案前。\n魏嚴一雙蒼老卻凌厲依舊的鳳眸端詳著跟前的錦盒,這盒子顯然有些年份了，粘合在盒身上的那層錦布已泛黃。\n他叩開鎖眼,打開盒子,瞧見放在裡邊的東西後，眸色瞬間染上一層陰霾。\n侍者見他變了臉色，忙也看了一眼盒中物件，隨即大驚失色道：「賀……賀敬元看過這信了？」\n錦盒中所放的,是一封信和一枚玄鐵令牌。\n魏嚴抬手拿起那信,見信封陳舊,但封口完好,且上邊並無任何落款，瞧著像是很久以前就有人用一個新的信封把裡邊的東西裝了起來。\n他沉聲道：「他沒敢拆開。」\n他抬手撕開信封,裡邊裝的果然是另一封被拆開後的信，那封信的信紙和封皮都已泛黃,還沾著乾涸氧化後呈淡黃色的血跡。\n封皮上寫著「孟叔遠親啟」幾個蒼勁有力的大字。\n魏嚴挾天子以令諸侯多年，在朝堂上雖為人所詬病，可那一筆字,卻也是在當代書法大家中排的上名號的。\n但凡見過他墨跡的人,都能辨得出那信封上的字是他所題。\n看到裡邊的信件時，魏嚴一直冷凝的神色這才緩和了些許,只不過一雙眼依舊銳如鷹隼：「我讓玄字號死士去取的東西,為何會落到賀敬元手上？」\n侍者垂首,冷汗涔涔：「老奴這就命人去查。」\n魏嚴卻揚了揚手，示意不必,他見和著錦盒一起送來的,還有一封薊州來的摺子,打開看完後,將摺子扔到了案上，道：「他在求我放過那叛主之徒的兩個女兒。」\n侍者能在魏嚴身邊伺候多年，自然是個會揣摩人心的，瞥了一眼賀敬元那摺子上寫的山匪襲清平縣，殺害多戶良民，匪徒現已伏誅，便也明白了魏嚴話中的意思。\n賀敬元替魏嚴找回了他想要的東西，希望魏嚴就此收手，放過那人的兩個女兒。\n侍者眼神微動，道：「賀將軍大抵也是念在昔日同袍的情分上，您先前為試探賀將軍忠心與否，讓他去殺那二人，他不也照做了麼？想來賀將軍對您一直是忠心的，不過婦人之仁罷了。」\n魏嚴冷笑：「你說他是一早就拿到了這東西，還是真如他在摺子中所說的，誤以為是清平縣匪患，出兵剿匪誤抓了玄字號死士，才得知老夫在尋此物？」\n侍者斟酌道：「您讓他去殺了那二人後，不已派了人過去盯著麼，賀敬元看樣子並不知道這東西，想來是後者。」\n威嚴冷聲道：「寧可錯殺一千，不可放過一人。他雖未啟這信件，但能想到以這信來求我放過那那叛主之徒的女兒，當已猜到這是何物了。」\n侍者小心道：「您的意思是，要像對侯爺那樣……」\n他做了一個抹脖子的手勢。\n魏嚴盯著案上那份摺子，沉吟許久，終是搖頭：「錦州之戰過去了十六載有餘，數月前關於承德太子和謝臨山的死才突然在民間被重提，徵兒會去徹查關於此戰的卷宗，想來也是被有心之人指引的。那幕後人尚未現身，便已逼老夫折了手上這最好的一把刀。」\n魏嚴說到此處，語氣陡然凌厲：「眼下崇州戰局僵持不下，興許也有那幕後人暗中動了手腳，再折賀敬元這柄刀，西南之地便可拱手送人了。那叛主之徒倒也心中有數，未告知兩個女兒半點當年之事，兩黃毛丫頭不足為懼，姑且留她們性命罷。」\n侍者贊道：「丞相英名。」\n心中卻也明白，他妥協留賀敬元的性命，不過是因為賀敬元知曉錦州一戰的真相後，依舊能為他所用，背叛了他的那人，膝下也只有兩個女兒，女子談何復仇？不用擔心什麼隱患。\n但謝徵不一樣，殺父之仇，不共戴天。\n所以眼前人才先下手為強，在崇州戰局上設套，讓大胤這位弱冠之年憑軍功封侯的戰神折在那裡。\n魏嚴並未理會侍者的奉承，最後瞥了一眼那歷經十六年光陰泛黃的信紙，揚手扔進了案邊的炭盆裡。\n燒得火紅的銀骨炭瞬間將信紙灼出一個大洞，隨著那信紙上暗棕色的洞變大，整張信紙逐漸被火光吞噬，十六年前的兵戈與血色似乎也在這火光裡化作了煙塵，再無人知曉當年的真相。\n魏嚴眼底映著火光，沉聲道：「崇州戰局且先交與賀敬元吧，一心想把十六年前的錦州之戰搬到檯面上來的人不會罷休的，讓地字號的死士去盯緊些，再有異動，老夫必要見到那躲在暗處攪弄風雲的老鼠！」\n侍者問：「會不會是李太傅一黨……」\n魏嚴搖頭，蒼老的臉上自有一股臨淵峙嶽的從容：「那老東西若察覺到了當年錦州一戰的蛛絲馬跡，不會等了十六年才舊事重提。」\n他緩緩道：「當年承德太子戰死後，東宮失火，太子妃和皇孫都命喪大火中，太子妃尚有半張臉可辨認，皇孫卻被燒成了一具乾屍，且盼當年死的，當真是皇孫吧。」\n侍者聽出他言外之意，冷汗都浸出來了，道：「能和太子妃死在一起的，必然是皇孫無疑，東宮裡除了皇孫，又哪來那稚年男童呢？」\n魏嚴只道：「但願如此。」\n-\n薊州。\n本是除夕夜，但朝廷軍隊在崇州戰敗，薊州毗鄰崇州，整個薊州府七品以上的官員全都沒能安穩過個好年，被叫去薊州府衙商議對策。\n一封信報被送於賀敬元書案上，賀敬元展開看後，只嘆道：「丞相這長子，是嫌崇州戰場的火燒得還不夠大啊！」\n立於下方的鄭文常問：「大人何出此言？」\n賀敬元將蓋有西北節度使大印的公文遞與下屬，書房內眾官員傳看後，議論紛紛。\n鄭文常怒道：「整個大胤朝一京十七府，西北佔四府，崇州已反，只徽州、薊州、泰州三府，徽州乃屯兵之地，朝廷為了削弱節度使兵權，歷來又嚴令禁止屯兵之地囤糧種地，現整個西北只餘薊州、泰州兩府可供糧，他魏宣要我們兩府各自在三日內徵出十萬石糧來，這不是強人所難麼！」\n另一官員道：「聽聞泰州徵不上糧來，昨日節度使才派了軍隊前去強行徵糧，農人留的谷種都叫官兵奪了去！百姓別說明年春種，這個嚴冬不餓死便算好的！」\n「魏宣手底下那些兵將，哪將百姓當人，聽說還打死了好些個不願交糧的莊稼漢，此事還沒傳開罷，一旦傳開了，魏家的惡名便又多一條！」\n賀敬元聽著底下的府臣們吵吵嚷嚷，並未做聲，在他們愈吵愈烈時，才問了句：「今年西北何故徵不上糧來？」\n徽州大營十萬軍士的糧草，一向是由朝廷撥給，只不過因崇州戰亂，阻斷了糧道，糧草這才遲遲到不了。\n若是崇州之戰早些結束，也不至於落到此地步，可偏偏大胤戰神武安侯已折在了那裡，對三軍士氣的影響不可畏不大。\n新來的節度使魏宣又是個好大喜功之徒，為了儘快將徽州十萬兵權握到手中，將武安侯麾下重將貶的貶，遠調的遠調。\n他自己帶去的那一班子人馬，根本不熟悉西北的戰局，接連吃了好幾回敗仗，士氣再三受損，硬生生將戰線拉長，耗完了徽州大營現存的糧草。\n徽州告急，按理說，西州其他三府是能先補給上的，便是如今只剩兩府，也不至於一點糧草都徵不上來。\n一直跟個炮仗似的鄭文常抱拳道：「屬下命人查過了，前不久一名姓趙的商人在薊、泰兩州高價收購了不少糧食，百姓只留了春種的谷種和自家吃的粗糧，其餘糧食全賣了換成銀錢過年。」\n賀敬元道：「查查那姓趙的商賈。」\n鄭文常應是。\n賀敬元說：「今日除夕，便不再議事了，都早些回去吧。」\n底下的官員們原本一個個苦大仇深，聽得他這話，喜上眉梢，卻還是按捺住喜色，規規矩矩作揖後才陸續離去。\n只有鄭文常一直緊皺著個眉頭。\n滿屋子的人都走光了，獨留他還杵在原地。\n賀敬元從書案後起身，見他還站在那裡，不免問：「怎不歸家？」\n鄭文常憂心道：「大人，魏宣既點指明要咱們薊州府三日內湊齊十萬石米糧，三日後若拿不出，可如何是好？」\n賀敬元道：「我不是讓你去查那姓趙的商賈了麼？」\n鄭文常沒說話，那商賈一早就在買糧，就算查到了，糧食若賣去了別處，也是遠水接不了近渴。\n賀敬元忽而頓住腳步，看向自己跟前的年輕人，目光溫和而有力：「你想讓我跟魏宣一樣，讓底下的人去百姓手中搶糧食？」\n鄭文常忙道不敢，只是面上仍有些猶豫：「那……魏家那邊您如何交代？」\n賀敬元道：「總有法子，但這法子不是拿刀逼在百姓脖子上。文常，朝臣仕子罵我們是什麼黨不重要，重要的是，咱們自己心裡清楚，這官是為大胤百姓當的。」\n鄭文常羞愧頷首：「下官受教了。」\n賀敬元並不再多言。\n屋外下著鵝毛般的大雪，他走出書房，想的卻是他在得知崇州戰事失利後送去京城的東西，魏嚴當已看到了。\n京城的調令在魏宣發難前送來，那麼魏宣便不足為懼。\n魏宣如今急著徵糧，大抵也是怕被魏嚴責罰，這才急功近利想做出點成就來。\n西北無人，魏嚴能用的僅剩一個他，他冒險用那法子換那兩姐妹一條生路，約莫是能成的。\n他能做的，也只有這麼多了。\n聽到遠處街巷傳來的鞭炮炸響聲，賀敬元眼底露出些許複雜和悵然的情緒來：「逢年過節，總得給那邊的人燒些供奉才是。有位故人，再無人會記得給他燒錢紙了，我無顏見他，文常，你隨我去城外走一趟，替我給故人燒些錢紙。」\n鄭文常應是。\n一輛馬車駛出薊州主城，在一處山坡停下。\n山風呼號，賀敬元親自點了香，向著北方拜了三拜後，插入土裡，隨後迴避，只讓鄭文常把冥幣都燒在了那裡。\n風捲起火舌，那一摞沒來得及燒盡的冥紙也被吹得到處都是，白茫茫的落雪裡混雜著白色的冥紙，無端顯出幾分悽清慘澹來。\n鄭文常燒完供奉走下矮坡時，見賀敬元背對著矮坡，神色有些悽然。\n回程時，他忍不住道：「大人素來寬厚，為何說無顏見故人？」\n賀敬元閉目坐在馬車上，似在小憩，聞言只答：「時局之下，終有不得已而為之之事。」\n-\n臨安鎮。\n被踩化的雪地上覆著被水泡爛的冥紙。\n風颳得大時，還有不少冥紙被吹飛起來。\n化了雪的路不好走，一片泥濘，樊長玉抱著長寧走在田埂上，謝徵面無表情拎著她裝了滿滿一筐香蠟紙燭的竹籃跟在後邊。\n鎮上的傳統，除夕這天得去故去的親人墳前上香燃燭燒紙錢。\n樊長玉爹娘就葬在鎮外一處風水極好的山上。\n因為是新墳，墳前幾乎沒有雜草，到了地方樊長玉就把長寧放了下來。\n爹娘故去已近兩月，長寧看到那兩個墳包，葡萄眼裡還是瞬間就轉起了淚花花：「爹爹，娘親……」\n樊長玉摸摸胞妹的頭，哄道：「別哭，大過年的，得高興些，爹娘看到我們了，在天上才放心。」\n小長寧努力吸了吸鼻子，忍住眼淚。\n樊長玉點上香和燭後，讓長寧在墳前叩頭，自己則把竹籃裡的冥紙拿出來燒在了一個專門裝紙灰的鐵盆裡。\n長寧磕完頭後，也蹲過去跟樊長玉一起燒紙錢，見謝徵站在一旁，把自己手上的冥紙分了好大一挪給謝徵：「姐夫燒紙！」\n謝徵稍作猶豫，也拿起冥紙燒了起來，紙灰味兒有些嗆人，升起的煙燻得長寧睜不開眼，只能先躲一邊去了。\n火盆旁便只剩樊長玉和謝徵。\n謝徵注意到她把籃子裡的冥幣分成了四份，問了句：「還有兩份是給誰的？」\n樊長玉說：「我外祖父和外祖母，從前都是我爹娘給他們燒供奉，現在爹娘也去了，索性就一起燒給他們了。」\n謝徵不動聲色擰了擰眉，她母親連自己原本姓氏都不知道，還能知曉自己爹娘的生辰八字？\n他愈發覺著她母親的牌位上，是特意掩去了姓氏的。\n至於為何她爹沒掩去姓氏，要麼樊姓並非她爹原本的姓氏，要麼……她爹從前用的就是另一個姓氏。\n心中雖有了懷疑，但他絲毫沒有想問她祖父姓氏的意思。\n他已經能猜到結果，問了，她也是三不知。\n樊長玉見他沉默，以為他是想起他過世的爹娘了，大方道：「家中還有多的冥紙，回頭你給你爹娘也燒些吧。」\n謝徵修長的指尖捻著一張被火舌卷燃的冥幣，眉眼在火光和煙塵裡顯出幾分淡漠：「燒這些東西，當真有用麼？」\n這問題樊長玉還真答不上來，她想了想說：「也許有用吧，老人們都說，人在那邊，少不得花錢打點鬼差，不然會受苦的。就算沒用，那也是個念想。」\n逢年過節有人燒紙錢，說明這世間還有人記得那死去的人。\n謝徵沒再出言，只時不時再給或盆子裡扔一挪冥紙，眼睫半垂著，叫人分辨不出他目光中的意味。\n他把冥紙扔的太多，沒燒完堆疊在一起起了濃煙，樊長玉被燻得眼淚都差點出來了，閉著眼把臉扭做一邊道：「你一次別放太多。」\n她伸手去摸竹籃裡的冥紙，沒摸到冥紙，反而摸到一隻微涼的大手。\n樊長玉觸電一般趕緊鬆開，睜開一雙被燻出淚花花的杏眼，又是尷尬又是狼狽：「抱歉。」\n手背依然還殘留著那溫熱的觸感，謝徵輕抿了一下唇，本欲說「沒事」，抬眸瞧見她眼角噙淚，眼尾發紅的狼狽模樣，微微一怔。`

            num: 31,
            title: `第31章第31章`,
            content: `樊長玉好不容易忍過那一陣煙燻,眨了眨眼，把被燻出的眼淚擠出去後才好受了些,抬頭見謝徵神色莫名地盯著自己,她拍了拍自己發頂：「我頭上有灰屑嗎？」\n這會兒風大，她頭上和肩頭的確落了不少冥紙的灰屑。\n謝徵收回目光，斂眸點了頭。\n樊長玉自己胡亂拍了一氣，但這菸灰一拍,反而散成糊糊黏在了身上。\n長寧瞧見了,邁著小短腿跑過來,鼓起腮幫子道：「寧娘給吹吹。」\n樊長玉低下頭讓胞妹幫忙吹掉自己發頂的灰屑,奈何長寧人小，力氣不夠,吹不乾淨，她拽了拽謝徵的袖子,仰起頭道：「姐夫給吹吹。」\n謝徵看向樊長玉，她半蹲在地上讓她妹妹幫忙弄掉頭上的灰屑，從他的角度剛好能看到她一截白皙的後頸和半張清麗的側臉,她因為同她妹妹說話,嘴邊還帶著一抹恬淡的笑意。\n樊長玉一聽長寧讓謝徵幫忙吹掉自己發頂的灰屑，就已抬起頭來,道：「已經弄得差不多了,回吧……」\n最後一個字卻卡在了喉間。\n謝徵抬手一點點幫她拂去了發頂的煙塵和灰屑,他手上的力道很輕，幾乎只是淺淺擦過她頭髮,但撥弄髮絲帶起的輕微癢意,還是讓樊長玉整個人微僵了一瞬。\n這和她自己動手的觸感完全不一樣,但具體哪兒不一樣她又說不出來。\n捻去她發間最後一抹煙塵,謝徵收回手，道：「好了。」\n樊長玉對上他黑沉神色莫辨的一雙眸子，乾巴巴說了句：「謝謝。」\n-\n祭祖回家已臨近中午，樊長玉燉了只豬腳，再切上一盤臘腸，熱一個之前蒸好的扣肉，最後再炒一盤解膩的乾菜，一頓午飯三人也就湊合著吃了。\n那乾菜是青菜收成的季節，把青菜水煮晾乾後囤起來的，鎮上家家戶戶都會這門手藝，聽說是災荒年裡，為了儘可能多地儲存糧食想到的這法子。\n比起青菜的鮮嫩，乾菜更多了一股醇香，用水泡發後切成細段，油煸姜蒜後倒進乾菜一炒，比肉還香。\n一頓飯吃完，肉幾乎還剩一半，一盤乾菜倒是被吃了個乾淨。\n海東青籠子邊上的一大碗鮮肉混內臟的肉碎也被吃了個底朝天，它正眯著一雙豆豆眼用嘴喙梳理自己被放在火塘子邊上變得灰不溜秋的羽毛。\n樊長玉收拾完碗筷，拿出一早買好的春聯紅紙和燈籠開始搗鼓。\n除夕這天貼春聯、掛大紅燈籠也是必不可少的習俗。\n筆墨紙硯都在謝徵屋子裡，樊長玉帶著一疊春聯紙敲開了他的房門。\n書案上鋪著紙，豁口的硯臺裡墨也是研好了的，他不出意料地又坐在瘸腿的書案前寫什麼東西。\n在他清冷的視線掃來時，樊長玉撓了撓頭，厚著臉皮道：「那個……你會寫春聯嗎？」\n長寧跟個小尾巴似的也在門邊露出半個腦袋，一雙眼笑成了兩彎月牙：「姐夫寫春聯！」\n謝徵將寫到一半的紙張收到一邊，在書案上騰出地方，道：「拿來吧。」\n樊長玉便帶著春聯紙和長寧這個小尾巴擠進了屋子裡。\n謝徵把春聯紙鋪在書案上後，用毛筆飽蘸濃墨後，硯臺裡剩的墨汁便不多了，他微偏過頭對樊長玉道：「幫我再研些墨。」\n樊長玉有點欲言又止，但見他已提筆在春聯紙上寫下了遒勁飄逸的第一個字，又不好打擾他，瞅了一眼那方陳墨，拿起用力在硯臺裡研了起來。\n等謝徵筆上墨汁不夠了，打算再蘸些墨些，瞧見硯臺裡那黑糊糊的一堆，沉默了一息，說：「多了。」\n何止是多了，寫一副春聯，她把半塊墨都快研完了。\n他忍不住掃了一眼她的手。\n想到她的手勁兒，倒也釋然了。\n樊長玉訕訕道：「我研之前想問你研多少來著……」\n她識字，被她娘用藤條逼著也勉強學會了寫字，可那字實在是慘不忍睹，筆墨紙硯金貴，她自己鮮少研墨，從前被她娘親逼著練字時，都是她娘研好了墨盯著她寫，她對研多少墨心裡真沒數。\n謝徵對這樣的狀況似乎已經習以為常了，道：「研多了倒是不妨事，就是用不完有些可惜。」\n樊長玉盯著被自己磨掉大半塊的墨，頓時也有些心疼。\n她想到趙大娘家八成也沒買.春聯，道：「那咱們給趙大娘家也寫一副！剩下的墨再寫幾幅，幾個房間門上各貼一副，圖個喜慶！」\n謝徵還是頭一回聽說春聯這麼個貼法，好看的眉擰了擰，隨即又覺著有幾分好笑，心底多了一絲自己也說不清的明朗情緒。\n初見時他只覺著這女子粗鄙，但如今卻覺著，在那份粗鄙裡，又有一股蓬勃向上的生命力。\n像是野地裡的荒草，無人養護，只憑著一股野蠻勁兒向上生長，可破凍土，可裂巖石，忍過嚴冬，熬過酷暑，不管破土後的芽尖經受的是風霜還是雨淋，底下的根系都只繼續深深扎向厚土裡，不斷為芽尖提供向上的養分。\n他看了一眼撐著下巴坐在書案側面看他寫字的女子，筆尖沾了濃墨繼續寫春聯的下聯。\n雪花從半開的窗欞裡飄落進來，風吹動他寬大的袖袍，也吹動樊長玉的長髮，在他收筆時，樊長玉湊近了去看他寫的春聯，一縷長發恰好拂過他手背。\n他收筆的動作一頓，筆尖在春聯下方落下了一滴墨。\n樊長玉「呀」了一聲，有些懊惱道：「我打擾到你了？」\n謝徵收回視線：「沒有，墨蘸多了些。」\n樊長玉有些心疼地看著那副春聯：「真是可惜了，這字寫得多好啊，不過沒關係，貼我和長寧房門口就好了！」\n謝徵抬眸問：「你喜歡？」\n樊長玉點頭，她端詳著這副對子，念出上邊的字：「『冰銷泉脈動，雪盡草芽生』，冰雪一化春草生，我喜歡這個寓意。」\n她說著對著謝徵笑了笑：「我娘從前給自家寫春聯時，也不喜歡寫市面上賣的春聯那類滿是吉祥如意的話。」\n謝徵被她那個笑容晃了一下，沒應聲，垂下眸子，提筆在落下墨點的地方寥寥勾勒幾筆，那一點毀了整副對聯的墨跡就變成了極具意境的野草圖。\n樊長玉和胞妹齊齊「咦」了一聲，眸中難掩驚喜。\n樊長玉拿起那副對聯反覆端詳：「你還會作畫？」\n謝徵說：「會點皮毛。」\n樊長玉盯著他春聯下方那一簇生機盎然的野草：「夠用了。」\n又抬眸瞅了謝徵好幾眼，說：「你去街上賣字畫，我覺得應該也能賺很多錢！」\n憑著他這副相貌和工筆，肯定有大把姑娘願意去買他的畫！\n謝徵原本聽她那些誇讚上揚了幾分的嘴角，在聽得後兩句時，又壓平了。\n他道：「我不作不稱心意的畫。」\n樊長玉知道這人脾氣一向臭，得他這麼個回答也不意外，盯著他繼續寫橫批。\n他提筆寫的是「忍得春生」四字，字跡方遒有力，仿佛也帶了股野草破土而生的蓬勃和韌勁兒。\n那副對聯樊長玉已極喜歡，看到這橫批，更是滿意。\n為了顯得相襯些，謝徵在橫批和上闕的春聯紙上也畫了幾筆野草。\n樊長玉歡歡喜喜地把寫好的對聯放到旁邊的柜子上鋪著晾乾。\n這副春聯已經沒了那點墨跡，買的春聯紙又只夠寫三幅，樊長玉還想給趙大娘他們也寫一副，當即決定把這副對子貼大門口。\n謝徵寫給兩位老人的春聯是一對福壽安康的吉祥對子。\n寫最後一副春聯時，長寧兩手扒拉著書案，墊著腳揚起脖子道：「寧娘也想寫。」\n樊長玉想著這副對子反正只是貼在家裡自己看的，便把寫橫批的紙找出來，讓謝徵幫忙想了一副對子，寫到紙上後，她手把手教胞妹抄上去。\n她帶著長寧寫完橫批，又用自己的狗爬字體寫完上聯。\n字雖然醜了點，但樊長玉瞧著還挺滿意的。\n她把毛筆塞回謝徵手中：「你來寫下聯。」\n謝徵望著那大到快溢出整張春聯紙去的字，沉默了一息，用狂草寫完下聯，看起來才沒那麼違和。\n他寫的所有字體，都規避了自己原本的筆跡，不會叫識得他字跡的人察覺。\n樊長玉本想就此收工了，長寧卻不知何時溜出了房門去，把在堂屋雞籠子的海東青抱了過來，滿眼晶亮看著樊長玉：「把隼隼的腳印也印上去！」\n她的抱法很講究，一隻胖手抱著海東青肚子，一隻胖手扼著海東青脖子，大有海東青不配合就直接拎鳥脖子的意思。\n謝徵對上海東青驚恐又無助的眼神，心情有些微妙。\n這姐妹兩應該是親生的。\n樊長玉摸了摸海東青腦門上的羽毛，想了想說：「行！」\n她把硯臺拿過來，提起海東青一隻爪子伸進去一沾，在長寧寫的橫批後邊印了一個隼爪印。\n被拍腦門子的陰影還在，海東青縮著翅膀全程一動不敢動，只餘一雙豆豆眼瞪著，茫然又可憐。\n印完爪印後樊長玉用溼帕子擦乾淨了海東青腳上的墨跡，這才對長寧道：「抱回去吧。」\n長寧高興地抱著海東青去堂屋放回了雞籠子裡。\n樊長玉則去廚房找了中午沒喝完的米湯糊糊，先把三人一隼共同完成的春聯貼到了堂屋的門框上，才帶著米湯糊糊出門去貼那副「忍得春生」的對子。\n趙家老兩口聽說謝徵給他們也寫了對子，出來看樊長玉幫他們貼上的新聯，笑得合不攏嘴。\n巷子裡路過的其他鄰居瞧見了，新奇道：「長玉，你夫婿還會寫對子？」\n趙大娘一直不願樊長玉因宋硯的事叫人瞧低了去，聽人這麼問起，當即就道：「那可不，那後生也是個會識文斷字的，你瞧瞧這筆字，比街上賣的春聯寫得還好哩！」\n在這小地方，識得幾個字便算得上是個本事人，不說考上秀才，單是考上童生，說親時姿態就得比旁人高上一大截。\n那婦人看了連連點頭：「比起往年宋硯給大家寫的春聯也不差，還是長玉會挑夫婿！」\n她說著衝樊長玉笑道：「讓你夫婿也給嬸子寫一副成不？」\n從前一到新年，宋硯就會去集市上支個攤給人寫春聯補貼家用，巷子裡的鄰居找他寫，他一概不收錢，大家自帶寫對聯的紅紙就行，不過大家找他幫忙寫對聯，大多都還會送上一點東西以示心意。\n今年宋硯一家搬走了，找人寫春聯還得花個十幾文，買現成的也不便宜，巷子裡大多人家家中都沒備春聯。\n樊長玉想了想謝徵的臭脾氣，婉拒道：「對不住嬸子，家裡沒備多的春聯紙了。」\n那婦人直接道：「嬸子家中往年買的春聯紙還有哩！」\n謝徵不知何時出現在大門口，婦人見了他，笑問：「長玉相公，你得空幫嬸子寫副春聯不？」\n「長玉相公」是個什麼鬼稱呼？\n樊長玉生怕他那張利嘴說出什麼刻薄話來，正想再次替他拒絕，卻聽他道：「您把紙拿來。」\n樊長玉有些錯愣，那婦人得了謝徵這話卻極為高興，轉頭就往家走：「你等著啊，嬸子這就回家拿紙去！」\n仿佛生怕謝徵下一刻就反悔。\n樊長玉想著他應下來，八成也是顧慮自己，走進院子後忍不住道：「你要是不願意，不用勉強應下的。」\n謝徵淡淡抬眸：「我何時說我             content: `煙花過後,遠處的街巷裡，爆竹聲還在斷斷續續炸響，夜色裡隱隱傳來一兩聲犬吠。\n謝徵手半握成拳在樊長玉趴著的桌邊輕輕敲了敲：「醒醒。」\n醉酒和困意加持下,樊長玉只含糊應了一聲，腦袋在自己手臂上換了個更舒服的姿勢枕著繼續睡沉了。\n眼見是叫不醒她了，謝徵遲疑片刻後，起身走了過去,把人扶起來準備抱回房間。\n這一番動靜倒是讓樊長玉迷迷糊糊睜開了眼,她兩腮依然帶著坨紅,一時間倒也讓謝徵分不清她是醒著的還是醉著的。\n他扶著她一隻手臂,以防她摔倒,問：「能自己回房嗎？」\n樊長玉歪著腦袋打量他，頭髮因為剛才睡覺的姿勢變得有些毛剌剌的,看起來又呆又乖，眼神茫然，像是還沒認出眼前這人是誰。\n謝徵先是一怔,隨即移開視線，皺眉道：「都不清楚自己酒量也敢亂喝。」\n他拽著她一隻手打算把人半扶起來，卻聽見她在口齒不清地嘀咕什麼。\n謝徵聽不清,只得把側耳湊近幾分：「什麼？」\n樊長玉意識壓根就不清醒,腦袋一點一點的，在謝徵湊近去聽她說話時，她腦袋剛好又一次垂下,唇淺淺擦過他臉頰，腦袋正好埋進了他頸窩裡，一雙本就茫然睏倦的眸子也合上了，壓根不知自己做了什麼。\n謝徵卻整個人僵住。\n時間仿佛在那一刻靜止,風聲，雪聲，篝火燃燒的聲音都停了。\n她毛茸茸的頭頂就抵在他頸側，呼吸聲綿長而清淺，看樣子是睡熟了。\n謝徵好半晌都沒動作，直到邊上傳來一道弱弱的嗓音：「阿姐？」\n謝徵側過頭，就見長寧似乎剛醒來，一手還抱著她的紅封，一隻手揉了揉惺忪的睡眼，困惑看著他和樊長玉。\n他瘦長的手指輕抵在唇邊，做了一個「噓」的手勢，碎發垂落在額前，眸色在燈影裡漆黑沉靜：「你姐姐睡著了，別吵到她。」\n長寧乖乖點頭。\n謝徵指了指一旁的油燈，道：「拿得動油燈嗎？」\n小長寧更用力地點了點頭。\n她兩手捧著油燈走在前邊，謝徵一手穿過樊長玉腋下，一手穿過她膝彎，把人打橫抱起，穩穩地走在了長寧身後。\n樊長玉把他從野地裡背回來過兩次，他卻還是頭一回抱起她。\n她比他想像中的還要清減些。\n是了，短短兩月，她經歷的是雙親亡故、竹馬退婚、大伯搶她家產，再往近了說，這兩場刺殺也足夠普通人膽戰心驚一輩子。\n她表面像個沒事人一樣，每天依舊早出晚歸掙錢養家，飯桌上也從來不見她食不下咽，哄她胞妹時還會跟那小孩一起嘻哈玩鬧。\n從前謝徵覺著是她心大，這一刻卻突然覺得，也許……她並不是心大，她只是知道自己不能一直傷感難過而已，所以努力掙錢，每天好好吃飯，好好睡覺，不敢讓自己生病，也不敢讓自己一蹶不振。\n因為她妹妹只有她能倚仗了，她不能倒下。\n從堂屋去北屋的路不長，在黑暗與燈影的交錯中，謝徵心頭卻湧上了許多複雜的情緒。\n到了北屋，長寧身量不夠，不能把油燈放到桌上，就先把油燈放到了一張圓凳上。\n謝徵把熟睡的樊長玉放到了床鋪上，長寧就蹬蹬蹬跑過來兩手抱住樊長玉腳上的鞋子，使勁兒往後拽，幫她姐姐脫鞋。\n小孩卯足了勁兒卻還是不得章法，謝徵道：「我來。」\n他幫忙脫下兩隻鞋，本想就這麼幫樊長玉蓋上被子，長寧卻道：「阿姐的襖衣還沒脫。」\n謝徵指尖微頓，哄小孩說：「你阿姐睡著了，脫襖衣可能會弄醒她，讓她就這樣睡吧。」\n長寧這才作罷。\n他給樊長玉蓋上棉被時，小孩也踢掉鞋子爬上了床，像個小大人一樣幫她姐姐掖了掖被角。\n謝徵等小孩也躺下了，才把油燈放到了一旁的木桌上，回過頭看了一眼床帳那邊，昏黃的燈火下，樊長玉臉上帶著醉酒的薄紅，睡相乖巧又嫻靜。\n他突然就想起了他教她大胤律法的那一晚，她背律令背睡著了，趴在書案上，在睡夢裡哽咽喊出的那一聲「娘」。\n心頭那股陌生又奇怪的情緒又升了起來。\n「姐夫？」\n長寧見他一直盯著這邊，眨巴眨巴眼喚了他一句。\n謝徵回過神，說：「方才在那邊屋子裡的事，別告訴你姐姐。」\n小長寧很迷茫：「什麼事？」\n謝徵沉默了一息，想著她那會兒剛醒，或許沒看見，便道：「沒什麼。」\n他準備拂滅油燈時，小孩道：「姐夫你回屋不用燈嗎？」\n「不用。」\n話落，油燈已熄滅，屋內陷入了一片黑暗。\n謝徵在一片暗色中步履從容離開了房間，出門時還順手帶上了門。\n他回房前，把還在火塘旁的雞籠子裡的海東青也帶走了，進屋後點上油燈，研墨將白日裡沒寫完的那封信寫完，隨後才放進一個竹筒裡，綁到了海東青腳上。\n海東青翅膀和腳上的傷已養得差不多了，這些日子因為沒有出去飛，每日還有一大碗鮮肉碎或內臟吃，整隻隼都圓潤了一圈。\n謝徵抬臂讓海東青跳上來時，感受到小臂上的重量，眉峰微不可見地皺了皺：「送完信，在外邊飛到天黑再回來。」\n海東青一雙豆豆眼下意識瞟向堂屋那邊那個裝肉碎的大碗，感受到身後的人氣息驟冷，才趕緊煽動翅膀飛向了深沉的夜幕裡。\n謝徵在海東青飛遠了後也沒進屋，而是負手站在簷下看了許久柳絮一般紛紛揚揚往下落的大雪。\n讓趙詢買糧時，他就預料到了官府那邊終究會注意到。\n前些日子趙詢來見他，他已讓趙詢把糧食先送去自己指定的地方，海東青送去的這封信，便是讓他舊部去運糧的。\n魏家人想不費一兵一卒除去自己，再接手他徽州的十萬兵馬，算盤是打得極好，可他既沒死，那父子倆的好日子便也到頭了。\n數月之前突然傳出的關於十六年前錦州之戰的風言風語，他原本還不信，但他那位好舅舅得知他在暗中查錦州一戰後，直接在戰場上設套欲謀他性命，無疑不是坐實了那一謠言。\n拿回徽州兵權之前，還得借魏家人之手，先把他們安插在自己身邊的暗釘給拔了。\n想到自己認賊作父十六載，謝徵挑起的嘴角就滿是嘲意。\n如果那個女人在得知他父親死訊時，沒有選擇隨他父親而去，他是不是就可以不用被養於魏嚴之手，也不用認賊作父十六載？\n他沉沉閉上眼，屋簷下的燈籠將他高挺的鼻梁在臉上投下一片暗影。\n不知怎地，又想起了樊家那兩姐妹來。\n有那麼一瞬，謝徵其實是有些羨慕那個小孩的。\n他幼年遭逢變故時，同她差不多大小，但謝家大廈一傾，他身後再無人可為他庇風雨。\n那個小孩多好啊，沒了爹娘，卻還有一個為她撐起一片天的姐姐……\n再睜眼時，謝徵眸底所有情緒都已沉寂了下去。\n他轉身回房，褪下外袍剛躺下便覺出枕頭底下不太對勁兒。\n他坐起，拿開枕頭，瞧見放在枕下是一個紅封時，俊美的臉上明顯有片刻錯愣。\n壓歲錢。\n歲同祟，民間都說壓歲錢可以闢邪驅鬼，保佑平安。\n這是那女子給他放的？\n謝徵拆開紅封，裡邊裝的是幾個銀錁子。\n每一個的分量都不到一兩，但此刻拿在手中，卻只覺沉甸甸的。\n謝徵不記得自己有多久沒收到過壓歲錢了，父母離世後，他唯一一次收到壓歲錢，還是外祖母在世時給的。\n魏嚴冷血剛強了一輩子，別說他這個外甥，便是他自己的親兒子，他都未曾假以慈色過，自然也不會在年節裡讓人給他們準備紅封。\n謝徵仰躺在床上，一手枕在腦後，一隻手拿著一枚銀錁子放在眼前借著燭光靜靜端詳，漂亮的眉眼間多了幾許其他情緒。\n她父母亡故，此後也無人再給她壓歲錢了吧？\n-\n次日，樊長玉醒來時，只覺腦袋有些漲漲的。\n醉酒的緣故，她起得有些晚了，長寧都已不在房內。\n她慢吞吞爬起來，發現衣服都好好地穿在自己身上，努力回想了一下昨夜的事，但醉後的記憶再怎麼想也是一片空白。\n不過她還能回房的話，要麼是她自己走回來的，要麼是被言正扶回來的。\n樊長玉想想後者就覺面上躁得慌。\n這可真是丟臉丟大發了，她喝清酒都喝醉了，傳出去不得叫人笑話。\n她按了按隱隱作痛的額角，起身後剛簡單洗漱完，就聽見堂屋那邊傳來了長寧的哭聲。\n樊長玉走出去問：「怎麼了？」\n長寧蹲在雞籠子旁邊，哭得一把鼻涕一把淚：「隼隼沒了……」\n樊長玉看到空空如也的雞籠子，也愣了愣，道：「可能是昨夜籠子門沒關，那隻矛隼翅膀的傷養好了就飛走了。」\n長寧哭得更傷心了些。\n樊長玉無奈，只得拿出矛隼也得回去找隼爹隼娘那套說辭，長寧才慢慢止住了哭聲。\n謝徵在房裡大概也聽到了哭聲，出來後見長寧還守在雞籠子旁掉眼淚，說了句：「還會再飛回來的。」\n長寧抬起一雙淚汪汪的眼：「真的嗎？」\n樊長玉以為他是在哄小孩，怕他說了這麼個慌話後邊長寧發現是假的更難過，顧不得自己昨晚喝醉了可能出糗的尷尬，遞了謝徵一眼。\n謝徵一開始沒明白她那個眼神，後面樊長玉哄走了長寧才對他道：「你不用這樣騙她的，長寧可能就是太孤單了，等開春了我打算養一窩小雞，她有新的玩伴了就不記得那隻矛隼了。」\n謝徵道：「我沒哄她。」\n這次輪到樊長玉滿臉錯愣。\n讓海東青送信的事眼下還不能坦白，謝徵說起謊來臉不紅氣不喘：「鷹隼馴到後面，本就會再將鷹隼放飛，會飛回來才是完全被馴服的。」\n樊長玉一聽，這不還是個未知數？\n她狐疑瞅謝徵幾眼：「你就這麼確信能飛回來？」\n謝徵從容不迫地點了頭。\n樊長玉心中雖然還是有些疑惑，但自己也不懂馴鷹隼，倒也沒再說什麼。\n她前段時間燻的不少臘肉都還掛在火塘子上方，大部分都是留著賣的，只有小部分留著吃。\n從前她爹娘還在時，每年都是這天她爹拎一塊肉去看樊家二老，如今爹娘不在了，樊長玉雖跟那老兩口不親近，但畢竟是長輩，樣子還是得做做。\n早飯後，她也打算拎一塊臘肉拿去給老兩口就回來，託付謝徵幫忙看著些長寧後就拿著臘肉出了門。\n樊大前不久才死了，樊家老宅這個年過的也有些慘澹。\n樊長玉去時，只有樊家老兩口在家，劉氏帶著一雙兒女回娘家過年去了。\n可能是一年裡兩個兒子都死了，老兩口受到的打擊還是有些大，樊老婆子直接臥床不起，樊老爹本就斑白的頭髮，幾乎是全白了，大過年穿的衣裳也髒兮兮皺巴巴的。\n不知是無心收拾，還是現在兒媳當家，日子過得並不好。\n他看到樊長玉，讓她進屋去坐著烤烤火。\n但樊長玉只想給完東西就走人，道：「寧娘還在家中等我，我就不多留了。」\n樊老爹看著她拎來的臘肉，約莫是想起小兒子從前每年過年也會拿一塊肉過來，紅了眼眶，說：「進屋去坐坐吧，你爹從前的一些事，我想著還是該告訴你。」\n樊長玉聽到這話愣了愣，她爹從前還有什麼事是她不知道的？\n見樊老爹說完那話後就步履蹣跚往屋子裡去了，樊長玉稍作猶豫，還是抬腳跟了上去。：，，.`

            title: `第33章第33章`,
            content: `老宅比起樊長玉家更破舊些,顯然也沒怎麼收拾，屋子裡的東西亂糟糟擺在一起，因為冬日裡燒火塘子,桌椅板凳落了不少煙塵也沒擦拭。\n坐下去前不擦一擦,起身衣服上就得沾上不少煙黑。\n屋中的擺設也都是些不值錢的土陶罐子,樊大父子倆都好賭，家中但凡有點值錢的器物,也早就被他們拿去典當換錢了。\n樊家老兩口住在西屋，樊老爹在西屋門口說了一聲：「老婆子,長玉來了。」\n躺在床上的樊老婆子直接翻了個身直接背對房門，顯然連話都不願意跟樊長玉說一句。\n樊老爹有些訕訕的，跟樊長玉解釋：「大牛遇害後，她這些日子一直這樣。」\n樊長玉壓根沒放心上,也沒自討沒趣去問候什麼，從她有記憶起，樊老婆子就沒給過她們一家好臉色。\n她用樊老爹遞過來的帕子擦了擦板凳，直接在堂屋的火塘子旁坐下烤火。\n樊老爹把她提來的臘肉掛到火塘子上方繼續受煙燻時,樊長玉注意到一旁桌子上還沒收撿走的碗筷。\n老兩口今早看樣子煮的是米糊糊，大過年的飯桌上也不見一點肉腥。\n樊長玉皺了皺眉，等樊老爹坐下後,問了句：「大伯出事後官府給了二十五兩的撫恤金,那錢你們沒用？」\n二十五兩不是一筆小數目了，普通人家用的節省些，家中也沒人看病抓藥的話,十兩銀子足夠一年的開銷。\n樊老爹吶吶道：「那錢得留著給你堂哥娶媳婦……」\n樊長玉眉眼一抬：「不會又叫他給輸到賭坊去了吧？」\n樊老爹道：「錢在你大伯母那裡收著的,你大伯母怕孝期耽擱了說親的年歲,打算在熱孝期間讓你堂哥完婚,已經在相看姑娘了。」\n樊長玉一聽，也就不再說什麼了。\n日子都是自己過的，老兩口從前是什麼好東西都緊著樊大，如今兒子沒了，自然是把好東西都緊著孫子。\n只要老宅這邊不又打她家宅子的歪主意，她倒也願意繼續維持兩家這井水不犯河水的狀態。\n她問：「您先前說跟我爹有關的事，是什麼？」\n樊老爹一張滿是褶子的臉映著火光，整個人愈發顯得乾瘦，他緩緩嘆了口氣：「大牛遭難，可能也是我的報應。」\n樊長玉聽到這話只覺有幾分奇怪，沒做聲，等樊老爹繼續說下去。\n「你爹雖不是我親生的，卻也是我親兄弟的孩子，那一年鬧饑荒，你真正的祖父跟著村裡人去官府的糧倉搶糧，叫官兵打死了。你祖母把家中所有的存糧都留給了你爹吃，自己也活活餓死了，臨死前把你爹託付給了我……」\n樊老爹說起這些，一雙渾濁老眼裡閃爍著淚光：「我是想把那孩子當親骨肉養的，可災荒年啊，餓死在路邊的人都有人架鍋煮來吃，觀音土也叫人搶光了。家裡多一張嘴，所有人就都得把吃的勻出來一點分給你爹，你那兩個沒見過面的姑姑，大的那個才十三歲，被送給一員外老爺做妾，換了半袋白米麵……」\n樊老爹嗓音都在抖，老淚縱橫：「後來那員外去了別的州府，幾十年過去了，我跟老婆子也沒再見過那孩子，不知她是死是活。小的那個才八歲，三百文賣給了人牙子，也音訊全無。那時家裡的孩子只剩大牛二牛和你爹了，還是填不飽肚子。你爹跟我的二牛一樣大，但我的二牛也是個體弱的，逃荒路上生了一場大病，為了給二牛看病，迫不得已，才把你爹也賣給了人牙子……」\n「你爹打小就懂事，被人牙子買走時，還給我磕了三個響頭。」說到此處，樊老爹哽咽得不能自已：「賣的那五百文，叫我愧疚了一輩子……二牛是個福薄的，幾副藥灌下去，還是沒能救回來。我以為這輩子都見不到你爹了，誰知道十六年前，他自己帶著你娘回這鎮上來了。」\n「被賣的那兩個閨女，他那些年裡一直在幫忙打聽音訊，大閨女他沒找到，但是小閨女他是尋到了的，聽說是嫁了一軍戶，不過後來死在了戰亂裡。災荒戰亂，哪個都是人命賤如草……」\n樊長玉沒料到自己爹當年「走丟」有這麼多隱情，一時間心緒複雜，好一會兒才道：「我爹回來後，怎就用了您二兒子的名諱？」\n樊老爹道：「你爹當時回來就跟我說，他在外邊走鏢結了仇家，問我能不能用二牛的身份在鎮上生活，我哪能不同意，就對外說他是當年逃荒走丟的二牛。老婆子這麼多年一直怨恨你爹，覺得都是為了你爹才讓兩個閨女被賣的。在你爹娘來鎮上後，也時常上門去找麻煩，口口聲聲說是為了你爹才舍了自己兩個女兒，從你爹娘那裡拿了不少好處。後來你娘生你妹妹落下病根，她見你家沒個男丁，又想著把大牛的二兒子過繼給你爹，好以後繼承你爹的家產。」\n樊老爹重重嘆了口氣，面上滿是羞愧：「她就是魔怔了，那饑荒年裡，就算沒收養你爹，兩個閨女……八成也留不住。孩子一個個都沒了，最後只剩大牛，她一再縱容，才把大牛給養歪了。也怪我，早些年沒本事養這一大家子，後來明知她錯了，她一哭兩個閨女，我就沒能狠下心管教大牛……」\n樊長玉原先很討厭樊老婆子，覺得她對自己一家尖酸又刻薄，聽樊老爹講完這段往事，只覺可憐之人必有可恨之處，但心中依然對她沒什麼改觀。\n誠如樊老爹說的，最後賣掉了她爹都沒能救下樊二牛，樊老婆子如何又認定當初只要沒收養她爹，她的兩個女兒和小兒子都不會離她而去？\n只是她爹恰好成了樊老婆子發洩怨恨的一個靶點罷了。\n樊長玉道：「過去的事情都過去了，只要你們不再來我家找什麼麻煩，以前我爹怎麼對你們的，往後我還是這樣對你們。」\n樊老爹道：「我同你說這些，不是為這個。你爹娘出事前，你爹來找過我。」\n樊長玉面露詫異。\n樊老爹又是愧疚又是難堪地道：「他把你家的房產鋪子怎麼分都安排好了，還寫了遺書，說豬肉鋪子可以給你大伯，其他的都留給你和你妹妹。我問他是不是當年結的仇家找上門來了，他又不肯多說，只讓我往後護著你們姐妹一二。怎料老婆子是個多嘴的，在你爹娘過世後把這事透露給大牛了，大牛這些年染上賭癮，人越來越渾，直接偷了那遺書拿去燒了，想霸佔你家全部的家產。我這把老骨頭也不中用，壓根管不住他……」\n樊長玉在聽說爹娘可能是做好一切準備後去赴死的，手腳就止不住地發涼，放在膝前的兩隻手也不自覺握成拳，唇抿得發白：「您的意思是，我爹在那之前，可能就知道他和我娘命不久矣？」\n樊老爹遲疑點了頭。\n樊長玉渾身發冷，腦袋裡也亂糟糟的。\n如果按官府的說法，是找藏寶圖的山賊尋到了她爹，來討要藏寶圖。\n那為何她爹會覺得帶著她娘一起死了，山賊就不會再來殺自己長寧？\n除非……山賊已經拿到了藏寶圖。\n但後面自家還是兩次遭遇匪賊，顯然他們又還沒拿到東西。\n不過後來的這兩批山賊，明顯不知道她家，而是從樊大口中問出了什麼才鎖定的。\n樊長玉只能想到一種可能，殺她爹娘的山賊和去她家中找藏寶圖的山賊不是同一批。\n前者拿到了藏寶圖，卻還要殺她爹娘，或許是因為她爹娘知道什麼秘密？必須得被滅口？\n樊長玉原本以為官府剿匪後，爹娘的大仇就算得報了，此時卻突然覺得，殺害她爹娘的兇手興許還沒伏誅。\n畢竟前不久才傳來消息，說藏寶圖在崇州反賊手中現世，那反賊還招安了附近不少山賊匪寇，殺她爹娘的山賊指不定就在反賊麾下。\n回家的一路，樊長玉整個人都心事重重的。\n進了家門，就聽見屋子裡傳來謝徵清淡的嗓音：「木、爻、木，底下再一個大字，組合起來就是樊字。」\n長寧慘兮兮道：「我不要學認字了，我要跟阿姐一樣學殺豬。」\n「你阿姐殺豬也識字。」\n長寧吸了吸鼻子，像是要哭出來了。\n聽到開門聲後，立馬邁著小短腿跑出去，張開雙臂抱住了樊長玉大腿，仰起頭，臉皺巴成一團：「阿姐，殺豬為什麼也要學認字？」\n樊長玉心裡還想著事情，只摸了摸長寧頭上的小揪揪：「娘從前說，讀書認字後識大體，明大理，這輩子為人處世才不會行將踏錯。」\n長寧有些呆，顯然還聽不懂這句話的意思。\n謝徵眉眼半抬，倒是接了句：「也沒見你喜讀書。」\n他這話裡有幾分揶揄的意思，換做往常，樊長玉肯定會拌嘴拌回去的，但今天只有些疲憊地說了句：「以後慢慢讀吧。」\n謝徵終於發現了她神色間的異樣，問：「出去一趟怎就跟霜打了似的？」\n樊長玉坐到火塘邊上，淺淺嘆了口氣，把樊老爹說的都告訴他後，頹喪道：「我爹娘被殺不止是因為藏寶圖的話，我總得查出她們真正的死因。」\n謝徵聽完後，眸色也沉了下來，他爹既然早有預料，甚至還準備好了後事，那就說明取她爹性命的人或許提前見過她爹？\n她的猜測不無道理，不過那群人找的，並非是什麼藏寶圖，而是一封讓魏嚴無比重視的信。\n殺她爹娘的人拿到了信，她和她妹妹對她爹娘的過去確實半點不知，所以對方才放過了她們？\n謝徵從前給魏嚴當過刀，當然知道魏嚴一貫要的是鏟草除根。\n對方放過她們姐妹，可能是因為跟她爹娘有故？聯繫前面殺她爹娘前還提前見過，這個猜測似乎就更站得住腳了些。\n後面魏府的死士來她家殺人取物，薊州牧賀敬元突然撥軍隊臨安鎮這一舉動，委實值得令人深思了。\n最重要的是，以他舅舅魏嚴的鐵血手腕，在臨安鎮折了這麼多死士，卻還坐得住，實在是不像他的作風。\n如果是賀敬元要保這姐妹倆，眼下的西北戰局魏嚴手底下又只有賀敬元能用，那二人達成了什麼協議，或許一切就都說得通了。\n樊長玉一抬頭，就見謝徵眸色深沉地盯著自己，她困惑道：「怎麼了？」\n謝徵答非所問說了句：「你想替你爹娘報仇？」\n樊長玉點頭：「想啊。」\n她這才注意到謝徵頭上綁的是自己之前給他買的那根髮帶，貌似是他第一次綁這條髮帶。\n藏青色襯得他眉眼愈發冷峭，整個人都多了一股疏離感。\n謝徵道：「如果官府結案說的那些話都是假的，你當如何？」`

            title: `第34章第34章`,
            content: `樊長玉不解道：「官府為何要說假話？」\n謝徵微微擰眉,思及她從出生到現在，一直生活在這小地方，見過的官,最大也就是縣令了，對她此刻表現出的天真愚拙倒也多了一份寬容。\n她爹娘興許教了她許多一輩子為人處世的道理,卻並未告訴過她官場的爾虞我詐。\n他罕見地耐心同她解釋，甚至還舉了個例：「就像你大伯想侵吞你家房地時，找上了那師爺,小小一個縣衙的官場裡邊有風雲,再往上，州府、朝堂,裡邊的關係只會更錯綜複雜,黨派、同僚、姻親、師生……每一個官員身後,都牽扯著一張權勢的大網。有的案子，涉及到了上面高官的利益，看似底層百姓的一樁冤案,實則也成了高官的鬥法。」\n樊長玉鎖眉思考許久後道：「你的意思是，我爹娘的死，裡邊可能也牽扯到許多大官的利益？」\n謝徵眼底流露出些許詫異,她倒也不笨。\n他垂下眸子：「我只是舉個例子，可能官府只說了一半的真話,也可能全是假話。這些都不重要,重要的是,官府給了你假的真相，你當如何？」\n這個問題,的確有些超出樊長玉的認知了,在平民百姓心中,當官的就是百姓的天，一個貪官就足夠百姓叫苦不迭了，聽了謝徵這番話，她忽而覺著，那些當官的似乎也不是各個都是青天大老爺。\n如果整個大胤官場的官員都是官官相護，那她們頭頂的就不是天，而是一張把她們裹得死死的網。\n樊長玉只迷茫了一瞬，眼神很快又堅定起來：「樊大找何師爺圖謀我家產時，我想過去找比何師爺更大的官走門路，清平縣最大的官是縣令，縣令跟何師爺是穿一條褲子的，我指望不上縣令，才想著綁了我大伯。」\n「大胤朝的官場再大，無非就是上面當官的人更多了些，我若是認得高官，在我大伯的案子上，我大概會去找州府的大官幫忙，樊大要是也找上了州府最大的官，我還有門路的話，會去找京城的官伸冤，這層關係找到最後，無非是捅到皇帝跟前去。」\n「清平縣最大的官是縣令，大胤朝最大的官是皇帝，在找人伸冤上，這兩者也沒什麼不同。最後用來辯黑白的，還不是證據和鐵律。」\n她看著謝徵，眼神清明而無畏：「不管我爹娘的死牽扯到了什麼，我都會查下去，那千萬條人脈交織成的大胤官場網，也沒什麼好怕的。」\n她能說出這樣一番話來，屬實是讓謝徵意外。\n他問：「你如何查？」\n樊長玉看向還在院子裡玩雪的長寧：「我不怕涉險，但長寧還太小了，如果再讓殺害我爹娘的人注意到我們姐妹倆，我不敢保證能保護好長寧。所以在那之前，我會先把長寧送去一個安全的地方。」\n謝徵面露讚賞：「然後呢？」\n樊長玉道：「我若是個男兒身，或許會選擇考科舉或武舉進官場，親自把我爹娘的死牽扯到的東西查個水落石出。但我只是個女兒家，我入不得官場，也不認識什麼當大官的人，還剩唯一一條路，大抵便是有錢能使鬼推磨了。」\n謝徵單手撐著額角說，「是個好法子，不過聽起來得費上不少年頭，能讓那些大官給你推磨的錢，可不是筆小數目。」\n樊長玉微微一噎，道：「我眼下能想到的，也只有這樣的法子了。學戲文裡女扮男裝考科舉，我一沒那個讀書的腦子，二沒家中兄弟的身份可借我冒用。除非……」\n她撓了撓頭道：「我再去資助幾個貧寒書生？看能不能運氣好資助到一個有良心的，等他高中後進了官場，我在官場上也就算了有人了，查起我爹娘的死因估計會方便很多？」\n這次輪到謝徵一噎，他眼皮一抬，刻薄道：「再遇上你前未婚夫那樣的呢？」\n樊長玉發現這人最近變得有點怪，動不動就喜歡拿宋硯說事。\n她道：「大過年的能不提他嗎？」\n謝徵斜她一眼，抿嘴不再言語，像是臭脾氣又上來了。\n樊長玉嘀咕：「還嫌我不夠晦氣……」\n謝徵耳力好，這句嘀咕也被他聽了去，原本平直的嘴角突然往上翹了翹，他說：「你爹娘的案子，你可以先等等。」\n樊長玉很困惑：「什麼意思？」\n謝徵道：「如果你爹娘的死牽扯甚多，官場上有人想就此揭過真相，也會有人想徹查到底，你而今需要做的，應當是在保全你和你妹妹之餘，等想揭開這真相的人自己找上門來。」\n樊長玉說：「但我對我爹娘的過去一無所知，對方找上門來，也從我這裡拿不到查不到什麼想要的。」\n謝徵心道只要撬開賀敬元的嘴，她爹娘的死就可以浮出水面了。\n只是魏嚴若知道他沒死，哪怕舍了整個清平縣乃至薊州，也會再次置他於死地，乾坤未定之前，示明身份，只會招來禍端。\n他道：「你小看了官場，會有人來尋你的。」\n樊長玉還是困惑，糾結了一會兒，覺得謝徵大概是在安慰自己，便也沒做他想，只道：「我現在越來越覺得，多讀書能讓人變聰明，言正你讀書多，就好聰明。」\n謝徵聽過各種各樣的恭維，論起誇人，世上再沒有那些文人會想溢美之詞了，但那些讚揚聲他從未放在眼裡過，此刻她這直白又淺顯的一句「聰明」，倒是讓他心下生出幾許異樣的情緒。\n他還是糾正她道：「不是讀書多就聰明，讀書使人明理，增長了見識，知進退，眼光不再淺薄，在為人處事上，便也夠用了。」\n樊長玉點頭：「我娘以前也這麼說的，可惜我那時候不懂事，讓我讀書就跟趕過年豬出圈一樣，現在想學也來不及了。」\n她這會兒是真覺著讀書有用了，不說旁的，之前樊大想搶她家產，言正都不用出陰招，就能想到在律令上做文章打贏這場官司。\n自己要是也博學多識一點，說不定豬肉都能賣出不同花樣來。\n她原先也以為糖拌青瓜就是糖拌青瓜，在溢香樓幫忙做滷肉時，才知道溢香樓裡管糖拌青瓜叫「青龍臥雪」，菜名高雅起來了，菜錢也跟著翻倍。\n樊長玉想起自己回來時，他像是在長寧認字，便也厚著臉皮道：「你要是得閒，能教我讀些書嗎？不會耽擱你太多時間，你就告訴我學什麼，我自己去看，看不懂的，再來請教你。」\n謝徵淡淡抬眸，對於她這個想法挺意外的，隨即問：「你都讀過哪些書？」\n樊長玉想了想說：「《三字經》、《百家姓》、《千字文》還是認全了的。」\n說完就見謝徵黑了臉。\n樊長玉怕他覺著教自己麻煩，硬著頭皮道：「《論語》、《太學》也讀過一些。」\n謝徵嗓音幽幽：「是《大學》吧？」\n樊長玉窘得想找個地方鑽進去，坦白道：「這兩本我就從前看宋硯讀時，隨便翻了翻，書看不懂，他又寶貝得跟什麼似的，就還給他了，也沒好意思問他裡邊的文章講的是什麼。」\n老實交代完，樊長玉就覺得周身有點涼颼颼的。\n她看向謝徵，只覺他那張臉俊俏的臉此刻實在是又臭又冷。\n樊長玉不明所以。\n謝徵說話幾乎能掉冰渣子：「《論語》、《大學》你既然都學過了，接下來就看《孟子》吧。」\n樊長玉一臉茫然，她那話是說學過了的意思嗎？\n她分明是說自己只粗略翻了翻，連裡邊意思都沒弄清楚。\n不僅如此，午間吃飯時，她還眼尖地發現謝徵把頭上的髮帶又換回了他原本的那條。\n樊長玉不知道哪兒惹到他了，在飯桌上輕咳一聲問：「下午我打算拿些臘肉去縣城賣，順便給王捕頭也拿一塊臘肉去拜年，你有什麼東西要買的嗎？」\n一直「食不言」的人這才說了句：「紙用完了，昨日寫春聯，墨也用完了，買些紙和墨回來，紙要五尺淨皮的夾宣，墨要松煙的徽墨。」\n樊長玉聽得頭都大了，「什麼宣？什麼墨來著？」\n謝徵眉峰微皺，道：「罷了，我自己去買。」\n樊長玉感覺他有些冷冷淡淡的，想到他傷還沒全好，還是多問了句：「我下午回僱個牛車，你一起去？」\n長寧一聽，兩隻小胖手就開始拍桌：「長寧也要去趕集！」\n一大一小兩隻都直勾勾盯著謝徵，謝徵沉默了一息，終是道：「那便一道走。」\n長寧因為要去趕集，興奮得不得了，在院子裡跑了個圈還不夠，出了院子把趙大娘家的狗都攆著跑到了巷子口才作罷。\n樊長玉想今日去縣城賣臘肉，倒也不是一時興起，往年她爹也會在這日抽空拉一車臘肉去縣城賣。\n一些走親訪友的人家，若是提前沒備好年節禮，肉市這兩天又不開張，大多會在路邊小販那裡買。\n到了縣城，樊長玉極有經驗地把牛車停在了縣學門口的大街上。\n這裡來往的學子多，還有不少人家為了照顧家裡的讀書的兒子，直接在附近租賃了房屋的。\n學生去給夫子拜年，尋常茶酒拿不出手，貴的又極費銀子，買一條臘肉當年節禮再合適不過。\n樊長玉一擺上攤，就做了好幾單生意，謝徵本欲去書肆那邊，但長寧一直在墊腳四處張望，眼巴巴問樊長玉：「阿姐，我能跟姐夫一起去看敲花鼓的嗎？」\n樊長玉說：「你姐夫不去看花鼓。」\n長寧就眼巴巴看向了謝徵。\n謝徵看了一眼樊長玉這邊才賣掉一小半的臘肉，說：「等你姐姐賣完了一起去吧。」\n樊長玉估摸著自己帶來的臘肉賣完還得要點時間，便道：「我這裡收攤還早著，你要是不急著去買紙墨，就幫我帶長寧去轉轉，她就是好奇心重，轉上一圈回來，她就不鬧騰了。」\n謝徵點了頭。\n得了樊長玉這話的長寧拽著謝徵的袖子，興奮地走在前邊，勁頭足得跟個小牛犢似的。\n謝徵感受著袖子被拖拽的力道，心說這孩子若不是打娘胎裡生下來就體弱，將來指不定也跟她姐姐一樣，虎得很。\n今年許是縣裡要辦燈會的原因，縣學的學子們大多都沒歸家，街上也熱鬧，樊長玉帶去的那二十多條臘肉，比她預料中的早賣完了大半個時辰。\n她收攤時，正好謝徵也帶著在附近逛夠的長寧回來了。\n長寧左手一個糖葫蘆，右手一個彩色小風車，吃得臉上都沾了糖漿。\n樊長玉瞧得頗為無奈，對謝徵道：「你就慣著她吧。」\n長寧笑得眯起眼：「姐夫給阿姐也買了一串糖葫蘆。」\n樊長玉說：「我又不是小孩子，吃什麼糖葫蘆……」\n話還沒說完，一根糖葫蘆已經遞到了她跟前。\n謝徵神色淡淡的：「你妹妹說要給你也買一根。」\n樊長玉本想說不要，瞥見他手裡還有一根，想著他似乎喜歡吃甜食，現在又沒喝藥，肯定是不好意思光明正大地吃，這才拉上了自己，便也不好再拒絕，伸手接過後說了句「謝謝」。\n樊長玉跟長寧吃相一樣，都是一口一個糖葫蘆，眼睛眯起，兩頰鼓著像只倉鼠。\n樊長玉吃完一顆見謝徵手上還拿著那串糖葫蘆沒動，奇怪道：「你怎麼不吃？」\n謝徵視線從她嘴角的糖衣渣子上移開，遲疑看了一眼自己手上的糖葫蘆，咬下半顆。\n裹在外面的糖衣甜津津的，裡邊的山楂又略酸，嚼碎了酸酸甜甜的，倒也別有一番滋味。\n又咬下了一顆糖葫蘆的長寧看著這一幕笑得見牙不見眼，她真聰明，讓姐夫一人買一根，果然阿姐就沒數落她了。\n這街口不僅有賣東西的小販，還有家中貧寒支了個攤子給人作畫的縣學學子。\n對面街口那吃著糖葫蘆的一家三口實在是打眼，男子俊美非凡，女子笑靨如花，就連兩人帶著的那小孩，都玉雪可愛得緊。\n書生頻頻往那邊看了幾眼，飛快地在紙上作畫。\n樊長玉吃完糖葫蘆，收拾好東西正準備帶謝徵去買紙墨，卻見他神色忽而一凜，大步朝對面街口走了去。\n樊長玉往那邊瞧了一眼，發現只有個支著攤賣字畫的書生在那裡。\n怕惹出什麼是非，樊長玉忙帶著長寧跟了過去：「你幹嘛去？」\n書生剛落完最後一筆，邊上忽伸出一隻大手，一把就拽走了那副畫。\n方才還站在對面街口吃糖葫蘆的男人不知何時已到了跟前，拽著他領口，白玉似的一張臉冰寒駭人：「誰讓你畫的？」\n書生被那股子壓迫感逼得話都說不利索，結結巴巴道：「小生……小生只是瞧著公子和夫人一家三口甚是美好，這才抑制不住作了畫，如有冒犯，還望公子勿怪。」\n樊長玉也在此時帶著長寧趕了過來，見他頗有當街打人的架勢，連忙扳開他拽著書生衣襟的手，「你這是做什麼？」\n謝徵沒說話，垂眸看向了拿在手中的那副畫。\n書生工筆一般，但這幅畫勝在人物畫得極為傳神。\n畫上樊長玉眯著眼在吃糖葫蘆，他視線正好落在她臉上，似一直在關注著她的一舉一動，長寧在前方咬著一顆糖葫蘆回望著她們二人，亦是笑得見牙不見眼，眉眼裡透著一股古靈精怪勁兒。\n樊長玉看到這幅畫時，也驚訝「咦」了一聲，問那書生：「你畫的我們嗎？」\n書生實在是怕這嬌憨小娘子邊上那煞氣沉沉的男人，趕緊點了頭，好聽話不要錢似的一溜串往外冒：「夫人和公子郎才女貌，實乃天造地設的一對，就連小千金都生得如此可愛，夫人若喜歡，這幅畫就當小生送給二位的新年賀禮了，祝夫人和公子和和美美，明年再添一位小公子。」\n樊長玉險些沒把嘴裡的糖葫蘆籤子給咬斷。`
        },

            num: 35,
            title: `第35章第35章`,
            content: `長寧踮起腳看清畫上的人物後,一雙葡萄眼裡滿是欣喜，小胖手指著畫上的她自己道：「上面有寧娘！寧娘喜歡這個！」\n謝徵在樊長玉開口之前問那書生：「你的畫怎麼賣的？」\n書生愣了幾許，才反應過來這看起來極不好惹的俊美男人是在問他畫的價錢，忙道：「不要錢不要錢,就當小生贈與公子和夫人的。」\n樊長玉因為書生方才那幾話還囧著,不過倒也覺得這幅畫挺好看,見書生死活不肯說價錢，想了想，在原本打算拿給王捕頭的兩條臘肉裡，選了一條小些的給那書生，說：「這條臘肉贈與你，也當是新年禮了。」\n又板著臉指著長寧道：「這是我妹妹。」\n書生得了一條臘肉實在是意外之喜,好聽話更是要多少有多少：「是小生眼拙,沒認出來，那祝夫人和公子來年喜得一對龍鳳胎，圓圓滿滿，兒女常歡膝下。」\n樊長玉：「……」\n她有心跟這書生再說點什麼,但她和言正是假夫妻的事，告訴一個不相干的人好像也沒必要。\n一直到拿著那副畫離開了書生的攤位，樊長玉心裡都還彆扭著,時不時又掃一眼拿著捲起來的畫走在邊上的謝徵。\n發現他面色如常,心裡的彆扭感才少了那麼一點。\n她們回到先前擺攤的位置，收拾好東西打算去書肆買紙墨,邊上一家年貨鋪子的老闆約莫是看樊長玉在這裡擺攤不到一個時辰就賣出去了二十多條臘肉,眼饞這生意,拖著肥胖的身體追出來：「小娘子留步。」\n樊長玉聽到話音轉過來,就看到那年貨鋪子裡的胖掌柜臉上堆著笑走了過來,問：「小娘子明日還來這裡賣臘肉嗎？」\n明日就是初二了，樊長玉不僅要開自家的豬肉鋪子，還得供應溢香樓的滷肉，怕是抽不出時間再來這邊賣臘肉，便搖頭道：「後面幾日應該都沒時間再來了。」\n胖掌柜笑道：「那小老兒想同小娘子做筆生意，小娘子家中還有多少臘肉儘管拿來，放我這年貨鋪子裡賣，賣出去的臘肉，同小娘子四六分成，小娘子六，小老兒四，小娘子看如何？」\n樊長玉尋思著，他這不是俞掌柜說過的「空手套白狼」麼，他一分錢不出就讓自己把臘肉運來，賣了錢他還能得一半。\n這臘肉不比鮮肉，掛在家中陰涼通風的地方，存放個一年半載都不成問題，價錢自然也比鮮肉貴上不少。\n年節這幾天，樊長玉喊價是六十五文一斤，真要砍價也能砍到六十文往上，六十五文往下。\n按這胖掌柜說的，四六分，就算全以六十五文一斤賣出去，一斤臘肉她賺到的也才三十九文，還不如她自個兒放鋪子裡賣呢。\n樊長玉道：「我不要分成，您要真打算買，咱們可以直接把帳目算明白，論斤賣。」\n胖掌柜笑呵呵道：「小娘子一看就不是個會做生意的。」\n樊長玉正想說話，邊上的謝徵忽而開口道：「分成賣可以。」\n樊長玉和胖掌柜都齊齊朝他看去，樊長玉一臉錯愣，胖掌柜則是笑得眼睛都眯成了一條縫：「這小兄弟瞧著是個會做生意的，眼光放得長遠……」\n他一句話還沒說完，謝徵涼涼掃他一眼道：「二八分。」\n胖掌柜的笑僵在了臉上：「小兄弟也太獅子大開口了些。」\n樊長玉在心裡估算了一下二八分，賣了臘肉自己能拿到的錢。\n按六十五一斤算，她能拿五十二文，按六十文一斤算，她也有四十八文。\n但樊長玉是真沒打算做這樁生意，道：「分啥成啊，直接論斤賣做一錘子買賣，市面上臘肉的進貨底價也是五十文左右，我一分錢沒拿到就先把臘肉送來，我還不放心呢。走吧，先去書肆給你買紙墨，回頭咱們還得趕去王捕頭家拜年呢。」\n她拉著長寧就要走，那胖掌柜見狀，忙道：「二八分就二八分。」\n他笑得頗有些無奈：「小娘子和小兄弟這紅白臉唱得好啊，我也是瞧著小娘子今日賣的臘肉色澤燻得好，瞧著就是上等貨，才想跟小娘子做成這筆生意。」\n說著就招呼他們三人往年貨鋪子裡走：「咱們擬個契書，回頭小娘子就把肉給我送來。」\n樊長玉跟謝徵對視時，面上還有些發懵，似沒料到這單生意就這麼成了。\n謝徵面上神色依舊淡淡的，對她道：「去籤契書吧。」\n那胖掌柜顯然不是頭一回做這空手套白狼的生意，很快就執筆擬好了契書，拿給樊長玉看時，樊長玉對這玩意兒還是不敢掉以輕心，逐字逐句看完了，又拿給謝徵瞧上一眼：「你看看妥當嗎？」\n謝徵點頭後，她就大筆一揮寫上了自己的名字。\n胖掌柜給了一兩銀子的定金，又笑呵呵把她們送出了門。\n樊長玉走在路上時還跟謝徵嘀咕：「明早得去把肉鋪開起來，還得去給溢香樓送滷肉，這臘肉，怕是得下午再來送了。」\n謝徵說：「你若是忙得抽不開身，我僱車幫你送來也行。」\n樊長玉不太好意思，說：「那我給你開工錢？」\n謝徵瞥了她一眼，樊長玉覺得自己沒感覺錯，他好像又不高興了。\n長寧是個沒心沒肺的，蹦跳著走在最前邊，看中了什麼小玩意不敢讓樊長玉買，就眼巴巴瞅著謝徵。\n謝徵零零碎碎給她買了些，長寧抱在懷裡一大堆，兩隻胖手幾乎合不攏。\n樊長玉嚇唬她道：「寧娘，你再看到什麼都想買，下回我可不帶你來縣城趕集了。」\n長寧低頭望著自己腳尖挨訓。\n邊上傳來男人冷冷清清的嗓音：「是我要給她買的。」\n樊長玉覺得這人好像在跟自己較什麼勁兒一樣，抿了抿唇道：「小孩子不懂事，哪能一味縱著，這滿大街的玩意她都喜歡，還能都買回去不成？有些道理總得教她，她才懂。」\n謝徵不再言語，三人繼續往前走時，就連長寧都感覺到了樊長玉和謝徵之間氣氛怪異。\n她看看二人，又看看自己抱在懷裡的一堆東西，忽而頓住腳步，轉身把懷裡的小玩意一股腦全塞給了謝徵，小胖手攥著自己的衣角道：「寧娘不要了，姐夫拿去退掉。」\n樊長玉看她黑葡萄似的一雙眼已經蓄起了一層水霧，嘆了口氣，蹲下摸摸她發頂道：「這次買了就買了，往後不可以再這樣了，知道嗎？」\n長寧含著淚花花點頭，伸出小胖手要樊長玉抱。\n樊長玉把小孩摟進懷裡輕輕拍了拍她後背，語氣半是寵溺半是無奈：「哭什麼，我都沒兇你呢。」\n長寧帶著鼻音道：「阿姐不要生姐夫的氣，寧娘知道錯了。」\n樊長玉看著拿著一堆小玩意站在邊上的謝徵，語氣更無奈了些：「我沒生他氣。」\n長寧道：「你都不理姐夫。」\n樊長玉好笑問：「我哪有不理他。」\n長寧淚花花在眼眶裡打著轉：「你都不跟姐夫說話了。」\n樊長玉心說她平時也沒怎麼跟言正說話啊，但看胞妹這副馬上就要哭出來的樣子，還是哄道：「我們方才不還在說話嗎，只是這會兒沒再說話了而已。」\n那顆豆大的淚珠子最終還是從長寧黑葡萄似的大眼睛裡掉了出來，「吧嗒」砸在地上，「阿姐就是生氣了。」\n樊長玉繳械投降，問：「要怎麼樣你才覺得我沒生氣？」\n長寧想了想，說：「牽手手，牽手手就是和好啦！」\n樊長玉默了一息，道：「我接下來一路都跟他說話成不成？」\n長寧很堅持小孩子們的那一套：「牽手手才是和好。」\n樊長玉跟謝徵對視一眼，謝徵面上看不出什麼情緒，但她自己心裡是怪不自在的。\n她哄小孩道：「你看你姐夫手上拿著那麼多東西，阿姐手上也拎著東西，都用一隻手，那得多沉啊？」\n長寧這才作罷了，只是走在前邊時，還時不時回頭看她們一眼。\n樊長玉怕長寧再提出什麼奇奇怪怪的要求，同謝徵說起話：「小孩子就是鬧騰，你別往心裡去。」\n謝徵說：「沒覺著她鬧騰，過完年我大概就要走了，才想著給她多買點小玩意。」\n樊長玉沒料到他給長寧買那麼多東西，竟有這層緣由在裡邊。\n聽他說要走了，心口也升起了幾分異樣情緒，道：「抱歉，方才是我誤會你了。」\n謝徵側首看她：「道歉做什麼？」\n樊長玉說：「我誤會了你，對你說了重話，自然是要道歉的。」\n她抿了抿唇，又問：「這麼快就要走了？不等傷好得徹底些再動身？」\n謝徵正要答話，前方一隊駕馬的官兵橫衝直撞往這邊奔來，撞倒沿街不少行人和商販的貨攤。\n在那戰馬逼近時，樊長玉條件反射性地蹲下身去護著長寧，謝徵則抬手用身上的鬥篷替她們擋下了馬蹄踏過濺起的泥漿。\n等那隊官兵揚長而去，街上不少被撞到的行人和被濺到泥點子的行人都在憤憤唾罵。\n樊長玉抬頭就見謝徵半邊鬥篷上全是泥漿，皺眉問：「有沒有傷到？」\n謝徵搖頭，視線卻還是追隨著那隊遠去的官兵的，眸底藏著暗沉的冷意。\n一個被撞翻了貨攤的貨郎朝著那邊狠狠啐了一口，罵道：「這群狗官，大過年的也不消停！」\n樊長玉問：「清平縣怎麼又來了官兵，是來剿匪的嗎？」\n那貨郎道：「剿匪？這是群要債的閻王，來搶糧的！泰州的事你們還沒聽說？前線打仗缺糧，軍隊徵不上糧來，就硬搶百姓的，不給就打死人。」\n邊上另一個大叔道：「瞧著這架勢，再過不久，怕是還得徵兵。」`

            num: 36,
            title: `第36章第36章`,
            content: `大胤朝這十六年裡,雖然也有不少戰事，但幾乎都沒波及到薊州。\n樊長玉只從老人們口中聽說過戰爭如何殘酷，畢竟打仗不僅要徵糧，還得徵兵,趙大娘和趙大叔的兒子就是當年徵兵被抓走了,再也沒回來。\n一老者道：「長信王於崇州造反，朝廷派兵去鎮壓,這仗打到現在都沒出個結果,我看啊,八成是這大胤的氣數已盡,要換天了。」\n「武安侯都死了，他魏嚴還拿什麼來穩西北這地？」\n又有人說：「皇帝誰來當老子都無所謂，只要別搶老子的錢糧,逼老子上戰場就行。」\n不少人搖頭嘆息：「這些官兵已經開始去附近村鎮強行徵糧了，仗打到最後，那些當官的是錢權都有了,只咱們百姓家破人亡，流離失所……」\n樊長玉聽著這些，心中也覺著有些沉重，同謝徵道：「朝廷打崇州，不應該由朝廷供給軍糧嗎，為何要向百姓徵糧？」\n謝徵語氣裡帶著嘲意：「糧道斷了,一些人狗急跳牆罷了。」\n徽州曾是他的地盤，現在想來，魏嚴大概是從前就已開始忌憚他了,他駐地的軍糧,朝廷向來是三月撥一次,州府本身並無糧倉。\n因是屯兵之所，地理條件也不佔先天優勢，不盛產谷粟。\n一旦斷了糧道，就是致命的打擊。\n此次叛亂之地崇州正好在徽州以南，阻斷了朝廷給徽州送糧的糧道。\n崇州和徽州的戰線拉長時，他便猜到了徽州終有糧盡一日，最快的法子當然是向民間徵糧。\n他被追殺後死裡逃生，便已打算聯繫舊部，讓舊部暗中先買完民間的存糧。\n趙詢出現後，買糧成了他對趙詢的一塊試金石，如今糧已到手，魏宣在崇州戰場上失利，在民間徵糧也徵不上來。\n以他對魏嚴的了解，魏嚴對這個兒子必不會有好臉色。\n讓魏宣先在魏嚴那裡領一頓罰，也算是他正式報仇前給這位表哥的一份禮。\n西北無人，魏嚴只能讓賀敬元接手崇州戰局，賀敬元素有儒將之名，也做不出讓底下兵卒強搶百姓糧食這等混帳事。\n何況以魏黨如今的名聲，真要放任手底下人搶百姓的糧，這無疑又是給魏嚴的政敵一黨遞把柄。\n他拿著那二十萬石米糧，便有足夠的時間開始下一步計劃。\n眼下官兵突然強制徵糧，八成也是他那位好大喜功的表哥，為了在兵權正式易主前做出點成就，想出的蠢主意。\n尋常百姓不知這麼多內情，也有跟樊長玉一樣的困惑的，議論道：「十六年前錦州一戰，是那大奸臣孟叔遠押送糧草耽誤了戰機，讓承德太子和謝將軍帶著十萬將士在錦州餓了五天，將士們最後上城樓時都餓得站不住，才叫北厥攻破了城門，這回糧草又是出了什麼問題，要從咱們頭皮上刮？」\n對於造成當年錦州一戰戰敗的元兇，孟叔遠這名字，在大胤朝無不人人得而誅之。\n當即就有人罵上了，「那孟叔遠死有餘辜，虧得謝將軍那般器重他，將押送糧草的重任交與了他，若不是他延誤了戰機，承德太子何至於身死錦州，讓魏狗把持朝政這麼多年！」\n「孟家人都死絕了那也是報應！」\n「且盼這回崇州的軍糧不是運糧官又出了什麼么蛾子！」\n謝徵從十六年前起，就知道錦州一戰戰敗的致命要點是軍糧遲遲未至。\n當年負責押送糧草的，是他父親麾下的老將孟叔遠，他父親留下的舊部曾與他說，這天底下誰都可能背叛他父親，獨獨孟叔遠不會。\n孟叔遠運送糧草延誤戰機，也並非叛主，而是中途去援被北厥人困在了羅城的十萬難民，最後難民沒救出來，錦州也被攻破了。\n孟叔遠得知他父親死訊時，跪向錦州拔劍自刎。\n錦州的慘案，也隨著孟叔遠的死落下帷幕，只是十多年了，百姓提起他，依然對他痛斥不已。\n那隊官兵已經走遠了，謝徵收回目光對樊長玉道：「走吧。」\n卻見樊長玉似乎在看著議論孟叔遠的那幾個人出神。\n他問：「怎了？」\n樊長玉一手牽著長寧，抿唇道：「孟叔遠是為了救十萬難民延誤的戰機，也沒有世人說得那般可憎吧？」\n謝徵嗓音發冷：「他領的軍令是運糧，沒能在期限內把糧草送去錦州，便是瀆職。他若有足夠的本事，救了十萬難民也沒耽擱送糧，那自該受萬民稱讚。可他既沒救回難民，又耽擱了送糧，以至錦州城破十萬將士身死城內，這便是罪無可恕。」\n他抬眸看向樊長玉：「你同情這樣一個無能之輩？」\n樊長玉搖頭，她不懂兵法，也不知軍規，只是覺著孟叔遠在錦州之戰中或許確實是罪魁禍首，但不至於成為世人口中的大奸臣，頂多是言正口中的無能之輩罷了。\n三人路過一家成衣鋪子時，她問謝徵：「你的鬥篷髒了，買個新的換著穿？」\n謝徵濺到泥漿的鬥篷已經被他解了下來，這一路都疊放在臂彎裡。\n他掃了一眼鋪子裡那些花花綠綠的料子，道：「不必，日頭出來了，這會兒也不冷。」\n樊長玉道：「那買條髮帶？先前買的那條我瞧著你不是很喜歡，都沒怎麼見你用。」\n話落就見謝徵神色莫名地盯著她。\n樊長玉不覺得自己那話哪兒有問題，睜著一雙杏眸同他對視著，彼此瞳仁裡都映著對方的影子。\n只不過一個澄澈清明，一個幽深晦暗。\n片刻後，謝徵先移開了視線，說：「也沒有不喜歡。」\n樊長玉覺得他這話說得跟打啞謎一樣，不明白他既然沒有不喜歡，為何又不用那根髮帶，道：「你給寧娘買了那麼多東西，你也選個新年禮物吧，我給你買！」\n謝徵嘴角平直了幾分：「你不是給過我紅封了？」\n樊長玉道：「壓歲錢跟新年禮物哪能一樣？」\n謝徵盯著她看了一會兒說：「在我這兒是一樣的。」\n樊長玉覺得他這是拒絕讓自己幫忙買新年禮物的意思，便也沒再強求。\n她看了一眼日頭：「陪你去書肆買完紙墨再去王捕頭家怕是遲了，晚些時候又怕書肆關門，這樣吧，你自個兒去書肆買東西，我先帶寧娘去給王捕頭拜個年。回頭你買完書就先在書肆那邊等我，我把東西拿去王捕頭家了就帶寧娘過來找你。」\n謝徵點了頭。\n二人在岔道口分開走，長寧走前，還使勁兒向謝徵揮了揮手：「姐夫路上注意安全，我和阿姐買好吃的會給你也買一份的！」\n謝徵眉梢往上提了提，看向樊長玉說：「不用，你們吃就是。」\n樊長玉心說這話像在說她故意支走他，帶著長寧去吃好吃的一樣。\n謝徵在她糾結的視線中走遠了，樊長玉才半蹲下抬手擦去長寧嘴邊的糖葫蘆渣子，無奈又好笑問：「你個小饞貓，又想吃什麼了？」\n長寧白嫩嫩胖乎乎的手指指向了街邊賣紅糖糕的小販。\n樊長玉無奈扶額：「走吧。」\n買完紅糖糕，樊長玉又去附近酒肆打了一壺好酒，原本打算拿給王捕頭的臘肉贈了一條給那書生，單拎著一條臘肉上門，樊長玉也不好意思。\n正好王捕頭是個愛喝酒的，買壺酒也算是投其所好了。\n王捕頭家住在縣城城南，地段算不得頂好，但多少是座二進的宅子，在清平縣這小地方，也稱得上是有頭有臉的人物才住得起的院子。\n樊長玉帶著長寧扣門後，有個婆子前來開門，聽說是來給王捕頭拜年的，忙把她們請了進去。\n這會兒已是下午，上午前來給王捕頭拜年的人用完飯都走得差不多了，樊長玉進屋後便只瞧見王捕頭和妻子以及王老夫人在東廂房的炕上坐著。\n王老太太瞧著已是耋耄之年了，臉不像鄉下老婆子那般皺巴巴的，而是一種富態的圓潤，瞧著頗為慈祥。\n王夫人骨架壯實，但又不顯得虎背熊腰，聽說她爹從前也是當捕快的，她也會些拳腳功夫，面相看著極為和善，眉宇間又帶著一股英氣。\n「這便是長玉了吧？」王夫人看到樊長玉就笑開了，「真是個好孩子，這身子骨一看就結實，是個練武的好苗子。」\n樊長玉笑著向她和王老太太問好。\n清平縣從前有個名氣很大的窯姐兒，對外的稱謂便是玉娘。\n縣裡的女孩子名字末尾帶了個玉字的，旁人便都不會直接叫玉娘，而是喚她們名字。\n若是直接喚玉娘，大有指桑罵槐說對方是窯姐兒的意思。\n長寧抓著樊長玉的衣擺，躲在她身後，露出一雙小鹿似的眸子怯生生望著王夫人。\n王夫人看到她，臉上笑意更明朗了些，從彩漆糖果盤子裡抓了一把向著長寧招手：「小寧娘模樣也怪可人的，快過來拿糖吃。」\n長寧沒敢直接過去，揚起腦袋看樊長玉。\n樊長玉道：「夫人給你糖，接著吧。」\n長寧這才小跑過去接王夫人手中的糖，她人小，手也小，拿不下那麼多，王夫人便把許多糖果都幫忙塞進了她衣襟的口袋裡。\n長寧脆生生道：「謝夫人。」\n王夫人和王老太太對視一眼，笑得合不攏嘴，王夫人沒忍住捏了捏長寧粉嘟嘟的臉頰道：「你這麼小小個人，怎就這般懂事？」\n她笑著看向樊長玉：「是不是阿姐教得好？」\n樊長玉抱赧一笑：「您過譽了。」\n她不是個擅長話家常的，說話又實誠，這耿直的性子倒是讓王夫人和王老太太都極為喜歡，樊長玉偶爾接幾句話都逗得她們笑得合不攏嘴，只有樊長玉自己極為茫然怎地她們就笑成了這般。\n王夫人要留她們姐妹二人用飯過夜，樊長玉以謝徵還在書肆等她做推辭，才算婉拒了這番盛情。\n辭別時，王捕頭親自送她出門，「你爹娘的案子，由州府那邊接手後，就算是正式結案了，我先前怕你爹娘早些年結了仇家，既是山匪為了找藏寶圖，如今藏寶圖也不在你家中了，那你也沒什麼好怕的，安心在鎮上住著吧，有什麼難處儘管來找我。」\n樊長玉道了謝，又問：「您知道州府那邊審核此案的是哪位大人嗎？」\n王捕頭只是清平縣小小一捕頭，對這些還真不知，搖頭後不免問：「你打聽這個做什麼？」\n樊長玉怕自己爹娘的死像言正說的那般幕後牽扯眾多，不想多說給王捕頭惹來什麼禍端，便道：「沒什麼，就是問問。」\n她想查明爹娘真正的死因，最好的法子當然是從審理此案的官員那裡入手。\n那夜官兵帶回去一個活口，只要知道那人都招供了些什麼，興許就能解開她爹娘死因上的謎。\n言正問她如果官府說了假話，她當如何時，她就想過暗中找審理此案的官員。\n戲文話本裡不都這樣寫的麼，抓住貪官的把柄，在月黑風高夜潛入貪官府上抓住落單的貪官，跟對方談判，要麼換取錢財，要麼就從貪官那裡拿到自己想要的線索。\n她只要知道了審理此案的官員，就有的是時間慢慢去查對方的把柄。\n樊長玉帶著長寧快走到大門口時，王夫人才拿著兩個紅封快步追上來：「這兩個壓歲紅封收著！」\n其中一個紅封都還沒疊嚴實，瞧著像是她臨時準備的。\n樊長玉推拒不過，被王夫人硬塞進了懷裡             content: `「我家主子,也同魏嚴有著不共戴天之仇。」\n趙詢天生一雙笑眼，給人幾分親和好說話的錯覺，不過那雙眼裡,又帶著疏離：「接近侯爺，並非是想借侯爺之勢，只是我家主子覺著，侯爺若知曉十六年前錦州之戰的真相後,應當也會想手刃魏嚴的。先前特意隱瞞身份，也並非故意為之，我家主子只是想等時機成熟後，再向侯爺示明身份。」\n謝徵眸底一片冷銳，心中已經隱隱有了一個猜測，卻還是問道：「你家主子是何人？」\n趙詢道：「十六年前東宮那場大火裡僥倖活下來的人。」\n謝徵嘴角冷峭挑起：「皇孫？皇孫若還尚在人世，不該去找李太傅一黨合謀麼？何至於等到今日,才來找我這麼個平陽敗犬。」\n趙詢面露難色：「您也查過關於十六年前錦州之戰的蛛絲馬跡,應當知曉魏嚴那老賊做事一向斬草除根,不留任何把柄，當年太子身死,東宮失火，先帝讓刑部和大理寺聯手徹查，都沒能查出個結果，何況是物是人非的今昔。李太傅是朝中清流之首，卻也不會為了我家主子拼上一切同魏黨抗衡,侯爺不一樣，謝將軍戰死沙場,被北厥掛在城樓曝屍三日之仇,也有魏嚴一份,侯爺不想報此仇麼？」\n謝徵五指收攏，一身血戾之氣像是從骨頭縫隙裡滲出來的一般，讓這算不得逼仄的雅間都變得令人呼吸困難起來，「說說，十六年前到底發生了什麼。」\n趙詢道：「我家主子蟄伏多年，也沒能查到半點關於錦州之戰的線索，當年東宮失火，刑部和大理寺徹查後歸咎於值夜的宮人睡著後不小心打翻了燭臺，但據我家主子身邊的忠僕所言，當年有刺客夜闖東宮。太子妃命忠僕帶著小殿下出逃，自己同殿下的玩伴留在了寢宮，大理寺從寢殿裡找到的那具屍體，便是殿下幼年的玩伴。」\n「承德太子殿下亡故，先帝駕崩，唯有他魏嚴挾天子以令諸侯十餘載，當年的錦州一戰，很難不叫人懷疑是魏嚴的手筆。謝將軍一同戰死，無非是替他魏嚴洗清嫌疑罷了。」\n謝徵墨色的眸子半抬，眉宇間已壓了幾分不耐：「本侯要的是證據，不是你這番猜測。」\n趙詢嘴邊露出一抹笑來：「長信王於崇州造反，身邊有一謀士是我家主子的人，向長信王提出了『清君側，除魏黨』的旗號，為了在民間造勢，又散布謠言說當年的錦州慘案是魏嚴一手策劃的。後來的事，想必侯爺也知曉了，侯爺不過是重查錦州一案的卷宗，魏嚴便對侯爺動了殺機。」\n謝徵長眸眯起，目光銳利，冷笑道：「看來本侯也是你們計劃中的一環。」\n趙詢面色微僵：「侯爺言重了，我家主子只是想拉攏侯爺這個盟友。」\n見謝徵神色不虞，他很快又道：「那魏老賊被這麼一炸，委實也露出了馬腳，他手中死士跨越一京十七府，殺了十餘人，其中一些我家主子已查明了身份，都是曾經替魏嚴做事，後來歸隱的家將。」\n謝徵問：「那姓樊的屠戶一家，想來你們也查清身份了？」\n趙詢面露愧色：「那姓樊的屠戶，身份實在是捂得滴水不漏，我家主子幾番派人細查，不管是樊家祖籍之地還是這鎮上，暗訪出來都有這麼個人，甚至關於他十幾年前在外走鏢時的押鏢記錄官府都有，瞧著像是官府中有人特意幫忙掩去了過往的身份。」\n謝徵腦中浮現出樊長玉同他說自己爹娘過往時的樣子，有片刻失神，一片飛雪落在他手背，雪花融化的涼意讓他瞬間收攏了思緒。\n他身體微微向後靠，一條手臂搭在黃梨木太師椅扶手上，最散漫的姿態卻給人最極致的壓迫感：「僅憑你一番話就讓本侯相信你背後的人是十六年前命喪於大火中的皇孫，未免可笑。」\n趙詢臉色一變，正要說話，就聽他道：「十六年前錦州一戰背後的真相本侯會自己去查，本侯不管你家主子是真皇孫還是假皇孫，若不想這場結盟到此結束，最好還是讓他親自來見本侯。」\n趙詢面色難看，卻也只能拱手道：「趙某會將侯爺的話帶到的。」\n謝徵起身時，眼皮微微往下一耷，懶散道：「順便讓他想好這二十萬石米糧的交換條件是什麼。」\n趙詢本就微躬的身形更低了三度：「是。」\n謝徵離去時，將原本示作結盟信物的那枚玉環也放到了黃梨木几案上。\n同這姓趙的虛與委蛇這麼久，無非是想探清他究竟是哪路勢力，皇孫這個答案委實是令謝徵意外的。\n他並不擔心掌握不了對方動向，讓姓趙的去買糧時，他便已讓自己的人暗中留意趙家名下的情報暗樁了，從這些地方剝絲抽繭去查，就算他幕後的主子不現身，他也很快就能把人揪出來。\n他同魏嚴的確有仇，可在塵埃落定之前，就有人敢算計於他，只為了讓他成為對方的一大助力，委實把他想得太良善了些。\n-\n謝徵出了書肆，見樊長玉姐妹還沒找來，眉頭輕擰，往王捕頭住的方向走去。\n沒走出多遠便碰上了樊長玉和長寧，長寧嘴裡塞著糖果，腮幫子鼓鼓的，一蹦一跳走著，樊長玉牽著她一隻小胖手，臉上亦是明朗又朝氣的笑容。\n看到謝徵，她臉上的笑容也半點沒減，隔得老遠就先揮了揮手，走近後道：「咱們今晚先不回鎮上了。」\n謝徵看著她臉上的笑，心底的陰霾和不快少了幾分，問：「為何？」\n樊長玉道：「俞掌柜在縣城裡也開了一座溢香樓，有個員外的兒子娶親，把酒席訂在了這邊，明日要備大量的滷肉，俞掌柜怕來不及，讓我明兒一早去樓裡幫忙制滷。正好今年城裡辦了燈會，晚間咱們還可以去逛逛燈會。」\n謝徵道：「那先找個客棧落腳？」\n樊長玉搖頭：「俞掌柜已經替我們尋好了住處，溢香樓裡的幫廚小廝平日裡不僅吃喝由樓裡包了，就連住的地方也是俞掌柜在附近租了一片民巷，免費讓他們入住的。」\n謝徵眉尾輕挑：「這位掌柜倒是個奇人。」\n樊長玉笑道：「那是，俞掌柜人可好了，樓裡的夥計都信服俞掌柜。我聽灶上的李廚子說，之前縣城裡有其他酒樓掌柜眼紅溢香樓的生意，想挖走俞掌柜一手提拔起來的酒樓管事，對方開出了比溢香樓高兩倍的價錢，那位管事都沒走。」\n謝徵只道：「有些時候，情分確實比銀錢好使些。」\n樊長玉興致勃勃同他說了一堆俞淺淺的事，他反應淡淡的，她便也打住了話頭，瞧見他手上並未拿東西，問：「你不是去買紙和墨了麼？怎空著手回來的？」\n她想到一種可能，神色複雜道：「該不會是你給寧娘買東西，把身上銀子都花光了吧？你銀錢不夠了應該同我說一聲的……」\n謝徵微微一哂，從書肆出來的陰霾算是退了大半，道：「不是。」\n在樊長玉狐疑的目光裡，他說：「縣城書肆裡的東西太貴了，回鎮上了再買。」\n樊長玉問：「那你在書肆呆這麼久？」\n謝徵答：「看了些書，忘了時間。」\n樊長玉好奇道：「你看這麼久的書，不買東西，書肆掌柜不會給你臉色？」\n謝徵眸光掃了過去：「誰同你說的？」\n樊長玉想說從前宋硯就是這樣，因為只去書肆看書不買，被書肆掌柜給了臉色，以至於回來後好些天都板著個臉，後來再提起此事，他也會嘲諷一句那書肆掌柜滿身銅臭。\n但憶起言正提起宋硯那張嘴就毒得不行，話到了嘴邊她又咽了回去，嘀咕道：「我猜的。」\n謝徵掃了她幾眼，樊長玉後頸皮下意識一緊，生怕他下一秒就吐出什麼殺人誅心的字句來。\n還好這一路都沒被他嘲諷。\n天色已晚，都決定暫住在這縣城一晚了，樊長玉還是決定帶著謝徵和長寧晚間去看花燈，便沒回俞淺淺給她們安排的住處，先去下館子吃了個宵夜。\n大年初一會在外邊吃飯的，都是家中還算寬裕的人家。\n鄰桌一對年輕夫妻約莫是用完飯了，店小二前去結帳時，臉上帶著笑對那男子道：「這位公子，一共是一兩二錢。」\n那男子身板看著就斯文單薄，神情也有些唯唯諾諾的，似乎頗有幾分局促不安的樣子。\n坐他身旁的女子道：「他身上沒錢，我來。」\n女子嗓門頗大，引得店內不少食客都看了過去。\n有人低聲議論：「一個大男人，在外邊吃飯還要女人給錢，真他娘的丟人！」\n「嘖嘖，怕不是個小白臉吧！」\n「那人我認識，是安家的贅婿，就是個吃軟飯的，也不知那安家娘子看中那軟蛋什麼了！」\n男子麵皮躁得通紅，恨不能找個地縫鑽進去。\n女子結帳後，他幾乎是低著頭逃一般地走出了店門。\n謝徵早已用完了飯，神情冷漠看著方才的鬧劇。\n坐在他對面的樊長玉刨完第三碗飯，桌上的菜盤子也乾淨得不能再乾淨了，才心滿意足放下碗筷，衝店小二喊了一聲：「小二，結帳。」\n樊長玉飯量大，今晚又是年夜，點的菜還是豐盛，不過沒點酒水，貴不到離譜的地步去。\n店小二清點一番後道：「八錢銀子。」\n樊長玉準備掏錢時，跟尊玉雕似的坐在對面的謝徵道：「我來。」\n他和樊長玉容貌都極為出眾，在這小小的飯館裡，本就分外引人注目，這會兒說話，更多人時不時地往這邊打量一眼。\n樊長玉見他要付錢，想起方才那對夫妻的事，便也停了掏荷包的動作。\n謝徵一隻手伸進懷裡摸索時，臉色卻微微變了一變。\n樊長玉見狀，忙投去了一個詢問的眼神。\n片刻後，謝徵收回手，看向樊長玉：「你來。」`
        },

            num: 38,
            title: `第38章第38章（大修）`,
            content: `等著收錢的店小二和店內其他用飯的食客都愣住了,顯然沒料到竟然會來這麼一出。\n方才譏嘲那安家贅婿的幾個漢子一時間也沒反應過來。\n樊長玉先是傻眼，隨即錯愣道：「你荷包方才在路上叫人給偷了麼？」\n又招呼店小二：「我來付錢。」\n逢年過節的，街上人多,扒手本就容易下手。\n有了樊長玉吼的那一嗓門，齊刷刷盯著她們的一屋子人才又各吃各的去了，還有人議論：「一會兒去看燈會，街上人擠著人,身上物件更容易被偷，可得警醒著些！」\n也有人小聲道：「我瞧著那男人生得比女人還好看些，會不會也是個小白臉？」\n邊上的人反駁他：「怎麼可能，他方才還搶著付錢呢！」\n「見安家那贅婿出了醜，做做樣子誰不會？不過長著那樣一張臉，吃軟飯倒也夠了……」\n樊長玉在謝徵發作之前，一手撈起長寧,一手拽著他飛快走出了飯館。\n到了大街上,她才喘勻一口氣問謝徵：「荷包當真被偷了啊？」\n謝徵冰冷的神色有一瞬間僵硬,小幅度地點了下頭。\n以他的身手，還不至於被人貼身摸走了物件不被察覺,他的確是如樊長玉之前所言，給小孩買了太多東西，沒注意到自己身上錢不夠了。\n畢竟他從前出門買個什麼物件，壓根沒考慮過銀錢不夠的問題。\n樊長玉想著他先前還去過書肆，覺著那邊東西賣得貴了才沒買,應當知曉自己身上還剩多少錢，不至於提出要結帳了才發現自己沒錢,嘆了口氣：「一定是方才路上人多,叫小偷把荷包給摸了去。」\n她拿出自己的錢袋子,數出兩塊銀角子和一大把銅板遞給謝徵：「這些錢你收著，一會兒燈會上看中什麼要買也方便。」\n長寧也大方地道：「寧娘的壓歲錢也給姐夫！」\n那笑眯眯的樣子仿佛他們當真是一家人。\n謝徵心裡升起幾分異樣，皺眉道：「不用，我不買什麼東西。」\n「你這人怎麼這麼墨跡，身上帶點錢，要做什麼也方便。」樊長玉以為他是不好意思拿自己錢，直接拽過他一隻手，把銀錢放他手心裡。\n她的手無論何時都是暖烘烘的，拽過他手時，手上的暖意也跟著傳了過來，似能透進皮肉，傳到更深的地方。\n在她收回手後，謝徵看著掌心的一把銅板和碎銀，指尖微不可見地蜷縮了一下，隨即遮掩什麼一般收攏了五指。\n暮色四合，大街小巷的燈籠都已亮了起來。\n暖黃的燈光切出他側臉的線條，他看著樊長玉，那雙墨色的鳳眸裡，神色愈發叫人瞧不清了：「謝謝。」\n「謝什麼，反正你也給長寧買了那麼多東西，況且，你還有四十兩在我這兒放著呢……」樊長玉沒當回事。\n謝徵只靜靜聽著，在她說完了，才說了句：「糖錢是糖錢，不一樣的。」\n樊長玉微愣，遠處的人群裡突然傳來一陣歡呼聲，三人都被吸引了注意力朝那邊看去，才瞧見是街上變戲法的在噴火。\n也不知那變戲法的漢子是怎麼做到的，小小一根燃起來的竹棍叫他拿在手裡，經他用力一吹，火苗瞬間就能變成一股大火，嚇得圍觀的人在被火苗掃到時，都驚呼一聲往後退，隨即鼓掌叫好。\n長寧對這些很是新奇，當即就拽了拽樊長玉的衣角：「阿姐，寧娘想看噴大火。」\n這會兒天已經全黑了，街上人又多，樊長玉怕長寧被絆倒或被人撞到，直接把她抱了起來，對謝徵道：「燈會瞧著已經開始了，咱們去那邊看看吧。」\n謝徵掃了一眼表演噴火戲法的那夥人，淡去了眸底所有思緒，對樊長玉道：「我來抱吧。」\n樊長玉一身蠻力，當即就回絕了：「不用，你身上的傷還沒好徹底呢……」\n謝徵說：「抱個小孩還是不妨事。」\n頓了頓，又道：「我瞧著這街上其他孩童，也是由父兄抱著的。」\n樊長玉四下掃了一眼，發現帶了小孩出來看花燈的，若是有父母陪同，好像都是由爹爹抱著的。\n她和言正帶著長寧，也容易叫人誤認成是一家三口。\n言正生得又高大，她抱著長寧，已經有不少路過的行人打量上他們幾眼。\n不知情的偶爾還會對言正指指點點。\n樊長玉想起方才飯館的事，稍作猶豫，還是把長寧遞給了謝徵抱著，叮囑道：「你若是手軟了，就把寧娘給我抱。」\n謝徵淡淡應好。\n他比樊長玉高出大半個頭，長寧趴在他肩頭，伸著脖子反能看得更遠，路上一會兒指這裡讓他們看，一會兒指那裡讓他們看，整個人興奮得不行。\n樊長玉和謝徵並肩走著，手上還拿著書生給她們畫的那副畫，臉上也難得露出了舒心的笑容。\n街上不少行人看到了，都由衷地稱讚好一對璧人。\n一對中年夫妻帶著稚兒出來看燈會，婦人抱著小兒子，瞧見樊長玉一行人，立馬把兒子塞給了自己丈夫，板著臉道：「瞧瞧人家小郎君多會體貼媳婦，你個死人，看不到我手都快累斷了！」\n漢子兩手抱著孩子，被揪著耳朵頭偏做一邊，哎喲哎喲地連聲認錯。\n樊長玉一面忍俊不禁，一面又因為那婦人的話心底有些不自在。\n她抬眼偷偷打量謝徵，怎料對方正好轉過頭來，二人視線在闌珊燈火裡相撞，他問：「怎麼了？」\n樊長玉乾咳一聲，正好瞧見了遠處掛著五顏六色花燈的燈樓，道：「我瞧著那邊好像有猜燈謎的，咱們去猜燈謎吧！」\n長寧也遠遠地瞧見了那邊各式各樣的花燈，興奮道：「寧娘要買一盞豬豬燈！」\n樊長玉笑道：「好，咱們先去看看。」\n謝徵問：「她屬豬的麼？」\n樊長玉還沒回來，長寧就已經用力點頭了，她扳著胖乎乎的手指數：「阿姐屬虎，寧娘屬豬。」\n謝徵眼神怪異地掃向樊長玉：「你只長你妹妹九歲？」\n樊長玉道：「準確來說是十歲。我寅年正月出生的，我妹妹生於亥年臘月末。」\n她看向長寧，目光柔軟了下來：「去年臘月一過，寧娘也六歲了，鎮上的習俗，父母喪期內未免孩童折壽，不可明著過生辰，這才生辰禮都沒給寧娘備，只給她煮了碗面。」\n她說著看向謝徵：「你也吃過，就是那次煮的肥腸面。」\n謝徵：「……」\n那實算不上什麼美好的記憶。\n不過她生辰在正月，這個月她便十六了？\n謝徵微斂了眸色。\n樊長玉忽而問他：「你屬什麼？」\n謝徵不答。\n她胡亂猜測道：「你屬狗的吧？」\n這有點像罵人的話，擦肩路過的行人沒忍住回望他們一眼。\n謝徵一道眼風朝著樊長玉掃去，樊長玉很想收斂自己臉上的笑，卻還是沒繃住。\n她說：「真要屬狗還挺符合你性子的。」\n她臉上那個笑容實在是肆意又燦爛。\n謝徵側頭看她一眼，問：「什麼意思？」\n樊長玉輕咳一聲：「聽說屬狗的都特別記仇，罵人也很厲害。」\n話沒說完就收到了一記涼颼颼的眼刀。\n樊長玉莫名心虛：「你自己那張嘴有多毒你不知道？」\n謝徵嘴角輕扯：「我也沒在旁的事上多說你什麼，不過是說你挑男人的眼光差了些，一個宋硯就讓你念念不忘至今……」\n樊長玉算是知道了什麼叫做自食惡果，當初為了不讓他誤會自己對他有不軌之心，鬼扯了個自己對宋硯一往情深的謊話，現在好了，這人逮著機會就要對她一番鄙視嘲諷。\n她忍不住道：「我何時對他念念不忘了……」\n「噗——」\n掛滿條幅和花燈的燈牆後傳來一聲嗤笑。\n樊長玉抬眼望去，就見幾個猜燈謎的公子哥撩開條幅，從燈牆後邊走了出來，其中一人正是宋硯。\n「宋兄果真是深藏不露，縣令千金為宋兄的才學所折服，就連這成了婚的前未婚妻，都因宋兄同夫婿不合！」一杏黃長衫戴冠的男子用合攏的摺扇指了指樊長玉，臉上一派輕浮的笑意。\n顯然方才在燈牆後邊嗤笑出聲的也是他。\n樊長玉臉色瞬間難看了起來，怎麼也沒料到那燈牆後竟會是宋硯和他的一眾同窗。\n她唇角瞬間抿緊，讓那姓宋的誤會自己還喜歡他，可沒有比這更讓她膈應的事了。\n謝徵見過宋硯，對他尚有幾分印象，冷沉又壓迫感十足的視線朝那幾個風流仕子掃去時，在宋硯身上多停留了幾息。\n宋硯穿著一身靛藍色袍子，大冷天的手上也拿了把摺扇，接觸到謝徵的目光，與之對視後便下意識迴避開了去。\n他的幾個同窗倒是不以為意，覺著他們一個個都是有功名在身的，上了公堂都可不跪，何至於怕這麼一個屠戶女的贅婿。\n那黃衫男子當即就譏嘲道：「這位兄臺，你也別沉不住氣，宋兄乃清平縣鄉試唯一中舉之人，你家娘子念著宋兄也是情有可原。」\n他邊上的另一男子打量樊長玉許久後突然撫掌笑道：「我想起來了，有一年這位小娘子還特地來縣學給宋兄送過冬衣，那時我還問宋兄這是何人來著，宋兄答是家妹！」\n「看來這小娘子對宋兄的確是情根深種，也無怪乎那位兄臺提起宋兄就氣急敗壞……」\n這會兒燈會上正熱鬧，幾個人這一唱一和的，引得不少行人都駐足看熱鬧，好事者對著樊長玉指指點點。\n「原來這就是宋舉人那退了婚的未婚妻。」\n「生得倒是一副好模樣，可這都成婚了，還念著宋舉人作甚，果真只有上門女婿才忍得下這樣的氣……」\n「怎就這麼巧在這兒碰上了，莫不是知曉宋舉人今晚會來這燈會，特地前來就為了見宋舉人一面？」\n宋硯聽得這些，目光掃過樊長玉，收回視線後對同伴道：「走吧，這燈謎也不過如此，沒什麼好猜的。」\n樊長玉聽著那些議論聲，再接觸到宋硯那個眼神，只覺一股窩火從心口順著血液燒進了四肢百骸，渾身都犯噁心。\n謝徵看了她一眼，瞥向幾人：「站住。」\n語調懶散卻是命令的口吻。\n有了他這句話，圍觀的人臉上更興味盎然了些。\n宋硯一行人止住腳步，他的同窗回頭看來時臉上帶著高人一等的戲謔和神氣。\n那黃衫男子調笑道：「這位兄臺還想跟我們動手不成？咱們可都是有功名在身的，你動了我們一根汗毛，這輩子怕是都沒好日子過。」\n謝徵嘴角嘲意更甚，冷冷道：「你們讀了十載的聖賢書，禮義廉恥都讀狗肚子裡去了？非議一女子便是你們讀書人的做派？」\n幾人頓時有些訕訕的。\n他薄唇冷戾吐出兩字：「道歉。」\n唯獨那黃衫男子道：「我等何時非議了，不過是述以實情罷了。」\n謝徵眼皮懶洋洋一挑，說出的話刻薄且涼薄：「你考科舉的題卷上，寫的莫不也全是些議論婦人長短的話？君子之禮不記得，搬弄口舌倒是有一套，南風館出來的？」\n眾人鬨笑開來。\n甚至有人大聲道：「說得好！一群讀過聖賢書的人，跟個長舌婦似的議論一女子也不害臊！南風館的兔兒爺都沒他們會嚼舌根！」\n黃衫男子聽著這些起鬨聲，一張臉瞬間氣成了豬肝色，指著謝徵：「你……你……」\n他邊上的同伴幫腔道：「儘是些無恥下流之言！有辱斯文！」\n謝徵輕嗤一聲：「斯文？你們配得上這二字嗎？讀了幾天書眼睛就長腦袋頂去了，焉知北雁南飛，遍地鳳凰難下足？」①\n他說這話時，淡薄的視線正好落在了宋硯身上，明顯是這話是對宋硯說的。\n幾個讀書人驚愕謝徵也是個讀書人後，頓時面露憤憤之色，他最後那句分明是羞辱他們，想辯駁卻又想不出個能對回去的對子，一時間臉色煞是難看。\n宋硯在謝徵說出那話後，面上神色變幻莫測，終是作揖道：「方才是宋某的兩位友人口無遮攔，冒犯了樊姑……樊家娘子，宋某代友人向二位道歉。」\n其餘幾人見宋硯都表態了，心中再不願，也還是跟著作了揖：「方才是我等不對，在此向二位賠罪。」\n謝徵沒做聲，看向了樊長玉。\n樊長玉知道謝徵文採不錯，但沒料到他能以一己之力懟贏這幾個書生，短暫的驚愕後，當即冷著張臉道：「我同我夫婿玩笑幾句，要你們幾個讀聖賢書的來說三道四？我夫婿要樣貌有樣貌，要才學有才學，我一不傻二不瞎，為何要對別人念念不忘？」\n這話讓圍觀的不少人都笑了起來。\n宋硯面上青紅交加，作揖交疊的五指指尖都繃得筆直。\n謝徵則是懶懶一抬眸，雖然知道她說的那些話大半都是為了找回面子，不過還是怎麼聽怎麼順耳。\n畢竟……他也不覺得那是假話。\n樊長玉找回了場子，握著長寧的手輕哼一聲：「我們走。」\n謝徵淡淡掃了一眼站在原地的幾個讀書人，閒庭散步般跟了上去。\n宋硯和他幾個同窗只覺面上躁得慌。\n圍觀的人還在指指點點：「都說負心多是讀書人，那宋硯考上舉人後就退了這門婚事，當街碰上還要帶人譏嘲樊家那閨女一番，當真是下作！」\n「我瞧著樊家那贅婿文採還比這些人好些，不知他去不去考科舉，要是也中了，樊家的日子往後可就好過了！」\n宋硯聽著這些，隱在燈影暗處的臉上一片陰霾。\n他的幾個同窗為了找回臉面，嚷嚷道：「一個入贅的小白臉，真要有那考科舉的本事，也不至於給人當上門女婿了！」\n「依我看啊，他去考科舉，怕是童生都考不上！」\n宋硯聽著這些，冷凝的面色卻沒有絲毫緩和，只道：「今日且到這裡吧，改日再聚。」\n他都發話了，其餘人丟了這麼大的臉，也不好意思再這燈會上繼續逛，當下各回各家。\n-\n謝徵落後樊長玉幾步，兩人一前一後走著，靜默了片刻他忽而道：「方才的事，是我失言在先。」\n若不是他先提起宋硯，也不至於叫那幾人在燈牆後聽了去取笑她。\n樊長玉腳下微頓，說：「沒什麼的，你已經幫了我，何況是我先騙了你。」\n謝徵抬眸：「騙我什麼？」\n樊長玉薅了薅頭髮，有點難為情道：「之前怕你誤會我對你有什麼心思，故意說沒放下他。」\n謝徵聽到此處，眸底多了幾許其他情緒。\n他道：「我以為……你在難過。」\n樊長玉丟給他一個「怎麼可能」的眼神。\n二人已經走出了辦燈展的那條街，四下突然冷清了下來，偶爾路過的巷子也黑黝黝、陰森森。\n謝徵問：「這是去溢香樓的路？」\n「不是。」樊長玉說完就把長寧塞給謝徵抱著：「一會兒你捂著寧娘的眼睛帶她躲遠些。」\n謝徵沉默了一息，問：「你要做什麼？」\n樊長玉找了個陰暗角落帶他一起貓著，掏出剛剛離開集市時買的麻布大袋和錘衣棒，齜了齜嘴邊的小虎牙：「那個穿黃衫的嘴那麼賤，當然得扁他一頓才解氣！」`
        },
