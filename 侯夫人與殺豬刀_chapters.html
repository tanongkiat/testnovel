            title: `第120章第120章`,
            content: `不及樊長玉回答,他便兀自低笑了聲：「李懷安，是不是？」\n他削了宣旨太監一隻耳，讓那宣旨太監連聖旨都沒打開,便倉惶逃回京城去了。\n小皇帝那頭要顏面,勢必會壓下此事。\n聖旨沒宣,他和長公主的所謂賜婚，就只是捕風捉影的事,京城那邊尚且沒傳開,她遠在西北，卻能知曉他被賜婚的事，只能是通過李懷安了。\n樊長玉被他身上的戾氣怔了一瞬,隨即直視他雙眼道：「這與何人告知的我無甚干係,你已有婚約在身,就不該跟我說那樣的話,你把我當什麼了？你又把你口中的從前當什麼了？」\n她在感情上一向是個遲鈍的人，說到最後一句，卻只覺心口尖銳又悽楚,澀意直逼眼眶。\n他在她心裡一直是個很好的人,哪怕一人因為父輩的仇怨今後只能分道揚鑣，她也希望他此生順遂，繼續受萬人景仰，做他戰功赫赫、威震四海的武安侯。\n縱使物是人非,曾經那些美好,她也不願任何人毀了它。\n就算是他也不行！\n謝徵聽著樊長玉這番質問,滿身的戾氣滯住，有一瞬失神。\n日頭升高，他所站的地方,也叫檻窗斜傾進來一抔晨曦，將他半邊玉雕般的側臉都鍍上一層暖光，濃長的黑睫半垂，有那麼一剎，讓人覺著他純粹如一稚子。\n許久，他才抬起頭來重新看著樊長玉，眼底因熬了一夜浮起不少血絲，明明面上平靜如斯，卻愈發讓人害怕他這一刻的平靜。\n他朝前邁步時，樊長玉下意識往後退了一步，但她本就站在床前，這一退，後背直接撞上了床柱。\n她眼底所有的驚惶和剎那間的茫然都盡數落入逆光走來的人眼底。\n謝徵面上依舊瞧不見絲毫情緒起伏，他只伸出還帶著血跡的手捧住了樊長玉的臉，微低下頭同她視線平齊，用那雙恍若爬滿了血色蛛網的眸子靜靜望著她：「那李懷安有沒有告訴你，我削了宣旨太監一隻耳，讓他旨都沒宣，就滾回京城去了？」\n樊長玉愣住。\n對方用帶血的手指輕輕摩.挲她臉頰，輕聲問：「盧城再見，你處處與我疏離，是因為李懷安告訴你的這些，是不是？」\n樊長玉喉間哽得說不出話來，只有豆大的淚珠子從眼眶滾落。\n謝徵用拇指幫她拭去，低聲安撫：「別哭。」\n他溫柔一如從前。\n樊長玉被那股揪心的難過攥得喘不過氣來，淚若如滾珠，望著謝徵近乎祈求地道：「別這樣……謝徵，你別這樣……」\n她的心不是石頭做的，她用了好久好久去治癒心上裂開的口子，再見到他，才不至於難過到撕心裂肺。\n她不想在他的溫柔裡把那些疼到讓她夜裡發抖的口子再次撕開。\n如果一人註定不會有結果，他人生裡背負著慘痛，她背負的卻是冤屈，她是一定要往前走的。\n哪怕打斷筋骨，爬，她也要一步步朝著那個真相爬過去。\n看她這般，謝徵眼底的猩紅更重。\n他攬住她的肩，低下頭輕抵在她前額，執拗地問：「樊長玉，我們還跟從前一樣，好不好？」\n跟從前一樣。這幾個字再次跳進樊長玉耳中，她除了心酸，只剩一股被宿命裹挾的無力感。\n她拼命克制著自己的情緒：「錦州之案的真相你不在乎了嗎？」\n話落，一人之間又陷入了死一般的沉靜。\n樊長玉能感覺到他抓著自己肩膀的手都大力了幾分，從他指尖滲出的血染紅了自己衣袍。\n離得太近了，血腥味也蓋不住他身上混著淡淡皂角香的清冽氣息。\n這大抵是她能距他最近的一次了。\n樊長玉有些難過地閉上眼，在他鋪天蓋地的氣息裡克制自己顫抖的呼吸。\n卻聽得一道沙啞的嗓音自耳邊響起：「不在乎了。」\n疲憊又破碎，仿佛是裹著淋漓鮮血做下的決定，裡邊孤注一擲的狠決叫人膽寒。\n樊長玉瞳孔一顫，眼前叫水澤淹沒得視物都變得模糊，她努力睜大眸子，想看清眼前的人，哽咽著問：「你知不知道自己在說什麼？」\n謝徵血色的眸子裡同樣滿是痛苦，他突然發了狠地一把將她扣入懷中，下顎抵著她鬢角，嘶啞出聲：「那你要我怎麼辦？」\n「樊長玉，你告訴我，我能怎麼辦？」\n他失控地惡狠狠質問她，把千瘡百孔的自己剖給她看，像一頭被逼到了絕境的困獸。\n從他下顎滾落的水澤沾溼樊長玉鬢角，灼得樊長玉皮膚發疼。\n「我試過放下你，能用的辦法我都用了，我是真的沒法子了……」\n他抱她抱得那麼緊，渾身卻止不住地發抖。\n恍若溺水之人抓到一根救命浮木。\n「不管你是樊長玉，還是孟長玉，都不重要了，我們好好在一起，好不好？」\n樊長玉只覺眼前淚水朦朧一片，心臟被另一種揪心的疼攥緊了，讓她大口大口地呼吸才得以喘息，喉嚨裡抑制不住發出「嗬」地一聲哭腔。\n時隔兩月零七天，她再次放任自己在這個懷抱裡肆無忌憚地大哭。\n雕花窗欞瀉進一室暖陽，浮塵在光影裡飄飛舞動。\n後背抵著床架的女子叫身前的人攥住腰，擒著下顎一寸寸深吻了下去，掛在金鉤上的纏枝蓮紋帷帳被扯散，所有的掙紮成了徒勞，她連哭都再哭不利索。\n-\n一場秋雨來得突然，豆子似的雨點噼裡啪啦砸下來，將官道上的黃土泡成一片泥濘。一支商隊在大雨裡艱難前行，眼瞧著前方有一處破廟可躲雨，商隊的車馬忙往破廟去。\n僕從們用廟內破敗的門板升起了火，清掃乾淨一塊地，顧不上烤自己身上溼透的衣物，又從馬車裡拿出杌凳擺上，隨即才有人前去將馬車內的人小心迎了出來。\n寬大的油紙傘傘沿遮住了下車男子的容貌，但那一身墨藍色的纏雲紋錦袍富貴非常，不過九月天氣，肩頭就已搭了厚厚的大氅，似乎身子骨不加。\n從後一輛馬車內走下的男子一襲雪青色儒袍，清雅溫潤，進破廟躲雨前，駐足看了來路一會兒，才抬腳邁進破廟。\n僕從侍衛們都守在門外，破廟的火堆旁，只有那披著大氅的男子和一名貼身伺候他的聾啞僕人。\n李懷安道：「殿下且暫歇片刻，等雨勢稍停，就得繼續趕路了，李家的死士死傷殆盡，才暫且擺脫了武安侯手底下的血衣騎，若是叫他們再追上來，恐怕就麻煩了。」\n齊旻（mín）面色陰翳看著眼前的翩翩公子：「孤的人，必須給孤帶回來。」\n假扮隨元淮十餘載，如今金蟬脫殼後，他再不是長信王府那個被大火燒毀容貌後，只能龜縮在後院的廢物，很快他就能成為這天下的主人。\n李懷安恭敬拱手道：「皇重孫及其生母，李家一定會竭盡全力去救的，但眼下最為重要的，是殿下的安全。」\n聾啞的僕從在火堆上煮了熱茶，沏好端與齊旻，卻叫他一把重重揮落在地。\n碎瓷迸飛，滾燙的茶水四溢，甚至有幾點茶漬濺到了李懷安鞋面上。\n這番動靜叫守在外邊的侍衛們警覺，但齊旻手上那支皇室影衛牢牢守住了破廟門口，李家的侍衛便是擔心李懷安，也不敢造次。\n李懷安平靜跪在了滿是塵垢的地上：「殿下息怒。」\n齊旻冷冷盯著他：「是你李家傳消息與孤，說謝徵已叫你們引去了別月山莊，讓孤儘快動身前往京城。可在路上等著孤的是什麼？是謝徵麾下那數百血衣騎和隨元青那個瘋子！」\n血衣騎已是整個大胤讓人聞風喪膽的一支騎兵，隨元青為了抱殺母之仇，更是有如殺神附體，誓要取他首級。\n齊旻身邊的皇室影衛折損盡半，李家派去的高手幾乎全軍覆沒，才只帶著他一人殺出了重圍，俞淺淺和俞寶兒則落到了血衣騎手中。\n李懷安在得知謝徵並未中計後，當夜便啟程離開了盧城。\n武安侯有權調動整個西北的兵力，等血衣騎的人帶著皇重孫母子回去，他就再也沒機會走了。\n此刻聽著齊旻的訓斥，李懷安只平靜到近乎麻木地拱手一拜：「此事是微臣之過，未能察覺武安侯是將計就計，害得殿下陷入險境。」\n博弈已經進行到這一步，接下來所做的每一個決定，他都只是按照李家一開始的計劃去實施，已麻木到不願去細想其中的是非對錯。\n他越是擺出這樣一副神色，越讓齊旻心中怒意難消，他忽而俯身一把揪住了李懷安的衣領。\n明明是個久病之人，五指也蒼白亦於常人，手上卻有著不輸於正常成年男子的力道。\n大抵也只有那些皇室影衛才知道，齊旻為了擺脫這副病體，一直都在暗地裡同他們研習武學。\n除了那些皇室影衛，他不信任何人，包括在他身邊伺候了多年的蘭氏母子。\n齊旻嗓音陰冷得可怖：「你以為只要孤平安進京，李家就已贏定了？謝徵自己在西北不敢反，他手上有那孩子了，你看他還敢不敢！」\n李懷安平靜無波的眼底，終於掀起了其他情緒。\n齊旻鬆開揪住他衣領的手，冷聲吩咐：「孤不管你李家用何方法，要麼將孤的人毫髮無損地帶回來，要麼……殺了那孩子，把他生母帶回來。」\n正好破廟外一聲驚雷炸響，閃電的白光划過廟宇，佛龕前那面目含笑的佛像，都透著幾分冰冷和詭異。\n李懷安心頭大震，冷風從破敗的門洞裡吹進來，他才驚覺渾身冰冷。\n他緩緩俯首道：「微臣遵命。」`

            content: `日上竿頭,唐培義大步邁進謝徵所住的院落，守在院外的親衛阻攔道：「唐將軍，侯爺昨夜醉了,還沒起。」\n唐培義心中納罕,謝徵在軍中的酒量是出了名的海量，昨晚他可沒喝多少，怎麼就醉了？\n雖是這般腹誹，他還是抱拳道：「我是聽底下人說,李公子似乎不告而別，提前回京了，覺著有些怪異,特來找侯爺商議此事。」\n他雖是個粗人,但朝中李黨和魏黨的爭權他還是看得清楚，李懷安不告而別，連昨夜的慶功宴都沒參加，其中肯定有貓膩。\n他如今已接管了崇州、薊州兩府的兵馬，不管是偏向李黨還是偏向魏黨,只要行將踏錯一步，興許就是萬劫不復。\n比起這麼快站隊,不若先向抽身事外的武安侯示好。\n一來從某種程度上說,武安侯也算是他的頂頭上司。\n二來比起那些不知前線疾苦的文臣，他覺著同是武將出身的武安侯,更能體恤手底下的將士。\n守在院外的親衛聽了唐培義的來意，只道：「勞請唐將軍先回去等候片刻,等侯爺起了，卑職等會轉告侯爺。」\n唐培義點了頭往回走，卻正好碰上謝五抱著疊好的乾淨衣物往這邊來,他對謝五有印象，當即叫住謝五問：「你不是樊都尉的親兵麼？怎在此處？」\n謝五神色微僵，只得胡亂扯了個慌：「都尉昨晚喝醉了，如今暫歇在西廂房，我……我給都尉找身換洗的衣物拿過去。」\n唐培義道：「西廂得往那邊走，你這都走到東廂來了。」\n謝五硬著頭皮道：「是卑職愚笨，不熟悉府上的路，走錯了。」\n唐培義擺擺手：「行了行了，快給樊都尉送去吧。」\n謝五隻能原地打了個轉，抱著那一身嶄新的衣物往西廂那邊走去。\n唐培義走過一道垂花門，又迎面碰上鄭文常，對方朝著他一抱拳道：「見過大人。」\n昨夜鄭文常替樊長玉擋酒，最後也喝了不少，醉倒在席間，叫下人暫且安置在了府上的廂房裡。\n唐培義點點頭，問：「文常也是才起？」\n鄭文常道：「慚愧，醉酒睡過了頭。」\n唐培義一大早，朝食都還沒吃，得了底下人稟報便來找謝徵，此刻正要去用飯，便邀請鄭文常：「可用過朝食了？要是沒用，隨我一道用些。」\n鄭文常道：「在西廂那邊用過了。」\n唐培義一聽鄭文常也在西廂，笑道：「那倒是巧了，聽聞樊都尉也被安置在了那邊。」\n鄭文常聽得這話，皺了皺眉道：「西廂十二間房裡，住的都是威虎營的將軍，樊都尉沒在那邊啊？」\n唐培義想起謝五抱著一身乾淨衣物去了謝徵院外，再聯想到昨夜謝徵反常的決定，一張臉堪稱精彩紛呈。\n鄭文常見唐培義半晌沒說話，只得又問了一句：「唐將軍莫不是聽錯了？」\n唐培義最終只吶吶道：「那應該是我弄錯了。」\n-\n不知從何處吹來的風拂動了紗帳，一室暖香怡人。\n樊長玉被摁在被褥間，對方強勢又兇狠的吻逼得她喘不過氣來。\n呼吸間除了淡淡的血腥味，還有他身上那股特有的清冽氣息，仿佛是裹挾著北地的晨霜。\n原本只是情緒激動下的親吻不知何時已變了味道。\n謝徵呼吸已經沉了，不再滿足於吮.吻她唇舌，單手扣著她下顎，從她嘴角一路吻至下巴，再順著脆弱的脖頸往下。\n樊長玉脖子很敏.感，大抵是因為那是人體最脆弱的地方，她整個人都抑制不住地發抖。\n謝徵薄唇緊貼著她頸上那一塊細膩單薄的皮膚，幾乎能感覺到那層血肉之下血液的湧動。\n他眸色愈發暗了下來，克制不住齒根泛酸，瘋狂想噬咬的欲.望，叼住那一小塊皮肉，用力吮出紅痕才罷休。\n樊長玉被親得迷迷糊糊的，渾身都發燙，一隻大手從她被扯散的衣襟探進去，熾熱的掌心無意間觸碰到她腹部那條三寸來長的刀疤時，她整個人驟然清醒，一把推開謝徵，用力裹緊了衣襟。\n謝徵被推開，只愣了一瞬，便問她：「在盧城這一戰傷到的？」\n樊長玉沉默著點了頭。\n那道刀疤劃得太長，從肚臍上方一直延伸到左邊腰側。痂已脫落了大半，但留下了很明顯的疤痕，顏色明顯區別於周圍膚色，形狀扭曲如蜈蚣。\n她之前並沒有多在意，剛才謝徵掌心撫上去時，她卻幾乎是條件反射性地把人推開了。\n她說不上來是為何，但就是不想讓他看到。\n謝徵眼底的欲.色已全然消退了下去，他靜靜凝視著樊長玉，說：「給我看看。」\n他之前去看她時，她傷口都已包紮好，他只知道她腹部也有傷，卻不知究竟傷成了什麼樣。\n樊長玉被他盯得不自在，垂眸避開他視線：「武將身上誰還沒幾道疤，沒什麼好看的。」\n她抬手系前襟的系帶，岔開話題道：「有些餓了，不知道廚房還有沒有留飯……」\n打結的手被一把攥住，謝徵盯著她，重複了一遍方才的話：「給我看看。」\n樊長玉沉默了一陣，終是鬆開了攥著衣帶的手。\n罷了，能瞞過他一時，也瞞不過他一世的。\n軍中武將統一的褚色底袍被褪至臂彎，虛虛掛在兩臂之間，恍若削成的肩，單薄卻並不顯孱弱，讓人下意識想到從蒼瘠巖層中長出的巖竹，嶙峋裡透著堅韌。\n左側的鎖骨上還有一圈極淡的牙印，是他很久之前留下的。胸脯用素布裹著，隆起一團惑人的弧度，再往下的腰肢，勁瘦纖細，緊實的肌理間不見一絲贅肉。\n那是區別於舞姬們楊柳軟腰的另一種更極致的美，像是陳年烈酒，飲過之後，便再也喝不慣膩人的甜湯。\n謝徵視線落到她左腹那道蜈蚣一樣的傷痕上，沉默看了好一陣，才伸手撫了上去，問：「還疼嗎？」\n樊長玉身上的肌膚在空氣裡裸.露久了，有些涼，他溫熱的指腹驟然撫上去，恍若螞蟻爬過，又麻又癢，讓她有些不適地挺直了上身。\n她微皺起眉頭，努力讓自己的嗓音聽不出異樣：「都落痂了，早就不疼了。」\n說完就想攏好衣襟，謝徵卻一直沒收回手，他半垂著眸子叫人看不清他眼底這一刻的神情，帶著薄繭的掌心貼著那道猙獰的長疤細細摩挲：「受傷的時候，在想什麼？」\n樊長玉回想起當日的兇險情形，微微失神了一瞬，隨即無所謂地笑了笑，道：「什麼也容不得我想，就覺著對面人好多，長刀、長戟、斧子，都在往我身上招呼，隨我出城的將士一個連著一個倒下了，但我救不了他們，我連自己都保全不了……」\n話落她只覺覆在自己腰腹上的那隻手驟然收緊，她被大力扣入了眼前人懷中。\n頭被迫靠在了謝徵肩上，她明顯能感覺到他全身的肌肉已繃緊，周身戾氣濃鬱得讓屋內空氣都變得稀薄。\n他啞聲說：「是我來遲了。」\n樊長玉微微一怔，隨即安撫般回抱住他精瘦的腰身，臉靠在他胸膛處，聽著他強有力的心跳，緩緩道：「我當時沒想過你會來，從康城到盧城，太遠了。出城去拖延時間，也只是覺著，賀大人以亡軀守到援軍來，我拼上這條命，能多拖延一刻是一刻。戰死在城下，就算無法替我外祖父翻案，後世之人提起孟家，也不會再覺著孟氏滿門都是禍國宵小。」\n攬在她腰間的手臂在不斷收緊，勒得她腰間的骨頭都隱隱作痛。\n謝徵另一隻手按住她後頸，讓她更嚴實地貼向自己。\n樊長玉看不見他面上是何神情，只聽他說：「往後不會再讓你獨自一人面對這些了。」\n樊長玉心口翻湧起歡喜又酸澀的情緒，她抬起頭看著他，認真道：「我會查清當年的真相的，魏嚴殺了我父母，他肯定知道錦州血案的隱情。如今他勾結反賊，險些害盧城落入反賊之手，唐將軍他們都說魏黨要倒了。等進了京，我會在金鑾殿上說出自己真正的身世，逼皇帝審魏嚴，叫十七年前錦州血案的真相大白於天下。」\n謝徵想到李家在盧城一戰所做的手腳，眸色沉了沉，他抬手輕撫著樊長玉後背的長髮道：「魏嚴老謀深算多年，盧城之事另有隱情，李黨如今口誅筆伐魏嚴，屆時倒臺的卻還不知是誰。」\n樊長玉面露困惑，謝徵稍作遲疑，還是將李家縱容魏嚴手底下人通敵的事告知她了。\n這是李家慣用的伎倆，一如當年水患賑災一般。\n越是民不聊生、屍橫遍野，他們能往魏嚴頭上扣的罪名才越大。\n對魏嚴的聲討一發出，百姓對其感恩戴德，坊間都說李家乃清流之首，卻不知，正是他們這些清流人士冷眼旁觀了他們的疾苦和生死。\n樊長玉聽完，整個人都陷入了久久的沉默。\n「崇州和盧城城外死了那麼多將士，他們良心怎麼安得了的？」\n好一陣，她才低喃出聲，垂在身側的手緊握成了拳頭。\n李太傅在民間頗享盛譽，百姓們都說，魏嚴作惡，只有李太傅一心為民。\n原來一切美名，都是造勢造出來的。\n她忽而抬眸看向謝徵：「李懷安呢？跑了？」\n謝徵已經知道了李家做的那些破事，昨夜的慶功宴上又不見李懷安其人，樊長玉很容易就想到李懷安怕是已經跑了。\n謝徵淡淡點頭，看她氣得厲害，又說：「我故意放他走的。」\n樊長玉眉頭皺起：「為何？」\n因為方才擁抱的姿勢，她胸前的束帶被蹭得鬆了幾分，謝徵無意間一垂眸，掃見那勉強被束帶兜住的大片豐.盈，他喉頭動了動，移開視線說：「讓他引著我的人馬去找一個人。」樊長玉全然沒察覺，聽得雲裡霧裡的，還在問：「找誰？」\n謝徵鳳眸裡透出冷光：「隨元淮，或者說，該叫他皇長孫齊旻。」\n這句話裡的信息量太大，樊長玉一時間竟沒反應過來。\n他知道死的那個隨元淮是假的？\n但怎麼和皇長孫扯上關係了？\n太多問題堆在心間，她一時也抓到頭緒，只皺眉問：「皇帝連兒子都還沒有，哪來的孫子？」\n她好歹重金聘請過幾個幕僚，雖沒記住滿朝文武大臣錯綜複雜的姻親、師生關係，但還是把本朝皇室有多少人記清楚了的。\n謝徵微微一噎：「我說的皇長孫是承德太子後人。」\n樊長玉更加聽不懂了：「那個皇長孫不是十七年前就死在東宮大火裡了嗎？」\n她稍加沉吟，很快想通了其中關鍵，急急抬起頭道：「就跟死的不是隨元淮一樣，十七年前死在東宮的也不是皇長孫對不對？」\n因為她突然挺直了腰背，微松的束帶中間那片暗影顯得愈深了些。\n謝徵想回復她的，但一低頭瞧見的風景，讓他生生移不開眼，腦子裡仿若打翻了一罐漿糊，渾身的血都在往頭皮上湧，身體裡竄出一股直達脊髓的飢餓感，讓他只恨不能一口一口將眼前人給生吞下去。\n發現他眼神不對勁兒，樊長玉低頭一看，這才反應過來，連忙兩手一抄將衣襟合攏，臉燙得跟只煮熟的大蝦似的。\n她羞憤警告他：「不許看！」\n他們親吻過很多次，他也吻過她鎖骨肩膀，但除此以外，就再也沒逾越的了。\n先前他是在看她腹部的傷口，眼底只有憐惜，無半分雜念，她才放鬆了警惕。\n謝徵一句話沒說，把人摁在被褥間親了個夠本，微微平復了些許呼吸，才抬起一雙充斥著欲色和侵略意味的眸子道：「早晚要給我看的。」\n樊長玉沒控制住，一巴掌把人給拍床底下去了。\n大概是這動靜太大，讓守在院外的親衛們都察覺了，一名親衛躊躇敲了敲房門，硬著頭皮開口：「主子，一隊血衣騎的人回來了。」\n謝徵對親衛稟報的消息似乎早有預料，從地上爬起來後，幫樊長玉遞過外罩的軟甲，雖然又被打了，卻心情極好地道：「彆氣了，帶你去見兩個你想見的人。」`

            content: `樊長玉昨夜喝多了,一身酒氣，換上謝五拿來的乾淨衣袍後，眼見謝徵命底下人套了馬車,似要出門，她從端上來的朝食裡拿了兩個大白饅頭就跟著往外走。\n這舉動把謝徵逗笑了,「真餓著了？」\n樊長玉不理他,坐上馬車後啃自己的饅頭。\n這城主府的饅頭蒸得綿軟又香甜,可比軍中的饅頭好吃多了。\n謝徵本不覺著餓，看她吃，突然又生出幾分嘗嘗的心思，靠坐在馬車的另一邊盯著她看了一會兒,問：「有這麼好吃？」\n樊長玉想著他這一早起來，跟自己一樣都沒吃東西呢,大方地把手上的另一個饅頭遞了過去：「給你。」\n謝徵卻沒接,探身鉗制住她另一隻手，樊長玉那本該往自己嘴邊送的半個饅頭,就這麼被他咬了一口去。\n樊長玉瞪眼怒視他，後者面不改色地嚼碎了咽下去,點頭道：「是挺甜的。」\n這一語雙關的話讓樊長玉面上多了幾分羞惱，她憤憤道：「拾人牙慧！」\n謝徵抬眸：「吃你一口東西,怎麼跟『拾人牙慧』扯上關係了？」\n對上樊長玉那帶著些許茫然的眸子，謝徵默了一息，突然問：「你是不是以為,別人照著你吃過的東西再咬一口，就是拾人牙慧的意思了？」\n樊長玉老實巴交點頭，又問：「不是嗎？」\n謝徵無言按了按額角，「老頭子都教了你什麼？」\n樊長玉小聲嘀咕：「這是我自己看書了悟的。」\n這話把謝徵給氣樂了,他鳳眼半抬睨著她道：「那你還挺有悟性的。」\n樊長玉不傻，當然聽得出他這不是誇讚的話，她幾口啃完最後一個饅頭：「打仗時請幕僚費銀子，現在不打仗了，回頭我給自己請個西席。」\n謝徵道：「倒也不必如此費事。」\n「拾，撿取之意；牙慧，旁人言語。撿旁人之言，當做自己的，常指抄襲、套用。」\n他嗓音低沉而富有磁性，耐心講解起疑難雜問，身上少了幾分武將的煞氣，多了幾分樊長玉形容不出的雅致。\n發現她在出神，謝徵抬手在她腦門上輕敲了一記，說：「以後每日來我這裡讀兩個時辰的書，省得老頭子回來了，見你學成這樣，把他給氣出個好歹來。」\n樊長玉捂著被他敲過的腦門，聽他說起陶太傅，也顧不上生氣了，問：「你有義父的消息了？」\n謝徵眸色微斂：「沒有，但總歸是同魏嚴脫不了干係。」\n說到最後一句，他嗓音驟然冰冷。\n正好馬車停了下來，前邊傳來謝十一的嗓音：「主子，到了。」\n謝徵率先下了馬車，伸出一隻手示意樊長玉搭著，樊長玉穿的是一身勁裝，長腿一邁輕輕鬆鬆就跳了下去，回過頭衝謝徵淺淺一揚眉。\n秋日的太陽光從樹蔭間碎下來，落在她臉上，她嘴角挑起的笑是一種介於少男少女之間的明媚，乾淨明澈，溫暖蓬勃。\n看她笑，謝徵便也跟著扯了扯唇角：「我是怕你扯到傷口。」\n樊長玉滿不在乎道：「早就不疼了。」\n她沿著鋪了滿地黃葉的幽逕往前走，謝徵不緊不慢落後她一步，卻能精準無比地抓住她的手，「我知道，可我怕你疼。」\n這話落進樊長玉耳中，她心口猝不及防地麻了一下。\n她側過頭去看謝徵，卻見謝徵正兩眼平視前方，說：「就是這裡了。」\n幽徑的盡頭是一處別院，院外有數十名玄甲鐵衛把守，見了謝徵，紛紛單膝點地：「侯爺。」\n謝徵淡淡點頭，吩咐道：「把門打開。」\n隨著朱漆大門緩緩向兩側打開，別院中的一對母子也抬頭朝外邊望了過來。\n樊長玉驚喜交加，快步走向院中：「淺淺？」\n俞淺淺也是又驚又喜，抓著樊長玉的手左看右看：「真沒想到還能在這兒見到你……」\n她說著，又讓長高了不少的俞寶兒喚樊長玉：「寶兒，這是你長玉姑姑，還不快叫人？」\n俞寶兒往大門處看了又看，見跟著樊長玉進來的只有謝徵，才轉頭望向樊長玉：「長玉姑姑。」\n喚了這麼一聲後，他捏了捏藏在袖子裡的手，帶著一絲他自己都沒察覺到的緊張問：「長寧妹妹呢？」\n當日同長寧分別，還是在長信王府上，已將近半年未見，他也不知長寧究竟是得救了，還是被那些人又帶往別處去了。\n樊長玉摸摸他的頭道：「我也是才知你們在這兒，寧娘在家呢，晚些時候就把她接過來。」\n俞寶兒明顯鬆了一口氣，乖乖應好。\n俞淺淺約莫是已經知道了謝徵的身份，再見到他，面上多了幾分侷促，「多謝侯爺搭救之恩。」\n謝徵避開俞淺淺這一禮，只說：「都是臣等分內之事。」\n這微妙的稱呼讓樊長玉和俞淺淺都察覺到了不同尋常。\n正好謝十一匆匆步入院內，似有要事要稟報，但礙於人多不好開口。\n謝徵便道：「你們先聊。」\n等謝徵出了院落，俞淺淺拉著樊長玉坐下，給她倒茶時，才問了句：「侯爺如今還是你夫婿吧？」\n她被齊旻抓回去後，所知的消息甚少，眼下得知謝徵就是武安侯，她也不清楚謝徵和樊長玉如今是怎麼一回事。\n樊長玉捧著茶盞想了想，說：「算不上，我倆當初成親就是假的。」\n俞淺淺給自己倒茶的手一頓，以為她如今是沒名沒分地跟著謝徵的，眼神複雜又心疼地看向樊長玉：「抱歉，我並非有意提起此事……」\n樊長玉沒當回事，「這有什麼。」\n俞淺淺看她當真毫不在乎的樣子，也稍稍放下心來，隨即又搖頭失笑：「你啊，心大成這樣，真不知是福是禍……罷了罷了，你如今有軍功在身，將來封個一官半職的，吃朝廷俸祿，也無需操心婚嫁之事了。」\n樊長玉聽得一頭霧水，怎麼突然就說到婚嫁上去了？\n她乾咳兩聲說：「那些事還早。」\n俞淺淺嘆了口氣問：「那你和侯爺，打算就這麼過下去？」\n樊長玉撓頭，仔細琢磨著俞淺淺話中的「就這麼過下去」的意思，陶太傅還沒找到，魏嚴還沒扳倒，孟家的冤屈還沒洗清，這麼多事擺在眼前，他們當然得把這些事都解決了，再操心婚嫁之事。\n於是樊長玉點了點頭，說：「這樣也挺好的。」\n俞淺淺眼中的心疼之色更明顯了些，她用力打了一下樊長玉手臂，斥道：「你個憨姑娘！」\n隨即又是深深嘆息，勸道：「我知道侯爺是人中龍鳳，世間女子就沒有不喜歡這樣的蓋世英雄的，可他終有一日是要娶親的，你這般沒名沒分地跟著他，到時候苦的是你自己。」\n樊長玉這才聽出俞淺淺誤會了，一臉糾結地摸著後腦勺道：「他是想娶我來著，我覺著還不是時候……」\n俞淺淺：「……」\n合著她白擔心了半天。\n俞淺淺佯裝生氣，樊長玉老老實實將自己身世和盤託出，俞淺淺臉色變了幾遭，神色複雜地道：「隔著父輩仇怨，侯爺還能待你如此，這份真心也是日月可鑑了。」\n樊長玉挽唇笑笑：「我不會讓他餘生都受良心煎熬的，也不會讓我外祖父蒙冤千古。」\n俞淺淺被樊長玉這一刻的決心和意氣感染，也笑了笑，說：「那便查下去吧，若是沒個頭緒，不妨從隨家下手試試。」\n樊長玉詫異道：「隨家？」\n俞淺淺點頭。\n她是被血衣騎救出來後才知曉齊旻真正身份的。\n從前她只覺著齊旻和長信王府的關係極為怪異，蘭氏和趙詢表面上是王府的下人，但卻又處處防著王府的人。\n一開始她猜測是隨家兩兄弟並不和，畢竟不是同胞兄弟。\n後來長信王和隨元青相繼失勢，齊旻帶著她和寶兒玩一出金蟬脫殼，不惜殺死待他如親子的姨母長信王妃，俞淺淺才愈發覺著他可怕。\n那時他臉上全是殺死長信王妃濺到的血，把匕首握到屍體尚未僵硬的長信王妃手中，偽造成自殺的假象，不巧被她掀開帳簾撞見，齊旻抬頭朝她看來的那個眼神，她至今午夜夢回想起都還會做噩夢。\n他簡直是一條在暗處吐著毒信的蝮蛇，蟄伏著只為尋找機會一擊斃命。\n俞淺淺道：「我總覺著，齊旻似乎格外恨隨家人，當年承德太子妃選隨家作為齊旻的藏身點，或許也是有原因的。」\n說者無心，聽者有意。\n從俞淺淺那裡離開後，樊長玉回去的一路都在失神。\n謝徵指節叩了叩馬車上的矮几問：「在想什麼？」\n樊長玉道：「淺淺說，齊旻似乎很恨隨家人，承德太子妃當年把他藏到隨家，應該也不是臨時起意。」\n謝徵眸子微眯：「長信王已死，隨元青還在我手上，等擒了齊旻回來，再好好審審他。」\n樊長玉問：「方才十一找你，是齊旻那邊有消息了？」\n謝徵頷首：「血衣騎的人已跟著李懷安找到他了。」\n上一次血衣騎圍剿，李家死士和齊旻身邊的皇家影衛帶著他逃出去了，謝徵失了他們的蹤跡。\n李懷安偷偷離開盧城，前去同齊旻匯合，正好給謝徵的人帶了路。\n-\n滂沱大雨停了，破廟的簷瓦上還往下滴著水珠，但簷下的水窪裡，是一片靡豔的胭脂色。\n遍地都是死屍，鮮血染紅了地上的雨水。\n李懷安躺在破廟門口，口中往外溢著鮮血，見隨元青提.槍走向齊旻，爬起來想要阻止，卻已來不及了，只能啞聲痛苦喊道：「殿下快走，快走……」\n隨元青腳碾過李懷安手背，盯著他痛到扭曲的臉，嗤笑道：「李家可真是擅養好狗，可惜忠心錯了主子。」\n他一步一步朝著坐在火堆旁齊旻走去，槍尖下方被鮮血染紅的穗子隨著他走動，在破廟地磚上滴下粘稠的鮮血。\n廟外解決了餘下死士的血衣騎見隨元青欲取齊旻性命，喝道：「侯爺有令，生擒此人。」\n隨元青朝著說話的血衣騎咧嘴一笑，眼裡透著大仇即將得報的瘋狂和快意：「他謝徵的令，幹我隨元青何事？真當老子怕你們給老子下的毒？殺了這賤種，老子就去地底下陪父王母妃！」\n幾名血衣騎的人進來攔他，卻被他一槍橫掃得倒飛出去。\n他槍尖直指齊旻咽喉，冷笑著道：「借著別人的名頭苟且偷生了十餘載，想來你也沒什麼遺言了……」\n齊旻平靜喚他：「青弟。」\n隨元青額角青筋凸起一條，槍尖用力一挫，齊旻從嘴角至臉頰就被劃開一道血口子。\n他惡狠狠道：「你不配這麼叫！」\n隨元青陰險狡詐了半輩子，卻還是頭一回被人欺騙至此。\n十幾年的兄弟情誼全都是假的！\n那個被燒毀了容貌脾氣無常，卻總是溫聲喚他「青弟」，教導他要好好讀書的兄長也是假的！\n齊旻嘴角破開，面上卻已經平靜，他垂眼道：「事到如今，還是該同你說聲抱歉，不管你信不信，我從來沒想過要傷你分毫。」\n這句話無異於是火上澆油，隨元青盛怒之下，甚至舍了長.槍，直接上前一步用力揪起齊旻的衣領，聲嘶力竭質問他：「沒想過傷我分毫？是來不及吧？我母親視你如己出，你是怎麼下得去手呃……」\n最後一句話還沒質問完，隨元青只覺心口驟然一涼。\n喉間湧上腥甜，他低頭看了一眼，一把匕首正刺自己左胸，而匕首柄，握在齊旻手中。\n他吃力抬起頭，看著齊旻，露出一個比哭還難看的笑：「……沒想過傷我……分毫？」\n齊旻眼都不眨地將匕首往前又鬆了一寸，冷漠看著隨元青抽.搐的身體：「這種話你也信，死得倒是半點不冤。」\n隨元青已經支撐不住自己的身體了，跪倒在地，血紅的一雙眼裡滾落水澤：「……我一直……一直把你當兄長……」\n齊旻面無表情抽出匕首，再沒多看一眼倒在身後的屍首，陰冷道：「這都是你隨家欠我的！」\n倒在破廟門口的李懷安已全然被這突來的變故驚呆了。\n齊旻走到他跟前時，稍作停頓道：「原以為你跟這些人是一夥的，既然你對孤忠心，孤便不\n殺你了。」\n他被劃破的半邊臉上全是血跡，半低著頭看人的視角，恍若披著人皮的厲鬼。\n李懷安被他盯著，有一瞬甚至覺得自己沒法動彈。\n屋外的血衣騎見勢不對，正要朝齊旻齊攻過來，忽從破廟頂上又飛下一撥影衛來，出手如閃電，瞬間就要了那幾名血衣騎的性命。\n李懷安出了一身冷汗，他身邊的影衛根本沒死傷殆盡！\n他是一早就做好了兩手準備的！\n齊旻冷眼看著影衛從一名血衣騎身上搜出的玄鐵令牌，撿起扔給李懷安，眼神如毒蛇一般盯著他：「去，把孤的人給孤帶回來。」\n李懷安接過那塊被鮮血染紅的令牌，又回頭看了一眼，最初就替齊旻擋道死在了火堆旁的蘭氏，忽覺遍體生寒。\n李家要扶持的這位，坐上了龍椅真的會是個明君嗎？`

            title: `第123章第123章`,
            content: `謝徵似乎並未打算讓唐培義他們也知道承德太子後人尚存於世的消息。\n未免走漏風聲,暫且將俞淺淺母子安排在城郊一處別院藏了起來，長寧聽說寶兒他們就在薊州，鬧著要去看寶兒,樊長玉想著兩個孩子在一起，有個玩伴也好,同謝徵知會過後，便帶著長寧去了一趟別院。\n兩個孩子重逢，倒是出乎樊長玉的意料，他們沒有立馬玩做一片，而是眼眶紅紅地,都不說話。\n樊長玉逗長寧：「不是鬧著要來看寶兒嗎？怎麼看到了又不說話？」\n長寧揪著她一片衣角,抿了抿唇才看向同樣站在俞淺淺邊上的俞寶兒：「我沒騙你，我說了會讓阿姐和姐夫去救你的吧？」\n樊長玉和俞淺淺都在笑,只有俞寶兒朝著長寧輕輕點了頭：「我知道。」\n俞淺淺同樊長玉道：「小孩子長時間沒見了，瞧著都生疏了，讓他們自己玩一陣吧，轉頭就熟稔了。」\n她邀著樊長玉進屋坐,放任長寧和寶兒在外邊玩。\n院子很大,院外又有守衛，出不了什麼事。\n長寧垂著腦袋用鞋幫子杵地,不太高興。\n倒不是因為旁的,而是原本跟她一樣高的俞寶兒，半年不見,竟然已經高了她半頭了。\n她晃了晃手上一堆小玩意,一股腦全塞給俞寶兒，說：「這是趙大叔給我新編的蝴蝶和蟈蟈，都給你。」\n俞寶兒不知道哪裡惹了她不高興,問：「那人帶走你後，沒打你吧？」\n說起自己當時被隨元青帶到戰場，長寧這才來勁兒，坐在石墩上，手舞足蹈比劃：「他可兇啦，他把我放到比好幾個我還高的大馬上，在黑乎乎的晚上帶著我在山野裡跑，死了好多人，山上的鬼都在風裡烏拉拉地哭……」\n俞寶兒臉色不太好看：「他帶你去戰場上了？」\n長寧終於想起那群人打仗的地方是叫戰場，連忙點頭：「還好我姐夫來救我了，那個壞蛋打不過我姐夫，就把我往天上扔，拿他那個碗口粗的槍戳我，被我姐夫用比柱子還粗的兵器打退了！」\n她說著還張開雙臂比劃了一下有多粗。\n俞寶兒想像了一下謝徵在馬背上掄著大柱子當兵器的情形，皺了皺眉，才如她所願說了句：「你姐夫真厲害。」\n長寧趕緊驕傲地挺了挺小胸脯：「我阿姐第一厲害，姐夫第二厲害。以後你別怕，再有壞人來了，我保護你！我阿姐現在當將軍啦，手底下管著好多人呢！小五叔叔、小七叔叔，還有小秦叔叔他們……」\n樊長玉同俞淺淺在房裡說話時，朝外看了一眼，見兩小孩坐在臺階處，擺弄著一堆小玩意，不知在嘀嘀咕咕說些什麼。\n俞淺淺笑道：「寶兒這孩子從前不認生的，被關在長信王府上那段時日，也不知受了些什麼罪，我再見到他時，他就不愛笑，也不愛說話了，聽說還給他找了玩伴，但他也不搭理，看他跟寧娘又能玩到一塊去，我便放心了。」\n樊長玉道：「興許是被嚇到了。」\n俞淺淺說：「我這一生，已別無所求，唯一記掛的，也只有寶兒了。」\n樊長玉聽出她是憂心俞寶兒往後的處境，安撫道：「別怕，寶兒現在不是反賊餘孽，他是承德太子的後人，沒人敢拿寶兒怎樣的。」\n俞淺淺苦笑道：「宮裡那位，容得下承德太子的後人嗎？」\n這話把樊長玉問住了。\n李家目前已經跟齊旻聯手，想讓小皇帝退位，小皇帝只怕已視承德太子後人為眼中釘，肉中刺。\n樊長玉只沉默了一息，便道：「我會盡我所能護著你們的。」\n樊長玉對宮裡那位皇帝的印象並不好，昔日叛亂尚未平定，為了讓謝徵安心娶長公主，皇帝就不惜治自己一個武將於死地。\n忠誠與否，似乎並不重要，只要擋了路，就該被除去。\n齊旻此人，他能為了扳倒魏嚴，跟李家一起想出視萬千將士的性命如兒戲的毒計，樊長玉也不覺得他上位了能當個好皇帝。\n大抵是因為前十幾年只是個悶頭只顧自己溫飽的小民，樊長玉對皇權雖是敬畏，卻也沒到愚忠的地步。\n這天回去後，她專程去找謝徵，謝徵在處理堆積在案頭的公文，她便坐在一旁發呆。\n謝徵問她：「有心事？」\n樊長玉問：「你說，皇帝要是想殺了寶兒怎麼辦？」\n謝徵嗤道：「他如今自身難保。」\n他把一封從京城寄來的信件拿與樊長玉看。\n這些公文都寫得咬文嚼字的，樊長玉看得吃力，好不容易看懂了其中意思，她瞪大眼道：「李家人想要齊旻正式出現在朝堂上了？」\n信上所寫的，不是旁的，而是欽天監官員夜觀星象，看出帝星有異動。\n而朝中幾員耋耄老臣，紛紛說自己夜裡夢見了先帝，先帝涕泗橫流，言不忍承德太子之後流落民間。\n如今整個京城都流傳著皇長孫沒死的言論，又說這幾年大澇大旱，都是天子德不配其位。\n百姓對魏嚴架空皇權早有不滿，小皇帝給群臣和世人的印象也一直是懦弱無能的，眼下正好有了個宣洩口，百姓都叫囂著讓承德太子後人繼位才是正統。\n皇帝從前還靠李家打壓魏嚴，眼下李家已同他離了心，他手上那點實權，扳誰都扳不到。\n謝徵近乎篤定地道：「魏嚴也在做局，李家圖窮匕見之際，便是魏嚴收網之時。」\n-\n京城，皇宮。\n御書房龍案下方的臺階上，奏疏早就扔了一地，能砸的杯盞器具，也早砸光了。\n「反了！全都要反了！」\n身邊再無東西可砸，皇帝齊昇（shēng）氣得將龍案也推翻在地，寬大的龍袍拖曳在地上，叫他自己不小心踩到，跌了一跤，額角都在臺階上磕出血來。\n今日的盛怒，跟最初李家彈劾魏嚴的摺子上來時他的狂喜形成了鮮明的對比。\n原來李家開始扳倒魏嚴，不是受他的意，而是早就存了異心！\n一旁伺候的太監心驚膽戰上前去扶：「陛下，陛下您怎麼樣了？」\n齊昇一把揮開前去攙扶他的太監，神情陰鷙指著那太監道：「朕知道，你們從沒把朕當過真正的天子，朕都知道……」\n他神情兇狠得像是要吃人。\n太監顧不得摔倒時被地上的碎瓷扎到的口子，連忙跪地表忠：「陛下，老奴對陛下的衷心，天地可鑑吶！」\n齊昇卻毫不理會，只近乎自言自語地道：「他謝徵敢拒朕的旨意，李家也要另擁旁的傀儡來取代朕了……」\n他說著面色陡然猙獰，歇斯底裡道：「朕才是真龍天子！除了朕，誰也別想坐那把龍椅！」\n太監怔怔看著齊昇失態的樣子，有一瞬甚至懷疑齊昇瘋了。\n但齊昇卻拖著那一身袖子都掉了半截的龍袍在御書房內來回走動起來，頭頂的金冠歪了他也毫不在乎，只喃喃念叨著：「還有辦法的……還有辦法的……」\n太監心驚膽戰看著他這副癲狂的模樣，再想到朝堂和民間的那些言論，不動聲色想離開御書房，他都快走到門口了，大殿內來回走動的齊昇不知何時注意到他的，正歪著腦袋看他：「你去哪兒？」\n太監渾身的冷汗刷一下出來了，好歹在御前伺候了這麼多年，說話才不至於磕巴：「老……老奴見陛下心中煩悶，想去陛下沏一壺茶來。」\n「是嗎？」齊昇似乎不太相信，他從一旁的劍架上取了龍泉寶劍，直接在臺階上拖著劍尖朝老太監走去。\n老太監嚇得魂飛魄散，腿肚子軟得路都走不動了，癱軟在地求饒道：「老奴真的是想去替陛下沏茶啊……」\n齊昇看著他笑：「去沏茶就去沏茶，你抖成這樣做什麼？」\n鋒利的劍尖扎進太監腿裡，老太監當即慘叫一聲，齊昇只覺心底叫囂的惡意在一聲慘叫裡找到了宣洩口，渾身的每一個毛孔都驟然舒坦了起來。\n他心情極好地又往老太監身上刺了一劍，眼見鮮血把自己明黃的龍袍都染紅，才快意地笑了起來：「多好看的顏色，無怪謝徵麾下那八百親騎要叫血衣騎。」\n老太監已痛得渾身痙.攣，手腳並用試圖往外爬，奈何身後齊昇似發現新奇的玩具一般，直接把手上的龍泉劍當刀砍，兩手握住劍柄，切瓜砍柴一般，只憑著一腔戾氣盡數揮砍在老太監身上。\n老太監從一開始的表忠討饒，到後面已連一句告饒或求情的話都喊不出來了。\n大殿的地磚上，都迸滿了血沫子和碎肉。\n齊昇直砍到自己兩手酸軟才停下，他看著被自己坎得只剩一攤爛肉的屍體，扔開手上的劍，喚小太監進來收拾乾淨，自己回龍椅上坐下喘氣。\n進殿來的小太監們，看到大殿中央那一堆血肉，無不臉色大變，嘔吐連連。\n齊昇看著他們的狼狽模樣，似覺著有趣極了，終於快意笑出了聲：「高公公對朕有異心，死有餘辜！再對朕有異心者，這就是下場！」\n一群小太監面如土色地跪地表忠。\n齊昇極滿意地看著這一幕，只覺通體都舒暢，這就是他渴望的權力的滋味！\n終有一日，李家，謝家，也要這般跪在他跟前搖尾乞憐！\n只不過在那之前，他還得繼續忍耐一段時日。\n發洩完戾氣，齊昇也全然冷靜了下來，他滿臉陰翳道：「來人，伺候朕更衣。」\n-\n秋夜漸涼，寒蟬悽切。\n魏嚴自被李家彈劾勾結亂黨開始，便稱病不上朝了。\n月華在庭院的石板路上灑下一片霜白，好似下了一場初雪。\n書房的窗口透出一豆燈火，近侍穿過守在院外的層層虎賁將士，推開門對著席地坐於矮几前同自己對弈的老者道：「相爺，有貴客來。」\n魏嚴被打斷了棋路，堆滿褶子的眼皮稍稍往上一抬，映著棋盤旁的一盞燭火，不怒自威：「老夫不是交代過了，誰來也不見。」\n侍者兩手託舉起一物，讓其過目。\n是一枚雕著龍紋的羊脂玉環。\n此乃皇帝所佩之物。\n魏嚴只瞥了一眼，便收回目光，似乎全然沒放在眼裡，這會兒功夫，他已想起了方才想落的棋位，蒼老勁瘦的食指和中指捻著黑子落入了棋盤中，整個棋局的廝殺瞬間逆轉了局勢。\n他道：「在李家老兒那裡學了這麼多年，還是半分沉不住氣。」\n侍者不敢搭話，等著他繼續吩咐。\n魏嚴說：「他既來了，便讓他進來吧。」\n須臾，換了一身常服披著寬大鬥篷的齊昇便出現在了魏嚴書房外。\n他想進書房，院中的虎賁將士卻交戟示意他不得再往前。\n齊昇臉色難看在原地靜立了片刻，想到李家要做的事，當即也顧不得臉面，如這十幾年裡無數次在魏嚴跟前伏低做小一般，直接掩面哭泣起來：「丞相救我！他李家想廢了我，另立君主！」\n書房內沒人做聲，透過投映在門紗上的影子，齊昇辨得出魏嚴是在獨自下棋。\n齊昇暗中咬了咬牙，繼續聲淚俱下祈求：「丞相，朕會聽話的，從前的總總，都是朕受了他李家蒙蔽，朕知道，只有丞相才是一心為朕好的。他李家還想構陷丞相勾結亂黨，朕也會替丞相討回公道的！」\n能想到的好話，齊昇都說了，可書房中那道人影就如同充耳未聞一般。\n齊昇這才真正覺得怕了，             content: `樊長玉沉默兩息後道：「既是跟我外祖父運糧有關,我跟你一起去。」\n謝徵在黑暗中掀開了眼皮，十七年前的真相，不僅關乎自己,也關乎眼前人。\n借著從窗外灑進的月光,依稀可以辨出樊長玉臉上的輪廓,她眼底全是鄭重的神色。\n謝徵一隻手還攬在她腰側，隔著單薄的衣物,隱約能摸到她腰腹上那道疤痕的凸起。\n此番前去，還不知是不是計。\n魏嚴手上那批天字號死士,怕是不比齊旻身邊的皇家影衛好對付。\n他道：「你等小皇帝的詔書下來了再跟著大軍一起返京，跟著我無詔進京，被發現了可是要殺頭的。」\n樊長玉瞪他：「你當我怕？」\n謝徵知道她的性子，扯了扯嘴角，眼神軟了下來，在她秀髮間很嗅了幾口才道：「知道你不怕，但凡事總得做足兩手準備。」\n他手掌在她腰際的傷疤處輕輕摩.挲：「皇重孫母子還在別院,你在這邊我放心些。我此去若是中計，和老頭子一樣沒了音訊，你拿著這塊令牌，可調動血衣騎和徽州謝家的人馬。真到了走投無路的時候,別輕易進京，說動唐培義一起擁立皇重孫,有承德太子的血脈在，便是你們暫且屈居西北一隅,朝中也沒人敢往你們頭上按逆黨的名號。」\n樊長玉感覺自己手心被塞入了一塊帶著他體溫的橢圓形令牌，她心中一時有些不是滋味，扭過頭去看謝徵,問：「那你呢？」\n謝徵看出她眼底的擔憂，把人攬進懷裡用力抱了一下：「我說的只是最壞的情況，魏嚴還沒那麼大本事讓我有去無回。」\n樊長玉一手還握著他遞來的令牌，心口亂糟糟的，她把臉埋進他堅實的胸膛裡，悶聲交代：「一定要小心為上。」\n謝徵身前的衣襟先前就被扯散了，懷中人把側臉貼上去，說話間的吐息都盡數噴灑在他胸膛上。\n血氣方剛的年紀，躺在身側的又是心尖上的人。\n他忍了又忍，喉頭滾了好幾遭，望著漆黑的帳頂近乎自暴自棄地道：「你要實在放心不下，要不讓我給謝家留個種？」\n樊長玉心底的溫情卡了一卡，面無表情地伸出手，在他緊質的腰側狠狠擰了一把，換來謝徵一聲含笑的悶哼：「謀殺親夫？」\n樊長玉伸手還要再擰一把，卻被謝徵抓住了手。\n原本只是推搡打鬧，到後邊她被摁住手腳釘在床榻間時，謝徵半撐起身體看了她幾息，突然又低下頭來親她。\n他散落下來的長髮偶爾拂過樊長玉肩頸，有些涼，還有些癢。\n跟之前幾次親吻都不太一樣，他不急著攻城略地了，變得極有耐心，溫柔得像是在蠱惑什麼。\n樊長玉也的確被他蠱到了。\n-\n第二日樊長玉醒來時，已是日上三竿。\n日光從門窗傾瀉進來有些刺眼，她不適地眯了眯眸子。\n胸口有些沉，似壓了什麼東西。\n定眼一看，竟是長寧壓在了被子上邊。\n趙大娘已給她梳洗乾淨了，她現在頭髮長了，兩邊的揪揪也扎得很整齊，上邊還戴了兩朵鈴鐺小絨花。\n她兩隻胖手撐著圓嘟嘟的下巴，笑眯眯道：「阿姐今天是大懶蟲，太陽曬屁股了才起。」\n樊長玉還犯著困，下意識想伸手摸摸長寧的頭，但昨夜的記憶回籠，她生生止住了把手拿出被子的動作，臉色變得有些不自然，道：「阿姐今天的確犯懶，寧娘幫忙去打洗臉水好不好？」\n嗓音大概是剛睡醒的緣故，也有些啞。\n長寧難得有被樊長玉使喚的時候，一聽她吩咐，立馬乖乖應了聲「好」，從床上跳了下來，穿上自己的鞋子，兩隻手端起木架上的銅盆，噠噠噠跑去廚房找趙大娘。\n房內沒人了，樊長玉才掀開被子坐起來，裡衣只鬆散地套在她身上，凌亂的紅痕從她脖頸一直蔓延至肩膀。\n胸前也還有些疼，應該是被牙齒磕傷了。\n樊長玉有些生無可戀地揉了一把睡亂的頭髮。\n她也不知道昨晚怎麼就成這個樣子。\n想更衣，但視線觸及右手指尖，想到謝徵昨晚弄在自己手上的東西，哪怕早已經洗乾淨了，她還是下意識又在換下來的衣物上擦了擦。\n對了，他昨天夜裡就是用她的小衣給她擦手的！\n樊長玉怕東西沒清理乾淨，叫長寧發現什麼，視線在屋內睃巡，找她昨晚弄髒的那件小衣。\n在木架上瞧見已晾得半乾的衣物時，她才鬆了口氣。\n隨即心裡又生出一股怪異的感覺——他竟然是把她那件小衣洗乾淨了才走的？\n臉頰燒得慌，樊長玉搓了搓臉，趕在長寧回來前，從放乾淨衣物的籠箱裡找出束帶簡單把胸脯束一束。\n為了方便穿軍中衣物，樊長玉通常都會束胸。\n只不過今天有些吃痛，樊長玉綁束帶時自己看了一眼，頂端都腫了，她抿緊了唇，想起昨夜到後邊的混亂，半是羞半是惱，在心底默默把謝徵給罵了一遍。\n幸好已是入秋，樊長玉撿了件領子高些的袍子，把頸上的痕跡擋住。\n但用飯時，趙大娘不知怎地，還是眼尖瞧見了，想到自己昨晚聽到的動靜，趙大娘問：「長玉，怎地從崇州回來後，就一直不見言正那孩子？」\n樊長玉頓時一口飯噎到了喉嚨裡。\n當初怕趙大娘她們擔心，她同謝徵分開的事也就沒在趙大娘跟前提起過，對於自己和謝徵的身份，她因不知從何說起，到眼下也還沒同趙大娘夫婦挑明。\n此刻只能戳著碗裡的米粒含糊道：「他當初跟著大軍去康城剿反賊餘孽了，等後面大軍進京，他應該就回來了。」\n趙大娘的神色變得有些怪異，暗道那樊長玉這頸上的印子是怎麼回事，只得旁敲側擊問：「你們沒吵架吧？」\n樊長玉一臉茫然：「沒啊。」\n看她這樣，趙大娘愈發憂心忡忡，遲疑道：「你以後……是打算跟言正那孩子一人過還是……」\n樊長玉曲解了趙大娘的意思，一臉坦蕩道：「當然還得帶著寧娘和大娘你們，您和大叔就是我半個親人，我還能丟下你們不成？」\n趙大娘急得一拍大腿：「誰問你這個，我是說，你不會學著那些一朝發達的負心漢，家裡養幾個，外邊還養幾個吧？」\n在院子裡掃地的謝五和陪長寧玩的謝七一聽趙大娘這話，皆是一臉驚恐。\n樊長玉這回是真噎著了，捶胸頓足一張臉險些憋成豬肝色。\n「你這孩子，慢點吃，問你個話，怎麼還噎著了……」趙大娘幫著撫背眼見沒效果，趕緊又給樊長玉倒了一杯茶遞過去。\n一盞茶下肚，樊長玉總算是緩過氣來了。\n她不解地問：「大娘您胡說些什麼呢？」\n趙大娘掃了一眼院子裡各自忙活又都豎著耳朵的謝五謝七，用手指了指脖子。\n樊長玉趕緊用手攏了攏領口，自知是瞞不住了，卻又因那些印子有些難為情，蔫頭耷腦道：「昨晚是言正回來了。」\n趙大娘頓時喜上眉梢，問：「人呢？」\n樊長玉喝完杯子裡茶水，說：「又走了。」\n怕趙大娘繼續追問，她放下茶杯往外走：「大娘你別瞎擔心些有的沒的，軍中還有事，我先去軍營了。」\n其實最近軍中也沒什麼事，樊長玉怕頂著一脖子的印子再被人瞧見了尷尬，索性去別院看俞淺淺母子。\n謝徵離開後的第三日，樊長玉從謝五口中得知，血衣騎的人抓到了李懷安，現已把人帶了回來。\n一想到賀敬元和盧城城外那些將士的死，樊長玉就恨得牙痒痒，恨不能當場質問李懷安。\n她也的確去了。\n在謝徵的私牢裡見到一身襤褸布衣，頭髮凌亂卻神態平和坐在枯草間的李懷安時，樊長玉怎麼也壓不下心底升起的怒火，她冷聲道：「盧城外遍地忠骨枉死，不知李大人這些日子裡，寢食可安？」\n李懷安睜開眼，看著牢外的她，神色間似有一瞬的痛苦和難堪，隨即都變成了苦澀：「我若說一刻都不曾得過安寧，樊姑娘信嗎？」\n賀敬元立於盧城城樓上的亡軀，還有那隨著自己出城卻一個連著一個倒下的將士，都還在樊長玉眼前，她目光冷銳如刀：「這些話，李大人該留到真相大白那日，說與萬千枉死的將士聽！天下百姓都以為李家跟賀大人一樣，都是好官，可視他們的性命如草芥的，也是你李家！」\n李懷安依舊只是苦笑：「懷安一直羨慕樊姑娘的率性灑脫，愛憎分明，可人活在這世間，很多事，沒法非黑即白，總有取捨。李家所做，當下或許是錯了，但再過個十幾載，也可能是給大胤帶來一個盛世。」\n樊長玉齒關咬緊，朝著大牢牆壁上重重揮了一拳。\n堅硬的牆磚破裂，掉落一地石渣，李懷安的話音也戛然而止。他抬起頭來，看清樊長玉臉上的憤怒，微微一怔。\n樊長玉冷冷看著他：「是什麼讓你能大言不慚說出這等傲慢的話來？因為你生來就富貴？不用像普通百姓一樣為了三餐溫飽而發愁？因為你讀多了聖賢書，所看到的疾苦也不過紙頁上輕飄飄一句話？死的不是你，也不是你的親人，你有什麼資格替他們說，是用他們的死，給大胤換來一個盛世？」\n這番質問，讓李懷安完全愣住了。\n樊長玉最後只給了李懷安一個冷漠又諷刺的眼神，就要往大牢外走，前方的牢門處，卻傳來了異動。\n幾名身著血衣騎服飾的人提著帶血的刀衝殺進來，和樊長玉正對上。\n不過一個照面的功夫，樊長玉就意識到這些人是假扮的，她抽出了腰間貼身帶著的一把剔骨刀。\n對面劫獄的人彼此對視了一眼，提刀便朝樊長玉衝了過來。\n牢房甬道狹小，樊長玉刀刃同對面的人相接，迸出了火星子，她愣是憑藉一身蠻力，逼得對面死士幾乎是被刀刃拖行著往後退。\n其中一名死士想偷襲，被樊長玉一腳踹在手臂上，胳膊當場錯位，刀也拿不住，掉落在地發出「哐當」的金屬脆響。\n解決完殺到大牢完的幾名死士，樊長玉才看向李懷安：「李大人被困於此，尚有這麼一些人不顧性命前來相救，當日死在城外的那些將士，他們可是到死都沒等到人搭救！」\n李懷安低垂著頭，亂發掩住了他大半張臉，他道：「去救皇重孫母子。」\n樊長玉神色微微一變：「什麼意思？」\n李懷安嗓音平靜到麻木：「劫獄只是個幌子。」\n幾乎是電光火石之間，樊長玉想通了這是一出調虎離山計！\n那些人假扮血衣騎，一路攻到大牢，殺了真正的血衣騎一個措手不及，血衣騎那邊一定會再調集人馬過來增援，把兵力都牽制在大牢了，別院再出什麼意外，就來不及調派人手過去了！\n樊長玉一刻不停地往外趕，迎面碰上不少血衣騎都是假扮的，她一時不妨手臂掛了彩，因為難以辨別是敵是友，她接下來索性見人就先揮刀。\n謝十一帶人趕來時，迎面碰上樊長玉，正要說話就差點被砍了一刀，他連忙提刀做擋，喝道：「都尉，我是十一！」\n樊長玉捂住流血的手臂，掃了一眼他帶來的百來十號人，道：「快去別院！他們真正的目的是別院！」\n謝十一臉色大變，連忙吩咐底下人：「你們幾個留在此處善後，其餘人等隨我一道前往別院！」\n樊長玉說：「我也去。」\n謝十一看樊長玉一眼，大概是明白攔不住她，扔給樊長玉一瓶金創藥，道：「那都尉多加小心！」`

            title: `第125章第125章`,
            content: `樊長玉隨謝十一等人快馬加鞭趕到別院,終究是來遲一步。\n整個別院火光滔天，大門處橫七豎八倒著幾具血衣騎的屍體，臺階上的血色在火光裡悽涼又靡豔。\n樊長玉抱著一絲僥倖衝進別院裡找人：「淺淺？」\n她一連找了幾個房間都沒瞧見人,最後在廚房門口瞧見被打暈過去的廚娘,她把人架起扶出了院子。\n謝十一帶人清點門口的血衣騎屍首時，發現其中一人尚存一息，趕緊拿出保命的藥丸給他服下。\n那人虛弱睜開眼，瞧見是自己人，忙把事情始末交代了一遍：「有人假扮血衣騎突襲別院，我們難分敵我一時落了下乘……」\n謝十一問：「皇重孫母子呢？」\n那人虛虛指了一個方向：「往東……東邊去了……」\n謝十一忙把這發現報與樊長玉，樊長玉下令留下少數人在此善後，其餘人繼續往東追。\n別院建在城郊,想封城進行地毯式搜索都不成,她們眼下若追不上，可能就得徹底失去俞淺淺母子的蹤跡了。\n樊長玉心急如焚，跨上馬背後狠狠一甩馬鞭，繼續往東追。\n血衣騎人人都是斥侯出身，謝十一眼見樊長玉簡單包紮過的手臂上,紗布都已重新被鮮血染紅,寬慰道：「都尉莫要太過擔心，地上有新的車轍印,他們劫走皇重孫母子用的是馬車,咱們能追上的。」\n樊長玉沒應聲,唇依舊抿得死死的。\n俞淺淺是她為數不多的朋友,寶兒對她們來說更是關係重大，謝徵如今已進了京，她不能再讓俞淺淺母子有任何閃失。\n駕馬狂追了十幾裡地,前方官道兩側的密林忽射出一片亂箭來。\n樊長玉連忙提刀格擋，隨行的血衣騎個個都是精銳，雖沒受傷，坐下的戰馬卻有中箭倒下的。\n謝十一含恨道：「定是他們聽到了馬蹄聲，留下部分人提前在此設伏！」\n樊長玉看了一眼受埋伏後剩下的幾十名血衣騎，同謝十一道：「我先帶人繼續追，你解決林子裡那些人。」\n謝十一也知道追回皇重孫母子才是頭等大事，忙道：「那都尉多加小心!」\n樊長玉帶著一部分血衣騎駕馬徑直從官道上狂奔而過，兩側林間的箭矢「嗖嗖」飛向他們，他們也只淺淺提劍格擋。\n若有不慎中箭的，便就地滾到隱蔽處，同謝十一他們一起清繳密林裡的敵手。\n用這樣的方式，樊長玉總算帶著部分人衝出了那片官道裡的箭雨封鎖。\n她們沿著車轍印繼續追，沒跑幾裡路，果然就看到了十幾騎護著一輛馬車在官道上疾馳。\n樊長玉喝道：「有沒有擅騎射的？避開馬車給我放箭！」\n她讀過幾冊兵書，雖說沒法一字不差地記下書中的內容，但她好歹也在軍中待了這麼久，大大小小的仗跟著打了十餘場。\n追敵很多時候講究的就是一個氣勢，氣勢足了，隔得遠遠的，就能先嚇破敵膽。\n到了一定距離後邊追邊放箭，這無疑是最好的造勢方式。\n有弓箭壓制，對面的馬車跑得又沒單託著人的戰馬跑得快，只能分出七八騎來攔樊長玉等人。\n在馬背上長柄兵刃更佔優勢，樊長玉掄起掛在馬背上的陌刀一個橫掃，迎面攻來的影衛還沒靠近她，就迫不得已往邊上避。\n經過層層嚴選出來的血衣騎不是當日陪樊長玉一起出城的那些普通將士可比的，他們武藝縱使比不上謝五，卻也不會輕易被撂倒，幾人合力就能拖住一名影衛，這可比當日樊長玉獨自面對十餘名影衛的情況好得多。\n樊長玉趁前來攔路的影衛們大部分被血衣騎拖住，狠狠一拍馬臀朝前方的馬車追去。\n駕馬護在馬車身側的一名影衛忽而挽起弓就朝樊長玉放箭，樊長玉橫刀劈斷一根後，因為戰馬速度太快，儘量俯低了身子貼在馬背上。\n對方眼見射不中樊長玉，直接朝她座下的戰馬放箭。\n樊長玉的戰馬中箭倒地時，樊長玉距俞淺淺母子馬車的距離不過兩丈。\n她一咬牙，扔出繩索套在了馬車簷角，從馬背上躍起時，整個人都順著繩索拉扯的力道，朝馬車撲了過去。\n駕馬奔走在馬車周圍的影衛揮刃朝著樊長玉砍去，樊長玉在馬車頂一滾避開，她先前躺的地方，半個車頂都被劈裂了。\n馬車裡傳出俞淺淺驚惶的呼救聲，樊長玉兩手抓緊繩索蕩下去，一腳將駕車的影衛踹飛，掀開車簾寬慰道：「淺淺別怕，是我！」\n車廂裡，俞淺淺一手死死抓著車窗沿，一手緊緊箍著俞寶兒，驚魂未定道：「長玉？」\n樊長玉剛應了聲，駕馬同馬車並行的影衛一刀就橫劈了下來，樊長玉趕緊往後一仰，那一刀這才劈在了車門上。\n樊長玉一抬腿踹在那人腋下，那人先是一愣，下一瞬只覺自己半邊胸前的肋骨似乎都被那一腳給踢斷了，捂著腋下滿臉痛苦地從馬背上摔了下去。\n樊長玉坐起來，控制著韁繩想讓馬車往回跑，不忘出言安慰俞淺淺：「別怕，我不會讓他們帶走你的！」\n俞淺淺透過車窗看了一眼窮追不捨圍攻過來的影衛們，冷靜道：「這樣下去不行，長玉，你帶著寶兒駕馬走！」\n她還沒能把俞寶兒推向樊長玉，拉車的馬就被其中一名影衛射中了前腿。\n戰馬嘶鳴一聲曲蹄朝前，帶得整個車廂也跟著倒扣了下去。\n俞淺淺母子被顛出車廂，樊長玉以一己之力護住了她們母子二人，自己後背卻狠狠撞在了官道一側的山巖上，當即就讓她疼白了臉，好一會兒都沒能站起來。那笨重的車廂在地上拖行一段距離後，大半重量都落到了懸崖邊上，最後車廂墜著前蹄中箭的馬一起滾下了懸崖。\n俞淺淺爬坐起來，發現樊長玉後背的衣物都在粗糲的巖層上被擦破了，一摸就是一手溼濡的血跡，她急得直落淚：「長玉，你怎麼樣？」\n樊長玉吃力掀開眼皮，眼見護著馬車的那幾名影衛朝這邊逼了過來，她撐著陌刀半坐起來，冷眼盯著距她已不到三丈遠的無名影衛，吩咐俞淺淺：「快走！」\n和攔路的另九名影衛交手的血衣騎仗著人數優勢，隱約佔了上風，只要跑到血衣騎那邊去，或許還有勝算。\n俞淺淺知道自己不會武功，這時候留下來只會成為樊長玉的拖累，她含淚看了樊長玉一眼，最後只能狠心牽起俞寶兒的手朝血衣騎那邊奔去。\n俞寶兒倒是連連回頭看樊長玉，他稚嫩的臉上帶著擦傷後的血痕，瞳仁裡映出夕陽下樊長玉拄著長刀拼盡全身力氣站起來的影子，沒被俞淺淺牽住的那隻手，死死握成了拳。\n當日樊長玉在盧城城外，同十六名影衛交手，因他們留有餘地想活捉自己，她才堅持了那麼久。\n今日她已受了傷，再對上這五名全力出手的影衛，堪稱格外吃力。\n其中一名影衛見樊長玉被四名同伴拖住，直接去追俞淺淺母子。\n山路陡峭，俞淺淺那一身衣裙又繁複，不利於奔走，踩到裙擺跌了一跤，她急得只能推俞寶兒，倉惶交代：「寶兒快跑！」\n俞寶兒說什麼也不肯拋下她獨自走，小小的身板充當人形拐杖，要扶俞淺淺起來。\n這會兒功夫，那名影衛已追了上來。\n血衣騎那邊也發出一聲爆喝：「都尉！」\n竟是謝五和謝七不知從何處得了消息，駕馬趕了過來。\n眼見今日是無法把俞淺淺母子都帶回去了，追上俞淺淺母子的影衛眼神一厲，突然毫無徵兆地朝著俞寶兒揮刀砍去。\n樊長玉那頭被四名影衛纏著尚脫不了身，大抵是為母則剛，俞淺淺在看到刀刃時，想也沒想就直撲向了俞寶兒。\n那一刀砍在她後背，迸出的鮮血濺了俞寶兒滿臉。\n「快……走！」俞淺淺滿眼痛苦，望著俞寶兒只能再吃力說出這麼兩個字。\n俞寶兒看著倒在血泊裡的母親，整個人已全然呆住。\n那個人竟真要殺他和母親？\n影衛在發現俞淺淺替俞寶兒擋刀時，整個人也怔了一瞬，想起齊旻的交代，臉色又變得格外難看，趕緊掏出一瓶止血藥粉，全灑在了俞淺淺後背的刀口上。\n樊長玉在發現俞淺淺被砍倒在地時，發出一聲爆喝，連劈數刀逼退圍攻自己的那四名影衛，再借著助跑的力道，一橫刀掃飛了砍傷俞淺淺的那名影衛。\n她自己都沒力氣了，還想抱起俞淺淺跑。\n還是俞淺淺虛弱拉住了樊長玉的手，淚眼朦朧交代樊長玉：「帶寶兒走……帶他走，他們不會殺我，但會殺寶兒……」\n樊長玉看著灑在她後背的那一整瓶金創藥，雖不知具體是怎麼回事，但也明白俞淺淺所言非虛，用儘自己最後的力氣，抱起邊上似被嚇傻了的俞寶兒就朝著謝五謝七駕馬趕來的方向跑。\n一直同樊長玉纏鬥的那四名影衛追上來，其中兩人扶起俞淺淺撤，另兩人則一抬袖，朝樊長玉懷中的俞寶兒放出幾枚袖箭。\n樊長玉想也沒想就用自己的身體護住了俞寶兒。\n「都尉！」\n好在謝五謝七已追了上來，謝五廢了一臂，直接跳下馬單手舞刀打落射來的袖箭。\n謝七則挽弓搭箭回敬了對面的影衛幾箭。\n官道盡頭馬蹄聲雷動，是清繳完林中影衛的謝十一等人趕了過來，被血衣騎咬住的那幾名影衛見援軍來了，也不再戀戰，掏出煙霧彈往地上用力一擲，一時間官道上塵土飛揚。\n等煙霧散去時，四下已沒了那些影衛的蹤影。\n謝十一匆匆趕來，見了謝五和謝七，興奮道：「五哥，七哥！」\n轉頭見樊長玉半個背部都是血跡，當即臉色大變：「都尉，您受傷了？」謝五和謝七臉色也極為嚴峻，謝徵走前就交代過了，他離開後，血衣騎一切為樊長玉馬首是瞻。\n他才離開沒兩日，樊長玉就又傷成了這樣。\n樊長玉這個正主倒是沒當回事，只道：「皮外傷，不妨事。」\n她看著被自己護在懷中不哭也不鬧，似丟了魂一樣的俞寶兒，皺了皺眉，安撫道：「寶兒別怕，我會想辦法救你娘的。」\n俞寶兒埋首在樊長玉肩頭，沒聽見他的哭聲，但齒關齟齬，那一團小小的身形在發抖。\n沒有了馬車，回去的一路只能騎馬，俞寶兒受了驚，緊攥著樊長玉的衣擺一直不放手，樊長玉便帶著孩子同騎。\n別院的守衛已經牢固成了個鐵桶，還是被齊旻的人鑽了空子，樊長玉思來想去，決定先把俞寶兒藏到軍中好了。\n縱使齊旻再能耐，總不能在軍中也進出恍若無人之境。\n她這頭剛進軍營安置好俞寶兒，唐培義那頭就派人來了，說是有事叫樊長玉過去一趟。\n樊長玉知道今日血衣騎出城這麼大的動靜，唐培義那邊肯定是不好瞞過去的。\n謝徵走前說，到了無路可走的地步，可以說動唐培義擁立俞寶兒，但現在明顯還沒到那地步。\n樊長玉一時間也頭疼，不知該不該告訴唐培義俞寶兒的身份，她用處理好傷勢再過去的理由打發走唐培義的親兵後，喚來醫女阿茴幫忙處理後背的傷口。\n阿茴給她上了多久的藥，就掉了多久的金豆子，弄得樊長玉很是不好意思，一直寬慰對方說自己不疼。\n阿茴卻道：「都尉是女丈夫，有淚不輕彈，但這些傷，阿茴見了都疼，阿茴這是替都尉哭的。」\n樊長玉哭笑不得，但因為阿茴包紮得格外細緻，她整個上半身紗布一纏，瞧著都快半身不遂了，想到馬上要見唐培義，她便也沒提出重新包紮。\n等樊長玉躺在擔架上，由兩名親衛抬去見唐培義時，還把唐培義嚇了一跳。\n他連坐都坐不住了，直接走到擔架旁來看樊長玉：「樊都尉這是怎麼了？」\n樊長玉一臉懨懨：「城外匪患嚴重，末將出城剿匪，不慎摔下了山崖。」\n唐培義叫樊長玉來，是想問她出城幹嘛去了，眼下她主動交代了，哪怕是睜眼說瞎話，頂著這一身傷，唐培義也不好跟審犯人似的多問，只道：「年前薊州就剿過一次匪了，還有那般能耐的匪類，將樊都尉都傷成這樣？」\n樊長玉白著臉道：「山上地勢複雜，一時不慎摔的……」\n說著還撕心裂肺咳嗽起來。\n唐培義只得大手一揮：「行了行了，快些回去養傷！你這娃娃也是軸，受了重傷派人知會一聲就是了，還叫人抬過來，轉頭這軍中上下還不知怎麼議論我呢！」\n樊長玉躺在擔架上虛弱拱了拱手：「末將告退……」\n她是個不擅說謊的，因為心虛，都不敢看唐培義。\n唐培義吹鬍子瞪眼：「別整這些虛禮了，趕緊給我滾回你自己帳中躺著去！」\n被抬出中軍帳，樊長玉才悄悄鬆了口氣，今日總算是矇混過關了。`

            title: `第126章第126章`,
            content: `層層紗帳阻隔了視線,漂浮在空中的龍腦香燻得人昏昏發沉。\n這味道俞淺淺並不陌生，整個後背似被劈裂了一般痛，她伏在柔軟的床鋪間沒動彈,雙眸瞌著，黑睫低垂，仿佛還在昏迷中。\n房中人陰冷低沉的話音傳入她耳膜：「人被謝徵劫走了？」\n半跪於几案下方的影衛冷汗涔涔抱拳：「武安侯的人趁我等同魏嚴馴養的爪牙交手之際,劫走了孟家舊部,還請殿下責罰？」\n「咔嚓——」\n細微的裂痕聲響起,是齊旻捏碎了自己手上的白玉扳指。\n他半張臉逆著光，刀削斧鑿似的五官在暗影中更多了一股說不出的陰沉，他緩緩抬起頭來,慢悠悠開口：「失手了？那你還活著回來見我做什麼？」\n四下的空氣都變得稀薄起來,一滴汗從那名影衛額角墜落在地，他慌忙從懷中掏出一物遞給齊旻：「屬下從魏嚴私牢中劫出孟家舊部時，向其表明身份，對方給了屬下這東西。」\n隱匿於房內暗角處的另一名影衛上前，拿過了跪著的影衛高舉過頭頂的物件呈給齊旻。\n其物一寸來高，三寸來長,通體漆黑,形如虎豹,其間刻有古樸的銘文，正是半面虎符。\n齊旻從虎符的銘文上辨出了這虎符的來歷,長眸微眯：「這是十七年前的常州虎符。」\n大胤律法，一地一符，只有從朝廷取來了另一半虎符，才可調動當地州府的軍隊。\n他看向跪在地上的那名影衛，「孟家舊部說了什麼？」\n那名影衛心知自己的性命的保住了,連忙回話：「他求殿下替孟老將軍洗刷冤屈！」\n齊旻眉梢微抬。\n床榻間的俞淺淺也繃緊了神經支起耳朵細聽，外邊卻突然再也沒有傳來談話聲了。\n齊旻抬手示意影衛禁聲，聽著隔了層層帷幔的床榻上傳來的顫抖呼吸聲，唇角似勾非勾，他忽而道：「你下去吧，玄翦那條臂膀，由你去斷，傷了的孤的人，總該長些教訓。」\n俞淺淺聽得心驚膽戰，直覺告訴她，齊旻口中的玄翦，便是要殺寶兒的那名影衛。\n跪在外邊的影衛什麼也沒多問，只應了聲「是」便退下了。\n俞淺淺聽到了房門合上的聲音，她不知道齊旻為何不讓那影衛繼續說關於錦州一戰的真相了，心中焦急，卻又無計可施。\n聽到那低沉的腳步聲朝床榻這邊走來時，俞淺淺連忙裝睡。\n層層紗帳被撩起，掛到了一旁的金鉤上。\n俞淺淺哪怕閉著眼，也能感覺到床榻周圍的光線驟然明亮了許多。\n床榻矮下去了一塊，她猜測是齊旻坐到了床邊。\n哪怕沒睜眼，她也能想像那人毒蛇一樣的視線在她身上掃視的樣子，她渾身本能地繃緊，掩在被褥底下的指尖都快攥得發白。\n她努力裝睡，殊不知坐在床邊的人看著她黑睫止不住輕顫的樣子，譏誚勾起了唇角。\n她後背有傷，上藥後，齊旻連衣物都沒讓婢子給她換，銀紅的軟煙羅被褥間，她赤.裸的半個背部雪肌細膩，那道猙獰的刀傷更添了幾分凌虐的美感，好似一朵被人揉壞的嬌蘭。\n齊旻看著竭力裝睡的人，唇角勾起的弧度愈大了些，伸出蒼白微涼的手撫上她背脊。\n果然下一刻就見俞淺淺手臂上爬滿了雞皮疙瘩。\n俞淺淺自知是裝不下去了，掀開一雙水眸冷冷掃向齊旻：「把你的手拿開！」\n齊旻非但沒收回手，反而還順勢鉗制住了她下巴，慢條斯理問：「不裝睡了？」\n俞淺淺恍若被毒蛇咬了一口，嫌惡道：「不裝怎麼聽到你們的密謀呢？虎毒尚且不食子，你連自己的親兒子都要殺，真不知那些人效忠你什麼，他們就不怕你有一天也要了他們的命？」\n齊旻鬆開了她下巴，無所謂一扯唇角：「你氣我要殺那小賤種？」\n俞淺淺眼底浮現怒色，他卻突然湊近她，冷漠又譏誚地道：「你和他都乖乖待在我身邊，我不沒動他麼？你帶著他跑了，還落到謝徵手裡，你這麼聰明，不會不知道謝徵能挾他令諸侯吧？」\n俞淺淺不說話，臉色卻白了幾分，依舊一臉怒容盯著齊旻。\n齊旻瞳色涼而冷，仿佛真是蛇類的一雙眸子，他薄唇近乎貼到俞淺淺耳際，惡劣道：「不是我要殺他，是你在逼我殺他。」\n他退開些許，欣賞著俞淺淺不知是因害怕還是憤怒而微微發抖的樣子，憐憫出聲：「淺淺，真正差點害死那個孩子的，是你自己。」\n「你胡說！」俞淺淺憤怒道，因為情緒激動牽扯到後背的傷口，她面上透出幾分痛苦，臉色也更白了幾分。\n齊旻微微皺眉，收斂了那一身譏誚，扶住她肩膀，「別動，當心傷口又裂開。」\n俞淺淺額前疼出了冷汗，卻突然嗤笑道：「齊旻，你乾脆把我一起殺了好了。」\n齊旻攥住她肩膀的十指驟然收緊，指尖幾乎要陷進肉裡，他陰沉同俞淺淺對視了幾息，道：「我不會殺你，你也捨不得死。」\n他鬆開俞淺淺，頓了頓，又緩和了語氣：「你要是喜歡孩子，我們將來還會再有的，你想生多少就生多少。那個孩子，從一開始就來得不是時候。」\n俞寶兒是作為他的替代品降生的。\n他沒法喜歡一個隨時會取代他存在的孩子，甚至不殺俞寶兒，於他而言都已是最大的仁慈。\n他會有繼承人，但應是在他奪回屬於自己的一切之後，獨攬大權時生下的孩子。\n他厭惡一切對自己有威脅的東西。\n俞淺淺眼角被逼出了淚，忍著後背的劇痛，朝著他狠狠「呸」了一聲，她閉上眼道：「早知會有今日，我當初就該任你死在湖邊！」\n這話一出口，齊旻周身氣壓驟然低沉。\n最後他只是望著俞淺淺冷笑：「現在後悔未免太晚了些，是你把我這個惡鬼拉回了人間，如今的一切，合該你受著！」\n他大步起身離去，只餘床帳上被碰到的珠簾還在輕晃。\n俞淺淺抱著被褥，臉色因為重傷依舊蒼白，可望著門口的目光卻是清凌凌的，平靜到冷漠。\n-\n齊旻一出房門，守在外邊的影衛便朝著他揖手喚道：「殿下。」\n齊旻陰鷙道：「好生看著她。」\n影衛恭敬應是，等齊旻走遠後，才朝著緊閉的房門看了一眼。\n殿下素來多疑，連蘭氏在提出讓殿下誕下子嗣後，也不得殿下信任了，只有屋內那女人，不知給殿下下了什麼降頭，這麼多年來，殿下待她總是特殊。\n齊旻走出幾步後，先前在屋內向他稟報的那名影衛又跟了上來，衣襟上還沾著幾點血跡：「殿下，屬下已奉命斬了玄翦一臂。」\n齊旻負在身後的一隻手，還把玩著那半塊虎符，他半點不關心影衛所稟報之事，只道：「那半塊虎符是怎麼回事？」\n-\n一場秋雨一場涼。\n從簷瓦上傾瀉而下的無根水在廊下濺起一抔抔水花，冷風裹挾著水汽撲到了牆根處，建房有些年頭了的紅木被雨氣浸成深色，倚牆而立的青年人衣擺下方同樣被擦出一道道淡淡的水印。\n廊下掛著的銅製風鈴被風吹得肆意搖晃，撞出一片悽清又破碎的銅鈴聲。\n屋內時不時又發出幾聲慘絕人寰的痛吟，謝徵恍若未聞，只抱臂倚牆，望著這場說來就來的秋雨出神。\n冷風捲起他鬢角的碎發，冠玉似的臉上，一道細小的血痕被風吹得隱隱作痛，那雙低垂的眸子，冷厲如面上那道血痕。\n須臾，在屋內醫治的大夫挎著藥箱走了出來，同樣候在廊下的謝忠當即上前詢問：「朱將軍如何了？」\n謝徵眸光也淡淡遞了過去。\n府醫無聲搖頭，嘆息道：「腿上的筋骨斷了十幾年，早就壞死了，重新站起來是再無可能了。」\n謝忠失了一腿一臂，知道其中痛楚，沉默一息後只道：「盡力醫治吧。」\n府醫點頭下去配藥。\n在裡邊伺候的一名下人匆忙出來叫人：「侯爺，朱將軍說想見您！」\n一直苦苦追尋的真相就在眼前了，謝徵卻遲疑了一息，才抬腳邁進房內。\n府醫刮開腐肉重新療傷過，屋內的血腥味尤為刺鼻。\n躺在床上的人滿臉鬍鬚，頭髮亂若干草，其間不乏有蝨子亂爬，除卻一雙精煉有神的眼，幾乎辨不出五官。\n他兩腿都斷了，在暗不見天日的地牢裡被關了十七載，腿上瘦得幾乎只剩一層皮。\n謝徵看著這位昔日在孟叔遠麾下，同為自己父親效力的老將，只說了句：「朱將軍，歸家了。」\n朱有常定定望著謝徵，忽「嗬」地悲哭出聲：「十七年……十七年了啊！謝將軍的後人，都長成這般頂天立地的模樣了！我老朱，有生之年……竟還能再見到將軍後人！」\n說到悲慟之處，他一個昔日上過戰場的男兒，竟也只能用力捶打著床沿，嗚嗚啼哭。\n謝忠瘸著腿上前扶住朱有常，紅著眼問：「朱將軍且先節哀，你何故會被魏嚴囚十七載？當年運糧延誤，是不是另有隱情？」\n一提到當年的運糧之失，朱有常情緒愈發激動，他哽咽道：「他魏嚴豬狗不如！孟將軍受的是千古奇冤啊！可憐老將軍含恨而終，孟氏滿門忠烈，卻連一脈骨血都沒再留下！」`

            title: `第127章第127章`,
            content: `世人皆知,孟叔遠膝下兩子皆戰死沙場，只有小女兒最後招贅了一軍中小將，但在孟叔遠自刎於羅城後，他那小女兒從寺廟禮佛回去,馬車側翻摔下了山崖,屍骨無存。\n後來朝廷蓋棺論定，言是孟叔遠前去羅城解救災民,延誤了戰機,致使謝臨山和承德太子慘敗於錦州，世人唾罵孟叔遠時，罵得最多的一句就是「合該他孟家絕了後」。\n謝忠乃謝氏家將,他當然知道錦州血案罪魁禍首的這頂罪名有多大,一聽朱有常說孟叔遠是冤枉的，心中難免也悲涼,正想寬慰朱有常兩句,一直靜默少語的謝徵突然開口：「孟老將軍的後人尚在人世。」\n此言一出，不僅朱有常，連謝忠都愣住了。\n朱有常顧不得自己雙腿殘疾，撐著床沿就要起身，幸得被謝忠及時攔住。\n「懇請侯爺告知，孟老將軍後人現在何處？麗華妹子……她還活著？」朱有常朝謝徵兩手抱拳,咧著嘴,像是在哭又像是笑，渾濁熱淚滾進了亂糟糟的鬚髮中。\n謝徵並不知孟叔遠女兒名諱，但聽到「麗華」二字，下意識就想起了在臨安鎮時，樊母牌位上寫的「梨花」一名。\n麗華,梨花，想來樊家夫妻是怕惹來禍端，才連自己原本的姓名都不敢再用。\n謝徵對上朱有常殷切的目光，沉默了一息，道：「朱將軍節哀，孟老將軍愛女已不在人世，只餘兩個外孫女。」\n朱有常作為孟叔遠麾下重將，也算得上是孟叔遠半個義子，同孟叔遠的子女們關係都極為親近，孟麗華，更是他看著長大的妹子，雖然早就猜想她不在人世了，可驟然聽謝徵說孟叔遠尚有後人，他心中又升起了幾分希翼，以為孟麗華還活著。\n如今得知孟麗華已死，悲從中來，以手掩面哀哭了兩聲。\n謝忠對於謝徵知曉這麼多關於孟家後人的事，甚是不解，以侯爺的脾性，從前身邊伺候的人都不敢在他跟前提起孟家人。\n他是怎麼把孟家後人的底細都摸清楚了，還半點消息都沒透露出來的？\n謝忠越想越覺著奇怪，眉頭都快皺成個「川」字，想問謝徵，又知眼下不是時機，只得拍拍朱有常肩膀，跟著道了句：「還望將軍節哀。」\n朱有常也明白以謝徵的立場，在不知真相前，只怕得對孟家人深惡痛絕才是，他對孟老將軍後人的事這般清楚，莫不是為了報仇？\n這個念頭一起，朱有常一顆心頓時提了起來，強壓下滿腔悲意，打量著謝徵問：「敢問侯爺，我那兩個世侄女現在何處？」\n謝徵答：「她們現下都很安全，大的年方十六，反賊圍盧城時，大軍於薊州上遊堵河道欲水淹反賊，她曾冒夜雨橫翻山嶺截殺反賊斥侯，後隨軍送軍糧前往一線峽，斬長信王麾下勇將石虎首級，拜陶奕陶太傅為義父，由其引薦參軍……」\n他嗓音低沉，不急不緩將樊長玉從軍這一路的歷程道來，寥寥數語所帶過的每一幕，都在他腦海裡浮現出了畫面。\n一線峽山上重逢時，她伏在他床頭嚎啕大哭；屍橫遍野的戰場，她提著把砍骨刀一臉兇戾地立在屍堆之上……\n從軍的這條路不好走，她吃過的苦，流過的血和淚，他都知道。\n「崇州一戰，她率右翼軍做前鋒，救賀敬元於刀下，斬長信王於馬背，封五品驍騎都尉。盧城之戰，她自稱孟長玉，自請出城死守，拖延時間，言願身死以續先祖清名。」\n朱有常聽著謝徵細說這些，眼眶滾下的熱淚就沒停過。\n在謝徵語畢後，他甚至一度哽咽得說不出話，掩面痛哭了好一陣，才顫聲道：「這是將軍的骨血，是將軍的骨血！」\n謝忠也尤為震驚，西北出了位女將，他早就有所耳聞，卻沒料到那竟是孟叔遠的後人，並且自家侯爺還對人家身世了如指掌。\n他暗道莫非謝徵早就知曉當年運糧之失，孟叔遠是冤枉的？\n因為這一出神的功夫，他沒能扶住朱有常，竟讓他撥開自己的手，從床沿跌了下去。\n朱有常雙腿都斷了，兩手撐在地上，才能維持跪地的姿勢，朝著謝徵一拜。\n「朱將軍這是做什麼？快快起來！」謝忠上前扶朱有常，他卻不肯起。\n謝徵也是被這突來的變故驚到了，一時間竟沒能避開朱有常這一跪，他半蹲下親自去扶朱有常：「朱將軍，有什麼事，起來再說。」\n朱有常還是沒肯起，昔日在戰場上斷了腿都沒落過一滴淚的漢子，在今日哭得肝腸寸斷。\n他哽咽道：「這一跪，是我老朱替孟家謝侯爺的，侯爺不知當年隱情，還能任讓那孩子在軍中闖出一番天地，老朱謝侯爺的這份大義和坦蕩！」\n謝臨山被開膛破肚掛到錦州城樓上，直至今日民間百姓提起都還會潸然淚下，痛罵北厥人禽獸做派，謝徵乃謝臨山親子，對於錦州一案罪魁禍首的恨意，比起民間百姓只會多不會少。\n朱有常不知謝徵是如何平等地看待從軍的孟家後人的，這一瞬湧上心頭的只有無盡感激和敬意。\n謝徵聽得朱有常這番話，扶他起身的手微微一頓，問：「朱將軍，當年的隱情，究竟是什麼？」\n一回憶起當年的事，朱有常就止不住咬牙切齒：「當年並非老將軍枉顧軍令，延誤運糧，而是隨軍的十六皇子好大喜功，見只有數千北厥人守羅城，十萬百姓被困城內，不聽老將軍號令，執意要前去羅城救援，最後十六皇子也被生擒，北厥人要老將軍拿大軍糧草去換十六皇子，否則就拿十六皇子的血祭旗！」\n謝忠臉色驟變，謝徵眸色也沉了下來。\n不為別的，而是關於十六皇子的事，在這十幾年裡仿佛像是被人刻意抹去了一般，甚至沒有任何史料記載十六皇子在羅城一戰中做過什麼。\n謝徵當初聽到風聲，重查錦州一案，從大理寺調取宗卷時，卷中所寫的，也是常山將軍孟叔遠枉顧軍令，前去解救羅城被困的十萬民眾，最後卻戰敗沒能救出城內百姓，還害得隨行的十六皇子一起身死。延誤了運糧，又間接導致了前線錦州沒能守住，最後畏罪自殺。\n可當年盤踞在羅城的那支北厥軍，根本不足為懼，他們人數不多，又沒補給，也只能靠著羅城易守難攻的地勢，在那方寸之地苟延殘喘。\n朝廷當初不管羅城，一來是錦州戰況更加兇險，二來羅城的賊人還沒到山窮水盡的地步，硬打下來得耗上不少時日。\n相比之下守住了錦州這道門，把北厥大軍擋在關外，回頭便可再無後顧之憂地收拾羅城的支北厥軍，跟關門打狗無異。這也是謝徵這麼多年裡，一直痛恨孟叔遠的原因。\n不援羅城，羅城會死很多人，但錦州失守，大胤門庭大開，異族長驅直下，只會死比那多十倍百倍的人。\n是孟叔遠一時的婦人之仁，讓他枉顧軍令，犯下了不可挽回的大錯！\n原來當初孟叔遠援羅城，不是看不清形勢，而是還有十六皇子這麼個人物也攪在局中？\n謝忠皺眉問：「孟老將軍是為了救十六皇子，才延誤的運糧？」\n朱有常急道：「孟將軍是大將軍最為倚重的老將，怎會如此不分輕重？謝都騎當年跟著大將軍徵戰，也當知曉我家將軍的為人才是！」\n謝臨山被封護國大將軍，在整個大胤能被稱一聲「大將軍」的，也獨他一人了。\n謝忠乃謝家家將，當年是作為親衛隊一直跟著謝臨山的，都騎便是他當年的官職，朱有常用的還是舊時的稱呼。\n他這般說，謝忠不自覺鬆了口氣。\n朱有常含恨道：「侯爺年歲尚淺，不知當年十六皇子有多受先帝寵愛罷了，謝都騎應當是知曉的。」\n他說著看向謝忠。\n謝忠點頭：「十六皇子母族勢大，其母賈貴妃甚至寵冠後宮，當年坊間常傳，若非承德太子殿下仁厚禮賢，在群臣還百姓心目中都頗有聲望，先帝只怕會立十六皇子為太子。」\n謝徵沒做聲，半垂下眸子掩住了眼底所有思緒。\n這樣風光無限的十六皇子，在十七年後，能查到的東西卻只剩隻言片語，實在是詭異。\n朱有常在謝忠出言佐證之後，便繼續道：「孟將軍也不敢置十六皇子的生死於不顧，又不敢延誤運糧大事，便八百裡加急送了戰報回京，請示先帝如何解救十六殿下。期間下令讓大軍押送糧草繼續趕往錦州，只留了小部分人馬在羅城外周旋。」\n「兩日後，從京城八百裡加急送來一道虎符，還有一封魏嚴的親筆信。」一提到魏嚴，朱有常下頜便不自覺咬緊了，似恨不能生啖其血肉：「那卑鄙小人在信中言，陛下勒令將軍即刻回羅城救十六皇子，糧草由崇州調軍押送往錦州。」\n崇州地理位置在羅城和錦州中間，兩邊都事態緊急，要解這燃眉之急，的確是孟叔遠運糧的大軍折回去打羅城，盤踞崇州的軍隊押送糧草前往錦州才不誤事。\n謝徵敏銳地抓住了其中漏洞，問：「既是調兵，只\n有一封魏嚴的親筆信，連道聖旨都沒有，老將軍便信了？」\n朱有常下意識往自己衣襟裡摸，沒摸到東西，才懊悔地用力捶打床沿：「有兵符為證的！可惜我被劫出大牢那會兒，有人自稱是承德太子的人，我怕我無命活著離開了，忙將兵符交與了那人，求他替孟將軍洗雪冤屈！」\n謝徵就是趁齊旻的人同魏嚴馴養的那批死士交手之際，才趁亂帶走朱有常的，當然知道齊旻的人也參與了劫獄。\n他道：「我查過朝中十七年前的虎符調用卷宗，錦州失守前，朝廷並無再派虎符的記錄。」\n朱有常急道：「有的！當時還是魏祁林那白眼狼親自帶著虎符和信前來的！崇州虎符我不認得，常州虎符將軍卻是不可能認錯的，將軍是將兩塊虎符合一後，確認無誤了，才轉道往羅城的！」\n真正一點點剖開當年的真相時，謝徵整個人冷靜得出奇，他問：「一下子調用了兩塊虎符，其中常州軍還是負責押送軍糧的，為何沒有聖旨？」\n朱有常再說起這事，亦是痛心疾首：「魏祁林那白眼狼說，十六皇子闖下這等禍事，陛下若頒了旨，這罪便是實打實地落下來了，沒頒旨，只賜了虎符，守住錦州又收回羅城，那便是美事一樁，此事也就揭過了。滿朝皆知十六皇子受寵，我們當時見到了虎符，又有魏嚴的親筆信，就這般信了他的鬼話！」\n謝徵突然問：「魏祁林，背叛了孟老將軍？」\n朱有常咬牙切齒道：「他魏祁林，本就是魏嚴養的一條狗！孟將軍在見到虎符和信後，便將糧草暫放於路上，留人看守，率大軍去羅城救十六皇子了，魏祁林則拿著崇州虎符，前去崇州調兵！哪曾想我等隨孟將軍在羅城苦戰數日後，等來的卻是錦州城破，承德太子和謝大將軍身死的消息！」\n說到激動處，朱有常沒忍住掩面而泣：「根本沒有崇州軍前去送糧！錦州的將士們是餓到沒力氣了，被北厥人當牲口一樣活活宰殺的！」\n謝忠聽到這被隱藏了多年的真相，都覺得心底沉得發慌。\n不論怎麼看，魏嚴在其中都不清白。\n可謝徵在不知情時，卻被養於魏嚴膝下，還喚了他十幾年的舅舅！\n謝忠神色複雜地朝謝徵看去，後者半低著頭，大半張臉都隱在陰影中，叫人看不清他這一刻面上的神情，只聽他問：「魏祁林沒再回來過？」\n朱有常恨聲道：「他要是還敢回來，老子第一個宰了他！」\n不對勁，還是有什麼地方不對勁。\n謝徵想起魏嚴養的死士去樊長玉家中找的那封信，緩緩開口：「孟老將軍臨終前，除了給朱將軍常州虎符，可有交代過什麼？」\n朱有常回想起當日的情形，依舊心若刀割，他紅著眼道：「錦州失守的戰報是早上的時候傳至軍中的，我們前去將軍帳內尋他時，將軍已是萬念俱灰，枯坐著一句話也不願說，我知道將軍心中自責，怕他想不開，在帳內一直守著將軍，將軍便是在那時將虎符交與我的。」\n「將軍說，從即日起，常州虎符便丟了，讓我等得合適的時機，再拿出來。」\n「我當時不解將軍話中之意，不過轉身去端個飯食的功夫，將軍就在帳內跪朝錦州尋了短見……」\n朱有常哽咽不已：「隨後朝廷的問責便下來了，將軍明明是收到調兵令後才轉往羅城的，卻成了是將軍枉顧軍令，延誤送糧導致錦州慘敗！」\n時隔十七載，朱有常依舊含淚從肺腑替孟老將軍嘶吼一聲：「孟將軍冤吶！」\n屋外驟雨未停，冷風從大開的門窗刮進屋內，溼冷得厲害，仿佛是老天爺也在悲孟氏這千古奇冤。\n謝徵扶起朱有常，面上雖還維持著鎮靜，垂於身側的一隻手卻早已緊握成了拳頭，他問：「朱將軍手握虎符這等鐵證，當年為何不替孟老將軍申冤？」\n朱有常情緒激動道：「末將豈止想過，末將想回京在御前揭示此事，可孟將軍麾下部將，都被連貶數級，打散了被發配去各地，我連面聖的機會都沒了！我想東宮會徹查此事，可隨即東宮就起了大火，太子妃和皇長孫都死於火中……」\n朱有常用力捶打著床鋪，神色痛苦，他悲哭道：「我唯一能指望的，就只有謝將軍的舊部了，初時我也不確定此事是否和魏嚴有關，畢竟謝將軍的夫人，是他親妹妹啊！可我好不容易借著前去弔唁謝將軍之由，同謝將軍舊部搭上線後，所訴一切叫謝夫人聽到了，事情敗露魏嚴將我們看押起來時，是謝夫人以死相逼要魏嚴不得害我們性命！」\n「誰曾想，這一關，就是十七載啊！」朱有常悲愴哭喝道。\n冷風夾雜著雨氣吹進屋內，謝徵額前的碎發被拂動，他臉色異常蒼白，用幾乎只有他自己才能聽到的聲音淺淺喚了一聲：「母親。」\n謝忠臉色也變了變，不無驚駭地道：「所以當年夫人要我等回徽州謝宅，也是怕我等牽連進了此事中？那夫人的死……」\n謝忠說到一半忽而禁了聲，神色極為不忍地看向謝徵。\n把謝徵送到魏嚴身邊教養，是謝夫人的意思吧？為了讓魏嚴能徹底放心這個孩子的存在。\n謝徵唇角幾乎快抿成一條冰冷的直線，他緊繃得筋骨畢現的一拳狠狠砸向屋內那張堅實的黃梨木桌，桌子成了一堆碎木，他喉間溢出那個裹挾著無盡恨意與血戾之氣的名字：「魏嚴——」`

            num: 128,
            title: `第128章第128章`,
            content: `朱有常還不知齊旻同李家聯手做的那些事,憤聲道：「侯爺，皇長孫既也還尚存人世，末將為人證,給到皇長孫手上的虎符為物證,不怕扳不倒他魏嚴！」\n謝忠也為孟叔遠背負這麼多年的冤屈痛惜，可他作為局外人,多少還是更冷靜些，他勸道：「侯爺,朱將軍，當年的事細想起來還有諸多蹊蹺,魏嚴又手段了得,還是先從長計議。」\n謝徵和朱有常皆未言語,他繼續道：「魏祁林乃魏氏家將，後又做了孟老將軍女婿,他帶去的常州虎符既是真的,侯爺如今卻又查不到卷宗上關於調用虎符的記錄,說明當年那虎符，要麼的確是先帝調用的，為了掩護十六皇子之失,才沒讓兵部記錄在案。要麼……就是魏嚴在那時便已隻手遮天到能私調兵部虎符！」\n屋外風雨未停,雨水的溼冷似乎已透過空氣將這屋內都浸上一層潮意,錦州血案背後的真相和母親真正的死因刺得謝徵額角青筋凸起,腦仁兒一抽一抽地疼。\n他清雋的面孔上是泛著冷意的蒼白，恍若刀尖上的雪,眼尾帶著幾絲不甚明顯的猩紅：「大費周章讓孟老將軍延誤送糧，那幕後之人真正的目的是要錦州失陷。」\n或者說，是要承德太子死。\n誰都知道錦州失陷後於大胤意味著什麼。\n承德太子便是沒死在錦州一戰中,回朝後只怕也得被剝太子之位。\n謝臨山，就是這皇權之爭下的犧牲品。\n謝忠經謝徵一點撥，也很快想明白了其中關鍵，他驚駭道：「莫非十六皇子是故意以身犯險的？就為了讓承德太子死在錦州，好爭太子之位？」\n朱有常是個大老粗，腦子不如謝忠靈活，聽到此處，不解道：「那十六皇子此舉也太過冒險了些，他把自己送入虎口，這是篤定了先帝會不留餘力救他？」\n事實上，十六皇子也的確死在了羅城。\n羅城易守難攻，錦州失守的消息傳到羅城時，朝廷大軍如喪考妣，承德太子和謝臨山都死了，軍心也跟著散了。\n羅城內的北厥人知道北厥大軍可以長驅直下後，也不留十六皇子這個人質了，直接殺了十六皇子祭旗。\n最得民心的儲君和先帝最受寵的兒子都死了，朱有常突然意識到，錦州失陷背後的原因一點都不簡單。\n謝忠在朱有常這麼一說後，也覺著自己先前的猜測站不住腳。\n他沉吟：「常言道『鷸蚌相爭，漁翁得利』，當年先帝寵愛十六皇子，承德太子為了在軍中也收攏人心，才親臨錦州督戰，十六皇子為了搶軍功，後腳也奏請先帝，撿了個糧草督運的軍職跟著去前線。最後承德太子和十六皇子卻都死了……」\n他猛地看向謝徵：「背後莫非有其他皇子為了爭那把龍椅推波助瀾？」\n朱有常稍一尋思，很快便咬牙切齒道：「魏嚴！一定是魏嚴！承德太子和十六皇子死後，先帝也悲痛過度病逝，魏嚴很快力排眾議，扶持了毫無根基的十九皇子登基！他個豬狗不如的畜生，為了權勢，竟然連自己的親妹妹和妹夫都不放過！要不是怕世人起疑，他恨不得自己坐那把龍椅吧！」\n說到悲痛之處，朱有常又忍不住粗啞著嗓子哭出聲：「魏祁林不愧是魏嚴養的一條好狗，孟將軍待他不薄啊！麗華妹子當時還有孕在身，他如何忍心幫著魏嚴陷害孟將軍的？」\n怕謝徵因為魏祁林對孟家後人心存芥蒂，他又道：「侯爺，若麗華妹子留下的孩子中有魏祁林的骨血，侯爺大可不必把她當魏家人，孟家不認魏祁林那忘恩負義的狗賊！那只是孟家骨血！」\n謝徵聽朱有常再次提起孟祁林，蒼白的臉上看不出絲毫情緒，黑睫低垂，只問：「魏嚴寫給孟老將軍的那份親筆信，也可作為揭露魏嚴的證據，朱將軍可知道那封信的去向？」\n朱有常自責道：「當年錦州失陷的消息傳來，軍中上下一片混亂，我也那時也沒料到會有魏嚴構陷孟將軍一事，壓根沒想到那封信會大有用處，等朝廷的問責下來後，我再想去找那封信，已找不到了……」\n頭依舊疼得厲害，讓謝徵不自覺皺眉。\n信最後到了魏祁林手中，這其中是不是還發生了什麼？只是朱有常也不知道了。\n他面上愈是蒼白，愈顯平靜，已問到了自己想要的答案，便道：「魏嚴勾結反賊，已被李家彈劾，不日便要在金鑾殿上被問責，朱將軍且先好生休養，十七年前的血債，本侯會向魏狗一一討回來的！」\n-\n從朱有常住處離開後，謝忠一直亦步亦趨跟著謝徵，幾番欲言又止。\n雨勢漸小，從迴廊簷瓦上墜下的，只剩一片珠簾似的細小水珠子。\n謝徵一身褚袍，單手負於身後，靜立於簷下看著院中一片濃翠青竹，俊秀的眉眼間似漫不經心，又給人以滿身清貴都壓不住那股沉鬱煞氣的心驚之感。\n謝忠躊躇再三，終究還是開了口：「侯爺……」\n謝徵眼皮不動，只說：「不用跟著我，下去吧。」\n謝忠難得逾越道：「夫人當年之舉，想來也是為了保全侯爺，不得已而為之，侯爺莫要傷懷，將軍和夫人泉下若知侯爺如今的本事，也會含笑的。」\n謝忠眼神陡然冷戾：「下去。」\n謝忠抬眸看了一眼謝徵冷硬的背影，在心底輕嘆一聲。\n他一直都知道，謝夫人的自縊，是謝徵解不開的一個心結。\n如今真相大白，於謝徵而言，只怕會更加痛苦。\n過去的十幾年裡，他恨謝夫人軟弱，恨她狠心拋下他，任他被仇人教養長大。\n可謝夫人卻是在撞破魏嚴的陰謀後，為了保全朱有常和謝家舊部自縊的。\n魏嚴可以關朱有常等人一輩子，卻總不能關自己的親妹妹一輩子。而只要謝夫人還活著，謝徵就終有一日會知道當年的真相。\n以魏嚴的手段，大抵只會斬草除根。\n謝夫人是為了保謝徵的命，才選擇了自縊，她留下遺言讓魏嚴教養謝徵，也是想把謝徵送到魏嚴眼皮子底下，讓魏嚴徹底放心。\n一年前謝徵聽到那些傳言，開始重查錦州一案，魏嚴也的確設了死局，想讓他死在崇州平叛之戰中。\n讓他憎恨又想念了十幾年的母親，其實是為他而死，謝忠不知自己眼前這位從少年時期，就用單薄的肩膀扛起整個謝家榮辱的青年人內心會痛苦成什麼樣。\n他清楚謝徵的性子，有再多寬慰的話也不知從何說起，拱手朝謝徵一拜後，終是退下了。\n偌大的迴廊空蕩蕩只餘謝徵一人，冷風又颳了起來，吹得細雨斜飛，飄進廊下，擦過他蒼白的臉龐，只留一片冰涼的溼意。\n謝徵背靠廊柱，支起一條腿坐到了木質欄杆上，濃黑的長睫半覆下來如扇，一瞬不瞬望著遠處竹葉上的雨水因匯聚了太多，承載不住從葉尖往下滴落。\n他試著很努力去回想，但還是記不起那個女人的樣貌了，腦海裡只有個模糊的影子在很溫柔地笑，似乎這世間沒什麼過錯在她那兒是不能得到原諒的。\n可她留給他最後的記憶，只剩他站在門口，從房內望去飄蕩在空中的半截裙擺。\n這個場景在無數個夜晚裡折磨著他，讓他冷汗涔涔驚厥著從噩夢中醒來。\n他恨她軟弱自私，她卻是為了保他而去的。\n額前的碎發被冷風吹到了眼瞼處，謝徵微揚起頭，抬手覆在了眼前，維持了這個姿勢很久，一動不動。\n-\n魏府。\n這一場秋雨，仿佛要洗淨天地塵垢。\n魏府的高門華屋前，亮著兩盞燈火，隱在夜幕裡的桐楊濃陰中，好似一雙猩紅獸眼。\n書房窗前一地野菊在冷風悽雨裡挺立著花骨朵兒，瘦弱的花莖苦苦支撐著，說不清是傲骨還是執拗。\n滿朝皆知魏嚴愛菊，卻又不喜那些名貴的花種，獨愛漫山遍野隨處可見的野菊。\n整個丞相府，種得最多的，也是那一長就長一片的野菊，憑著那堪稱蠻橫的長勢，府上的下人打理稍微怠惰了些，野菊就能逼得花圃裡其他花草無處生長。\n案前鋪著三尺暖光，筋骨強勁的老者提筆閱卷，在秋雨未停的涼夜只著一件單衣，身形也不顯單薄。\n跪在下方的人浸著冷汗將白日裡的事稟報：「……有兩撥人前來劫獄，您多年尋常州虎符未果，是朱有常將虎符縫進了自己的斷腿裡。前一波人帶他出獄時，被天字號的人纏住，他雙腿行走不便，怕拖累那些人，撿了把匕首剜開腿肉，將虎符取與了那些人……」\n「後又殺來一撥人，看武功路數，應出自謝家，他們趁天字號去追拿走了虎符的前一撥人，救走了朱有常……」\n老者筆下未停，昏黃燭光映出的墨跡，方遒有力，一勾一橫宛若屈鐵斷金。\n時人崇尚行草，入仕之人則以寫得一手好臺閣體而備受推崇，魏嚴卻是以一手瘦金體聞名。\n字如其人，瘦筋硬骨。\n沒聽到老者出言，跪在下方的人額前冷汗越聚越多，在未知的恐懼達到頂點時，朝著案前重重一叩首，前額抵在冰冷的地磚上，顫聲道：「請丞相責罰！」\n老者終於停了筆，朝下方投去淡淡一瞥：「自己去刑室領罰。」\n魏府豢養的死士，進一次刑室無異於丟半條命，跪在下方的人聽到老者此言，在此刻卻只有撿回一條命的狂喜。\n他朝著老者再次一叩首後，悄無聲息退出了書房。\n侍者上前幫老者洗墨筆，低聲道：「相爺，當年的事……只怕瞞不住了。」\n魏嚴起身，踱步至窗前，任冷風灌滿衣袖獵獵作響，顫抖的燭火將他投下的影子拉得格外頎長，恍若山嶽。\n他望著滿院蕭瑟冷雨中的野菊道：「給宮裡遞信，是時候讓西徵大軍進京受封了。」：，，.`

            title: `第129章第129章`,
            content: `秋意一濃,北地的天便日漸冷了下來，清晨起來，院中落光了葉子的榆楊枝頭都凝著一層白霜。\n樊長玉養傷的這一月裡,身上的衣裳已從夏日的薄衫換成了厚實的秋衣。\n她當日為了保護俞淺淺母子,撞傷了背部，短時間內不能舞刀弄槍,幹躺著又無趣得緊，便又看起了晦澀難懂的四書五經。\n其實她對兵書的興趣更大些,但兵法中所提及的排兵布陣，有的還得精通星象分野和地理山水,看得樊長玉很是頭疼,只能循序漸進,先啃入門級的那些書。\n長寧從前跟著西席認字，尚且三天打魚兩天曬網,眼下一看樊長玉每天手不釋卷,又有俞寶兒這個玩伴在,頓時又提起了讀書的興趣，跟俞寶兒比誰認的字多。\n餘寶兒都能背一些簡單的詩文了，長寧自是比不過他,那股爭強好勝的心氣兒一上來,長寧直嚷著要找先生教她讀書。\n之前暫住崇州時給她請的西席,在她回薊州後沒一起跟過來。\n眼下她們又沒個穩定的落腳處,給她重新請西席的事，樊長玉才暫且擱置了。\n俞寶兒倒是自告奮勇說願意教長寧,但小孩奇怪的自尊心作祟，死活不肯，樊長玉讀過的書不多,字卻是被她娘逼著認全了的，便自個兒教起了長寧。\n俞寶兒很好學，每天都去樊長玉房裡跟著念書。\n兩個小孩經常比著背詩文，看誰背得更快，通常都是俞寶兒更甚一籌，長寧急得差點掉眼淚，但又要面子，不好意思哭，便晚上抱著自己的枕頭偷溜去樊長玉房裡，說是想跟樊長玉一起睡，其實是為了開小灶提前背詩文，弄得樊長玉哭笑不得。\n靠著這法子，長寧總算是贏了俞寶兒幾回，奈何俞寶兒背得很快，原本一天只學一篇詩文，後面兩個小孩都會背了，俞寶兒就提出學兩篇。\n長寧靠著作弊才贏他幾次，本來就心虛，想拒絕又給不出個理由，捏著衣角哼哼唧唧不吭聲。\n樊長玉是個缺根筋的，眼見長寧趕上了進度，覺著兩個小孩都學得快，一天學兩首詩文也沒什麼，便同意了。\n於是背兩首詩的這天，長寧沒啥意外地又輸了。\n趙大娘做了點心給她們送來時，長寧搬了個小馬扎背對著她們坐在牆角，頭頂的揪揪都往下耷拉著。\n趙大娘笑著問：「寧娘這是怎麼了？小嘴撅得都能掛油瓶了。」\n樊長玉捧著一卷書坐在躺椅上曬太陽，聞言笑答：「她跟寶兒比著背書，比輸了。」\n趙大娘招呼長寧過去吃點心，笑呵呵道：「過來吃大娘做的馬蹄糕，寧娘可是寶兒小姑姑呢，讓著寶兒是應該的。」\n長寧「咦」了一聲，驚訝了轉過腦袋來，興奮地盯著俞寶兒道：「我是你小姑姑！」\n俞寶兒也是頭一回聽到小姑姑這個說法，他稚氣的小眉頭一皺：「寧娘比我小，不應該是長寧妹妹嗎？」\n趙大娘笑得合不攏嘴：「輩分可不是按年紀算的，你喚長玉一聲姑姑，寧娘同長玉是姐妹，那不就是你小姑姑了嗎？」\n長寧人小鬼大，知道自己在輩分上佔了俞寶兒便宜，立馬開心了起來，笑得見牙不見眼，對俞寶兒道：「快叫小姑姑！」\n樊長玉看著這對活寶，不免搖頭失笑。\n俞寶兒抿了抿唇，突然看向樊長玉：「那我不叫長玉姑姑了，叫長玉姐姐。」\n樊長玉手中的書頁剛翻了一頁，聽到俞寶兒的問話，一時間頗有些哭笑不得：「那可不行。」\n俞寶兒一張臉沒從前那般圓潤了，擰起眉頭時，隱約已有了幾分小少年的樣子，他不解地問：「為什麼？」\n樊長玉道：「你喚我姐姐了，那我跟你娘可不就差了一輩了？」\n俞寶兒悶悶地不說話了。\n只有長寧得瑟得嘴角都飛了起來。\n日頭升高後，屋簷和枯枝上的晨霜都化開了來，晨曦洩進屋內，長寧和俞寶兒捧著書又開始搖頭晃腦地讀，樊長玉莞爾看了一會兒，在躺椅上舒服地伸了個懶腰。\n謝五從院外進來稟報導：「督尉，有貴客來訪。」\n樊長玉微微揚眉，暗道在這薊州，還能有誰會來自己這兒？\n須臾，便見一身白袍，肩頭搭著銀鼠皮大氅的公孫鄞從庭外信步而來，在這深秋寒月裡笑得如沐春風：「自一線峽戰場上一別後，當真是許久不見了，樊姑娘官至督尉，今日總算是能親口向樊姑娘道一聲恭喜。」\n見來者是公孫鄞，樊長玉著實有些意外，她起身相迎：「公孫先生可是稀客。」\n俞寶兒沒見過公孫鄞，有些警惕地看著面生的俊美男人。\n長寧卻是邁著短腿跟個小炮仗似的直接朝著公孫鄞扎了過去，歡喜叫道：「公孫叔叔！」\n公孫鄞揉了揉長寧頭頂的揪揪，很誠懇地評價：「你這頭髮終於扎整齊了。」\n長寧晃了晃髮髻上的鈴鐺絨花，說：「是趙大娘扎的。」\n公孫鄞道：「猜到了。」\n樊長玉在一旁尷尬輕咳一聲，打斷一大一小的談話道：「寒舍簡陋，公孫先生隨意坐。」\n趙大娘看出樊長玉這是有公事要談，哄著兩個孩子隨自己出去了。\n謝五幫公孫鄞沏了杯茶，樊長玉問：「先生不是在康城麼，怎的突然來了薊州？」\n公孫鄞淺抿一口熱茶，挑眉道：「樊姑娘還沒得到消息？陛下下旨，要讓平叛有功的將軍們都上京受封了。」\n樊長玉說：「我這段時日都在養傷，沒去軍中當值，的確還不知這消息。」\n她好奇問：「公孫先生過來同大軍匯合，是要一起進京嗎？」\n公孫鄞手中摺扇一開，高深莫測道：「公孫家不涉朝堂，我來這裡，是受謝九衡之託。」\n發現樊長玉神色有片刻的茫然，他微微一哽，問：「謝徵沒同你說過他的字？」\n樊長玉搖頭，從前她並不知謝徵真正的身份，後來知道了，兩人很快又分別，壓根沒機會讓他們細說這些。\n她頗有些新奇地道：「原來他字九衡啊。」\n公孫鄞酸溜溜道：「陶太傅親自替他取的字，自是好的。」\n樊長玉說：「義父給我也取了字。」\n公孫鄞那張俊美無儔的臉，瞬間嫉妒到扭曲，他握著茶盞，怨念極重地看著樊長玉道：「行了，打住這個話題吧。」\n樊長玉一臉茫然，不明白公孫鄞這是怎麼了。\n不過她的確許久沒收到謝徵的來信了，當初他進京前，說他若有閃失，便別聽傳召進京，先留在西北。\n眼下召令已下來了，謝徵那頭又並未音訊全無，樊長玉也不知是該按兵不動，還是應詔帶寶兒進京。\n她問：「他讓先生來薊州做什麼？」\n公孫鄞看樊長玉一眼，沉吟道：「這個嘛，暫且保密。不過他在京城那邊，突然查起了十六皇子的事，可能跟當年的錦州真相有關。」\n一提到錦州血案，樊長玉便心口發沉，有片刻失神。\n公孫鄞道：「我今日前來，一是為探望樊姑娘，二嘛，也是想見見承德太子的後人。」\n他用收攏的摺扇輕點著掌心問：「方才屋內那孩子，便是承德太子的後人了吧？」\n樊長玉點頭。\n公孫鄞又說：「聽聞樊姑娘為救那孩子受了不輕的傷，你們當日出城的動靜頗大，後面進京也帶著那孩子，總歸會讓唐培義起疑的，動身上京前，樊姑娘還是先想好如何向唐培義交代那孩子的身世。」\n樊長玉問：「公孫先生有何高見？」\n公孫鄞有些意外地看了樊長玉一眼，似覺著她在軍中歷練這麼久，的確成長了許多，他道：「唐將軍是忠厚之人，又有賀大人的這層淵源在，可拉攏之。」\n這其實同樊長玉的想法不謀而合。\n公孫鄞只坐了不到一盞茶的功夫便走了，長寧和俞寶兒在院子裡玩，看到公孫鄞走，長寧跟個小尾巴似的把人送到大門口才罷休。\n望著小孩那雙溼漉漉的黑葡萄大眼，一向鐵公雞的公孫鄞咬了咬牙，把身上僅有的幾兩銀子全給了長寧，讓她拿去買糖葫蘆吃。\n長寧一口一句公孫叔叔喚得更甜了。\n她倒是大方，買了糖葫蘆還不忘分給俞寶兒，從來沒嫌棄過她給的東西的俞寶兒頭一回拒絕了她，板著小臉道：「糖吃多了會長蟲牙，可醜了。」\n長寧不怕長蟲牙，但是怕醜，舉著糖葫蘆猶豫著不敢吃了。\n俞寶兒繼續一本正經教她：「我娘說，會莫名其妙給小孩買糖吃的十有**都是壞人，我瞧著剛才那個人就很像。」\n長寧「啊」地張大了嘴巴，捏著自己的衣角很糾結地道：「公孫叔叔不是。」\n俞寶兒冷不丁地問了句：「你跟他很熟？」\n長寧點頭，因為身上穿得厚，又在院子裡玩了一陣，出了汗，臉頰紅撲撲的，叫日光一照，上邊細小的絨毛都清晰可見，粉裡透白，煞是可愛。\n她說：「公孫叔叔扎的頭髮可好看啦！」\n俞寶兒看著她細軟的頭髮紮成的小揪揪，唇抿緊了些，說：「以後我也可以給你紮好看的頭髮。」\n長寧自己還不會扎頭髮，她覺得扎頭髮可麻煩了，咋一聽俞寶兒的提議，還挺心動，她黑葡萄似的一雙大眼瞅著俞寶兒：「你會扎頭髮嗎？」\n俞寶兒說：「我可以學。」\n第二天，趙大娘早起給長寧扎揪揪時，邊上杵了個觀摩的小不點，趙大娘還笑呵呵讓俞寶兒別急，給長寧紮好頭髮了才能出去玩。\n俞寶兒看得很認真，說：「我不急，大娘你慢點扎。」\n趙大娘直誇這小孩怪懂事的。\n樊長玉對這些是半點不知，她傷已完全養好了，回軍中第一天，唐培義就說了不日啟程進京的事，又單獨留下她，不出意料地問起了俞寶兒。\n樊長玉抱拳道：「隱瞞將軍至今，末將心中有愧，那孩子……身世的確不簡單。」\n唐培義嘆道：「你若要把孩子放到軍中一起帶去京城，你不給我透個底，途中出了什麼意外，我也不知如何應對。」\n樊長玉頷首：「是末將考慮不周。那孩子……是承德太子殿下的後人。」\n此言一出，唐培義不無驚駭地道：「皇長孫不是死了嗎……」\n話說到一半，唐培義自己就打住了話頭。\n這個孩子在這時候出現，又有血衣騎暗中保護，那之前想殺那孩子的是誰？\n唐培義還不知齊旻的存在，以為想殺俞寶兒的是皇帝，驚出一身冷汗。\n他負手在帳內來回踱步幾遭後，對樊長玉道：「我知曉了，你下去吧，行軍路上我會暗中再加派人手保護小殿下。」\n樊長玉揖身道：「末將謝將軍。」\n唐培義只指著樊長玉有些無奈地說了句：「你啊……」\n他嘆息：「替承德太子保全這一點血脈，也是盡臣子本分了。」\n-\n大軍行軍兩月，終於抵達了京城。\n有了唐培義的暗中支持，一路上俞寶兒所在的馬車被圍得跟鐵桶一般，倒是再沒出現什麼意外。\n將士們駐紮在城外的西山大營，唐培義只點了數百排得上名號的有功將士一同進城。\n朝廷那邊前來接待她們的官員特意備了新打的明光甲，為的就是讓大軍進城時，看著光鮮威武些。\n一番更衣休整後，大軍才往北城門去。\n樊長玉在平叛之戰中居功甚偉，哪怕朝中封賞還沒下來，但全京城的百姓也都知道了西北出了為女將軍。\n舉著旌旗的儀仗兵開道，長街兩岸都是歡呼他們凱旋的百姓。\n樊長玉駕馬跟在唐培義側後方，同她並排而行的是賀敬元的長子。\n沿街都有百姓向他們撒花，樊長玉因為是軍中唯一一名女將，容貌氣質又出眾，不少百姓都在熱絡地喚她，那一句句的「樊將軍」滿懷崇敬和欣喜。\n甚至有姑娘直接朝樊長玉丟帕子的。\n樊長玉初次面對這樣的情形，有些無措，又怕失了威儀，儘量在馬背上不苟言笑。\n殊不知，她這副肅冷麵孔，落到百姓眼中，更符合了他們想像中的威風凜凜的女將軍模樣。\n人潮中呼聲最高的，便是喚樊長玉的。\n花季的姑娘們甚至抹淚道：「可惜樊將軍是個女兒身，不然我一定嫁樊將軍！」\n「不知道樊將軍家中還有有沒有兄弟，嫁不了樊將軍，同她當姑嫂也成！」\n……\n人群喧嚷，維持秩序的官兵幾乎已攔不住街頭情緒激動上前迎接大軍凱旋的百姓，可就是在這萬千人海裡，樊長玉還是敏銳察覺到了一道從臨街酒樓朝她投來的目光。\n她仰起頭望去，酒樓二樓臨窗的雅間窗戶大多都是大開著的。\n她在一扇半開的軒窗前，找到了那抹熟悉的身影，對方靜靜注視著她。\n窗臺上幾盆怒放的紅菊，都壓不下他容貌的清透昳麗。\n怕叫人察覺，樊長玉只在快走過時，朝著謝徵極淺地揚了下唇角。\n雅間內，謝徵望著長街上被夾道歡呼簇擁著走遠的女將軍，微微失神了一瞬。\n一年前，他在臨安鎮上的酒樓裡，看著她手提殺豬刀帶著一幫混混從樓下走過，宛若一女霸。\n一年後，她白馬銀鞍，一身戎裝在夾道歡聲中隨大軍凱旋，已是燦若驕陽的女將軍。\n謝徵看著那道馬背上青竹一般挺拔的背影，也淺淺提了下唇角。：，，.`

            title: `第130章第130章`,
            content: `大軍過了正陽門,在午門前靜候宣見。\n高達十丈的三面城臺相連，其上再聳立東西雁翅樓和闕亭，主殿重簷黃瓦,漢白玉圍欄內一字排開披甲佩刀的金吾衛,森嚴肅穆。\n在這高聳的城臺和殿宇跟前，下方能容納近萬人的廣場都顯得逼仄起來。\n樊長玉在馬背上仰望著這巨獸一般的殿宇,想的卻是在那高臺之上住久了，是不是就看不見蒼生疾苦了,反而視他們性命如螻蟻。\n不然自己在前線殺敵時，為何龍椅上的帝王只是擔心她會影響他賜婚,便決定要除掉她？\n前年旱澇遭災時,為了提拔李家打壓魏嚴,又同齊旻一般行徑，聯合李家縱容魏嚴手底下的貪官汙吏層層貪吞賑災糧款,死了足夠多的人,才轉頭問罪魏嚴。\n百姓苦不堪言,大罵貪官汙吏，指望他們的「天」開眼時，殊不知他們的「天」一直看著的,只是冷眼旁觀罷了。\n帝王一心弄權,高座廟堂的人,所思所憂也非民間疾苦,而是怎麼扳倒政敵，延續家族興榮。\n樊長玉忽覺那飛簷上的琉璃黃瓦都變得刺目起來,垂眼攥緊了手心。\n一進午門，文官不得再坐轎，武官也不得騎馬,她們在此等候時，戰馬便已有宮中侍者前來牽走。\n唐培義見樊長玉面色有異，以為她是初次面聖，心下緊張，他回看了一眼威嚴肅穆的宮城，道：「先人詩云『天上白玉京，十二樓五城』，那詩中所言的白玉京，想來也不過這般模樣了，世間多少儒生武夫窮極一生，也不夠格進去看上一眼，樊都尉年紀輕輕就能金鑾殿上面聖，已是後生可畏。我等受詔進京是為論功行賞，都尉不必憂惶，一會兒進殿受封就是了。」\n樊長玉並未解釋什麼，只抱拳道：「多謝將軍提點。」\n唐培義拍拍她的肩，沒再說什麼。\n約莫又等了一刻鐘的功夫，隔了幾道宮門的傳喚聲才穿透層層宮牆，傳到了午門外。\n「宣，雲麾將軍唐培義極其部將覲見——」\n金鑾殿外傳令的太監聲音尖細綿長。\n「宣，雲麾將軍唐培義極其部將覲見——」\n漢白玉石階下把劍而立的金吾衛聲音渾厚粗獷。\n「宣，雲麾將軍唐培義極其部將覲見——」\n最後響徹在雁翅樓外的傳召聲在東西兩側十丈高的城臺間撞起無數回音，雄渾威嚴。\n饒是剛從西北戰場上沐血下來的將軍們，也不禁心頭為之震顫，真真切切明白了何謂「朝天子」。\n東側門緩緩打開，唐培義為首，武將們整齊分列在後，進了午門，又過金水橋，橫穿太和門，才是文武百官上朝的金鑾殿。\n目之所及全是朱牆黃瓦，鋪地的石磚都全是漢白玉，當真擔得起「天上白玉京」一說。\n隨行的武官中不少都是初次進京面聖，被這莊嚴的殿宇壓得大氣不敢喘一聲。\n樊長玉跟在唐培義身後，同賀敬元長子並列而行，因為心裡裝了太多沉重的事，這處處雕金砌玉的宏偉殿宇倒是沒能引起她多大興趣。\n金鑾殿前的漢白玉石階上也站滿了金吾衛，個個身形魁梧，但眼底多是眼高於頂的橫氣，而非沙場上歷練下來的血煞之氣。\n進了大殿，樊長玉都沒四下張望，都能感覺到整個殿內的金碧輝煌，文武大臣分列在大殿兩側，為朝見的她們讓出一條道來。\n但為文官之首的位置和武將之首的位置都是空著的，謝徵特意奏請了晚幾日再回京，魏嚴則是稱病多日未上朝了，樊長玉猜測那約莫是魏嚴和謝徵的位置。\n唐培義率著一眾武將抱拳單膝點地跪了下去：「吾皇萬歲萬歲萬萬歲！」\n樊長玉也跟著一拜，她原本是在金鑾殿上自爆是孟家後人，逼皇帝查魏嚴的，但後來發生了太多的事，李家和魏嚴似乎都還留有後手，謝徵又在布局什麼，讓她先按兵不動。\n最上方那把巨大的漆金浮雕龍椅上，傳來帝王悅然的嗓音：「平身——」\n樊長玉就站在唐培義身後，起身一抬眼便瞧見了一身明黃龍袍坐在龍椅上的天子。\n他瞧著比樊長玉想像中的帝王年輕得多，頭戴冕旒(miǎnliú)，笑著時整個人意外地顯得很親和，仿佛不過一少年人，不像一權御四海的九五之尊。\n齊昇自然也看見了樊長玉，視線從她身上掃過時，哪怕依舊是笑著的，卻如當初在崇州城外見的那宣旨太監那般，讓她渾身都不舒服。\n齊昇指著他們對滿朝文武笑道：「諸位愛卿且瞧瞧，這便是我大胤的脊梁之臣們了！」\n大殿兩側的文武大臣們互遞眼神，響起了一片極低的議論聲，但誰都沒有附和皇帝的話，文臣們面上尚還掛得住，武將中已不少人把不服擺在臉上了，只是礙於這是金鑾殿，才沒冒昧反駁皇帝的話。\n主要還是「脊梁之臣」這頂高帽戴得，實在是不合適。\n三公九卿尚能得此讚譽，此番隨唐培義一起朝見的，官階最小的，便是樊長玉這個五品驍騎都尉。\n而能上朝面聖的，在京官中至少也得是五品身居要職的，才有個聽政的位置，卻無諫言的資格。地方官員，至少得四品以上才能面聖。\n齊昇那句話，無疑是無形之中地，便替有功平叛的一眾武將在朝堂上樹了敵。\n連樊長玉這初入官場的人都察覺到了不對勁兒，唐培義在聽到皇帝那句誇讚時，額角的冷汗便已掉了下來，連忙抱拳道：「末將等愧不敢當，為陛下盡忠乃臣子本分，何況此番在平叛之戰中，居功甚偉的也是賀大人和武安侯。」\n賀敬元鞠躬盡瘁了一輩子，又已亡故，謝徵的赫赫戰功，滿朝文武也沒人敢不服。\n唐培義把這兩人抬出來領皇帝那句讚譽，才稱得上名副其實。\n齊昇面上笑意不減，仿佛方才說的那等捧殺之言並非有意為之：「賀愛卿和武安侯的確是大胤國之棟梁，北地嚴冬將至，武安侯上奏說要回錦州巡視一趟兵防再反京，大胤有武安侯，朕和諸位愛卿都可高枕無憂矣！」\n這話一出來，文武百官都是附和稱是。\n齊昇又笑著道：「待謝愛卿進京，朕當賜其九錫（cì）。」\n此言一出，大臣們互相張望，誰都不敢出言，整個朝堂都陷入了一片死寂。\n樊長玉垂首立在大殿之下，暗道莫非九錫是什麼忌諱，不然百官為何如此諱莫如深？\n好在齊昇很快自己揭過了這個話題：「賀愛卿戰死盧城，朕心甚痛，多日食不下咽，今追封其為敬國公，配享太廟，其子賀修筠可在？」\n同樊長玉並列而站的賀修筠當即出列，抱拳俯首道：「微臣在。」\n賀敬元身前是名儒將，他的長子也隨了他那份儒性，雖會些拳腳功夫，但更精攻如儒學，賀敬元前往崇州那些時日，薊州一切事物都是賀修筠打理，鄭文常留下做其副手。\n齊昇道：「你是兩榜進士出身，跟你父親在薊州歷練了多年，往後薊州牧那個位置，由你來坐。」\n賀修筠謝恩道：「微臣謝陛下隆恩，必不敢負陛下所望。」\n齊昇讓其退回原位，目光掃向唐培義時，不知是不是聽當日去崇州宣旨的太監回去後說了什麼，他面上雖還是在笑，卻總讓人感覺到一股惡意：「唐愛卿在平叛之戰中深謀遠慮，用人有度，特封平西大將軍，賞金千兩，綾羅百匹。」\n唐培義也出列謝恩後，齊昇的目光便落到了樊長玉身上。\n他道：「早就有所耳聞，我大胤朝自民間出了一位女將，出列讓朕瞧瞧。」\n樊長玉出列抱拳：「末將樊長玉，參見陛下。」\n齊昇道：「抬起頭來。」\n這話讓群臣又有了不小的騷動，樊長玉乃有軍功在身的武將，齊昇這輕佻之言，卻仿佛是在後宮選妃一般。\n樊長玉眉頭也不自覺鎖起，目光堅毅抬首，面上無半點小女兒的羞怯之態，只有久經沙場的颯氣。\n齊昇唇角彎彎，贊道：「好一朵金戈牡丹！」\n這話一出來，群臣的臉色愈發精彩了，連唐培義都替樊長玉捏了一把汗。\n皇帝不稱讚她的功績，反而誇起她的容貌，這怎麼聽怎麼奇怪，樊長玉也覺得哪哪兒都怪異。\n尤其是她知道龍椅上的帝王，早就有過殺自己的心思，此刻被他似笑非笑的目光盯著，有如芒刺在背。\n果然下一刻，就聽齊昇道：「愛卿可有婚配？」\n樊長玉整個人都惡寒了起來，抱拳的手不自覺收緊，心中升起一股被侮辱、被蔑視的怒意，她抿緊唇角，鏗鏘答道：「回陛下，末將已有夫婿。」\n謝徵當初入贅用的雖是假名，她在官府文牒中，卻是真真切切有婚書記錄在冊的，這話算不得欺君。\n齊昇似乎頗為失望，繼續問：「你夫婿現在何處？」\n樊長玉不卑不亢道：「年初徵兵，我夫婿去了崇州，末將憂夫心切，尋夫路上意外從了軍。平叛之戰慘烈，我夫婿至今生死不明。」\n徵戰時，軍中少不得會有下落不明的兵卒，有的是當了逃兵，有的則是被千軍萬馬踏成了肉泥，難辯出身份，還有意外死在野外的，如此種種，數不勝數。\n軍中的確有「言正」的參軍名冊，但如今在軍中找不出這麼個人了，樊長玉這說的也是「大實話」。\n她話都說到了這份上，千裡尋夫傳出去任誰評說也是重情重義，她夫婿又是在崇州之戰中生死不明的將士，她稱得上英烈遺孀，齊昇若是還言語輕佻，那無疑就是肖想臣妻，實打實的昏君做派。\n齊昇早就清楚了樊長玉和謝徵的關係，在金鑾殿上發難，無非是想出當日謝徵削宣旨太監一隻耳的那口惡氣，眼下被樊長玉不卑不亢給堵了回去，還在群臣跟前失了威嚴，幾欲惱羞成怒。\n他勉強維持著臉上的笑意道：「朕在位十七載，頭一回見巾幗將才，樊愛卿在崇州一戰中斬長信王首級，又憑一己之力，死守盧城待援軍至，可以說是功不可沒，特封愛卿為雲麾將軍，加封二品誥命夫人。」\n雲麾將軍是有實權在手的三品武官，誥命夫人則是虛銜。\n樊長玉大抵是大胤朝迄今為止，唯一一個自己給自己掙了誥命的，旁的便是丞相夫人，那也是靠著夫婿獲封的。\n樊長玉垂首謝恩：「末將謝陛下隆恩。」\n論功論完了，自然還有問罪。\n樊長玉退回原位後，便聽皇帝似乎有些倦怠地問：「諸位愛卿可還有事啟奏？」\n一直垂眼立在文官之列最前方鬚髮花白的老者捧著笏板出列道：「老臣有事啟奏。」\n齊昇道：「太傅有何要奏？」\n樊長玉一聽太傅二字，便猜到那老者應是李太傅了。\n想到李家聯手齊旻做的那些事，她抬眼打量起斜前方出列的老者，看不清正臉，但那仙鶴紋緋色官袍下的身形，看起來極為蒼瘦，仿佛是一棵嶙峋老松。\n明明視百姓和將士的性命如草芥，偏偏又一副為天下百姓瀝盡了心血的忠骨模樣。\n樊長玉只覺得莫大地諷刺。\n前方傳來李太傅鏗鏘憤慨之言：「盧城險失，萬千將士慘死，賀敬元捐軀，皆因他魏嚴勾結反賊，老臣懇請陛下問罪魏嚴，還萬千慘死的將士和敬國公一個公道！」\n言罷了袍跪了下去。\n李黨的人見狀紛紛出列，文官那邊幾乎是瞬間跪倒了一大片。原本一些不想站隊的小官，眼瞅著前方都空了，未免在朝堂上被排擠針對，也只得捧著笏板出列跪了下去，跟著高呼：「請陛下問罪魏嚴，還萬千慘死的將士和敬國公一個公道！」：，，.`
        },

            title: `第131章第131章`,
            content: `唐培義本就對賀敬元的死自責萬分,哪怕並不想同李黨有什麼牽扯，但聽他們要求問責魏嚴，當即也撩袍跪了下去：「末將也懇請陛下徹查魏丞相勾結反賊一事,給前線殺敵的將士和天下百姓一個交代！」\n唐培義一跪,跟著他上金鑾殿受封的武將們自是全跟著跪了下去。\n齊昇手肘撐在龍椅扶手上，按著額角,面色明顯不愉：「這是做什麼？一個個的，都學會逼朕了？」\n李太傅執著笏板,鬚髮花白低垂著眉眼，嘶聲道：「臣等不敢,只是奸佞不除,冤屈未平,何以慰泉下忠魂？老臣若不諫言，便不配穿這身官袍,食陛下的俸祿,還不若告老還鄉去！」\n樊長玉看著李太傅那瘦竹竿一樣的背影,若不是早就知曉李家和齊旻的勾結，她當真要以為李太傅也同賀敬元一般，是個憂國憂民的好官了。\n「砰」一聲巨響。\n是齊昇操起龍案上的一摞奏章仍了下去,他怒極反笑道：「諫言便諫言,太傅何以拿告老還鄉壓朕？」\n李太傅背脊往前壓低了幾分,「老臣不敢！」\n從前都是皇帝同李太傅一唱一和打壓魏嚴,而今李太傅聲討魏嚴，皇帝卻極力護之,滿朝文武還真是頭一回見。\n機靈些的，很快就想到了之前的傳聞，暗忖莫非尋到了承德太子後人一事是真的。\n先前一直默不作聲的魏黨察覺到了皇帝的態度,當即也站出來道：「丞相勞苦功高，為大胤江山社稷嘔心瀝血了這麼多年，積勞成疾，告病在家，爾等便是這般污衊丞相的？」\n李黨的人憤聲反駁：「是丞相舉薦去軍中的人放走了崇州反賊，導致盧城險失，抓獲的反賊幕僚，也指正了他魏嚴的確同反賊有勾結，人證物證具在，還有什麼可狡辯的？」\n「他盧大義好大喜功，不從軍令擅自行動，中了反賊的奸計，便是追責，丞相也不過是識人不當之失，爾等竟要給丞相安上勾結逆賊的罪名，其心可誅！反賊幕僚的話能信嗎？萬一這是反賊的離間計呢！」\n「巧弄口舌又如何，鐵證如山，你們是不見棺材不掉淚！」\n大殿內兩撥人吵得不可開交，龍椅上的齊昇似乎被吵得頭疼，沉喝一聲：「夠了！」\n相互指責恨不能挽起袖子動手的朝臣們這才收斂了，手捧笏板站回原位。\n齊昇臉色很不好看：「吵吵嚷嚷像什麼樣？把這金鑾殿當菜市口了？」\n群臣垂首低眉，皆不敢再出一言。\n齊昇按著發疼的額角道：「魏嚴勾結反賊一案的所有人證，全都暫收大理寺，交由三司會審，退朝！」\n說完這句，齊昇便一甩袖袍率先離開了金鑾殿，御前伺候的太監尖著嗓音高呼一聲「退朝」後，忙小跑著去追齊昇。\n大殿下方的文武百官朝著上方那把空蕩蕩的龍椅跪拜：「吾皇萬歲萬歲萬萬歲！」\n樊長玉跟著其他朝臣一起起身時，微微擰眉看了一眼大殿上方那把漆金龍椅。\n審魏嚴這事，會順利嗎？\n-\n出了大殿，李太傅的臉色並不好看。\n他的長子緊跟在他身後，低聲同李太傅道：「陛下這是又轉向魏嚴尋求庇護了？」\n李太傅當了齊昇十幾年的老師，對這位幼年時期便被挾令坐上龍椅的天子再了解不過，他搖頭道：「這樣的事，他又不是頭一回做了。」\n齊昇剛坐上皇位時，不過一稚童，滿朝文武表面上敬他，實則誰也沒把這壓根沒實權的小皇帝放在眼裡。\n那時候齊昇為了坐穩帝位，一切為魏嚴馬首是瞻。\n後來羽翼漸豐了，明白自己不過是個傀儡皇帝，他為了從魏嚴手中奪權，又開始親近李太傅。\n或許正是因為從來就沒真正掌握過那份皇權，齊昇眼裡才再容不得任何一個同自己分權之人。\n他太心急了，魏嚴還沒倒，他就已經在處處提防李家，最終導致了李家轉而同齊旻合作，他才慌了，迫於無奈轉頭又去尋魏嚴。\n只要魏嚴不倒，哪怕繼續當個傀儡皇帝，這皇位還是他的。\n李太傅的長子李遠亭面露鄙夷之色：「他設計了魏嚴那麼多次，魏嚴還能再保他？屆時不過都是敗家之犬！」\n李太傅腳步微頓，不溫不火看了自己長子一眼。\n李遠亭自知失言，四下看了一眼，發現大臣們都是三三兩兩結伴出宮，並沒有人在他們附近，才微微鬆了一口氣。\n李太傅道：「無論何時都切忌，禍從口出。」\n李遠亭垂首應是。\n前方一處漢白玉石階口，樊長玉和唐培義等一眾平叛將領走了下來，一些小官在向唐培義道賀，一行人且說且走，面上都帶著恰到好處的客套笑意。\n李太傅的目光在那一身紅袍銀甲、豔若驕陽的女將軍身上多停留了幾息。\n李遠亭早已知曉樊長玉真正的身份，他壓低了嗓音道：「聽聞武安侯為這女子拒了賜婚，又親率謝家騎兵趕去盧城救援，中間還隔著他老子的死，當真是鬼迷了心竅。」\n李太傅沒做聲，走出幾步後忽而問：「懷安那邊還是沒消息傳來嗎？」\n李遠亭搖頭，又說：「已加派人手去找了。」\n李太傅「嗯」了一聲，抬腳繼續往前。\n-\n樊長玉和唐培義等人並非京官，在京城也無府邸，由禮部統一安排住進了進奏院。\n大胤官場上的規矩，在外有封地的王侯受詔進京，一律住國邸；外放的官員進京，則住進奏院。\n樊長玉等人雖得了封賞，但後邊是留京還是繼續外派，還得等聖諭。\n若是留京，那麼則由皇帝御賜府邸，或是劃給一塊地，令其自己建造宅子。若是外派，就得前往州府上任。\n樊長玉已是三品大員，被分到了一所獨立的院落，趙大娘夫婦和長寧、寶兒他們跟著一起住進來，也絲毫不顯擁擠。\n趙木匠如今已是軍中登記了名冊的正式軍醫，本應在薊州軍中當值，但不打仗了，他覺著自己在軍中也沒什麼用處，樊長玉又要進京受封，他便請辭，跟著一路上京了。\n樊長玉進宮的這半日，老兩口已在謝五謝七的陪同下，帶著長寧和寶兒在京城大街上逛了一遭。\n樊長玉回去時，就瞧見長寧買的零嘴幾乎堆滿了整張圓桌，她還不及數落長寧，長寧就已經興奮朝他比劃著在街上見到的各種新奇玩意兒。\n「阿姐阿姐，街上有會噴火的黃鬍子人！還有耍花槍的、胸口碎大石的……」長寧一雙眼亮晶晶的，扳著自己的手指頭幾乎數不過來。\n樊長玉見她開心成這樣，也捨不得再數落她，只捏了捏她粉嘟嘟的臉蛋道：「出去玩不可以調皮，也不能亂跑，要跟你趙大娘和小五叔叔他們在一起，知道嗎？」\n長寧胡亂點頭，又抱住樊長玉的一條胳膊開始晃悠：「阿姐阿姐，你什麼時候有空，咱們去玩那個投壺，投中了可以拿走一隻小兔子！」\n樊長玉笑問：「你想養兔子？」\n長寧用力點頭：「養肥了，餵隼隼！」\n這個答案讓樊長玉哭笑不得，從前謝五隨她在軍中，海東青便一直是謝七和長寧在喂，後來謝五受了傷，在家休養，也幫著餵過。\n他們倆都是懂得馴養海東青的，每日長寧給海東青餵得多了，夜裡便會由謝七帶出去，讓海東青多飛一陣。\n樊長玉在盧城養傷那些日子，趙大娘閒不住，為了給傷病營的將士們補身體，還去集市上買了一窩雞仔放到營地附近養。\n偶有鷹隼去偷雞仔吃，把趙大娘愁得不行，每日回了小院便唉聲嘆氣，後來謝七常讓海東青去軍營附近一帶飛，遇上來偷雞的其他鷹隼，海東青能追著啄掉對方半個翅膀的毛。\n趙大娘直誇這隻矛隼有靈性，轉頭就餵了海東青一堆雞雜。\n到了京城地界後，未免人多眼雜，哪怕是夜裡，謝七和謝五都不敢帶海東青出去飛了，被趙大娘和長寧一直投餵的海東青，不可避免地圓了一圈。\n樊長玉道：「你再餵下去，你的隼隼都胖得飛不動了。」\n趙大娘也跟著勸：「寧娘聽話，咱們來京城住的還是官府的院子呢，沒個自個兒的地方，養兔子也不方便，回頭要是離開京城，死物好帶走，活物可不好帶。」\n長寧這才低垂著腦袋，絞著自己肉乎乎的手指委委屈屈同意了。\n趙大娘夫婦拉著樊長玉問面聖的事，老兩口在邊陲小鎮住了大半輩子，還沒想過有朝一日能進京，聽說樊長玉被封了個大官，又是哭又是笑，揩著眼淚說回頭要燒些紙錢給樊長玉爹娘，告訴他們這個好消息。\n長寧蹲在門外，撿了根小棍在地上畫圈，噘著小嘴還在想商販籠子裡那隻雪白的小兔子。\n視線裡出現一雙小錦靴，俞寶兒站在她跟前同她道：「我幫你去贏兔子。」\n長寧不開心道：「你又不會投壺，小七叔叔和小五叔叔也不肯幫我……」\n俞寶兒說：「給我兩天時間，我能練會的。」\n小孩子的心思異常敏感，沒人安慰還好，俞寶兒這麼一說，長寧眼眶就紅了，天冷了，趙大娘給她穿得多，她蹲在地上軟乎乎的一團，仿佛也是一隻肥兔子，她委屈道：「要是兔子被別人贏走了呢？」\n俞寶兒道：「小販那裡還會有其他兔子的。」\n長寧眼眶紅得更厲害了，她抹了一把眼道：「可我就想要今天那隻小兔子。」\n俞寶兒突然問：「你不是要養給你那隻隼吃的嗎？只要是只兔子不就行了？」\n長寧垂著腦袋不說話，長睫上沾著淚花花，看起來又可憐又委屈。\n俞寶兒盯著她看了一會兒，改口道：「我幫你贏今天那隻兔子，那你要一直養著它，不能餵給你的隼吃了。」\n長寧想了想，覺得小兔子也挺可愛的，於是用力點了頭。\n她問：「你怎麼贏？」\n俞寶兒道：「你別管。」\n-\n同趙大娘夫婦說了一陣話後，樊長玉把老兩口送出房門，準備問謝五怎麼在京城聯繫謝徵，卻沒找著人。\n她叫住在收拾庭院的謝七：「小七，小五哪去了？」\n謝七拄著掃帚答：「小公子說要出去採買些東西，讓五哥陪他出去了。」\n俞寶兒身份敏感，除了趙大娘夫婦一直喚他寶兒，謝五謝七都是叫他小公子。\n樊長玉擔心出什麼意外，問：「只有小五跟著嗎？可知他們去哪兒了？」\n謝七忙道：「將軍放心，小公子說只去上午去過的那兩條街，唐將軍那邊也暗中派人跟著的。」\n樊長玉鬆了口氣，但謝七這麼快改口叫她將軍，她自個兒還怪不習慣的，說了句「那便好」，又問：「你可知……他現在何處？」\n樊長玉雖沒說是誰，但謝七一聽她語氣，便知道她問的是謝徵，道：「主子是秘密進京的，我們目前也還沒接到主子那邊的消息，謝家在京城雖有府邸，但主子素來警惕，應當不會在謝家落腳。平叛功臣都暫住進奏院，眼下只能等主子找我們。」\n樊長玉想起進城時在臨街酒樓窗口看到的那抹人影，暗道他當時在那裡，難不成是專程去看大軍進城的？\n見她走神，謝七問：「將軍有急事找主子？」\n樊長玉道：「也不是什麼急事，你下去忙吧。」\n她主要是想問謝徵接下來的部署是什麼，皇長孫那邊暫時失了蹤跡，俞淺淺也下落全無。\n皇帝明顯開始偏袒魏嚴，三司會審，還不知能審出個什麼結果來。\n不管是李黨贏還是魏黨贏，樊長玉覺得這朝廷都糟透了。\n她回房合上房門，剛幽幽嘆了口氣，便聽得一道低沉的嗓音響起：「找我做什麼？」\n樊長玉詫異一抬眸，便見床帳旁抱臂倚著一人。\n她驚道：「你什麼時候來的？」\n謝徵答：「我一直都在。」\n見樊長玉眼底還是十分困惑，他揚了揚手上一張易容用的面具。\n床帳那邊光線暗沉，他走出來後，樊長玉才注意到他穿了一身進奏院侍衛的衣袍。\n他竟是扮成了這裡的侍衛！\n不等樊長玉說話，他又拿出另一套侍衛的衣袍丟給樊長玉，「換上，帶你去見個人。」\n外地官員進京，不知多少雙眼睛盯著進奏院，去了什麼地方，接見了些什麼人，都會有人事無巨細地報去宮裡。\n要想避開那些耳目，自然得喬裝一番混出去。\n樊長玉瞅了謝徵一眼，他沒戴面具，一張臉依舊清雋俊美，但她總覺得他情緒似乎不太對勁兒。\n應該說，從進城那會兒在酒樓上看到他時，她就感覺到了他不對勁兒，才特意在快走過時，朝他笑了一笑。\n此刻抱著那一身侍衛服，樊長玉顧不上問他要帶自己去見什麼人，遲疑道：「你怎麼了？是不是此次進京不順……」\n最後一個字還沒說完，她就被捲入了一個堅硬凜冽的懷抱。\n謝徵什麼都沒做，只是緊緊擁著她，埋首在她肩頸處，像是溺水之人拼盡全力抱住一根浮木。\n樊長玉微愣了一下，因為兩手還抱著那一身衣物，也沒法回抱他。\n她試圖抽出一隻手輕撫他後背，再問問他怎麼了，然而手還沒抽出來，就被更緊地箍進了對方懷裡。\n「別動，讓我抱一會兒。」\n謝徵嗓音裡透著疲憊和沙啞。\n恍惚間，竟給了樊長玉一種錯覺，此刻的他，似乎是脆弱的。\n樊長玉也說不清心頭是個什麼滋味，只覺得心臟像是被一隻大手用力握住，悶悶地疼了一下。\n她鬆手任那身侍衛袍落到腳下，順勢抱住了他窄瘦緊實的腰，像爹娘剛去世時，她在無數個夜晚裡安撫長寧一樣，低聲安撫眼前之人，嗓音平靜又柔和：「別怕，我在。」：，，.`
        },

            title: `第132章第132章`,
            content: `過了幾息,謝徵便直起身來，那張冷玉似的臉上已半點情緒不顯，仿佛前一刻的脆弱當真只是樊長玉的錯覺。\n他抬手替樊長玉攏了攏耳邊的碎發,只說：「去換衣罷。」\n樊長玉縱有再多疑問,也只得暫且先壓了下去。\n進奏院人多眼雜，若是讓他出去等,一個進奏院的侍衛從自己房裡出去，被人瞧見了,傳出去只怕不好聽。\n未免節外生枝，還是不讓他出這道房門為妙。\n她撿起掉落在地的侍衛服,稍作猶豫,抬腳去了屏風後面。\n解開自己身上那件軟甲時,樊長玉不放心地探頭又看了一眼背身站在屋內的人。\n除卻他進京的前一晚，她們便是有過同床共枕的時候,那也都是和衣而眠的。她還從來沒在白日裡,在他跟前寬衣解帶過。\n樊長玉感覺很不自在。\n怎料謝徵背對著她,卻跟後腦勺長了眼睛似的，「放心，我不看。」\n樊長玉頓生出幾分自己以小人之心度他君子之腹的尷尬,縮回了腦袋開始窸窸窣窣解自己身上的衣物。\n屏風外卻傳來謝徵淡淡的後半句：「該看的不該看的,不都看過了？」\n樊長玉解衣帶的手一頓,眼露兇光,一隻手用力捏上了身後的屏風，在木質屏風被捏碎的「咔嚓」聲裡,一字一頓道：「謝、徵！」\n外邊傳來一聲極低的淺笑：「逗你的，快些換吧。」\n樊長玉套上了那身侍衛服，眼角餘光再次瞟向屏風外時,不自覺皺了皺眉。\n謝徵是故意的。\n他似乎不想讓她多問什麼，才故意這樣岔開了話題。\n樊長玉換好衣物走出去後，便也沒再追問，一邊扣袖口的護腕一邊道：「帶我去見誰？」\n侍衛服是玄青色的，她將長發全部束起，在頭頂綰成一個小髻，露出修長白皙的脖頸，眉目本就剛烈，別有一番英氣。\n只是腰身束緊革帶後，過於纖瘦了些，不似男子。\n謝徵靠著分隔裡外間的鏤空雕花月洞門，靜靜看著樊長玉，眸色幽沉如暗不見天日的古井：「去了你就知道了。」\n待樊長玉走近時，他抬起經絡微突的手，突然去解她已系好的衣襟。\n樊長玉一驚，側身躲開，頸側細嫩的肌膚擦過他微涼的指腹，頓時只覺半個脖子都發麻了。\n她低斥：「你做什麼？」\n謝徵垂眼望著她，門窗掩得嚴實，屋內光線暗沉，更顯得他容顏俊美深刻。\n「腰身太細了，會被認出來，綁兩片棉甲。」\n他嗓音很淡，指尖右移，一勾一拉，這次毫無阻隔地解開了樊長玉系好的衣襟。\n有這冠冕堂皇的理由，樊長玉不好再兇他，但他靠得太近了，呼吸間全是他身上那股北地風雪混著皂角香的冷冽氣息，加上他指尖若即若離的觸碰，樊長玉鼻尖竟熱得冒出了細密的汗珠。\n在他解自己腰間的革帶時，樊長玉退後一步，雙手一扣利落解開，「我自己來。」\n沒了革帶束縛，外袍直接散開，裡邊雪白的中衣很是寬鬆，只有前襟處兩條系帶固定，已經能瞧見她鎖骨隆起的單薄弧度。\n左側鎖骨上的牙印已變得極淡，只剩上下兩點米粒大小的印子。\n她找了兩片棉甲垂首往腰上綁時，沒束緊的碎發掉落一縷下來，正好垂落在她肩頸處。\n謝徵抬手幫她挑開那縷碎發，髮絲貼著肌膚被勾走的觸感說不出地酥.癢，樊長玉直縮脖子，微微皺眉抬起頭看謝徵時，他帶著薄繭的指腹落在了那兩點牙印處。\n樊長玉肩膀又是一縮——他指尖很涼。\n謝徵再無逾越之舉，只在視線掠過她弧度明顯平緩下去的胸脯時，問：「又束胸了？」\n明明他搭在自己鎖骨處的只是兩根手指，樊長玉卻有種被他用什麼利器抵住了脖子的錯覺，渾身的力氣似都在他指腹間被抽走。\n她勉強維持鎮定道：「著甲方便些。」\n謝徵淡淡「嗯」了一聲，指腹在她鎖骨處的牙印上有一下沒一下摩.挲著，右臂猛地發力，攬住樊長玉腰身，將人一帶，放到了圓桌上。\n樊長玉猝不及防地後仰，兩手撐住桌面才穩住身形，回過神時已被謝徵捏住下顎吻住了。\n這個姿勢讓她只有被迫承受的份，也方便謝徵噙著她唇舌深入。\n他一邊吻她，還能抽出手幫她把腰間搖搖欲墜的棉甲綁緊，攏上外袍扣緊革帶時，垂眸掠她一眼，牙齒咬住她左肩的衣襟往下拉，在那隻剩兩粒米大小的牙印處，覆上新的紅痕了，才替她攏好衣襟。\n樊長玉氣息很不穩，身上的衣袍經他整理過再不顯凌亂，雙頰卻染上了緋紅，撐在桌沿的雙手因用力而指節泛白。\n謝徵抬起頭，在她被自己蹂.躪得微腫的紅唇上又啄吻了兩記，道：「再這麼看我，今天就不用出門了。」\n他嗓音比平日裡更低沉，像是喝了酒，磁性得有些喑啞。\n樊長玉目光漸漸清明，就著這個姿勢一把拽住他領口，將人拉低至自己跟前，張嘴便在他肩頸處也用力咬了一口。\n謝徵輕「嘶」一聲，不及反應，樊長玉已鬆開他跳下了桌去。\n她掠出幾步才回頭看他，眼底是豹子似的野性和不馴：「走了。」\n謝徵拉起衣領遮住了肩頸處的那枚牙印，指腹在牙印上輕輕摩.挲了一下，才不急不緩抬腳跟上。\n-\n因著謝徵說會有人通知謝七他們她去了何處，樊長玉便沒特意再去尋謝七交代一遍。\n借著採買的藉口出了進奏院，二人進了一家賣筆墨字畫的鋪子後，被引上二樓，又有小廝捧來衣物供兩人換上。\n樊長玉站在雅間的窗邊，將窗戶推開一條小縫，看著兩名血衣騎穿著她們之前的侍衛服離開後，街頭幾名著便衣的人立即不動聲色跟了上去，她吃了一驚，扭頭問謝徵：「你一早就知道有人在跟蹤我們？」\n謝徵坐在桌前，結著淡痂的長指捏著一盞清茗，眼皮微抬，道：「進奏院的侍衛、僕役出門，都會有人跟蹤。」\n樊長玉明白了他話裡的意思，那些人都是宮裡的眼睛。\n哪怕是差遣僕役、侍衛出府辦事，皇帝也會暗中盯著。\n她回到鋪了精緻繡緞的圓桌前坐下，問：「那我們接下來去哪兒？」\n話音方落，樓下便傳來了馬車停下時馬兒的嘶鳴聲。\n謝徵放下手中茶盞：「車來了。」\n樊長玉見他起身，便也拿起小廝送來的帷帽跟上。\n這帷帽是京中的貴婦人或小姐們出門時戴著遮面用的，戴上這頂帷帽，樊長玉便不用再往臉上抹那些易容的塗料。\n他們出門時，正巧那輛馬車裡的一對「夫妻」被鋪子裡的小廝引著上樓，樊長玉發現那對「夫妻」所穿的衣物，跟自己和謝徵身上的如出一轍。\n眼見小廝朝著謝徵微不可見地點了一下頭，那對「夫妻」進了她們之前待的雅間，樊長玉便猜到了這也是謝徵的人。\n眼下不是說話的時機，她沒做聲，跟著謝徵下樓後，謝徵拿了兩幅字畫結帳後，便帶著她上了停在路邊的那輛馬車。\n車夫一甩馬鞭，趕著馬車在鬧市中走遠後，樊長玉掀開車簾一角朝後方打量了一陣，確定沒人跟蹤後，才放下車簾問謝徵：「那鋪子裡是你的人？」\n謝徵靠車壁而坐，風吹動車窗處的帘子，忽明忽暗的光線落在他易容後的臉上，依舊掩蓋不了他骨相的優越。\n他答：「那是趙家的產業。」\n樊長玉對當初開在清平縣的趙家書肆還有印象，她只是沒想到，趙家在京城也有產業。\n謝徵開始閉目養神後，樊長玉便將車簾掀開一小角，打量沿途的街景。\n京城的確比她去過的任何地方都繁華，不怪長寧出去逛上一遭後，回來高興成那般。\n樊長玉支著手肘看了一陣，又偏過頭盯著雙目輕瞌的謝徵。\n他有心事，只是他不願同自己說。\n樊長玉微抿了下唇，她不太喜歡自己心底因為這事升起的沮喪情緒。\n她正盯著他出神，一直閉目的人忽而掀開了眼皮：「看著我做什麼？」\n被抓包抓了個正著，樊長玉半是心虛半是尷尬，趕緊正襟危坐，輕咳一聲道：「好奇你臉上的面具是用什麼材料製成的。」\n制一張人.皮面具不易，離開進奏院時，謝徵戴的貼合他臉部輪廓的人.皮面具，樊長玉則是抹了一些易容的塗料。\n到書肆換裝時，她臉上那些塗料便被清洗乾淨了。\n聽她這麼說，謝徵抬手往自己臉上一揭，便把那張疤臉面具扯下來遞給了她。\n樊長玉接過後，用手摩挲了一番，蹙眉道：「摸不出來。」\n謝徵道：「我以為你能猜到是人皮。」\n樊長玉頃刻間變了臉色，她杏眸瞪大時，瞳孔也跟著一縮，仿佛真是一隻受驚的貓兒。\n見她這般，謝徵垂眸掩下眼底的笑意，一直積攢在胸口那團鬱氣似乎也消散了幾分。\n樊長玉面上露出一言難盡的神色，只用兩根拇指尖捏著麵皮，還給謝徵，一臉糾結道：「都說人死債了，這人都死了，還把皮剝下來做成面具，實在是有損陰德，你往後還是別用了。」\n謝徵單手撐額，凝視著她故意道：「可再沒有比人皮更合適的材料了，韌性極好，貼合度也強……」\n他說著，將樊長玉遞過來的面具又往她跟前送了幾分：「不信你戴上試試。」\n樊長玉臉都快綠了，看著近在咫尺的麵皮如臨大敵，梗著脖子道：「我不試！」\n恍若一隻快炸毛的豹貓。\n謝徵喉間溢出幾聲悶笑：「你還真信了？」\n樊長玉意識到被騙了，瞪著他不說話。\n謝徵失笑道：「是方士用驢膠製的。」\n車簾偶爾被風掀開一角，窗外的景色已是郊外。\n樊長玉一手捏著麵皮，一手緊握成拳，在車夫馭馬停下時，把麵皮往對面一扔，緊跟著「哐哐」幾拳就揮了出去。\n謝忠聽見馬鳴聲從莊子裡出來時，就聽見停在莊子門口的馬車內發出「桌球」一陣大響。\n片刻後，一位著藕荷色羅裙的姑娘率先跳了下來，明眸皓齒，生得一副好顏色，就是瞧著有些兇巴巴的，但眼神澄澈，頗有幾分很好騙的老實，倒是個虎氣的姑娘。\n謝忠不識得樊長玉，想著能由血衣騎駕車帶過來，應當也不是外人。\n須臾，謝徵從馬車內走了出來，只是不知何故，他將那疤臉面具又帶回了臉上。\n謝忠見了他，連忙抱拳：「侯爺。」\n謝徵淡淡點頭，嗓音聽不出異常：「朱將軍休養得如何了？」\n謝忠答：「旁的都好，只是雙腿醫不回來了。」\n這是大夫一早就提點過的事。\n謝徵偏頭看向還氣還沒徹底消下去的樊長玉，緩聲道：「要帶你見的人就在裡面。」：，，.`

            title: `第133章第133章`,
            content: `樊長玉心中那點微惱霎間時全消了下去。\n她看看謝徵,又看看從莊子裡迎出來的那斷了一臂一腿的大叔，儘管心中依舊疑惑，但還是推開半掩的院門,略帶遲疑地抬腳邁了進去。\n謝忠盯著樊長玉的背影,見她步伐沉穩，行走之間吐息綿長,不似尋常閨閣女子，心中頓時有了個猜測,他看向謝徵：「侯爺，這姑娘……莫非就是孟家後人？」\n只是……侯爺同這姑娘的關係,似乎不太一般？\n謝徵不置可否。\n日頭西斜,他半邊側臉和眼睫都在夕陽下鍍上了一層淡金,瞳仁裡映著樊長玉走遠的身影，眸底的神色濃鬱得不可窺視。\n他道：「晚些時候,你親自送她回去。」\n謝忠微微一愣,想起今天是什麼日子,眼底不由也多了幾分黯然：「您去那裡，身邊多帶幾個人吧，我怕魏嚴……」\n「我有分寸。」\n謝徵打斷謝忠的話,最後看了一眼樊長玉沐著霞光的背影,轉身離去。\n夕陽將他的背影拉得極長,倒伏於這萬千霞光之下,愈顯煢煢孤絕。\n-\n樊長玉進了小院，便聽一房門半開的屋內傳出嘈雜話音。\n「老子不喝這苦得吐膽汁的藥,給老子拿酒來！」\n「朱將軍，您莫要為難小的，您一身舊疾,大夫千叮萬囑了，切莫沾酒。」\n「我滴個親娘哎，老子被關了十七年，再不嘗嘗那燒刀子是個啥滋味，這舌頭都快生鏽了！」\n樊長玉走近，從半開的房門往裡瞧去，只見一方臉大鬍子靠坐在床頭，一名小廝模樣的年輕男子立在床邊，手上端著一碗湯藥。\n樊長玉站的地方有些擋光，叫裡邊的人注意到了她。\n那方臉大鬍子扭頭往外一看，倏地眼眶一紅，不確定般喚了她一聲：「麗華妹子？」\n樊長玉並不認識他口中所喚之人，站在門邊沒動，也沒應聲。\n倒是對方仔細打量她一番後，忽而改了口：「不對，這眉眼不像麗華……麗華也不在人世了……」\n他似欣喜又似難過，幾乎不敢相認，顫抖著嗓音問：「你……是長玉吧？」\n樊長玉一聽他叫出了自己的名字，又想到謝徵先前進京的目的，以及今日突然說要帶自己來見一個人，便猜測這人應當是自己外祖父麾下舊部，一時心中也難掩激動和傷懷。\n她推門進去道：「您認得我？不知您是……」\n對方幾乎掩面而泣，粗聲哽咽道：「蒼天有眼吶！竟讓我老朱有生之年，還能再見到孟將軍的後人！」\n十七年的冤屈和死別，饒是朱有常堂堂七尺男兒，再見故人之女，也不禁泣不成聲，他望著樊長玉道：「我是你朱叔叔，十四歲在你外祖父麾下從軍，從一馬前卒做到振虎校尉，你母親也是我半個妹子。」\n真正得知這人是自己爹娘故人，樊長玉心中激動無以復加，可站的近了，發現朱有常掩在被下的兩條腿，隆起的弧度太過單薄，根本不像一個成年男子的腿應有的大小。\n她只覺一下子喉頭澀然，儘量控制自己的情緒道：「朱叔叔，當年的事，究竟是怎麼回事？您的腿……又是怎麼弄的？」\n朱有常亦是滿面沉痛，他憤聲道：「孟將軍運糧之失，乃是魏嚴那狗賊構陷的！至於我這雙廢腿……」\n他說著拍了拍掩在薄被下的單薄腿骨，故作不在意般苦笑著道：「是當年在羅城戰場上傷的，不提也罷。這十幾年來毫無知覺，倒省了我在牢裡的痛楚。」\n樊長玉想到先前在門口處，謝徵的人說的朱有常的腿已醫不好了，便覺得難過。\n她問：「魏嚴關了你十七年？」\n一提起魏嚴，朱有常便恨得咬牙切齒：「虎符一日沒找到，那狗賊便一日難安，只得把我等想替孟將軍翻案、替謝將軍和承德太子報仇的人關起來。」\n樊長玉驚道：「謝將軍和承德太子的死也和魏嚴有關？」\n朱有常將當年魏嚴以虎符和親筆信讓孟叔遠掉頭回羅城救十六皇子的事詳細同樊長玉說了一遍，又把他和謝徵等人的推測道出。\n他咬緊後槽牙：「那狗賊狼子野心，定是當年便想扶一個傀儡上位，自己把持朝政，才設計了這一切。否則何故承德太子和十六皇子一死，先帝駕崩，他便仗著魏、謝兩家在軍中的勢力，力排眾議推舉了毫無根基的十九皇子繼位？」\n樊長玉得知當年運糧之失的真正緣由和外祖父背負冤屈的真相後，也是久久都沒回過神來。\n除了難過和憤怒，她卻覺著當年的真相肯定還有所隱藏。\n自己的父親在清平縣上十幾年，雖沉默寡言，卻是個忠厚仁善之人，殺豬賣肉，遇上貧苦人家來買，他會故意少收錢。\n誰家有個難處，他也盡力幫襯，就算是碰上乞丐，他都會施捨一一。\n也正是因此，當年宋老秀才死了，宋母孤兒寡母跪在街頭求人施捨一口薄棺葬，她爹娘才毫不猶豫地幫襯了宋家。\n自己的父親當年既是外祖父麾下重將，那他不可能不知道運糧一旦延誤，於孟家意味著什麼，於錦州意味著什麼，於大胤又意味著什麼。\n樊長玉不相信他會為了所謂權勢，幫著魏嚴構陷外祖父，害得外祖父落個千古罪人的罵名，又背負數十萬將士和百姓性命的血債。\n況且俞淺淺曾經說過，齊旻恨隨家人，當年太子妃選中隨家替齊旻脫身，或許也有原因。\n自己父親當年去找的接替運糧軍隊，正是隨家的崇州軍。\n這其中一定還發生了什麼！\n樊長玉猛地抬起頭看向朱有常：「朱叔叔，魏嚴或許真是那大奸大惡之人，但我不信我爹會幫著魏嚴做那等喪盡天良之事！他若當真對不起我外祖父，我娘第一個不會原諒他，又怎會隨他歸隱十六年？」\n朱有常一聽孟麗華隨魏祁林歸隱，便怒道：「定是魏祁林那狡猾之徒哄騙了你娘！」\n樊長玉卻搖頭道：「我娘若對當年的事毫不知情，便不會在我爹被逼自盡後，也隨他而去了。」\n朱有常眼眶紅得厲害，陡然變了聲調：「你娘是隨你爹而去的？」\n樊長玉垂眸掩蓋眼底的澀意：「或者說……她是為了保全我和小妹，才也跟著自盡的。」\n朱有常急道：「到底怎麼回事？」\n塵封的記憶被打開，恍惚間樊長玉又看到了去年臨安鎮那個慘澹的冬天，白色的紙錢和著漫天飛雪一起飄下，覆著薄雪的達到上，官府用板車運回了她爹娘的屍體……\n她啞聲道：「十六年前，我爹娘靠著賀敬元賀世伯幫忙遮掩，才偽造了戶籍落腳在了清平縣。魏嚴寫給我外祖父的那親筆信，也一直在我爹娘手裡。\n「去年初冬，賀世伯被魏嚴授意，要取我爹娘首級。賀世伯本想給我爹娘通風報信，讓他們帶著我和小妹逃亡別處。我爹娘怕連累賀世伯，也猜到以魏嚴的手段，必然不會放過我和寧娘，選擇了自裁，將那信放入一匣中交與了賀世伯，讓他在魏嚴從我家翻找物件時，把那匣子交與魏嚴，以此保我和寧娘的性命。」\n再說起那段往事，樊長玉嗓子眼止不住地發澀：「我爹娘肯定還知道一些內幕，才會被魏嚴滅口。而我爹，必然沒有背叛過我娘和外祖父！唯一知曉這其中內幕的，可能就是隨家人了，可惜長信王夫婦皆已死，只能審審隨家那些下人，看能不能有什麼收穫。」\n旁人不知孟麗華的性情，或許不會把樊長玉的這番說辭當做證據。\n朱有常卻是同孟麗華情同兄妹，對孟麗華再了解不過，他道：「我信不過旁人，但信得過你娘。她性子看似溫婉，骨子裡卻是個剛烈的。」\n「當年你外祖父中了調虎離山計，被一隊北厥兵偷襲了營地，你娘一弱質女流在營帳裡，智殺了兩名闖入帳內的北厥兵。後來若不是你爹及時趕到，你娘差點就自抹脖子，也不願叫北厥兵抓去當人質威脅你外祖父。」\n再說起這些往事，朱有常神色間難掩落寞。\n十七載啊，故人早已長眠於地底，一切都物是人非了！\n他看向樊長玉：「你說得對，魏祁林若真背叛了老將軍，你娘若知情，當第一個手刃他才對。」\n樊長玉則因為朱有常方才是話微微失神了一瞬。\n她記憶中的娘親一直都是溫婉柔和的，甚至連大聲呵斥人的時候都少見，朱有常口中的她娘親，是她從未見過的、卻又燦若焰火的另一面。\n她微微莞爾，為那樣的娘親感到自豪，又為無論娘親是何模樣，她都再也見不到而傷懷。\n朱有常道：「我已聽說了隨家造反一事，要是隨家當真知曉其中內幕，那豈不抓著了魏嚴的把柄？舉旗造反的時候，就該大告天下才是。」\n這番話將樊長玉的思緒拉了回來。\n她道：「隨家造反後不久，的確就有關於魏嚴設計了錦州血案的流言傳出。」\n謝徵就是聽到了這樣的流言，去查當年的事，才被魏嚴設計險些死在崇州戰場上。\n樊長玉只覺那些瑣碎的線索，似乎都慢慢串聯了起來。\n朱有常當即就道：「那流言是隨家放出去的？」\n樊長玉思量了許久，搖頭道：「眼下沒法確定，只能審完隨家的下人再做定斷。」\n朱有常之前的話其實也點醒了樊長玉，隨家若是知曉當年的隱情，又證據確鑿，為何不直接大告天下，揭露魏嚴的罪行。\n而是放出一些空口憑說的流言？\n再聯想俞淺淺當初告訴她的話，樊長玉只能暫且推測出一種可能——隨家在當年的錦州之案裡，手腳也不乾淨！\n至於魏嚴為何留隨家這個隱患至今，其原有就不得而知了。\n為了驗證自己的猜測，樊長玉恨不能現在就回去提審被押送上京的隨家僕役。\n她拜別朱有常後，匆匆出了院門，卻只在門外的馬車處瞧見了那個斷了一腿一臂的中年男子。\n對方斷了一臂，沒法向她抱拳行禮，便只朝她頷首道：「奴謝忠，謝府家將，奉侯爺之命，在此等候將軍，送將軍回去。」\n僅憑「謝府家將」這幾字，樊長玉便萬不會把他當下人看待，猜到他那一腿一臂應當也是在戰場上斷的，心中敬意更多了幾分。\n她也朝著謝忠略一點頭，算是致意。\n因著謝徵不在，她上馬車時不免多問了句：「侯爺去了何處？」\n謝忠正單手拄拐牽著馬韁，聽到樊長玉的話，動作一頓，打量樊長玉幾許後，稍作沉吟，頭一回背著謝徵做了僭越之事。\n他道：「今天乃夫人忌日，侯爺應當是去了謝氏陵園。」\n謝徵是秘密回京的，白日裡祭拜恐會叫暗中蹲點的人發現，故才專挑暮時過去。\n這個答案讓樊長玉掀車簾的手一頓——謝徵的種種反常之舉，都找到答案了。\n她從來都沒聽他提起過關於謝夫人的一字半句，但聽朱有常說了當年被關押的細節和謝夫人的赴死，樊長玉一個局外人都覺得難過，更何況謝徵這個為人子的。\n他不願告知自己這事，想來是不願自己看見他某些時刻脆弱痛苦的模樣。\n樊長玉抓著厚實車簾綢布的五指不自覺收緊，思索片刻，覺得還是該尊重謝徵的決定。\n罷了，自己先回進奏院好了。\n謝忠似看出了樊長玉的決定，繼續道：「血衣騎救走了朱將軍，魏嚴已知曉侯爺現藏身於京中。我怕魏嚴會藉此機會，在謝氏陵園設伏，讓侯爺多帶些人過去，但侯爺年年前去祭拜，都是隻身一人，我又勸不動侯爺……」\n樊長玉眸色變了變，唇角微抿，沉默兩息後，問謝忠：「您能送我去謝氏陵園嗎？」：，，.`

            num: 134,
            title: `第134章第134章`,
            content: `暮色四合,從山腰吹來的風裡已透著初冬的涼意。\n謝氏乃百年鐘鳴鼎食之家，族中的陵園也獨佔了城郊半壁山。\n霜白的月光灑在青石板小徑上，恍惚下過一場初雪似的。\n周遭墳塋林立,在夜裡透出幾分陰森,卻有人踏著月色而來，手上的燈籠在冷風裡搖曳,灑下迷滂滂一片昏黃。\n行至謝臨山夫婦的合葬墓前，那人方才停下腳步,錦靴上的暗金繡紋在燈籠昏黃的光暈裡忽明忽暗，難以辨清。\n邊上提著食盒的老僕蹲下去,將食盒打開,把裡邊的貢品一一端出來,擺在墓前的石臺上：「小姐，相爺來看您了,還帶了您最喜歡吃的壽意苜蓿糕。」\n擺好三樣貢品,老僕又拿出火摺子和黃白冥紙,點燃後慢慢燒在墓前的炭盆裡，絮絮叨叨：\n「大廚房裡做壽意苜蓿糕的聶廚子，這兩年來愈發老眼昏花了,從您出嫁至今,為著他擅做的這一道糕點,相爺便留用了他二十一載,再過兩年，他約莫也做不動了,得請辭回家養老去了。」\n冥紙燃燒的火光蓋過了燈籠的光暈，映出老僕眼底的滄桑和悵然。\n石碑上以行楷鐫刻的字跡也清晰可辨起來，「護國大將軍夫人魏綰之墓」幾字尤為刺目。\n魏嚴肩頭搭著銀鼠皮披風,在明滅的火光裡靜靜凝視著胞妹的墳塋，許久才對老僕說了句：「魏全，你下去吧。」\n老僕起身告退：「那老奴還是和往年一樣，在山下的路口等相爺。」\n魏嚴微微頷首，老僕便將燈籠留在墓前，躬身退下了。\n風颳得大了些，吹動魏嚴披風的下擺，也將火盆裡燃燒的冥紙吹得火星和紙灰四處飄散。\n魏嚴矮身撿起放在火盆邊上一摞還未燒過的冥紙，撕開一點點扔進火盆裡燒盡。\n他始終緘默，哪怕對著的是孤墳荒冢，也道不出一字半句的衷腸。\n謝徵踏著涼薄如水的夜色走來時，瞧見的便是這樣一幕。\n他站在十步開外，諷刺地扯了扯唇角，開口極盡冰冷與尖銳：「你逼死她，又年年今日都來看她，假惺惺地做給誰看？還是怕她在地底下也太安生了，才年年都來噁心她一次？」\n聽到腳步聲時，魏嚴便已知道了來人是誰。\n他側對著謝徵，眼皮都未曾抬一下，置若罔聞地將手中的冥紙全燒完了，才拂了拂衣襟上的灰燼起身。\n往回走快同謝徵擦身而過時，方駐足留下一句：「我還以為，你藏頭露尾數月，連在今日來此祭拜的膽量都沒有了。」\n謝徵眼皮一挑，視線冷若冰刀，映著月輝的臉，恍若覆了一層寒霜，他譏誚一扯唇角：「魏丞相深夜造訪我謝氏陵園，就為看看本侯是否來進香？」\n他側過臉，不無諷刺地道：「本侯自是不懼來此，需借分膽量再來的，是丞相吧？累累血債，終需還不是？」\n魏嚴斜目掃了謝徵一眼，不辨喜怒，一言不發抬腳便要繼續離去。\n他方走出兩步，謝徵神情冷鬱地盯著不遠處父母冷硬的墓碑，夜風吹動他額前的碎發，一雙寒星似的眼裡翻滾著戾氣，他毫無徵兆地拔劍，反手便朝魏嚴劈去，劍風磅礴，快如閃電。\n「叮——」\n一聲令人牙酸的金屬脆響在夜色中響起。\n短兵相接，長鳴銳響，銼出了火星子。\n隱匿在墓園四周的死士全現了身，如臨大敵盯著謝徵，將魏嚴牢牢護在了後方。\n謝徵嘴角勾起一抹冷峭又譏諷的弧度，冷冷盯著立於十餘名死士身後的魏嚴，抬起手中長劍：「你我之間，終歸要做個了斷，不若就在今日吧？」\n話落，他眼神一厲，忽地逼近一名死士，手中長劍在瞬息間連劈出數十記，火星四溢，巨大的力道震得那名死士虎口開裂，湧出的鮮血直接濡溼了刀柄，只得連連後退。\n謝徵俊美的面容在這一刻猙獰恍若厲鬼，周身仿佛瀰漫開了實質般的血煞之氣，長劍在手中揮砍得只剩一道道殘影，厲聲質問魏嚴：「我爹擁護承德太子，阻了你的路，你便設計害死我爹。我娘發現了你的陰謀，你便連我娘也要殺？」\n最後一劍揮出，那名死士手中的長刀直接「叮」一聲斷為兩截。\n他驚恐瞪大了雙眼，卻還是被餘力不減的那一劍橫腰劈中，抽搐著到底不起，身下慢慢暈開了猩紅的血色。\n山風一吹，那股血腥味濃鬱得令人反胃。\n其餘死士愈發忌憚地盯著謝徵。\n此番隨魏嚴前來，都是天字號死士。\n魏府訓養的天字號死士，放到軍中甚至能媲美武將，在謝徵手底下卻沒能撐過半刻鐘。\n謝徵持著滴血的長劍立在不遠處，臉上也沾著細小的血沫子，讓那張過分俊美的容顏只剩邪佞煞氣。\n他問魏嚴：「這十七年裡，你是怎麼有臉來這裡的？」\n風卷著那些燃為了灰燼的紙屑四處飄飛，玄色的衣袍裹出他挺拔的身影，仿佛和這濃稠的夜色融為了一體。\n魏嚴聽著他字字珠璣的指控，一言不發。\n冥紙的灰燼飄落在他肩頭，恍惚間，他本就斑白的兩鬢，白髮似乎更多了些。\n護在魏嚴身邊的死士警惕盯著被其餘死士攔住的謝徵，對他道：「丞相，此地危險，卑職護送您先行一步離開？」\n魏嚴面卻抬手示意那名死士退下。\n死士面上露出些許怔愣，但還是不敢違背魏嚴的意思，收劍退到了魏嚴身側。\n魏嚴隔著兩丈距離同謝徵對視，眼底諱莫如深：「你恨我，是應該的。你不想著殺我，終有一日，我也會斬下你首級。只是你不該自負在此處同我交手。」\n他拂去肩頭披風沾到的紙灰：「憑你一己之力，還滅不了我所有天字號的死士。你娘看著的，我也不會在此地為難你，擾她清淨。」\n魏嚴轉身朝著夜色更濃的青石板小逕往前走。\n謝徵持劍立在原地，忽地冷笑出聲：「她活著的時候，你容不得她。她死了，你這般裝模作樣，真當她泉下還能有知？」\n魏嚴身形微頓，隨即依舊沒發一言地繼續往前走了。\n圍住謝徵的死士們卻不敢放鬆警惕，一個個握著刀柄的手心全是汗，生怕謝徵再突然發難。\n在確定魏嚴走遠後，才拿刀對著謝徵，退出一定距離後方轉身飛快地離去。\n整個陵園又成了一片死寂，因著已是初冬，連蟲鳴聲都不再有。\n一盞提燈在方才打鬥時翻倒在地，紙糊的燈籠筐子和竹篾編的骨架都已燃燒殆盡，只剩潑灑在青石板上的燈油還在徐徐燃燒，偏藍的細微火光照出謝徵那張濺著血色的臉，像是鍍上了一層蒼寒的霜。\n他偏頭看向不遠處謝氏夫婦的墳墓，一動不動靜立在那裡，恍若一座雕像。\n往事一幕幕浮現在眼前，在魏府度過的那十六個年頭的記憶，從未這般清晰過。\n從他五歲那年開始，每逢清明或是祭日，魏嚴都會帶他來謝氏陵園，車夫和護衛皆留候在山下。\n魏嚴說，他母親生前喜靜，帶太多人來這裡，會擾了他母親清淨。\n他懼魏嚴的嚴厲，又恨母親狠心拋下他而去，每次跪在墓前，除了焚冥紙叩首，再無別話。\n魏嚴亦是如此，他總是沉默著，來了這裡，卻又在墓前靜立許久才肯離去。\n灑在地上的燈油燃盡了，那泛著藍光的焰火「撲哧」一聲熄滅。\n天地間除了那清冷的月輝，一絲旁的光亮也無了。\n謝徵終於邁動腳步朝父母的墓前走去，看著鐫刻在冰冷石碑上的「魏綰」二字，抬手撫了上去，低垂的眼睫浸著月光，在眼瞼下方落下一層淡淡的陰影。\n壓抑、陰沉、窒悶和仇恨像潮水一樣裹挾了他，拽著他往無盡的深淵裡墜。\n謝徵垂在身側的另一隻手不自覺收攏，下頜骨咬緊，額角青筋都凸起一條，眼底隱約可見幾絲猩紅。\n不遠處有急促的腳步聲朝這個方向奔來，噠、噠、噠……\n恍若踏在誰的心弦之上。\n謝徵掀眸瞥去，便見一團不大的暖光在暗沉的黑夜裡朝著他快速靠近。\n他看到了少女暈著燈籠昏黃光亮的裙擺，也看到了她因奔跑在夜風裡揚起的髮絲，還有她因急促奔跑而升起紅暈的臉和滿眼的擔憂。\n很奇妙的感覺，心底那些晦暗、沉鬱的情緒都在漸漸消退下去。\n終有一日，他滿身瘡痍，卻也被奔向他的太陽照耀到了。\n樊長玉在山下時就聞到了風裡送去的血腥味，擔心謝徵受伏，謝忠暗中盯著了魏嚴留在山下的車馬，樊長玉則一路狂奔上山。\n她在來的路上就看到了地上的一大攤血跡，見謝徵臉上也沾到不少鮮血，忙用燈籠照著看他身上有沒有受傷，嗓音不自覺發緊：「你怎麼樣？魏嚴的人在此設伏了？有沒有受傷？」\n她連珠炮似的問了一堆，因為跑得太急，呼吸不順，話音裡還帶著喘意。\n她急著查看謝徵身上的傷勢時，身前的人卻只垂眸一瞬不瞬地盯著她。\n樊長玉沒在謝徵身前發現傷口，但他身上的血腥味實在是濃鬱，樊長玉擔心他後背有傷，忙道：「你轉過去讓我看看！」\n謝徵沒動。\n樊長玉已從謝忠那裡得知了他回謝氏宗祠領一百零八鞭的事，聯想到他後來回盧城找自己，她當然知道他領那一百零八鞭是為何。\n趕來的這一路，她就沒壓下過眼眶裡的澀意。\n眼見謝徵不配合，她擔心他真是傷到了後背，心下焦急，不由伸手拽他手臂，想讓他轉身讓自己看看。\n怎料身前的人卻突然抬臂按著她後頸，將她用力壓入了懷中。\n幾乎要勒斷她腰身的力道，叫樊長玉呼吸都變得有些困難。\n手上的燈籠也在踉蹌之時掉落在地，不過瞬息被火舌燎燃。\n「你不該來。」\n樊長玉側臉被迫貼著他冷硬的胸膛，聽到他低啞冷沉的嗓音自頭頂響起。\n明明是拒絕的話，樊長玉卻有種自己再也掙不脫他束縛的錯覺。：，，.`
        },

            num: 135,
            title: `第135章第135章`,
            content: `蒼穹似潑灑了濃墨,萬籟俱寂。\n相擁的兩人近得只能聽見彼此的心跳聲。\n樊長玉抿緊唇角，忽地用力推開謝徵。\n在確認他安然無虞後，她這一路的擔憂便化作了心有餘悸,還有一股陡然升起的怒意和她自己也不甚明白的委屈。\n她質問道：「我是不該來。但你孤身前來,若是真中了魏嚴的埋伏，你讓謝家怎麼辦？讓你麾下那些部將怎麼辦？」\n謝忠說他跪在謝氏先祖的牌位前領了一八零八鞭,受罰完畢後整個後背一塊好肉也沒有，伏跪在血泊中連站都站不起來的場景仿佛就在眼前。\n樊長玉不知是不是被這山上的風吹迷了眼,眼中隱約可見幾絲紅意。\n她盯著跟前的人，袖中緊攥成拳的手止不住地發顫,強撐著面上的冷硬,問出最後一句：「你讓我又怎麼辦？」\n這話讓謝徵陡然抬眸,瞳孔微不可見地一顫，似有些難以置信她會說出這樣的話。\n樊長玉眼眶通紅,咬緊牙關狠狠地瞪著他,像是一頭走投無路又受傷的豹子：「從知道你身份那一天起,我就沒想過跟你再有交集，是你幾次三番地招惹我！」\n「後來說就此別過的是你，隔著謝將軍的大仇,我不怪你。但在盧城慶功宴後,同我說,不管我姓樊還是姓孟,都只想同我好好在一起的也是你！你現在是又想不認帳嗎？」\n那些一直擠壓在胸口的情緒潮水般湧了上來，幾欲吞沒理智。\n樊長玉從懂事起,就鮮少在人前顯露自己的委屈，這是唯一一次她控制不住情緒，衝著眼前人恨聲吼道：「謝徵,你混蛋！」\n為什麼不帶人手過來？\n他可以不告訴她，今天的是他母親的忌日，畢竟並無具體的證據表明她爹是清白的，帶著興許是仇人女兒的人同來祭拜，他愧於父母。\n她不怪他。\n但是他為什麼要讓自己置身險境？\n從知道他來盧城找自己前領了罰，樊長玉就明白謝臨山的死終究是壓在他心頭的一座大山。\n他在她跟前不顯山不漏水，背地裡卻在用自己的方法向父母贖罪。\n今夜孤身前來，也是為了「贖罪」嗎？\n樊長玉在感情上一向遲鈍，從謝忠口中聽說今天是他母親忌日時，她不過也只是短暫地失神了一下，直至此刻，那些被她刻意淡化的難過和委屈才衝破了繭蛹，齊齊湧上心頭，逼得她喉間發哽。\n眼眶澀疼得厲害，樊長玉不想哭，死撐著沒眨眼，不讓匯在眸底的眼淚掉下去，幾步開外謝徵的模樣便在強忍的淚光裡變得模糊。\n哪怕已看不清了，樊長玉還是死死地盯著他，開口艱澀又堅決：「沒有確鑿的證據，我沒法向你證明我爹是清白的，或許往後也找不到能查明真相的證據，那麼我爹始終都有可能是幫著魏嚴害死謝將軍的兇手。」\n「你同我在一起，終日都會心懷愧疚，在痛苦與掙扎中度過後半生。」\n胸腔似被冷風豁開了個口子，冰冷得刺痛。\n樊長玉嗓子眼也澀疼到發啞，強忍在眼眶裡的那滴淚漫過眼瞼，直接如碎珠一般滾落出去，甚至沒在臉上停留。\n她深吸一氣口道：「與其這樣，我們不如還是分開罷，我不想這樣。看你獨自痛苦煎熬，我心裡一點也不好受，或許你一開始就不該再回來找我，有的時候，長痛就是不如短痛……唔……」\n她一句話還沒說完，忽地被人扣住脖頸，重重地釘在了墓前一棵碗口粗的柏樹幹上。\n背部生疼，但樊長玉無暇顧及。\n謝徵滾燙的吐息就在跟前，他眼中一片猩紅，下頜肌咬緊，兇狠又暴戾，像是一頭臨近發狂的野獸。\n遏在她前頸的那隻手，青筋繃起，力道大得令人心驚。\n他垂首看她，似在竭力控制自己的情緒，不讓自己做出傷害她的事，殘存的理智拉扯著胸腔中叫囂著的黑色怒意，艱難又狠決地開口：「不要再說這樣的話……」\n那一瞬他眼神裡的確是帶著恨意的。\n「你罵得沒錯，我就是個混蛋。我就是死，都只會把你拖進我的棺材裡，你跟我說分開？」\n他淺淺地笑了聲，濺著血沫子的臉在月光下昳麗又蒼白，突然低下頭去，發狠地在她肩膀處咬了一口，眼神裡透著幾近癲狂的愛意和孤注一擲的狠決。\n樊長玉吃痛悶哼出聲，想掙扎，卻被他壓在樹上，下了死力道禁錮得牢牢的。\n謝徵再抬起頭來時，額前的碎發被風吹亂，唇邊沾著血跡，面容更顯豔麗，一如話本中寫的那些夜裡出沒專吸食人精氣的妖孽。\n他低聲呢喃：「分開？樊長玉，我怎麼就沒把你嚼碎了一口一口吞下去？」\n樊長玉抬起眼，面無表情盯著他，在他抬起一隻手想觸碰她臉時，突然發難，整個人暴起，反扼住他那隻手用力一掀。\n謝徵一時不妨，被她用蠻力掀倒在地，後背結結實實撞在了墓前的青石板地磚上，發出一聲悶響。\n樊長玉不等他起身便如豹子般撲了過去，一隻手鎖住他前頸，腿腳壓在他腰腹兩側制住他的行動，就像他剛才鉗制自己一般，將他壓得死死的。\n她恨聲道：「那明知魏嚴正盯著你，還自身來這陵園自投羅網的又是誰？」\n「你介意我的身份，不願告訴我，多帶幾個侍衛都不成嗎？」\n說到後面，樊長玉喉頭抑制不住地有些發哽：「你跟我在一起，對謝將軍謝夫人愧疚自責，我心底又好過了？」\n謝徵望著壓在自己身上，鎖住自己咽喉兇狠又狼狽的少女，神情微怔，終於明白了她說那番話的緣由，抬起一隻手按在她後背，將她用力壓向自己，道：「不是你想的那樣……」\n樊長玉掙脫他的懷抱，坐起來恨恨瞪著他道：「那你說是怎樣？」\n謝徵被樊長玉甩開了手，也沒起身，就這麼仰躺在墓前的青磚地上，眸光微黯地望著漆黑的夜空道：「我沒同你說過我母親的事吧？」\n「她在我爹的靈柩回京後不久，便也自縊而去了，那一年我四歲。她死的那天，還給我做了桂花糕，穿了她最喜歡的衣裳，在鏡前描眉點唇，我被她哄出門吃個糕點的功夫，回來她便已是懸在梁上的一具屍體了。」\n樊長玉怔住。\n「我被她託付給了魏嚴，在魏府過了十六載寄人籬下的日子。年幼時，被魏嚴的好兒子在盛夏裡往被褥裡塞過蛇，在嚴冬往床鋪上倒過冷井水，也被他撕毀先生布置的課業……」\n「每每那時，我都會想她，也恨她，恨她身為大家宗婦，卻軟弱擔不起宗婦之責，恨她為人母，卻未盡母親之責狠心舍我而去。更多個深夜裡，我都是在噩夢中見到她蕩在橫梁下方的那截豔麗的裙擺。」\n謝徵笑了笑：「我以為魏嚴憎惡我，是我貪吃那一碟桂花糕，離開了我母親，才讓她有了機會自縊。我其實也是恨我自己的……」\n樊長玉聽他用這般平靜的語氣說起自己幼年的經歷，仿佛是在說旁人的事，放在膝前的雙手不自覺攥緊。\n她只從朱有常那裡聽說，謝夫人是為了保謝徵和參與進了揭發魏嚴的謝家舊部而死，卻不知謝徵同他母親之間有這麼多誤會。\n自己父母意外身亡時，她若不是為了長寧，都不會那麼快振作起來。\n他幼年便失了雙親，在當時怕是天都塌了，在心底把母親的死歸咎於自己，還在魏府備受欺凌。\n樊長玉想起他當初聽聞自己小時候給宋硯送過一對泥人，便也要給他也補一對。\n那時她在心底裡覺著他幼稚，眼下卻隱隱有點明白了。\n正是因為他從小就沒得到過任何溫暖和慰藉，所以才會連她給過宋硯的一對泥人也想要吧。\n心口的地方揪疼得厲害。\n樊長玉看著仰躺在自己身側的人，伸出手，很輕地摸了一下他的頭，說：「謝夫人的死，，不怪你。」\n謝徵自嘲道：「我恨了她足足十七載，才知道她是為我死的。」\n「不告訴你今天是她忌日，不是介意你的身份，是我自己都沒想好要如何來見她……」\n樊長玉心中五味陳雜，低聲道了句：「對不起。」\n是她誤會他了。\n謝徵偏頭看她，笑問：「道歉做什麼？我又沒同你說過這些，你會誤會也是難免。」\n他屈膝坐起來，肩背肌肉的形狀在衣袍下很是明顯：「是謝忠告訴你我在這兒的？」\n樊長玉怕他怪罪那瘸腿老伯，忙道：「是我看完朱叔後出來不見你，主動問他的。」\n謝徵說：「他這嘴越來越不嚴了。」\n樊長玉抿唇道：「他也是擔心你，不論如何，你只身前來祭拜謝夫人，都太危險了些。」\n謝徵垂著眼沒說話，月華切出他側臉的的輪廓，透出幾分冷硬和倔強。\n樊長玉以為他還在為謝夫人的事難受，也不再多言，只道：「沒出事就好。」\n謝徵突然開口：「從前來祭拜母親，他教我不要帶旁人的。」\n樊長玉有些困惑地問：「誰？」\n謝徵卻不再說話了，起身看向身後父母的墓碑，跪下磕了三個響頭。\n樊長玉兀自猜測著他口中教他的那人，思來想去，唯一可能的竟然是魏嚴。\n她暗暗一驚，心道既已知魏嚴就是害死他爹娘的仇人，他為何還記著魏嚴從前說的話？\n但想到魏嚴畢竟是他舅舅，在那十幾年裡，謝徵其實一直都把他這世上唯一的親人看待的，甚至當了魏嚴手中最趁手的一把刀。\n魏嚴再苛待謝徵，卻也從未在武學和念書上短過他。\n哪怕如今反目，謝徵對魏嚴，大抵還是有著不一般的感情的吧？\n樊長玉看著他頎長高瘦的背影，心緒格外複雜。\n謝徵叩首後起身，忽而看向樊長玉：「給爹娘磕個頭吧。」：，，.`

            title: `第136章第136章`,
            content: `樊長玉跟一頭呆鵝似的愣在了當場。\n謝徵見她傻站著沒動,說：「不必害羞。」\n樊長玉微惱地瞪他一眼，顧及這是謝將軍和謝夫人的墓前，還是多了幾分拘謹。\n她收回目光轉看向謝將軍夫婦的墓碑,一想到自己前一刻還同謝徵在墓前掐架呢,面上頓時就更不自在了。\n她屈膝跪了下去：「晚輩長玉，孟叔遠之後,拜見將軍和夫人。」\n言罷俯身磕了個頭。\n她外祖父曾是謝臨山麾下重將，兩家的淵源,說來也算不得淺。\n謝徵聽她以孟家後人的身份祭拜自己父母，面上沒什麼表示,只對著那靜默在夜色中的墓碑道：「這是你們未來兒媳。」\n樊長玉破天荒地紅了次臉,起身後對謝徵兇巴巴地道：「你別胡說。」\n謝徵微微挑眉：「我這輩子,不娶你，還能娶誰？你早晚都是他們兒媳的,如何是胡說？」\n樊長玉索性不搭理謝徵了,轉頭看向來時的路：「耽擱了這麼久,快些下山吧，不然忠叔在在山下該擔心了。」\n那隻打翻的燈籠早已燃盡，借著月光,依稀能瞧清她紅透了的耳垂,像是被白雪覆蓋的火棘樹上綴著的火棘果,紅豔豔的讓人想咬上一口。\n謝徵眸光微深地盯著樊長玉的耳垂。\n樊長玉說完那話一回頭,便對上謝徵暗不見底的一雙眸子，她微微一愣,下意識捏住了自己發燙的耳垂，催促道：「走了。」\n言罷便率先邁開了步子。\n謝徵望著她幾乎是落荒而逃的背影，淺淺提了下唇角,不急不緩地邁步跟上。\n-\n戌時一過，丞相府所在的大街便是一片死寂，犬吠都難聞一兩聲。\n魏嚴的車馬在府門前停下，冷風一吹，長街兩側榆楊樹梢枯黃的霜葉便鋪落一地，悽清蕭索。\n魏嚴方踩著杌凳走下馬車，魏宣便大步從府門踏出，面色焦急地迎上前：「父親，您可算回來了……」\n魏嚴蒼老卻威嚴更甚的一雙鳳眸瞥向自己獨子，開口便是訓斥：「慌慌張張，成何體統？」\n魏宣在人前狂妄，懼怕魏嚴，卻似已成了他刻在骨子裡的本能，他咬了咬牙，有些難過地道：「母親病了，您……」\n魏嚴抬腳邁上府門前的石階，吩咐跟在自己身後的老僕：「魏全，拿我的令牌，去太醫院請胡太醫。」\n魏宣亦步亦趨跟在他身後，見魏嚴進了府，又是往他書房所在的方向去，他垂在身側的手緊握成拳，終是朝著魏嚴的背影吼了一聲：「您就不能去看看母親嗎？」\n這一聲，他是在為自己的母親鳴不平。\n但隨行的下人明顯都頭皮一緊，大氣不敢再喘一聲。\n魏宣也是頭一回頂撞自己孺慕的父親，他倔強地盯著魏嚴的背影，哽咽道：「大夫來看過了，說母親是憂思成疾，母親不讓我來找您……她說，不能給您添麻煩，您去看看她吧……」\n魏宣有些狼狽地用手背擦了一把眼，他在外人跟前囂張如霸王，但在魏嚴跟前，無論何時，都還束手束腳如稚子。\n魏嚴頓住腳步，只冷冷瞥了魏宣一眼，一語不發地朝書房去了。\n一眾侍者忙跟了上去，只餘魏宣立在原地，自嘲又難過地咧了咧嘴，笑得比哭得還難看。\n管家魏全在人都走完後，才上前道：「公子莫要憂心，老奴已遣人去太醫院請胡太醫了，相爺近日事多如牛毛，實在再無精力處理內宅之事。」\n魏宣頸下青筋凸起一條，死死咬著牙關道：「是不是我沒謝徵出息，父親不喜我，便連帶著也遷怒母親了？」\n魏全忙道：「公子休要胡言，這話傳進相爺耳中，公子又要受罰了。」\n魏宣哈哈大笑起來，眼底全是不甘：「受罰便受罰，這麼多年來，也只有我每次做錯事，他責罰我時，才會正眼看我。我比不上謝徵，也比不上他手底下那些得意門生，我身上除了流著他的血這一條，還有什麼值得他多看我一眼的？」\n魏全眼神複雜地看著似哭非哭的魏宣，只說：「公子莫要妄自輕賤，坐在相爺那個位置，所思所慮之事太多了，無暇顧及後宅也是情理之中，老奴送公子回去吧。」\n魏宣何嘗不知魏全的話在理。\n有時候他也不知自己是在怨魏嚴，還是在怨他自己。\n魏嚴除了他母親這位正室夫人，再無旁的姬妾。\n但從魏宣記事開始，魏嚴幾乎就只有吃年夜飯時，才去他母親的院落用個飯，晚上也不留宿，這十幾年裡，他都是住在書房。\n魏府的下人都極為規矩，從來沒人敢給他們母子臉色看，一品誥命夫人該有的尊貴，他母親都有。\n但魏宣越長大，還是越替自己母親難過。\n魏嚴眼裡從來就沒有過他母親，他似乎天生就不喜女色，唯愛權勢。\n可他母親家世平平，外祖家靠著魏嚴扶持，才當上了個五品京官，終於能在京城站穩腳跟。\n魏宣從前為了讓魏嚴多管束自己，屢屢犯渾，留宿秦樓楚館，豢養歌姬這些混帳事他都做過，至今他院子裡還有一堆鶯鶯燕燕，對於男女之間的那點事，他再清楚不過。\n他想不通父親眼裡既然只有權勢，當年為何又要娶毫無背景的母親。魏家乃百年世家，魏嚴年輕時，甚至同謝臨山並稱「文武雙壁」，他要娶妻，整個京城有的是名門貴女任他挑。\n既娶了他母親，這麼些年，身邊也再沒過旁人，魏宣想魏嚴年輕時大抵對她母親也是有感情的。\n只是自己讓他失望了，他才連著母親一起冷落了。\n魏宣在旁人跟前脾性一向渾，只有在魏全這個他父親身邊的老僕跟前，才流露出孩子氣的一面，他坐在石階上，抬手覆在眼前，苦澀道：「我要是謝徵就好了，有這麼個出息的兒子，父親大抵便能高興了吧？」\n他母親吃齋念佛，提起魏嚴，語氣中也都是敬重有加，同他說的最多的話，便是要好好念書，好好習武，成為有本事的人，為他父親所用……\n但魏嚴似乎不喜歡孩子，從小魏宣就怕他，因為母親和外人對魏嚴的態度，他又對他滿心孺慕之情。\n小時候也不是沒想過要把什麼都做到最好，從魏嚴那裡得一兩句嘉獎。\n但在謝徵來到魏府之前，魏嚴偶爾還會對他和顏悅色，指點功課時雖嚴厲，卻也不會過多苛責。\n謝徵來了之後，他便再也沒見魏嚴對自己笑過了，他和謝徵同吃同住，魏嚴每每見他們，面上都是一片陰沉。\n謝徵總是很聰明，不管學什麼，先生一教他便能學會。\n偶爾魏嚴抽考他們學問時，謝徵就算害怕，也能舉一反答出來，反之他在魏嚴跟前答問時，只要魏嚴那雙凌厲的鳳眼從書卷上移到他身上來，他便渾身抖如篩糠，一句話都說不出。\n他怨恨謝徵讓自己丟臉，也怨恨他把自己襯得像個草包，讓魏嚴看他的眼神裡再也沒有過了讚許之色。\n他不止一次地想，要是世上沒有謝徵這個人就好了。\n所以幼年時，他不留餘力地欺凌謝徵，有那麼一兩次叫魏嚴知曉了，他被罰跪了祠堂，事後便愈發變本加厲地在謝徵身上討回來，謝徵便連告狀都不敢了。\n但他並沒有感到多開心，一開始他往謝徵被褥裡塞蛇蟲，還能嚇得謝徵驚惶大叫，後面謝徵只會眼都不眨地捏死他放進去的蛇蟲。\n嚴冬他往謝徵的床上潑冰冷刺骨的井水，謝徵把溼透的床褥扔到地上，合衣就著光禿禿的床板睡上一夜，第二天發著高熱，依舊能在演武場上贏他。\n他在書院裡帶著一眾捧高踩低的官員之子，把墨水倒滿謝徵的書桌，在假山後領著人痛毆他一頓，踩著他的臉碾進泥水裡，譏誚道：「謝臨山的種，也就這樣。」\n他希望謝徵能就此變成那樣一灘爛泥有多好。\n可謝徵從來不求饒，他被他的嘍囉們按著手腳，被他踩著臉摁進泥地時，看他的眼神也只是冷冷的，黑漆漆的讓人瘮得慌。\n後來謝徵便去了軍中，再相見時，他從沙場歸來戰功赫赫，愈發把他比得什麼都不是。\n也是一個雨天，他被謝徵打斷幾根肋骨，踩著臉碾進滂沱雨地裡，冷冷嘲諷：「魏嚴的種，也不過如此。」\n他曾經給謝徵的，謝徵都一一還回來了。\n從那時起，他就愈發恨謝徵，知道謝徵死在崇州戰場上時，沒人知道他有多高興。\n可就算謝徵「死了」，他去了西北，也沒能接管好他手中的軍隊，反而還把整個西北搞得一團糟，讓魏嚴又被李黨抓住了彈劾的把柄。\n時隔多年，魏宣終於肯承認，其實他就是嫉妒謝徵，嫉妒到恨自己為什麼不是他。\n魏全聽到他的話，只說：「侯爺是侯爺，公子是公子，公子無需同任何人比較。」\n魏宣垂首苦笑，望著倒影在地上的竹影，也不願在魏全跟前多說，繼續丟人現眼了，他起身道：「我回去陪母親。」\n魏全頷首恭送他遠去。\n到了魏夫人所住的院落，魏宣還沒進房便聽見了裡邊傳來的撕心裂肺的咳嗽聲。\n他想起魏嚴冷漠離去的那個背影，心口愈發酸澀，見丫鬟端著剛煎好的藥從小廚房那邊過來，道：「我給母親送去。」\n丫鬟明顯有些懼他，不敢推辭，恭敬遞上端藥的託盤。\n魏宣皮糙肉厚，直接端起了上邊那隻描金邊的青瓷藥碗，大步走進了房內。\n「母親，喝藥了。」他一進屋，便有僕人端上一張圓凳放到了床邊。\n魏夫人在病中，氣色並不好，她算不得傳統意義上的美人，相貌平平，只是多年吃齋念佛，眉宇間透著一股慈悲。\n她寬慰獨子道：「老毛病了，不是什麼大事，我躺幾天就好。」\n魏宣垂首用湯匙攪著碗裡褐色的藥汁道：「父親聽說您病了，也很憂心，只是如今朝中局勢不明朗，父親那邊還有諸多大臣在議事，實在走不開，這才沒來看您，但已派人去太醫院請太醫了。」\n魏夫人一聽魏宣說這些，原本平和的眸色就變了變，她問：「你去找相爺了？不是同你說了麼，這等小事，莫要去擾相爺……」\n魏宣道：「不是我去找父親的，府上就這麼大，您病了要請大夫，哪裡瞞得住……」\n魏夫人咳得更厲害，看著兒子有些吃力地開口：「休要瞞我，你怎麼……」\n她似有些無奈地嘆息了聲：「怎麼就是不聽為娘的話？」\n被母親識破謊言，魏宣有點難堪地垂下首，捏著藥碗的手用力扣緊：「母親，是不是兒子沒出息，讓您覺著無顏去找父親？」\n魏夫人掩唇低咳幾聲，虛弱道：「傻孩子，說什麼傻話？」\n魏宣眼眶通紅地抬起頭：「是兒子沒本事，不得父親喜歡，才讓您也跟著受冷落。」\n魏夫人微微一怔，眼底翻湧著複雜的情緒，溫聲道：「別瞎想，相爺是做大事的人，大丈夫不會拘泥兒女情長，你可莫要去相爺跟前說這等話。」\n魏宣恨聲道：「可這些年裡，父親只有你年節才來您這裡吃個飯，母親您就不委屈？」\n魏夫人神色間有一瞬間的悵然，似回想起了什麼往事，只說：「傻孩子，莫要這般想，為娘從來沒覺得委屈，相爺是為娘的恩人，你要有出息，像你謝表弟那般，好生替相爺分擔肩上的擔子。」\n魏嚴同謝徵的決裂，魏夫人一不管事的後宅女子還不知曉，只當謝徵是在北地，才幾年未曾歸家了。\n魏宣敏銳地抓住了魏夫人話中的一句，問：「母親為何說，父親是你的恩人？」\n魏夫人垂眼沒立刻答話，掩唇咳了好一陣才道：「生做了女人，嫁人便是第二次投胎，為娘當姑娘時，因是家中庶出，衣食用度樣樣得看人臉色。嫁入相府這二十多年，相爺待我不薄，為娘知足了。」\n魏宣知道他母親就是個不爭不搶的性子，伺候魏夫人喝藥，沉默著不再多問。\n-\n樊長玉和謝徵從謝氏陵園回來時，已將近亥時，城門已關，樊長玉只能等第二天城門開了，再回進奏院。\n好在她出門前，已交代了謝七，她便是一夜未歸，應該也出不了什麼亂子。\n謝忠駕車帶著他們回了城外的莊子，馬車剛至門口，便有血衣騎的人候在外邊，呈上一封信件：「主子，長公主從宮裡遞出來的消息。」\n謝徵抬手接過，撕開信封后，借著門口的燈籠光一目行看完信紙，眸色陡然森寒。\n樊長玉聽他同長公主竟有書信往來，心中剛覺著怪異，見他臉色不對，問：「怎麼了？」\n謝徵將信紙遞給她，從牙縫裡擠出幾個字：「魏嚴曾私通后妃！」\n樊長玉還沒來得及看信，但聞言心裡也是一個咯噔，魏嚴曾私通后妃，是不是說明，他策劃十七年前的錦州一案便有跡可循了？：，，.`

            num: 137,
            title: `第137章第137章（捉蟲）`,
            content: `樊長玉展開信紙,看完信上所寫內容後，眉頭不自覺擰起。\n長公主幫忙查關於十六皇子的事，但十六皇子死去多年,賈貴妃也在十六皇子死後不久隨先帝一起駕鶴西歸,原本的宮殿都早已住進了齊昇的寵妃，宮裡的宮人也換了一批又一批,想找到個當年的知情人實在是艱難。\n長公主暗查了多日，才查到冷宮當值的一名老宮女乃是當年賈貴妃宮裡伺候的人,只不過十七年前就瘋了，被趕到了冷宮去自生自滅。\n長公主的人靠著送吃食送衣物,與那瘋癲的宮女接洽了多日,隱晦察覺到那宮女是裝瘋的,但那宮女很警惕，不肯對長公主的人卸下防備。\n長公主的人尋了個恰當時機問起十六皇子的事,那宮女情緒明顯異常激動,借著裝瘋賣傻道出一句：「死了,都死了，我也會死的……魏嚴私通后妃，知道的人都得死……」\n長公主的人沒能再多問出什麼,冷宮的管事嬤嬤就進院來了。\n宮裡個個都是人精,長公主的人突然隔三差五往冷宮跑,還給一個瘋癲的宮女帶好東西,是人都會起疑心。\n長公主的人給了冷宮那位管事嬤嬤不少孝敬，謊稱自己是偶然路過冷宮,看到那瘋宮女捧著碗發臭的餿飯吃，於心不忍，這才接濟了一二。\n冷宮的管事嬤嬤雖沒追究什麼,但保險起見，長公主的人短時間內也不敢再去冷宮打探消息。\n樊長玉看向謝徵道：「為今之計，我們得先弄清楚魏嚴私通的是哪位后妃……」\n謝徵知道她在懷疑什麼，魏嚴在承德太子和十六皇子死後，扶持了毫無根基的十九皇子繼位，十九皇子的生母最為可疑。\n他道：「不可能是小皇帝生母，小皇帝生母只是一宮女，被先帝醉酒後臨幸，生下他後便難產而去了。」\n魏嚴扶持齊昇繼位，最大的原因，想來還是他年幼又無外戚，好掌控。\n那唯一的突破口，就只剩冷宮那瘋癲的宮女了。\n他眸色涼薄如雪：「我親自潛入冷宮一趟。」\n樊長玉回想當日進宮受封時在午門外看到的那高達十餘丈的城臺，道：「皇宮戒備森嚴，尋常日子無詔進宮只怕不易，我聽唐將軍說，不久後宮裡還要辦一場慶功宴，不若那時再探冷宮，也免得打草驚蛇。」\n謝忠擔心謝徵安危，也點頭道：「雲麾將軍思慮周全，侯爺且先部署一二，等到宮宴那日再去。」\n謝徵思量幾許，緩緩點了頭，一語不發邁步進院。\n樊長玉看著他清冷孤絕的背影，眼底浮現出幾分淺憂。\n原本還覺著魏嚴一手設計錦州慘案有待商榷，加上私通后妃這一條，似乎就是板上釘釘的事了。\n從前她以為魏嚴於謝徵只是單純的仇人而已，但今晚的謝氏陵園之行，讓她意識到謝徵對魏嚴的感情其實是很複雜的。\n當年的真相每深挖一步，似乎就是把一柄抵在他心口的刀往前多推進一寸。\n-\n奔波到大半夜，但樊長玉等人還晚飯都沒用。\n謝忠命廚房備了飯，朱有常舊疾纏身，已入睡，用飯的便只有樊長玉和謝徵，但謝徵自從回房後，便再也沒出來，只吩咐底下人好生安置樊長玉。\n謝忠命下人單獨往謝徵房裡送一份過去，但被原封不動地送了回來。\n謝忠明白謝徵的脾性，有些無奈地嘆了口氣，揮退送飯的血衣騎，對樊長玉道：「將軍且用飯吧，讓主子自個兒靜一靜。」\n樊長玉想起自己趕去陵園時，看到的謝徵站在謝將軍夫婦墓前的那道落寞背影，道：「我給他送去。」\n謝忠眼底划過一抹詫異，但想到謝徵對她的諸多特殊之處，面上露出幾分寬慰的笑意：「那便有勞將軍了。」\n面對謝忠那仿佛看穿一切的眼神，樊長玉端起託盤上的飯食後，只能趕緊問謝徵的房間在何處來掩飾自己的尷尬。\n-\n月朗星稀，簷下的燈籠在房門和石階上照出道道竹影。\n樊長玉看著透著一片暖光的屋子，單手託著雕花的木質託盤，抬起另一隻手敲了敲房門。\n屋內隔著一段距離傳來謝徵冷沉不耐的嗓音：「說了不用送飯，退下！」\n樊長玉道：「是我。」\n屋內靜了好一會兒，才繼續響起那道清冷低啞的嗓音：「門沒上栓。」\n樊長玉推門進去，第一眼並沒在外間瞧見人，只有淨室隱隱傳來水聲，她本想過來寬慰謝徵一兩句的，此時忽地生出幾分不自在，背對著淨室那邊道：「我把飯菜給你放桌子上了，你洗完出來記著吃。」\n淨室那邊沒再傳來話音，連水聲也沒再響起。\n樊長玉心中困惑，又怕謝徵出了什麼意外，只得又喚了聲：「謝徵？」\n還是沒人應聲。\n樊長玉轉頭瞪著那邊道：「你再不應聲，我去找人進來看了？」\n裡邊終於傳來一道低醇微啞的話音：「幫我把床邊換洗的衣物遞進來。」\n樊長玉耳際染上一層淺粉，她轉身道：「我去讓忠叔幫你遞。」\n淨室裡響起了動靜頗大的水聲，裡邊的人道：「罷了，我自己出來取。」\n隨即傳出一聲悶響，跟著是什麼陶器被打碎的聲音，隔著一道布帘子，樊長玉都聞到了酒味兒。\n淨室裡怎麼會有酒？\n樊長玉擔心謝徵是喝醉了，出浴時不小心摔了，怕他扎到碎瓷片，也顧不得其他的，忙掀簾進去：「你沒事吧？」\n看清裡邊的情形，樊長玉忽覺手腳都有些無地是從。\n天氣冷了，整個淨室都氤.氳著一層朦朧霧氣，謝徵靠在浴桶邊緣，清雋的臉上陰沉又透著幾分微醺，肩背處磕紅了一塊，他俊秀的眉有些不耐地輕皺著，顯然是方才跌倒時在浴桶邊緣撞的。\n浴桶外打碎了一個酒罈子，看灑出來的酒量，大部分應該都是被謝徵喝了，邊上還擺著一個倒著的空酒罈。\n竟是喝了兩壇酒，聞這酒氣應當還是燒刀子，無怪他瞧著似有些醉了。\n見他沒受傷，樊長玉心便收回去了一般，只是他這樣子……也太惑人了些。\n半束的長髮被水沾溼了大半，貼在他肌肉弧度隆起明顯的肩背，俊美和力量感並存，讓人很容易就聯想到叢林中的猛獸，危險又矯健。\n長睫如扇，上邊沾著細小的水珠，肩膀靠近脖子的地方，還有一個她出門前咬上去的牙印，突然就給人一種這頭乖戾漂亮的野獸也可以被馴服的錯覺。\n哪怕明知不合時宜，樊長玉還是感覺熱氣全在往自己臉上湧，她趕緊背過身去：「我……我去叫忠叔……」\n腳下剛邁出一步，身後便響起一道低啞的嗓音：「不必。」\n謝徵按了按隱隱抽痛的額角，面上的不耐之色更多了些，生成了這樣一副好皮囊，他便是做出一副怒容，也是極好看的，他道：「我自己可以。」\n水紋波動，他撐著浴桶邊沿強行起身，只是身形明顯不穩，險些再次跌倒，好在樊長玉聽到了動靜，及時扶住了他。\n感受著他大半個身形都壓在自己身上的力道，樊長玉憤憤咬牙道：「就沒見過你這麼倔的！」\n因為他沒著衣，樊長玉儘量抬著頭，都不敢亂看。\n謝徵額前沾溼的碎發滴落的水珠墜到她脖頸上，微涼的觸感讓她下意識縮了縮脖子。\n樊長玉想到他的衣物還在外邊，摩挲著按住他肩膀，想把人先按回浴桶裡，「你先在裡面等著，我去給你拿乾淨的衣物過來。」\n半醉的人微微垂首盯著她一行一合的紅唇，不知道有沒有聽進去她說的話，只在她轉身又要走時，就這麼把人扣進了自己懷裡。\n他身上的水珠浸透樊長玉的衣物，樊長玉一顆心都在剎那間提了起來，他卻只是埋首在她肩窩處，好一會兒才啞聲道：「阿玉，我只有你了。」\n這還是頭一回有人這麼喚自己，太過親暱的稱呼讓樊長玉一時間不知作何回應。\n離得太近，他身上又滾.燙，樊長玉只覺從頸側到半個耳廓都又熱又麻，心底升起一種奇怪的感覺，像是踩在了雲朵上，飄乎乎的。\n樊長玉僵了好一會兒，才伸手拍了拍他後背，安撫道：「我一直都在的。」\n掌心接觸到的他後背的肌膚並不平整，明顯能感覺到疤痕隆起的細微弧度。\n想起謝忠說的他曾受的那一百零八鞭，樊長玉眸色微動，語氣裡帶上幾分哄意道：「你坐下，我幫你擦擦背。」\n這是平日裡樊長玉絕不會主動提的，謝徵似乎真要聽話坐下了，因為喝了酒，大腦思考變得遲鈍，他眼尾帶著幾絲紅意，原本清冷的面容甚至透出一股惑人的妖冶，但不知殘存的那點清醒讓他又想起了什麼，他抓住樊長玉的手，放到唇邊親了親，說：「下次。」\n隨即輕晃了一下在酒精作用下刺痛的頭，試著自己撐著浴桶邊緣站起，卻被樊長玉大力摁住了肩膀，她已繞去他身後，看到了他縱使落了痂，依舊疤痕交錯的後背。\n樊長玉怔住。\n親眼看到那些扭曲交疊的鞭痕，她才知道何謂謝忠口中的「沒一塊好肉」。\n從前她也給他後背的傷上過藥，那時他落魄如一隻街頭野犬，身上的傷尚且沒眼下猙獰密集，樊長玉幾乎不敢想像他這一身傷血淋淋時，是如何模樣。\n心口揪疼得厲害。\n那道斜貫了整個背部的刀傷，是他當初為了取血祭刀劃的，開裂了無初次，疤痕尤其寬，猙獰可怖。\n樊長玉指尖撫上去的時候，都不自覺地帶上了幾分顫意。\n她喉間發澀，啞聲問他：「你這一身傷，到底想瞞我到什麼時候？」：，，.`

            title: `第138章第138章`,
            content: `浴桶裡的水已是半冷,感覺到後背那截指尖傳來的溫熱細膩觸感，謝徵整個肩背的肌肉都不自覺絞緊，搭在浴桶邊緣的手,手背淡青色的經絡凸起。\n腦仁兒在酒精的作用下依舊脹痛,他聽出她聲音裡的啞意，勉強維持著清醒答道：「不疼的。」\n樊長玉指腹沿著他後背那道刀疤往下,垂眸看著那幾近半寸寬的的疤痕，說：「現在自是不疼了,沒結痂的時候呢？」\n謝徵鳳眼微垂，燭火將他濃黑的睫羽鍍上一層淡淡的暖光,恍惚間他臉部輪廓的線條都跟著柔和了幾分。\n他似陷在了什麼思緒裡,長睫在眼瞼處覆下一道陰影,只說：「沒結痂時也不疼。」\n樊長玉只覺心口堵了一團棉花似的，潮乎乎的,她仰起頭眨了眨眼,逼退湧上眼眶的澀意,不忍再視他鞭痕瘡痍的後背，扭頭看向別處，嗓間喑啞滾出兩字：「騙子。」\n她恨聲道：「你把自己折騰成這個樣子,就不怕死在戰場上？你不是還要找魏嚴報仇嗎？你就是這麼去復仇的？」\n謝徵沉默了一會兒,才緩緩道：「那些傷在身上作疼,我才知道自己還活著。」\n樊長玉微怔。\n他嗓音低而啞,淺笑了聲：「你拖著一身傷從崇州追來找我，看著你坐在馬背上哭時,我就想，管他什麼仇，老子不在乎了,你別哭了好不好？可我姓謝，我爹是謝臨山，我連他樣貌都記不太清了，卻還記得他被開膛後用針線勉強縫起來的胸腹，記得他身上那六十七道箭孔的形狀……」\n「我死了，或許就能心安理得的跟你在一起了，但只要我還活著，就不能再跟你有一分一毫的瓜葛。」\n再聽他說起謝將軍的死，樊長玉也覺心口酸澀又刺疼。\n她哽聲道：「我沒怪你，當日我沒怪你……」\n謝將軍的慘死，連她一個外人聽了都悲慟難忍，何況他這個為人子的。\n朱有常都曾覺得她爹是叛徒，更何況從未同她父親接觸過的謝徵，她沒法在毫無證據的情形下，向他證明自己父親的清白。\n哪怕到了現在，再回想起當日的情形，樊長玉依然只有滿心的窒痛和無力感。\n謝徵抬手替她拭去眼眶滾落的晶瑩，不知是醉著，還是清醒的，只低聲呢喃一句：「怎麼又哭了？」\n他指腹摩.挲著她臉頰，半醉的幽沉黑眸裡倒映著她和半截燭影，「那些日子裡，你也總是在我夢裡哭，一開始我以為，只要餘生都不再見你，我總能放下的。」\n「可哪怕竭力不去打探跟你有關的任何消息了，你還是在夢裡讓我不得安寧。」\n「有時前一瞬還在臨安鎮上，你笑著喚我一聲，下一息你便身著嫁衣，要嫁與旁人了，那人俊秀斯文，似乎是個書生，喜堂裡拜天地的呼聲刺得我耳膜疼，你蒙著蓋頭同他拜下去，半截唇角彎彎，很歡喜的模樣……」\n他有些說不下去了，醉後氤.氳的眸色裡也陡然冷戾驚人，摩.挲著她面頰的指腹力道加大，語氣卻是狠厲中透著一分委屈的：「你總是知道怎麼折磨我，受的那些傷算什麼？不及在夢裡見到你同旁人成親時的半分心絞……我恨不能把那人剁成一灘碎肉，醒來看到床帳，怒意尚難消，但又很歡喜。」\n「我才知道，我是見不得你嫁給旁人的，還好，一切都來得及。」\n哪怕已被酒精蠶食了大部分理智，他還是打住了最後一句話。\n她若嫁了，他滅對方全族也會把她奪回來！再把敢娶她的人剁成碎肉餵狗！\n她是他的！只能是他的！\n敢肖想她的人，都該死！\n那些從骨子裡透出的陰戾和扭曲，像是他心底的最後一道閥門，無論何時他都警戒著。他自己尚厭惡不及，不能讓她知曉。\n她若知曉了，必然也會避他如洪水猛獸……\n樊長玉臉頰被謝徵粗糲的拇指摩.挲得生疼，但她沒躲，聽他說起分開後在康城的總總，她心中也澀意難消。\n越是了解這個人，她才越是明白當日的抉擇對他而言有多艱難。\n她攥住謝徵幫自己拭淚的那隻手，用力貼緊自己臉頰，碎著融融燭光的一雙淚眼堅定地看著他，啞聲道：「謝徵，往後我們都好好地在一起，你也不許再作踐自己的身體。」\n她盈滿光彩的一雙眸子一瞬不瞬地盯著人看時，整個世界似乎都失去了顏色，只剩她眼底那一抹清亮溫暖的柔光，像是冬日午後的暖陽，曬得簷瓦上墜著的冰稜都慢慢化開。\n謝徵迎著她那雙眸子微怔地看了好一會兒，才輕撫她面頰說：「不是作踐。」\n樊長玉想起他背後那些交錯的疤痕還是覺著難過，道：「你後背都成那樣了，還不是作踐？」\n「謝氏族規，凡有大過者，笞一百零八鞭，罪可消。受了那一八零八鞭，我就能名正言順地來找你了，將來也能三媒六聘娶你回謝家。」\n樊長玉眼皮一顫，哪怕竭力克制著，一滴清淚還是從眼眶滾落，掉進了浴桶中，激起一圈圈漣漪。\n無怪他在盧城慶功宴後，同自己說，不在乎了她姓樊還是姓孟了，原來他早已用這樣的方式去贖過了。\n她以手覆在眼前，微揚起頭，還是掩不住喉間的哽音：「你讓我拿你怎麼辦？」\n謝徵不知是不是醉的，眼眶竟也有幾絲紅意，嗓音啞沉：「我想聘孟氏長玉為妻，你應嗎？」\n胸口的酸漲感更甚，卻又沒有一個發洩口。\n樊長玉只覺那股酸澀感都漲到鼻尖了，她盯著一頭黑髮盡溼，俊美如妖的男人，認真道：「你娶，我就嫁。」\n謝徵漆黑的眸子就這麼一瞬不瞬地鎖著她：「不後悔了？」\n樊長玉迎著他的視線問：「剛說完的話你就想反悔？」\n她瞪著他，語氣裡帶著幾分挑釁。\n謝徵沒說話。\n腦後扣上一隻大手，樊長玉被迫俯低了身子，隨即就被奪走了呼吸。\n謝徵喝了很多酒，他撬開她齒關時，醇厚的酒味在唇齒間蔓延開，樊長玉覺得跟自己喝酒後的感覺不太一樣。\n他吻得很兇，吮得她唇舌都有些木木地疼了，才鬆開她。\n樊長玉半撐在浴桶邊緣，只剩喘.氣的份。\n她臉因為呼吸不順被憋得有些紅，杏子般的眼裡也有些水光瀲.灩。\n胸前的衣襟被水濡溼得差不多了，已經能看到束帶勒緊的輪廓。\n謝徵呼吸一窒，眼底的暗色更重。\n冰冷的空氣裡似燃了一把火，燒得他四肢百骸湧動的血液都滋滋作響。\n他倏地起身，長腿一邁便跨出了浴桶，把人抱起放到一旁的桌子上，低頭看一眼樊長玉被她吻得微腫的唇，再次覆了上去，眼底的暗色似要把眼前人整個兒吞噬掉。\n樊長玉後背撞上條桌後的屏風，剛溢出一聲悶哼，呼吸就又被奪走了。\n她眼底滿是不馴，試圖扳回一局，奈何被對方鉗製得死死的，到後面整個人都有些暈乎，身前傳來一片涼意，束帶鬆開時，她下意識抱住了謝徵的頭。\n他沾溼的長髮貼著她溫潤的肌膚，冰冷的涼意帶起陣陣戰.慄，讓樊長玉雙肩不自覺往裡縮。\n他像是嚴冬臘月裡荒原上餓久了的狼，突然得到了一塊肥肉，囫圇間都不知從哪兒下口。\n動作也實在算不得溫柔，甚至克制不住地有些粗魯。\n樊長玉微微蹙眉，細細地抽了一口氣，輕拍了一下他緊實的肩膀，語氣微.喘又帶了幾分軟意：「你……輕點。」\n上次他從薊州離開的那晚，就咬腫了，她接連幾天都沒敢纏束帶。\n謝徵輕輕吻了吻，終於鬆了口，抬起頭時，眼底已是一片猩紅，頸上的青筋都繃起了一條，瞧著有些嚇人。\n他呼吸滾.燙得像是著了火，嗓音卻還是平穩的，只是喑.啞得厲害：「不怕？」\n樊長玉映著燭光的眸底一片溫軟，透著些許林間晨霧似的水汽，像是藏了清晨的第一抹晨曦在眼中，溫暖又明媚，她反問他：「怕什麼？」\n謝徵忍不住又扣住她下顎吻她，許久之後才抵著她額頭，猩紅著眼近乎自暴自棄地道：「你決定要嫁的，可不是個什麼好人。」\n樊長玉伸手摸了摸他的臉，說：「我有眼睛，你是個什麼樣的人，我辨得清。」\n謝徵狠佞道：「我若故意在你跟前裝的呢？」\n樊長玉聽著他這些莫名的話，明眸微抬，故意道：「那……我再考慮考慮？」\n捏在她肩頭的那雙大手倏收緊，力道大得像是要捏碎她肩胛骨，謝徵有些陰戾地開口：「晚了。」\n他眼底帶著決絕和一絲狠意，平靜的神情底下藏著他自己也不曾知曉的破碎和嘲意：「樊長玉，你這輩子，只能跟我這麼個混帳東西綁在一起了。」\n樊長玉原本只是想逗逗他，聽他這樣說自己，心底不由又泛起了一絲疼意。\n她怎麼會不知道他是個什麼樣的人呢？\n她探身在他頰邊落下一吻，說：「那就綁在一起吧。都說好人命不長，你要是個壞人，我興許還能高興些。」：，，.`
