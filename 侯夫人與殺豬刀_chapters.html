            title: `第139章第139章`,
            content: `燭影灼灼,謝徵盯著她的目光黑且沉。\n他突然欺身吻了上去，用力啃噬她唇瓣，單手控住她後頸,讓她連掙扎都再無可能,吻得兇狠又野蠻，隱隱還透著幾分枷鎖被打開的暴虐。\n樊長玉仰著頭只有被迫承受的份,呼吸間全是他身上清冽醇香的酒味和沐浴後淡淡的皂角氣息。\n本就微腫的唇被他吻得有些刺痛了，他才攥著她下顎繼續一路往下吻。\n樊長玉因呼吸不順胸腔劇烈起伏,沒了束帶裹束，胸前起伏的弧度也變得尤為明顯,溼.濡的衣物半遮半掩緊貼著,裹出那惑人的輪廓,一片雪膩之下的陰影看得人血脈賁.張。\n謝徵埋首在她肩窩沉沉喘.息，再抬首時,一雙眼已猩紅得不像話了。\n他說：「這是你自找的！」\n他抓著她半溼的衣襟從兩側肩臂用力扯了下去,衣物堆疊在臂彎,昏黃的燭火下，樊長玉膚色透著暖玉一樣的溫潤的白，只是手臂和肩膀上那些從戰場上帶下來的傷疤,也在此時變得刺目了起來。\n謝徵從來都沒有完整地看過她的身體,他知道她腹部到腰側,有一道極長的刀疤,是之前在盧城那一仗傷的，卻沒想到,她上臂也有不少交疊的疤痕。\n他眼底黑沉的欲.色退了幾分，輕吻她肩臂上最深的那道疤，問：「怎麼傷的？」\n他知道肯定也是從戰場上帶下來的,卻不知道是哪一仗。\n那個吻太輕，柔和得像是羽毛拂過。\n樊長玉養傷期間和上京的這一路，也讀了不少書，她下意識就想起了「如視珍寶」這個詞。\n她纖長的睫羽顫了顫，整顆心像是被泡進了熱水裡，暖酥酥的。\n臉龐染上緋色，卻不是因為生理的情.動，而是如尋常女兒家一般，在心上人面前升起的一絲赧然。\n她微側過頭，自己也看著右上臂的那條刀疤，明明從前也不甚在意的，這一刻卻生出了幾分覺著那疤痕醜的念頭來。\n她用手擋了一下，故作輕鬆道：「也是在盧城那一戰裡傷的，得虧皇長孫手底下的人當時是想活捉我，若是這刀口再往下一分，我這條手臂怕是得同小五一樣廢掉了。」\n謝徵撥開她做擋的手，俯身又輕吻那道刀疤一下，額前半溼的碎發和垂下的長睫遮住了這一刻他眼底的神情：「對不起，是我來晚了。」\n樊長玉笑笑，一隻手輕輕摩.挲他玉雕似的側臉：「怎麼又道歉？武將身上哪有不負傷的，我既選了這條路，這些就是我必須得經歷的。」\n再提起盧城那一仗，她問出自己困惑多時的問題：「唐將軍說，你當時是正好準備押送隨元青回崇州，這才途經薊州，但我推算了一下日子，你那時剛回徽州謝宅領罰不久，身上的傷怕是都還會滲血，怎地就匆忙上路了？」\n謝徵映著燭火的眸子裡染上一層陰翳：「長公主傳了消息與公孫鄞，說了小皇帝賜婚的消息，前去崇州宣旨的太監，也欲對你下手。」\n那個看她的眼神讓她渾身不舒服的太監，樊長玉還有印象。\n但聽謝徵自己提起他與長公主的賜婚一事，還有今夜長公主也遞了這般重要的消息出來，她心底有些微妙又複雜的情緒，樊長玉自己都尚弄不清那是什麼。\n她微抿了下唇問：「你……同長公主很熟？」\n謝徵鳳眸輕抬，聽出她想問什麼，捏了捏她的臉頰：「不熟，公孫鄞同她才有故，讓長公主在宮內幫忙查十六皇子的事，也是託他去周旋的。」\n樊長玉輕咳一聲，「難怪在薊州遇見公孫先生時，他說是受你之託去辦件事，莫非就是這事？」\n謝徵卻道：「不是。」\n樊長玉眼底的困惑更多了些：「那是什麼事？當時公孫先生也神神秘秘的，說暫時不能同我說。」\n謝徵掌心輕輕摩.挲著她肩臂上的傷疤，「眼下的確還不能說，等他進京，你就知道了。」\n他越是這般賣關子，樊長玉反越是好奇起來：「公孫先生後面也會進京？」\n謝徵帶著薄繭的大掌從她手臂一路搓揉著往上，觸到他在墓前發狠咬下的那個帶血牙印時，忽地用力按了按。\n樊長玉輕嘶一聲，抬眸便撞進他暗沉沉的眼底。\n「這個時候，你確定還要同我談其他男人？」\n樊長玉想瞪他，卻被他那個極具侵略性的眼神一時攝住，他攥著她的手，隔著溼透的褻.褲按了上去。\n樊長玉臉「蹭」地一下紅了個徹底。\n他出浴太久，褻.褲都只剩一片冰冷了，底下的溫度卻還是險些把她手灼傷。\n樊長玉半是羞，半是尷尬，腦子裡恍若打翻了一罐漿糊，不知怎地問了句：「你沐浴只脫上衣？」\n先前她怕看到什麼不該看的，全程沒敢往他下半身瞄，後來被親迷糊了，更沒注意到，此刻他的孟浪之舉，才讓她發現他只赤著上身。\n謝徵也被她這個不合時宜的問題問得一怔，隨即解釋道：「多年來習慣了，刺客想取你性命的時候，可不管你是不是在沐浴。早些年，我褲腿裡還總綁著一把匕首，從不離身。」\n樊長玉想起打崇州時，她夜裡出去散步在河邊遇到他，他那時也是警惕如斯。\n這些年裡，他一定過得很苦吧？\n自己在剿滅反賊的這大大小小十餘場戰役裡，都好幾次命懸一線，他年少從軍，面對兇狠如豺狼的北厥人，所經歷過的兇險只怕更多，這才讓他警惕至此。\n樊長玉越想便越覺著沉重，她不想讓他也浸入這樣的思緒裡，岔開話題道：「難怪方才你讓我幫你拿衣物進來……」\n這會兒功夫，謝徵酒已醒了大半，聞言只是笑：「你當時推三阻四的，以為我想輕薄於你？」\n樊長玉有點囧，但本著輸人不輸陣的原則，還是理直氣壯地瞪回去了：「誰知道你沐浴的習慣？」\n耳垂卻已紅透了。\n謝徵盯著她耳垂，一如在陵園的月色下見到的那般，豔若覆於白雪之下的火棘果，甚至因為屋內燭光更明亮，還能看清她耳廓也透著一層誘人的淡粉。\n他眸色暗了暗，嗓音發沉：「你沒猜錯，我就是無時無刻都想著怎麼輕薄你。」\n話落直接傾身咬上她耳垂。\n樊長玉剛因為他的話一愣，下一瞬便低低「呀」了一聲。\n耳垂又痛又麻，他灼.熱的呼吸盡數噴灑在她耳廓處，癢得像是螞蟻在爬，四肢百骸都升起一股怪異的感覺，仿佛全身的力氣都在他齒間被抽走。\n臉上也燙得厲害，樊長玉感覺自己快被燒熟了。\n她低聲道：「你……別咬……」\n最後聲音也抖得不成樣。\n她在一片炫目的白光中失神之際，被他攥著手從溼冷的褻.褲裡伸了進去。\n……\n樊長玉在浴桶邊就著他沐浴後已完全冷卻的手洗手時，臉還是紅的。\n謝徵喘.息聲尚未平復，素來淡漠冷厲的狹長鳳目裡透著幾分餮足後的瀲灩，他靜靜看著不遠處那道窈窕倩影，她急著去洗手，衣帶都還沒系好。\n沾溼後的衣物被他弄得太皺，不太貼合，露出白.嫩的後頸和一小截肩背，其間道道曖.昧的紅痕甚是扎眼，鬆散的烏髮垂落其間，更添旖.旎。\n他喉結滾動，眼底一片暗色，直接上前把人打橫抱起。\n樊長玉驚愕不已，身體驟然懸空，只能下意識攀住了他肌肉緊實的肩膀：「你……」\n謝徵大步走出淨室，將她摁到外間的床上時，才低頭親了親她紅腫的唇，暗沉的一雙眸子裡，滿滿的都是恨不能將她拆吞入腹的侵略意味：「還早呢，方才只是怕傷了你。」\n他執起她那隻手親了親，隨即就要去放掛在金鉤上的帳子，樊長玉躺在沾著他氣息的被褥間，心跳如擂鼓。\n眼角餘光瞥見圓桌上的飯菜，忙伸手抵在了他胸前，兇巴巴道：「去吃飯，冷了就讓廚房再熱一遍。」\n他到這個時間點了還沒用晚飯呢。\n她手也酸，到現在都還軟綿綿的有些使不上勁兒。\n謝徵眸光掃過桌上的飯菜，忽而問她：「你吃了沒？」\n樊長玉嘴硬想說吃了的，但肚子不合時宜地叫了一聲。\n看著她窘迫又要面子的模樣，謝徵眼神一軟，輕笑了聲起身，將她也拉了起來：「怎麼不自己先吃？」\n樊長玉嘟嚷：「誰知道過來叫你吃個飯要這麼久……」\n謝徵倏地笑了聲：「我就當你這是誇獎了。」\n樊長玉一愣，反應過來他話裡的意思後臉不爭氣地又紅了，只能憤憤瞪他一眼。\n她頭髮亂了，此刻這副狼狽模樣，配上那神情，頗像一隻張牙舞爪的小豹子。\n謝徵長眸微暗，她現在看他的任何一個眼神都像是撩撥在他心坎兒上的鉤子，他沒忍住，把人摁住又親了個夠本才鬆手，啞聲道：「別招我。」\n她身上的衣裙早半溼了，謝徵從籠箱裡找了一身自己的給她：「莊子裡沒有女子的衣物，先將就一下。」\n雖然之前在淨室裡兩人已差不多算是坦誠相見了，但那會兒是情難自抑，現在讓她當著眼前人的面換衣，樊長玉還是覺著難為情。\n她抱著衣物去了淨室，更衣時瞥見自己身上的紅痕，以及空氣中若有若無的石楠花味兒，想到他先前將自己摁在條桌上的種種，他壓抑的喘息聲似乎還在耳畔，臉上頓時燙得快能煎蛋。\n明明他進京的那一晚，也幫他過的……\n是因為那時候一覺醒來，他已經走了，所以才沒這麼難為情麼？\n樊長玉用自己溼掉的衣物捂了一會兒臉，確定臉不燙了，才換上謝徵給她找的那身。\n他看著清瘦，穿的衣物比她大了好幾個號，樊長玉換上後，袖子長得像是戲臺上唱戲的，她把袖口和褲腿都卷了卷，才不至於行走時會踩到。\n等她出去，謝徵已披上一件外衣，生起了炭盆子，桌上那些已經冷掉了的菜被放到了一張鐵製小桌上，用炭盆子溫著。\n「熱一會兒就可以吃了……」\n謝徵話說到一半，目光向她掃來時，忽地頓住。\n他的衣物與她而言太大了，袖口和褲管都挽了起來，愈發襯得她手腕腳腕纖細，臉頰還透著淡粉，像是綻在三月枝頭的桃花，幾縷汗溼的碎發貼在頰邊，一雙經水洗過似的杏眸不太自在地看著他，似一頭誤入獵場的小獸。\n樊長玉扯了扯袖口，尷尬道：「衣裳大了些。」\n謝徵捏著包銀烏木箸的手緊了緊，用盡了畢生的自制力，才把視線從她身上移開，垂眸繼續布筷。\n他說：「先將就著，一會兒我把你的衣物烤乾。」\n想的卻是，往後不必備她的褻.衣了，就穿他的。\n從裡到外，整個人都是他的才好。\n樊長玉對這些絲毫不覺，就是有些奇怪，用飯時謝徵從頭到尾都不怎麼看她，除了給她夾菜，也不說話，但想到之前在淨房裡做的事，她自己尚也不自在，便也沒多疑。\n期間謝徵只問了句：「謝忠讓你送飯來的？」\n樊長玉怕他怪罪那老伯，說：「是我聽你命人把送來的飯端了回去，主動同他說給你送來的。」\n謝徵淡淡「嗯」了一聲，不再多言。\n底下的人給謝徵備的這份飯菜本就多，又已是深夜，兩人分著吃，正好能吃完又不至於太過飽腹。\n用完飯，謝徵便撤掉了那張桌子，去淨室把樊長玉溼掉的那一身衣裙拿出來，放到炭盆子上邊烤著。\n樊長玉看他熟稔地做著這些，想起在崇州河灘那次，他也是這般坐在火堆旁幫她烤溼透的衣物，回憶和眼前的畫面交疊，心窩處暖洋洋的，有什麼濃烈得要溢出來。\n她不太好意思地撓撓頭：「那個……我自己烤就是。」\n謝徵眼皮都沒抬一下，只說：「你要是累了，就先去床上睡一會兒，衣服烤乾了，我叫你。」\n大抵是因為做了壞事，樊長玉現在也不困，整個人異常精神，只是心底那點不自在，讓她蹲坐在炭盆子邊上，手腳都不知往哪兒放。\n謝徵似乎看出了她的不自在，開口道：「書架上有些兵書，都是我這些日子看的，你可以瞧瞧。」\n兩人就這麼待在一塊不說話也不是個事，看兵書的確是是個打發時間的好法子。\n樊長玉當即就去書架前取了一冊兵書坐到謝徵對面看，他看的兵書比樊長玉自己看的那些晦澀難懂多了，一頁書她哪怕看了他做的批註，也得問上好幾處才能翻下一頁。\n謝徵在兵法上的造詣的確得天獨厚，晦澀的東西經他講出來，樊長玉全無聽自己重金聘請過的那些幕僚講授時的一頭霧水之感，很容易就弄明白了。\n為了方便她理解一些歷史上的戰役，謝徵還取了幾張輿圖讓她對比著看地形。\n原本只是為免得尷尬看書，到後邊樊長玉卻是一門心思撲進兵書裡了。\n謝徵幫她烤乾了衣裙，讓她去淨室換時，她都還逮著問了兩個問題了才去。\n換回了自己的衣裙，樊長玉繼續拿起兵書不久，謝徵便出門喚人進來收拾碗筷。\n底下人見樊長玉坐在矮桌旁看書，地上還放著幾卷輿圖和一張鋪開的，以為自家侯爺是在同雲麾將軍商議什麼兵防要事，輕手輕腳地撿了碗筷退出房門。\n謝徵這才對樊長玉道：「謝忠安排你住哪兒，我送你過去。」\n樊長玉微微一愣，從書冊中抬起頭，說：「東廂。」\n他此刻的淡然同先前在淨室裡恨不能生吞了自己的樣子判若兩人，樊長玉只覺心頭有些怪怪的。\n她見謝徵起身後，便也跟著起身，快走到房門處時，忽地又被人一把摁在門板上，擒著她下顎吻住。\n分開時謝徵微.喘著同她道：「我也想你留下來，但我的阿玉將來會成為侯府夫人，還會執掌三軍，我得三媒六聘，娶你過門才不算辱沒你。」\n他先前喝了酒，醉意之下又聽她說那些話，才按賴不住情動。\n但用飯時便全然冷靜下來了，謝忠讓她來送飯，她今夜若是沒從自己房裡出去過，只怕明眼人都知道是怎麼一回事。\n哪怕這莊子上都是可以為他去死的心腹，謝徵也不願讓他們覺著樊長玉就這般在自己房內過了一夜。\n她在感情上，看似謹慎，沒把一顆心交出去時，什麼都顧慮到了。\n可真正交付真心後，她半點不在乎世俗禮教的。\n她把最赤誠最熱烈的自己交給了他，他不能不替她珍視。\n他的阿玉，值得這世間最好的一切。：，，.`

            title: `第140章第140章`,
            content: `樊長玉聽得他這番話,愣了好一會兒。\n隨即突然捧住他的臉，踮起腳在他唇上飛快地碰了一下。\n在謝徵還沒反應過來時，她一把拉開門蹦出幾步遠後,才在簷下燈籠昏黃的光暈裡回過頭,繃著臉強裝鎮定道：「那個……我自己回去就行了，你別送,時辰不早了，你也早些歇著。」\n言罷也不等謝徵回話,就朝著一條小徑走了。\n謝徵抬手碰了碰自己的唇，尚有幾分失神。\n樊長玉背對著著他,他瞧不見她滿臉的緋色,能瞥見的只有在月色下泛著淡粉的耳朵尖。\n他開口喚道：「長玉。」\n樊長玉頭都沒回,只背對著他舉起一隻手揮了揮，「說了不用送了,我再走幾步路就到了。」\n他輕扯了下嘴角,幽幽道：「你走錯路了,那是去廚房的。」\n樊長玉腳下一個趔趄，險些栽倒。\n空氣中靜默了好幾息，她才轉過身,面色如常地走向另一條道,一本正經解釋：「天太黑了,沒看清路。」\n她繼續往前走時,身後傳來謝徵極輕的一聲淺笑。\n樊長玉不理他，半是惱,又半是嫌自己丟人，心口不知怎地，還跳得特別快,仿佛揣了一隻小鹿在裡邊。\n她悶頭回了東廂，莊子裡守夜的血衣騎見她回去，立馬給她送去了洗漱的熱水。\n樊長玉簡單洗漱一番後，倒在床鋪上，望著漆黑的帳頂，想起回來時的糗事，默默拉過一旁的被子，將自己蒙頭蓋住。\n怎麼就丟了這麼大個人呢？\n心房的地方卻還是怦怦直跳，一面囧，一面又被一種無法形容的歡喜包裹著。\n大抵真是她在感情上太過遲鈍，又或者是從前思慮的事太多，這一夜把所有的話說開後，她才意識到，喜歡謝徵，似乎是一件極為歡喜的事。\n想起他，嘴角就莫名地想往上揚。\n在被子裡太久了有些悶，她剛想拱出去透透氣。\n窗戶卻在此時發出一聲輕響，樊長玉瞬間警惕起來，手摸向了藏在枕頭底下的剔骨刀。\n床邊凹陷下去一小塊，謝徵清冽的嗓音在黑暗中尤為清晰：「睡了？」\n樊長玉鬆開握著刀柄的手，從被子裡冒出個頭來。\n她頭髮被蹭亂了，翹了幾絲起來，眸光澄澈，臉在被子裡悶了太久被捂得有些紅，整個人透著一股嬌憨：「你怎麼過來了？」\n謝徵直接合衣躺了上來，大手從錦被裡探進去，攬住她的腰將人帶進懷裡：「放心，沒人看到我過來，天亮前我就回去。」\n樊長玉微微一噎：「你也不嫌麻煩……」\n謝徵緊實的胸膛貼著她後背，垂首嗅著她發間淡淡的發香，說：「不麻煩。」\n他的呼吸噴灑在樊長玉後頸，讓她覺得有些癢，她躲了一下，被謝徵一攬又帶了回去，但隨後他便極為規矩，似乎過來當真只是想抱著她睡一覺。\n樊長玉本想隨他去的，可就這麼被抱了一會兒，感受到身後抵著自己的東西時，她臉色變了變，忍不住開口：「你……要不還是回去睡吧？」\n謝徵抱著她一動不動，回話的嗓音沉而啞：「別說話，睡覺。」\n樊長玉聽出他聲音裡的隱忍意味，沒敢亂動，也沒再說話，就這麼如芒在背地窩在他懷裡又躺了一會兒，大抵是真累了，呼吸竟慢慢均勻了。\n謝徵聽著她平緩下來的呼吸聲，掀開眸子在黑暗中凝視著她的睡顏，靜靜看了一會兒後，垂首叼住她頸間的一塊軟肉，用牙齒輕輕磨了磨，吮出一道紅痕後，才鬆開。\n他把人更緊地按進懷中，微微調整了下姿勢，下顎抵著她肩窩，也閉眼沉沉睡去。\n-\n第二日樊長玉醒來時，果然已不見謝徵。\n她梳洗後，去前廳同謝徵一道用了早飯，謝徵差不多得準備「回京」的事宜了，樊長玉昨日同朱有常談過後，也想去大牢審一審被押上京的那些隨家忠僕，看能不能問出點有用的東西來。\n朱有常得知長寧也在京城，倒是想見見長寧，但眼下局勢不甚明朗，未免莊子的位置暴露，再引來魏嚴的殺手，還是得等對魏嚴的定罪下來了，再安排相見。\n莊子外已備好了送樊長玉回去的馬車，她來時兩手空空，回去時，謝徵把自己房裡那幾冊做了註解的兵書和幾張輿圖全拿給她了。\n樊長玉也沒推辭，心安理得地全收下了。\n謝徵還得去部署「回京」的諸多事宜，給小皇帝遞了回京的摺子，他再領著大軍從正陽門路過了，至此他才算可以名正言順出現在京城。\n送樊長玉回去的便變成了謝十一。\n她已上了馬車坐好，厚重的車簾忽而被人掀開。\n今日是個難得的好天氣，謝徵單手撩起車簾摁在一側的車門處，暖融融的日光落在他那一圈黑睫上，讓他冷峻的面容瞧著都和煦了許多。\n他看著樊長玉道：「這些兵書你拿回去慢慢看，不懂的地方拿紙筆記下來，下次問我。」\n樊長玉膝頭放著那一疊書，最上邊那一本還是攤開的，顯然一上車就又開始看了。\n她點了點頭，看看謝徵，目光又落回翻開的那一頁書卷上。\n她專注做一件事的時候，整個人都透著一股認真的傻氣，莫名地招人疼，因為車門處照進來的太陽光有些刺眼，她長睫半耷拉著，毛茸茸一片，腫起來的唇瓣愈顯豐盈。\n謝徵看著她，長眸微眯，突然道了聲：「現在就有看不懂的地方了？我瞧瞧。」\n言罷直接放下車簾走了進來。\n樊長玉一臉錯愣瞪著他，礙於馬車就在莊子門口，裡邊稍有點動靜就會引得門口的侍衛看過來，她被謝徵按著後腦勺吻住的時候，愣是半點沒敢掙扎。\n一吻結束，謝徵瞥了一眼她膝頭攤開的那一頁兵書，呼吸尚未平穩，語調卻清冽如初，聽不出任何異常：「上兵伐謀，其次伐交，其次伐兵，其下攻城。唯不戰而屈人之兵，乃善之善者也。是以兵法攻謀，多為攻心。」①\n樊長玉聽著他冠冕堂皇概述起這一頁兵法，微喘著氣繼續瞪他。\n手都已經捏成拳頭了，想到外邊就是朱有常他們，到底還是忍了下去。\n她頭一回知道，這人無恥起來，竟能到這地步！\n謝徵似從她瞪圓的杏眸裡看出了她所想，輕扯唇角無聲地笑了笑，俯身又在她唇上親了親，才壓低嗓音道：「走了。」\n等謝徵跳下馬車，在前邊撫馬鬃檢查韁繩是否套牢的謝十一才坐上車轅。\n朱有常坐在輪椅上，被一名血衣騎推出大門為樊長玉送行。\n眼見馬車走遠了，謝徵也駕馬帶著幾名血衣騎離開莊上，去同班師回朝的第二波軍隊匯合，營造他「剛」從北地回來的假象。\n朱有常萬分欣慰地道：「老將軍若知長玉侄女坐到了朝廷三品大員的位置，還得侯爺器重，孟家能繼續為謝氏效忠，九泉之下見到謝將軍，也能含笑了。」\n謝忠看著一南一北分開走的車馬沒說話。\n他家侯爺，對雲麾將軍的心思只怕不是同袍之誼那般簡單……\n-\n樊長玉從前就常在軍營裡，趙大娘夫婦和長寧對她時不時地幾天不在家早已習慣。\n昨日她離開進奏院時，又交代了謝七的，因此等她回去，老兩口和長寧以為她是去辦什麼差事了，都沒過於擔心。\n長寧還興奮地捧著一隻在竹編筐裡的兔子給她看：「阿姐阿姐，看寧娘的小兔子！」\n樊長玉先前說不讓長寧養，是怕到時候離京麻煩，但眼下兔子都已經帶回來，她倒也沒苛責，只笑道：「你這是央著你小七叔叔幫你贏回來的還是你小五叔叔？」\n長寧一雙葡萄似的大眼黑得發亮，她興高採烈地道：「是寶兒幫我贏的！」\n樊長玉不由詫異：「寶兒還會投壺？」\n那孩子沒比長寧大多少，平日裡瞧著也斯斯文文的，背詩書記性頗好，但論咋呼，還沒長寧愛玩呢。\n昨日陪俞寶兒出門的謝五笑著答道：「小公子在那小販攤位前投了一下午的壺，險些把身上的玉佩都抵給那小販了，可算是投中了。小販高興得還送了一隻兔子燈。」\n原來俞寶兒昨日出門是去給人當財神爺去了，樊長玉一時間也哭笑不得。\n她看向抿唇站在一邊的俞寶兒，蹲下身同他道：「改明兒姑姑得空了，帶你再去那小販那裡，把他攤位裡的物件全贏回來！」\n長寧一聽這話就來勁兒，高興得直拍手：「全贏回來，然後寧娘也要去擺攤攤，讓人來投壺！」\n樊長玉忍俊不禁，捏捏她軟嘟嘟的臉頰：「寧娘還是個小財迷呢？都知道怎麼賺錢了？」\n長寧心虛地看了一眼俞寶兒，絞著手指道：「寶兒去投壺把身上的錢都花光啦，我是他小姑姑呢，要賺錢還給他。」\n這話讓趙大娘和趙大叔都忍不住笑了起來。\n趙大娘誇道：「咱們寧娘這才有當小姑姑的樣子嘛。」\n長寧被誇得眼睛一眯，嘴角一翹，小胸脯都挺直了幾分。\n只有俞寶兒看了長寧一眼，似乎不太高興。\n看完兩個小傢伙，樊長玉回房放謝徵給她的那些兵書，俞寶兒卻跟個小尾巴似的跟了過去：「長玉姑姑。」\n他攥著手心，欲言又止。\n樊長玉問：「寶兒怎麼了？」\n俞寶兒看著她道：「我想習武。」\n這個問題讓樊長玉小小地頭疼了一下，俞寶兒身份尊貴，習武的苦頭可還多著呢，摔摔打打也是常有的事。\n她道：「習武很辛苦的，寶兒怎麼突然想習武了？」\n俞寶兒低垂著長睫，抿著唇不說話，好一會兒才道：「就是想學，我要是跟長玉姑姑一樣厲害，以後就能保護我娘了。」\n皇長孫的人當日去搶俞淺淺母子，終究是給俞寶兒心裡留下了不小的陰影。\n樊長玉聽他這般說，不由也正色了起來。\n她道：「習武辛苦，但最難能可貴的地方還是在于堅持，念書如逆水行舟，不進則退，習武也是一樣。這樣吧，我先教你打底子，你若能吃下這個苦，堅持下來，我後面再教你別的。」\n俞寶兒用力點頭：「好。」\n長寧不知貓哪兒聽到了二人的談話，突然冒出來道：「寧娘也要學！以後一拳打扁一個壞人，一巴掌拍暈一個豬玀！」\n她說著還揮舞了下小拳頭。\n樊長玉聽她還記著自己從前殺豬的那點事，不由扶額。\n她道：「你身體不好，就別跟著胡鬧了。」\n長寧有喘鳴之症，從前就時不時地喘不上氣。\n樊母在懷著樊長玉那會兒，就遭遇了錦州變故，被樊父救走，一路顛沛流離逃亡薊州，路上傷了身子，也是樊長玉在娘胎裡時就皮實，才有驚無險地出生了。\n但樊母養了多年的身體也不見好轉，一直到她都快十歲了，才又有了長寧。因為母體弱，長寧生下來也瘦瘦小小的，還天生有喘鳴之症，當真是從吃飯了，便開始湯藥不斷。\n小時候給她餵羊奶，她嫌羶味重不肯喝，還是樊長玉偷偷給她摻了些糖，才哄著她喝了。\n樊長玉從軍後，掙了銀子，也沒斷過給長寧的藥。\n長寧一聽樊長玉拒絕了，急得跑過去，攥著她的袖子直晃悠：「不嘛不嘛，寧娘就要跟著學。」\n大概是怕樊長玉還是不同意，她眼圈都有些發紅了，說話也帶了鼻音，仿佛下一刻就要委屈得哭出來。\n樊長玉心口軟了軟，俯身摸了摸長寧的頭道：「寧娘乖，阿姐給你找京城最好的大夫看病，要是大夫看過了，說你可以習武，阿姐再教你好不好？」\n長寧這才委委屈屈地點了頭。\n見朱有常後有了查魏嚴的線索，樊長玉眼下也是事多如牛毛，但給長寧請大夫的事同樣刻不容緩，她當天下午就讓謝五出去打聽京城有名的大夫。\n樊長玉忙去了，俞寶兒看著還是一臉不開心的長寧，道：「你不能習武，也沒關係的，以後我保護你。」\n長寧氣得臉都嘟了起來，她悶悶道：「不行。」\n俞寶兒問：「為什麼不行？」\n長寧胖乎乎的手指扣著自己衣服上的珍珠扣，彆扭道：「那樣你就比我厲害了，以後我都打不過你。」\n俞寶兒說：「那以後你打我，我都不還手。」\n長寧圓溜溜的眼睛斜瞟他一眼：「真的？」\n俞寶兒點頭：「真的。」\n長寧嘴角這才抑制不住地往上翹了翹，伸出白嫩嫩肉乎乎的小拇指道：「那我們拉鉤鉤，你要是說話不算數，你就是小狗。」\n俞寶兒伸出小拇指同她勾住，鄭重說：「好，咱們拉勾為定。」\n-\n皇宮。\n齊昇看著龍案上那封今早剛送到宮裡的奏疏，急得整個人都在殿內打轉，「謝徵就要回京了，魏嚴那邊還沒告訴朕，對李黨的這些彈劾，他有何應對之策……」\n他目眥欲裂，氣得踹了龍案一腳：「謝徵要是也跟李家那老匹夫一樣，倒向了承德太子的後人，他此番回來，豈不是就是要趕朕下這把龍椅？」\n「朕得想想法子，想想法子……」\n新上任的總管太監是個圓滑的，當即諂媚道：「陛下莫憂，武安侯重兵在握，他若真倒戈那不知真假的承德太子後人，無非也是為扳倒魏嚴，承德太子後人篡位後才能許給他的，您現在就能許給武安侯了，只要武安侯肯助陛下一臂之力，先解決李家，再扳倒魏嚴，把原本留給魏嚴的位置給他坐，再怎麼比他幫完承德太子後人，還得同李家分權來得好。」\n自謝徵抗旨還削了宣旨太監一隻耳後，這藐視皇權之恨，齊昇一直記著的。\n讓謝徵坐上魏嚴那個位置，他心底是一千個一萬個不願，可如今魏嚴明顯奈何不了李家了，對於魏嚴能不能幫自己保住皇位，齊昇也開始動搖了。\n他一身微凸的眼死死盯著那太監：「朕已同他交惡到至此，你幫朕想個拉攏他的法子？」\n這個問題把太監問住了，面對齊昇那恍若要吃人的目光，只得硬著頭皮訕笑著道：「這男人嘛，能籠絡的無非不是權勢、財寶、美人？」\n這話說了也等同於沒說。\n齊昇卻是坐回了龍椅上，單手撐著頭，微微外凸的一雙眼裡，眼白部分布著血絲：「美人？朕想給她和皇姐賜婚，他是怎麼對朕的？」\n太監眼睛一轉，忽而道：「長公主，似乎同武安侯有聯繫……」\n齊昇眼皮倏地一揚，冷笑道：「他謝徵拒了朕的賜婚，轉頭又同朕的皇姐有往來，他想做什麼？皇姐也讓朕好生失望，朕對她這般好，她也在給自己找後路了？」\n他眼神陰冷，倏地看向太監：「你又是如何得知的？」\n太監腿一軟，就直接跪下去了：「奴才不敢欺瞞陛下，奴才有個乾兒子，同長公主宮裡一個宮女結為了對食，是那宮女進去斟茶時，無意間聽見長公主在吩咐心腹太監，讓他務必把信交到武安侯的人手上。」\n齊昇手指開始一下一下地扣抓龍椅上的扶手，指甲和金屬碰撞，發出的聲音尤為刺耳：「皇姐近日有什麼動作？」\n太監不動聲色打量著齊昇，捏著嗓音道：「奴才聽說，長公主宮裡的人，近日頻頻出入冷宮，跟當年賈貴妃宮裡一個瘋癲的宮女走得頗近……」\n齊昇指尖摳挖的力道更大了些，原本修剪整齊的指甲都被扶手上雕刻的浮雕磨出了參差不齊的缺口，他喃喃道：「她在幫謝徵查十六皇兄的事……謝徵查十六皇兄作甚？」\n一片指甲不堪重負，斷裂開來。\n這細微的痛意也讓沉靜在自己思緒裡的齊昇陡然抬起頭來。\n他那雙向外微凸的眼亮的瘮人，太監被他那眼神盯著，都起了一身的雞皮疙瘩。\n齊昇展唇笑了笑，神情裡透著一股莫名的興奮，陰惻惻盯著總管太監：「你去，把冷宮裡那個瘋掉的宮女給朕帶來。手腳乾淨些，別讓皇姐那邊聽到了什麼風聲。」：，，.`

            content: `雕花木門「吱呀」一聲被推開,日光從敞開的門口和高大的窗欞傾瀉進殿內，博山爐裡升起的嫋嫋香菸慢悠悠地在空氣中浮動。\n長公主齊姝一身黛青色繁複宮裝，抬腳邁進了她母妃宮裡所設的小佛堂。\n她雲鬢高聳,髮髻上簪滿了珠釵髮飾,上挑的眼尾嫵媚又透著些許目中無人，紅唇豔烈,纖腰和兩臂間挽著淡青色的輕紗披帛，一舉手一抬足皆是風情萬種。\n大胤最富貴的一朵牡丹花,擔得起國色天香四字。\n佛堂最中央擺著一尊一尺來高的白玉觀音，觀其溫潤色澤,便知是用一整塊上等的羊脂玉經匠人精心雕琢而成的,價值不菲。\n齊姝看著一身檀色禪衣背對自己跪在蒲團上的美婦人,驕矜開口：「母妃喚我前來，所為何事？」\n安太妃捻動著手中白玉珠和翡翠珠各一半串起來的念珠,並不答話,口中低喃,繼續念著佛經。\n這佛堂裡用的香是氣味沉厚的大藏香，古朽深沉，齊姝並不喜歡這個味道。\n見母妃把自己叫來,又將自己晾在一旁,齊姝皺了皺眉,通常只有她做錯事的時候,母妃才會這般對她。\n想到自己最近受公孫鄞之託，幫忙查的事,她交握於身前的手緊了緊，但身為公主的高傲很快掩下了那一點不自在。\n安太妃終於誦完了那段經，起身在觀音像前上了一炷香後,才不緊不慢開口：「你近日都在忙些什麼？」\n齊姝面色如常道：「跟著司樂坊的秦尚儀學琴，閒暇之餘，也替母妃抄了些佛經。」\n安太妃手持那圈青白雙色的念珠在貴妃椅上落座，眼皮微抬，掃向自己的女兒：「只有這些了？」\n母女倆樣貌有五分像，但那一雙嫵媚的眼，卻是如出一轍，不過安太妃眼角到底是經歲月侵蝕，留下了道道細紋。\n齊姝是被嬌寵長大的，自幼脾性就大，她看向太妃：「母妃既不信兒臣，又何須再問？」\n安太妃聽得女兒這炮仗似的回話，眉心微皺，不由得輕輕搖了下頭。\n她問：「近日你宮裡的人，頻頻去冷宮作甚？」\n齊姝一心虛，眼睫就亂顫，她嘴硬道：「這……兒臣宮裡宮婢太監幾十號人，他們私底下做了什麼，兒臣哪能知道。」\n安太妃臉色徹底沉了下來，看著齊姝喚了聲：「姝兒！」\n安太妃真正動怒後，齊姝還是怕的，但又不敢把同謝徵合作的事和盤託出。\n皇帝給她和謝徵賜婚的事，安太妃也是知曉的，可謝徵連旨都沒讓宣旨太監宣，還削了那太監一隻耳，當真是狂妄至極。\n雖說知曉此事的人不多，但謝徵抗旨拒婚藐視皇權，打的不僅是齊昇的臉，同樣也是她齊姝的臉，安太妃對謝徵頗有微詞。\n齊姝自己心裡偷著樂呢，這消息本就是她想方設法遞給謝徵的，只是怕母妃怪她摻和進朝堂局勢裡，才一直沒敢說。\n此刻面對隱有怒態的安太妃，她幾番斟酌後，道：「兒臣宮裡的人，偶然發現了冷宮有一個當年在賈貴太妃宮裡當過差的宮女，瞧著她瘋瘋癲癲可憐，接濟了一兩回，卻從那瘋宮女嘴裡聽說了個不得了的消息。」\n安太妃在聽說冷宮還有個賈貴太妃宮裡的宮女時，捻動念珠的手一頓，神色就已經不對勁兒了。\n齊姝小心打量著母妃的神色，繼續道：「那瘋宮女說，魏丞相曾……曾淫.亂後宮，私通過后妃……」\n「啪」地一聲，安太妃手中的念珠被扯斷，青白璽珠滾落一地。\n「此事還有誰知曉？」\n安太妃猛地起身，厲聲問齊姝，神色前所未有地難看。\n齊姝也被母妃罕見的大怒嚇了一跳，她心思百轉，回道：「此事茲事體大，那宮女也不知是不是瘋言瘋語亂說的，又沒說同魏丞相有染的具體是父皇的哪位妃嬪，兒臣怎敢貿然告訴旁人。」\n安太妃這才又坐回了貴妃椅上，疲憊道：「此事就此作罷，你莫要再去查了，權當沒聽過那宮女的瘋言瘋語。」\n齊姝覺得安太妃今日的反應很是奇怪，追問道：「為何？若是魏嚴當真膽大包天至此，憑著這樁罪名，足以誅他九族，從他手中奪回皇權。」\n雖說這大胤天下，只要還姓齊，她就永遠都是大胤最尊貴的公主。\n但這份尊貴，也得看皇權衰落與否。\n譬如齊昇在位，皇權被魏嚴架空後，整個皇室都得仰魏嚴鼻息而活。\n安太妃聽得齊姝的話，卻是冷笑起來：「誅魏嚴九族？若是能誅，十七年前太乾宮就不會血洗長階了。」\n太乾宮是歷代帝王的寢宮。\n齊姝一雙媚眼倏地睜大：「魏嚴逼宮造反過？」\n她手腳一陣陣發涼：「那父皇……也不是病逝的？」\n安太妃卻不再答話，雙手合十跪在了觀音像前，只道：「什麼都別問，也什麼都別再去查，哀家當年就是緊閉宮門，什麼都不管不問，才成了四妃裡唯一活到了今天的。」\n大抵是皇室的驕傲作祟，齊姝忍不住冷聲質問：「魏嚴欺我皇家至此，就算皇弟不堪大用，但如今朝野上下都傳聞，承德太子長兄尚有後人在這世間，若聯合李家、手握重兵的武安侯，再加上外祖父他們，我不信扳不倒一個魏嚴！」\n安太妃掀開眼皮：「你以為當年賈貴太妃娘家勢弱了？她賈敏半老徐娘還能寵冠後宮，仗的不就是娘家的勢，十六皇子甚至欲和太子爭位。可最終又如何，你往朝堂上數下去，看滿朝還能不能數出一個五品以上姓賈的官。」\n齊姝只覺脊背陣陣發寒，她顫聲問：「魏嚴既隻手遮天到了這地步，為何……還要扶持皇弟登基？」\n她眼神變了變：「莫非皇弟他……」\n安太妃打斷她的話：「莫要胡猜。魏嚴就是一條瘋狗，誰知道他在謀劃什麼，哀家就你一個女兒，別去招惹朝堂上的是是非非，咱們娘倆和安家，總能相安無事的。」\n齊姝卻看著安太妃道：「母妃，你是不是知道當年同魏嚴私通的后妃是誰？」\n-\n太乾宮。\n齊昇看著跪在臺階下方瑟瑟發抖的宮女，坐於龍椅上單手支著下顎，興味開口：「來冷宮見你的那人，都問了你些什麼？」\n宮女蓬頭垢面，髒汙的宮女服飾上還有大片大片的血跡，顯然是帶來之前就已在內監們手上受過了刑，此刻也不敢裝瘋了。\n她看著上方一身龍袍的帝王，渾身抖若篩糠：「沒……沒問奴婢什麼，就是看奴婢可憐，施捨了奴婢幾頓吃的……」\n齊昇冷笑：「你這十幾年在冷宮，不都瘋瘋癲癲的麼，怎麼這會兒又不瘋了？」\n宮女抖得更厲害，連話都不知如何再回了。\n齊昇身邊的總管太監當即就狠顏厲色道：「你這賤婢，膽敢再欺君罔上一句，即刻推出午門斬首！」\n宮女嚇得臉都白了，顫聲道：「陛下饒命，陛下饒命……奴婢此舉，是……是為了自保。」\n她一面發抖一面哭：「當年賈貴太妃宮中伺候的宮人，全都死了，奴婢是在那之前犯了錯，被賈貴太妃罰去了浣衣局，這才逃過一劫。怕被人查到奴婢是賈貴太妃宮中唯一的活口，不得已裝瘋去了冷宮自生自滅。」\n她說得懇切，齊昇卻跟沒手腳一般，把自個兒整個都窩進了龍椅裡，似對她招供的那些並不上心，對總管太監道：「堵嘴，再用一套刑。」\n宮女嚇得連連叩首，哭著求饒道：「陛下，奴婢說的都是真的啊！唔……」\n她沒能再繼續求饒，很快便被幾個身強力壯的太監堵了嘴，按住手腳。\n在這太乾宮裡，怕髒了地，太監們也不敢用大刑，便取了針，往宮女指甲縫裡刺進去。\n十指連心之痛，當真只有切身經歷過的才知曉。\n在宮裡，這套刑罰，有時候比打板子還有用些。\n剛扎入第一枚針，宮女便已疼得渾身抽搐了，死命地在地上掙，奈何被幾個太監抓住手臂，用膝蓋抵著腿腳和後背，摁得死死的，所有的慘叫聲也被一團棉布盡數堵在了喉間，但宮女痛得咬破齒關，口中流出的血將她堵在嘴裡的布巾都染紅了一片。\n齊昇沒喊停，太監們便又刺入了第二根，第三根……\n扎到最後，宮女都已沒力氣了，整個人癱在地上，疼出的冷汗浸溼了頭髮和破敗的單薄宮衣，嵌入鋼針的十指擱在身側，滴在地上的只有星星點點的幾小灘血跡，宮女卻幾乎已痛到了失去知覺，嘴唇白得和臉一個色，指尖因肌肉和經絡的牽連，還在發抖。\n總管太監諂媚向齊昇道：「陛下，用完刑了。」\n齊旻旁觀了整場刑法，比起之前的意興闌珊，此刻心情似乎才好了許多，「現在回答朕，你為何在冷宮裝瘋？」\n鋼針在指甲縫隙裡還沒取出來，極度的疼下，宮女根本無法思考，只本能地回答：「為了自……自保。」\n確定她沒說謊後，齊昇一雙眼一下子亮得驚人，藏著一股莫名的興奮：「是誰這麼大本事，將賈貴太妃宮中所有人都滅了口？」\n哪怕已痛得像是死過了一回，聽到這句問話，宮女還是止不住渾身哆嗦，像是觸犯到什麼禁忌一般，帶著極度的恐懼吐出那個名字：「是……是魏嚴。」\n一旁的總管太監驚愕不已，齊昇在一愣之後，眼底閃過幾絲陰霾，繼續問：「他為何要殺賈貴太妃宮裡的人？」\n宮女話音已抖得不成樣：「不止賈貴太妃宮裡，所有知曉魏嚴淫.亂後宮的人，都被他殺了。」\n這句話有如一道驚雷劈下，總管太監額前都開始冒冷汗了。\n他怎麼也沒想想到，這其中竟然藏著如此驚天的一個秘密。\n齊昇臉色也難看了起來，「你說魏嚴淫.亂後宮？」\n宮女惶然點頭。\n齊昇坐回龍椅上，面目陰沉：「繼續用刑。」\n鋼針已用過了，總管太監又招呼底下的太監們給宮女手腳都上了一遍指夾。\n一排細棍將所有指頭夾進去，左右兩個身強力壯的太監用力將繫繩拉緊，指骨被擠壓到變形，甚至生生斷裂開來。\n宮女被幾個太監按住肩膀，掙扎無門，眼淚已經流幹了，咬著堵嘴布巾的兩排牙都已酸軟，口中全是血腥味。\n這次刑罰之後，宮女癱在地上，已全然跪不住了，只不住地喃喃：「饒了奴婢吧……奴婢說的都是真話……」\n齊昇沒再發話，一旁的總管太監也不敢貿然出言，小心翼翼覷著齊昇的臉色。\n承德太子和十六皇子皆死在北厥人手中後，先帝病逝，隨即魏嚴把持朝政，捧了毫無根基的齊昇坐上皇位。\n結合宮女說的魏嚴曾淫.亂後宮……\n總管太監不敢再細想，生怕過了今日，自己項上人頭也得搬家。\n齊昇又開始控制不住地用指甲扣抓金龍扶手上的浮雕，一雙腫泡外凸的眼瞧著極為瘮人：「與魏嚴私通的是誰？」\n宮女慘白著臉招供：「是……是淑妃娘娘。」\n齊昇驀地鬆了一口氣，淑妃乃四妃之一，皇室卷宗上記載，淑妃和賈貴太妃一樣，都是在先帝駕崩後，隨先帝而去的。\n他眼底又開始流露出難以言喻的興奮：「魏嚴為了掩蓋自己做的醜事？把淑妃也殺了？」\n「奴婢不知……當年，淑妃被診出喜脈，但胎             content: `長寧扭過頭興奮地拽樊長玉的袖子：「阿姐,姐夫是不是在看我們？」\n她扯著嗓子使勁兒朝著下方喊了兩句「姐夫」，奈何這會兒大街上人聲鼎沸，百姓們都在高呼「武安侯」,將她稚嫩的嗓音全然掩蓋了下去。\n但大軍快走過樓下時,謝徵朝著酒樓上方微點了下頭，不知是聽見了長寧的喊聲,還是在朝樊長玉致意。\n相鄰其他雅間門發出一片短促的驚呼聲，窗前噼裡啪啦掉了一堆東西下去。\n「武安侯在看我們家小姐！」\n「胡說,分明是朝咱們家姑娘點頭了！」\n隨行的丫鬟們替自家姑娘爭辯不休，激動得把手上拎著的花籃子都扔了下去。\n大胤民風開放,在這樣喜慶的日子裡,未出閣的姑娘們朝著凱旋大軍扔花、扔手帕都是司空見慣的事,樊長玉隨唐培義進城那天，就被扔了不少手帕。\n趙大叔和趙大娘眼瞅著樓上樓下的小娘子都在朝謝徵丟帕子,不樂意道：「言正方才是在看咱們吧？」\n趙大娘一把年紀了,也將大半個身子探出窗口,高喊了兩聲：「言正！言正！長玉在這裡！」\n樊長玉怕丟人，剛想退回去，卻被趙大娘一把攥住了胳膊,還催促她：「快快,你也給言正丟個帕子啊！」\n樊長玉窘迫道：「大娘,我就不丟了吧？」\n趙大娘瞪她一眼：「你這孩子,怕什麼羞，下面那是同你拜了天地的夫婿,別的姑娘家都能朝她丟帕子，你作甚不丟？」\n說罷就把樊長玉推到了窗口處。\n長寧在一旁樂得直拍手：「阿姐丟帕子！丟帕子！」\n樊長玉無奈道：「我哪有帕子，我在軍中都是直接用一方大汗巾。」\n趙大娘被樊長玉這話噎了一下,隨即不死心道：「那……你有香囊什麼的沒？總之往下邊扔個就是了。」\n香囊那東西，樊長玉自然也是不會備的。\n她想了想，將自己綁在發間門的赭色髮帶解了下來。\n樊長玉拿著髮帶硬著頭皮走到窗前，比起其他姑娘家那些燻了香又繡著精緻繡紋的絹帕，她這條髮帶實在是樸素得過分，料子也算不得好，估計扔大街上都沒人願意撿。\n樊長玉正想應個景丟完就行了，怎料謝徵忽地抬眸直直朝她看來。\n二人視線在半空中相接，樊長玉心跳驀地漏下了一拍，捏在手中的髮帶一時間門也忘了扔下。\n趙大娘在邊上替她急得不行，催促她：「長玉快扔啊，言正看著你呢！」\n樊長玉回過神，只覺心跳快得像是要從喉嚨蹦出來，她攥了攥了手心，以一副視死如歸的架勢將手中的髮帶扔了下去。\n她習武準頭本來極好的，奈何髮帶太輕，這會兒又颳起了風，眼瞧著那髮帶就要從謝徵頭頂飛過去，馬背上神情冷峻的青年侯爺倏地抬起手，五指一攏便抓住了那條赭色髮帶。\n圍觀的百姓爆出一陣震耳欲聾的驚呼聲。\n這一路朝他仍絹帕的姑娘何其多，便是有落到了他跟前的，他都沒多看一眼，眼下突然主動去抓一條髮帶，實在是稀奇。\n謝徵面不改色地將樊長玉扔下去的髮帶揣進了懷中，眸光淡淡往樊長玉那邊掃了一眼，才雙眼平視前方繼續駕馬前行。\n圍觀百姓和年輕姑娘們的驚呼聲更高了一個調，甚至有姑娘家當場哭出聲的。\n「那是誰的髮帶？」\n「武安侯莫不是有心上人了？」\n長街兩邊的百姓都抬起頭，試圖找出是從臨街酒樓的那間門雅間門飄出的那根髮帶，卻只瞧見了間門窗戶緊閉的雅間門，一時間門也不知究竟是那一間門的貴客扔的。\n那間門雅間門都是樊長玉包下的。\n髮帶被謝徵接住，他揣懷裡還朝她看來時，樊長玉只覺剎那間門自己心口像是被雷電擊中，心跳快得讓她心慌，大腦也跟著有幾分麻痺了。\n她幾乎是條件反射性地把窗戶一關，然後轉頭坐回了圓桌前，在趙大娘錯愣的目光裡，她整個人從脖子根開始泛紅，一直到耳朵尖都是緋色的。\n趙大娘一怔之後，哭笑不得地道：「你這丫頭，都成婚這麼久了，還怕什麼羞啊？」\n樊長玉捏著自己滾燙的耳垂不說話，只有濃黑的長睫撲閃個不停，似扔在心悸。\n連長寧都忍不住笑了起來：「阿姐怕羞。」\n謝五謝七垂著腦袋默默站在牆角，努力當自己是空氣。\n好一陣，樊長玉才緩過來，面上的緋色退了些，她捏捏長寧的胖臉道：「寧娘本事了，都會笑話阿姐了？」\n長寧被樊長玉捏著一側臉頰，另一側臉上的笑還是快裂到耳根去：「姐夫一看阿姐，阿姐嚇得把窗戶都關了。」\n樊長玉臉上好不容易才消下去的紅意，因為長寧的這無忌童言，差點又升騰起來，她板著臉道：「你個沒大沒小的丫頭，阿姐是怕人多眼雜，憑生事端。」\n長寧吐了吐舌頭，不敢再造次了。\n趙木匠想著剛才見到的盛況，仍覺著震撼，呷了一口茶水才道：「我聽好多人都在喊『武安侯』，怎地沒瞧見人，莫非武安侯的儀仗在大軍後面？」\n那些年輕姑娘哭喊的聲音都被更大的呼聲給蓋過去了，京城人說話又帶著點京味兒，趙木匠便是聽見了那麼一兩點音兒，也沒辨出是個啥意思。\n他不懂大軍進城的尊卑順序，但想著樊長玉她們進京那會兒，唐培義是走在最前邊的，按理說，武安侯官職最大，也應在走在最前邊才是，怎地排頭卻是言正？\n武安侯的威名，在他奪回錦州，收復遼東十二郡時，便在整個大胤如雷貫耳了。\n趙木匠還挺想一睹這等曠世奇將的風採的。\n樊長玉默默抹了一把臉。\n終於還是說到了這個問題上……\n她抓了抓頭髮道：「那個……大叔，大娘，有件事我一直沒同你們說。」\n趙大娘看她這為難的樣子，當即就道：「你這孩子，還把我跟你大叔當外人不成？有什麼事，直說就是。」\n樊長玉看著二老，說：「其實言正就是武安侯。」\n趙木匠手一抖，半盅茶水都潑到了身上，他顧不得燙，倉惶起身抖了兩下衣服，一雙蒼老卻瞪得溜圓的眼直直地看向樊長玉：「啥？」\n趙大娘亦大張著嘴，看看樊長玉，又看看趙木匠，驚得一句話都問不出。\n樊長玉料想二老得知謝徵真正的身份後，會很吃一驚，卻沒想到把他們倆給驚成了這樣。\n見二老都一副懷疑自己耳朵出問題了的模樣，她又說了一遍：「言正就是武安侯。」\n「我滴個天爺哎……」\n趙木匠腳下一軟，又坐迴圈椅上了，他咽了咽口水道：「就是收遼東十二郡，屠錦州蠻夷的那個武安侯？」\n樊長玉點頭。\n趙大娘說話也磕巴起來了：「聽……聽說武安侯長了頭六臂，茹毛飲血，言……言正那孩子，長得跟那戲班子裡的臺柱小生似的，怎麼會是武安侯呢？」\n樊長玉聽趙大娘這麼描述她以為的謝徵，一時間門有點哭笑不得。\n她道：「都是謠傳罷了，戰場上的將軍，兇名在外才能震懾敵軍。我在軍中不也有『夜叉』之名？」\n饒是聽了樊長玉的解釋，老兩口還是坐椅子上緩了半天才緩過來。\n趙大娘看向樊長玉：「這……言正都成侯爺了，咱們以後見到他是不是得磕頭啊？」\n這問題問得樊長玉一愣，換做從前，她還在臨安鎮上時，談及見到大官，首先想到的約莫也是要磕幾個頭。\n如今朝野之上，能讓她磕頭跪拜的，只餘龍椅上那一人了。\n原來不知不覺間門，她這一路已走了這麼遠了，一時間門心中倒也頗有些感慨。\n她道：「大叔和大娘都曾是他的恩人，他自是不肯受你們這大禮的。」\n當初謝徵那一身傷，鎮上醫館裡的大夫都不敢醫，若非趙木匠靠著當了幾十年獸醫的經驗，死馬當活馬醫開了幾服藥，他還真不一定能熬過來。\n有了樊長玉這話，趙家老兩口約莫也是想起了從前在臨安鎮上的日子，心中對謝徵的距離感一下子減輕了。\n趙大娘欲言又止地看著樊長玉，難免又憂心起她的終身大事：「那……你們當初拜堂也是不作數的了？」\n她想問的是兩人今後是怎麼打算的。\n樊長玉發達的時候，她對自己看著長大的孩子知根知底，是不怕她對言正始亂終棄的。\n可言正成了侯爺，趙大娘尋思著，那些達官顯貴可都是要妻四妾的，方才大軍路過樓下，言正還接了樊長玉給的髮帶，想來是對樊長玉有感情的，但不知這情分，到了哪個度。\n樊長玉聽了趙大娘的話，想的卻是，當初的入贅本就是二人協商好了假入贅的，便點了頭。\n趙大娘一聽就急了，她道：「就算當初入贅是假的，可你同他那也是患難時做了夫妻的，如今同富貴了，還能散了不成？」\n樊長玉終於聽明白了趙大娘想問的意思，想到那天晚上謝徵說的想聘她為妻，臉上又有點燒得慌，她道：「您想哪兒去了。」\n錦州背後的真相一日未查清，她外祖父便一日不能洗刷冤屈。\n唯有替孟家平冤昭雪了，她才能以孟家後人的身份，堂堂正正同謝徵在一起，也才能慰外祖父和爹娘的在天之靈。\n但朝堂局勢詭譎，趙家老兩口都是淳樸的性子，樊長玉同他們說太多了，他們也不懂，只會平白惹得他們擔心。\n她道：「您就別擔心了，他不是那樣的人。」\n有了樊長玉這話，趙大娘就把一顆心又放回肚子裡了。\n凱旋大軍已去了午門前等候宣見，街頭喧喧嚷嚷的人群也慢慢散去。\n樊長玉兩老兩小還有謝七謝五幾人回進奏院。\n路上長寧看到捏糖人的又鬧著要去買，樊長玉便帶著她和寶兒去買糖人，謝五跟著同去，以免發生什麼意外好第一時間門幫忙。\n謝七負責駕車，則跟趙家二老一道留在了車上。\n饒是逛了多次，趙大娘還是忍不住一路打起車帘子看，為京城的繁華咋舌。\n眼瞧著樊長玉她們買糖人還得有一會兒，她尋思著快過年了，得去扯幾尺紅布，給幾個孩子一人縫一個裝壓歲錢的大紅荷包，便同謝七招呼一聲後，去了不遠處一處賣布匹的攤位。\n趙大娘正挑料子挑得眼花繚亂呢，忽聽得邊上幾個婦人一邊挑揀布料，一邊議論起謝徵：「聽說了麼，武安侯進城時，收了一位姑娘扔給他的帕子，也不知這京城哪家閨女能得這好福氣！」\n另一個婦人接話道：「前半刻鐘整條街圍得水洩不通，誰知道那帕子是哪家姑娘扔的，再說了，也不過一張帕子，武安侯何等身份，約莫只是順手接了，又怕當街丟掉害人家姑娘失了顏面，這才收著了。」\n「誒？丟的是帕子麼？我怎聽說是髮帶？」又一個婦人道：「帕子在那場面能收，髮帶可就不一樣了，要我說啊，武安侯約莫真是中意哪家姑娘了。」\n最先說話的婦人道：「整個京城稱得上才貌雙全的，也就李太傅家的么女了，聽說那官小姐二八年紀了，婚事還沒訂下，指不定就是在等武安侯呢！」\n趙大娘原本是不願摻和幾個婦人的談話的，可聽到了後面一句，手上的料子都挑不下去了，朝那幾名婦人道：「那髮帶是我閨女的。」\n幾名婦人聞言瞥了趙大娘一眼，忽地齊齊以絹帕捂嘴笑出了聲。\n趙大娘身上的衣物料子雖算不得差，但也同富貴人家家中的老太太不沾邊，加上她長寧勞作，一雙手也粗糙得厲害，說話還有著外鄉的口音，幾個婦人誰都把她當回事。\n其中一個倒是戲謔問了句：「大娘您家閨女多大了？」\n趙大娘算著樊長玉的生辰，答：「快十七了。」\n此言一出，幾個婦人又掩唇笑了起來，眼神交替間門，全是看笑話的意味。\n那婦人道：「十七的老姑娘扔個髮帶，還能被武安侯給撿起揣懷裡？大娘，您家那姑娘是生成了個天仙啊？」\n這些人雖出口不帶一個髒字，可那言行舉止間門的輕蔑戲謔，趙大娘若是察覺不到就怪了。\n她聽到樊長玉被這群人譏嘲心口就堵得慌，扯著布頭的手都用力了些，瞪了幾個婦人一眼道：「我家閨女不是天仙，但是個保家衛國的女將軍！」\n越說越離譜，幾個婦人只覺遇上了個滿口胡話的瘋婆子，其中一人扔下手中的料子道：「這是瘋癲了不成？莫同她挨太近。」\n言罷像是怕趙大娘會傷到她們一般，齊齊退遠了些。\n小販一見沒了生意，加上也聽見了趙大娘那些話，直接把趙大娘手上的布料搶了回去，罵道：「你個瘋婆子，別來禍害我生意。」\n趙大娘雖和善，但也不是個任人欺負的軟骨頭，當即就衝那小販罵道：「你個小子，好生沒道理，我買你的東西，你還罵上人了？大家都來評評理，這人當街欺負我一個老婆子，還有沒有王法啦？」\n小販也沒料到這看似好欺負的老太婆是個硬茬兒，眼見不少人都圍觀了起來，慌忙解釋道：「是這老婆子瘋瘋癲癲的，一會兒說武安侯接了她閨女的髮帶，一會兒說她閨女是個女將軍，這會兒又在我鋪子前撒起潑來了！」\n趙大娘叉腰怒懟道：「我閨女怎麼就不是個女將軍了？」\n小販一聽趙大娘自己應聲，激動得不得了，趕緊衝圍觀的眾人的道：「大伙兒都聽見了，是這瘋婆子自己在發癲吧？大胤能被稱一聲將軍的女將，也就雲麾將軍一位，難不成你閨女是雲麾將軍？」\n他話音一落，眾人指指點點的戲謔聲也四起。\n「當真是個瘋婆子吧？雲麾將軍那等女中豪傑，會有個這等上不得臺面的娘？」\n趙大娘也是被那小販趕客又被指著鼻子罵，給氣蒙了才同小販吵嚷起來的。\n一聽到這話，她便已後悔同這些人吵起來了，樊長玉畢竟是在朝為官的，她此舉便是沒給樊長玉帶去了麻煩，讓樊長玉丟了人，她心中也自責。\n趙大娘道：「我是她鄰家大娘，那是我看著長大的閨女！」\n說罷就想離開，奈何人群圍得水洩不通，圍觀的人看出她是嫌丟人想走了，哪肯放她離開。\n其中一個獐頭鼠目的小鬍子男人更是大聲譏嘲道：「喲，你只是雲麾將軍鄰家大娘啊，我還說我是她叔父呢！」\n眾人皆是哂笑。\n人群外忽傳來一道幹練颯氣的女聲：「大娘，您還沒選好料子？」\n紛嚷的人群忽地一寂，大伙兒自動讓出一條小道，朝後方看去。\n只見後方站著一身量高挑的女子，女子左手抱著一個拿著糖人兒的女童，右手牽著一個拿冰糖葫蘆的男娃娃，兩個娃娃臉上都帶著街頭賣的花臉面具，乍一眼瞧去，還以為是雙胞胎。\n樊長玉驟然被這麼多人盯著，心頭還有些怪異。\n她給長寧和寶兒買完糖人後，回馬車前聽說趙大娘買布匹去了，但遲遲沒回來，又見這邊圍了不少人，才過來瞧瞧是怎麼回事。\n怎料她一出聲後，眾人都是面色各異地看著她，趙大娘臉色則瞬間門難看了起來，她上了年紀腿腳本不太好，這會兒卻幾乎是一個箭步衝過來，抱起俞寶兒就對樊長玉道：「快些走！快些走！」\n樊長玉一臉莫名，但還是抱著長寧跟上趙大娘往馬車處去了。\n圍觀的人群裡這才有人小聲道：「那好像……真是雲麾將軍？」\n有人附和：「沒錯，就是雲麾將軍，前些日子薊州的將軍們進京的時候，我在城門口見過她，她當時騎著高頭大馬，就跟在唐將軍後面，可威風了！」\n這話一出來後，圍觀的眾人詭異地又陷入了一片沉寂。\n好一會兒，才有人小心翼翼地道：「所以……武安侯揣懷裡的那條髮帶，真是雲麾將軍的？」\n鋪子前的小販和先前買布料的幾個婦人皆是一臉見了鬼的神情。\n誰知道一個外鄉老婆子抄著一口不太流利的官話說出來的奇葩之言，竟然是真的！\n緊跟著又有人弱弱出言：「雲麾將軍帶著的那對龍鳳胎，該不會……就是她同武安侯的吧？」\n眾人齊齊咽了咽口水，他們今日這是無意間門撞破了一個天大的秘密？\n小販從一臉懵逼中反應過來後，抱起幾匹布料拔腿就去追樊長玉和趙大娘，邊追邊喊：「雲麾將軍，大娘！這幾匹布是小的送您的！小的先前有眼不識泰山，還望勿怪！」\n趙大娘生怕給樊長玉招去禍端，扭過頭兇神惡煞衝那小販吼道：「她不是！你認錯人了！」\n但怎麼都有點此地無銀百兩的味道。\n全程一臉懵逼的，大概只有樊長玉自己了。：，，.`

            content: `一直到上了馬車,謝七一甩馬鞭，駕車離開那鬧市後，趙大娘才長舒了一口氣。\n樊長玉一頭霧水問：「大娘,這究竟是怎麼一回事？」\n趙大娘有些愧疚地道：「長玉啊,大娘糊塗，興許給你惹出麻煩來了。」\n她把自己在布匹攤子前同人起爭執的事說了,羞愧得頭都沒敢抬：「大娘也是聽那幾個婦人說那勞什子，言正接的髮帶是什麼李府小姐的,這才沒忍住一時嘴快，哪料到竟鬧成了這樣……」\n她一雙滿是老繭的手攏在袖子裡緊了又緊,才看向樊長玉道：「我聽人說,當官的很容易叫人彈劾的,這……這不會讓人彈劾你或言正吧？」\n趙木匠也怕老伴兒這舉動給樊長玉招去是非，當即就指了指趙大娘,數落道：「你啊你,都一把年紀了,逞個嘴快爭什麼？」\n趙大娘心中愧疚，被老伴兒數落了都沒吭聲。\n還是樊長玉道：「不是什麼大事，大娘您別自責,只是未免節外生枝,今後還是莫要再為這樣的事去同人逞口舌之爭。」\n皇帝和魏嚴,乃至李家都早已知曉了她同謝徵的關係,謝徵進城接了一名女子的髮帶的消息傳出去，他們猜都能猜到是她。\n至於旁的,她和謝徵早晚都會成親的，叫百姓們知道了也無妨。\n比較麻煩的或許還是她「孀寡」的身份，少不得會有人覺著她配不上謝徵。\n但覺著她配不上的那些人,縱使知道了曾經同她拜堂的也是謝徵，還是會覺著她配不上。\n放在從前樊長玉或許會有些介懷。\n可經戰場淬鍊了這麼久，生死她都看淡了，若還畏人言，那才真是越活越回去了。\n得了樊長玉這話，趙大娘方把一顆心徹底放回了肚子裡，她連聲道：「不了不了，以後都不會了。」\n馬車平穩駛回進奏院，長寧見趙大叔和趙大娘都不怎麼說話，坐在樊長玉懷裡問：「阿姐，姐夫是不是也要去皇宮受皇帝封賞啊？」\n她記得那天阿姐進城後就跟著將軍們一道去了的。\n樊長玉輕點了下頭，答：「自然是要的。」\n需日日朝見皇帝的，是那些五品以上的京官。\n外召回來的臣子，除了帝王提前授意，只需待在進奏院或去衙署辦理公務。\n樊長玉和唐培義這一批剛從西北戰場上下來的將軍，目前都還在賦閒中，估摸著年後皇帝才能給她們想好去處。\n但如今朝堂形式詭譎，龍椅上的那位自登基以來，就一直沒什麼實權，朝臣對天家的敬意，除卻那些做純臣的，也都是趨於表面，背地裡依附魏嚴或李家，各分黨派。\n小皇帝政績平平，野心倒是不小，之前拉攏李家想扳倒魏嚴，哪料操之過急，魏嚴還沒倒，就先讓李家看到了小皇帝架在他們脖子上的那把刀，讓李家轉而同皇長孫齊旻合作。\n小皇帝現下只能再回頭去尋魏嚴庇護，魏黨和李黨的鬥法的輸贏，約莫就在三司會審的魏嚴勾結反賊一案裡了。\n樊長玉這些日子為了查隨家究竟在當年的錦州一案中做了什麼手腳，經常出入大理寺旁聽審訊，試圖找到魏嚴此番勾結反賊，和當年設計錦州慘案的相關線索。\n但三司會審的進度極為緩慢，等結案怕是得拖一兩個月。\n龍椅上的變數，在數月後還未可知呢。\n長寧聽到樊長玉的話後一雙眼便晶亮了起來：「那皇帝陛下會賞姐夫什麼啊？」\n這個問題叫樊長玉陷入了短暫的沉思。\n謝徵弱冠之年便已封了侯，論戰功在整個朝堂再無其二，上回她跟著唐培義一同去金鑾殿覲見時，皇帝話裡有話地說要賜謝徵九錫（cì）。\n朝臣們卻噤若寒蟬。\n她當時便覺著奇怪，回進奏院後問唐培義九錫為何物。\n唐培義諱莫如深地答道：「自古以來，唯有天子封無可封了，才會賜臣下九錫，其中含納了車馬、冕服、樂懸、納陛、斧鉞、弓矢等九物，象徵的是無上皇權。但歷代被賜九錫的，都是不得善終的奸佞之臣。」\n眼下的朝廷是李黨和魏黨分庭抗禮。\n皇帝當日的話，是想把謝徵推到風口浪尖上，讓魏嚴和李太傅來對付謝徵麼？\n樊長玉心下難免也多了幾分憂慮，她幫長寧理了理衣領，只說：「皇帝要賞賜什麼，阿姐怎麼會知道呢？」\n長寧對這個回答顯然不是很滿意，埋首在樊長玉懷裡噘了噘嘴。\n長風偶爾掀起車簾的一角，樊長玉輕拍著她後背，目光透過車窗掠向皇宮所在的方向，眉頭微鎖。\n-\n皇宮。\n「宣，武安侯謝徵覲見——」\n傳召聲自冗長的宮道間傳來，在雁翅樓外東西兩側十丈高的城臺間撞起無數回音，渾厚威嚴。\n披甲配刀的金吾衛在午門前分站兩列，神情冷硬肅穆。\n日頭正高，廡殿頂上的琉璃瓦都被太陽光鍍上了一層金邊。\n謝徵一身戎甲，緩步走進了獸口般大開的宮門，玄色的披風在身後揚起，似拖曳著一地血沉煞氣。\n他眉眼散漫又噙著絲絲冷峭，肩頭的麒麟首肩吞在烈日下目眥猙獰，本是瑞獸，仿佛也多了一股在戰場上久飲人血後的戾氣和邪性，叫人不敢直視。\n宮道兩側的紅牆金瓦，在這剎那間恍若都失了平日裡的莊嚴與華貴，謙卑蟄伏在他跟前。\n待謝徵走上金鑾殿時，滿朝文武紛紛側目注視著他進殿。\n武官之首的位置還為他空著，立於左側文官之首朝位的李太傅，輕瞥謝徵一眼後，布滿皺紋的眉頭微鎖。\n魏嚴養在身邊的這頭狼崽子，終究是長大了，論其狂佞和手段，當真是半點不輸年輕時的魏嚴。\n他收回目光後手捧笏板，繼續平視前方。\n謝徵對所有打量的視線視若無睹，抬眼看向坐於金鑾殿上方的年輕皇帝，齊昇與之視線一撞，面上的笑意都牽強了幾分。\n謝徵唇角似嘲非嘲地一扯，連跪拜之禮都懶得再行，只將腰身往前微傾了一個度，抱拳道：「微臣參見陛下。」\n他已封了侯，朝見天子無需再自稱將。\n齊昇一面懼他，一面又暗地裡恨得咬牙切齒，勉強維持著臉上的笑意道：「謝愛卿快快平身。」\n隨即看向滿朝文武：「謝愛卿乃大胤棟梁，朕特許其劍履上殿、入朝不趨、贊奏不名。」\n這是從謝徵封侯時，他便允謝徵的特權，可以說，從那時起，他就在謀劃著怎麼離間魏嚴和謝徵這對甥舅了。\n分列左右兩側的文武大臣們，對於齊昇這話，都不敢多言。\n齊昇看著滿朝寂靜的朝堂，心中對皇權敗落的怨恨更重，可又別無他法，只能皮笑肉不笑地看著謝徵道：「此番平崇州反賊之亂，謝愛卿九死一生，乃居首功，北庭也幸得謝愛卿鎮守，才安穩迄今，今特賜愛卿九錫。」\n言罷他輕撫掌心，便有太監將早就備好的賞賜之物放在鋪了黃綢的託盤裡端至謝徵跟前。\n謝徵目光掃過數名內監捧著的各式精美器物，眼底涼薄更甚，依舊是微微一傾身謝恩：「微臣謝陛下隆恩。」\n-\n一場朝會總算是有驚無險地結束，魏黨因魏嚴多日稱病不上朝，又深知謝徵的脾性手段，全程不敢多言，李黨倒是對謝徵忌憚有加。\n但李太傅一直沒發話，底下的人便也不敢貿然招惹謝徵。\n唯有那幾名捧著託盤到謝徵跟前去遞御賜之物的太監，下去後腿都還抖個不停。\n李太傅同自己的長子和幾個心腹門生在退朝後算是走得早的。\n他的長子李遠亭眼見四下都是自己人，還在金水橋處，就忍不住問李太傅：「父親，武安侯如今的勢頭，儼然已蓋過魏嚴了，他一日不離京，咱們的計劃……」\n饒是心下憤懣，李遠亭也沒敢再繼續說接下來的話。\n李太傅身上的仙鶴紋官袍在日光底下閃著耀眼光澤，比起長子的急不可耐，他腳下步子依舊不緊不慢，面上也是波瀾不驚：「慌什麼，船到橋頭自然直。」\n他話音方落，身後遠遠地忽傳來一道散漫又壓迫感十足的嗓音：「太傅留步。」\n李太傅頓住腳步，轉身看向踏著漢白玉石階緩步朝他走來的年輕武侯，不漏深淺地問了句：「不知侯爺有何指教？」\n謝徵唇角輕扯：「指教談不上，只是有一物想交與太傅。」\n他漫不經心走近時，簇擁著李太傅的一眾文臣還是緊張了起來，下意識咽了口唾沫。\n可能是心理暗示太強，以至於他們覺著謝徵一靠近，仿佛都有一股淡淡的血腥味籠罩了過來，膽小的甚至臉都白了幾分。\n李太傅倒是神色如常，一雙老而有神的眼望著謝徵道：「老夫與侯爺私交甚少，不知侯爺有何物要交與老夫？」\n謝徵在距李太傅三步開外頓住腳步，抬手間，一枚繫著紅繩的玉佩從他手中脫落，在半空中輕蕩，玉佩上還刻了個「安」字。\n李遠亭在看到那枚玉佩時，便已臉色大變：「這……這是懷安的玉佩！」\n謝徵指尖一松，那枚玉佩便險些摔落在地，幸得李遠亭手快，及時抓住了繩結。\n謝徵散漫道：「完璧歸趙。」\n李遠亭急得大聲斥問謝徵：「你將吾兒如何了？」\n謝徵冷淡一抬眸，睨著這位戶部尚書慢悠悠道：「本侯不是說了麼，完璧歸趙。」\n李遠亭憂子心切，已是急得臉紅脖子粗，謝徵卻不再搭理他，轉看向李太傅，長眸碎進了日輝，愈發叫人看不清底色：「東西還了，本侯先行一步。」\n謝徵一走，李遠亭就忍不住對著李太傅道：「父親，懷安落到了謝徵手上，他這是什麼意思？」\n李太傅看著那青年武侯遠去的背影，蒼老的眼底掠過幾點微芒，道：「他在威脅老夫。」：，，.`

            title: `第144章第144章`,
            content: `李遠亭尚不解李太傅這話中之意,便見父親已抬腳繼續往宮門處走去，他忙追上去問：「他想要咱們拿什麼去換懷安？」\n李太傅滿是褶子的眼皮微耷，掩下了眸中的深色：「懷安不會做出背叛李家的事。」\n李遠亭因父親的這句話愣在了原地。\n不會背叛李家,意思是縱使李懷安落到了謝徵手中,他們一手促成的反賊逃出崇州、險奪盧城一事，也不會被謝徵拿到證據？\n謝徵正是因為撬不開懷安的嘴,才特拿懷安的玉佩來同他們談條件的？\n李家父子二人的官橋已被下人抬到了午門外的大街上，李遠亭在李太傅彎腰快上前攔住了他,情緒明顯有些激動：「父親，您是想棄了懷安嗎？」\n李太傅不溫不火地看了長子一眼：「你以為李家眼下還有別的路可走？」\n從李家全力擁護皇長孫開始,李家在皇帝那兒就已是恨不能將他們先誅之而後快的亂臣賊子了。\n皇長孫手中也握有同他們來往的書信物證,相當於拿住了他們的命脈,李家除了繼續擁護皇長孫，再無他法。\n捨棄李懷安,是能最大程度保住李家利益的唯一法子。\n李太傅坐進轎中後,李遠亭仍被那句話怔得久久立在原地。\n哪怕明白李家如今的處境,他還是難以置信父親就這麼捨棄了李家這一輩最年輕有為的一個孩子。\n邊上候著的下人眼見李太傅的官橋已走，小心詢問道：「大人，起轎嗎？」\n李遠亭想到已淪為棄子的兒子,心中悲意翻湧,面上一片灰敗,轉身進轎道：「回吧。」\n-\n皇宮。\n齊昇自從金鑾殿離開後,都不及回太乾宮，便在偏殿砸了一地的花瓶玉器。\n他砸得累了,方兩手撐在几案前，喘著粗.氣，惡狠狠盯著地上那一堆碎瓷：「他謝徵哪還有半點把朕放在眼裡的樣子？」\n伺候的太監噤若寒蟬,饒是平日裡再巧舌如簧，此刻也不知如何拍這位喜怒無常的帝王的馬屁。\n齊昇自己喘了一會兒，倒是陰惻惻笑了起來：「且讓他再狂這一時吧，他謝徵的好日子也快到頭了。」\n不知是想到了什麼，他心情忽地就好了起來，甚至自己理了理因為方才發怒砸東西而弄亂的龍袍，唇角彎彎道：「回太乾宮。」\n然剛走出偏殿，便被漢白玉石階處暈開的那一抔血色嚇出了一聲短促的尖叫。\n齊昇直接癱坐在了偏殿門檻處，滿是驚懼的瞳仁裡映出自己一名心腹太監大睜著眼慘死的模樣和一把還在往下滴血的長刀。\n他看向那一身戎甲，持刀冷佞立在大殿下方的人，哆嗦著喝問：「武……武安侯，你……你想弒君造反不成？」\n謝徵手腕輕抖，刀尖上瀝著的血珠子便落了個乾淨，他慢條斯理地將長刀送回了一旁金吾衛空著的刀鞘中，絲毫沒理會那金吾衛慘白的臉色，抬眸淡淡朝齊昇看來：「陛下可冤枉微臣了，微臣是聽聞這太監妖言禍主，陛下又允了臣生殺大權，這才鬥膽替陛下除了這禍害。」\n死的那太監，正是先前去崇州督軍的宣旨太監。\n他得了齊昇的暗諭，若非後來李家放任魏嚴聯手皇長孫，在崇州城來了個金蟬脫殼，轉而去攻盧城，只怕下一步就是要在戰場上對樊長玉下手。\n饒是奸計未成，唐培義調騎兵要去盧城支援時，他也從中作梗。\n若非唐培義硬氣，真要被那太監以回京報信為由帶走了大部分騎兵，盧城還真守不住。這太監回京後，沒少把在崇州的事添油加醋說與齊昇。\n若不是唐培義等人打了勝仗，齊昇沒處發作，否則唐培義和樊長玉他們此番進京，不死也得脫成皮。\n謝徵先前還沒空收拾這些爬蟲。\n今日正大光明的「回京」了，該算的帳自然得一筆筆算清楚。\n齊昇看著閒庭漫步般朝自己走來的男人，面白如紙，想喚人護駕，可偌大一個宮殿，外邊的守衛竟然只餘那一名金吾衛。\n其餘人不知都被謝徵支使到哪裡去了，齊昇心下更加害怕，撐在地上的兩手都止不住地發抖，盯著越靠越近的謝徵，色厲內荏道：「你……你想做什麼？」\n其狼狽模樣，哪還有半分帝王儀態。\n謝徵眼底划過一抹淡淡的譏諷，腰身微折，朝著齊昇遞去一隻手，他本就生了一副好皮囊，提唇淺笑的時候，更是極具欺騙性：「臣處理妖言惑主的奴才，不慎讓陛下受了驚，實在是罪該萬死，臣扶陛下起來。」\n齊昇看著跟前這張俊美的臉孔，只覺比看到了夜叉惡鬼還可怕。\n他沒敢要謝徵扶他，自己撐著門框正欲起身，肘關卻被一隻鐵鉗似的大手捏住。\n這是齊昇頭一回知曉武將手上的力道有多可怕，他喉間溢出一聲悶哼，只覺整條手臂都快被謝徵捏斷了，額角的冷汗滾珠一般往下滴落。\n謝徵嘴角依舊噙著那絲薄笑，慢條斯理地問：「陛下先前在朝堂上對雲麾將軍出言輕慢，也是受那奴才挑唆的吧？」\n齊昇心頭大震，終於明白過來，謝徵今日之舉是在為樊長玉出氣。\n他且驚且怒，對謝徵竟敢不敬皇權至此，生出一股扭曲的惡意，只是此刻通通被恐懼所覆蓋，他鬢角滾落一顆豆大的汗珠子，白著臉附和道：「是……是那狗奴才向朕說了讒言。」\n謝徵黑睫稍抬，可算是鬆了對齊昇肘關的鉗制，意有所指地道了句：「如此最好。」\n齊昇當然聽出了謝徵話裡的威脅之意。\n他今日就是前來警告他的，莫要再把主意打到樊長玉身上去。\n縱容心下再憤恨，肘關處傳來的劇痛還是讓齊昇保持了清醒，沒敢在謝徵跟前說出什麼不該說的話來。\n謝徵淡淡瞥了他一眼，攏手虛作一揖：「奸佞已除，臣便退下了。」\n等謝徵完全走出了視線，齊昇才脫力扶住偏殿的門框才堪堪站住，嚴冬臘月的，他後背的衣物也叫冷汗打溼了個透。\n從頭到尾大氣都不敢喘一聲的總管太監，這才白著臉上前去扶他，捏著尖細的嗓音罵道：「他謝徵當真是狼子野心！謝家滿門忠烈，他膽敢目無王法，也不怕給謝家蒙羞！」\n齊昇面色陰沉，一把揮開前去扶他的總管太監，望著謝徵離開的方向低語道：「朕留不得他了！」\n-\n謝臨山當年的駐京大將軍，謝家在京城也有府邸，他的住所，便無需再另行安排。\n幾乎是下朝後不久，便有宮裡的人將皇帝賜他的九錫之物送去了府上。\n謝徵只回去換了身便服，連前去送禮的太監都懶得見，直接去進奏院找樊長玉。\n這一去，卻撲了個空。\n原是樊長玉帶著趙大娘她們回來後不久，唐培義便差人將她叫過去了。\n三司會審的進度，不僅樊長玉時刻關注的，唐培義一心想替賀敬元討回公道，也一直密切注意著大理寺那邊的動靜。\n這不今日謝徵回京，大理寺那邊再審被抓的隨家部將和僕役時，又用刑過度打死了一個人，只是事情暫且被壓了下來，還沒上報到朝中去。\n唐培義憂心是大理寺有魏嚴的人，要是隨家的主要人證全都在三司會審過程「暴斃」而亡，指認魏嚴便更無可能了。\n今天下午還有一場審訊，唐培義怕再出什麼岔子，決定帶樊長玉、賀敬元長子及鄭文常一道去旁聽。\n-\n大理寺。\n入冬後的天氣一日冷過一日，樊長玉如今已是三品武將，在旁聽席上也有了落座之地，左手邊的矮几底下，放著取暖的炭盆子。\n公堂之上，主審官乃大理寺卿，緊挨其左右的便是刑部的人和御史臺的官員。\n他們跟前那鋪了錦緞的公案底下，也全放了炭盆，暖意比起下方的旁聽席只會更甚。\n跪在下方的反賊餘孽，一個個只著一件被打得破爛不堪的單薄囚服，蓬頭垢面，手臉皆已被凍得青紫。\n在大理寺任職久了的官員們都有經驗，嚴冬臘月審訊是最好的時機，什麼刑都不用，單是凍上個一兩晚，就能有犯人熬不住自己招了。\n樊長玉已旁聽了一陣，主審官們無非是走流程問一些問題，但在答話之前，囚犯都得先被拖出去打上個三十大板，行刑的人下手極重，三十大板下來，幾乎已是皮開肉綻。\n唐培義說這是殺威棒，吃過苦頭了，再答話時便不敢信口雌黃。\n只是這下午審訊的，都是些小嘍囉，場外的刑凳上血都瀝了一灘了，還是沒問出什麼要緊信息。\n中場修整的時候，旁聽的官員都去耳房喝些茶水，亦或是出去走走透氣。\n唐培義眼見四下沒人了，才壓低了嗓音道：「上午審出了人命，下午就只審些無關痛癢的僕役，魏嚴雖告病在家，這手還是伸得夠長啊！」\n樊長玉聞言不由皺眉道：「大理寺若有他的人，那長信王府的那個幕僚，要不要加派人手保護？」\n賀敬元的長子賀修筠道：「李太傅的人比咱們更急，李家不會讓他死於非命的。」\n唐培義頷首表示贊同，又說：「李家眼下還是苦於找不到指正魏嚴的物證，後邊約莫還得再審隨元淮那妾室，有孩子這個軟肋在，她應該藏不住什麼秘密。」\n樊長玉忽地問：「上午審過隨元淮那妾室了？」\n她當然知道大牢裡關押著的那隨元淮妾室是假的，只是她既被齊旻用來頂替了俞淺淺母子，想來也是隨家人。\n但以齊旻的手段，萬不會送一個掌握了自己秘密的人到朝廷手裡。\n嚴刑逼供，可能逼問不出魏嚴同隨家勾結的罪證，但會不會審出「隨元淮」還沒死的消息就不知道了。\n皇帝本來就忌憚謝徵，又在唐培義帶著薊州部將回京第一日朝見時，就故意使絆子。\n若是再有了這個由頭，反賊餘孽沒死，所有參與平叛之亂的將軍們，別說論功行賞，只怕還得被問罪，屆時的情況對她們只會極為不利。\n樊長玉攥緊手心，臉色不由嚴峻了起來。\n原來齊旻還在這裡挖了個坑等著她們！\n只要三司會審一切順利，等魏嚴被李家扳倒，她們也會因謊報剿滅反賊換取軍功被治罪。\n這簡直是一石二鳥之計！\n唐培義見樊長玉臉色不太好看，道：「沒來得及審，傳喚隨元淮那妾室前，先審了隨元淮身邊一個長隨，就是那長隨被打死了。哪料到那妾室上公堂時，路過院子看到刑凳上打死的長隨，當場就給嚇暈過去了。大理寺的人怕她就這麼給嚇死了，去請了太醫，這事才傳了出來。」\n樊長玉道了句「原來如此」。\n她心底裝著事，接下來的審訊便也無心聽了，尋了個由頭離開了公堂。\n她轉悠著去了大牢所在地，門口的守衛見她著三品武官服飾，擋住路抱拳道：「大人，牢房重地，不可再往前了。」\n樊長玉負手在身後，眼皮稍抬冷淡一點頭，端的是一派喜怒不露於色的大將之風，轉身便又轉悠著往別處去了，仿佛方才只是想著事，一時不差，才誤走到此處來的。\n要被三司會審的朝廷重犯，皆不可無令單獨提審，也不可再探監。\n樊長玉想摸清大理寺的地形和兵防布守後，趁夜潛入大理寺。\n她沿著高牆走，繼續不動聲色地打量大理寺地形時，忽有什麼東西打在了她肩頭。\n樊長玉垂眸一看，見掉在地上的是一個裹得緊實的梅花苞。\n她仰頭望去，便見謝徵曲起一條腿坐在灰瓦牆頭，單手拂開一枝斜伸出來的紅梅，微偏過頭看著她，容顏如玉，映著灼灼梅花竟也毫不遜色。\n他鳳眸微垂，懶洋洋問她：「你一路打量著從南牆根走到北牆根，打算做賊呢？」：，，.`
        },

            num: 145,
            title: `第145章第145章`,
            content: `午後的陽光明媚得有些刺眼,樊長玉仰著頭望著坐在高牆上的陌上少年郎，微微失神了一瞬。\n聽得謝徵的問話，又升起幾分心思被撞破的微窘。\n她落著一圈日輝的長睫小扇子似的撲閃了兩下,因為繞大理寺走了一圈,日頭又烈，白皙的面頰上也透出幾分淡粉,其間門細小的絨毛都清晰可見，卻負手於身後做出一副穩沉模樣：「你怎在這裡？」\n謝徵笑笑,從牆頭一躍跳了下去，正好落於樊長玉跟前：「在雁翅塔上看到有人繞著大理寺牆根走,似想做賊,過來看看是何方小賊。」\n聽著這調侃的話,樊長玉一隻手不自覺握成了拳，暗含警告地瞪向謝徵,大有再拿她說笑就動武的意思。\n謝徵很懂見好就收,轉而問：「你想夜探大牢？」\n樊長玉想到自己的計劃,四下瞥了一眼，哪怕確認了附近沒人，保險起見,還是靠近謝徵兩步,湊近他耳邊低語道：「那個假冒俞淺淺的人,聽說後邊還要審她,我怕她供出隨元淮沒死，打算去劫獄。」\n她嗓音壓得極低,說話時清淺的吐息就噴灑在謝徵耳廓，酥.麻得像是有蟲子沿著耳際爬過。\n謝徵配合地微傾了下身子聽樊長玉說話，面色如常,耳尖卻隱隱已開始泛紅，背在身後的一隻手，指節也不自覺捏緊，似在強行忍耐什麼。\n樊長玉半點不覺，說完了還抬起頭看謝徵：「你覺得怎麼樣？」\n她如今在外人面前為了立威，慣會做一副冷臉了，可同親近的人說話，一雙澄澈明淨的大眼裡還是透著幾分老實巴交的憨氣，像是胖貓一般在雪地裡打滾的猛虎。\n結合她說的話，當真是又呆又兇。\n謝徵黑眸靜視著跟前這滿眼晶亮的少女，費了些力氣才將眸光從她微幹的唇上移開，綁在手腕上的那條髮帶似在發燙，殘存的那點理智勉強叫他理清了她話中的意思。\n他道：「劫走三司會審的朝廷重犯，你不怕被查？」\n樊長玉一片坦蕩的大眼眨了兩下：「要懷疑，不也應該懷疑到魏嚴頭上麼？兵法上管這叫……叫禍水東引！」\n謝徵沒忍住扯唇輕笑出聲，「你自創的兵法麼？」\n樊長玉愣了一下，她也是一時想不起來該管這計謀叫個什麼名字，才胡謅的，被謝徵這麼一說，頓時生出幾分窘迫。\n她乾咳兩聲道：「反正就這麼個意思。」\n謝徵背靠牆根半垂著眸子，緩緩道：「大理寺外的守衛申時便交接換崗，大牢內守夜的獄卒只有十八人，但只要發現有人劫獄，值防的獄卒便會敲響金鐘，牢內所有出口都會落鎖，牢外的官兵也會裡三層外三層圍成一個鐵桶。」\n樊長玉呆了一呆，頭疼地抓了一把頭髮問：「意思就是，劫獄不成了？」\n謝徵眼皮淺淺一撩：「劫。」\n樊長玉：「……」\n-\n夜寒露重，不知何處傳來一兩聲犬吠，驚得枯樹枝頭寒鴉飛起。\n亮著兩盞昏黃燈籠的大理寺，在夜幕中好似一座靜靜聳立的墳塋。\n大牢深處的壁龕裡插著火把，松脂味兒混著大牢裡經年不見日光產生的黴味，飄散在空氣中，燻得人昏昏欲睡。\n大理寺牢房呈「十」字形布局，每一個岔口進的都極深，往裡約莫有二三十間門牢房，四名獄卒分為兩人一組，便在這一條單道裡來回巡視。\n中間門四條道□□匯處，設了刑房和值守室，牢頭和副牢頭通常都是候在這裡，便於接待前來牢裡審訊犯人的大官，若是有劫獄者，一旦聽到動靜，也能及時敲響值守室的大鐘。\n這一夜牢頭和副牢頭坐在方桌前，不知打了多少個哈欠。\n「不成，我得去洗把冷水臉醒醒神。」副牢頭打著哈欠起身。\n牢頭撐著手肘也是昏昏欲睡，道：「給我也打盆水來，這嚴冬臘月裡，可真容易犯困。」\n副牢頭應了聲，便出去打水。\n牢頭睡眼惺忪又打了個哈欠時，半睜眼間門卻發現有一團高大的黑影籠罩了自己。\n牢頭心中一凜，但還沒來得及回頭，便被一手刀砍在後頸，兩眼一黑徹底昏死過去。\n兩名巡視走到岔道口.處的獄卒正要出聲，耳際似乎也有風聲逼近，隨即頸後一痛，軟趴趴倒地，隱約還有骨節錯位聲響起。\n謝徵打暈了牢頭，回首一看，便見樊長玉著一身夜行衣，正蹲在地上給一名獄卒正骨。\n面對他投去的不解的目光，樊長玉尷尬道：「沒注意，下手重了點，把人肩膀給砍脫臼了。」\n手臂接回去的剎那，劇痛讓獄卒轉醒，只是一聲痛呼都還沒來得及發出，就又被人一巴掌給拍暈過去了。\n端著一盆冷水回來的副牢頭瞧見這一幕，驚得手中木盆掉落，張嘴便要大呼有人劫獄，怎料立在牢頭身邊的那名黑衣人，身形有如鬼魅般瞬間門逼近，以手為劍指在他喉間門一點，腳尖再抵著下落的水盆往上一挑。\n副牢頭只覺喉間門一痛，歇斯底裡大喊也再發不出任何聲音，而那險些掉落在地的水盆，也叫那黑衣人輕輕鬆鬆接住，就連顛簸浪出去的水，都被他一滴不剩地接回了盆裡。\n副牢頭心中大駭，拔腿還想跑，叫趕過去幫忙的樊長玉一個箭步躍起，肘關擊在他後頸，白眼一翻暈了過去。\n樊長玉淺淺吐出一口濁氣，輕聲道：「最後一個。」\n來這值守室前，她們已從窗戶潛入，劈昏了牢內巡邏的其他獄卒。\n謝徵從牢頭身上取出一串長短不一的鑰匙，說：「隨家人關押在甲九間門。」\n樊長玉跟著謝徵往標了「甲」字跡號牌的牢房甬道走去。\n夾道內每隔數丈就有火把照明，她們無需提燈。\n隨元淮的妾室和獨子作為重要欽犯，被單獨關在了一間門狹小的牢房。\n牢房門上拴著的鐵索有嬰兒手臂粗，謝徵只能挨個試那一大串試鑰匙，細微的鐵鏈響動聲驚醒了旁邊大牢裡關押的犯人。\n只是他們都不敢出聲，因為不確定來的人是要殺他們的，還是要救他們的。\n被單獨關押的那對母子，女人比起樊長玉初見她時，更蓬頭垢面了些，用力抱著自己懷中的孩子時，單薄的衣料繃緊，瘦得幾乎能看到她後背凸出的骨節。\n她看著牢房外的謝徵和樊長玉，眼底沒有希翼，只有驚恐，就連抱著她孩子的手都在不住地發抖。\n未免節外生枝，樊長玉也沒出聲，只在夾道前方替謝徵放風。\n怎料對面一間門牢房裡，一個頭髮花白的老頭突然歇斯底裡大喊：「劫獄啦——殺人啦——」\n靠近牢房頂用來透氣的幾個雞蛋大小圓孔處，透出一片攢動的火光，顯然老頭的叫聲讓大牢外的守衛聽到了。\n謝徵眸色一冷，樊長玉也是瞬間門緊張起來。\n原本她們靠著投放輕劑量的迷.香，神不知鬼不覺打暈了大牢裡的獄卒，時間門是很充足的，現在因為那老頭的那一聲，整個大理寺的出口很快就會被圍起來了。\n挨個試鑰匙的時間門也不夠了。\n樊長玉一咬牙，在謝徵還在冷靜繼續試鑰匙時，衝過去道：「讓我來！」\n嬰兒手臂粗的鐵索她扯不斷，但是蠻力十足的幾腳踹在牢房的柱子上時，那幾根拳頭粗的木柱還是被應聲踹斷了。\n樊長玉仗著男女身形上的優勢，擠進去拎小雞仔似的，將牢裡的女人和那孩子兩手各拎一邊給拎了出去。\n在牢房參差不齊的缺口處，將那被嚇傻的小孩往謝徵手上一塞，自己扛起那女人衝謝徵道：「快走！」\n謝徵看著被塞到自己手上的小崽子和樊長玉肩頭扛著的女人，想說他去扛那女人，但念及那女人身上只著一件單衣，到底還是沒出聲，只單手拎著那小孩跟著樊長玉快速往出口掠去。\n那老頭看到樊長玉她們劫走隨元淮的「妾室」，不知是真不知那對母子的假冒的，護主心切，還是因為別的，情緒格外激動，兩手攥著牢房的木柱，一直再大喊：「來人啊！劫囚啦——」\n謝徵眉頭微皺，在快離開時，朝後方投去冷冷一瞥。\n-\n大理寺外的守衛在聽到牢裡傳出的呼救聲後，便一窩蜂往牢裡趕，待進了大牢，發現獄卒都被放倒了，更是大呼不妙，徑直往關押隨家人的牢房走去，發現隨家下人和落網的部將一個沒少，只是隨元淮的妾室不見了時，額角已是冷汗涔涔。\n守衛頭子大喝：「守住所有出口，掘地三尺也要把人給我找出來！」\n可借著火把的光芒，瞧見牢房那幾根被徑直踹斷的不規則木柱時，心中不免還是驚駭。\n此等神力，這劫獄的究竟是何方神聖？\n-\n白天勘測過地形，樊長玉扛著那女人，很快就找到了防守最薄弱的那處圍牆，身形矯健翻了出去。\n謝徵提著孩子，緊隨其後躍了出去。\n到了外邊，怕那女人認路，樊長玉從懷裡掏出一早就準備好的麻袋，直接給那口中塞了棉布的女人兜頭套上了。\n隨即又掏出一個小的遞給謝徵，「給那孩子也套上。」\n動作之熟練，讓謝徵微默了一息。：，，.`

        {
            num: 146,
            title: `第146章第146章`,
            content: `樊長玉見謝徵沒接,抬頭疑惑地看了他一眼：「怎麼了？」\n謝徵神情微妙地接過那個小的麻袋，說：「沒什麼。」\n就是這場景太過似曾相識。\n遠處已有馬蹄聲和凌亂的腳步聲傳來，大理寺的官兵開始往街上搜查了。\n樊長玉一刻也不敢掉以輕心,把人往肩頭一扛道：「得快些離開這裡！」\n大晚上的,街頭早已宵禁，家家戶戶門戶緊閉。\n馬車的車轆聲和馬兒的馬蹄聲在萬籟俱寂的夜晚裡都太過明顯,為了劫獄後方便逃跑，她們此行前來,並未趕馬車或是騎馬。\n若是被大理寺的官兵駕馬追上來，還真不好甩掉。\n謝徵單手提著那個腦袋上也被罩了麻袋的孩子,食指放到唇邊吹出一聲哨響,躲在暗處的親衛們便從房屋或樹上跳了下來。\n謝徵淡聲道：「去把追兵引開。」\n幾名親衛身上穿的也是夜行衣,肩上扛著個大.麻布袋子，瞧著鼓鼓囊囊的,裡邊不知塞了些什麼,聞言便兩人一組,朝著官兵追來的方向飛快離去了。\n樊長玉瞧得一愣：「你還準備了後手？」\n謝徵說：「總不能沒個萬全之策，就讓你去涉險。」\n這句「萬全之策」，說得樊長玉莫名一陣心虛。\n兩人都是排兵布陣的將軍,這麼一比,自己好像就輸了他一頭。\n雖然按她原本的計劃,也是十分周全的了,可誰能料到大牢裡那老頭會突然大叫引來外邊的官兵呢？\n戰場上怕的就是這種萬中一失。\n謝徵見她突然臉色微紅地不說話了，還當她是突然害起了羞來,不由多看了她一眼，心頭有些麻麻的，白天裡那種仿佛有螞蟻在心坎兒上咬的感覺又來了。\n他趕緊移開視線,說：「跟我來。」\n樊長玉跟著他七拐八拐地拐進一條巷子時，外邊大街上還有打著火把騎馬飛快掠過的大理寺官兵。\n隔得遠遠的聽見他們在吼：「劫獄的人往城東跑去了！快追！」\n「大人！大人！袁千總說在城北五柳巷、城南金鑼巷、城西順康坊也看到有兩名黑衣人肩頭扛著人跑了！」\n「他娘滴！這是給老子放了多少煙霧彈，分頭去追，總有一個是真的！」\n……\n在官兵頭子的罵罵咧咧聲中，謝徵敲開了暗巷中一戶人家的後門。\n開門的是個老伯，見了謝徵，什麼也不多問，躬著身子，恭敬地將他們給引了進去。\n樊長玉注意到從廊下走過的房間裡，房門上都掛著天地玄黃的牌匾，暗忖這應該是一家客棧才對。\n被帶到一間明顯區別於其他客房的廂房後，待老伯退下了，樊長玉才問：「這好像是一座客棧，也是你的地方？」\n謝徵答：「是趙家名下的產業。」\n樊長玉暗暗咋舌，心道那個趙家書肆的東家，產業也太多了些。\n似知道她所想，謝徵道：「西陵趙家，祖上做茶葉發家的，成祖那會兒，趙家還被封了皇商，後來盛極轉衰，雖是沒落了下來，但瘦死的駱駝也比馬大。」\n樊長玉受教地點了點頭。\n不知何故，那還被罩著頭的女人，在聽到謝徵說起趙家時，身形不可避免地顫抖了起來。\n謝徵微微皺眉，伸手摘下了女人頭上的麻袋，一雙黑眸在昏黃的燭光裡尤為冰冷攝人：「你認識趙詢？」\n女人嘴裡還塞著棉布，聞言臉色已是慘白，只一個勁兒地搖頭，眼底卻已快被嚇出淚來。\n恰在此時，外邊傳來一道年輕男子的嗓音：「聽聞貴人深夜來訪，多有怠慢之處，還望貴人見諒。趙某有些事想稟與貴人，不知貴人方便與否？」\n樊長玉聽出這聲音，似乎就是趙詢，不由也看向那女人。\n「想好了再答。」\n謝徵冷淡的嗓音在這不大的屋子裡響起，恍若凌遲。\n房屋的隔音不錯，在裡邊若不提高了聲量說話，在外邊的人幾乎聽不見。\n女人眼底噙著淚，惶然地點了下頭。\n樊長玉和謝徵對視一眼，對這個結果既是覺意外，細想似乎又在情理之中。\n-\n趙詢在屋外站了半刻鐘不到，房門便打開了。\n他年紀輕輕能接管趙家，並暗暗把趙家的生意鋪到整個大胤都是，自是有幾分本事的，進屋後都沒抬頭，只用餘光掃了一眼，便淺笑著又帶了幾分恭敬朝著謝徵和樊長玉一揖：「見過二位貴人。」\n謝徵不喜同人客套，開門見山問：「這女人，你可認得？」\n趙詢一怔，抬起頭細細打量了神情狼狽坐在床邊的那對母子片刻，隨即唇角彎彎，對謝徵道：「認得。」\n謝徵眼皮稍抬，示意他繼續說下去。\n趙詢道：「趙某替皇長孫做事時，常常出入長信王府，明面上自然得同隨家做些生意，也少不了上下打點人情關係。趙某曾和長信王府的管家吃過幾回酒，在他家中見過這小婦人。這小婦人乃是長信王府管家的兒媳，她丈夫則是隨元青身邊的長隨。」\n樊長玉眉頭微皺看向那女子：「白日裡被打死的那名長隨，就是你丈夫？」\n女人紅著眼點了頭。\n樊長玉原本還以為劫獄時那突然大喊的老頭是怕她們對隨元淮的妾室不利，為了護主這才大喊大叫的，此刻隱約也猜到了幾分隱情，問：「在牢裡叫來官兵的那老頭，是你公爹？」\n女人太害怕了，還是只知道點頭，眼底流出的淚已泅溼了臉頰。\n樊長玉眉頭皺的更深了些。\n無怪乎這女人會被當成俞淺淺的替身來送死，她便是不當這個替身，因著夫家人的那層關係，自己和孩子也難逃一死。\n她問：「隨家的事，你都知道些什麼？」\n女人抬起一雙淚眼朦朧的眼，她進京這一路顯然吃了不少苦頭，比起樊長玉在盧城大牢裡初次見她時，更消瘦了些，顯得一雙眼出奇地大，噙著淚光，愈發悽楚可憐。\n她大概是認出了樊長玉就是當初在牢裡給她送吃食衣物的人，淚水漣漣道：「姑娘，我只是個婦道人家，從前是隨家的家生奴，嫁與我相公後，才沒在隨家做事了，男人們在做什麼，我哪裡曉得？」\n從這女人口中，看來是問不出什麼了，但那個老頭是長信王府的管家，想來對隨家的事所知頗多。\n留著這母子，等後面找機會把那老頭劫出來了，有孫子這個牽扯在，想來也能從老頭口中問出些東西。\n樊長玉看向謝徵，謝徵也沒再多問什麼，只對趙詢道：「今夜全城戒嚴，這對母子不便帶走，暫且留在你這裡可方便？」\n趙詢滿口應下：「自是方便的，您什麼時候來提人都成。」\n謝徵微點了下頭，趙詢便走到門口處輕撫手掌，不消片刻，那名老伯又來了。\n趙詢吩咐道：「先帶屋內那對母子下去安置，多派些人手看緊些。」\n女人被帶下去後，趙詢才拱手對謝徵道：「您先前讓小人暗中留意魏府的動靜，魏嚴稱病數月在家，府上豢養的鷹犬也極少外出，倒是其子魏宣又惹了不少禍事，近日在驚鵲樓又同韓尚書家的公子打起來了。」\n魏宣同人爭個粉頭大打出手也不是一次兩次了，謝徵神色淡淡的。\n趙詢也發現了這一點，才又趕緊接了下一句：「聽聞是韓尚書家的公子，對丞相夫人不敬。」\n聽到事關魏夫人，謝徵黑眸稍抬。\n魏夫人在整個魏府，存在感實在是極低，可以說若不是有魏宣這麼個從小到大惹事不斷的東西，謝徵都快想不起自己這個舅母了。\n她終日吃齋念佛，不出自己的院落半步，府上的下人都鮮少提及魏夫人，韓尚書家的小子為何會突然對她不敬？\n謝徵問：「怎麼回事？」\n趙詢語氣微頓了一下，似不知那些話說出來合不合適，「如今朝堂上關於魏嚴的彈劾頗多，坊間都傳言魏嚴這丞相做到頭了，一些浮浪公子哥，言魏府抄家後，魏嚴又不豢養美妾舞姬，教司坊那邊不添新人，沒什麼去頭。便有好事者提及了魏夫人，說魏嚴二十年來只守著一妻，不納美妾，想來魏夫人縱使徐娘半老，也是個美人……」\n謝徵臉色已有些難看了，趙詢已開了這個話頭，只得硬著頭皮說下去：「那韓尚書家的公子，醉了酒便戲言魏夫人容貌還不及他府上的粗使丫鬟，當年能嫁魏嚴，也是還一個姑娘家就自身去了軍營找魏嚴，珠胎暗結這才成了魏夫人，能拴住魏嚴二十餘年，那些功夫一定了得……」\n話落，趙詢額角冷汗已是落了下來。\n謝徵問：「魏宣把人打成什麼樣了？」\n嗓音淡然得像是對此事並不關心。\n趙詢答：「據說打斷了四根肋骨，腿也折了一條，韓尚書揚言要參奏魏宣一本呢。」\n謝徵薄唇只冷冷吐出兩字：「蠢貨。」\n韓尚書依附李家，敢說出參魏宣這話來，無非是看準了魏宣不敢把對魏夫人不敬的那些話搬上朝堂去。\n趙詢琢磨著這兩字，一時也摸不準謝徵對魏夫人的態度，只能吶吶不語。\n按理說，謝徵同魏宣水火不容，對魏夫人應該也沒什麼好臉色才對？\n但謝徵只冷聲說了句：「退下吧。」\n趙詢出去後，樊長玉道：「京城裡那些富貴公子哥，都這般下作的麼？」\n謝徵一撩眼皮看向她：「你在替她鳴不平？」\n樊長玉道：「魏嚴是個無惡不作的奸臣，魏宣也不是什麼好東西，但就算魏夫人也是個蛇蠍心腸的婦人，她能被世人罵她壞，罵她狠毒，也不該用那等言辭來羞辱她。仿佛這世間女子不管犯了什麼錯，都得被冠上個□□之名才解氣。可魏家父子做了那般多的惡事，怎也不見旁人如此詆毀？」\n謝徵長睫低垂，並不言語。\n樊長玉看向他：「我瞧著你也不是很開心，魏夫人對你很好嗎？」\n謝徵答：「不好，也不差。」\n從前他憎惡魏宣，每到年節唯一一次的一家人坐在一起用飯時，再看到魏夫人那張菩薩似的笑臉，他便覺著偽善噁心。\n但離開魏府多年後，在北地偶爾還能收到她縫製的一兩件冬衣，他才知道，魏夫人似乎真不知魏宣對他做過的那些事。\n樊長玉聽見謝徵的回答，微皺了下眉，想著知道他自幼沒了母親，或許幼年時，也在魏夫人那裡得到過幾分類似母親的關愛吧。\n但因為魏嚴對他父母做的那些事，那份仇恨必然也是消不了的。\n她擼起袖子道：「咱們要不趁天黑再去把那什麼尚書公子揍一頓？」\n對於一個未出閣時就敢去軍中尋魏嚴的官家女子，雖素未謀面，但樊長玉心底還挺佩服的。\n謝徵黑眸緩緩轉向她。\n樊長玉眨巴了一下眼，蠢蠢欲動：「子不教，爹之過，那個什麼尚書還有臉彈劾，看樣子也不是個好鳥，平日裡肯定沒少縱著他那龜兒子幹欺男霸女的惡事，乾脆把他也揍得上不了朝得了！」：，，.`

            title: `第147章第147章`,
            content: `窗外北風呼嘯,一室暖光融融，驅散了這寒夜裡的冷意。\n謝徵望著燭輝裡明眸澄澈的少女，心頭那些晦暗瘡痍的情緒奇蹟般被撫平了下去,他淺淺抬手,在樊長玉錯愣的目光裡，將人按進了自己懷中。\n他黑眸平靜注視著一個方向,只是在那平靜之下，似乎又藏著更多讓人膽寒的情緒：「一個韓家罷了,往後有的是機會收拾，今夜已驚動了大理寺的官兵,不宜再去韓家。你睡會兒吧,等五更天我便送你回進奏院。」\n住進了進奏院,無疑就是把自己的一舉一動都暴露在了皇家的視線裡。\n樊長玉今夜能出來，還是故技重施扮成了進奏院外出採買的侍衛。明早五更天,進奏院廚房的人又會出來採買食材,樊長玉可以在那時換裝混進去。\n樊長玉半靠在謝徵懷中,這一夜剛劫完獄，她倒是不困，就是謝徵按著她後頸的姿勢,讓她抬頭變得有點困難,只能以一個彆扭的姿勢仰起頭道：「我這會兒不困,我覺著長信王府的管家也在大牢裡的話,要不咱們趁熱打鐵，去把那管家也劫出來？」\n她睜著黑白分明的大眼一臉誠懇地說出這話時,頗像夫子跟前最踏實上進的學生突然一臉坦然地說自己要去殺人放火了。\n謝徵撫著她長發的手頓住，好幾息都沒言語。\n樊長玉尷尬詢問：「不行？」\n謝徵抬手按了按額角，垂眸看她時,嘴角不自覺淺提起了下：「今夜不可了，大理寺不比旁的府衙大牢，一旦戒嚴，連只蒼蠅都別想再飛出去。今夜去全城搜索劫匪的官兵雖多，但大多都是五城兵馬司的人，大理寺並不會弱防，這時候再去劫獄，無疑是自投羅網。」\n樊長玉訕訕道：「好吧。」\n她對京中的兵力布防不甚清楚，還以為今夜已被引走了大理寺不少官兵，這時候再去劫獄，出其不意，是個絕妙的時機。\n謝徵睨著她問：「你的兵法，似乎學得不用心？」\n樊長玉抓了抓頭髮：「我這才回京多久，天天被困在進奏院，不甚清楚京司衙門各自的職責而已。在軍中我自是不敢輕率的，一場戰役關乎著成百上千將士的生死呢！我若不是清楚憑你我二人的功夫，潛入大理寺就算劫不出那管家，也萬不會落到官兵手中，才不會開這個口。」\n謝徵便問：「我給你的那幾冊兵書看完了？」\n樊長玉不自覺挺直了身板，好似一個被夫子抽背詩文的學生：「看完了兩本，第三本剛看了個頭。」\n「看的哪兩本？」\n謝徵問出這話後，樊長玉正要作答，外邊卻響起了一片喧譁之聲。\n「開門開門！」\n「官爺……這……這不可啊！入住小店的都是客人，哪能深更半夜地擾人清夢呢？」\n「大理寺丟了朝廷要犯，現要挨家挨戶搜查，爾等若敢阻攔，一律按欽犯同黨處理！」\n樊長玉和謝徵都是習武之人，耳力極強，一聽外面的動靜，臉色皆變得有些難看。\n官兵已進到了院子裡，她們若在此時出去，必會被發現，叫人認出來就前功盡棄了。\n謝徵在官兵的腳步聲朝著這邊靠近時，動作極快地拂袖便滅了蠟燭，抬首對樊長玉道：「把茶壺裡的熱茶換成臉盆裡的冷水。」\n樊長玉拎起桌上的水壺將茶水全倒進了房內一棵盆景裡，又把臉盆裡的冷水灌了進去。\n這茶是客棧裡的老伯引著他們進來時沏的，樊長玉不知謝徵葫蘆裡賣的什麼藥，情況緊急也顧不上多問，只一一照做。\n等她把茶壺放回桌上時，謝徵已在床頭摩挲著摁開了什麼機關，樊長玉聽見了石板推拉發出的細微悶響。\n借著門窗外照進來的火把光芒，她勉強看清是床鋪的一冊塌了下去，出現一個勉強只能容納兩人躺下的暗閣。\n謝徵看向她：「躲進去。」\n樊長玉剛躺進去，謝徵便也轉動機關抬腳邁了進來。\n棺材盒大的一點空間裡，再擠進一個人，頓時變得要多逼仄有多逼仄。\n樊長玉和謝徵幾乎是脖頸貼著脖頸，肩膀抵著肩膀，彼此的呼吸聲在這片逼仄的空間裡都變得清晰可聞。\n得虧暗閣裡是一片漆黑，誰也瞧不清誰的模樣，這般一上一下對視著，才不會太過尷尬。\n樊長玉聞到了謝徵衣襟上淡淡的皂角氣息，許是嚴冬臘月的緣故，還滲著一股冰雪的凜冽。他沒敢把全身的重量都放到她身上，用一隻手將身體稍微撐起些，可在這狹小的空間裡，這姿勢無疑變得尤為吃力。\n樊長玉遲疑了下道：「要不我在上邊？」\n哪怕伸手不見五指，但樊長玉還是感覺到謝徵似乎猛地偏過頭在看她，因為看不見，對四周的感知便只憑本能了，那種在黑暗中被野獸盯上的感覺也越來越明顯，樊長玉手上的汗毛都不自覺豎起。\n謝徵攥住她腰的時候，她整個人都是緊繃的。\n有些艱難地對調完位置後，兩個人身上都出了汗，樊長玉覺得應該是空氣不流通的緣故，這狹小的暗室裡熱得令人心慌。\n她豎起耳朵努力聽外邊的動靜，心跳卻在不合時宜地變快，不知是因為神經太過緊繃還是因為別的。\n但那鼓點一樣的心跳，樊長玉懷疑謝徵都能聽見。\n不過謝徵胸膛裡面好似也揣了一面鼓，她趴在他胸口聽得尤為清晰。\n擂得沒她快，但每一次都擂得極重，仿佛是要敲在誰心頭。\n謝徵呼吸依舊平穩，只是噴在自己耳廓的呼吸好像變燙了。\n樊長玉的耳朵很敏感，她下意識想躲。\n但她才小幅度地移動了一下腦袋的位置，就被謝徵大力按住了肩膀，他聲音很冷靜，不過為了壓低聲線，比平日裡低啞了許多：「別動。」\n外邊也在此刻發出一聲大響，顯然是房門被人粗暴踢開了。\n樊長玉頓時不敢再動，就這麼趴在謝徵身上，專心聽外邊的動靜。\n「官爺，這件屋是空著的，還沒住客人呢！」一路跟隨的客棧掌柜原本還心中揣揣，進屋後一見這間房絲毫沒有人住過的痕跡，眼神微動，立即開始哭喪著賣慘。\n進屋搜查的官兵小頭目不搭理他，放任底下的小卒粗手粗腳地將屋內能打開的箱子柜子全打開，連床上的被褥在伸手探過餘溫後，都全扯到了地上。\n眼見他們還在搬弄架子上的瓶瓶罐罐，似在找這屋內有沒有什麼機關暗閣之內的，掌柜的哭嚎道：「哎喲，官爺，輕點輕點，這是歌窯的瓷器，摔壞了小的沒法跟東家交代啊……」\n小頭目還是沒有讓底下人收斂的意思，大馬金刀往凳子上一坐，抬手接開了桌上那茶壺的壺蓋。\n樊長玉伏在謝徵身上，聽到在床邊搜查的官兵腳步聲遠了，心下剛鬆一口氣，外邊忽地傳來一聲瓷器砸碎的大響，還有官兵的一聲厲喝：「大膽！」\n她心頭頓時又是一激靈，指尖都無意識揪緊了謝徵的衣襟。\n謝徵似察覺到了她的緊張，攥在她肩頭的手改為按在她後頸，讓她儘量緊貼著自己，滾.燙的五指同她細膩的肌膚相接，雖再無逾越之處，卻還是燙得樊長玉不自覺縮了下脖子。\n她鼻尖淺淺擦過謝徵頸側的肌膚，謝徵的呼吸一下子變沉了。\n樊長玉只覺他身上一直在往外冒熱氣，她手放在他胸膛上，隔著他身上那件並不厚的箭袖長袍，甚至能感覺到底下的汗意。\n他怎麼還在出汗了？\n是空間太狹小，兩個人又擠在一起，太熱了嗎？\n樊長玉想著不動聲色地離他遠一點，讓他好呼吸，謝徵覆在她後頸上的那隻手卻跟烙鐵一樣，摁得紋絲不動，甚至隱隱還有收緊的趨勢。\n外邊已響起了掌柜誠惶誠恐的聲音：「官爺，這是怎了？」\n樊長玉便也無心再挪動，只側耳細聽。\n小頭目蒲扇大的巴掌重重往圓桌上一拍：「老子深夜搜查犯人至此，想喝口熱茶，你這小老兒茶壺裡泡的冷茶不說，還一點茶味都沒有了，膽敢輕慢至此？」\n掌柜的哪能聽不出這小頭目的言外之意，那些個五城兵馬司的官兵，常有打著各種由頭找商販撈油水的，今夜這搜查，在尋常百姓家肯定是榨不出什麼的，像客棧酒樓這類魚龍混雜的地方，便是搜不出來人，也得孝敬兵頭子一二。\n掌柜的面上依舊惶恐著，眼神卻已鎮定下來了，當即就罵道：「那懶鬼小二又哪裡躲懶去了？屋子裡的冷茶都不曾換一壺？」\n隨即又對著小頭目點頭哈腰道：「官爺息怒，官爺息怒，小的這就讓人給官爺沏店裡最好的茶。」\n恭維的同時，不忘把一個荷包往小頭目手上遞了遞。\n小頭目掂了掂那荷包的份量，面上的怒意這才消散了些，道：「行了，本官還有搜查要務在身，也沒功夫喝你這盞茶了！」\n言罷就起身離去，在屋內翻箱倒櫃什麼也沒找著的小卒們也跟了上去。\n掌柜的眼角餘光瞥了那床底一眼，才在離開時躬身關上了房門，又一路說著恭維話把那小頭目送走。\n房內，樊長玉聽著官兵們走遠的腳步聲，大鬆一口氣，她額角不知是被悶的還是被熱的，也出了一層細汗。\n她低聲同謝徵道：「他們走了。」\n底下的人沒應聲。\n樊長玉覺著奇怪，伸出一隻手去石壁一側摸索，想找到打開暗閣的開關出去，摁在她後頸的那隻手卻猛地發力，力道之狠和透出的那股決絕讓樊長玉都莫名生出一股懼意。\n但狹小的空間裡連掙扎都變得再無可能，她只能迫低下頭去，唇叫人有些暴.虐地吻住，是恨不能把她拆吞入腹的吻法，齒關很快被粗暴地頂開，大舌長驅直入。\n謝徵像是一頭餓著捱過了整個嚴冬，又盯著一塊肥肉看了三天都不曾下口的野狼，在理智告罄的那一刻，終於按捺不住從骨子裡泛起的餓意，露出尖齒撕咬自己的獵物。：，，.`
        },

            num: 148,
            title: `第148章第148章`,
            content: `趙詢得了官兵撤走的消息,再趕過來時，就見房裡的燈還是熄著的。\n他先前為避免那對母子被官兵找到，親自把人帶去了客棧底下的暗室裡,只讓酒樓掌柜的來這邊周旋。\n此刻見房內還是半分動靜沒有,也不敢貿然推門進去，只在門外拱手道：「貴人,搜尋的官兵都已經走了。」\n屋內傳來起石室打開的沉重聲音，伴隨而來的還有一道悶響,像是什麼重重撞在了石壁上。\n趙詢拱手立在門外，心中納罕,但也不敢好奇什麼,只靜等裡邊的傳喚。\n好一會兒,房門才被打開，他不動聲色瞥了一眼,發現武安侯和雲麾將軍二人面色如常,只是侯爺大抵是為了一會兒回去方便,臉上又帶了面具，雲麾將軍面容則有些肅冷。\n只這麼一眼，趙詢又趕緊低下了頭去,道：「還有半刻鐘便是五更天了,已按侯爺先前的吩咐在客棧門口備好了馬車。」\n他說著朝門外遞了個眼神,立即有侍女捧著衣物進來,恭恭敬敬放到桌子上後又輕手輕腳地退了出去。\n趙詢道：「這是給侯爺和將軍準備的衣物。」\n他在外人面前，為了不暴露樊長玉和謝徵的身份,一律喚他們貴人，沒有旁人的時候，才以官職作敬稱。\n趙詢退出去後,謝徵扒下自己的外袍，拿起託盤裡的衣物往身上一套系上革帶便算是換好了，他看了樊長玉一眼，很識趣地道：「我出去等你。」\n房門打開又合上後，樊長玉捏起託盤裡的另一套衣裙，磨了磨後槽牙。\n那人就是屬狗的！\n親著親著就開始用牙齒在她身上咬，只恨不能生吞了她。\n她退下外袍換上侍衛服時，盈盈燭火照出她頸下白瓷似的一片肌膚，鎖骨處多出的兩抹紅痕便尤為刺目。再往下，還有一道印子被中衣的領子半遮了去，不免引人遐想，那被衣物完全覆蓋住的肌膚裡，是不是也有類似的印子。\n-\n回進奏院的一路樊長玉都在馬車上假寐，臨進大門了都沒給謝徵一個眼神。\n謝徵在馬車裡看著她混在侍衛裡走遠的背影，扯唇無聲笑了笑。\n他似乎把人惹狠了？\n可從上回在郊外的莊子同她分開後，再見便是昨日了，討的這點好處，他倒是覺著還遠遠不夠。\n-\n樊長玉做了一宿的賊，回去後簡單洗漱一番到頭便睡了，再醒來時已臨近中午。\n早飯並著午飯一起用完，唐培義那邊便來人了，說是有要事讓她過去一趟。\n樊長玉換了身能見客的衣袍後便去了唐培義院子裡。\n一進門才發現，賀修筠和鄭文常也在，只不過幾人臉色都很是難看。\n唐培義見她來了，吩咐左右：「給樊將軍看座。」\n屋內的侍者搬來一張椅子放到了賀修筠邊上，樊長玉坐下後問：「是朝中又發生了什麼事嗎？」\n唐培義重重一巴掌拍在了桌子上，怒聲道：「他魏嚴簡直狂妄至極，昨天白日裡剛重刑打死了要犯，夜裡便敢直闖大理寺牢房劫人！他當這天下是姓魏了不成了？」\n樊長玉正喝著侍者遞上的茶水，聞言險些被嗆到，咳了好幾聲才緩過勁兒來。\n面對唐培義、賀修筠、鄭文常三人齊齊投來的目光，樊長玉一陣心虛，隨即重重把茶盞往桌上一放，頂著張老實巴交的臉道：「真是太過分了！」\n三人這才收回了目光。\n賀修筠瞥見樊長玉眼下那一圈淡淡的青黑，忽地問了句：「樊將軍昨晚沒睡好？」\n樊長玉就是個不擅說謊的性子，捧起跟前的茶盞繼續喝做掩飾道：「嗯，睡前看了冊兵書，對其中的攻謀之策多有不懂之處，一細究下去就忘了時辰。」\n賀修筠聞言愈發好奇了些：「什麼兵書，竟讓樊將軍看到如此忘我之境？」\n得虧她前些日子真真切切看過了謝徵給她的那幾本兵書，此刻才能臉不紅心不跳地道：「慚愧，看的前朝衛國公所注的《尉繚子》。」\n雖然謝徵在那註解之上，又添了許多新的見解。\n賀修筠道了聲「難怪」，笑言：「衛國公所注的《尉繚子》現已是孤本了，樊將軍得此寶書，無怪乎廢寢忘食。」\n樊長玉對這些兵書兵法的淵源還不甚了解，沒料到謝徵隨手遞給自己的竟是這般貴重的書，心中詫異之餘，連道了幾聲「慚愧」應付賀修筠。\n怕他繼續追問，又忙看向唐培義：「已確定是魏嚴的人劫的獄嗎？今日早朝上可有議及此事？」\n怎料唐培義聽得她這番問話，卻是把頭扭做一邊，重重一嘆。\n一旁的鄭文常道：「大理寺那邊聯合了五城兵馬司的人連夜搜查，但什麼證據都沒拿到。今晨韓尚書家的公子還被割了舌、挖了眼吊死在自個兒房間裡，韓尚書在金鑾殿上痛苦流涕求陛下做主，說自家兒子肯定也是被魏嚴害死的，只因前兩日他兒子同魏宣發生了些口角。奈何也沒拿到證據，壓根治不了魏嚴的罪。」\n樊長玉眸色當即就是一變。\n魏宣同韓尚書家的公子發生了口角，把人痛毆了一頓，昨夜趙詢稟與謝徵時，她就知道了。\n可韓尚書家的公子，會在昨天夜裡被割舌挖眼吊死在房內，卻是她沒想到的。\n手段如此殘忍，是魏嚴在向滿朝文武宣告，他這權相，還沒做到頭嗎？\n唐培義苦笑道：「大胤的皇權，早就名存實亡了……當今聖上……哎……」\n他雖沒多言，但在場幾人都知道他未盡之言是什麼。\n齊昇不過是魏嚴扶上龍椅的一個傀儡，他如今都還指望魏嚴來幫他保皇位，又豈會治魏嚴的罪。\n賀修筠想起父親的死，放在桌上的兩手不自覺攥成了拳：「李家若真找到了承德太子的後人……」\n唐培義當即打斷了他：「子甫。」\n子甫乃賀修筠的字，他閉口不再言語。\n坐在龍椅上的那位哪怕是只猴子，只要他穿上了那身龍袍，謀逆便是誅九族的大不敬之罪。\n唐培義岔開話題道：「行了，同魏嚴的這場較量，還沒到到頭的時候。這幾年戰事吃緊，國庫虧空，宮裡傳了話，慶功宴合到年宴一起辦，你們今日都別外出了，晚些時辰宮裡會來人替你們量裁衣尺寸。」\n-\n回去的一路，樊長玉都憂心忡忡的。\n謝徵在李家彈劾魏嚴時，就說過魏嚴肯定還留了後手，如今在這節骨眼上，他還敢命手底下的人直接殺了一朝中三品大員的兒子，行事可以說是狠辣又狂妄。\n他是看準了大理寺拿不到證據，沒法治罪於他，還是當真狂到了，就算大理寺人證物證在手，他也不放在眼裡了？\n若是前者，說明魏嚴行事還有所忌憚。\n若是後者……魏嚴蟄伏了這麼久，謀劃的事不免就讓人膽寒了。\n鄭文常慢了她一步出來，叫住她：「樊將軍留步。」\n樊長玉暫且斂住思緒，回過頭問道：「鄭將軍有事？」\n鄭文常沉默寡言，卻是個刻苦的性子，他在賀敬元的門生們裡，姿質不算是最好的，但因為勤奮刻苦，為人又忠厚正直，才頗得賀敬元看中。\n他有些靦腆地道：「末將冒昧，想借閱樊將軍手上那本衛國公所注的《尉繚子》一日。」\n似怕樊長玉還沒看完捨不得這寶書，他連忙又道：「借一晚也行，末將謄抄完了，明早便還與樊將軍。」\n他話都說到這份上了，樊長玉哪有不借之理。\n她道：「成，回去後我便讓人把書送去鄭將軍院子裡，將軍不必急著還我，慢慢謄抄便是。」\n孤本寶貴，時人常有抄書流傳相看的。\n得了樊長玉這話，鄭文常心中似有一塊大石頭落下，道了謝這才紅光滿面地回去了。\n樊長玉回去，從房間裡找出了那書便讓謝五給鄭文常送去。\n正巧宮裡來量她裁衣尺寸趕製朝服的嬤嬤也來了，樊長玉張開手臂任她們用軟尺量，卻發現這跟自己尋常做衣服時，那些裁縫娘子量尺寸不一樣。\n尚衣局的嬤嬤量得要多精細有多精細，上至額頭，下至腳脖子，還有肋下那一圈也給量了一遍。\n量腳脖子樊長玉猜測是訂做官靴的，但這頭圍，她乃武將，又不用戴官帽，量腦袋做什麼？\n樊長玉是個率直的性子，當下便問了。\n負責量取尺寸的嬤嬤是個不苟言笑的，但也不敢在樊長玉這個三品武將跟前白擺譜，恭敬道：「將軍還有一身二品誥命的翟服也需裁製，這頭圍是制鳳冠所用。」\n誥命夫人身上那一身翟服配的頭飾，便是鑲滿珠翠的鳳冠。\n樊長玉若還是個閨閣女子，皇帝便也不會封她誥命，但她之前和謝徵假成親，在戶部有了文書記錄在案，又於金鑾殿上親口承認自己有夫婿，這才加封了個誥命。\n知道了這尺寸的用途，樊長玉便也不再多問，配合著嬤嬤繼續量尺寸。\n每量好一處，嬤嬤都會低聲吩咐一旁的侍女在紙上記下來。\n長寧被趙大娘帶著在一旁看，滿眼晶亮，興奮得臉都紅了。\n等宮裡的人量完尺寸走了，她才跑過去一頭扎進懷裡：「她們要給阿姐做新衣服嗎？」\n樊長玉說：「是朝服。」\n長寧不太懂，兩手扒拉著她腰身，仰起頭繼續問：「什麼是朝服啊？」\n「就是見皇帝要穿的衣裳。」\n長寧「哦」了一聲，又問：「那寧娘能見皇帝嗎？」\n趙大娘笑道：「你這丫頭啊，淨說傻話，皇上哪是人人都能見到的？只有當大官的才能見。」\n長寧有些失落地「噢」了一聲，隨即又問：「那寧娘能當大官嗎？」\n樊長玉蹲下摸著她的頭道：「現在還不能，但寧娘如果好好讀書，等你長大那會兒，或許女子就也能入仕為官了。」\n一路走到這個位置，樊長玉除了想查清錦州背後的真相，替自己外祖父洗清冤屈，她還想在《大胤律》中加上一條，女子也可繼承父母家產，自立門戶。\n當初險些把她和長寧逼到絕境的，便是仗著律令試圖侵佔她父母留下的屋宅的樊大一家。\n她是個抗摔抗打的，這一路再多坑坑窪窪，她深一腳淺一腳也走過來了，但這世間，多的是沒走過來的孤女。\n長寧似被樊長玉那話鼓勵道了，當即又開始嚷嚷：「阿姐阿姐，給寧娘請個先生吧，寧娘想念書！」\n樊長玉得閒時，還能教教兩個小傢伙，一忙起來，自是顧不上了。\n她尋思著，宮裡一時半會兒應當也不會讓她們外調，便道：「成，改明兒就給你請個先生。」\n長寧笑容都快裂到耳根去，拽著她的袖子晃了晃：「阿姐最好了！」\n樊長玉見長寧蹦跳著要去找俞寶兒，告訴他這個好消息，不由也是搖頭失笑。\n正好謝五送書回來，樊長玉便對他道：「小五，你留意一下京城內有沒有合適的夫子，我想給長寧和寶兒請個西席，暫且教她們讀書寫字。」\n頓了頓，又補充道：「不用請那些學識淵博的有名夫子，兩個孩子都還小，請那等先生來，是屈才了。」\n謝五一一應下，但神色有些微妙。\n樊長玉這才注意到他手上拿著一冊書，她困惑道：「鄭將軍沒要？」\n謝五道：「不是，當初李太傅家的公子贈了您幾冊註解的兵書，您賞給底下的將軍們看了，這本傳到了鄭將軍手上，我方才去送書，鄭將軍便把這冊兵書讓我帶回來了，說是還給您。」\n樊長玉不由皺了皺眉，李懷安贈她兵書的事，她都快忘了。\n當初那幾冊兵書，也的確是賞給了底下人的，但鄭文常那人一根筋，約莫是覺著又找她借了書，心中過意不去，才把這冊給還了回來。\n樊長玉也沒當回事，道：「罷了，就擱到那邊架子上吧。」\n謝五拿著兵書走進，瞥了一眼架子上樊長玉常看的那些書，裡邊有謝徵一開始就給她註解過的四書，還有後來給她註解的兵書。\n謝五遲疑了一下，挑了個最角落的位置，把李懷安註解的兵書放了上去。\n-\n轉眼便到了年宴的日子。\n樊長玉每日從唐培義那裡聽到的，依舊是魏黨和李黨在朝堂上各執一詞，吵個不休。\n但有了韓尚書之子慘死的震懾，上至朝堂下至坊間，都無人再敢公然非議魏嚴。\n謝徵要著手準備宮宴當晚夜探冷宮和從大理寺劫走隨府管家的事，期間還在暗訪陶太傅的行蹤，忙得抽不開身，各方勢力又盯得緊，期間只潛入進奏院看過樊長玉一次，給她帶了把削鐵如泥的匕首作禮物。\n進宮的當晚，樊長玉不知何故，左眼皮一直在跳。\n謝徵在這個年夜有諸多部署，樊長玉怕出什麼意外，臨行前往左腿綁上一把小巧的剔骨刀，右腿綁上那柄削鐵如泥的匕首，想著便是出了什麼事，也能有個防身的利器。\n她給長寧和俞寶兒都包了一個大大的壓歲紅封后，才在長寧眼巴巴的目光裡，同唐培義等人一道坐上了進宮的馬車。：，，.`

            num: 149,
            title: `第149章第149章`,
            content: `宮宴設在太極殿,此乃外宴，只有天子和朝臣共同宴飲。\n進大殿之前，便有太監領著捧託盤的侍者,一一將武將身上的佩劍收去。\n樊長玉也是在第一次進宮面聖時，發現只會驗明腰牌,收走她們隨身攜帶的那些看得見的武器,並不會挨個搜身,才在出門前往腿上綁了短刃。\n長靴一套,任誰也瞧不出來。\n畢竟平日裡朝見天子和今日前來的赴宴的，除卻王公貴族,都是有頭有臉的大臣。若每次朝會或赴宮宴都得挨個搜了大臣的身才準進殿,且不說費時費力，也有損大臣的顏面和君臣之誼。\n歷朝歷代頒下的武將不得持兵刃進殿的規矩,一來是避免對天子不敬,二來也是防止武將在大殿之上對天子發難。\n但真有反心者，僅憑帶進大殿的一柄利刃又能做什麼？對方若逼宮，必定是已策反了整個皇宮的金吾衛。\n尋常臣子,則萬不敢做私帶兵刃上殿這等掉腦袋的事。\n故此皇宮歷來沒有搜大臣之身的規矩，只有底下的宮女太監才會被如此對待。\n樊長玉上回進宮是白日,那時瞧著整個皇宮已是巍峨肅穆，今夜大雪飄飛,整個宮城處處燈火通明，隱匿在無邊的夜色裡恍若一表皮被燒得皸裂，露出底下赤紅炭光的巨獸，華美又有種詭譎的震撼。\n但那燈火照耀不到的暗處，也透著無盡的瘡痍和陰沉。\n進了太和宮大殿，便有侍者引著大臣們去各自的席位落座。\n左為文官席位,右為武官席位。\n三公九卿和皇親國戚的席位都是靠最前方的，樊長玉作為三品大員，被小太監引著坐到了右側中間的席位。\n整個大殿，無論文武官員，皆只有樊長玉一人是女子。\n她一入席，便引得四面八方的目光看來，好奇有之，打量有之。\n先前在金鑾殿上，朝臣們雖已見過樊長玉一面，但那時乃朝會，她面見皇帝又跟著唐培義等人站在大殿最前方，靠後方的官員們只能瞧見她戎甲後方垂落的一襲猩紅披風，今夜這些朝臣才算是真正見過樊長玉了。\n樊長玉屈膝跪坐於紅木矮几前，面上從容平靜，三品的緋色武將官袍穿在她身上，別有一股英氣，她將腰背挺得筆直，似嶙峋山巖間長出的一株蒼竹，在一次次向下紮根向上生長後，磨出一身崢嶸，在這些久經官場的大臣們中間也絲毫不露怯。\n皇帝還沒來，文武席間的首位也還空著，大殿內的氣氛還算融洽，相熟的朝臣們三三兩兩攀談著。\n樊長玉本想靜等開席，怎料一名面生的年輕武將徑直走到了樊長玉案前，「久仰樊將軍大名，先前在金鑾殿上只同樊將軍打了個照面，今夜可算是有幸再見樊將軍，我敬樊將軍一杯！」\n言罷便兩手執杯將裡邊的酒水喝了個乾淨，還將杯子倒扣過來看著樊長玉。\n大有樊長玉若不喝，便是不給他面子的意思。\n之前在盧城的慶功宴上，樊長玉能以身上有傷不宜飲酒為由推拒，今夜的宮宴上再不濟也是五品京官，面對這樣的敬酒可不好推拒了。\n盧城那些將領頂多是盛情難卻，但這名武將在開宴前就來敬酒，饒是心大如樊長玉，也察覺到了幾絲暗潮洶湧。\n她目光掃過那名武將身上的四品朝服，只道：「將軍過譽。」\n拿起自己跟前那杯酒仰頭喝下後，同對方一樣倒腕將酒杯翻轉了過來。\n那武將當即就贊了樊長玉一聲：「樊將軍海量！」\n賀修筠也察覺到了幾絲不對勁兒，怕其他武將再去找樊長玉喝，執杯起身道：「宋將軍，怎地不同賀某喝一杯？」\n鄭文常跟著起身道：「瞧不起誰呢？崇州平叛之戰，老子出力可不比樊將軍少，宋將軍你得跟老子也喝一杯！」\n有了鄭文常這話，從薊州一起進京受封的將軍們也紛紛要去找那名武將喝一杯。\n這回輪到那名武將推拒不得，被灌了七八杯酒才得以回自己的席位。\n經此一鬧，其餘還想過來敬酒的也看清楚了，找樊長玉喝了，勢必就得被賀修筠他們再灌上一輪，還沒開席，也不敢太過放肆，便沒人再去找樊長玉敬酒。\n樊長玉倒是有些意外地看了鄭文常一眼，從前她還以為這人過於死板，今夜看來，他腦子還是好用的，裝起軍中那些大老粗來還挺像回事。\n賀修筠的席位同樊長玉相鄰，席間消停後，他便壓低嗓音同樊長玉道：「陛下先前在金鑾殿上誇讚咱們薊州軍的話，大抵讓許多將軍心下都不服，少不得會在今晚這宮宴上把咱們灌個爛醉如泥。」\n樊長玉這才明白了那名武將為何要突然來找自己敬酒。\n敬酒是假，一堆人輪番喝下來想給她們個下馬威才是真。\n還好賀修筠和鄭文常敏銳，及時擋了下來。\n樊長玉不動聲色點了下頭，說：「我知曉了。」\n她目光掃過大殿，思量著會主動來同她敬酒的，得是些官職沒她高的或跟她同品階的。官職比她高的，怕是也拉不下臉來做這事。\n那些低階武將，她們薊州這邊的將領抱團應該也能應付過去。\n不多時，謝徵和李太傅一前一後也前來赴宴。\n兩人又一次在太極宮大殿門口狹路相逢。\n李太傅面上儒雅依舊，不溫不火喚了句：「侯爺。」\n謝徵身著玄色的武侯朝服，膝襴上用金紅雙線繡出的祥雲紋在燈燭下閃著粼粼微光，繁複得令人眩暈，冠玉般的臉上透著幾分冷淡的倦怠，散漫一撩眼皮，道：「真是巧了，又遇上了太傅。」\n他微錯開身，語氣卻半點沒有他言辭中的敬意：「太傅乃三朝元老，太傅先請。」\n李太傅道：「侯爺戰功蓋世，在此番平叛之中亦是居功甚偉，今夜這年宴，也是慶功宴，還是侯爺先。」\n相比謝徵的狂妄輕慢，李太傅的姿態可以說是謙讓有加了，跟著李太傅的一眾黨羽都面露憤憤之色，從前遇事便第一個冒頭的李遠亭這次卻出乎意料地沉默寡言。\n謝徵視線掠過李太傅，落到李遠亭身上，眼底多了幾分冷嘲。\n他道：「太傅既如此相讓，本侯便卻之不恭了。」\n言罷抬腳邁進了大殿，李太傅身後的門生不忿想出言，剛上前一步就被李太傅揚手攔下了。\n那言官不解道：「太傅，就任他如此狂妄嗎？連魏嚴在您跟前都不曾如此。」\n李太傅眼底因年邁似覆著一層淡淡的藍灰色，讓他眼神間透著一股說不出的冷漠：「年輕氣盛，且狂極這一時，終會跌跟頭的。」\n幾名李黨的官員聽著李太傅這似是而非的話，神色各異。\n隨著謝徵和李太傅入席，原本喧譁的太和宮一下子便靜了下來。\n樊長玉朝謝徵的席位看去，許是許久未見過他了，又是頭一回瞧見他穿朝服的樣子，竟看得愣了一下。\n她一直覺著，「人靠衣裝馬靠鞍」這話在謝徵身上是不適用的，生成了那樣得天獨厚的一副好皮囊，他就是穿著一身乞丐衣裳，也自有一股金玉氣質。\n但這身武侯朝服，實在是把他襯得太好看了些。\n玄黑的朝服上金紅的繡紋叫大殿裡的燈燭一照，似有淡淡的金輝浮動，愈顯得他眸色濃重，眉眼間的冷淡也更甚了些。\n像是察覺到樊長玉的目光，謝徵轉眸看過來，眼底也蕩開了一圈不甚明顯的波瀾。\n她大抵是不知她自己穿上那身緋色武將官袍後是有多英氣颯爽的。\n全京城的五陵少年郎，都敵不過她眉間那一抹仿佛從旭日上拽下來的朝氣與明朗。\n宴會上人多，兩人視線只淺淺一碰便移開，樊長玉心口卻還是淺淺跳了一下。\n皇帝過來時，群臣只是走流程似的起身朝拜。\n樊長玉也察覺到了，百官們敬謝徵和李太傅，似乎都比敬皇帝多些。\n魏嚴依舊告病，沒出席這場年宴，李太傅的席位本該是是文官第一位，他卻命人將席位往後挪了兩尺，並未逾越直接佔了魏嚴的位置。\n樊長玉不知李太傅這算是謹慎還是裝模作樣。\n給魏嚴挖了大坑彈劾魏嚴的是他，那個位置似乎已唾手可得了，卻還處處按禮制來、半點不曾逾矩的也是他。\n只能說，這人太能隱忍，城府也極深。\n大抵是樊長玉盯著李太傅盯得有些久了，因上了年紀，只在席間吃些軟爛易消化吃食的李太傅忽而朝樊長玉這邊瞥了一眼。\n樊長玉也不躲，就這麼同李太傅對視著。\n一個目光看似溫和卻深不見底，一個眼神純粹堅毅恍若藏了一輪烈日在眸中。\n最終李太傅率先收回了目光，乾瘦的手捏著木箸夾了一箸清淡的小菜慢慢食著。\n武官席位一側忽而傳來一聲瓷器碎裂的清脆聲響。\n一名添酒的內侍不慎將酒水灑到了謝徵朝服上，那內侍嚇得手一軟，拎著的酒壺也跟著掉落在地。\n席間眾人的視線齊齊被吸引了過去。\n那內侍臉都嚇白了，顧不得地上還有酒水，扣頭如搗蒜連連求饒：「侯爺饒命，侯爺饒命……」\n坐於龍椅上的皇帝瞧見這一幕，眼底已有幾分壓制不住的興奮意味，他直接喚殿外的金吾衛：「來人，將這弄髒武安侯衣袍的奴才拉下去斬了！」\n群臣一陣騷動，卻無一人敢求情。\n樊長玉知道謝徵約莫要藉此機會離席，剛皺了皺眉，便聽謝徵冷冽的嗓音不緊不慢響起：「不過是打翻了酒水，此乃年宴，還是莫要見血為好，陛下覺著呢？」\n齊昇無意在這問題上和謝徵過多糾纏，當即就道：「既然武安侯都替你這蠢奴才求情了，還不謝恩？」\n那內侍叩頭如搗蒜：「謝陛下，謝武安侯！」\n齊昇勉強按捺住心底湧起的惡劣和即將達成某種願望的狂喜，擺出一副尋常神色吩咐內監：「領武安侯下去換身衣服。」\n這一出本就是謝徵計劃之內的，他對著齊昇道了聲「謝陛下」，便隨著太監出了大殿。\n謝徵一離開，齊昇似乎高興了不少，心情極佳地舉杯對群臣道：「朕繼位以來，大胤外憂內患不絕，幸得有諸位愛卿，大胤江山才有今日，朕也算不負先祖基業，今夜眾愛卿得開懷暢飲，不醉不歸！」\n他突然說出這麼一番話來，百官自然只得跟著舉杯祝詞。\n李太傅道：「陛下賢明，是我等之幸。」\n群臣便跟著高呼：「陛下賢明！」\n樊長玉只覺「賢明」二字，用在齊昇身上，多少是有些諷刺的。\n她跟著祝詞後坐回原位，眼皮卻又開始狂跳不止。：，，.`
        },

            num: 150,
            title: `第150章第150章`,
            content: `寒月當空,長階洩玉。\n細碎的雪花在昏黃的宮燈下慢悠悠飄落，覆在黑色緞面的錦靴上，頃刻間就成了一抹不甚明顯的溼痕。\n小太監引著謝徵往偏殿走,臉上掛著恭維的笑意：「侯爺擔心腳下。」\n謝徵肩頭搭著狐毛滾邊的大氅，身如松柏,側臉鍍著一層月輝愈顯冷漠俊美，從鼻尖淡淡發出一聲「嗯」。\n掩於燙金繡紋廣袖下的指尖彈出一顆石子,打在不遠處落了積雪的樹枝上，枝丫顫動,瞬間抖落一地積雪,驚得小太監引頸望去,厲喝：「誰在此處？」\n下一瞬,小太監只覺頸後一痛，便失去了知覺。\n謝徵撿起小太監掉在地上的燈籠,掀開罩子吹滅了裡邊的燭火後,單手拎起小太監，將他放到了一處殿宇外靠柱躺下。\n做完這一切,謝徵抬眸冷冷巡視了四周一眼，才一把扯下了自己身上的大氅和朝服。\n朝服底下，赫然是一身夜行衣。\n他從懷中摸出易容.面具帶上,將自己那身朝服藏到了御花園一處假山的石洞裡，按著一早就看過的皇宮輿圖，避開巡邏的守衛，登上高牆幾個起落便到了冷宮。\n比起別的宮殿張燈結彩,冷宮就冷清得可怕了，連大門處暈著巴掌大一團黃光的燈籠都落滿塵垢，覆著一層蛛網。\n住在這冷宮的,都是犯了大過的妃子，瘋的瘋，死的死，傳聞還鬧鬼，除了當值的宮人按職過來餵狗一樣扔些食物，平日裡連最低等的太監宮女都不願來此多看一眼。\n謝徵依著長公主給的情報，翻過冷宮高牆後，很容易便在外舍找到了那名瘋宮女的住所。\n不大的廂房裡同樣布滿塵垢與蛛網，唯一的家什似乎就是靠窗的那張床了，借著月光，能看清底下薄褥沒覆蓋完全的地方露出的乾草，宮女蜷縮著睡在上邊，身上只蓋著一層破舊布著黴斑的薄被。\n房間裡有燃燒過香燭後的淡淡煙味，宮中不得祭拜，想來是這宮女在自己屋子裡偷偷給什麼人燒過紙錢。\n謝徵抖下纏在手臂上的軟劍，直指宮女後頸：「我知道你醒著，想活命就別回頭，我只問一個問題。」\n「當年同魏嚴私通的后妃是誰？」\n宮女似太害怕了，身體抖若篩糠：「是……是……」\n變故就發生在那一瞬間，宮女猛地一回頭，揚手便朝謝徵灑了一把粉末。\n謝徵連忙扭頭避開，及時閉眼屏住了呼吸，以免吸入那來歷不明的粉末或是被灼傷眼睛，那宮女卻趁機從枕頭下抽出一柄匕首朝謝徵刺來，謝徵本能地抬臂一擋便將人甩出去數米遠。\n宮女後背撞到牆上，再滾落於地時，嘴角溢出了一絲血色，她眼底卻無狠色，而是無邊媚意，用手指拂去自己唇角那一絲血，放到嘴裡吮吸起來，眼神鉤子一般鉤向謝徵，嬌嗔道：「你的力氣好大，弄得人家都疼了。」\n聲音甜得發膩，像是將一鍋糖熬成了稠漿再一口灌進喉嚨。\n宮女那兩根手指再取出來時，已掛滿了涎水，她扯著自己的衣服一點點往下拉，嬌笑道：「要不要看看，人家被你打傷的地方？」\n謝徵眼底只有看陰溝裡蛆蟲扭動的濃濃厭惡，他收了劍，轉步便要朝屋外去，大門處卻響起了鎖鏈聲。\n謝徵眸色陡然冷厲，提劍便要劈開大門，卻在那一瞬間發現自己手腳已綿軟無力，幾乎連站立都再無可能，他單手扶住牆，額角沁出一層冷汗。\n窗邊也響起了鐵鏈聲，隨即一根細長的竹管從細小的縫隙裡伸進來，淡淡的白煙飄進了屋中。\n身後的女人膩聲道：「是不是發現手腳無力？」\n「這軟骨散你從一進屋就聞到了，方才又同我交手加速了藥效，撐到現在才發作，這身骨健碩得……真讓奴家饞啊……」\n女人乾脆半伏在了地上，青絲披散，素白的寢衣敞開，露出裡邊紅豔豔的抱腹和一側香肩，神情難耐又勾人地盯著謝徵。\n謝徵聽她說一進屋便聞到了，當即看向了屋中那個燃過了錢紙的火盆，原來燒冥紙點香燭是為了掩蓋別的味道。\n藥效發作猛若山洪決堤，渾身的力氣似乎都被抽乾了，謝徵連扶著牆都再也站不住，他靠牆滑坐了下去，身體裡還有另一種反應，血液裡似有火在烤，四肢百骸癢得仿佛蟲子在爬。\n那從窗口的竹管裡吹進來的東西是什麼，也就不言而喻了。\n女人似乎也被竹管裡吹進來的藥霧影響了，面上比起之前裝出的媚態，更多了幾分本能的反應，她媚眼如絲地朝著謝徵慢慢爬了過來：「奴家好生難受，幫幫奴家……」\n藥效讓謝徵隔著一層易容/面具，臉上都透出了一層緋色，他眼神卻陰冷得出奇：「你想死？」\n嗓音很輕，有如中元節鬼門開時從忘川河飄來的森森鬼氣，叫人從脊背深處竄起一股寒意。\n女人眼神已經迷.離，都因這句話找回了幾分神智。\n她看著坐在牆根處因中了軟骨散連起身都做不到的俊美男人，理.智在媚.藥下已不剩幾分，很快便嬌笑道：「你也會想和奴家一起赴這欲生欲死的人間極樂的。」\n她喘.息著終於爬到謝徵跟前，抬起一雙媚色瀲.灩的眸子，一句嬌嗔不及說出口，脖頸便被一隻鐵鉗似的大手緊緊攥住。\n那撲面而來的血腥味和窒息感終於讓女人清醒了幾分，這男人竟是生生摳破了自己的手掌來維持著清醒的！\n女人並未中軟骨散，又是個練家子，試圖扳開謝徵的手，然而發現一切都是徒勞。\n謝徵齒根都咬出一股鐵鏽味，他冷眼盯著在自己手中掙扎的女人：「齊昇找了你這麼個東西來，是想讓你冒充冷宮妃嬪，在我身上復刻魏嚴的罪名？」\n女人想說話，喉間卻只能發出「咯咯」的細微聲響，她的眼神也從驚恐到絕望，喉間的脆骨斷裂時，她頸側直接被謝徵五指摳出幾個血窟窿。\n女人雙眼大睜著倒在了地上，頸側流出的血很快在地上匯聚了一小一灘。\n謝徵靠牆根坐著喘息如野.獸，他手上一片鮮血淋漓，已分不清是他自己掌心流出的血還是女人頸間的血。\n鎖了門窗又往屋內放媚.煙的人在外邊沒聽見裡邊的動靜，遲疑片刻，打開了門鎖想進屋看看是個什麼情況。\n然而提著燈籠一推門，瞧見的便是女人那張死不瞑目望著門外的臉，太監嚇得瞳仁兒都驟縮了一下，忙抬起燈籠想找屋內另一人。\n匕首抹喉濺出一抔血色，掉在地上的燈籠一下子被引燃，火光照亮那柄瀝著血色的匕首，閃著寒光的匕刃上，映出一雙森冷冰寒的眸子。\n謝徵踏著一地血色走出房門，左手手背滴滴答答往下瀝著血珠。\n守在房外的幾名侍衛從大開的房門瞧見屋內宮女和太監的慘狀，不由也有些心驚。\n燒在屋內的軟骨散劑量，都夠放倒一頭牛的了，他怎麼還能走出來？莫不是提前服用過解藥？\n然而謝徵手上的血跡和腳步間細微的踉蹌，還是讓他們注意到他確實是中藥了，只不過還在強撐著。\n冷宮大門早已鎖死，其中一名侍衛當即就衝後方一名同伴道：「放火，把人都引過來！」\n-\n長公主齊姝已被安太妃禁足了多日。\n今夜除夕，母女倆也只是簡單吃了頓年夜飯，安太妃便回了小佛堂繼續誦經。\n齊姝心中氣悶，拂袖出了暖閣，安太妃身邊的老嬤嬤亦步亦趨跟了上去：「公主去何處？」\n齊姝驕縱了十餘年，可不是個好脾氣的，當即就回嗆一句：「本公主撐得慌，出去走走，宮門都叫母妃下了鑰，你們還擔心本公主去何處？」\n那老嬤嬤被齊姝嗆了聲，也不見怒色，只一福身道：「那公主帶件披風，外邊風雪大，當心著涼。」\n齊姝懶得理母妃身邊這些人，她們跟著安太妃久了，一個個似乎也成了菩薩，說話都是一樣的神態語氣，齊姝見了便煩得緊。\n她只帶了自己的幾個貼身宮女，高昂著頭越過那嬤嬤便走了。\n老嬤嬤在後方屈膝道：「恭送公主殿下。」\n到了外邊，齊姝才真覺著有些冷了，她在廊橋上望著高懸於空中的那輪冷月，捧著銅製的雕花鏤空手爐喃語一聲：「也不知那塊公孫木頭現在在做什麼……」\n她的聲音太小，站在邊上的宮女沒聽清，溫聲問：「公主說什麼？」\n齊姝努了努嘴，道：「沒什麼，去梅園走走吧。」\n安太妃年輕時也是受寵過的，先帝特命人在她宮裡種了一整片梅林，一到嚴冬，整園的梅花爭相怒放，美不勝收。\n今夜下了細雪，梅林的青石板小徑上本該是覆了一層薄雪的，但灑掃的小太監怕主子們有除夕夜賞梅的雅興，一早就清掃乾淨了路面的積雪。\n齊姝帶著一眾宮女走了一陣，忽而道：「你們就在此處，不許再跟著了，我去掛個祈福的香囊。」\n宮女們低聲應「是」。\n齊姝獨自往梅林深處走了一小段，找了枝綻得極美的梅花枝，從懷中掏出那個裝滿了自己少女心事的香囊，指腹輕輕摩挲了一下上邊的刺繡，正準備墊腳掛上去，卻聽得前方被梅枝遮擋的假山後，隱隱傳來幾聲女子的嬌笑。\n莫非有人在此處偷情？\n齊姝臉色當即就是一變，想要發作，但捏了捏自己手上的香囊，神色又緩和了下來，欲當做什麼都沒聽到離開，卻又聽得一句「我騙你作甚，公主近日被太妃看得嚴嚴的，哪兒都沒去……」\n一道有些陰柔的聲音響起：「那長公主身邊的人也沒再去冷宮那邊？」\n女人微.喘著答道：「我們這些當下人的，沒有太妃的腰牌，也出不了壽陽宮了……」\n壽陽花乃梅花的別稱，安太妃的宮殿正是因這片梅林而得名。\n齊姝厲喝道：「誰在此處，給本宮滾出來！」\n這一聲莫說是假山後的男女，便是候在外邊的宮人們也嚇了一跳，連忙趕了過來。\n假山後邊連滾帶爬走出來的，是一對衣衫凌亂的宮女太監，兩個人嚇得臉都白了，對著齊姝磕頭如搗蒜：「公主饒命！公主饒命！」\n齊姝早就知曉宮裡的宮女太監也有結為對食的，這一刻卻只覺著噁心，她認出那宮女是自己宮裡的人，太監瞧著卻眼生。\n她冷冷盯著那宮女：「你在監視本宮？」\n宮女渾身顫抖如篩糠，哭得臉都花了：「奴婢不敢……奴婢不敢……」\n齊姝轉看向那太監：「你是哪個宮裡裡的人？」\n太監抬起眼看了齊姝一眼，又飛快地低下頭去，雖也害怕，但似乎比那宮女多了一份底氣：「奴才……奴才是司禮監的，陛下身邊的高公公是奴才幹爹。\n齊姝冷笑出聲，原來齊昇身邊的總管太監就是他的那份底氣。\n可他既能問那宮女那些問題，顯然自己幫謝徵查冷宮瘋宮女一事已穿到了齊昇耳朵裡。\n一股寒意從脊背竄起，齊姝只覺膝彎有些發軟，她看著那太監的表情像是恨不得吃人，厲聲道：「先把這腌臢閹人給本宮綁了，關起來！」\n隨即轉身疾步往梅林外走，用力抓住自己一名心腹宮女的手，交代道：「快，你拿我的腰牌，即刻去太極宮，找雲麾將軍，就說冷宮有變！」\n宮女             content: `齊昇帶著一眾朝臣浩浩蕩蕩趕往冷宮時,瞧見的便是滔天的火光和那一地的死屍。\n群臣不由譁然，這除夕夜冷宮失火竟非偶然，還發生了命案！\n齊昇在瞧見被前去的救火的金吾衛抬出來的那女人的屍體時,臉色便已難看了下來，他抱著幾分僥倖喝問：「怎麼回事？有人膽大包天到直接夜闖冷宮，淫.亂妃嬪不成？」\n前去救火的金吾衛統領冷汗涔涔抱拳道：「卑職不知，卑職等看到冷宮火光趕來時,便已是這番情形了。」\n齊昇顧不得帝王之儀,目眥欲裂厲聲追問：「夜闖冷宮的淫.賊呢？」\n金吾衛統領腰身折得更低了些：「卑職已調金吾衛搜查整個皇宮,只要那賊子還沒出宮，必然會落網的。」\n齊昇面目陰沉得像要吃人。\n他已經計劃得那般周密了,連失傳已久的禁藥軟骨散和繞指柔他都弄來了，為何謝徵還是逃掉了？\n不是說軟骨散連野牛都能放倒,繞指柔能讓貞潔烈女變得比勾欄女子還浪.蕩嗎？\n難不成都對謝徵沒用？\n精細部署的計劃失敗帶來的惱怒和怕謝徵報復的惶恐撕扯著齊昇,讓他面色愈發猙獰,在群臣驚惶惑然的視線下,他抬腳踹翻了放於地上用來救火的半桶水,厲聲吩咐：「搜！就算掘地三尺,也要把那淫.賊給朕找出來！」\n金吾衛統領領命帶人去搜查整個皇宮。\n齊昇在愈燃愈烈的火光裡轉過身，陰沉看著面色惶惶的群臣：「真是豈有此理,把朕的皇宮當成什麼了？今夜朕只宴請了朝中諸位大臣,爾等的僕役皆候於午門之外,難不成這渾水摸魚夜闖冷宮的,是朕的哪位愛卿？」\n淫.亂後宮的罪名可不小,群臣面面相覷，只覺齊昇說出這等言辭來，當真是荒謬至極。\n齊昇卻半點不覺,還在意有所指道：「能殺了朕這麼多金吾衛，想來這武藝也超群呢！」\n離席頗久的只有武安侯，齊昇這話外之意太過明顯，讓群臣愈發噤若寒蟬。\n齊昇是天子不假，可他從坐上龍椅開始，就只是魏嚴扶持的一個傀儡，百官對他的敬畏，還沒對謝徵的忌憚多。\n畢竟一個只是手無實權的皇帝，一個卻是擁兵數十萬的鎮邊武侯。\n腦子靈光些的，已想明白了今夜這場大火，怕是齊昇故意做的一齣戲，帶著他們前來，目的就是要讓他們成為證人，借整個朝堂的力量，把一樁誅九族的大罪釘死在武安侯身上。\n只是中間出了什麼紕漏，才造成了眼下的局面。\n想通這一點的朝臣，心中頓時升起無盡惶恐，若是武安侯就此栽在了齊昇手上還沒什麼，要是他逃過這一劫，自己又被迫成了「證人」，後面豈不是要被武安侯滅口？\n一時間脊背叫冷汗溼透的朝臣不在少數。\n唐培義同賀修筠等人跟在隊伍最後方，聽得齊昇那番話，想到謝徵離席久久未歸和樊長玉也是一去不返，相互交換了個眼神，眉宇間都籠上了一層憂色。\n-\n太液池。\n樊長玉被謝徵吻住後，怕金吾衛搜過來，心裡急得不行，謝徵身上有傷，她又不敢太用力去推，竟就這麼被他按住頭吻了半息。\n謝徵唇往下移，在她頸側輕拱、啄吻時，樊長玉警惕地環視太液池一周，確定附近暫且是安全的後，逮著空隙把意識已不太清醒的人半拖半拽拖出了水面。\n期間謝徵拱開她領口的衣襟，尋著她身上那一抹幽香試圖繼續向下吻，樊長玉不知是熱的還是太過緊張，面上竟也燒紅了，她撥開那顆腦袋，想發作，知道他這是中了藥不受控制，又發作不起來，只咬牙道：「你先忍一會兒，我帶你出宮。」\n謝徵被她放到地上，背靠著假山，原本在冰冷的池水中被泡得蒼白的面上已升起一片薄紅，喘.息間精壯的胸膛劇烈起伏，溼透的衣襟散開些許，露出白瓷似的一截胸膛，兩邊雪白的裡衣貼著那緊實的肌理，已恍若無物。\n他溼透的黑髮也貼在鎖骨和肩膀處，清灩又妖冶，一雙血紅的眼裡已不見清明，卻還是定定地看著樊長玉：「幫我……」\n他中了軟骨散，除了拿刀往自己身上劃能勉強維持幾分力氣，否則連起身都困難。\n忍耐了太久，他頸下的青筋都已凸起幾條，像是皮下的血管快要爆開。\n他這個樣子，樊長玉瞧著也心疼，想到皇帝那齷齪的陰謀，心中又怒不可遏。\n她胡亂地將自己和謝徵身上溼透的衣袍都擰乾了些，才用泡過冷水同樣冰冷的手捧住謝徵的臉，「這裡不行，隨時會有人來。」\n他臉上不知是因為藥性，還是在湖水裡泡了太久已發起了高熱，燙得驚人，樊長玉的手一貼上去，他便用自己那掌心傷口都已泡得發白的手拽住她的手腕，試圖貼得更緊些。\n樊長玉問他：「你的朝服放哪兒了？」\n他身上沒穿朝服，若是被金吾衛搜出來了，叫皇帝拿到冷宮去栽贓，今夜這局便還是沒破。\n約莫是被樊長玉手上的冰涼緩解了幾分，謝徵勉強恢復了幾分神智，抓著她五指吮吻時微.喘著答：「在御花園的假山石洞裡。」\n太液池佔地面積極大，分東西兩池，東池靠近冷宮，就是她們現在待的地方。西池則作為了整個後宮的軸心，御花園也在細池邊上，甚至臨池而建了一片假山石林。\n知道謝徵要夜探冷宮後，樊長玉也拿著整個皇宮的輿圖研究過一番的。\n因此謝徵一說御花園那邊的假山石洞，樊長玉當即就知道了地方。\n冷宮失火，用完了御道兩側蓄水大缸裡的水，救火的太監和禁軍為了取水方便，應該也是來東池取水，西池那邊暫且還是安全的。\n樊長玉用牙齒將自己身上的太監服撕開一個口子，再兩手用力一扯撕成布條，往謝徵掌心和手臂的傷口上纏，說：「我現在就帶你過去。」\n冷宮的火勢極大，附近巡邏的金吾衛約莫也趕去救火了，樊長玉背著謝徵一路幾乎沒遇上什麼阻礙就到了御花園的假山石林那邊。\n若說非要有什麼阻礙的話，便是謝徵在她背上也一直在親吻她後頸，扯得她衣襟都鬆散了，樊長玉好幾次都差點跌跤，便黑著臉一手刀把人給砍暈了。\n找到那個石洞後，樊長玉才發現洞口狹小，裡邊還挺空曠的。\n怕被察覺，她不敢點火摺子，好在石洞頂上有個豁開的橢圓形口子，仰頭甚至能看到那輪不算圓的冷月，從頂部的洞口照進的月光，也讓樊長玉勉強能視物。\n她找到謝徵之前放在裡邊的大氅和朝服後，正欲把謝徵身上溼透的衣物扒下來給他裹上這些乾爽的，怎料假山外卻有火光撩過，緊跟著響起一片甲冑碰撞聲。\n「快快！封鎖宮門！有刺客潛入了皇宮！冷宮已有妃嬪遇害了！」\n樊長玉擁著謝徵當即不敢再動彈，怕弄出什麼動靜叫外邊的金吾衛發現。\n怎料謝徵卻在此時醒了過來，他唇間剛溢出一聲喑啞的低.吟，樊長玉情急之下，便用自己的唇給他堵住了。\n他幾乎是尋著本能纏住了樊長玉的舌，中了軟骨散，身上脫力，吻得才比從前溫柔了些，卻還是讓樊長玉喘不過氣來。\n他身上比起先前在太液池邊上時已燙得多，皮肉底下的血液似乎都被燒沸騰了，仿佛已到了一個臨界點，在這麼下去，他整個人幾乎快要七竅流血。\n隔著溼透的衣物，樊長玉都能感覺到他身下烙鐵一樣。\n彼此的喘.息聲都在加重，卻有腳步聲在朝著這邊逼近。\n謝徵已完全不清醒了，樊長玉放任他在自己頸間啃噬，眼神卻是冷漠又警惕地看著洞口的，手上甚至摸出了藏在長靴裡的那柄剔骨刀。\n腳步聲愈來愈近了，樊長玉握著刀柄的手不禁緊了幾分，吮著她頸間一塊軟肉的謝徵也倏地抬起了眸子，血紅的鳳目已不像人會有的一雙眼，裡邊只有冷戾血腥的殺意，好似被人侵犯了領地的頭狼。\n假山頂上突然傳來幾聲悽厲的貓叫，恍若嬰孩啼哭一般。\n往這邊來搜尋的金吾衛鬆了口氣，嗤笑道：「原來是宮裡的野貓發.情了。」\n他用刀鞘打了一下假山附近的枝丫，便驚得兩隻貓兒嚎叫著四躥逃開。\n金吾衛收了刀往回走，前邊的同伴問他：「你那邊有發現什麼沒？」\n那名金吾衛答：「兩隻野貓而已，虛驚一場。」\n腳步聲徹底走遠了，樊長玉緊繃的那根弦松下來，整個人也癱.軟了幾分，她靠在謝徵身上喘.氣。\n謝徵身上的溫度把那身被池水溼透的衣物都蒸得熱了起來，他低頭親吻樊長玉面頰，喉結微.聳，頸間也有了汗意。\n樊長玉輕撫他面頰，五指沿著他鬢角插入他發間，看著他因極致隱忍而被咬破的唇角，映著月輝的一雙眼裡全是疼惜，她抿了抿唇，道：「我幫你。」\n-\n冷宮。\n前去搜尋的金吾衛很快捧著一物快步走來：「陛下，臣等沿著血跡一路追尋，在太液池東池邊上找到了這張面具。」\n齊昇拿過那張疤臉面具細瞧，臉上已掩飾不住興奮，問：「人呢？」\n金吾衛統領低下頭去：「還沒找到人，血跡斷在了東池邊上，卑職怪異賊人鳧水逃了，正在命人沿著太液池搜尋。」\n齊昇捏著面具的手驟然收緊，大罵金吾衛統領：「廢物！都找到賊人身上的東西了，為何沒抓到人？朕養你們這群飯桶有何用？還不給朕繼續去搜！」\n金吾衛統領領命匆匆退下。\n-\n冷月悽清，撒下的月輝也如清冷如霜。\n樊長玉鬢角出了些細汗，她偏過頭看謝徵靠在自己肩膀上的側臉。\n他似還沒緩過來，黑長的眼睫輕覆在眼瞼處，蒼白的臉上暈開兩抹薄紅，全無了前一刻啃.噬她頸間的軟肉恨不能就這麼生吞了她的那股狠勁兒，安靜又乖巧。\n樊長玉呼吸也還不太穩，她在自己那身溼透的太監服上擦了擦手，問：「好些了麼？」\n謝徵掀開眸子淺淺點頭，抬手壓住樊長玉後腦勺，又吻了她好一會兒才鬆開。\n方才除了彼此的喘.息聲，樊長玉所有感官幾乎都已麻痺了，她竟也不知這是過去了多久，只把他那身朝服拿給他套上：「金吾衛在搜查整個皇宮，我們得出去了。」\n他身上的中衣還是溼的，裡衣竟生生靠體溫烘乾了。\n謝徵卻道：「把朝服也弄溼。」\n樊長玉皺眉道：「你會著涼的。」\n謝徵抵著她額頭：「我一時半會兒沒法同你解釋清楚，你且照我說的做就是了。」\n樊長玉便出去把他的朝服扔進水裡泡溼了擰乾再給他穿上，那身夜行衣則被她包上大石塊沉入了太液池。\n一切準備就緒，樊長玉再扶謝徵出去時，明顯感到他腳下還有幾分虛浮，似乎並不是單純地中了媚.藥。\n仿佛知道她在想什麼，謝徵道：「軟骨散的藥性還沒過。」\n樊長玉捏著他手腕的五指便緊了幾分，原來他還中了軟骨散！\n無怪齊昇敢只在冷宮外放十幾名侍衛就想攔他。\n樊長玉從牙縫裡擠出三個字：「狗！皇！帝！」\n她鮮少罵髒話，謝徵還是頭一回聽她這般咬牙切齒地罵人。\n他詫異地側眸 了傷，又在太液池溺水受了寒，病體抱恙，無力再幫陛下搜尋那賊子，便先行出宮了。」\n齊昇腦中嗡聲一片，壓根已聽不見謝徵在說什麼。\n謝徵不得齊昇應允，便擅自離開，朝臣們也不敢做聲。\n長門狹道卻又在此時傳來急報聲：「報——有刺客夜襲大理寺，劫走了隨家要犯！」\n此言一出，群臣不由譁然。\n樊長玉知道應該是謝徵手底下的人去大理寺劫人成功了，心下倒是鬆了一口氣。\n出乎意料地，發生了這麼大的事，齊昇臉上卻一點波瀾都沒有了，甚至都沒責問同在參加宮宴臣子之中的大理寺卿，連讓朝臣們散宴各自歸家都是總管太監代為傳話的。\n-\n唐培義等人在跟著齊昇前往冷宮後，便一直替謝徵提著一口氣的，直至此時，那口氣才徹底吐出來了。\n幾人結伴出宮，鄭文常眼尖地瞧見前方武安侯似乎傷勢不輕，由樊長玉扶著時，大半個身體都壓在了她單薄的肩膀上，當即就要上前去。\n唐培義一把薅住了他，問：「你做甚去？」\n鄭文常道：「侯爺似乎傷得頗重，怎能一直由樊將軍一女流扶他，我去扶侯爺。」\n唐培義看他的眼神頓時有點一言難盡，最後只道：「你別管。」\n鄭文常很是不解：「為何？」\n一旁賀修筠輕咳一聲，攬住鄭文常肩膀道：「文常兄，你扶我吧，我有些醉了。」\n鄭文常是賀敬元的門生，同賀修筠也是情同手足的好友，如何不知他的酒量，當即就一掄肩把人甩開：「你離喝醉怕是還差七成呢！」\n他費解地看著好友：「你和唐將軍，怎麼都怪怪的？」\n賀修筠嘆了口氣，終是選擇直說了：「你是個榆木疙瘩嗎？看不出侯爺和樊將軍好事將近了？」\n鄭文常狠狠一皺眉：「因為樊將軍跳太液池救侯爺有了肌膚之親？」\n他當即便道：「這你們就不了解樊將軍了，樊將軍那等胸懷氣魄，不輸大丈夫，怎會被這等俗禮困住……」\n唐培義和賀修筠看他的神色愈發一言難盡了些。\n這人在盧城時就沒發現一丁點的不對勁兒嗎？\n最後賀修筠只拍了拍鄭文常的肩說：「文常兄，將來你若自己求妻困難，便來求你嫂嫂給你牽個紅線吧。」\n鄭文常立在原地看著遠走的唐、賀二人，面上愈發茫然。\n這怎麼還跟他將來娶妻扯上關係了？：，，.`

            content: `到了宮門口,眾目睽睽之下，樊長玉也不能就這麼堂而皇之地上謝家的馬車。\n她把情況越來越不好的謝徵交給迎上前來的謝十一，謝十一一眼就瞧出了謝徵不對勁兒，忙問：「將軍,主子這是……」\n時間緊迫,樊長玉只壓低嗓音囑咐道：「即刻帶他回謝宅,再差人去請個大夫。」\n樊長玉欲抽手離去,謝徵卻將她手腕攥得緊緊的,他眼底已褪了些的血色又慢慢染了回去,在宮門口的燈火下乍一眼看上去，有些猙獰。\n樊長玉掙不脫手，便把人攙上了馬車，在車轅處低聲同他道：「你先鬆手,我不走,我去交代謝五幾句就回來。」\n今夜隨樊長玉進宮的，依然是從她作為一伍長時，就跟著她出生入死的謝五。\n謝徵這才鬆了手，倒伏在馬車坐榻上時,髮根已浸出了汗，蒼白的面容間染上一層薄紅，在馬車內柔和的竹影映照下,有種驚心動魄的瑰麗。\n樊長玉一狠心放下了車簾,跳下馬車後對謝十一道：「你們先走。」\n謝十一隱約也明白了什麼，半點不敢耽擱,一甩馬鞭便駕車先行離去。\n這會兒出宮的朝臣也多，瞧見這一幕不免神色各異。\n正好唐培義也跟了上來，見了樊長玉便招呼：「樊將軍,一道回進奏院？」\n樊長玉回頭還想去找謝徵，怕同唐培義他們一道走了，後面不好脫身，正要拒絕，卻見賀修筠衝她打了個眼色，樊長玉以為他們是有事要同自己相商，便又點了頭：「好啊。」\n幾人的馬車一齊往進奏院方向駛去，後邊出來的朝臣見了，也不敢妄議什麼。\n謝五先前也瞧見樊長玉扶著謝徵出宮，樊長玉一上馬車後，他便問：「將軍，宮宴上是不是出了什麼事？」\n這一整晚樊長玉的神經都是緊繃的，此刻腦仁兒已隱隱有些作痛，她捏了捏眉骨道：「說來話長，一會兒你獨自回進奏院，替我向大娘她們報個平安，我去謝府一趟。」\n謝徵那個樣子，她終究是不放心的。\n謝五剛應了聲好，忽地「籲」了一聲。\n樊長玉聽見外邊有人喚自己「賢妹」，打起車簾一看，便見唐培義他們的馬車在一岔道口處停下了。\n賀修筠從車窗處探出頭來，同樊長玉道：「長玉賢妹，我同唐將軍還有文常兄想去看看除夕燈會，便不同賢妹一道走了。」\n她喚賀敬元一聲世伯，賀修筠在她跟前便一直以兄長自居。\n樊長玉縱是再遲鈍，也明白唐培義他們此舉是在替自己解圍。\n她今夜跳太液池「救」謝徵，少不得會在朝臣們那邊引起非議，她若獨自離開，總會叫人胡亂揣測些什麼，跟著他們一起離開，多少能堵住悠悠眾口。\n她心下感激，只是眼下也不是言謝的時候，便點頭道：「那世兄隨唐將軍去吧，京城的除夕夜市乃一大盛景，世兄熟悉了地方，將來好帶嫂嫂再來看一次。」\n賀修筠笑著應了聲好，放下了車帘子。\n-\n北風凜冽，卷著漫天細雪在滿是爆竹煙火味的大街上飛舞。\n踏踏的馬蹄聲和車輪滾動聲格外清晰，似有黑影掠過，馬車內的燭火叫窗口拂進的冷風吹得顫抖了一下。\n樊長玉扶起靠在坐榻上、唇角又一次被咬破溢出鮮血的謝徵，眉心攏得緊緊的：「你怎麼樣？」\n謝徵呼吸間像是著了火，掀開血色的鳳目看清來人後，直接抬手按住她後頸，以吻封唇。\n他身上軟骨散的藥力似慢慢散了些，按在她頸後的力道極大，唇齒間也肆虐得厲害，樊長玉仰著頭只有被迫承受的份。\n須臾，馬車停下了，謝十一在外邊硬著頭皮道：「主子，到了。」\n樊長玉撐在謝徵胸膛上，肩頭因他犬齒啃噬升起一股細微的刺痛，她五指用力攥緊了謝徵身前的衣襟，臉上泛起一層淡粉，抿緊唇角硬捱著因他的吻身體裡竄起的異樣感。\n「馬車從角門進去，別驚動府上其他人。」\n謝徵眸子混沌，嗓音啞得發沉。\n謝十一得了指令，很快調轉馬頭驅車往角門去，出示令牌後，謝府的下人打開角門，馬車幾乎是無聲無息地進了府，在正院前停下。\n謝十一去請常駐府上的大夫，樊長玉稍緩過勁兒後，便扶著謝徵下車。\n甫一進房門，她就被謝徵摁著抵在了門上，他在她肩頸胡亂親吻、吮咬，呼吸沉重又紊亂，低醇的嗓音不復清冽：「長玉，阿玉……」\n脆弱的頸肉被尖齒磨咬，似有一根弦在皮下的經絡中繃緊，哪怕樊長玉咬緊了齒關，細微的顫慄還是從頸下一直傳到指尖。\n她眸底覆上一層水色，一句話沒說，只吃痛微惱地瞪了謝徵一眼，就讓他腦子裡那根岌岌可危的弦「咔嚓」一聲徹底繃斷。\n她身上那件刺繡繁複、質量極佳的三品武官朝服，生生叫他扯開了一個大口子，就那麼頷首吻了上去。\n樊長玉後背抵著雕花木門，汗水從下顎滑落，唇角抿得發白。\n她推了他一下：「你身上的傷……先上藥。」\n謝徵呼吸很不穩，抬起頭說好，怎料剛起身便吐出一口血，面如雪色倒了下去。\n樊長玉嚇了一跳，忙扶住他：「謝徵，你怎麼了？」\n她把人搬到軟榻上躺著，大聲喚謝十一快些請大夫過來，身上半溼的朝服直接被謝徵扯開一個大口子，沒法見人，又奔到謝徵放衣物的箱籠前想隨便拿一套他的先湊合穿上，套上箭袖長袍後，才發現出乎意料地合身。\n樊長玉微愣了一下，再拿了好幾件衣袍往身上一比，發現都很合身。\n這一箱衣物，似乎都是他早早地就替她備好的？\n樊長玉看向軟榻上面色蒼白暈過去的人，心口在那一瞬間澀得發慌。\n謝十一很快領著郎中過來了，郎中給謝徵把脈後，眉頭皺得緊緊的。\n樊長玉忙問：「大夫，他怎麼樣？」\n郎中用銀針再謝徵指尖刺出一滴血，面色極為複雜地道：「侯爺這是心火熾盛所致，此火發於命門，遊於三焦，積於肝腎，才會旺極而傷臟腑吐血，我以商陽穴放血，也只能替侯爺緩解一二，終是治標不治本，此火不疏，侯爺只怕極為危險……」\n謝十一送郎中回去時，在門口給樊長玉跪了下來，他低垂著頭，似也知道自己要說的話冒昧，卻還是哽聲道：「求將軍救救侯爺。」\n樊長玉坐在杌凳上，看著被郎中施了一套針法依舊沒醒的謝徵，只說：「出去。」\n謝十一給她磕了個頭後，把門帶上離去。\n樊長玉走近坐到了軟榻前，她俯身吻了一記謝徵唇瓣後，微抬起頭低聲同他道：「你入贅給我了的。」\n……\n這一夜整個皇城熱鬧非凡，宮城明燈璀璨，城外的一百零八坊亦是燈火通明，孩童的歡笑聲和小販的叫賣聲飄出幾條街都還能聽見。\n子時一至，城內的金寺當即響起了撞鐘聲，一聲又一聲，悠遠而綿長，似在昭告人間，舊歲已去，新歲來臨。\n坊間萬束煙花齊齊射向大雪紛飛的夜空，霎時間漫天都是炫目的彩色，左鄰右舍間也燃放了爆竹喜迎新歲，「劈裡啪啦」的爆竹聲不絕於耳，好不熱鬧。\n樊長玉趴在溫泉池的漢白玉暖石上，長發溼漉漉貼著臉頰，全身都泛著一層淡粉，她已經不記得自己看了多少次煙花，現在整個人精疲力盡，不亞於剛打了一場大仗。\n身後的人貼著她後背將她整個擁進懷裡，又開始啄吻她肩膀時，樊長玉肩不自覺往裡縮了一下，偏過頭問他：「藥性還沒解嗎？」\n她雙頰緋紅，被汗水打溼的碎發還凌亂貼在頰邊，唇是腫的，一雙明眸裡也透著一層水汽。\n神色依舊倔強，但已經透著點可憐的味道了。\n謝徵看著她，眸色深不見底，喉結緩緩下滑，喑啞「嗯」了一聲。\n水紋波動，樊長玉便也跟著悶哼了一聲。\n她已經沒力氣了，乾脆就趴在溫泉池壁上，枕著自己的手臂硬捱。\n腦子裡想的卻是，一定是她進京以來諸事纏身，疏於練武了，謝徵不還中了軟骨散嗎？體力怎麼比她還好？\n從明日起，一定要勤加練武了。\n這一夜，同樣還有人徹夜難眠。\n在參加宮宴的所有大臣都離宮後，一輛不起眼的馬車從西華門駛出，車輪壓過道上積下的厚雪，徑直朝丞相府而去。\n比起滿城的張燈結彩，丞相府肅穆依舊，就連廊下掛的一排紅燈籠，都沒給府上添加幾分喜慶，在這靜得令人心慌的夜幕中，反透出一股陰沉。\n這一次，礙於外邊風雪太大，齊昇終於被領進了魏嚴書房。\n他身上的鬥篷都沒取，帽沿上的細雪叫屋內的炭火烤話後，留下斑駁的溼痕，叫他整個人都透出一股喪家之犬般的狼狽。\n魏嚴坐於矮几之後，在這寒夜裡，他身上所穿的仍是一件不厚的布衣裳，蒼老卻依舊筋骨分明的一隻手執著紫毫，筆走龍蛇地在案前書寫著什麼，視站在下方的帝王如無物。\n齊昇卻渾然不在乎了，不知是這除夕夜的雪太冷，還是今晚計劃敗露後的恐懼太盛，他說話時嗓音都在抖：「丞相，救朕，救救朕，謝徵想弒君！」\n魏嚴筆下未停，眼都不抬地問：「他為何要殺你？」\n齊昇看了魏嚴一眼道：「他……他在查十六哥的事，查到了冷宮一個曾在賈貴妃身邊伺候過的瘋宮女，那瘋宮女說丞相曾私通后妃！」\n此言一出，魏嚴手中的紫毫筆直接被捏出了斷痕，他緩緩抬眸看向齊昇，眼神同看死人無異。\n齊昇也被那個眼神嚇了一跳，原本是打算用那個宮女當砝碼威脅魏嚴的，當即換了個說法。\n他在撒謊時因用力瞪眼，使得一雙眼外凸愈發明顯：「謝徵要去找那宮女求證此事，朕怕他拿這事來對付丞相，便設計將私通后妃、淫.亂後宮的大罪扣到謝徵頭上，本已謀劃得天衣無縫，怎料今夜卻叫他破了此局……」\n他甚至一把鼻涕一把淚地哭了起來：「謝徵早有異心了，他一定會殺了朕的，朕做這些都是為了丞相，丞相一定要救朕啊！」\n魏嚴擱下手中有了斷紋的紫豪筆：「所以，陛下從那宮女口中聽說了些什麼？」\n這波瀾不驚，卻又讓人每個毛孔都能感到殺機的語氣，讓齊昇哭聲一頓，整個人怔住。\n有那麼一瞬間，他覺得謝徵和魏嚴這對甥舅的影子似乎重疊了起來。：，，.`

            num: 153,
            title: `第153章第153章`,
            content: `樊長玉不記得自己最後是暈過去的還是累極睡過去的,只是迷迷糊糊間門，感覺有一場溼熱的雨一直黏著她,無論她在夢裡怎麼跑都甩不掉。\n後來終於醒了,睜眼便見天光已大亮，外間門隱約傳來說話聲。\n「……李家勢必會狗急跳牆，魏嚴留的後手也不會這麼簡單,通知公孫那邊可以動身了。」\n「屬下遵命。」\n跟著便是離開的腳步聲和房門打開又被合上的「吱嘎」聲。\n謝徵回內間門時，見樊長玉已擁著被子坐了起來,原本冷凝的眉眼見漾開幾絲柔軟,走過去坐到床榻邊，將她睡亂的一縷青絲捋到耳後，動作再親暱自然不過：「醒了？時辰還早,怎不多睡會兒？」\n昨夜風雪未停,今日外邊已積了兩指厚有餘的雪,屋裡燃了地龍，倒是半分不冷。\n樊長玉在坐起來時便發現了套在自己身上的是一件並不合身的裡衣，領口太大以至於一直往兩肩下滑。\n她瞥了一眼,從肩膀到兩隻胳膊都是痕跡，慘不忍睹……\n昨晚混亂的記憶回籠，她默默把衣領拽了回去，在謝徵進屋後,她打量了他兩眼，問的第一句話便是：「你沒事了吧？」\n謝徵那隻幫她拂碎發的手還放在她耳後貼著雪頸的位置，聞言一雙黑眸靜靜注視了她兩許，忽地扣住後頸把人帶近，在她唇上吻了兩記，才低聲道：「你怎麼這麼招人疼？」\n樊長玉一雙黑白分明的眸子坦然地望著他：「你昨晚都忍到吐血了啊……」\n謝徵似乎極喜歡觸碰她,指腹在她後頸輕輕摩挲著問：「若是我沒吐血呢，你還會這麼縱著我麼？」\n最後失去意識的經歷太過丟人，樊長玉覺得這是自己體力不如人的屈辱，尷尬垂下腦袋岔開話題：「我有點餓了。」\n謝徵見她這般，鳳眸裡划過一抹晦暗，道：「廚房一直備著飯菜，我命人去傳。」\n樊長玉點了頭，謝徵卻沒出去，而是蹲在了床前，抓住她兩隻手放到唇邊親了親，神色極為認真地道：「讓你就這麼跟了我，終是我薄你。等一切安定下來了，我補給你一場舉世無雙的大婚。」\n說樊長玉心大也好，經歷這麼多事後沒那麼在乎世俗禮節了也罷，謝徵承諾與她的這些，她其實並沒有那麼在意的。\n但是他這般鄭重地同她說了，她心湖還是像被投進了一顆小石子般，泛起了圈圈漣漪。\n這種被珍視被愛重的感覺，讓她覺著哪怕前路是刀山火海，她也無懼同眼前人一起走下去。\n於是她捧住謝徵的頭，俯身在他額前吧唧親了一口，臉紅紅的，一雙眼卻晶亮又明澈：「你沒有薄我，我會嫁給謝徵，但言正是入贅給我了的。」\n見謝徵沒作聲，她微紅著臉瞪他：「我們還沒和離呢，除非你想不認帳。」\n謝徵緊緊扣著她那隻手腕，好一會兒才抬起頭來，問她：「你還疼嗎？」\n樊長玉先是一怔，反應過來謝徵問的是什麼後，耳朵尖都紅透了，她惱極直接哐當一拳揍了出去：「滾！」\n謝徵挨了一拳也不生氣，順勢截住她那隻手，把人按進被褥裡狠親了一陣，才抓起她握拳的手也放到唇邊親了親，眼角眉梢都是壓不住的笑意與歡愉：「用完飯你再睡會兒，我去部署些事加快收局，晚些時候再送你回進奏院。」\n樊長玉氣都還沒喘息勻，聽他說要部署什麼，當即便想起自己剛醒來時候聽到的外間門的談話聲。\n她問：「李家又出什麼事了嗎？」\n謝徵唇角笑意極冷：「被魏嚴擺了一道罷了。」\n「李家安排的指認魏嚴同反賊勾結的那名謀士，本就是魏嚴的人，在終審時突然翻供，說一切都是李家指使他幹的，甚至還供出了書信往來的罪證。」\n樊長玉滿臉詫異，她當然知道大理寺經她們上次劫獄後，如今的防守有多嚴密。\n李太傅一開始以為是魏嚴想殺證人，因著大理寺有魏嚴的人，李家只佔一個西刑部，李太傅怕魏嚴繼續劫殺證人，還一力促成了御史臺的人馬也入駐大理寺，又從五軍營調了重兵把守大理寺。\n如今那謀士翻供，可以說李太傅先前之舉是搬起石頭砸了自己的腳。\n她道：「你先前說怕李家狗急跳牆，就是因為此事？」\n謝徵頷首道：「昨夜謝三帶人前去大理寺劫人，正好撞見李家的人支開大理寺外五軍營的守衛，意圖對那謀士下手，他們誤打誤撞破壞了李家的計劃，殺人毀證不成，接下來就只能拼個魚死網破了。」\n樊長玉卻是大為震驚：「魏嚴的城府未免也太深了些。」\n她皺眉道：「他是從一開始就知道李家在設計他，還故意在齊旻那裡留下『把柄』，引李家上鉤。」\n謝徵眉宇沉鬱了幾分，長眸微垂，語調涼薄又諷刺：「他不一向如此無所不用其極麼。」\n樊長玉握了握他的手，說：「你的人已把長信王府的老管家也劫了出來，從他口中說不定能問出魏嚴和長信王的什麼勾當，天網恢恢，疏而不漏，我們總會找到證據給他定罪的。」\n謝徵看著她用力握住自己的那隻手，縈繞在心口的陰霾和戾氣散了幾分，淺淺應了聲「好」。\n-\n用過飯後，樊長玉也沒閒著，她去謝府的私牢裡同謝徵一道審問隨府那管家。\n一開始那管家嘴也極硬，問他什麼都不肯說，只一味裝瘋賣傻。\n後來謝徵命人把趙詢和那對母子帶過來了，他眼見裝瘋賣傻不管用了，哪怕有孫子這個軟肋在，他也死活不肯再開口。\n謝徵命人用刑，那看著風燭殘年的老頭子，竟硬氣得狠，寧可咬舌自盡也不肯交代，對長信王的衷心程度著實令樊長玉驚訝。\n謝徵也敏銳地發現了這一點，老頭身子骨差，再用刑，怕是就得交代這牢裡了，他轉而開始攻心。\n火盆裡的火光照亮整個陰暗溼冷的地牢，謝徵坐在太師椅上，接過一旁的親衛遞過的熱茶，用杯蓋不急不緩地颳了兩下，極為散漫地道：「你兒子已在公堂上被杖責至死，本侯手上不喜沾稚兒之血，可本侯的耐心實在是有限，你若是再這般不識抬舉，本侯身邊的人，個個都是凌遲好手，將你那孫子身上的肉一片一片削下來餵狗，本侯保證，削到臟腑時，他還是活著的，能哭著喚你一聲阿爺。」\n他說完抬起眼，在茶盞升起的霧氣中，淡漠地看著對面的老者。\n抱著孩子的女人在聽到謝徵的描述時，便已嚇得兩眼一翻暈了過去，只餘她邊上的孩子還在哭著喚「阿娘」「阿爺」，像是即將被送去屠宰的羔羊發出的稚嫩呼喚，聽得人心口都不自覺揪緊。\n樊長玉知道要攻破老者的心理防線，這番恐嚇是少不了的，強迫自己坐在一旁的太師椅上冷眼旁觀。\n那老者看著自己的孫子趴在地上一邊哭，一邊努力去搖晃他母親，也是心疼得老淚縱橫，口中卻只道：「是阿爺對不住你，阿爺對不住你，但阿爺沒法子……」\n謝徵長眸不耐一眯，喚道：「十一。」\n謝十一朝外邊做了個手勢，很快便有下人牽著幾條涎水四溢的兇惡狼狗走了進來，那幾條狼狗看到裡邊的小孩子，便已開始狂吠不止，嚇得那小孩尖叫大哭。\n那受刑後渾身血跡斑斑的老者眼底全是渾濁淚光，朝著謝徵不住地磕頭：「稚子無辜，給那孩子一個痛快的吧，王爺待我恩重如山，沒有王爺，早就沒有我這一家老小了，我這幾十年光陰都是從閻王那裡借來的，老朽發過誓不能背叛王爺啊！」\n那被侍衛牽在手中的狼狗幾乎已快咬上孩子，那老頭除了痛哭流涕磕頭讓給孩子一個痛快的死法，還是不肯鬆口半句。\n樊長玉看向謝徵，謝徵做了個手勢，那侍衛便拽著一直想往前撲的狼狗退了出去。\n樊長玉對那老者道：「你對隨拓忠心不一？可你現在衷心的，不是隨拓的後人呢？你不用跟我裝瘋賣傻，死在薊州的那個，不是真正的隨元淮，否則你也不至於讓自己的兒媳孫子來假扮他的妾室母子。」\n老者哭聲一滯，盯著樊長玉：「你前一句話是何意？」\n樊長玉看了謝徵一眼，隨即對老者道：「就是狸貓換太子的意思。十七年前東宮大火，長信王妃母子也受邀去了東宮，死在大火裡的那個，才是隨元淮，被燒毀了容貌的，則是皇長孫，這本就是一出金蟬脫殼的計謀。」\n老者神色惶惶，似乎難以置信，一遍又一遍地重複著：「怎麼可能……怎麼可能……」\n樊長玉繼續道：「小長信王妃和隨元青，也是死在了他手中。」\n老者身形佝僂了下去，眼中卻陡然兇光畢露：「王妃不是為了掩護大公子自盡的嗎？至於世子，是死在你們手中的啊！你們休想編出這等謊話來騙老朽，老朽不會上當的！」\n趙詢適時出聲：「我可做證那人的確不是你們長信王府的大公子。」\n老者直接狠狠啐了他一口：「叛徒之言，不可信！」\n這老頭的固執程度，實在是讓樊長玉有些頭疼。\n在地牢裡呆久了悶得慌，樊長玉同謝徵出去透氣時，踢了一腳地面的積雪，嘆氣道：「是個硬骨頭，撬不開他嘴怎麼辦？」\n他一開始還疑惑謝徵為何不告訴那老頭隨元淮是個冒牌貨，直接開始用那小孩威脅。\n經此一番才知道，對於這等固執己見，又不見棺材不掉淚的人，沒個切實的鐵證，是說服不了他的。\n天空又飄起了細雪，愁雲慘澹。\n碎雪落在了樊長玉發間門，謝徵抬手幫她拂去時，微垂眼帘看著她道：「我想借皇重孫做一場戲，你可願？」\n樊長玉遲疑一一，點了頭：「只要不會傷到寶兒，我去讓寶兒配合。」\n那老頭為了對隨家的忠誠，可以不顧自己孫子的性命，但一定不會無視俞寶兒的安危。\n要想撬開他的嘴，似乎只有藉助寶兒了。\n-\n當天下午，樊長玉便秘密回進奏院接俞寶兒，長寧一整天沒見到她，眼見她回來後只帶俞寶兒出門，不帶自己，當即就委屈得掉起了金豆子。\n樊長玉無奈，好說歹說也勸不住長寧，想著謝徵府上也是安全的，帶長寧同去應該也出不了什麼問題，知會趙大娘一聲後，便藉口帶兩個孩子出去玩，帶著他們出了進奏院。\n殊不知，正是這陰差陽錯之舉，讓兩個小孩都避開了一場禍事。：，，.`
        },

            num: 154,
            title: `第154章第154章`,
            content: `俞寶兒極懂事,樊長玉同他說做一場戲騙隨家那老管家招供，他當即就點頭表示願意配合。\n地牢陰森晦暗，樊長玉沒讓長寧也跟著去,吩咐謝七帶著她在府上玩一會兒。\n為了能震懾那老管家,謝徵命人給寶兒換了一身帶著血跡的破爛衣物,臉上也用易容塗料抹得蒼白灰敗，甚至還畫出了幾道能以假亂真的傷痕。\n他帶著寶兒再次出現在地牢時,老管家的情緒果然異常激動，兩手用力握著牢門，滿是皺紋的臉上露出極度痛苦的神色：「小公子……你們把小公子怎麼樣了？」\n俞寶兒帶著一身「傷」站在大牢外，眼神空洞又茫然,像是受了不少虐待的樣子。\n謝徵負手立於他身後，壁龕上的燈火照過來,他投下的影子將俞寶兒完全籠罩住，地牢光線暗沉，他衣襟上暗金的繡紋在燭光裡閃著微芒,精緻的眉眼異常冷漠：「剮你孫子的肉,你不在乎,不知刮眼前這孩子的肉，你嘴是不是還那般嚴實。」\n俞寶兒聽到這話，立馬配合地顫抖了起來，一雙漆黑又空洞的大眼裡有了恐懼的情緒。\n那老管家哭得順著牢門上的柱子跪了下去,哽咽到顫聲：「別動小公子,別動他,你們想問什麼，小老兒都招……」\n立於一旁的樊長玉和謝徵對視一眼後，問那老管家：「十七年前,常山將軍麾下懷化郎將魏祁林攜虎符前去崇州調兵，崇州為何沒出兵？」\n原本還痛哭不止的老管家在聽到這話後，哭聲忽而一頓，抬起那雙蒼老的眼打量樊長玉。\n樊長玉眉眼當即一厲：「回話！」\n謝十一也適時甩了一鞭出去：「大膽，誰給你的膽子直視將軍？」\n那一鞭子是收著力道的，能讓老管家吃疼卻又不會重傷了他，鞭子落到背上，當即刀割火燎一樣疼，老管家身形止不住地顫抖，低下頭去不敢再看，嘴上近乎本能地念叨道：「我不知道……什麼虎符什麼調兵，小老兒怎會知道……」\n樊長玉眉頭狠狠一皺，正要說話，卻聽謝徵道：「十一。」\n謝十一拎著俞寶兒便起身，去了牢房外邊的刑室，從老管家的角度，正好可以看到那幾條被關在瀝著暗紅髮黑血跡鐵籠裡的狼狗，俞寶兒發出一聲悽厲的慘叫後，一塊血淋淋的肉被扔進了鐵籠子裡，幾條狼狗立馬衝上前去瘋搶。\n老管家光是淚漣漣地看著，便止不住地乾嘔，他聲嘶力竭道：「別割了！別割了！我招，我全招！」\n謝徵冷冷看著螻蟻一般匍匐在地一邊哭一邊乾嘔的老者，慢條斯理道：「老東西，本侯能問你這些，你就該知道本侯已查到了不少東西，本侯問的，可不一定是本侯還沒查到的，你若膽敢欺瞞本侯一句，不僅隨家餘孽，你那孫子，本侯也一併活剮了餵狗！」\n老管家面色蠟白如紙，邊哭邊磕頭道：「小老兒不敢了，小老兒不敢了。」\n謝徵這才緩緩問：「那你說說，十七年前，崇州為何沒出兵？」\n老管家顫抖著乾裂沒多少血色的唇道：「懷化郎將魏祁林的確帶著虎符和魏嚴的親筆信來過崇州，但是王爺說那虎符是假的，王爺當著崇州眾將士的面合過兩塊虎符，壓根不能歸攏到一塊，王爺懷疑魏嚴居心不軌，要綁了魏祁林問罪魏嚴。」\n樊長玉和謝徵神色具是一變。\n這麼看來，當年的確是魏嚴心懷叵測，竟然連虎符都敢偽造。\n只是謝徵很快便道：「你撒謊，魏嚴命魏祁林拿與孟叔遠的常州虎符都是真的，崇州虎符何故是假的？」\n他冷冷吩咐：「十一。」\n刑房那邊很快又傳來利刃割肉聲，俞寶兒尖叫著喚「娘親」，又一塊血淋淋的肉被扔進了鐵籠子裡供狼狗搶食。\n作為俞淺淺替身的那對母子似乎也被帶過來觀刑了，那對母子也在歇斯底裡尖叫，一時間女人和孩童尖銳的哭聲都響徹在整個地牢裡，刺得人耳膜發疼。\n老管家急得在地上連連磕頭，很快便見了血，他悽厲道：「別割別割！小老兒說的都是實話，小老兒只是王府一介管家，不知道那般多啊。那魏祁林被生擒後，沒過多久便尋了個機會跑了，隨即便是錦州戰敗的消息傳來，緊跟著朝廷降罪與孟老將軍，將錦州之敗都怪在了運糧之失上……」\n老管家痛哭道：「王爺這才知魏祁林拿著虎符前來調兵，是真為了解錦州燃眉之急，可王爺事先並不確定孟老將軍真去了羅城啊，雖有魏嚴的親筆信，可連道聖旨也沒有，調兵的虎符又是假的，王爺哪敢妄動？\n錦州失守後，王爺也自責不已，趕緊率軍前去在錦州以下的城池設防，這才擋住了北厥大軍勢如破竹的勢頭。王爺是想等戰事稍穩後向京城請罪的，可不久之後，便傳來了東宮大火，太子和太子妃被燒死，王妃和大公子遇難，大公子還被燒毀了大半張臉……」\n老管家說到此處，愈發痛心，幾乎是字字泣血道：「太子死了，十六皇子也死了，東宮又突然起了大火，王爺如何還不明白，王妃和大公子這是在皇子爭位中被殃及了啊！\n若是真如魏嚴信中所言，先帝想保錦州，又想救十六皇子，才出此下策，讓孟老去羅城，讓王爺去運糧，為何要拿一枚假的虎符前來調兵？還是那枚虎符被有心之人換了，才讓王爺不敢發兵，造成了錦州的慘案？」\n樊長玉越聽越覺著手腳發涼，腦中也有些昏昏沉沉的，她問：「朝廷蓋棺論定將錦州戰敗的所有過失推與孟將軍時，長信王就沒想過將此事捅出去？」\n老管家淚眼渾濁道：「王爺那時還沒因抵禦北厥繼續南下有功被封王，雖拜了將，但拿什麼去跟設計這些一切的人鬥？若是魏祁林還在王爺手上，或許還有個人證，可以讓魏祁林指認魏嚴。但京城那邊直接否認了曾派人前來崇州調兵的事，就連孟老將軍去羅城，也被說成了是孟老將軍好大喜功才去攻打羅城的，什麼證據也沒有，王爺如何將真相大白於天下啊？」\n所以……\n崇州虎符是魏嚴換了的？\n他曾私通過后妃，又設計害死承德太子和十六皇子，就為了獨攬大權？\n魏嚴要追殺自己爹娘，是因為自己爹娘就是那個可以指控他一切罪行的證人？\n儘管早就猜測過各種真相，真正剖開的那一刻，樊長玉還是覺得腦子悶疼，一股冰冷的窒悶感席捲了她，讓她想大叫一聲發洩出來都感覺無力。\n樊長玉不自覺後退一步，謝徵握住了她的手腕，源源不斷的熱意從他掌心向她冰涼的腕口傳來，勉強讓樊長玉鎮定了些。\n壁龕上的油燈裡的燈油似快燃盡了，燈芯處的亮斑變成豆子大的一點，讓整個地牢愈發暗沉了下來。\n昏黃的燈光切出謝徵英挺的側臉輪廓，他一隻手握著樊長玉的手腕，長睫半垂，面上瞧不出一絲一毫的情緒起伏，平靜得叫人心頭莫名地發慌：「依你所言，長信王在崇州蟄伏多年終於造反，就是為了推到魏嚴？」\n老管家點頭：「王爺半身所願，的確只為如此。」\n謝徵繼續問：「當初那些說錦州慘案同魏嚴有關的流言，也是長信王放出去的？」\n老管家哽聲再應了一聲「是」，隨即繼續求饒道：「侯爺，您問小老兒的，小老兒都如實交代了，放過公子那唯一一點血脈吧……」\n謝徵緩緩抬起眼，眸色涼薄：「你說的這些，我姑且當做是真的，但云麾將軍先前同你說的那些，也半點不作假，在你們隨家韜光養晦了十七載的那位大公子，並非隨拓的長子，而是被金蟬脫殼的皇長孫。」\n老管家怔住，一張滿是滄桑的臉上除了茫然與驚愣，再無旁的情緒。\n謝徵不急不緩道：「隨家若真像你說的這般忠義無辜，當日參加東宮宮宴的達官顯貴何其多，太子妃為何要選隨家做皇長孫的庇護之地？皇長孫能眼都不眨地殺長信王妃和隨元青，似乎也半點沒念著隨家的好？」\n他視線不溫不火地落在老管家身上，沒有一絲殺意，卻讓老管家渾身抖若篩糠，涕泗橫流道：「您說的這些，小老兒真不知道了……」\n謝徵收回了目光，淡淡道：「且再好生想想，當年的事，遺忘了什麼，畢竟你誓死效忠的那位大公子，借著隨家這塊跳板給魏嚴做完局後，即將靠著李家去爭那把龍椅了。魏嚴倒了，自是皆大歡喜，可隋拓一家都被他算計死了，你自詡對隨家忠心，就不想報仇？」\n老管家已完全被這些消息弄懵了，他先前當真以為樊長玉說的那些事，是聯合趙詢來騙他的。\n此刻把自己知道的一切都招了，再聽謝徵這番話，蒼老的面上除了悽楚和萬念俱灰的茫然，竟再無其他情緒。\n謝徵沒放過老人面上絲毫的情緒變化，見他似乎真不知道了，才握著樊長玉的手腕緩步從地牢離去，老管家似乎此時才緩過神來，跪坐在牢房裡，嗚嗚痛哭。\n樊長玉面上亦格外沉重。\n牢房外就是刑室，俞寶兒和謝十一站在左右兩邊牢房的視線死角處，桌子上的託盤裡還擺著幾塊剛宰割下來血淋淋的碎豬肉。\n先前丟進對面關狼狗的籠子裡的肉塊，便是從託盤裡切下來的。\n俞寶兒只是配合悽厲慘叫，隔壁牢房關押的就是那對母子，她們跟老管家一樣，從牢房裡的視角只能看到那個關狼狗的籠子，聽見俞寶兒的慘叫聲，看到狼狗啃食那些血淋淋的肉塊，以為真是俞寶兒被活剮了，這才嚇得驚叫出聲。\n俞寶兒看到樊長玉了，本想迎上去，見她面色極不好，又立在了原地，只喚了聲：「長玉姑姑。」\n樊長玉勉強點了點頭，說：「辛苦寶兒了，你先出去找長寧玩吧。」\n俞寶兒不放心地看了樊長玉一眼，又看了看她身旁的謝徵，最終跟著謝十一離開了地牢。\n過了這麼久，樊長玉還是覺得心口悶得慌，刑房置有茶几和太師椅，樊長玉給自己倒了一杯冷茶灌下後，情緒稍微穩定了些，抬手要倒第二杯的時候，謝徵按住了她提茶壺的手。\n「長玉。」他嗓音很沉，按在她手背的大掌完完全全覆住了她的，似要給她什麼支撐：「難受就哭出來。」\n從聽到自己父親沒能搬去救兵的真相後到現在，樊長玉一直都還算鎮靜，只有臉色瞧著蒼白了幾分。\n她抬起頭看著謝徵，倔強的眼裡泛著幾絲紅意，但依舊沒哭，只對他道：「我外祖父，我爹，都是冤枉的。」\n從前她沒有證據，不能這般篤定又認真地同他說出這句話，現在可以了。\n她聲線繃得很緊，謝徵卻聽得心口莫名地刺疼了一下。\n他用力把她按進了懷中，「對不起。」\n對不起，明明你背負的不比我少，當初卻沒能等到真正的真相水落石出，就讓你獨自承受了那麼多。\n樊長玉用力逼退眼中的澀意，垂在身側的手緊緊握成了拳：「我會替我外祖父、我爹洗刷這十七年的冤屈。」\n從知道自己身世時起，她就沒有一刻不在想著這些，只是那時候她沒有任何證據。\n她在心地一遍又一遍地告訴自己，不管多難，都要一直沿著這條道走。\n現在有了鐵證，佐證了自己一直以來堅持的東西，離那個目標也一下子進了一大步，她才被各種情衝擊得難受。\n憑什麼？\n他魏嚴為了一己私慾，就給她外祖父蓋上了十七載的汙名！\n若是她不能替外祖父洗刷冤屈，那麼外祖父還會成為千古罪人！\n在千百年後，依然被後世人戳著脊梁骨罵。\n那是替大胤徵戰了大半輩子的忠骨啊！\n因為當年長信王沒敢把事情鬧大，魏嚴才睜隻眼閉隻眼，任她爹娘逃出去偷活了十六年。\n長信王一反，重提當年舊事，魏嚴怕自己父母站出來當那個證人，所以就不惜一切代價也要殺了她爹娘！\n樊長玉極少有控制不住情緒的時候，這一刻卻清楚地感受到自己心底翻湧的怨恨和憤怒，像是脫韁的野馬，順著血液湧進四肢百骸，在骨隙裡激蕩，讓她手上的骨節都捏得「咔嚓」作響。\n謝徵按在她後背的大掌力道半分不曾減輕，說：「這是你的仇，也是我的仇。」\n不是安慰，勝是安慰。\n樊長玉深吸一口氣，強行壓下心頭那些激烈湧動的情緒，抬眸問他：「你打算怎麼做？」\n恰在此時，謝十一帶著俞寶兒和長寧又匆匆進了地牢，神色罕見地慌張，瞧見相擁的二人後，也不及迴避，只趕緊垂下眼道：「主子，不好了，五軍營的人圍了謝府！」\n樊長玉在謝十一帶著兩個孩子進來時，便趕緊和謝徵拉開了距離，一聽此言卻半點抱赧也顧不上，只眉心狠狠一跳。\n膽敢公然圍謝府，若不是皇帝的意思，只怕是有人要反了，擔心謝徵壞事，這才先下手為強。\n她看向謝徵，謝徵卻並沒有多意外，道：「李太傅這狗急跳牆得太快了些。」\n他從容不迫吩咐謝十一：「你帶著兩個孩子先從密道出城。」\n隨即又看向樊長玉。\n樊長玉眉尾一揚，壓不住的英氣與剛烈：「我是戰場上廝殺出一身軍功的將軍，對面也是我的仇人，可別說什麼讓我一起躲起來的話。」\n她肆意張揚的樣子，比太陽都耀眼。\n一揚眉，一抬眸的模樣，都似鉤子一樣鉤在謝徵心坎兒上。\n他深深看了樊長玉一眼，只說：「跟我來。」：，，.`

            title: `第155章第155章`,
            content: `下雪的緣故,天也暗沉得比往日早些。\n謝徵帶著樊長玉進書房時，光線已有些昏暗了，掌了燈才看清裡邊的陳設。\n謝徵從書架上取出一份輿圖,在書案前鋪開了指與樊長玉看：「李家設計魏嚴不成,反中了魏嚴的圈套，為今之計,唯有掌控整個京城,推舉皇長孫繼位才能搏一線生機。午門的城臺不比京城城門低，李家若是強攻,一時半會兒攻不下來，但李家在京城經營多年，金吾衛中有沒有李家的內應難說。\n魏嚴既把李家逼到這一步，手上必定也準備了後招。只是我還在京中，未免我坐收漁利,李、魏兩家都會想盡一切辦法先拖我下水。」\n樊長玉聽謝徵分析著眼前局勢，越聽,撐在書案上的手便握得越緊。\n她抬起頭問：「所以李家先對你發難,命五軍營圍了謝府？」\n謝徵唇角輕扯,笑意不達眼底：「這才只是開場戲而已。」\n恰在此時,守在門外的親衛再次來報：「主子,外邊五軍營嚷著讓搜府，說昨夜有人看到大理寺的逃犯進了侯府。」\n樊長玉眼含擔憂地看向謝徵，謝徵只對外道：「那便轉告五軍營的人，有膽子破我謝府的大門,大可破門進來搜。」\n親衛領命退下後，樊長玉才道：「真留下了馬腳？」\n燭火於謝徵眼中跳躍，卻沒照出多少暖意：「魏嚴拖我下水的謀算罷了,前一次你我劫獄，叫李家認定是魏嚴劫走犯人時，想來魏嚴便已開始布局。昨夜血衣騎劫隨府那管家，撞破李家殺那改口的謀士，還得知了窩藏李家同齊旻來往書信的地點，有了這麼個把柄在我手中，李家勢談何坐得住？不論有沒有證人，他們都會找出個由頭圍府。」\n樊長玉也深知李家這是要一條道走到黑了，她心頭忽而一跳，道：「齊旻知道寶兒還在我們這裡，進奏院會不會也被圍了？」\n謝徵頷首：「以五軍營的兵力，圍一個進奏院，不在話下。」\n樊長玉當即皺眉：「唐將軍和趙大娘她們都還在進奏院……」\n謝徵抬眸看向她：「這便是我要你接下來去做的事。」\n樊長玉神色間頓時更多了幾分鄭重。\n謝徵修長的食指在輿圖上指出宮門的位置：「五軍營分五營七十二衛，兵力不下兩萬，其中四營或許會為李家所用，但左軍營主將沈慎同我交好，沈家亦是忠骨純臣，謝十三會持我的令牌前去找他，讓他阻魏嚴調神機營兵馬。不過還需要一個引開李家和魏嚴目光的餌，調遣血衣騎的令牌我早就給了你，屆時你帶府上所有血衣騎殺回進奏院，把唐培義他們帶出來。」\n樊長玉猛地一抬頭：「我帶走了所有血衣騎，你呢？」\n謝徵鳳目掃向飄雪的窗外，恣意又透著一股等待了這日多時的散漫：「他們不會信我把所有血衣騎都撥給了你，只會覺著我在京城還藏了人手。」\n說到此處，他淺提了下唇角，看向樊長玉道：「假亦真時真亦假，誰又敢為一個不確定的結果去豪賭？」\n樊長玉卻還是不放心：「縱使李家只有四大營的兵馬可用，那也是一萬五千餘人馬，你如何應對？」\n謝徵只道：「李、魏兩家都留著後手，不會把所有兵力都放到我這裡來搏命。退一萬步講，真到了拼個你死我活的時候，我帶進京的幾百謝家軍，也能讓他們脫下一層皮來。」\n樊長玉慢慢消化著他說的這些，忽而道：「為何是你的人去阻神機營的人馬，李家的人不去？」\n謝徵抬手淺淺碰了下樊長玉的臉頰：「金吾衛直屬小皇帝，魏嚴如今同小皇帝在同一條船上，金吾衛必定為他所用，外加三千營的精銳，他死守宮城短時間內尚且能同李家較個平局，但有了神機營的火炮器械，五軍營人數再多，最終也只是炮火下一堆殘肢碎肉。」\n他說到此處頓了頓：「我讓沈慎去，與其說是攔神機營，不若說是幾方人馬在搶神機營的兵械，明白了嗎？」\n樊長玉這才懂了這一步部署的重要性，她道：「那救出唐將軍後，我把京城現下還能用的人馬都暫交與唐將軍調遣，我親去一趟西苑，若是沈將軍沒能攔下神機營的人，我攔！」\n神機營的兵械都囤於宮城外的西苑。\n謝徵凝視了她好一會兒，樊長玉皺眉：「你不信我能攔下？」\n謝徵用力把人扣進懷中：「攔不住，就不攔了，活著回來見我。」\n樊長玉抬眸：「這可不是你該交代一個將軍的話。」\n謝徵微微低頭，碎發在他眼瞼處覆下一層淡淡的陰影，遮住了深邃疏冷的眸子裡藏著的那份柔軟：「你是千萬人的將軍，也是我的夫人，我交代的，是我的夫人。」\n饒是知曉當下形勢緊急，樊長玉聽到他這句話，心跳還是漏了一拍，她抿唇緊緊盯了他一眼。\n她說：「我走了。」\n都走到門口了，突然又折回身來，幾步上前一把用力拽住他衣領，把人拉低，在他唇上重重親了一下，才垂下扇子似的長睫悶聲道：「你要做的事，我知道的。」\n言罷便拉開房門大步離去。\n謝徵立在原地，看著她大步走遠的背影，漆黑的眸底醞釀著深沉晦暗的情緒：「她若有半分閃失，你們便也不必回來了。」\n屋中似有暗影飛速離去。\n-\n有以一當百的血衣騎開道，圍在謝府門前的五軍營分支人馬壓根不足為懼，樊長玉帶著人很快撕開一道口子，駕馬直奔進奏院而去。\n正值新年，沿街的商鋪大多都緊閉著，不知是回家過年去了，還是今日官兵來往的聲勢太過浩大，嚇得商戶們也都關鋪子了，沿街尋常百姓家更是門戶緊閉。\n因著有她們這麼個移動的大型目標，圍在謝府的五軍營官兵都分出一部分前來追他們，駕馬往反方向跑的斥候成功被忽視了去。\n-\n進奏院大門早已被撞開，主將把著腰間的佩劍立在院中，粗聲喝道：「給我搜！但凡發現男童，格殺勿論！」\n唐培義和賀修筠等一幹將領聞聲出來，見闖進來的是五軍營的人，沒敢貿然與之硬碰，唐培義抱拳道：「敢問這位將軍，突然發兵進奏院，所為何事？」\n那將領官階本低了唐培義好幾級，此刻卻只冷笑道：「三司會審查案，查到先前大理寺丟失的反賊母子，被窩藏在了進奏院，本將軍奉命前來搜查。」\n唐培義性情直率，見此人輕蔑之態，面上已有慍色，賀修筠心細如髮，當即道：「既是奉命搜查，還望將軍出示搜查令，免得誤會，傷了和氣。」\n那將領拿不出搜查令，只道：「待拿到了人證，爾等去大理寺看搜查令吧！」\n賀修筠同唐培義和鄭文常交換了個眼神，眼底皆一片瞭然。\n賀修筠和氣笑了笑：「將軍這話說的，我等自受召進京以來，除卻陛下傳喚，就沒離開過這進奏院，大理寺丟失的人犯怎會藏在這裡？其中必然有什麼誤會，天冷風寒，讓底下人去搜便是，將軍不若同我等進屋烤烤火，喝杯茶驅寒。」\n他說著就要上前去扶那將領的手肘。\n那將領眼神微閃，正要推拒，卻不防賀修筠突然發難，攥住他胳膊的那隻手往後一扭，再往那將領腳下一絆，那將領當即被他反剪住手跌跪了下去。\n鄭文常也極默契地拔出腰間的佩劍抵住了他咽喉，對著左右試圖上前的官兵喝道：「退後！」\n那將領意識到自己大意了，咬牙看著唐培義道：「爾等讓我找到人了帶走，大家相安無事，若是執意要淌這趟渾水，可就沒這麼好脫身了。」\n唐培義盯著他看了半晌，只說：「綁了！」\n當即就有親衛拿著繩索上前，將人綁得嚴嚴實實的。\n唐培義、賀修筠、鄭文常三人住在一塊，他們這裡有沒有窩藏男童，唐培義自是再清楚不過，樊長玉是女將，另住一處院落。唐培義不確定樊長玉是真暗中劫過獄，還是這夥官兵隨便尋了個由頭意圖抓俞寶兒。\n幾人劫持著那將領，一路往樊長玉所在的院落去，原本四處翻找的官兵們忌憚主將被擒，也都不敢再有動作，只拿兵刃對著唐培義一行人，意圖伺機而動。\n到了樊長玉所住的院落，便見謝五單手持刀，將一對老夫妻護在了身後。\n他只有一隻手能動兵刃，還要護著兩個年邁老人，明顯落於下方，身上都見了紅，院中幾間廂房的門也都大開著，似已被官兵闖進去翻找過。\n唐培義當即大喝了聲：「住手！」\n正圍著謝五的官兵們一見主將被擒，兩相對視一眼，紛紛緩和了攻勢。\n唐培義給了賀修筠一個眼神，賀修筠當即帶了兩名親兵上前去扶趙家二老，賀修筠親自扶住謝五，壓低嗓音問了句：「小公子呢？」\n謝五答：「被將軍秘密帶走了。」\n得到這個答案，賀修筠不由鬆了一口氣，他轉身質問那五軍營的將領：「我等是奉皇命暫住這進奏院，爾等無令搜查，我倒要瞧瞧，告去了大理寺，究竟是誰佔理！」\n那主將仍是一口咬定：「從大理寺劫走的反賊之子就藏在進奏院，你們窩藏反賊，難不成也有了反心？」\n唐培義臉色已相當難看了。\n賀修筠朝著他不動聲色一點頭後，唐培義心知俞寶兒已不在此處，當即拍了拍那被五花大綁的將領的臉，冷笑道：「那便讓你的人搜吧，若是什麼都沒搜出來，你便留下一手一腳在這裡。」\n那將領一聽這話，四下看了一眼，沒見著樊長玉，大喊道：「反賊餘孽已被雲麾將軍帶走了是不是？」\n恰在此時，進奏院外又響起了急促凌亂的馬蹄聲，緊隨而來的還有兵戈相交之聲。\n唐培義等人挾持著那將領往前院去，剛過垂花門，便見大門處一名官兵被一腳踹得橫飛下石階，撞在花壇處吐出一口血來。\n樊長玉一身勁裝，背負長刀殺進來，見唐培義他們劫持了這隊官兵的主將，才淺淺鬆了口氣，喚道：「唐將軍！」\n唐培義透過大門瞧見了外邊同官兵廝殺做一片的血衣騎，忙問：「長玉侄女，這是怎麼回事？」\n樊長玉反手劈開一名意圖偷襲的官兵，言簡意賅道：「李家要反了！」\n唐培義和賀修筠幾人聞言皆變了臉色。\n樊長玉來不及拭臉上沾到的血沫子，快步上前，看著唐培義道：「這大胤要變天了，且看唐將軍作何打算。」\n唐培義粗狂的臉上難得有了凝重之色，約莫過了一息才看向樊長玉：「侯爺作何打算？」\n樊長玉額角在交戰時擦傷了一塊，血珠子從她額角滑至下顎，她眼神冷冽又堅定：「龍椅上的那位，是個無德昏君，李家要扶持的那位，雖為承德太子後人，卻曾以長信王長子的身份在隨家生活了十七載，李家為設計魏嚴，與之勾結的，便是他。盧城被圍，賀大人之死，皆是因此而起，此人若登大寶，絕非善類。」\n唐培義幾人直至今日，才知曉這番隱情，怔愣過後，臉上都浮起了怒意。\n當初做空崇州城，改圍盧城的那條毒計，便是李家和皇長孫想出來的？\n唐培義看向樊長玉：「你一直帶在身邊的那孩子，不是承德太子的後人嗎？」\n樊長玉道：「那孩子便是皇長孫之子。」\n賀修筠看了一眼被自己劫持的五軍營將領，溫文爾雅的面上浮起一絲冷笑：「所以五軍營的人突然圍了進奏院，是因為皇長孫下了令，要殺那個孩子？」\n樊長玉凝重點頭。\n唐培義還沒表態，但有著父親的死在前，賀修筠對皇長孫可以說恨之入骨，他率先站向了樊長玉：「我隨侯爺擁立皇重孫！」\n唐培義看向賀修筠。\n賀修筠是幾個年輕人中年歲最大，也最為穩重的，他朝著唐培義一拱手，道：\n「末將此舉並非是因家父之死意氣用事，皇長孫既爭這天下，卻無一顆體恤萬民之心，他同李家一樣，妄圖用萬千將士的性命，給魏嚴堆出來一個大罪，於公，無天子之仁德。於私，為爭皇位，連自己的獨子都能下殺心，豺狼尚狠毒不至此，大胤的江山交到這樣的人手中，又同被魏嚴把持朝政時有何異？我等將來又有何顏面面對盧城城外戰死的那些將士？」\n鄭文常當即也站到了樊長玉那邊去，隨即又有三三兩兩跟著入京的薊州將領站了過去。\n盧城一戰的慘烈，終究是這些薊州將軍們心中的一根大刺。\n唐培義深深嘆了口氣，看向樊長玉道：「我不知今日之決斷將來會不會後悔，但不論是魏嚴扶持的那位，還是李家要擁護的那人，都配不上那把龍椅。今日之舉，不管是成是敗，我唐培義，都跟著侯爺替大胤換這天了！」\n直至唐培義都點了頭，樊長玉才感覺心底一下子踏實了下去。\n有唐培義相助，謝徵今夜要穩住京城，就又多了三成的勝算！\n-\n進奏院外，血衣騎還在同五軍營的官兵廝殺，一顆血淋淋的頭顱從進奏院大門口拋了出去，落在地磚上滾了數圈才停下。\n樊長玉手中陌刀還往下滴著鮮血，憧憧燈火下，她眼底透著下山猛虎一樣的兇性，冷颯的嗓音撕破寒夜喧囂：「右掖軍僉事周通已死，爾等若歸降，今夜之罪，可既往不咎！」\n駐京的五軍營大軍，細分中軍、左、右掖軍、左、右哨軍五營，其中以中軍營人數最多。\n原本還混戰做一片的兵卒們瞧著那顆血淋淋的頭顱，紛紛停了下來。\n唐培義隨即道：「本將軍即將協助武安侯捉拿謀逆者，若不歸降，凡今夜圍進奏院者，皆以謀逆罪論處。」\n前來圍進奏院的這支右掖軍沒了領頭的主將，再聽這番恐嚇之言，頓時心中惶惶，左顧右盼一番後，紛紛放下了手中兵刃。\n眼見進奏院這邊局勢已穩定，樊長玉當即看向唐培義：「唐將軍，這邊就交與您了。」\n唐培義問：「你不隨我們一道前去皇宮？」\n樊長玉翻上馬背，冷風撩起她額間因方才的打鬥散落下來的碎發：「我去阻神機營支援宮城。」\n只一句話，唐培義便明白了樊長玉的用意。\n他道：「那你再帶些人手過去！」\n他說著又點了幾人給樊長玉，鄭文常也在其中。\n樊長玉沒推辭，只在馬背上朝著唐培義一抱拳道：「多謝將軍！」\n樊長玉帶著鄭文常等人和血衣騎駕馬往西苑去。\n唐培義看著她們走遠後，對著歸順的右掖軍喝道：「爾等隨我前去『救駕』！」\n-\n暮色漸濃，風雪漸大，掛在廊下的燈籠罩子上都積了淺淺一層薄雪。\n簷下昏黃的燈光將搖曳的竹影映在了亮著燈燭的廂房門窗上，隱約也可見屋內兩道各坐矮几一側對弈的模糊人影。\n一道乾瘦卻飄然，稀疏的發在腦後紮成小髻用長簪束起，時不時用手捋一把下顎前同樣稀疏的幾根長髯。\n另一道人影筋骨強勁，坐於蒲團上腰背亦筆挺如松柏，落子間乾脆有殺伐之氣。\n兩人都似山嶽，不過一人是高山流水般的清雋寧和，一人則是嵩嶽般的巍峨壯闊。\n蒼老乾瘦的食指和中指又捏著一枚白子在棋盤上落下時，陶太傅看著對面的人，似嘆非嘆一聲：「以圭，這棋，你走進死局了。」\n圭，玉制禮器也。以圭，乃魏嚴的字。\n如今放眼整個朝野，也只有對面那滿面滄桑的老者敢喚他這字了。\n屋外風大，吹得竹影婆娑，魏嚴將手上的黑子放回了棋簍，只說：「未必，興許待天明，便有破局之法了。」：，，.`

            content: `唐培義帶著人趕到謝府時,就見謝府前院一座不知什麼樓燒了起來，火光沖天，門前鋪地的青磚已被鮮血染紅,那血色還在蜿蜒著流向更遠。\n夜空飄落的鵝毛大雪落進這滿地猩紅,頃刻間便融化了去。\n遍地橫屍倒伏，謝徵單手持戟立於其中,身上的玄甲早已被鮮血染成了暗紅色,鐫刻著古樸窮奇獸紋的戟刀上也往下瀝著血珠，他微低著頭叫人看不清他這一刻的神情,只餘火光照出冷白的半截下顎，囂塵乖戾。\n他身後還立著同樣經歷一場屠.戮後殺氣沉沉的數百名近衛,於夜色中晃眼一看，恍若鬼神。\n饒是唐培義等人，坐在馬背上瞧見此景,不免也淺淺吸了一口涼氣。\n那血慢慢地吞噬積雪，朝著街口繼續往外蔓延至馬蹄下時，馬兒似乎也被那煞氣所震懾,抬蹄後退了一步。\n謝徵這才抬眸冷冷地朝唐培義掃來。\n唐培義在馬背上朝著他一抱拳：「侯爺。」\n只喚了這一聲，卻不知再說什麼。\n觀這謝府門前的屍體，圍府的少說也是中軍營五個衛所的兵力，架在不遠處的還有一炮筒，竟是連火器都帶來了，卻又都死於謝家這幾百護衛手中。\n不是說武安侯麾下只有八百血衣騎麼？樊長玉已帶走了七八百人,這些又是什麼？\n唐培義震驚到無以復加。\n灼灼火光映出馬背上眾人各異的神情。\n謝徵抬腳踹開倒伏在自己腳邊的一具屍體，沾著血跡的臉上是一種近乎冷漠的平靜：「只帶兩千人馬，就敢炮轟我謝家的大門。」\n他嗤了聲：「果真是活膩了。」\n五軍營七十二衛中每一個衛所兵力不盡相同，但中軍營獨佔八千人,李家分出中軍營四分之一的兵力來圍謝府，顯然還是對謝徵忌憚有加，只是他們仍小看了謝徵。\n大街另一端又傳來了凌亂的馬蹄聲，火把交織如龍。\n同謝徵剛浴血廝殺了一場的謝家軍精銳們同唐培義帶來的人一齊側目望去，對面馬背上是個面生的將領，但觀其盔甲服飾，乃三千營的人。\n謝徵冷眼瞧著，面上的神情仍淡漠得出奇，只把手中長戟交與身後近衛，另提了一把弓.弩瞄準，散漫道：「想坐收漁利的人來了。」\n-\n風雪肆虐，不知從何處卷了祭祖的紙錢在空曠大街上飛舞，這原本熱鬧的新年之夜，也多了幾分森然。\n午門外燈明火炙，黑壓壓的軍隊在東西雁翅樓夾著的官場上排開，前排以厚盾覆於頭頂抵擋著雁翅樓上弓.弩手放出的箭矢，京中沒有撞城門用的攻城錘，底下兵卒抬起了廣場上千斤重的大鼎一下一下地撞擊著宮城大門。\n軍陣後方，一身仙鶴紋官袍的李太傅看著前方湧動如潮水的軍隊，同身側披著大氅面色蒼白、神情陰鬱的男子道：「金吾衛中有咱們的人，這宮門，再過一炷香便能破開了。」\n齊旻臉上帶著明顯的病氣，疲懶一掀眸子：「武安侯那邊沒動靜？」\n李太傅看了他一眼，對於他這似在質疑李家部署的言論，面上依舊不顯山不露水，「老夫已策反了五軍營四營人馬，武安侯此番進京並未帶軍隊，身邊那八百親騎，也被孟氏女帶走，縱使他謝徵用兵如神，無兵可用了，又能掀起什麼波瀾？」\n齊旻神色緩和了些。\n李太傅淡笑了起來：「欽天監那邊也放出風聲去了，這些年旱澇不斷，都是龍脈逆亂、繼位不正所致。百姓早就對魏嚴把持朝政怨聲載道，承德太子在民間的聲望不減當年，殿下乃承德太子之後，繼位才是民心所向、群臣所願。」\n齊旻沒說話，但眸底映著遠處燈火通明的雁翅樓。\n夜色濃稠，壓得點著新年大紅燈籠的皇城都矮了，匍匐得好像是要臣服在他腳下一般。\n十七年，他終於又回到了這個地方。\n齊旻摩挲著自己拇指上的翡翠扳指，神色極淡，但這一刻一切都盡在他手中的那種感覺，澆得野心如那殿宇間燃燒的火把一般，在這權利巔峰之地肆意膨脹。\n天地玄黃，宇宙洪荒……\n日升月落似乎都沒那麼重要了，他即將成為這天下的皇。\n宮門不堪重荷，終究是在大鼎的重撞之下破開了，五軍營的人馬嘶吼著殺進了宮城，狹長的宮牆甬道間迸濺出一抔抔血色。\n齊旻隨著李太傅進宮城時，看著倒伏在地的那些金吾衛的屍首，淺皺了下眉，語氣聽不出是嘲是問：「魏嚴把持朝政十餘載，只有這般手段？」\n進宮後率先去太乾宮抓小皇帝的將領已匆匆趕了回來：「太傅！太乾宮沒人！」\n齊旻和李太傅眸色皆是一變。\n李太傅厲聲喝道：「那便搜查整個皇宮，把人找出來！」\n那將領雖領命下去了，李太傅和齊旻一顆心卻再也落不回原處。\n宮城防守不嚴，是故意引他們入甕的？\n似要驗證他們所想，宮門外又傳來了兵甲之聲，二人登上雁翅樓一看，便見午門廣場上立了近兩千騎兵，個個身著全甲，非普通五軍營軍士可比。\n一身姿筆挺蒼勁的老者自騎兵陣中緩步走來，鷹目掃向城樓上的齊、李二人：「李陘意圖謀反，此等亂臣賊子，盡數捉拿歸案。」\n李太傅面色雖難看，卻也還算沉靜，當即衝著威嚴喊話道：「魏老匹夫，你莫不是以為，憑著你三千營那點人馬，就能制住五軍營？」\n威嚴道：「自是制不住的，只是李太傅不曾掌兵，不知兵法中有一計名為『兵不厭詐』。」\n李太傅正不解他話中之意，便見宮城下方的魏嚴做了個手勢，城樓上原本將箭矢都對準下方的弓.弩手，瞬間調轉箭頭，齊刷刷瞄準了李太傅和齊旻一干人。\n二人的護衛忙拔劍緊盯著那些弓.弩手，但箭矢無眼，這局勢反轉又來得太快，那些護衛面上也有驚惶之色。\n歸順他的四營中，竟有兩營都是魏嚴的人！其餘兩營人馬同李家護衛們面面相覷。\n李太傅及不甘心地咬牙盯著魏嚴：「這兩營都是你的人？什麼時候的事？」\n魏嚴負手立於軍陣之前，冷風裹出他堅實挺拔的身軀：「李太傅不妨問問自己，連自己嫡孫都保不住，又有何能力讓外人信服。」\n李太傅下頜繃緊，縱使再要強，此刻臉色不免也蒼白了幾分。\n一直沒作聲的齊旻卻忽而撫掌笑道：「說得好，就是不知丞相妻兒被擒了，還能不能讓眾將士信服於你了。」\n魏嚴抬眸冷冷朝齊旻看去，齊旻被萬千箭矢指著，面上也沒有絲毫懼色，嘴角反而饒有興致地勾起。\n騎兵陣外傳來騷動，魏府的人快馬前來報信：「丞相，魏府被襲，夫人和公子都被劫走了！」\n報信的人胳膊上還泅著血跡，顯然是剛經歷了一場惡戰。\n魏嚴再次看向齊旻，兩人早已交手過，魏嚴自然知曉齊旻手中有一支承德太子留下來的皇家影衛，都是早些年受過承德太子恩惠的死士，武藝奇高，只聽從齊旻調遣。\n他養出的天字號死士，就有不少折在了那些影衛手中。\n齊旻身邊沒見幾個人，原是指使他們去魏府了。\n李太傅聞言大喜過望，當即對著魏嚴叫罵道：「魏嚴，且看你還要不要你那妻兒了，你若狠得下這個心舍了獨子，往後同個閹人一般弄權，百年後寫進史書裡，倒也可供後人玩笑一樂。」\n魏嚴還沒做聲，冷風裡倒是又傳來一道散漫而冷冽的嗓音：「今夜的宮城，真是……好生熱鬧。」\n在場人都朝軍陣最後方看去，魏嚴的騎兵陣後列幾乎是瞬間就變幻了陣型，以長矛對準了前方不急不緩走來的一隊人馬。\n謝徵玄甲披血，帶著當日京城的幾百謝家軍精銳和唐培義等人，閒庭漫步般走向了午門外的官場。\n齊旻在魏嚴帶著三千營出現在宮城外時，面色都還算鎮靜，此刻瞧見謝徵，臉色才完全陰沉下來了。\n他看向李太傅：「不是說，把人困在了謝府嗎？」\n李太傅注意到了唐培義和薊州那批人馬，惱道：「定是唐培義帶人前去解了圍，小瞧這些武夫了！」\n也是夜色太深，他瞧不清謝徵和他身後那幾百精銳身上的戰甲似在血水裡泡過，才敢做出這番論斷。\n眼見齊旻臉色過於陰沉，他很快又道：「皇重孫在謝徵手上，他約莫是想趁今夜之亂學十七年前的魏嚴，扶那稚子繼位，鹿死誰手，還未可知呢！」\n齊旻眸色晦暗，不知在想些什麼，忽而對謝徵喊話道：「武安侯既也湊了今夜這個熱鬧，不若同孤聯手如何？」\n謝徵沒立即答話，他繼續道：「十七年前，孤的父王同謝將軍戰死錦州，這仇，不止孤一人想報吧？」\n謝徵散漫一抬眸，「殿下似知曉當年錦州一戰背後的真相？」\n齊旻大笑出聲：「孤如何不知？」\n他說著手指魏嚴：「錦州失陷，城民被屠，割地遼東十二郡賠與蠻族，不過都是他魏嚴欲染指這大胤江山一手設計的！」\n此言一出，整個宮城死寂一片。\n在場的絕大多數都對當年的錦州真相一無所知，像李太傅這等一知半解的，驟然聽到齊旻這篤定的語氣，眼皮也是狠狠一跳。\n錦州失陷後給整個大胤帶來的蕭條，足足用了十幾載的光陰才緩過來，若這一切當真是魏嚴設計的，那可真是死一萬次都死有餘辜。\n積壓在胸腔十幾年的恨意終於有了發洩之地，齊旻眼尾都染上一絲猩紅，他嗤笑著看向魏嚴：「十七年前你血洗了一場皇宮，便以為沒人再知曉你淫.亂宮廷的那些事了麼！」\n魏嚴面上依舊不為所動，眼神卻徹底肅冷了下來，截斷齊旻的話，沉聲下令：「攻城。」：，，.`
