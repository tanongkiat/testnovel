            num: 52,
            title: `第52章第52章`,
            content: `熄了燈的屋內漆黑一片,樊長玉躺在床裡幾乎貼著牆壁，她虛著眼瞟了一眼躺在邊上的人。\n嗯，謝徵就差睡床弦上了。\n她兩眼一閉,也懶得管他睡得舒不舒服,她都已經再三聲明自己不會對他有非分之想了,給他也留了足夠的位置,他上了床卻一言不發，依然選擇沾個邊睡。\n這副避之不及的樣子,不活脫脫怕自己貪圖他美色嗎？\n樊長玉側過身子面朝牆壁睡，心說就他這身臭脾氣,就是長成個仙男她也不稀罕！\n「仙男」謝徵正閉眼假寐,躺在裡邊的人突然一側身,他本就只搭了個邊的被角瞬間全被捲走了。\n夜色裡的寒意透過單薄的衣襟直往皮膚下鑽，謝徵掀開眼皮，朝裡看了看,樊長玉的身形在厚被下隆起一個不大的輪廓，大半被子全都鋪在床鋪中間。\n要想蓋到被子，就得往裡稍微挪動些,但那必然會驚動樊長玉。\n她的呼吸聲很淺，顯然還沒睡著。\n謝徵收回視線，重新合上了眼。\n有一年他領兵出塞,遇上雪崩,被埋在雪下三天都熬了過來，這點寒意他還沒放在眼裡。\n兩人中間隔了至少三尺遠,但大概因為底下躺的這東西是床,所以心下總是不自在的。\n同胞兄妹曉事後尚不可同房而居,何況是毫無血緣關係的男女。\n世間能這般同床共枕的,唯有夫妻。\n而此刻在他臥榻之側酣睡的，便是這女子。\n謝徵被這些亂糟糟的想法攪得半點睡意也無，聽到身側樊長玉呼吸綿長時，他沒來由生出一股氣悶，索性半坐起來，靠在床頭思索眼下的局勢。\n樊長玉睡得久了，也換了個平躺的姿勢。\n謝徵聽到動靜，眸光淡淡掃了過去。\n她當真是生了一副極具欺騙性的面孔，這張臉睡著了看，怎麼都是溫良無害的。\n偏偏她使壞時，也是一臉老實巴交的神色。\n隨元青……就是被她這副樣子給騙過去的吧？\n想到這個人，謝徵眸色便冷沉了幾分。\n說不上是個什麼滋味，他以為只有他看上的一株野地裡的花草，竟有旁人也在覬覦著。\n心口的地方似叫人用火燭燎了一下，不疼，但燒得慌。\n他一瞬不瞬盯著睡夢中的樊長玉，眸色隱匿在暗夜中，愈發叫人瞧不清。\n樊長玉許是在睡夢中察覺到了他的目光，不滿嘀咕一聲：「不稀罕……」\n謝徵沒聽清，皺了皺眉，問：「什麼？」\n樊長玉含糊回了句，連個字音都聽不清，謝徵只得附耳過去細聽。\n他身上的寒意讓樊長玉在睡夢中也躲了躲，翻身時唇淺淺擦過他耳際，謝徵整個人都僵了一下。\n有人靠得太近了，陌生的氣息裹著她，經歷了這麼多事，樊長玉還是有些警覺，眼睫顫了顫就要醒來，謝徵微涼的手指在她頸側的穴位一點，她眼皮沒來得及睜開又沉沉睡了過去。\n謝徵起身，燭火都沒點，借著屋外雪色映進屋裡的微光，去桌前倒了兩杯冷茶喝下。\n他喝完茶，也不再去床上睡，只坐在桌邊，擰著眉頭，黑眸一瞬不瞬地盯著床上那團隆起的弧度，似在思索著什麼。\n夜空裡似乎隱隱有鷹唳聲傳來。\n他撩開眼皮，幾乎沒弄出什麼動靜出了房，翻出王家的院子，走到遠一些的街巷後，才把指節放到唇邊吹出一道尖銳的哨音。\n海東青送信若是尋不到人，便會在空中一邊盤旋一邊唳叫，聽到哨音了，才會循著聲音俯衝下來。\n不消片刻，一隻純白的海東青便從夜裡中掠了過來，謝徵伸出右臂，海東青鐵鉤一樣的爪子穩穩抓在他臂膀上，扇了扇翅膀穩定身形後便合攏了雙翼。\n謝徵取出海東青腳上的信件，借著月色看完後，信紙在他指尖化作了一片碎屑。\n-\n薊州府衙此夜亦是燈火未熄。\n鄭文常從大牢出來，將審訊出來的供詞呈給賀敬元時，垂首道：「確如大人所言，是長信王的人截殺了咱們的人，假扮徵糧軍官前去清平縣徵糧，馬家村那幾十口人也是反賊的手筆。下官猜想，泰州鬧出的徵糧打死人的事，只怕也和崇州反賊脫不了干係。」\n賀敬元負手望著簷下一排暖黃的燈籠和飄飛的大雪，答非所問：「文常，你說，那二十萬石糧食，經了趙姓商人之手，會送往何地？」\n鄭文常不知自己的上司兼老師為何又突然問起糧食的事，如實道：「下官一開始猜測的是商人逐利，但泰、薊兩州徵糧，也不見那商人高價出售那二十萬石糧食。依如今的情況看來，倒也像是反賊從中作梗，下官以為，只要查抄那趙姓商人，必能查出幾個反賊的據點。」\n賀敬元搖頭：「你太輕敵了些，明日且瞧瞧，整個薊州府還能找到多少趙家的產業。」\n鄭文常羞愧低下頭：「下官若能早些察覺，抄了趙姓商人的家，便不會鬧出清平縣這樣大的事了。」\n賀敬元說：「不怪你，反賊能鑽這個空子，有老夫之責，若非老夫上了反賊的當，一心想逼出那買糧之人，放任魏宣強行徵糧，反賊放再多耳目在薊州，也掀不起大浪來。」\n鄭文常沒懂他話中的意思，不解道：「大人怎能把過錯都往自己身上攬，下官瞧著，一開始買糧就是反賊設下的套，魏宣好大喜功，他仗著身為西北節度使，奪了大人的官印，也不是大人能左右的事。」\n賀敬元長嘆一口氣，並不言語。\n他這個門生什麼都好，就是為人太過正直死板，看到什麼，便信什麼。\n許多事，他終是不能說的太明白。\n若非那趙姓商人故意留了尾巴，讓他猜到那二十萬石糧是武安侯買的，他又豈會誤以為武安侯買糧只是為了給魏徵使絆子。\n上位者的鬥爭，苦的永遠是底層的百姓。\n他放任魏宣徵糧，是想讓武安侯看清他為了一己私仇底層百姓付出的是什麼，也想知道武安侯是不是那等為達目的不折手段之輩。\n正是他的這一放權，才給了反賊可乘之機。\n百姓被逼到了這份上，是武安侯不得已「現身」，讓燕州舊部送來調軍令，調走魏宣，停止徵糧。\n他居於幕後，不管出於何種目的，終究是做了反賊這計劃裡的推手。\n今日前往青州，見到那力挽狂瀾的青鬼面具人時，賀敬元忽而想到一個問題。\n若是他一開始就猜錯了，武安侯並沒有打算拿泰、薊兩州的百姓作為扳倒魏宣的籌碼，那他徵那二十萬石糧是為何？\n他長閉了許久的一雙眼倏地睜開，道：「錦州！」\n鄭文常不明所以：「大人，錦州怎了？」\n賀敬元快步走回書案前，取出西北輿圖鋪開，指著錦州，神色罕見地凝重：「長信王於崇州造反，西北內亂，武安侯又戰死，這對關外的北厥人意味著什麼？」\n鄭文常想通其中利害關係，只覺頭皮都快炸開了，他道：「此乃進攻大胤的最好時機。」\n賀敬元負手在案前來回踱步：「錦州乃大胤門戶，其後才是徽、燕兩州，呈三角之勢穩著大胤門庭，但糧草補給都得朝廷下撥。崇州一反，阻斷了糧道，徽州尚無糧，錦州又哪來的糧食？是老夫糊塗了！那被買走的二十萬石糧哪裡是為了設計魏宣，這是替錦州未雨綢繆啊！」\n鄭文常聽賀敬元這麼一說，也是大驚，再結合他前邊的話，總算是弄清了其中關鍵，「您的意思是，那二十萬石糧，是侯爺買的？侯爺當時在崇州戰場戰敗，就想到了錦州日後要面臨的險境？」\n賀敬元緩緩點頭。\n鄭文常道：「侯爺高瞻遠矚，非我等能及也，如今反賊的奸計破除，徽州固守，錦州有糧，當是喜事，大人又何故愁眉不展？」\n賀敬元嘆道：「若是外憂內患疊一塊去了，此局又怎破？」\n這話讓鄭文常也陷入了兩難。\n還有些話賀敬元沒說。\n魏嚴那邊必是留不得武安侯的，上一次他能在崇州戰場上做手腳，這次要是北厥人和崇州反賊腹背夾擊武安侯，朝廷又刻意卡軍糧，他真擔心十七年前的錦州慘案重演。\n賀敬元負手站了好一陣，才對鄭文常道：「繼續封鎖清平縣，力圖把反賊的耳目拔乾淨。漕運的河道冬季枯水，也正是清理泥沙的好時節，文常，清平縣的事解決了，你便帶人去把薊州到崇州的河道疏通。」\n若是走水路，多少東西都能運送。\n鄭文常心頭一跳，領命退下了。\n書房內僅剩賀敬元一人了，耳房的門才叫人推開，一鶴髮雞皮的老者走出來道：「你說，那姓魏的若是知曉你如此陽奉陰違，你還有多少日子的活頭？」\n賀敬元只道：「在其位，謀其政；任其職，盡其責。賀某無愧於天下百姓，足矣。」\n老者搖頭失笑，道：「老頭子下回來找你吃酒下棋時，且盼你還活著罷。」\n賀敬元說：「隨時恭候太傅大駕，不知太傅接下來打算去何處？」\n老者衣衫襤褸，滿頭白髮用根木簪邋裡邋遢束著，腰間掛著個酒葫蘆，伸了個懶腰道：「長信王小兒隔三差五又派人來草廬擾我清淨，煩得緊，老頭子先四處走走看看。」\n賀敬元垂下眼皮道：「我還當太傅是聽聞侯爺戰死沙場，這才出山的。」\n老者嗤了聲：「老頭子沒多少本事，但這輩子也只教了這麼一個徒弟，這世上能要了他命的那人，還沒出生呢，不然他就得多個師弟了。」\n賀敬元聽著老者的話，但笑不語。\n陶太傅辭官歸隱多年，長信王造反後多番派人去尋他，說是想請他當幕僚，實則是想請他教導膝下二子。\n這老頭最後那句話，便是言再收徒，只會收資質勝過武安侯的。\n想來是長信王那兩個兒子，未曾入他眼。\n賀敬元明知故問：「崇州一戰後，長信王世子素有小武安侯之名，太傅也沒瞧上？」\n陶太傅面色不善道：「那臭小子十歲那年，我教他的一冊棋譜，都能落到長信王么子手上，你說長信王打的什麼主意？」\n賀敬元面色沉了幾分，小武安侯，長信王這是在把么子照著武安侯教養？\n-\n清平縣。\n雞鳴聲叫第一遍的時候，樊長玉就醒了。\n天才剛蒙蒙亮，她迷迷糊糊翻了個身，滾到另一側後驚覺床榻涼得驚人，一下子被凍醒了。\n樊長玉頂著一頭睡亂的頭髮爬坐起來，想起昨夜明明是和言正一起睡的床，抬眼朝著桌旁看去，不出意料地瞧見言正撐著頭在桌旁睡著了。\n依著床榻這一側的溫度，他怕是一宿都沒在床上睡。\n樊長玉說不清自己心底是個什麼感覺，大概是幾分好心做了驢肝肺的惱怒？\n隨即又困惑自己生氣做什麼，他這般守禮，她應該高興，再覺著他是個君子才對。\n她尚在糾結時，單手撐著額小憩的人聽見雞鳴聲也醒了，同樊長玉視線對上，他微怔了一怔，才淡聲道：「醒了？」\n樊長玉點頭，抓了抓頭髮說：「早知道昨晚就直接回鎮上了，害得你又一宿沒睡。」\n謝徵道：「夜裡起來了一趟，見天快亮了，就沒再睡下。」\n樊長玉含糊應了聲，也沒跟他在這事上過多扳扯。\n本就是單純補個覺的事，他愛咋咋，反正又不是她一晚上挨凍沒睡著。\n在王捕頭家中用過早飯後，樊長玉便帶著俞寶兒跟謝徵一起回了鎮上。\n長寧昨夜跟著趙大娘睡的，見樊長玉回來差點哭鼻子，瞧見俞寶兒後，倒是怕丟人，硬生生把眼淚給憋回去了。\n兩個孩子在一起有了伴，折騰得就差沒上房揭瓦了，唯一讓樊長玉欣慰的，大概是俞寶兒沒再提過找他娘的事，長寧似乎也忘了矛隼。\n清平縣為了抓餘下是賊子同黨，依舊是全城戒嚴，不過王捕頭派人來她家走了一趟，竟是縣令暗地裡賞了她五十兩白銀。\n那日在縣令府上，她說她是王捕頭的人，想來是縣令貪了功後，為了籠絡人心，特意給的好處。\n樊長玉深諳悶聲發財的道理，名不名氣的，於她無用，反而還會招徠禍端，不如真金白銀實在。\n送走官差，樊長玉笑眯眯去屋裡藏銀子，碰上謝徵，她大方道：「分你一半？」\n這傢伙想跟她劃清界限是一回事，但當日解清平縣之圍的主意是他想的，在城樓上，她也被他救過，帳目還是得算清楚。\n謝徵只覺回來這兩日，樊長玉待他似乎梳理了不少。\n她見到他，雖還是會和從前一樣笑著打招呼，但又明顯能讓人感覺到同從前不一樣了。\n他壓下心底那份莫名的不快，問：「官府知我身份？」\n樊長玉搖頭：「我沒告訴旁人你是誰，縣令想貪功，連王捕頭的名字都沒提及，想來也不會主動說起你。」\n她自己都不願暴露出來，怕被那撥人記恨上，言正出現在城樓上時，甚至還戴了個面具，樊長玉便猜到他肯定也不想暴露身份。\n畢竟得罪了那些當官的，等著她們的只有無盡麻煩。\n謝徵便道：「這些賞銀都是你得的，為何要分與我？」\n樊長玉說：「主意不是你出的麼？」\n謝徵垂眸：「縣令給你的這些賞銀，也不是因你守住了城門，是你救他脫困，還綁了賊子，與我無甚干係。」\n樊長玉說不過他，拿著銀子回屋後，片刻後抱著一堆東西出來：「你之前就說你要走了，只是不巧碰上封鎖縣城，才又多留了這麼幾日，我陸陸續續也幫你備了些東西，這兩身衣裳你帶著路上換著穿。這鞋子是雙線的，耐穿。對了，我還幫你換了五十兩銀票，你帶身上方便些……」\n她絮絮叨叨，仿佛是個要送遊子遠行的老母親：「和離書我也寫了，就差你按個指印。」\n休書只需一方寫，和離畢竟與休棄不同，是和氣結束這段姻緣的，得兩方都籤章按個指印。\n謝徵這些天就堵在心口的那口悶氣，聽她說起這些時更不順了些。\n他抱臂靠著門框看了她片刻，忽而笑了笑，刻薄道：「勞煩你替我想得這般周到。」\n樊長玉沒跟他鬥嘴，只說：「出門在外比不得在家中，能準備齊全些就儘量準備齊全些，在外邊遇上什麼難處，就沒人能幫襯你了……」\n心口處翻湧著些莫名的情緒，謝徵臉上那一絲刻薄的笑也掛不住了，他別開眼看向院牆上的積雪，忽而問了句：「你呢，以後有什麼打算？」\n樊長玉好笑道：「你之前不是問過了嗎？只要清平縣能繼續太平下去，我準備把豬棚辦起來了……」\n謝徵鳳眸半抬：「我是說，你是打算嫁人，還是繼續招贅？」\n這個問題把樊長玉問住了，她把那一堆東西放到桌上，走到門口的臺階處坐下，看著院子裡落光了葉子的梨樹想了一會兒，說：「成親肯定還是要成親的，至於招贅還是嫁人，到時候再說吧。」\n謝徵手上捻著小石子，漫不經心往梨樹上擲去，驚走停在上面的幾隻雀鳥，「喜歡什麼樣的？要是將來沒人娶你，也沒人入贅給你，我替你物色物色。」\n樊長玉聽他挖苦自己，不由惱道：「反正不會是你這樣一身臭脾氣的！你這張嘴損成這樣，你還是擔心自己娶不到娘子吧！」\n謝徵半曲著一條腿坐了下來，嘴角噙著一絲似嘲非嘲的笑說：「我也不會娶你這樣的，我得娶個溫柔嫻淑會掌家的。」\n手上僅剩的那顆石子，擲得格外遠，飛過院牆不知落到了哪兒去。\n樊長玉看了一眼他精緻的側臉，垂眸時扯了扯嘴角，坦然道：「我喜歡斯文秀氣的，最好是讀過好多書，有才學，又謙遜，脾性好，還愛笑。我娘在世時就說，我性子太咋呼了，得要個斯文些的管著我，這日子才能長久過下去。」\n心口有一絲莫名的澀意，樊長玉覺得大概是想起了母親的緣故。\n她說：「咱倆好歹也患難與共了這麼久，你都要走了，也別咒我往後沒人要了，我祝你今後娶個溫柔嫻淑的娘子，你也祝我能找個斯文秀氣的郎君吧！」\n謝徵說：「好啊。」\n他笑得當真是好看極了。\n他起身時，甚至好心地向著樊長玉遞過來一隻手，樊長玉坐得久了，腿有點麻，見他遞到跟前來的手，沒多想就把手搭了上去。\n變故就發生在那一瞬間，樊長玉被一股巨大的力道扯得撲進他懷裡，扼住她沒受傷的那隻手腕的力道，大得幾乎是要將她那隻手腕也生生拗斷。\n他攥著她下顎，垂首近乎暴.虐地堵住了她的唇。`

            num: 53,
            title: `第53章第53章（捉蟲）`,
            content: `樊長玉傻了。\n唇上傳來刺痛時她才反應過來,羞惱之下另一隻手本能地朝著他臉上揮去，他卻早有準備一般，輕易截住了她那隻手,將她更用力地扯向自己,硬邦邦的胸膛和一雙鐵臂緊箍著她。\n樊長玉從未被人這般對待過,她用蠻力去掙,卻都被對方用巧勁兒化解。\n她氣急乾脆把力氣全用在牙上了，一口咬下時,謝徵輕嘶了一聲，分開時唇上見了血,他皺眉：「你——」\n一句話沒說完,樊長玉已一個迎頭狠撞了上去,腦門正好撞到了他鼻梁，他鼻根酸漲，不得已抽出一隻手捂住,下一瞬，樊長玉得空的那隻手對著他眼角就狠揍了一拳。\n謝徵吃痛卻並未鬆開握著她的另一隻手，用力往後一帶將其反剪住雙手抵在了牆上,直接用身體頂著她背部，語氣有些冷：「就這麼委屈？」\n樊長玉一口咬死他的心都有了，手腕之前受了傷的緣故,一時間竟也沒能掙脫他的束縛。\n她喝罵道：「你發什麼瘋？你要找女人勾欄瓦舍多的是願意做你生意的,你把我當什麼人了？」\n謝徵猛地抬起頭，黑眸幽沉：「你就是這麼想我的？」\n樊長玉被他摁住動彈不得,羞憤之下眼底幾乎要迸出火星來：「你以為你剛才是在做什麼？乘人之危！」\n謝徵大概是怒急了,竟然低笑了起來：「乘人之危？我真要乘你之危,就不會等到現在了。」\n他鬆開她退後一步,嘴角的弧度冷冷的：「就這麼放不下你那前未婚夫？將來再找都得尋個跟他相似的？一點記性不長？」\n樊長玉才被他輕薄了，此刻再聽他一副挖苦教訓的口吻，心下惱得厲害，反應過來時已向著他臉上又揮了一拳過去，「我放不放得下，跟你有什麼關係？」\n謝徵不閃也不避，生生受了她這蠻力十足的一拳，唇角都被打得破開，半邊臉泛起的緋色在他那張冠玉般的臉上出乎意外的昳麗。\n樊長玉打完也愣了一下，她自己下的手，當然知道這力道有多重。\n他……怎麼都不躲的？\n謝徵用舌尖抵了抵唇角破開的地方，嘗到一股淡淡的鐵鏽味兒後，偏過頭看向樊長玉，問：「不繼續麼？」\n樊長玉說不清這一刻心底是個什麼滋味，她手指節都還有些細微的疼意，他臉上只會更糟。\n但他對她做了那樣的事，道歉的話她是說不出口的，抿緊了唇轉身就要往屋裡去。\n卻不防一步開外的人突然鬼魅般逼近，樊長玉只看到他那雙黑得令人心驚的眼，就被扣住後腦勺再次吻住了。\n她頭皮都要炸開，卻因失了先機處處受制，推搡之間，整個人都被按到了牆上，他攥住她兩隻手舉過頭頂，借住體型的優勢緊壓著她，垂首時的不同於平日裡清淺的吐息噴灑在她面門，吻得比前一次更加野蠻粗暴。\n樊長玉氣極狠咬了他一口，他很快鉗制住她下顎，不知怎麼用的巧勁兒，讓她沒法再咬下。卻又並沒有退開的意思，反借著這機會強行抵開她齒關，在她口腔內來來回回掃蕩了好幾遍。\n結束時樊長玉氣都喘不勻，腦中一時缺氧，竟忘了再給他一拳，只難以置信瞪著他。\n謝徵鬆開她，食指拭去唇上的血跡，說：「現在是乘人之危了。」\n那股被冒犯被輕薄的怒火直衝樊長玉腦門，她在謝徵鬆開對自己手腳的禁錮退開時，直接拔出隨身攜帶的一把剔骨刀抵在了他脖子上：「你以為你是誰，想欺辱我便欺辱我？」\n謝徵斜倚著木柱，被她用刀抵著，面上也無一絲異色，只在聽到樊長玉這話時，才抬起眸子，神色罕見的認真：「比起你眼光不好，將來繼續找個白眼狼，你不如跟著我。」\n這句話說出來，不止樊長玉，謝徵自己都淺愣了一下，隨即又有一股理智被強行擊毀的麻痺快意。\n是了，比起她將來另嫁他人，把她留在身邊不好麼？\n開了這麼個口，後面的話似乎好說多了，他沉默了片刻，緩緩道：「我在外邊有個很厲害的仇家，我可能會死在他手上，也有可能是他死，我活著。只要你願意，且等我兩年，我要是死了，會有人來給你送信，到時候你另嫁不遲。」\n樊長玉冷冷盯著他：「你口口聲聲說宋硯是個白眼狼，你自己又比他好到哪裡去？輕薄於我，再告訴我，你是對我有意？」\n她收了刀，被冒犯的惱怒一時壓過了其他情緒，抬起袖子用力抹了一把唇：「我打了你，也算是兩清了，東西都在桌上，等城門一解禁，你就走吧。」\n謝徵看著她回屋的背影，嘴角連一絲冷峭的弧度都挑不起來了。\n所以，他這是被拒絕了？\n從出生到現在，只在崇州戰場上吃過一次敗仗的人，這一回，又在別的地方嘗到了敗的滋味。\n他沒拿堂屋桌上的東西，自己靠著廊柱站了一會兒，出了樊家院門。\n因為前幾日清平縣反民圍城鬧事，眼下官府又戒嚴的緣故，臨安鎮街頭也蕭索得緊，幾乎不見鄉下農人來趕集。\n謝徵漫無目轉悠到了鎮外那片沿河的松林裡，地上覆著一尺來厚的積雪，河水源於高低起伏的地勢，水流湍急，河面上昨夜剛凝上的一層薄冰已碎裂開來，只聽得半山的泉水叮咚聲。\n他在緩坡處就著積雪躺了下來，一條胳膊枕到腦後看著遠處隱約可見個輪廓的臨安鎮發呆。\n崇州戰場上被設計命懸一線他沒慌過，僥倖撿回一條命，被死士追出百裡餘地他也沒懼過。墜崖被江水帶到薊州，他從江岸邊上醒來，忍著滿身的刀劍傷和風寒高熱去尋村落，暈倒在野地裡，被那女子撿了回去。\n那時，他謀劃的也不過是如何穩住西北大局，再一步步向著魏氏父子復仇。\n是什麼時候開始捨不得離去的？\n那小小的屋宅裡，總是吵吵鬧鬧，煙火氣十足。他見過太多被苦難壓彎的脊梁，但那女子，縱使天塌下來了，也會挺直瘦弱的脊背去扛。\n或許……只是太久沒有人那樣純粹地對他好過了？\n喝藥時的陳皮糖、新年的紅封……一抹嘲弄的笑爬上謝徵嘴角，有一瞬他想到了「搖尾乞憐」四字。\n她大概就是太好心，哪怕那日被救的不是他，換做任何一個人，她也會那般盡心盡力照顧，買糖，包新年紅封……\n因為他可憐，所以她對他好，並非是對他有什麼情意。\n他那句跟著他，委實也成了個笑話。\n驕傲了半生的人，並不太願意承認這場笑話一般的挫敗。\n天際，海東青一邊盤旋著，一邊唳叫，似在尋什麼人。\n謝徵這次遲遲沒有吹哨，他微微偏過頭，瞧見靠近河畔積雪化了大半的岸邊，有一株嫩綠的草芽頂破積雪鑽了出來，翠生生立在一片雪色之中。\n冰銷泉脈動，雪盡草芽生。\n這是他當初寫給她的新年對子。\n他看了一會兒，斂眸半坐起來，扯斷那草芽，扔進湍急的水流中，靜靜看著河水卷著那草芽遠去。\n亂了心扉，拔掉便是。\n天際盤旋的海東青終於也瞧見了他，俯衝下來時，謝徵並未抬手接它，海東青落地站了一會兒，不見謝徵取信，不由歪頭看他，走近用鳥喙輕輕啄了啄他手背。\n謝徵抬手替海東青順了順頭頂的羽毛，視線仍落在遠處的水流處，好一會兒才取下它腳上的信紙。\n一目三行看完，信紙在他指尖化作碎屑，他最後再望了一眼遠處的臨安鎮，說：「走吧，是時候回去了。」\n-\n薊州。\n一封從錦州來的急報送到了薊州府衙，整個州府的官員看了，無不大驚。\n「北厥人果真攻打錦州了！」\n「還好武安侯並未身隕崇州，錦州有武安侯坐鎮，想來北厥蠻子聽到武安侯的名號，便聞風喪膽了！」\n坐在議事廳上方的賀敬元面沉如水，尚未出一言，又有侍衛在議事廳外稟報：「盧城告急！長信王麾下大將郭信厚領兵五萬圍了盧城！」\n此言一出，議事廳內一眾官員更是譁然。\n長信王世子帶著一眾死士假扮農人，挑唆清平縣民造反的事才過去多久？\n若是清平縣的暴.亂沒被鎮壓下來，百姓們當真反了，盧城又是薊州同崇州接壤的第一道軍事重防，後邊挨著的就是清平縣，屆時盧城當真是腹背受敵。\n一名官員大罵道：「反賊這分明是早有預謀！錦州告急，武安侯屯於徽州的重兵必會調去錦州，根本無力再拖反賊！反賊是要藉此時機，侵吞西北之地！」\n一名武將道：「眼下之急，是反賊已兵臨盧城，咱們得怎麼守住薊州。」\n盧城一失，薊州就沒了屏障。\n一片吵嚷聲中，賀敬元道：「郭信厚是員老將，善用兵法，盧城我親自前去坐鎮。」\n「大人，萬萬不可！盧城眼下兇險，反賊五萬大軍壓境，盧城只有兩萬兵力，您若有什麼閃失，我等萬死難辭其咎！」\n賀敬元在一片不可聲中，抬手示意底下官員不必再多言，他道：「我去兇險，盧城守城的將士們便不兇險了？我去了，反賊忌憚於我，盧城反倒沒那般兇險，爾等也能有足夠時間再向民間徵兵。」\n議事一結束，便有騎兵帶著徵兵令一路縱馬奔向各地郡縣。\n-\n臨安鎮。\n樊長玉因為謝徵的孟浪，生了一下午的悶氣。\n她翻開桌上的書，想看看書分散注意力，瞧見上面密密麻麻批註的小字，一口氣又堵在了心頭，上不來，也下不去。\n這書上的批註，都是他那些日子熬夜寫上去的。\n怒氣慢慢消下去後，想到他說的他可能會死在仇人手上，樊長玉心底又有些不是滋味。\n他一直說要走，是因為背負了大仇嗎？\n她走出房門，路過堂屋時，見自己給他備的那一堆東西都還在桌上放著，和離書也在，兩張都只落了她的名字，他並未籤章，心下不由更複雜了些。\n長寧和俞寶兒跟著巷子裡的孩子一起出去玩去了，還沒回來。\n樊長玉走到南屋房門口，躊躇片刻，還是敲響了門。\n裡邊沒人應聲。\n樊長玉抿了抿唇，又敲了兩下，出聲道：「言正，你在嗎？」\n回應她的依然是一片沉寂。\n樊長玉思及自己當時氣急說了重話，言正可能不告而別，用力推開門，瞧見裡邊他自己的東西也什麼都沒帶走，心才一下子落回了原處。\n那他大抵是出去散心了？\n樊長玉合上門，正打算回房，卻聽見巷子外一片吵嚷啼哭聲和兵卒的叫罵聲。\n「軍爺！軍爺！我家就這麼一個兒子！您就可憐可憐我們娘倆吧……」\n「反賊就要攻打薊州了，兒郎不上戰場去，等著反賊打過來了血洗薊州嗎？」\n樊長玉心頭一跳，打開院門往外瞧去，就見披甲執銳的官兵直接挨家挨戶闖進去抓男丁。\n坐在地上哭爹喊娘的，便是康婆子。\n她抱著自己兒子不撒手，卻還是敵不過幾個身強力壯官兵的力氣，他兒子被官兵押走。\n康婆子哭嚎道：「兒啊，你莫怕，我這就去宋家找宋舉人，讓他去縣令那裡求個情，放你回來。」\n樊長玉一見這些官兵穿著的是薊州府的兵服，便知求去縣令跟前也沒用，除非縣令捨得放下身段去給負責徵兵的官兵頭子套個近乎，許些好處。\n她當即擔心起言正來。\n一旦被抓去徵兵，仗什麼時候打完，他們什麼時候才能返鄉，更多的是死戰場上，連個埋屍骨的地方怕是都沒有。\n在外邊玩的孩子們見著這番動靜，也不敢再淘氣，各自往家跑。\n長寧帶著俞寶兒跑到家門口，齊齊躲到了樊長玉身後，只露出半個腦袋怯生生看著闖進巷子裡的這些官兵。\n長寧緊張地仰起頭問樊長玉：「阿姐，燕子家大哥被這些官兵抓走了，姐夫也會被他們抓走嗎？」\n樊長玉心中也沒底，這也是她頭一回瞧見徵兵。\n從前聽趙大娘說，是可以用銀子抵一個徵兵的人頭的，但這次瞧著好像不成。\n她把兩個孩子往院子裡趕，說：「你們先進屋裡去。」\n她剛合上院門，就見巷子裡的什長帶著官兵到了自家院門口。\n本朝律法，民間都是以五戶為伍，十戶為什，徵稅、徵兵都以這相鄰的十戶為單位，若有包庇者，十戶連坐。\n什長面色訕訕的，對著官兵將樊長玉家中的情況如實相告：「這便是這家的戶主了，姓樊，叫長玉，她招贅了一個夫婿。」\n官兵聽說是招贅的，不由意外，一看只有樊長玉一人在外邊，院門還閉得緊緊的，面上便已不太好看，喝道：「你夫婿呢？」\n樊長玉抿緊唇角，這種時候她若說她跟言正已經和離了，而屋裡的和離書言正又還沒按指印，無疑不是把其餘九戶人家往火坑裡推。\n可若是讓言正被帶走，這於言正又是無妄之災。\n樊長玉思索再三，如實道：「他不在家中。」\n那名官兵似乎已聽慣了這套說辭，面色不善抬腳就要踹門，邊上那個捧著文書的官兵約莫是識字的，已經在臨安鎮名冊上找到了樊長玉的名冊，忙叫住同伴：「慢著。」\n他又仔細看了一眼名冊，再瞧向樊長玉：「樊長玉是吧？」\n樊長玉不卑不亢道：「正是民女。」\n那名識字的官兵跟同伴道：「她夫婿已在徵兵名冊上了，想來是剛才在路上抓的那批人裡就有她夫婿。」\n樊長玉心口狂跳，忙問：「我夫婿已經被帶走了？軍爺你當真沒看錯？」\n識字的官兵看了一眼名冊道：「你夫婿不是叫言正？」\n聽到這個名字時，樊長玉最後一絲希翼也沒有了。\n她啞聲道：「是我夫婿。」\n什長帶著官兵繼續去下一戶敲門，樊長玉手腳發涼蹲坐在了院門口。\n以言正的功夫，他要走官兵是不可能攔下他的。\n他讀了那麼多書，還精通律法，是怕連累那九戶鄉鄰，才甘願被官兵押走的吧？\n樊長玉想到屋中桌上她備的那一堆東西，還有前不久二人的不歡而散，心口愈發悶悶的難受，不知是愧疚還是其他的。\n她枯坐了片刻，忽而想起了什麼似的，抬起頭問那正在敲門的官兵：「軍爺，我夫婿現在何處？我還能再見他一面嗎？他是在外邊被帶走的，我想給他拿些東西。」\n官兵看了樊長玉一眼，道：「路上抓的那批已經押往縣城去了，正要跟著大軍前往盧城，你現在趕去還能不能追的上，就不知道了。」\n樊長玉一聽，道了謝，把長寧和俞寶兒託付給鄰家大娘後，衝進屋裡拎起桌上那一包東西，又往裡邊塞了兩包陳皮糖，急急忙忙就往縣城去。\n她嫌牛車慢，直接找人借了一匹馬，趕去縣城門口時，卻還是晚了一步，縣城裡先徵的那一批兵已經隨駐軍往盧城去了。\n除了徵兵名冊上的人，閒雜人等依然不能輕易進出清平縣。\n雪下得極大，樊長玉拎著那一大包東西牽著馬站在城門口處，望著城門孔洞外邊延伸向遠處的官道。\n心口的地方悶得厲害，她牽著馬一言不發往回走。\n路上被人撞到，包袱裡的東西散落一地，樊長玉沉默著一樣一樣撿起來，撿到那兩包陳皮糖時，她捻起一顆放進了嘴裡。\n她想，還好沒追上，買的這兩包陳皮糖太酸了，不如之前的甜。\n便是給言正了，他大抵也是不喜歡吃的。\n收拾好東西，樊長玉把包袱掛到馬鞍上時，卻把頭抵在了馬鞍上好一會兒。\n怎麼是這樣收場的呢？\n她是惱他的，可是連一句道別的話都沒說，他就被徵兵抓走，她總覺得好像自己虧欠了他。\n回鎮上時，正好遇上第二批押著新徵上來的兵卒往縣城去的官兵。\n親眷們一路哭哭啼啼相送，被徵兵徵上去的人一個個也是眼眶通紅，連聲讓自家人別再送了。\n樊長玉發現一把年紀的趙木匠竟然也在人群裡。\n她沒忍住喊：「趙叔，怎地你也要去盧城？」\n趙木匠皺巴著一張老臉，嘴裡發苦道：「怪老頭子選錯了行，年輕時當獸醫，年老了當木匠，那些軍爺說，我去軍中，能給戰馬看病，還能造城防器械。」\n官兵們拿著鞭子驅趕著人群快些走。\n樊長玉怕趙木匠一把年紀光是趕路就累死在路上，稍作猶豫便道：「趙叔，你把這馬牽去！」\n官兵見樊長玉走近，本要驅趕，一聽說她是要送馬，立馬睜隻眼閉隻眼了。\n馬可是好東西，能馱人又能馱貨物，一旦遇上襲擊，騎馬跑得快指不定還能撿回一條命。\n趙木匠推拒：「這馬可金貴著呢，哪裡使得？」\n樊長玉把馬的韁繩遞給了趙木匠，「您帶上吧，包袱裡的東西是我給言正準備的，我沒追上他，趙叔你若是去了盧城，見到言正，幫我把這些東西給他。」\n趙木匠一聽，也不在推拒，心中也替這對小夫妻             content: `因為這場徵兵,本就蕭條的臨安鎮，集市更不復從前熱鬧。\n新年也已經過去，除了紅白喜事,幾乎沒人家中會殺豬,樊長玉倒是一下子閒下來了。\n肉市生意也不好,不少肉鋪都暫時關門了,因為清平縣距離盧城不遠，不少人心中惶惶,一些消息靈通的富商，甚至已經變賣產業往南邊跑了。\n樊長玉這兩日一直在家中照顧兩個孩子,她讀書雖不多,《三字經》、《千字文》這些還是認全了的,本想教長寧和俞寶兒認字。\n沒想到俞寶兒小小年紀，字倒是已經認了不少，握著炭筆在地上寫字時,寫出來的字像模像樣的。\n長寧在旁的事上都比俞寶兒強，平時帶著俞寶兒玩，也是俞寶兒聽她的。\n突然發現這個看起來呆呆的傢伙讀書寫字比自己厲害,長寧很不服氣，也不想著玩了，一直纏著樊長玉教她認字。\n俞寶兒倒是很熱心：「你要想學,我可以教你的。」\n長寧揪著樊長玉的衣擺,用鼻子哼了一聲，「我不跟你學,我有阿姐教我,等阿姐把會的字全交給我了,還有姐夫教我,我認字會比你還厲害的！」\n樊長玉正在翻開《三字經》教長寧認今天的字，驟然聽到她說起言正，有一瞬間失神。\n都過去這麼些天了，也不知道徵上去的這些兵卒到了盧城沒，這次徵了好幾萬兵，趙木匠又是去當獸醫兼木匠的，言正若是被編進步兵營，那趙木匠遇到他的機會就少得可憐。\n他若是被選進了騎兵營，趙木匠打聽到他的概率還能大一點。\n長寧發現樊長玉拿著書久久沒說話，輕輕晃了晃她的袖子：「阿姐，你怎麼啦？」\n樊長玉收斂了思緒，道：「沒什麼，來，咱們今天先認這五個字……」\n筆墨紙硯金貴，樊長玉沒拿給兩個孩子霍霍，只用炭棍讓他們在一塊乾淨的石板上寫字。\n長寧悶頭練字時，樊長玉就慢慢翻開言正做了細緻批註的四書，她從《論語》開始看的，因為先前言正已教了她兩篇的緣故，通篇又做了詳細的註解，她看起來倒也沒太吃力。\n中午的時候，樊家的院門叫人敲響。\n樊長玉去開門，見來者是俞淺淺，忙熱情地要把人往屋裡迎。\n俞淺淺披著深色的鬥篷，臉上雖帶著笑，整個人卻顯得有些憔悴，她道：「長玉妹子，今日實在急，我就不進門去了，我是來帶寶兒走的。」\n俞寶兒聽到俞淺淺聲音的時候，就已從院子裡跑了出來，抱著俞淺淺的腿仰起頭高興地喊「娘」。\n俞淺淺摸了摸孩子，又對樊長玉道：「寶兒在這裡的這些日子，實在是麻煩長玉妹子了。」\n樊長玉忙說沒什麼。\n俞淺淺沒見著謝徵，問了句：「前兩日徵兵，你夫婿也去盧城了？」\n樊長玉應是，再次邀俞淺淺進屋子坐，俞淺淺依舊婉拒了。\n她看著樊長玉，稍作猶豫道：「長玉妹子，不瞞你說，現在整個清平縣的富商都已在走動關係，把家財往南邊轉移，我也把兩座溢香樓折價盤出去了，城門那邊已打點好了關係，酉時就要舉家出城前往江南。盧城還不知守不守得住，長玉妹子你隨我去江南吧，你要是擔心你夫婿，等戰事結束後，再回清平縣來不遲。」\n樊長玉總算是明白俞淺淺此行瞧著為何這般匆忙，她遲疑了片刻，婉拒道：「多謝掌柜的好意，但我家中還有諸多事情沒安排好，我若是貿然走了，官府若是再有什麼徵稅徵糧的令頒下來，這巷子裡跟我連坐的那九戶人家可就遭殃了。」\n相鄰的十戶人家，是不可隨意遷居的，便是要遷居，也得去官府經辦遷戶文書，流程繁瑣得緊。\n她家之前發生了幾起命案，她準備帶著長寧去別處避風頭，也少不得處置家產和辦理文書這些，拖了好幾天，直拖到官府結了這案文書都沒辦下來，後來不打算去外邊躲躲藏藏過日子了，此事才暫且擱淺。\n俞淺淺當然知道這緊要關頭，封城令還沒解，普通人家辦這些文書有多難，她們商賈之流，也是給了那些當官的不少好處，才借著商隊外出採買貨物的由頭批下了文書。\n她用力握了握樊長玉的手，說：「我只是個商人，旁人我帶不了，但你若是願意跟我一起走，今日酉時，來城門便是。」\n樊長玉點頭道：「掌柜的心意我明白的。」\n只是她眼下的確不能走，且不提那繁瑣的遷戶流程，單是趙木匠已經被徵兵抓走了，只剩趙大娘一人，她也不能拋下趙大娘不管。\n趙大娘就是她和長寧的半個姥姥。\n俞淺淺見說不動樊長玉，也沒再勸，低頭對俞寶兒道：「寶兒，跟長玉姑姑和長寧妹妹道別了。」\n俞寶兒知道俞淺淺前來是為了接自己，但沒想到他們直接要離開清平縣了，他轉頭看向樊長玉：「長玉姑姑再見。」\n又看了看攥著樊長玉裙擺的長寧，說：「以後我教你認字。」\n長寧不服氣得很：「我認的字一定會比你多的！」\n兩個小孩子只顧著鬥嘴，樊長玉和俞淺淺看了不由笑開，離別的傷感倒是淡了幾分。\n樊長玉牽著長寧的手送俞淺淺母子到巷子外的馬車處。\n俞寶兒都要上車了，卻又蹬蹬蹬跑回來，把掛在脖子上的一塊玉墜取下來拿給長寧：「這個給你。」\n樊長玉忙說不可，對俞淺淺道：「這太貴重了些。」\n俞淺淺倒是笑得溫婉，道：「讓寧娘收著吧，這孩子太孤單了，每次遇到個玩伴，要分別時都捨不得，會把自己最喜歡的東西給對方，多少是這孩子的一份心意。」\n長寧見樊長玉點頭了，才接過那玉墜。\n她扯了扯衣角，看著俞寶兒說：「可我沒什麼東西給你啊。」\n俞寶兒指了指她掛在小荷包上的一隻草編蟈蟈，說：「我要這個。」\n長寧算是樊長玉帶大的，很多時候心眼實得很，她沒見過玉，也不知道那東西貴重，不過白瑩瑩的很好看。\n可是草編蟈蟈她也很喜歡，長寧小小地糾結了一下，覺得俞寶兒好像是真的很喜歡那隻草編蟈蟈，還是解下來給他了。\n她說：「這是趙叔被抓走前給我編的蟈蟈，趙叔去軍中了，以後也沒人給我編蟈蟈了，你要好好留著，以後要是不想要了，就拿著蟈蟈回來跟我換你的小墜子。」\n俞寶兒說：「我會留著的。」\n他人小，還不能自己爬上馬車，俞淺淺抱他上去時，寬大的袖子滑下來一截，手上戴的那一對寬玉鐲也往下滑了幾分。\n樊長玉注意到俞淺淺手腕上像是有被捆綁後留下的傷痕。\n她猜想是俞淺淺在獄中時留下的，眉頭皺起，很是心疼俞淺淺。\n俞淺淺回頭打算跟樊長玉道別時，見樊長玉盯著她手腕，臉上的笑意微滯，下意識用袖子擋住了手上的傷痕，這才繼續道：「那我們便走了。」\n樊長玉沒察覺到，只笑著說：「一路順風。」\n俞淺淺也上了馬車後，車夫才趕著馬車離去。\n樊長玉帶著長寧往家走時，發現長寧一直低著頭，時不時用鞋尖去踢路上的小石子，情緒有些低落的樣子。\n樊長玉蹲下時，才發現她眼眶都紅了。\n樊長玉問：「捨不得寶兒嗎？」\n長寧點頭又搖頭，有些難過地道：「隼隼走了，姐夫走了，趙叔也走了，寧娘想他們……」\n樊長玉抱過妹妹，手一下一下輕拍在她後背，一時間心下也有些悵然。\n她說：「仗打完了，他們就會回來的。」\n-\n幾百裡外的盧城。\n賀敬元剛帶著新徵上來的兵卒抵達城門口，便碰上了一隊從燕州來的人馬，領兵之人遠遠瞧見他，便笑著作揖，一雙狐狸眼怎麼看怎麼奸詐：「賀大人。」\n賀敬元見此人一身白衣，俊俏得像個戲臺上唱戲的小生，不由皺了皺眉。\n前去迎接賀敬元的盧城守將道：「此人乃是武安侯麾下的軍師公孫先生，前不久方至盧城，說是燕州弱防，想來盧城借調兵力。」\n賀敬元臉色驟然一沉：「反賊五萬大軍正圍著盧城，盧城如何撥得出兵力借往燕州？」\n盧城守將也是冷汗一下子就下來了，道：「都稱這位公孫先生乃鬼才，末將也不知他葫蘆裡賣的什麼藥，末將早已用盧城之圍推脫過，但公孫先生說他只在您新徵的將士中討一千人。」\n賀敬元聽到此處，面上也是大惑不解。\n這片刻功夫，公孫鄞已穿著他那身道骨仙風的白袍施施然走到了賀敬元跟前：「某前來，是望賀大人助某一臂之力。」\n公孫鄞替謝徵做事，在軍中並無軍職，但此人滿腹算計，無人敢低看了他去。\n賀敬元雖為薊州牧，政事上直接由對接朝廷，軍事卻得聽謝徵調遣。\n因此在公孫鄞抵達跟前後，他便下了馬，斟酌道：「燕州有難，薊州本該相援，但薊州眼下的情況，公孫先生想來也看到了……」\n公孫鄞笑道：「某便是奉了侯爺之命前來解盧城之圍的。」\n賀敬元聽他絲毫不提借兵之事，愈發不解：「此話怎講？」\n公孫鄞道：「魏宣在泰州徵糧打死人的事，鬧得沸沸揚揚，其中未嘗沒有反賊在推波助瀾。只是薊州有鹽湖，反賊才選擇了圍攻薊州，若是薊州久攻不下，反賊轉頭攻泰州也不無可能。侯爺的意思是，燕州示弱，讓某前來薊州搬救兵。反賊若見薊州還能借兵給燕州，必然懷疑薊州真正的兵力，短期內不敢輕舉妄動。」\n賀敬元問：「長信王會輕易被此計糊弄過去？他若轉頭攻泰州呢？」\n公孫鄞臉上笑意不減：「侯爺已另派了人前去泰州借兵。」\n賀敬元聞言一時沒再說話，只在腦中思索此計。\n泰州和薊州都鬧出了徵糧的醜聞，民心散亂，但反賊選擇了攻打薊州，無非是看中薊州的鹽湖。\n武安侯從燕州派人向泰州和薊州求援，無疑不是在告訴反賊，眼下燕州才是最好拿下的，而薊州和泰州都還能給燕州借兵，儼然這兩州的兵力遠勝燕州。\n若放在往日，長信王或許是會擔心是計，可眼下燕州以北的錦州正在同北厥人交手，燕州弱防還真不無可能。\n最終賀敬元喚來副將：「公孫先生要多少兵馬，你去撥給公孫先生。」\n公孫鄞做了一長揖：「某在此謝過賀大人。」\n賀敬元道：「若能解盧城之圍，保下薊州，當賀某謝先生和侯爺才是。」\n公孫鄞跟他又客套了兩句才離去。\n半個時辰後，白衣勝雪的公孫鄞帶著要來的一千新卒回了自己帶來的燕州將士所扎的營帳地界。\n一進帳篷，他臉上的幸災樂禍就再也繃不住了，望著倚在坐榻上，眼角和臉上都還帶著淤青的人，擠眉弄眼問：「喲，這天底下，誰還能把你給打成這樣？」`

            num: 55,
            title: `第55章第55章`,
            content: `謝徵眼角的淤青已淡去了很多,靠著坐榻，微垂著眼帘不知在想什麼，公孫鄞進帳都沒能引起他注意,在公孫鄞戲謔出言後，他才抬了抬眼皮：「你要是太閒,就去錦州督戰。」\n公孫鄞給自己尋了塊地方坐下,倒了杯熱茶邊喝邊道：「我哪裡閒了？你讓雪鸞一封信送來，我就帶著燕州的將士們跋涉幾百裡來了盧城，做牛做馬只換得你這麼一句話，可真是令人寒心吶！」\n謝徵心情不太好，嘴上愈發不留情：「給那蠢東西取這麼個名字,你也不嫌矯情。既做了牛馬，從盧城回燕州的這一路，想來你也不需要車馬了，走回去便是。」\n公孫鄞一噎，人人都說他生了張利嘴，可他這張嘴,從來沒在謝徵這兒佔到過什麼便宜。\n他忍不住道：「火氣這麼大？你要是不待見雪鸞,拿給我養便是！」\n說到最後一句,他一雙狐狸眼沒忍住掃向了大帳角落裡的海東青。\n也不知何故，海東青現在很喜歡用竹筐當窩，那竹簍子本是裝髒衣用的,海東青瞧見了,直接蹲進去當窩了。\n謝徵淡淡抬眸：「你就沒聽出來,我是不待見你取的名字麼？」\n公孫鄞氣得甩袖就要走人：「謝九衡,莫要欺人太甚！」\n謝徵任他甩袖離去。\n公孫鄞走到大帳門口,卻又突然折了回來,重新坐下道：「險些著了你的道，叫你激走，能打傷你，還惹你這麼不快……」\n他一雙狐狸眼眯起：「我聽說長信王世子前些日子去了清平縣，崇州戰場上你中計敗兵於他，軍中都傳他神勇無二，莫非你這臉上的傷是他打的？」\n謝徵冷嗤一聲：「你倒是看得起他。」\n公孫鄞一聽謝徵這話，就知道絕不可能是隨元青。\n他皺眉道：「總不能是你惹了什麼桃花債，叫女人給打的……」\n話一出口，他自己就先笑了起來：「這倒是絕無可能了，莫說你謝九衡沒那個桃花命，便是有，也沒哪個姑娘家能有這個手勁兒。」\n謝徵神色微僵，不耐開口：「你來就是同我說這些的？」\n公孫鄞見他面色不愉，收起了玩笑的心思，道：「自然也是有正事要說的，燕州將士們前去同那趙姓商人接頭運糧時，並未露出半點馬腳，反倒是那趙姓商人給薊州官府留了尾巴，這才讓賀敬元查到了燕州。」\n「我命人去搗趙家暗地裡的據點時，故意放了風聲，讓他們得以提前轉移，這才摸到了他們藏得更深的那些據點，一通徹查下來，委實發現了不少有意思的東西。」\n他高深莫測笑了笑，在謝徵看過來時才道：「趙家同長信王那邊也有來往。」\n謝徵面色如常：「趙詢見我時，便幾番暗示他是十幾年前喪生於大火中的皇孫的人，長信王造反，趙詢身後的人會同長信王有什麼交易，不足為奇。」\n公孫鄞聽到皇孫幾字時，臉色就變了變，問謝徵：「侯爺是如何想的？」\n他稱呼的是「侯爺」二字，而非「你」，便不是以友人的身份詢問他，而是以謀士的身份在問他接下來的站隊。\n謝徵道：「崇州一戰後，我同魏嚴已是水火不容。」\n公孫鄞沉思片刻道：「長信王也絕非善類，皇孫若當真尚存於世，不知跟長信王那邊達成的是何交易。」\n謝徵一條腿半曲著，長發束起，墨眉入鬢，語調散漫又冷峭：「皇孫同長信王有來往，長信王造反卻並未用皇孫的名頭，要麼是這個所謂的皇孫本就是長信王放出的煙霧彈，要麼……就是長信王野心勃勃，起勢後不甘屈於他人之下。」\n公孫鄞聽謝徵說出這個猜測後，心中也是一驚，道：「便是長信王不甘居人於下，借著皇孫的名頭造反，也更名正言順些。他日天下大定，他手握重權，由不由皇孫坐上那把龍椅，還不是他說了算。如此一來，皇孫一事，倒真像是長信王的計謀了。」\n他鎖緊眉頭：「可魏嚴那邊，似乎也一直在查皇孫的事，這些日子已捕風捉影抓了不少人。就連你……重查當年的錦州一案，都叫他下了殺心。如此看來，皇孫尚在人世的消息，又不像是假的，不然魏嚴慌什麼？」\n謝徵思索著那日趙詢的話，趙詢暗示他自己是皇孫的人，卻壓根不知十七年前的錦州慘案有何隱情，甚至連皇孫如何在東宮大火裡活下來的話，都只是他一家之言，無任何證據可證明。\n他當時就是覺著頗為可疑，才讓趙詢背後之人親自來同他談，但隨著趙家的產業一一被官府查封，此事便也擱淺了。\n他問：「在官府查封趙家在清平縣的據點前，你派去的人有發現什麼？」\n公孫鄞道：「清平縣那些據點都是臨時的，鋪子酒樓什麼的，被趙家買入手還不到兩月，能查到的東西委實少得可憐。」\n謝徵叩著桌面的指節微頓，「趙家的商鋪叫官府查封時，我落腳於清平縣方才一月，這些據點，顯然不是為我設的。」\n公孫鄞也覺著此事愈發迷霧重重了起來：「你的意思是，在你落難前一月，清平縣肯定還發生了什麼事，才讓趙家在清平縣設下這麼多據點的？」\n他落難前一月清平縣發生的事……\n謝徵眸光一凜，那便只有樊家夫妻的死了。\n魏嚴派人殺了那夫妻二人，還幾次三番遣死士去樊家找什麼東西，這番動靜，注意著魏嚴動向的人不可能覺察不到。\n所以……趙家那些據點，是為了樊家設下的？\n趙詢能找到他，並非是看了他寫的時文心生敬意前來拜訪，碰巧發現是他，而是趙家一直都關注著樊家，所以才順帶發現了他的行蹤。\n有什麼東西呼之欲出。\n謝徵緩緩道：「看來，魏嚴也叫長信王擺了一道。」\n公孫鄞何等聰明，他這麼一說，他瞬間明白了謝徵話中的意思：「你是說，長信王故意放出了關於皇孫和當年錦州一戰的風聲，引魏嚴自亂陣腳？」\n謝徵道出自己的猜測：「皇孫或許真有其人，或許只是個幌子。但長信王必然知曉當年的一些事，苦於沒有證據才故意放出這些風聲，讓魏嚴以為自己當年沒清理乾淨尾巴，回頭去斬草除根時，把證據暴.露出來。」\n饒是公孫鄞，一時間不免也怔住，眉頭緊鎖：「倘若根本就沒什麼皇孫，那姓趙的替你買了二十萬石糧食，一開始就是為了引魏宣徵糧，逼反清平縣民裡應外合攻打盧城？」\n他起身在軍帳內來回踱步：「正好北厥開始攻打錦州，有了那二十萬石糧，北厥人想攻下錦州絕非易事。不然錦州一旦失守，西北門戶大開，北厥人長驅直下，長信王自己也沒好日子過。他這二十萬石糧可謂是一箭三雕！」\n「魏嚴要你死，長信王守著崇州糧道，你抵擋北厥人，他大軍繼續向南，等你到了強弩之末，要麼像你父親和承德太子當年一樣，活活餓死在錦州，要麼被迫跟長信王結盟，獻上兵權。」\n公孫鄞再次坐下時，緊鎖長眉道：「當真是好生周密又好生歹毒的計劃！」\n謝徵神色倒顯得有些散漫，似乎並未把他說的死局放在心上：「我以為你會勸我同長信王結盟。」\n公孫鄞臉色不太好看：「別把我當那些酒囊飯袋，且不說你是魏嚴親外甥，單是你手握重兵這一點，你去長信王麾下投誠，他都不敢用你。這世上，沒誰頭上懸著一把利劍，還能睡得安穩。」\n他是這世間最好使的一柄刀，無人可敵其鋒芒。\n魏嚴曾迫於局勢，意外鍛造出了他，但在聽到些許風吹草動之時，就下了折了他的心。\n權傾朝野之人尚且忌憚他至此，長信王又哪敢握起這柄刀？\n謝徵若反，他和長信王誰主乾坤還說不定，長信王何等精明之人，怎會留這樣大一個隱患在自己身邊？\n不過謝徵那話，倒是讓公孫鄞心中有了個念頭，他一雙狐狸眼眯起：「侯爺想要這天下？」\n謝徵嗤了聲：「我要十七年前錦州一戰的真相。」\n這話讓公孫鄞笑了起來：「這倒是我識得的那個謝九衡。」\n公孫鄞理了理袍角告辭，走到大帳門口時，沒忍住回頭道：「我還是頗為好奇，究竟是誰打的你？」\n他身上沒別的傷，單單臉叫人打成了這個樣子，實在是有些匪夷所思。\n謝徵冰刀一樣的目光掃過去時，公孫鄞趕緊一撩帳簾走了。\n謝徵合上眼，那些刻意忽視的情愫，因為公孫鄞幾句話，莫名又翻湧了出來。\n大抵是這一生嘗過的挫敗不多，除了澀然，莫名還生出幾分不甘來。\n莫說滿京城的貴女，便是公主，只要他想，都能娶回家，獨獨那女人，就差把他嫌棄成路邊一棵雜草。\n胸口的地方悶得慌，還帶了幾分惱意。\n帳簾卻在此時被人撩開，謝徵不耐一抬眸，是公孫鄞去而復返，手上拎著個大包袱，瞧著有些眼熟。\n撞上他那不善的眼神，公孫鄞一聳肩道：「薊州軍營那邊一校尉送來的，說是有個木匠幾貼膏藥治好了他的風溼，承了那木匠的情，他替那木匠找侄女婿，正巧那木匠的侄女婿叫言正，我找賀敬元要的這一千人裡，獨獨你化名言正，我尋思著，這不就是找你的麼？」\n他說著沒忍住狐狸眼裡的揶揄：「侄女婿？你這是成親了啊？」\n謝徵看到那個包裹時，微怔了一下，隨即嘴角抿起，神色瞧著有些冷：「放後帳去。」\n公孫鄞聞言，一雙狐狸眼瞪得老大，看著有些傻：「不是，你真成親了啊？」\n謝徵抿緊雙唇不說話。\n成親了，不過是假的。\n公孫鄞見狀，皺了皺眉，突然像是想到了什麼，難以置信看向謝徵：「你該不會是想始亂終棄？」\n他視線落到謝徵臉上，只覺自己的猜測越來越對：「你臉上這傷莫不是你負了人家姑娘？被那姑娘娘家人打的？」\n謝徵臉色難看：「閉嘴。」\n他才是被棄如敝履的那個。\n公孫鄞卻是為樊長玉鳴起不平來，痛心疾首地看著謝徵：「九衡啊九衡，我沒想到你竟然是這種人……」\n謝徵不耐一掀眼皮，「你自己滾出去還是我讓人把你丟出去？」\n公孫鄞皺了皺眉，正色道：「九衡，便是對方身份低微，不配為你正妻，好歹是在你窮途末路時跟的你，把人接回來許個妾位也好，哪有你這樣絕情的……」\n謝徵沉默了許久才道：「是她不願跟我。」\n公孫鄞臉色瞬間變得要多怪異有多怪異。`
        },

            num: 56,
            title: `第56章第56章`,
            content: `公孫鄞離去後,謝徵像是沒看到那個大包袱一般，拿起桌上的一冊兵書開始翻看。\n親兵進來送茶水時，他冷聲道：「把東西扔後帳去。」\n親兵愣了一下,才反應過來他說的東西應該是公孫鄞帶來的那個大包袱，拎著包裹就去了後帳。\n東西明明已經不在眼前了,但謝徵眉心還是鎖著，指尖快速翻動書頁，仍壓不下心中那股躁意。\n片刻後，他扔開手上的兵書，守在門口的親兵聞聲正打算進來問問他是不是有什麼吩咐,剛把帳簾挑開一條縫,就見謝徵自己起身往後帳去了。\n親兵趕緊收回手站回原處,目不斜視繼續站崗。\n謝徵如今的身份在燕州軍中也只有公孫鄞和幾個心腹知曉，他所住的軍帳是普通將領的營帳,分為了前帳和後帳,前帳議事，後帳則是起居休息用。\n親兵先前拿到後帳的那個包袱,就放在軍床旁的一張小几上。\n謝徵垂眸看了一會兒，才解開了包袱上的結扣。\n裡邊放了兩身新衣,還有一雙鞋,都是那天樊長玉那天替他收拾的。\n看到裡邊多出來的兩包陳皮糖時,他緊抿的嘴角微鬆了幾分，一直憋悶得慌的心口，也像是突然泡進了熱水裡,那些莫名的躁動都平息了下去。\n謝徵指尖拂過那兩身新衣，撿起欲收進箱籠裡放好，這一拿,卻讓疊放在衣物裡的銀票和那紙和離書一併掉了出來。\n瞧見「和離書」那幾個方正又刺目的大字時，他嘴角的弧度瞬間冷凝。\n倒真是……鐵了心要同他兩不相欠！\n謝徵薄唇冷冷挑起，與生俱來的驕矜讓他恨不能立刻叫人進來，拿了這包袱扔得遠遠的。\n閉眼緩了幾息，最後卻只是拎起包裹裡的東西，盡數鎖進了一旁的箱籠裡。\n他坐在一旁，垂眼看著腳邊的箱籠，臉上一絲表情也無。\n現在扔了，總會惦念著的。\n且留著吧，留到看著這些東西心底也再掀不起一絲波瀾的時候，就是時候扔了。\n他是魏嚴一手教出來的，說起來，他在魏嚴那裡學到的最受用的東西，莫過於直面自己的欲.望，同時也要學會掌控自己的欲.望。\n他對她動心不假，但也僅此而已。\n-\n且說公孫鄞離開了燕州營地後，實在是耐不住心底有隻貓爪子在撓一樣，溜溜達達又去了薊州的新兵營。\n謝徵嘴嚴，他磨破嘴皮子也沒能問出多少關於他成親的事，但他尋思著，那姑娘都託自個兒叔父給謝徵帶東西來了，瞧著也不像是對他無情的樣子，怎地謝徵又說那姑娘不願跟他？\n懷揣著這一肚子的疑惑，公孫鄞去問了薊州管理工匠的小將，倒是沒費多少事就打聽到了趙木匠。\n會醫，還用幾貼膏藥給一校尉治了風溼的木匠就他一個，好找得很。\n如今新徵上來的兵卒還需操練，並不參與實戰，從民間徵上來的這些工匠，則被分配去打造城防器械。\n用不著給戰馬看病，趙木匠就先被分配到了木工營帳裡。\n管著工匠的兵頭領著公孫鄞去見趙木匠時，趙木匠正在拿著刨子刨木頭。兵頭喊了聲：「趙木匠在不在，有人找！」\n趙木匠放下手中的刨子，抬起一雙老眼朝外看去：「小老兒在。」\n兵頭衝他招了招手，趙木匠暫且跟監工的工頭告了個假，便往外走去。\n他們是工匠，軍營並沒有統一發兵服，趙木匠穿的還是自己那身灰撲撲的衣裳，脊背佝僂著，看起來瘦筋筋的。\n兵頭對趙木匠還是頗客氣：「這位大人找你。」\n趙木匠進軍營沒多久，但已經掌握了一套生存之法，見到著甲冑的便喚將軍，普通兵卒喚一聲軍爺，要是沒披甲又氣度不凡的，甭管對方什麼身份，叫大人便是。\n此刻一見公孫鄞，趙木匠就趕緊揖拜道：「小老兒見過大人。」\n公孫鄞虛扶一把，笑得如沐春風：「老人家不必多禮，我聽聞老人家有個侄女婿，名喚言正？」\n趙木匠在軍中這些日子，一直在打聽言正的消息，但徵上來的兵卒有數萬人，他一時半會兒哪裡又打聽得到，也是機緣巧合之下，他意外醫治了一校尉，那校尉是個性情中人，讓他有什麼難處儘管去找他，趙木匠怕說找鄰居人家不當回事，就謊稱尋侄女婿，求那校尉幫忙打聽一下。\n那校尉倒也是個言出必行的，還真把這事放心上了，查到言正在借給燕州的那一千人裡後，立馬告訴趙木匠了，趙木匠和大多工匠一樣，未免他們潛逃，都被看管了起來，不能擅自在營地裡走動，趙木匠便託那校尉把樊長玉準備的包袱轉交給謝徵。\n校尉給了東西後，給趙木匠回了信，趙木匠一顆心也放回了肚子裡，只覺對樊長玉那頭有個交代了。\n此刻突然有個華服公子找過來，趙木匠一時間也摸不準是為何事，尋思著莫不是自己撒謊說言正是自己侄女婿，要被治罪？\n他嘴唇翕動了幾下，最終揣著顆七上八下的心點了頭。\n公孫鄞一見找對了人，一雙狐狸眼笑成了眯眯眼，甚至還堂而皇之的找兵頭要了個軍帳，邀趙木匠一起進去小坐片刻。\n趙木匠哪裡見過這等陣仗，進帳後頗有些如坐針氈。\n公孫鄞笑得又斯文又和氣，還主動給他斟了茶：「聽聞老人家治好了胡校尉的風溼，老人家一身醫術，怎不當個軍醫，反來了工匠營？」\n趙木匠有些窘迫道：「小老兒醫術淺薄，從前是給牲口看病的，哪裡敢當軍醫。」\n得知對方是個獸醫，公孫鄞笑道：「那胡校尉倒是老人家醫治的第一人了？」\n趙木匠如實道：「也不是，小老兒當了十幾年的獸醫，後來改行當木匠去了，救治的第一人，是我那侄女婿，他那會兒受了重傷，鎮上的醫館都不敢收治，小老兒這才冒險用藥救了人。」\n公孫鄞先是一愣，隨即「噗嗤」笑出聲來，在趙木匠困惑看來時，他輕咳了好幾聲，才勉強憋住了笑，道：「他窮途末路遇上了老人家你，也是他的運道。」\n趙木匠連說不是，「人是我侄女從野地裡背回來的，若不是我侄女把他撿回來，他便是沒死在那一身傷上，也得凍死在冰天雪地裡。」\n公孫鄞心說美救英雄，倒也是一段佳話，他按耐住好奇問：「後來他就同你侄女成了婚？」\n趙木匠見他這般刨根問底，不由多看了他一眼，暗道這一當官的，怎打聽起言正的婚事來了？\n公孫鄞也發現自己意圖太明顯了些，只得隨意找了個理由搪塞：「你那侄女婿頗得我們將軍看中，將軍對麾下重用之人，總得打聽清楚底細，這才命我前來拜訪一二。」\n趙木匠雖沒讀過多少書，可活了幾十歲，什麼樣的事沒見過。這仗還沒開始打，言正就先得了以為將軍看中，趙木匠心道壞了，莫不是言正模樣生得太好，叫哪位將軍看上了，要招言正做女婿？\n那長玉可怎麼辦？總不能再攤上一回宋硯那樣的事？\n趙木匠心思百轉，道：「回大人的話，那孩子後來入贅與我那侄女了。」\n公孫鄞正喝著茶，聽到這話，當場把一口茶給噴了出來，一向巧舌如簧的人，這會兒舌頭打結了一般，話都說不利索：「入……入贅？」\n皇帝小兒都不敢如此放言，讓謝徵入贅與一民女，開什麼玩笑？\n趙木匠見他如此失態，對自己的猜測又確信了幾分。\n他趕緊道：「言正那孩子被我侄女從雪地裡背回來，才撿回一條命，後來一身傷病，床都下不得，也是我那侄女不嫌他，留他養傷，靠殺豬掙錢給他抓藥看病……這一來二去的，可不就有了情意。」\n公孫鄞剛抹乾淨嘴角的茶漬，一聽這話，臉色變得極為怪異：「您侄女……是個殺豬的？」\n他先前就想著，尋常女子哪能輕易背得動謝徵。\n趙木匠怕他低看了樊長玉，道：「那丫頭也是個苦命孩子，她家中本以殺豬為營生的，在鎮上還開了一家肉鋪，日子過得也還算紅火，怎料她爹娘死在了山賊手裡，家中只餘她和一個五歲幼妹，為了生計，她不得已才靠殺豬養家。」\n他說著目光偷偷往公孫鄞臉上掃，發現公孫鄞臉色有些一言難盡後，心底還小得意了幾分。\n他說這些，無非是為了告訴眼前這當官的，樊長玉對言正恩重如山，他們要是逼謝徵娶什麼將軍之女，那是不道德的。\n再退一萬步講，若是言正同意娶將軍女兒，那他人品也稱得上低劣了，畢竟有著救命之恩的髮妻都能拋棄，這些當官的想嫁女兒，也得好生掂量掂量。\n殊不知，公孫鄞聽了趙木匠說的這些後，想像出了個膀大腰圓提著殺豬刀、一臉橫肉的女子。\n他狠嘶了一聲，再想起謝徵那句「是她不願跟我」，趕緊搓了搓手臂。\n難怪那廝不近女色，原來他好這一口的嗎？\n公孫鄞懷著最後一點期許，心情複雜地問：「所以言正入贅給你侄女，是為報恩？」\n趙木匠當即吹鬍子瞪眼：「怎地是為報恩，那小夫妻倆可恩愛了！鎮上的地痞無奈去我侄女家鬧事，是我侄女婿把那波人打走的。他識文斷字，瞧著我侄女為了給他治傷，早出晚歸殺豬掙銀子，傷都還沒好，就央著我去鎮上的書肆幫他接寫時文的活兒。過年那會兒，他還替整個巷子裡的鄰居寫春聯呢！我侄女在豬肉鋪子忙不過來，他傷好些了，就去鋪子裡幫忙賣豬肉……」\n趙木匠還在滔滔不絕講述小夫妻的恩愛日常，公孫鄞想到謝徵賣豬肉的樣子，沒忍住又抖了抖胳膊上的雞皮疙瘩。\n那廝落難的這些日子，到底都經歷了些什麼？\n入贅給一殺豬女？嘶——過於驚悚。\n以他對謝徵的了解，謝徵不願做的事，天王老子下凡來逼他都不成，那謝徵八成是自願入贅的。\n就是明白這一點，公孫鄞才越發覺著離譜。\n難不成那傢伙當真喜歡膀大腰圓的彪悍女子？\n公孫鄞覺著，要是讓京都貴女知曉這些，一個個的怕是得哭斷肝腸了……\n趙木匠見這當官的面上神情變幻莫測，生怕他們對謝徵還有什麼想法，又添了句：「等這仗打完，我那侄女婿回家，指不定孩子都能下地跑了。」\n公孫鄞臉上的表情可以稱之為驚悚，「你……你侄女有孕了？」\n趙木匠訥訥道：「這可說不準，咱們村從前就有漢子徵兵走後不久，婆娘在家發現自己有孕的。」\n心中想的卻是，那些高門大戶嫁女兒，就算忍得了未來姑爺身邊有通房侍妾什麼的，也忍不了在大婚前就有了庶出的子女。\n在人前一貫溫文爾雅的公孫鄞，這次是當真破功了，他心中掀起了驚濤駭浪。\n一向眼高於頂的謝徵，竟然栽在了一屠戶女手上？\n公孫鄞沒忍住狠擰了一把自己大腿，疼得他嘴都歪了，確定這不是做夢後，他表情愈發幻滅，勉強同趙木匠客套了兩句後，一臉懷疑人生地走了。\n趙木匠看著他震驚又茫然的背影，倒是心情極好地喝了一盞茶。\n可算是替那小夫妻倆擋了一波爛桃花。\n-\n公孫鄞離開軍帳時，正巧碰上薊州軍中那名校尉又來找趙木匠討膏藥。\n對方認得公孫鄞，見了他，恭恭敬敬抱拳一禮：「公孫先生。」\n公孫鄞神情還在恍惚中，點頭致意後，問：「那當過獸醫的木匠，就是替你醫好了風溼的人？」\n胡校尉是個粗人，半點沒因趙木匠是個獸醫而忌諱什麼，腰上的風溼不痛了，他這兩天正舒坦著呢，當即就咧嘴笑著點頭：「正是，公孫先生找他有事？」\n看來他沒找錯人。\n那木匠口中的侄女婿是謝徵無疑。\n公孫鄞道：「隨便問問。」\n他一臉懷疑人生地回了燕州營地後，找來親兵，嘀嘀咕咕交代一通後，神色複雜地道：「別去打擾那女子，盯著她動向就是了。」\n親兵領命退下後，公孫鄞盯著謝徵的軍帳看了一會兒，回想起謝徵之前在營帳裡那悵然若失的樣子，狠狠打了個哆嗦，嘀咕道：「那傢伙，莫不是太久沒見過女人了？」\n因為心情不佳，出去巡營跑了一趟馬回來的謝徵，正好聽到他後半句。他牽著鼻孔裡還在呼白氣的黑駿大馬，立在不遠處冷冷道：「太久沒見過女人，今晚讓人把你扔怡紅院去？」\n放在從前，公孫鄞是絕不敢應聲的，但今日見過趙木匠後，他受的刺激太多了，此刻迎著謝徵冷沉的目光，竟然當真考慮了一會兒，然後看著謝徵道：「九衡啊，咱倆都還沒去過青樓，要不去看看？」\n他主要是想確認一下，是不是這傢伙眼神出了什麼問題。\n謝徵捲起馬鞭的手微頓，再次抬眼看來時，眼底的散漫已全收了起來：「你若是我麾下武將，罰一百軍棍都是輕的。」\n公孫鄞自知失言，不過這種時候若是順著他的話認罰，他們這友人便也做不成了，他聳肩笑道：「奈何我不是。」\n謝徵把戰馬交給親衛，越過他往軍帳走去，只留下句：「莫壞我軍規。」\n公孫鄞望著他遠去的背影輕「嘖」了一聲，「能讓你這廝開竅，我倒是愈發好奇那屠戶女是何方神聖了。」\n-\n臨安鎮。\n夜幕裡，積雪又在簷瓦樹梢上覆了厚厚一層，整個鎮上一片寂靜，連犬吠都不曾有一聲。\n「山匪來了！」\n「殺人了，快跑啊！」\n從縣城往周邊鄉鎮逃命而來的人驚惶大喊，尖叫聲刺破了雪夜的死寂，睡夢中的鎮民也被驚醒，胡亂裹上衣物抱起孩童就要往外跑。\n一開門卻是一把雪亮的刀劍送進了胸腔。\n死不瞑目的男人叫屋外的匪徒一腳踢開，屋內的婦人抱過孩子往角落裡躲，手上的孩子卻被強行闖入的匪徒一把丟開，獰笑著扯著婦人的頭髮把人往床榻上拖……\n很快整個臨安鎮便也火光滔天，孩童的哭聲和山匪的喊殺聲猙獰又刺耳。\n火光裡，有一人坐在高頭大馬上，冷眼望著山匪廝殺劫掠，垂眸看著死狗一樣被自己拎在手上的清平縣縣令，懶洋洋開口：「那個女人，家住哪兒？」\n劉縣令從得知山匪趁徵兵徵走了縣裡的壯年男子，開始攻打清平縣，想也沒想就帶著全家老小逃，本以為這夥人屠.殺縣城百姓便夠了。\n怎料馬車跑出十幾裡地，卻還是叫這人騎馬追了上來。\n此刻他渾身是血，又被放在馬背上顛了一路，早就被嚇破膽了，只一味地哀求道：「小人不知，小人當真不知……」`
        },

            num: 57,
            title: `第57章第57章`,
            content: `裹著焦臭味的熱風融化了夜幕裡還沒飄落的飛雪。\n哪家稚子赤腳哭嚎著從燃著熊熊大火的家中奔出,在雪地裡沒跑兩步就被山匪砍到在地，迸出的鮮血濺到了隨元青坐下的馬蹄。\n他手中把玩著一柄閃著寒光的匕首，居高臨下看著劉縣令：「不是你一手策劃的綁我平反民之怒麼,我當日在清平縣折了多少人，今夜便百倍千倍討回來。」\n他用匕首拍拍劉縣令的臉，嗤笑：「那青鬼面具人的身份你不知曉，你府上那綁了我的丫鬟,你也不知？」\n刀鋒陡然向下，在劉縣令身上開了一道口子，劉縣令頓時殺豬一樣嚎叫。\n隨元青慢條斯理道：「現在知道了麼？」\n劉縣令為了貪功，平息清平縣暴.亂後，對外說是自己與下屬謀劃的綁了隨元青一行人,眼下方才知道怕了。\n他肥胖的一張臉哆嗦著，哭得一把鼻涕一把淚：「小人當真不知那女子家住何處,她不是我府上的丫鬟,小人只知她叫樊長玉,是臨安鎮上一屠戶女,求世……」\n山匪中有一疤臉漢子馭馬走來,隨元青眼神一變,在劉縣令脫口而出「世子」二字時,一刀抹了他脖子，將人從馬背上扔了下去。\n疤臉漢子聽說隨元青要找一個女人,不快道：「五弟，你逮這軟骨頭縣令,不是說要尋當日傷你的仇人麼？怎地打聽起他府上丫鬟來了？」\n隨元青揚唇笑了笑：「我那仇人,便是這縣令府上一丫鬟。」\n疤臉男人一聽,面上神情才驟松,卻暗含威脅道：「以十三娘的脾性，你在外邊若有什麼紅粉知己，她必是留不得的。」\n隨元青笑意不達眼底：「大哥說笑了，我險些葬身魚腹全拜那女人所賜，這仇是無論如何都要報的。」\n疤臉男人望著倒在地上死透的縣令，「弟兄們早把縣令府上搶了個乾淨，沒瞧見個會武的丫鬟，你駕馬追出十幾裡地去逮人，也沒找到那丫鬟，她還能飛天遁地不成？」\n他說著看向隨元青：「咱們把清平縣搶掠一空，轉頭薊州府那邊肯定會出兵圍剿咱們，得儘快回清風寨才是。」\n言外之意便是不想他再尋那女子。\n隨元青扯了扯韁繩，制住座下躁動的駿馬，唇角掛著一絲淺笑道：「一切聽大哥的。」\n疤臉男人見他果真不再尋那傷他的女子，心下也滿意了幾分，喝道：「搶完這鎮子就回清風寨！」\n隨元青馬背上掛一桿長.槍，一扯韁繩催馬閒庭漫步般跟了上去，有衣衫襤褸的鎮民從暗巷裡竄出，他眼都不眨地挑出一抔血色。\n疤臉男人見狀，似乎才全然放下心來，馭馬去別處查看。\n隨元青卻是一手握著長.槍，在馬背上微微低下了頭，問地上被自己挑得半死的人，「樊長玉，家住何處？」\n這個名字從他唇齒間吐出來，他嘴角多了一絲興味的笑意，帶著點侵略和毀滅的意味。\n找到了那個女人，想來也能找到那戴青鬼面具的男人了。\n地上的人胸腔處正往外汩汩冒著鮮血，求生的本能讓他顫巍巍伸出手，指了一個方向：「城……城西……」\n隨元青一夾馬腹，在火光和飛雪中，向著城西而去。\n腰側未完全癒合的傷口因為馬背顛簸，泛起絲絲細微的痛意，卻半點不減他心中的愉悅。\n臨安鎮比不得清平縣繁華，才從清平縣搶掠了一波的山匪們，吃過肥肉後，對清平縣這塊瘦骨頭興致索然，基本上只衝著大富之家去搶，一些貧寒人家搶起來格外麻煩。\n大多時候都找不到什麼銀子，得拿刀逼著躲在裡邊的人，才能讓他們自個兒從旮旯角裡翻出那些藏得嚴實的銀子。\n隨元青駕馬踏進樊長玉家所在的那條巷子裡，就瞧見橫七豎八倒在巷子裡的不少人，有老人也有小孩，他手上拎著個路上新抓的人。\n想到的獵物或許已叫人捷足先登了，他眯了眯眸子，語氣依舊懶洋洋的，卻森冷了下來：「哪一戶是樊長玉家？」\n被他拎在手上的血人哆嗦著指向了巷尾第二家。\n隨元青扔開手上那人，那人以為自己撿回一條命，連滾帶爬就要跑，剛站起來，便叫一柄刀貫穿胸膛，直挺挺倒了下去，地上再添一具屍體。\n隨元青看了一眼自己手上撿起那柄刀沾上的鮮血，嫌惡掏出帕子擦了擦手，這才邁進了樊家大門。\n樊家明顯已叫人翻找過，院子裡亂糟糟的，主屋的門也大開著，不像是藏了人的模樣。\n隨元青卻絲毫沒有離去的意思，舉著火把往房內去。\n進了房，裡邊抽屜柜子全打開了，瓶瓶罐罐碎了一地，床單被褥也叫人扯到了地上，顯然是有人為了找藏起來的銀子幹的。\n他本欲就此離去，瞧見廚房後邊似乎還有一道門時，稍作遲疑，仍舉著火把走了過去。\n打開那道門，是樊家的後院，一個豬圈，一口壓著厚重石板的井，還有一張殺豬專用的石凳。\n隨元青掃了一圈，都已轉動腳步，視線落到了院中枯井上方的石板上時候，卻又突然停了下來。\n借著火把的光，可以清楚瞧見枯井上方的石板上覆著一指來厚的積雪，可井沿下邊被石板遮蔽的地上，也覆著厚厚一層雪。\n顯然那石板是後邊才被人蓋上去的。\n為何蓋石板？\n自然井底藏了東西。\n那石板瞧著有上百斤，換做旁人，只當這是一口廢棄的枯井，轉頭便走了。\n隨元青卻輕輕笑了起來，一雙眼彎成好看的月牙形，似乎心情不錯。\n他舉著火把一步一步朝著那口蓋著石板的井走近，腳下的積雪被踩踏發出清晰的「咔嚓」聲，和著遠處的哭嚎裡，仿佛是踩在了誰心弦上。\n他抬手去揭那石板時，身後有殺意凜然襲來。\n隨元青趕緊朝旁邊一躲，一柄剔骨刀貼著他耳際擦過，釘入了不遠處的院牆。\n不及隨元青抬眼往剔骨刀飛來的地方看去，躲在屋頂的人已矯健如豹子躍下，手上的放血刀再次直逼他命門。\n隨元青憑藉本能躲，奈何對方手握兩柄刀，一刀削過一刀又橫劈了下來，壓根不給他喘息的餘地。\n樊長玉這次是當真下了殺心，那口枯井裡藏著長寧、趙大娘還有附近幾戶鄰居，她若敗了，她們必死無疑。\n她出刀迅疾且猛，左手一柄砍骨刀，右手一柄可做刀砍也可做劍刺的放血刀，幾乎稱不上什麼招式，只一味地求快，壓著對方被迫防守，絲毫不能反攻。\n隨元青幾番想拔劍，都叫樊長玉的刀勢給逼得放棄，接連往後退避開她步步緊逼的刀鋒。\n他索性以手上火把做武器，火把被他舞得獵獵生風，火舌拖曳如同一條橙黃色的綢帶，樊長玉攻勢不減，逼得他毫無還手之力。\n隨元青不敢以火把去硬碰她手中殺豬刀，只能以火把撞擊刀背或避開刀鋒格擋。\n這樣一來，他格擋便分外吃力，尤其對方像是不知疲倦一般，刀勢迅猛不說，打了這麼久，力道也半點沒收，他虎口也生生被震得裂開，握著火把的手一陣陣發麻。\n隨元青暗罵這女人是什麼怪胎。\n忽明忽滅的光影裡，樊長玉一雙眼冷且銳，像是撕咬入侵者的虎豹，帶著不死不休的狠厲，半點不同於初見時的嬌憨老實。\n她發狠的時候，眼角眉梢莫名顯出一股勾人心魄的勁兒。\n隨元青盯著這張姣好而凌厲的面孔，微愣了一瞬，就是這一瞬，他手上的火把直接被削斷，那柄放血刀狠狠扎入他肩胛，若是對方再用力一挑，他半條胳膊指不定都能飛出去。\n劇痛讓隨元青瞬間回神，他在樊長玉挑經脈前喊道：「你動了我，你和井下的人也無望活著出去。」\n樊長玉刀勢一頓。\n隨元青瞬間找到了談判的籌碼，道：「你放了我，我也放過你和井下的人。」\n樊長玉冷喝：「我憑什麼信你？」\n正好門外有山匪發現了隨元青留在巷外的馬，在外邊喊道：「五當家的，您在裡邊嗎？」\n隨元青傷口處湧出的血溼透了半邊衣裳，他好整以暇挑起唇角：「信不信由你。」\n一切決定都只在瞬息之間，樊長玉在外邊的人找進來前，抽出了釘入隨元青肩胛的放血刀，改用一柄小巧的剔骨刀抵在他左邊肋骨間隙處。\n從那裡刺進去，便是心臟。\n樊長玉低聲道：「我上次就說過，會讓你見識到過年豬是怎麼放血的，你要是不老實，我這刀子一送進去，你總會比我先見閻王。」\n她用刀抵著對方，將人一把拉了起來，一腳踢開井口的巨石板時，在樊家院子裡尋人的山匪聽到動靜，也往後院找了過來。\n幾個火把照亮了這方寸天地，一行人瞧見隨元青將一女子摁在牆角處，一塊廢棄的門板倒在地上，似乎方才的動靜就是那門板倒地發出的。\n殊不知，那門板下方蓋著的，正是那柄在隨元青肩胛處搗了個大洞的放血刀。\n隨元青傷勢沒好，肩上披著厚重大氅，此刻那女子的身形完全隱進了大氅裡。\n一群山匪瞧見了，不免心照不宣地笑了起來。\n其中一人道：「我等壞了五當家的好事。」\n隨元青只笑罵道：「知道還不滾出去。」\n他順勢攔住樊長玉後腰時，樊長玉手中的剔骨刀往前遞了幾分，胸口的的皮肉被淺淺割開一層，刀鋒的寒意抵著皮肉，隨元青到底還是收斂了，那隻手虛虛落在樊長玉衣物上，乍一眼瞧著是攬抱的姿勢。\n他嘴上卻壓低了嗓音調笑道：「你要拿我做人質，我不用這法子，如何帶你出去，又幫你瞞過那井裡有人？」\n樊長玉不語，刀鋒倒是沒再往前了。\n她狀似羞怯地倚在他懷中，整張臉都被大氅遮去了大半，實則卻是冷眼持刀抵著他命門。\n隨元青垂眼看著她火光裡唯一可見的瑩白耳朵，牙根處泛起一股鑽心的癢意，只恨不能在她耳垂上咬一口，最好是咬出血來，留個牙印在上邊才好。\n只是這般想著，心底莫名就愉悅了起來。\n他兩次都栽在了這女人手上，一次栽得比一次傷得慘。\n出乎意料地，他並不覺著惱，見慣了對他順從的女人，這滋味反而怪新奇的。\n像是馴一匹烈馬，他喜歡這慢慢被自己馴服的感覺。\n只是眼前下意識又閃過他拉著墜樓時她喚那青鬼面具男子的一幕，牙根處的癢意更甚，他微微垂首，貼近她耳根問話：「那面具男人怎不出來幫你了？」\n樊長玉手中的剔骨刀毫不猶豫往前遞了一分。\n感受到胸口的涼意，隨元青嘴角噙著薄笑，直起了身子。\n這一幕落在外人眼裡，只當是他同他懷中的女人調情說了什麼話，一群山賊淫.邪的眼神不住地往隨元青大氅下掃去。\n奈何樊長玉整個身形都被大氅遮住了，他們只覺著樊長玉似乎比尋常女子高挑，旁的倒也瞧不出什麼。\n隨元青道：「走吧，大哥當等得急了。」\n樊長玉借著大氅遮掩，以剔骨刀抵著人往外走，心中自有計較。\n經過了這一出，幾乎沒山賊注意到院中那口井。\n那口枯井本是當地窖用的，裡邊有繩梯，等山匪一走，井裡的人便能順著繩梯爬上來。\n她只要劫持著這人，估摸著時辰等到趙大娘她們帶著長寧逃出去後，再讓他帶自己去僻靜處，她獨自一人應付他逃跑不在話下。\n只是……之前薊州官府那邊平亂後查出此人乃崇州叛軍，他怎又同這一夥山匪有了勾結？\n官府張貼出的告示並未點名隨元青的身份，樊長玉也只知他乃反賊，不知他就是長信王世子。\n樊長玉尚在思索其中緣由，巷子外突來傳來一聲：「大當家來了！」\n樊長玉不動聲色側眼瞄了山匪們口中的大當家一眼，卻見對方臉色難看，手上的鞭子直接向著自己甩來。\n樊長玉心知自己是萬不能去擋那一鞭子的，只在那疤臉男人出鞭的瞬間，手中的剔骨刀就往旁邊一拉。\n她沒再繼續往裡刺，卻把傷口拉得更大。\n隨元青受了她這無聲的威脅，嘴角笑意更深了些，在那一鞭子落到她身上時，徒手抓住。\n鞭子受力折回他手背，他手背瞬間浮起一道腫痕，他卻像是不知痛一般，抬眸看向馬背上的疤臉男人：「大哥這是做什麼？」\n疤臉男人喝道：「你想帶這女人回清風寨？」\n隨元青漫不經心道：「好不容易才瞧上了個合心意的。」\n疤臉男人直接扔了一把刀到隨元青腳下：「你若還想娶十三娘，就殺了這女人。」`

            num: 58,
            title: `第58章第58章`,
            content: `樊長玉見隨元青明顯和這山匪頭子不合,他似乎還有婚約在身，心中不免暗罵此人奸詐。\n這山匪頭子要他殺了自己，他若不肯,那山匪頭子親自動手，她挾持他的事可不就敗露了。\n一時間樊長玉握著剔骨刀的那隻掌心不由沁出了冷汗，她極力保持著鎮靜。\n最壞的結果莫過於被人發現自己劫持他罷了，只要在他開口說出枯井裡還藏有人前一刀取了他性命,那長寧她們就還是安全的。\n她隻身一人，光腳的不怕穿鞋的，搶到一匹馬後，逃出去也不無可能。\n隨元青靠樊長玉極近，自然也能感覺到她渾身都繃緊了,就像是一隻狩獵的猛獸，隨手都準備暴起將獵物撕碎。\n她若真要下刀子,自己絕對是先命喪黃泉的那個。\n隨元青倒也沒在這種時候逗她,輕笑了一聲：「大哥是想我為十三娘守身如玉,一輩子只她一人？」\n都是一群山賊,哪能不知男人那點劣性。\n疤臉男人喝道：「我就這麼一個妹子,往後如何我不管,但你同她都還沒成親,就要帶一個女人回寨子裡，你把我清風寨當什麼了？」\n隨元青皺眉,語氣咋一聽竟真帶了幾分真誠：「我入了清風寨，同大哥做這結義兄弟,本也不靠女人的裙帶關係,我秦緣浪子一個,屬實配不上十三娘,大哥不若替十三娘另擇佳婿，我今後也把十三娘當親妹子看，誰若欺她，我第一個不饒。」\n疤臉男人咬牙道：「你就這般看不上我那妹子？」\n隨元青垂下眼帘：「是我秦緣生性浮浪，不配為十三娘的良人。今日大哥可逼我殺了這女子，他日呢？我瞧上一個，大哥就逼我殺一個？長此以往只會同大哥傷了情分，不如現在把話說開了好。」\n疤臉男人心中雖惱恨，卻也知道隨元青說的不無道理。\n他就是這樣一副浪子模樣，才勾得十三娘魂兒都快沒了，可他生性如此，自己逼得他一時，還逼得了他一世麼？\n只是心中到底替自己妹子不平，喝道：「十三娘把你從江邊救起來，且不提這救命之恩，你同她已有了肌膚之親，你不娶十三娘，置她於何地？」\n隨元青抬起眼：「大哥為了讓我娶十三娘，不惜拿世俗的這一套說事了？」\n疤臉男人面色難看，他也知道自己那話站不住腳。\n江湖兒女不拘小節，真要拿著妹妹救了他的那點肌膚之親說事，傳出去委實叫人貽笑大方。\n最終他沒再發難，陰著臉調轉馬頭，沉喝一聲：「回清風寨！」\n底下一群小嘍囉也呼啦啦跟著離去，只有幾個留在原地拍隨元青馬屁：「五當家的果真才是大丈夫，之前還有人說五當家是靠著十三娘才得大當家青眼，大當家的分明是看中五當家的這一身本事，想把妹子嫁給五當家的。黑龍寨攻打咱們寨子那日，可全憑五當家一計破敵……」\n隨元青肋下的傷口還被樊長玉拿刀抵著，也沒心思聽這幾個小嘍囉拍他馬匹，打斷他們的話道：「莫要胡言，以免傷了我同大哥的情分，大哥待我如親兄弟一般，不過是為十三娘的事護妹心切罷了，回寨子。」\n幾人得了教訓，面上訕訕的，也沒再敢說些刻意迎合他的話了。\n樊長玉沒作聲，聽他們這番對話，已然明白隨元青為何會跟這些山匪混在一起。\n原來他當日被言正所傷，遁江而逃後叫清風寨的人救了。\n她注意到拍馬屁的幾個小嘍囉裡，有一人不動聲色地往前去了，暗忖那人應當是那清風寨大當家的人，隨元青知道他，才故意說的那番話？\n樊長玉心道這傢伙心眼子還真是多得跟藕孔一般。\n隨元青心口被一柄刀抵著，跟個沒事人一般帶著樊長玉走到了馬前，才微垂首壓低了嗓音問她：「你這刀抵著我，我沒法上馬可如何是好？」\n不管是他先上馬，還是樊長玉先上馬，樊長玉都不能再繼續劫持他。\n幾個小嘍囉只當是隨元青在調情，心痒痒地瞄了幾眼，又不敢造次，低聲說了兩句葷話笑著先往前邊去了。\n其中一名小嘍囉道：「這回可算是幹了票大的，回寨子後能好生歇一陣子了，上回大當家的帶著咱們去截殺那鏢師，找勞什子藏寶圖，結果竟然是假的……」\n樊長玉原本只集中精力應付隨元青，驟然聽見這麼一句，頓時渾身的血幾乎都在逆湧。\n截殺鏢師，藏寶圖……\n官府之前結案，可不就是說她爹娘因為藏寶圖死於山匪之手。\n這麼巧，她爹娘也是被這夥人殺的？\n她幾乎抑制不住渾身外洩的殺氣。\n隨元青見她不做聲，反而身上殺意陡增，頓時也警覺起來，以為樊長玉想在這裡將他一刀斃命後獨自駕馬逃走。\n他道：「在這裡殺我可不是什麼明智的選擇，除非你想獨自一人應對幾百人。」\n樊長玉握著刀把的手緊了緊，也知眼下不是意氣用事的時候，爹娘的仇，以後還有機會報，長寧和趙大娘她們還在枯井裡，把這些山匪引開才是緊要的。\n她稍作思量道：「把你身上的劍解下來給我，你先上馬，再拉我上去。」\n隨元青以為勸住了她，揚了揚嘴角，照做了。\n他側身去抓馬鞍的剎那，怎料樊長玉一手刀就向著他後頸砍去，隨元青上次已吃過虧，加上這次早有防備，在樊長玉掌風劈下時，他側身一躲避開，再出手如閃電截住了樊長玉那隻手，用力一挫，樊長玉當即悶哼一聲，只覺整條胳膊都軟了下來，心知定是脫臼了。\n隨元青看著她額角沁出的冷汗，慢條斯理道：「我不會在同一個地方栽兩次……」\n樊長玉一雙偏圓的杏眼死死盯著他，自有一股狠勁兒在裡邊。\n在隨元青拽著她脫臼的那隻手往他身前帶，欲捉住她另一隻手時，樊長玉直接朝著他腿間狠踢了一腳。\n這次輪到隨元青悶哼一聲，面色痛苦地矮身下去，咬牙道：「你……」\n他顯然沒料到樊長玉竟會使這等不入流的陰招。\n樊長玉才不管磊不磊落，在他矮身時，直接以手肘在他頸後狠擊了兩下，隨元青只覺眼前陣陣發黑，終究是踉蹌著倒了下去。\n這番動靜也引得走在前邊的幾個小嘍囉看了過來。\n幾人舉著火把，見樊長玉拎死狗一樣拎著暈過去的隨元青，皆是一呆。\n樊長玉來不及思索，趕緊拎著隨元青翻上了馬背。\n她倒是想直接在這裡一刀結果了他，但隨元青之前說的話的確有道理，她全盛時期都不一定能應付這夥山賊，現在一隻手已經脫臼，更加兇險，不如帶著這人，關鍵時刻還能拿他做人質保命。\n這一切只發生在瞬息之間，小嘍囉們終於反應過來，大叫道：「那女人劫持了五當家的！」\n一伙人舉著火把刀劍就要上前去攔樊長玉，奈何樊長玉已到了馬背上，用力一夾馬腹衝出巷子，小嘍囉們也怕命喪馬蹄之下，躲的躲，被撞到牆上被撞到了牆上，終是沒能攔住她。\n這邊的喧譁聲讓駕馬走在最前邊的疤臉男人也回頭看來，只瞧見沖天的火光裡，一匹矯健的大馬馱著兩人從巷子裡衝了出來，馬背上扯著韁繩的赫然是名女子。\n那女子顯然也瞧見了他，一怔之後，趕緊調轉馬頭，往長街相反的方向跑了。\n從巷子裡追出來的嘍囉們大喊大叫：「五當家在那女人馬上！」\n疤臉男人回想起之前見隨元青時，那女人始終一副沒骨頭的樣子靠在他懷裡，哪像是良家女子該有的樣子，頓時覺出不對勁兒來，策馬追了上去，「攔下那女人！」\n樊長玉引著一群人追出了臨安鎮十幾裡地，那夥山匪裡有擅騎射的，一路都在朝著她放冷箭，樊長玉索性把暈過去的隨元青放到馬後，拿他當肉盾，放箭的山匪有所忌憚，射出的箭鏃這才沒傷到她。\n但她座下的馬匹馱著兩個人，跑得不如身後那群騎馬的山匪快，時間越長，追上來的山匪們咬得越緊，官道後方滾滾而來的馬蹄聲幾乎和樊長玉心跳合成一個節拍。\n樊長玉估摸著趙大娘她們已經帶著長寧逃出臨安鎮了，到前方的山彎時，只要讓這馬一直往前跑，引著山匪繼續追，自己跳馬就能暫時躲過他們的追殺了。\n她看了一眼身後當肉盾的人，想到那日清平縣的動亂和今夜無辜慘死的那些人，拔出了腰間的剔骨刀。\n只是還不及將刀刺下，在馬背上顛簸了一路的人恰好在此時醒來，瞧見眼前的寒光，出於本能用力折住了樊長玉那隻手。\n有叫他卸一條胳膊的教訓在前，這次樊長玉反應極快，借著他的力道往後一倒，手肘重重撞在他胸前的傷口處。\n隨元青吃痛鬆開了扼住她手腕的大掌，樊長玉反手再刺時，他已不及躲避，便一腳踢向樊長玉踩著馬鐙的膝彎。\n樊長玉身體失衡就要摔下馬去，那一刀也轉了方向刺向了馬臀。\n樊長玉摔下馬時，正好馬兒吃痛一聲嘶鳴，繼而瘋了一般狂奔起來。\n隨元青才躲過一刀，就險些被甩下馬去，以這時候馬瘋跑的速度摔下去，不死也得摔得缺胳膊少腿，他只得暗罵一聲，先抓緊韁繩將自己穩在了馬背上。\n地上鋪著一尺來厚的積雪，樊長玉落地後連滾好幾圈才卸掉力道，沒添旁的傷，但脫臼的手在翻滾時被壓到，鑽心一般疼，她腳上的鞋子也在摔下馬時，叫馬鐙給刮掉了。\n樊長玉顧不上冷也顧不上痛，趕緊爬起來撿起鞋子擲向官道下方的河岸邊，自己則一頭扎進了官道裡側積雪的密林裡。\n很快那雷鳴般的馬蹄聲就逼近了，壓根沒停地朝著狂奔的那匹馬追去。\n大雪還在紛紛揚揚地下，樊長玉緩緩吐出一口濁氣。\n她把那隻鞋子扔到河邊，是為了讓山匪往回追時，誤以為她從河裡逃了。\n她自己往松林深處走去，雪天是最不利躲藏的，走過的地方都會在雪地裡留下腳印，好在這是晚上，不打著火把看，輕易發現不了這些足跡。\n饒是如此，樊長玉還是折了一根松枝，把雪地上的腳印都掃平。\n這會兒雪大，她把足跡掃平了，那些痕跡很快就能叫飛雪蓋下去。\n處理完進林子的那段腳印後，樊長玉才棄了松枝，靠著天上的北鬥星辨別方向往前走。\n她一隻腳沒了鞋，只套著毛氈襪深一腳淺一腳地在雪地裡走，毛氈襪很快叫雪水浸溼，刺骨的寒意從腳心傳來，整條腿都快被凍得沒知覺，讓她嘴唇發白，止不住地哆嗦。\n但樊長玉卻一刻也不敢停。\n長寧還在等她。\n-\n一隊斥侯行至清平縣地界，遠遠地瞧見整個縣城火光滔天，皆是一驚。\n訓練有素的斥侯兵下了馬，正欲刺探敵情，就見崎嶇小道上，有十幾名老弱婦孺互相攙扶著往這邊走來……\n……\n盧城。\n天明時分，一騎流星馬便駛向了燕州大營。\n「整個清平縣都被屠了？」\n中軍帳內，公孫鄞一向溫雅平和的臉上難得出現了嚴峻之色。\n連夜趕回來報信的斥候低下了頭：「我等奉先生之命前去清平縣時，那已是座死城了，去查探緣由時，才意外碰上有幾戶活著的人家。」\n公孫鄞忙問：「他們現安置在何處？」\n斥侯答：「屬下先行回來復命，餘下人馬護著那十幾個活口去了薊州府。」\n公孫鄞負手在帳內走了一圈，問：「那姓樊的屠戶女可在其中？」\n斥侯道：「並未，不過她幼妹在。那活下來的十幾人說，是那名屠戶女將她們藏在了家中的地窖裡，託付她們幫忙照顧她幼妹。山匪發現地窖裡藏了人後，那屠戶女不知用的何法子引走了山匪，那些人出來後，並未找到那屠戶女的屍首，想來是叫山匪帶回了山寨。」\n公孫鄞沒見過樊長玉，但此刻聽屬下說，樊長玉為了保護那些人叫山匪抓走，旁的不說，單是這份氣魄和大義便不輸男兒。\n他揮退了斥侯，又換來親兵：「侯爺現在何處？」\n親衛抱拳道：「侯爺一早便巡視河谷地形去了。」\n公孫鄞當然知道謝徵為何會突然去巡視河谷，錦州和徽州的糧道指望著崇州，但薊州還有一條水路可運糧，只是入冬以來江河水位下降，才無法航運，等到開春後，這條航道便能重新啟用。\n若是薊州也失，他們當真就被長信王掐住了七寸。\n要守住薊州，盧城這道屏障便不可失。\n他和謝徵商議過，應對長信王這五萬大軍最有效的法子，莫過於藉助開春後的那場春洪。\n公孫鄞道：「即刻派人去尋侯爺！」\n他話音方落，帳外便有親兵喚了一聲：「侯爺。」\n公孫鄞正焦頭爛額，聞聲忙快步迎了出去。\n天光破曉，帳外走來的人一身玄色戎甲，肩吞和披風上沾著細雪和晨霜，眉眼冷厲，俊美無儔的臉上也帶著霜雪的寒意，叫人不敢逼視。\n公孫鄞見了他便開門見山道：「清平縣像是被人尋仇了，整個縣城都被屠了。」\n謝徵解下披風的動作一頓，「何時的事？」\n公孫鄞道：「斥侯剛送回來的消息，說是山匪的手筆，臨安鎮上那姓樊的屠戶女，也叫山匪抓了去。我琢磨著不太對勁兒，長信王世子迄今沒尋到蹤跡，這會不會是他的報復？」\n謝徵提了劍架上的一柄佩劍就往外走：「備馬，點一百輕騎隨我去清平縣！」\n-\n一直到天明，樊長玉才走到了大路上，山匪早就被她甩得無影無蹤。\n她赤著一隻腳在雪地裡走了半晚上，此刻精疲力盡，不知是不是感染了風寒的緣故，頭也一陣陣地發疼。\n樊長玉在心底把隨元青問候了千百遍，心道下次再見非取他狗命不可。\n薊州府在清平縣以南，趙大娘她們離開清平縣後，肯定會去薊州府報官，她也往薊州府去，總能遇上趙大娘她們的。\n聽見遠處傳來車轆聲，樊長玉心知山匪劫道要麼是一群人埋伏蹲點，要麼是騎馬，不可能只有一輛馬車，便也沒規避。\n待那馬車駛來時，她瞥了一眼，發現那馬車看著雖不華麗，但車輪比一般馬車似乎都大上一圈，行駛在雪地裡很是平穩，車轅瞧著也結實，用的篷布是樊長玉沒見過的厚實料子。\n樊長玉猜測這應該是什麼大戶人家才有的馬車，只看了一眼，就垂首繼續走自己的路。\n那車夫看見樊長玉一隻腳沒穿鞋，倒是同車內人道了句：「那小娘子當真是不畏寒，大雪天的竟然不穿鞋在路上走。」\n一隻白皙修長的手打起了厚重的車簾，淺色的眸子裡映出這官道上的山川雪色和那赤足行走的女子，道：「想來是遭了什麼意外，問她家住何處，捎她一程。」\n男子都發話了，車夫不敢不應，停下馬車後衝樊長玉喊道：「小娘子，你家住何處？我家郎君憐你雪天趕路不易，願意捎帶你一程。」\n樊長玉知道自己這會兒的身體狀況不太樂觀，脫臼的手沒能及時處理已經腫了起來，那隻沒穿鞋的腳，更是冷痛到沒有知覺。\n她沒逞強，道：「我想去薊州府衙。」\n去報官。\n車夫道：「這倒是同咱們順路了，上來吧。」\n樊長玉向對方道謝後，便上了對方的馬車。\n車簾掀開的瞬間，裡邊的暖意撲面而來。\n坐榻上看書的青年，一襲雪青色的袍子，沒有任何花紋繡樣，卻透出幾分「大道至簡」的意境來。\n第一眼瞧見這人，樊長玉便覺著他當真是個讀書人。\n不同於宋硯的自命清高，也不同於言正的散漫和狷狂，他眉眼間都攜著一股溫潤平和，像是冰天雪地裡突然照下來的一抹暖陽，莫名讓人覺著親近。\n青年見樊長玉望著自己發愣，也沒流露出什麼不耐或是譏誚的神色，只禮貌地衝她微微一頷首，見她衣襟發梢上都全是雪，把炭爐子往她這邊推了推，又遞來一件不知什麼材質但摸上去觸感極軟的披風。\n「姑娘鞋襪都溼透了，且烤烤吧。」\n樊長玉知道自己此刻有多狼狽，這車中的擺設看著簡樸，但又有一股她形容不出來的講究，她儘量只坐靠近車門的那一塊地方，搖頭道：「多謝公子，我不冷。」\n她頭上和眼睫上的霜雪叫車內的暖意融化了，結成細小的水珠子掛在上邊，像是一頭從清晨的山林裡鑽出來，沾了滿身晨露的小豹子。\n失了攻擊性，倒顯出幾分茫然的憨態和可憐來。\n青年以為她是介意自己在車廂內，合上書，和煦笑了笑：「在馬車裡坐久了有些悶，我去外邊透透氣。」\n他說著便撩開車簾和外邊的車夫坐一塊去了。\n樊長玉望著晃動的厚重車簾微愣了一瞬。\n炭爐子的暖意讓她凍久了的手腳終於有了些知覺，樊長玉還是沒要那件披風，疊放起來放到坐榻上。\n只借炭爐子烘烤被融化的雪水浸溼             content: `今日的天氣委實算不得好,細雪一直未停，江水邊緣都浮著一層細碎的薄冰。\n樊長玉剛一竹篙掃落扒著船舷的山匪，身後的青年忽而大叫一聲,樊長玉回頭就見一個山匪抓住了他一隻腳，正使勁兒把他往水裡拖。\n船尾又有山匪扒拉上了，正要往上爬，樊長玉分身乏術,咬了咬牙，一腳踹掉船尾的水匪，反手一竹篙捅過去，拽著青年腳踝的山匪不及吸氣就被她杵到水裡，冰寒的江水灌入口鼻,山匪被嗆了個半死。\n青年趕緊撲騰著爬起來，他半隻腳都被拽下了水,此刻褲腿和鞋襪溼透,刺骨的寒意讓他嘴唇發白,卻仍記著向樊長玉道謝：「多謝姑娘……」\n他眼神忽而一變,大喝：「小心！」\n樊長玉下意識將竹篙往身後一擋,從水底躍起的疤臉男人,手握一柄大刀狠狠向她砍來,樊長玉手中的竹篙直接叫他削成了兩截。\n眼見刀鋒就要逼到眼前，躲是來不及了,樊長玉只能往後仰儘量避開要害處，順帶將削斷的竹篙尖銳的那一端刺了出去。\n本是死也要拉一個墊背的,手中的竹矛的確刺中那疤臉男人了,那要落到她左肩的那一刀卻沒能劈下來。\n耳邊傳來尖銳的破空風聲,帶著萬鈞之力的箭鏃幾乎是卷著她鬢髮飛過,樊長玉甚至覺著那氣流颳得自己臉頰生疼。\n「叮——」\n一聲叫人牙酸的金屬脆響，那支箭直直撞向了疤臉男人手中的大刀，火星迸射，箭鏃在那強悍的碰撞力道裡粉碎開來，疤臉男人手中的鋼刀也像碎冰一般，一塊塊裂開。\n隨後而至的數箭也紛紛落到了扒拉著船舷的山匪身上。\n在場人具是一驚。\n疤臉男人反應極快，當即拔出身上短刃削斷了刺入他體內的那截尖竹，整個人遁入了水中，不再留在船上當活靶子。\n樊長玉朝著箭鏃飛來的方向看去，只瞧見一隊挽著大弓的騎兵呼嘯而至，馬背上的官兵都著一樣的厚甲，一時間也分不清震碎了疤臉男人鋼刀的那一箭是誰放的。\n她只當是薊州府那邊知曉了清平縣的慘案，出兵前來剿匪了，心底大鬆一口氣。\n山匪中大多都是烏合之眾，拿著刀劍尚能比劃幾下，面對能騎擅射的剿匪官兵，他們只能抱頭鼠竄。\n箭鏃如飛蝗落向水面，山匪們又密密麻麻擠在一起，很快便哀嚎聲四起，江面也暈開了血色。\n眼見不能上岸，江水又寒意浸骨，一群擅水的山匪幹脆在水下推著樊長玉所在的那條船往江心去。\n樊長玉發現腳下的木船離渡口越來越遠時，頓覺大事不妙。\n一旦遠離了弓箭的射程，船上又只有她一人，應對這群窮途末路的山匪只怕更加吃力。\n而且江心水流湍急，幾乎不用劃漿，船就被水流帶著飛速往下遊去了。\n岸上的官兵顯然也發現了這一點，已經停止了放箭，一些會水的官兵解開身上的厚甲，潛入了江水中。\n把木船推得遠離渡口的山匪們此刻從水下冒出了頭，要再次奪船，樊長玉顧不上那青年，拎起他衣領，說一聲：「得罪了！」\n隨即用力往下水的官兵那邊拋去。\n青年大驚失色，只來得及喚一句「姑娘」，整個人拋出一道遠弧後，便落入了水中。\n他顯然是個不會水的，半晌才撲騰起來，死命拍打著冰寒刺骨的江水，大喊救命。\n遊過去的官兵費了些力氣才避開他雙手，抓住他後頸把人往岸上拖。\n謝徵在岸上看著這一幕，唇角抿得死緊，手中的大弓再次搭弦，親衛想說船飄出太遠，這已遠遠超過弓箭的射程了，下一瞬，卻見一支支白羽箭爆裂般自他弓弦間飛出，而遠處挨著船隻的江面，一具具屍體慢慢浮了上來。\n岸邊的旱鴨子騎兵們先是一愣，隨即爆出陣陣喝彩聲。\n謝徵臉上卻仍是一片冷意。\n船已到了江心，被水流帶著往下遊去，弓箭壓根射不到躲在船下的那些山匪了。\n被救上來青年臉色凍得青白，渾身溼透躺在地上吐了好幾口水，緩過勁兒來後，第一件事便是對周圍的官兵道：「快救救船上那位姑娘！」\n謝徵冷冷掃了他一眼，一扯韁繩往沿江的官道飛馳而去。\n親兵們反應過來他是要走陸路去追那隻船，趕緊也駕馬跟了上去。\n-\n樊長玉手持半截削斷的竹篙立在船上，將最後一名試圖爬上來的山匪戳下去後，江面一時平靜了下來，似乎躲在木船底下的山匪都已死了。\n她不敢託大，警惕地觀察了一陣江面後，確定只有水流的波痕，才去船頭拿起木漿，打算往岸邊劃。\n她剛搖了兩下槳，不妨水下突然朝她掀來一大片水花，緊跟著一名山匪冒了出來，樊長玉一驚，順勢就拿船槳去拍。\n怎料那名山匪本就是個死人，疤臉男人趁她拍那名死去的山匪之際，貼著船舷躍起，以匕首劃樊長玉脖子，樊長玉側身躲過，胳膊卻還是叫他用匕首拉出長長一道口子。\n疼痛讓樊長玉悶哼一聲，手上的船槳反手一輪，船槳手把杵在了疤臉男人先前被竹篙刺傷的地方。\n疤臉男人雖成功上了船，卻也因腹部的傷口再次受創而踉蹌著後退一步，跌坐在了木船上，額角的青筋都因疼痛而凸起一條。\n樊長玉拔出剔骨刀就朝他刺去，疤臉男人瞳孔一縮，狼狽翻滾躲開後，避到了船尾，同樊長玉打商量：「女俠，你我都不想死在這江中，葬身魚腹，與其兩敗俱傷纏鬥下去，不如暫且握手言和，有什麼恩，什麼怨，來日再報如何？」\n樊長玉貌似真的仔細想了想，最終收起了刀，說：「好啊。」\n疤臉男人似乎鬆了一口氣，卻仍只在船尾，半點不敢放鬆警惕。\n行過了那一段激流，江水平緩下來，船的速度也慢了下來，已經能瞧見岸上追來的那隊騎兵。\n謝徵一馬當先跑在最前邊，官道地勢高，他看了一眼從官道江邊到江心船隻的距離，用力抽了坐下戰馬兩鞭，戰馬一騎絕塵將親衛都甩在了後邊，跑過江上那隻船一段距離後，他才棄了戰馬，幾乎是一路疾步往江邊走一邊解下身上的戰甲，赤膊躍入了江水中。\n船是順著水流一直往前的，他橫遊去江心，必須往前跑一段距離，才能在橫遊到江心時截住那船。\n船上，疤臉男人只注意到後續追來的騎兵，面上露出焦急之色，樊長玉十分善解人意地道：「要不我把槳給你，你自己劃如何？」\n疤臉男人遲疑點了頭。\n樊長玉拿起船頭的船漿就扔了過去，與此同時，剔骨刀也擲了過去，她自己則操起那截被削得只剩兩尺來長的竹篙刺向疤臉男人。\n三重攻勢下，疤臉男人根本躲閃不及，只能儘量避開直取他咽喉的剔骨刀，再伸手去截樊長玉刺去的尖竹，船槳迎面砸到他臉上，鼻根都險些被砸斷，鼻血也流了出來。\n他卻沒料到，樊長玉手中那根竹篙也是個幌子。\n樊長玉是忍著鑽心的痛用脫臼的那隻手拿起的竹篙，她之前就試著把自己的手接回去，但她畢竟不是大夫，又是頭一回受這麼重的傷，樊長玉也摸不準接骨的位置。\n把手骨往上送後，眼下左臂雖能動了，可每動一下都裂骨一般疼，自然也使不上勁兒。\n在疤臉男人截住竹篙時，樊長玉右手直接拽著他頭髮把人摁進了水裡，那一瞬她的眼神是發狠的。\n疤臉男人死命撲騰，奈何摁在他腦後的那隻手力道大得出奇，愣是沒能讓他撲騰起來。\n冰冷的江水灌入口鼻，幾乎要嗆進肺裡。\n疤臉男人掙扎都弱下去了，樊長玉才拽著他頭髮把人短暫拎起來，疤臉男人嗆得直咳嗽，不復威風，求饒道：「女俠，你且饒我一命，往後我給女俠做牛做馬……」\n樊長玉想起那掛滿白布的靈堂和棺木裡爹娘的屍體，眼神冰冷，再次把人摁進了江水裡，片刻後才拎起來，帶著恨意道：「你是不是為了藏寶圖截殺過一個金盆洗手的鏢師？」\n疤臉男人以為她是求財，連忙交代：「那藏寶圖是假的，真的藏寶圖已在長信王手中，不過我經營清風寨多年，並不止清風寨一個落腳處，我所有的銀子都藏到了別處，女俠且留我一命，我將所有財寶都交給女俠……」\n樊長玉冷聲道：「你這惡貫滿盈的人也配活？昨夜清平縣死了多少人？我且問你，那鏢師是不是你殺的？」\n疤臉男人混跡江湖多年，聽出樊長玉這是尋仇的語氣，忙道：「不是我殺的，是老三下的手。」\n仇人就在眼前，樊長玉渾身的血都在逆湧，她拽著疤臉男人頭髮的手力道大得骨節泛白：「你們山寨三當家殺的？」\n疤臉男人忙道：「是是是。」\n樊長玉喝道：「都是一丘之貉，我先宰了你，回頭再殺你們山寨三當家替我爹娘報仇！」\n疤臉男人大喊：「你是馬泰元的女兒？馬泰元是個閹人，怎麼可能有後人？」\n樊長玉一愣：「馬泰元是誰？」\n疤臉男人道：「四海鏢局的總鏢師，當年便是他責押送藏寶圖的，女俠稍微打聽一下便該知曉他的名諱。」\n他頓了頓，又道：「女俠莫不是尋錯了仇？」\n官府明明說的自己爹才是當年押送藏寶圖的人，怎地變成了馬泰元？\n樊長玉心中疑團萬千，喝問：「去年十一月死於清平縣虎岔口的那對樊姓夫妻，不是你們清風寨的人殺的？」\n疤臉男人連連叫屈：「弟兄們在清平縣幹的唯一一票，便是昨夜那場，在此之前沒來清平縣殺過人。」\n樊長玉疑心他為了活命哄騙自己，把人重新摁進江水裡：「說實話！」\n疤臉男人撲騰得半條命都快沒了，再次被提起來時臉色青紫，叫冷澀的江水激得眼都睜不開，只喊道：「我說的當真是實話，去年十一月寨子裡正同黑龍寨較勁兒，沒外出劫道，女俠不信可以去道上打聽的。」\n樊長玉這下心中是當真茫然起來，這麼說來，當初幾番殺到自己家的那波赫衣人也不是山匪？\n樊長玉已經真正和這波山匪交過手，再回想起當日那些黑衣人的功夫，雖然不願承認，可那些黑衣人個個武功高強，的確不像是普通山匪。\n那爹娘的死因到底是什麼？\n風寒和大起大落的情緒刺激著樊長玉，讓她頭炸裂般疼了起來。\n她抓著疤臉男人的手也鬆了幾分，疤臉男人趁機往後伸出雙手，扯住樊長玉雙臂就往江水裡拽。\n樊長玉脫臼的左臂碰一下就鑽心地疼，加上這一時大意，真叫疤臉男人掀進了江水中，猝不及防地嗆了一口水。\n疤臉男人被樊長玉折辱了半天，竟也沒急著要樊長玉性命，而是面色猙獰按著樊長玉的頭讓她沉到水底，在樊長玉快掙扎不動時再將她提起來，如此反覆。\n「臭娘們！剛才摁老子進水裡的那股勁兒呢？怎麼不掙扎了？」\n他臉上全是報復的快意。\n樊長玉實在是沒力氣了，極度缺氧讓她顧不得是在水下也努力呼吸，口鼻裡呼出一大串氣泡，冷水灌入胸腔，刺痛得厲害。\n眼眶也澀疼，她知道自己可能就要死在這裡了。\n可是長寧怎麼辦啊？\n長寧……\n失去意識的前一秒，樊長玉似乎聽到什麼東西骨節錯位的「咔嚓」聲，隨即拽著自己頭髮的那隻手驟然鬆開了，唇上貼來一片溫軟，對於一個即將死在冰冷江水裡的人來說，那點溫暖，仿佛是這人世最後的慰藉。\n她最終沉沉閉上了眼。\n謝徵給樊長玉渡了一口氣後，趕緊抱著她浮出水面，疤臉男人的屍首橫飄在不遠處，腦袋生生叫人給擰了半圈，脖子詭異扭曲著，到死都沒能合上的眼底滿是驚恐。\n趕來的親衛見謝徵竟然親自下水去救人了，連忙也踩著水過去幫忙。\n謝徵已帶著樊長玉遊到了淺水區，一言不發抱著她往岸上走，臉上是從未有過的陰沉，往下淌著水珠的手臂青筋凸起，周身的戾氣壓得人難以喘息。\n捧著衣物上前的親兵本想喚他，都下意識禁了聲，想起他一貫不讓女子近身，才道：「侯爺，我來抱這位姑娘吧。」\n謝徵卻直接無視了親兵伸出的手，只扯過自己的披風裹住渾身溼透的樊長玉，抱起她繼續往前走。\n親兵和幾個同伴愣在當場，尚未回過神來，便聽得他冷戾道：「把那匪首的屍體帶回去，鞭屍。」\n饒是戰場上砍人如切瓜的親兵們，聽到這句，脊骨也竄起一股寒意。`
        },

            title: `第60章第60章`,
            content: `上岸後,謝徵便將樊長玉暫且放了下來，抬手扣住她脈門時，瞥見裹在她袖口的那對鹿皮護腕,目光多停留了一瞬。\n視線下移，落到她腫得不成樣子的左手，本就抿緊的薄唇，這會兒更是快抿成一條直線。\n從前被魏府的死士追殺她都沒受這麼重的傷,這會兒遇上山匪倒是狼狽成這樣。\n他抬手替她解下了那隻手的護腕後，凝神開始把脈。\n但指尖探到的脈搏委實微弱得可憐，懷中這具身體也冷得跟冰塊無異，幾乎不像個活人了。\n血腥味充斥著謝徵的感官，讓他眉頭緊緊皺起。\n她不該是這樣的。\n印象裡她身上無論何時都該是暖烘烘的。\n但此刻這具冰冷的身體,像是在告訴謝徵，她的生命正在一點點消逝。\n胸腔裡交織著莫名的情緒,突來的心慌讓他渾身不適,暴戾得想殺人。\n謝徵垂眸看著樊長玉緊閉的雙眼,她渾身都溼透了,手臉都因凍得太久而泛起了青紫色,身上穿著溼衣,裹上去的那件披風壓根沒法給她帶去多少暖意。\n她太冷了,必須儘快給她取暖。\n謝徵掃了自己的親兵們一眼，沉聲道：「將我的衣物留下,退到十丈開外背過身去。」\n親兵們先是面面相覷，意識到謝徵要做什麼後,眼底閃過驚異之色,卻還是很快照做。\n親兵們都退開後,謝徵看了一眼樊長玉青紫的臉色,指尖伸到她領口時，微頓了一下，解下她的髮帶蒙住自己雙眼後，才替她剝去了身上溼冷的衣物，又摸索著拿起一旁自己下水前脫下的乾爽衣物給她裹上。\n因為看不見，指尖的觸感變得格外明顯，把樊長玉裹嚴實後，謝徵扯下蒙在眼前的髮帶時，鼻尖都冒出了些許細汗。\n他沉默著捏起樊長玉左臂，換衣服前他就發覺樊長玉的左臂脫臼了，後來一摸索，才發現接骨的位置不對。\n傷成這樣都還要護著那書生，當真是一點不怕自己死在山匪手裡麼？\n說不清心底是個什麼滋味。\n但有一刻他恨恨地想著，她就是死了又同他何幹？\n一推一松重新給她接骨的動作，卻是極力放輕了力道的。\n謝徵臉色有些難看，把手骨接回原位後，喚親兵去尋根木棍，暫且綁在樊長玉手上給她固定住。\n親兵還是頭一回瞧見他這般對待一個女子，一時也拿不準謝徵的意思，在謝徵給樊長玉暫時處理好所有傷口後，問道：「侯爺，那咱們現在是去薊州府嗎？」\n謝徵看了一眼臉色依舊青紫的樊長玉，終是把人打橫抱起朝戰馬走去，「先找一戶人家落腳。」\n他的衣物已全裹在了樊長玉身上，迎面刮來的江風刀子一樣，他赤著上半身，額前的碎發還往下滴落著水珠，卻連寒顫都沒打一個，身上肌理結實，塊壘分明，精瘦卻不顯單薄，蓄滿了力量。\n親兵們眼瞧著自家侯爺赤膊抱著那裹得嚴嚴實實的女子上了馬，顧不上驚愕，也紛紛駕馬跟了上去。\n馬背顛簸，謝徵避開樊長玉脫臼的那隻手，小心地把人護在懷裡，感受著靠在自己胸膛的那團重量，他握著韁繩的手緊了幾分。\n他垂眸看了一眼樊長玉了無生氣的側臉，冷聲道：「你最好是活著，不然你以為誰會替你照顧那小拖油瓶？」\n耳邊除了風聲再沒有別的聲響，他抿起唇角，用力把人箍進了自己懷裡。\n跟著謝徵的這一百輕騎，個個都是斥侯出身，很快就在這山野裡找到了一戶人家，不過是個獨居的瞎眼老嫗。\n謝徵怕打擾到老嫗，只帶了幾個親衛前去，民間百姓都怕官兵，他們假稱是路過此地的商人，給了老嫗幾兩銀子，借用了一間臥房和廚房。\n幾個親兵去灶上燒水的燒水，跟老嫗打聽附近哪裡有大夫後，去請大夫的去請大夫。\n老嫗原本聽他們幾個大男人帶著一個昏迷不醒的女子，還有些擔心是拐賣女子的，聽著這些動靜，倒是安下了心來。\n人販子對拐賣來的女子可不會這般上心。\n她找了幾身自己兒媳的衣物送去房裡，問：「這位娘子好好的，怎麼落了水？」\n不大的屋子裡燒了三個火盆子，謝徵赤著上身都慢慢熱出了汗來，床上陷在被褥間的樊長玉身體卻還是冷冰冰的。\n老嫗家中並沒有浴盆，他沒法讓樊長玉泡在熱水裡快速幫她恢復體溫，只能用從熱水裡擰起來的帕子給她熱敷擦拭凍僵的身體。\n謝徵將冷卻的帕子放進熱水盆裡，重新擰起來給她裹在手上後才道：「路上遇到山匪劫船，逃命時跳水裡受了寒。」\n「這可真是作孽哦……」老嫗一聽是遭了山匪，話語裡不免帶了幾分憐憫。\n她把找出來的衣物遞過去：「這是我兒媳的衣裳，回頭給你娘子換上吧。」\n謝徵道了謝。\n老嫗又道：「這麼冷的天從江裡逃上來的，那你身上的衣裳應當也溼了，我再給你找一身我兒子的來。」\n老嫗離去後，謝徵看著躺在簡陋木床上的樊長玉，枯坐了一會兒，意外地發現她臉上的青紫退了些，卻又蒸起一片紅暈。\n他抬手往她額前一探，不出意料地燒起來了，掌下的皮膚下滾燙得像巖漿。\n謝徵擰起眉頭，將搭在她手上的帕子取下來，重新浸過熱水給她敷額頭。\n等到親衛帶著大夫趕回來時，樊長玉臉上已燒得通紅。\n大夫在馬背上被顛得半條命都快沒了，好不容易停下來，氣都還沒喘勻就被塞到這屋子裡把脈。\n若是旁人大夫還敢發幾句脾氣，面對一群軍漢，則半點氣性也沒了，只圖看完病還有命活著回去。\n進了屋發現看病的是名女子，大夫心中雖驚疑，卻也沒敢多問什麼，把脈時，本就皺巴巴的眉頭越擰越擰，道：「這是邪寒入體了，怎地拖成了這樣才請大夫？身子骨差些的，怕是熬不過來了。」\n他話音剛落，便覺著一道冷沉的視線落到了自己身上。\n大夫望著屋內那大雪天赤膊的俊美男子，被他看得心裡直突突，忙道：「也不是沒得救，不過光服藥肯定是不行的，得給她刮痧活血，疏通經脈，先把體內的風寒散一散，再服藥才事半功倍。」\n刮痧祛風寒的法子謝徵是聽說過的，軍中將士常用這土方子，雖說疼了些，有時候卻比一副藥還管用。\n他看向床上燒得嘴皮都乾裂開的樊長玉，沉默片刻後道：「我知曉了。」\n大夫被帶去廚房煎藥，謝徵讓親兵又送來了一盆溫水。\n這裡除了那老嫗，都是男子，偏偏那老嫗眼睛又看不見，而刮痧需要肉眼判斷出痧泛紅的程度，只能由他來。\n謝徵將一枚銅板浸入溫水裡，看著樊長玉燒得坨紅的臉，道：「你醒來估計又要說我乘人之危。」\n沒人回應他。\n刮痧是刮後背，樊長玉左臂脫臼綁了木條，沒法趴著。\n他撿了件老嫗兒子的衣裳隨意套在身上，走到床前將人扶坐起來，讓樊長玉後背靠著自己，垂眼將臉側做一邊，摸索著去解她身前的衣帶。\n系帶一松，本就不合身的寬大衣袍直接垂落至兩臂。\n謝徵從水盆裡撿起那枚銅板，將樊長玉披散的長髮全捋到她身前去，本是心無旁騖，可真正看到那線條勻稱緊實的光潔背部，他呼吸還是淺淺一窒。\n不同於男子筋骨強勁，也不同於從前在慶功宴上看到那些舞姬酥軟無骨，那緊實的肌理繃成的纖細腰線，纖瘦卻又帶著力量與韌性的美。\n被凍得青紫的皮膚在恢復暖意後，變成了冷白。\n之前怕她被凍到，謝徵給她換衣時，把她溼透的兜衣也一併解了，此刻她因昏沉而半垂著腦袋，露出白皙而脆弱的脖頸，除了從一側垂落至她前肩的烏髮，再無一遮蔽物。\n那垂落在她腰線之下半遮半掩的裡衣，也是他的……\n這個認知讓謝徵腦子裡有什麼東西轟一聲炸開，指尖的銅板突然變得滾燙灼人。\n他狠狠皺了皺眉，別開眼緩了幾息後，才將所有注意力都集中到了手中的銅板上，從她雪白的背脊刮下。\n刮第一道的時候，樊長玉背上只泛起一層淺紅，第二次刮下來，痧紅明顯加重了，一直刮到那痧紅變成了深紅色，謝徵才開始刮下一處。\n樊長玉風寒很重，刮痧時全程昏沉著，半點知覺沒有，全靠謝徵一隻手扶著她才能坐穩。\n等刮完痧，她整個後背已不能看了，遍布紫紅的痧疤，卻又有一股凌虐的美感。\n謝徵指尖燙得厲害，額前和鼻尖都出了些細密的汗珠，他將銅板扔進水盆後，幾乎是趕緊扯了一件衣服胡亂將樊長玉包起來，把人放進被子裡便奪門而出。\n寒風和細雪撲面而來，總算是把那股熱意降了下去。\n親兵端著煎好的藥送過來時，就見他抱臂靠著屋簷下的木柱，似在望著那道房門發呆，竟連自己的腳步聲都沒聽見。\n親兵只得輕咳一聲：「侯……主子，藥煎好了。」\n謝徵回神瞥他一眼，抬手端過了他手中的藥碗。\n親兵正想識趣地退下時，卻聽得自家一向鐵面無情的侯爺問了句：「在民間，這樣得娶人家姑娘了是不是？」\n親兵愣了愣，隨即反應過來謝徵說的是他自己和屋內那女子。\n親兵心說這放在哪兒都得對人家姑娘負責吧，看自家侯爺這般反常，也不像是對那女子無意的樣子，怎還問出了這番話來？\n他只得如實道：「自然是要的。」\n不待謝徵再說什麼，一名駐守在幾裡地外的斥侯疾步進院來報：「主子，薊州府的官兵沿河道搜尋過來了。」\n謝徵眼皮微抬：「他們也在找清風寨匪首？」\n斥侯看了一眼謝徵，小心翼翼道：「貌似是在找屋內那位姑娘，先前從江裡救上來的那書生是李太傅之孫，眼下正跟著薊州府的官兵們一起在找人。」\n謝徵嘴角冷冷挑起，李太傅派了孫子李懷安來薊州的事他是知曉的。\n魏宣徵糧惹出這麼大的禍，無疑是給了一向跟魏黨不對付的李太傅把柄，從前西北之地全由魏嚴把控，經過這事，李太傅一黨在朝堂上就差同魏嚴打起來，總算送了個清流一黨的人過來。\n美名曰是協助西北戰局，本質上還不是為了爭權。\n李懷安來了薊州，李太傅一黨在整個被魏嚴把控住的西北就有了一雙眼睛。\n只是沒想到，此人也同樊長玉扯上了瓜葛。\n是巧合，還是李太傅一黨也得到了什麼消息，在試圖探尋樊家背後的秘密？\n謝徵垂眼看著手中熱氣繚繞的湯藥，語調散漫卻透著冷意：「守住山口，別放人進來。」\n斥侯領命離去後，他端著藥碗進了屋。\n房內，樊長玉安靜睡在被褥間，臉上因發燒蒸起的紅霞還沒褪盡，瞧著倒也有了幾分血色。\n謝徵坐在床邊看了她一會兒，道：「早就說過你眼光不好。」\n樊長玉颳了痧，身上也暖起來了，這會兒睡得正沉，不可能回答他。\n只是餵藥也變得極為麻煩，他強行捏開她嘴角給她灌進去，幾乎流出來了大半，他嫌棄地用一旁不知是誰的衣物給她擦了擦，卻仍舊耐心地一點點給她餵完了剩下的藥。\n火盆裡的木柴燃燒發出細微的「噼啪」聲，火光映在他刀削般的側顏上，他用指腹拂去樊長玉嘴角殘留的一點藥汁，垂眼沉默地看了她好一陣後，忽而道：「樊長玉，我娶你。」\n「你不說話，我就當你答應了。」`
        },

            num: 61,
            title: `第61章第61章`,
            content: `樊長玉睡得並不安穩,夜裡又燒了一次。\n她渾渾噩噩陷在了夢魘裡，眼前是白茫茫的雪原，飛雪大片大片落下。\n她穿著單薄的衣衫赤足在雪地裡奔跑,腳都快凍得失去知覺了,卻不敢停下。\n樊長玉一開始不知道自己在追趕什麼，直到看到遠處的雪地裡一對攜手往前走的夫妻時，她終於知道自己為何這般著急了。\n是爹和娘啊！\n她更用力地往前跑,心口酸漲得澀疼，眼眶也瞬間湧上熱意：「爹,娘！」\n前方那兩道身影明明走得不快,可她就是無論如何也追不上，她急得不行,幾乎快落下淚來。\n雪地裡的女人終於回過頭來，臉上依舊是記憶中溫柔的神情,對她道：「長玉乖，回去。」\n樊長玉不知自己為什麼難過成這樣，眼淚流出來的時候，心口一抽一抽地疼,她無措地問：「你們去哪兒？」\n女人沒有回答她，只轉過頭和男人一起繼續往前走了。\n樊長玉怔在原地,感覺自己像是忘了什麼，胸腔裡窒疼得厲害,口鼻呼吸也格外艱難，仿佛是溺在了水中。\n謝徵打了盆溫水準備給她降熱時,就發現她似魘著了,渾身痙.攣不止,汗如出水,將鬢髮和裡衣溼了個透，原本蒼白的臉上也因高燒泛起了不正常薄紅，口齒不清地夢囈著些什麼，眼角都慢慢被淚水給泅溼了。\n「魘著了？」\n謝徵還是頭一回瞧見她這般狼狽又這般脆弱的模樣，心口像是被堵了一團溼棉花，柔軟下來又悶得發慌，他推了推樊長玉：「醒醒。」\n但樊長玉被魘得太沉，絲毫沒有醒來的跡象。\n他見樊長玉無意識掙扎時險些壓到了左臂，只得用一隻手避開她胳膊上的傷，按在了她肩頭，制住她亂動，再冷聲吩咐守在屋外的親衛：「去尋大夫！」\n白日裡大夫給樊長玉看完病後，謝徵瞧著她情況似乎穩定了，就讓親兵把大夫送了回去，畢竟把人留在這裡，老嫗家中也沒多餘的房間給那大夫歇息。\n哪想到樊長玉夜裡會突然驚厥。\n到底是做了什麼噩夢？\n謝徵不自覺擰起眉心，發現她因為唇齒咬得太緊，沁出了血跡時，抬手去捏開她下顎，卻不慎被她咬住了指節。\n他掙了一下，樊長玉齒關卻咬得更緊，幾乎是瞬間就破開皮，留下了一圈帶血的齒印。\n謝徵只微微皺了皺眉，便索性讓她一直咬著自己食指了。\n感覺到懷裡的人渾身都在發抖，那蜷縮做一團的瘦弱背脊喚醒了他一些塵封的記憶，他這輩子都沒安慰過人，卻在此時遲疑了片刻，放緩了語氣道：「夢魘罷了，沒什麼好怕的。」\n幼年時，那女人蕩在橫梁下方的裙擺也曾是他揮之不去的噩夢，每每驚厥著醒來，要麼是獨自一人在無邊的黑暗裡，要麼是燈火通明，魏嚴立在床頭，看死狗一樣冷眼瞧著他。\n魏宣則會帶著魏氏宗族的幼兒一起嘲諷他，學著他夢魘驚厥的樣子取笑作樂。\n後來，他就再也不怕做噩夢了。\n從屍山血海裡摸爬打滾殺出一條命，他刀口沾過的血，比夢裡的厲鬼還多。\n這一刻，樊長玉顫抖的身形似乎和記憶中那個自己重疊起來。\n謝徵眸色深了幾許，等大夫來的時間裡，他任樊長玉咬著他指節，半抱著她，有些僵硬地一下一下輕拍著她背脊。\n說的最多的一句話便是：「別怕。」\n別怕，噩夢都會醒的。\n親衛把大夫從被窩裡提起，放馬背上一路狂奔帶回來時，樊長玉已平復了下來，只是力竭又沉沉睡了過去。\n謝徵坐在屋內一張木椅上，姿態隨意，左手食指上絞著一排牙印，血肉模糊，他目光放空，半垂著眸子，碎發散落在眼前，不知在想些什麼。\n大夫哆哆嗦嗦被扛進門後，他散漫卻壓迫感十足的目光才淡淡瞥了過去：「她魘著了。」\n大夫大半夜的，夢遊似的被人從被窩裡拎到這裡來，結果竟然只是做噩夢魘著了！\n他一口氣堵在心頭，偏偏還半點不敢發出來，叫屋內這男子眼風一掃，後背就已出了一層冷汗，只得認命戰戰兢兢去給那床上的女子號脈。\n脈一號上，大夫就意外地發現下午還虛弱的人，這會兒脈象竟然已平穩了許多。\n他偷偷覷了一眼邊上那俊美又陰沉的男人，到底沒敢說床上這女子情況挺好的，琢磨了半天，開了個安神的方子，道：「尊夫人應當是受了驚嚇，這副安神藥喝下去，就能睡得安穩些了。」\n親兵看向謝徵，見他點了頭，才帶著大夫去廚房煎藥。\n安神藥煎好拿過來，謝徵照舊捏開樊長玉下顎，一勺一勺給她餵了進去。\n左手食指上那兩排血肉模糊的牙印，此時才泛起了絲絲痛意。\n他餵完藥瞥了一眼，沒做聲。\n親兵倒是遞上了金創藥：「侯爺，您手上的傷口塗些藥吧？」\n謝徵沒把這樣的小傷放在眼裡，只道：「不妨事。」\n親兵拿著碗退出去時，偷偷打量了床上昏睡的樊長玉一眼，心底暗自掀起了驚濤駭浪。\n這女子容貌雖好，但也還稱不上絕色，怎地就讓侯爺上心成了這般？\n不過回想起她單手把一個成年男子拎起來扔出去老遠的畫面，親兵又突然打了個寒顫。\n這臂力，怕是同他們侯爺不相上下了吧？\n-\n喝下安神藥後，樊長玉後半夜的確睡得沉了許多，也沒有再發熱。\n謝徵枕在床邊淺眠了兩個時辰，天剛放亮時，門外便響起了極輕的敲門聲。\n他來看了一眼床上，見樊長玉睡得頗沉，拿上一旁矮凳上的大氅幾乎沒弄出動靜出了房門。\n屋外的親兵見他出來，忙壓低了嗓音道：「侯爺，查到隨元青的下落了，他果真躲在清風寨！清風寨被搗時，他便帶著一部分清風寨的人趁亂從後山的小路逃了出去，現已被咱們的人逼到了巖松山上。」\n謝徵眸子裡全是冷意：「守住下山要道，放獵犬進山，且看他能躲到幾時。」\n親兵面色難掩激動之色，抱拳道：「屬下這就去辦！」\n一陣寒風拂過，謝徵看著垂落至自己腳邊的一片凝著霜雪的枯葉，忽道：「今日刮的是西南風。」\n親兵尚未明白他話中意思，便聽他道：「在上風口燻濃煙，順道把那山匪頭子的屍首一併帶過去，鞭屍。」\n親兵一驚後，臉上喜色更甚：「屬下遵命！」\n在巖松山下鞭清風寨大當家的屍，躲在山上的清風寨餘孽只怕膽都給嚇破了。\n用濃煙燻得他們夠嗆之際，才放獵犬進去追，不愁逼不出躲在巖松山的山匪餘孽，屆時只要守在各大下山要道，便是甕中捉鱉。\n-\n又是一個大雪天，巖松山上卻是濃煙密布，幾大摞松柏枝燃燒升起的濃煙被風帶著往山林深處飄，獵犬穿梭在密林裡，犬吠聲此起彼伏，仿佛是追逐獵物的豺狼。\n躲在山上的山匪被攆得四處亂躥，一出現在山道上就被早早埋伏好的官兵給包了餃子。\n只是等山上的濃煙都散去，官兵們清點落網的山匪人數時，卻並不見隨元青，也不見清風寨那名女匪。\n帶兵的小將拿刀抵著一名山匪的脖子喝問：「秦緣和閆姓女匪在何處？」\n山匪求饒道：「小的不知，煙一放起來，大傢伙兒都被燻得受不了，又被狗攆著，在林子裡跑散了。」\n小將眼見問不出什麼，只得派人進山去找，卻只找到兩名被割喉後扒掉了甲冑的官兵。\n小將看到屍體沉罵一聲：「壞了！快往山下追！」\n一處山腳下，流水潺潺，從官道上駕馬狂奔了幾十裡地的兩名官兵打扮的人，終於一扯韁繩停下，從馬背上翻滾下來便衝到河邊，也不顧岸邊的積雪，直接趴地上牛飲了幾口沁涼的河水。\n其中一人伏跪在河岸邊，竟是突然突然嗚嗚哭了起來。\n嗓音尖細，明顯是名女子。\n邊上喝了幾口水便仰躺在雪地裡喘氣的男子，並沒有出言安慰的意思，緩過勁兒後，便把身上的甲冑解下來，扔進了河裡，爬起來後大步朝著戰馬走去。\n啼哭的女子見他似乎要一個人走，驚得哭聲都卡住了，忙追上去：「秦大哥，你去哪兒！」\n這二人正是殺了兩名官兵換上他們衣物從巖松山逃下來的隨元青和閆十三娘。\n隨元青正要翻上馬背，卻被人死死扒拉住了一條胳膊。\n他垂眼打量這淚眼朦朧望著自己的女子，她身形在女子中也是偏高挑的，五官算不得好看，臉上還有山裡姑娘常年凍曬的淺紅，放長信王府裡，頂多能算個粗使丫鬟。\n他以為自己喜歡上了這類會些武藝又野性難馴的女子，但就目前看來，好像並非如此。\n讓他心痒痒的，只有那個女人。\n他生著一雙瀲灩的桃花眼，笑起來的時候尤其多情。\n此刻挑起唇角，卻是把閆十三娘拽著自己臂膀的手一點點扳開了去：「天下之大，自有我的去處，就此別過了。」\n嘴角的笑，明明涼薄至此，卻也是好看的。\n閆十三娘呆住了，反應過來時已死死拽住了隨元青，指甲隔著衣服都似要陷進他皮肉裡，近乎癲狂地質問他：「什麼意思？你要拋下我一個人走？」\n隨元青淺淺一挑眉，似乎覺著她問這個問題太蠢了些，痞笑了聲：「有何不可？」\n女人的指甲太尖了，抓得他手臂生疼。\n他皺了皺眉，徹底失了耐心，扯開女人的手直接翻身上馬。\n閆十三娘恨聲道：「秦緣，你沒有良心！我大哥為了讓我們脫身，才去引開官兵的，你對得起我大哥嗎？」\n隨元青嗤了聲：「從官府手底下逃出來，不是各憑本事麼？不然你以為巖松山上那些人是怎麼死的？」\n閆十三娘嗚嗚大哭，只道：「你忘了是我把你從江邊救起來的？你不能這麼對我……」\n隨元青忽而笑了笑，甚至在馬背上俯低身子同閆十三娘視線平齊：「你救了我，可我不也把你從巖松山帶出來了麼？我為什麼不能這麼對你？」\n話落，直接直起身子，一扯韁繩揚鞭而去。\n閆十三娘歇斯底裡大哭起來，咒罵道：「秦緣，你必不得好死！」\n隨元青對身後女人的哭罵聲充耳不聞，駕馬跑出一段路後，才從懷裡掏出那副他後來去樊家搜尋到的畫。\n畫上的似一家三口，男人俊美非凡，女人嬌憨的笑顏上自有一股朝氣，那個跟女人長得極像的女娃娃則滿眼古靈精怪。\n肩頭被樊長玉戳的那個血窟窿還疼著，但隨元青心情突然變得極好。\n從拿到這幅畫時，他便猜到了當初傷自己的那鬼面男子就是謝徵。\n至於這畫上的女人和他的關係……\n莫非是他養在外面的女人？\n那畫上的小孩就是他們的女兒？\n隨元青目光又在畫上睃巡了幾遭，畫上的女人瞧著還只是個妙年少女，她若有個這般大的女兒，年歲至少得雙十往上。\n但一想到自己兄長逃跑的那個寵妾，給他兄長生了個兒子後，看著也同少女無異，他又慢慢相信了這個猜測。\n難怪那天那女人死死護著後院那口枯井，定是謝徵迫於戰事離開了清平縣，她知道自己帶著一個小孩逃不出去，才把小孩藏到了井裡。\n思及那女人已經給謝徵生了一個女兒，隨元青臉色變得不太好看，把畫重新揣懷裡，一夾馬腹繼續往前走。\n不管怎樣，有了這幅畫，這趟清平縣之行，也不算一無所獲了。\n至少知道了武安侯的軟肋所在。`
        },

            num: 62,
            title: `第62章第62章`,
            content: `樊長玉醒來時,只覺渾身都疼。\n入目是打了補丁的床帳，她撐著右臂半坐起來，打量這不大的屋子，黃土壘成的矮牆,漏風的地方用木板釘了起來,屋內僅有的一張方桌和兩條凳都舊得有蟲孔了。\n她記得自己失去意識前還被那山匪頭子摁在水裡來著,這是被人救了嗎？\n樊長玉低頭看了一眼自己身上的衣物,不是她自己那身，身上的傷包紮過,脫臼的手也接了回去。\n她扶著老舊的床柱起身，腰背一使上勁兒，頓時疼得她齜牙咧嘴。\n樊長玉心道自己腰上沒受傷,怎這般疼？難不成是打鬥時在哪裡撞到的,當時沒察覺？\n經歷這麼多變故，她一下地就本能地找自己防身的剔骨刀，在床邊的矮凳上找到了刀和言正送她的那對鹿皮護腕時，心中才驟然鬆了一口氣。\n她指尖拂過護腕光滑帶有韌性的皮面，垂眸就要綁到自己右手上，外邊卻突然響起急促的腳步聲。\n樊長玉神色一變,瞬間貼牆走到門邊，借著破舊木門上半指來寬的縫隙往外看。\n外邊貌似是一個農家小院,簷下站著兩名披甲佩刀的官兵，大步走進這小院裡的也是一名官兵。\n樊長玉神色微松，看來她是被當日在岸上追著木船的那些官兵救了。\n只是不知為何暫留此地。\n「侯……主子可在？薊州府的官兵一直在往這邊搜尋，快攔不住了……」進院的那名官兵壓低了嗓音道。\n樊長玉剛放下的心又提了起來,他們不是薊州府的官兵麼？為何要攔他們自己人？\n守在院內的另一名官兵道：「巖松山那邊傳了消息回來,主子問話去了,你先帶人守著山口，等主子回來我便報與主子。」\n那名前來傳信的官兵便又快步離去了。\n樊長玉靠在門後，整個人都戒備了起來。\n不知他們口中的主子是何人。\n但他們一身軍中將士的打扮，在薊州境內，貌似又跟薊州官府不對付……難不成他們是山匪假扮的？\n這個認知讓樊長玉渾身一激靈。\n正好門外兩個官兵閒談了起來，其中一人道：「此地不宜久留，若是跟薊州府那邊的人一碰面，主子的身份就暴露了，等主子回來，不管裡邊那女子醒沒醒，應該都要上路了。」\n另一人咋舌道：「我瞧著主子對那女子怪上心的，昨晚她魘著犯起了驚厥，主子怕她咬到舌頭，直接把手指給她叼著了，食指上血淋淋的好大一圈牙印呢！」\n樊長玉對昨夜做的噩夢還有印象，聽他們說自己咬了他們口中的主子，不由皺起眉頭。\n本想再偷聽些信息，門外忽而響起了竹棍在地上敲敲點點的聲音，她朝著門縫看去，從屋簷下走來的是個頭髮花白的瞎眼老婆婆。\n守在門外的官兵問：「老人家有事？」\n老嫗懷裡抱著一摞衣物，笑容和藹：「你家少夫人昨日落水的那身衣裳，老婆子給她烤乾了，準備拿給她。」\n那官兵一聽，似乎礙於男女有別沒說自己代為拿進去，讓開一步道：「您進去便是。」\n樊長玉在老嫗進敲著木棍辨路蹣跚進門時，便已無聲又迅速地退回床前，踢掉鞋子躺到了床上，佯裝還沒醒。\n老嫗進屋後，摸索著走到床邊放下衣物，替樊長玉掖了掖被子，又探了探她額前的溫度，自說自話道：「好閨女，可算是沒再發熱了，怎地就跟你夫婿在船上遇上了山賊，遭了好大的罪，還好有個體貼你的夫婿……」\n絮絮叨叨一番後，又摸索著去火盆子旁加了兩根柴禾，才帶上門出去了。\n守在外邊的官兵在老嫗進屋時往屋內瞥了一眼，見床上隆起一團弧度，只當樊長玉還沒醒，移開視線繼續站崗。\n關門聲一響起，樊長玉便掀開了眸子。\n聽了老嫗那番話，她愈發肯定這夥人肯定不是官兵，官府的人救了她，為何要假稱是在船上遇到了山匪，還要同她扮夫妻？\n至於屋外那兩個小嘍囉口中的主子，樊長玉下意識想起了隨元青。\n那傢伙本就是反王的人，被言正所傷後遁江叫清風寨的人給救了，現在帶著這一夥山匪又假扮官兵，指不定憋著什麼壞呢！\n薊州府的官兵就在這附近，她得想辦法殺出去報信才行。\n樊長玉不知外邊還有多少山匪的人，不敢貿然行動，思索一番後，把護腕捋平當護心甲一樣揣懷中，又把剔骨刀綁到腿上用裙子蓋好後，才下床踢倒屋內一張長凳，佯裝是摔倒弄出的動靜。\n守在門外的人果然瞬間就推開了門，屋內樊長玉單手撐著桌子，一副下一刻就要倒下的樣子，白著臉道：「我要去茅房。」\n其中一名官兵大咧道：「屋角有夜壺……」\n同伴給了他一手肘，他才意識到屋內好歹是個姑娘家，並且是他們侯爺中意的，自己那話太粗鄙了些，當即閉了嘴。\n樊長玉裝出一副難受又急切的樣子：「軍爺，我肚子疼。」\n這就沒法在屋內解決了，兩個官兵也沒顧上想樊長玉醒來怎麼就突然肚子疼，她又是自家侯爺看上的人，他們不敢上前攙扶，只得去喚來老嫗，讓她幫忙扶著樊長玉去茅房。\n老嫗家的茅房蓋在屋後，樊長玉被她扶著出去走一圈，只為了摸清這院子裡外到底有多少山匪，卻意外地發現只有房門口那兩個。\n這就好辦多了。\n樊長玉被老嫗扶著回房時，路過屋簷下，毫無徵兆地給了右邊那官兵一拳，那官兵當場就被打懵了，掛著兩管鼻血一臉茫然地看著樊長玉，下一刻直接倒地不起。\n左邊的官兵一愣，話都沒來得及說一句，樊長玉和他中間隔著老嫗，怕他傷到老嫗，樊長玉直接劈手奪過老嫗手中的竹棍，對著他頸側大力一掃，竹棍斷為兩截，官兵也暈了過去。\n老嫗茫然站在原地，一臉惶然：「怎麼了？」\n樊長玉不知道「隨元青」和其他山匪何時會回來，做這一切雖迅速，手心卻還是出了一層汗，她在老嫗跟前半蹲下，「這些人是壞人，帶我來的那人也不是我夫婿，婆婆，快趴我背上，我帶您走。」\n老嫗被嚇懵了，趴到樊長玉背上時還有些擔憂：「姑娘你一隻手脫臼了怎麼背我這把老骨頭？」\n老嫗很瘦，樊長玉單手背起來還是不成問題，她出遠門後快速看了一眼地形，道：「您扒緊我肩膀就是。」\n道上積雪未化，這會兒天又沒下雪了，在雪地上留下痕跡想掩去還真是難。\n要想不被抓回去，必須得在山匪追上來前找到薊州官府的人才行。\n樊長玉記得之前那幾個官兵對話說什麼要守住山口，想來薊州府的官兵就在那裡了。\n她問老嫗：「婆婆，山口往哪條路走最近？」\n幸好老嫗雖眼盲，對自家附近的路倒甚為熟悉，道：「你沿著門前這條道往西走，到了三岔口走中間那條路。」\n樊長玉認好了路，幾乎是背著老嫗一路小跑。\n-\n斥侯前來匯報巖松山剿匪一事，在老嫗家中的院子裡說這些怕節外生枝，謝徵才帶著人出去說事。\n回來時見守在院子裡的兩名親衛都被人打暈了，他臉色一變，推開門發現房裡也空無一人時，以為樊長玉被什麼人劫走了，眸色瞬間冷沉。\n跟著謝徵外出的一名親衛見地上並無血色，蹲下去探了探兩名同伴的呼吸，忙向謝徵稟報：「侯爺，還有氣！」\n他說著用力按其中一名同伴的人中。\n那名叫樊長玉一棍子敲暈的親衛悠悠轉醒，看到謝徵面沉如水站在跟前時，嚇得連忙跪了起來：「侯爺，屬下該死！」\n謝徵打量著臺階處斷裂的竹棍，眸底似覆上了一層霜色。\n還從未有人敢在他眼皮子底下劫人。\n來這裡的要道都被他的人封死了，未免驚擾老嫗，他才只帶了三名親衛。\n到底誰有這般本事，避開山口的騎兵潛進來？\n他眼底壓著被冒犯的薄怒：「何人劫走的她？」\n親衛慘兮兮道：「是那位姑娘打暈的我們。」\n謝徵不由一怔，好看的眉頭皺起，神色怪異道：「她為何要打暈你們？」\n親衛道：「屬下也不知，那位姑娘醒來就說肚子疼，屬下看她虛弱，便讓那老嫗攙她去茅房，誰知她回來時，突然就一拳打暈了安子，又搶過那老嫗手中的竹棍敲暈了屬下。」\n跟著謝徵外出的那名親衛察看完幾間屋子出來道：「那老嫗也不見了。」\n謝徵稍作思量，便明白過來樊長玉定是誤會了什麼，把他們當成了歹人，才會帶著老嫗一起逃。\n他問：「本侯離開期間，院子裡發生過什麼？」\n被樊長玉一棍子敲暈的親衛想了想說：「山口處的斥侯前來報過信，說薊州府兵又在試圖搜尋這座山，但侯爺您當時出去了，屬下便自作主張讓他們先繼續守著，不放薊州府兵進山。」\n謝徵垂眸低語一聲：「原來如此。」\n她定是那時候就醒了，發現院子裡的人穿著兵服，卻同薊州府官兵不是一派，誤以為他們是賊人。\n恰在此時，又一名斥侯駕馬從小道上趕來，滾落馬背就地半跪抱拳道：「侯爺，您昨日救的那姑娘背著一老嫗往山下去了，要不要攔？」\n謝徵抬眸看向漫山的雪色不語。\n為了剿滅逃去巖松山的那群山匪餘孽，他帶來的這一百輕騎大部分人馬都撥去了巖松山。\n這趟趕回來，本也是以為她陷入險境，如今她已安全，前線戰事緊急，薊州又多了李懷安這雙清流一派的眼睛，他也的確不該多留了。\n他道：「撤走守在山口的人馬，回盧城。」\n斥侯領了令翻上馬背去傳遞消息。\n院內幾名親衛修整片刻，去不遠處的松林裡牽來了幾人的戰馬。\n謝徵翻上馬背時，看了一眼下山的方向，心口到底是縈繞著幾分不甘，他貼上此番領兵來源時便準備好的半張人.皮.面具，對幾名親衛道：「爾等先撤，我去去就回。」\n言罷已一扯韁繩朝著下山的道奔去，留下幾名親衛面面相覷。\n-\n樊長玉背著老嫗走在道上，忽而聽得雜亂的馬蹄聲往山上來，也不知是山匪假扮的官兵還是真正的薊州府兵，衡量一番後，暫且背著老嫗躲進了道旁的松林裡。\n為保周全，樊長玉對老嫗道：「婆婆，您先躲在這林子不要出聲，我出去看看，如果當真是官府的人，我再回來接您。」\n老嫗抓著樊長玉的手連聲讓她小心。\n樊長玉拿著樹枝一邊往林子外退，一邊拂去她留下的腳印，到了大道上正要去探前方山口還有沒有官兵時，身後卻又突然響起了馬蹄聲。\n這次的馬蹄聲很單調，聽起來只有一騎，來得卻奇快。\n樊長玉剛想一頭往松林裡扎，那一人一騎便已出現在視線裡。\n樊長玉怕引著這人進松林找自己後，會叫他誤打誤撞找到老嫗，想著反正只有一人，自己拼盡全力未必不能制服他，咬了咬牙便直接繼續往前跑。\n盤山官道崎嶇，從這半山腰甚至能看到山腳。\n樊長玉發現山腳的官道上果真有一隊打著薊州旗的官兵往山上來時，幾乎是喜出望外，一邊跑一邊喊：「救命！」\n山腳下的薊州官兵聞聲往半山腰看來，很快有人回應她：「姑娘莫怕，我就這帶人來救你！」\n樊長玉這才瞧見那烏泱泱一群官兵裡，還跟著個穿天青色儒袍的男子，竟是那天好心載自己的那青年。\n這遙相對視的一幕落到駕馬而來的謝徵眼中，委實有些刺目。\n他臉上貼著刀疤人.皮面.具，又罩住一隻眼，熟悉的人見了都難以認出他。\n距樊長玉只有幾丈之遙了，他卻還狠狠一夾馬腹，戰馬衝過去時，他伸手就要把人拎上馬背。\n樊長玉反應極快，避開他抓來的手後，也不走大路了，直接朝著盤山官道一側的陡坡滑下去。\n這陡坡下邊就是盤山官道的下一段路，無論如何比騎馬繞一圈跑下去快。\n只是她怎麼也沒想到，追著她的那名假官兵竟然也會棄了馬，跟著她一起往下滑。`
        },

            num: 63,
            title: `第63章第63章`,
            content: `樊長玉聽到動靜的時候回頭一看,頭皮都險些要炸開。\n倒黴的是她衣服還不甚被陡坡上的一段樹枝掛住，她用力一扯，總算撕碎了那塊布料，但身形受力跟著一顫,揣在懷裡的鹿皮護腕不慎掉落出去,往下滾出一段距離才叫一叢積著雪的樹杈給攔下。\n樊長玉在護腕掉出去的時候,心口莫名跟著一緊。\n那是言正送她的十六歲生辰禮物。\n她想也沒想,直接奔過去撿護腕，豈料落雪和針葉覆蓋之下有一地洞,她踩過去時腳下瞬間落空，整個人都往下掉。\n樊長玉左臂受傷，右手又抓著剛撿回的護腕,幾乎無力攀援,好在後領突然一緊，她像只大貓似的被人拎著衣領拽住了。\n洞口邊緣的枯枝碎石落盡地洞裡，半天聽不見迴響，裡邊黑黝黝的，不知有多深。\n樊長玉心中難免也一陣後怕，她扭頭看著追上來的那獨眼男人,他身形倒是挺拔，就是臉上有一道從左眼橫過鼻梁,延伸至右半張臉的猙獰刀疤，光是看著就怪可怕的。\n她抿緊唇角同他對視著，像是一頭極力逃跑卻還是被人抓住了的豹子，滿眼不甘。\n男人單手拎著她後領也不顯吃力,周身氣息冷沉,見她一隻手還緊緊抓著那對鹿皮護腕時,眸光微滯，突然冷嘲般開口：「為了這麼個東西，命都不要了？」\n他嗓音壓得極低，聽起來沙啞得厲害，像是喉嚨受過傷。\n樊長玉心說她事先也不知道這枯枝落雪下邊會有個地洞啊，嘴上只狠聲道：「與你無關！」\n她只有右手能用，樊長玉也不管自個兒還被人拎著，把那護腕努力往衣襟裡塞，想著騰出右手方便應對。\n對方發現了她的動作，眸色深了幾許，忽而沒頭沒尾地問了句：「這東西對你來說很重要？」\n樊長玉暗忖這人怎麼還怪八卦的，她已空出了右手，道：「自然！」\n說話分散他注意力的瞬間，她右手已伸到領後，反抓住了他拎著自己衣領的手，整個人也借力轉了個身，腳蹬著地洞的巖壁就要往上攀。\n比起小命被拿捏在旁人手中，肯定是自己掌握主動權才更安全。\n怎料對方發現她的意圖後，順勢往後一倒，這股力道直接將樊長玉整個人帶了出去。\n樊長玉砸到他身上，被他身上堅硬的甲冑硌得頭昏眼花，還沒來得及爬起，便被對方一個翻身壓在了地上。\n這樣完全壓制的姿勢讓樊長玉渾身汗毛直豎，怒急喝道：「滾開！」\n對方一手摁著她右手手腕，一手避開她脫臼的左手壓著她肩膀，半支起身體看她，兩人中間隔著不過一尺的距離。\n樊長玉恨恨同他對視著，胸口因為喘.息和怒意起伏得厲害，加上她方才塞進去的護腕隆起的弧度更甚，在此時倒多了幾分勾人心魄的別的意味。\n但制住他的人似乎半點沒起旁的心思，他盯著樊長玉，完好的那隻眼睛出奇地好看，瞳仁漆黑望不見底色，本能地讓人覺著危險：「山下那小白臉是你什麼人？」\n樊長玉怒火中燒壓根不回話，只一味掙扎，卻讓自己被摁得更緊，一側頭發現他摁在自己腕上的那隻手，食指上有一圈很新的牙印。\n之前在老嫗家中，門外那兩個假官兵的談話浮上心頭，她心道難不成他們口中的主子是這人？並不是那個被她戳了好幾個血窟窿的癟犢子？\n所以她是被這人救了的？\n樊長玉掙扎的力道一弱，忍不住打量起眼前這人，只覺他那隻黑漆漆的眸子莫名熟悉，忍不住喝問道：「你是誰？」\n男人沙啞出聲：「你先回答我的問題。」\n樊長玉在心底算著官兵趕來的時間，拖延時間把頭偏向一邊，不再同他對視，道：「我不認識他。」\n男人嗤了聲：「不認識，你在江上還拿命護著他？」\n樊長玉只覺這人實在是奇怪，道：「我被山匪追殺，路上遇見他的馬車，他好心載我一程。後來山匪追上來，我便帶著他一起逃了。」\n摁著她的人手上力道鬆了幾許，垂眸瞥過她衣襟裡露出一截的護腕，漫不經心問：「你這般珍視，誰送的？」\n樊長玉只恨自己身上有傷，又太久沒吃東西餓得快沒力氣，不然怎麼可能被眼前這癟犢子制住，只能一邊盼著官兵快些來，一邊冷聲同他周旋：「一個很重要的人。」\n想起言正，心口莫名有些發澀。\n對方聽到這個回答似乎怔了一瞬，看著她隱隱有紅意的眼眶，問：「有多重要？」\n樊長玉沒忍住罵道：「關你什麼事？」\n松樹上的積雪受震，大片大片落下來，謝徵護著人就地一滾，一隻手按在她後背收緊，像是趁機用力抱了一下她。\n樊長玉哪能放過這絕佳的逃跑機會，腦門在他下顎用力一撞，趁對方抽手去捂下顎時，爬起來抬腳就踹。\n謝徵敏捷躲過，那狠勁兒十足的一腳踹在了一旁碗口粗的松樹上，樹上的積雪塌方一般往下墜。\n樊長玉心知已失了再次下手的機會，沒再戀戰，借著這一刻的遮掩，拔腿就繼續往下方的官道跑。\n幾番交手她已摸清對方武藝高強，她如今有傷在身又體力不支，只憑一腔怒火衝過去，無疑送上門給人羞辱。\n她還得活著回去找長寧，不能意氣用事把自己折在這裡！\n謝徵從雪地裡坐起來，單手捂著被樊長玉用力撞過的下顎，松樹上抖落的積雪砸了他滿身，唇齒在被撞時磕到了，溢出了點淡淡的血跡。\n他看了一眼樊長玉跑開的方向，聽著逼近的大片馬蹄聲，終究是沒再去尋她。\n錦州戰事緊急，他作為主帥卻出現在薊州，叫李懷安認出他，無疑是給李黨遞了把柄。\n他雖同魏嚴反目了，但從前畢竟替魏嚴做過不少事，李黨不可能拉攏他，只想看他和魏嚴鬥得兩敗俱傷。\n而且……知道了她對他並非厭惡至極，便夠了。\n至少，她還這般珍視他給她的東西，說他是很重要的人。\n不放心謝徵獨自前來的親衛駕馬尋了過來，沿著盤山官道處下滑的痕跡找到他，見他獨自坐在一顆雪松下，身形寂寥似一頭孤狼，終究還是開了口：「侯爺，薊州府的官兵馬上就到了，咱們走吧。」\n謝徵淺「嗯」了一聲，走回官道，翻上馬背後，最後瞥了一眼不遠處被松林掩蓋住的盤山官道，一夾馬腹離去。\n-\n樊長玉一路狂奔到了官道上，總算是同從山腳下沿著官道一路盤旋而上的官兵們遇上了。\n樊長玉看著風裡飄飛的薊州旗和這百來十號人馬，確認他們真是官兵後，總算是得以鬆口氣。\n李懷安和幾個官兵迎上前去：「姑娘，你還好嗎？」\n樊長玉喘.著粗.氣點頭，指向身後的陡坡：「有一批官兵打扮的人假稱是商戶借住在一戶瞎眼老嫗家中，身份很是可疑，興許是山匪假扮的，諸位軍爺快去追，莫讓他們跑了。」\n帶兵的正是鄭文常，他當即點了大隊人馬一路駕馬去追，只留十幾名官兵在原地保護李懷安。\n李懷安看樊長玉喘得厲害，去馬背上取了水壺遞給她：「姑娘喝口水。」\n大抵是怕她介意，補充了句：「這是備用的水壺，沒喝過。」\n樊長玉接過道了聲謝，牛飲幾口才緩過勁兒來。\n對方向著她一揖：「在下姓李名懷安，昨日多謝姑娘救命之恩。」\n樊長玉道：「是公子心善載我在前。」\n李懷安堅持：「車馬之便哪能同救命之恩相比，敢問姑娘名諱，李某回頭也好答謝姑娘。」\n樊長玉只得道：「臨安，樊長玉。」\n李懷安溫潤的眉眼裡露出幾分訝然來：「整個清平縣縣城被屠，挨著縣城的臨安鎮也慘遭厄運，只餘幾戶老弱婦孺活了下來，當日引開山賊保下了那幾戶人家的便是姑娘？」\n樊長玉原本還擔心長寧她們，一聽他說躲在枯井裡的鄰居們都逃了出去，面上頓時一喜：「是我，你怎知這些？」\n李懷安道：「慚愧，反賊猖獗，薊州賀敬元賀大人親自前往盧城守關後，李某受命於朝廷，前來薊州暫代賀大人，不巧昨日剛至薊州境內，就碰上了山匪。幸得姑娘護李某周全，李某被救回去後，便聽說了清平縣的事。」\n樊長玉總算是反應過來了，這人也是個當官的，當的還是薊州賀大人那樣的大官，難怪他能和薊州府的官兵一起出現在這裡。\n她再開口時，語氣明顯有了距離感：「敢問大人，我妹妹和一眾鄰人現在可安全？」\n李懷安聽著她下一子疏離起來的稱呼，眉眼溫和依舊：「她們暫且被安置在了薊州府的驛站裡，眼下安全無虞。」\n回答完了她的話，他才笑容和煦道：「樊姑娘無需見外，非是在公堂，無須喚李某大人。」\n樊長玉點了頭，但下一次開口時，叫的依然是大人，李懷安失笑搖搖頭，終究是沒再讓她改口了。\n她們在原地修整片刻，半個時辰後帶兵去搜尋的鄭文常回來了，他發現了大量足跡，但連那些人的影子都沒瞧見，倒是找到了被樊長玉藏在松林邊上的老嫗。\n詢問老嫗，得到的是同樊長玉先前說的一樣的回答。\n老嫗怕樊長玉名節有損，絕口不提那夥人裡有個假稱是樊長玉夫婿，還同她睡在一個屋裡。\n山匪沒找到，但好歹樊長玉找到了。\n鄭文常留下部分人馬繼續在附近搜山，護送李懷安回了薊州主城。\n樊長玉也是在回去路上才知，清平縣縣令一家在山匪進城時，壓根沒想過組織衙役對抗山匪，而是火急火燎地帶著自個兒一家人逃命，宋硯上京趕考去後，宋母藉口家中太過冷清，也住到了縣令家去，當晚山匪殺進城，她跟著縣令一家一起逃了。\n卻不想山匪會追出十幾裡地去殺縣令一家，宋母最終也慘死刀下。\n最悽慘的莫過於王捕頭夫婦，王捕頭召集手底下衙役，還想像那日堵住城外的暴民一樣，把這些山匪也堵在城門外，可山匪搶佔先機，先破開了城門，王捕頭夫婦終究是寡不敵眾，死在了城門口。\n樊長玉聽著這些，心口沉重了一路。\n等到了薊州主城，她去驛站找長寧，卻得知有人放火燒驛站，趁亂劫走了長寧。\n-\n一望無際的山野裡，從崎嶇山道上駕馬奔出六七人來。\n溪邊流水叮咚，一行人下馬暫做修整，長途奔襲了一路的馬兒去溪邊飲水。\n一個五六歲的女童被一俊美邪氣的青年拎下馬時，還小聲地抽噎著。\n隨元青實在是沒料到這小孩竟然這麼能哭，這一路就沒停過，偏偏小孩脊骨脆弱，他又不敢貿然把人打暈，畢竟手上力道一個沒把控好，把小孩的脊骨拍斷了，他折了王府在薊州最後一個據點的人馬才搶出這小孩，就是白費功夫了。\n他望著貓崽一般被自己拎在手上的小孩，沒什麼耐性地威脅道：「你再哭，我就把你扔河裡去。」\n長寧被嚇到了，嘴巴一癟，原本的抽噎聲不受控制地變成嚎啕大哭，隨元青瞬間臉色鐵青。\n正好侍衛打了一壺乾淨的水給隨元青遞過來，他抬手就把小孩扔了過去，「不管用什麼法子，讓她別給我哭了。」\n他被哭聲吵得心煩，腰上和肩頭的傷口也痛，讓他煩躁得想殺人，要不是考慮到這小孩還有用，那細嫩的脖子早就被他擰斷不知多少回了。\n侍衛抱著長寧面色發苦，他殺人還成，哄小孩，這是真不會。\n但隨元青發話了，他只能僵硬擠出張笑臉去哄長寧，長寧看著他那個強擠出來的詭異笑容，哭得更兇了，幾乎氣都喘不過來。\n侍衛察覺到隨元青陰冷的眼神，後背冷汗都出了一層，更賣力哄長寧。\n但慢慢的，他發現長寧很不對勁兒，她好像不是在哭了，而是真的喘不過氣來，大張著嘴，臉和脖子都憋得通紅，卻仍呼吸困難。\n侍衛怕這孩子在自己手上出了什麼事，忙喚隨元青：「世子，這孩子好像有喘鳴之症。」\n隨元青掃了一眼仿佛下一刻就會窒息而亡的小孩，臉色更加難看了起來。\n他廢了這麼大力氣才把這小孩搶出來，要是直接發病死在半路上，除了讓謝徵記恨上，撈不到半點好處。\n他道：「找著她身上有沒有藥瓶之類的。」\n他有個庶妹就患有喘鳴，平日裡三步一咳，五步一喘，房門都不敢出，身上隨時都帶著藥。\n侍衛翻找後冷汗涔涔道：「沒……沒有。」\n隨元青道：「把人放地上。」\n侍衛把長寧平放到地上後，好一陣，長寧的呼吸才慢慢順暢過來了。\n知道長寧有喘鳴之症後，隨元青也沒再嚇唬她，從侍衛手中接過水壺遞過去，問：「渴不渴？」\n長寧明顯很怕他，點了頭又搖頭，滿臉淚痕，看著可憐極了。\n隨元青直接抬手把人拎坐起來，把水壺送到她嘴邊，命令道：「喝。」\n長寧還是很怕，但是才發過一次病，不敢再哭了，小口小口地喝了幾口水，哭了太久乾澀發疼的嗓子總算是好受了些。\n隨元青擰上水壺，站起來朝著馬匹走去：「繼續趕路，保證她不會死在路上就行。」\n長寧被侍衛抱上馬背時還淚眼朦朧的，抿著嘴不吭聲，她人小，卻機靈，這一路上已經聽出來了，這些大壞蛋像是把她錯認成了什麼人的女兒，她要是在這時候說自己不是，肯定得被這群壞蛋殺了，那她就見不到阿姐了。\n想到阿姐，長寧淚花花又忍不住往外冒，她摸出掛在脖子下的竹哨，有一聲沒一聲地吹了起來。\n-\n三日後，盧城。\n公孫鄞收到一封從燕州寄來的信報，查看後手中扇子都驚得掉地上了，他難以置信呢喃道：「謝九衡何時有了個女兒？」\n但想到他不聲不響地，心上人都有了，指不定也還真有個女兒，便帶著信報神色怪異去尋謝徵，進帳卻沒瞧見人。\n他在蒲團上跪坐下來，等謝徵回來時，破天荒地發現矮几上竟擺了一小碟陳皮糖。\n他暗道謝徵身邊的親衛何時這般疏忽了，他那人最恨甜食，擺一碟糖果在此，不是找罰麼？\n他閒來無事嘗了一顆，發現味道酸酸甜甜的，竟意外地不錯。\n連吃三顆後，他大發善心地把碟子裡的陳皮糖都收進了衣袋裡，省得謝徵回來看到後，罰擺這糖果的親衛。\n片刻後，謝徵一身戎甲裹著風雪回來，瞧見公孫鄞，只道了句：「你怎來了？」\n公孫鄞目光在謝徵身上颳了幾遭，古怪道：「自然是有事。」\n謝徵沒理會他探尋的目光，解下披風交與身後的親衛，坐下時，發現放陳皮糖的整個碟子都空了，目光驟然一沉，掃向公孫鄞：「你吃的？」`
        },

            num: 64,
            title: `第64章第64章`,
            content: `公孫鄞心說他竟然知道這碟子裡擺了糖果,不過他也不覺著自己吃了他幾顆糖是什麼大不了的事，坦然道：「是啊，怎麼了？」\n謝徵寒著臉吩咐左右：「把人給我扔出去！」\n兩個親衛面面相覷,看了一眼謝徵的臉色，最終還是只能選擇架著公孫鄞往外走。\n公孫鄞懵了,等回過神整個人已經被架著走到了帳門口處,他暴跳如雷指控道：「謝九衡！你至於嗎你？我不過就吃了你幾顆糖！」\n掙扎間，他揣在衣袋裡的糖也掉了出來。\n公孫鄞同謝徵目光對上，只覺他面色更冷了些。\n見一向目中無人的傢伙竟然蹲下去一顆一顆撿起掉落的陳皮糖時,公孫鄞整個人都愣了一下。\n他正了神色，掙脫自己兩隻手,吩咐兩名親衛：「你們先出去,我有要事要同侯爺相商。」\n親衛們原本也不敢真扔公孫鄞,得了他的話,謝徵又沒做聲，便齊齊退了出去。\n公孫鄞走回矮几前，皺眉問了句：「是那樊姓女子給你的？」\n謝徵不答。\n公孫鄞心知必然是了，見他這般,他忍不住道：「不就是幾顆陳皮糖嘛，我賠你還不成？」\n謝徵將撿起的陳皮糖放回瓷碟裡，堅硬的糖果和碟子相碰發出參差脆響，他淡淡抬眸看向公孫鄞,漆黑的眸子蒼寒冷沉,像是海底萬年不曾見過日光的巖石，只是同他對視著,脊骨就莫名竄起一股寒意。\n公孫鄞搓了搓手上的雞皮疙瘩,到底是閉嘴了。\n謝徵問：「尋我何事？」\n一說起這個,公孫鄞臉色瞬間變得怪異起來，他看向謝徵：「你有個女兒？」\n謝徵沒作答，只嗤了聲。\n公孫鄞便知曉應當是子虛烏有的事了，他拿出燕州來的那封信遞給他，「長信王命人送來的，說你女兒在他手上，不想你女兒被祭旗，就拿燕州去換。」\n謝徵沒接那信，顯然是連看都懶得看一眼，冷嘲道：「隨拓老兒是知道自己這輩子坐不上那把龍椅，失心瘋了？」\n公孫鄞也覺得這事處處透著怪異，按理說，長信王敢命使者送這麼一封信來，必然是勝券在握才對，就目前來看，這封信未免太過滑稽可笑。\n他道：「他莫不是誤得了什麼消息，以為你有個流落在民間的女兒？」\n說到此處，公孫鄞又從袖袋裡掏了掏，摸出一個竹哨放到矮几上，好笑道：「對了，和著這封信一起送來的，還有這竹哨，說是你女兒身上的信物。」\n謝徵視線冷漠掃過那竹哨時，卻忽而頓住。\n這竹哨，他認得。\n他重傷在樊家時，魏嚴的死士前去樊家翻找什麼東西，順帶殺人滅口，他帶著那小孩逃出去的路上，那小孩就一直在吹這哨子。\n她和她妹妹不都是脫險了麼，為何這哨子會叫長信王的人拿去？\n謝徵捏起那竹哨仔細看了看，冷聲吩咐：「去查，被送到了薊州府的樊家那小孩是怎麼回事。」\n公孫鄞一聽跟樊家有關，也很快反應過來，問：「落在長信王手中的，可能是那位樊姑娘的妹妹？」\n謝徵抿唇不語，算是默認。\n公孫鄞也沒料到竟是這麼個烏龍，手中摺扇開了又合上，終是抬眸看向他：「若真是她妹妹，你打算如何？」\n-\n薊州。\n雖已是初春，但北地的冬天向來比南方走得晚些，院中的紅梅上依舊覆著層沒化完的薄雪，簷下的冰稜在日光下晶瑩剔透，緩慢地往下滴落著水珠。\n樊長玉站在簷下望著掛著停在院牆上的兩隻跳躍著啄食的雀鳥出神，腰背挺得筆直，只是眼下有著淡淡的青黑，明顯有些憔悴。\n從驛站失火長寧失蹤那天起，她幾乎就沒怎麼合過眼。\n妹妹被劫走了，她卻連仇人是誰都不知道。\n那日驛站大火，趙大娘抱著長寧往外跑，卻被人捅了一刀，當場就痛得倒地不起，眼睜睜看著長寧被一群蒙面人搶走。\n得虧那一刀沒傷及要害，趙大娘才撿回了一條命。\n官府調查後，猜測是尋仇，說對方既然選擇帶走長寧，而不是就地殺人，肯定會拿長寧當籌碼跟他們談條件。\n但已經過去三天了，劫走長寧的人像是就此銷聲匿跡了一般，沒送來任何消息。\n樊長玉自問沒結什麼仇家，若說唯一可能會被報復的，也只有清風寨了。\n但清風寨餘孽也盡數被官府清繳，便是還有一兩尾漏網之魚，也萬不敢在薊州主城鬧出這般大的動靜。\n那日救她的那些行為詭異的官兵，她本以為是山匪假扮的，最後卻從李懷安口中得知，盧城那邊怕薊州主城撤走了太多兵力無力剿匪，派了一隊輕騎過來幫忙。\n不可能是山匪劫走長寧，樊長玉想起清風寨大當家說的，當年押送藏寶圖的並不是自己爹，而是一個叫馬泰元的閹人，她便懷疑到了迄今還是一團謎的爹娘的仇家身上。\n她這兩天也四處打聽過關於四海鏢局和馬泰元的消息，發現那山匪頭子並未說假話。\n唯一的突破口就只剩官府當初審訊那些黑衣人的卷宗了，樊長玉也是實在想不到法子了，才想著來找李懷安幫忙，看看關於她爹娘的死和她家兩次遭遇歹徒的卷宗。\n下人進府通報後，她已在這前廳等了一盞茶的功夫，因為心裡壓著事情，坐久了憋悶，才走到廊下透透氣。\n書辦從迴廊另一頭疾步走來，見了樊長玉，客氣道：「大人在文經閣，姑娘且隨我過去吧。」\n樊長玉道了謝後，便大步跟上，這府上的秀麗景觀是半點無暇觀賞了。\n文經閣燒著地龍，一進門便暖意襲來，初春的寒意全被擋在了屋外。\n李懷安一生緋色官服坐於案前，正執筆批閱著文書，比起樊長玉初見他時的溫雅和氣，穿上這身官袍，他身上似乎多了幾分疏離和威嚴。\n書辦恭敬道：「大人，樊姑娘來了。」\n李懷安這才從堆積的文書中抬起頭來，擱筆道：「叫樊姑娘久等了，薊州府所有卷宗放於文庫，讓底下人去安排費了些時間，現在可以過去了。」\n他是李黨，前來薊州又是暫代賀敬元的職位，一來就查文庫裡的卷宗，說出去終歸是不好聽，何況再帶旁人進去，總得將不相干的人都暫且支開才方便。\n樊長玉道：「是我給大人添麻煩了。」\n李懷安望著她笑笑，似乎又變成了那個溫雅純粹的讀書人：「若不是樊姑娘，李某或許已命喪山匪之手，查看卷宗，尚還在李某能力範圍內，樊姑娘無需客氣。」\n快出門時，他看了一眼樊長玉的裝扮，喚書辦取來一件鬥篷，道：「文庫裡的卷宗若要外借必須記錄在案，樊姑娘隨我進去看吧，未免引人耳目，還是披上這件鬥篷。」\n樊長玉知道他私用公權幫自己，也怕給他帶去麻煩，將鬥篷披上，兜帽一戴，瞬間遮住大半張臉，只餘一截下顎和淡紅的唇露在外邊。\n李懷安視線掠過，多停留了一息。\n出門的這一路，樊長玉都沒遇上其他人，想來是被李懷安支開了。\n到了地方，就見大門外站著一隊森嚴的鐵甲衛，李懷安出示令牌後，鐵甲衛才放行。\n樊長玉跟著他進了那高大又顯得陰沉的樓閣，這才發現所有的門窗都蒙上了一層黑布，只有一豆燈火淺燃著，裡邊一排排書架幾乎看不到盡頭，書架上密密麻麻放著竹簡文書之類的東西。\n李懷安端著燭臺走在前邊，根據書架上的標號尋了一陣，從中拿起一卷：「去年十二月的，找到了。」\n他遞給樊長玉，樊長玉趕緊翻看起來，李懷安似乎為了幫樊長玉照明，端著燭臺站近了些，卻又還隔著小半步的距離，不會讓人下意識排斥。\n樊長玉匆匆翻閱完，臉上的神情卻更凝重了些：「這卷宗上寫的我爹娘遇害，的確是山匪為了藏寶圖。」\n李懷安眸子微動，到底沒說有人篡改卷宗這樣的話，能在薊州隻手遮天篡改卷宗的，大抵也只有那位親去盧城守關的薊州牧了。\n他溫和道：「興許是那山匪頭子為了活命，騙了姑娘。」\n樊長玉沒說話，她就是去打聽過後，確定山匪頭子沒騙自己，才敢冒昧來找李懷安的。\n這份卷宗，到底是官府故意寫成這樣的，還是為了結案草率胡亂寫的？\n從官府卷宗上也尋不到爹娘仇敵的蛛絲馬跡，她心情沉重，離開文庫後便向李懷安告辭，回了暫且落腳的地方。\n趙大娘身上有傷，如今身邊離不得人，樊長玉不在時，便是那日驛站失火後僅剩的幾個鄰居幫忙照顧。\n整個清平縣就剩這麼幾個老弱婦孺了，薊州官府將她們直接安置在了主城，按月送錢送糧。\n樊長玉不知道的是，她今日去文庫看了卷宗的事，當天就已有人快馬加鞭將消息送去了盧城。\n-\n夜寒露重，賀敬元在燈下看完從薊州送去的信件，良久，才喃喃自語：「東西我已給他了，那兩個孩子什麼都不知，如今這局勢，他不可能再對她們下手才是。」\n他蒼老的眼皮上堆滿褶子，想到某種可能，原本儒雅的面容也多了幾分冷硬：「莫非是李太傅為了樊家手裡的東西，故意設的局？」\n他思量片刻，終究是提筆速速寫下一封書信，封好後換來帳外親衛：「快馬加鞭將這書信送回薊州，交到文常手上。」\n鄭文常是他的得意門生，眼下他雖不在薊州，但薊州掌兵的是鄭文常，也能替他做一些事情，李懷安帶樊長玉去看了卷宗的事，便是鄭文常傳來的。\n親衛拿了書信快步離去。\n賀敬元望著沉沉的夜色，終究是沉嘆一口氣：「天下尚未大亂，百姓都已苦成了這般，若真亂了，又得死多少人？」\n-\n駐紮在盧城外的燕州營地裡，中軍帳內亦是燈火通明。\n探子已打探回了確切消息，驛站丟的那女娃娃，是長寧無疑。\n公孫鄞指著輿圖上燕州和崇州的位置，道：「我覺著其中有詐，且不提長信王那邊提出拿一稚童換燕州太過兒戲，單是燕州在崇州以北，北厥人如今正在攻打錦州，錦州之後便只有徽州和燕州擋著，你之前故意讓燕州弱防，想引他棄薊州轉攻燕州，解薊州之圍，他都沒上當，現在為何又要你讓地了？再退一萬步說，就算錦、徽、燕三州都盡歸他手，那他還得分出兵力去抵擋北厥人，哪有讓你在前邊擋著異族，他自己揮師南下來得好？」\n謝徵坐在圈椅上，目光冷淡掠過公孫鄞所指的兩地，忽而笑了聲：「他們這是將計就計。」\n公孫鄞一怔後反應過來，再看輿圖時，心中頓時明了：「長信王識破我們燕州弱防是假，想保薊州是真，現佯裝要取燕州，實則是想調虎離山，繼續取薊州？」\n他忽而難掩激動之色，看向謝徵：「若是讓長信王誤以為我們中計，當真帶兵回援燕州去了，等叛軍攻打薊州時，我們之前的戰術便可派上用場了！」\n謝徵替他說完了後半句：「難在如何讓長信王相信我們去回援燕州。」\n公孫鄞道：「正是，錦州雖有你麾下幾員勇將守關，但未免萬一，屯於徽州兵馬是決計不能動的，可沒有大的行軍動向，實在是難以引長信王上鉤。」\n謝徵垂眼看了輿圖上的燕州片刻，道：「我親去燕州。」\n公孫鄞一驚，他這是要用他自己當餌。\n他忍不住替他擔憂：「若是長信王覺著你的命比薊州值錢，當真要回頭取燕州呢？」\n謝徵抬眸道：「你不也說，長信王還指望我替他擋著外敵，以便他趁機南下？」\n公孫鄞還想說什麼，他卻笑了笑，漫不經心的眉眼裡，透著股狂妄：「他若真敢來取我性命，我在戰場上斬了他首級，西北之亂倒是徹底平了。」\n公孫鄞想說這人當真是狂到沒邊了，卻突然意識到了什麼，眸色變得有些複雜。\n崇州一戰他中了圈套險些死在沙場上，他身死的謠言傳出去那般久，軍心早已不穩，謝家軍被魏宣那草包接手，又揮霍打了不知多少場敗仗，士氣大落。\n如今他回來，必須要打一場絕對漂亮的勝仗，才能把謝家軍在魏宣手中敗光的士氣重漲起來。\n公孫鄞甚至懷疑魏嚴就是找不到他屍首，怕他捲土重來，才故意派魏宣去接管徽州，可勁兒糟蹋謝家軍的。\n養一支精銳軍隊至少得三五載，可毀掉一支軍隊，只需要幾場敗仗。\n他既是為了大局，其中有沒有想順帶幫他那心上人帶回妹妹的心思，公孫鄞倒也沒在這種時候問，只道：「侯爺既要用此計，要麼將賀敬元收入麾下，要麼……除掉他。畢竟盧城現有兵力，都在他手中，要做一個吃下長信王五萬大軍的口袋，必須得動用盧城所有兵力。」\n謝徵半瞌的眸子裡蕩開幾許深意：「來盧城這麼些時日，的確該見他一見了。」\n樊氏夫妻背後藏著的秘密，他命人查了那般久，卻一無所獲，除了魏嚴，想來只有賀敬元知曉了。`

            title: `第65章第65章`,
            content: `賀敬元自收到那封從薊州主城送來的信,得知樊家小女兒無故被人劫走，樊長玉去看了卷宗後，是半點睡意也無,正於帳內看著兵書，守在帳外的親衛忽而進帳來報,說公孫鄞求見。\n賀敬元不知武安侯麾下這名首席幕僚葫蘆裡究竟賣的什麼藥,稍作沉吟，還是讓親衛把人請進來了。\n帳簾一掀，進來的卻不止公孫鄞一人。\n賀敬元目光落到他身後那名著玄色捲雲紋箭袖長袍的男子身上,一怔之後，連忙起身：「侯爺？」\n謝徵揚了揚唇角：「賀大人,別來無恙。」\n比起那些徵戰沙場的老將,他實在是太過年輕了些,加上容貌昳麗,早些年軍中不服他的大有人在，覺著他無非是投了個好胎，乃謝家獨苗，又有魏嚴這個舅舅,在軍中才能一路高升。\n但隨著錦州被奪回，遼東十二郡被收復，這等從前朝至今都無人敢蓋過的功績，終於壓下了所有質疑的聲音。\n外人只讚嘆一句他來天縱奇才,同為武將,賀敬元卻深知他所立的戰功中，無論哪一件,拎出去都夠普通武將吹噓一輩子了。\n而這些光鮮背後,必定是用鮮血和一次次搏命換來的。\n縱然賀敬元在年歲上長了謝徵兩輪不止,卻是打心眼裡佩服這位大胤朝有史以來最年輕的武侯。\n他引著謝徵往主位上坐：「侯爺怎突然造訪盧城？」\n謝徵並未推辭，他若不坐這位置，這屋內這幾人就都不用落座了。\n他姿態閒散坐下，接過賀敬元親自奉上的一杯茶，視線同賀敬元對上時，賀敬元因為之前徵糧一事，腰背伏低了一分，眼底有些許愧色。\n謝徵嘴角輕扯，並未在此時發難，只道：「隨拓老兒以五萬大軍圍薊州，是要徹底掐斷開春後水上的糧道，如今前線尚穩，本侯擔心這後方的補給，便親自過來看看。」\n賀敬元抱拳鄭重道：「還請侯爺放心，只要我賀某人尚有一息在，便不會叫賊子攻陷薊州。」\n謝徵指節輕扣著太師椅的扶手，漆黑的眸子裡帶著笑意，卻又不怒自威：「本侯前來，並非是信不過賀大人，薊州守不守得住，全在盧城，但城內現有兵力不過兩萬，長信王一旦攻城，只怕難以抵擋。新徵的兵卒對外稱有五萬之眾，但實際只有三萬，且全是從未上過戰場的莊稼漢，真到了將親兵全趕上城樓死守的那一步，盧城優勢也不大。我同公孫先生巡視了盧城周邊的地形，想出一計，可盡數吞下長信王圍於盧城外的五萬兵馬。」\n賀敬元從盧城被困開始，就沒睡過一個好覺，此時聽謝徵說有破敵之法，不免也難掩詫異之色，問：「不知侯爺所想是何計？」\n謝徵看向公孫鄞，公孫鄞代為答道：「巫河之水自西向東而流，途經於薊州，但源頭在於燕山。開春後燕山上的冰雪融化，化作水流匯入巫河，我們派兵在上遊修壩暫且堵住巫河之水，盧城一帶河床水位仍舊低淺，賀大人再誘長信王手中兵馬渡河床，屆時炸開上遊的堤壩，便可水淹長信王五萬大軍。」\n賀敬元一聽此計，忍不住撫掌叫好：「此計甚妙！只是修堤壩並非小事，少不得發動成千上萬將士，如何才能瞞過長信王那邊的斥侯？」\n謝徵道：「長信王日前才寫了戰書與我，欲取燕州，我從薊州借兩萬兵馬回去，中途將大部分人馬都放於巫河上遊修堤壩，賀大人這邊再多派人手截殺斥侯，如此，便能瞞天過海。」\n賀敬元很是不解，「之前公孫先生說，讓燕州弱防，引長信王回攻，長信王若是中計，該直取燕州，打一個錯不及防才對。」\n公孫鄞笑吟吟道：「賀大人所言不假，長信王此舉，是為將計就計，假意中了我們的計取燕州，實則還是攻打薊州，以此佔鹽湖，霸水道。」\n賀敬元畢竟是徵戰經驗豐富的老將，瞬間就明白了他們之前說的，帶兵回援燕州，也是一出將計就計，讓長信王以為他們當真保燕州去了。\n他垂眼沉思片刻後道，「若是長信王也覺出此為計謀，當如何是好？」\n謝徵篤定道：「他不會察覺。」\n賀敬元面露不解。\n公孫鄞憋著笑解釋：「侯爺的獨女在長信王手上，侯爺此番借兵回燕州，表面上，也是為了救回獨女。」\n謝徵寒涼的目光掃過公孫鄞，公孫鄞趕緊正襟危坐。\n賀敬元倒是有些茫然了，好一陣才收斂神色，抱拳道：「此前倒不知侯爺喜得的千金，想來千金在賊子手中遭罪了。」\n公孫鄞好不容易忍住的笑，因為賀敬元這番話，又險些破功。\n謝徵臉色難看至極，到底還是解釋了句：「是本侯妻妹，反賊誤會了她身份。」\n賀敬元前一秒才被迫接受了謝徵有個女兒的事，現在得知被反賊抓走的不是他女兒，是他妻妹，對於他突然多出個侯夫人，饒是有了心理預期，還是被驚到了。\n若只是他女兒，是收在身邊的女人生的倒也沒什麼。\n但他有侯夫人了，這就不是小事了，京城多少世家削尖了腦袋等著和他結親呢，甚至他和魏嚴撕破臉的傳聞鬧出去後，一直被魏嚴壓著的皇室都想著嫁一位公主給他，借他之手打壓魏嚴。\n多少人盯紅了眼盯著的位置，什麼時候有主了？\n不僅賀敬元，就連公孫鄞，也狠狠吃了一驚。\n他原本以為謝徵對那姓樊的屠戶女，只是救命之恩再加些許日久生情，怎料他竟是視對方為妻？\n有一瞬公孫鄞甚至想著，謝徵是不是被人下降頭了？\n謝家如今雖只剩他一個男丁，可那也是百年世家，他若娶妻，在整個京城都得攪起一陣腥風血雨，畢竟那意味著整個京城的權勢會被重新劃分。\n謝家宗婦，也只有那些世家出身頂頂優秀的京都貴女才當得起，娶一鄉野村婦，不是上整個京城的人都看笑話麼？\n公孫鄞眉頭皺得死緊，深知自己認識了十幾載的人，絕非意氣用事之輩，有心想多問他幾句，礙於賀敬元也在，到底是忍住了。\n謝徵見賀敬元和公孫鄞雙雙失態，眼底毫無波瀾，只問：「賀大人以為此計如何？」\n賀敬元回神，暫且壓下心中的驚濤駭浪，忙道：「此計妙極，盧城一切兵馬，任聽侯爺調遣！」\n他說著，便雙手舉過頭頂，呈上薊州虎符。\n再無比這更誠懇的表忠。\n謝徵接過虎符，像是並未把這可調動整個薊州兵馬的鐵符當回事，於指尖把玩著，垂眼道：「還有一事，本侯想請教賀大人。」\n他用上「請教」二字，就有些耐人尋味了，賀敬元隱約猜到他想問的是什麼，從他阻止了魏宣徵糧起，賀敬元便已決定把自己當初知曉的全盤告知他，此刻只道：「侯爺有什麼想問的，且問便是，只要是下官知曉的，必定知無不言。」\n謝徵的他這番保障，唇角往上提了提，道：「清平縣臨安鎮上，有一戶姓樊的屠戶，魏嚴為何要那對夫妻的命？他幾番派人去那家人家中尋的，又是何物？」\n公孫鄞聽謝徵問了這麼多關於樊家的事，下意識皺起眉頭，難不成他看中那樊家女子，同魏嚴有關？\n賀敬元神色則有些複雜，也想知謝徵對當年的事到底已知道了多少，道：「在下官回答侯爺之前，侯爺可否告知下官，為何要查樊家背後的事？」\n謝徵道：「內子父母死於非命，總得替她查一查。」\n賀敬元聽到這話，猛地抬起眼，神色說是驚駭也不為過。\n謝徵以為他和公孫鄞一樣，都是驚訝於自己許諾樊長玉的身份，心中有些不喜，微冷了神色道：「賀大人現在可以說了麼？」\n賀敬元指尖隱隱有些發顫，垂下蒼老的眼皮，沉默了許久，嘆道：「死去的那名樊屠戶，從前是丞相手底下的人，後來叛了主，逃出去隱姓埋名過日子，只是還是被丞相查到了，由此要了他性命。至於丞相要的東西，我也不知是何物。」\n魏嚴曾對他有知遇之恩，後又有栽培之恩，如今雖是政見相左，但賀敬元還是會敬稱他一聲「丞相」。\n謝徵眉眼陡然凌厲，唇角卻依舊帶著笑意，「若本侯沒猜錯，那東西，應當是賀大人拿走的才對。」\n賀敬元苦澀道：「是下官拿走的，但下官當真不知那是何物。」\n謝徵眼中耐性少了些：「賀大人以為本侯會信這套說辭？」\n賀敬元道：「不管侯爺信不信，下官所言句句皆屬實。」\n謝徵冷笑：「你連魏嚴要的東西是什麼都不知道，如何替魏嚴找？」\n賀敬元自嘲一笑：「我這些年在薊州所為，早已引得丞相不滿，丞相讓我去殺樊家夫妻，也只是為了看我是否還忠於他罷了，並未讓我順帶找什麼東西。那東西，是樊家夫妻赴死前交與我的，囑咐我在丞相要時交與他便是，切莫自己拆開看。」\n謝徵從中聽出幾分蹊蹺，問：「你同樊家夫妻相熟？」\n賀敬元眼底難掩滄桑：「是賀某故友。」\n公孫鄞對樊家的事並不知情，聽到此處忍不住道：「所以賀大人為了讓魏嚴相信你還忠於他，殺了昔日故友？」\n賀敬元並未言語，算是默認。\n公孫鄞見他此時這副傷懷做派，意味不明道了句：「自古忠義難兩全，也怪不得賀大人。」\n賀敬元聽出他話中的譏諷意味，道：「我不動手，丞相總會派旁人去。我殺樊家夫妻二人，尚能如她們夫妻之願，保住樊家兩個孩子。旁人去，便是斬草除根了。」\n公孫鄞一時也無言，魏嚴的手段，他們都再清楚不過。\n片刻後，他問：「魏嚴並未讓賀大人尋那物件，賀大人後來呈與他，就不怕魏嚴猜忌？」\n賀敬元答：「自是怕的，但侯爺既與樊家姑娘結為夫妻，想來也清楚那姐妹二人對她們父母之事毫不知情。故友已去，賀某心中有愧，只求能護住他僅剩的這一點血脈。彼時魏宣戰敗，侯爺生死的傳言也在外，西北局勢混亂，丞相不得不用賀某，這才睜隻眼閉隻眼。」\n謝徵指尖輕扣著椅子扶手，只是沉默，賀敬元說的這些，和他之前猜測是出入不大。\n公孫鄞又問了句：「樊家夫妻給賀大人的東西，大人當真沒看？」\n賀敬元苦笑：「公孫先生真會說笑。我若是看了，丞相還能容我？」\n公孫鄞看著謝徵一聳肩。\n問了這麼多，看似解開了不少謎題，但真正重要的又一個都沒問出來。\n謝徵忽而抬眸：「樊二牛在魏嚴身邊時，是何名諱，居何職？」\n賀敬元額角墜下冷汗來，道：「侯爺，恕下官現在不能說。」\n謝徵不笑的時候，一雙鳳眸壓迫感尤其逼人，他審視著賀敬元，問：「為何？」\n賀敬元嘴裡發苦，他當然知曉樊家背後的真相，對謝徵而言意味著什麼。若是他同樊家並無交集，只是查當年的錦州一案碰巧查到了樊家，自己或許還能寄希於他心中那份仁慈，樊家夫妻已死，往事塵埃落定，莫要再追究樊家那對孤女。\n可他竟稱樊長玉為內子，樊家小女兒又是被反賊誤當成他女兒劫走的，賀敬元不敢想像道出真相後，樊家那兩姐妹會面臨什麼。\n他會告訴謝徵樊家夫妻真正的身份，但不是現在，至少得等樊家姐妹都安全後。`

            num: 66,
            title: `第66章第66章`,
            content: `遠處巡營的將士打更報起時辰,梆子聲自夜幕裡傳來，在一片寂靜的大帳內顯得尤為清晰，高几上燃著的燭火猛地顫動了一下。\n賀敬元在謝徵冷峻的目光下,艱難開口：「侯爺姑且當賀敬元是膽小鼠輩罷，若解盧城之困後,賀某若還有命在,必定向侯爺坦誠一切。」\n公孫鄞聞言不免看了謝徵一眼，二人皆是不置可否。\n賀敬元將薊州調兵的虎符都交了出來，可見其表忠程度,卻又守著樊家夫妻的身份不說，只為圖自保,怕謝徵拿到兵權之後直接除掉他,這樣一點小心思,倒也無傷大雅。\n帳內短暫地沉寂了一陣後,謝徵才扯了扯唇角道：「賀大人大可把心放進肚子裡，謝某出身行伍，旁的不敢保證，許諾的事,一定不會食言。再者，賀大人在薊州任職十載有餘，甚得民心，也得薊州將士們愛重,本侯輕易也不敢動賀大人不是？」\n賀敬元額角的冷汗都滑下來了,忙垂首道：「侯爺說笑了，論在軍中的威望,何人又能越過侯爺去？」\n謝徵指尖在椅子扶手上不輕不重地叩了兩下,黑眸審視著眼前這位恭敬拱手的儒將,像是權衡定了什麼一般，終是做了讓步：「好，本侯便等著盧城之困解後，賀大人的答案。」\n賀敬元只覺壓在自己身上的那道視線陡然一輕，呼吸都順暢了許多，愈發恭敬地抱拳將腰身折了一個度：「多謝侯爺體恤。」\n謝徵起身，繡著雲海紋的衣擺垂感極好，料子甚至在燭火下反著光，他淡淡落下一句：「明日賀大人撥與兩萬新兵，將城內擅修築水利的工匠一併安插進去，立春後雨水將至，不在春汛到來前於巫河上有築好堤壩，此計便派不上用場了。」\n賀敬元忙道：「下官今夜便召集底下將領安排。」\n走出大帳後，公孫鄞低聲同謝徵道：「你倒真允了他的討價還價。」\n謝徵把薊州虎符扔與他，斜眼問了句：「不然？」\n公孫鄞兩隻手去接才捧住了虎符，道：「他在薊州經營多年，既要用薊州軍來做吃下長信王五萬大軍的一個口袋，的確輕易動不得他，大戰前主將身亡，哪能不影響士氣。不過……他虎符都交出來了，也是真敢賭你會為了樊家，不論如何都留他性命。」\n謝徵道：「他若不交虎符，我焉敢北上？」\n公孫鄞不由失笑：「這位賀大人倒是看得通透，他會這般顧慮倒也不無道理，你不會在大戰前動他，但忌憚他在薊州軍中的威望，會不會讓他在大戰中『就義』就說不定了。」\n謝徵未語，算是認同了他的說法，繼續往前走時，道：「崇州那邊，你代筆回信一封，同隋拓老兒談其他條件。」\n公孫鄞明白了他的意思，拿燕州去換樊家那小女兒是不可能的，回信讓長信王提其他條件，才能讓對方覺著，他們當真是在意那小孩生死的，由此從薊州借兵去燕州也不奇怪。\n再者，讓長信王那邊知道那小孩對他們重要了，長信王才越發不敢讓那小孩有什麼損失。\n-\n數日後，崇州，長信王府。\n男子蒼白似枯骨的手指將信件扔進了書案旁的火盆裡，信紙很快在紅炭中化作灰燼。\n春寒料峭，哪怕在室內，男子肩頭依舊搭著大氅，他帶著病氣沒多少血色的唇輕扯了下，像是孩童遊戲贏了一般，笑容惡劣又愉悅：「他竟當真從薊州借了兩萬兵馬。」\n送信前來的男子不解道：「被世子劫回來的那孩子，壓根不是武安侯之女，殿下，其中會不會有詐？」\n隨元淮抬起一雙黑得讓人脊背發涼的眸子：「那不是他女人的妹妹麼？清平縣被屠，他都能不顧一切殺回去救人，他若不救那孩子，你猜他那女人知道了會如何？」\n立於下方的錦袍男子，正是趙詢。\n他本想說武安侯那等身份，要什么女人沒有？但想到跑了幾次都被眼前人抓回來的那女子，又禁了聲，轉而道：「殿下說的是。」\n隨元淮玩味道：「退一步講，便是圈套，於我們又何幹？」\n趙詢心中陡然一驚，明白他是想坐山觀虎鬥，拱手道：「殿下英明。」\n隨元淮望著他，意味不明揚了揚唇角，趙詢在他的目光下，頗有些如芒在背，顫聲詢問：「殿下為何這般看著屬下？」\n隨元淮笑了笑，「聽說你教那小賤種寫字了？」\n趙詢膝蓋一軟跪下了：「殿下恕罪，屬下何德何能，教得了小公子，是小公子之前一直哭著要見……俞姨娘，屬下這才哄小公子說只要好生讀書認字，殿下高興了，或許會讓他見俞姨娘。」\n隨元淮似笑非笑道：「你倒是會替孤做決定。」\n此話一出，趙詢臉色慘白，額頭抵著冰冷的地板道：「屬下該死，請殿下責罰。」\n正巧屋外一中年女子進來送點心，見趙詢跪在地上，面露異色。\n隨元淮單手撐著下顎，慢悠悠道：「起來吧，蘭姨看著呢。」\n趙詢絲毫不敢動，送點心的中年女子面色亦是一變，把點心放於案上後，退後一步跪下道：「殿下，詢兒若做錯了什麼，殿下責罰便是，莫要折煞奴婢。」\n隨元淮噙著笑親自扶起中年女子：「蘭姨這是做什麼，若是沒有蘭姨，孤又哪有今日？快起來吧。」\n他的手因常年久病而帶著涼意，中年女子被他扶起時不經意觸碰到他手背，只覺冷得心驚。\n隨元淮發現了她臉上一閃而過的慌亂，嘴角笑意愈深了些，他看向跪在地上的趙詢：「阿詢也起來，你和蘭姨都是孤最親近的人，別動不動就跪。」\n趙詢看向中年女子，見她微微點頭後，才帶著滿背的冷汗起身，恭敬道：「為殿下盡忠是屬下本分。」\n隨元淮笑笑不答話，他興致索然看了一眼案前的書卷，百無聊賴道：「回頭讓人把那小賤種帶過來我瞧瞧，看他的書念得怎麼樣了。」\n趙詢垂首應是。\n趙詢和那中年女子都出去後，隨元淮在自說自話般問：「他們對孤還忠心麼？」\n空無一人的書房內，卻從暗處走出一個影子來：「趙家母子對殿下並無二心。」\n隨元淮只是笑笑：「繼續盯著。」\n黑影又退回了暗處，似乎這房裡壓根就沒多出一個人來過。\n隨元淮大概是倦了，俊秀的眉眼裡透出些許疲色，單手撐著額，望著書房窗外的景致出神。\n他這副身體，破敗得厲害，這些年一直靠湯藥續命。\n十六年……不對，又過了一載，當是十七年前了，東宮那場大火燒毀了他大半張臉和近乎半身的皮膚，也正是這般，他才能和長信王長子互換身份，撿回一條命。\n當年真正死在東宮裡的，乃長信王長子。\n那是一場蓄謀已久的金蟬脫殼。\n太子死了，他母妃知道馬上就要輪到他們母子了，一手策劃了東宮大火。\n她以悲傷過度為由，請了不少京中貴眷帶著家中兒女前去做客，陪她說話散心。\n長信王府便是他母妃替他尋的安身之所，宮女斟茶時不慎打翻了茶盞，弄髒了長信王長子的衣物，他母妃命宮人帶長信王長子去更衣，那身換下來的衣物，最終穿到了他身上，而長信王妃母子，皆死在了那場大火中。\n他臉上被燒得面目全非，長信王妃又已死，王府的下人壓根認不出他，只憑著身上的衣物和所佩之物斷定他就是王府長子，將他帶了回去。\n從此他不再是皇長孫，而是長信王那個被燒得半死的嫡長子隨元淮。\n蘭姨曾是他母親的心腹，也在那場大火裡脫了身，後來嫁了一富商，一直暗中幫襯他，生下趙詢後，便毒死了富商，讓趙詢繼承富商家業，等趙詢能獨當一面後，才回到他身邊照料他起居。\n為了能重新見人，他身上那些被燒毀的死皮，都是這些年陸陸續續換掉的。\n早些年他被燒毀了臉，伺候的下人沒一個敢直視他，後來他忍著切膚之痛換掉了燒傷的皮，下人們倒是愈發懼怕他。\n想到此處，隨元淮譏誚笑了笑。\n不過他母妃當年選了長信王府作為他的退路，委實也是有諸多考量的。\n一個被燒毀了臉的廢人當不得王府世子，不管將來長信王娶的新婦是誰，都會盡心盡力待他這樣一個沒有任何威脅的嫡長子，為自己博個賢名。\n更幸運的一點是，長信王妃慘死後，她娘家人怕他這副不人不鬼的樣子叫長信王厭棄，將來王府進了新婦，他會被暗中磋磨，於是把長信王妃的同胞妹妹嫁給長信王做了續弦。\n長信王妃這個妹妹的確是把姐姐的孩子當做自己的疼，生下隨元青，也一直教導隨元青親近自己這個「兄長」。\n可偷來的親情，能是親情麼？\n等那對母子將來知曉真相，只怕恨不得將他生啖食之。\n這些年，他只同那對母子維持著表象上的和睦。\n原本撐在額角的手指，忽而重重按在了太陽穴的位置。\n當初為了瞞天過海，他燒傷了大半張臉，如今換掉傷皮後，頭時常炸裂一般疼，眼下就是突然疼了起來，讓他心底惡意陡增，只恨不能折磨幾個人，讓自己心中暢快些。\n房門卻在此時被推開，一個小不點出現在門口，手上捧著一摞練好的大字，狗狗眼裡帶著些許懼意，卻還是抬起那雙明澈的眼看向他，抿了抿唇，喚道：「父親。」`
        },
        {
            num: 67,
            title: `第67章第67章`,
            content: `隨元淮打量著這突然闖進來的孩子,他跟他長得並不像，但是蘭姨第一眼見到這個孩子的時候，就說同他小時候簡直一個模子裡刻出來的。\n隨元淮不記得自己小時候是何模樣了,唯一的記憶只剩下大火灼燒後的劇痛和那燒得面目全非的疤痕。\n他單手撐著額角,望著拘謹站在門口的孩子冷笑：「父親？誰允許你這麼叫的？」\n俞寶兒捏著字帖的手緊了緊，明顯有些無措，黑白分明的眸子看著披著大氅坐於高位上的男人，不知再喚他什麼好，索性不開口了,輕抿著嘴角,看起來乖巧又可憐。\n他隨娘親一起下江南,只可惜車隊在半道上就被一隊黑甲衛給攔住了。\n那天也是他第一天見這個男人,大雪如絮,他病懨懨倚在黑甲衛簇擁的馬車中,因久病而過分蒼白的手打著車簾,一雙眼陰鬱盯著他們母子，目光裡甚至帶著幾分殘忍和即將得到報復的快意。\n他很怕這個人，他娘親似乎更怕,抱著他時都在輕微發抖。\n也是從那天起，他就再也沒見過他娘。\n他被帶到這裡,並沒有受罰，還有人照顧他三餐起居，但每每他問起關於自己娘親的事，伺候的下人都諱莫如深，只有一個很喜歡他的嬤嬤敢跟他透露些許關於自己娘親的消息。\n那個嬤嬤說,這個男人是他爹,只要他乖,討他歡心了，他就會讓自己見娘。\n俞寶兒來到這裡後，一直很乖，但他們還是從來不提讓他見娘親的事，前兩日俞寶兒才忍不住大哭，也不吃飯，想以此抗議。\n最後只來了一個面生的男子，他說自己好好念書認字，功課做得好，就有可能見到娘親。\n他照做了，今日果然就被帶出了院子，這也是他來這裡這些時日，第一次離開自己居住的院子。\n隨元淮看著俞寶兒這般怯懦模樣，面露譏嘲，視線瞥見他緊握在手中的字帖，道：「聽說有人教你練字，拿過來瞧瞧。」\n他光是坐在那裡，整個人仿佛就浸著無邊的鬱色，讓人心生懼意。\n俞寶兒也怕，卻還是堅定地邁著小步子朝他走了過去。\n他渾身上下，最像俞淺淺的，約莫就是那一雙眼睛，黑而圓，眼角微微下垂，看起來溫良無害，還莫名惹人憐。\n隨元淮在看到俞寶兒走來時，神情微怔，恍惚間是透過他看到了那個有孕在身都從未打消過逃跑念頭的女人。\n明明弱得他一根指頭就可惜碾死她們，但就是怎麼罰都不長記性，逮到機會，仍然會毫不猶豫地跑。\n像是被圈養的鹿，一心只想著回到山林裡。\n俞寶兒把字帖懟到他眼前後，他方回過神來，神色不知何故，變得愈發陰沉了些，蒼白瘦削的手指一張張捻動字帖，讓俞寶兒緊張攥緊了衣角。\n片刻後，他把俞寶兒練的那一大摞大字當廢紙一樣揚了出去，冷嗤：「寫的都是些什麼東西，字軟得跟沒骨頭一樣，重寫。」\n俞寶兒看著自己為了見娘親，一張張認真寫的大字，眼眶紅了紅，到底沒說話。\n很快就有侍者屏氣凝聲進來，安置一方小几擺上筆墨紙硯，整個過程幾乎沒發出任何聲響。\n院子裡伺候的人都知曉隨元淮喜怒無常，一向是把腦袋別在褲腰帶上進來伺候，哪敢不打起十二萬分的精神。\n俞寶兒看著這一切還有些無措，坐於書案後的隨元淮半掀開眼皮掃他一眼，冷冷開口：「就在這裡練。」\n俞寶兒鼓起勇氣問：「我要是寫好了，能見我娘麼？」\n隨元淮笑容愈發譏諷了些：「誰教你同我說這些的？」\n俞寶兒眼中蓄起淚意，卻倔強忍著眼淚不肯哭，說：「沒人教我，我只是想我娘了。」\n隨元淮從桌上拿起一卷竹簡，森冷道：「練你的字去，再哭，你這輩子都別想再見她。」\n俞寶兒乖乖去矮几前練字時，小小的身子側對著他，吃力握著比他手指還粗的毛筆，眼淚吧嗒掉在紙上，暈開一個小小的水印，俞寶兒生怕叫他發現，不敢伸手去擦眼淚，也不敢發出哽咽聲，只放緩了呼吸，偷偷地哭。\n他以為自己瞞得很好，男人坐在高位上，卻將他所有的小動作盡收眼底，他半垂著眸子，眼底一片陰翳。\n他不喜歡這個孩子，不僅因為那個女人不識抬舉，還因為這個孩子的存在，已嚴重威脅到了他的地位。\n比起一個離不得湯藥，也習不了武的廢人，一個健康卻年歲小、極好掌控的孩子，怎麼看都是首選。\n趙家母子越親近這個孩子，他心中就越發忌憚。\n當年為了活下來，他忍受了火燒之痛，留下一身病根。\n後來為了能見人，他又經歷了無數非人的折磨，才將身上那些被燒傷的皮一點點換掉，剝皮之痛這樣的酷刑，死人才會領會，他卻是活著就受過了。\n他這麼艱難才活下來，誰要是敢擋他的路，那就都去死吧！\n這麼想著，神色便愈發猙獰，攥著竹簡的那隻手，力道大得那森白的指節像是下一刻就會折斷。\n丫鬟進來奉茶，猝不及防撞見他的神色，短促地驚叫一聲後，手中的茶水被打翻，杯子摔在地上碎裂開來時，丫鬟臉上已慘白得沒有一絲血色，整個人伏跪在地，顫聲祈求：「大公子……大公子饒命……」\n隨元淮極度厭惡下人們看見他露出一副見了鬼的驚恐樣子，他薄唇挑起，吐出的字卻血腥冰冷：「拖下去，杖斃！」\n很快就有人進來，丫鬟幾乎沒能再大喊一句，就被堵了嘴帶下去，整個過程安靜且迅速，像是一場無聲的皮影戲。\n俞寶兒坐在練字的矮几上，怔怔看著這一幕，筆尖的墨點滴落在紙張上，弄髒了他快練完的那一張大字。\n坐在書案後方的人冷眼瞧著他發白的小臉，突然惡劣道：「你要是不聽話，你娘就跟她一樣的下場。」\n俞寶兒明顯被嚇到了，那天從隨元淮書房練完字回去，就病了好幾天，夢魘時都在哭著喊娘。\n蘭氏當年從東宮逃出去後，嫁了一富商替隨元淮發展外邊的勢力，在隨元淮被燒傷最嚴重的那段時日，並不在他身邊，看到俞寶兒，只覺像是看到了自己當年照顧的那個小皇孫一般，心中憐惜得厲害，求去隨元淮跟前，想讓俞寶兒見他娘一面，卻只換來隨元淮一句譏諷：「杖殺個婢子，就把他嚇病了？蘭姨忘了，孤像他那般大的時候，剛經歷了東宮大火呢。」\n蘭氏看著隨元淮漆黑的眸子裡化開的點點森冷笑意，終究是沒敢再為俞寶兒求情。\n三日後，俞寶兒才慢慢好起來，不過性子變得很悶，不愛說話，也不怎麼搭理人，每天雷打不動要做的事就是練字。\n蘭氏怕這個孩子就這麼被嚇壞了，命下人去尋幾個機靈些的孩子來給俞寶兒當玩伴。\n但俞寶兒還是不搭理那些孩子，只悶頭做自己的事。\n趙詢在清平縣時，曾奉命監視俞淺淺的一舉一動，知道俞淺淺母子和樊家有往來，大膽向蘭氏提出，要不把樊家那小女兒帶過來，看不能讓俞寶兒肯開口說話？\n蘭氏明顯有些遲疑：「那孩子如今對外稱是武安侯之女，被王府的人嚴加看管起來，如何帶來同小公子當玩伴？」\n趙詢道：「世子同殿下親近，連帶著喜歡小公子，母親不試試，怎麼知曉世子那邊不同意？」\n蘭氏同兒子對視片刻，道：「詢兒，哪怕是為了小公子好，也要先問過殿下。」\n趙詢猛地低下頭，「孩兒也是怕小公子有什麼閃失，一時心切。」\n蘭氏道：「如今整個趙家的基業都在你手上，你的抉擇，關係著整個趙家的存亡，莫要糊塗。」\n趙詢恭敬道：「孩子謹記母親教誨。」\n蘭氏再次求去隨元淮跟前時，一向胃口不佳的人，倒是難得頗有興致地在用飯，邊上站著的侍者把每一道菜都嘗過後，他才動筷。\n蘭氏掃了一眼桌上那些古怪的吃食，便知應當都是那位俞姨娘做的。那看著麵團似的一個人，性子卻出奇地倔，蘭氏從前就敲打過她，終是沒能讓她軟下脾性。\n眼下突然向隨元淮示好，大抵也是知道了俞寶兒生病的事，想藉此見見孩子。\n至於俞姨娘所在是院落被圍得水洩不通，消息是怎麼傳進去的，明顯是眼前人故意為之。\n蘭氏不由皺起眉，她到現在也沒弄明白隨元淮對俞姨娘到底是個什麼心思，當初他身體每況愈下，她怕有個萬一，才替他選了好幾個通房。\n隨元淮明白那是什麼意思，他心中厭惡，為了留下血脈，卻還是不得不選一個孕育子嗣。\n蘭氏有時候想，隨元淮大抵就是那時開始不再全然信任她的。\n但若是再來一次，她還是會那般做，她是太子妃的心腹，皇孫若是不行了，她無論如何也要讓皇孫留下一點血脈，繼續復仇大業，這樣才對得起太子妃在天之靈。\n當初那批通房丫鬟裡，明豔的嫵媚的隨元淮通通沒看上，只挑了膽子小得跟兔子一樣，又乖順聽話的俞姨娘。\n只是大抵是被他喜怒無常的脾性嚇到，俞姨娘膽子本身又小，侍寢後便一直渾渾噩噩的，後來還大病一場，府上的人都背地裡議論是被隨元淮嚇成那樣的。\n隨元淮處置了議論的人，連帶著俞姨娘也想一併處置了，大夫給俞姨娘診脈時卻查出喜脈。\n俞姨娘這才得以保住一條命，但病好後性情卻像是變了一個人，表面乖巧，背地後心思卻不少，逮住機會就跑不說，被抓回來了，不管隨元淮發多大火，她只管最大限度保證自己過得舒坦。\n孕吐得厲害就自個兒在小廚房裡搗鼓吃食，哪怕被關著，也是該吃吃，該喝喝，養好身體，半點不虧待自己，等她瞅準個機會，她又跟只兔子一樣遁沒影兒了。\n俞姨娘幾年前挺著七個月大的肚子成功逃出去時，便是哄著隨元淮去莊子上住一段時間散散心，她親自下廚卻在飯菜裡下了藥，藥倒莊子上的人後，卷了自個兒的金銀首飾帶著心腹丫鬟和一侍衛一起跑了。\n隨元淮醒來幾乎砸了整個莊子，口口聲聲罵著不過一賤婢，卻幾乎發動了所有人馬去找，這一找，就是五六年，才終於在臨安鎮那樣一個小地方，尋到了人。\n蘭氏以為他把俞姨娘母子抓回來後，以他的脾性，估計會去母留子，但他只是把母子分開關著，不虧待她們也不過問她們，除了偶爾冷嘲熱諷幾句，好像就沒別的了，蘭氏一時間也摸不透他究竟是怎麼想的。\n隨元淮用著飯，察覺到蘭氏在邊上站著欲言又止好一會兒了，問：「蘭姨有事尋孤？」\n蘭氏也不知在此時同他說俞寶兒的事是不是明智之舉，硬著頭皮道：「小公子病情依舊沒有好轉，奴婢聽詢兒說俞姨娘在清平縣時，同樊家交好，奴婢鬥膽……想著樊家么女正好在府上，要不……暫且讓她給小公子當玩伴，看小公子病情會不會好些。」\n隨元淮不覺得長寧還有命活著回去，大概是用了一頓合心意的飯，心情尚且不錯，又不想這麼快如那女人的願，讓她見兒子，他撐著下顎思忖了片刻，忽而笑道：「蘭姨都有主意了，去找青弟便是。」\n走出房門的時候，蘭氏還是有些不甘相信，今日的隨元淮，似乎比往日好說話許多？\n隨元青把長寧帶回長信王府，只隨意扔給下人，讓他們好生看管著，別要把小孩餓死凍死就是了，蘭氏打著隨元淮的名義說給俞寶兒找個玩伴，隨元青一句話沒多問就準了。\n蘭氏被婆子引著去帶走長寧，打開柴房的門，就發現一個小姑娘縮在草垛裡，瞧著像是很多天沒梳洗過了，頭頂的揪揪亂糟糟的，臉上也髒兮兮的，兩腮還被凍得有些發紅，一雙眼睛卻黑亮得驚人，麋鹿一般澄澈又警惕地打量著她們。\n蘭氏是宮裡出來的，這輩子見過的美人數不勝數，見到這小丫頭時，心下便詫異了一瞬，這小女娃長開後得是個難得的美人胚子。\n-\n薊州。\n樊長玉一腳踹開守在地牢門口的賊人，手中的黑鐵砍骨刀一刀下去，火星迸射，牢門上的鎖頭就掉到了地上。\n身後的官兵氣都喘不勻追上來：「姑娘你別跑太快，前邊賊寇多……」\n看到一地橫七豎八躺著呻.吟不止的山賊時，官兵後半截話卡殼了。\n樊長玉沒理會身後姍姍來遲的官兵，進了暗沉的地牢，一邊把裡邊被迷藥燻得昏昏沉沉的小孩拎起來看，一邊叫長寧的名字。\n這些日子薊州城內突然發生了好幾起孩童被拐、被搶的案子，辦案的官兵說是有一伙人販子在趁亂搶掠小孩。\n樊長玉擔心長寧也是被人販子帶走了，抱著一絲希望，這些天一直跟著官兵四處搗毀人販子窩點。\n長寧沒找著，但是她拎著把殺豬刀大殺四方的名聲已經傳開了，每每搗毀一個拐賣小孩或是婦女的窩點，她總因殺敵太勇立下頭功，偏偏她又不是官府的人，官府只能賞她大筆大筆的銀子。\n樊長玉眼瞅著兜裡的銀票一天天厚實了起來，長寧卻還是沒消息，心中急得不行。\n官府審訊那些人販子後，她得知有些孩童已經被賣去不同州府了，只要是跟長寧符合的女童，樊長玉都記了下來，她把一半銀票留給了趙大娘，懷揣著另一半銀票背著幾把殺豬刀，打算橫跨幾大州府去找長寧。\n為了方便找人，官府的人建議她找人給長寧畫一幅畫。\n樊長玉這才想起家中有過年那會兒書生給畫的現成的，她還裱起來掛她和長寧的屋子裡了。\n等回家去找，她把家裡翻了個底朝天，卻仍沒找著那副畫。\n之前樊長玉諸事纏身，壓根沒想起那副畫，此刻那副畫不翼而飛，倒是讓她突然警覺起來。\n那畫又不是名家所作，誰會專程來偷？\n再者，臨安鎮在遭遇清風寨屠害後，基本上就是一座死鎮了，幾乎沒人會來這鎮上，便是有宵小之輩圖財的，那也該去大戶人家家中撿漏，不會光顧城西這些貧寒人家。\n樊長玉思來想去，驚覺唯一有可能拿走那副畫的，只有那一晚被她劫持後，八成會去而復返，回來堵藏在枯井裡的人的那癟犢子！\n畫上有自己，有長寧，還有言正，外人很容易會誤會她們是一家人。\n清風寨的人盡數落網後，只有那癟犢子和一女匪逃了出去，難不成就是她們根據那副畫，劫走了長寧意圖報復自己？\n樊長玉想到薊州已沒了那癟犢子容身之地，他原本是崇州的官兵，指不定會跑回崇州去。\n有了尋人的方向，她當天就買了一匹馬，一路打聽著往崇州去。`
        },
