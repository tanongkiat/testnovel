            num: 39,
            title: `第39章第39章（捉蟲）`,
            content: `月落霜天,寒星點點。\n一杏黃衣衫的男子出了辦燈會的街，一身鬱氣朝花街走去。\n燈會那邊人聲鼎沸，燈火照不到的其他街巷,則像是黑夜中靜靜蟄伏的猛獸,詭異中透著危險。\n不過好在僅一街之隔，就是高掛著紅燈籠的花街了,燈火重新旖旎起來。\n黃衫男子從離開燈會的這條必經之路上走過時，眼前突然有什麼東西兜頭罩下,阻隔了視線，黃衫男子嚇得剛要大叫，腹部就挨了一記重錘,那股劇痛讓他整個人都蜷縮起來，到了嘴邊的喊叫聲也一下子洩了力。\n緊跟著臀上被重重踹了一腳,整個人跌進一旁烏漆嘛黑的深巷裡，棍棒雨點般落到了他身上。\n黃衫男子被打得哭爹喊娘,在麻袋裡雙手抱頭蜷縮成一團：「好漢別打了！別打了！我有錢，我身上的銀子全給你們,好漢放過我吧！」\n沒人應聲,反倒是臉上隔著麻袋又挨了幾拳。\n黃衫男子叫得更悽慘了,路過的行人聽到黑黝黝的巷子裡傳來的慘叫聲,怕惹禍上身壓根不敢上前幫忙，跑遠了才喊一聲：「快報官,那邊巷子裡有人被打了！」\n樊長玉一聽,未免落下作案證據,收起錘衣棒後,極為謹慎地把套在黃衫男子上半身的麻布袋也一把扯了下來。\n只不過這扯得太用力了些,黃衫男子直接被這股力道帶得臉砸地,門牙都崩斷了一顆，那慘叫聲悽厲得遠處的花街都能聽見。\n樊長玉愣了一下，聽見街口已傳來凌亂的腳步聲，也管不了那麼多了，拔腿就往巷子另一頭跑去。\n為了蹲人，她特意選了一條兩頭臨街的暗巷，方便逃跑。\n謝徵帶著長寧等在巷尾，兩人打了個照面，一句話沒說，就極為默契地先快步離開了這事發之地。\n走出兩條街後，謝徵才問了句：「你把人怎麼了？」\n聽著那悽厲的慘叫，不像是只把人打了一頓。\n樊長玉說：「我沒把他怎麼樣，是他自己太蠢了，我扯麻袋的時候他一個踉蹌臉朝地崩斷了一顆牙。」\n謝徵側首看她一眼，似乎不太相信她這套說辭。\n樊長玉：「……我真沒騙你。」\n謝徵問：「其他幾個還教訓麼？」\n樊長玉心說這人把自己當啥了，道：「不了，一天之內把他們幾個都扁一頓，無非是明擺著告訴他們是我幹的，這個嘴巴嘴不乾淨，今天先揍他一頓解氣，其他幾個逮著機會再慢慢教訓。」\n與此同時，還躺在巷子裡嚎的黃衫男子總算是被趕來的官差扶了起來。\n他兩隻眼都被打淤青了，磕斷了一顆門牙滿嘴都是血，鼻下也掛著兩管鼻血，借著火把的光，總算是看清了地上自己那顆斷掉的門牙，哭天嗆地道：「牙都斷了，我今後可怎麼入仕啊！」\n他是縣令的親外甥，對著一眾捕快大呼小叫：「還不去給本少爺查！把毆打本少爺的歹徒捉拿歸案！」\n今日當值的捕快擦著額角的汗問：「公子近日可有結什麼仇家？」\n黃衫男子仔細想了想，因為疼痛咧著嘴道：「前些日子王家那小癟三在風月樓裡跟本少爺搶粉頭，叫本少爺羞辱了一頓，極有可能是他！還有劉家那兒子，自詡清高會試又沒中，被我嘲諷過，也有可能是他，還有李家……」\n捕快聽他數了一堆跟他有過節的人，頭都大了。\n黃衫男子說到最後，總算是想起今晚燈會上的事，道：「今晚本少爺還替宋兄諷刺了他那前未婚妻。」\n這件事說起來不太光彩，畢竟燈會上那麼多人看著他們縣學的幾大才子被一個贅婿懟得啞口無言，他打住話頭問：「宋硯兄他們可有被歹徒所傷？」\n捕快一搖頭，他就立馬道：「一個屠戶女和她那病懨懨的贅婿，本少爺諒他們也沒這個膽子，你們仔細查本少爺前邊說的那幾家去！」\n捕快們追查去了，他才哎喲哎喲地由人攙扶著去附近的醫館看傷。\n-\n樊長玉到溢香樓安排的臨時住所時，管事婆子還沒歇下。\n見了她們笑問：「燈會好看嗎？」\n長寧在回來的路上就已經趴在謝徵肩頭睡著了，樊長玉因為打人的事尚有幾分心虛，只含糊道：「好看，到處都是人，挺熱鬧的。」\n管事婆子引著她們去一間房，打開了房門笑道：「只有這間屋子還空著了，你們先將就一晚。」\n樊長玉道了謝，又要了一壺洗漱的熱水，簡單給長寧擦洗完手臉後，便把人放床上去睡。\n她自己洗了把臉，發現水壺裡的熱水沒剩多少了，又不意思大半夜的再讓那管事婆子幫自己燒一壺，把洗臉後的水倒進了泡腳盆裡，將就著泡泡腳。\n謝徵用壺裡剩下的熱水洗完臉時，她兩隻腳還踩在泡腳盆裡，見謝徵要把洗臉水端出去倒掉，忙道：「你倒腳盆裡吧。」\n謝徵遲疑片刻，端著水木盆走了過去。\n樊長玉見狀便把腳抬起來，放在了木盆邊緣，方便他倒水。\n許是常年不見日光的緣故，她那雙足極白，在燭火下呈現出暖玉一般的色澤，腳踝處有一顆黑色小痣，莫名扎眼。\n謝徵只瞥一眼，便垂眸遮住了視線。\n在京中，女子被人瞧見雙足無異於失了清白，這邊陲小鎮，民風比京中開放不少，河堤旁搗衣的婦人也經常赤足，似乎並未把裸足當回事。\n她性子一向大咧，此舉也算不得出閣，謝徵心頭卻還是微微有些異樣。\n樊長玉見他倒完水後就坐得遠遠的，問：「你不泡泡腳？」\n謝徵說：「你先洗，一會兒我去外邊用冷水淋一下。」\n樊長玉把眼一瞪：「這大冷天的，你要冷水洗腳？明兒不得染上風寒？」\n相處的這一月多裡，她也發現了言正是個愛乾淨的人，以為他是不想洗自己用過的水，道：「我們家以前都是一盆水泡腳的，我忘了你有潔癖的事，等會兒我去找管事大娘說一聲，再去廚房給你燒壺水。」\n謝徵皺了皺眉，終是道：「不用，將就這水就好。」\n樊家人都很愛乾淨，鞋襪換得勤，這水用過了瞧著也不髒。\n是他心中有些亂。\n把腳放進水盆裡時，瞧見盆沿的水痕，腦中下意識浮現了她搭在上面的一雙足。\n謝徵眉頭瞬間皺得更緊，腳剛伸進去，就忙起身去倒水。\n樊長玉坐在桌邊，見狀張了張嘴，等他回來後心情複雜道：「你有潔癖也沒什麼的，我沒覺著你是在嫌棄什麼，你沒必要把自己逼到這份上……」\n謝徵看著燭火下她那雙誠摯又明澈的眼，好看的眉宇間多了幾許自厭的情緒，只說：「不是你想的這樣。」\n只有一張床，被子也只有那一條，他把木盆放回屋內後往房外走：「你早些歇著。」\n樊長玉覺著這人有些怪怪的，問：「那你呢？」\n總不能去外邊坐一夜吧，方才那管事婆子就說了只剩這一間房。\n謝徵道：「我去問問，看能不能跟溢香樓的夥計擠一晚。」\n直到他離開後房門重新合上，樊長玉面上都還有些懵。\n怎麼突然就把她當洪水猛獸似的？\n套麻袋嚇到他了？\n還是那盆洗腳水的傷害太大？`

        {
            num: 40,
            title: `第40章第40章`,
            content: `飛雪飄落簷下,臺階上都積了薄薄一層。\n謝徵靠著廊柱抱臂站著，半垂著眼帘不知在想些什麼，頭頂的燈籠灑下一地暖光,將他纖穠合度的睫羽在眼瞼下方拉出一片暗影。\n他見過很多美人，也在魏嚴宴請賓客時見過赤足起舞的西域舞姬。\n舞姬那雙足的模樣他已不記得,唯一還有印象的就是腳踝上綴著鈴鐺的金色腳鏈，隨著舞動而叮噹作響,像是一種無聲的邀請。\n看到樊長玉露出的那一雙足時,不知怎地，他突然就想起了舞姬腳上的那串金鈴鐺。\n隨即便是覺著荒唐。\n同時心中升起一股冒犯了她的自厭。\n謝徵煩躁揉了揉眉心,他自小寄人籬下，為了秉承父親的遺志，一直苦讀兵法勤練武功,加上魏嚴對他和魏宣管教嚴苛,未免他們耽於男女之事,連身邊伺候的人都一律是小廝，而無一婢子。\n他上了戰場後，一心殺敵，更沒想過這些。\n魏宣不知是見他恪守魏嚴定下的規矩才對著幹，還是純粹起了忤逆心思,經常出入青樓、豢養外室，為此沒少被魏嚴責罰。\n那時魏宣嘲諷他只能做一條乖順的狗，問他識得溫柔鄉是個什麼滋味嗎，謝徵心中竟是和魏嚴一樣的想法，只覺此子難成大器。\n雖然不願承認,但他從前的確是受魏嚴影響頗深,魏嚴認為掌權者,必須要學會控制自己的欲.念，男女之欲，只是最低俗的一念。\n他從軍中歸來後，偶爾礙於情面推脫不掉一些宴會，前去赴宴時瞧見柔弱無骨的舞姬贏得滿堂喝彩，心中只有輕蔑。\n他和魏嚴一樣，瞧不上京中權貴的這一套，甚至覺著這些紙醉金迷只會讓人軟了骨頭。\n他將來娶妻，娶的也只會是擔得起謝家門楣的大家婦，而不是像他母親那般脆弱的女子。\n沙場刀劍無眼，也許有一天他也會和他父親一樣，死在戰場上，他不需要誰為他殉情，只需要一個在他去後，替他撐起謝家門楣的宗婦。\n整個京城的世家子娶妻，都是以這樣的標準去世家女中遴選。\n但這些天……他是怎麼了？\n眼前下意識又浮現樊長玉的模樣，殺豬的、砍人的、咬牙隱忍的……\n她很好，甚至比許多世家女都堅韌，只不過她生長的環境太簡單了些，應付不來各路牛鬼蛇神……終究做不得謝家宗婦。\n意識到自己在想什麼，謝徵整個人都愣了愣。\n管事婆子提著燈籠巡查院落時，瞧見他站在廊下，問：「小兄弟怎不回屋歇著？」\n謝徵收斂了思緒，道：「正打算去找您，可否跟溢香樓的夥計擠一晚？」\n管事婆子疑惑道：「你是樊娘子的夫婿，怎不跟她睡一間房？」\n謝徵找了個由頭：「她帶著妹妹，不太方便。」\n管事婆子心說長寧那才多大個孩子，但考慮到長寧再小也是個女兒家，點了點頭道：「是老婆子顧慮不周，樓裡的夥計都是兩人一間房，本沒有多的房間，不過有個夥計鼾聲太響了，旁的夥計跟他一個屋都睡不著，你要是不介意，就去他房裡將就歇一晚吧。」\n謝徵只說不介意，管事婆子便帶他去了那夥計的房間。\n還在門外便聽見了那震天的鼾聲，跟打雷似的，謝徵有片刻沉默。\n管事婆子推開房門，門軸轉動的「吱嘎」也沒能吵醒那夥計分毫，她引著謝徵進屋後，把油燈點上，指了指邊上空著的一張單床：「你今晚就睡這兒吧。」\n謝徵道了謝，管事婆子便提著燈走了。\n他脫下外袍枕著手臂躺到床上，本就沒多少睡意，對面床鋪的夥計鼾聲如雷，更是吵得他連合眼的心思都沒有。\n忍耐了一刻鐘後，謝徵起身走到那夥計床鋪邊上，一手刀砍在了那夥計後頸上，夥計被打暈過去，鼾聲瞬間停了。\n他重新躺回床上，只是依然沒有睡意。\n從前沒想過同樊長玉的以後，今夜突然想到娶妻的事，心中卻莫名煩躁起來。\n他知道樊長玉做謝家宗婦是不合適的，但回京後娶一個進退有度知書達禮、能幫他打理謝家大小事務的世家女，他又下意識有些排斥。\n他像是在荒野裡找到了一株生命力極強的野草，他有些喜歡，但是把這株野草挖回家去，和其他奇花異草一比，旁人只會嘲笑那株野草。\n野草只有在它自己的原野裡，才是肆意又頑強的，放進名貴的瓷盆裡精心打理的，便不是野草了。\n他抬起一隻手橫放在眼前，手背搭在眉骨處，唇在夜色裡抿得極緊。\n-\n第二日天還沒亮，樊長玉便起來了，長寧還睡著，她穿戴好衣物後輕手輕腳出了房門，讓管事婆子幫她照看著些長寧便去了溢香樓。\n縣城裡這座溢香樓的布局和臨安鎮上的差不多，不過修得更氣派些。\n大大堂裡跑腿的夥計們還沒來，後廚的人倒是已經到齊了。\n要滷的豬頭也早就有人處理好了，樊長玉火都不用自己燒，只準備滷料就行。\n俞淺淺親自跟幾個大廚商量著開席時先上哪些菜，後上哪些菜，壓軸菜又是什麼。\n樊長玉雖是個外行，卻也聽得出這極為講究，畢竟一些菜放久了，就失了風味。而如果接連上大菜，後廚這邊備菜來不及，遲遲上不了菜，那可就丟臉了。\n尋常人家開席菜上晚了沒什麼，這些達官顯貴訂的包席菜上晚了，是讓主人家失了顏面，主人家會找溢香樓理論不說，傳出去也砸溢香樓的招牌。\n俞淺淺交代完廚子們各項流程的細節，瞧見樊長玉坐在灶臺後邊，半點沒架子地擠過來跟她一起烤火：「這才大年初二，就讓你來樓裡幫我，委實是辛苦了。」\n樊長玉道：「俞掌柜要忙這麼多事，瞧著才辛苦。」\n俞淺淺笑道：「掙錢就沒有容易的，做好這一單生意，溢香樓在縣裡的名氣就算是徹底打出去了。」\n之前溢香樓在縣城開業，叫王記背刺了，生意一直不溫不火的，縣城裡的顯貴提起溢香樓，甚至還會把開業當天沒了祥瑞的事當做笑談。\n俞淺淺為了把溢香樓的檔次在縣城裡提起來，給那些貴婦人們送了不少新奇貴禮，才接下了今日這場包席。\n她似想起什麼，問樊長玉：「對了，你家的滷肉有設計圖徽嗎？」\n樊長玉一臉迷茫：「那是什麼？」\n俞淺淺一巴掌蓋到自己臉上：「怪我這些天太忙了，忘了提前同你說，就是像王記滷肉那樣，有自己訂做的招牌。」\n樊長玉搖頭。\n俞淺淺道：「你的滷肉在我樓裡，對標的是醉仙樓的王記滷肉，沒有圖徽，也得請人寫幾個字瞧著才像樣。」\n樊長玉不解：「滷肉不都是切好了裝盤端上桌子麼，有沒有圖徽應該都不妨事。」\n俞淺淺說：「你進門時應該也瞧見了，我樓下有幾個鋪子是對外招租的，方家的茶葉，李家的酒水，都在那裡有賣。你家的滷肉我也給你留了個位置，你回頭多滷些擺放到那邊賣，賣多少都算你自己的，總之得把名氣打出去，不然我這樓裡用的滷肉沒個來頭，叫人瞧著豈不是被醉仙樓壓了一頭。」\n她說著就要起身：「我讓人去找個字寫得好的秀才，臨時給你寫個布幅掛上去。」\n樊長玉想到謝徵，忙道：「我夫婿會寫字，等會兒我找我夫婿就是。」\n俞淺淺有些遲疑：「你夫婿字寫得怎麼樣？」\n樊長玉說：「他字寫得可好看了！」\n有了她再三保證，俞淺淺手邊事的確還多著，便對她道：「那你現在就去找你夫婿過來，若是不成，我再命人去請個秀才過來。」\n滷肉已經下鍋了，現在只要看著火就行，樊長玉也不墨跡，當即就應了聲，去溢香樓後邊的巷子裡找謝徵。\n-\n謝徵昨夜想著事睡不著，天光才淺眠過去。\n不過很快就被前來叫那夥計的管事婆子吵醒了。\n管事婆子叫那夥計時直犯嘀咕：「這堂子從前瞧著也不是個躲懶的，怎地今日睡到了這個時辰還沒醒。」\n被她叫醒的夥計睜開眼一臉迷茫，瞧見天都亮了，忙穿衣起身，剛動一下卻又「哎喲」慘叫了一聲，揉著自己後頸道：「我好像落枕了，脖子怪疼的。」\n管事婆子虎著臉說：「你這是躲懶睡多了！」\n夥計起遲了，被教訓了也有些心虛，皺著張臉穿好衣物後，匆匆洗了把臉便去前邊樓裡忙活。\n這會兒整個院子裡都是溢香樓的夥計們走動的聲音，謝徵也沒了繼續睡的心思。\n一夜未眠他下顎青色的胡茬都冒了出來，剛洗漱完，樊長玉就找了過來，瞧見他眼下的青黑，疑惑道：「你昨晚不會一宿沒睡吧？」\n正好管事婆子從院子裡路過，聽到樊長玉的話，再看謝徵那副沒睡好的頹然模樣，道：「我昨晚就說了堂子那孩子打鼾有些吵人，小兄弟肯定是被吵得睡不著吧？」\n謝徵不知怎麼回復樊長玉，管事婆子這麼一說便遲疑點了頭。\n樊長玉看著他頓時面露同情。\n在管事婆子走後，她道：「今晚回家後你好好補個覺吧，現在有個事得請你幫個忙。」\n可能是沒睡好的緣故，謝徵看著她一行一合的紅唇，一時間竟沒聽清她說什麼，反倒是想起了自己入睡那一小會兒做的夢。\n夢裡他們如約和離，她轉頭嫁給了旁人，穿的依然是他們成親那日的婚服，看不清她所嫁男子的樣貌，不過她臉上的笑容實在是明媚肆意得刺眼，似乎嫁的是個合她心意的郎君。\n說不上心中是什麼感覺，總歸不太愉快。\n此刻再看著樊長玉，他唇角不自覺向下抿了幾分。\n樊長玉說完見謝徵壓根沒回話，反倒是一臉陰沉地望著自己，不由伸手在他眼前晃了晃：「你聽見我說什麼了嗎？」\n謝徵回過神，很快收斂了思緒：「你說。」\n樊長玉狐疑瞅他兩眼：「你方才想什麼呢？」\n謝徵道：「沒什麼，剛醒來，精神有些不濟。」\n樊長玉自己也有睡不好犯迷糊的時候，沒覺著他說的是假話，提起正事：「你幫我去寫幾個字唄。」\n謝徵問：「寫什麼？」\n樊長玉道：「俞掌柜說今日的生意是和醉仙樓比著來的，不能落了下乘，咱們家的滷肉得像王記滷肉一樣，有個自己的招牌。俞掌柜在樓下大堂外留了一塊地給咱們擺滷肉，訂做匾額是來不及了，先寫個布幅掛上去湊合著用。」\n謝徵點了頭，問：「筆墨和布幅準備好了嗎？」\n樊長玉道：「俞掌柜幫忙備了。」\n謝徵說：「那過去吧。」\n溢香樓夥計們住宿的地方就在溢香樓後邊的巷子裡，出行很方便，平日裡買菜或運送潲水也是從這邊走，畢竟溢香樓的後門就開在這邊。\n樊長玉和謝徵出去時，不巧就碰上了前來拉潲水的。\n除夕和元日那兩天拉潲水的在家過年，溢香樓攢下的潲水沒處理，這才一大早就讓人來運走。\n得虧是嚴冬，潲水放了兩天也沒什麼異味。\n不過巷子窄小，潲水車路過時得儘量靠邊站著，否則身上很容易沾到潲水桶上的穢物。\n樊長玉和謝徵避讓在一邊，眼見那潲水車都快過去時，怎料車輪子碾過一顆石子，整個潲水車都跟著顛了一下，靠邊的潲水桶蓋子都被顛得跳了起來，裡邊的潲水也灑了出來。\n謝徵眉頭一皺，手疾眼快把樊長玉往自己這邊一拉。\n樊長玉被扯得一頭撞進他硬邦邦的胸膛，潲水桶裡灑出的潲水濺到了她方才站的地方。\n拉潲水的老伯回頭連聲道歉：「對不住對不住，剛才碾到了石子，沒濺到你們身上吧？」\n謝徵看了一眼樊長玉的裙擺，道：「沒濺到，老伯你走吧。」\n老伯這才重新趕著馬兒走了。\n謝徵見樊長玉一直沒做聲，而自己還攥著她手腕，心口一悸，瞬間鬆開攥著她的手背到身後，掌心似要燒起來：「你……」\n只說了一個字，他便禁了聲。\n樊長玉低著頭，兩滴鼻血落在了結著薄冰的青石板地面上，一臉生無可戀。\n在他胸膛上撞太狠，撞出鼻血了。\n謝徵沉默兩息，說了句：「抱歉。」\n樊長玉甕聲甕氣答「沒事」，但因為鼻梁被撞得太疼，眼中泛起了生理性的淚花花，怎麼看都有些可憐。\n她掏出自己的手帕胡亂擦了擦，但剛擦完，又有鼻血流出來，她仰起頭想止血，但頭剛仰起來，就被一隻大手按著後腦勺壓了回去。\n謝徵說：「流鼻血了別仰頭。」\n樊長玉只能用手帕捂在鼻孔處，喪喪道：「一大早的就見血，看來我今天得倒黴。」\n謝徵又說了句抱歉，樊長玉頗有些無奈地道：「我開玩笑呢，我怎麼可能倒黴，我得福星高照、日進鬥金！」\n鼻血似乎止住了，但鼻頭還是極不舒服，她取下帕子後，吸了吸鼻子說：「也算是福禍相依吧，躲過了被淋一身潲水的劫數，轉頭就在你身上被撞出鼻血了，撞出鼻血總比淋一身潲水好，說來還是我賺了！」\n怕謝徵自責，她還用力動了動鼻翼，「你看，血這不就止住了……」\n最後一個字卡在了喉嚨裡。\n謝徵拿過她手上的帕子在她鼻翼旁輕輕擦了兩下，「這裡還有血跡沒擦乾淨，血剛止住，呼吸別太用力。」\n隔著帕子，也能清晰地感受到他指尖的力道。\n眼前這個人出生時大抵是極得上蒼偏愛的，劍眉星目，五官精緻卻半點不顯女氣，淺風從他身後吹過，拂動他袖袍，也拂動他鬢角的碎發，牆頭的枯枝搖搖墜墜落下一片褐色枯葉。\n樊長玉覺得自己像一隻舉著大鉗子耀武揚威的龍蝦，突然就傻愣愣地不知道怎麼揮舞鉗子了。\n謝徵收回手，見她出神，問：「還疼？」\n樊長玉搖頭，半開玩笑道：「你脾氣要是一直這麼好，往後也不愁沒女孩子喜歡了。」\n謝徵眸光有一瞬冷了下來，漆黑的眸子睨著她，食指和拇指還捻著她的手帕，皮笑肉不笑答了句：「那便借你吉言了。」\n樊長玉一臉莫名其妙，她誇他呢，怎麼他說話突然又帶刺了？\n二人從後門進了溢香樓，謝徵在俞淺淺備好的三角布幅上寫字時，樊長玉想著他還沒用早飯，去後廚拿了夥計們吃的饅頭和粥給他。\n出來時謝徵寫布幅的桌前已圍了不少夥計，就連樓裡的帳房先生都在誇他那筆字了得。\n布幅上的墨跡幹了，便有樓裡的夥計幫忙掛起來。\n樊長玉瞧了一眼，明明只是平平無奇的「樊記滷肉」四個字，但經他寫出來，的確是好看得緊，字跡遒勁，運筆飄逸，四張三角狀的布幅掛上去，瞧著比金漆匾額還□□些。\n樊長玉心情極好地把粥和饅頭端給謝徵：「你先吃點東西墊墊肚子。」\n俞淺淺路過大堂，瞧見她讓下人用紅綢布臨時裁剪出的布幅上寫的這幾個字，不由也「嘖嘖」讚嘆了兩句，直誇樊長玉找了個好夫婿。\n又給樊長玉支了個招兒：「長玉妹子，回頭你找人訂做一批紙袋，紙封上也印上你夫婿寫的這幾個字，有人來找你買滷肉，你就用這紙袋裝，名氣不愁大不過王記去。」\n市面上賣熟食的都是用油紙包起來，樊長玉鋪子裡的滷肉也是用油紙裝。\n那油紙油水不浸，光滑的一麵包吃食，粗糙的一面朝外。\n樊長玉也注意到了溢香樓賣的鍋子底料便是用紙盒裝起來的，那紙盒上還印著花鳥圖，綁的細麻繩打著她沒見過的漂亮繩結。\n俞淺淺特地讓她多滷了一鍋肉，說留著放這門店裡賣。\n樊長玉腦中靈光一閃，在謝徵喝粥的功夫裡出去了一趟，回來時買了一摞油紙和一卷細麻繩。\n她切了半斤豬頭肉試著用油紙包起來，再拿細麻繩打個結固定，倒也像模像樣了，就是油紙上沒有樊記的字樣。\n謝徵剛就著鹹菜吃完饅頭白粥，就發現樊長玉目光如炬看向了自己：「言正，要不你再幫忙寫幾個字？」\n謝徵：「……」\n在正午溢香樓開席前，他在百來張油紙的毛面題了字。\n俞淺淺再次路過時，瞧見樊長玉這臨時補救的法子，笑道：「果然是夫妻同心，其利斷金。」\n她見樊長玉打的結有些歪，還主動教她怎麼打好看的繩結，「這根繩從這邊繞過來再系上就好看了。」\n樊長玉向她道謝，她用力在樊長玉肩頭拍了拍：「謝什麼，今日咱們出的同一口氣，你家的滷肉若是叫王記比了下去，才是落我的臉面。」\n快到午間時，整個溢香樓就忙了起來，陸續有賓客到場，樓裡負責接待的夥計就有十來個，男客由小二接待，女客則由衣著統一的侍女接待。\n不管是小二還是侍女，言行舉止都落落大方，臉上掛著笑容卻又並不諂媚，瞧著就跟別處的酒樓不一樣。\n對於畏寒的女客，酒樓裡還專門準備了湯婆子，實在是周到。\n樊長玉忍不住同謝徵道：「溢香樓是我見過的最氣派的酒樓了。」\n謝徵答：「尚可。」\n京中最好的酒樓比起這有過之而無不及，不過在這小地方，能開起這樣一座酒樓，那位女掌柜委實也算有些本事。\n樊長玉斜他一眼：「你這張嘴說一句誇讚的話怎麼就這麼難呢？」\n謝徵說：「等你見過更好的，你也不會見什麼都誇。」\n樊長玉：「……」\n她這是被懟了吧？是吧？\n她索性不再說話，不過二人也沒能閒多久，很快就有人來問：「你們這滷肉怎麼賣的？」\n樊長玉也是今日在溢香樓賣滷肉才知道，俞淺淺對外賣的價是一百文一斤，都趕得上平日裡滷肉兩倍的價錢了。\n她心驚膽戰說了價後，那小廝都不帶還價地要了三斤。\n樊長玉愣了一下，趕緊利落切肉給人包起來。\n心下卻仍有幾分懵，借著溢香樓的名氣做生意這般容易的嗎？\n等那小廝走後，她小聲同謝徵道：「我頭一回把滷肉賣這麼貴，良心有點不安。」\n謝徵說：「看看你邊上那個賣酒的。」\n賣酒的那家是縣裡有名的一家老窖，生意比她們這邊好。\n樊長玉看了一會兒沒看出什麼名堂，問謝徵：「賣酒的怎麼了？」\n謝徵抬眸看她：「你就沒發現那一小壇酒就賣了將近一兩銀子？」\n樊長玉小雞啄米般點頭：「看見了，不過酒水本來就貴啊。」\n謝徵輕嗤一聲：「貴在哪裡？酒不過也是糧食和酒麴釀出來的，成本還不一定有你這些肉高。」\n樊長玉想了一下豬肉的價錢和糧食的價錢，竟覺得他說的很有道理。\n謝徵道：「物賤物貴，都是看有沒有人買，一堆人願意拿著高價買，東西就貴起來。反之，所有人只願意出低價，那麼這東西就不值錢了。」\n樊長玉似懂非懂點了頭。\n又賣出幾單後，她自己個兒倒也慢慢琢磨出了點東西。\n來溢香樓用飯的都是不缺錢的人家，這些富貴人家大多都會有著「貴即好」的念頭，物美價廉對她們來說反不適用。\n一些入口的東西，突然低於她們平日裡買的價格，她們第一反應不會是覺著買到了好東西，而是害怕這東西吃了有問題。\n這麼一想，她倒也明白俞淺淺這溢香樓裡的東西，價格為何都要比普通酒樓貴上一些了。\n菜品過硬是一部分原因，還有一部分原因則是源於攀比心，俞淺淺把溢香樓打造成了一個達官顯貴才會來用飯的地方，花大筆銀子來這裡吃飯，買到的不僅是美味佳餚，還有一種自己成了人上人的認同感。\n飯前樊長玉這裡生意一般，偶有幾單也是外邊街上路過的人買一些回去當年菜的。\n第一輪吃席的人用完飯後，大概是在席間嘗過這滷肉了，她這裡的生意突然爆火，不少丫鬟小廝排起長隊來買，樊長玉一個人切肉加包裝應付不過來，便把包裝的活兒交給了謝徵。\n他容貌實在是打眼，加上鋪子外邊有人排起長隊，路過的人大多都會瞧上一眼，引得不少大姑娘小媳婦都來排隊買滷肉。\n晚到的賓客一見大堂瞧見這架勢，難免問一句：「怎地這麼多人去買滷肉？」\n接待的夥計便笑答一句：「上一輪吃席的客人在席間嘗了樊記的滷肉，覺著味道甚好，想買些拿回家去給家裡人也嘗嘗。」\n那賓客一聽，立馬也指使跟在自己身邊的家僕：「這麼多人買，想來這樊記滷肉也不是個徒有其名的，給家中老太太買些回去。」\n還有擅喜歡書法字畫的賓客一進門，就瞧見了「樊記滷肉」那幾個大字，嘆息：「這樣一筆好字，寫在這幌子上，委實是浪費了！」\n定眼一瞧，發現那些排隊買滷肉的下人捧走的油紙包外邊也寫了「樊記滷肉」幾字，筆鋒遒勁，更是嘆惋不已，不買滷肉，反讓身邊小廝去買一張包滷肉的油紙回來。\n樊長玉聽到這要求也有些傻眼，不過只要給錢就行。\n她算是明白了，有錢人的追求和普通人不太一樣，她收了銀子，大方地拿了好幾張油紙給那小廝。\n宋家出了個舉人，在清平縣如今也算得上有頭有臉的人物，宋母又熱衷於跟官太太富太太們打成一片，像是想把過去那十幾年沒有過的風光都撿起來。\n今日這樣的酒席，她自然也跟著來了。\n瞧見一堆下人排著長隊買滷肉，桌上不少闊太也差遣了下人去買，她原本也想湊個熱鬧，只是在瞧見那望子上寫著「樊記滷肉」四字時，臉色就變了變。\n再仔細一瞧，見在鋪子裡忙活的是樊長玉時，一張臉都垮了下來：「她怎會在此處……」\n邊上同她相熟的婦人問：「宋夫人認識那小娘子？」\n宋母長嘆一口氣，頗有幾分悲天憫人地道：「那是個苦命的孩子，命犯孤煞，前不久才剋死了她爹娘，後來又剋死了她大伯，約莫是被鎮上人排擠，才來這縣城裡謀生的吧。」\n經商和為官的人最忌諱這些，宋母話一出口，這一桌的婦人便齊齊變了臉色。\n「這大過年的，溢香樓掌柜什麼人都往樓裡放的嗎？」其中一個婦人忌諱得直接離席。\n另一名官婦則直接喚來樓裡伺候她們用飯的侍女，板著臉道：「把你們掌柜的給我叫來。」\n那侍女不敢怠慢，當即就去叫了俞淺淺。\n俞淺淺瞧著雖年輕，處理起這些事手段卻老辣得緊，過來時臉上帶著笑意：「錢夫人，這是怎了，樓裡但凡有招待不周的地方，我給您賠個不是。」\n整個清平縣有頭有臉的人物，俞淺淺都認得，家中做什麼營生的她心中葉門兒清。\n這位錢夫人在這桌敢這麼硬氣，就是因為她家是開錢莊的。\n錢夫人冷著臉朝樓下的樊記滷肉一抬下巴：「咱們今日是來喝喜酒的，你讓那煞星在你樓裡做生意，不是給咱們添晦氣嗎？」\n樊記鋪子前全是排著隊買滷肉的，俞淺淺大概猜到了錢夫人說的是樊長玉，卻裝傻道：「什麼煞星，大過年的，錢夫人說這些可不吉利。」\n錢夫人見她這般，也緩和了臉色：「你還不知情？聽說是樊家女是個孤煞命格，剋死了爹娘又剋死了她大伯，可別留她在你這樓裡做事，當心她克到了你！」\n俞淺淺以手捂嘴「咦呀」了一聲，像是被嚇得不輕：「您是聽誰說的？」\n錢夫人立馬把宋母推了出來：「宋夫人原先也是臨安鎮人，對那煞星的事知道得一清二楚。」\n俞淺淺道：「原來是宋夫人說的啊，我聽說宋公子和樊家定親數載，宋公子中舉後，找人一合八字，才算出了樊家大娘是個孤煞命，趕緊退了婚，得虧這婚事退得早，不然宋舉人就得錯過給縣令當東床快婿了。」\n在座的都是些人精，聽俞淺淺這麼一說，看宋母的眼神瞬間微妙了起來。\n宋母怒目而視：「你！」\n俞淺淺無辜地眨了眨眼，「算命這些我也不清楚，不過城南那個半仙倒是說樊家娘子是個旺夫命，她夫婿寫得一筆好字，聽聞昨晚的燈會上，宋舉人還被她夫婿一句『北雁南飛，遍地鳳凰南下足』懟得啞口無言，想來才學了得，來年參加科舉指不定能給她掙一身誥命呢！」\n有人聽到那對子，沒抑制住發出一聲低笑。\n宋母還不知昨晚兒子在外丟人的事，但想到兒子回來後一言不發進了書房苦讀，此刻面對一桌子的商婦官婦打量自己的神色，頓覺臉上火辣辣地躁得慌，招呼都不打一聲就帶著丫鬟匆匆離席。\n一官婦帶頭嗤笑出聲，一桌子的貴婦人便都跟著笑了起來，無不鄙夷譏嘲地道：「終究是上不得臺面。」\n「退了人家姑娘的婚，怎還好意思這般編排。」\n「她手上那玉鐲你們瞧見了沒，一看就是假貨，沒有的東西我寧可光著個手也不戴，這位舉人娘當真是不怕羞人！」\n眼見貴婦們已經聊起了其他的，俞淺淺笑眯眯道：「諸位夫人且慢用，今日樓裡忙，有什麼招待不周的地方，還請多擔待。」\n貴婦們一個個又變得好說話了，甚至還有嘗了滷肉覺著味道不錯的，也差遣身邊婢子讓去樓下買些滷肉回去。\n樊長玉對俞淺淺幫自己解的這場圍半點不知，滷肉賣完了，她讓一宿沒休息好的謝徵先回去歇著，自己則去溢香樓後廚幫忙。\n一直到未時，溢香樓今日這場包席才算辦完。\n樊長玉清理出櫃檯抽屜裡賣滷肉賺的碎銀和銅板，數下來發現一共有十五兩多。\n她頭一回知道了什麼叫做暴利。\n雖然俞淺淺讓她來這邊賣滷肉時就說了賣多少算她自己的，但這鋪子是溢香樓的，客源也是溢香樓的，樊長玉沒打算把錢都當做自己的，去找俞淺淺分紅。\n俞淺淺聽她說了來意，倒是被逗笑了，問她：「今日一共賣了多少？」\n樊長玉如實道：「十五兩三百文。」\n這個價挺讓俞淺淺驚訝的，她笑道：「我聽說了，裡邊還有貴客稀才打賞你夫婿的銀子，這些都是你們辛苦賺來的，你自己收著就是。」\n樊長玉道：「借了俞掌柜的寶地才能賣出這麼多滷肉，再者，買肉的本錢、滷肉用的調料是俞掌柜的，就連怎麼包裝滷肉，也是俞掌柜教的，俞掌柜你不拿一份，我心中不安。」\n俞淺淺點了點樊長玉額頭：「你啊，老實巴交成這樣，哪適合做生意。今日你的滷肉賣得好，歸根結底還是你家的滷肉味道確實上乘，不然為何一開始沒生意，那些賓客用完飯才指使下人來買？我是給你想了點子不錯，但真正把這點子落到實處的，也是你們小夫妻倆，你夫婿今日寫了多少紙封？你真要心疼，也是心疼他去。」\n她語重心長道：「你家的滷肉生意起來了，於我也是有好處的，你不必同我這般見外，咱們把這個人情放長遠些，將來說不定就有我要你幫忙的時候。」\n樊長玉這才作罷，但還是堅持把買肉用料的本錢付給俞淺淺。\n俞淺淺也發現了她是個實心眼，拗不過只得同意了。\n刨去三兩銀子的本錢，賺到的十二兩樊長玉找帳房先生把銅板全換成了銀子，打算和謝徵對半分。\n酒樓裡的廚子夥計們這會兒才用飯，俞淺淺道：「你先坐著吃，我差人去叫你夫婿和方婆婆他們過來。」\n樊長玉猜她口中的方婆婆就是後巷那邊的管事婆子，想到長寧還在管事婆子那裡，便道：「我去接我妹妹，順道叫他們就是。」\n她從溢香樓後門一出去，就見謝徵並未回房，反而是負手站在巷口看什麼。\n樊長玉走過去，順著他的視線只瞧見了一隊小跑著走遠的官兵，看服飾又是軍營那邊的，並非清平縣本地的衙役。\n她皺起眉：「是去徵糧的官兵？」\n謝徵點頭，神色瞧著極冷。\n住在城鎮裡的商戶大多都是買糧吃，官府從商戶手中徵不上糧來，只能想方設法讓商戶多掏錢。\n徵糧還得去鄉下找農人徵，樊長玉已經聽說了泰州那邊徵糧打死農人的事，此刻一顆心不由也提了起來。\n她道：「都說咱們薊州府的大官是個青天大老爺，可別跟泰州一樣，為了徵糧把百姓往死裡逼。」\n謝徵說：「且看薊州府那邊的作為了。」\n只要趙詢和他背後的人不傻，昨日就應已把魏宣來薊州徵糧的事捅到賀敬元跟前去。\n他回頭時見樊長玉衣袋鼓鼓的，眉頭輕皺：「這是什麼？」\n樊長玉掏出那十二兩碎銀和幾百個串好的銅板，分出一半遞給謝徵：「你的。」\n一兩銀子不起眼，但十二兩放在一起瞧著還是挺佔地方的。\n謝徵看她跟個土財主一樣摸出這些錢，眼皮淺淺跳了一跳，說：「你收著。」\n樊長玉道，「不成，咱倆一人一半，你寫了幾百張紙封呢。」\n他緩了一息道：「放我身上容易丟，你先替我收著。」\n有了他在小飯館丟錢的前車之鑑，樊長玉還真不能駁回他這話，只得一併先放進自己口袋裡，重新把衣袋塞得鼓囊囊的。\n二人回房去找長寧，還沒進房門，就聽見裡邊有兩個小孩在說話。\n「我阿姐可厲害了，一頓能吃三碗飯！」是長寧的聲音。\n「我阿娘更厲害，她一個人能吃兩個醬肘子，外加一碗胡辣湯！」男童似乎頗不服輸。\n「我阿姐的飯碗有湯砵那麼大！」聽語氣似乎還比劃了一下。\n「那……那還是你阿姐厲害些。」男童貌似屈服了。\n屋外的樊長玉：「……」\n湯砵大的飯碗，分明是她們爹的！`

            content: `樊長玉聽得額角直抽抽,推門而入：「寧娘。」\n「阿……阿姐。」前一刻還神氣不已的長寧，立馬心虛地換上了一副乖順表情，就是一雙葡萄眼亂瞟，不敢看樊長玉。\n謝徵跟在她後面進了屋,嘴角帶著不太明顯的弧度,瞧見屋內那個緞襖的男孩時,眸光微頓，問：「哪家的孩子？」\n男童臉上帶著嬰兒肥,瞧著也不過五六歲的年紀，一雙眼大而圓,眼尾微微下耷，小狗一樣，身上的衣裳用金線繡了刺繡,小腰帶上還鑲了寶石。\n站在長寧邊上，看起來老實巴交的,活脫脫一土財主家的傻兒子。\n謝徵問話後，他才把小胸脯一挺,道：「這些房子都是我家的。」\n樊長玉記得李廚子同自己說過,俞淺淺有個孩子，這孩子說這些房子都是他家的，莫非他就是俞淺淺的兒子？\n她心中剛有了這麼個猜測，院外便傳來了管事婆子的喚聲：「小公子，您躲哪兒去了？」\n孩童朝外道：「方嬤嬤,我在這兒。」\n管事婆子聞聲很快找了過來：「小公子怎躲到這裡來了，叫老婆子好找……」\n她見樊長玉和謝徵也在,有些歉疚道：「小公子年幼,誤闖了二位的住處,老婆子給二位賠個不是。」\n樊長玉只說沒事，又問：「這是俞掌柜的孩子嗎？」\n管事婆子笑著應是。\n樊長玉從管事婆子那裡得知男童名叫俞寶兒，樓裡人都喚他寶哥兒。\n樊長玉印象裡家中還算富庶的人家，給小孩取名都會取一個聽起來就很有文化的名字，俞淺淺的孩子，直接叫寶兒，委實讓她挺意外的。\n想到俞淺淺的性子，她突然又覺得一切都在情理之中了。\n幾人一道往溢香樓大堂去，路上長寧膽子又大了，時不時跟俞寶兒鬥嘴，謝徵走在最後邊，望著俞寶兒的背影眉頭皺起，眸色晦暗不明。\n-\n到了大堂，俞淺淺得知俞寶兒躲貓貓躲到樊長玉她們住的房間去了，也是哭笑不得。\n她問俞寶兒功課時，看到長寧，順口問樊長玉：「寧娘開蒙了沒？若是還沒開蒙，你大可送到我這裡來，我給寶兒請了個西席，教一個是教，教幾個也是教，樓裡的夥計，家中有孩子的，都送來一起讀書了，不求將來能考個狀元什麼的，識幾個字也是好的。」\n樊長玉心中對俞淺淺的敬佩又多了幾分，她雖意動，但從鎮上到縣城還是頗有一段路，長寧又還小，若是讓長寧到俞淺淺這裡來念書，必須有人早晚接送，而且她也不是溢香樓的夥計，已經受了俞淺淺不少恩惠，不能再理所當然地受這份好。\n她道：「多謝掌柜的好意，她跟著她姐夫學了幾個字，還算不得開蒙，年歲尚小，也是個怕讀書的，且等她再大些吧。」\n長寧立馬接話道：「寧娘會寫自己的名字了！」\n她說著就拿筷子在空中比劃：「木、爻、木、大，樊。」\n俞淺淺看得直笑，誇道：「寧娘真聰明。」\n她目光轉向樊長玉，帶了幾分揶揄：「我忘了，你家中有個才高八鬥的好夫郎，寧娘哪還用得著旁人教。」\n樊長玉說那番話本就是為了婉拒俞淺淺的好意，此刻被她打趣，便笑了笑，沒做聲。\n謝徵看了她一眼，也沒說話。\n俞淺淺又和樊長玉聊起了其他的，「我酒樓外的那個商鋪，可以長租給你，你若是分身乏術，我也可以讓酒樓的夥計幫你賣滷肉，旁的租戶要麼是直接交一年的租金，要麼是生意上給我兩層分紅，你若有意，租金我都可以給你便宜些。」\n玉香樓外的鋪子生意有多紅火，樊長玉今日是見識到了的。\n她說：「掌柜的待我太好了些。」\n這話讓溢香樓的所有夥計都笑了起來。\n帳房先生道：「咱們掌柜就是個菩薩心腸，對樓裡的夥計都好，樊娘子別見外就是了。」\n俞淺淺也說：「我這人交朋友看眼緣，我打第一眼瞧見你，就喜歡你這性子，你也別跟我忸怩，願不願意入駐我這溢香樓，給句話就是。」\n樊長玉道：「願意，租金不用少，不過我確實沒法自個兒看著鋪子，若是借用掌柜的人手，我再另付一份工錢。」\n俞淺淺聽了便笑問樓裡的夥計：「你們可都聽見了，願意多掙一份工錢的，這會兒就可以站出來讓樊老闆認個臉了。」\n樊長玉聽到「樊老闆」這稱呼，報赧之餘，又覺著怪新奇的。\n跟鎮上的人直接喚她長玉不同，好像她有了一層別的身份，而這層身份似一葉扁舟，眼下雖還小，卻能載她去更遠的地方。\n樓裡的夥計們交頭接耳議論了一陣，很快就有一個模樣頗為幹練的女子出聲道：「我願意去前邊的鋪子裡賣滷肉。」\n樊長玉對這女子有印象，她之前好像是專門接待女客的，做起事來井井有條，嘴還甜。\n俞淺淺同她道：「這丫頭叫茯苓，小時候被賣去給人當婢子，她自己攢錢贖身後，碰上我這樓裡招工，就來樓裡做事了，是個能幹的，你看如何？」\n樊長玉點頭：「就她了。」\n茯苓是個會來事的，當即就賣乖道：「多謝掌柜的，往後還請樊老闆多多照看了。」\n俞淺淺指著她對樊長玉笑：「瞧瞧，多會貧嘴。」\n樊長玉也忍俊不禁。\n用完飯，樊長玉便向俞淺淺辭行，縣城裡地段最好的鋪子租下來了，以後就得長期供滷肉了，她得回去考量一番，看是僱個車，還是直接買輛牛車，還有縣學那邊的臘肉，下午回去後也還得給那胖掌柜送過去。\n俞寶兒跟著她娘送樊長玉一行人到酒樓門口，大人們說大人們的，他們小孩也有自己的話說。\n俞寶兒對長寧道：「下次你來，我帶你去看我的書房，裡邊好多書，還有泥偶、木雕、珊瑚擺件，可好看了！」\n長寧緊緊攥著樊長玉的衣角，抿了抿唇，小腦瓜努力想了一番，終於想出了個能炫耀的：「你來我家，我帶你去看我阿姐的殺豬刀，大大小小十幾把呢！運氣好的話，還能帶你看我阿姐殺豬呢！你見過殺豬嗎？」\n俞寶兒搖頭，眼中不乏羨慕。\n長寧兩隻手比劃：「我姐一巴掌就能把豬玀拍暈！」\n樊長玉：「……」\n面對俞淺淺母子齊齊投來的震驚目光，她趕緊低咳一聲：「寧娘，走了。」\n長寧這才邁著小步子跟她往外走，不過昂首挺胸的，像只打了勝仗的公雞。\n樊長玉雖努力繃著麵皮，耳朵卻紅了，像是恨不能找個地縫鑽進去。\n謝徵眼角餘光掃到這姐妹倆，嘴角多了絲不太明顯的笑意。\n三人坐牛車回鎮上時，樊長玉還止不住地感慨俞淺淺人好。\n謝徵只輕嗤了一聲。\n樊長玉皺了皺眉，問：「我有說錯嗎？」\n謝徵淡淡抬眸：「你被人賣了，都只會上趕著替人數錢。」\n樊長玉心中不快道：「俞掌柜就是個大好人，你為何要詆毀人家？」\n謝徵毫不留情道：「那你也別忘了，她是個商人，你同她做生意，也沒從她那裡拿多少好處，如今倒是一味地對她感恩戴德。」\n他目光涼薄了幾許：「她這收買人心的手段，你怕是一輩子都學不會。」\n樊長玉很喜歡俞淺淺，聽謝徵這般說她，頓時不太高興：「你怎麼總把人往壞處想，俞掌柜的確幫襯了我許多……」\n謝徵打斷她的話：「她幫襯了你什麼？」\n樊長玉對上他銳利的目光，一時語塞，隨即道：「我才開始賣滷肉，若不是俞掌柜給機會，我也不可能這麼快跟溢香樓做成生意。」\n謝徵問她：「整個清平縣賣滷肉是也不止你一家，為何她就選中了你？」\n樊長玉道：「是李師傅幫忙引薦……」\n謝徵看著她不說話，她聲音便慢慢小了下去。\n靜默片刻後，謝徵才道：「那廚子引薦了你不假，但你做出來的東西不像樣，人家也不會選你。商人不會因人情選次品，只會在同等品級的東西裡，給一個順水人情。」\n樊長玉交握的一雙手握得更緊了些，繼續道：「今日賣滷肉的錢，俞掌柜原本也是不要的，我一再堅持，她才收了本錢。」\n謝徵問她：「你賺的那才多少？指不定還沒有她一桌賺的銀錢多。」\n樊長玉抿緊唇：「不是銀錢多少的問題，那是人家的一份心意。」\n謝徵皺眉道：「我沒讓你理所當然地受這份好，我只是在告訴你，她讓你的這份利，和你對她的感激並不對等。你可以記著她的人情，但沒必要因為受過這份利，就處處放低自己的姿態。何況今日，你和她本就是各取所需，她扶持你，也是為了打壓王記。」\n樊長玉不吭聲了。\n謝徵知道她性子純善，旁人待她一分好，她就總想著還十分。\n他緩了幾息，道：「同你說這些，也不是詆毀那位掌柜。你看得清一切了，往後或許才能跟她成為摯友，只記著感激和恩惠，那你同她手底下老實做事的夥計也沒什麼區別。」\n樊長玉長這麼大，的確沒人教過她這些。\n爹娘過世後，除了趙大娘一家幫襯過她，旁的事都是她自己扛過來的，突然被俞淺淺給予了這麼多善意，她就像是一個快凍死在嚴冬裡的人得到了溫暖，本能地向著那團暖意靠近。\n好半晌，她才說了句：「謝謝。」\n嗓音有些悶悶的，但並不頹唐。\n她知道自己還有很長的路要走，也有很多東西要學，現在才明白一些自己從前不懂的東西，也不晚。\n她再次朝著謝徵看去時，眼底就全是求知的渴望：「言正，你多教我一些吧，我以後也想成為俞掌柜那樣厲害的人。」\n謝徵微微一哂，道：「你做生意還是算了，我同你說過，她最值得稱道的地方在於用人。」\n樊長玉做出洗耳恭聽的姿態。\n謝徵本不願多說了，卻還是道：「就像她今日借樓裡的女夥計給你，你心中必然是念著她的好。但她只是在你需要什麼的時候，正好給了你要的東西。摒棄一切人情，你並不欠她，租她的鋪子你給了租金，借用她的夥計你付了工錢。相反，用她自己的夥計管著你租下來的鋪子，對她才是百利而無一害。」\n他眸光暗了暗：「她就是想知道你的帳目，都只是問句話的事。」\n樊長玉說：「我相信俞掌柜不是那樣的人。」\n心中的驚駭卻讓她指尖都有些發麻，她先前只覺著俞淺淺人好，現在卻覺著，俞淺淺好心之餘，也很聰明。\n她其實更欣賞這樣的俞淺淺，也突然明白，為何俞淺淺一介弱女子，能在短短幾年內，獨自開起這麼大的兩座酒樓。\n謝徵毒舌道：「這還是只是她御下的手段，她同那些商賈官眷打交道的手段，你學一輩子都不一定能學會。」\n樊長玉雖然被懟了，但看在他教了自己這麼多東西的份上，也沒跟他計較，反而道：「言正，你教我讀書吧。」\n謝徵看著眼前兩手撐著下顎嘆氣的人，像是一頭初出茅廬就受挫的小獅子，有些可憐，骨子裡卻又犯著倔。\n他像之前應允她那般，淡淡應了聲「好」。\n牛車到了鎮上，路過書肆時，謝徵除了買紙墨，還買了五冊書。\n樊長玉看到有些傻眼：「買這麼多？」\n謝徵把四本厚的放到她手上，一本薄的拿給長寧：「《三字經》給你妹妹，四書是你的。」\n樊長玉翻了翻，發現他之前說不教她《論語》和《大學》，這會兒卻還是買了這兩本書，不由咧嘴笑了笑，這人果然大多時候只是嘴巴毒而已。\n她捧著書高興道：「我今晚就開始苦讀！」\n抱著《三字經》皺巴著張臉想說不讀書的長寧，見狀委委屈屈把話咽了回去。\n到了家門口，樊長玉打開鎖頭，長寧要做最先進門的那個，推開院門後她就開始歡呼：「隼隼！隼隼回來了！」\n飛了一天在夜幕時才回小院的海東青，沒等到一碗犒勞的肉碎，反而是門上一把冷冰冰的大鎖。\n它在破竹簍裡看到終於捨得回來的三人，頂著幾根翹起的細絨羽從竹簍裡鑽了出來。\n長寧一把撲過去保住隼脖子，興奮得臉都紅了：「姐夫沒騙寧娘，隼隼真的回來了！」\n樊長玉也頗為驚訝，她原本以為那天言正是哄小孩來著。\n她看向謝徵：「你馴禽這麼厲害？」\n謝徵淡定甩鍋：「有沒有可能，是你給它吃太好了？」\n樊長玉瞪大一雙杏眸：「……還能這樣？」\n她轉而看向海東青，海東青被長寧揉抱著，一雙豆豆眼卻是盯著樊長玉的，仿佛在問什麼時候開飯。\n樊長玉不信邪地朝主屋去，海東青嘴喙在地上啄了啄，閒庭漫步般跟了上去，然後……守在了屋內給它裝肉碎的大碗前。\n樊長玉：「……」\n謝徵瞧著這一幕，側過身時，嘴角微不可見地勾了勾。\n樊長玉認命去廚房找了一塊肉，切碎了裝進碗裡端給海東青後，才去鎮上的車行租了輛車，把胖掌柜定的臘肉給他送去。\n胖掌柜是個消息靈通的，得知樊長玉在溢香樓租了個鋪子賣滷肉，笑呵呵問：「這臘肉也是樊娘子家的，小老兒打算賣這臘肉也用樊記的名號，樊娘子意下如何？」\n樊長玉聽謝徵講過那麼多彎彎道道後，腦子也靈光了不少，說：「可以，但你賣出去的價錢比原本的高了，總不能給我看假帳。」\n胖掌柜連忙保證不會。\n樊長玉和胖掌柜是分成拿錢，只要胖掌柜不低價賣，她就虧不了，便也沒再多說。\n回去時碰上一隊官兵，樊長玉認出為首的那人正是之前幫她家度過刺殺一劫的那位將領。\n他騎在高頭大馬上，底下的兵卒們還押送著十幾個五花大綁的人，看服飾，被綁的那些人也是兵卒，不過明顯跟這隊人馬身上的兵服不一樣。\n樊長玉仔細辨認了一下，發現是中午跟言正一起瞧見的那些去徵糧的官兵。\n官道兩旁的田壟地頭間不少百姓瞧見這一幕，都歡呼鼓掌：「咱們薊州有個大青天！」\n「賀大人才是真正看得見咱們這些百疾苦的好官啊！」\n樊長玉想起中午言正說的話，再瞧著這些被五花大綁帶走的徵糧官兵，心中不由也暗暗高興。\n到家後，她同謝徵說起路上的見聞，謝徵眸色微頓，隨即長指劃開了書卷的下一頁：「繼續溫書吧，明晚這個時辰我考你《學而》篇。」\n樊長玉脖子一縮，跟長寧一樣皺巴著臉看書去了。\n她是滿心想認真讀書來著，但耐不住一看這些之乎者也的東西就頭大，只能硬逼著自己看。\n窗戶沒關，時不時有冷風灌進來，凍得人直縮脖子，才沒讓樊長玉兩姐妹看著看著就夢周公去。\n謝徵像是不知冷一般，踱步到窗前，執卷的手負在身後，遙望遠處夜幕，長發和衣袂飄飛，眸色暗沉。\n賀敬元公然綁了魏宣的人，便是不打算給魏宣留面子。\n以魏宣睚眥必報的性子，在魏嚴的調令下來前，必然還會發瘋去找賀敬元撕咬一番。\n他的人，也可以動手了。`
        },

            title: `第42章第42章`,
            content: `雪後初霽,薊州府簷下掛著擋風的細蔑竹簾，從那縫隙間，隱約可見庭院裡三兩枝吐蕊的寒梅。\n廳房裡隱隱傳出談話聲,廊下臺階處以雁字排開的守衛披甲執銳,面目威嚴。\n大門外卻在此時傳來兵戈之聲。\n「什麼人，竟敢擅闖薊州府衙！」\n內庭的守衛聽到門外的打鬥聲,一部分留在原地嚴守議事大廳，一部分則持著刀戟趕去門外支援。\n只是來者也是一隊持.槍帶戟的鐵甲衛,一名薊州府兵直接被為首那著鱗紋甲的將軍一腳踹得倒飛出去。\n他抬起一雙滿是戾氣的眼：「賀敬元,給老子滾出來！」\n聽到動靜從議事大廳出來的一眾薊州官員瞧見他，皆是面露異色。\n唯有鄭文常當即喝道：「大膽，竟敢直呼大人名諱！」\n魏宣冷笑，壓根沒把他放在眼裡,提著劍朝議事大廳逼近時,鄭文常手中的佩刀也出鞘了三寸。\n眼見兩人就要兵刃相向，廳房內卻傳來沉穩厚重的一聲：「文常，退下。」\n鄭文常側頭朝後看了一眼,手中的佩刀雖收回鞘中了，面對魏宣時卻依舊是怒目之色。\n魏宣嘴角一挑，直接提劍就向他劈去,鄭文常連忙躲閃,周遭的文官瞧見這一幕,紛紛驚呼著四處躲避,好不狼狽。\n「大公子來我這裡,就只為了為難我治下的一眾官員？」穩坐於首位上的賀敬元適時出聲,看著堂下人,眼底露出幾分失望之色。\n魏嚴獨攬朝政不假,可他當權的這十餘載，整個戰後的大胤朝都是在他治下才得以休養生息，他雖生性多疑，卻也極善用人。\n魏嚴之子，怎就是這般有勇無謀、好大喜功之徒？\n魏宣瞧見他那個眼神，怒火更甚，像一頭齜著口腥牙的鬣狗，劍指鄭文常道：「你手底下一條走狗，也敢衝著本將軍亂吠，還是說，你賀敬元壓根已沒把魏家放在眼裡？」\n賀敬元道：「丞相對賀某有知遇之恩，賀某奉丞相之命守薊州，談何不把魏家放眼裡？」\n他抬眼緩緩道：「還是……大公子此話只是覺得，賀某人沒把大公子放眼裡？」\n魏宣被他一句話激得肝火大冒，面目猙獰道：「你好大的膽子，來人，把他給我押入大牢！」\n他身後的鐵甲衛要上前，鄭文常等一眾武將則紛紛拔刀擋在了跟前，一時間兩方人馬劍拔弩張。\n賀敬元嗓音依舊平和：「我乃朝中三品大員，大公子便是要押我入獄，也得拿著聖旨前來。」\n魏宣冷笑道：「大戰在即，你阻撓軍務，光是這一項罪名，便足以讓本將軍先斬後奏！」\n賀敬元問：「賀某阻攔了何軍務？」\n魏宣氣得揚手朝外一指：「徽州將士們在前線浴血殺敵，糧草告急，向泰、薊二州徵糧，你非但不服軍令，還綁了本將軍派去徵糧的將士。賀敬元，你就這麼盼著徽州也被反賊拿下？」\n賀敬元只道：「大公子打的敗仗，不該由百姓來承擔，徽州當下若只防守，完全可以撐到朝廷運糧前來。大公子急於徵糧，無非是想儘快再向崇州開戰，兩府百姓的死活，大公子便不管了？」\n魏宣厲聲道：「怎麼可能徵不上糧來，無非是那群賤民不願上交糧食，泰州先前不也說徵不上糧來，最後還不是湊出了十萬石？」\n提起泰州，賀敬元便面露沉痛之色，斥道：「打死了人，搶來年的谷種做軍糧，便是大公子口中的徵糧？」\n魏宣冷聲道：「只要滅了反賊，整個西北都可休養生息，一時之苦換長久之利，有何不可？」\n賀敬元問他：「大公子可知你口中的一時之苦，是泰、薊二府多少條人命？消息傳回京中，會有多少文人仕子得對丞相口誅筆伐？」\n魏宣面目猙獰：「反賊一滅，這些算得了什麼？眼下反賊知曉徽州斷了糧道，短時間內不可能再同崇州開張，放鬆了警惕，本將軍只要儘快出兵，打他一個出其不意！有了戰功，所有聲音變都會被蓋下去！」\n賀敬元長嘆一聲：「大公子且聽下官一句勸吧，這天下，是大胤百姓的天下，還未到山窮水盡之時，莫要把百姓逼到這份上，寒了天下的百姓的心。」\n魏宣只冷哼一聲：「婦人之仁！」\n他狠厲道：「你若再阻撓，本將軍便行以節度使之權，奪了你的官印！」\n賀敬元定定看了他幾許，抬手摘下自己頭頂的官帽：「那大公子收回下官的官印吧。」\n以鄭文常為首的一眾官員忙大呼：「大人不可！」\n魏宣一向剛愎自用，最受不得激，當即冷笑出聲：「朝臣都說什麼謝徵乃西北一柱，沒了他，整個西北如今不也好好的嗎？賀敬元，你真當本將軍不敢奪你的印，那你也太把自己當個人物了些！」\n他直接上前一步拿走書案上的薊州牧大印，高舉在手中，望著賀敬元挑釁般吩咐薊州府的官員們：「即刻去給本將軍徵糧，明日午時見不到十萬石糧，提頭來見！」\n底下的官員們面面相覷，皆是一臉難色。\n坐於首位的賀敬元則沉重閉上了眼。\n-\n再次徵糧的消息傳到臨安鎮時，鎮上百姓全都叫苦不迭，樊長玉也不知其中緣由。\n她去縣裡給胖掌柜和溢香樓送肉時，才聽說薊州府換天了，那位姓賀的青天老爺直接被革職看守了起來，薊州主城那邊的百姓成群結隊去薊州府衙大門前鬧，被抓進大牢百餘人。\n在官兵的嚴厲鎮壓之下，百姓們現在也不敢鬧了，只是官府挨家挨戶徵的糧食數目實在是令人咋舌。\n農戶把谷種都拿出來了，仍不夠一家人要上交的軍糧份額。\n官兵給的解決辦法也簡單，糧不夠了那就給錢。\n沒錢怎麼辦？是借是搶都不關官府的事，他們只要一味地施壓就行了。\n不少農人走投無路，乾脆落草為寇。\n官兵們也是欺軟怕硬的，對著手無寸鐵的普通百姓就能耀武揚威，對上山賊匪寇則是能不招惹就不招惹。\n從農人那裡收不到足夠的糧食，也刮不上來什麼錢財，官兵們又開始挨家挨戶找城鎮裡的商戶們收刮錢財。\n每戶人家按人頭算錢，一人交一兩銀子，樊長玉家中就得交三兩。\n鎮上的人無不譁然，從前徵兵，也只要二兩銀子就能抵一個人頭，現在這徵糧的的費用比徵兵還高，特別是那些家貧又孩子一大堆的人家，簡直是把他們往絕路上逼。\n鎮上一戶人家直接去買了□□，當著官兵的面兌了水家裡一人一碗，直言沒錢也沒糧，再逼下去，他們就只能死了一了百了。\n樊長玉如今有了掙錢的門路，交這三兩銀子倒是不成問題，可鎮上多的是跟她當初一般，掏空家底也拿不出那麼多銀子的人家。\n百姓們自發地組織起來去縣衙門口長跪不起，縣令卻連面都沒露過。\n這樣的消息聽得多了，樊長玉只覺一顆心沉得慌。\n晚間捧著《論語》，她再怎麼也看不下去，扭頭去看謝徵，卻見他正執筆在書頁上批註什麼，神情沉靜，似乎半點不受外物所擾。\n她抿了抿唇，說：「官府這波徵糧，簡直是沒把百姓當人看。」\n謝徵筆尖未曾停滯，只說：「官府不會按一人一兩銀子收取徵糧錢。」\n嗓音裡透著一股不易察覺的冷意。\n樊長玉不解：「怎麼不會，不是官府那波人挨家挨戶來要的嗎？」\n謝徵批註完這一篇，暫且擱下了筆，道：「薊州府二十萬戶，八十萬人，一人一兩銀子，整個薊州府能收上去八十萬兩白銀。糧食在去年秋收時節不過七八百文一石，如今戰事一起，市值也沒過一兩銀子一石，八十萬兩白銀，至少能買八十萬石米糧。前線此番徵糧只為應急，要不了這麼多糧食。」\n說到後面，他漆黑的眸子裡透著股瘮人的冷意。\n魏宣便是蠢笨如豬，也不可能在薊州強徵八十萬石糧。\n他此番急著徵糧，無非是想在魏嚴撤他兵權之前，趁崇州戰後鬆懈，打崇州一個措手不及扳回一局。\n支撐到朝廷的糧草送來，只要二十萬石糧食足矣。\n已經從泰州徵上來了十萬石，薊州府只需要再徵十萬石就行。\n強徵八十萬，這和公然搶掠有何區別？\n把百姓逼到極致，百姓直接揭竿而起，投了隔壁崇州的反王都有可能。\n樊長玉聽他算了這麼一筆帳，也覺得官府這個徵糧法太過匪夷所思了些，卻仍是困惑：「可這的確是官兵親自來要的錢，總不能是那些官兵膽大包天，故意多收的？」\n謝徵說：「官兵不敢，他們上面的人未必不敢。」\n貪墨在朝中早已是屢見不鮮的事，諸如工部修路造渠或是賑災，錢從國庫撥下去，都會叫大小官員一層層剋扣掉後，最終才只剩那麼零星幾點銀子真正用到實處。\n徵稅亦是如此，朝廷定下的稅率是鐵律，底下官員不敢剋扣，要想中飽私囊，就只能從百姓那裡往高了徵收各種商稅糧稅。\n樊長玉也不笨，聽他那麼一說，當即攥緊掌心，「你的意思是，很有可能是縣令，或者說是縣令以上的大官在收刮民脂民膏？」\n謝徵道：「看旁的縣徵收的軍糧是多少，不就知曉了？」\n樊長玉說：「我明日去縣城送貨時，看能不能碰上其他縣來的人，若是碰上了，我問問。」\n如果別的縣沒收這麼多，那就是清平縣縣令在藉此斂財！\n謝徵點頭不語。\n樊長玉已經打起呵欠了，他卻重新提起筆，似要繼續在書上做批註。\n樊長玉看著他燭火下清冷的側臉，忍不住道：「你別寫太晚，傷眼睛，明日再寫吧。」\n謝徵「嗯」了聲，卻未停筆。\n他原以為，賀敬元能鎮住魏宣，沒想到賀敬元卻被魏宣所制。\n深思其中緣由，他冰冷漆黑的眸子裡露出幾分嘲意。\n趙詢買的那二十萬石米糧，已被他的人接手，賀敬元的人查不到蹤跡，懷疑是他的手筆，才故意放任魏宣如此行事，想逼他現身吧？\n所謂愛民如子的一代儒將，不過如此。\n他戰死的消息傳出去這麼久，整個西北也亂成了一鍋粥，在這節骨眼上萬不能叫北厥人鑽了空子，他必須得回去了。\n筆尖寫落下清正端方的字跡時，眼角餘光掃到她落在書案上的影子，他清冽開口：「你這月生辰，想要什麼？」\n樊長玉「啊」了一聲，隨即才反應過來他話裡的意思，道：「你的好意我心領了，爹娘年前才過世，我今年不過生辰。」\n謝徵筆尖稍頓，道：「且提一願，就當是往後的生辰禮。」\n樊長玉說：「你這話怎麼聽起來怪怪的，往後的生辰禮可以往後再給啊，何必現在……」\n話說到這裡，她自己都頓住了，再看他密密麻麻在書頁上所做的批註，臉上的笑容也跟著收了起來：「你要走了是不是？」`

            num: 43,
            title: `第43章第43章`,
            content: `謝徵沒有直接回答她,在書扉上做完最後一句批註，擱筆道：「這些書，晦澀難懂的地方我全做了批註,你自己看，應當也能看懂了。」\n樊長玉聽他這麼說,還有什麼不明白的。\n他答應了要教她讀書，怕是不能兌現承諾了，才把所有書都做好批註留給她。\n心頭有一瞬間空落落的，說不清是什麼感覺。\n不過他同自己非親非故,假入贅是各取所需，本就互不相欠，何況這期間他也幫了自己不少。\n樊長玉強壓下心中那一絲異樣，道：「我沒什麼想要的,該有的我都有了，豬肉鋪子生意紅火,滷肉也打響了名氣,有了穩定的銀錢來源，開春後還能在鄉下的豬棚裡養豬……」\n她說著自己往後的打算,想到言正就要走了,養豬的事他大概也不能參與了，不由抬眼去看他,發現他似乎在認真聽她說這些,神情平靜又柔和，心底突然升起一股說不上來的難過。\n她覺得可能是自己在最難的時候，是跟他一起扶持著過來的,所以聽他說要走,才一下子有些不習慣吧。\n她道：「你放在我這裡的銀子,明日我去錢莊幫你換成銀票，這樣你走的時候帶在身上也方便些。」\n謝徵好看的眉皺起，說：「給你的就是給你的。」\n樊長玉道：「出門在外，花銀子的地方多著呢，何況你還要重建鏢局，身上不帶銀子，你打算喝西北風去？再說了，無功不受祿，拿著你這麼大一筆錢，我這心裡也不踏實。」\n四十兩白銀可不是筆小數目，他暫且放自己這裡也就罷了，人都走了還把錢留給她，樊長玉真不能心安理得地收著。\n加上昨日去溢香樓賣滷肉二人平分後的那六兩，他放在她這裡的一共是四十六兩銀子，樊長玉打算再添四兩湊個五十兩的整數，全換成銀票拿給他，到時候再給他些銅板路上趕車或是打尖兒用。\n如此一來，也不算虧欠他。\n謝徵唇角抿緊了些，看著她道：「不是糖錢麼？」\n樊長玉迎著他的視線，眼神清明無一絲雜質：「你以後回來了，要是還想吃糖，我再幫你買吧。」\n她笑了笑，像是揶揄，卻又有些語重心長：「不然你在外邊遇上個姑娘，想讓對方幫你買糖沒錢了怎麼辦？」\n謝徵唇角抿得更緊了些，身上那一絲柔和也消失了個乾淨。\n樊長玉恍若未覺，打了個呵欠道：「很晚了，早些歇著吧。」\n一直到樊長玉回屋了，謝徵仍坐在桌前，許久，闔上了雙眸。\n除了她，不會再有人給他買糖了。\n他不確定自己此去還會不會有命回來，有些話，不能說出口。\n賀敬元追查那二十萬石糧查到了趙詢頭上，趙詢又把糧交與了他的舊部，賀敬元沒查到具體的東西，但尋著蛛絲馬跡也能猜到些什麼。\n魏宣如此混帳行事，以賀敬元的本事，又是在薊州府，真要制住魏宣也不是難事，但他沒有，無非是想用百姓逼他帶著那二十萬石米糧現身。\n百姓的疾苦和民間罵名，比起他的命，在魏黨看來顯然算不得什麼。\n畢竟當初魏黨為了除掉他，讓安插在他身邊的細作謊報軍情，跟著他上戰場的那八千將士，也全在崇州戰場上成了棄子……\n這屍山血海堆成的大仇未報，魏嚴父子一日沒見到他屍首，哪敢安枕？\n他給不了她一個還會回來的承諾，她看似心大，卻是個極有原則的，不會不明不白跟他有任何牽扯，所以才執意不肯收他的銀錢。\n兩不相欠，才不會心存掛念。\n他想，兩不相欠就兩不相欠罷，不過一屠戶女，有什麼好？\n起身踱步往房間走，路過簷下時，飛雪落在眉心，融化後的涼意浸骨，心底最後那一絲傲氣也叫涼意侵蝕了去。\n推門的手輕按在木門處，卻遲遲沒能推開，垂首沉沉閉上眼，掩去這一刻的狼狽。\n她怎麼能不好呢？\n她就是哪兒都好啊。\n-\n庭院深深，積雪落滿竹枝。\n趙詢踩著一地落雪快步走過庭院，進了暖閣，一室燭火通明，圓弧形的雕花鏤空月亮門後，擺著一對鎏金狻猊博山爐，鏤空的爐頂正徐徐往上漂浮著青煙。\n再往裡的軟榻前，垂下半截金紗簾，看不清榻上男子是何樣貌，不過垂落至榻下的衣擺，織金繡錦，華麗非常。\n趙詢不敢多看，垂首恭敬道：「主子，依您吩咐，魏宣強行徵糧的事已大肆宣揚到了京中，如今所有仕子都在聲討魏黨，李太傅也在朝堂上公然對魏嚴發難。」\n榻上置了一方矮几，擺著茶盞，男子抬手拿起一盞，指節修長卻蒼白得過分，瘦得好似幾根枯骨，他笑了聲，「做得不錯。」\n又問：「武安侯那邊如何了？」\n趙詢想到上次和謝徵的會面，額角出了一層細汗，硬著頭皮道：「武安侯讓屬下將魏宣跨境徵糧之事告知賀敬元，想來是欲讓賀敬元阻止魏宣徵糧。」\n紗簾後的人低笑了聲，不知是在譏嘲還是當真覺著好笑：「魏嚴那等亂臣賊子，竟教養出了個憐民生疾苦的外甥？」\n他淺抿一口後擱下手中茶盞，「倒也不怪魏嚴如此忌憚他，他借著買糧，便探清了你手在泰、薊兩州的十餘處接頭點，交貨時故意給賀敬元留了線索，也算是回敬武安侯的一份大禮了。畢竟……薊州府若是沒能繼續鬧出徵糧的醜聞，咱們在京城搭起的戲臺子就沒人唱了。」\n趙詢有些擔憂：「若是讓武安侯發現是咱們給賀敬元留了尾巴……」\n紗簾後的人不以為意：「怕什麼，又不是我等拿刀逼著魏宣徵糧的，能讓魏黨一再失民心，又能看魏嚴手中昔日的兩把刀同臺唱戲，何樂不為？況且，我這也算是幫了武安侯一把，百姓對魏黨的仇怨越重，他後邊再站出來奪回西北，不就越得民心麼？」\n趙詢贊道：「主上聖明。」\n隨即又斟酌開口：「武安侯欲和主上面談，您意下如何？」\n謝徵當日狂傲說的那些話，他是半句不敢說與眼前人聽的。\n紗簾後的男子沉吟片刻，道：「還不是時候，讓他和魏嚴鷸蚌相爭去吧，最好是鬥得兩敗俱傷。」\n趙詢聽出他對謝徵只有利用之意，遲疑道：「武安侯畢竟是謝將軍遺孤……」\n男子眸色驟冷：「魏嚴親手養大的狼崽子，可不會是什麼純善之輩，兵權放在別人手中，也不如握在自己手中穩妥。」\n天寒地凍的，趙詢後背的冷汗卻一茬兒一茬兒地冒了出來，他躬身道：「屬下明白了。」\n-\n這一宿燈火同樣久久未熄的，還有賀府。\n賀府門外圍著數十名魏宣手底下的軍士，府上人輕易不得外出。\n就連角門和院牆都有軍士來回巡邏。\n夜幕中，暗箭如急雨嗖嗖射向府門前的那些將士，府門前的兵卒瞬間亂了陣腳，倉惶往有遮蔽物處躲：「有敵襲！」\n「快快稟報與將軍！」\n「殺——」\n一隊手持刀戟的薊州府兵自夜色中殺了出來，打了驚魂未定的魏府軍士一個措施不及，很快便佔了上風。\n薊州府兵裡帶頭的人正是鄭文常，他高舉手中橫刀：「隨我進去解救大人！」\n他乃賀敬元手下重將，對賀府的地形很是熟悉，很快就帶著人找到了書房。\n賀敬元坐於書案後，案前鋪著一卷竹簡，似在秉燭夜讀，瞧見提刀闖入賀府的鄭文常一眾人，臉色微變：「爾等怎來了？」\n鄭文常單膝跪下，抱拳道，「卑職帶人前來助大人脫困，魏宣此舉實乃欺人太甚！大人不妨修書一封遞往京城告與丞相，且看他魏宣還能跋扈到幾時！」\n賀敬元聽他說了來意，擰緊眉心，長嘆一聲：「糊塗啊!」\n鄭文常面露不解：「大人此話是何意？」\n賀敬元卻不再多言，起身在書房內來回踱步一番後，吩咐下去：「帶著你的人先行離開。」\n鄭文常愕然道：「那大人您呢？」\n賀敬元道：「魏宣不敢奈我何，我如此行事，自有我的緣由，爾等回去待命即可。」\n鄭文常和其餘幾個武將面面相覷，但本著對賀敬元的敬重和服從，還是抱拳道：「卑職領命。」\n他們要離去時，賀敬元猶豫片刻，終是添了句：「若見魏宣手底下的軍士徵糧時欺壓無辜百姓，阻撓一二，莫要鬧出人命。」\n幾個武將聞言，心中雖疑惑，但仍只是抱拳領命。\n唯有最後離開的鄭文常，在出門前不解追問了句：「大人為何要懼那魏宣？」\n賀敬元負手望著書案上方那塊「明德惟馨」的文匾，嘆息一聲：「非是懼他，莫要多問，按我說的做便是。」\n鄭文常只得揣著滿腹疑惑抱拳退下了。\n賀敬元卻望著那塊文匾久久沒能移開目光。\n他滿身罪孽無妨，大胤百姓將來會不會在戰火裡夾縫求生才是最重要的。\n天子一怒，伏屍百萬。\n掌權者的紛爭，最終苦的只是底層百姓。\n被那姓趙的商人買走的二十萬石糧，若當真是在那人手上，經此一試，便也能知曉他是隨了魏嚴的心狠手辣、不達目的誓不罷休，還是尚念著天下黎民百姓的。\n若是後者，關於十六年前錦州一戰，他所知曉的，在那人回來後，或許也是時候告訴他了。\n若是前者，他便帶著那秘密一起進棺材。\n只有仇恨，而對天下蒼生無一絲憐憫，知道一切後無非只會掀起更多的戰火，萬民苦矣。`
        },
        {
            num: 44,
            title: `第44章第44章`,
            content: `第二日,樊長玉和往常一樣早起殺豬。\n年後這兩天鎮上的人大多都在走親戚，幾乎頓頓都有肉吃，肚子裡油水多了對肉便沒什麼念想,因此鋪子裡的鮮豬肉賣得不是很好,滷肉生意倒是紅火，家家戶戶都願意買現成的滷肉拿回家待客,當做硬菜擺在席間也有面子。\n從前樊長玉鋪子能賣兩豬頭的鮮肉，這兩天便只殺一頭豬賣鮮肉。\n至於要供給溢香樓的滷肉，都是她從別處買進的肉,那條賣豬肉的街,豬頭和豬腳幾乎全叫樊長玉包了。\n她跟那些屠戶不再單是競爭對手,還成了對方的大客源，整條街的屠戶們為了跟她做成這筆長久買賣，平日裡見到她無一不笑呵呵的,打招呼都比從前熱切了幾分。\n她在鋪子裡若遇上個什麼難處,只要一開腔,一群人也上趕著來給她幫忙。\n樊長玉突然就有點理解為什麼宋硯考上舉人後，鎮上一些人為了討好宋家,不留餘力地踩上她一腳了。\n的確是言正說的那樣,她一無所有的時候,性子再好,旁人也能挑出她的不好來。\n而她只稍微跟有錢有勢沾上了那麼一點邊,收穫到的善意就能是從前的好幾倍。\n一切都在向著好的方向發展，只是樊長玉如今又要給溢香樓和胖掌柜那裡送肉，又要看著自家的豬肉鋪子,實在有些分身乏術。\n要找個幫手短時間內也不是那麼好找的。\n用早飯時,她便看著謝徵欲言欲止。\n謝徵昨夜睡得不好,眼下的青黑更重了些，發現樊長玉頻頻投來的目光後，放下粥碗問了句：「怎麼了？」\n樊長玉這會兒才看清他那比之前黑了一個度的眼圈，不由有些傻眼，問：「你這是一宿沒睡？」\n謝徵垂下眼道：「沒，昨晚房間裡有老鼠的聲音，找老鼠花了些時間。」\n的確有老鼠，不過被他一根竹籤子擲出去就扎死了，扔給了海東青。\n樊長玉一聽老鼠，想到自家火塘子上方還掛著的臘肉，頓時擔憂上了，忙起身去看，沒發現被老鼠偷吃的跡象，這才放心了。\n她道：「從前家裡不會備這麼多滷肉和臘肉，都是直接賣鮮肉，家裡也沒什麼老鼠，是我疏忽，回頭得抓只貓回來養著。」\n長寧已經吃完飯了，去雞籠子裡看海東青，哇地一聲哭了起來：「隼隼又不見了！」\n樊長玉也有些不解：「又飛走了？」\n姐妹二人齊齊看向謝徵。\n半夜讓海東青送信去了某人沉默了一息，說：「那東西野性難馴，可能還是沒馴好。」\n長寧眼中的金豆子頓時一顆連著一顆往下掉。\n樊長玉無奈道：「乖，別哭了，開春給你養一窩小雞好不好？」\n長寧還是哭：「不要小雞，要隼隼！」\n她用袖子抹了一把眼：「隼隼還會回來的！」\n她說完就用期待的眼神看向謝徵。\n這次謝徵沒有給她一個肯定的答覆，只說：「也許會回來。」\n長寧頓時癟著嘴哭得更傷心了。\n樊長玉哄她：「我們去野外再抓一隻好不好？」\n長寧搖頭：「不要別的，只要隼隼。」\n樊長玉知道小孩倔強起來頗為考驗人的耐性，她道：「矛隼已經飛走了，它本就是適合生存在野外的，阿姐也找不到它。我能做的，就是你還想要一隻，我就去野外給你逮一隻回來，但你不要，只一味地哭。寧娘，你告訴阿姐，阿姐能怎麼辦？」\n長寧委屈吸了吸鼻子，抬起胖手抱住樊長玉：「對不起阿姐，寧娘不是任性，寧娘就是捨不得隼隼。」\n樊長玉拍了拍小孩的後背。\n長寧把頭埋在她肩膀處，甕聲甕氣道：「開春了養小□□。」\n樊長玉說好。\n長寧站直身體，紅著眼眶道：「小雞長大了，隼隼飛過看到就可以下來吃。」\n以為哄好了小孩的樊長玉：「……好。」\n不管怎樣，小孩總算是沒哭了。\n樊長玉再次回到桌旁坐下，心情複雜喝完自己剩下的半碗粥，想到自己肉鋪裡人手不夠的事，還是撓了撓頭問謝徵：「你一會兒補覺嗎？」\n謝徵在她之前欲言又止那會兒，就看出她似乎有事要找自己幫忙，道：「有什麼事，你說便是。」\n樊長玉便厚著臉皮開口：「我豬肉鋪子今日開張了，但我還得去給俞掌柜酒樓裡送滷肉，你要是得閒，能去幫我看半天鋪子嗎？我送完貨就回來。」\n雖然他昨夜才說了要離開的話，這時候讓人幫忙似乎不太好，可樊長玉一個人實在是忙不過來，只能先壓榨一下他了。\n謝徵點了頭，樊長玉驟然鬆一口氣。\n他若是拒絕了，她臉皮再厚，大抵還是要尷尬一下的。\n她在人情世故上長進了一點，沒再把開工錢放在嘴邊，畢竟人家肯幫她是情分，她若是來一句給工錢，無疑就是踐踏了這份人情。\n真要感謝他，不如在他走前幫他多備些東西，這類事後不動聲色的感激，才是真正的還人情，而不是一開始就做交易一樣承諾各種好處。\n她和謝徵都要外出，樊長玉不放心長寧一人在家，像從前一樣把長寧送到了隔壁趙大娘家去。\n隨後才去巷子外攔了輛牛車，把鮮肉先送到樊家的肉鋪去。\n單是那些肉就已經夠沉了，樊長玉和謝徵便沒坐車，只跟著牛車一路走到鋪子那邊去。\n謝徵到這鎮上這麼久，還是頭一回見到這裡的早市，比不得京城繁華，但也出乎意料地熱鬧。\n賣朝食的鋪子前，鍋爐前無一不是熱氣騰騰的，叫賣聲和吆喝聲混在車水馬龍裡，人來人往，行色匆匆，是人間的煙火氣，也是這座小鎮的生氣。\n到了鋪子，樊長玉剛端下一盆滷肉，謝徵隨後便把鮮豬肉全拎下來了。\n樊長玉看了一眼，心下不由感慨，有人打下手果然還是輕鬆不少。\n她放好滷肉盆後，一邊把鮮肉往案板上擺，一邊告訴謝徵那是哪個部位的肉，賣的價錢是幾何。\n斜對面肉鋪裡的屠戶娘子瞧見謝徵這般好的樣貌，打趣道：「長玉你可算是捨得把你夫婿帶出來讓大伙兒瞧瞧了！這般俊俏一小郎君！不怪你之前一直藏在家中！」\n樊長玉在俞淺淺那裡被打趣慣了，如今再聽旁人打趣她和謝徵，臉皮倒是沒那麼薄了，道：「嬸子說笑了，他之前一直在家養傷，最近傷好些了，我忙不過來，他才來鋪子裡幫我搭把手。」\n屠戶娘子也是知道謝徵是樊長玉招的贅婿，才敢這般開玩笑，她年歲長了樊長玉一輪，知道很多上門女婿都會對自己的身份敏感，她那玩笑搞不好還會害得小夫妻倆回去吵架。\n聽樊長玉一板一眼的解釋，當即也改了口：「嬸子那話就是個玩笑話，小兄弟可別介意。」\n謝徵道：「不會。」\n屠戶娘子又道：「從前這鋪子裡裡外外，都是長玉一人忙活，如今成親了，可算是有個人能幫襯她一二了。」\n謝徵幫著把豬肉擺到案上，看了眼一旁拎起豬臀肉往鐵鉤上刮的樊長玉沒說話。\n雖是嚴冬，她穿著厚實的冬衣，這麼一會兒額前已出了不少細汗。\n從前她自己來肉鋪這邊，所有的事大抵也是一個人做完的。\n「豬臀肉得三十五文一斤，若是有人砍價，最低也不能低過三十文去……」樊長玉交代著他價錢的事，掛好豬肉後一回頭，見謝徵正看著自己，蹙眉問：「沒記住？」\n謝徵收回目光，說：「記住了的。」\n樊長玉有點懷疑，不放心道：「我方才說的什麼？」\n謝徵微微一哂，道：「豬臀肉三十五文一斤，砍價不能低於三十文。」\n樊長玉點了點頭，說：「就是這樣。」\n正說著，就有一買菜的大娘路過鋪子，見謝徵站在豬肉鋪子裡，模樣又實在是打眼，問了句：「小夥子，你這後腿肉怎麼賣的？」\n樊長玉沒作聲，有心想看看謝徵是怎麼賣肉的。\n謝徵看向那大娘時，答話倒是從容：「三十三文一斤。」\n大娘嘀咕一聲：「這麼貴啊……」\n謝徵便半抬著眸子不接話了，大有幾分愛買就買，不買他也不會多勸的意思。\n樊長玉看得眼皮一跳，忙道：「您可以先去其他鋪子看上一圈，覺著還是這肉好再回來買。」\n大娘詐那麼一句也就為了砍價，眼見看砍不下來，這肉質瞧著又的確上乘，道：「我瞧著你們這倆年輕人是個實誠的，不至於騙我一個老婆子，給我切兩斤吧。」\n樊長玉準備拿刀時，就見一旁的謝徵已拿起了刀，估摸著切了一塊下來，不多不少正好兩斤。\n樊長玉包好肉拿給那大娘，大娘數銅板時，目光還不住地往謝徵臉上，問：「小夥子成家了沒？要是沒成家啊，我有個孫女今年才十七，模樣性情都不差……」\n謝徵神色淡淡的：「這肉鋪就是我娘子的，我過來給她搭把手。」\n大娘頓時有些訕訕的，「這樣啊……」\n她看向樊長玉，畢竟是活了幾十歲的人，圓個話的嘴皮子還是有，笑道：「你們這小夫妻倆，男俊女俏的，我乍一眼看上去，還以為是兄妹呢，合著這是夫妻相？那可是有福了！」\n樊長玉只能意思意思彎了下唇角。\n大娘一走，她就忍不住數落謝徵：「做生意再怎麼也得笑臉相迎，你板著個臉跟誰欠你錢似的，誰來買你的肉？」\n正說著，邊上又有一出來買菜的年輕姑娘看著謝徵，紅了臉問：「這排骨怎麼賣的？」\n謝徵臉上依舊沒有一絲多餘的表情：「三十九文一斤。」\n排骨是鮮肉裡賣得最貴的。\n年輕姑娘都不敢看謝徵，低頭紅著臉吶吶道：「我要三斤，幫忙剁成小塊。」\n謝徵拿起砍骨刀幾下剁好排骨包好遞過去。\n樊長玉在一旁看得目瞪口呆。\n民間為了方便計數，一百個錢也可用細繩串起來，買賣東西時彼此都方便。\n謝徵接過那一百一十七文遞給樊長玉，樊長玉依舊有些懵逼。\n隨即又慢慢接受了這個事實，別人賣豬肉靠嘴皮子，這傢伙賣豬肉靠臉。\n她單手扶額，半開玩笑道：「我應該早些讓你來鋪子裡幫忙的，這樣指不定我年前的生意還能更好些。」\n謝徵看她一眼，並未接話。\n這會兒時辰還早，集市上買菜的沒幾個人，旁的豬肉鋪子前門可羅雀，只有樊家的豬肉鋪子已經做了兩單生意。\n其他屠戶心中雖也豔羨得緊，但樊長玉做滷肉還會去他們鋪子裡買豬頭豬腳，偶爾也買豬下水，算是照顧他們生意，便也沒人眼酸什麼。\n郭屠戶跟樊長玉家積怨已久，樊長玉要買肉也不可能買他鋪子裡的，兩家愈發針尖對麥芒。\n他清掃自家鋪子前的積雪時，用力把鏟起來的雪往大街上揚，陰陽怪氣道：「這賣肉可當真是賣肉了，怎地來了這地兒，去那勾欄瓦舍賣得不更好？」\n不外乎是在諷刺謝徵靠著臉引得不少人去了樊家鋪子裡買肉。\n樊長玉臉色當場就沉下來了。\n她這人最是護短，謝徵假入贅給她是為了幫她保住家產，旁人背地裡拿他贅婿的身份取笑也就罷了，這都直接在她眼皮子底下搬弄口舌了，說的還全是些下作話！哪裡還忍得了！\n何況他舅舅前不久幫著樊大想意圖瓜分她家產，新仇舊恨加一塊，實在是該算筆帳了！\n樊長玉走出自家的肉鋪，直接站在大街中央插手看著郭屠戶：「你把你剛才的話再說一遍。」\n她這一嗓子，讓整條街開鋪子的人和街上零星幾個買菜的行人都看了過來。\n郭屠戶在樊長玉手上吃過虧，倒是沒敢直接跟她來硬的，只耍嘴皮子道：「我說什麼了？哦，方才路上有個窯姐兒跟個兔兒爺勾勾搭搭地走過，我說那窯姐兒和那兔兒爺呢，怎地你樊大姑娘上趕著來領罵？」\n他話音剛落，下顎處就被重重捅了一棍，力道大得郭屠戶趔趄往後退了好幾步，撞在店鋪內的柜子上才穩住了身形。\n他單手捂著下顎，只覺兩下兩排牙齒好像是被嵌在了一起，嘴裡瀰漫著一股血腥味，好半天說不出來一句話，用另一隻手指著樊長玉，卻不及出聲，一抬頭就對上樊長玉那冷冰冰的眼神。\n她只冷冷說了兩個字：「道歉。」\n郭屠戶忍過下顎傳來的那一陣劇痛，吐出一口血沫後，肝火也冒了上來，橫道：「老子又沒說你和你那小白臉相公，你自個兒上趕著認的，老子道什麼歉？」\n樊長玉懶得跟他費口舌，手中長棍又往前一送，郭屠戶嚇得趕緊矮聲一躲，那根長棍沒有矛頭，卻硬是憑著強橫的手勁兒直接洞穿了櫃門上的木板。\n讓人不禁懷疑，若是腦門子，指不定也能被她手上的長棍對穿個血洞。\n郭屠戶嚇得兩股戰戰，色厲內荏道：「你敢動老子？老子舅舅是縣太爺身邊的師爺，官司打下來能讓你牢底坐穿！」\n樊長玉說：「你信不信在你那師爺舅舅趕過來前，我能先把你腦袋擰下來給狗當飯盆。」\n論耍橫，郭屠戶還真橫不過她，頓時有些面色悻悻。\n樊長玉再次大喝一聲：「道歉！」\n郭屠戶極不情願，可看著那根直指自己面門的長棍，最終只能當著眾人的面，咬牙切齒說了句：「對不住。」\n樊長玉收回長棍，冷哼一聲：「人家都說，閹人才喜搬弄口舌是非，你這說三道四的本事，比那閹人還厲害些！眼紅我肉鋪裡這點生意算什麼，你這般本事，不進宮去混個總管太監噹噹，實在是對不起你那條說黑說白的舌頭！」\n圍觀的人哄然大笑起來。\n其他肉鋪裡的屠戶臉上也都憋著笑。\n「閹人？別說，就姓郭的那副外強中乾樣，指不定還真是個不能人道的！」\n「聽說他兒子長得跟他表兄一個樣兒，兒子可能都是借的種！」\n「大傢伙私底下不都說是他婆娘偷人麼？天可憐見的，他婆娘被人暗地裡戳著脊梁骨罵了那麼久，原來不是他婆娘水性楊花，是他自個兒不中用！」\n「他生得人高馬大的，那玩意兒怎就不行了？」\n「據說是以前殺豬，豬掙扎的時候沒摁住，摔地上叫豬給他那玩意兒踩了一腳！」\n郭屠戶聽著圍觀的人你一言我一語，整張臉因怒氣而漲得通紅，頸下青筋都凸了起來，「瞎說什麼？信不信老子一刀一個砍死你們！」\n圍觀的人避得遠遠的，議論聲卻仍未停止。\n「看他這樣兒，分明是被戳到了痛腳，該不會是真的吧？」\n「我就說他一個大男人那般嘴碎，還動不動就罵人家俊秀小生的兔兒爺，敢情他自個兒才是個兔兒爺！」\n這話傳得越來越離譜，郭屠戶越是衝著圍觀的行人發怒，大傢伙兒反而越給他編得像模像樣。\n最後郭屠戶只能仇怨地盯著樊長玉：「你給我等著！」\n樊長玉都不想給他眼神了，只道：「你那張嘴說起別人是非的時候，要多骯髒有多骯髒，輪到你自己被人編排的時候，就知道難受了？」\n言罷便提著棍子回了自家肉鋪。\n郭屠戶聽著那些人七嘴八舌說的話，哪還有心情繼續做今天的生意，索性直接關了門，躲家裡去了。\n樊長玉進鋪子後，略有些歉意地對謝徵道：「抱歉，你都要走了，還讓你被那姓郭的編排一通。」\n她方才在外邊對他的維護他都看在眼裡的，謝徵只說：「沒事。」\n眸色卻有些複雜。\n樊長玉道：「他也就仗著自己有個當師爺的舅舅罷了，等縣令任期到了調走，他舅舅就什麼也算不上！」\n剛才一番動武，她綁在袖口處的布帶鬆了。\n樊長玉皺了皺眉，解開重新纏好，為了綁得更緊些，直接用牙咬住了布帶的一端，另一隻手拿著布帶有些笨拙地往袖子上纏。\n冬衣的袖口雖比夏衫窄小些，做起活兒來卻依然不方便，加上她經常拿刀砍骨，為了保護手腕，就用布帶綁在了腕口的袖子處。\n謝徵見狀，長指拿過她手中的布帶，道：「我幫你。」\n他似乎只是在告知她一聲，並不是在徵詢她的同意，因為樊長玉還沒回話，他另一隻手已經捻住了她咬住的那截布帶，說了句：「鬆口。」\n樊長玉一時間沒反應過來，傻愣愣鬆了齒間的力道。\n等回神時，謝徵已經不緊不慢地把她的袖子螺疊起來，在腕口處用不輕不重的力道按住，再用布帶一點點纏緊，從手腕上傳來的觸感格外明晰。\n樊長玉指尖不自覺微微蜷縮了一下。\n布帶是石青色的，他瘦長的手指裹挾著深色的布料，蒼白卻又筋骨分明，說不出的好看。\n他神色瞧著頗為專注，卻還能分心問她一句：「你們縣的縣令任期何時到？」\n樊長玉原本覺著氛圍有些怪怪的，他一說話，倒顯得沒那麼尷尬了，道：「算起來，過完年便滿三年任期了。」\n謝徵說：「那師爺的好日子該到頭了。」\n大胤官律，外放的縣令每三年一換，通常是調任，有大功績才可升遷，若有當地百姓聯名上書請留，那麼也可留任當地。\n樊長玉問其原因，他以官律解釋後，樊長玉恍然大悟，隨即笑道：「那我更不怕那姓郭的了！」\n師爺只是縣令請的幕僚，壓根不吃皇糧。\n既是替縣令出謀劃策的，那必然也知曉縣令許多陰私，基本上每一任縣令調任或升遷，要麼是帶著自己的師爺一起去新的地方上任，要麼就給師爺一筆銀子，勒令往後不得再給旁人當謀士。\n就清平縣縣令在幾年在清平縣的所作所為，百姓寫萬民書請命留下他是不可能的。\n那麼不管縣令是升是貶，都不會留在清平縣了，就算郭屠戶的舅舅依然在給他當師爺，任地都不在清平縣了，自然也沒法繼續在清平縣耀武揚威。\n謝徵替她綁好裹住袖口的布帶後，一抬頭便瞧著她臉上那個肆意張揚的笑容。\n他微斂了眸色，移開視線道：「好了。」\n樊長玉活動了一下手腕，臉上笑意不減：「確實是比我自己綁得緊些，謝了！」\n殘留在腕口的收緊感，仿佛是他手還按在上面，經她這麼一揉，那股異樣感才消退了些。\n謝徵道：「舉手之勞。」\n樊長玉看了一眼外邊的天色道：「我得趕緊給溢香樓送貨去了，鋪子裡的事就交給你了。」\n謝徵說：「放心。」\n樊長玉走到門口，又扭頭囑咐了句：「若是有人來買肉，賣完了，對方要預訂的話，你也幫我記一下。」\n謝徵頷首應好。\n樊長玉這才放心離去，坐上牛車時，沒忍住又小幅度地揉自己那隻手腕，卻也說不上哪兒不自在。\n-\n雪天路滑，樊長玉趕了半個時辰的車才到了縣城的溢香樓，隔著老遠就瞧見溢香樓大門前圍了一圈人，隱隱還有哭聲，像是有人在號喪一般，人都擠不過去，更別說牛車了。\n樊長玉只得下車去問擠在外邊看熱鬧的行人：「溢香樓怎麼了？」\n看熱鬧的大嬸回頭瞥了她一眼，道：「溢香樓的飯菜吃死了人，那家人的兒女直接把棺材抬到溢香樓大門口擺著了，正討要說法呢！」\n樊長玉心中一驚，她也在溢香樓做過事，知道樓裡採購的菜品都是最上乘的。在菜品質量這塊，俞淺淺一向沒大意過，怎會突然吃死人？\n她攥住那大嬸問：「什麼時候的事？」\n大嬸看她這麼激動，道：「聽說是昨天中午在溢香樓用飯，在樓裡那會兒吃著飯人就突然口吐白沫了，趕緊叫了大夫，結果人還是沒救回來，今兒一早，就來找溢香樓算帳來了。」\n邊上兩個漢子看了樊長玉一眼，嘖嘖搖頭：「收著這麼貴的錢，端上來的菜還吃死了人，這酒樓老闆其心可誅啊！」\n「官府要是不嚴格查，以後誰還敢下館子吃飯？」\n「早就聽說這溢香樓的女掌柜會些歪門邪道，聽說是在飯菜裡加了東西，吃了就讓人上癮，不然哪能短短幾年裡，就突然開起兩座酒樓，生意還紅火成這樣，沒準兒這回就是那東西加多了，才吃死了人！」\n「要我說啊，就得一命抵一命！抓了那女掌柜問斬得了，看面相就是個不安於室的！保準不是什麼好人！」\n樊長玉聽著兩個戴著氈帽獐頭鼠目的男人一臉鄙夷地議論俞淺淺，氣得嘴角都抿平了。\n她從人群中退出去後，讓趕牛車的老伯在不擁堵的路段等著，自己則去了溢香樓后街的巷子。\n從溢香樓後門進了樓裡，樊長玉發現後廚幾乎沒什麼人，管事和平日裡接待貴客的夥計們都在大門那邊和鬧事的死者兒女理論。\n樊長玉好不容易瞧見一個夥計，忙叫住他問：「俞掌柜呢？」\n夥計以為她是送滷肉的，連連擺手道：「樓裡的情況樊老闆也瞧見了，今日不能收您的滷肉了。」\n樊長玉說：「我這時候找俞掌柜，自然不是為這個，昨日死在樓裡的那人，究竟是怎麼回事？」\n夥計一臉晦氣道：「誰知道，昨兒樓裡一位客人突然發病，掌柜的瞧見了說怕是羊角風，趕緊讓請大夫去了，那家人一開始還感恩戴德的，把人接回去後，夜裡突然沒了，今日一大早就抬著棺材來酒樓門口鬧事，讓酒樓賠他家老翁的性命！這不明擺著訛錢嗎？」\n「掌柜的怎麼勸那夥人都不讓步，打算破財壓下此事，對方也不依，瞧著就是專程來鬧事的。掌柜的擔心是被哪家酒樓給陰了，報官了遲遲沒有官兵過來，掌柜的親自去官府那邊走動關係去了，只是出去好一會兒了，人還沒回來。」\n樊長玉雖然沒讀過多少書，但也知道樹大招風的道理。\n俞淺淺前幾日的席面辦得漂亮，溢香樓在縣城也打出了名氣，搶走了不少大酒樓的生意，肯定會惹人眼紅的，但對方用這等下三濫的手段來對付俞淺淺，委實是可惡了些。\n溢香樓大門外能聚起那麼多人，那家人抬著棺材來鬧事是一部分原因，可所有人都在口誅筆伐俞淺淺，沒一個人站出來替俞淺淺說話，甚至還說溢香樓的菜裡加了會讓人吃上癮的藥物，樊長玉下意識想到那兩個獐頭鼠目的男人。\n那二人一唱一和的，不就是在故意說給不明真相的人聽，拱火挑事麼？\n勸不走抬著棺材的那夥人，就先把引導輿論的人給掐掉。\n樊長玉想了想，對那夥計道：「你再找幾個人來，換掉樓裡的衣服，跟我出去一趟。」\n溢香樓出了這檔子事，樓裡的夥計也跟著焦頭爛額的，道：「對不住樊老闆，今兒樓裡的確是騰不出人手來……」\n樊長玉說：「外邊那群人裡，有人在故意抹黑溢香樓，你帶人跟我去把那部分人拎出來。」\n夥計一聽，連忙叫人去了。\n半刻鐘後，樊長玉帶著七八個便裝的溢香樓夥計，從後門繞出去，再次擠進了圍觀的人群裡。\n她觀察了一會兒，看熱鬧的路人，大多是看一陣，發現這事遲遲沒得到解決，手上還有旁的事要忙，便先離開了。\n只有跟那個兩個氈帽男類似的一撥人，一直守在溢香樓門口，罵聲比誰都大，一旦有不知情的路人圍過來問一句怎麼了，他們就立刻把溢香樓飯菜裡加了能讓人上癮的藥物那套說辭拿出來說。\n樊長玉基本能確定攪屎棍就是這幾根了，給了溢香樓的夥計們一個眼神。\n這些夥計都是把溢香樓當自己家的，哪能容忍旁人這般詆毀，按樊長玉說的假裝往人群中心擠，把那些攪屎棍擠到人群外圍了，後邊的夥計再扒著他們肩膀就往外帶。\n這些人本就做賊心虛，被人一架住就立馬要大吼大叫，樊長玉手疾眼快地照著他們腹部就是幾記悶拳，成功讓他們把到了嘴邊的叫聲給咽了回去。\n有邊上的百姓朝她們看來，樊長玉惡狠狠道：「看什麼看，沒見過賭場收債啊！」\n她說著又踹了其中一個氈帽男一腳：「你這鱉孫！跑啊！跑得了初一，還跑得了十五麼！」\n溢香樓的夥計們見那位和藹可親的樊老闆，瞬間就跟個惡霸似的當街踹人，愣了一愣，隨即也趕緊上前幫忙拽著那兩人的衣領往角落裡拖，藉此機會公報私仇，又打又踹，嘴上罵罵咧咧道：「欠債還錢天經地義！再跑把你腿給打斷！」\n注意到他們的百姓一聽說是賭場收債的，那些人又長得賊眉鼠眼，一看就不像什麼好人，忙避做一邊，壓根不敢多管閒事。\n那些人還想叫嚷，嘴裡卻很快被塞了一塊髒兮兮的抹布，只能唔唔地被他們拽進了溢香樓後巷裡的院子裡，捆牲口一樣被捆在一起，滿臉驚駭看著抱臂站在他們跟前的樊長玉和假扮成混混的一眾溢香樓夥計。\n樊長玉跟個山大王似的坐在溢香樓的夥計搬來的一張椅子上，手上拿著把剔骨刀把玩著，抬眼的瞬間，尖利的剔骨刀瞬間擲了出去，正好刺穿了其中一個氈帽男頭頂的帽子，剔骨刀餘力不減帶著那頂氈帽釘到了氈帽男身後的樹幹上。\n這人就是之前罵俞淺淺罵得最狠的那人。\n樊長玉一抬眼，正準備放句狠話，卻愣了一息，那氈帽底下竟然是個禿頭！\n怪不得要戴帽子呢！\n沒了氈帽做遮擋，那禿頭男腦瓜頂涼颼颼的，風吹在頭皮上刀刮一樣疼，想到前一秒的確有柄刀貼著自己頭皮飛過，他臉都白了。\n樊長玉收起臉上片刻的錯愣，恢復一臉兇相問：「誰指使你們到溢香樓門前來鬧事的？」\n禿頭男邊上一賊眉鼠眼的人冷嘲熱諷道：「沒人指使咱們，溢香樓的東西吃死了人，還不準人討個公道麼？把我們綁來這裡，還想殺了我們繼續堵住所有人的嘴不成？這溢香樓哪裡是酒樓，分明是殺人越貨的黑店！」\n樊長玉聽這賊眉鼠眼的東西叭叭個不停就煩得慌，簡直是跟郭屠戶是一類的噁心玩意兒！\n她掄起牆邊的木棒槌衝著他腦門子就狠敲了三下，清脆的「邦邦」聲果然悅耳多了。\n那人顯然被打懵了。\n樊長玉惡狠狠道：「讓你說話了嗎？」\n其他被綁的潑皮咽了咽口水，艱難挪動身體，不動聲色離那人遠了些，儘量瑟縮著身體減少自己的存在感。\n那男子還想繼續搬弄口舌，瞧見樊長玉手中那根棒槌，腦門還跟劈開似的鈍痛著，他悻悻把嘴閉上了。\n樊長玉冷哼：「你這條舌頭留著也無用，來人，拉下去，舌頭□□剁碎了餵狗！」\n溢香樓的夥計先是面面相覷，隨即立馬上前兩人，拖著被五花大綁的潑皮去了後邊院子裡。\n緊跟著傳來磨刀霍霍聲，再然後是刀重重砍在案板上的聲音，以及那人的慘叫聲，片刻後那慘叫聲也沒了，只剩唔唔聲。\n被綁在院子裡的幾個潑皮嚇得面如土色。\n樊長玉在椅子上也險些坐不住了，她只是按照話本子裡寫那樣，裝腔作勢嚇唬這群人，溢香樓的夥計該不會沒領會到她的意思，真把人舌頭給割了吧？\n不消片刻，一個夥計就端著個盆子過來了，盤子上放著一小截條血淋淋的舌頭，對樊長玉道：「那廝掙扎得厲害，咱們沒能拔出他整根舌頭，只砍下了這一節。」\n潑皮們看到那血肉模糊的一團就已經嚇得差點尿褲子了，那裡還敢多看，樊長玉經常殺豬，倒是一眼認出那是一小截豬舌，都不怎麼新鮮了，沾了不知是雞血還是鴨血，放在盤子裡倒是能唬人。\n她鬆了口氣，心說這溢香樓的夥計倒也怪機靈的，維持著一臉兇相道：「牽條狗來，餵給狗吃！」\n立即有夥計牽了一條狼狗前來，把那盤子裡的豬舌一扔出去，狼狗立馬狼吞虎咽吃了起來。\n幾個潑皮看在眼裡，止不住地乾嘔，嚇到失禁的也有。\n樊長玉覺著都把人嚇成這樣了，大概能問出真話來了，虎著臉繼續問那光頭：「說，誰指使你們來溢香樓鬧事的？若有一句假話，們的舌頭也割去餵狗！」\n光頭乾嘔得眼淚都出來了，連聲道：「我說！我說！是何師爺身邊的小廝找我們來的。」\n聽到這個答案，樊長玉不由得愣了愣。\n怎麼又跟何師爺那個攪屎棍有關？\n她喝道：「你說謊！」\n光頭被綁著也不住地給她磕頭：「姑奶奶，小的真沒             content: `樊長玉一時間沒想通其中的關鍵,問：「為何這樣說？」\n俞淺淺給她分析：「縣令收刮民脂民膏，如果是他上面的人想貪，那縣令大可不必勾結匪類封鎖通往薊州府的道路,事情就算鬧大了,縣令上面的人也能輕易壓下來。」\n「至於利用老翁的死施壓於我，無非是看中了溢香樓的財力，因為在這鎮上的富商中，根基是最淺的,好拿捏。我平日裡給那些當官的送的好處,有個普通難處他們肯幫忙,攤上了這樣的事，他們自然也不敢蹚渾水。溢香樓一倒，縣令再挨個找其他富商收刮銀子，那些富商要是不想像我一樣傾家蕩產還擔上牢獄之災,就只能乖乖掏錢。」\n樊長玉一下子明白了其中的利害關係,一拍桌子道：「那咱們得趕快和清平縣其他富商擰成一條繩！」\n俞淺淺卻搖頭：「此事還得從長計議，我只是一商戶，壓根不知州府那邊下頒的徵糧令一戶徵多少，若不是你說縣令徵這麼多糧怕是在貪，我也不會想這麼深。畢竟他欺我一商戶朝廷可能不會過多追究,可魚肉整個清平縣的百姓,上邊還沒人庇護他,一旦東窗事發,他必遭殃。縣令不可能不明白這其中的道理，我思來想去,也只有他意圖投反王這一種可能。」\n她說到這裡頓了頓,看向樊長玉：「軍中要徵多少糧,只有那些當官的才清楚，長玉妹子，你是如何知曉縣令多徵了軍糧？」\n樊長玉拿出謝徵說過的那番理由後，又加了句：「縣令封鎖了去薊州府的道路，肯定也是做賊心虛！」\n俞淺淺稍作沉吟道：「加上封鎖府道這一點，咱們基本是能斷定是縣令有反心，但只要縣令不認，只說的山匪劫道，咱們也沒證據指認他和山匪是一夥的，沒法讓百姓信服。唯一能指認縣令的，只有那份徵糧令，單說今年徵的糧比以往多，薊州官府不會把百姓逼到這份上，實在是不能當做指認縣令的證據。畢竟徽州這會兒又剛好打了敗仗，糧道受阻，誰也不知道那些當官的是怎麼想的。」\n樊長玉聽謝徵分析的時候，覺得他那番話很有道理，眼下再聽俞淺淺說這些，突然又覺得俞淺淺說的也沒錯。\n她仔細思考謝徵和俞淺淺的話，心底突然升起幾絲怪異的感覺。\n俞淺淺說軍中要徵多少糧，只有那些當官的才清楚，但言正當時說那番話，好像是清楚官府要徵多少糧一般？\n其次俞淺淺擔心薊州府官員為了打仗，不會管底下百姓的死活，而言正卻十分篤定薊州府那邊不敢把百姓逼到這份上。\n是因為俞淺淺經商多年、凡事考慮得更周到，而言正閱歷比不上俞淺淺才對官府抱有這麼高的期待麼？\n結合眼前的事實，言正說的似乎又是對的，薊州府那邊要求徵的糧，並沒有縣令收的這麼多。\n她擰眉思索著這些，糾結得眉毛都快打架了。\n俞淺淺瞧見了，以為她是在煩擾指認縣令的事，寬慰道：「長玉妹子你別替我急，溢香樓的事我自己慢慢想法子。」\n就縣令這借著發羊角風死去的老翁給溢香樓潑髒水的架勢，分明是想把俞淺淺弄到獄裡去蹲著。\n樊長玉抿唇道：「那何師爺是縣令的狗腿子，僱人給你潑髒水也是何師爺幹的，我覺著那何師爺八成知道薊州府那邊真正要徵的軍糧是多少，要不咱們從何師爺下手？」\n俞淺淺困惑道：「怎麼做？」\n樊長玉說：「一棍子敲暈他，套上麻袋拖回樓裡逼問，你覺得怎麼樣？」\n俞淺淺看著眼前一臉老實嬌俏的姑娘，有點難以置信這話竟然是從她嘴裡說出來的。\n想到她剛才就用這樣的法子幫她對付了幾個潑皮混混，心底微妙的驚愕才少了幾分。\n她仔細思量一番，點頭道：「罷了，就死馬當作活馬醫吧。」\n她看向樊長玉：「不過此事你別插手，我僱人去做便是，縣令這會兒收刮錢財的大頭是清平縣的富商們，若是東窗事發查到你頭上，還得牽連上你夫婿和你妹妹。」\n樊長玉一句反駁的話到了嘴邊，又因為俞淺淺後半句給咽了回去。\n她一個人的確是天不怕地不怕，可一旦扯上長寧，她就不敢肆意妄為了。\n她若出了什麼事，長寧在這世上就無依無靠了。\n還有言正，言正馬上就要走了，也不能因為她攤上這樣的官司。\n樊長玉最終只能道：「那掌柜的，還有什麼事是我能幫上忙的嗎？」\n俞淺淺衝她笑了笑：「你替我出謀劃策這麼多，還不算幫忙麼？以後別一口一個掌柜的了，聽起來就怪生疏的，我雖長你六七歲，但你也別把我叫老了，就喚我淺淺吧。」\n樊長玉明顯能感覺到俞淺淺待自己比從前更親近了些，她也沒在一個稱呼上多做糾結，當即就道：「淺淺。」\n俞淺淺笑得兩眼彎彎，又道：「我聽說你帶了一車滷肉過來，我這樓裡今日是沒法賣了，你帶回去賣不完放壞了也可惜，這樣，你送到醉鯉飯莊去，我跟那老闆交情不錯，他那兒今日正好有包席，正好用得上你這些滷肉。」\n她說著叫來樓裡一個夥計，讓他帶著樊長玉一起去醉鯉飯莊，又同樊長玉結了滷肉錢：「這錢我先替醉鯉飯莊的老闆付給你，回頭我再向他討。」\n樊長玉推拒：「你先解決樓裡的事，這錢等醉鯉飯莊的老闆給你了，你再拿給我不遲。」\n俞淺淺把錢袋子放她手裡：「拿著吧，要是溢香樓還是沒保住，我指不定還得帶著寶兒來你那裡蹭吃蹭喝兩天，可不能先欠你錢。」\n她都這麼說了，樊長玉只得收著。\n去醉鯉山莊送完滷肉後，樊長玉讓趕車的老伯把溢香樓的夥計送回了樓裡，思來想去，還是去了王捕頭家一趟。\n倒不是為了讓王捕頭幫俞淺淺，樊長玉知道王捕頭為人正直，若是縣令讓王捕頭帶著底下的捕快們做了什麼傷天害理的事，王捕頭不知縣令已有反心，在不知情的情況下給縣令當了刀，只怕下半輩子都得在內疚中度過。\n萬一再被扣上個反賊的名號，更加得不償失。\n樊長玉敲開了王捕頭家的門，開門的還是那個婆子，見到樊長玉卻不如之前欣喜了，一臉愁容：「是樊家娘子啊。」\n樊長玉問：「王捕頭在家嗎？」\n婆子說：「在的。」\n遂引著她進屋，王捕頭夫妻倆都在正房，不知是不是樊長玉的錯覺，她總覺著王捕頭身上似有一股頹態，沒有之前英武了。\n王夫人倒是笑著招呼她落座：「長玉來了啊，是遇上什麼難處了嗎？」\n樊長玉搖頭，道：「不是，我來是想問王叔一些縣衙的事。」\n王夫人面上頓時露出幾分為難道：「你王叔……怕是幫不上你什麼，他已經沒在縣衙當差了。」\n樊長玉驚愕出聲：「什麼時候的事？」\n王夫人嘆道：「初二你叔去縣衙上值，就被告知說往後不必去了，說是之前查辦藏寶圖兇案一事不力，跟著你叔的那些小子，也全被換了下來，這縣太爺平日裡不聲不響的，臨要調任了，才來這麼一出。」\n樊長玉卻是聽得眼皮一跳，這顯然是縣令知道王捕頭的秉性，怕王捕頭壞事，才提前支走了王捕頭。\n她問：「王叔知道縣衙裡現在用的那些衙役是些哪裡人嗎？」\n王捕頭搖頭說：「沒去打聽，不過聽說都是專程找的些武藝不錯的人。」\n樊長玉抿唇道：「那些人可能是山賊。」\n這話讓王捕頭夫婦都愣住了。\n王夫人最先反應過來，笑笑說：「這孩子怎麼說起胡話來了？」\n樊長玉神色凝重：「嬸嬸，我沒說胡話，縣令就是勾結了山匪封鎖了府道，還借著徵軍糧收刮民脂民膏，現在又在打整個清平縣富商的主意，他分明是想帶著這些錢財投靠反王。」\n她這番話落，整個屋子裡靜得落針可聞。\n王捕頭在巨大的震驚中久久回不過神來，只喃喃道：「這……這怎麼可能？」\n樊長玉便把俞淺淺的遭遇說了，「他這已經不是在逼溢香樓掌柜給錢，是要溢香樓的全部錢財，又封鎖了府道，阻斷了縣城去薊州府的路。」\n王捕頭其實已經有幾分信了，但這消息實在是太過駭人聽聞了些，他依然在試圖說服自己：「封鎖府道，可能只是為了阻攔那位俞掌柜去薊州府狀告他？」\n樊長玉見狀，也深覺俞淺淺的擔憂不無道理，沒有確鑿的證據，只憑一些蛛絲馬跡的東西來猜測，大多數人哪怕心中懷疑了，沒看到鐵證也不敢輕易站隊。\n她想起俞淺淺說的徵糧令，道：「王叔，你見過薊州府那邊送到清平縣的徵糧令沒？若是縣令徵的軍糧數目和徵糧令上不一致，這便是鐵證了。」\n王捕頭搖頭道：「那東西我哪裡見得到，都是縣令和何師爺過目後，直接吩咐底下的弟兄們去徵糧。不過所有文書都收在縣衙的文庫裡，我同管理文書的主簿尚有些交情，他管理文書應該能看到徵糧令。」\n樊長玉聽得心跳怦怦，手心都不自覺出了一層汗：「咱們能去找那主簿老爺嗎？」\n王捕頭畢竟辦案多年，心性穩沉，道：「不能打草驚蛇，我前腳被撤了職，後腳再去劉主簿家中，縣令若是當真有反心，只怕從我去劉主簿家中那一刻起，就有人傳話給縣令了。」\n王夫人突然道：「今年還沒去劉家拜年呢，這不就有由頭了？正好快到中午了，老頭子你留在家中，我帶著長玉拿拜年禮去劉家一趟，總不會叫縣令那邊瞧出端倪了。」\n王捕頭點頭：「這法子可行。」\n王夫人挑了幾件年節禮，帶著樊長玉去劉主簿家中。\n劉主簿聽她們說明來意後，也是大吃一驚，隨即道：「薊州府那邊的確有送來徵軍糧的文書，不過我並未見過那文書，徵糧令一直收在縣令那裡。」\n縣令一直握著文書不肯拿與劉主簿歸檔，這無疑是又驗證了縣令的反心。\n樊長玉和王夫人離開了劉家，皆是一臉心事重重地往回走。\n沒有徵糧書，那所有的希望就只能放在何師爺身上了。\n王夫人有些難過地道：「天殺的縣令帶著錢糧投了反王，那些谷種都被搶乾淨的農人拿什麼過活啊！」\n樊長玉看了一眼日頭，心說不知俞淺淺那頭帶人抓到了何師爺沒。\n這個想法剛冒出來，她腦子裡突然竄過另一個念頭。\n她看向王夫人，說：「嬸嬸，我們要不直接把縣令綁了？」\n王夫人眼眶裡的紅意還沒褪去，看著眼前這乖乖巧巧的閨女，張了張嘴，半晌沒說出一句話來。`

            title: `第46章第46章`,
            content: `臨安鎮。\n謝徵賣完豬肉,皺著眉用帕子擦乾淨手。\n隨即才撩眼皮掃了一眼日頭，發現已臨近中午，好看的眉頭皺得更深了些。\n臨安鎮去縣城又不遠,她何故去了這般久？\n謝徵關上鋪子門,途經瓦市時，瞧見一胡商擺在攤位上賣的各類動物皮毛和一些皮質成品，他目光落在了其中一對護腕上。\n胡商見他盯著那護腕看，吆喝了聲：「公子要買護腕嗎？這護腕是鹿皮的,委實是好東西,不過公子用的話……小了些,我這裡還有獐子皮的制的，公子瞧瞧？」\n他說著就撿起一旁大了好幾個號的護腕遞給謝徵。\n謝徵卻沒接，拿起那鹿皮製的護腕看了看，抬手輕輕一握,似在憑著記憶比劃大小,片刻後對那胡商道：「就這個。」\n他結了帳拿起護腕正要離去，卻聽得一旁的茶舍裡幾個人在長籲短嘆。\n「可憐了馬家村那幾十條人命了，那些當官的真他娘的不是個東西！」\n「只盼那秀才逃出去了，能把這些狗官幹的好事都捅出去！」\n謝徵駐足朝那邊看去，胡商見他似乎對那幾人說的事有興趣,嘆了口氣道：「是馬家村的慘案,村裡有個書生忍不了官府這般殘暴徵糧,要帶著全村人去薊州府衙跪請給農人留些谷種,那一村子的人怕叫官府的人察覺，昨天夜裡出發,今早卻被人發現全在官道上遇了害,村民盡數被砍殺,那書生不見蹤影，不知被活抓了回去，還是逃出去了。」\n謝徵眼底寒芒一閃而過，問：「那村子裡的人是被官府所殺？」\n胡商道：「大伙兒都猜測是，畢竟都是些一窮二白的莊稼人，山賊便是要劫道，那也是劫富人，總不能專程堵在那裡，殺幾十個窮人只為了磨刀吧？」\n「說來也是奇了怪了，馬家村人一死，通往薊州府的幾條道就都叫山匪給封了，怎有這般巧的事？不就是怕有人去薊州府告狀？馬家村鄰村的莊稼漢們都已經拿起傢伙說要去投崇州的反王了。」\n胡商說著也是不住地搖頭，他本非大胤人，走南闖北只為做些皮毛生意，但同為底層百姓，聽到這樣的慘案，難免還是唏噓。\n謝徵則是長眉緊鎖，他是掌權者，自然看出了不對勁兒。\n馬家村的慘案，像是有人在故意逼反清平縣的百姓一樣。\n那個書生若是沒死，逃出去了必會將那場屠戮捅到薊州府乃至京城去。\n官府為了徵糧，逼得百姓沒活路，百姓在縣衙跪了縣令不予理會，轉而打算去州府跪，卻在半道上被人屠殺，任誰聽了這樣一樁慘案，都只恨不能將官府那些人挫骨揚灰。\n慘案能激起世人的憤怒，逼反清平縣的百姓，無疑又是對朝廷軍事上的打擊。\n想到泰州徵糧傳出的那些慘案，謝徵眸中寒意更甚。\n徵糧鬧出的所有慘案，似乎都有人在背後故意推波助瀾。\n而受益者，無疑也只有崇州反賊了。\n-\n薊州府。\n魏宣坐在主位上，一臉不耐看著底下人清點各郡縣徵上來的糧草。\n很快就有親衛上報：「將軍，清平縣徵的糧還沒送來。」\n魏宣本就不好的心情這會兒更是差到了極點，一腳踹開跟前的矮几，大罵道：「區區一縣令，也敢違抗我的軍令？」\n他提劍起身：「來人！點兵！隨我去清平縣親自徵糧！」\n恰在此時，又有一斥候急衝了進來，「報——燕州八百裡加急！」\n魏宣面色不愉，燕州只是個倚靠燕山的窮山惡水之地，乃他貶謫謝徵舊部之地，能有什麼急報？\n展開信件，瞧見上邊熟悉的字跡時，他渾身的血都在這一瞬間逆湧。\n親衛不知自家將軍何故一下子臉色難看成了這樣，下一秒卻見魏宣忽而拔劍狠狠將被他踹翻的那几案砍做兩半，目眥欲裂：「他沒死！他故意等到此時才露面，不就是看我打了敗仗，想藉此羞辱於我！」\n親信撿起被他扔在地上的那張信紙，瞧見上邊遒勁狷狂的字跡，以及落款處那「謝九衡」三字，亦是大駭。\n大胤武安侯，姓謝，名徵，字九衡。\n這字是他的老師陶太傅取的，陶太傅說「徵」字太過戾氣，怕他冒進求成，取「九衡」為字壓一壓，旁人做事只需三思，他行事，最好是九番衡量。\n這麼多年，謝徵也的確未負陶太傅所託，在戰場上從未冒進過，雖是少年成名，穩重卻不遜於老將。\n親衛是魏宣心腹，自然也知曉魏家父子在崇州戰場上設計武安侯一事。\n他當即道：「武安侯潛伏至今，必然暗中養精蓄銳，以圖抱當日之仇。他在信上讓您退守徽州看好西北門戶，以防外敵，指不定是奸計，西北之地不宜久留！丞相的調令不日便會抵達，將軍先行回京才是上策！」\n魏宣一把拎起親衛的衣領，惡狠狠道：「老子怕他？」\n親衛知道魏宣處處都喜同武安侯比，尤其見不得旁人說他不如武安侯，此刻卻也顧不得觸他逆鱗了，懇切道：「將軍莫要爭這一時之氣！西北已亂成了這般，徽州剩下的那七萬將士，又是武安侯一手帶出來的，武安侯身死，他們以為武安侯命喪崇州反賊之手，為替武安侯報仇聽您調遣罷了，武安侯如今還活著，咱們在西北就是武安侯刀下魚肉！」\n魏宣哪能不知親衛說的這些是事實，可越是明白，心中才越是窩火，他從小就被這麼個人壓著一頭，謝徵就是扎進他眼裡的一根釘子。\n這根釘子不拔.出來，他這輩子都不得舒坦。\n可最終魏宣還是不得不暫服這個軟，帶著兩千親兵怒氣衝衝離開了薊州府。\n賀敬元在府上聞得此事時，長嘆一聲，半是欣慰，又半是慚愧。\n欣慰那位聞名天下的「殺將」，只是對異族狠，對大胤百姓卻還心懷仁心。\n又慚愧於自己身為一方父母官，卻任魏宣將薊州百姓逼到了這份上。\n鄭文常請示他：「大人，徵上來的那些軍糧如何處置？」\n賀敬元道：「谷種都還與農人，立了春，不可耽擱來年耕種。」\n鄭文常應是。\n賀敬元問：「聽聞有一縣並未徵糧上來，可知是哪一縣？」\n鄭文常答：「清平縣。」\n再次聽到這個地名，賀敬元目光一沉，道：「縣令崔守德是個鼠膽之輩，豈敢不徵糧上來？此事怕是有些蹊蹺，你帶人去查一查。」\n鄭文常剛要抱拳，忽有侍衛匆匆進門道：「大人，不好了，府衙前有一書生擊鼓鳴冤，做詩痛罵官府強徵軍糧，屠盡田間莊稼漢，現已鬧得滿城風雨了！」\n賀敬元和鄭文常具是一驚。\n鄭文常忙抱拳道：「屬下得了大人的令後，一直派人盯著魏宣手底下的去徵糧的那些兵卒，並未發現他們殺人搶糧。」\n賀敬元只吩咐那侍衛：「把人帶來我問問話。」\n侍衛領命出去。\n-\n清平縣。\n樊長玉提議的綁縣令一計，毫無疑問地被王夫人否決了，她無奈道：「縣衙的衙役零零總總算下來，也有百來人，如何綁得了縣令？」\n樊長玉怕嚇到王夫人，垂著腦袋沒吱聲，想的卻是，管他多少人，這些人總不能一天十二個時辰都跟著縣令，縣令總有落單的時候。\n王夫人還要說什麼，前方街頭卻傳來一片喧譁聲。\n一隊如狼似虎的官兵押著一眾五花大綁的人遊街而過，樊長玉看清那些人身上的服飾，大驚：「那不是溢香樓的夥計麼！」\n王夫人心中也是一個咯噔：「縣令這麼快就要下手了？」\n樊長玉沒在被押解的人裡瞧見俞淺淺，疾步上前擠到圍觀的人群裡去瞧。\n邊上圍觀的百姓亦是議論紛紛：「怎地溢香樓的廚子夥計都被抓了？」\n「聽說是溢香樓的飯菜吃死了人，那家人抬著棺材去溢香樓門口鬧事後，官府為了查案這才封了溢香樓，把樓裡的夥計都帶回去審問。」\n樊長玉踮起腳尖往官兵押送的隊伍裡看，總算是瞧見了被綁住雙手走在中間的俞淺淺，俞淺淺也看到了她，不動聲色衝她搖了搖頭，示意她莫要過去，張嘴無聲地吐出兩個字。\n樊長玉從她嘴形辨出她說的那兩個字是「寶兒」。\n樊長玉細看那支押送隊伍，沒瞧見小孩子，心知俞寶兒定是被俞淺淺藏在了哪裡，俞淺淺同自己做那個嘴型，便是想讓她照料俞寶兒一二。\n王夫人已追了上來，怕她行事衝動，一直緊攥著她一隻手，壓低了嗓音在她耳邊道：「不管你跟那掌柜交情如何，這時候都別上前去，叫官兵注意到了你，指不定會引火燒身。」\n樊長玉也明白這一點，強行忍耐著沒動。\n等那隊官兵走後，王夫人才看著樊長玉說了句：「你若要縣衙和縣令府上的地圖，我可以給你弄到。」\n樊長玉知道在王家的處境上，王夫人肯給這句話已是不易，道了謝，說需要時會去取，便疾步往溢香樓走去。\n俞淺淺是在溢香樓被抓的，俞寶兒指不定被她藏在了溢香樓某處。\n到了正街，樊長玉遠遠便瞧見溢香樓那恢弘的大門上已貼了封條，她繞去了後巷，眼見給溢香樓小廝們住的那些院子也被封了，她看了一眼溢香樓後院的院牆，正打算翻進去，身側卻橫伸出一隻手，將她擄到了兩院外牆之間的一條窄小暗巷裡。\n樊長玉反手就拽住了對方衣襟，手臂發力正要把人給貫地上去，聞到對方身上清苦的藥味和陳皮糖的味道後，手上的力道才驟然一松。\n她喚了聲：「言正？」\n謝徵垂眸示意她不要出聲，鳳眸冷冷掃向暗巷外，樊長玉不由也跟著警惕了起來。\n一隊官兵的腳步聲由遠及近，守在了溢香樓後門外：「縣令有令，溢香樓命案一日未結，溢香樓便一日不可解封，未免罪證叫人銷毀，嚴守此樓！」\n樊長玉小聲說：「俞寶兒沒被官兵抓走，我擔心俞淺淺是將他藏在了樓裡某處。」\n兩人挨得極近，彼此的呼吸聲也清晰可聞，未免叫守在外邊的官兵聽到什麼，她聲音壓得極低。\n謝徵只覺耳中似有蟲子爬似的，他皺了皺眉，直身離她遠了些道：「我先你到一刻鐘，已經進樓去把人帶走了。」\n樊長玉鬆了一口氣，這才想問他：「你不是在肉鋪裡麼，怎會來縣城？」\n謝徵目光微寒，只道：「賣完豬肉，見你久久未歸，過來看看。」\n樊長玉說：「我沒事，只是俞掌柜遇上了麻煩。」\n她將自己和俞淺淺的推測說與他聽後，又道：「我打算綁了縣令救俞掌柜，你帶著俞寶兒和寧娘找個地方躲起來，要是我被抓了，勞煩你照顧一下寧娘。」\n謝徵擰眉看她：「誰給你出的蠢主意？」\n樊長玉被他懟得莫名其妙，想了想，覺得他應該是惱怒自己涉陷，在他快走時還把兩個孩子塞給他帶著，道：「我自己想的，我也就說一下被抓的可能而已，我肯定是趁縣令身邊人不多的時候下手啊，怎麼可能被抓呢……」\n謝徵嗤了聲：「鄉下已經有不少莊稼漢反了，正要推平縣衙再去投靠反王，你覺著縣令是主謀會把自己置於這等險地？」\n樊長玉聽明白了他話裡的意思，挾持縣令也救不了俞淺淺。\n她想了想，沒想出個主意來，抬起一雙澄澈又老實巴交的眼看著謝徵：「那怎麼辦？主謀是誰，咱們去綁了他有用嗎？」\n謝徵聽她還沒放棄綁人的打算，都快氣笑了。\n他道：「綁誰都沒用，這是有人挑撥離間，意圖逼反清平縣民後，再引薊州府兵前來鎮壓暴民，如此一來，朝廷徵糧逼反百姓的傳言便坐實了。」\n清平縣沒把徵上來的糧送去薊州府，以魏宣的脾性，必定當場殺來清平縣，屆時和反民一對上，魏宣讓底下人屠了整個清平縣都有可能。`

            num: 47,
            title: `第47章第47章`,
            content: `謝徵看向樊長玉：「你同那姓王的捕頭相識,你速去尋他一趟，讓他帶著衙役守在城門處，必不可讓暴民入城。」\n樊長玉不解：「暴民入城了,應當也是找縣令和那些衙役的麻煩,為何要替縣令阻止那些暴民？」\n謝徵面上的神色是一種說不出的冰冷：「他們把性命都豁出去造反了，你還當他們要的只是一個公道不成？他們如今要的是權勢富貴！這城裡任何一戶人家都富過那些農人,都能叫他們憎惡入骨。再往前一步，他們也可以是燒殺搶虐無惡不作的叛軍，不想看這縣城被搶掠一空就按我說的話去做。」\n樊長玉聽他這麼一說,心中因為人性的複雜有一瞬間發沉,她抿唇道：「王捕頭已經被縣令撤職了，他的話現在在衙門不管用。」\n謝徵眉頭一擰,還是道：「你只管去傳信,就說縣令被人架空了，讓他先帶衙役去城門處設防，遇上暴民先以安撫為主,承諾官府會退還徵上來的所有糧食，也不會追究他們的罪責。」\n「可官府若不退糧食怎麼辦？」\n「且先穩住暴民，旁的我來想辦法。」他目光沉靜，莫名就讓人信服。\n樊長玉想了想，還是有些顧慮：「你不是說,他們都造反了，圖的是榮華富貴麼？這樣當真能穩住暴民？」\n謝徵看她一眼：「暴民會殊死一搏，是因為已無退路,承諾不追究他們的罪責，再還給他們糧食，他們能回到從前一樣耕種的日子,有野心的會繼續挑唆不肯讓步，但只想本分種地被逼到這份上的，就會開始猶豫。」\n樊長玉算是聽明白了，他是要那些暴民先自亂陣腳。\n有一瞬她覺得眼前的言正很陌生，她好像從來就沒有真正了解過他。\n謝徵察覺到她的目光，問：「怎麼了？」\n樊長玉搖頭，問：「我們怎麼出去？」\n官兵還守在溢香樓後巷裡，從巷子口出去，必然會被守在外邊的官兵看到。她們若是打暈了官兵再走，過不了多久，倒在那裡的官兵也會被人發現，仍然會暴露行蹤。\n偏偏這條巷子另一頭封死了的，又極窄，是用來排兩座屋宅間簷瓦滴下的雨水，僅容一人通過，因潮溼常年不見日光，牆壁上都全是黏膩的青苔，稍有不慎便會打滑。\n謝徵看了一眼巷尾封死的高牆，對樊長玉道：「你踩著我肩翻上去。」\n樊長玉估量了一下兩人的身量，點頭道：「行，我爬上去了，找個梯.子給你。」\n謝徵在牆根處半蹲下時，她一手撐著牆壁，一腳踩上他寬厚的肩頭。\n兩個人的身高的加起來，總算是讓樊長玉攀到了牆頭，她雙臂一撐用力翻了上去，抬眼往院內掃去時，瞧見一窗戶大開的房間前，一男子正在案前提筆寫什麼，忽而銳利抬眸往這邊看來。\n樊長玉以迅雷不及掩耳之勢撿起牆上一片瓦，照著他穴位就砸了過去。\n男子面露驚愕，一句話未來得及說，整個人就栽倒在了書案上。\n樊長玉砸完才後知後覺那男人瞧著有些眼熟，只不過她一時半會兒想不起來在哪裡見過。\n謝徵聽到裡邊的動靜，問她：「牆對面有人？」\n樊長玉點頭「嗯」了一聲，說：「人已經被我砸暈了，這院子裡正好有一架竹梯，你等等，我去搬過來。」\n她說著就跳下了牆頭，身形靈巧得跟貓兒一樣。\n那竹梯不長不短，剛好夠搭上院牆，樊長玉順著竹梯爬上牆頭後，把竹梯遞到了高牆另一邊，才讓謝徵也順利到了院子裡。\n他進屋看了一眼被樊長玉砸暈過去的人，眼底划過一抹異色，道：「是書肆東家。」\n趙家的這處宅子，怎就剛好在溢香樓隔壁？\n心中的這絲疑慮讓他多掃了書案上沒寫完的信件一眼，那信因為趙詢倒下時毛筆重重劃的一筆，不少字跡都被墨跡蓋了下去，但還是能辨出個大概。\n謝徵眸色陡然轉涼，離開時不知是有意還是無意，袖子不小心打翻了硯臺，濃墨潑灑了一桌子，髒汙了那份沒寫完的信紙，連帶趙詢的袖子和半張臉也全是墨跡。\n樊長玉聽他說這是書肆東家後，本就有些心虛，再瞧見謝徵打翻了硯臺，可以稱之為心驚肉跳了，她結結巴巴道：「我……我把你東家給打了，你又把他硯臺給弄翻了，他不會記恨你吧？」\n她記著謝徵在書肆寫時文來著，上次那四十兩不說還有定金在裡邊麼？\n謝徵微微一愣，沒料到她擔心的竟是這個，冷沉的神色消退了些，道：「無妨，他不一定記得你，也不知我來過。」\n樊長玉一想也是，自己都差點沒認出他來，他是個富商，每天見的人多了去了，肯定也不記得自己了，當下大鬆一口氣。\n趙府是一座一進的宅子，闔府卻幾乎不見一個下人，樊長玉和謝徵很容易就從趙府角門溜了出去。\n樊長玉心說她們折騰這麼一趟，還不是因為溢香樓前門和後巷都叫官兵給看守了起來，她忍不住道：「俞掌柜和樓裡的夥計都叫那狗官給抓去大牢裡了，他們為何還要派人看著溢香樓？難不成就為了找俞寶兒？」\n謝徵神色幽沉，只說：「不無可能。」\n樊長玉神色頓時有些憤憤的：「那些狗官心腸也恁歹毒了些！」\n為了殺雞儆猴連個孩子都不放過？\n謝徵沒接話，道：「那孩子叫我暫放到了幫你趕車的老伯那裡。」\n樊長玉之前為了送貨，租了那老伯一個月的牛車，姑且也算是信得過的人。\n但讓那老伯帶著一個富家小公子，還是很容易叫人覺出不對勁兒，樊長玉道：「我去王捕頭家時，把寶兒一併帶過去。」\n謝徵點了頭，一人分道揚鑣時，他看著樊長玉，似想囑咐她一句什麼，但最終什麼也沒說。\n倒是樊長玉見他欲言又止，困惑問：「怎麼了？」\n天陰陰的，讓謝徵的眸色看起來也比平日裡暗沉，他說：「若是暴民進了城，你只管保全自己就是。」\n頓了頓，又道：「不要輕信任何人。」\n樊長玉聽得心口一跳，抬起眼看他：「你是不是要走了？」\n突然同她說這樣一些話，實在是很不對勁兒。\n謝徵一噎，臉色不太好看地道：「雖然我也不是什麼值得信任的人，但眼下你還是可以信我的。」\n他走後，樊長玉留在原地怔了片刻，才趕車老伯那裡接俞寶兒往王捕頭家去。\n王捕頭聽說了暴民的事，亦是大驚，在房間裡來回踱步幾趟後，對王夫人道：「把我的捕快服拿來。」\n王夫人去內室拿衣服時，王捕頭看著樊長玉道：「你這夫婿，能有這番見識，人又敏銳，怕是不簡單啊……」\n樊長玉說：「他家從前是開鏢局的，可能是比旁人見多識廣些。」\n王捕頭說了句難怪，換上捕快服服後，就先出門去找之前手底下那班人。\n王夫人送他走出家門口，面上憂心忡忡的。\n樊長玉不知謝徵接下來的計劃是什麼，讓王捕頭一個被革職的捕快出去做這些，是有風險的。\n可一旦暴民進城搶掠，無路可退後，野心和貪婪也會跟著暴漲，如同開葷的猛獸，再也停不下來了，必須得把這頭猛獸扼殺在沾染鮮血前。\n她想了想對王夫人道：「您先前說，您這裡有縣衙和縣令府上的地圖？」\n王夫人遲疑點了頭，問：「有是有，丫頭你想做什麼？」\n樊長玉說：「我聽我夫婿話裡的意思，徵糧的事鬧成這樣，縣令八成是被人架空了，咱們要不把縣令救出來？旁的不說，得先給王叔恢復捕快的職位，這樣王叔辦起事來也方便。」\n不管這會兒暗地裡掌權的是誰，但在普通百姓和衙役眼中，縣令就是清平縣最大的官。\n王夫人不知這丫頭是天生膽大還是什麼，她這會兒都還有些心驚肉跳的，這丫頭卻還在想更大膽的事，她想到去阻擋暴民的丈夫，定了定心神道：「這太冒險了些，我跟你一起去。」\n樊長玉想了想，道：「有個不那麼冒險的法子，不過還是得請嬸子幫忙。」\n王夫人神色一動。\n-\n溢香樓。\n一輛馬車駛向了溢香樓後巷，停在了距巷口不遠處，卻不見車中有人下來，溢香樓後門的守衛不動聲色打量起那輛馬車。\n其中兩個兩人對了個眼神，正準備過去看看，巷子另一邊卻突然竄出一道黑影，掄起棒槌對著餘下兩個守衛的後腦勺一砸，兩個守衛當場暈了過去。\n樊長玉在王捕頭家換了一身小子的衣裳，臉也用鍋灰抹黑了，叫人辨不出她原本的五官，一腳踢開溢香樓後門上的封條後，跑進了溢香樓。\n那兩個準備去查看馬車的守衛連忙大叫：「有殺人同夥闖溢香樓銷毀罪證了！」\n又跟進去要捉拿樊長玉，樊長玉就在門後等著他們呢。\n等人一進來，她一棒槌扔過去就砸暈了一個，後邊那名小卒拔刀要砍樊長玉，樊長玉側身一躲，一腳把他踹進了後院的潲水缸裡，那潲水缸頗深，那名小卒整個人折在裡邊，半天沒撲騰起來。\n樊長玉進屋去片刻後，用鬥篷裹著個什麼東西抱懷裡快步離開了院子。\n那小卒歇斯底裡大叫：「賊人跑了！賊人跑了！」\n這番動靜早已驚動了溢香樓正門那邊的守衛，一群穿著捕快服卻明顯不像捕快的人兵分兩路從巷子兩頭追來，卻只瞧見一小個男子懷中似抱了個孩子，匆匆上了停在巷口的那輛馬車。\n不及一眾官兵追上，那輛馬車便跑遠了。\n飛雪飄飄灑灑，駕車的人穿著一身粗布衣裳，帶著鬥笠叫人看不清面容，但那一甩鞭的架勢，顯然也是個練家子。\n有從正面圍堵過來的官兵要上前去攔，那駕車的人手上甩出另一條鞭子，長約一丈有餘，打在身上便是皮開肉綻，左右一掃，圍過來的官兵便只躺在路邊哀聲嚎叫了。\n官兵頭子大喊：「定是樓裡的同夥帶著那小崽子跑了，快些叫人增援！」\n一支哨箭射向灰濛濛的天空，縣衙很快也派出了一隊官兵過去。\n車上的人正是樊長玉和王夫人。\n王夫人對整個縣城大街小巷再熟悉不過，拐了幾個彎就將一眾官兵甩在身後，樊長玉跳下車前道：「勞煩嬸子先引著這些官兵溜兩刻鐘，兩刻鐘後便不管他們了，自己脫身就是。」\n王夫人把鬥笠往上抬了抬，問：「兩刻鐘，你那邊來得及嗎？」\n樊長玉說：「我夫婿應當是去縣衙了，我這邊再去縣令府上就是，官兵們傾巢出動來抓俞掌柜的兒子了，我們再怎麼也能找到縣令。」\n車上自然也沒有俞寶兒，她之前用鬥篷裹了從溢香樓抱出來的，不過是一床小被子。\n王夫人便只叮囑了句：「萬事當心！」\n樊長玉說：「嬸子也是。」\n馬車放緩了速度，樊長玉在無人處下車後，又七拐八拐地進了一條巷子，朝著縣令府宅所在的方向去。\n-\n樊長玉抵達縣令家門口時，卻發現宋母也在這裡。\n她貓在暗處，只瞧見宋母帶著個年歲極小的丫鬟，拎著大包小包的東西站在縣令家門口，臉上掛著恭維的笑意：「硯哥兒就要上京趕考了，很是掛念大小姐，這不，讓我買了這麼多小玩意拿給大小姐……」\n門口的管家道：「宋舉人有心了。」\n他命身後的小廝把宋母忍痛買的那些珠花首飾都收下了，卻不說讓宋母進門去坐坐的話。\n宋母笑得臉都快僵了，接連吃了好幾日的閉門羹，又不甘心花銀子買了這麼多禮物後還是不得縣令一家待見，道：「前些日子夫人誇我那鞋樣子好看，我今兒特來找夫人吃茶，順便把那鞋樣子拿給夫人。」\n管家只道：「夫人感染了風寒，這還沒見好，宋夫人有什麼東西要給夫人的，交給老奴便是。」\n宋母原本還覺著縣令門楣有些低了，等宋硯高中，一縣令之女，不一定配得上自己兒子，只是礙於在這縣裡，還少不得縣令照料一一，才同縣令夫人熱絡。\n先前縣令夫人一心想把兒女的婚事定下來，她心中小算盤就打得噼啪響，只用著個舉人娘子，進士娘子的甜頭吊著縣令母女，卻並不應定親的事。\n縣令夫人偶爾逼得緊了，她又哭哭啼啼便拿出宋硯剛退親說事，說宋硯是個孝子，為了她，才擔著薄情寡義的名聲同那殺豬的樊家退了親，哪想那樊家，如今就差逢人就說是他宋家對不起她了，說怕宋硯這麼快又定親，愈發讓那樊家女嫉恨，若是讓她散播些風言風語出去，必然會影響宋硯的仕途，兩家人反正遲早都是親家，又何必急於這一時。\n縣令夫人也就被她這番話給唬住了，平日裡一人一起吃茶看戲，縣令夫人對她一向熱絡。\n過年時，宋硯剛好在燈會上同樊家鬧出了醜聞，宋母為此一度覺得抬不起頭來。\n她怕縣令夫人低看自己兒子，雖說一開始只想騎驢找馬，可這事讓宋母突然擔心了起來，萬一兒子沒考上進士，去不了京城當官，放眼整個清平縣，還是跟縣令一家結親最為風光，這才在大年初一就拿著東西去縣令府上拜年。\n哪曾想，竟吃了閉門羹。\n宋母當天回去氣得險些嘔血，怕影響兒子溫書，沒敢把這事告訴宋硯，她自己卻是暗下決心，一定要同縣令家修復關係，這兩日一直往縣令家中送禮。\n走不通縣令夫人的路子，又走縣令千金的路子，奈何送禮送到了今日，還是連縣令家的大門都進不去。\n宋母只覺自己的臉面像是被人扯下來扔在腳下踩，走時連一點笑意都擠不出來了，臉色鐵青，走過街角後才敢狠狠往地上唾了幾口：「什麼東西，不過一縣令女兒，真當我硯哥兒求著娶？給東西好意思腆著個臉收，卻連讓我進去坐著喝口茶的話都沒有？」\n樊長玉背身在街邊一攤位前假裝挑揀東西，將宋母的話聽得分明，淺淺斜了遠去的宋母一眼，雖然早就不把宋家當回事了，但看到宋母這副嘴臉，還是只能感慨一句惡有惡報。\n心道那縣令一家最好是看穿這母子倆是什麼貨色了，才不搭理他們的。\n她繞到縣令家後牆，順著靠牆根的一棵樹爬上去，翻到了牆內。\n王捕頭當了十幾年的捕快，給好幾任縣令做過事，對這座宅子的地形很是熟悉，樊長玉看了王夫人給的地圖後，大概也能知道是府上的布局，這應該是廚房了。\n她貼著牆根不動聲色往外走，摸過一道垂花門後，正好瞧見那管家進門來，她忙躲到了牆拐角處。\n管家帶著宋母給的東西乞求一守衛模樣的男子：「軍爺，這些都是咱未來姑爺給小姐的，您就通融通融，讓小的拿給小姐吧。」\n縣令府上的管家做事竟然要求一守衛？\n這顯然不正常，樊長玉豎起耳朵聽。\n那守衛只冷笑一聲：「和之前那些東西一起扔廂房去吧，要是走漏半點風聲，你們腦袋都別想要了！」\n管家顯然被嚇住了，唯唯諾諾不敢再作聲。\n樊長玉忽覺把控了縣令府的這群人肯定不簡單，呼吸聲都放得更為細微綿長了些。\n她注意到整個縣令府，庭院裡的積雪都沒人清掃，不知是縣令一家被控制，底下的人消極怠工，還是有人下了令不讓掃雪。\n畢竟有積雪在，走過庭院裡的人不管腳步聲放得又多輕，踩在積雪上總會發出聲響。\n樊長玉正沉思著，忽聽聞身後有腳步聲傳來。\n她一回頭，跟一端著託盤的小丫鬟視線撞個正著。\n小丫鬟剛想放聲尖叫，就被樊長玉逼近一手刀劈暈了，她一手接過丫鬟手中的拖盤，一手扶著丫鬟，四下看了一眼，用腳挑開邊上一間房的房門，帶著丫鬟走了進去。\n片刻後，樊長玉一身丫鬟服飾，端著託盤明目張胆走了出來。\n轉過那邊拐角時，簷下的侍衛掃了她一眼，樊長玉低著頭走過，往之前管家離開的方向去了。\n她提前看過地圖，加上方向感不錯，根據府上的布局沒費多少工夫就找到了管家所住的地方。\n推門而入時，管家正坐在椅子上兀自神傷，瞧見樊長玉，差點沒被嚇死，整個人都摔地上去了，一邊痛得齜牙咧嘴，一邊又要擺出老管家的譜，寒著張臉喝問：「你是哪房的丫頭，好大的膽子！」\n樊長玉覺得這縣令都被人看管起來了，那麼革王捕頭職的命令肯定也不是縣令下的，縣令現在指不定還指望著王捕頭來救他老命呢。\n她便道：「我是王捕頭的人。」\n管家臉上的怒意一僵，隨即差點喜極而泣，「還是王捕頭老辣，一眼看出縣衙這些日子不對勁兒……」\n樊長玉見他頗有要哭訴上半天的意思，皺眉打斷他的話，只問自己想知道的：「府上是怎麼回事？」\n管家淚漣漣道：「前些日子薊州府那邊不是下令徵糧麼，有一隊持薊州府將腰牌的官兵前來監督徵糧事宜，我家大人聽說要按一人一石徵糧，求情說這是要把百姓往絕路上逼，可上邊來的大人以徵糧令壓迫，讓我家大人照做就是。」\n「我家大人無法，只得下令徵糧，可那些去徵糧的官兵，卻在鄉下打死了農人，我家大人怕到時候鬧到薊州府賀大人那裡去，烏紗不保，想提前去薊州府請罪，就叫那夥從薊州來的官兵給看押了起來。他們自稱是西北節度使魏宣的人，說一切聽他們行事，如今賀大人都被節度使革職了，又言我家大人阻礙了徵糧大事，先行在府上看押起來，連夫人和小姐都不得外出，也不可見客。」\n樊長玉眉頭皺得更緊了些，她聽說過魏宣此人的名字，泰州徵糧的慘案，就是他縱容底下的人鬧出來的。\n她心中一時也沒底，若是魏宣殘暴無道，當真用這樣的方式強行徵糧，王捕頭在城門口就算一時勸下了暴民，魏宣轉頭又帶著軍隊去殺那些百姓又如何是好？\n樊長玉想了想，說，「要不咱們把魏宣派來的那個大官綁了，讓縣令把徵上來的軍糧還給百姓。」\n綁了那個頭頭，那個頭頭就沒法下令殺百姓了。\n管家哆嗦著雙唇，都顧不上她說的後半句，光是那前半句後就差點嚇得他三魂丟了兩魂：「綁……綁了？在這府上的軍士有十幾人，個個武藝高強，縣衙也全是他們的人，如何綁？」\n樊長玉說：「打不過不會下迷.藥什麼的嗎？」\n管家忍不住打量起樊長玉，心說這真的是王捕頭叫來幫忙的嗎？\n綁了薊州府的軍爺這得是多大的罪名？萬一那些人秋後算帳，這府上的腦袋加一塊，也不夠砍的啊！\n他連連擺手：「不可不可！轉頭我家大人如何向那些軍爺交代？」\n樊長玉也知道這法子損了點，但這縣令在清平縣上任三年，雖沒做什麼大惡，可也沒替百姓做什麼好事，眼下這是唯一的法子，坑縣令而已，但不用白不用！\n她道：「馬家村被官兵打死了人，官兵已經逼反了周邊百姓，集結著要來踏平縣衙的暴民有數千人。你覺得你家大人到時候是不是被推出去那個替死鬼？你這個縣令府上的管家，會不會也被那些暴民一起記恨上？」\n管家唇又開始哆嗦，衡量片刻後道：「府上沒有迷藥這東西，而且那些人謹慎得很，入口的東西，都會讓府上的下人先嘗。」\n這下樊長玉也沒轍兒了。\n管家見狀，悻悻道：「不過府上有巴豆，大廚房這會兒正熬著銀耳蓮子湯。」\n-\n片刻後，樊長玉端著託盤和一拎著木桶的小廝去了前院。\n樊長玉的託盤裡是一白瓷盅，盅裡一個大雪梨被切開上半部分，挖空了裡邊的梨肉，再倒進銀耳蓮子湯，合上被切掉的雪梨蓋子，用文火煨的。\n隔著湯盅，不僅能聞到裡邊的銀耳香，還能聞到一股清甜的梨香。\n樊長玉只能感慨，大戶人家在吃上都能搗鼓這麼些新奇的東西。\n小廝拎著的木桶裡，就只是普通的銀耳蓮子湯了。\n當然，這些湯裡都放了巴豆。\n管家滿臉堆著笑對簷下那守衛道：「天氣嚴寒，夫人體諒各位軍爺，讓廚房給軍爺們熬了些銀耳蓮子羹。」\n那守衛眼角處一道淺疤，從鼻孔裡哼了一聲，一副高高在上的姿態，不過看得出來頗為受用。\n管家似乎早就習慣他的冷臉了，讓小廝先舀了一碗銀耳湯喝下了，示意那守衛湯沒事，守衛才道：「行了，把東西放這裡吧。」\n管家指著樊長玉手中的託盤道：「這是專程為裡邊那位大人燉的。」\n守衛瞧了一眼樊長玉，她半垂著腦袋，乍一眼瞧上去，還真是個溫柔小意的可人，守衛臉上的笑容更冷了些，「交與我便是。」\n管家諂媚道：「那位大人遠道而來，清平縣小地方，沒什麼好招待的，就讓這丫頭去吧。」\n非要樊長玉進去倒不是為了其他的，巴豆雖能讓人腹瀉，但也沒法在短時間放倒這一院子人，樊長玉進去送湯，能近距離接觸那個官兵頭子，要是能制住他，那接下來可就省事多了。\n那守衛臉上的冷嘲不減，約莫是想到了什麼，掃了樊長玉一眼，道：「我進去問問大人。」\n他叩門而入後，對著半撐著手肘在棋盤上獨自對弈的年輕男子道：「世子爺，這府上的人非要一美貌丫鬟進來給您送湯。」\n劫殺薊州府兵，假扮徵糧官兵把控了整個清平縣數日的，正是崇州反王長信王之子隨元青。\n長信王膝下兩子，長子自小體弱多病，世子之位便落到了么子頭上。\n早些年長信王韜光養晦，隨元青在外也只有一紈絝之名，直到長信王反了，他才開始在崇州戰場上嶄露頭角，手段之狠厲，甚至被稱為「小武安侯」。\n聽到部下的稟報，隨元青亦是冷嗤一聲，將手中的棋子丟回棋簍裡：「魏宣殘暴好色之名在外，沒理由他部下的人反是個潔身自好的，行了，讓人進來吧，小小一縣令，還能翻出點什麼花來？」\n守衛領命就要退下，卻聽得他問：「斥侯可有傳回消息，魏宣帶人來了沒？」\n守衛道：「還沒傳消息回來。」\n隨元青不自覺皺起了眉，以魏宣那草包的炮仗脾氣，得知清平縣沒徵糧上去，豈能不當場就帶兵殺過來？\n莫非是薊州有什麼變故？\n清平縣那群暴民都快抵達縣城了，魏宣這草包不來，他這戲臺子總不能白搭。\n他長指扣著桌面道：「先把從清平縣商賈百姓那裡搜刮來的錢糧運送出去，點一千人馬在城外坂坡等著，魏宣那草包不來，咱們就替他殺一殺暴民。」\n守衛不解：「那些暴民是要投靠咱們崇州，世子為何還要殺？」\n隨元青嗤道：「無須殺盡，做做樣子徹底寒了天下人對朝廷的心就好。不殺這群暴民，其中又有多少會發洩了這一時之怒，當真去崇州投軍的？把他們逼上絕路了，他們才會真正走這條反路。」\n那被故意放跑的書生，帶去薊州的消息是朝廷官兵強行徵糧不給百姓活路，百姓想去薊州府問個公道，卻叫官兵屠殺殆盡。\n屆時不管魏黨如何澄清，世人都只會傾向於相信書生的說辭，畢竟魏黨聲名狼藉也不是一日兩日了，而那書生字字泣血的控訴背後，是清平縣上萬條人命。\n有事實依託的東西，總是能讓人更共情也更容易相信些的。\n守衛忙道：「世子英名。」\n隨元青沒理會守衛拍的馬屁，問：「那個小崽子抓到沒？」\n守衛心中一緊，道：「半刻鐘前有人闖溢香樓打傷了咱們的人，似抱著一小兒逃了，屬下已調遣了人馬去追，想來很快就會有消息的。」\n隨元青只道：「莫傷著那孩子，畢竟是我大哥的骨血。」\n守衛多問了句：「那大牢裡的女人……」\n隨元青抬起一雙冷凝的眼：「我大哥的侍妾，怎麼處理，帶回去後我大哥自己決斷，先讓她在牢裡吃兩天苦頭，別讓人折辱便是。」\n守衛應是。\n等守衛退出去後，就有人捧著拖盤進來。\n聽到那輕盈卻極穩的腳步聲時，隨元青嘴角就冷冷往上揚了揚。\n抬起一雙眼朝那丫鬟看去時，雖然早有預期，這縣令想討好他，送來的人不會太差，可在這窮鄉僻壤瞧見這麼個標誌的美人，眼底還是划過一抹詫異。\n尤其是對方那雙眼睛，不是燦若星辰，也不是靈動如鹿，第一眼給人的印象竟然是好看又老實，讓人擔心帶她回府上當個丫鬟，都會被人排擠的那種老實。\n樊長玉可能是經常被謝徵用眼風掃久了，突然被一個陌生男子用那審視般的目光盯著，她竟沒覺著害怕，只把託盤穩穩地捧了過去。\n樊長玉把湯盅放桌上，一隻手去收託盤時，對方噙著薄笑說了句：「膽子倒是大。」\n樊長玉以為他是知道銀耳湯裡有巴豆了，手中出了些黏膩的冷汗，心道這人一看就跟言正是一類人，雖然長得沒言正好看，但也聰明不好糊弄。\n老話說先下手為強，她當即就掄起託盤，做勢要往他頭上扣，對方眼神陡然一冷，伸出長臂去截。\n樊長玉掄託盤卻是幌子，直接一腳踹在他腹間，隨元青面露驚愕，痛得當即弓起了身子，樊長玉另一隻手已用力往他脖頸後砍去。\n正常人被她砍這麼一手刀，早該暈過去了，隨元青卻還有力氣一把掀翻几案阻攔她，手捂著脖頸站起來時，腳下雖踉蹌卻極快地朝門口掠去。\n樊長玉沒想到這人脖子竟然這麼硬，門外的守衛聽到他掀桌子的動靜後，也立馬朝著房內趕來了：「將軍？」\n樊長玉早想過沒法近身擒住這傢伙的辦法，當即拿出自己一早就打好結套的細繩，朝著隨元青脖子就套去。\n冬衣厚實，這繩索她先前收在袖子裡輕易也瞧不出。\n門口的守衛破門而入時，就見樊長玉用一根繩索套住了他們世子的脖子，用力往後一拉，繩索瞬間收緊，隨元青一手橫在頸間緊握著那繩索同樊長玉較勁兒，臉上不知是缺氧還是惱怒，通紅一片。\n隨元青臂力驚人，按理說他用力一扯那繩索，對面那不知天高地厚的女子就該跟個破風箏一樣被他拽過來了，可對方只腳下踉蹌了一下，瞬間就穩住步子跟他較上勁兒了，拉扯的力道大如蠻牛。\n隨元青的脖子還是抵不過對方兩隻手使勁兒，被她拽死狗一樣拽過去一把拎起來用尖刀抵著脖子時，他俊臉上一半是因窒息造成的猙獰，一半是恨不能把身後的人千刀萬剮的惱恨。\n他狠佞道：「你最好別落在我手上，否則我一定把你剝了皮掛到城樓上曝屍！」\n樊長玉現在是借縣令的名義挾持的這傢伙，半點不怕事的用手上尖利的剔骨刀在他大腿上戳了個淺血洞：「那就看是你剝皮快，還是我扎刀子快。」\n樊長玉扎的那一刀雖不深，可到底還是入肉見血了的，隨元青愣是坑都沒坑一聲。\n門外的一眾守衛卻嚇壞了，一面是擔心他，一面則驚駭隨元青竟被一女子所擒。\n先前進屋來的那守衛是他親衛，名喚穆石，他當即就衝樊長玉喝道：「休要傷我將軍！」\n樊長玉說：「你們按我說的做，我便不傷他。」\n穆石等人看向隨元青，等他示意，隨元青咬牙切齒擠出一句：「按她說的做。」\n卻又用只有兩人才能聽到的嗓音威脅她：「老子記住你了。」\n他第一眼怎麼會覺得這女人老實！\n樊長玉心說這人怎麼只記她的仇，不把這仇往縣令頭上算？明明她現在也算是替縣令做事！\n樊長玉想了想，手中剔骨刀卻往他皮下壓了幾分，對著屋外的守衛道：「快放了我們縣令大人！」\n穆石朝著管家看去，那眼神像是恨不能直接撕了他。\n管家渾身抖得啊，就差兩眼一翻暈過去了。\n片刻後，被關押多日的縣令終於走出了房間，一到院子裡瞧見這情形，也差點沒當場厥過去。\n他寧願繼續在房裡被關一年也不要一出來就面對這樣的場面！\n隨元青嘴角噙著薄笑問：「我的人已放了縣令，你現在可以放了我了？」\n似乎怕樊長玉擔心他報復，他這會兒倒是成了個溫文爾雅的貴公子：「你放心，我便是要抓你，也會等你徹底逃出去後再抓你，不會現在動手。」\n恰在此時，一軍士從大門外急跑進來：「報——暴民聚集於縣城城門外，縣衙的囚犯全被放了出去，搶了徵集的軍糧運送去縣城門口，說要全數退給鬧事的暴民！」\n隨元青氣得臉都扭曲了，笑問樊長玉：「你們這制定計劃的人考慮倒是周全。」\n樊長玉沒理會他，縣衙那邊的事，八成是言正的手筆了。\n眼下自己手上這個人是個燙手山芋，真要了他的命，那自己可就是殺了個大官，這輩子怕是只能帶著長寧去山賊窩了。\n但若是放了這人，自己以後肯定沒好日子過。\n她看向縣令，「縣令大人，清平縣鄉下的百姓因徵軍糧反了，您總得給百姓們一個交代才能平息眾怒。」\n說著眼神就往被她挾持著的那人身上瞟。\n縣令聽說暴民逼到了縣城門口，當場臉都白了，暴民一旦進城，那非得殺幾個貪官不可，他這個清平縣縣令，必定是頭一個祭旗的。\n他死了，轉頭上邊要個交代，還會把屎盆子扣在他頭上，畢竟他政績確實平平，死人又是最好背鍋的。\n縣令看到樊長玉那個暗示的眼神，他雖說對上邊的人膽小如鼠，但能在官場上混，那也是個人精，瞬間就明白了樊長玉的意思。\n思考一番可行性後，瞬間心花怒放。\n是啊，他不敢拿這群人怎麼樣，暴民那邊又需要一個交代，何不順理成章地把這夥人推出去，讓他們給暴民交代？\n縣令腆著個懷胎八月一樣的肚子，臉上的肥肉顫了顫，沒看看隋元青：「徵糧是諸位將軍帶來的軍令，事到如今，那就勞煩諸位將軍去城門口向百姓們給個說法吧。」\n暴民們怎麼處置這些人，是暴民們的事。\n隨元青只冷笑一聲：「好啊，那就去城門處給個說法。」\n穆石接觸他的眼神，心中瞭然，面上的怒意也跟著收了收。\n他們在城門外的半坂坡上埋伏了一千人馬，屆時只要一鳴鏑箭，山上的人馬殺下來，屠了整個清平縣都不在話下！\n-\n清平縣郊外，一隊打著薊州旗號的兵馬浩浩蕩蕩從官道上蜿蜒走來，為首的老將正是賀敬元，他著一身重甲，身上那份儒雅便被壓了下去，面上更多的是威嚴。\n只是到底上了年紀，鬚髮花白，這些天又沒怎麼合眼，人瞧著精神頭不甚好。\n鄭文常駕馬落後他半步道：「也許是那書生誇大其詞罷了，小小一清平縣令，豈敢借著徵糧魚肉百姓？我帶兵過來替您看一趟就是了，您何至於親自跑這一趟？」\n賀敬元搖頭，目光蒼老而威嚴：「清平縣有鹽湖，在徵糧的檔口出了這事，其中緣由只怕不簡單。」\n他話音方落，前方便有一斥侯快馬揚鞭而來，「報——前方十裡坂坡處，發現一支潛伏於山林間的崇州軍！」\n聽得斥侯報信，饒是鄭文常，後背也激出一身冷汗來。：，，.`

            title: `第48章第48章`,
            content: `清平縣城郊的坂坡密林裡,數名斥侯踩過殘雪未消的枯草，奔向隱匿在松林間的軍隊。\n「將軍！有一隊朝廷官兵往清平縣方向來了！」\n留守此處待命的崇州小將聞聲大喜：「打的可是魏字旗？」\n斥侯答：「未見魏字旗，打的是薊州旗。」\n小將面上的神情一時有些捉摸不定,又問：「領兵者是何人？」\n「一老將和一年輕將領。」\n小將嘀咕：「難不成是魏宣和賀敬元一起來了？」\n底下的人問他：「將軍，那咱們還伏擊那些圍在清平縣外的反民嗎？」\n小將搖頭：「薊州府兵都來了，讓咱們的人帶領反民繼續鬧事就是，最好是殺進縣城去,這樣一來，不管薊州那邊來的是何人，這支軍隊都只能跟反民交手了。」\n造反的縣民一旦入城，城內百姓的傷亡越慘,能安到魏黨頭上的罪名就越多。\n他們世子原本的計劃就是扣下清平縣徵上的軍糧，以魏宣的脾性，必然暴跳如雷,親自帶軍隊過來徵糧,遇上憤怒正達頂點的造反縣民,兩個炮仗一對上，不愁打不起來。\n朝廷強行徵糧逼反一個縣,軍隊屠了手無寸鐵的縣民這一消息傳出去,必然會軒然大波。\n-\n城門口現下的情況實在是算不得樂觀。\n清平縣只是一小縣城,城防軍事壓根就沒被重視過,就連那夯土壘成的城牆都低矮得過分,除了個光禿禿的門樓，甕城、箭樓、馬面牆這些一概沒有。\n王捕頭事先得了消息,帶著手底下一班衙役關上了城門，又零星找了些弓箭架到城門上方的瞭口，但看上去還是稀拉得可憐,人頭甚至填不滿城牆。\n讓一群捕快來幹守城門的活兒，本身就夠離譜的了。\n也是清平縣並無屯兵，幾十年來除了盜匪，從沒經歷過戰火的緣故。\n被擋在城樓下方的那些農人，一眼瞧去烏麻麻一片，每個人手上都舉著鋤頭釘耙，臉上不復從前的憨厚，一個個兇神惡煞的，像是恨不能生啖了站在城樓上的這些捕快。\n莫說城樓上那些年輕捕快，便是王捕頭瞧著，心中都陣陣發怵，這聚集起來的數千農人，真要進城，這小小一門樓又擋得住什麼？\n眼下王捕頭只能寄望於薊州府那邊聽到了風聲，趕緊派軍隊過來。\n他記著樊長玉轉告的話，在瞭口看著底下的百姓們好言相勸：「鄉親們，你們這是幹什麼？莫要一時糊塗，犯下這等誅九族的大罪！」\n跟著走到這裡的農人大多還是怕城樓上那些弓箭，沒敢逼上前，雖說他們人多勢眾，可誰也不想當那最先去送死的。\n人人都知曉造反是個什麼罪名，自個兒心裡明白是一回事，聽旁人這樣勸誡又是一回事。\n他們中大多數都是一輩子守著田地過活的，連清平縣都沒出過，只知道天底下最大的是官是皇帝，而清平縣最大的官是縣令。\n得罪了縣令，會挨板子下大獄；得罪了皇帝，九族內的親眷全都得送上斷頭臺。\n平日裡就連見到這些捕快，心中都懼怕得緊，眼下一聽王捕頭這麼說，心中難免戚戚。\n帶頭的人見狀，眼神一厲，衝著城牆上的王捕頭罵道：「你們這些狗官耀武揚威的時候，我們這些莊稼漢就是被你們呼來喝去的賤民，大傢伙兒被逼得沒活路了，又是鄉親們了？呸！老子擔不起你這條縣令走狗的一聲鄉親！誅九族？咱們谷種都沒了，用不著皇帝來誅我們九族，我們就先餓死了！左右是一死，還不如進城搶了盤纏去投靠崇州反王，尚還有一條活路！」\n原本還有些動搖的農人一聽他這番話，眼神也紛紛堅定了起來，大喊：「官府不給俺們活路！俺們自個兒奔一條活路出來！」\n帶頭的人高舉手中農具：「讓狗縣令出來送死！」\n他身後的農人們也跟著大喊：「讓狗縣令出來受死！」\n王捕頭眼見局勢控制不住，忙道：「鄉親們稍安勿躁，這谷種……會還給大家的，大家都各自回家去，這造反一事，官府也不會再追究。」\n帶頭的人冷笑：「大伙兒瞧見了沒，咱們沒反的時候，這群狗官不把咱們的命當回事，打死了人也要搶谷種。咱們一反，他們就要把谷種還回來了！咱們這些年受的苦，遭的罪，只是因著咱們好欺負罷了！」\n這番話說得一眾農人心中更加憤憤。\n帶頭者趁勢道：「咱們不能退！咱們一退，就又輪到這群狗官耀武揚威了！這城裡的富戶們，哪個不是狗眼看人低的東西？往日咱們進城趕個集，那些人瞧見咱們就跟瞧見了髒東西一樣！殺進城去！屠狗官，搶金銀，把從前受的氣都找回來！」\n他給了身後幾個人一個眼神，那些人會意也跟著叫嚷起來：\n「就是！咱們又不是天生賤種，咱們只是比不得城裡這些人會投胎而已！」\n「鄉親們莫要被這縣令的走狗騙了去！他哄著咱們歸家去，那等著咱們的，就是跟馬家村一樣的下場！」\n「都到這步田地了，還退什麼退！老子就是死也要做個風流鬼！聽說城裡的女人身上嫩得能掐出水來！一身皮子白得跟麵團似的，沒討著婆娘的弟兄們，你們就不想噹噹那些員外千金的一夜新郎？」\n有馬家村的慘案在前，沒人敢退，進城又有這麼多誘.惑，身後那些農人眼都快激紅了，在泥地裡喘.著粗氣大喊：「殺進城去！」\n王捕頭也是來城門這邊時，才聽說了這些莊稼漢造反的緣由，一是縣衙那些去徵糧的官兵殘暴專橫，不把農人當人看，二則是馬家村的人要去薊州府把這事鬧大，竟在半道上叫人屠了全村人。\n他如今連捕頭的職務都沒有，說退還谷種給這些人時底氣尚不足，此刻見這群造反的農人面目猙獰跟野獸似的，只懇切勸道：「鄉親們吶，莫要糊塗莫要糊塗！清平縣才多大？你們在清平縣反了，當真有命逃得到崇州去？便是你們逃得了，你們的妻兒老母可逃得了？」\n叫嚷得最兇的，都是鄉下那些上無老下無小的。\n王捕頭這番話砸下來，鬧事的農人面上神色各異。\n一些純粹只是被逼得走投無路了，才想跟著過來鬧事的農人喝問：「你之前說把谷種還給我們的話，可算數？」\n王捕頭還當真不確定官府會不會退還谷種，遲疑了片刻，咬牙道：「自然算數！」\n在馬家村有親戚的人則恨聲道：「把殺了馬家村全村的狗官和官兵都交出來送死，不然這事還是沒完！」\n王捕頭忙道：「馬家村的慘案，官府一定會從嚴查辦，給鄉親們一個交代。」\n帶頭鬧事的人眼見造反的勢力被王捕頭幾句話分化開了，一伙人彼此對換了一個眼神。\n先前嚷得最兇的人繼續起鬨道：「從嚴查辦？怎麼查還不是你們這群狗官說了算！你們轉頭說是被山賊殺了，那時候咱們又能如何？」\n這還真不無可能，原本平息了下來的人群又開始鬧騰。\n「對！現在就把那些狗娘養的官兵交出來！」\n一群人說著就要向城門逼近。\n王捕頭喝道：「不可再上前！再上前者放箭了！」\n他身側的捕快們將弓弦拉滿了，架著箭的手卻微微發抖。\n底下的人群罵得更兇：「這王的是縣衙的捕頭，殺馬家村村民的指不定就是他手底下的人，他怎麼可能會把人交出來！」\n跟著造反的農人們被這些起鬨的聲音激得肝火更旺，看王捕頭的目光也更加仇視。\n王捕頭正焦頭爛額之際，身後傳來異響，那些新上任的衙役陰著臉上了城樓，一把揮開他們，陰著滿是橫肉的臉道：「一群被革職的東西也配穿這身衣裳！」\n王捕頭和底下一眾捕快面上青紅交加。\n底下一帶頭者瞧見新來的那些衙役後，眼底露出得逞的神色，大聲道：「這些狗官什麼時候把咱們的命當過人命了？放箭就放箭！射死了老子，鄉親們別忘了給老子報仇就是！」\n他吼出這一嗓子後就往前走，城樓上奪過了弓箭的「衙役」衝著底下人就是一波放箭。\n吼聲最大的那幾個半點沒被射著，反而是被激上前的普通農人叫一箭斃了命。\n死了人，城樓下的喧譁聲一時間更大。\n有認得的人大哭：「二蛋！」\n拱火的人繼續道：「大家瞧見了，這群官府的走狗從頭到尾就沒想過給咱們活路！殺進去跟他們拼了！」\n抱著被射死的農人大哭的漢子應當是一對兄弟，他當即就狠聲道：「老子跟你們這群狗官拼了！」\n被怒火燒得理智全無的農人們正要不管不顧去破開這城樓，忽而「咚」地一聲大響，城樓下方血沫飛濺。\n農人們看著摔死在城樓下的衙役，面面相覷，止住了往前的腳步，再次抬眼往城樓上看去。\n一帶著青鬼面具的男子立於城樓上，冷聲道：「何人放的箭，你們找何人算帳。」\n那面具之前在元日燈會上隨處可見，此時戴在他面上，卻有著一股說不出的森冷詭異。\n帶頭鬧事的人心中莫名慌亂，喝問：「你是何人？」\n謝徵答：「殺貪官之人。」\n城樓上的真假衙役們此刻也終於回過神來，王捕頭等人是完全弄不清此時的情況，假衙役們則是拔劍朝他砍來。\n謝徵甚至都沒還手，冷風灌滿他寬大的袖袍，立於城樓上衣袂飄飄，側身避開揮砍來的刀劍時，順便再揪住那些衙役的衣領往城樓下一扔，就又摔死一個。\n王捕頭呆愣之際，謝徵借著一揚手又扔下城樓一個假衙役的功夫，側首對他說了句：「縣令被看管了起來，這些都是假衙役，讓你的人儘管動手。」\n王捕頭回過神來，雖不知這戴青鬼面具的是何人，但聯想到縣衙這些日子的異常，瞬間也明白了大概了，忙吩咐自己手中那一班衙役：「拿下這些假冒的衙役！」\n不明就裡的捕快們眼瞧著他們頭兒都衝上去了，頓時也顧不得那麼多，提著刀就跟假衙役們對上了。\n底下的農人們仰著頭跟看大戲似的，一臉迷茫問：「那些官差怎麼自己人跟自己人打起來了？」\n邊上的農人答道：「好像是王捕頭手下的人在打那些放箭的捕快。」\n「縣令那一班子人雖不是什麼好東西，但王捕頭是個好的，從前俺家的牛跑到隔壁村去了，叫隔壁村那陳癩子佔了去，還是王捕頭替俺去要回來的。」\n挑事的人眼見局面失控，繼續煽風點火：「王捕頭還能大過縣令去不成？這群走狗為了自保連昔日同僚都下得去死手，咱們的命在他們眼裡更不值錢！要想報仇，還是得破開這城門去殺縣令！」\n很多農人顯然都在猶豫，不知道是要僅需進城，還是等官府拿出個交代來。\n須臾城樓上的假衙役們都叫謝徵帶人扔下了城樓，還沒殺過人的農人們瞧著橫在城門前的那一地死屍體，心中還是有些發怵。\n謝徵負手立於城樓上道：「願意拿了糧食回去的，今日之事就此揭過，官府不會再追究。冥頑不靈者，薊州大軍已在來清平縣的路上，你們今日破開這城門，手上沾染任何一條人命，就再無退路。下半輩子是想繼續種地跟妻小父母在一起，還是想拖著全家去死，看你們自己如何選擇。」\n一聽說薊州大軍來了，種了一輩子地的莊稼漢們心中還是怕得緊。\n恩威並施還是有效的，畢竟比起生活回歸原樣的安穩，進城搶掠一番後全家老小再被官兵處死，顯然是傻子都不願做的選擇。\n挑事的人出言刁難：「口說無憑，糧食呢？」\n王捕頭正想幫腔，忽聽得城樓裡邊傳來一聲：「糧食來了！」\n竟是溢香樓的夥計們抬著糧食上了城樓來。\n眼下的情況城門是萬萬不可開的，一部分糧食則用吊籃從城樓上放了下去。\n幾個農人上前解開麻袋查看後，咧嘴笑開，卻忍不住用袖子抹了一把眼：「糧食，當真是咱們的糧食！」\n一聽說糧食被送回來了，大部分跟著鬧事的農人一顆心都放回了肚子裡。\n王捕頭上前小聲對謝徵道：「這位壯士，多謝你解清平縣之難，可就這麼把徵上來的軍糧還與農人了，薊州的軍爺那邊……縣衙沒法交代啊！」\n謝徵道：「自有縣令去交代。」\n廢除徵糧的令早就跟著他命魏宣回徽州固守的軍令一起送到了薊州府，薊州那邊不可能再徵糧，但對完全不知情的一個捕快，他也無需解釋這麼多。\n王捕頭原本焦頭爛額的，一聽謝徵的話，倒是把心橫了一橫。\n的確，安撫這些造反的能人，擋住他們進縣城，就已盡他所能了。\n他這把老骨頭，能擔的責任也就這些，擔不起，自有縣令去擔。\n他道：「還是壯士急智，竟想到用薊州大軍嚇唬這些反民，總算是免了城內百姓遭災。」\n謝徵未語，他說薊州大軍前來還真不是嚇唬城樓下這些造反的農人的，清平縣出了這麼大的事，薊州府不可能一點風聲聽不到。\n來的只要不是魏宣，軍隊就不可能跟這些被牽著鼻子走的農人打起來。\n挑事者眼見跟著造反的農人被安撫了下去，一想到自己的高官厚祿要沒了，陰沉著臉繼續發難：「馬家村幾十口人命怎麼算？」\n王捕頭求助地看向謝徵。\n青鬼面具遮住了他整張臉，叫人瞧不見他面上是何神情，他只道：「拖延時間。」\n王捕頭不由有些傻眼，隨即也明白殺馬家村的慘案眼下還真沒法查出什麼來，也不能現場給這些人一個交代。\n只有等薊州的官兵到了穩住大局後再說。\n他擦了擦額角的汗，努力去同城樓下的刺頭兒和稀泥。\n謝徵的目光則是不動聲色落到了屢屢出言挑釁的那幾人身上。\n他們並非是要一個公道，只是想激起所有農人的仇恨，把事情鬧得越大越好。\n但事情鬧大了，他們能有什麼好處？\n真正的面朝黃土背朝天的農人們不善言辭，被這群人用仇恨牽著鼻子走，煽風點火驅使這些莊稼漢做了惡，莊稼漢們是跑不掉的，他們敢這般有恃無恐，背後的靠山就有些令人玩味了。\n那些挑事者揪著官府沒法現場給出馬家村慘案一個交代，繼續鬧事，重新挑起了農人和官府的仇恨時，謝徵正打算暗中解決了那幾個挑事的，城樓上忽而傳來一聲：「縣令到——」\n城樓下的人紛紛禁了聲，一臉仇視看向城樓。\n謝徵眸子也一眯，以為是幕後的人逼縣令出來露面了，轉頭一瞥，卻見腆著富貴肚的縣令神氣走在前邊，一眾家僕壓著被綁的官兵跟在他身後。\n樊長玉穿著身不太合適的丫鬟衣裳，手上也押著個人，用剔骨刀抵在那人脖子處，因袖子短了一截，半個霜白的手腕都露在外邊。\n被她押著的人脖子上已經劃了好幾道淺血痕，顯然是一路上不太老實。\n謝徵視線落到那人臉上，先是一愣，隨即青鬼面具下的臉色變得要多精彩有多精彩。`
        },

            num: 49,
            title: `第49章第49章`,
            content: `樊長玉所有注意力都集中到了手上押著的這人身上,這人太狡猾了，來的路上就故意同她說話，試圖分散她注意力,有一次險些出腳絆倒她,奪了她手上的刀。\n後邊樊長玉就警惕起來了,這人說話她一概不理，惹急了她，她就在他身上開個小口子以示警戒。\n此刻都到城樓了,樊長玉只顧上匆匆掃了一眼當下的局面，一時間門也沒認出逮著青鬼面具的就是謝徵。\n王捕頭瞧見她們串粽子似的綁了一堆人，整個人都有些發懵，問縣令：「大人,這是……」\n縣令瞧見底下仇視他的那些反民，心中雖有些害怕,但想到這清平縣能守得住了,讓百姓洩恨的人也有了,到時候自己在薊州府那邊，拿平息了清平縣暴.亂攬功,升遷指不定都有望了，身上的肥肉頓時也不顫了。\n他拿出官場上那高深莫測的一套：「薊州府來的將軍們負責督辦的徵糧一事，如今百姓怨聲載道，總得給百姓們一個交代,本官這才以下犯上……命人綁了這些軍爺。」\n他說著這話時，還掃了樊長玉一眼，確定樊長玉不會主動說出去他才是被囚的那個，臉上的神氣更足了些。\n縣令府上的家丁們神色各異，不過他們已經給縣令當狗腿子當慣了,縣令把白的說成黑的，他們也會閉著眼睛認，哪會在此時拆臺。\n樊長玉臉上當真是一點異色都沒有，叫縣令的人瞧見了，只覺著她是個不爭不搶格外識時務的老實孩子。\n像王捕頭那般壓根不明就裡的，就全然把樊長玉當成了個背景板，所有注意力都落到了縣令身上，心中雖還有幾分遲疑，但事實擺在眼前，縣令能豁出去綁了這些軍士，還是有幾分魄力的，他贊道：「大人高義。」\n縣令心說這城門的王捕頭帶人守的，將軍頭子也是他的人擒的，等這事平息下去，薊州府那邊論功行賞，王捕頭得論首功才是，自己要想貪了他的功勞，還是得先把人捧著些，當即也道：「暴民到現在還沒能入城，也多虧王捕頭你提前帶人守在了這裡，本官為了讓薊州府來的這群官兵放鬆警惕，這才假意免了王捕頭你的職，王捕頭果然沒負本官所望。」\n王捕頭心中心虛不已，忙道：「王傳憲慚愧……」\n他正要說是樊長玉的主意，一抬頭卻見樊長玉正使勁兒向他擠眼睛。\n樊長玉巴不得縣令把所有功勞攬過去呢。\n她又不傻，自己綁的這頭頭是薊州府當官的，他要是死了，他上邊那個叫啥魏宣的狗屁將軍聽說了自己的名字，肯定會記恨自己。\n她一小民女，被推到風口浪尖上，頂多被賞賜些金銀財寶，成了整個清平縣的大名人，但代價是被一個比縣令還大的官記恨上，對方一根手指就能碾死她，得到的賞賜有沒有命花還得另說呢！\n再者，萬一手上這傢伙被推出去供百姓洩恨沒死成，肯定得記恨她。雖然她之前就已經不太厚道地暗示自己是為縣令做事的，可縣令那副怕事慫樣，怎麼看也不像是有城府謀劃這一切的人。\n現在縣令為了貪功，可算是說得有鼻子有眼了，成功拉走了仇恨，她心裡正樂著呢。\n王捕頭則是困惑不已，見樊長玉示意他不要說，後半句話就這麼卡在了喉嚨裡。恰好此時城樓下方的百姓們見縣令一來，又開始擺那副官架子，心中不快者數不勝數，當即叫罵上了：「狗官！馬家村那十幾條人命怎麼賠？拿你全家老小性命作賠嗎？」\n縣令這輩子還沒聽過此等粗鄙之語，他這會兒心裡想的已全是升官後如何平步青雲，驟然聽到叫罵聲，氣得嘴角的鬍子都在抖：「大膽刁民！竟敢咒罵朝廷命官！」\n王捕頭和謝徵恩威並施好不容易才安撫下來的民心，因為縣令這一句話，又炸開了鍋。\n人群中的挑事者趁機煽風點火：「大傢伙兒都瞧見了，這狗官壓根還是沒把咱們當人看，也沒想給咱們一個交代！」\n「咱們真要就這麼被他們哄騙了回去，改明兒上門來的就是衙門那群拿著棍棒要活活打死人的衙役走狗了！」\n「殺縣令，討公道！」\n城樓下的農人怒氣再次湧了上來，舉著手中農具大喊，縣城門這小小的門樓在聲浪裡，像是海上一葉扁舟，一個浪頭撲過來，就能散成一堆碎木。\n縣令瞧見這勢頭，不免也慌了，忙讓府上的家丁們把隨元青一行人押上前：「我就一小小縣令，哪裡做得了徵糧的主，徵糧事宜，全是薊州府來的人一手督辦的，馬家村的事，本官也毫不知情，大家要討公道，本官也只能冒天下之大不韙，綁了他們還爾等一個公道！」\n他說著就吩咐底下人：「開城門，把這些人送出去！」\n謝徵視線一直不動聲色絞著隨元青，瞧見隨元青聽到這話嘴角冷冷挑起，底下混在農人們中間門的那些挑事者，好幾個也頻頻都在往隨元青這邊看，他冷漠出聲：「不能放此人出城。」\n王捕頭也忙道，「大人，開不得城門！開了城門，外邊那些造反的人一窩蜂湧進來，城內百姓可就得遭殃了。」\n樊長玉聽到謝徵的聲音，才反應過來戴面具的是他，不免詫異抬眼朝他看去。\n隋元青聽到他的聲線，也皺了皺眉，打量起站在不遠處的男人。\n縣令和王捕頭還在爭執，忽聽得「嗖」地幾聲破空響之響，人群中幾支袖箭朝著城樓上射來，直指縣令和樊長玉。\n隨著袖箭一起飛來的，是城樓下方甩出鷹爪鉤抓上了夯土城牆垛口，踩著人頭攀著繩索飛快掠上城樓來的一群莊稼漢打扮的死士。\n王捕頭大驚，拔刀喝道：「保護大人！」\n樊長玉瞧見那隻朝著自己面門飛來的袖箭，下意識偏頭避開，被她押著的人卻突然主動迎上了她手上那把剔骨刀，避開了脖子這要害處，肩膀重重在刀刃上拉出一道血痕，捆住他的繩索也被割斷。\n樊長玉反應過來的時候，就瞧見肩膀又添了一道血口子，正不斷往外冒血的人衝她露出了一個狠佞乖戾的笑容。\n她心道不妙，條件反射性地往後一躍，然而隨元青速度比她更快，他掙脫了繩索，直接抽出邊上一名衙役的佩刀就向樊長玉劈來。\n疆場上用人頭練出來的殺人功夫，狠辣且速度極快。\n樊長玉手上的剔骨刀太短，跟他手上的長刀對上不佔優勢，用剔骨刀去擋時，虎口直接被那強悍的力道震得發麻。\n謝徵一把截住射向樊長玉的袖箭後，眼見隨元青脫困反殺向樊長玉，他眼神一變，正欲過去相援，靠著鷹爪鉤飛攀上城樓的死士似乎看出了他的意圖，一邊繼續對著樊長玉放暗箭，一邊分出人手來拖住他。\n謝徵替樊長玉擋著暗箭又要應付這群狗皮膏藥一樣的人，一時間門也分身乏術。\n衙役們壓根不是這群死士的對手，王捕頭的人一個連著一個的倒下，那些押著守衛的縣令家丁哪裡見過這架勢，幾乎被嚇得魂飛魄散，只顧往城樓下方跑，別說幫忙，自個兒都空門大露直接叫人一刀砍倒在地。\n城樓上竟一時叫隨元青的人戰了上風。\n樊長玉被隨元青凌厲的刀法逼得練練後退，礙於武器短人一大截，她不好洩力，虎口都叫兩兵相接的力道震出了裂痕，溢出了血珠子。\n她因吃痛而咬緊了牙，心知自己在縣令家中能順利綁了他，還得歸功於那會兒他毫無防備，叫自己佔盡了先機。\n此番交手，對方招招直逼要害，狠辣至極，她雖會武，實戰經驗卻沒多少，又沒對方玩得陰，加上武器不如人，樊長玉幾乎被壓製得死死的。\n她也想撿把長刀，奈何隨元青刀風逼得太緊，讓她壓根沒法分神去撿刀，只能用手上那把剔骨刀勉強應付著。\n好不容易逮著一機會，樊長玉把剔骨刀當暗器擲過去，隨元青不得已偏頭去躲，樊長玉趕緊矮身去撿地上一名死去衙役的佩刀。\n隨元青手上的刀卻跟長了眼睛似的，下一秒就貼著她手指削過，樊長玉為了保住一雙手，只得放棄了撿刀，就勢往地上一滾才避開他向著自己頭頂削去的第二刀。\n隨元青嘴角高高揚起，眼中是貓逗老鼠一般的興味：「你在我身上扎了多少刀，總得讓我扎回來了，再把你剝皮掛到城門口去才公平不是。」\n樊長玉狠狠呸了一聲：「姑奶奶今日出門沒帶殺豬刀而已，不然非得讓你見識見識過年豬是怎麼放血的！」\n聽出她是在罵自己，隨元青臉色更難看了些，原本那幾分貓逗老鼠的興味也瞬間門沒了，提刀逼近：「找死！」\n樊長玉也莽，學著他之前的樣子，不躲反而向著刀鋒迎了上去。\n謝徵在遠處瞧見這一幕，鳳目一寒，反手奪過一名死士的刀狠擲向隨元青。\n那名死士慘叫一聲，竟是手骨在奪刀時叫謝徵生生折斷了。\n寒刃逼近，隨元青瞳孔一縮，為了自保，不得已改勢擋下這擲來的一刀。\n兩刀相撞發出刺耳的一聲金屬脆響，隨元青手中的環首刀直接斷為兩截。\n此等強悍的力道，讓他不由詫異抬眼朝那戴青鬼面具的男人看去。\n方才他聽此人說話便覺著聲音似在那離聽過，他在戰場上又只同一人交手時領教過這樣的手勁兒，此人莫非是……\n他腦中剛想到那人，分神之際下顎就被一手肘狠狠擊中，讓他整個人都仰摔出去，好半晌整個下顎都沒知覺，兩排牙齒似被磕得鬆動了一般，嘴裡瀰漫著一股血腥味，大抵是震到了顴骨，耳中也嗡嗡的，一時間門竟聽不清周圍的聲音。\n他突然間門沒那麼確定那面具人就是武安侯了，這清平縣裡一名不轉經的小女子都有如此神力，指不定還有其他臥虎藏龍者……\n樊長玉記仇著呢，自個兒方才被這人欺負沒個趁手武器，用一柄大刀逼得她拿著把匕首長短的剔骨刀招架得毫無還手之力，給了他下顎一手肘後，她當即撿起落在地上的一把環首刀，再次朝他砍了過去。\n隨元青手上只剩一把斷刀，眼神一恨，最終還是選擇了避其鋒芒。\n這次輪到樊長玉不歇氣地揮刀，隨元青一路躲一路退，兩側的城牆上，全留下了一指深的刀印。\n穆石和幾個死士轉頭瞧見他們世子被人追著砍，忙抽身過來幫忙。\n遠處的官道上忽而傳來凌亂的馬蹄聲，抬眼望去薊州旗在冷風中獵獵作響。\n圍在城門口下方的百姓們瞧見城樓上打成一片的時候，就已分不清情況了，而且那些穿著短褐的莊稼漢，各個武藝高強，他們一個也不認識，眼見情況混亂成這樣，沒了那幾個帶頭挑事的，餘下的人更加不敢輕舉妄動。\n此刻再瞧見薊州府的軍隊，別說發生碰撞，他們甚至擔心軍隊誤以為他們跟城樓上那些武功高強的莊稼漢是一夥的，主動讓出了一條路來。\n穆石趁幾死士圍住樊長玉，扶起隨元青，看了一眼前來的薊州府兵，勸道：「世子，留得青山在，不怕沒柴燒，咱們先撤！」\n隨元青死死盯著樊長玉，眼見那十幾個死士拖不住青鬼面具的男人了，忽而抽出穆石的佩刀朝著縣令殺去。\n縣令嚇得呱唧亂叫，身上被砍了數道口子的王捕頭見狀忙撲過去救縣令。\n樊長玉哪能看著王捕頭橫死在自己跟前，言正又被大片大片的死士纏得脫不了身，她輪著大刀就要去擋隨元青砍下的那一刀。\n怎料隨元青卻是虛晃一招，直接棄了刀，手像藤蔓一樣纏上了樊長玉握刀的手，不知怎麼使的巧勁兒，樊長玉只覺整條手臂瞬間門像是喪失了知覺一般，手中大刀也「哐當」落地。\n「我改變主意了，你這身皮子剝掉掛城牆上怪可惜的，你隨我回去給我當個侍妾吧。」\n隨元青一手拽著固定了鷹爪鉤的繩索，一手緊拽著樊長玉，整個人大笑著從塌了一角的女牆往下一躍。\n樊長玉被他扯得一個趔趄，不及穩定重心就跟著墜了下去，她下意識喚了聲：「言正！」\n千鈞一髮之際，城樓上伸出另一隻筋骨分明的大手死死抓住了樊長玉胳膊。\n哪怕帶著面具，謝徵周身的氣息在這一刻也冷戾得嚇人，他手上的長柄刀徑直向著隨元青抓著樊長玉的那隻手砍去，力道之狠佞，讓人毫不懷疑，下一秒那條胳膊就能被生生削斷。\n隨元青只得咬牙鬆開抓著樊長玉的那隻手，凌厲的刀風卻還是削斷了他鬢角一縷碎發，臉上也浮現一條淺薄的血口子。\n隨元青抬起眼，對上青鬼面具下那兇戾的眼神，心中暗自一驚。\n樊長玉另一隻手被謝徵拽著了，有著力點了，毫不猶豫抬腳就往隨元青臉上踹，嘴上還指使著謝徵：「快快！砍斷繩索，摔死這癟犢子！」\n連著城牆垛口的鷹爪鉤應聲而斷，但隨元青墜下時在城牆壁上踏了幾腳做緩衝，又有一眾親衛拽著繩索去拉他，他落地時毫髮無傷，只有半張俊臉上多了道黑乎乎的腳印。\n樊長玉瞧見了不免大失所望，被謝徵拎上去時，還在怨念加持：「怎麼就沒摔死那傢伙……」\n下一瞬，整個人卻被裹進一個寬厚而堅實的胸膛，力道大得讓她只覺自己像是被一塊鐵板給鉗住了，碎碎念不由戛然而止。`
        },

            title: `第50章第50章`,
            content: `城樓下方傳來異動,遠處的馬蹄聲也逼近，北風呼啦啦卷著城樓上殘存的旌旗。\n這個擁抱很短，仿佛謝徵一把將她扯進懷裡只是為了順勢洩掉拽她起來的力道。\n樊長玉尚未回過神來,謝徵便已鬆開她,聲線極冷地留下一句：「待在城樓上，別下去。」\n他這般交代完，自己卻提著長柄刀，抓住一根繫著鷹爪鉤的繩索,如蒼鷹低掠一般滑下了城樓。\n樊長玉爬起來兩手撐到女牆旁往下看,只瞧見他提著刀直追隨元青而去。\n造反的農人裡有不少都是隨元青布下的暗哨,這些人穿著和普通農人一樣的服飾,在人群裡亂躥製造混亂,數千人亂糟糟站在一起,因不斷躥走的人擠得水洩不通,謝徵前進受阻。\n樊長玉站在城樓上，對隨元青的動向看得分明，她指著一個方向衝謝徵大喊：「那癟犢子往西南方向跑了！」\n謝徵聽到了樊長玉的示意,直接踩著擠做一團的農人肩頭躍起，往西南方向去追隨元青。\n隱匿在農人中的死士見狀則一窩蜂撲過來攔截謝徵，謝徵一刀逼退幾個死士，一些死士仗著他們穿著和莊稼漢一樣的補丁短褐，假裝自己是農人,大喊：「這戴青鬼面具的殺人了！」\n「老子又不是剛剛打上城樓的那些人！憑什麼衝著老子揮刀！」\n有不明就裡的農人見謝徵跟穿著短褐的人動手，以為他是在殺普通百姓，激憤之下也操起傢伙衝過去圍堵謝徵。\n謝徵對著一群死士出招尚可凌厲，面對一群被騙上前的農人，就只能收著打,一時間被拖住不能抽身，生生讓隨元青被他的親隨們護送著到了人群的邊緣。\n二人隔著人群遙相對望，隨元青望著謝徵露出一個挑釁的笑。\n青鬼面具下，謝徵眸色冰寒。\n樊長玉在城樓上前瞧見隨元青用這等無賴手法脫身，也氣得往女牆上招呼了一拳。\n本就殘破不堪的女牆，因著她那一拳，又坍塌了一小塊。\n樊長玉愣住，看看正刷刷往下掉泥渣的牆壁，又看看自己的手，瞥了一眼正目瞪口呆望著自己的王捕頭和縣令，果斷後退了好幾步，離那堵牆遠遠的。\n可千萬不能攤上賠償的事！\n-\n賀敬元已率大軍堵住了清平縣城門外唯一的官道，瞧見圍在城外的縣民亂做一團，一時間也不知這是何情況。\n眼見有著薊州兵服的兵卒混在人群裡，他蒼老的眼皮往下耷了耷：「薊州府兵怎會在此地？」\n他吩咐一旁的親衛：「打旗語讓混在人群裡的薊州府兵前來。」\n戰場上廝殺聲震天，憑喊是聽不見的，攻守進退全看旗語。\n得了賀敬元命令的親衛忙取來兩面小旗，對著已到了人群外圍的薊州府兵打旗語，對方瞧見了他們，卻並未前來，反而十分迅速地往相反的方向跑了。\n親衛抬眼看賀敬元：「將軍，您看這……」\n賀敬元沉聲道：「非我薊州府兵卒，指不定和文常去圍剿的那支無番號的軍隊是一夥的，拿下！」\n一小將忙領了幾十號人馬去追逃跑的隨元青一行人。\n混在人群裡的死士則一邊裹挾著農人去阻擋追擊的將士，一邊大喊：「官兵殺人啦！」\n「官府就是沒把咱們百姓的命當回事！」\n「這無道朝廷，反了就反了！」\n有死士趁亂捅死了幾名追著隨元青的將士，餘下將士以為同伴是造反的百姓殺的，盛怒之下，毫不猶豫地也向著不斷擋路的百姓揮刀。\n百姓們一看官兵開始無差別殺人，有人自危往人群裡邊縮，也有怒氣上頭直接舉著鋤頭釘耙去同官兵搏命的。\n賀敬元看著亂起來的兩撥人眉頭皺得死緊。\n他麾下另一名將領也看得咬牙切齒，出列道：「大人，我領一千兵馬前去鎮壓暴民，支援胡校尉！」\n賀敬元沉吟之際，忽見人群中殺出一黑衣男子，對方持一柄偃刀，身姿頎長，臉罩青鬼面具，以粗葛嗓音同他道：「著薊州軍服潛逃者乃長信王次子隨元青，他的人假扮反民混在人群裡挑撥是非。」\n賀敬元暗道難怪，端詳著眼前的年輕人，忍不住問了句：「不知壯士是何許人也？」\n謝徵冷聲道：「一介草莽，不配在大人面前提名。」\n他這般說著，目光卻已掃向方才那說話的小將，「借弓馬一用。」\n小將只覺自己領口一重，整個人便被拽下馬去，踉蹌好幾步穩住身形時，抬眼就見那男子已縱馬而去。\n小將心有不服，喝罵道：「好大的膽子……」\n視線觸及賀敬元，不由禁了聲，頭也羞愧垂了下去。\n對方在五步之內奪他馬匹，他卻連還手之力都沒有，顯然是他技不如人。\n賀敬元並未說什麼指責的話，神色複雜盯著遠去的謝徵看了一會兒，才吩咐底下將士：「吹角列陣。」\n反民亂成一團，唯有先鎮住他們，才能儘可能地減少傷亡。\n嗚嗚的牛角聲吹響，帶盾的兵卒列陣於最前方，以手中佩刀敲擊厚盾，同時數千將士齊聲發出「呼喝」聲，聲音似要掀翻雲層，那場面還是頗有氣勢，成功鎮住了在場所有反民。\n農人們拿著農具對準了這些持刀盾的將士，神情卻是驚惶的，不自主地在往後縮。\n賀敬元出聲道：「我乃冀州牧賀敬元，爾等皆是我轄區內百姓，因何造反？」\n百姓們一聽是帶領軍隊的是他，雖還舉著農具，卻響起了一片極低的議論聲，神情也不復尖銳，甚至有人低聲啜泣起來。\n片刻後有人放下農具跪在了地上，悽苦道：「賀大人，您要為咱們做主啊！」\n最前邊那一撮人跪下後，陸陸續續地，後邊那些人也放下農具跪了下去，哭聲一片：「咱們也是被逼得沒法子了！」\n縱然還有不甘心的，也明白大勢已去，他們這些只知道揮鋤頭的農人，跟訓練有素的軍隊對上討不著好，造反是要誅九族的大罪，不如此刻乖順認錯，求得一份憐憫後，法不責眾揭過這事。\n一時間，整個城樓下方，全是百姓的哭聲，有真情實意訴苦的，也有怕受罰裝腔作勢的。\n但不論如何，這場暴.亂是平息下來了。\n縣令癱坐在城樓上，大口大口地喘氣，想到自己也差點命喪刀口，滿臉的肥肉這會兒還在打顫，他對王捕頭道：「王捕頭，你救了本官一命，本官回頭一定重賞你。」王捕頭自己身上挨了不知多少刀，拖著一身鮮血撥開一名死去的死士，用袖子擦乾淨一名年輕捕頭臉上的血跡，紅著眼咧了咧嘴說：「都是職責所在，大人要賞，就給這些孩子家中多些撫恤銀錢吧。」\n他看著死去的年輕捕快：「這是小五，衙門裡年紀最小的捕快，最是孝順，家中有個瞎眼的八十老嬤，他每月發了餉錢，都會去肉鋪裡買一塊肉回去煮肉糊糊給老嬤吃。邊上那個是李大，他媳婦還懷著身子呢，再過兩月就要生了，家裡的頂梁柱沒了，那一家老小還不知怎麼辦……」\n說到後面王捕頭嗓子裡像是卡了棉花一樣，一個字都吐不出來了，只用糊滿鮮血的手蓋住了自己一雙眼。\n樊長玉看著死去的那些捕快，唇抿得死緊。\n她往城樓下方看去，卻瞧不見謝徵和隨元青那一行人的身影了。\n-\n隨元青和幾個親衛在賀敬元派人追來時，就已朝著之前計劃好的方向逃跑。\n死士在後邊拖著那些追來的官兵，穆石一邊護著隨元青跑，一邊朝天放了一支鳴鏑箭，然而他們埋伏在坂坡的那一千人馬遲遲不見前來支援。\n穆石眼見追兵越來越多，他們的死士已死傷大半，無力拖住那些官兵，正要放第二支鳴鏑箭，隨元青卻道：「不必放了。」\n他冷冷勾著唇角，強壓著那份怒氣：「領兵前來的是賀敬元，不是魏宣，畢竟是大胤名將，想來我們埋伏在坂坡的那一千人馬已叫他發現了。」\n穆石意識到眼下的情況，心中一沉，道：「卑職一定會拼死護著世子回崇州。」\n隨元青只無所謂地笑了笑，甚至放慢了奔跑的速度，身後的騎兵追上來，一邊放箭射他們，一邊催馬逼近。\n隨元青躲過箭鏃時候，順手截下一支箭，在戰馬從跟前奔過時，他一把拽住馬韁，翻身上馬。\n馬背上的騎兵大驚，忙反手揮刀看他，被他後一仰躲過，手中的箭鏃直接扎向了騎兵脖頸。\n騎兵當場斃命，他將死去的騎兵一把扔了下去。\n穆石也已奪下了另一名騎兵的戰馬，駕馬追了上來，隨元青痞子氣地揚唇一笑：「想回崇州，四條腿還是比兩條腿跑得快些。」\n他們奪了戰馬，已全然不把身後那些薊州官兵放在眼裡。\n「嗖！」\n一支白羽箭攜著破空的風聲幾乎是貼著隨元青耳際射過，狠狠扎進前方幾丈開外的凍土裡，箭尾的白羽輕顫。\n所有人具是一驚，那一箭若是瞄準了隨元青射的，只怕得箭頭從後背進，箭尾從前胸出。\n隨元青看著落在不遠處的那支箭，不由也收起了面上的輕狂神色，回頭打量射箭之人。\n官道已被踩踏得一片泥濘，兩側山林間樹梢上尚有薄雪未化盡，那戴青鬼面具之人立在官道盡頭，長柄偃刀隨意扎在地上，手挽一張大弓。\n他弓弦上已搭了箭，卻並未刻意瞄準，面具下的那雙眼，涼薄又散漫。\n只一個照面，隨元青臉色便已難看至極。\n他大喝一聲：「分頭跑！」\n奪了戰馬的親隨們雖不明白為何，卻還是瞬間分散跑開。\n謝徵嘴角冷冷往上提了提，手中弓弦一松，箭鏃飛馳而出的瞬間，他弓弦上已搭了第二支箭。\n他動作奇快，一時間箭出如流星驟雨，頃刻間便已射出十幾支箭，隨元青的親衛盡數落馬。\n隨元青看著左右親衛中箭從馬背上滾落，已無暇顧及身後放箭之人，只咬牙狠夾馬腹往前跑，身形儘可能低地貼在馬背之上。\n謝徵馬背上的箭筒已空，他策馬追來時，路過一倒伏在地上的騎兵，回手一探便取了對方箭囊，單手捻起箭尾，扔開箭囊。\n隨元青的親衛中只剩穆石還駕馬跟在他身後，穆石往後看了一眼，目眥欲裂，大喝：「世子小心！」\n隨元青聞聲往後掃了一眼，也是大驚，那戴青鬼面具之人，手中捻了近十支箭，搭在弓上呈扇形排開，松弦的瞬間，那一把箭如飛蝗向著隨元青撲來。\n隨元青此刻說是心驚肉跳也不為過，他此生還從未見過如此出彩的射藝，不知那青鬼面具之下是何人。\n他不得已在馬背上轉過身，提劍艱難格擋飛來的箭鏃，奈何戰馬馬腿被射中，哀鳴一聲撲到在地，隨元青整個人也摔出去，在地上滾了好幾圈才洩掉力道。\n馬蹄聲已逼近，幾丈之遙的距離，那青鬼面具人反倒不急著催馬上前了，反而收著韁繩，讓身下戰馬不急不緩上前，姿態閒散。\n隋元青臉色鐵青，這貓逗老鼠一般戲耍獵物的手法，不就是他先前在城樓上對那縣令府上的小丫鬟做的事麼？\n這青鬼面具人和那小丫鬟究竟是何關係？\n他抓著要小丫鬟要走時，那小丫鬟似乎也是在叫他的名字？\n穆石怕謝徵對隨元青不利，持長.槍縱馬衝過來大喝一聲：「休要傷我將軍！」\n謝徵反手抓住他刺來的槍柄，一擰後再壓勁兒往上一挑，穆石直接拽著槍把被甩下了馬去，掌心因為握槍把握得太緊，幾乎被扯下一層皮來，劇痛之下鬆了手。\n謝徵用穆石送到手邊的武器，穩坐於馬背上以銀槍抵住了隨元青咽喉，語氣裡帶著淡淡的嘲弄：「長信王世子，隨元青？」\n隨元青牙關都咬出了淡淡的血腥味，他額角青筋凸起，片刻後忍下這份羞辱，哈哈大笑起來，「是本世子不錯。」\n這官道下方便是滾滾怒江水，哪怕在嚴冬臘月也因水流湍急而未曾結冰。\n隨元青不動聲色瞥了一眼，整個人在謝徵槍尖下呈現出再放鬆不過的姿態來：「你又是何人，要取本世子性命，總不至於還不敢報個名號。」\n謝徵並不答話，若是軍中人抓住隨元青，可不會在此時取他性命，拿著他去崇州戰場上同長信王談條件，才是最划算的。\n隨元青故意這般問，是在套話。\n隨元青見他不上鉤，忽而痞笑著問了句：「城樓上那小丫鬟是你何人？她身上可真白，親上去的滋味也甜。」\n謝徵眸光驟寒，隨元青等的就是他大意的這瞬間，一把撥開抵在喉間的長.槍，朝著江水一個猛頭扎去。\n謝徵反應極快地朝著他橫掃一槍，挑到了他腰側，隨元青悶哼一聲，下一瞬整個人已沒入了滾滾江水中，只餘暈在江水上的一片血色。`

            title: `第51章第51章`,
            content: `幾個被搶了馬的薊州府兵追上來時,就見一戴青鬼面具的男子立於官道邊上，手負長.槍望著下方的滾滾江水。\n穆石墜馬時一條腿摔傷了，趴在道旁的碎石堆裡,望著江水聲淚俱下大喊：「世子！」\n薊州府兵不明白眼下是何情況，舉著手中兵刃，望著那青鬼面具男子仍有幾分忌憚,忽見對方轉過身來，淡淡瞥他們一眼後道：「賊子遁江而逃，他腰上有傷遊不遠，爾等可順著下遊去尋人。」\n他說完這句便翻身上馬,揚鞭而去，一眾府兵也不敢上前去攔。\n只有一名小卒眼尖認出了謝徵胯.下那匹戰馬,小聲道：「是徐校尉的馬。」\n徐校尉便是之前被謝徵搶了戰馬的那名小將。\n官兵們面面相覷,誰也不敢說什麼，片刻後,官兵頭子才下令綁了受傷的穆石,分出一部分人去下遊搜尋隨元青，一部分押著穆石回去復命。\n-\n清平縣城門處,造反的縣民得到控制。\n賀敬元率軍進城時，縣令往臉上糊了兩把血,哭天嗆地迎了上去：「賀大人,還好您來了，不然下官就是把這身屍骨填在城樓上了,也擋不住進城的反民……」\n賀敬元坐在馬背上,瞧見臉上身上全是血的縣令，原本對他印象算不得好，此時不免也緩和了臉色,道一句：「清平縣城內百姓能倖免於難，劉大人功不可沒。」\n劉縣令一聽，頓覺升遷有望了，愈發聲淚具下：「下官在清平縣任職三年，政績平平，臨調任之際，因軍中徵糧引得鄉鄰要反，心中實在是惶恐，只能趕在暴民進城前，帶著縣衙一班捕快堵了城門，又以下犯上綁了那些前來督辦徵糧的官兵平息眾怒，這才等到大人來援，還望大人勿怪。」\n賀敬元先前聽那青鬼面具人說了此番動亂是長信王世子帶人挑撥離間，此刻再聽劉縣令提到督辦徵糧的官兵，心知此事怕是另有隱情，看了劉縣令一眼，道：「徵糧官兵是怎麼回事，細說與我。」\n劉縣令便將幾日前徵糧官兵來縣裡，按一人一石的標準徵糧之事如實告知。\n賀敬元喝道：「糊塗！薊州府怎可能下令按一人一石徵糧？」\n劉縣令冷汗涔涔，「那夥官兵說是奉節度使魏大人的令，小人……小人哪敢阻攔，後來還被那夥官兵軟禁了起來……得知鄉下農人被逼反了，下官怕釀成大禍，這才讓底下人綁了那些官兵。」\n劉縣令怕自己的功勞沒了，絕口不提王捕頭和樊長玉，只籠統說了個大概經過。\n賀敬元面沉不語，讓劉縣令一顆心不由又提了起來。\n賀敬元通過縣令這番話，已將事情猜了個七七八八，長信王世子帶人截殺了前來清平縣徵糧的官兵，假冒府兵帶來一張假的徵糧令，截殺馬家村村民只怕也是他們計劃的一環，目的就是為了煽動逼反清平縣民。\n只是這清平縣縣令到現在都還不知那夥官兵的真實身份，那面具男子又是如何認出隨元青的？\n莫非那面具男子原本就認識隨元青？\n賀敬元想到自己之前的猜測，眸光愈發複雜了些。\n他問縣令：「我觀之前城樓上有一覆青鬼面具的黑衣男子，殺敵甚勇，你可知那是何人？」劉縣令等了半天只等來這樣一句問話，心中惶惶，搖頭道：「這……下官也不知，許是城內義士吧。」\n正在此時，追殺隨元青一行人的官兵們也回城來了。\n官兵頭子一進城門，便下了馬，對著賀敬元抱拳道：「大人，賊子頭目遁江逃了，末將已派人沿著下遊繼續搜尋，先綁了這活口回來向大人復命。」\n賀敬元掃了一眼被五花大綁的穆石，問：「可瞧見一戴青鬼面具的男子？」\n小頭目抱拳垂首道：「這人便是那位壯士拿下的，我等趕去時，他告知賊子頭目遁江後，便往下遊去了，看樣子也是在找賊子頭目。」\n被搶了馬的小將忍不住嘟嚷：「那老子的馬呢？」\n賀敬元一個眼神掃過來，他趕緊閉嘴了。\n賀敬元看向穆石，道：「先把人收押起來，嚴加看管，萬不可叫他自我了斷。」\n小頭目應是。\n賀敬元又點了方才說話的那小將：「徐校尉，你帶一隊人馬，也去沿江搜尋賊子，儘可能將其生擒。」\n那小將趕緊正了神色，抱拳道：「末將領命！」\n-\n樊長玉送王捕頭去大夫那裡後，眼瞧著天都快黑了還不見謝徵回來，她心中不由也有些擔憂，同王捕頭知會一聲後，就要出城去尋謝徵。\n這會兒城門口已換成了薊州府來的官兵看守，那些官兵披甲執銳，瞧著甚是威嚴，普通百姓都避得遠遠的。\n怕城內還窩藏有賊子同夥，進出城門都變得極為嚴苛，一些原本經常來做買賣的鄉下人都暫時被看押了起來。\n樊長玉稍作猶豫，還是準備上前去說明情況，順便問他們追敵時有沒有瞧見言正，畢竟言正臉上帶著青鬼面具，辨識度應該挺高的。\n她剛要上前，城門外傳來不緊不慢的馬蹄聲，守在城門處的官兵探頭一瞧，見是一匹棗紅馬獨自回來了。\n樊長玉則被斜刺裡突然伸出的一隻大手扼住手腕，帶得後退好幾步。\n圍上前去的官兵看了看城外，不見騎馬之人，甚是奇怪地道：「徐校尉的馬自己回來了？」\n數步之外，樊長玉見摘去了青鬼面具的人一身墨袍出現在自己跟前，大驚過後便是大喜，被他帶著走了一路都忘了他還牽著自己手這回事，只顧念叨：「你怎去了那般久？那些官兵都抓到人回來了，我還以為你出了什麼意外……」\n謝徵聽著她碎碎念，握在她手腕上的力道未松分毫，只道：「去尋那賊子，追得遠了些。」\n樊長玉一下子就想到了他說的肯定是那個極為狡猾的官兵頭子，忙問：「追到了嗎？」\n謝徵搖頭。\n他沿江找了十幾裡，都未瞧見隨元青，對方穿著那一身盔甲遁江，腰上又被他挑傷，縱使水性再好，也兇多吉少。\n隨元青若真能逃出生天，只能說他命不該絕。\n樊長玉聽聞沒追到隨元青，也有些失望，隨即又道：「都說千年王八萬年鱉，那小王八要是沒死成，也算是應了這話。」\n謝徵聽樊長玉提起隨元青就沒一句好話，想到隨元青遁江前挑釁說的那話，眸色沉了沉，問：「你同他有仇？」\n樊長玉說：「本來是沒仇的，我聽你說縣令被控制住了，想去把縣令給拎出來，先恢復王叔捕頭一職，讓王叔辦事也方便些。哪曾想那小王八就住在縣令府上，我只能順勢逮那隻王八，這下就結仇了。」\n謝徵垂眸掩住眼底情緒：「他武藝不錯，你如何綁的他？」\n說起這個樊長玉不太好意思，覺著有點勝之不武，但她心眼實在是實誠，一五一十道：「人太多了我也怕打不過，本想用迷藥藥倒他們的，可縣令府上沒有，我就假扮成縣令府上的丫鬟，去給那小王八送參了巴豆的銀耳湯。」\n她還穿著那身丫鬟服飾，半截露在外邊的皓腕叫謝徵握著。\n謝徵垂眸看著她，想到她就是穿著這身衣裳去給隨元青送湯的，窩在她腕上的力道不自覺加大了幾分。\n手上傳來的痛意總算是讓樊長玉想起了自己手腕還被他握著這回事。\n她拍拍他手，嘶了一口氣：「你輕點，那癟犢子在城樓上欺負我沒個趁手武器，提著柄環首大刀跟我一把剔骨刀對砍，後面拉我墜城樓，也傷到了我這隻手腕，這會兒還怪疼的。」\n謝徵鬆了手，垂眸時瞧見她霜白的皓腕上有一圈淤青的指印，顯然不是他捏的，虎口也有裂痕，流出的血跡都已乾涸了。\n他眼底的戾氣一閃而過。\n樊長玉見他不語，察覺自己方才那話像是在訴苦一樣，怪矯情的，馬上又接了句：「不過我也算報仇了，我往他身上扎了好幾刀呢，那癟犢子跑路前，我還往他臉上踹了一腳！」\n謝徵聽她說著這些，還是一言不發，眸色冷且沉。\n樊長玉只覺他這一路話格外少，猜他興許是在懊惱沒抓到那癟犢子，還寬慰了他好幾句。\n回鎮上前，樊長玉先去給王捕頭報了個平安，免得王捕頭以為言正沒回來一直擔心。\n王捕頭得知他們要回鎮上，道：「天已經黑了，雪又下得大，今日出了這樣的事，道上少不得有盜匪趁火打劫，黑燈瞎火上路不安全，家中有空屋，你們先在這裡將就一晚，明日再回去不遲。」\n樊長玉想了想，她和言正都累了一天了，確實疲憊不堪，道謝後便應下了。\n俞寶兒見樊長玉來了，邁著小短腿跑出來問她：「長玉姑姑，我娘什麼時候來接我？」\n樊長玉這才想起俞淺淺的事，抬頭看向謝徵：「俞掌柜這會兒還在牢裡嗎？」\n謝徵抱臂倚著垂花門淡淡搖頭，散漫的目光落在俞寶兒身上，藏了幾絲複雜，片刻後移開視線道：「溢香樓的人命案子還沒結，不知官府那邊會作何處置，她既把這小崽子交與了你，案子未結之前，你先替她帶著便是。」\n樊長玉想著俞淺淺待自己不薄，幫她照料俞寶兒一陣也是應該的。\n她之前和俞淺淺一番合計，以為是縣令想謀俞淺淺的家產投靠反王，現在看來不是。\n官府若是秉公辦案換俞淺淺一個清白，那皆大歡喜。\n要是縣令心中打什麼小九九，她手上有了縣令貪功的把柄，也不怕他為難俞淺淺。\n樊長玉摸了摸俞寶兒後腦勺說：「你娘遇到了一點小麻煩，等她解決了那小麻煩就來接你，你先隨我去鎮上，和寧娘玩幾天好不好？」\n從前俞淺淺店裡生意忙的時候，也是把俞寶兒交給家裡的婆子照顧，有時候俞寶兒三五天都見不到俞淺淺。\n他人雖小，性子卻已極沉穩，聞言乖乖點了頭，好奇問：「那長玉姑姑會殺豬嗎？」\n樊長玉想了想說：「可能會吧。」\n今日的事鬧得整個縣城人心惶惶，這兩日集市還開不開都說不準，大概得過些時日後，集市才會恢復以往的熱鬧。\n俞寶兒直接忽視了「可能」一字，得到樊長玉的回覆後，就心滿意足地被婆子帶下去洗漱睡覺了。\n樊長玉從一早來溢香樓給俞淺淺送肉到現在，還一口水都沒喝。\n王夫人知道她肯定餓壞了，讓家中的婆子去灶上備了飯菜。\n樊長玉這一下午就沒顧上想餓不餓的問題，聞到飯菜香味的時候，才驚覺自己已餓得前胸貼後背。\n她這一天幹的全是體力活兒，腹中空空，連吃了三碗飯，想吃第四碗的時候，被謝徵壓住了飯勺。\n他道：「餓久了別一下子吃太飽，傷脾胃。」\n樊長玉悻悻放下了碗筷。\n飯後謝徵出門了一趟，王捕頭常年辦案，總有磕碰受傷的時候，家中備了不少傷藥。\n謝徵向王夫人討了些跌打損傷的藥膏和一瓶金創藥。\n他回房時，樊長玉正好已洗漱完畢。\n他瞧見樊長玉正在水盆裡擰帕子，眉頭皺起：「沒人給你說過，傷口忌沾水麼？」\n樊長玉瞥了一眼手上的傷口，滿不在乎道：「這點小傷，不妨事。」\n轉頭瞧見謝徵手上的藥膏，「誒」了一聲，「你還去給我拿藥了啊？」\n謝徵半垂下眼，淡聲道：「王夫人給的。」\n樊長玉不疑有他：「嬸子真是心細，連我這點小傷都注意到了。」\n謝徵沒接話，靠著門框問：「你塗不塗？」\n樊長玉心說這人脾氣怎麼時好時壞的，但念著他在城樓上救過自己好幾次，她也沒跟他計較，仰著脖子道：「塗，我怎麼不塗，這是嬸子拿給我的藥，多少是一片心意。」\n聽到「心意」一字，謝徵抬眸看她一眼，隨即又移開了視線。\n樊長玉先往虎口灑了金創藥，謝徵看她咬著紗布的一端纏得艱難，走過去幫她纏上打好了結。\n不過往手腕上抹藥時，樊長玉才發現自己幹了件蠢事。\n她應該先給手腕上抹藥的，藥膏是油質的，需要一點點推開揉進皮膚裡，她現在兩隻手都纏著紗布，只能用指尖挖上一點，用指腹慢慢揉，很是費事。\n而且油質的藥膏極為滑膩，用指腹揉，很難揉進肌理。\n樊長玉馬馬虎虎揉了一通就想完事，準備合上藥膏盒子時，手腕被一隻大手截了過去。\n謝徵帶著薄繭的大掌揉開她手腕上未乾的藥油，語氣委實算不得客氣：「你做什麼都是這般馬馬虎虎的嗎？」\n樊長玉又被他懟了，沒忍住還嘴：「我這不手上不方便嗎？」\n謝徵似乎愣了一下，接下來只專心幫她推揉手上的藥油，倒是一句話沒再說。\n她霜白的膚色才燭火下變成了暖玉一樣的色澤，腕口那一圈青色的指印也愈發扎眼了起來，瞧著甚至有些觸目驚心。\n謝徵腦中突然就浮現起隨元青從人群裡突圍後向他投來的那個挑釁的笑。\n心底升起一股沒來由的怒意，薄唇抿得死緊。\n他掌心和她手腕上隔著一層藥油，藥油沒幹時，推揉起來只滑膩膩的，隨著藥油被揉進了皮膚裡，他再揉捏她手腕的觸感就變得極為明顯。\n不止是不是揉久了的緣故，他掌心變得很燙，烙鐵一樣。\n樊長玉眉頭皺起，正想說可以了，他卻先她一步收回了手掌。\n樊長玉到了嘴邊的話只得咽回去。\n謝徵收起藥膏盒子，去一旁的臉盆架子旁洗手。\n樊長玉垂眸看著自己被揉得發紅的手腕，只覺整個手腕又熱又癢，擠眉弄眼才忍住了在衣服上蹭一蹭的衝動。\n她暗道早知道這藥膏的藥效會讓整隻手又麻又癢，她就不塗了，還不如等回家了抹藥酒。\n謝徵轉頭就見她一臉糾結的樣子，問：「怎麼了？」\n樊長玉晃了晃手腕說：「藥效發作了，不太習慣。」\n街上敲梆子的路過，已經子時了，整個王家上下都一片寂靜。\n謝徵不用樊長玉多說，去打開了房裡的柜子，沒發現多餘的被子。\n樊長玉坐在桌前也瞧見了。\n這個時間點了，總不能去把王夫人叫醒，找她拿被子打地鋪。\n片刻後謝徵回身道：「我還不困，你歇著吧。」\n樊長玉心說他這是騙鬼了，他接連幾晚都沒睡好，今晨就是強撐著去幫她賣豬肉的。\n而且這嚴冬臘月的，晚上沒個炭盆子簡直能凍死人，他打算就在房裡坐一宿不成？\n樊長玉掃了一眼床鋪上僅剩的一條厚被子，主動道：「要不……一起睡床將就一晚？」\n謝徵心口一跳，擰著好看的眉頭朝她看來時，樊長玉會錯了意，趕緊舉著纏著紗布的手保證：「放心，我絕不會對你有非分之想！」`
        },
