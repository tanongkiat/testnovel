            content: `日暮西沉,戰場上斜插著的殘旗被夕陽暈成一片帶著淡淡金輝的血色，遍地浮屍顯出無盡蒼涼。\n迎面而來的那支鐵騎像是一柄鋼刀強硬扎入了這片烽火狼藉的土地，剛剛放下武器歸降的反賊兵卒們面上愈發驚惶，如一群待宰羔羊一般擠做一團。\n距離近了些,樊長玉也更清晰地瞧清了單槍匹馬衝在最前邊的那人,面若冷玉,寒星簇火的一雙眸子，正如荒原上狩獵的野狼一般死死盯著她,狠狠抽鞭往扣著她下顎發狠地吻了上去。\n「轟——」\n天空一聲驚雷炸響，亮白的閃電劈開黑沉的夜幕，放晴了半月，終於在這個夜裡又迎來了一場急驟的春雨。\n豆大的雨珠子砸下來，樊長玉狠推了好幾下都沒能把人推開，雨水順著眼皮滑落，一時間竟分不清臉上的是雨痕還是淚痕，她好幾次拿胳膊肘用力擊打在對方身上，聽到了悶哼聲，扣在她腦後的那隻手力道卻分毫未松，反而不要命一般吻得更兇。\n閃電掠過山地，一剎那的光亮後整個世界又沉進了無邊的暗色中。\n比起瘋，樊長玉是瘋不過他的。\n胸腔裡交織著那些未知又陌生的情緒，她連哭都哭不利索。\n結束時他同她額頭相抵，帶著血痂的手輕撫她被雨淋溼的長髮，嗓音很輕，眸子黑漆漆一片：「我活著，你這輩子就別想替旁人生兒育女了。」\n樊長玉已經哭夠了，心底那些糟糕的情緒也借著這場大哭發洩了出來，抬起一雙眼看向謝徵時，毫不留情地一拳打了過去。\n她並沒有收著力道，謝徵直接被她這一拳給砸下馬背去。\n樊長玉都沒回頭看他一眼，直接一掣韁繩大喝一聲：「駕！」\n戰馬飛奔出去，撿起一蹄泥水。\n謝徵仰躺在雨地裡，一手捂著被樊長玉砸到的左眼，微吸了口涼氣，好一會兒才放下手，卻望著漫天夜雨，朗笑出聲。\n-\n樊長玉駕馬一路狂奔，路上用手背擦了一下唇，但一碰就疼，不用想肯定是腫了。\n沁涼的雨水迎面打在臉上，面頰卻隱隱有些發燙，樊長玉更用力地揩了兩下唇，似想抹去什麼。\n前方官道遇上了前來尋謝徵的一眾親衛，謝五也在其中。\n他見了樊長玉，忙催馬上前，喚道：「樊姑娘。」\n見樊長玉騎著謝徵的坐騎，往樊長玉身後看了看，不見謝徵的蹤影，又問：「侯爺呢？」\n樊長玉本以為謝徵只是個將軍，一聽謝五叫他侯爺，先是愣了愣，隨即虎著臉道：「摔死了！」\n言罷也不管一眾親衛是何神色，直接駕馬繼續往前走了。\n謝五忙點了幾個人：「你們護衛夫人回去，剩下的隨我去找侯爺！」\n十幾名親衛分為兩撥人，一撥人隔著一段距離，小心翼翼跟著樊長玉，一撥人則火急火燎去尋謝徵。\n等在官道上瞧見謝徵時，謝五一行人連忙下了馬迎上前去，「侯爺！」\n松脂火把在雨夜裡也照常燃燒，親衛們瞧見謝徵眼角那團淤青，皆是一愣。\n夫人把侯爺給打了？\n謝五想到自己也跟著騙了樊長玉，再回想反賊大將被樊長玉幾錘掄死的慘狀，格外他真要傷勢重，哪還能單手就把自己拎上馬背？\n樊長玉抿緊唇，怒意和心中那股委屈交織，喝問：「解釋你為何成了將軍，還是解釋你騙我傷一直沒好？」\n她手上因為用力，崩裂的虎口處又溢出鮮血來，謝徵察覺到那溫熱黏膩的觸感，不及回答她的問題，眸色一變：「你受傷了？」\n他說著一隻手截住樊長玉拽著自己領口的手，就要翻起來看她個人就被攔腰提上了馬背。\n她頭腳朝下,肚子被擱在馬鞍前，一口氣沒轉過來，戰馬又往回急奔而去,一時間只看到周圍的景色飛快地往後倒去。\n鐵騎中有人大喝一聲：「反賊主將石越已被侯爺在峽口斬殺！有此人頭為證！大軍凱旋！」\n原本精疲力盡的燕州軍瞬間爆出山呼海嘯般的歡呼聲。\n樊長玉被劫上馬，本能地撲騰了兩下，可因先前殺敵耗費了太多體力，這會兒疲勁兒上來了，手腳都一陣酸軟，摁在自己腰背的那隻手又跟鐵鉗似的，愣是沒讓她撲騰起來。\n掙扎間，聞到那人身上濃鬱的血腥味間夾雜著的一股清苦藥草味兒，樊長玉撲騰的力道一弱，努力側過頭看著馬背上那俊顏仿佛覆著一層寒霜的人，不太確定喚了一聲：「言正？」\n謝徵垂眸看了她一眼，沒作聲，目視前方，忽而更用力一夾馬腹，大喝一聲：「駕！」\n這道嗓音雖冷沉又飽含怒氣，樊長玉卻還是辨出是言正的聲音無疑。\n她突然就不掙扎了，跟只呆頭鵝似的掛在馬背上，映著夕陽和山林的一雙眸子裡，全是困惑和茫然。\n言正不是小卒，是個將軍。\n他為什麼要騙自己？\n謝徵的戰馬已把一眾親隨遠遠地甩在了後面，官道兩側青山流水相依。\n發現樊長玉的異常後，謝徵便一掣韁繩，讓戰馬慢了下來，他伸手想把樊長玉拽起來，卻沒料到樊長玉會突然發難，手肘一轉避開謝徵抓過去的大掌，如豹子一般躍起，將他按倒在馬背上，偏圓的杏眼帶著怒意盯著他喝道：「你騙我！」\n謝徵面上冷意稍滯，道：「我可以解釋。」\n天色愈漸暗沉了些，樊長玉看著被自己拽著領口摁在馬背上的人，怒意過後，便是一股自己也說不上來的委屈。\n她見他傷重，怕他死在戰場上，才想著瞞天過海替他出徵，但他從頭到尾好像都是騙自己的。\n他真要傷勢重，哪還能單手就把自己拎上馬背？\n樊長玉抿緊唇，怒意和心中那股委屈交織，喝問：「解釋你為何成了將軍，還是解釋你騙我傷一直沒好？」\n她手上因為用力，崩裂的虎口處又溢出鮮血來，謝徵察覺到那溫熱黏膩的觸感，不及回答她的問題，眸色一變：「你受傷了？」\n他說著一隻手截住樊長玉拽著自己領口的手，就要翻起來看她手上的傷，卻被樊長玉發力繼續摁住。\n謝徵面色愈發冷沉，他心跳到此時都還沒平復下來，不知是騎馬狂奔了一路的緣故，還是在後怕什麼，眼神裡強壓著一份薄怒道：「你說的那些，我都可以解釋，我先帶你回去看傷。」\n樊長玉怒氣沒消，冷硬吐出幾個字：「不用你管。」\n沒人扯著韁繩，戰馬小跑一段路音很輕，眸子黑漆漆一片：「我活著，你這輩子就別想替旁人生兒育女了。」\n樊長玉已經哭夠了，心底那些糟糕的情緒也借著這場大哭發洩了出來，抬起一雙眼看向謝徵時，毫不留情地一拳打了過去。\n她並沒有收著力道，謝徵直接被她這一拳給砸下馬背去。\n樊長玉都沒回頭看他一眼，直接一掣韁繩大喝一聲：「駕！」\n戰馬飛奔出去，撿起一蹄泥水能是樊長玉了。\n謝五連忙回神，答道：「謝九等人護著夫人回去了。」\n謝徵便沒再多問什麼，翻上謝五牽來一匹戰馬，道：「回營。」`
        },
        {
            num: 85,
            title: `第85章第85章`,
            content: `公孫鄞此番負責在中路大軍壓陣,打到一半，忽見一隊騎兵殺了進來,衝散崇州的步兵陣,助他完成了後方的絞殺。\n兩軍匯師，公孫鄞見到一身布衣從容稱撐傘立於大雨的老者，訝然與驚喜齊齊浮現在臉上,忙上前拱手道：「侯爺先前就同在下說,山下援軍裡有高人坐鎮，未料竟是太傅在此！」\n親衛緊隨其後，為他掌傘，雨線從傘骨處飛瀉而下，冷風捲起他衣袍的一角,頗有幾分吳帶當風的飄逸之感。\n陶太傅道：「雲遊此地，順道過來看看。」\n他打量著眼前的年輕人,面露讚賞之意：「早聞河間公孫氏出了一賢,能說動你來他麾下,也是那小子的本事。」\n公孫鄞頷首道：「侯爺心懷天下,體恤萬民，公孫敬佩其氣節,甘為其所驅使。」\n言罷，又引著陶太傅往馬車處去：「石越麾下有一名力大無窮的猛將,撕開前鋒軍,助石越逃了出去，侯爺追敵去了,想來已在回來的路上，太傅先隨我上山，喝杯薑茶祛祛寒。」\n已是晚間,這場大戰後，將士們也需要修整，眼下山上有現成的營地和築起的防禦牆，先留守於山上才是上策。\n陶太傅道了聲「有勞」後，同公孫鄞一道上了馬車，雨珠子拍在車篷上撒豆子似的噼啪作響，馬車搖搖晃晃沿著山道前行，陶太傅的嗓音在雨聲裡也慢悠悠的：「還勞煩公孫小友替老夫尋一個人。」\n公孫鄞正在給陶太傅斟茶，聞言和煦一笑：「太傅且說便是。」\n陶太傅道：「半月前護送糧草上山的那批薊州軍裡，有個女娃娃，算是我半個弟子，她那日貿然上了山，這些日子想來吃了不少苦頭。」\n公孫鄞斟茶的手一頓，心道上次運送軍糧上山來的那批援軍裡，也只有樊長玉是女子了，難不成陶太傅說的是樊長玉？還是說現在山上還有個女扮男裝的？\n他把一盞茶推向陶太傅，問：「不知太傅愛徒叫什麼？」\n陶太傅道：「姓樊，喚長玉，是個敦厚的孩子。」\n公孫鄞只覺自己剛喝進的一口茶，霎時變成了百年老陳醋，酸得他嘴都差點沒能張開，好半晌才道：「聽說您收徒對資質要求頗高？」\n陶太傅何許人也，一聽公孫鄞這話，便覺他應當是接觸過樊長玉的，沒好意思說是自己主動提出收徒，還被樊長玉拒絕了，輕咳一聲摸著山羊須道：「那丫頭根骨好，在武學上是個百年難得一遇的奇才，就是慧穎上差了幾分，老夫才說她只算半個弟子。」\n公孫鄞得了這話，頓時也不酸了，笑道：「您那弟子，晚輩見過。」\n-\n樊長玉一回了軍營，就去找長寧，沒見著長寧，一番打聽，才知長寧被謝七帶走了。\n她當即尋了過去，進帳卻見長寧在謝七軍床上睡著了，床邊放著一個不知什麼用途的竹簍子，裡邊裝了些乾草，海東青正蹲裡邊打盹，一聽到腳步聲，立馬睜開了一雙溜圓的豆豆眼。\n樊長玉看到海東青愣了一下，一時間也分不清這大隼究竟是被謝徵馴好的，還是一開始就是他的。\n謝七也不知自家侯爺的身份有沒有暴露，見了樊長玉，試探性地喚了一聲：「樊姑娘。」\n樊長玉看了他一眼，一言不發抱起長寧往回走。\n他這裡會有那隻大隼，說明他也是知曉謝徵身份的，自己這些天一直都被他們騙得團團轉。\n謝七一見樊長玉這副神色，便知她應當是知曉一切了，心中半是心虛半是愧疚，見她要走，也不敢攔著。\n長寧感覺自己被搬動，迷迷糊糊睜開眼，看到了樊長玉，叫了聲「阿姐」，又趴在她肩頭睡過去了。\n樊長玉單手抱著長寧，還能騰出一隻手來撐傘，謝七見狀，忙上前道：「樊姑娘，我來幫您撐傘。」\n樊長玉盯著眼前這個僵笑著討好的青年看了一會兒，終究是沒再為難他，他上邊有謝徵壓著，一起騙自己也不是他本意。\n雨水打在傘面發出「噗噗」的細微輕響，雖是天公不作美，打了一場勝戰的軍營裡，每一頂軍帳卻都是亮著的，將士們不便露天慶功，便在帳內好酒好肉地吃一頓。\n隔著一層雨幕，那些聲音遙遠又清晰。\n謝七素來機靈，斟酌道：「樊姑娘，我知道您大概惱侯爺一直對您隱瞞身份，但侯爺這也是無奈之舉，侯爺身邊一直群狼環伺，長寧姑娘之前就被反賊劫了去，侯爺怕您也有什麼閃失，不得已才出此下策。」\n樊長玉腳步微頓，問：「長寧之前被劫走，也跟他有關？」\n謝七一時遲疑，不知該如何接這話，樊長玉卻已從他這片刻的沉默中得到了自己想要的答案，一時間心底愈發紛亂。\n前方就是她和長寧住的軍帳了，樊長玉在門口轉過頭道：「勞小七兄弟送我這一程了，裡邊沒收拾，就不請小七兄弟進去坐坐了。」\n謝七忙道：「樊姑娘言重了，此乃謝七分內之事。」\n樊長玉沒再多說什麼，進帳後，燈都沒點，摸黑把長寧放到床上，給她搭上被子，自己則有些茫然地抱膝坐到了一旁，望著黑漆漆的夜色發呆。\n整個西北只有一個侯爺，所以言正就是那個令北厥人聞風喪膽的武安侯？\n從前她覺得言正是鮮活真實的，他脾氣壞，嘴巴不饒人，還挑食，但是又很善良，嫌她不聰明卻總幫著她，承諾的事幾乎不會食言。\n他還讀過很多書，明白很多道理，是她見過的最聰明的人。\n可能遇到言正的那段時日，是爹娘去世後，她過得最苦的一段日子，以至於在他離開後，她常常想起他。\n有時候是滷了肥腸，想著他若是還在，大抵會皺著眉頭下筷，心中便有些好笑。有時候是翻著他做了註解的書冊，一彎腰塌背想起他曾經說的讀聖賢書都沒個坐像，立馬就坐直了身體看書。有時候是去糖果鋪子裡給長寧買松子糖，鋪子掌柜的問怎麼不買陳皮糖了，家裡明明已經沒有吃陳皮糖的人了，但她還是下意識再買一點回去……\n遇到難處的時候，她也會想，要是言正還在就好了，他那麼聰明，肯定能幫她想到辦法的。\n她跋山涉水來找，不懼生死上戰場想護的，是那樣的一個人啊，可那個人根本就是不存在的。\n她沒法把武安侯繼續當成言正。\n那個稱謂背後是赫赫戰功，是萬民景仰，也是於她而言的遙不可及。\n被雨淋溼的頭髮還沒絞乾，水珠從發梢墜下，將她剛換下的乾爽衣物濡溼了一小塊，溼透的布料貼在身上，有些冷，卻也讓樊長玉愈發清醒。\n-\n謝徵冒著大雨一回營，便有親衛上前為其牽馬，「侯爺，公孫先生方才命人前來傳話，讓您歸營了過去一趟，說是有貴客來訪。」\n溼透的披風掛在身上很不舒服，謝徵解下來丟給親衛，道：「本侯先換身乾爽衣物。」\n大步走進中軍帳，親兵早已備好了沐浴的熱水和衣物。\n謝徵簡單擦洗一番後，用幹帕子胡亂揩了揩身上的水珠，撿起床邊的一套箭袖長袍便往身上套，問：「她回來後如何了？」\n在屋內伺候的是謝七，他斟酌道：「夫人瞧著還是有些生氣，屬下勸了幾句，但夫人幾乎沒說話。」\n謝徵微微皺眉，系好腰帶後道：「我過去看看。」\n-\n樊長玉還坐在帳內發呆，外邊突然傳來踏著雨水走近的腳步聲，聽著似乎不止一人。\n須臾，那腳步聲在帳門口站定，是謝七的聲音：「樊姑娘，火頭營煮了薑湯，我給您送一碗過來。」\n樊長玉現在心裡亂糟糟的，只說：「我身體底子好，用不著，你拿給其他將士吧。」\n帳外的人卻並未離去，反而直接掀開帳簾抬腳走了進來。\n樊長玉一抬眼，便撞入謝徵那雙漂亮又乖戾的眸子裡。\n他端著薑湯進屋，身後的謝七用一隻手小心護著身前的燭臺，見了樊長玉有些尷尬地笑了笑，把燭臺放到桌上後便退了出去。\n滿室的陰冷似乎都被那一盞暖融融的燭光碟機走了一般。\n長寧一向睡得沉，被猩紅的披風裹得只剩一張圓嘟嘟的小臉露在外邊，感知到光源，翻了個身背對燭臺後，砸吧砸吧嘴，呼吸聲又綿長了。\n樊長玉看著謝徵，他從前穿一身布衣都好看，此刻著一身繡著精緻花紋的錦袍，通身的貴氣更是掩不住，只不過眼角那團淤青扎眼了些。\n她這會兒已經完全冷靜下來了，也想清楚了利弊，知道他好歹是個侯爺，自己當時又氣又委屈打的那一拳，終究是不妥，便抿了抿唇道：「抱歉，把你打成了這樣。」\n謝徵頗有些意外地抬了抬眉梢，道：「比起上一次打的，這次應該算輕的。」\n樊長玉當然知道他說的上一次是他徵兵被抓走那次，又說一次：「抱歉。」\n謝徵原本只是半開玩笑同她說這話，聽了她的回答，眉頭皺起，說：「一直同我道歉做什麼？那次的確是我混蛋。」\n他黑漆漆的眸子鎖著她，散漫的神情下像是一條收起了尖齒的惡犬：「我讀過不少聖賢書，也懂禮義廉恥，但是對你，有時候總控制不住想幹些混蛋事。」\n他這句話甚至說得有幾分自厭。\n樊長玉下意識狠瞪了他一眼，沉默兩息後，又緩和了語氣：「言……侯爺，我們談談吧。」\n謝徵聽到她對自己稱呼的轉變，眼皮撩起，眸色轉深，說：「好啊，先把薑湯喝了。」\n他把薑湯碗遞過去。\n樊長玉端著一口悶了，一碗薑湯喝下去，確實整個胃裡都暖了起來。\n謝徵這才開口：「當初騙你，非我本意，我被人追殺流落至清平縣，碰巧被你救了回去，如實告知你身份，只怕會招徠禍端，這才一直隱瞞。」\n樊長玉說：「我沒怪侯爺當初的隱瞞。」\n她突然擺出一副極好講道理的樣子，卻讓謝徵心底莫名升起一股不安。`

            title: `第86章第86章`,
            content: `帳簾沒掩嚴實,冷風灌進來，吹得桌上那一盞燭火搖搖欲滅，整個帳內也跟著忽明忽暗。\n謝徵指尖有些躁鬱地在桌上輕叩了幾記,清俊的一張臉被搖曳的燭火切割出明滅的光影,眸色也愈發晦暗不明了起來：「那是怨我這次瞞你？」\n樊長玉正想說話，怎料帳內的燭火在此時被冷風完全吹滅,整個大帳瞬間門陷入了一片漆黑。\n她到了嘴邊的話便變成了：「我先去把燭臺點上。」\n起身之際,一隻手卻叫人扣住,不輕不重的力道,卻讓她輕易掙脫不了。\n謝徵低沉的嗓音在黑暗中響起：「我從前同你說過我有個很厲害的仇家,我上一次險些死在他手裡，就是軍中出了叛徒。貿然把你姐妹二人卷進來，只怕他會對你們下手,多一個人知道就多一分兇險,這才在你誤會我是軍中小卒後，將錯就錯瞞了你。」\n他說到此處頓了頓，「還有件事,也得向你說聲抱歉，你妹妹被反賊劫走，是反賊誤把她當成了我謝家人。」\n樊長玉之前聽謝七提起這事，就已猜到長寧被劫大抵是跟謝徵有關，此刻聽了謝徵的話，面上還是有一瞬的錯愣。\n帳外照明用的三腳高架火盆搭了簡易的遮雨棚，借著外邊的火光,帳內的一切都能模糊瞧見個大概。\n謝徵將樊長玉面上的神情瞧得分明，道：「劫走長寧的那人你也認得，就是之前假冒徵糧官兵、激化暴民圍城的反賊,他乃長信王世子隨元青。」\n這下樊長玉是真有些傻了，那個癟犢子竟是反賊世子！\n她大睜的杏眸像是一塊琥珀，眸光轉向謝徵時，謝徵眼神微暗了一下。\n她問：「你胸口的傷，就是救長寧的時候，被他傷的？」\n謝徵好看的眉頭輕皺，不太願意承認在隨元青那裡掛了彩，還躺了這麼多天，鬆開了扣住樊長玉的那隻手，說：「我生擒了他。」\n若說樊長玉先前聽了謝七說的那話，對於長寧遭了這麼一趟罪，覺著是自己和謝徵走得太近才害了她，心中頗為自責，此刻明白了事情的前因後果，便更加百味陳雜了。\n若不是為了保住清平縣，她和那癟犢子結下了梁子，他不會跑到她家中去尋仇。\n他不去她家中尋仇，就看不見那副畫，看不見那副畫，便不會認出言正，也不會綁了長寧拿去威脅言正。\n可惜沒有如果，而且就算重來一次，她大概還是會選擇綁人保住清平縣，只不過這次她會下手利落些，直接一刀了結了那反賊的狗命。\n樊長玉沉默兩息，平復心緒後道：「長寧被綁的事，不全怪你，我也有責任。而且你為了救長寧，被傷成了那樣，早已不欠我什麼，無需向我致歉。至於你在山上騙我的事……」\n她頓了頓，繼續說：「你是替我們姐妹二人著想，我也沒什麼好怪你的。」\n她這一反常態的平靜，讓謝徵眉宇間門的躁意又重了幾分，他隱約能猜到她後邊會說的話，光是想想，心口翻湧的黑色鬱氣便有些壓不住了。\n他一隻手搭在眉心，強忍下心中那份躁鬱：「你說的談談，是打算又跟我說些一拍兩散的話？」\n樊長玉微微一噎，心道她們也沒說幾次啊，何況他之前假入贅，那也是事先約定好的。\n她實誠道：「我們都沒在一起過，這應該也算不上一拍兩散。」\n話音剛落，便覺出身側的人周身氣息陡然一戾，樊長玉心口莫名跟著跳了一下。\n謝徵緩緩抬起眼皮，問她：「沒在一起過？」\n樊長玉迎著他壓迫感十足的視線，目光溫和卻堅定：「如果你說的是在清平縣那些日子，那時候你假入贅與我，咱想，我也沒什麼好怪你的。」\n她這一反常態的平靜，讓謝徵眉宇間門的躁意又重了幾分，他隱約能猜到她後邊會說的話，光是想想，心口翻湧的黑色鬱氣便有些壓不住了。\n他一隻手搭在眉心，強忍下心中那份躁鬱：「你說的談談，是打算又跟我說些一拍兩散的話？」\n樊長玉微微一噎，心道她們也沒說幾次啊，何況他之前假入贅，那也是事先約定好的。\n她實誠道：「我們都沒在一起過，這應該也算不上一拍兩散。」\n話音剛落，便覺出身側的人周身氣息陡然一戾，樊長玉心口莫名跟著跳了一下。\n謝徵緩緩抬起眼皮，問她：「沒在一起過？」\n樊長玉迎著他壓迫感十足的視線，目光溫和卻堅定：「如果你說的是在清平縣那些日子，那時候你假入贅與我，咱們是有約定在先的。況且，你用的也是假名，世間門根本就沒有言正這個人，那一紙婚書都做不得數了，算不得在一起。」\n謝徵沒再看她，垂下眼時，濃黑的眼睫像是黑鴉收攏的翅膀：「那你還來找我做什麼？又作甚讓我跟你回去？還自作主張想替我上戰場？」\n勾起的唇角，笑意發冷。\n樊長玉看著他，眼神慢慢柔和下來，但那溫柔背後，似乎又有更強大的東西在支撐著她，她說：「因為那時候你是言正啊。」\n謝徵一向冷漠倨傲的眸子裡，罕見地浮起一絲淡淡的迷惘，他啞聲道：「那不也是我麼？」\n樊長玉說：「人沒變，但你們背後代表的東西全都變了。你是言正時，就只是你而已。你是武安侯，那便不止是你自己了，你是天下人都仰慕的大英雄，也是謝大將軍的獨子，能配得上侯爺的，應當是侯爺曾經說的溫柔賢惠、會持家的那類姑娘。我學問不多，只識得幾個字，別說琴棋書畫，連四書都還沒讀全，自然是配不上做侯爺正妻的，但我爹娘生養我一場，我也不能輕賤自己，與人為妾。」\n謝徵黑眸凝視著她：「你怎就知，我不願娶你為妻？」\n樊長玉因為他這句話怔住。\n開什麼玩笑，威名赫赫的武安侯娶一個殺豬女，這傳出去，得叫天下人笑掉大牙吧？\n她有一瞬慌亂道：「你可別說這些胡話……」\n謝徵冷冷打斷她：「你覺得這是胡話？」\n樊長玉皺眉說：「那些低門嫁女的，頂了天也就是富家小姐配個寒酸書生，你見過當朝公主嫁寒酸書生的？公主再不濟嫁的也是新科狀元。我原先不知你身份也就罷了，如今知道了你身份，從前那些話哪還能當真。」\n這點自知之明她還是有的。\n謝徵聽她拿公主類比自己，額角青筋便跳了跳，再聽她說後邊這些話，氣得冷笑一聲：「當朝公主嫁什麼人，皇帝說了算。本侯娶什麼人，外一家哪能同意兒子娶個寡婦，府上的老夫人和太夫人直接給氣病了，也把那公子給關起來，還指使惡霸去砸豆腐娘子的攤子，那段時日，整個鎮上都是關於豆腐娘子的閒話。本以為她和那公子就這麼散了，誰知那公子絕食相逼，員外一家疼兒子，到底還是捏著鼻子同意了這門婚事，但只允豆腐娘子做妾。豆腐娘子二嫁，嫁的又是高門大戶，也不圖能當正妻，只圖那公子對她好。成親時，雖是納妾，可那排場也堪比娶妻，吹吹打打好不熱鬧。」\n「鎮上的人都說豆腐娘子命好，這輩子能享清福了，那些年豆腐娘子每每再回鎮上，都穿得光鮮亮麗，但人卻一年比一年瘦了。唯一不變的，是依舊有人豔羨她，也有人暗地裡說一些不堪入耳的閒話，說她粗鄙淺薄，不是正經女子，死了丈夫後就四處勾勾搭搭，勾搭上了那公子才嫁入了高門。第三年的時候，豆腐娘子就被趕出員外府上了，得虧她從前是良家，若是奴籍，得直接被員外一家發賣了。」\n謝徵神色顯得有些冷漠：「那男人自己變心罷了。」\n樊長玉說：「我從前也是這樣覺得的，但我娘說，本就是不同道的人，哪怕一時湊在了一起，早晚也是要分道揚鑣的。就像一個人在一堆金玉寶石裡選了塊頑石，世人便都替他可惜，被選中的頑石，有人豔羨也被人說著不配，卻不知，選擇頑石的人，隨時可以重新選擇金玉，但頑石卻再也沒有選擇的機會了。豆腐娘子便是這樣，員外公子喜歡她時，她就比名門閨秀還好，員外公子不喜歡她了，她便和那酒家娘子、茶水娘子無甚區別。」\n謝徵冷聲道：「是那男人心志不堅，我若決定了要什麼，攥進棺材裡也要跟我爛在一起。」\n他說這話時，黑眸一瞬不瞬地盯著樊長玉，平和的眼神下卻又藏著一股讓人心顫的狠意。\n樊長玉心口下意識突突了兩下，但想起從前母親說給自己的那些話，眸色卻又變得堅定而清明：「我娘還說過，讓他們走到這一步的不止是這些，一個人是沒法拋去自己的過去的。豆腐娘子曾是寡婦的事實會伴隨著她一輩子，她不得主母喜歡，在府上裡會面對形形色色的打量和輕視。大戶人家家中的規矩禮儀，也不是她一時半會兒就能學會的，被婆母打壓，被妯娌取笑，甚至連下人都能瞧不起她，那些聲音和身份差異造成的無孔不入的自卑，無時無刻不在侵蝕著豆腐娘子。」\n「她唯一能指望的，就是員外公子對她的好，但所有人都說她不好。有些話，聽一遍兩遍尚且能堅定本心，可經年累月地一直有人在耳邊說著，難保不會潛移默化被影響，曾經忽視掉的那些不好，在那時候也變得格外刺目起來。員外公子生來富貴，他啟蒙讀書的年紀，豆腐娘子可能在家幫忙母親做家務；他同友人觥籌交錯時，豆腐娘子興許在埋頭做豆腐。」\n「員外公子度的是風月，豆腐娘子過的是日子，員外公子不覺得腐娘子做個一飯一羹是什麼大不了的，因為他家僕從成群。豆腐娘子也不懂員外公子吟詩作畫的雅趣，他們本就不甚一類人，又哪能切身處地知道對方在想什麼，自以為給出自己最寶貴的東西，在對方看來卻什麼也不是，細小的矛盾日積月累下來，一回首便是不可逾越的鴻溝了。」\n說到此處，樊長玉終於抬眼直視謝徵：「侯爺是蓋世英雄，也只有王公大臣的千金才能與侯爺相配，我一個殺豬的，侯爺要是娶我，會被天下人恥笑的。」\n謝徵聽她為了婉拒自己，扯了這麼個故事，再聽她說讓自己取王公大臣之女的話，怒極反笑：「本侯娶妻，幹天下人何事？」\n樊長玉沉默了好一陣才開口：「我以為，我說了這麼多，侯爺應該懂我的意思的。」\n指節卻不自覺地扣緊了，心口有些悶悶地難受，有一瞬她也在想，要是他只是言正就好了。心起，他便一直在謀劃往後的事了，此刻問出這話來，一點沒覺著不合時宜或是孟浪，只在這片沉寂裡，等著那個塵埃落定的答案。`

            title: `第87章第87章`,
            content: `樊長玉沒料到謝徵會說出這樣一番話來,說心底不觸動那是不可能的，只是她也清楚地意識到，一旦她點了這個頭,往後的人生或許就不是自己說了算了。\n就像他作為武安侯，要承擔那些責任,背負那些使命一樣,作為他的侯夫人，也得挑起這一品命婦背後的擔子。\n他需要的是一個能與他比肩同行的妻子，而不是一個要他處處遷就才能走下去的人。\n麻雀插上了鳳凰羽毛,那也變不成鳳凰，只有自己去涅槃後，才能長出屬於真正的鳳凰翎羽。\n帳外的雨聲似乎小了，之前積在帳篷頂的雨水從邊角墜進水窪時發出「滴答」聲，在這片沉寂裡顯得格外清晰。\n樊長玉垂放在膝上的雙手握緊,終究還是抬起頭看向了謝徵。\n只一個眼神,謝徵便明白了她要說的答案,說不清是骨子裡的驕傲作祟，還是不想聽她親口說出拒絕的話，他突然道：「不必答覆我了。」\n帳外在此時也傳來了謝七的聲音：「侯爺,公孫先生那邊在催您過去。」\n謝徵說了句「告辭」，便起身掀開帳簾離去。\n樊長玉在他走後，看著輕晃的帳簾發了好一陣呆。\n-\n謝七在謝徵進帳後,就躲得遠遠的,方才過來傳話，發現帳內熄了燈,他心中還咯噔一下,生怕自己壞了什麼事。\n但謝徵頃刻間就掀開帳簾出來了,臉色瞧著也不太好看，似乎又不是他猜測的那樣，謝七也不敢多問什麼，只屏氣凝聲跟在謝徵身後。\n怎料走在前邊的謝徵突然頓住腳步，同他道：「我記得你有個妹妹？」\n謝七不知自家侯爺怎突然問起了這個，神色一黯，答道：「是。」\n他幼年父母雙亡，和妹妹一起被賣給了人牙子，人牙子為了賣個好價錢，通常是把模樣生得周正的女童賣進青樓，男童則往宮裡送。\n一些訓養死士的大族，也會從人牙子手上挑人，他就是被魏嚴買去的，十個同齡孩童裡，只有一個最終能成為死士，剩下的，運氣差些的死了，僥倖活下來的成為家奴。\n他在最後那一場混亂的廝殺裡，被捅了數刀，回天無望，本該是要一卷草蓆裹了扔去荒野裡餵狼的，但他想活啊，帶著那一身未加處理過的傷熬到了第二日都還沒咽氣。\n那時侯爺還只是個半大少年，但已開始替魏嚴做事，不過從物件到身邊的奴僕，都只能挑魏宣挑剩下的。\n魏宣選了最終勝出的死士當親隨，侯爺在陰暗的地牢裡挨個看去，沒選那些只受了輕傷可以成為魏府家奴的，反而看中了他。\n管事說他可能活不了，那麼重的傷撐了一夜已是罕見。\n侯爺說他都這麼努力地想活著了，死了多可惜？\n於是他被帶了出去，得到了大夫醫治，傷好了成了侯爺親隨，被賜名謝七。\n也是從那時起，他只忠於謝徵，後來還替謝徵殺了魏宣身邊那個死士出身的親隨。\n至於他妹妹，等他尋到人時，妹妹已經是小地方的青樓裡叫得上名號的姑娘。\n他如今的身份，也不敢貿然和妹妹相認，怕一個不小心讓妹妹陷入險境，畢竟綁了對方家人逼迫這種手段，他見得多了。\n他暗中給了妹妹錢財，又施壓老鴇，讓妹妹得以贖身，如今開著一家刺繡鋪子。\n謝徵問：「你妹妹成婚時，有個富貴公子傾慕她，為何她還是嫁了個鐵匠？」\n那是謝七妹妹贖身後的事了，謝七得知妹妹成婚，也不敢光明正大地去喝喜酒，只向謝徵告了個假，偷偷去觀禮。\n那富貴公子當天也在，他和謝五幾個要好的弟兄一直在暗處盯著他，想著他若是敢在婚禮上鬧事，他們就把人拖到巷子裡揍一頓。\n誰知那富貴公子只是在宴席上把自己喝了個爛醉如泥。\n他們回來後曾說起過此事，謝徵大概也有所耳聞，此時突然提起這事，謝七頗有些摸不著頭腦，只道：「屬下作為兄長，覺著舍妹嫁個鐵匠沒什麼不好的。」\n謝徵頓住腳步，側目問：「為何？」\n謝七答：「舍妹不知我還活著，也不知我尋到了她，她嫁個鐵匠，若是那鐵匠將來待她不好，她守著刺繡鋪子不愁養不活自己，拍板就能和離，一旦鬧起來，也有街坊鄰居能幫襯她。她若嫁了那富貴公子，就是孤身一人應付全族了，有個什麼變故，對方家大業大的，她想求個公道都難。」\n這是又一個豆腐娘子的故事，不過在這個故事裡，豆腐娘子沒選那貴公子。\n謝徵面上若有所思，沒再說什麼，邁步朝中軍帳走去。\n門口的親兵見了他，忙喚道：「侯爺。」\n在謝徵走近時，打起帘子，帳內通火通明，謝徵一眼就瞧見了坐在主位下方的老者，面上情緒稍斂，有些意外地喚了一聲：「老師。」\n陶太傅看著自己的得意門生，捋須道：「聽聞你追敵去了，如何？」\n謝徵眼角那團烏青，他還當是在戰場是傷到的，暗忖這打的角度委實刁鑽了些。\n拳頭都能逼到面門，若是換成刀刃，只怕這隻眼都得廢了，如此一想，也算是不幸中的萬幸。\n公孫鄞也瞧見了，他還是頭一回見謝徵從戰場上回來眼角淤青的，不知怎地，突然就想到了之前在盧城見到他時，他臉上那團淤青。\n越看，還越有那麼幾分像，一時間，公孫鄞神色頗為怪異。\n難不成又是樊長玉打的？\n但他剛從戰場上下來，按理說不應該啊……\n謝徵像是沒瞧見二人打量的目光，一撩衣擺在主位上坐下後，面色如常道：「已砍下石越頭顱。」\n陶太傅滿意點點頭，又頗為欣慰地問：「石越麾下有一猛將，據聞是他兄弟，喚石虎，生得高大異於常人，一身蠻力，我在山下時，曾見過他與薊州軍交手，是個難纏的，你以一敵二殺了他們二人？」\n謝徵當即皺了皺眉：「我領五百親騎，從山上抄近道追去，只截殺了石越，並未見其兄弟。」\n公孫鄞詫異道：「先鋒葛大慶乃侯爺麾下數一數二的猛將，他都被石虎重傷，侯爺又並未同石交手，軍中還有何人能降得住此賊？」\n此戰先鋒軍和左衛營的人損傷慘重，將領們幾乎全都傷得下不了床，還是軍醫挨個去包紮的。\n謝徵問：「戰報上沒寫左衛營殺敵多少？斬獲敵將幾何？」\n公孫鄞拿起一旁的戰報遞過去，道：「先鋒軍和左衛營都沒提斬殺了石虎，可石虎的確是死了的，我同太傅才以為是你殺的。」\n謝徵道：「石虎並非命喪我手。」\n剛端著茶水進來的謝五聽得這番談話，欲言又止，最終還是說了出來：「石虎是夫人殺的。」\n此言一出，帳內三人都齊齊看向了謝五。\n公孫鄞還不知樊長玉偷偷上了戰場的事，震驚之餘，疑惑道：「她在山上，如何殺的石虎？」\n謝五偷瞄了謝徵一眼，斟酌道：「夫人先前不知侯爺身份，怕侯爺出徵有什麼意外，藥暈侯爺後混入了左衛營，屬下阻止不了夫人，又怕夫人出什麼意外，這才跟了去。左衛營的將軍們同石虎拼殺，全都敗下陣來，軍心潰散，夫人跟石虎對上後，沒個趁手兵刃，幾番惡鬥才奪下了石虎手上的釘錘，三錘要了石虎性命。」\n謝五怕謝徵氣樊長玉私自上戰場，在路上時就想同謝徵說這番戰績了，只是一直沒找到機會。\n公孫鄞被樊長玉的戰功驚得久未出聲，連謝徵被藥倒這樣難得的糗事他都顧不上笑話。\n好半晌，才吶吶道：「獵一頭黑熊，還能說是那黑熊不夠聰明，但有一身蠻力。可石虎……豈止是一身蠻力，先鋒葛大慶也有獵虎熊之勇，還久經沙場經驗老道，尚且不敵他，樊姑娘還能奪了他兵刃，三錘要他性命？」\n公孫鄞倒吸一口涼氣，看向謝徵：「普天之下，我以為，也只有侯爺才有此勇了。」\n謝徵靠坐著椅背，擰著眉頭沒做聲，不知在想些什麼。\n陶太傅在聽謝五說夫人殺了石虎時，心裡就犯嘀咕了，心道這臭小子果真半點不記得自己這個老師了，成親這麼大的事，也沒見知會他一聲。\n後又聽謝五說什麼夫人不知謝徵身份，代謝徵上戰場，愈發聽得他雲裡霧裡的，此刻再聽公孫鄞說那女子姓樊，他心道不至於這麼巧，就是樊長玉吧？\n他抬起一雙老眼看向謝徵：「你何時成的親？也不來信告老頭子一聲。」\n公孫鄞之前故意賣關子，沒給陶太傅說樊長玉和謝徵的關係，此時驚訝歸驚訝，卻還是笑眯眯看著二人，只等謝徵自己同陶大夫說親來龍去脈。\n謝徵卻道：「此事說來話長，當日我落難，婚禮亦辦得簡陋，日後重辦，定會請老師當證婚人的。」\n陶太傅心知謝徵的婚事，甚至可能關係到朝中各大勢力的重新洗牌，想到謝五說的那女子殺了石虎，虛了虛眼問：「是個將門家的孩子？」\n謝徵沉默了一息，說：「不是。」\n陶太傅便道：「總歸是個不錯的孩子，好生待人家才是。」\n謝徵想到樊長玉拒絕自己的那些話，心口發沉，只應了聲好。\n陶太傅又說起了眼下的局勢：「石越一死，長信王如斷一臂。山腳下的崇州軍，死的死，逃的逃，被俘的人馬重新編入軍中後，你大可直接南下圍崇州，同賀敬元的人馬匯合，聯手攻城。只是朝廷那邊，會讓你這麼快打完這場仗嗎？」\n崇州這場戰局僵持至今，便有朝廷紛爭的緣故在裡邊。\n一開始是魏嚴想設計他死在崇州戰場上，到了眼下，朝廷的軍餉、糧草遲了幾個月未發，明顯是有人不想快些打完這場仗。\n兵械、糧草、軍餉，這些都是銀子，前線有戰事拖著，朝中那群人就有再正當不過的理由找戶部撥錢。\n至於這些撥下來的錢款，最終又有多少是落到了實處的，就得看那一層層貪下來的官員還有沒有良心。\n兵部和戶部都是魏嚴的人，哪怕皇帝命人查帳，查出來的也只會是錢糧兵械都運送到了他手中的，錢糧軍需都給夠了，反賊還遲遲沒剿滅，便是他謝徵無能。\n謝徵嘲弄道：「魏嚴是想兜住魏宣在西北捅出的簍子，眼下約莫是想我把滅掉崇州反賊後的軍功讓出去。」\n陶太傅眼皮微耷，道：「依我之見，這也並非壞事。」\n公孫鄞不解道：「太傅何出此言？」\n陶太傅反問：「大胤朝還有何人是弱冠之年便封侯的？月滿則虧，水滿則溢。憑著你家侯爺平定反賊的戰功，你以為他回京後，皇帝還能封賞他什麼？眼下魏黨如日中天，皇帝自是盼著他和魏嚴鬥個你死我活，等魏嚴一倒，下一個又是誰？」\n公孫鄞道：「太傅說的這些，在下也知曉，只是侯爺如今便是要退，被裹挾在京城的局勢裡，也是退不下來的。」\n陶太傅笑笑：「年輕人吶——」\n公孫鄞覺出陶大夫話中有話，道：「願聽太傅高見。」\n陶太傅說：「退到什麼程度？魏嚴倒臺後，皇帝要扳倒的下一個不是你家侯爺就行。」\n公孫鄞瞬間明白了陶太傅的意思，「您是說，先讓李家和魏嚴鬥？」\n他想到眼下正暫代賀敬元在薊州的李太傅之孫李懷安，心中             content: `多年未見的師徒二人秉燭夜談了一陣,謝徵要親自送陶太傅回住處，陶太傅道：「行了，你我就不用這般見外了,你也去歇著吧，老頭子自己回去就是。」\n謝徵便讓謝七送陶太傅回去,頓了頓又道：「她若是知曉是我託老師收她做義女，只怕不願承這情，明日拔營我安排她和老師共乘一車下山，她得閒時細看些書，對博學之人很是敬重,老師且指點她幾句,哄著她認下老師這個義父便是。」\n陶太傅聽他安排得這般細緻周到,蒼老的眼皮微抬，問：「費心成這般，值得嗎？」\n謝徵已送陶太傅行至帳門口處,逆著燭影,清俊的側臉隱在了一片暗色中,篤定道：「她值得。」\n陶太傅便笑了聲：「行,就依你。」\n又問：「那姑娘姓甚名誰？可知她生辰八字？既收人家做女兒，老頭子還是替她取個字。」\n謝徵答：「姓樊，喚長玉,今年十六，應當是慶曆二年正月裡出生的。」\n他並不知樊長玉具體的生辰是哪一天,之前在清平縣時有問過,但樊長玉沒說。\n陶太傅臉色突然變得極度精彩起來，難怪公孫鄞之前說見過樊長玉，卻又不肯再向他透露多的信息,原來是在這兒等著他呢！\n謝徵見陶太傅面色有異，皺眉問：「可是有何不妥？」\n陶太傅看著他，心情複雜地道：「我路上遇見的那姑娘也姓樊，叫長玉。」\n謝徵想起樊長玉之前說過，修大壩時遇到的一個博學多識的怪老頭，還天天罵他學生，眼皮不由狂跳了幾下。\n整個大帳也在瞬間陷入了沉默，師徒二人一時間相顧無言。\n好一會兒，謝徵才問：「老師在路上被薊州上遊修大壩的官兵抓去了？」\n被強制去山上挖土石的記憶實在是不太美好，陶太傅嫌丟人，嘴角的鬍子抖了抖，反將一軍道：「那姑娘同我說，跟她和離的是她上門夫婿來著？」\n他睨著謝徵：「你落難時，給她當贅婿了？」\n謝徵沉默了片刻，緩緩「嗯」了聲。\n陶太傅頗為意外地看了謝徵一眼，他哪能不知道自己這個學生有多傲氣！\n他之前聽謝五說起樊長玉殺了石虎，便下意識想到樊長玉了，但樊長玉的前夫是入贅的，以謝徵的性子，怎麼可能會入贅？\n再加上石虎好歹是一員猛將，先鋒軍和左衛營的將軍們全都敗於他手，樊長玉雖會武，可初出茅廬，哪能拿下這等奇功？\n而且謝徵口中的那姑娘聰穎通透得很，他印象裡的樊長玉，分明就是個死心眼的憨姑娘。\n陶太傅這才沒把兩人想一塊去，以為只是碰巧同姓，哪曾想天底下的事，有時候就是這般巧！\n他看著眉宇間罕見帶著一股頹意的得意門生，捋著山羊須輕咳一聲：「既是如此，那替她另尋後生的事，便作罷吧。」\n謝徵看了陶太傅一眼，陶太傅分明從那個眼神裡讀出了點「你以為我還會去找人嗎」的意思。\n謝徵道：「收她做義女的事，還是得麻煩老師。」\n陶太傅搖頭嘆息：「說來你不信，我在路上遇見那丫頭時，便覺著她是個不錯的苗子，穎慧上雖差幾分，但心性寬厚、意志堅定，稍加打磨，是個能成器的，有心收她為徒，倒是被她再三拒絕了。」\n謝徵想起前不久樊長玉一臉同情地同自己說，那怪老頭孤苦伶仃，收她為徒怕是打讓她養老的主意，她急著找長寧，分不出精力來照顧一個怪脾氣老頭，這才婉拒了，怪老頭為此還生氣了好久。\n眼下再聽陶太傅說起其中緣由，心下頓時很是微妙。\n陶太傅見他不語，又說：「當初讓她拜師她尚且不願，如今讓她認做義父，老頭子也不敢擔保，那丫頭會應下。」\n謝徵言：「盡人事，聽天命。」\n陶太傅嘆道：「你們啊，就是兩頭倔驢湊到一塊了！」\n謝徵沉默不語。\n等陶太傅離去後，他獨自負手看著帳外漆黑的夜色出神。\n雨聲已歇，遠處按規制排列的軍帳在篝火下成了一個個隆起的暗色小黑點。\n謝五遲疑上前道：「侯爺，子時三刻了，您也歇著吧。」\n謝徵心緒紛亂，一絲睡意也無，他吩咐道：「左衛營那邊去敲打敲打，她殺了石虎一事，先壓下來。」\n謝五知道這是為了保護樊長玉，倘若樊長玉將來不打算在軍中，此事宣揚出去，只會給她招來禍端。\n他當即一抱拳道：「屬下明白。」\n謝五退下後，謝徵命人命人牽了他的戰馬來，沒讓人跟隨，只一人一馬繞著營地漫無目的地轉悠，不知不覺走到樊長玉帳前，他坐在馬背上靜靜看了一會兒，片刻後一扯韁繩，坐下通體烏黑、毛髮光滑如緞子一樣的戰馬便掉頭，走向了更深的夜色裡。\n-\n帳內，樊長玉合衣躺在床上，也是半點未曾入眠。\n帳外響起馬蹄聲時，她下意識屏住了呼吸，那馬蹄聲很輕，仿佛是怕吵到人，刻意放緩了步子的。\n停了好一會兒後，那細微的馬蹄聲才再次響起，明顯是離開的方向。\n大半夜會閒到來帳外看看她的還能有誰？\n意識到這一點後，樊長玉心中頗有些不是滋味，這數月裡的種種一一在她腦子浮現，讓她更難受了些。\n頻頻翻身試圖減輕心底的焦躁，卻差點吵醒長寧後，她揉了揉眉心坐起來，想著也出去轉轉好了。\n她輕手輕腳起身，往身上別了把剔骨刀，出帳時就發現一名面生的將士守在自己軍帳附近，瞧著像是附近站崗的，但之前這片營帳夜裡又沒人守著。\n樊長玉跟對方視線碰了個正著，對方先是傻愣愣同她對視著，目光裡半是驚慌又半是崇拜之色，緩了一會兒似乎想起自己的職責，做賊心虛般趕緊移開視線。\n樊長玉猜出這大概是謝徵的手筆，心緒不由更亂了些。\n她對營地很熟悉，一言不發地往駐地外圍走。\n那名親衛的確是被派來保護樊長玉姐妹的，之前本是謝五謝七負責此事，但樊長玉已經跟他們二人混熟了，派他們來守著，樊長玉一眼就能認出來，謝徵怕她惱，這才調了她沒見過的親衛過來守著。\n-\n後半夜月亮從散盡的烏雲裡冒了出來。\n夜色裡的山巒似撒上一層銀輝，不用火把也能看清四周的景致。\n樊長玉踩著雨後鬆軟的泥土，尋著水流聲往河邊走去。\n山野空曠，草蟲叫和蛙鳴聲高低起伏，雨後的空氣也說不出的清新，深深吸上一口氣，便覺心底的沉鬱都散了幾分。\n若不是雨後的草地溼得厲害，她很想就這麼張開雙臂躺下去，陷進綿軟的青草裡，也在這安寧的夜色裡，把心中的躁鬱雜念都平復下去。\n不遠處的草叢裡傳來窸窣聲，樊長玉一怔，細看過去，卻是一匹通體烏黑的戰馬被栓在了灌木叢處，前方的河岸處隱隱還有水聲傳來。\n樊長玉認出那戰馬，心底一驚，轉身就要往回走，然而已叫河邊的人察覺。\n「誰？」\n伴著這冷沉的話音落下，幾顆石子已如流星一般朝她擊了過來，樊長玉趕緊就地一滾，才避開了那幾顆幾乎能把人身上打出個窟窿的石子。\n她兩手撐地剛想爬起來，頸間陡然一涼，前一刻還在河岸那邊的人，已渾身往下瀝著水珠站在了她跟前，手中鋼刀直指她咽喉。\n「是你。」\n看清她容貌，謝徵眼底厲色才散了去，收起了手上的刀，上下打量她一番後，伸出一隻手要扶她，擰眉問：「有沒有傷到？」\n樊長玉搖頭，沒搭他的手，自己爬坐起來，心底卻暗自驚嘆他的速度。\n她見過他殺人，卻還是頭一回見識到他野獸一樣的警覺性。\n鋼刀已經拿開了，但她仍覺得頸側那一片肌膚汗毛直立。\n那一瞬間性命掌握在旁人手中的感覺，實在是讓她心驚肉跳。\n謝徵道：「我以為是敵軍探子。」\n她穿著一身小卒的兵服，頭髮為了方便也紮成了個小髻，在夜色裡隔著老遠乍一眼看去，還真不能辨出她是誰。\n樊長玉心道若真是敵軍探子，便是沒被那幾顆石子給打中受傷，也逃不脫他最後的刀口。\n她有些尷尬地解釋自己為何會出現在此處：「我夜裡睡不著，出來走走散散心，不巧看到你的馬，想著應當是你在河邊，這才打算先避開。」\n謝徵只著一條軍褲，剛從河裡上來，渾身都往下滴著水，也不在乎草地溼不溼，直接坐了下去，他溼透的長髮從束起的發冠中散落幾縷下來，凌亂地貼在臉上和肩頸處，平添了幾分少年氣。\n聽到樊長玉的話，他似有些意外地抬眸看了她一眼：「你也睡不著？」\n鎖骨因為他兩手撐坐在地上的姿勢，凹陷更明顯了些，月色下他膚色也呈現出一種冷清的霜白，發梢墜下的水珠滴落到鎖骨處，沿著緊實的肌理下滑，留下一道水痕，再往下，是窄瘦的腰……\n樊長玉突然覺得有些臉熱，趕緊移開視線，怕他誤會什麼，道：「我白天殺了好多人，心裡悶得慌。」\n他話中那個「也」字，顯然他是睡不著才來這裡的。\n至於他為何睡不著，原因顯而易見。\n自己雖然的確是被他那番話攪得心緒不寧沒有睡意，但已經明確回絕過人家了，此時承認自己是因他那些話睡不著，未免怪怪的。\n不過戰場上的種種，的確也讓是讓她心神不寧的一個原因。\n謝徵想起之前在臨安鎮，她殺了人怕得夜裡摸到他床邊坐著的情景，眸色軟了軟。\n他早從謝五那裡知道過，她在戰場上，對小卒都下不去死手的，只避開他們要害處砍，讓他們再無還手之力就行。\n明明對生死存著那樣的敬畏之心，卻還替他上戰場去拼殺。\n她怎麼敢的啊？\n心口像是被什麼東西燙了一下，腦子裡有個聲音叫囂著想擁她入懷，撐在地上的指骨已深深陷入草泥之中，卻終究沒敢僭越一步。\n血液裡像是有蟲子在鑽，身上的骨頭都隱忍到戰慄，終於壓下了心口那膨脹叫囂的念頭，他強自鎮定垂下眼道：「我第一次從戰場上下來時，也做了一宿的噩夢。」\n「第二次上戰場殺敵，我殺的人比第一次還多，那一晚我便不睡了，去演武場打了一宿的樁子，最後精疲力竭倒在地上，閉上眼就睡著了，什麼噩夢也沒做。」\n說起這些陳年往事，一抹冷嘲爬上他嘴角，他自己都沒注意到周身浮起一層戾氣。\n像是流落街頭的野狗，遍體鱗傷，察覺到有人靠近，本能地兇惡齜起牙吠叫，仿佛這樣就能免受下一場傷害。\n溼透的發頂覆上一隻手，隔著冷冰冰的溼發，也能感受到她那隻手暖烘烘的溫度。\n謝徵鳳眸挑起，映著一輪銀月的眼底，也映著樊長玉燦若驕陽的眉眼。\n她抿著唇角，輕輕摸了摸他的頭，像哄小孩子一樣說：「都過去啦。」`

            title: `第89章第89章`,
            content: `月色融融,流水潺潺。\n謝徵微側著頭，看著樊長玉久未出聲。\n樊長玉迎著他的目光，稍怔了一瞬,隨即似乎也意識到這個動作親密了些，有些尷尬地收回手放到了膝前。\n二人之間的氣氛變得有些微妙，她正準備說離開時，謝徵突然道：「你要心底還是悶,我可以陪你過幾招。」\n就這麼走，有方才下意識摸頭安慰他的事在先，怎麼都有些怪怪的。\n樊長玉想到他方才那鬼魅一般的速度，的確也有了跟他切磋一二的想法，便點了頭。\n她只帶了一把剔骨刀，謝徵穿好上衣,連兵刃都沒拿,赤手空拳上陣。\n樊長玉感覺自己被輕視了，抿唇道：「你還是拿把匕首吧。」\n謝徵一隻手負到身後,只對她道：「來。」\n這擺出讓她一隻手的姿勢，讓樊長玉唇角抿得更緊，一句話沒再多說，眼神瞬間銳如狩獵的虎豹，如離弦之箭般衝了過去。\n她一隻手去控謝徵的單手，剔骨刀直向他脖子抹去,近了身卻發現謝徵滑溜得像一條魚，她想抓他那隻手,他卻總能先她一步避開,不緊不慢,遊刃有餘,側身躲過她的匕首時，一道掌風迎面掃了過來，樊長玉趕緊避開，怎料那隻手勾住了她胳膊肘往後下方一拉，樊長玉整個重心失衡，便險些仰摔一跤。\n謝徵下拉的力道改為拽著她胳膊，準備把人拉起來，頸間卻陡然一涼。\n他笑問：「這算什麼？恩將仇報？」\n樊長玉剔骨刀抵在他頸側，道：「兵不厭詐。」\n謝徵臉上笑意更明朗了幾分，看著她道：「你說的有道理。」\n樊長玉望著他含笑的黑眸，收回刀抿唇道：「是我技不如人。」\n謝徵發現她的頹喪，說：「近身搏殺都以速度見長，你擅使沉手的兵刃，換了輕巧兵器，大開大合的招式使不出來，單拼出刀的速度，我苦練十幾載若是還不敵你，那才是毫無道理的事。」\n樊長玉想起他放倒自己的那一式，問：「你勾著我手肘往下拉那一招那是什麼？」\n謝徵不答，反而是再次勾著她手肘往後下方一拉，樊長玉身體瞬間繃上了勁兒，這次腳下紋絲未動。\n謝徵問她：「懂了嗎？」\n樊長玉回想自己方才險些跌倒時的情況，他掌風逼近，她為了躲避，身體側開了，並非是穩穩站在原地的。\n她皺眉道：「重點不在於你下拉的那一招？」\n謝徵讚許點頭，道：「有時候無需拼猛勁兒，順勢而為，借力打力，四兩撥千斤即可。」\n樊長玉握緊手中剔骨刀，衝他道：「再來！」\n方才點到為止的交手，樊長玉才剛把渾身的關節活動開，她擅猛攻，便也不再順著謝徵的招式去迂迴，只一味地進攻，刀風一擊比一擊凌厲，明明只是一把三寸餘長的剔骨刀，竟也被她揮出了殘影。\n謝徵發現她揚長避短，以攻為守，也有些意外，眸子裡划過一抹訝色，原來她方才也是收著打的，只為試探他的功夫路數。\n這個認知讓他眼底帶上了幾分笑意，招式上卻並未放水。\n只有這樣實打實的對練，才能最快地讓樊長玉學到東西，長進武藝。\n樊長玉吃過一吃虧後，也不再想著去抓謝徵那隻手，持刀的手主攻，握拳的那隻手也主攻，一擊連著一擊，只為迫使謝徵被動防守，騰不出手來反攻。\n但她這次過招只比先前那一次久了一點，幾個回合後，還是被謝徵鬼魅般繞到身後，順著她出刀的姿勢，借力往她肩背一推，樊長玉整個人瞬間竄出去老遠，半跌進了草地裡。\n從某種程度上來講，樊長玉其實也是個武痴。\n她抬起頭，眼底仿佛有一股小火苗在燃，喝道：「再來！」\n謝徵立在不遠處，夜風吹得他衣袂飄飄，襯著那張冷玉似的容顏，竟有幾分道骨仙風之感。\n樊長玉跟只小牛犢似的，提著刀朝他又衝了過去。\n不出片刻，持刀的手臂被謝徵順勢一捋，她整個人又踉蹌著撲進了草叢裡。\n邊上吃著草的烏雲馬不知是不是嫌她壓到了那一片鮮嫩的青草，還用探過頭來拱了拱她。\n樊長玉捏著剔骨刀爬起來，「呸呸」兩聲吐出不小心吃進嘴裡的青草，看向謝徵暴喝道：「再來！」\n……\n不知第幾次被摔出去後，樊長玉那一身沾滿草汁和泥巴的衣裳已經不能看了，臉上髒兮兮的，頭上還沾著幾片草葉子。\n她仰躺在地上，望著天穹大口大口地喘氣，渾身酸軟得一根手指頭都不想再動彈，卻又只覺酣暢淋漓。\n腦子裡也空空的，什麼雜念都沒有了，當真是一合眼就能睡過去。\n謝徵從馬背上取了水壺遞給她：「喝點水。」\n樊長玉出了很多汗，的確渴得厲害，她爬坐起來，大概是被摔出去太多次，腦子都被摔得有些暈乎乎的了，接過水壺就咕咚咕咚牛飲起來。\n喝完還給謝徵，謝徵看了一眼，直接仰頭灌了幾口。\n樊長玉傻愣愣看著，腦子裡終於反應過來，那水壺是謝徵的，她喝過了，他又喝，這算什麼？\n那點難為情還沒升騰起來，想起回來時他在馬背上親她，樊長玉下意識又用手背擦了幾下唇，瞬間覺得共喝一個水壺似乎也不算什麼事了。\n她手背上也有草泥，這一擦，倒是把草泥都給留唇上了。\n謝徵喝完水擰上壺塞，發現她的異常，問：「怎麼了？」\n樊長玉尷尬道：「臉上有髒東西，我去洗把臉。」\n言罷便起身朝河邊走去。\n謝徵的嗓音從身後傳來：「你滾了一身泥，衣服要不要也洗洗？」\n樊長玉以為他在言語上輕薄自己，頓時回頭瞪了過去，但看謝徵一本正經的神色，似乎又不是故意逗自己，不由皺了皺眉。\n謝徵看出她誤會了，道：「大軍明日拔營，會前往崇州和薊州軍合殲反賊，路上怕是沒換洗的衣物。」\n他說著將他自己身上那件衣袍解下，掛到了一旁的樹枝上：「我的外袍可以先借你穿。」\n言罷便轉身往林子去了，不知是不是要有意避開。\n樊長玉看著他走遠後，把目光放到了掛在樹枝上的那件衣袍上。\n她頭髮上都沾了不少草泥，猶豫片刻後，終究是過去拿起了那件外袍，躲到了河岸邊一塊巨石後邊，把袍子放到石頭上，又解開自己的頭髮，褪下那一身裹滿泥漿的兵服，整個人都浸入了冰涼的水裡。\n雖已是暮春，夜裡的河水依舊冷得有些浸骨頭，好在樊長玉身體底子好，倒也不怕凍，她洗乾淨那一身泥後，又搓洗起自己一頭長髮。\n岸邊傳來了柴禾燃燒的「噼啪」聲，她偷偷從巨石邊上看過去，發現謝徵背對著她坐在火堆前，顯然方才去林子裡，應該是去找柴禾的。\n樊長玉盯著他看了一會兒，發現他從始至終都沒有轉過頭來，洗乾淨頭髮後，便哆嗦著起身，擰乾頭髮拿起搭在巨石上的袍子往身上裹。\n系衣帶時樊長玉才發現了問題，這袍子對她來說太大了，便是系好了衣帶，領口也是大敞的。\n她皺了皺眉，乾脆把自己洗乾淨後的兜衣用力擰乾水分，穿到了裡邊，再裹上那件外袍。\n做好這一切，她才從巨石後邊走了出去，蹲到河邊洗自己糊滿了草汁和泥漿的兵服。\n謝徵約莫是聽到了動靜，轉頭向她看來，問：「你不先把頭髮烤乾？」\n樊長玉想著先把衣服洗完了拿過去烤乾，道：「我不冷。」\n身後有腳步聲傳來，快抵達身前時，她抬眼一看，謝徵卻是直接越過她，赤著上身跨進了河裡。\n樊長玉皺眉問：「你要洗澡？」\n謝徵瞥她一眼，說：「你過來之前，我在這裡鳧水。」\n言罷整個人如一尾銀魚探入了水中，不出片刻，便遊到了河岸下方好幾丈遠的地方。\n看他這意思，是要繼續在河裡鳧水？\n樊長玉想著自己在河岸邊洗衣服，他在河中間遊泳，應該也算互不幹擾，便埋頭繼續洗自己的衣物。\n身前的水紋突然有了波動，樊長玉抬頭一看，便見謝徵抓著一尾魚從水裡鑽了出來，濺起的水花撲了樊長玉一身，他烏髮和精緻的下顎都往下墜著水線，像個少年人一般朗聲笑道：「有魚吃了！」\n他手上那條魚也掙扎得厲害，一直拼命煽動魚尾，濺了不少帶魚腥味的水珠子到樊長玉臉上。\n樊長玉只得別開臉，又拿袖子擋在跟前，無奈又有些好氣地道：「你先把魚拿開！」\n原本收攏的衣襟，卻因為這抬手的動作，寬大的領口又散開來，樊長玉幾乎是瞬間就感受到了一陣涼意。\n身前的人也一下子禁了聲，直愣愣盯著她，魚從他手上掙脫出去，砸入水中濺起的水花揚了他一臉他似乎都沒反應過來。\n樊長玉意識到不對低頭一看，就見外袍領口大敞，她裡邊那件兜衣又是溼的，緊貼著她身體裹出圓潤的弧度，隱約還能瞧見一點豆子似的凸起。\n她臉上瞬間紅得要冒煙，想也沒想抬腳就踹了出去，大罵：「臭流氓！」\n謝徵被她當臉一腳踹進河裡，毫無防備地嗆了一口水，半天沒能爬起來。\n樊長玉羞憤交加，一開始還以為他裝的，好半天都沒見他浮起來，終於意識到了不對勁兒，衝著水面喚道：「言正？」\n她還是習慣性地喚他言正。\n水面上一點波痕也沒有，樊長玉怕他被自己那一腳給踹暈了，人命當前，頓時也顧不得其他的，把他的外袍往岸邊一扔，就下水去救人。\n片刻後，她把嗆水的人撈起來，扔在岸邊，往他胸口猛按了幾下，見謝徵歪頭吐出一口水，悠悠轉醒，才脫力坐到了一旁。\n她累著了，呼吸聲很沉，但臉上說是面無表情也不為過。\n今天發生的都是些什麼見鬼的事？\n謝徵睜開眼，就瞧見樊長玉只著長褲和兜衣坐在他身旁，溼漉漉的長髮披散著，烏髮和兜衣遮蔽不到的肌膚在月光下白若霜雪，面上的神情說不清是冷漠，還是經歷太多打擊後的破罐子破摔。\n但整個人就是勾在了他心弦上一般，他先是一怔，隨即鼻腔湧上一股熱意。\n反應過來那是什麼，謝徵忙抬起一隻手掩了在鼻前，整個耳朵都紅透，慌忙別開眼，前所未有的狼狽：「抱……抱歉……」\n樊長玉煩躁得想揍人，兇道：「閉嘴！」\n她撿起之前脫在地上的外袍往身上一裹，滿腔悶氣沒處發洩，繼續兇巴巴警告：「你什麼也沒看見！」\n言罷整個人走出老遠，一屁股坐下懷疑人生去了。\n謝徵看看她裹著自己衣袍的背影，又看看河邊還沒洗完的衣物，用冷水給自己澆了一把臉，逼退臉上的熱意後，把她的衣物搓洗乾淨，拿到火堆旁隔著一段距離用樹枝架起來烘烤，又去河裡重新抓了兩條魚，殺好洗淨後用樹枝串起來插到了火堆旁。\n等魚烤好了，他拿過去給樊長玉，斟酌開口：「吃點東西吧。」\n樊長玉裹著他的外袍，似乎還沒從接二連三的打擊中緩過神來，只瞪圓一雙杏眼，再次威脅他：「今晚的事，不準說出去！」`

            num: 90,
            title: `第90章第90章`,
            content: `謝徵微微一哂,反問她：「我能同誰說？」\n樊長玉一想也是，他被自己當臉一腳踹進河裡還沒爬起來，也挺丟人的。\n她看他一眼，兇巴巴道：「反正不準說出去。」\n謝徵再三保證之後,把魚遞過去：「吃魚吧。」\n她看著他手中烤得焦黃冒著香味的魚,剛硬氣說了句「不餓」,肚子就嘰咕叫了一聲。\n樊長玉臉上好不容易降下去的溫度又升了起來。\n謝徵強忍著嘴角上翹的弧度，給臺階道：「我烤多了，吃不完。」\n這時候再犟下去,丟人的就是自己,樊長玉悲憤地伸出爪子接過了那條魚，破罐子破摔道：「這件事也不準說出去。」\n謝徵忍著笑意應了句「好」。\n野外沒有調料，大多時候烤的野味都是聞著香,吃起來卻寡淡甚至帶著腥味,謝徵烤的這條魚,入口非但不腥,隱隱還有些酸酸辣辣的味道。\n樊長玉咬了兩口,便困惑道：「你還帶了調料？」\n謝徵拿起火堆旁沒用完的漿果給她看：「這些野果，有的味酸，有的味辛。」\n樊長玉小聲嘀咕：「你挨個嘗過了摘回來的？」\n謝徵耳力極好,聽見這話只是提了提唇角笑笑,繼續垂眸挑著手上那條魚的魚刺,道：「我十三歲從軍，從前鋒營裡的一個小卒做起,迄今已過八載。就如你之前來這山上時一樣,軍中不是時時都有食物的。最餓的時候,草根樹皮都是果腹的美味,野果自然也是嘗過的，能吃的，都記住味道了，不能吃的，見過袍澤被生生毒死後，自然也不會再碰。」\n樊長玉聽著他說這些往事，吃著魚卻頗有些食不知味了，怔怔抬頭看了他一眼。\n剛知道他就是武安侯時，她只覺他整個人都距自己很遙遠，她們就像是兩個世界裡不該有交集的人。\n此刻方才意識到，那個身份背後，不僅是榮耀，還有旁人未曾嘗過的苦。\n戰場的殘酷，她是切身體會過的。\n十三歲從軍，那年紀比武三斤還要小些，這麼些年，他一路摸爬打滾過來，其中各種心酸，也只有他自己才知曉了吧。\n心口籠上一層複雜的情緒，樊長玉低下頭，也悶不吭聲地挑起魚刺。\n一條被挑乾淨了刺的魚，包在洗乾淨的野芭蕉葉裡了遞過來，謝徵拿過她手上那條，說：「吃這條挑好了的。」\n樊長玉捧著切割好的一小片芭蕉葉，卻遲遲沒有開動。\n謝徵挑魚刺的動作微頓，抬眸看向她，問：「怎麼了？」\n樊長玉說：「言正，我還是叫你言正吧，你別對我這麼好，你是堂堂侯爺，是大胤百姓心中的蓋世英雄，能同你登對的，得是知書達禮的世家貴女。我只是一個四書都還沒讀完的粗鄙邊鎮女子，我配不上你的。」\n謝徵垂眸繼續剔魚刺，似乎笑了笑：「可天下這麼多女子裡，我只心悅你一個啊。」\n樊長玉怔住，這是謝徵頭一回這般直白地同她說自己的心意，她心口不受控制地狂跳了幾下，隨即湧上來的就是無盡澀意。\n她說：「你別喜歡我，你軍功蓋世，弱冠封侯，你應當娶個門當戶對的妻子，一輩子都敞敞亮亮，受萬人景仰。」\n謝徵把剔完了刺的魚遞過去，說：「我坐到這個位置的，靠的是軍功，不是世人的景仰。何況這天底下，本就有敬我者，也有憎我者。敬我，是因我殺退北厥蠻族，奪回失地。憎我，是懼我殺人如麻。半生戎馬換這一世聲名，娶妻還要懼世人眼光，我這武侯當的未免太窩囊了些。」\n他盯著樊長玉：「沒遇見你前，我的確是想娶個世家出身、心性剛強的姑娘，相敬如賓過一輩子。我若戰死沙場，她帶著孩子，靠著家業也能好好活下去。」\n「遇見你後，我便沒想過戰死沙場的事了，我怎麼會死呢？」\n他笑了聲，枕著手臂躺了下去，望著碎了滿天星子的蒼穹：「等打完仗，我便奏請封疆遼西，只要守著蠻子不再南下，京城的紛爭便都與我無關了，再請小皇帝賜婚，八抬大轎敲鑼打鼓把你娶回去，讓全天下的人都知曉你嫁我了。」\n他臉上那份少年人一樣的意氣和歡喜，讓樊長玉心口像堵了一團溼棉花似的，潮乎乎的，讓她眼眶都跟著有了澀意。\n「你還沒看過燕山的日出，也沒見過徽州的獵場，到時候我都帶你去，遼西這麼大，不會悶著你的。」\n「可你總是拒絕我，怕與我身份不匹配，明明我一無所有的時候，你都不懼跟我在一起的。」他依舊望著穹頂，像是自嘲笑了笑：「人終其一生，生不帶來死不帶去，不過是被那半世虛名匡住了手腳，你覺得於你我之間是隔閡的東西，其實什麼也不是。」\n「你說我能遇見更好的姑娘，你又怎知，對我來說，你不是那個最好的姑娘？」\n樊長玉張了張嘴，卻覺得嗓子裡啞痛得厲害，以手掩面，眼中溼意溢了出去。\n謝徵坐起來幫她擦淚，說：「同你說這些，不是故意惹你哭的，只是想告訴你，我心悅你，不為旁的什麼，只因你是樊長玉。我自小喪父喪母，家中沒個長輩，也沒有姊妹，你擔心的那些，我一開始不是很懂，後來問了旁人，倒也明白其中利害了。」\n「不管你懼不懼人言，畏不畏往後，我都該先處理好這一切的。我求了我老師收你做義女，就是之前教你讀書還想收你為徒的那位陶老先生，他乃當世大儒，曾任太傅一職。便是沒有我去求那個人情，他也很喜歡你，往後他就是你娘家人。就算你將來嫁的不是我，有他義女這層身份在，也沒人敢輕慢你。」\n說最後一句話時，謝徵垂下了眼，掩住眸子裡的猩意。\n真要有那一天，大抵便是他死後了。\n他死了，也希望她過得好。\n他是捨不得她的。\n他此生唯一擁抱過的太陽。\n但他憎惡成為他母親那樣的人，所以，他盼著她好。\n她在人間散發著她的光和熱，他在地獄裡便也不覺得冷。\n樊長玉死死咬住唇，卻還是沒忍住哽咽出聲，她眼淚大顆大顆往下砸：「我沒你想的那麼好……」\n謝徵抬手幫她拭去眼角滾落的淚珠，溫和道：「你是我此生見過的，最善良，也最勇敢的姑娘，你以為誰都有那魄力上戰場的嗎？」\n他擁樊長玉入懷的時候，樊長玉伏在他肩頭，仍忍不住哽咽。\n爹娘去世後，她帶著妹妹踽踽獨行，突然有人闖入她的生命裡，處處珍視她，惶然與戒備過後，卻還是打破了那片防禦的心牆，蔓延開的除了歡喜，還有酸澀。\n謝徵輕拍著她後背，道：「你爹娘的仇，我也會幫你報的。」\n聽到跟爹娘的死有關的，樊長玉直起身來，胡亂用袖子抹了一把眼說：「我爹娘的仇，我自己替他們報。」\n想到先前去薊州府庫查卷宗，也沒能查到什麼線索，樊長玉忽而看向謝徵：「你是不是知道殺我爹娘的是誰？」\n謝徵緩緩點頭。\n樊長玉抿唇問：「是誰？」\n謝徵吐出兩字：「魏嚴。」\n樊長玉先是一愣，想起民間皆知的他和魏嚴的關係，問：「你舅舅？」\n謝徵神色微冷，說：「他不配。」\n怕自己的臉色嚇到樊長玉，又解釋了句：「我曾同你說的，我那個很厲害的仇家，便是他。」\n樊長玉卻是明顯有些困惑了：「魏嚴是當朝宰相，我爹一個走鏢的，魏嚴為何要殺他？」\n謝徵看了她一會兒，終究是說出了實情：「你爹曾替魏嚴做事。」\n樊長玉滿眼錯愣，但回想起樊大出事時，樊老頭同自己說的，爹爹並非是樊二牛，而是在幼年被他們賣掉後，十幾年後自己找回來，繼續用樊二牛這個身份在臨安鎮上生活的，便也清楚謝徵說的，極有可能是真的。\n魏嚴做了不少惡事，爹爹從前也是跟著作惡的嗎？\n樊長玉心口一下子揪緊了。\n發現她一直在出神，謝徵似猜到她所想，道：「薊州牧賀敬元也替魏嚴做事，卻從未魚肉過百姓，他能稱你父親一聲故友，想來跟你父親也是志同道合之輩。」\n賀敬元是整個薊州的青天，有了謝徵這話，樊長玉頓覺心底好受了許多。\n她問：「你何時開始查我爹娘的事的？」\n謝徵答：「離開清平縣後。」\n樊長玉一想到那會兒兩人的分別，心底還是有幾分內疚的，再想起自己剛才在河邊還羞惱之下踹了他一腳，愧意更重，說：「我以後不打你了，你也別動不動就親我。」\n謝徵撥弄著火堆的動作稍頓，說：「下手別那麼重就行。」\n樊長玉先是一愣，反應過來他話裡的意思，臉被火光照得有些紅了，瞪他一眼：「我跟你說正經的呢！」\n謝徵鳳眸稍抬，微挑的眼尾天生帶著點睥睨又勾人的味道：「我也跟你說正經的，我什麼時候親你，你才不打我？」\n樊長玉沒忍住，掄起邊上沒裝烤魚的芭蕉葉朝他砸了過去。\n謝徵一偏頭避開芭蕉葉，淺笑出聲。\n樊長玉抱著膝蓋坐在火堆前，氣鼓鼓的，不再理他。`
        },
        {
            num: 91,
            title: `第91章第91章`,
            content: `晨曦透過軍帳灑落到了軍床上。\n長寧睡眼惺忪睜開眼,她昨晚入睡前樊長玉還沒回來，此刻看到長姐就躺在自己身側,睡得正沉,她伸出小胖手揉了揉眼，發現是長姐沒錯後，高興得咧開了嘴。\n她極懂事地沒吵醒樊長玉，把自己身上那件紅絨披風給樊長玉搭上後,手腳並用爬到床尾,穿上自己的鞋子下了床。\n外衣也是自己穿的。\n從前她穿冬衣還要樊長玉幫忙,因為袖子老是往裡縮,被壞蛋抓去過一次後，她穿衣裳鞋襪已經不用別人幫忙了,就是頭髮還不會自己梳。\n長寧抓了抓頭頂的小揪揪，從軍帳角落裡找出洗臉用的小木盆。\n早上起來穿好衣服後是要洗臉的。\n她準備出軍帳，卻又突然吸了吸鼻子，轉頭就尋著香味在桌子上發現了一包用芭蕉葉包裹著的東西。\n長寧踩著矮凳摸到了那片芭蕉葉，搗鼓了一陣才拆開了綁在外邊的棕櫚葉，打開瞧見裡邊是被剃乾淨了魚翅的烤魚，頓時兩眼晶亮，但是阿姐教過她,冷的肉肉不能直接吃，不然會肚子疼。\n她想了想,用棕櫚葉把芭蕉葉重新綁起來，兩手捧著小心翼翼放進木盆裡，再端著木盆,噠噠噠跑出了軍帳。\n要打水洗臉,還要把魚肉弄熱了拿回來和阿姐一起吃！\n長寧不知道去哪裡打熱水,但是昨天謝七對她很好，一直哄著她，還帶她去看隼隼，於是長寧本能地邁著小短腿去找謝七。\n-\n今日大軍開拔，火頭營那邊早早地便開始備白粥饅頭了。\n山腳下的駐軍已經撤走了一批，山上的駐軍是最後開拔的，將士們這才不緊不慢地收拾。\n長寧端著個木盆找過去時，謝七正在同其他親衛一起拆營帳，瞧見人群裡突然擠進來的小不點，他往腰上抹了兩把手，引著長寧走到空地處，半蹲下問她：「是過來看海東青的？」\n長寧一雙眼頓時更亮了，她點點頭，又立馬搖頭，把手上的小木盆往謝七跟前一遞。\n謝七見裡邊用芭蕉葉包著東西，打開一看是魚肉，昨日帶小孩的成就感突然浮現上來了，他摸摸長寧的頭，笑容極其溫和：「你吃，我吃過了。」\n長寧見他沒懂自己的意思，有些急眼了，更用力地把木盆往謝七那邊一懟，說：「冷的。」\n謝七隔著芭蕉葉探了探魚肉的溫度，終於明白過來這小孩找自己的意圖了，接過木盆問：「你想讓我幫你把魚肉熱一熱？」\n長寧趕緊點頭，又指著木盆說：「寧娘要洗臉。」\n鬧了個烏龍的謝七心情複雜把魚肉拿給旁邊的弟兄，讓他們拿去火頭營幫忙熱一下，又從剛打了熱水的水壺裡倒熱水給長寧洗臉。\n他從前照顧過他妹妹，有帶小孩的經驗，本想幫長寧洗臉，卻見她自己把袖子捋得高高的，露出兩截藕節似的小胖胳膊，然後把手按進水盆裡，沾了水往圓嘟嘟的臉上拍，整張臉都拍上了水，才擰起那一塊樊長玉從舊衣上裁下來當洗臉巾的帕子，兩手捧著往臉上抹。\n她擦得很用力，臉都搓得有些紅了，額前細小的絨發沾溼後堆在髮際線處，毛茸茸一片。\n一旁收拾營帳的幾名親衛都看得停下了手中的活兒，不無豔羨地道：「老子這輩子要是能生個這麼可愛的女兒就好了！」\n一名親衛同謝七打商量：「七哥，昨日是你當值，今兒你歇著，我一定把這女娃娃和海東青都照顧得好好的。」\n謝七笑罵道：「滾滾滾！」\n等長寧洗完了臉，謝七才問她：「你阿姐呢？」\n長寧道：「阿姐還沒醒。」\n謝七今早本是要去給這兩姐妹送飯的，但是天剛蒙蒙亮的時候，侯爺一身晨露從外邊回來，交代他晚些時候再過去。\n謝七也沒多想，只當是侯爺體恤夫人，畢竟聽謝五說，夫人在戰場上殺敵甚勇，累著了想多睡會兒也是請情理之中。\n他讓長寧坐到一盤的小木墩上，拆掉她睡得半散的揪揪，給她重新紮了頭髮。\n畢竟是從前帶過妹妹的人，不得不說，扎頭髮的手藝還是有的，紮好揪揪後，謝七還扯了兩朵橘黃色的野花給她插到揪揪上。\n把長寧給美得，蹲在臉盆邊左照右照，看了好半天才準謝七把水倒掉。\n等火頭營那邊熱好了魚，還順帶送了兩碗粥和兩個饅頭過來，謝七見長寧一個人拿不走，便幫她拿著這些東西送她回去。\n正好樊長玉聽到軍營裡拔營的角聲，已醒了過來，發現長寧不見了，潦草收拾一番後正要出門找呢，就瞧見長寧蹦蹦跳跳地跟著謝七回來了。\n長寧見了她，蹬蹬蹬跑過去，抱著樊長玉的腰仰起頭，獻寶一樣道：「阿姐，看寧娘的頭髮！」\n樊長玉看到了她揪揪上的兩朵小花，捏了捏她鼻子問：「一大早跑哪兒去了？誰給你扎的好看揪揪？公孫先生嗎？」\n長寧喜滋滋道：「不是，是小七叔叔。寧娘自己洗的臉，小七叔叔幫忙熱好了寧娘拿過去的魚肉。」\n站在一旁的謝七忙喚了聲：「樊姑娘。」\n樊長玉見他一手拿著臉盆一手拿著包魚肉的芭蕉葉，客氣道：「有勞小七兄弟了。」\n謝七隻說是應該的。\n樊長玉留他用飯，他一再婉拒，言自己吃過了。\n樊長玉便讓長寧先去帳內吃東西。\n長寧坐在板凳上，聞著烤魚誘人的香氣直吸鼻子，但她固執要等樊長玉，沒動筷，只晃悠著兩腿問：「阿姐，哪來的魚啊？」\n樊長玉隨便打了盆冷水洗臉，道：「昨夜睡不著，去河邊抓的。」\n長寧語出驚人：「姐夫烤的嗎？」\n樊長玉擦臉的動作一僵，立在一旁的謝七則瞬間瞪大了眼。\n侯爺昨晚出去了，今晨才回來，樊姑娘昨夜也出去了？聯想到今晨侯爺交代的話，謝七突然整個人都不自在了起來，也不敢看樊長玉，只垂著眼假裝自己是根柱子。\n樊長玉問長寧：「為什麼會覺得是你姐夫烤的？」\n長寧一五一十地道：「之前阿姐還沒找到寧娘，姐夫給寧娘烤魚吃，就是這個味道。」\n樊長玉一點也沒有哄騙小孩良心過意不去的自覺，說：「是我烤的。」\n想到昨晚謝徵說的那些話，心底的不自在更重了些，她用力咬了一口手上的饅頭。\n……\n用過早飯，山上的駐軍也開始往山下撤了。\n樊長玉收拾好姐妹二人的東西，幫著謝七等人拆掉軍帳，待下山時，被安排到了一輛馬車上。\n車內的老者鬚髮皆白，只著一身布衣，臉上每一道褶子都極深，卻又讓人覺著，那深深的褶子裡，全是歲月賦予他的智慧與通達。\n車內擺著棋盤，他似在同自己對弈，發現車簾打起，一雙蒼老的眼才往外掃來，笑道：「丫頭，又見面了。」\n樊長玉昨晚已從謝徵那裡知曉了這老者的身份，卻還是習慣性地喚他一聲：「陶老先生。」\n長寧看他鬍子、頭髮全白完了，人卻極精神，半點沒有尋常老人的龍鍾老態，像極了畫上的聖賢或孔子廟裡的雕像，指著他向樊長玉驚奇道：「神仙爺爺！」\n一雙葡萄眼瞪得溜圓。\n陶太傅被這句童言逗樂，「大丫頭是個憨的，小丫頭倒是嘴甜。」\n說著就向長寧招手道：「小丫頭過來讓爺爺看看。」\n長寧仰頭看樊長玉，在生人面前，不管對方多親切，她都會等樊長玉同意了才過去。\n樊長玉摸摸她的頭笑道：「過去吧。」\n長寧被抱上馬車後，這才到了陶太傅跟前。\n陶太傅打量著她的眉眼，原本和藹的神色中忽而多了幾分鄭重，再細看樊長玉的眉眼，捋須道：「小丫頭是個有福的，你阿姊護你前半輩子，才有了你後半輩子的大貴。」\n長寧不太能聽懂陶太傅的話，只挺胸仰脖說：「寧娘最喜歡阿姐！」\n樊長玉一直都擔心長寧的身體，她有時候會突然喘不上氣來，這些年一直喝藥調養，也沒見太大起色，聽陶太傅說了這話，倒是有些高興，問：「陶老先生還會看相？」\n陶太傅只道：「活到這把歲數，雜書也看過不少，多多少少懂些。」\n樊長玉道：「我妹妹打娘胎裡生下來就體弱，還有喘鳴之症，我只盼她能一直健健康康的。」\n陶太傅沉吟一番後道：「往後的命格太富貴了，壓不住，身子骨自然會弱些，有你替她鎮著，不是什麼大事。」\n這神神叨叨的話，聽得樊長玉愈發雲裡霧裡的，她撓了撓頭，想問又不知從何開口。\n陶太傅看出她的疑慮，換了個說法道：「她及笄前，你一直把她帶在身邊就是。」\n這個說法樊長玉聽得懂了，她點頭道：「自然。」\n馬車已隨大軍下山，上路不平，車廂裡搖搖晃晃的，陶太傅擺在棋盤上的棋子卻連一顆都沒錯位。\n他看向樊長玉：「丫頭，陪老夫下一盤棋吧。」\n樊長玉有些尷尬地道：「我不會。」\n山風從窗口灌進馬車裡，吹得陶太傅廣袖飄飄，他捋須道：「老夫親自教你，你且看個一兩局，還能不會？」\n老人家話都說到這份上了，樊長玉只得應下。\n她收棋子的時候，才發現那棋子似被一股吸力吸著緊貼在棋盤上的，難怪馬車晃成這樣，棋子都沒滾落出去。\n「棋局上，講究黑子先落，整盤棋都是靠氣而活的，黑白雙子廝殺，奪的便是對方的氣……」\n陶太傅嗓音蒼老而渾厚，乾瘦的手指在棋盤上一邊落子一邊講解，樊長玉聽得一知半解，抓著頭髮連蒙帶猜落子。\n幾局過後，陶太傅臉都綠了：「你好歹也算是老夫手把手教出來的，一手棋怎麼臭成這樣？」\n樊長玉垂著腦袋乖乖挨訓。\n陶太傅氣完，又兀自嘆了聲：「罷了罷了，古有尉遲敬德那樣的臭棋簍子，不也照樣能掛帥領兵，排兵布陣和下棋終究不可混為一談。」\n他說著，斜樊長玉一眼：「丫頭，我聽聞你殺了反賊大將石虎，那可是個勇冠三軍的人物。你雖為女子，可這麼一身好本事，若是埋沒了，終究可惜了，想不想建功立業？」\n樊長玉道：「老先生是想問我願不願留在軍中？」\n陶太傅點頭：「老夫醜話說在前頭，有人求到老夫跟前，想老夫收你做義女。只收個女兒，對老夫來說不算什麼，但想學老夫這一身本事……」\n他哼笑一聲：「那可就難嘍！」\n他看著樊長玉，問：「丫頭願不願拜老夫這個師，學那沙場上的萬人敵？」`
        },

            num: 92,
            title: `第92章第92章`,
            content: `滾滾車轆聲裡,樊長玉沉默了好一陣，才問：「我留在軍中，以後就得殺很多很多人了,是不是？」\n她抬起眼,映著車窗外天光與山川的眸子裡，多了幾分沉寂,「老先生,我其實一點也不喜歡殺人。」\n「昨日在戰場上,我看到好多張惶然又恐懼的臉,他們像地裡的南瓜一樣任人砍殺。長信王反了，這仗打到現在，死的最多的卻是底下那些小卒。他們也不是自願上戰場的，只是當逃兵立馬就會被斬立決，妻兒父母也在崇州城內,所以無路可退。」\n「我知道反賊該死，但對著戰場上那樣一張張茫然惶恐的臉,我下不去手。」\n「他們也是大胤人，若是沒有這場戰爭，他們也和尋常百姓一樣，或是在田地裡種莊稼,或是在走街串巷賣貨掙幾個錢補貼家用。」\n「看到他們,我就想起了因盧城之困,薊州府從民間抓去充軍的那些人。他們可能也是這樣,如螻蟻一般死在了戰場上。」\n陶太傅有些意外地看著她，道：「你所思並無錯，上位者為了野心，何以不仁,視天下人為芻狗？可已經有了不仁之師，若是不加阻止，是不是任其釀成更大的災禍？」\n見樊長玉似有不解，他問：「丫頭，你告訴我，你為何會在雨夜橫翻巫嶺去截殺那三名斥侯？」\n樊長玉抿唇道：「您說過，他們把消息帶回去了，遭難的就是整個盧城的百姓。」\n陶太傅點頭：「你殺那三名斥侯，是覺得他們的生死，會關係到整個盧城百姓的生死。可如今跟反賊打的這場仗，不也是為了天下百姓嗎？長信王造反，崇州周邊多少百姓流離失所？若任其壯大下去，將來繼續揮師南下，又會有多少百姓繼續受這戰亂之苦？」\n「你截殺斥候，是為救盧城軍民。朝廷大軍誅長信王，也是為救天下百姓。」\n「哪怕如今的朝廷沉痾積弊，那也該去變革，去反魏，官場上鬥去，而不是挑起戰事，置百姓於水火。吃不飽穿不暖和沒得吃沒得穿比起來，孰輕孰重，丫頭，你明白嗎？」\n樊長玉聽著這些，只覺心口愈發沉了下去。\n陶太傅繼續道：「長信王手中的軍隊便是他南下的一把刀，捨不得折了他那把刀，死在刀下的便是更多無辜亡魂。」\n「自古徵戰，便沒有不流血，不死人的。」\n「那黃沙戰場裡埋的，有數不清的忠骨，也有你口中那樣被迫上戰場的枉死者，但正是歷朝歷代都會有去阻止那不仁之師的忠骨，四分五裂的天下，才能又重新迎來安穩。」\n「兵法奇謀，也不是用來殺人的，而是以儘可能少的傷亡去結束戰爭。」\n樊長玉從馬車坐榻上起身，跪下鄭重向著陶太傅一揖：「長玉謝先生教誨。」\n陶太傅笑吟吟看著她：「你這丫頭，還是只願叫老夫一聲先生啊？」\n樊長玉就地磕了三個響頭，端起一旁木質茶杯裡的茶水遞向陶太傅：「老師。」\n陶太傅接過茶杯，眼角的褶子都笑得更深了些，道：「你這丫頭合老夫的眼緣，老夫也願收你做個義女，往後喚義父吧。」\n樊長玉又喚了一聲：「義父。」\n這回陶太傅臉上是真快笑出朵花來，抿了一口茶後《侯夫人與殺豬刀》,牢記網址:m.1.放下道：「既做了老夫的女兒，老夫替你取一字，你寅年生，肖虎，『長玉』此名端方溫澤，已壓了其中銳氣，空有虎膽，將來若上戰場，可不是好事，便取字『山君』如何？」\n樊長玉困惑道：「是山中君子的意思嗎？」\n陶太傅捋須笑道：「單以字譯，倒也可做此解。但山君，也作山中猛虎也。」\n自古以來只有男子才能得長輩取字，有的女子甚至到出嫁才有一個自己的名，出嫁前便只按姓氏和家中排行喚某幾娘。\n陶太傅這般用心替她取一字，樊長玉自是感激的，懇切道：「謝義父取字。」\n長寧眨巴著一雙黑葡萄大眼：「寧娘也要！」\n陶太傅搖頭失笑：「你這娃娃年歲還太小了些，且再等個幾年。」\n長寧癟著嘴不太高興，伸出小拇指道：「那咱們拉鉤鉤，不許騙寧娘。」\n陶太傅難得開懷，蒼老的手指和長寧碰了碰，笑著道：「行，老頭子且欠你這小女娃一字。」\n拉了鉤鉤，長寧這才滿意了，脫了鞋子踩在馬車坐榻上，扒著車窗往外看，瞧見低空掠過的海東青時，指著海東青興奮得直叫：「是隼隼！」\n樊長玉怕她摔著，一隻手扶著她。\n陶太傅同樊長玉道：「你想來也知道我那學生是誰了，你願留在軍中的事，我回頭便告與他了？」\n樊長玉卻道：「義父，我想留在薊州軍中。」\n陶太傅抬起皺巴巴的眼皮看過來，問：「不去他麾下，是為與他避嫌？」\n樊長玉道：「算是原因之一，尋常將士的軍功，也是一刀一劍從戰場上拼殺來的，有些路，我想一個人去走試試，能走多遠算多遠。」\n去謝徵麾下，不管他多麼鐵面無私，可一旦真正涉及危險，想來他都不願她去的。\n既決定了走這條路，樊長玉想自己去淬鍊一場。\n陶太傅卻笑了起來：「老夫果然沒看錯你，正好你在水淹盧城一戰中立了功，當日領兵修大壩的便是盧城守將唐培義，此人乃忠義之士，你去他麾下，也不算埋沒。」\n樊長玉心中五味陳雜，道：「多謝義父。」\n陶太傅笑道：「謝老夫作甚？你有這一腔志氣，老夫心中甚慰。」\n馬車繼續在山道上蜿蜒前行。\n樊長玉看向窗外，一場驟雨後，晴空萬裡。\n蒼鷹掠過蒼穹，一聲鷹唳清亮悠遠。\n-\n謝徵得知樊長玉從軍，卻入了薊州軍籍的事，已是兩日後。\n大軍還有半日的路程就能和抵達崇州，派去追擊隨元青的那支軍隊卻傳信回來，隨元青逃回了長信王妃娘家康城，只憑那五千騎兵，拿下康城無望。\n為今之計，只能兵分兩路。\n賀敬元率領的薊州大軍已至崇州城下，如今已困死了反賊，崇州城破只是早晚的事。\n朝廷那邊還卡著軍餉軍糧，賀敬元是魏嚴的人，這時候只要謝徵放權，朝廷那邊的錢糧就能撥下來，至於拿下崇州後的軍功最後落入誰手，便是李家和魏嚴的鬥法。\n而他放權後，未免被穿小鞋，去圍康城便是再好不過的退路。\n謝徵和公孫鄞一眾謀士再三合計後，還是決定去攻康城。\n燕州軍改道前往康城，前來支援的那支薊州軍，卻得繼續前往崇州。\n謝徵這兩日處理軍務政事忙得抽不出身，每日只能聽親衛匯報樊長玉的行程，得知樊長玉一路上幾乎都在陶太傅車上，不是跟著學下棋便是看書，時常氣得陶太傅吹鬍子瞪眼，想到自己這位老師的脾性，謝徵唇角往上揚了揚。\n然而這日兩軍分道後，謝徵尚在同公孫鄞商議抵達康城後的攻城之法，謝五便火急火燎趕了來：「侯爺！不好了！夫人和陶太傅跟著薊州軍走了！」\n謝徵從輿圖上抬起一雙冷淡的眸子，皺眉問：「怎麼回事？」\n謝五拿出一封信遞給謝徵：「這是陶太傅讓我轉交給侯爺的。」\n謝徵長指接過，拆開看後，面上瞬間覆上一層霜色，眼底隱約可見戾氣，寒聲道：「備馬！」\n公孫鄞見他臉色難看成這樣，問：「信上寫了什麼？」\n但親衛牽來戰馬後，謝徵已翻身上馬揚鞭離去，公孫鄞只能撿起被謝徵扔到地上的信紙自個兒看了起來，看完後也輕「嘶」了一聲：「這一老一小的，是要活活把他氣死？」\n隨即又摸著下巴道：「不過……太傅都知道崇州戰果會引得魏嚴和李家相爭了，卻還同意那姑娘去薊州從軍，興許也不是壞事？」\n李家若真扳倒了賀敬元，李家又無擅掌兵之人，也萬不敢讓薊州兵權再落回謝徵手中，這時候就得一個能擔大任者來穩住薊州的兵權。\n樊長玉有殺石虎之勇，兵法謀略上又有陶太傅相助，指不定真能在薊州成一番氣候。\n-\n樊長玉抱著長寧坐在馬車上的時候，就覺得右眼皮一直跳，她看了看窗外，抬手捏捏眉心。\n閉目假寐的陶太傅忽而掀開眼皮道：「從中午到現在，你一直坐立難安的，後悔沒給他說一聲？」\n樊長玉道：「義父已在信中代為說清楚了。」\n陶太傅哼笑兩聲：「那小子的狗脾氣算是被你摸清楚了，你要是當面同他說，只怕他綁也得把你跟他綁一塊。」\n樊長玉低頭望著自己腳尖，尷尬不說話。\n原本平緩行駛的馬車忽而受阻一停，樊長玉坐在車廂裡都感覺整個人一個踉蹌，長寧若不是及時被她護著，險些磕碰到額頭。\n外邊一片戰馬嘶鳴聲。\n陶太傅就沒那麼好運了，後腦勺正巧磕在車壁上，他罵罵咧咧道：「定是那臭小子來了！」\n他話音方落，跟前的車簾就被打了起來，謝徵那張寒氣森森的俊臉出現在車門處，黑漆漆的眸子裡一絲情緒也無，盯著樊長玉道：「你自己出來，還是我抱你出來。」\n陶太傅捂著後腦勺斥道：「你這逆徒，是要弒師不成？」\n謝徵黑眸轉向他，陶太傅裝腔作勢的氣勢瞬間一弱，心虛別開眼。\n謝徵道：「學生求老師收學生心上人為義女，老師一聲不吭帶著人走了，是不是該給學生一個解釋？」\n陶太傅嘟嚷道：「不是給你留了信嗎？」\n只是沒想到那封預料中的今晚才會被他看到的信，這麼早就落到他手上了，還讓他追了上來。\n一陣沉默的樊長玉忽而抬起頭看著謝徵道：「我跟你走一趟。」\n她把長寧放到馬車上，對陶太傅說：「勞義父幫我看著些寧娘。」\n長寧一看到謝徵這副臉色就有些害怕，拽著樊長玉的衣角不肯撒手，小聲喚道：「阿姐。」\n樊長玉摸摸她的頭，安撫道：「別怕，阿姐去去就回。」\n言罷就把她抱給了陶太傅，她自己剛打起車簾，還沒跳下馬車，就把一隻大手直接給提溜到了馬背上。\n後背抵上他胸膛的剎那，樊長玉便覺著他喘得像一頭壓抑著盛怒的野獸。\n他狠夾馬腹跑了出去，不過瞬息就把薊州軍的隊伍甩在了後邊，樊長玉察覺那是去和燕州軍匯合的路，冷靜同他道：「我是一定要去薊州從軍的。」\n他並未著戰甲，樊長玉能明顯感覺到他渾身的肌肉幾乎是瞬間就絞緊了。\n他狠狠一掣韁繩，戰馬嘶鳴一聲停了下來，她被拽下馬背，死死摁在道旁一顆一人合抱不過來的大樹上。\n手上的力道兇狠如斯，他眼底甚至因極致的憤怒而迸出血絲，瞧著整雙眼都有些紅了，問她的嗓音卻又顯得格外風輕雲淡，還帶了點笑意：「我就這麼讓你噁心？寧願去薊州從軍都要離我遠遠的？」`

            title: `第93章第93章`,
            content: `山風吹得林稍的樹葉譁啦作響,身前的人微低下頭凝視著自己，一人相隔不過半尺的距離，說話時連彼此的呼吸聲都清晰可聞。\n樊長玉望著眉眼都透著一股戾氣的人，本能地覺得危險,他按著自己肩膀的力道實在是大,她試著掙了一下,非但沒掙脫，反讓他抓得更緊，骨頭都有些隱隱作疼了。\n她蹙眉道：「你在胡說什麼？」\n謝徵寒聲問她：「你不是要前往薊州從軍？」\n樊長玉說：「我是要去從軍,但不是你想的那樣。」\n謝徵氣到極致,反笑出了聲來：「不是我想的那樣,為何還怕我知道,一聲不吭地就走？」\n樊長玉望著他兇戾發紅的一雙眼，心中升起幾分愧意，不告而別的確是自己欠缺考量,但有些事,當著他的面,她的確不知道怎麼開口。\n她微抿了下唇,說：「對不起。」\n謝徵看著眼前這總是一臉坦誠，連謊都不會撒的姑娘，有一瞬掐死她的心都有了，他緊攥著她肩膀的手在發抖，面目有些猙獰地把人按進了自己懷裡，不想讓她看到自己更為猙獰可怕的一雙眼。\n幾乎是咬牙切齒道：「樊長玉，你該在走之前先捅我兩刀，讓我傷得下不了地才好。」\n黑色的怒意在心口翻滾，那深藏在骨子裡的、恍若天底下只剩他一人的惶恐感從骨隙裡鑽出來,一點點滲進血肉裡，讓他緊擁著她的手都止不住地痙.攣。\n什麼驕傲、什麼強硬，都像是太陽底下的薄冰一樣碎裂開來。\n為什麼就不願意跟他在一起呢？\n為什麼所有人都不要他？\n當年那個女人是，如今她也是。\n她覺得是他們之間的阻隔的一切，他都在解決了。\n可她還是不要他！\n他把整顆心刨給她，她都不屑一顧！\n有一瞬謝徵覺得他好像不是自己了，因為他控制不住自己的身體，他看到自己低下頭去，隔著衣物，發狠地在樊長玉肩膀處咬了一口。\n樊長玉吃痛，悶哼出聲，他齒關卻仍在收緊，鳳眸裡漫開一層血色，雙臂緊扣著懷中的人，任她如何掙扎都不曾鬆動分毫，仿佛是野狼在咬著自己瀕死的獵物。\n樊長玉吃痛罵道：「你發什麼瘋？」\n咬住她的人終於鬆了口，他唇上沾著血，臉色卻有些蒼白，垂眼望著她低喃：「樊長玉，你為什麼就不能喜歡我？」\n這話與其說是在問她，不如說是像乞求。\n淺風吹動他凌亂垂落在額前的碎發。\n那一刻，他面上的神情竟是前所未有的脆弱。\n樊長玉面上的怒意一滯，印象裡的謝徵一直都是高傲的，何時有過這般低到塵埃裡的模樣，她心中一軟，嘆了口氣說：「我怎麼不喜歡你呢？」\n她抬手摸了摸他的頭髮，眸光溫和又堅定：「我要是不喜歡你，就不會來找你了，也不會怕你死，就替你上戰場。」\n她的手落在他發頂，他身上的戾氣便消散了大半，怔怔看了她片刻，自嘲地彎起唇角：「你喜歡的那個人，是你以為的言正。」\n樊長玉沒料到他也會突然鑽了牛角尖，她說：「你是言正時，我喜歡你。你是謝徵，我也喜歡你啊。」\n「你一無所有，我就殺豬養你。你比我厲害得多了，我也在學著變厲害，所以我去從軍了。」\n謝徵徹底怔住，黑眸愣愣地望著她，鴉羽似的的眼睫濃黑而卷翹，在太陽底下毛茸茸一片，清冷又精緻的一張臉，竟透出幾分乖巧來。\n像是從未得到過糖果的孩童，有一天突然被人給了一顆糖，第一反應不是欣喜，而是錯愣和茫然。\n好一陣，他才審視般看著她道：「你這是在哄我？」\n樊長玉氣結，可見他這般，又止不住地有些心疼。\n她一直以為，他是天之驕子，要什麼就有什麼，但這一刻忽而又覺得，他所擁有的，仿佛寥寥無幾。\n所以每失去一樣，都像是硬生生從他血肉中剝離出來，能讓他丟了半條命。\n她道：「不是哄你，我只是告訴你，我也是喜歡你的，不管你是言正還是謝徵。」\n「我曾回絕你，是覺得我們在一起不會有好結果。因為你是言正時，我們要愁的，不過柴米油鹽，但你能抄書寫時文賺銀子，我也能殺豬賣豬肉掙錢，遇到什麼難處，彼此扶持著，也就跨過那個坎兒了。」\n「可你是武安侯時，你遇到任何一點難處，我都不知道怎麼幫你，你在忙什麼愁什麼，我也不懂。我娘說，夫妻這輩子，互相體諒、互相扶持才能過得長久。那些成了怨偶的，大多都是還沒遷就完一輩子，就已磨光了昔日情誼。」\n「我想一刀兩斷的，但你跟我說，以後一起去燕山看日出，去徽州打獵，怕我受欺負，請陶老先生收我做義女，我不是個石頭做的人，我也會難過，會捨不得的。」\n「我不知道選這條路，將來會不會後悔，但至少眼下我願意放手去搏這一場。」\n她神色認真地看著他：「我會成為和你一樣的人，堂堂正正跟你在一起。」\n烈日當空，謝徵黑漆漆的眸子裡卻沒照進一絲亮光，只映出樊長玉的影子，像是一團濃墨，要將她徹底吞噬進去。\n他用力擁她入懷，嗓音沉而啞：「無論你以怎樣的身份跟我在一起，都是堂堂正正。」\n樊長玉說：「我要去找的，是一份能和你一直並肩走下去的底氣，這份底氣，不在於你對我的感情深厚，而在於我自己。鷹隼那般厲害，也不能馱著另一隻鷹一起飛不是？」\n謝徵聽懂了她話裡的意思，但正是懂了，他薄唇才抿得更緊，他直起身道：「戰場不是兒戲，稍有不慎就會丟掉性命，縱是有一夫可敵萬夫之勇，也總有意外發生的時候，我不會讓你去涉險。」\n沙場上能帶來軍功，但埋在黃沙之下的，是累累白骨。\n樊長玉看著他說：「我也是怕死的，我捨不得寧娘，捨不得你，但我自己不去走這條路，往後或許也會有人逼著我入險境。我到現在還記得在臨安鎮時，家中的那兩場刺殺，我從來不知道我的仇人竟是那般權勢滔天的人，你曾經都險些命喪他手。」\n「比起被當成個花瓶瓷器小心保護起來，一朝落地就摔個粉碎，我更願意去練出一身銅皮鐵骨。我說了，我是想跟你並肩同行的，那也是我的仇人，為了爹娘的大仇，我也理應如此。我喜歡你，但不能餘生都依賴你，否則那就不是我了。」\n謝徵無法反駁她這些話，終究是做了讓步：「就在燕州軍中不好麼？」\n樊長玉道：「那同之前在山上也沒什麼區別了。」\n一人對視著，一人鳳目隱忍沉寂，一人杏眸清明澄澈。\n最終謝徵鬆了口：「好，你可以去薊州從軍，但要帶上謝五和謝七。」\n樊長玉知道這已是他能做出的最大的讓步了，點了頭，隨即又道：「送我回去吧，不然陶老先生和寧娘得等得急了。」\n她還不習慣喚陶太傅義父，轉身要往正吃草的大黑馬那邊走，卻被攥住了一隻手。\n她有些困惑地看了他一眼：「言正？」\n細碎的日光從樹冠葉縫間灑落下來，在青年發間、冷玉似的臉上，都綴出斑駁的光影。\n他漆黑的瞳仁鎖著她，一句話沒說，卻又似在無聲向她討著什麼。\n樊長玉沒懂他的意思，又問了句：「怎麼了？」\n他緩緩道：「你說，你喜歡我的。」\n樊長玉先是一愣，對上他的視線，想到他從前對自己做過的事，突然有些明白他話裡的意思了。\n這種事情，他對她做過很多次了，她卻還是頭一回。\n跟上一次他在病中，他吻她眼皮後，她懵懵懂懂回親了他額頭一記不同。\n那時她沒做多想，只覺跟在長寧臉上吧唧一口差不多，這次因為明白那是什麼意思，她什麼都還沒做，只是被他看著，心跳都有些怦怦的，像是胸口揣進了一隻小鹿。\n她沒見過別人是怎麼親的，但謝徵每次吻她，都是直接壓下來。\n所以閉不閉眼這種問題，不在樊長玉考慮之內。\n她身量在女子中算高挑的，謝徵卻仍高出她大半個頭。\n她緊繃著臉，踮起腳飛快地在他形狀好看的唇上碰了一下。\n跟謝徵每次親完她，她唇上只剩又腫又痛的觸感不同，樊長玉意外地發現他唇挺軟的。\n那她之前嘴巴為什麼會那麼痛？\n難不成是因為被咬的？\n這個想法一冒出來，樊長玉只覺君子報仇，機不可失，肩膀上的牙印還痛著，她不客氣地也在他唇上咬了一下。\n力道不是很重，但她明顯感覺到身前的人呼吸一頓。\n樊長玉見好就收，趕緊退開道：「好了，回去吧……」\n謝徵似乎也還沒回過神來，面上有片刻的怔愣，濃長的黑睫微顫，他本就是漂亮禁慾的長相，因為久經沙場，又居高位，一身上位者的氣度，平日裡才只讓人覺著威嚴不可逼視。\n他罕見地露出這樣的神情，少了幾分凌厲霸道，容貌給人的驚豔感反愈發強烈，樊長玉心口突突狂跳了兩下。\n男人怎麼也能長這麼好看呢？\n謝徵抬手碰了碰被樊長玉咬過的下唇，又看了樊長玉一眼，眸色不明，不知道在想什麼，手指放到唇邊吹出一聲哨響，在遠處吃草的大黑馬倒是很快撒開四蹄跑了回來。\n他翻上馬背後，向著樊長玉伸出一隻手，樊長玉搭上後他輕輕一帶，就把人給拉上了馬背。\n樊長玉好奇問：「這哨音能喚來海東青，也能馭馬嗎？」\n她說著看向他方才吹哨的食指，發現有一圈不知受了什麼傷留下的疤印，像是咬痕，但又比咬痕瞧著還慘烈些。\n身後的人答：「哨音長短、音調高低不同，指令便不一。」\n接下來的一路兩人便沒再怎麼說話，樊長玉偶爾問他一兩句，他答得也很簡單，像是在神遊天外。\n一直到前方緩坡處能瞧見薊州軍的尾巴了，謝徵才突然勒住韁繩。\n樊長玉以為他是怕直接送自己回軍陣中太過招搖，正要下馬，卻被攥住了胳膊。\n她困惑回頭，就發現他漆黑的眸子又一次鎖著自己，明明靠她很近，稍一低頭就能吻上她，卻又沒再往下壓一分。\n意圖再明顯不過。\n樊長玉微微一哽，吻上去的時候，她還在想，為什麼這人想要別人親他時，也是一副想要但死活不肯開口，要是不親，他還能立馬變臉的狗脾氣？`

            num: 94,
            title: `第94章第94章`,
            content: `陶太傅自認為對自己那倔脾氣門生的了解還是夠多的,但樊長玉被他帶走後，他心中突然有些沒底，頻頻往車窗外望去,最後乾脆下車繞著馬車轉悠,時不時又往謝徵帶樊長玉離去的方向看上一眼。\n領兵的小將前來詢問他：「太傅，大軍已就地修整多時了,要不……先繼續趕路？」\n陶太傅背著手望著遠處道：「且再等等。」\n小將便抱拳退下了。\n長寧從車窗裡探出腦袋，將下巴擱在窗沿處，問：「爺爺，我阿姐什麼時候回來啊？」\n陶太傅這會兒心裡也突突的，顧不上糾正長寧對他的稱呼，只道：「應該快回來了。」\n他尋思著,就算惹毛了那臭小子，要當場把人帶走，但還有個小的在這裡呢，總不至於把小的給落下了吧？\n這麼一想著，心裡又踏實了點。\n趴在窗沿上的長寧突然驚喜大叫道：「阿姐！」\n陶太傅打住思緒聞聲看去,就見那走前還一臉陰雲密布的臭小子，這會兒面色如常地牽著馬，把他剛收的義女給送回來了。\n他瞧著這一幕，心中詭異地升起了個「一物自有一物降」的念頭。\n從緩坡處下馬後,樊長玉這一路都是和謝徵並行過來的,唇上還木木地疼著，她用手摸了一下，應該是腫了。\n樊長玉覺得自己要長記性了，不能每次都咬他，這回可不就是偷雞沒成反蝕把米,他反咬的時候可比她過分多了，有一瞬她覺得他可能是真的想生吞了她。\n他呼吸很不穩，抱著她喘了很久，肩頭牙印附近，又被他咬了幾口。\n應該也不算咬，因為沒破皮，也不是很疼，但就是留下了好幾個紅印子。\n見到陶太傅時，樊長玉生怕叫他瞧出自己唇腫了，儘量抿著唇說話：「義父。」\n陶太傅沒來及仔細打量她，長寧就跟只靈活的胖兔子似的從馬車裡躥出來了，張開手臂衝樊長玉道：「阿姐抱！」\n樊長玉抱過妹妹，無奈笑著哄道：「寧娘是不是塊小黏糕？沒見過你這麼黏人的。」\n長寧哼唧著不說話，抱著她脖子不肯撒手，眼尾餘光瞄到謝徵正看著自己，這才乖乖叫了聲：「姐夫。」\n自從她上次用繡花針扎醒了謝徵，看到過謝徵那副惡鬼似的駭人表情後，長寧就一直很怕他。\n謝徵被長寧喚了一聲，微微點頭，隨即又看向陶太傅。\n明明他這會兒的目光已經平和下來了，但陶太傅還是莫名被他看得心口發虛。\n謝徵道：「我便把她交與老師了。」\n陶太傅知道這是讓自己多護著樊長玉的意思，也正了神色道：「老夫好不容易才收個義女，自然是當寶貝疙瘩護著的，還用你說。」\n樊長玉帶著長寧上車後，大軍也要重新上路了。\n謝徵馭馬立在道旁，拂過林海的風吹動他衣袍，裹住頎長挺拔的身姿，樊長玉打起車簾看向他：「我走了。」\n謝徵頷首，又道：「路上多加小心。」\n長寧從車窗角落擠出個腦袋，扒拉著窗沿說：「寧娘也走了。」\n阿姐在身邊，她就沒那麼怕姐夫了，甚至還能揮揮小胖手道別。\n謝徵跟小孩打交道的經歷實在是少，也不知道怎麼哄孩子，只道：「聽你阿姐的話。」\n長寧頗為自豪地道：「寧娘最聽話了。」\n天際傳來一聲鷹唳，尋到謝徵的海東青直接俯衝直下，他抬起手，海東青便穩穩落在了他小臂上。\n長寧一雙眼頓時就亮了：「隼隼！」\n在樊長玉詫異的目光裡，謝徵把海東青往車窗前一送，道：「帶上海東青，它送信快些。」\n樊長玉問：「那你呢？」\n謝徵道：「你讓它給我送信，它能尋到我。我這頭給你送信，它不一定能尋到人。」\n樊長玉還沒應下，長寧就已經喊上了：「寧娘養小雞餵隼隼！」\n一旁的陶太傅道：「丫頭，這小子難得大方一次，你可別跟他客氣。這麼多年沒見孝敬過老夫，這會兒倒是什麼好東西都願意拿出來了……」\n他酸溜溜的正有些不是滋味，暗道民間那句老話果真沒錯，臭小子都是有了媳婦就忘了娘，他這半個老父親的待遇也沒好到哪兒去。\n但轉念一想，這個半個兒媳婦也是自個兒義女，憨閨女有個長了八百心眼的臭小子護著也不是件壞事，他非但不酸溜了，還怪欣慰的。\n最終海東青被長寧抱進了車廂裡，馬車在步兵陣裡徐徐向前，謝徵對騎馬立在謝徵身後的謝五謝七二人道：「去吧，好生護著她。」\n謝五謝七一抱拳，便馭馬跟上了大軍。\n謝徵帶著餘下親衛立在官道口，直到看不清薊州大軍的尾巴了，才一扯韁繩，調轉馬頭道：「回營。」\n-\n燕州大營。\n公孫鄞得知謝徵親自追去還能沒能把人給帶回來，幸災樂禍地搖著扇子過來，準備裝模作樣地寬慰個一兩句。\n怎料一進營，就發現燕州重將和幕僚們烏泱泱站了一軍帳，謝徵一身玄色箭袖長袍坐於首位上，案前擺著康城的輿圖和兵防圖，正在同麾下重將門商議著什麼，跟他想像中的失意模樣可以說是毫不相關。\n瞧見了他，謝徵直接一揚手，把輿圖扔了過來，道：「來得正好，西門的攻城戰術便由你指點他們。」\n公孫鄞兩手才接住那扔過來的輿圖，看了一眼上邊被他重新圈點過的地方，咋舌道：「不是說先耗著康城，等賀敬元拿下崇州再動手麼？」\n畢竟他此番圍康城，就是讓出崇州軍功後，找點事做給朝廷那邊看的。\n他若是以雷霆之勢攻下康城，轉頭還是不得不發兵去援崇州，難保不會再陷入魏嚴和李家的鬥法中。\n謝徵一雙冷銳的鳳眼輕抬，唇角噙了絲薄笑問：「誰說我是要直接拿下康城？」\n公孫鄞又細看了一番輿圖上圈划過的地方，不解道：「你這不是要速戰速決強攻麼？」\n謝徵道：「拔盡康城反賊的爪牙，再任其苟延殘喘也是耗著。」\n公孫鄞尋思著，話是沒錯，但他們一開始制定的戰術不是先圍而不攻，耗得城內叛軍耐心盡失再攻城麼？怎地突然改換了戰術？\n一直商議部署到深夜，中軍帳內的將領和幕僚們都陸續離去了，公孫鄞狂飲了一盞茶潤嗓後，才問：「你這是沒能把人帶回來，才想打一場仗洩洩火？」\n帳內明燭高燃，謝徵袖口的玄鐵護腕折射出的燭光也冷幽幽的，他手執一卷竹簡道：「日，我要康城再無力出兵，只能死守。」\n他抬頭看向公孫鄞：「日之後，便由你帶兵圍住康城，等崇州捷報傳來，再破開城門。」\n公孫鄞琢磨著他話中的意思，忽而臉色一變，控訴道：「你打算把這爛攤子扔給我？」\n謝徵掃他一眼：「我打得康城反賊只能苟延殘喘再走，你要是還守不住，往後倒也不必在我麾下做事了。」\n公孫鄞哪還能猜不到他火急火燎回來處理這些，為的是什麼，想到他馬不停蹄趕去攔人，到底還是吃了癟，頓時覺得自己被留在康城也沒那麼憋屈了。\n他搖了搖手中扇子，怕他一時衝動蒙蔽了雙眼，還是開解了幾句：「行了行了，日後你要去崇州找樊姑娘是吧？你且莫怪樊姑娘狠心，我倒覺著樊姑娘去薊州軍中不失為一件好事，賀敬元雖把虎符交與了你，但李懷安若是當真從薊州府查出了什麼，扳倒了賀敬元，他這虎符終究是要被上面收回去的。屆時樊姑娘若能在薊州為將，又有陶太傅在，薊州兵權至少落不到旁人手中去。」\n謝徵卻道：「大丈夫展宏圖志，所圖不過封妻蔭子，本侯還沒無能到要一個女人替本侯去攬兵權。本侯若要薊州，這兵符本侯大可不交出去，管他李黨還是魏黨，朝堂上那些陰謀詭計還能敵過鐵馬血刃？終歸不過是多殺些人罷了。」\n他說這話的時候，面上神色極冷，眼底只餘一片漠然，饒是自認對他了解頗多的公孫鄞，都在這瞬間脊背一寒。\n「但把這些人都殺光了，大胤朝廷就成了個空殼，頒布的政令國策一層一層傳達下去，總得有人去做，不然民間只會更亂。」他轉動著手上的白玉麒麟扳指，百無聊賴般道：「歷朝歷代的變革，歷經十年乃至幾十年的都有，畢竟總得扶持起能頂上那些位置的人了，才能動手。」\n隨即便輕嗤了聲：「該小皇帝煩憂的事，本侯便不替他去操這個心了。」\n公孫鄞心說還好他對那個位置沒興趣，不然前有魏嚴，後有他這頭惡狼，小皇帝日日提心弔膽的，不嚇得早夭都是上天垂憐了。\n他困惑道：「那你是打算日後去把樊姑娘帶回來？」\n以他的秉性，真要把人帶回來，今日追出去，不該鎩羽而歸才對。\n謝徵垂眸看向手中那捲竹簡，道：「她志在此中，我可護之，但不該阻之。」\n公孫鄞抖了抖一手的雞皮疙瘩，說：「那就盼著樊姑娘能領你這番情意吧。」\n謝徵突然道：「聽聞愛慕你的姑娘頗多。」\n公孫鄞腰背挺直了幾分，搖扇的動作都更風流倜儻了些：「不多不多，也就出個門瓜果盈車罷了。」\n謝徵頭也不抬地繼續看著竹簡：「有姑娘因你經天緯地，還是河間一賢，立志要苦讀詩書，也成為當世賢者的嗎？」\n公孫鄞張了張嘴，正不知如何回話，就聽謝徵道：「她說，她想走我走過的路，成為和我一樣的人。」\n公孫鄞愣了愣，終於反應過來他繞了個大彎子是想說什麼了。\n難怪他回來後是這樣一副樣子！\n公孫鄞酸得一張臉都要扭曲了，拂袖起身道：「告辭！」`

            num: 95,
            title: `第95章第95章`,
            content: `行軍一日後,便至崇州地界。\n樊長玉要去軍中，總不能再一直帶著長寧。\n她之前為了找長寧，在薊州幫著官府搗了不少拐賣幼童婦女的山賊窩,得了甚為豐厚的賞金，便在附近城鎮租下一小院,把長寧放在這邊，尋了個會照顧小孩的樸實農婦,給對方開工錢照料長寧的飲食起居。\n未免萬一，她把謝七也留下了,只帶著謝五一人去了軍中。\n常年鎮守在關外的那些將士便是這般,他們中大多都在邊鎮成了家,不用戍邊時便可回家同家人團聚。\n一切都安排妥當後，樊長玉由陶太傅引薦正式編入薊州軍,她之前截殺三名斥侯在薊州軍中是實打實的軍功，後來又在一線峽斬殺反賊大將石虎,要討個封銜不是難事。\n但在前往軍營的路上,陶太傅突然問她：「丫頭,你是想要一堆可供你差遣、但同你並不親厚的人，還是想自己親手帶出幾個能用的人？」\n樊長玉是見過戰場上的廝殺的,若非親厚之人,誰又會捨命去護？\n軍中那些將軍,也是從伍長、什長這些一級級升上去的，正是因為他們有讓底下的將士們信服的資本,也有這份過命的情誼在，戰場上將士們才會一往無前地跟著他們衝鋒。\n甚至兵權發生變動時，底下的小卒們也更願意和自己跟隨的將軍統一戰線，而不是聽從那距他們遙不可及的皇權。\n樊長玉不聰明,但也不愚笨，她很快想清楚了利弊，道：「上了戰場，我得有可以把後背交付出去的人。」\n言外之意便是選後者。\n陶太傅捋須笑了笑，道：「正和老夫之意，你初來軍中，對軍中一切事物都還不熟悉，貿然封你個有品階的軍職，你手上卻無可用之人，不外乎是空頂了個惹人眼紅的名頭。不如先低調行事，一步一個腳印，穩紮穩打來。」\n有了陶太傅這話，樊長玉便覺著她去軍中，頂了天能從一個伍長做起。\n大胤朝的軍制，五人為伍，十人為什，五什為隊，十什為部，五部為營，而一個營的人數，下限是五百人，上限卻沒個定數。①\n幾營的兵力合併起來，才能稱做軍。\n裡邊的軍職，彎彎繞繞也多，有的是既有品階又有實權，有的卻是空有品階並無實權，還有的是沒品階但有實權的。\n比如一部的兵頭，手上管著百人，也稱百戶，真要按官階來算，便是無品階的，但裡邊的實權委實已不小。\n到了戰場上，百人能做的事可多了，所以自古名將，大多是為百戶時，便可立下赫赫戰功。\n樊長玉去的是唐培義麾下，之前修大敗水淹盧城外的叛軍後，唐培義麾下那兩萬新徵的兵馬，在經歷反賊雨夜突襲後，折損了近三千人，又播出一千給陶太傅前往一線峽送糧，他自己帶著剩下的人馬去圍了崇州。\n陶太傅帶著的這一千人，跟燕州那邊趕來的援軍在一線峽匯合後，有燕州的老兵帶著，又同反賊交手多次，這批新兵也迅速成長了起來，如今活著回來的幾百人，個個都已成了戰場上的老手。\n唐培義便想把這些人打散了，重新編進新兵裡，讓他們去帶新兵。\n他圍了盧城後，跟長信王的軍隊交過一次手，但損失慘重，一直到賀敬元帶著薊州援軍趕來，他才敢鬆口氣。\n手上這僅剩的萬餘新兵，也不能就這麼白養著，他才想著現在有薊州那邊的主力軍頂著了，儘快把手上的新兵練出來。\n陶太傅去尋他，舉薦樊長玉入伍時，唐培義自是一口應下。\n若非樊長玉截殺了那三名斥侯，盧城不保，他便該引頸受戮了。\n他道：「那位姑娘竟能殺得了石虎，此等悍勇，於大丈夫中都罕見，唐某麾下能得此將才，實在是唐某的福分！」\n陶太傅卻道：「玉不琢，不成器，且先讓她再打磨打磨。」\n-\n等樊長玉被編入了伍中，才知道自己沒從小卒做起，也不是從伍長做起，她直接被任了隊正一職，手下管著四十九號人，謝五赫然被分到了她這一隊。\n底下的小卒們發現他們的隊正是個眉清目秀的姑娘家，站在隊伍裡都竊竊私語起來。\n「軍中怎麼會有女人？」\n樊長玉的頂頭上司郭百戶是個大鬍子莽漢，生得高大，鐵塔似的一尊，新兵裡的將領都是從薊州正規軍裡調過來的。\n他發現自己手底下一個隊正是女人時，鼻子都險些氣歪了，直接當著底下小卒們的面罵咧道：「也不知是哪位將軍府上的千金大小姐又來軍中博美名了，不直接封個校尉，讓家將們裡三層外三層給護起來，扔來老子部下，磕著碰著了，老子這半輩子他娘的就白幹了。」\n他這話有給樊長玉下馬威的意思，被公然落了臉子，麵皮薄的，只怕就待不下去了。\n這種情況是郭百戶最樂意見到的，畢竟別說是哪位將軍的女兒，就是個不知軍中疾苦被送來歷練的大官兒子，他們也不願接手。\n打不得罵不得，上了戰場還得拿命去護著這尊大佛。\n傷著了都沒他們好果子吃，更別說戰場刀劍無眼，死人是常事。\n一旦人有個好歹，大官那頭追究起來，那真是整個隊伍裡的人腦袋都不夠砍的。\n所以那些送來軍中歷練的貴公子，上頭的將軍們都有個心照不宣的規定，封個虛銜，置座軍帳，平日裡再派家將保護那金疙瘩就是了。\n不求有功，但求無過。\n等到對方「歷練」完了，添幾筆不痛不癢的軍功，把人完好無缺地給送回去，這事就算圓滿了。\n那些來軍中歷練的將門虎女，大多倒是都會武，心中也有一腔熱血，但就是太天真了些，殺過幾個人和戰場上的人間煉獄，根本不能相提並論。\n而這類將門虎女，往往又是大將軍的掌上明珠，沒人敢讓她們在戰場上有任何閃失，很多時候她們殺的敵，還沒有為了護著她們在戰場上死去的小卒多。\n所以真正打仗時，上頭的將軍們，幾乎都不會讓那些前來歷練的將門虎女參戰。\n那些個草包少爺就更不用提了。\n真正能讓底層將士們都欽佩的將門後人，那都是從底層靠著軍功一步步升上去的。\n軍中不會徵女卒，所以郭百戶才理所當然地認為樊長玉是靠後臺從軍的，他也是習武之人，聽得出樊長玉呼吸綿長，是個練家子，猜測樊長玉是想學那些從底層做起的將門後人，這才更加惱怒。\n別人有沒有凌雲志他管不著，但若是這凌雲志興許會讓他和底下的弟兄們在戰場上白白送了性命，他便厭惡得很。\n樊長玉不知這些隱情，被郭百戶當場發難了，面上倒也不見難堪，依舊大大方方地站在那裡。\n別人誤會了，她沒什麼好生氣的。\n謝五替她說話道：「樊隊正是從一線峽戰場下來的，她殺了石虎，能入行伍，靠的是實打實的軍功。」\n此言一出，隊伍裡愈發議論紛紛。\n石虎的兇名他們從軍以來，還是有所耳聞的，聽聞那是個喜啖生肉，飲人血的怪物，手上那對釘錘，沾過的人命沒有一千也有八百。\n眼前這一身薊州兵服，身形在男子中看起來甚至有些單薄的姑娘，殺得了石虎？\n郭百戶則是審視般重新打量起樊長玉，像是在判斷她是不是有殺石虎之勇。\n人群裡有曾在修大壩時見過樊長玉背土石，立馬也叫道：「我知道樊隊正，她在薊州上遊修壩那會兒，背著三百來斤的石塊下山不帶喘氣的！」\n有了確切的數值，小卒們看樊長玉的目光便愈發景仰了些。\n謝五還想說樊長玉獵熊的事，但沒親眼見過，說出來在旁人聽來可能還跟吹牛似的，見大傢伙兒對樊長玉的態度明顯敬重起來了，謝五便把到了嘴邊的話給咽了下去。\n郭百戶問樊長玉：「你擅使什麼兵器？」\n樊長玉想了想，說：「殺豬刀。」\n行伍中有小卒沒忍住悶笑出聲。\n郭百戶面上有些難看，喝道：「你上戰場殺敵拿的也是殺豬刀？」\n樊長玉誠實地點了點頭。\n人群裡又是一片悶笑聲。\n郭百戶徹底惱了，也不覺她真能殺得了石虎，想著八成是她身後的人為了給她造勢，硬給她安了這麼一項軍功，畢竟這種事也不少見。\n他一分面子也不想再給樊長玉留，喝道：「那成，老子今日就領教領教你的殺豬刀！」\n他沙包似的拳頭握緊用力一撞，一身蠻氣，衝樊長玉大喊：「來！」\n底下的小卒們沒料到重新編隊第一日，就有這等熱鬧可看，紛紛歡呼助威。\n這邊的動靜引得高臺上的將軍們都側目看了過來。\n唐培義問：「那邊怎麼回事？」\n樊長玉所在的方陣在校場最後方，從高臺上往下看去，只能瞧見一片黑壓壓的站成小方塊的人影，壓根瞧不清後邊是個什麼情況。\n立馬有親衛回道：「屬下這就去看看。」\n他前腳剛走，後腳就又有一名親衛前來稟報：「將軍，李公子來訪！」\n唐培義問：「哪個李公子？」\n親衛抹著汗回道：「李太傅之孫，李懷安李公子！」\n唐培義當即看向了陶太傅，李太傅是在陶太傅辭官兩載後才坐上那位置的，雖為清流之首，但朝野一半都是他門生，頗有幾分要同魏嚴分庭抗禮的意思。\n他道：「武安侯前往康城清繳反賊餘孽後，朝廷的軍糧便走水路送來了，李懷安兼任監軍一職，此番前來便是要核對糧草數目，也該尋賀大人才是，此番找到我這兒來，八成是為太傅來的。太傅見他不見？」\n陶太傅只笑道：「這後生既知我在此處，避得了今日，也避不開明日，且見見吧，我也好生瞧瞧，李家那老頭，教出來的孩子是什麼樣的。」\n唐培義便對那親衛道：「把人請過來。」\n不過須臾，一身天青色儒袍的李懷安便由親衛領了過來。\n同為讀書人，他的容貌相較於公孫鄞寡淡了些，卻似一盞清茶，越品越有味道，加上他那一身獨有的清正溫雅的氣質，只叫人覺著他似聖人跟前最矜雅的學生。\n他一眼就瞧見了鶴髮蒼顏的陶太傅，恭恭敬敬一揖，溫聲道：「見過太傅。」\n視線掠向一旁的唐培義，又說了聲：「見過將軍。」\n陶太傅不論是資歷還是曾經的官職，都遠高於唐培義，話自然也是由他對李懷安說的，他笑看著跟前的年輕人，道：「你肖似你祖父年輕時，老頭子乍一眼瞧著，還當是他這麼些年，竟越活越回去了。」\n這話不知是玩笑之語，還是意有所指。\n李懷安只淺笑著道：「祖父這些年身子骨大不如從前，趕不上太傅硬朗。」\n陶太傅捋須笑道：「老頭子是個好玩樂的，這天底下的好山好水還沒看夠，肩頭無事一身輕，自是比你祖父逍遙。」\n李懷安道：「是太傅急流勇退罷了，祖父常說，若得太傅那些學問，他此生便知足了。」\n陶太傅面上笑意不減，臉上的褶子極深，半開玩笑道：「那老頭是越老越不知道知足，他那一身學問教出了半個朝野的門生，還不夠？」\n李懷安陪著笑，語調依然溫和：「半個朝野的官員，也比不上武安侯這等國之棟梁。」\             title: `第96章第96章`,
            content: `康城,中軍帳內。\n斥侯從帳外匆匆步入，半跪於地抱拳道：「侯爺，今日康城城內反賊依舊死守城門不出！」\n坐於首位上的人一身玄衣,竟未著甲，身形挺拔俊瘦，修長白皙的指尖捏著一卷兵書，鳳眸平靜無波，對此情形似乎早有預料,只道：「繼續攻城,打到反賊連城牆垛口處的人頭數都填不滿為止。」\n斥候很快領命下去。\n謝徵扔開手中兵書,喚親兵：「取我戰甲來。」\n一旁的公孫鄞問：「你要前去叫陣？」\n謝徵道：「康城殘兵已不足為懼,只餘隨元青還是個隱患，如今城內軍心潰散，本侯前去叫陣，不怕他不應。」\n公孫鄞自是懂其中利弊的,康城能打的就隨元青一個,謝徵這是想在離開前把隨元青也解決了。\n攻城兩日後再去叫陣,這無疑是把隨元青放在火架上烤，他若應戰,那么正中謝徵下懷,可直接在戰場上除去這個大患。\n他若不應，城內本就士氣低迷的士氣,只怕得愈發低下了。\n-\n康城城樓下方,原本攻勢正猛的燕州軍中途停下後,城樓上的小卒們沒能劫後餘生地喘上一口氣，便見下方的燕州軍陣發生了變化。\n黑蟻一樣的軍陣分裂開來，讓出一條可供兩人並行的狹道。\n黃沙煙塵裡,一人一馬自狹道最後方徐徐走至陣前，肩頭的麒麟肩吞在烈日下莊嚴又猙獰，玄色的披風拖曳在馬背上，斜提一桿黑柄漆金盤龍紋的長戟。\n只這玄甲黑馬，便已駭得城樓上的小卒們瞳孔驟縮，兩股戰戰。\n看清那烏鐵戟柄，刃口附近盤著龍紋的戟刀，更加確認了來人身份，城樓上的小卒們面色愈發惶惶。\n「烏金龍紋戟，是武安侯！」\n「武安侯親自來了，康城今日必是守不住了！」\n尋常武將萬不敢用有龍紋的兵器，那柄烏金龍紋長戟，乃武安侯當年奪回錦州，一雪十七年前割地之恥，皇帝龍顏大悅，親自命數百名工匠冶造，賜予武安侯的。\n封侯時候賜爵武安侯，皇帝亦言：「得武侯如此，我大胤可安。」\n如今的朝野，但凡是個心高氣傲的武將，都妄圖同武安侯比個高下。\n但武安侯那一樁樁一件件的戰功，也的確是他們窮極一生都攀越不過的高峰。\n城樓下方的戰車上架起兩排戰鼓，渾厚的鼓聲在空曠的戰場上響起時，城樓上守城的小卒們都驚起了一身雞皮疙瘩，險些連手中刀劍都拿不穩了。\n城牆垛口出搭著弓箭的小卒一雙手也抖得跟雞爪似的，弦上的箭哪還有個準頭。\n戰鼓聲裡，馬背上的青年將軍抬首往城樓上看來，極淡漠的一雙鳳眼，容顏俊美好似玉刻，單手提戟直指城樓，狂佞喊話：「隨元青何在，出來受死！」\n城樓上的傳令官幾乎是連滾帶爬地趕回去報信。\n-\n康城被困才數日，但城主府已是一片愁雲慘澹。\n都知道此番圍了康城的乃武安侯，莫說底下的小卒們懼，便是城主府的下人們也知城破不過早晚的事。\n但怕歸怕，沒人敢議論戰事，這些日子，府內已陸陸續續亂棍打死了好幾個妄議康城很快就守不住的下人。\n從城門處趕回來的傳令官一路急行，穿過深深庭院，終於被引到了隨元青跟前。\n他單膝點地，幾乎是顫著嗓音道：「世子，武安侯在城門前叫陣，讓您出戰。」\n臨近入夏，日光有些曬人，書房窗前的竹簾打起一半，入門處日光灼灼，再往裡，一絲日光也照曬不到，顯出幾分陰沉來。\n隨元青散發跣足席地而坐，身前的矮几上亂糟糟堆放著書籍筆墨之類的東西。\n他先前落到謝徵手中，受了不少罪，被救出來後，調養多日，身上的皮肉傷雖好了，整個人卻清減了許多，眉宇間陰鬱愈重，聞聲只陰沉道：「不去，爾等繼續死守城門就是。」\n傳令官有些猶豫：「世子，城內將士們軍心潰散，士氣低迷，再這麼下去，康城只怕要不攻而破了。您曾在崇州戰場上大敗過武安侯，您若出戰，多少還能讓將士們重振一番士氣。」\n隨元青冷笑：「本世子若真出戰了，才是中了他謝徵的計。他放著崇州不取，親自來康城拿我，不就是急於要從朝廷黨爭中脫身？崇州一日不破，他便一日不敢入康城城門。」\n傳令官無奈，只得退下了。\n書房內只餘隨元青一人後，他才突然憤怒大吼了一聲，一把揮落矮几上的書籍捲軸，裝著墨汁的硯臺砸在地上，烏黑的墨汁潑灑在木質地板上。\n隨元青兩手撐著矮几，勁瘦的手背青筋凸起，蒼白的下顎因死死咬著牙關而繃得極緊。\n曾幾何時，超越謝徵一直都是他的心魔，畢竟這麼些年，他一直都是照著謝徵的樣子在活，學他學過的東西，練他練過的功法。\n崇州戰場上初次交手，他以為他勝了，此後謝徵便是他的手下敗將。\n直至如今，他方才明白自己當時的天真。\n他甚至有一種預感，他或許會死在謝徵手上。\n這種預感像是心頭蒙了一層霧靄，讓他一日勝過一日陰沉，這些日子他都只把自己關在書房。\n他需要冷靜，只要找到牽制謝徵的點和他突然攻城目的，他總能找到應對之法的。\n隨元青沉沉閉上眼。\n屋外有腳步聲在哆哆嗦嗦地靠近。\n隨元青掀開眸子時，少女受驚，嚇得險些打翻了捧在手中的那一碟糕點。\n她抖著手把那一碟賣相精緻的點心放在了矮几前，顫聲道：「是我，表哥。」\n深閨裡嬌養出的女子，一張小臉只有巴掌大，膚質細膩如凝脂，杏子似的一雙眼裡，淚光點點，怯生生的，只讓人想到雨打梨花四字。\n隨元青眯了眯眸子，這是一種和他遇到的那隻野貓全然不同的美，野貓性子大得很，會抓會撓，會咬人。\n眼前的女子，卻像是一朵在雨露中顫巍巍綻放的嬌花，只等人採擷。\n她太嬌弱了些，仿佛旁人對她做什麼都可以，而她也全然無力反抗，便是反抗，大抵也只是用那雙水汪汪的眼望著欺辱她的人無聲落淚。\n隨元青抬手扼住她下顎的時候，她整個人都顫了顫，有些慌亂地抓起盤子裡一塊精緻的糕點要餵給他吃：「母親說……說表哥這些日子為了守住康城殫精竭慮，讓廚房做了些點心，叫我拿過來。」\n隨元青沒張嘴，望著眼前這張嬌美的容顏，漫不經心般問：「表妹抖得這般厲害，是在怕什麼？」\n女子慌亂搖頭。\n隨元青鬆了鉗制住她下顎的手，拿起她要餵給自己的那塊糕點看了看，突然笑了笑，反餵去女子唇邊，道：「我不喜甜食，還是表妹吃。」\n女子臉色頓時煞白了幾分，只一味搖頭：「我……我也不喜的。」\n隨元青捏著糕點，垂首時嘴角依然還掛著笑，神情卻極度陰翳，低聲問：「為什麼？」\n女子心性終是不敵他，很快崩潰大哭起來，道：「表哥你快逃吧，父親聽說武安侯親自在城門前叫陣，怕城破後劉家被滿門抄斬，才讓廚房做了這有毒的點心，準備毒死你後割了你人頭，拿去城門口獻降。」\n隨元青便咧了咧嘴，臉上笑容更大了些，他說：「這樣啊。」\n言罷竟是直接從劍架上取了劍便出門去了。\n燕軍攻城，城內主要兵力都在四大城門處，留守在城主府的不過數百家兵。\n女子以為隨元青提了劍是要逃出府去了，手腳發軟地走出書房，心中惶惶正不知怎麼回去復命，卻聽得前廳一片鬼哭狼嚎的哭喊聲。\n她心中一驚，挽在臂彎裡的輕紗掉落在地也顧不上撿，拎著裙擺疾步往哭聲來源處跑去，一進前廳，瞧見滿屋子的死人，她險些沒兩眼一翻當場暈過去。\n看到自己父母都倒在血泊中時，她脫力跌坐在地，極致的悲傷和恐懼讓她連哭都哭不出來，只有眼淚如斷了線的珠子般滾落，許久才緩過這股勁兒，悲喊出聲：「爹——娘——」\n她看惡鬼一般看向劍身上還滴落著粘稠鮮血，立在大廳中央的隨元青，哽咽得不成調：「為什麼……為什麼要殺我爹娘？以你的功夫，你能逃出去的，你逃出城主府不就好了……」\n隨元青冷眼看著哭得幾乎要背過氣去的嬌弱女子，扯了扯唇角。\n他這個表妹，也不知是被養得太天真，還是純粹太蠢。\n亦或者，劉家深知權貴們娶妻只會娶那等世家精心培養用來做宗婦的貴女，而收個美人，當然得溫柔小意、心思單純才好，所以才把家中女兒養成了這副柔弱可欺的模樣。\n從某種意義上來說，眼前這個女子，也早早地就是個家族棄子了。\n可憐見地，她還替那隨時打算把她當個玩意送人的父母哭成這副模樣。\n他在她跟前半蹲下，用沾血的手碰了碰她的臉，反問她：「他們都要拿我人頭去獻降了，我為何不能殺他們？」\n劉婉兒雪腮上沾了他的血指印，張了張嘴，卻說不出一句話，長睫煽動著，眼淚簌簌直掉，愈顯嬌弱可憐。\n她是極好看的，天底下的男人，怕是沒人不會對這樣的美人軟下心腸來。\n但隨元青不知怎地，忽然就想起樊長玉往他身上扎刀時那個冷漠又狠厲的眼神來。\n從前他也是喜歡劉婉兒這類美人的，乖巧，憐弱，像是一株藤蔓，離了樹就只能枯死掉，所以只能竭盡全力地攀附著他。\n可這樣的美人見得多了，他幾乎想不起誰是誰的臉，一樣的性子，一樣的嬌憐，身邊多了誰少了誰，他都不一定記得。\n權貴們對這類美人，爭的無非也是最貌美的那一個，但紅顏總是易老的，不過五年，又有新的、嫩得跟水蔥一樣的美人們重新進入權貴的視野。\n誰還記得前幾年叫他們搶破頭的那美人是何模樣？\n一如青樓裡的花魁，老了，便有新的人頂上來。\n見過了太多千篇一律的美人，反倒是那只會傷人的貓兒讓他惦念難忘。\n隨元青收回了手，看著伏在地上，因哭得悲愴，腰臀都跟著聳.動的女子，說：「你是個好孩子，同我說了實話，我不殺你。」\n他收了劍，起身行至門口，又停下腳步，側過頭道：「從此你便不是劉府的女兒了，躲去民間，自己好好活著。」\n劉婉兒怔怔看著隨元青離去的背影，又看看屋內到死都沒能瞑目的爹娘，十幾年來從未遭逢過這樣的變故，她此刻除了哭，腦子裡只餘一片對未知的惶恐和茫然。\n她甚至顧不得那人方才還殺了自己雙親，幾乎是本能地攀著門爬起來，哭著扶牆去追：「表哥……」\n-\n正午的日頭正烈，隨元青太久沒出過書房，走過垂花門時，他站住，眯了眯眼看向掛在天上的那輪圓日。\n強光讓他眼前有一瞬像是失去了色彩，整個世界都暗了下來。\n他牽唇笑了笑，懶洋洋的，又似泰然接受了自己的宿命一般。\n這世間還有一種活法，叫做向死而生。\n-\n燕州軍在城門下方叫陣多時，都不見隨元青出戰，反而是等來了對方掛在城樓上的一道免戰牌。\n下方的燕州軍罵陣罵得愈發厲害，城樓上的崇州小卒們一個個灰頭土臉，眼神甚至可以說是已有幾分麻木，比起這樣日復一日的攻城折磨，他們如今倒希望燕州軍痛快些，一舉拿下康城。\n謝徵同公孫鄞回營後，公孫鄞氣得狂扇手中摺扇：「隨元青那個縮頭烏龜，當日在一線峽戰場還敢狂妄同你叫陣，如今只敢夾起尾巴做人！真不害臊！」\n謝徵道：「他未受激出戰，定是明白我在此同他耗，是要等崇州先破。但今日之後，康城內反賊士氣全無，軍中若有生二心者，內亂又能讓他們自個兒先頭疼上一陣，短期內必不會再主動出擊。」\n公孫鄞怒氣一收，道：「行了行了，你這是要去崇州了不是？」\n他嘖嘖兩聲：「說好的日後，這才兩天半就坐不住了？」\n謝徵只淡淡道：「本侯有些私事要處理，隨元青已知我在此，不敢輕舉妄動，我走後，你尋人假扮我留在帳內便是。」\n公孫鄞不由狐疑：「你去見她，不就是私事了？還有私事要處理？」\n謝徵說：「我命人給她打了件兵器。」\n樊長玉上次同石虎交手，因沒個趁手兵器，幾乎被壓著打的事他早聽謝五說過。\n幾乎是從山下下來時，他便已吩咐人去找鐵匠打造兵刃，本是想給樊長玉一個驚喜，哪知她主意大，要從軍去崇州戰場。\n算算日子，那兵刃也該打好了，他此番去取了，正好可以給她送去。\n公孫鄞想起上次的自取其辱，這回只聽了個話頭，便立即道：「行了行了，你趕緊走吧！」\n帳外卻有親兵捧了捲起的信件進來：「侯爺，海東青送了信回來。」海東青被樊長玉帶走了，海東青會突然送信回來，八成是樊長玉那邊的消息。\n謝徵抬手接過，一目行看完，原本還和煦的神色，瞬間沉了下來，信紙被他扔進了焚重要信件用的炭盆裡，冷聲道：「備馬！」\n公孫鄞心裡頓時跟有隻貓爪在撓似的，忙問：「怎麼了？」\n但謝徵壓根沒回答他，直接掀簾大步離去了。\n公孫鄞瞥見一旁炭盆裡的信紙還沒燒完，被風吹得飄落了出去，他沒耐住好奇撿起來看了看。\n信紙雖已被炭火燒去了大半，但結尾處「李懷安對夫人心懷不軌」幾字依然還清晰可見。\n公孫鄞「噗嗤」笑出了聲，沒忍住幸災樂禍道：「謝九衡啊謝九衡，你這報應來得也太快了些！」\n-\n遠在崇州的樊長玉，剛跟著操練的大軍一起繞山跑了十幾裡地，底下兵卒們跟煮軟的麵條似的倒了一地，有兵卒發現前方有條河，跑得一身臭汗的的小卒們便又一骨碌爬起來，起鬨去河邊洗洗。\n天氣越來越熱了，樊長玉也出了不少汗，但她一個女兒家，這種時候還是多有不便，自然不能跟著下水去洗，便只在樹蔭處站著喝了幾口水。\n之前她還覺著陶太傅直接幫她討了個隊正的頭銜，其實也挺招搖的，等分了軍帳，得知至少也得是個隊正，才能有自己的獨立軍帳後，她又覺著陶太傅用心良苦。\n她去尋陶太傅道謝，陶太傅卻說，若讓她當個什長，九個人，除去謝五隻剩八個，她閉著眼也能管過來。\n已經知道一加一等於二，再去學這樣的東西，無疑浪費時間，所以才讓她從隊正做起。\n她得學會管理越來越多的人，現在是幾十個，以後就是幾百個，幾千個，甚至上萬個。\n人多了，她不可能每一個都親自去管教，所以她要提拔能為自己所用的人。\n這就涉及到更複雜的東西——收攏人心。\n謝徵從前就說過，樊長玉不擅長這個，她直來直去慣了，突然要考慮那麼多彎彎繞繞的東西，確實有些難為她。\n不過戰場上，底層的小卒們先是求活命，才能求前途和錢財那些身外之物。\n這裡的人心，相對言之，還算不得複雜。\n樊長玉如今就像個剛學會走路的稚童，在這條路上磕磕絆絆地走著。\n她之前同郭百戶比武，也算是因禍得福，在軍中立了一次威，至少在郭百戶手底下的這一百人裡，無人再敢看輕她。\n她手底下的伍長、什長們，也對她敬重有加。\n謝五同她說，這些人裡，或許有將來能成為她親信的，或許一個也不能用。\n她得自己去琢磨能不能用，能用的，要怎麼用；不能用，人已經在自己手底下了，又該怎麼處置……\n樊長玉如今白天跟著操練，得閒還得去陶太傅那裡研讀兵書，晚上睡覺時不是在琢磨兵書裡沒看懂的地方，就是在想用人之道。\n但不知是不是太累了，往往想不到兩息，她就能徹底睡死過去。\n這會兒的空閒裡，樊長玉盯著自己手底下幾個沒去河邊的人，又在開始琢磨挑選親信的事，突然毫無徵兆地連打了個噴嚏。\n謝五就守在樊長玉邊上，見狀忙問：「隊正，您著涼了？」\n樊長玉擺擺手，道：「老話說打噴嚏『一想二罵念叨』，可能是寧娘在想我。」\n話落她就又打了一個噴嚏。\n樊長玉呆了呆。\n謝五想到自己讓謝七寄回去的信，突然一陣心虛。`

            title: `第97章第97章`,
            content: `朝廷大軍和崇州反賊的這場仗打了已將近一年。\n軍中所需的一切兵甲刀劍都由軍器監下發,但戰時兵甲武器若有損壞，總不能退回京城去補休，因此駐軍大多會徵用州府附近的兵械作坊。\n修補殘損兵器之餘,作坊裡的鐵匠也能再打造一些新的兵械供給大軍。\n賀敬元雖掌薊州兵權,但謝徵可調動整個西北兵力，賀敬元的薊州軍也在他調遣範圍之內。\n最初同崇州反賊交手的只有徽州謝家軍,後來北厥人攻打錦州,謝家軍北上支援,長信王意圖趁機南下奪薊州，薊州軍這才牽扯了進來。\n在賀敬元率領薊州餘軍前去崇州和唐昭義匯合前,踏足崇州地界的薊州軍,只有唐昭義手中那一萬多新兵。\n唐昭義是個謹慎的人，圍崇州時，他不確定謝徵在解決了一線峽山下的反賊後,會不會前往崇州共同殲滅反賊,因此也不敢冒進接手崇州附近的兵械作坊。\n直至眼下,那些兵械作坊仍是謝徵麾下的徽州餘部打理著的，他此番前去取給樊長玉造的兵刃,便也無需隱瞞身份。\n駐守在這裡的小將一聽到通報，便趕緊出駐地來迎：「見過侯爺。」\n謝徵把戰馬的韁繩交與迎上前的小卒,大步流星直往營地裡邊走去，問：「那柄陌刀鍛造得如何了？」\n小將疾走才跟上謝徵的步伐,回道：「再回一次火便可出爐了。」\n一進鍛兵作坊，便覺一股熱浪撲面而來,恍若是在蒸籠裡。\n幾排冶爐延伸向最裡邊，一眼竟看不到盡頭。\n赤膊的鐵匠們在各自的工位前，輪著鐵錘,一錘連著一錘敲打著案板上的鐵塊，胳膊上肌肉鼓起，蓄滿了力量，叮叮噹噹的敲擊聲混著低沉而有力的喊號聲，聽得人心中震顫。\n爐子裡火光灼灼，每個鐵匠邊上都有一個負責拉風箱的副手，亦是赤著上身，揮汗如雨。\n小將引著謝徵到了鍛造長柄兵刃的冶爐前，冶爐邊上有一臨時放置兵器的架子，一柄刃長三尺，柄長五尺的陌刀橫放其上。\n雪亮刀刃，烏鐵柄身，刃口那經受千錘百鍊鍛打不斷摺疊而形成的鋼層，在火光下映出極淡的圈層紋理。\n小將道：「刀刃所用的乃是百鍊鋼。」\n謝徵視線淡淡掠過，提起了刀柄掂了掂，舞了個刀花，刀鳴聲如虎嘯，小將被刀風駭得後退一步。\n謝徵打量著那泛著寒光的刃口，問：「刀鋒都已開，為何還要回火？」\n這個問題小將答不上來，負責打造這柄陌刀的老鐵匠拎著鐵錘在叮叮噹噹捶打著手中一件新的兵器，頭也不抬地道：「老祖宗留下的規矩，鍛造上戰場的兇兵，開刃後見了血，得再回一次火，方可出爐。」\n不知是不是常年都在冶爐邊上的原因，老鐵匠嗓音沙啞得也跟破銅鑼一般，甚至有些刺耳。\n這都是民間門的謠傳，沙場飲血的兵刃，戾氣重，自古武將又少有善終者，這才有了兇兵見血太多克主的說法，因此在鍛造兵刃時，開鋒見血後，需再回爐煅燒一次，說是震懾器魂。\n小將怕謝徵怪罪，忙道：「此翁與當年替侯爺鑄戟的雲崖子師出同門，若非侯爺此番鑄這陌刀也是用烏鐵，卑職只怕還請不動他出山。」\n烏鐵珍貴，尋常鐵匠輕易不敢用這等貴重鐵料冶煉兵器。\n而那些成名的鑄器大師，也難得到這樣的好料，大多是王侯皇室重金請他們前去冶煉。\n謝徵從上戰場那日起，便不信鬼神之說了。\n但這柄陌刀是打給樊長玉的，明知是虛妄的東西，他還是願求一個安穩。\n他問：「用什麼血？」\n老鐵匠抬起一雙蒼老的眼，被火光照著，明顯他一隻眼已壞死了，另一隻眼目光卻如鷹隼一般，望著他毫無懼色地道：「兇兵是用來殺人的，自是飲人血後回火最好，在這裡一般是用黑狗血。」\n小將忙道：「侯爺，已命人去取黑狗血了。」\n謝徵卻道：「不必麻煩。」\n他神色漠然地看著那柄閃著寒光的陌刀，抬手拽住自己領口的衣襟，用力一扯，繡著精緻暗紋的衣袍便被他扔了出去，露出精悍的上身。\n小將兩手接住他的衣袍，意識到他要做什麼，神色一慌：「侯爺不可，您乃萬金之軀……」\n謝徵置若罔聞，捏著陌刀舞了個刀花，反手往自己後背一划，鋒利的刃口瞬間門在他肌肉盤虯的後背留下一道深深的血痕。\n刃口的血在轉回刀刃時，往地上滴了一圈的血珠子。\n老鐵匠見狀，有些詫異地看了謝徵一眼，隨即用那破銅鑼一樣的嗓音厲聲斷喝：「起大火！」\n負責拉風箱的漢子趕緊呼哧呼哧猛拉風箱，冶爐裡的火光瞬間門竄高了一個度，熱浪灼得人皮肉發疼。\n那柄飲了血的陌刀被放進冶爐重新燒熱，小將也趕緊喚來人給謝徵後背上藥。\n等那陌刀的刀刃燒紅後，老鐵匠掄起鐵錘叮叮噹噹再細緻捶打了一番，經水一淬，「嗤啦」聲裡，瞬間門升起一股白煙。\n徹底冷卻後，老鐵匠拿起那柄陌刀細看，瞧著那刀身也和刀柄一樣透著烏色，疊鍛的紋理卻又透著金紅，只餘刃口雪灰時，欣喜欲狂幾欲落下淚來。\n他喃喃道：「成了，成了……」\n周圍的工匠們亦呼聲四起，圍過來看這第二柄由烏鐵打造成的兵刃。\n老鐵匠用工具重新將刃口打磨拋光，最後用帕子拭去打磨時留下的髒汙，被重煅後灰白的刃口瞬間門雪亮逼人，光是瞧著，便能感覺到刀鋒的銳利。\n刀身上那一圈一圈的金紅色鍛造紋理，在此刻也顯出一股別樣的妖異。\n老鐵匠雙手捧著陌刀交與謝徵，不無激動地道：「勞侯爺替這柄陌刀擇一明主，老朽畢生所學都在這柄刀裡了，他日此兵若能隨它的主人一起名揚天下，老朽便也不輸他雲崖子！」\n謝徵答：「自然。」\n看到這長柄陌刀時，他便知道再適合樊長玉不過。\n陌刀可劈可砍，不管是馬背上作戰還是步兵用，都是上乘兵器。\n謝徵命人將長刀裝進刀匣裡，剛走出營地，就有親兵駕馬從康城方向追了上來：「侯爺，太傅來信！」\n謝徵長眉鎖起，謝七剛讓海東青給他送了信來，陶太傅又來信，莫非崇州有變？\n他接過親兵遞來的信件，拆開看完後，將信收回懷中，瞥向那親兵：「爾隨我同去崇州。」\n親兵連忙應是。\n陶太傅在信中言，李懷安去崇州後，便一直留在軍中了，陶太傅疑心是李懷安已從薊州府庫的卷宗裡查到了賀敬元什麼把柄，並且也確認了皇孫可能就在崇州，這才一直守在軍中。\n落日的餘暉碎進謝徵眼底，他眸色愈漸冷沉，翻上馬背，重重一掣韁繩，大喝一聲：「駕！」\n-\n陶太傅去尋賀敬元時，賀敬元半是驚異半是釋然，道：「水淹攻打盧城的反賊後，唐將軍帶著不到兩萬的新徵小卒，竟有圍崇州的魄力，我早該想到是太傅在唐將軍身邊出謀劃策。」\n陶太傅道：「西北亂了這麼久，朝堂上李黨魏黨也爭得差不多了，是時候還天下百姓一個太平。」\n賀敬元嘆息：「我大胤百姓苦矣。」\n陶太傅聞聲，問他：「你既憂這天下民生，一個知遇之恩，就夠你替魏嚴賣命這麼些年？」\n賀敬元苦笑：「承德太子和謝將軍戰死錦州那一年，邊鎮再無將可守，大胤岌岌可危，是丞相撐起了大胤脊梁。且不論眼下如何，侯爺能揮師北上，奪回錦州，這都是大胤休養生息十幾年後才有的底子，那些年裡，丞相是為大胤做了許多的。若不是遇見丞相，敬元也不過幾十年前就死在路邊的一具凍死骨而已。知遇之恩，不敢忘。」\n陶太傅說：「李家那老頭，自詡清流，野心不比魏嚴小。魏嚴底下那一眾黨羽，從國庫裡貪飽了，尚且還能為百姓做幾分事。魏嚴倒了，換李黨接手，一群飢腸轆轆的人頂上去，等他們重新貪飽，再從牙縫裡漏出點給底下百姓，只怕國庫早空了。」\n他看著賀敬元：「我同魏嚴政見不合，但更不待見這些年為了同魏嚴鬥法，剋扣賑災糧以至災民成片餓死，再藉此來彈劾魏嚴的李黨。李家那老頭子和魏嚴在爭崇州這項軍功你也清楚，李懷安如今已來了崇州，想來是已拿到了你的什麼把柄。魏嚴大抵是不會保你了，但念當年你對老夫妻兒有埋骨之恩，老夫還是願保你一命，你可願告知老夫，李懷安拿到的把柄是什麼？」\n賀敬元聽陶太傅說起當年的埋骨之恩，回想起往事，心中難免悵然。\n陶太傅之所以賞識他，不僅是他為政清廉，愛民如子，還因早年戰亂時，陶太傅妻兒慘死於戰禍，他幫忙立了墳塋。\n妻兒過世二十餘載，陶太傅一直都孑然一身，只是比起同歲進士，瞧著老了一輪有餘。\n謝徵出師後，他覺著畢生所學有個傳承了，便辭官歸隱，直至今昔才又出山。\n有了陶太傅這麼個保證，賀敬元想起當日答應謝徵的事，忽而起身鄭重一揖道：「賀某苟且偷生至今日，不過是肩頭的擔子還不能卸下罷了，真要有那麼一日，賀某的性命不足為惜，懇請太傅替賀某護一對姐妹性命。」\n陶太傅聽得這個回答有些奇怪，問：「何人？」\n賀敬元道：「是賀某故友之女。」\n陶太傅蒼老眉頭下意識皺起，便聽賀敬元繼續道：「那位故人，想來太傅也知道。」`

            num: 98,
            title: `第98章第98章`,
            content: `陶太傅從賀敬元那裡回來,便徑直去尋樊長玉，到了她所在的營地，才被告知她歸家去了。\n新兵們還不用作戰,將領每半旬休沐一日,底下的小卒們便也能跟著得這一日的空閒，像樊長玉這類在駐地附近有自己住處的,便可歸家一天。\n陶太傅負手看了一眼天色,低喃道：「天意弄人吶,怎地所有事都攪合到這一塊去了。」\n-\n謝徵按著謝七在信中所提的地址，尋到樊長玉租下的小院時,日頭已近黃昏。\n院子有些偏僻,一條石板路延伸向院門口，院牆裡一株石榴樹探出枝葉來，紅花已落盡,花蒂上綴著指甲蓋大小的石榴果。\n院門沒關,年過半百的大娘端著一盆青菜坐在門檻上慢吞吞折著,換回了一身女裝的年輕姑娘坐在矮凳上，幫著大娘一起折菜。\n院子裡邊,瘦筋筋的老頭正在打什麼器具，邊上的青年小夥正埋頭幫忙刨木頭。\n謝徵牽著馬頓住腳步,靜靜看了許久。\n可能是落日的餘暉灑下來，眼前的一切都蒙上了一層昏黃暖光,竟讓他生出幾分家的錯覺來。\n那些朝堂上的暗潮洶湧都遠去了，心底只餘一片寧靜。\n道路那頭又傳來了腳步聲,還有孩童歡愉地哼著跑調童謠的聲音。\n謝徵側首看去，便見長寧一蹦一跳走在最前邊，頭頂的兩個揪揪也跟著一晃一晃的,謝七趕著母鴨和一群小鴨走在後邊，有些無奈地道：「祖宗，您走慢些，當心摔著……」\n海東青也一搖一擺地跟著，有掉隊的小鴨子，謝七又管不過來的，海東青便過去啄一口，嚇得黃毛小絨鴨喳喳亂叫趕緊往前竄。\n謝七一抬頭，瞧見牽馬站在道旁的謝徵時，還嚇了一跳，忙喚道：「侯……主子。」\n長寧亦驚訝出聲：「姐夫？」\n坐在院門口的樊長玉聽見動靜，往外看去，瞧見立在夕陽裡的一人一馬，先是一怔，隨即在衣服上擦了擦手站起身，想前去幫謝徵牽馬，卻又躊躇立在了原地。\n倒是趙大娘看到言正喜笑顏開，催促樊長玉道：「快快，小言找來了，你怎不前去接他。」\n樊長玉純粹是沒料到謝徵會這麼快出現在崇州。\n他不是要帶兵打康城麼？\n怎地突然到這裡來了？\n樊長玉揣著一腦門疑惑上前去，剛想說幫忙牽馬，在院子裡幫趙木匠刨木頭的謝五就已經衝過來搶過這活兒了。\n他嘿嘿笑著道：「牛圈空著的，我先把馬栓牛圈去。」\n這院子原先是一農戶的院子，豬棚牛圈都有搭建。\n趙大娘過來後，除了在附近種些小菜，還養了一窩雞鴨，長寧每天都要央著謝七帶她一起，把鴨子趕去河邊遊一遭再回來。\n趙木匠作為被徵去軍中的工匠兼獸醫，並不需要跟著大軍操練，時間比樊長玉還靈活些，樊長玉接回趙大娘後就去找他了。\n趙木匠也沒想到在異鄉還能再見到老伴，當初被徵兵抓走時，他就做好了死在外邊的準備了，如今老兩口能在一塊兒，他大多時候便直接回小院這邊。\n他是個閒不住的，一看院子裡的桌椅板凳都舊了，便開始打造各種家什器具。\n一開始還灰敗破落的小院，慢慢的也有了煙火氣。\n樊長玉看著分別不過數日的人，很實誠地問了句：「你不是去康城了麼，怎來這裡了？」\n橘紅色的夕陽落在她面頰上，讓她臉上似上了一層胭脂，謝徵盯著她看了一會兒，道：「山不就我，只能我來就山了。」\n樊長玉這些日子被陶太傅押著讀書，天天聽他「之乎者也」地講大道，學識上還是有長進的，聽懂了他這句話，臉被夕陽照得更紅了些。\n趙大娘已端著折好的菜起身，歡喜道：「小言快屋裡坐。」\n她見著謝徵高興，自古徵戰就沒幾個人能活著回來的，老頭子好好的，長玉的夫婿也好好的，趙大娘便覺著是莫大的喜事了，轉頭又使喚起趙木匠：「老頭子，快快，把雞籠子那隻蘆花老母雞宰了。」\n剛把一群鴨子趕迴圈內的謝七道：「大娘，我去吧。」\n他說著就從鴨圈邊上的雞籠裡拎出一隻老母雞往廚房去了。\n趙大娘還不知謝徵身份，怕他誤會，道：「剛剛那是小七，先前幫你牽馬的是小五，都是長玉手底下的兵，你不知道，長玉如今可本事了，在軍營裡當了官呢！手底下管著幾十號人。」\n樊長玉當初沒告訴趙大娘夫妻倆謝徵真正的身份，一來是怕嚇到兩位老人家，二來，她們從前的婚事已做不得數了，怕中途再有什麼變故便想著等一切塵埃落定後再說。\n哪料到趙大娘竟會當著謝徵的面吹捧起自己小小一個隊正，她趕緊打斷道：「大娘，今晚吃什麼？」\n趙大娘果真就被轉移了注意力，琢磨起今晚的接風宴，碎碎念道：「雞是有了，可惜只有一隻母鴨，還得留著帶那些小鴨，殺不得，再燉個排骨湯吧……」\n大抵是為了給「久別未見」的二人多些獨處機會，趙大娘去廚房時，讓趙木匠去幫忙燒火，長寧也被她哄去了廚房。\n去拴馬後的謝五遲遲未歸，院子裡當真只剩樊長玉和謝徵兩人。\n她有些尷尬地道：「我還沒告訴趙大娘她們你的身份。」\n謝徵說：「無妨。」\n又問她：「在軍中如何了？」\n明明兩人分別時還好好的，這會兒樊長玉倒是覺著哪兒哪兒都不自在了，她腳尖在地上畫著圈道：「義父替我謀了個隊正的軍職，眼下一切都好。」\n謝徵淡淡「嗯」了一聲。\n樊長玉找不到話說了，見他手上拄著個一人多高的長條形木匣，便問：「這是什麼？」\n謝徵道：「給你的。」\n「給我的？」樊長玉好奇看他一眼，抬手接過時，發現還挺沉手的。\n打開一看，一柄刀身烏黑泛著金紅鍛打紋理，只餘刃口雪亮的陌刀放置在其中，看起來極新。\n樊長玉捏起長刀掂了掂，只覺這個重量舞起來恰到好處，她指尖輕輕拂過刃口，便破了皮，滲出細小的血珠子來。\n她有些驚訝地道：「好快的刀！」\n抬起頭看向謝徵：「你專程命人打的？」\n謝徵不置可否，撩起眼皮，語調懶洋洋又帶著幾分笑意：「等著你快些建功立業。」\n樊長玉反應過來他話中的意思，臉上又有些燒得厲害，捏緊了手中刀柄，卻仍抬起眸堅定地看向他道：「我會的。」\n謝徵被她那個眼神看得微微一怔，眸色深了幾許，問：「新刀要練練手麼？」\n樊長玉以為他要跟自己對練，高興道：「好啊。」\n說著就已經擺出了開打的把勢。\n謝徵卻道：「去外邊吧。」\n樊長玉以為他是嫌院中場地小了，怕施展不開，從善如流道：「那去河灘吧，那邊地勢開闊。」\n她往廚房喊了一聲，說晚些回來，便拎著剛到手的刀跟著謝徵一起往外走。\n這個時間點，天地都已一片暮色，河灘那邊根本沒人。\n謝徵隨意撿了根木棍當兵器，樊長玉從前拎著兩把殺豬刀，就是大開大合的打鬥方式，如今得了一柄趁手的長柄陌刀，更是把自己的優勢發揮到了極致。\n月輝下，二人手中的武器交錯幾乎只能看清一道殘影，鐵器和木棍相碰發出聲響，一個錚鳴，一個低啞。\n比起短刀，樊長玉使長柄刀有了更連貫的招式，但因為在實戰中用長柄刀的機會甚少，同她對上的又是謝徵，到底還是顯出幾分青澀。\n只是不知何故，今夜謝徵似乎未盡全力，跟她拼蠻力的時候少，基本上都是用巧勁兒，樊長玉習慣了重攻輕守，被對方這樣迂迴過招，只覺渾身蠻勁兒發洩不出來，刀勢一急就露出了破綻。\n她一個劈砍後，被謝徵鑽了空門，木棍挑飛她手中陌刀，她踩到碎石踉蹌著後退一步，後背撞到碼頭上的樁子，再想探身去撿刀時，謝徵手中的木棍已隔著半寸的距離指在她心房的位置。\n樊長玉暗自一驚，她因方才動武出了不少汗，呼吸聲沉，胸脯也起伏得厲害，衣襟幾乎快擦過謝徵指向她的木棍。\n夜色裡看不清謝徵的神情，只聽他道：「你輸了。」\n嗓音不知何故，有些啞。\n樊長玉她回想著剛才的一招一式，抿了抿唇，想動卻發現謝徵手中的木棍絲毫沒有收回去的意思，她有些不服氣地道：「再來！」\n跟前的人卻只一瞬不瞬凝視著她。\n樊長玉抬眸和他對視，被他眼底的暗色看得一驚，下意識想別開眼，卻又像被什麼蠱惑了一般，只怔怔看著他。\n他低頭吻下來的時候，她呼吸微微一窒，聽著河邊潺潺的流水聲，長睫顫了顫，緩緩閉上了眼。\n比起從前，他這次吻得溫柔了些，但格外黏糊。\n樊長玉覺得快呼吸不過來了，便去推他，卻被他捉住雙手按在了頭頂，他另一隻手擒著她的下顎，吻得很深很深。\n不知是不是剛練過武的緣故，他渾身都在發燙，吐息間像是著了火，單薄的夏衫根本擋不住他身上熾熱的體溫。\n熱氣加重了他身上的味道，不是薰香也不是汗味，而是一種獨特的，只屬於他身上的味道，很好聞。\n大抵是缺氧，跟之前被親完只唇舌發麻不同，樊長玉感覺手腳發軟，有些站不住。\n跟前的人情況似乎比她更糟，他埋首在她頸窩裡，呼吸聲重得像是一頭幾欲發狂的獸，吐息噴灑在她頸側都有些灼人。\n樊長玉本能地覺著危險，儘量把頭偏做一邊，努力想了想，提議道：「要不我們再打一架？」跟前的人突然恨恨咬住她一小塊頸肉，報復般吮了一口。\n那細微又明顯的痛意讓樊長玉倒吸一口涼氣，不敢再說話了。\n她對男女之事所知不多，只覺他在聽見自己細微的吸氣聲後，身體似乎緊繃得更厲害了，鬢髮裡隱隱都浸出了汗意。\n樊長玉察覺他難受得厲害，安撫般在他後背輕輕拍了拍。\n他鬆開咬著她的頸肉，只隔著半尺的距離凝視著她，瞳仁比這夜色更漆黑，喑啞的嗓音裡流淌出柔軟的意味來：「樊長玉，什麼時候才可以娶你？」\n他生得實在是好看，汗溼的碎發凌亂散落在額前，幽深的鳳眸裡，強勢又帶著幾分不太明顯的妥協和委屈，唇線緊繃，看得人直想吻上去。\n樊長玉心下軟了軟，抬手碰了碰他的臉，極為認真地道：「等我為自己攢夠『嫁妝』，就嫁你。」\n她要的嫁妝，自然不是錢財，而是她之前就同他說過的，一份和他並肩走下去的底氣。\n謝徵盯著她：「好，我等你。我此生非你不娶，你也不可以嫁旁人。」\n樊長玉好笑道：「我長這麼大，就喜歡過你一人，不嫁你，我嫁誰？」\n這話讓謝徵怔了好一會兒。\n樊長玉說了這麼句話也有些不好意思，別開視線道：「趙大娘估計都做好飯了，回去吧。」\n謝徵卻突然問了句：「你那前未婚夫呢？」\n樊長玉離開清平縣以來發生了這麼多事，都快忘記宋硯那號人了，此刻聽謝徵提起，有些難以置信地看向他：「你覺著我會喜歡他？」\n謝徵硬邦邦擠出兩個字：「從前。」\n樊長玉怎麼也沒料到他會突然翻舊帳，要             content: `一牆之隔的院子裡,趙大娘貓在窗沿底下，沒聽見裡邊傳出什麼爭吵聲，也沒聽見其他動靜,心下正有些奇怪。\n謝五和謝七出門看到這一幕，又默默把腳收了回去,還關上了房門。\n趙木匠站在簷下，咳嗽兩聲引起趙大娘注意後，也進屋去了。\n趙大娘又回頭看了一眼依舊沒半點聲響的正屋一眼,輕手輕腳回了房間，掩上房門時,她瞪趙木匠一眼道：「你以為我是去聽牆根啊,我是看那小兩口不太對勁兒，怕他們吵架。」\n趙木匠也不知道樊長玉和謝徵如今是怎麼回事,只道：「先前長玉丫頭被抓去修大壩，找到我時同我說,她跟言正那孩子已經和離了。」\n這消息把趙大娘嚇了一跳,她下意識道：「胡說什麼呢！」\n因一時激動忘了壓低嗓門,趕緊又往外看了一眼，才坐到床邊道：「言正被徵兵抓走的時候,長玉那幾天都鬱鬱寡歡的，還大包小包地給他準備了那麼多東西，哪像是和離了的樣子,再說了，我去勸他們,他們不也睡一個屋了？」\n趙木匠便把之前樊長玉同自己說的話，說給趙大娘聽了。\n對於二人當初只是假成親一事，趙大娘先是一驚,隨即細想言正識文斷字又長得俊俏，能同意入贅，看樣子也的確是趙木匠說的那樣。\n她憂心忡忡在床頭坐了一會兒，又道：「就算年前成親那會兒不是你情我願的，可堂是切切實實拜了的，怎地就不是夫妻了？孤男寡女日日都在一個屋簷下，更別說兩人樣貌都是一等一的好，哪能相處不出感情來？你看當初言正傷得下不了床那會兒，長玉怕他喝藥苦，自家日子過得苦巴巴，都還要給他買糖呢！這患難與共的情分假不了！」\n趙木匠看了一眼不動聲色支起耳朵聽的長寧，嘆了口氣道：「行了行了，那兩孩子估計也和好了，寧娘還在呢，莫說這些了。」\n長寧眨巴眨巴黑亮的大眼。\n趙大娘幫她把揪揪上的絹花拆下來，捏捏她的小胖臉笑道：「咱們寧娘也是個有福的，你阿姐如今在軍中當值，手底下管著一大班子人，將來寧娘的夫婿可別想欺負寧娘。」\n長寧笑得露出一口小白牙，想了想，又扳著拇指補充道：「姐夫厲害，小七叔叔厲害，隼隼也厲害！沒人欺負寧娘！」\n趙大娘被她逗樂：「這鬼機靈的丫頭。」\n哄睡了長寧，趙大娘躺在床上，卻又想起另一件事來。\n依老頭子的話，那小兩口只怕至今都還沒行周公之禮？\n趙大娘一面盼著他們二人好好過，想到樊長玉如今在軍中，若是有了身子，只怕極為麻煩，又止不住地擔憂起來，一整晚都翻來覆去地睡不著，好幾次還想爬起來去隔壁聽牆根。\n-\n第二日，樊長玉一早起來，就被趙大娘拉去了僻靜處。\n她一夜好眠，趙大娘不知何故，本就有著眼袋的眼下，青黑甚是嚇人。\n樊長玉困惑道：「大娘你昨夜一宿沒睡？」\n趙大娘四下看了一眼，才壓低了嗓音道：「長玉啊，你娘去得早，你上邊又沒個長輩，有些事沒人教你。大娘把你當自家孩子看待，有話也就直說了。你如今在軍中，要是有了孩子，怕是不方便，要大娘去找大夫給你開一劑避子湯嗎？」\n樊長玉沒料到趙大娘是在擔心這個，一張臉瞬間紅到脖子根，她搖頭道：「不用。」\n聽到這麼個回答，趙大娘一時間竟不知是該放下心來，還是該繼續為小兩口操心。\n她糾結之餘，樊長玉已去院中打水洗臉。\n入了夏，早上的井水還是有些涼。\n看她用冷水洗臉，趙大娘不免又念叨，說怕她身體裡積攢寒氣，讓她去廚房打熱水。\n樊長玉身體底子好，沒把趙大娘說的話放心上，長寧把手也放進臉盆裡，頗有要跟她一起用冷水洗臉的架勢，樊長玉就不依了，讓長寧把手拿出來，老老實實去廚房弄熱水。\n等給長寧洗完臉，樊長玉打著哈欠憑手感幫長寧扎揪揪。\n從前她扎什麼就是什麼的小孩，這回看著水盆裡的倒影，委屈嘟嚷道：「要小七叔叔扎。」\n樊長玉看了一眼自己扎得毛剌剌的揪揪，良心上也有點過意不去。\n小孩長大了，知道美醜了，沒從前好糊弄了。\n她道：「那行，你去找你小七叔叔扎吧。」\n長寧便自己拿著梳子，邁著小短腿跨過門檻去找謝七，她挨個屋子找過去，都沒找到謝七，聽見正屋隱隱有說話聲傳來，她蹬蹬蹬跑過去，一推開門，卻嚇得「哇」地一聲哭了起來。\n房間裡，謝徵背對著門口赤著上身，帶血的白布散落在他腳下，一道橫貫了大半個背部的刀傷猩紅又猙獰，謝七正在給他後背上藥。\n聽到長寧的哭聲時，謝七就意識到了事態不妙，主子專程在夫人出去後，才讓自己進來幫忙上藥，這下怕是瞞不住了。\n果然，謝徵雖及時裹上了單衣，但聽到長寧哭聲的樊長玉還是到了門口。\n看到地上那一圈帶血的白布時，樊長玉臉色就變了變，抬眸直直看向謝徵：「你受傷了？」\n謝徵系上衣帶，答：「小傷。」\n樊長玉眉頭皺得緊緊的，看地上那一圈白布，就知道他身上的傷口只怕不小，難怪他昨夜同自己過招時，幾乎全是避開重攻用巧勁兒。\n她蹲下拍著長寧的肩哄了幾句，對謝七道：「勞小七兄弟先帶我妹妹出去，她上次被嚇到了，有些怕血。」\n謝七便哄著長寧先出了房門。\n樊長玉合上房門，轉過身來時，面上依舊沒什麼表情，只看著謝徵道：「讓我看看你後背的傷。」\n謝徵俊秀的眉峰微斂，他沒料到會讓樊長玉撞破此事，答非所問道：「已經上過藥了。」\n樊長玉盯著他，一字一頓地道：「我說，讓我看看。」\n二人僵持片刻，謝徵還是沒動，樊長玉便直接上前去解他的衣帶。\n被謝徵捉住了手時，她怕崩裂他後背的傷口，不敢用力去掙，但臉色極不好看。\n她一雙杏眸冷且銳，語氣罕見地強勢：「要麼把衣裳解開，要麼你現在就走，以後也別出現在我面前。」\n謝徵攥住她腕口的手未曾放開，狹長的鳳目半垂，纖長的睫羽掃出一片好看的弧度，下顎在窗紗透進的晨光裡帶著些許蒼白，他懶洋洋笑問她：「你這語氣，怎麼跟逼良為娼似的？」\n樊長玉唇線繃緊：「我就是在逼你。」\n謝徵跟她對視著，他是頭一回見到樊長玉這般強勢的模樣，那雙杏眼裡，不復往常的澄澈無害，目光銳利又帶有攻擊性。\n像是慵懶的貓兒突然變成了輕易就能撕碎獵物的虎豹。\n偏偏那樣的眼神，仿佛長了鉤子，就這麼勾在了謝徵心弦上。\n他喉結下滑，垂下眼睫，忍住了腦子裡這一刻想擒著她的下顎深吻下去的念頭，順從地重新解開了衣帶，微抬起眸子，瞳仁漆黑的色澤在晨曦裡淡了些，顯得格外漂亮，側臉甚至被鍍上了一層柔光。\n扯開系帶的手指修長，隱約可見一些細小的疤痕，藏在衣袍底下的那具身體，並不像他的臉給人的感覺那般清雋秀美，而是精悍、結實的，甚至讓人感到一股壓迫感。\n樊長玉不是頭一回看謝徵赤著上身了，但從前他不是受傷躺著，就是在月色下很模糊，都沒有這回瞧得清晰。\n跟謝徵那滿含侵略性的眼神撞上的時候，她原本蓄起的氣勢一下子矮了一截，不由抿起唇，將視線從他緊實的腰腹上移開，繞去他身後看他後背的傷口。\n瞧見交錯的舊傷間那一條斜長的傷口時，樊長玉啞聲好一陣，才問：「怎麼傷的？」\n謝徵沒答，只說：「不疼。」\n樊長玉紅著眼瞪他：「我問你怎麼傷的？」\n他還是不說，樊長玉便盯著他道出自己的猜測：「是不是那性隨的癟犢子傷的？」\n她說旁的都好，但誤以為他被隨元青所傷，謝徵終是開了口：「我自己劃的。」\n見樊長玉一臉看瘋子的眼神看著自己，他也說不清自己這一刻在想什麼，只用漆黑的眸子鎖著她：「取血替你祭刀。」\n樊長玉果真大罵了他一句：「瘋子！」\n但眼中紅意卻更重，她按著他坐下，拿起桌上沒用完的藥瓶給他上藥，努力繃著嗓音，冷硬道：「再有下次，你疼死我都不管！那柄破刀我也不要了！」\n金創藥性烈，撒到傷口處時，鹽浸火燎一般疼，謝徵聽著樊長玉訓斥的話，兩手擱在椅子頭靠處，卻沒忍住扯唇笑了起來。\n他那些陰暗的，偏執的，有異於常人的心思，沒讓她害怕或是憎惡，只換來了她的憐惜。\n他瘡痍斑駁如暗巷裡的苔蘚，溼冷又黏膩，他的太陽卻還是願意照耀著他。\n盤踞在心頭的陰霾沉鬱，似乎也一下子消退了不少。\n樊長玉上好藥給他重新包紮，見他還有心思笑，嘴上不饒人道：「疼傻了？」\n謝徵借著她手伸去他後背繞紗布的姿勢，抬手抱住了她，下顎擱在她肩窩處，語調裡帶著一絲懶意：「想起你要送我娃娃，心中歡喜。」\n樊長玉打好結瞪他一眼。\n-\n關於要給謝徵送個什麼娃娃，樊長玉其實也琢磨了挺久。\n她原本打算捏對泥偶好了，但一想到謝徵那般期許，泥人娃娃又容易磕壞，看趙木匠坐木工時，她便覺著雕一對木偶給他好了。\n趙木匠不僅會打造各種家什器具，那些箱子柜子上的雕花，他也雕得栩栩如生。\n只是樊長玉並沒有做木工的底子，短時間內雕不出什麼成品，不過好在她常年用刀，運刀極穩。\n軍中只有一天假，她昨日下午回來的，今天下午就得回軍中了，只有大半日的功夫跟著趙木匠學雕木。\n樊長玉抱著一堆趙木匠打家具用剩下的邊角料在房間裡練習時，謝徵皺著眉望桌子上那一摞白紙，指節輕扣著桌案，不太確定般問：「你讓我幫你抄書？」\n列字同主人的樣貌……實在是大相逕庭。\n他無奈扯了下唇角，仿著她的字跡，繼續在紙張上落墨，眼底是自己也不曾知曉的柔和。`
        },

            num: 100,
            title: `第100章第100章`,
            content: `下午,樊長玉剛回軍中，就被陶太傅叫了過去。\n她還以為陶太傅是為了檢查讓她抄的書，捧著謝徵幫忙抄寫的那一摞紙張前去,卻發現陶太傅那裡還有旁人。\n對方瞧著年近四十，眉眼間一派儒雅清正，並未著甲，瞧著像個文官。\n樊長玉不認得他，便只喚了陶太傅一聲：「義父。」\n那中年男子自樊長玉進帳來，就一直在端詳著她，目光和藹又帶著幾分沉重，還有幾分說不清的欣慰和擔憂在裡邊。\n樊長玉心頭甚覺怪異,但見對方並無惡意，便也只任對方打量。\n陶太傅瞧見樊長玉，說了聲：「你來了。」\n他似乎並沒有引薦樊長玉與那人認識的意思，只道：「這是軍中一位將軍，聽聞你殺了石虎，甚是好奇,想看看你的武藝。」\n樊長玉沒料到對方一身儒袍，竟是個將軍,忙抱拳一禮,「見過將軍。」\n那中年男子正是賀敬元,他在樊長玉身上看到了幾分故人的影子,心下百感交集，問：「你會武？」\n樊長玉答：「會一些。」\n哪怕心中已有了猜測,賀敬元還是問：「何人教授的你武藝？」\n樊長玉道：「家父。」\n賀敬元問：「可否同老夫過上幾招？」\n樊長玉看向陶太傅。\n陶太傅捋須道：「這位將軍也擅刀法，且讓他指點你一二吧。」\n樊長玉便抱拳道：「還請將軍賜教。」\n軍帳內地方狹小，施展不開。\n二人到了帳外演武,各持一柄長柄大刀。\n樊長玉率先展開攻勢，刀風迅疾，所向披靡，賀敬元一開始只守不攻，且戰且退，為的就是看清樊長玉的招式。\n快退到軍帳邊上時，他才猛地轉守為攻，所用的正是樊長玉先前的招式。\n比起樊長玉的一味求猛，他的刀法明顯更沉穩，進可攻，退可守，張弛有度。\n樊長玉還想再變換攻勢時，卻被對方抓住了一個防守上的漏洞，刀刃直指她脖頸。\n樊長玉手中的刀卻還沒來得及送出去，頓時心中暗自一驚，她雖缺少實戰經驗，但從前被拘在家中，唯一的樂子便是練習他爹教的這套刀法，樊長玉自問是無比熟悉其中的一招一式的。\n可此番同這位將軍交手，她卻有種對方比她更熟悉這套刀法的錯覺，甚至怎麼拆招都了如指掌。\n見她怔愣，賀敬元收了刀問她：「你可知你方才那一式的漏洞在何處？」\n樊長玉恭敬抱拳道：「懇請將軍指教。」\n賀敬元說：「這套刀法，想來是你一招一式練了太久，出刀才過於死板，必須打完這一式，才出下一式，但戰場上瞬息萬變，一擊不成，換一擊便是，哪能被人家破了招就亂了陣腳？」\n這番話，的確點出了樊長玉刀法的缺陷所在，她使殺豬刀時，還長能殺對方一個出其不意。\n用長柄刀法，碰上武功路數不如她的，她必勝無疑，但碰上賀敬元、謝徵這類精通各式兵刃打法的，就極為受制。\n樊長玉心中敬意陡增，感激道：「多謝將軍！」\n賀敬元見她聽明白了，眼底除了複雜，還有些許淡淡的欣慰，他道：「我且再指點你幾式。」\n二人便在軍帳外的這片空地上繼續切磋，樊長玉每使出一式，賀敬元都點出其中的不足之處，並告訴她破招之法。\n直到一名親衛模樣的兵卒尋了過來，賀敬元才停下，讓樊長玉先回去自行參悟今日所學。\n樊長玉拜別陶太傅後，帶著一腦子的刀法招式回去了。\n陶太傅見樊長玉走遠了，賀敬元都還望著她離開的方向出神，道：「我從前便覺著那孩子心眼實誠，心性又堅毅，不管置身何地，都保持著一份良善，是個好苗子。後來聽你說了她是那老頭子的後人，方才明悟，這份大智若愚，是肖似她外祖父。」\n賀敬元鄭重對著陶太傅一揖：「故人遺孤，敬元便在此託付與太傅了。」\n陶太傅嘆了口氣：「一個小子，一個閨女，手心手背都是肉。但前塵皆已作古，當年那些事發生的時候，兩個閨女都還沒出生，又關她們何事，無論如何，老夫都會護她們周全的。」\n賀敬元又是深深一揖。\n陶太傅道：「九衡那邊，且先瞞著他。」\n賀敬元憂心道：「就怕紙，終究是包不住火。」\n陶太傅拍了拍他的肩：「敬元吶敬元，你還是不夠了解你家丞相。你當真以為，他是十幾年後才查到孟叔遠的女兒女婿在你的庇護下，躲在清平縣？」\n賀敬元怔住。\n陶太傅負手望著遠山與天際交接處道：「當年的事，或許並非你想的那般。你我都知曉孟叔遠的為人，他是萬萬做不出那等不分輕重之事的。奈何錦州城破後他便自刎於帳中，身邊重將也在後來的戰役中死傷殆盡，再無從得知當年的真相。可若說是魏嚴一手策劃的這一切，孟叔遠後人手中還握著他構陷的證據，只怕他寧可錯殺一千，也不可能放過一人，又豈會放任對方遠逃至邊陲之地，偷生十餘載？」\n賀敬元苦笑道：「當年祁林兄帶著孟將軍獨女尋到我，便同我說，丞相給他的指令是殺孟將軍獨女。他下不去手，這才偽造了自己和孟將軍獨女墜崖而亡的假象。若如太傅所言，丞相一開始就有意留他們一條活路，為何後來又命我手刃昔日袍澤弟兄，幾次三番派死士前去樊家找那東西？」\n若有老將在場，便該知曉賀敬元口中的「祁林」，乃是魏府家將魏祁林。\n魏祁林原先並不姓魏，也沒有名字，只是魏家買回去當死士訓練的一個僕役，因他天生巨力，在習武上又頗有天賦，才被魏家當家將培養。\n魏嚴手中本是一點兵權都沒有的，全靠賀敬元和魏祁林在戰場上屢立戰功，才漸漸也有了聲望。\n後來魏嚴嫁妹給謝臨山，魏家同謝家的來往愈發密切，魏祁林還去謝臨山麾下做過事，得了謝臨山麾下老將孟叔遠的賞識，因孟老將軍只有一獨女，入贅與了孟家。\n這魏祁林，便是後來的樊二牛。\n賀敬元一直害怕的，就是魏祁林當了那柄刀，成了讓孟老將軍延誤運糧的推手。\n奈何關於當年錦州的事，魏祁林告訴他的甚少，二人十來年裡，除了魏祁林主動找上門求他那次，甚至沒再碰過面，就是為了避免讓魏嚴發現端倪。\n他沉沉嘆息一聲：「若是當初他把那些東西交與我時，我打開看了，如今倒也不必這般猜疑不定。」\n可要是那時候就看了，他除非直接反了魏嚴，否則也保不住樊長玉姐妹二人。\n陶太傅寬慰道：「一切尚未塵埃落定，且再看看吧，老夫出山，便是擔心有心人借著當年錦州一戰，拿九衡當刀使。臨山的死，終究是那孩子心上一道跨不過去的坎兒，我怕他著了別人的道。」\n賀敬元自問對當下的局勢看得也足夠透徹，只是心中依然疑團密布，他道：「賀某愚鈍，民間傳出關於錦州一戰的疑點時，矛頭就是直指丞相的，太傅的意思是說，有人在想引侯爺與丞相鷸蚌相爭？」\n陶太傅道：「我同魏嚴算不上深交，這些年不管是民間還是朝堂，對他皆是罵聲一片，也許當真是在那個位置上坐久了，便迷了心竅。但誠如你所言，再往前走十幾年，他對大胤的社稷，也稱得上兢兢業業。當年讓我收九衡做學生，也是託了南山書院的夫子，打著謝臨山的旗號拐著彎地勸說我，瞧著倒是怕我因同他不對付，不肯收九衡這個學生。」\n陶太傅便是師出南山書院。\n賀敬元未料到魏嚴竟為謝徵謀劃至此，他從前也算得上是魏嚴心腹，偶然見過幾次魏嚴同謝徵的相處，魏嚴對這個外甥從來都是不假辭色。\n便是謝徵戰功赫赫，得了嘉獎，他也會先訓斥幾句，再不痛不癢地誇讚幾句。\n整個丞相府都知道，魏嚴不喜歡謝徵這個外甥，可背地裡卻大手筆地替謝徵請陶太傅來教他，魏宣作為魏嚴親子，怕是也沒這番待遇。\n一時間，賀敬元心中更疑惑了。\n他道：「丞相欲在崇州戰場上治侯爺於死地，也是事實。」\n陶太傅一雙蒼老的眸子眯了起來，眸光銳不可當，他道：「當年錦州一案，肯定是與魏嚴有關的，只是其中興許還有什麼隱情，才讓他這般反覆無常。我親自進京去見他一趟，在我回來之前，你先別告訴九衡關於孟家的事。」\n他頓了頓，又道：「李家那邊查到了不少東西，怕是也會有動作，我那閨女磨礪得也差不多了，讓她上戰場多掙幾個軍功去。若是被李家攪了局，讓那臭小子提前知曉了此事，她身邊有人可用，我也不必替她憂心。」\n賀敬元只覺一團亂麻的思緒終於被理出了個線頭，連忙答好。\n-\n京城。\n早朝後，文武大臣們陸陸續續從金鑾殿內走出，以魏嚴和李太傅為首的官員們簇擁著各走一邊。\n魏嚴從漢白玉石階上走下時，同龍雕阻隔的漢白玉石階另一頭走下來的李太傅碰了個正著。\n二人都是宦海沉浮多年的老狐狸，這一打照面，一人剛強威儀，一人隨和親切。\n對視片刻後，李太傅率先向魏嚴拱了拱手：「魏丞相。」\n他身形乾瘦，鬚髮皆白，看起來比魏嚴年長了許多，只是那份隨和卻又不如陶太傅通達，因此哪怕瞧著讓人覺著易親近，卻又難以真正親近起來。\n魏嚴只虛虛抬手，回了一句：「李太傅。」\n他架空皇權十餘載，身上那股威嚴，不輸帝王。\n李太傅笑呵呵道：「西北戰局上，反賊叫武安侯和賀將軍分頭牽制，如今已無還手之力，陛下龍顏大悅，想來捷報不日便會送回京城了，李某，提前賀喜丞相了。」\n魏嚴面上瞧不出絲毫情緒起伏，只道：「國之大事，同喜。」\n二人這場交鋒，到此便已至尾聲。\n不管如今朝堂局勢如何，天下人對魏嚴罵聲多少，但他的確是大胤官場上的第一人，他直接越過李太傅，猩紅的官袍廣袖盈風，步履從容步下下一段漢白玉石階，也無人敢說一句不是。\n一直到魏嚴走遠了，李太傅身後的官員們才敢憤憤出聲：「他魏嚴未免太過狂妄了些！這大胤皇室，如今可還姓齊！」\n李太傅淡淡掃了說話的人一眼：「守義，休得胡言！」\n嗓音不大，甚至不見動怒，卻嚇得那名官員趕緊躬身作揖，連聲道：「是下官失言……」\n李太傅沒再說什麼，和身邊的其他官員一道遠去了，那名官員才膽戰心驚地往身後的金鑾殿看了一眼，抬起袖子擦了擦額角的冷汗。\n李家三代都已入仕，除了李太傅這個和魏嚴分庭抗禮的中流砥柱，遠去西北的李懷安，李太傅還有幾個兒子也在朝中做事，但眼下唯一還留在京中的，便只剩大兒子，也是李懷安之父。\n李太傅父子二人坐上歸家的馬車後，其長子李遠亭便道：「父親，武安侯不攻崇州，轉圍康城去了，想來是看出咱們欲奪崇州戰功，故意置身事外。但今日早朝上，陛下對武安侯卻仍讚賞有加，言語之間，似有要將長公主下嫁之意。魏嚴還沒倒，但陛下已開始忌憚咱們李家了。」\n李太傅閉目問：「皇后那邊怎麼樣了？」\n李遠亭有些艱澀地道：「娘娘她……還是沒能有孕。」\n李太傅是天子帝師，當年小皇帝為了扶持李家對抗魏嚴，立了不到十三歲的李家女為後。\n但經年過去了，皇后一直都沒有身孕。\n李太傅問：「太醫怎麼說的？」\n李遠亭道：「太醫也瞧不出是何病症。」\n李太傅睜開眼，意味不明說了句：「陛下確實長大了。」\n李遠亭困惑道：「父親這是何意？」\n李太傅看著長子問：「你可記得，當年魏嚴，是如何在一眾皇子中，選了毫無母族庇佑的陛下繼位的？」\n李遠亭思量片刻後，面上陡然一驚：「是陛下故意不讓皇后有孕？」\n魏嚴當年選中如今的皇帝繼位，便是看中他沒有外戚，小皇帝要想坐穩帝位，就只能什麼都聽魏嚴的。\n如此一來，魏嚴幾乎是理所當然地架空了皇權。\n小皇帝為求庇佑，在李太傅跟前裝乖了十幾年，如今也慢慢露出了自己的爪牙。\n在他多年扶持之下，李家在朝堂上已如日中天，小皇帝也怕倒了魏黨，李家就是下一個魏黨，所以不敢讓皇后有孕。\n畢竟他手中的大權還沒收回，一旦李皇后有孕，將來他只要有剷除李家的念頭，指不定李家會比他先下手，學魏嚴擁護小皇子上位。\n李太傅沒接話，算是默認了長子的話。\n李遠亭面露憤憤之色：「無怪乎陛下想將長公主嫁與武安侯，他這是想在魏嚴倒臺後，用武安侯牽制咱們李家！都說鳥盡弓藏，魏嚴尚還把持著朝政，陛下都已待我李家至此，等魏嚴一除，我李家可還有立足之地？」\n李太傅卻是道：「罷了，自古帝王心難測。」\n李遠亭急道：「父親，總得想想法子啊，陛下今日是如何待魏嚴的，只怕明日就得輪到咱們李家。」\n李太傅悠悠開口：「這天底下，最有資格繼承大統的，不是還另有其人麼？」\n李遠亭渾身一激靈：「您是說……皇長孫？」\n李太傅不再繼續這個話題，只問：「懷安在薊州查到了些什麼？」\n李遠亭反應過來自己同李太傅方才的談話意味著什麼，後背不受控制地爬滿了冷汗，回道：「魏嚴能穩坐丞相之位這麼些年，手底下的確有幾個可用之人，賀敬元在薊州十幾載，竟無半點貪墨。懷安查了數月，只查到了年前魏嚴派了大量死士去殺的那一家屠戶，案子存疑。」\n李太傅動了動眼皮問：「那些死士，不是去殺武安侯的麼？」\n李遠亭道：「懷安查到了薊州府的出兵記錄，魏嚴派死士前去時，賀敬元那邊也調了兵過去相助。瞧著倒像是一個想殺，一個想救。但賀敬元如此行事，魏宣徵糧在西北惹出禍事後，賀敬元八百裡加急命人送了東西回來給魏嚴，魏嚴便絲毫沒有怪罪之意。」\n他看了一眼父親的神色，繼續道：「那屠戶夫婦，卷宗上記錄是死於山匪之手，但懷安後來審問了活捉的山匪，山匪們一致答並未殺害屠戶一家。懷安深究那屠戶的案卷，發現他是十七年前才回到清平縣的，還帶回去一個來歷不明的女人。十七年前那名屠戶所幹的營生，都是借用了一名鏢師的。」\n李太傅道：「放眼整個薊州府，能偽造戶籍文書和其他履歷文書的，也只有賀敬元才有這個權利。」\n他看向自己的長子：「你是說，賀敬元在幫那名屠戶隱瞞什麼？並且還一直都在庇護那屠戶一家？」\n李遠亭點頭：「正是如此。」\n李太傅好一陣都沒再言語。\n十七年前，這個數字太敏感了。\n十七年前發生的事何其多？\n謝臨山麾下老將孟叔遠枉顧軍令，在送糧路上前去救被困的十萬邊鎮百姓，延誤戰機，害得承德太子和謝臨山戰死錦州，自刎謝罪，背上千古罵名。\n同年東宮失火，太子妃和皇長孫都被燒死。\n李太傅緩緩道：「你說，賀敬元拿給魏嚴的是什麼？」\n李遠亭心中一驚，道：「可惜賀敬元做事謹慎，懷安已查不到旁的東西了。」\n李太傅卻道：「我們查不到了，讓查得到的人去查便是。」\n李遠亭遲疑道：「您的意思是……報給皇上？」\n李太傅答：「御史臺趙大人有句話說得對，這大胤的天下，還姓齊。」\n他口中的御史臺趙大人，便是之前在魏嚴走後，憤憤出言的那位言官。\n李遠亭便知自己猜對父親的意思了。\n馬車已停，李遠亭親自攙著李太傅下車，家門口僕役侍衛眾多，二人並未再談國事，等進了府門，李遠亭才道：「借陛下之手可以除去賀敬元，斷魏嚴一臂。但父親既想擁立崇州那位了，若讓陛下賜婚大長公主與武安侯，得了武安侯這一助力，只怕接下來的局勢，對咱們又極其不利。」\n李太傅抬了抬眼皮道：「聽懷安說武安侯身邊有個女子？」\n李遠亭忙道：「正是那屠戶女，懷安初去薊州遇上匪患時，便是武安侯身邊的親騎假扮薊州府兵前去救的那女子。而今那女子就在薊州軍中，還被陶太傅收為義女了，想來甚得武安侯看重。」\n李太傅腳步微頓：「陶奕那老東西？」\n他眼皮微耷，瞳色因蒼老而顯得有些淡，片刻後道：「想法子把這消息傳到長公主耳邊去。」\n李遠亭應是。\n他心中也明白，成了陶太傅的義女，那女子的身份可就不一般了，顯然武安侯並不打算只收那女子當個侍妾。\n大長公主心高氣傲，必是容不得的。\n皇帝想借賜婚來拉攏武安侯，但這最終會變成結盟還是結仇，就說不清了。\n-\n幾日後，一封彈劾賀敬元偽造卷宗，包藏禍匪的摺子便遞到了皇帝跟前。\n賀敬元是魏嚴的人，眼下又正領兵剿崇州反賊，在這時候治他的罪，皇帝那頭也不好辦，索性在朝堂上將這封摺子交與百官商議該如何處置。\n百官們犯難，彈劾方是李太傅的人，被彈劾方是魏嚴的人，給他們一百個膽子，他們也不敢摻和到這要命的黨爭站隊中去。\n當日早朝上，便只剩魏黨和李黨吵得不可開交。\n最終皇帝以戰事為由，暫且壓下了此事。\n下朝後，魏嚴和李太傅再次於漢白玉石階盡頭狹路相逢。\n李太傅依舊是一副笑臉，拱了拱手道：「人老了，門生們主意大了，管不下來，早朝上的事，丞相可莫要往心裡去。」\n彈劾賀敬元的，便是李太傅的門生。\n魏嚴這次連禮都未曾回，鷹目一掃，不怒自威：「李太傅老了，倒是可學學陶太傅。當年陶太傅急流勇退，如今不止朝堂上的百官，連陛下都念著他的好不是？」\n李太傅面上的笑意微微收了收。\n魏嚴這才虛虛一抬手道：「魏某先行一步。」\n魏嚴走遠之後，李太傅臉色也沉了下來。\n-\n魏嚴上了轎輦，便一直閉著雙目，面容剛嚴肅穆。\n李太傅此舉，是在逼皇帝審賀敬元。\n皇帝因崇州的戰事，暫且壓下了此事，但等崇州的仗一打完，不用李家提，皇帝都會重新將此事提上議程。\n十七年了，小皇帝也羽翼漸漸豐，想從他手中奪權了。\n賀敬元替那叛徒偽造身份的事一曝光，當年的錦州慘案必會被提及，孟叔遠已是蓋棺論定的罪臣，他的心腹包庇罪臣之後，他一直想壓下的錦州案，只怕得會迎來重審。\n許久，他睜開一雙鷹目，緩緩道：「賀敬元，不必留了。」\n轎外有黑影飛速掠走。`

            title: `第101章第101章`,
            content: `樊長玉用了三天,才徹底參透了賀敬元指點她的那幾招。\n奈何沒個人同她對練，她也不知道自己精進了多少。\n樊長玉數著日子，後日便又可歸家了,屆時得同謝徵好好過上幾招。\n她上次回軍營時,謝徵說是來崇州,還有公事在身，聽他話裡的意思,應當會在崇州待上一段時間。\n於是樊長玉每日除了跟著大軍操練,也努力擠時間練自己的雕工。\n雕壞了不知多少木頭後，她總算能像模像樣地刻出個小人偶的雛形了。\n怎料這日集訓結束，郭百戶卻道：「從今日起，軍營封鎖,任何人不得再離開軍營，每日的訓練時長也翻倍。」\n底下的小卒們竊竊私語,樊長玉和另一名隊正亦是面面相覷。\n「吵嚷什麼？」\n郭百戶一聲沉喝,兇煞的目光巡視一周後,那些刻意壓低的議論聲瞬間平息了下去。\n他粗聲粗氣道：「兩名隊正留下，其餘人回營房待命！」\n底下的小卒們三三兩兩往回走，細小的議論聲再次蔓延開來。\n樊長玉和另一名隊正留在原地,等郭百戶吩咐。\n郭百戶看了他們二人一眼道：「你們建功立業的機會來了，主力軍人數不夠,咱們會被調去先鋒營後邊的右翼營,輔助主力軍進攻。多少人從軍十載也只能跟在大軍尾巴上,得個清掃戰場的活兒，這次算咱們撿便宜了，自古富貴都是險中求，老子這輩子就沒熊過,你們可別給老子帶出一窩熊兵，讓老子丟人！」\n樊長玉和另一名隊正再三保證會加大訓練力度後，才被郭百戶放了回去。\n崇州的戰局僵持已久，樊長玉沒料到兩軍這麼快就會有一場大型交鋒，她心事重重往回走時，卻又被郭百戶叫住，對方半張臉都掩在濃茂的鬍子裡，粗噶著嗓音道：「老子知道你上邊肯定是有人的，你功夫也不錯，但戰場上你要是遇險，老子的隊伍裡不會有人填命去救你，你要是現在去找上邊的人把你調往別處，還來得及。」\n樊長玉只看了郭百戶一眼，一句話沒說就走了。\n回到營房時，小卒們交好的聚在一堆，似還在議論郭百戶那番話裡的意思。\n見了樊長玉，便有人問道：「樊隊正，咱們是不是要打仗了啊？」\n樊長玉為了顯得有威嚴些，在人前話一向很少，臉上也少有表情。\n別說，這個法子還挺管用，她都沒怎麼發過脾氣，但底下的小卒們似乎都挺怕她。\n當然，不排除有她帶隊第一天，就用兩把鐵錘震碎了郭百戶那把大刀的緣故在裡邊。\n她繃著臉「嗯」了一聲後，小卒們便靜默了好一陣，臉上有對未知的惶然，也有怕自己這一去就再也見不到父母妻兒的傷感。\n樊長玉知道哪怕是當兵的，其實心中也是怕打仗的，畢竟在穿上這身兵服以前，他們也不過是討生計的腳夫走卒，亦或是勤勤懇懇的莊稼漢。\n她沒說什麼鼓舞人心的話，只道：「接下來的日子，大家都把刀法槍術練勤些，不求前途富貴，那也得有保命的本事，才能從戰場上活著下來，等仗打完後回家見妻兒老母。」\n頓了頓，又說：「我拿著把殺豬刀都能從一線峽活著下來，就是因為那些反賊殺的人，還沒我以前殺的豬多。」\n她努力想了一下，終於想起了那個詞，煞有其事地道：「熟能生巧在哪兒都是適用的，你們上戰場怕，反賊軍中的小卒也怕。大家都怕，那就是比誰在害怕時候，揮刀出槍更快。」\n兵卒們鬨笑出聲，原本緊張的氣氛倒是一下子消散了不少。\n接下來的訓練關乎到能不能保住自己小命，又有樊長玉那番「熟能生巧」的言論在前，她手底下的幾十號人都練得格外賣力。\n謝五更是不吝嗇地教了他們不少一擊致命的搏殺技巧。\n在出徵的前一晚，隊伍裡一個小卒找到樊長玉，把他從軍以來得的軍餉全交給了樊長玉保管。\n他說：「隊正，俺娘就俺一個兒子，俺是薊州黃坪縣人，俺要是死了，您幫俺把銀子帶給俺娘。」\n他說完這話就跑了，樊長玉盯著手心裡的那幾塊碎銀看了很久，最後收了起來。\n從前她也是怕戰場的，但想著爹娘的大仇，想著被困在崇州城內的俞淺淺，還有謝徵，她便不怕了。\n軍功是她眼下能想到的，她能自己去完成這一切的最好途經。\n不過現在，她心中又多了一個信念——她希望能帶著自己手底下的每一個兵，活著走下戰場。\n距離發兵還有幾個時辰，樊長玉幹躺了一陣睡不著，便從枕頭下方摸出自己雕了一半的木偶繼續雕著。\n木偶已經雕出了頭髮，她轉動刀刃，慢慢刻出眼睛。\n因為雕的是個圓頭圓腦的木偶娃娃，眼睛便也雕得大了些。\n腦海中回想著謝徵的模樣，收刀時又將眼尾往上刻了幾分，呆頭呆腦的娃娃，一下子就多了股鼻孔看人的睥睨勁兒。\n樊長玉不自覺笑了起來，她戳了戳木偶圓嘟嘟的臉，小聲嘀咕：「還挺像。」\n也不知道他如今在何處？\n-\n月上中天，林間鴉雀驚起。\n趙詢被人壓著跪了下去，一地的死屍，全是他的護衛。\n他一張臉煞白，額前冷汗密布，瞳孔裡映出火光裡那人還往下瀝著血的劍尖兒，哆嗦著喚了一聲：「侯……侯爺……」\n謝徵抖落劍身上粘稠的鮮血，微微側過眸子看了過來：「狡兔尚只有三窟，趙公子這窟多得，當真是讓本侯好找。」\n清風拂過林梢，落在幢幢火光裡的這道嗓音，清冷又帶著幾分漫不經心。\n數日前，樊長玉回營後，謝徵便去見了陶太傅一趟，本是要同陶太傅商議皇孫和李家的事，陶太傅卻提出有急事要進京一趟，讓他在他回來前，先徹查皇長孫和長信王的關聯。\n謝徵應下了，本還想去尋賀敬元，替樊長玉要一個關於她身世的答案。\n但不巧賀敬元親自在同李懷安清點朝廷運來的糧草軍械，他眼下明面是在康城，貿然出現在崇州，只會給李黨一個他擅離職守的把柄，謝徵這才直接去查皇長孫一事了。\n跟皇長孫有直接關聯的是趙詢，他自是從趙詢著手查起。\n因趙家是做生意的，消息甚是靈通，崇州被圍之前，趙詢就已出城。\n趙家的生意涉獵極廣，據點也極多，謝徵廢了些力氣，才堵到了人。\n趙詢見到謝徵親自前來時，便已知大事不妙，勉強回道：「侯爺說笑了，只要侯爺有用得上趙某的地方，趙某必當是肝腦塗地……」\n謝徵似笑非笑看著他：「年前趙公子在清平縣找到本侯時，也是這般說的。」\n趙詢臉色僵了僵。\n謝徵手中帶血的長劍落在他肩頭，趙詢艱難咽了咽口水，艱澀道：「侯爺息怒，趙某這條賤命也是握在旁人手中的，許多事，趙某都是身不由己。」\n謝徵手上微用了幾分力道，劍身下壓，趙詢便嚇得一句話不敢再多說了，冷汗滾珠子似的，一顆連著一顆從額角墜下，身形僵如鐵板。\n帶血的長劍從他肩頭的衣物抹過，在衣袍上留下一道刺目的血痕。\n明明還隔著一層衣袍，但趙詢仿佛已感受到了劍身的寒意，以及鮮血糊在衣物上的那股黏膩，血腥味刺激著他的感官，讓他一張臉，白得幾乎瞧不見一絲血色，渾身抖若篩糠。\n謝徵收了劍，交與身後的親衛，散漫道：「別介意，借趙公子這身衣裳擦擦血。」\n趙詢整個人都癱軟下去，有些潰然地道：「還請侯爺給小人一條生路。」\n謝徵嘴角噙了一絲薄笑道：「本侯落難時，趙公子替本侯買過二十萬石糧，說起來也是故交，本侯且問趙公子幾個問題，趙公子只要如實回答，本侯不會為難趙公子。」\n他不說當初的買糧還好，一說趙詢臉色更是慘白。\n他當初買糧，是看出魏嚴想至他於死地，而李太傅坐山觀虎鬥，只想把事鬧得更大以便彈劾魏嚴，這才未雨綢繆替錦州囤下糧草。\n但趙詢故意留給了賀敬元尾巴，讓賀敬元知道是謝徵買的糧。\n原本也是想讓謝、賀二人相鬥，畢竟他們一個與魏嚴反目，一個又還忠於魏嚴。誰料到賀敬元壓根沒有動作，這才有了後背魏宣強行徵糧，隨元青假扮徵糧官兵殺人，煽風點火的事。\n他重重給謝徵磕了個頭，腦門抵著地面，嗓音發顫地道：「侯爺息怒，小人當初也勸過殿下，奈何小人人微言輕，左右不了殿下的決定。當初的事，絕非小人本意。」\n謝徵問：「你說你為皇長孫效力，本侯如何相信你背後的人就是皇長孫？」\n趙詢眼底閃過幾許掙扎，最終還是答道：「小人的母親，便是太子妃身邊的大宮女，後來到了年紀被放出宮信，但信中對要謀害東宮的人隻字未提。」\n謝徵眸色驟冷，面露譏誚之色：「合著趙公子是編了個謊話來糊弄本侯？」\n趙詢忙道：「小人不敢，侯爺若不信，還有太子妃的親筆書信和信物可作證。」\n謝徵鳳眸在火光裡幽沉一片，任誰也瞧不清其中底色，他問：「皇長孫便是如今的長信王長子？」\n都問出這麼多東西了，趙詢又和長信王府來往密切，加上之前長寧說過，俞寶兒母子被扣在長信王府上，很明顯都在指向一個答案，謝徵這最後一句才問得這般篤定。\n趙詢不敢隱瞞，點了頭。\n謝徵狹長的眸子微眯。\n一切都對得上了，長信王造反只能打著除魏嚴，清君側的旗號，卻不敢直接拿皇長孫的正統來說事，因為長信王根本就不知道自己的兒子被掉了包。\n皇長孫也不敢主動暴露。\n畢竟長信王都能直接造反，一旦發現自己兒子被鳩佔鵲巢這麼些年，只怕壓根不會給皇長孫活路。\n他問：「年前隨元青會出現在清平縣，也是皇長孫的手筆？」\n汗水從趙詢眼皮上滴落，他答：「是。」\n皇長孫通過趙詢，知曉了謝徵在清平縣，設計讓隨元青前去，便是想借謝徵之手，除去隨元青。\n那時候崇州還無敗勢，長信王若能趁謝家軍被北厥牽制，一鼓作氣拿下薊州繼續南下，打到京城逼宮皇帝也不無可能。\n但長信王立的是隨元青為世子，日後便是打下了江山，能繼承皇位的也是隨元青。\n所以皇長孫要隨元青死。\n現在長信王明顯落敗了，皇長孫也深知靠打到京城奪回皇位不行了，才頻頻向李家示好。\n謝徵冷嘲：「承德太子的後人，就是這麼個東西？」\n趙詢苦笑道：「殿下幼年為了取代長信王長子，生生被燒毀了大半張臉，落下一身病根，這些年愈發喜怒無常。趙某雖只是一介滿身銅臭的商賈，卻也分得清是非大義。如侯爺這等蓋世英雄，趙某便暗自欽佩不已，趙某心中也明白，殿下有朝一日若繼承大統，只怕民生苦矣。」\n他似掙扎了一番，終於冒險說出了自己的想法：「殿下已有子嗣，想來侯爺也見過，清平縣溢香樓的那位女掌柜，便是殿下逃跑的侍妾，她的孩子，便是皇重孫。而今這世道，侯爺也瞧見了，皇權衰落，黨爭不休，民生艱難。侯爺比起當年的魏嚴，亦是有過之而無不及，倘若侯爺願效仿魏嚴，扶持皇重孫上位，小人願為侯爺效犬馬之勞！」\n謝徵眼底半分意動也無，似乎對他所言的那些，提不起半分興趣，上揚的唇角帶了幾分譏誚意味道：「你能背叛你家殿下，轉投於本侯，本侯又如何確保，你不會轉頭又投向旁人？」\n從古至今，二姓家奴都是為人所不齒的。\n趙詢深諳這一點，終是和盤託出：「小人只是想替自己和母親謀一條活路。自皇重孫尋回以後，殿下脾性愈發反覆無常，甚至派了影衛監視小人與家母，只為防著我們轉而擁立皇重孫。殿下的猜疑與日俱增，小人怕他有朝一日會對小人和家母下手。」\n他頓了頓，又道：「小人也是打第一眼見到侯爺，便覺侯爺是個頂天立地的人物，才敢在侯爺跟前說這等狂言。」\n謝徵並未理會他那最後那幾句拍馬屁的話，黑睫半垂，似在思索著當前的局勢。\n松脂火把「噼啪」燃燒著，在這隻有風聲的夜色中顯得格外清晰。\n謝徵問：「皇重孫母子現在何處？」\n趙詢艱澀答：「她們和家母都還在崇州城內。」\n相當於是當人質，讓他在外邊做事也不敢生出二心。\n謝徵聞言，眉頭微微皺起。\n皇長孫現在和李黨合作，要想幫李黨拿到崇州的戰功，就只能先扳倒賀敬元。\n京城和崇州相隔千裡，朝堂上對賀敬元的彈劾，尚還未傳到謝徵耳中。\n他問：「你們拿到了賀敬元什麼把柄？」\n-\n樊長玉雕了一整晚的木偶，總算把娃娃的腦袋、身子都給雕完了。\n說醜吧，看久了又覺著怪萌的。\n她對自己的第一個成品還是挺滿意的。\n洗漱時，謝五不知從哪兒給她弄了塊護心鏡來，讓她揣兵服裡邊。\n樊長玉看了一眼護心鏡的大小，覺得還是繼續揣自己從薊州上路去找長寧時打的那兩塊鋼板安全些。\n謝五得知她前後都要綁一塊鋼板，驚得目瞪口呆。\n樊長玉覺得謝五驚成這樣，可能是就沒見過像自己這麼怕死的人，但本著活命最重要的原則，她還是義無反顧地揣上了。\n將軍們帶護心鏡是因為戰甲已經護住了其他要害，心口只是最後一道防護。\n她身上這件小卒兵服估計連一刀都擋不住，關鍵時候還是得靠鋼板保命。\n那塊巴掌大的護心鏡，謝五嫌帶著不方便，影響他靈活性，樊長玉便偷偷給了那名拿銀子讓自己代為保管的小卒。\n對方接過護心鏡時，看著樊長玉淚眼汪汪，就跟看再生父母似的，弄得樊長玉格外不好意思。\n郭百戶清點隊列時，發現樊長玉沒走，眼底說不上是怕麻煩，還是其他的什麼，總之很複雜。\n他吼了聲：「上了戰場，殺一個夠本，殺兩個就賺著了！活著回來的，老子給你們慶功！」\n樊長玉跟著周圍的兵卒們一起大聲吼「好」。\n恐懼、豪情、牽掛，似乎都在那一聲裡吼了出來。\n跟之前一次上戰場不同的是，這次樊長玉他們站得沒那麼靠後，又不一直緊跟在她三步開外的地方。\n陌刀在樊長玉手中被舞成一道殘影，她一路往前推進，一開始還能瞧見前鋒軍的影子，後面就發現視線所及全是敵軍了。\n她記著她們是給前鋒軍打輔助的，瞧不見前鋒軍了還很著急，一面繼續往前衝殺一面問謝五：「你看到前鋒軍的軍旗了嗎？」\n前鋒軍負責把反賊的軍帳衝散，她們則要從前鋒軍撕開的口子裡擠進去，讓後邊的步兵把這道口子越撐越大，分割反賊的兵力才行。\n一旦在哪一處斷掉了，被反賊圍了過來，就輪到她們自個兒被包餃子了，那可是九死一生。\n謝五滿臉都是血，他對著持刀衝上來的反賊橫劈了一刀，有些崩潰地道：「前鋒軍已經被衝散了，現在咱們成了前鋒軍！」\n樊長玉有些發懵地「啊」了一聲，仗著陌刀長度上的優勢，一刀逼退殺上來的小卒，往後看了一眼，這才發現跟在自己身後的兵卒們，已經從最開始的幾十人，變成了浩浩蕩蕩的一群人。\n郭百戶就跟在她身後不遠處，拄著長刀大喘氣，罵罵咧咧道：「你個傻的，趕著投胎似的一直往前衝，老子的右翼軍愣是被你衝成了前鋒軍！」\n謝五沒理會郭百戶，抹了一把臉上的血對樊長玉道：「我去把前鋒旗撿回來，後邊的將士們看不見軍旗，不知道往哪邊衝。」\n戰場上最忌亂了陣型，被敵軍分成小股力量蠶食掉。\n樊長玉一腳踹飛一人，喝問：「旗在哪兒？」\n謝五輕功好，踩著反賊的人頭往前躍了好幾步，給樊長玉指了一個方向，樊長玉便又如尖刀一般，一路往那邊推進。\n高處觀戰的將領們，瞧著前鋒軍的雁陣被衝散時，一個個面色凝重，似乎已預見了這首戰會輸，怎料護著前鋒軍衝鋒的右翼軍中，突然又生出一個錐頭，像蜂尾針一般，無比銳利地繼續朝著反賊母陣腹腔扎去。\n將領們先是面面相覷，等那個新生出的錐頭，同被衝散的少許前鋒軍匯合，還扛起了前鋒旗後，殺得反賊節節敗退後，一個個眼神都變得怪異起來。\n一名將領道：「聽說過後衛可變前鋒的，卻還是頭一回見右翼軍也成了前鋒軍，都不及變幻陣形就能穩住攻守形勢，領兵的只怕得是個老將才能如此敏銳力，洞察全局。」\n另一名將領道：「這右翼軍乃是唐將軍的新兵臨時組建的，唐將軍麾下果真人才濟濟。」\n唐培義僵笑著應和了兩聲，一雙眼死盯著下方的戰場，想看清領兵的是何人，奈何距離太遠             content: `天風浩浩,黃沙瀰漫。\n被薊州軍生生衝散了陣型的崇州軍在戰場上亂做一團，小將們還在試圖維持陣型，奈何身後的薊州軍咬得太緊,軍陣裡被撕裂的口子越來越大，最後被薊州軍分割成小塊圍了起來。\n戰場上講究的就是一鼓作氣，戰意一散，便被攻勢兇猛的薊州軍打得節節敗退。\n衝在最前沿的薊州小卒們殺紅了眼,愈戰愈勇。\n崇州軍裡,上至將帥,下至小卒,面上卻顯露幾分惶然來,喊話衝殺的小將，嗓門聽起來都不是那麼底氣十足了。\n甚至還有小卒在戰場往往回潰逃的。\n領兵的崇州主將氣得拔劍斬殺了好幾個惶然後退的小卒,嘶聲大喊：「後退者，殺無赦——」\n但他的嗓音被更大的廝殺聲和兵戈相碰聲給蓋了下去,並沒有起到多大的效果。\n那主將正要領兵親自衝鋒，身後的崇州城樓上卻響起了陣陣戰鼓聲。\n崇州城牆砌得高大，馬面牆連著城牆延伸向兩側的山翼，幾十面戰鼓齊齊擂響,那聲浪在三面受堵後，朝著唯一的缺口排山倒海般壓了過去。\n這地勢像是一個喇叭口,讓那戰鼓聲帶著回音響徹在戰場上，震得人心口發顫。\n樊長玉帶著右翼軍衝殺在最前沿,聽見戰鼓聲時,下意識朝著崇州城門的方向看去。\n那被攻城錘撞上半日都不一定能撞開的厚重城門,此時卻隔著滿地的烽火和旌旗,徐徐打開了。\n煙塵漫天,長戈與長矛齊頭並進，城內守軍面目猙獰，舉著手中武器嘶吼著衝了出來，如洪水開閘。\n吐出兩支前衛軍維持前邊的陣型後，才見一名鬚髮半黑半白，身形魁梧，著黃金山文甲的老將駕著名駒從城內奔出，拔出腰間佩劍，大喝一聲：「殺——」\n更多的崇州守軍從他身後的城門裡湧出，大吼著衝向了前方的戰場。\n反賊那邊不知是誰起的頭大喊：「王爺親自出徵了！崇州必勝！」\n這一聲，似激起千層浪的一塊碎石，很快在戰場上蕩開來。\n有了援軍，又有長信王親自出徵助陣，原本還頹靡不堪，被一邊倒壓著打的崇州軍霎時又有了戰意。\n樊長玉之前在戰場上衝殺時，就搶了一匹馬，前鋒軍的戰旗被她插進了馬鐙裡，用一隻腳踩著旗杆，穩住軍旗不倒。\n這長時間的廝殺後，她坐下的戰馬已經疲憊不堪，樊長玉握著陌刀劈砍時，下刀依舊狠，可她到底也是個活生生的人，一雙手也會力竭酸軟。\n偶爾片刻的停頓時，握刀的手都在不住地發抖。\n不是害怕，而是肌肉太過疲軟，控制不住地痙.攣。\n發現反賊的援軍朝著戰場鋪來時，樊長玉坐在馬背上，視野更開闊些，她看了一眼兩邊的兵力差距，深知這時候要是被反賊前後包圓了，那她們這波人就當真是回不去了。\n她用力一踩馬鐙，扯著韁繩往另一個方向調轉，汗溼的碎發緊貼在汗黏著煙塵灰土的臉上，一雙眼精彩如虎豹，沉喝：「同纏鬥的這支崇州軍中間穿過去，別被他們堵在這裡！」\n前鋒軍的旌旗在她身後獵獵招展，她一身殘破的小卒兵甲，卻沒人覺得她只是個小卒。\n身後的薊州兵卒們，一見她調轉了方向，幾乎是立馬跟著一個神龍擺尾，依舊緊隨其後。\n反賊見之前把自己這邊軍陣衝得七零八落的朝廷前鋒軍要走，被壓著打了半天，此刻身後有援軍，自然也是拿出不要命的架勢去攔。\n領兵的將領甚至直接撤掉了後防，派出所有兵力從左右包抄過去，就為了把衝進自己這邊軍陣的那支朝廷先鋒軍徹底困死。\n-\n賀敬元和一眾部將站在高處，將下方這場戰局盡收眼底。\n唐培義氣得捶了一記身旁的松木，抱拳向賀敬元請命道：「將軍，我願領兵前去解右翼軍之圍！」\n賀敬元沉思片刻後道：「隋拓曾經也是以軍功封王的，雖年老矣，手上那杆獅頭矛威力卻仍不可小覷，點兵三千，我親去會他，唐將軍再領兩千人馬，前去接應右翼軍。」\n唐培義頓時轉憂為喜，連忙抱拳道：「末將得令！」\n-\n眼前人影憧憧，樊長玉近乎麻木地揮刀，溼熱辛澀的液體從眼皮滑落至眼中，不知是汗是還是鮮血。\n她後槽牙咬得緊緊的，刀鋒從阻擋前路的反賊小卒身上划過時，甚至分不清是他們的表情猙獰些，還是自己面色更為猙獰。\n曾幾何時，她在戰場上對著反賊的小卒們也是下不去刀的。\n但現在跟在身後的，都是把性命交與她的袍澤弟兄，她若對這些人心軟，那麼下一刻刀鋒可能就是落在身後那些義無反顧跟著她的人身上。\n她是局外人時，可以對著兩邊最底層的將士悲天憫人，但她自己也成了局中人，一如她當初會為了那些鄰居，向著截掠鎮上的山匪揮刀，此刻保護自己的袍澤弟兄，也成了她的使命。\n樊長玉像是一頭髮了狂的豹子，手上的陌刀每一次送出，都是一抔血花迸現。\n反賊那邊似乎也看出她是個硬茬兒，小卒們再被逼著往她戰馬前衝時，面上明顯多了猶豫和驚惶之色，讓她們這隊人馬，得以艱澀卻緩慢地往回撤走。\n但很快又有一隊拖著鉤鐮槍的小卒頂了上來，他們手中兵刃與普通小卒不同，長.槍上除了有槍尖，還有一柄半月似的鉤鐮刀，不僅能刺，還可遠遠地砍殺。\n謝五在看到這批拿鉤鐮槍的小卒時，臉色就已大變，朝著樊長玉喝道：「小心！」\n那批小卒是分工合作的，一批直起身子，把手中的槍尖對準騎在馬背上的樊長玉扎去，樊長玉一刀挑開他們扎來的鉤鐮槍時，卻有另一批小卒半跪於地，拿著手中的鉤鐮槍朝著馬腿橫掃過來。\n哪怕身後的謝五等人已盡力去撲殺那批小卒，樊長玉身下的戰馬還是被砍斷了馬退腿，嘶鳴一聲栽倒了下去。\n樊長玉被掀飛出去的瞬間，又有無數反賊像是草原上聞到了血腥味的鬣狗一般圍攏了過來，舉槍便扎向她。\n樊長玉以馬背上的旌旗撐地，凌空而起，踏著反賊小卒的胸甲橫踢一圈人，才穩穩落地。\n她手上全是鮮血，已黏膩得握不住陌刀的黑鐵刀柄，那杆旌旗長約一丈，旗杆尖端還有一個尖矛頭，樊長玉索性把旌旗捲起緊貼在旗杆上，就這麼握著那杆旌旗作戰。\n靠近她的小卒還沒近到她五步開外，就被旌旗掃了出去。\n這會兒功夫，謝五也殺了過來，樊長玉作為先鋒軍的那個錐尖，就跟領飛的那隻大雁一樣，無疑是最累的。\n她體力消耗得厲害，謝五從她手中奪過旌旗，原本清秀的一張臉已被鮮血糊得看不清原樣，也不知那些血是他自己的，還是別人的。\n他喘著氣道：「隊正，我來領著大軍撤！」\n旌旗在他手中一展，再次迎風飛揚了起來，指引者身後的薊州軍往他們這邊匯聚過來。\n樊長玉脫力，撐著陌刀喘息，一名反賊企圖從後背偷襲她，卻叫郭百戶大喝一聲，大刀幾乎把那名反賊的後背都給劈成了兩半。\n樊長玉回頭看了一眼，郭百戶半張臉都掩在鬍子裡，只一雙殺紅了的眼兇光外露，「老子是說了上戰場後不會管你死活，但你沒給老子丟人！這一仗打完，老子就是死在這裡也值了！」\n樊長玉手中陌刀毫無徵兆地朝他砍了過去，郭百戶被嚇出一身冷汗。\n下一瞬，一抔血澆溼了他半個肩頭。\n他神情一僵，轉頭看去，便瞧見了那個悄無聲息逼近自己，舉著刀試圖砍他卻被樊長玉一刀砍死的反賊。\n他嘴邊濃密的鬍子動了動，不敢再分心，只衝樊長玉吼了一聲：「扯平了！」\n樊長玉沒應聲，手上鮮血沒幹，握著陌刀依舊打滑，而且她五指酸軟得幾乎握不住刀身了。\n唇又乾澀得裂開了口子，更不想再浪費口舌說話。\n她從戰袍上扯下一長條布料來，一圈一圈纏住自己的手，再去握陌刀的刀柄。\n謝五手持軍旗，無疑就是個移動的靶子，數不清他刀劍往他身上招呼，致命的儘量避開了，一些不致命的傷疊加起來，卻也讓他半身戰袍都被鮮血染紅。\n一名反賊小將駕馬衝來，提槍欲取謝五性命時，謝五剛一揮旌旗逼退圍攻他的那些小卒，根本來不及抵擋，也來不及躲避。\n樊長玉一個箭步衝上去，一如上次在一線峽戰場從石虎戰錘下救下他一般，用陌刀架住了那小將刺來的一槍。\n太久的廝殺讓謝五整個人都有些眩暈了，他要寸步不離地跟著樊長玉，這支軍隊裡，若非衝殺第一費勁的是樊長玉，那麼第二費勁的便是謝五了。\n他不僅要顧及自己，還得時刻留意著樊長玉身邊的情況。\n此時見樊長玉替自己接下了那一槍，下意識喚了聲：「隊正……」\n樊長玉反手把他往身後跟上來的薊州軍裡一推，冷喝道：「到我後邊去！」\n說話的間隙，陌刀的刀鋒和馬背上那小將的槍尖大力擦過，火星四濺。\n那小將被樊長玉的力道掀得整個人往後一揚，攻勢便落後了半拍，心中對這股巨力的驚駭還沒過去，樊長玉卻已矮身朝著他坐下馬腿削了過去。\n陌刀刀鋒纖長又鋒利無比，加上樊長玉的手勁兒大，戰馬的前腿幾乎是被平滑削斷的，血湧如注往前撲倒時，馬背上的小將也被這股慣性掀飛了出去。\n樊長玉再次橫刀一抹，那小將的人頭便咕嚕嚕滾落在地。\n提著偃月大刀還想上前去幫忙的郭百戶見狀咽了咽口水，同謝五道：「俺滴個娘哎，她怎麼這麼能打？」\n謝五卻壓根不接話，他擔心樊長玉的安危，但扛著旗作為一個活靶子，又不方便再去樊長玉身邊，便把大旗往郭百戶手中一塞，「軍旗交與你了。」\n不等郭百戶說話，他已拎起一把長刀又殺上前去，同樊長玉一起為大軍開道。\n郭屠戶垂眼看了一眼自己手上染了不知多少人血的旌旗，大罵一聲：「老子像是會扛個旗躲在後邊的人嗎？」\n轉手又把那柄旌旗塞給了身後的兵卒，虎著臉喝道：「爾等護著前鋒旗，跟緊些！」\n言罷掄起大刀劈倒一個反賊小卒，幾步追上樊長玉和謝五，邊殺邊罵道：「老子才是百戶，兩個小兔崽子，要你們殺在老子前頭去！」\n身後的小卒們先是一臉茫然，其中有負傷的將領明白這旗在人海茫茫的戰場上就是個方向標，萬不可丟，忙下令以百十來人在中間護著旗。\n其他人依舊在外圍維持著錐形，如同烈火裡抱團的螞蟻一般，緊跟著著樊長玉她們殺出來的一條血路，慢慢從反賊的包圍圈裡擠出去。`
