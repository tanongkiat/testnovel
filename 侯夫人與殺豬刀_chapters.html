            num: 68,
            title: `第68章第68章`,
            content: `樊長玉動身的當天,鄭文常趕緊又寫信給賀敬元了。\n之前賀敬元得知長寧被抓，給他回信，讓他想法子穩住樊長玉。\n鄭文常還不知那小孩究竟被何人所擄,為了先給樊長玉一個交代,便謊稱可能是薊州城內拐賣女子小孩的人販子幹的。\n本以為樊長玉能安心等官府搗毀人販子窩點的消息，怎料那姑娘拎著把殺豬刀，自己跟著官兵一起殺進人販子窩點，親自找人去了。\n原計劃得一兩月才能徹底剿滅的幾處窩點，離譜地縮短到了半月,這讓鄭文常心情很是微妙。\n官府對於幫助捉拿要犯的義士,一向是有賞金的,樊長玉因為得到的賞金太多,又有之前力敵清風寨保下鄰裡十幾人的輝煌戰績,如今在道上小也有名氣了,人稱殺豬西施。\n薊州城內現存的不成氣候的匪寇間都流傳著一句話,劫道遇上個拎著殺豬刀的漂亮姑娘，別瞎起什麼不該有的心思，乖乖讓那姑奶奶過去,不然……老巢都給你端了。\n民間一些姑娘，要出個遠門的,無一例外會買把殺豬刀當護身符一路拎著走，別說還真有效果，以至於鐵匠鋪子和刀具鋪子的殺豬刀一時間供不應求。\n等賀敬元收到信時，心情微妙的則變成了他。\n謝徵率兩萬新兵離開前，還特意交代他,讓他照看一下遠在薊州府的樊長玉,事態發展成了這樣,屬實也是賀敬元沒料到的。\n他原本是希望樊家那兩丫頭平平凡凡度過這一生，莫要再牽扯樊家夫婦背後那些事的，但如今看來，怕是不能了。\n親衛守在帳外，只聽得他沉沉一聲嘆息。\n-\n日頭高照，官道兩旁草木都已抽出了嫩芽。\n樊長玉咬著乾糧騎在馬背上，無暇欣賞這道上春光，只暗暗覺著奇怪，這一路走來，竟沒碰上什麼流民，難不成是在前幾個月裡該跑的都跑光了？\n乾糧有些噎人，樊長玉拿出水壺準備喝水時，發現水壺裡也沒多少水了。\n她看了一眼與官道並行延伸的溪流，下馬去打水，但水極淺，不把水壺拿到溪石錯落的地方接水，直接伸到溪裡去打水，只能裝上來小半壺。\n樊長玉就著清冽的水流喝了幾口，裝滿水壺後正要繼續上路，前方岔道口卻跌跌撞撞跑來一衣衫襤褸的男子，遠遠瞧見了她，就大呼：「姑娘救我！」\n樊長玉以為他是遇到山賊了，把水壺掛馬背上，當即取出了自己的砍骨刀，在男子快抵達跟前時不動聲色以刀鋒對著他，成功讓男子停在了距她三步開外的地方。\n出門在外，樊長玉不敢託大，她之前跟著官府的人一起去搗毀人販子窩點，許多被拐走的年輕姑娘就是因為心善遇上小孩或年邁的老人，被騙到僻靜處，叫人販子給套麻袋拖走的。\n她打量著男子，問：「遇上山賊了麼？」\n男子搖頭，一張看起來常年勞作被曬得黑紅的臉上全是汗珠子，兩手撐著大腿喘著氣道：「朝廷官兵不做人，要抓我等良民去修水壩……」\n雜亂的馬蹄聲逼近，男子明顯慌張又懼怕，乞求樊長玉道：「我且進林子裡躲一躲，姑娘莫要說出我行蹤，我上老有，下有小，若是被抓走了，八成就得死在那些官兵的鞭子下了，家中老小可怎麼辦？」\n他懇切得就差給樊長玉磕兩個頭了，說完後就一頭扎進了官道裡邊的灌木叢裡。\n樊長玉消化著男子說的那些信息，心道難怪開春了這溪水還這般淺，原來是在上遊修了水壩攔水，這一路都沒瞧見流民，莫非也是被抓去修水壩了？\n她不急著動身，看著馬兒低頭吃路旁剛長出的嫩草，還伸手抓了抓馬脖子。\n雜亂的馬蹄聲抵達跟前時，竟足足有十幾騎，全是披甲的官兵，因著這裡是個岔道口，官兵頭子勒住韁繩問樊長玉：「可看到一名男子路過？」\n這官道上一路走來也沒瞧見幾個人，說沒見過就顯得太假了些。\n樊長玉點頭道：「見過。」\n她見了官兵面上並無懼色，馬背上明顯能瞧見別著好幾把刀，她又是一身幹練的騎裝，官兵把她當成了行走江湖的女子，倒也並未懷疑什麼，只問：「從哪條道走的？」\n樊長玉指了旁邊那條岔道，說：「這條。」\n官兵頭子看了樊長玉一眼，卻沒直接下令全部人馬都往樊長玉指的那條道追，而是點了兩人往樊長玉來的道上駕馬繼續追，自己則帶著大部分人馬往旁邊那條岔道去了。\n樊長玉面無表情看著官兵們駕馬跑遠，心中想的卻是怎麼跟話本子裡寫得不一樣？\n等官兵們駕馬跑得徹底看不見蹤影了，樊長玉才對男子藏身的那片灌木叢道：「出來吧，官兵都走了。」\n男子狼狽鑽出來，對著樊長玉感恩戴德道：「我替我全家老小謝過姑娘。」\n樊長玉道：「舉手之勞，不足言謝。對了，我給官兵指了那條道，但還是有兩人騎馬往我身後這條官道追去了，你看你要不回灌木叢裡繼續躲一陣，官兵往前跑找不到人，約莫就會倒回來找，你等官兵往回找去了，再往這條道跑。」\n男子又是連聲道謝，卻並沒有離開的意思，他窘迫看著樊長玉掛在馬背上的大包袱，舔了舔乾澀的唇道：「姑娘，你有吃的嗎？我一直躲著官兵，好些天沒吃東西了。」\n樊長玉包袱裡放了不少乾糧，她看了一眼男子，說：「我給你拿。」\n要解開包袱上打的結，必須得兩隻手，樊長玉把砍骨刀放進掛在馬背上的皮質革袋裡，伸手去解包袱。\n她脫臼的那隻手已經好得差不多了，只是偶爾拎重物還是會有些吃力，為了讓那隻手恢復得更快些，她這些日子幾乎沒用那隻手幹什麼重活。\n男子在樊長玉轉身去拿吃的時，原本憨厚的神情剎那間變得猙獰，藏在袖子裡的匕首向著她後背直捅去。\n卻響起「叮」的一聲，刀尖像是戳到了一塊鐵板，推進不了分毫，男子明顯一愣。\n樊長玉解包袱的手頓住，側首冷冷和男子對視：「騙我？」\n男子神色一厲，抽離匕首再次向著樊長玉脖子抹去，樊長玉重重一腳踹在他腹部，直把人踹得倒飛出去一丈餘遠。\n不知是不是內臟受力破裂了，男子匕首都已握不住，雙手捂著肚子神情痛苦在地上扭動。\n樊長玉決定孤身上路前，就做了不少措施，比如找鐵匠打了兩塊極其堅固的鐵板，一塊放在身前，一塊放在後背，怕的就是路上出什麼意外。\n她拎著自己的殺豬刀走過去，打算綁了這人扔在這裡，等那些官兵找回來的時候帶走，自己則在此之前開溜。\n不然她險些放走一名要犯，還欺瞞捉拿要犯的官兵，搞不好得被安個同謀的罪名。\n怎料馬蹄聲很快又朝著這邊奔來，官兵頭子瞧見樊長玉和那男子時，臉色難看至極，他底下的騎兵也都拿著弓.弩對著樊長玉。\n樊長玉趕緊道：「軍爺，我之前是被這人騙了，他說是他被抓去修堤壩的百姓，家中還有老母妻小，求我替他隱瞞行蹤，方才還對我下毒手，被我制住了。」\n官兵頭子冷冷打量著她，吩咐底下兵卒：「綁了，一併帶走。」\n樊長玉急道：「軍爺，我真是冤枉的！先前欺瞞軍爺是我不對，可我也制服了這歹人，能不能將功補過，免了我的罪責？」\n官兵頭子冷哼一聲：「此乃崇州軍的斥侯，誰知你是不是細作，眼見帶不回這斥侯，才合謀演的這齣戲。」\n樊長玉沒料到自己竟然攤上了這麼大的事，忙道：「軍爺，我身上有戶籍文書的，我是薊州人，真不是細作！」\n她說著就摸出自己的戶籍文書，因著官兵不許她靠近，只能拋給那官兵頭子看。\n官兵頭子看過後問：「既是薊州人，正值戰亂，何故往西北邊境跑？」\n從這條官道能去崇州，也能去燕州，樊長玉怕被當做同夥，不敢再說是去崇州的，道：「我去燕州尋親。」\n戰亂流民成災，去別的州府也鮮少去官府開路引了。\n官兵頭子臉色並未緩和：「我怎知你這戶籍文書不是殺了人搶來的？」\n他調轉馬頭，粗聲吩咐：「帶走！」\n樊長玉：「……」\n不帶這麼倒黴的！\n被一排弓.弩抵著，她只能認命放下刀，被她們綁了雙手帶回軍營。\n樊長玉只知道盧城屯了兵馬，卻不知在出了薊州的半道上竟也屯了幾萬大軍，還在修一個規模頗大的水壩。\n樊長玉被帶回軍營後暫關到了一間牢房裡，馬匹、包袱、殺豬刀都被收走了，就連她揣身上的那兩塊鐵板，也被婆子在搜身的時候給她拿走了。\n看守的官兵每日拿給她的吃食，除了水就是她自己包袱裡的乾糧，被迫被關，牢飯還得自費，讓樊長玉更氣悶了。\n兩天後，她才從牢房裡被提了出去，查清她不是細作了，但並未放她走，她跟其他衣衫襤褸的百姓站在一起，被發了一柄鋤頭一個籮筐，官兵讓他們去挖土石，兩人一組，一個上午要是挖不到十筐中午就沒飯吃。\n樊長玉也是這時才知，這些人都是途經這裡的流民，被強制留在這裡，好像是官兵們怕他們把修河堤的事說出去，但光關著人又還得管飯，官兵們便讓他們去採挖土石。\n大多流民為了能吃飽飯，還是願意去幹這些體力活。\n樊長玉被扣下來，無外乎也是官兵怕她去燕州的路上途經崇州，走漏了什麼風聲。\n她不知道修個堤壩為何要搞得神神秘秘的，心中還擔憂著長寧的安危，想著如今出來了，也可以借著去山上挖土石摸清周圍地形，這樣才能制定逃跑計劃。\n她剛來，其他人早已組好了隊，大多都是漢子，在關係到能不能吃飯的事上，可沒人憐香惜玉。手腳壯實的婦人看樊長玉身量雖高，人卻清瘦，怕她是個不能幹活的，也不願跟她組隊。\n樊長玉覺著自己一個人，一上午挖十筐土石應該也不是難事，但官兵看她和一個瘦小的老頭沒人組隊，直接讓她和那老頭組隊了，大概是覺得他們兩人一個是弱質女流，一個是糟老頭子，體力比不上其他人，讓他們一上午挖五筐就行。\n樊長玉拎著籮筐和鋤頭，跟著大部隊往山上去採土石，老頭拿著他自己那把鋤頭都走得氣喘籲籲，一路上嘴巴就沒閒過，一直都在罵官兵，不過罵得極其文雅，滿口之乎者也的，別說一起去採挖土石的百姓，就連那些官兵都聽不懂他在念叨什麼。\n樊長玉包袱裡還放著言正做了批註的四書，得閒時也會看幾篇，倒是聽得懂一些，引經據典的那些，便也聽得一頭霧水了。\n她看那老頭幾乎快上氣不接下氣了，想到同樣一把年紀從了軍的趙木匠，心中有些不忍，用鋤頭當刀從樹上剔下一根粗樹枝，鏟掉枝丫和尖端，拿給老頭當拐杖，伸手想把老頭的鋤頭放到籮筐裡，說：「我幫您拿吧。」\n老頭汗水都快墜到眼皮上了，看樊長玉一個姑娘家，沒給，倔脾氣道：「老夫自個兒拿得動。」\n邊上一婦人瞧見了，道：「姑娘，你可別搭理這老頭，脾性古怪著呢！」\n樊長玉倒是看出這老頭就是個刀子嘴豆腐心的，笑笑沒放在心上。\n到了地方採挖土石時，樊長玉力氣大，幾乎沒費多少工夫就挖滿了五筐，記數的官兵不免都對她另眼相看。\n搬運土石不需要她們去，有騾子馱或是兩名官兵用扁擔抬。\n完成了上午的量，但其他人都還在挖，樊長玉也不好明目張胆地休息，就一邊裝模作樣地挖，一邊跟那老頭嘮嗑：「老人家，您是個讀書人，怎也被帶到這裡來了？」\n老頭憤憤道：「老夫聽說燕州從薊州借了兩萬兵馬，便猜到巫河上遊定是要修水壩，本想來看看水壩修得如何了，卻叫那些官兵當細作拿下了，豎子焉豎子焉！」\n樊長玉說：「老人家，啥熱鬧都能湊，打仗修壩這樣的熱鬧，今後還是別湊了。」\n老頭被誤會成了來瞧熱鬧被抓的，氣得吹鬍子瞪眼，一直到中午用飯都沒搭理樊長玉。\n樊長玉上午優哉遊哉挖了八筐土石，取飯時竟得了官兵的嘉獎，多領了一個饅頭，她本想讓給那老頭，但老頭看著饅頭哼一聲，明顯沒瞧上，樊長玉就不客氣地自己收起來了。\n她力氣比旁人大，飯量自然也大，知道了多挖土石可以多領吃的，她下午就挖了十二筐，成功多領了兩個饅頭。\n老頭還是在不斷文雅地罵人，不是罵這裡的官兵，就是罵臭小子什麼的。\n樊長玉端著粥碗叼著饅頭好奇問：「那是您兒子嗎？」\n老頭斜她一眼，說：「算半個兒子。」\n樊長玉噢了一聲：「原來是您女婿。」\n老頭又開始吹鬍子瞪眼：「是老夫學生！沒見識的黃毛丫頭！」\n樊長玉大概是習慣了言正從前的毒舌，也沒跟這嘴硬心軟的老頭置氣，反而因他的學識多了幾分敬意，她厚著臉皮道：「您從前是夫子啊？我自學了《論語》，能請教您一些問題嗎？」\n老頭聽她竟是自學的，不由詫異看她一眼：「自學？」\n樊長玉神情微黯，笑笑說：「我從前的夫婿也是個讀書人，他來不及教完我四書就要走了，做了註解讓我自己看。」\n老頭約莫是覺得年紀輕輕守寡也挺可憐，難得沒再傲氣，說了句：「節哀順變。」\n樊長玉一愣，反應過來趕緊道：「他沒死，他被徵兵抓走了。」\n老頭氣得嘴角鬍子都翹了起來：「那你說得他死了一樣！」\n樊長玉：「……」\n-\n燕州。\n遠處的燕山山脈在夜幕裡如龍脊聳起，山巔未化的冰雪隱約可見一片灰濛濛的白。\n數千軍帳坐落在山腳下，三腳架支撐起的火盆錯落在軍帳間，木柴噼裡啪啦燃燒著，照亮營地。\n中軍帳內，謝徵看著輿圖上燕州和崇州的軍防部署，指尖指著一處對麾下部將道：「崇州派了五萬兵馬圍盧城，剩下的五萬兵力也不可小覷，屆時我親去誘敵，爾等帶人在一線峽設伏……」\n他突然以手掩面打了個噴嚏。\n恭敬坐於長桌前的部將們都愣了愣。\n燕山上的冰雪雖已融化，可一旦入夜，還是冷得厲害。\n謝徵早已換了單薄的春衫，寬肩窄腰，容顏如玉，是京都貴女們口中最好看的那類武將身形。\n他皺了皺眉，繼續部署，暫歇片刻時，親兵進來添茶水，體貼地給他拿了件厚衣。\n謝徵臉色冰寒看著捧著衣物的親兵，親兵硬著頭皮小聲道：「夜寒露重，侯爺當心著涼。」\n謝徵：「……滾出去。」`
        },

            num: 69,
            title: `第69章第69章`,
            content: `樊長玉已在營地裡挖了三天的土石,因為採挖土石時也有官兵嚴格看守她們，不能隨意亂躥，能查探的地勢也只有從關押她們的營房到去山上那一段。\n每十人就有一名官兵專門盯著,也採取了連坐制,隊伍裡若有一人逃跑，其餘九人不管是知情還是不知情，只要沒舉報，就都會受罰，所以不僅有官兵盯著,還有一起幹活的流民彼此盯著,想逃跑還真不是個容易事。\n不過除此之外,這些官兵紀律倒是嚴明,並未剋扣她們吃食,也沒有騷.擾營房裡的女子。\n反倒是流民中的一些光棍,時常目光淫.邪打量流民中的女子,吹口哨說葷話。\n好在男女營房是分開的，兩個營房的人每日能接觸的時間，也就一早集結去山上採挖土石和開飯的那會兒功夫。\n那些女子中有丈夫或父兄也在流民裡的,幾乎就沒有痞子去招惹。孤身一人在這裡的，不管是年輕姑娘還是已婚婦人,都是那些痞子起鬨說葷話的對象。\n甚至還有痞子誘和那些孤身一人的女子組隊採挖土石，無外乎就是跟他們一起挖，能不那麼辛苦，還能吃飽飯，但少不得被那些痞子揩油。\n樊長玉模樣生得好,她剛來時就被人盯上了,只是自己還半點不知情。\n那會兒沒人願意跟她組隊,也是那些痞子盤算著讓她吃半天苦頭，知道採挖土石想吃飽飯不容易後，他們再伸出橄欖枝，樊長玉就能乖乖聽他們的話。\n誰知樊長玉是個怪胎，她不僅沒如他們願，去仰仗他們吃飯，還成了跟他們搶飯搶得勢頭最猛的那個。\n前兩天樊長玉都只老老實實採挖土石，雷打不動地每頓多領兩個饅頭，直到她看到跟他們一起挖土石的有個大塊頭竟然領到了雞腿，樊長玉突然覺得手裡的饅頭配白粥有些寡淡了，忍不住去打聽為什麼那大塊頭可以領雞腿。\n床位在樊長玉床邊上的婦人道：「那漢子力氣可大著呢，每天除了採挖土石，還背運自己採挖的那些土石，似乎上邊有個兵頭賞識他，想讓他從軍呢，只是那漢子還有妻兒在這邊，為了讓妻兒都吃飽飯，才一直在這邊採挖土石。」\n樊長玉咬著饅頭問：「不止採挖土石，還搬運土石，幹得多，就可以吃肉了是吧？」\n婦人點頭，又說：「那籮筐有多大你也看見了，裝上滿滿一筐土石，都快三百斤了，那些官兵都是兩個人一起抬才搬得動，能自個兒就搬動的，咱們這些人裡，也只有那漢子了。」\n樊長玉端著個粥碗晃悠回老頭那兒時，聽老頭講完《論語》新篇，突然道：「咱們明天吃肉怎麼樣？」\n老頭臉色不太好看，從鼻孔裡哼了一聲：「老夫給你講孔孟之道，你滿腦子就想著那點口腹之慾？」\n樊長玉撓撓頭，不太好意思道：「我有聽的，您說『躬自厚而薄責於人，則遠怨矣』，凡事多自省責已，少咎於他人，我沒記錯吧？」①\n話落，沒忍住又問一句：「您一點都不想吃肉啊？」\n老頭喉嚨艱難滑動了下，閉眼斥道：「俗氣。」\n樊長玉被教訓了也不生氣，下午挖土石時幹勁十足，之前是根據自己的飯量幹活，能多領兩個饅頭了，她就開始划水，這會兒為了吃肉，她一個下午就挖了十五筐，並且跟官兵說，要自己背。\n負責看管他們的官兵以為她瘋了，指著那裝滿石塊的籮筐道：「你知道這有多少斤嗎？這一筐壓你身上，能把你腿都給壓折了！」\n老頭這才反應過來樊長玉中午問他想不想吃肉是什麼意思，擔心她一個姑娘家出什麼意外，拉長了一張臉過來叫她：「胡鬧！兩個饅頭一碗粥還不夠你吃的？要是不夠，老夫那份也讓給你。」\n樊長玉沒接老頭的話，只問那官兵：「這十五筐石頭我都背下山去，今晚能領雞腿嗎？」\n這邊的動靜讓看管所有流民的官兵頭子都注意到了，在樊長玉問出那話後，他顯然也是覺得樊長玉痴人說夢，道：「別說十五筐，你把這一筐背到山腳下去，老子賞你一隻全雞！」\n樊長玉明顯愣了一下，還有這等好事？\n有了這麼個彩頭，原本還在面朝黃土背朝天採挖石塊的流民們也都停下手中的動作，朝這邊看來，手撐著鋤頭柄議論紛紛。\n中午同樊長玉說話的那婦人一臉擔憂，大概是沒料到樊長玉竟是存了這心思，怕自己害了她。\n老頭皺巴巴的眉頭幾乎快擰成一個疙瘩，瞪著樊長玉道：「丫頭，別胡鬧！」\n官兵頭子原本也沒覺得樊長玉真敢背，見她愣著不做聲，以為她被嚇到了，口頭上奚落道：「還背不背了？」\n樊長玉對老頭說：「您老別擔心我。」\n她放下鋤頭走過去對官兵頭子道：「要背的，軍爺您說話算話就行。」\n三百斤單手拎起來於她而言還是有些費勁，但背著走，還真不是什麼難事。\n所有人都或皺眉或以看戲的心態瞧著，只見那身量高挑卻纖瘦的姑娘，兩腳分開穩穩踏在平坦的泥地上，將籮筐上的背帶分挎在自己兩肩，兩手抓緊背帶，鞋幫子往地裡下陷幾分，就將那幾戶有三百斤重的一筐土石給背了起來。\n現場響起一片此起彼伏的倒吸氣聲，拄著鋤頭撐著下巴站著的那些個痞子，張大嘴一副見了鬼的神情，又慶幸還好在這女子第一天來時，沒亂說什麼話，不然怕是被揍成豬頭都是輕的。\n官兵頭子也傻眼了，他是聽底下小頭目說過，有個女子挖土石挖得勤快，頓頓都能多領兩個饅頭。\n但挖土石只要講究技巧和耐力，是個人都會做，可背起這麼重的一筐石頭，放眼整個軍營，也只有幾位將軍才做得到。\n樊長玉幾乎沒用拐杖支撐，只兩手抓著肩上的籮筐背帶，一步步穩穩地朝著山下走去，看起來不輕鬆，但也沒顯得特別吃力。\n一直到樊長玉都走遠了，整個開採土石的礦場還是鴉雀無聲。\n老頭看著樊長玉的背影，倒是若有所思起來，用手捻著自己下巴上那幾根花白的山羊鬍須，低聲喃喃：「此等根骨，若為男兒，必成大器也……」\n晚間官兵分發飯食時，樊長玉果然得到了一整隻燒雞，她端著粥碗尋了個僻靜地兒和老頭一起蹲下，扯了個大雞腿遞給老頭，老頭沒接，反而神色複雜地看著她：「路探得如何了？」\n樊長玉抬起頭看向老頭：「您怎麼知道我是去探路的？」\n老頭耷拉著滿是褶子的眼皮，一雙眼蒼老眼神卻清明：「前些日子每每上山採挖土石，你都在不動聲色打量這一帶的地形和兵力部署，見了人就問東問西的問一堆東西。前兩天也看人家吃肉，今日怎就忍不住了，一定要去出這個風頭？不外乎是附近的地形和兵防你心中已有數了，想再看看別處的兵力部署。」\n他們的談話聲壓得極低，附近又沒什麼人，樊長玉見這老頭看出了自己的計劃，道：「您老不用擔心，我不會偷跑給你們帶來麻煩，背石塊去堤壩那邊，也是想看看堤壩修得這麼樣了，我們還要被困在這裡多久。那堤壩瞧著像是已經快完工了，我們應該很快就會被放走的。」\n要是得被留在這裡個一年半載，那她是忍不到那時候的。\n老頭哼了聲道：「還用這蠢法子去看修壩的進度，老夫且告訴你，開春第一場暴雨來臨前，那堤壩必須得完工。」\n樊長玉不解：「為什麼？」\n老頭斜她一眼，「你一沒給老夫交束脩，二沒磕頭敬茶拜老夫為師，扯著四書上死板的東西問老夫也就罷了，這些老夫為何要教你？」\n樊長玉「哦」了一聲，也實心眼地就不問了，啃起遞給老頭他不要的那隻肥得流油的雞腿。\n老頭瞧見了，氣得瞪眼道：「你個憨豬娃，也就這點慧根了！」\n樊長玉被他罵得莫名其妙，又不好跟一個滿頭白髮瘦筋筋的怪脾氣老頭較勁兒，抿唇往邊上摞開一步，繼續啃雞腿不搭理他，無聲表示對他罵自己的介意。\n老頭更氣了，整個胸口都在起伏，喝道：「沒茶你連磕頭都不會了嗎？」\n樊長玉終於反應過來，老頭方才說那話是讓她拜師的意思。\n樊長玉自個兒幾斤幾兩，她心中還是有數，糾結了一會兒，婉拒道：「我其實不是那塊讀書的料，不過我娘從前說，多讀書總是沒錯的，這才一知半解地看那些書。讓老人家您白教我，我也挺不好意思的，我被官兵收走的包裹裡有銀子的，要是放我們走的時候，把東西都還給我們，我給您補交束脩好了。」\n主要是拜師了，自己往後就得一直照料這個老頭了，樊長玉聽他罵了他那學生那麼久，覺著約莫是他從前指望他那學生給他養老，結果他學生忘恩負義了，所以他才想重新給他找個養老的。\n但自己還得去找妹妹，不能在這裡耽擱太久，自然也沒法一直照顧這老頭。\n老頭聽出他主動收徒被拒了，瞥著樊長玉，倔脾氣上來了，哼笑道：「你知道多少人一擲萬金求老夫收徒，老夫都不收嗎？」\n樊長玉已經啃完了那根雞腿，捏著雞骨頭震驚道：「當夫子這麼賺錢的？」\n老頭：「……」\n他那張滿是褶子的老臉被氣得通紅，閉上眼怒道：「罷了，罷了，當真是朽木不可雕也！」\n樊長玉想到同樣孤苦無依的趙家夫婦，知道這老頭生這麼大氣只是因為自己不肯拜他為師後，又覺得這怪脾氣老頭挺可憐的，他脾性不好，膝下又沒個兒女，想找個給他養老送終的人還挺難的。\n她不合時宜地想起了言正，忽覺言正那身臭脾氣，簡直和這怪老頭如出一轍。\n要是言正因為嘴巴太毒了，也孤苦伶仃一輩子，老了該不會跟這老頭一樣吧？\n樊長玉打住腦子裡奇葩的想法，看了一眼冷著臉不願再跟她說話的怪老頭，把燒雞扯下一半，放進他裝饅頭的碗裡，嘆了口氣，拿著剩下的燒雞回女子休息的營房了。\n-\n當天夜裡，春雷炸響，大雨瓢潑而至。\n匯聚在地上的雨水越來越多，樊長玉看著那透過門窗縫隙照進來依然雪亮得刺目的閃電，聽著外邊蓋過一切的雷聲和營房裡孩童嘈雜的啼哭聲，總覺著心中有些不安。\n她坐起來，腳一下地，就感覺踩進了水窪裡，竟是營房裡的地面都積了雨水。\n想到那老頭說的春洪前，堤壩一定會修好，樊長玉回憶了下自己白天下午背著土石去堤壩口那邊看到的情形，覺著和那老頭說的差不多。\n她盼著最好是明天，這些官兵就能放她們走，但在暴雨和雷聲掩蓋之下，外邊似乎又隱隱還有其他動靜。\n樊長玉遲疑了一下，還是決定披衣起身去門口看看。\n怕他們逃跑，關押她們的地方並不是帳篷，而是原本住在這裡的百姓南逃後，被官兵們徵用的土牆瓦屋。\n一到晚上大門上都是落了鎖的。\n樊長玉淌著雨水到了大門處，借著閃電的光芒卻發現原本守在外邊的官兵不知所蹤，不遠處關押著流民男子們的房子那邊，似乎有人從裡邊拿了什麼硬物在砸門鎖。\n她很快意識到應該是軍營那邊出了什麼事，而這個暴雨夜，也是她們絕佳的逃跑機會。\n屋子裡除了床鋪，沒有任何硬物，樊長玉想了想，直接退後兩步，猛衝上前一腳狠狠踹到了門板上，木門當場就朝外倒坍了下去。\n樊長玉沒理會屋中神色各異的女人們，冒著大雨就衝了出去，直奔放置她們物品的那一間營房。\n很快有人反應過來，連忙也跟著衝了出去。\n男子營房裡的人瞧見了，也停止了砸鎖頭，片刻後，大門連著門框都被人撞飛出去，那個大塊頭沒收住力道，跟著跌進了雨地裡，爬起來後才到對面營房找妻兒。\n一時間，關押流民的這處營地亂做一團，全是在互相叫著名字找親眷的。\n樊長玉孤身一人，很快就找到了自己的包袱，逆著人潮艱難地擠出了放包裹的營房，就瞧見那老頭深一腳淺一腳地剛從關押他的營房裡出來。\n沾溼的衣物貼在他身上，愈顯得瘦骨嶙峋。\n樊長玉本想就這麼一走了之，可想到他脾氣雖古怪，卻極為認真地教了自己四書，民間尚有「一日為師，終身為父」的說法，他教授自己這些，到底也算得上半個老師了。\n樊長玉咬了咬牙，最後還是拎著包裹衝進雨裡，對老頭道：「我背您逃出去。」\n老頭不及說話，就被樊長玉甩到了背上，他被淋得跟個長脖野雞似的，還不忘硬氣：「老夫自己走，不用你背！」\n樊長玉知道他就這麼個怪脾氣，沒在這時候跟他鬥氣，因著前些日子已熟記了軍營的地形，很快就背著老頭逃到了大道上。\n偶爾一道閃電劈下，樊長玉眼皮上都往下墜這水珠，卻瞧見地上橫七豎八倒伏著不少兵卒的屍首，地上的雨水都帶著淡淡的胭脂色。\n遠處的瓢潑大雨裡，還有營帳在燃燒著，似有兩方人馬在廝殺。\n老頭神色不妙地道：「遭了，怕是反賊發現這裡修堤壩攔水的事了。」\n樊長玉在大雨中狼狽睜著眼辨路問：「這些官兵是反賊殺的？」\n老頭道：「從修這堤壩起，反賊派來這一帶查探的斥侯，都是有來無回，定是由此叫反賊察覺了，這才派了一支軍隊前來突襲，目的是為掩護斥侯，讓斥侯帶消息回去！」\n樊長玉不解：「這和修堤壩有什麼關係？」\n老頭神情冷峻道：「你見過哪個攔水大壩是十天半個月能完工的？這大壩草率修建只為暫時攔水，反賊五萬大軍圍了盧城，大壩蓄起來的這些水湧到下遊去，盧城就能不費一兵一卒擊潰反賊五萬大軍。反賊若是提前知曉了這上遊攔截了能淹了他全軍的洪水，你以為反賊還會中計被引到河谷一帶？」\n樊長玉這才明白官兵們為何要扣留他們。\n但眼下這情形，保命才是要緊的，未免被發現，她道了聲罪過，從兩名死去的薊州兵卒上拔下兵服外甲，給自己和老頭套上。\n又在前方看到一匹馬，那馬兒正低頭用鼻子供著倒在地上一名將軍。\n樊長玉趕緊過去牽馬，想著反正自己的馬被官兵收走後沒找到，這就當是軍營賠償給她的了。\n轉步要走衣角卻被倒在地上的那血人攥住，他大概是辨出她身上的薊州兵服，喉嚨裡卡著血水，艱難出聲：「有三名斥侯從盧口道逃了，快……快追……」\n言罷就這麼斷了氣。\n饒是經歷了不少生死，樊長玉在這個雨夜裡還是突然起了一身雞皮疙瘩。\n老頭背著手沉默地站在雨地裡，樊長玉牽著馬走過去，遲疑了幾息才問：「您還跟我一起走嗎？」\n老頭隔著雨幕看著樊長玉，長嘆道：「你若為男兒，我一定讓你橫翻巫嶺，在盧口道進盧城的必經要道那裡截殺那三名反賊斥侯，他們的生死，關乎整個盧城乃至整個薊州的存亡。但你縱有一身武藝，也只是個女子，天下興亡，無責於婦人，你且逃命去吧，我把這消息帶回軍營去。」\n樊長玉說：「那便就此別過了。」\n她翻身上馬，狠狠一夾馬腹往遠處的官道跑去，雨水貼著臉頰從下顎滑下，從天幕劈下的閃電映出她眼底的掙扎。\n她想去找長寧，找到長寧後像從前一樣過平平淡淡的日子。\n打仗什麼的，是那些當大官的才該憂心的事，一城一地的存亡之責，在怎麼也落不到她小小一民女身上。\n可是清平縣城和臨安鎮上的慘案她至今還記憶猶新，山匪搶掠尚且將那兩地變作了死城，萬一軍營那邊派去的人沒追上斥侯，水淹崇州軍的計劃失敗，盧城一破後，等著那裡的百姓的，又是什麼？\n樊長玉狠狠一甩馬鞭，戰馬在大雨裡瘋跑，雨水和冷風打在臉上帶起陣陣刺疼。\n那一瞬她腦海裡閃過許多人，死去的王捕頭夫婦，城西巷子裡那些鄰居，還在盧城的趙木匠和言正……\n她其實早已殺過許多人了，但清平縣和臨安鎮上的那些血色，她至今想起來仍心有餘悸。\n或許……她追去，也是可以阻止那三名斥侯帶消息回去的？\n樊長玉沉沉吸了兩口氣，最後把一扯韁繩讓戰馬停下，沒拿自己的包裹，只取了裡邊的幾把殺豬刀，扣上護腕，跟大雨裡外出狩獵的豹子一樣，棄了戰馬，奔向巫嶺。\n-\n盧城。\n跟薊州上遊下起的瓢潑大雨不同，盧城的夜幕裡只飄著淅瀝瀝的小雨。\n賀敬元站在城樓上，望著遠處隱約可見個輪廓的山脈，問：「已經把反賊引到何處了？」\n一旁的副將答：「斥侯來報，反賊已到了河口處，但甚是謹慎，始終不肯深入。」\n賀敬元沉思片刻後道：「掛我帥旗，繼續誘敵。」\n立馬有人傳令下去，城門開出一條縫，放出一名斥侯             content: `血腥味、土腥味、松脂火把燃燒的焦味充斥在雨幕中。\n隨元青帶著長寧衝刺在燕州軍陣中,人借馬勢，手中長.槍一路挑飛兵卒，長寧臉上被濺到了不少鮮血,哭得嗓子都啞了。\n隨元青臉上也帶著血跡，卻笑得張狂又肆意，甚至還有閒心逗長寧：「小孩，要是你老子沒那膽子出來救你,你今後就留在我長信王府得了，我那侄兒挺喜歡你的,你給他當個小丫鬟也不錯……」\n他手中長.槍一撐，又將一名燕州軍將領挑落馬背,槍尖正欲取那將領性命，斜刺裡突然伸出一根長戟格開他手中長.槍，再橫劈過來,隨元青忙以槍身抵擋,卻還是被那股力道震得連人帶馬後退兩步才穩住身形。\n他抬眸和那長戟的主人對視,嘴角勾起一抹挑釁的笑意：「我還以為侯爺金貴之軀,不會現身了呢。」\n原本的牛毛細雨在此時已有滂沱之勢,謝徵立在雨幕中,閃電將他身後漆黑的夜空撕裂成無數碎片，他溼透的披風沿著馬背往下滴落水珠，長戟斜背在身後,戟刀正往下瀝著鮮血,一雙鳳目冷冷看著隨元青,並不接話。\n隨元青看到他戟刀上的血跡時,忙偏頭往自己胳膊上一瞧,果然被拉出了一道口子,衣服上的雨水浸到傷口，此時方傳來陣陣痛意。\n他眉頭一皺，好快的身手。\n謝徵冷嘲道：「挾一稚童上戰場，隨世子當真是好膽色。」\n隨元青被諷刺了，臉色有些難看，卻並不再戀戰，直接馭馬帶著長寧往回跑。\n長寧被這一晚見過的殺戮嚇到了，此時還渾渾噩噩的，又是晚上，並未認出前來的就是謝徵，在聽到謝徵的聲音後，被隨元青駕馬帶著往回跑，下一子就大哭出聲：「姐夫——」\n她被隨元青放於馬鞍前，仍忍不住探著小小的身子往後看，眼睛都哭得有些腫了。\n隨元青把幾乎快跌下馬背的小孩摁回去，神色卻突然變得有些怪異：「你管剛才那人叫什麼？」\n長寧見到謝徵，底氣足了，瞪著哭腫的葡萄眼衝眼前這大壞蛋放狠話：「我姐夫不會放過你的！」\n隨元青一臉見了鬼的神情：「所以你壓根不是他女兒？」\n謝徵在聽到長寧哭聲時，就已催馬欲追，從地上爬起來的副將忙道：「侯爺，只怕其中有詐。」\n謝徵微眯著眸子打量跑遠的隨元青，只點了幾名親衛跟隨自己同去，對那副將道：「爾等守在此處，勿要跟來。」\n言罷一夾馬腹追了上去。\n副將還想再說什麼，卻只能看見謝徵玄色的披風在冷風裡被揚起的一道凌厲弧度。\n箭鏃在夜幕裡貼著頭皮「嗖嗖」飛過，隨元青不得不俯低身子躲避那如影隨形跟著他的白羽箭，上次在清平縣被追殺的記憶湧上來，讓他心下頓時難堪。\n長寧被他擠得貼在馬背上，知道有人來救自己，這會兒也卯足了勁兒同隨元青作對，不是扯他頭髮就是咬他握著韁繩的手。\n手背傳來刺痛，隨元青輕嘶一聲，另一隻手食指和拇指掐著長寧兩腮讓她鬆開了齒關，冷聲威脅：「你再不知好歹，我現在就把你扔下馬去，讓你被馬蹄踏死！」\n長寧兩腮被他捏得生疼，眼淚花花又忍不住在眼眶裡打轉。\n隨元青見她老實了，才收回手，一邊和崇州騎兵們以「之」字形跑躲避身後的箭鏃，一邊在心中權衡著，自己手中這小丫頭既然並非謝徵的女兒，究竟值不值得他冒這麼大的險來救。\n他們原本的計劃是拿這小孩做餌，引謝徵進埋伏圈，就算要不了謝徵的命，也得讓他脫一層皮。\n可這魚餌的分量並沒有他預料中的重，謝徵還是上鉤了，隨元青突然有種不祥的預感。\n到底是哪一環算漏了？\n以他對謝徵的了解，謝徵不該是這等意氣用事之輩才對。\n他父王造反並非一日之謀，而是從當年大王妃死於東宮，就已埋下了對皇室不滿的種子。\n他父王以為大王妃母子遭遇的大火，是皇帝對他的警告，為了自保，這十幾年來一直韜光養晦。\n為了對付魏嚴，自然就得先折掉魏嚴手中那柄利刃，從謝徵成名起，他父王就一直在培養他成為打敗謝徵的人選。\n兵法上講究知己知彼，謝徵所學的東西，他全盤照學，謝徵打下的每一場勝仗，他父王的謀士們也會和他一起復盤多次，尋找其中的破綻，制定反勝的戰術。\n正是因為這些年一直複製著謝徵做過的一切，他有時候都覺得自己像是活成了謝徵的一個影子。\n這世上除了謝徵自己，應當就只有他最了解他。\n若是和那個女人的骨血，以謝徵的傲氣，或許會冒這個險。\n但只是那個女人的妹妹，對他們這樣的人來說，實在是不值得拿萬千將士的性命去搏這一把。\n莫非……當真是他高估了謝徵？\n出神的這會兒功夫，戰馬前腿中箭，嘶鳴一聲後，迫於慣性就要往前栽倒，隨元青回過神，臉色難看地一手抓著長寧，一手以長.槍拄地借力翻到了旁邊一名騎兵的戰馬上，這才避免了被連人帶馬摔出去。\n謝徵已馭馬追了上來，他橫馬立於大道中央，攔住了隨元青和一眾親衛的去路，一手輕扯韁繩，單手斜提長戟，眼神玩味看著隨元青，輕描淡寫道：「看來隨世子沒吃夠上次的教訓，才這般不長記性。」\n「轟」地一聲驚雷炸響，閃電的白光切出謝徵臉上刀削般的輪廓，冷沉的夜色拖曳於他身後。\n他一人一騎擋著崇州十幾騎，那股壓迫感卻愣是讓馬背上的騎兵們覺著呼吸都有些困難。\n隨元青也被這句話激得險些壓不住眼底的怒色，只不過很快冷靜了下來，痞笑道：「都說侯爺騎射功夫不凡，隨某能領教兩次，也是隋某的榮幸不是？」\n跟著謝徵同來的幾名親騎這時才趕過來，堵住了隨元青一行人後退的路。\n隨元青並不慌張，他歪了歪頭，看著謝徵笑問：「隨某以為，侯爺並非那等把將士性命當做兒戲之輩，為了救回這小孩，侯爺倒是捨得。」\n他說著摸了摸長寧被雨水打溼的頭髮，像是在摸什麼小動物一般。\n這是明顯的離間計，想讓跟隨謝徵的將士對他心生不滿。\n謝徵只反問他：「這場春雨下得大嗎？」\n雨勢更猛，豆大的雨珠子砸在地上，在火光裡將原本的泥地砸出一個個小坑。\n隨元青一開始沒聽懂他為何突然說起這場雨來了，等反應過來時，臉色驟然難看，一想到圍了盧城的那五萬大軍大概會命喪於這場春洪，他額角的青筋都凸起一條，眼底壓著薄怒，抬起槍尖指向謝徵：「你早就知道這是計？從薊州借兵兩萬也是假的？」\n謝徵不置可否。\n隨元青咬牙切齒看著他，須臾，倒是大笑起來：「也罷，盧城之戰敗了便敗了，擒了你，可遠比攻下盧城直取薊州來得痛快！」\n他拎起馬鞍前的長寧，冷笑道：「侯爺謀算過人，隨某甘拜下風，既是如此，便也沒有留這小孩性命的必要了。」\n言罷，竟是把長寧往天上一拋，手中長.槍直刺過去。\n長寧嚇得短促驚叫一聲，謝徵眸色一凜，長戟格開隨元青的武器，在馬背上借力一踏，躍起去接長寧，隨元青瞅準這時機，長.槍從謝徵腋下的戰甲斜刺進去。\n沒了戰甲阻隔，槍尖刺進肉裡，大約是扎到了骨頭，隨元青手上才明顯傳來鈍感。\n一切只在瞬息之間，謝徵一手還抱著長寧，見一名親騎過來，直接將長寧扔向那名親騎，一手壓下槍柄，借著烏金槍頭挑開自己胸甲，落於自己馬背上後，長戟一揮掃向隨元青。\n隨元青駭得在馬背上單手一撐，整個人騰空躍起才躲過那一戟，卻沒料到謝徵會以長戟撐地，借力躍起一腳橫踢向他胸口。\n那一腳落於身上時，隨元青便覺著肋骨斷了，整個胸腔瞬間擠壓撕裂般疼，喉間也湧上了血腥味。\n他本能地還想爬起來，長戟的戟刀卻已抵在他咽喉處。\n雨下得太大，劇烈的疼痛又讓他眼前有些發暈，沒能看清這一刻謝徵是何神情。\n但隨元青很清楚地意識到，自己敗了，還敗得徹底。\n他被擒住，崇州騎兵們也不敢再輕舉妄動，很快有燕州騎兵過來綁了隨元青。\n謝徵居高臨下看著他道：「帶回去。」\n隨元青的幾名親衛眼睜睜看著他被帶走，卻不敢再上前，其中一名趁謝徵等人不注意，翻上馬背就往回跑去報信。\n謝徵吩咐幾名親騎：「即刻前往一線峽。」\n原本還擔心誘不了長信王大軍進峽谷，但活捉了隨元青，可比他親自做餌的效果更好。\n一行人馭馬往回走，謝徵坐於馬背上腰背挺得筆直，唇色卻隱隱有些發白，他執戟的那隻手，不斷有血珠從袖子裡浸出，划過手背，順著長戟的戟刀滴下。\n褚色的裡袍成功掩蓋了鮮血的顏色，加上大雨掩蓋了血腥味，親兵們還未發現他的異常。\n長寧坐在一名親兵的馬背上，被嚇懵了，緩過勁兒來後沒忍住抽抽噎噎地哭，口齒不清地一會兒叫「阿姐」，一會兒叫「姐夫」。\n謝徵瞥了一眼，想到回去這一路還得途經屍首遍地的戰場，對親衛道：「蒙住她眼睛。」`

            num: 71,
            title: `第71章第71章`,
            content: `幾十騎分散奔走在曠野中,渾濁積水淹過了馬蹄，身後的崇州軍很快撕咬了上來。\n為了將崇州軍引進峽谷深處，謝徵特意讓幾十名親騎做出潰逃之勢，讓對方輕敵。\n隨元青被五花大綁拴在一名騎兵馬背上,肋骨斷了不知多少根,整個胸腔都被擠壓得生疼,他當然知道身後的崇州軍追來必定是有來無回,可自己被綁,燕州軍又佯裝敗退誘敵,這是他無論如何都挽回不了的局面了。\n他忍著胸腔撕裂般的劇痛冷笑出聲：「侯爺叫我那鎏金鳳翅槍.刺中心肺,還能忍痛騎馬這般久,委實令隨某佩服。」\n他那一槍從謝徵腋下的戰甲間隙裡斜刺進去,但謝徵表現得實在太過鎮定,便是那名接住長寧的親騎都以為他只是受了點輕傷，其他人更不用說了。\n在隨元青出言後，便沒忍住紛紛朝謝徵看去。\n隨元青的目的就是為了亂軍心,謝徵一倒，群龍無首,今夜這一戰或許還有翻盤的可能。\n雷聲轟鳴,謝徵溼透的披風貼著甲冑垂至馬背,他微微側過頭,身姿筆挺，側臉在森白的閃電下恍若冷玉雕琢而成,鳳目半抬,散漫開口：「看來隨世子那槍頭是蠟做的，下次上戰場，還是記得換成鐵的。」\n語調裡滿滿都是嘲弄。\n親騎們全都嗤笑出聲,隨元青臉色難看：「隨某且看侯爺撐得到幾時。」\n謝徵冷瞥了隨元青一眼，對載著他的騎兵道：「隨世子精神尚好，讓他下馬走走。」\n隨元青臉色驟變，他當然知道這絕不是「下馬走走」那般簡單。\n騎兵們果然歡呼起來，他被綁著雙手扔進了泥濘雨地裡，泥漿混著雨水濺了滿身，有些濺到眼睛裡澀疼得厲害，不及爬起來，騎兵們已雀躍揚鞭駕馬狂奔起來。\n隨元青就一路在雨地裡被繩索拖著走，哪怕有戰甲護著，整個後背也被磨得火辣辣地疼，胸腔斷裂的肋骨似乎錯位得更加厲害，他咬牙死死盯著漆黑的雨幕，額前的冷汗混著雨水一起滑落，唇齒間全是血腥味。\n謝徵駕馬跑在最前方，借著閃電垂眸看了一眼自己被鮮血染成深色的裡袍，蒼白的唇角抿緊，一甩馬鞭催著戰馬繼續往一線峽跑。\n他的情況的確不太樂觀，隨元青那一槍雖沒扎進內臟，卻也挫到了骨頭，傷口面積還不小，加上一直浸著雨水難以凝血，失血過多後隱隱有些眩暈。\n但崇州軍就緊咬在後方，眼下絕不是停下來的時候。\n前方隱約可見一線峽的入口，在夜幕裡仿佛是沉睡的巨獸齜開的齒隙，崇州大軍追到此處，明顯也察覺到裡邊有埋伏，行軍變得極其緩慢。\n謝徵聽著斥侯的來報，眼皮一重，忽而整個人摔下馬去，幾名親騎見狀，忙一勒韁繩，下馬奔去扶他：「侯爺！」\n隨元青被戰馬拖著跑了一路，渾身劇痛，有心嘲諷，卻也沒力氣再吐出一個字來。\n這邊的異樣倒是很快被崇州軍的斥侯查探到，帶著消息飛奔了回去。\n崇州那邊帶兵追擊的將領此刻也是騎虎難下，若是止步於一線峽，沒能帶回隨元青，他回去必定會被長信王發作。\n可若是追進一線峽，中了埋伏全軍覆沒，他幾個腦袋都不夠砍的。\n斥侯帶回來的消息，無疑是壓死駱駝的最後一根稻草，加上有回去報信的那名隨元青的親兵作證，謝徵的確被隨元青所傷。\n救回隨元青，生擒武安侯這樣的絕世功績在前，帶兵的崇州將領很快做出了抉擇，以騎兵開道，命大軍全速前進。\n-\n謝徵的幾名親衛在此時方才發現他身上當真有傷，並且是擦著右邊肋骨刺入的，傷口愈往左愈深，堪稱觸目驚心。\n雨勢太大，兩瓶金創藥全撒上去，親兵撕下戰袍裡襯給他匆匆包紮了一番，都還不斷有鮮血從傷口處溢出。\n一名一直注意著身後崇州軍動向的騎兵駕馬回來道：「崇州軍中的騎兵全往這邊來了。」\n一時間幾十名騎兵都有些惶然，坐在雨地裡處理傷口小憩了片刻的謝徵卻在此時掀開了眼皮，跟個沒事人一樣套上外甲，翻上馬背道：「這回能徹底把反賊引進一線峽了，按原計劃進峽谷！」\n愣在原地的幾名親騎面面相覷，幾乎不能分辨謝徵方才是真摔還是詐崇州反賊的，反應過來後也紛紛翻上馬背，駕馬跟了上去。\n他們要全速趕路，自然也沒了戲耍隨元青的心思。\n隨元青在被放上馬背時，忽而明白了謝徵方才摔下馬的用意，他就是故意的！\n他有傷在身，莫說此番領兵的崇州重將，便是自己親自領兵，都不會放過這千載難逢的機會！\n馬背顛簸，隨元青頭朝下被顛得眼白部分都浸上了血紅，抬眼看一路飛速倒退的山巖時，也似蒙上了一層淡淡的血色。\n他望著依然縱馬跑在最前方的謝徵，有一瞬突然懷疑謝徵是不是感知不到痛？\n他不覺得謝徵受的傷比自己輕，但他都已痛得像是死過好幾遭了，謝徵除了剛才從馬背上摔下故意誘敵，幾乎就沒露出過任何異樣。\n他思索的時間裡，騎兵們已跑過一處彎道，朝天放了一支鳴鏑箭。\n一時間整個山谷巨石滾落如雷鳴，還有一箭距離就要追上來的崇州騎兵們在狹窄的山道上被山崖上滾落的巨石砸得方寸大亂，往回撤，剛進峽谷的步兵又堵在外邊，壓根退不出去，反倒是戰馬受驚踏死的步兵人數，遠多餘被亂石砸死的。\n幾乎要震裂天穹的炸雷聲也沒能蓋過峽谷裡的慘叫聲，閃電劈下，隨元青伏在馬背上，望著遠處死傷一片的崇州軍，沉沉閉上了眼，雙手緊握成拳，掌心被指甲摳破，指縫間溢出了血色。\n這個仇，他會報的。\n崇州騎兵在峽谷裡受驚踩死不少步兵後，後邊的將領很快駕馬上前去指揮穩定局面，讓騎兵不準往後退，一股腦往前衝，以此來減少被山上滾落的巨石砸中的機率。\n後方進峽谷不深的步兵們，則趕緊掉頭往回撤。\n然而崇州騎兵們衝到峽谷出口，等著他們的是一排排早已搭好了弓弦的弓箭手。\n尚未完全進山谷的步兵陣後方，又殺出一支燕州軍來，步兵陣後方亂了陣型，從峽谷裡活著逃出來的兵卒驚魂未定，便瞧見外邊又混戰成了一片，士氣一落，幾乎是落荒而逃。\n帶兵的崇州將領心知這場仗打成這樣，自己已是難辭其咎了，只想儘量保持兵力往回撤，迫於被堵在後方的燕州步兵截了道，想出一計，讓底下的兵卒大呼「武安侯已死」，亂燕州軍軍心。\n這一計果然有用，原本攻勢還猛的燕州軍，在「武安侯已死」的呼聲裡，竟隱隱有了頹勢。\n-\n山上，謝徵聽得斥侯來報，顧不得一身傷，撐著長戟爬起來，軍醫訕訕不敢阻攔，公孫鄞一把將人按了回去，道：「那隨家小子刺的這一槍甚是陰毒，若是再偏一分，就能扎進你臟腑，你且惜命些吧，你這樣子，下山去了又能做什麼？」\n這是親兵們在山上找的一處山洞，雖淋不到雨，可冷風一灌進來，裹挾著水汽還是凍得人直打哆嗦。\n林間的草木都叫雨水溼透了，底下的兵卒們沒能找到生火的木柴。\n謝徵身上的戰甲已卸了下來，只著裡袍，胸膛大敞，一道凌厲的槍痕從他右胸橫貫至左胸，狠狠扎了個窟窿進去，軍醫把搗碎的草藥敷在上邊，紗布都還沒來得及纏。\n他神色冷峻道：「石越是長信王麾下老將，徵戰無數，不可小覷，萬不能讓他穩住士氣，反撲了咱們山下那一萬兵馬。」\n現囤於山下的崇州步兵都還有兩萬，若是讓崇州軍那邊反應過來了，他們那偷襲的一萬兵馬就得被包餃子。\n公孫鄞望著他卸下來堆放在一旁的戰甲，道：「我有一計，尋個身形同你相似的親兵來，穿上你的戰甲駕馬去山下便能穩住軍心，黑燈瞎火的，誰又辨得清究竟是不是你。石越為人謹慎，先前中了你的計冒進峽谷，已讓他嘗到了教訓，若是再看到你出現在山下，必不敢再戀戰。」\n守在一旁的副將也忙道此計可行。\n謝徵權衡再三，終是點了頭。\n軍醫繼續給他包紮傷口，公孫鄞這才看了一眼裹著自己的乾爽披風靠著山洞壁熟睡的長寧，小孩五官生得好，哪怕沾了水被擦乾後的頭髮此刻毛躁躁的，跟只翻毛的小雞仔似的，也叫人覺著怪討喜。\n就是臉紅得好像不太正常，公孫鄞伸手一探，這才發現長寧不是睡過去了，是淋了一夜的雨發燒了。\n他忙對軍醫道：「包紮完給這小孩也看看。」\n謝徵扭頭瞧見長寧臉上燒起來的薄紅，對正纏繞布帶的軍醫道：「去看那小孩。」\n軍醫只得讓謝徵自個兒先按著纏好的紗布，卻給長寧把脈。\n公孫鄞原本打算過去幫謝徵，卻見他自己用低下頭，用牙齒咬住紗布的一端，很快就打好了結，似乎以前沒少幹這事。\n他有心想打探一二關於樊長玉的消息，原本覺著能殺豬的女子，多半得膀大腰圓，上次謝徵去清平縣救人回來後，他私底下問過親兵見到那姑娘沒。\n親兵的回答卻讓公孫鄞很是費解，長得很好看，單手拎起個成年男子能扔出好幾丈遠。\n公孫鄞想像不出是怎樣一個姑娘。\n他一度覺著謝徵的親兵在選女人的癖好上，可能跟謝徵是一致的，才會覺著那樣的姑娘好看。\n今夜見到長寧，知道她是樊長玉的妹妹，公孫鄞突然又懷疑起自己之前的猜測，妹妹五官都這般標誌了，姐姐應該也長得不賴才對。\n所以之前親兵說的那個殺豬的姑娘挺好看應該是真的？\n對於樊長玉的長相，他愈發好奇起來。\n軍醫的藥箱裡備著不少傷藥和風寒藥物，給長寧把完脈後，怕這麼小的孩子熬不住，便去尋親兵想辦法生個火煎藥。\n山洞裡只剩謝徵和公孫鄞，他輕咳一聲對謝徵道：「完好無缺地把這小孩救回來了，你帶著這一身傷去見她姐姐，那姑娘得心疼得掉不少淚呢！」\n謝徵望著雨幕不答話。\n公孫鄞不好表現得太明顯，只好繼續拐彎抹角問：「這小孩你打算如何安置？」\n謝徵看了一眼額前被軍醫搭了塊帕子的長寧：「她姐姐在薊州，等她風寒好了，就送她回薊州。」\n公孫鄞問：「你不同去？」\n謝徵忽而轉眸看向他，小心思被看破，公孫鄞趕緊直起身子，搖扇看山洞外的雨簾：「哎呀，這雨下得可真大，要是水壩那邊一切順利，圍了盧城的那五萬崇州軍，這會兒該盡數葬身水府了。」\n謝徵收回目光，不再理會他，眉峰卻微擰著，顯然也憂心盧城的戰況。`
        },

            num: 72,
            title: `第72章第72章`,
            content: `薊州上遊。\n水壩已被炸毀,渾黃的漫過河床，借著暴雨的雨勢，翻騰著湧向下遊。\n暴雨如瀑,一場戮戰後的營地只餘遍地屍首和一片壓抑的沉寂。\n活下來的兵卒們在冒雨清理戰場,一老者和負責修建這攔水大壩的將軍一同立在雨幕裡望著咆哮而去的洪水和這一夜裡戰死的新兵們,臉上都是一種說不出的沉重。\n許久，那將領才問那老者：「太傅,您說，這洪水放去下遊,還有用嗎？」\n跟著樊長玉一起被困於這營地多日的，正是早已辭官歸隱多年的陶太傅。\n雨線沿著他皺巴巴的眼皮滑落，他背著雙手，望天道：「且盡人事,聽天命罷。」\n前方清理戰場的兵卒們忽而停下了手中動作,望著一個方向發出些許細微的議論聲，陶太傅和那營地主將朝著聲音的源頭看去,只見一女子駕馬自暗沉的雨幕中緩步走來。\n電閃雷鳴中,待那女子走近了些,眾人才瞧清她身後還跟著幾騎，都穿著薊州兵服,馬背上掛著幾顆被暴雨衝乾淨了血跡的頭顱。\n那女子正是樊長玉。\n陶太傅大概猜到了什麼,抬起一雙蒼老的眸子同她對視,眼中三分意外,三分讚賞,還有四分沒看錯苗子的自得。\n幾騎已抵達跟前,馬背上的兵卒翻下馬背,跪在雨地裡稟報軍情,臉上卻怎麼也壓不下喜色：「將軍，我等去追殺那逃跑的那三名斥侯，卻發現他們已盡數被這位姑娘截殺！我等便將斥侯的頭顱帶了回來。」\n負責監督修建大壩的將領一驚後，面上頓時大喜，冒雨上前幾步，對著樊長玉抱拳道：「女俠阻了這反賊回去報信，便是救我盧城萬千軍民於水火，唐某代盧城的百姓和將士們謝過女俠。」\n樊長玉牽著一匹從斥侯手中奪下棗紅色的戰馬，說：「將軍客氣了，民女也是受礦場那邊那位將軍臨終所託。」\n雨珠子從那將領眼皮墜下，他長嘆一口氣，沉痛道：「那是安定北安將軍。」\n安定北？樊長玉想，這真是個大將軍該有的名字。\n死在這個雨夜裡的將士們，不管是將軍還是小卒，知道他們這一夜的廝殺終究沒有白費，或許都能安息了吧。\n她此番跟著回來，主要是為了拿回自己的包裹，她之前為了橫翻巫嶺去截殺那三名斥侯，把包裹放在了馬背上，回來時戰馬已不在自己上山的地方，想著老馬識途，大抵是回了軍營，這才跟著那些前去追殺斥侯的騎兵一併回了營地。\n短暫的寒暄過後，樊長玉便說出自己此行的目的，但這一夜實在是太過混亂，也沒人注意到是不是有一匹馬自己從外邊跑了回來。\n營地主將給樊長玉單獨置了一頂帳篷，讓她暫做修整，吩咐底下人去尋她的東西。\n樊長玉在雨夜翻山越嶺，身上的確被磕碰到了不少處，一身衣裳更是溼透，也需要收拾一下，便答謝應下了。\n軍營裡沒有適合她穿的衣物，主將命人拿了一套新的兵服給她，那兵服是最小號的，樊長玉穿上正好合適。\n她一收拾完，等不及親自去營地裡的馬廄找自己的包裹，陶太傅來尋她都撲了個空。\n這一晚暴雨如注，哪怕已傳回了捷報，軍中上下仍顧不上休息，清理戰場尋找傷員，挖墳冢統一埋葬戰死的將士……\n就連馬廄這邊都忙得不可開交，有的戰馬被砍傷，有的是在作戰時馬蹄踩到了銳物，軍營裡的獸醫們跟軍醫一樣忙得水都顧不上喝一口\n樊長玉正在問一名官兵安將軍的戰馬關在何處，便聽得一道蒼老又熟悉的嗓音：「這馬蹄裡扎進了木楔子，給我拿把鉗子來。」\n樊長玉探頭一看，大喜過望，忙喚道：「趙叔！」\n趙木匠正在給一匹戰馬看傷，咋一聽見樊長玉的聲音，還以為自己聽錯了，虛著一雙老眼朝外看去，瞧清當真是樊長玉時，亦是驚喜萬分，發現她穿著身兵卒的衣裳，卻又瞬間變了臉色。\n他指揮著幫自己抬起馬腿的那名官兵：「你去拿鉗子來。」\n那名官兵走後，他又招呼著讓樊長玉上前去幫忙，領著樊長玉來馬廄這邊的小卒正要推拒，樊長玉卻說她跟趙木匠是同鄉，已經熱絡地上前說話了。\n趙木匠幾乎快急紅了眼，借著讓樊長玉打下手的名頭壓低了嗓音問她：「你怎來了軍中？要是叫旁人發現你是個女兒家，那可是要殺頭的！」\n樊長玉換上乾爽的衣物後，把頭髮也拆下來擦了一遍才重新綁上。\n這是軍營，她穿著一身小卒的衣裳，總不好再梳個姑娘家的髮髻，就胡亂把頭髮束了起來，並非是刻意女扮男裝，但她眉宇間帶了一股英氣，乍一眼瞧著，委實有些像個五官秀致的少年。\n樊長玉見趙木匠誤會了，忙把這些時日裡發生的事都簡要說了一遍。\n趙木匠得知她並非女扮男裝從軍，懸著的一顆心才放下了，但聽說清平縣被山賊燒殺，老伴兒還受了傷，心中也極不好受，頻頻抬起袖子揩眼淚。\n處理好了那匹馬前蹄上的傷，二人暫且找了個地方嘮嗑。\n樊長玉問：「趙叔也被發配來修水壩了？」\n趙木匠嘆氣道：「我原本是在盧城造城防器械的，後來聽說燕州要借兵兩萬，我這把老骨頭也一併被送來了，跋涉了好幾天，大軍在此處落腳，我才知是要修水壩。這一路上戰馬總有個生病的時候，馱運石塊的騾子蹄子時不時卡進了石子兒，也要人醫，我來這兒，主要就是給牲畜看病的。」\n樊長玉之前被看管起來採挖土石，壓根沒來過軍營腹地，趙木匠也沒去過那邊的營地，這才沒碰過面，一時間二人都是唏噓。\n樊長玉想起言正，又問了句：「那趙叔進軍營這些時日，可有過言正的消息？」\n一說起這個，趙木匠有些猶豫地看了樊長玉一眼道：「他是最初被借給燕州的那一批兵卒，你託我帶來的東西，我都讓人轉交給他了。我原先以為他也在這裡修水壩，但打聽了這麼些天，他似乎被調往燕州去了。」\n燕州緊鄰前線，又是跟北厥人交手，從某種程度上講，比在盧城還兇險些。\n樊長玉沉默一息後，道：「他一身本事，應當能給他自己掙個好前程的。」\n趙木匠還不知那包裹裡有和離書，笑道：「他若是出息了，丫頭你也能享福了。」\n樊長玉沒打算再瞞趙木匠自己跟言正和離的事，抿了抿唇說：「趙叔，我跟他其實已經和離了。」\n趙木匠正捧著粗陶碗喝熱水驅寒，聞言差點沒把碗給摔了，抬起眼皮皺巴的一雙老眼問：「怎麼回事？」\n樊長玉如實道：「當初入贅本就是假的，只是為了應付樊大保住家產。」\n趙木匠放下水碗，沉默好一會兒消化完了這消息，才長嘆了口氣道：「長玉丫頭，叔瞧著言正那孩子，對你倒也不像是無意。少年夫妻總是意氣些，容易走彎路，將來要是還能遇見，把話說開了才好，可別一把年紀了，還留下筆糊塗帳。」\n樊長玉想起言正走的那天，自己都沒和他好好說一句話，心底也有些不是滋味，垂眼應了聲好。\n帳外的官兵又牽來一匹受傷的戰馬，吆喝著讓趙木匠快去看看。\n樊長玉找到了自己的包裹，閒著無事便去幫趙木匠，給他打下手。\n陶太傅在軍帳那邊左等右等不見樊長玉回去，親自過來找她時，就見她半點不嫌髒地在馬廄裡幫一個獸醫老頭子抬馬腿，那股熱切勁兒跟對著自己時的疏離，簡直判若兩人。\n陶太傅面上頓時有些不好看，自己教這丫頭東西，她不肯拜師也就罷了，還眼光差到轉頭要跟個獸醫老頭子學藝不成？\n他站在馬廄外咳嗽了好幾聲，奈何馬廄嘈雜，又有雷聲，成功把他的咳嗽聲蓋了下去。\n一個獸醫在拔戰馬腿上的箭鏃時，馬兒突然受了驚，踢到了那獸醫不說，還在馬廄裡橫衝直撞，帶倒了馬廄的一根木柱，讓整個馬廄棚子都塌了下來，一時間戰馬全都受驚往外瘋跑，官兵想攔都攔不住。\n樊長玉手疾眼快拽著趙木匠往外跑，躲開了倒塌的棚子，一抬頭卻見那老頭也木愣愣站在門口，還有馬匹朝那邊撞了去，她想也沒想，忙衝過去把那老頭撈到空曠地方處。\n樊長玉把人放下後，狼狽抹了一把眼前的雨水，問陶太傅：「您老怎麼來這邊了？」\n趙木匠問：「這是？」\n樊長玉道：「這便是我方才同您說的，我被扣在這裡採挖石塊結識的那位老先生。」\n陶太傅幾乎是被樊長玉扛著狂奔過來的，這會兒胃裡翻滾不說，腦袋也有些發暈，顧忌著體面忙整理著自己衣擺，壓根不想搭理她。\n受驚的戰馬盡數被馴馬的官兵們安撫了下來，還就近騰了一處軍帳，暫且給受傷的人看傷。\n樊長玉打算扶趙木匠和陶太傅過去避避雨，一碰趙木匠胳膊，卻引得他「哎喲」一聲。\n樊長玉忙問：「是方才被我拽傷了？」\n趙木匠擺擺手：「老骨頭，不中用，關節經常一碰就傷著。」\n樊長玉心知大概自己情急之下拽狠了，才讓老人家關節拉傷了，心中愧疚，進了軍帳就找了把椅子讓趙木匠坐著。\n被馬蹄踢到的獸醫被官兵救了出來，這會兒正躺在軍帳裡接骨，叫得又悽慘又大聲，樊長玉瞧著似乎還有一陣才能給他包紮好，便打了盆熱水，擰了帕子給趙木匠胳膊先敷著。\n陶太傅進帳站了半天，看樊長玉忙前忙後照顧趙木匠，而自己完全被晾一邊，壓根沒趙木匠的待遇，不快得嘴角鬍子都往下撇著。\n他走到趙木匠對面的椅子上一坐，也「哎喲」一聲，聲音甚至蓋過了那名被馬腿踢到的獸醫。\n樊長玉忙得跟個陀螺似的直打轉，聽到聲音扭頭問：「您怎麼了？」\n陶太傅閉著眼說：「老夫頭疼。」\n樊長玉道：「定是淋雨感染了風寒。」\n轉頭又託付軍醫，讓給陶太傅也把脈開服藥。\n跟著陶太傅一起來的親衛知道他的真正身份，壓根不敢讓他有閃失，忙說帶他回主帳那邊再請軍醫給他看病，奈何陶太傅死活不肯走。\n等軍醫終於去給陶太傅把脈，才發覺這固執老頭已經發起熱來了，忙讓底下小卒回去拿一包治風寒的藥煎著。\n煎藥的人手不夠，樊長玉主動攬下了幫趙木匠和陶太傅煎藥的活兒。\n因為陶太傅死活不肯回主將單獨撥給他的軍帳，一定也要擠在傷兵帳裡，底下的小卒見他和趙木匠都是兩個老頭，還把他們的床位安排到了一起。\n趙木匠為人和氣，陶太傅因為頭疼腦熱的，脾性愈發古怪，趙木匠主動同他說話他都不帶搭理的。\n在樊長玉去煎藥時，他才忍著頭疼道：「老夫的藥一定要先煎！」\n樊長玉只覺這老頭跟個小孩似的，在這種事上都要爭個先後，無奈道：「兩口鍋一起煎的，不存在先後。」\n陶太傅這才不做聲了。\n趙木匠半點沒覺出陶太傅對自己的莫名敵意，還同陶太傅嘮嗑：「長玉落到軍中也能遇上個夫子，是她的福氣，也是老先生肯結這善緣。」\n陶太傅聽著這些話，心中舒坦了些，問：「你是那丫頭什麼人？」\n趙木匠說：「十幾年的鄰居了，那丫頭是我看著長大的，就跟自家孫女一樣。」\n陶太傅突然覺得這看著好說話的老頭，是在不動聲色跟自己炫耀他同那丫頭關係親厚？想到自己收徒不順，他氣悶地不吭聲了。\n趙木匠說著倒是又嘆起氣來：「多好一個丫頭，可惜命苦啊，沒了爹娘不說，還跟招贅的夫婿和離了，如今妹妹也不知被人拐到了哪裡去……」\n陶太傅原先只覺樊長玉心性比旁人堅毅，聽趙木匠說了她身世，不由多了幾分憐憫，連帶對她拒絕拜師的怨氣也消了一點，道：「我有個學生在軍中，也算是我半個兒子，他當了個官，那丫頭將來要是找不到好人家，我讓那臭小子從他手底下尋個踏實上進的後生娶那丫頭。」\n趙木匠一聽這老頭願意管樊長玉的終身大事，愈發覺著他是樊長玉的貴人，一番答謝後，兩人倒是越聊越投機。\n沒了那點偏見，陶太傅覺著這獸醫老頭雖不識幾個字，為人卻通透，聽他講大半輩子當獸醫和木匠的見聞，也覺出不少野趣來。\n等樊長玉煎藥回來，見二人一副相識恨晚、相談甚歡的樣子，反弄得她一頭霧水。\n她還不知自己已經被他們安排了一個「踏實上進後生」夫婿。\n-\n第二日下午，盧城一戰告捷的戰報便送到了營地裡，燕州軍在一線峽伏擊崇州軍也是大獲全勝，還生擒了長信王世子，軍中士氣大振，上下一片歡欣鼓舞。\n只是春雨引發了泥石流，燕州殘軍眼下被困在了山上。長信王得知盧城兵敗、燕州借兵是計後，大概被逼急了，直接劍走偏鋒率崇州餘下兵馬圍了一線峽，揚言要把燕州軍和武安侯都困死在山上。\n營地主將得了斥侯帶回的消息後，趕緊召集麾下所有部將，商議解圍之法。\n前來修大壩的兩萬將士都是新兵，幾乎沒有作戰經驗，前一夜面對崇州軍突襲的時候才手忙腳亂，生生讓斥侯跑掉了三個。\n他們若貿然前去一線峽救人，山上下過雨又才發生過泥石流，地勢複雜，萬一不小心鑽進了崇州軍設的套子裡，全軍覆沒都有可能。\n眾人一籌莫展之時，風寒稍退的陶太傅拖著病軀進了中軍帳，提出「圍魏救趙」一計。\n他道：「囤於河口的這兩萬大軍，主力部隊前往崇州，圍而不攻，不怕長信王不掉頭回去保老巢。畢竟崇州都沒了，他就算殺到山上去生屠了燕州軍，也於事無補。」\n主將喜道：「此計甚妙！本將軍這就下令拔營！」\n陶太傅風寒未愈，啞聲低咳片刻後，補充道：「燕州殘軍被困於山上，糧草應當也所剩無幾了，還得另派人馬送些糧草過去。」\n燕州同崇州打的是一場野戰，並未帶多少物資，只因得勝後不巧遇上泥石流被困，才讓崇州又搶佔了先機。\n主將都快急昏了頭，被陶太傅這麼一點，忙道：「太傅所言甚是！只是運糧的隊伍太大了，難保不會叫崇州斥侯察覺，暫且撥一千人馬帶糧草過去應急罷。」\n調軍令和運糧令很快下來了，大軍都在收整東西準備拔營。\n趙木匠得跟著大軍一起去圍崇州，樊長玉本想一起去，但她一個女兒家，目前落腳於這裡，一是立了功，二是還有一些活下來的流民也暫且被留在這裡照顧，若一直跟在軍中，便有違軍規了。\n她截殺了那三名斥侯，主將依然只能給她賞金，沒法封她個軍職什麼的。\n她自己上路也不是不行，只是樊長玉現在有些猶豫，長信王率兵去山上圍武安侯，崇州城必然是緊閉的，她去了也沒法進城找長寧。\n而趙木匠說言正似乎在被燕州借走的那一千人裡，一場戮戰後，山上又因大雨爆發了泥石流，不知言正如今是死是活。\n她要不要先去一線峽山上找言正？\n陶太傅回去時見樊長玉立在帳外出神，問她：「丫頭，老夫要隨軍給山上的燕州軍送糧草，你要不要跟著老夫一起去？」\n樊長玉這兩日才知道這怪老頭姓陶，並且因為有些真才實學，貌似成了軍中的幕僚，連主將都對他很是禮遇。\n她看著陶太傅那張滿是褶子的老臉，認真想了想，終是點了頭。\n再去見言正一面也好，他要是死在了那裡，她就把他埋了，幫他立個碑。\n他家中似乎沒有旁人了，他們好歹相識一場，做了幾個月名義上的夫妻，以後逢年過節燒冥紙，她給他也燒一份就好了。\n他要是還活著，她們之間應該也還不至於老死不相往來。\n運糧的軍隊先走，趙木匠前來送她們，讓樊長玉茫然的是，趙木匠跟老頭道別說的話竟然比對自己說的還要多。\n-\n為了避開崇州軍的斥侯，運糧軍隊得在山中繞路走，饒是如此，還是碰見了好幾撥斥侯，幸好軍中有隨行的弓箭手，追出十幾裡地都要射殺斥侯，才讓一路行軍的消息沒被太快叫崇州軍察覺。\n樊長玉因為橫翻巫嶺殺了三名崇州斥侯，在這些新兵裡倒也小有名望了，有時候追擊斥侯，她也會被邀跟著一起去。\n她不擅使弓箭，跟著弓箭手學時，力氣雖大得能直接拉毀一張弓，但準頭極差，還沒有從地上撿塊石頭擲砸得準。\n樊長玉怕浪費兵器，索性不學了，路上看到弓箭手射下野兔加餐後，又有點眼饞，直誇那弓箭手厲害。\n資歷稍老些的將士卻都笑道：「樊姑娘你是沒見過咱們侯爺射箭，那射藝才叫一絕，百步之內莫說兔子，柳葉都能射中。」\n樊長玉聽過百步穿楊的典故，百步穿柳倒是頭一回聽說，柳葉那般纖細，隔著百步怎麼射中？\n震驚歸震驚，但那位能徵善戰的武安侯，形象在她心中還是又高了一大截。\n-\n日夜兼程趕路趕了一天半，總算是抵達了一線峽山口。長信王約莫是已經聽說了兩萬大軍前去圍崇州的消息，守在山下的兵馬往回撤了些，瞧著並不多，但也不是她們送糧的這一千人馬能應付的。\n要想把糧草送上山，為今之計，只能裡應外合，打崇州軍一個措手不及，撕個口子鑽進去。\n但他們兵力薄弱，能不能撐到山上的人發現他們，來跟他們裡應外合還是未知數。\n陶太傅和這此次領兵的小將正一籌莫展時，正好遇上燕州那邊的援軍，兩方兵馬匯一起，有了個兩三千人，便聲勢浩大地從山腳被崇州軍守住的一個要道往上衝。\n這動靜果然引起了山上燕州殘軍的注意，立馬配合援軍從裡邊一起合攻這處崇州軍，很快就撕出一個進山的口子，糧草和一些傷藥全都被搶送上山去了。\n送糧的援軍卻並不跟著一起上山，等山上的殘軍搬完東西，守在別處的崇州軍撲過來時，他們又撤軍竄進了密林裡，和崇州軍躲起貓貓，為的就是後面山上的燕州軍攻下山時，他們能在外邊接應。\n樊長玉原本是和陶太傅一起觀戰的，看搶搬物資上山太慢，看得心急，沒忍住去一起搬，等扛著大袋小袋的糧食上山後，才發現出口又被封住了，她和其他運糧上山的兵卒只能留在山上。\n樊長玉倒也沒多氣餒，她本來就打算來找言正，正好可以在山上打聽打聽。\n被困在山上的燕州將士們已兩日沒吃過東西，這又才開春，山上長出來的野菜並不多，只靠著打獵獵到的那點野味燉個湯，嘗點肉腥味。\n眼下有了米，將士們立馬熱火朝天地生火煮飯。\n傷病營裡的情況更不樂觀，不少將士因為淋了雨，發起了高熱，但軍醫帶的那點藥材根本不夠用，還有在戰亂和泥石流中受了傷的，也沒止血藥物，只在傷口處纏著用撕裂的裡袍做的布帶，姿態各異躺在傷兵帳裡。\n現在有了藥材，軍醫連忙讓煎藥給傷兵服下。\n樊長玉看到這些傷兵的慘狀有些不忍，他們不知是誰的父親，誰的兒子，誰的丈夫，也不知還能不能活著回去。\n她從前照顧長寧和言正，也算是有煎藥經驗了，看軍醫忙不過來，便自告奮勇去幫忙煎藥。\n-\n軍醫在有藥後，第一時間拿去給謝徵換，自從兩日前遇上泥石流，他們被困於山上，生生叫反敗的崇州軍給堵住了下山的路，謝徵幾乎就沒怎麼合過眼，一直在同公孫鄞制定禦敵之策。\n他身上的傷極為嚴重，但因為藥物緊缺，這兩日便沒再換過藥，讓軍醫把傷藥先緊著些那些傷勢重的將士。\n長寧身體也爭氣，當日那服藥喝下去後，燒就退下來了，只是因為一直沒有吃的，明顯消瘦了下來。\n親兵們打來的獵物，沒有鹽和其他調味料，煮出的湯腥味很重，她聞著就吐，壓根吃不下，謝徵讓人用草汁塗在烤肉上，她才勉強吃一點。\n公孫鄞知道謝徵自己有傷在身，不方便照顧長寧，他住處又時不時有部將前去議事，便把小孩帶自己住的地方去讓親兵看著。\n此刻軍醫前去勸謝徵換藥，知道將士們眼下食物和藥材都充足後，失血過多的眩暈和兩日未曾合眼的疲憊齊齊湧上來，謝徵只覺自己閉眼就能徹底睡死過去，他抬手按了按額角，眼底全是血絲，道：「本侯尚撐得住，先給底下的將士們用藥，傷兵帳那邊人太多，也可遷一些將士到主帳來。」\n山上的軍帳也不夠，不少將士都是現場砍伐樹枝，臨時搭起的一個避雨棚子。\n軍醫擔心謝徵的身體，忙道：「侯爺，傷藥夠用的，您的身體才要緊……」\n謝徵忽而抬眸看了軍醫一眼，軍醫被那個冷沉又倦怠的眼神盯著，低下了頭去，所有勸說的話也堵在了喉頭。\n他心知自家侯爺雖兇名在外，卻極愛重手底下的兵將，嘆了口氣離開軍帳，尋思著回頭還是得讓公孫先生來勸。\n公孫鄞聽了，只讓把包紮好的傷兵轉移到主帳去。\n軍醫一頭霧水地照做了，才明白公孫鄞是想著謝徵見到那些傷兵，便該相信傷藥是夠用的了。\n謝徵實在是疲乏至極，軍醫離去後，他撐著手本想繼續揉按隱隱作痛的額角，卻沒耐住倦意就這麼睡了過去，傷兵們被轉移進主帳，他聽見動靜才又醒來。\n親兵們在主帳裡擺上數張臨時用樹枝搭建起來的簡易軍床，讓謝徵去空出的一張軍床上先歇會兒。\n謝徵見自己坐在主位上引得傷兵們頻頻看來，便點了頭。\n他傷在胸前，著戎甲會壓著傷口，只穿了單衣。\n進帳的傷兵大多都是底層小卒，幾乎沒見近距離見過謝徵，稀裡糊塗就被轉到了這邊軍帳，見他沒著甲，身上又有傷，還以為他也是受傷被轉過來的。\n謝徵既把主帳借出去讓這些傷兵養傷，自然也不願讓他們在自己眼皮子底下戰戰兢兢躺著，交代親兵們別透露自己身份，合衣躺下後開始補眠。\n親兵們怕他著涼，又不敢把厚錦披風給他搭著，再三思量後，只得尋了件殘破的小卒兵服給他搭上。\n樊長玉煎好藥得知有一批傷兵被送到別處去了，過來送藥，她從門口的軍床挨個遞過藥碗，傷兵們發現她是個姑娘家，都有些靦腆，小聲地同她道謝。\n守著謝徵的親兵往外瞥了一眼，在看到樊長玉時，一雙眼瞬間瞪得有如銅鈴大。\n他沒認錯的話，這是他們侯爺前不久才去清平縣山匪窩裡親自找的那位姑娘？\n她怎會穿著薊州兵服出現在這裡？\n親兵頓時腦補了一出肝腸寸斷的千裡尋夫戲碼，看看睡沉的謝徵，又看看還在送藥的樊長玉，猶豫著要不要叫醒自家侯爺。\n沒等他糾結太久，樊長玉便已端著藥碗遞到了跟前。\n謝徵嫌光線太亮，側著臉朝裡睡的，大半張臉都埋進了陰影裡，樊長玉一時沒認出他，只瞧見他半身衣裳都被血泅溼了，纏在身上的紗布也被染紅了一大片，不像是才包紮過的樣子，人貌似還暈過去了。\n她忙皺眉朝帳外喊：「軍醫，這個人傷口似乎崩裂了，得重新包紮才行。」\n幾乎是聽到她聲音的瞬間，謝徵就猛然掀開了眼皮。\n樊長玉正準備幫這個傷勢頗重的人調整姿勢，轉到床那邊去，不期然同謝徵的視線對上，她整個人明顯愣住，好半晌，才不確定道：「言正？」\n這個名字一出口，再看他渾身是血的樣子，樊長玉鼻尖突然有些發酸。\n原來他真的差點死在了這裡。\n謝徵看著她沒說話，眉頭下意識鎖著，旁人瞧不出什麼，熟悉他的人才知道，他這就是懵了。\n親兵深思熟慮後，默默摞遠了一點。\n其他傷兵以為樊長玉是千裡尋夫來找謝徵的，紛紛投來了豔羨的目光。\n謝徵看了樊長玉許久，似乎確認了她是真的來了這裡，才沙啞問出一句：「你怎來了？來這裡做什麼？」\n他兩夜未眠，嗓子有些啞。\n樊長玉沒想過再次見到謝徵是這樣的情形，她看著他身上那些血跡，眼底莫名有些發澀，道：「我來找你啊。」\n這是真話，她得知他也在這支燕州軍裡，怕他有什麼閃失，才跟著一起來送糧。\n謝徵聽到這話，瞳仁微不可見地縮了一下，心臟像是被一把鉤子突然勾得緊緊的，刺疼，又升起綿密的癢意，仿佛有什麼東西想在那團血肉裡生根發芽，他漆黑的眸子一瞬不瞬望向樊長玉：「找我？」\n樊長玉已幫他拆開了紗布，望著他橫貫了大半個胸膛的那道混著草藥汁和發黑血跡的猙獰傷口，眼眶更紅了些，沒顧上回答他的話，抿緊唇角壓下心酸問他：「怎麼傷成了這樣？」\n比她撿到他時他身上那些傷還要可怕些。\n謝徵頭一回瞧見她眼中露出那樣的神色，像是雨後霧蒙蒙的山林裡照進的晨曦，溫暖，溫柔，璀璨，又憐惜。\n心口的那把鉤子勾得更緊，疼，又癢，像是傷口在催生新芽，他指尖動了動，下意識想觸碰什麼，移開視線道：「傷口看著嚇人，沒那麼嚴重，沒傷到肺腑，躺幾天就能養得差不多。」\n樊長玉自然不會信他這套說辭，她看著他還沾著血的蒼白臉頰，突然覺得很難過，說：「你別從軍了，跟我回去，我殺豬養你。」\n公孫鄞和軍醫剛走至帳外，正要掀帳簾，聽得這麼一句，不由齊齊頓住了腳步。`

            title: `第73章第73章`,
            content: `軍醫之前跟樊長玉接觸過,知道她在找人，驟然聽到這麼一聲，心中替樊長玉捏了一把冷汗,心說武安侯也在帳內,叫他聽見樊長玉攛掇手底下的兵卒跑，還不知要怎麼治樊長玉的罪呢。\n他正想趕緊進帳去打斷，公孫鄞卻攔下了他，臉上掛著意味不明的笑容衝他搖了搖頭，又做了個禁聲的手勢，側耳細聽起帳內的動靜。\n軍醫一顆心都提起來了,心說那女子不知軍規一時失言罷了,怎地就連軍師也一副看熱鬧不嫌事大的樣子？\n他心驚膽戰站在帳外,生怕下一刻就傳來謝徵讓人進帳把人拖出去罰軍棍的聲音，但帳內只傳來了一眾傷兵的起鬨聲,有人道：「兄弟,我要是你,有這麼個姑娘跋涉千裡來找我,老子死這裡都值了！」\n「也不知你小子幾輩子修來的福氣，咱們打完仗只盼著還能全須全尾回去,年紀大了說媒都不一定能說上，你倒好，人家姑娘直接來找你了！」\n也有人對勸慰樊長玉：「大妹子,咱們知道你是心疼你家漢子，不過這話可別在軍營裡亂說,當逃兵那是要殺頭的！你也別擔心,他傷成這樣都沒死,將來定有後福。」\n樊長玉當然知道不能讓言正當逃兵,她只是看著他身上那猙獰的傷口，想到他是為了不連累自家和其他九戶人家才被徵兵帶走的，心中痛心又愧疚，情急之下才說出了這麼句話。\n她正幫謝徵清理著他傷口上幾天沒換過的藥渣，血腥味和藥味混雜在一起多日，形成了一股難聞的味道，傷口新肉和腐肉交織，要是重新上藥，只怕還得刮掉那一層腐肉。\n一顆豆大的淚珠子都沒划過眼瞼，直接從她眼眶砸了下來，樊長玉才發現自己哭了。\n她抬起手狼狽抹了一把眼，努力想讓自己平靜，一開口，嗓音卻還是啞了：「我沒想讓他當逃兵，我……」\n她看著謝徵，又一顆淚珠砸下，最後只啞聲說了三個字：「對不起。」\n若不是假入贅給她，他不會被納入徵兵名冊。\n要不是為了不連累她和附近的鄰居，他也不會乖乖被官兵帶走。\n看他在戰場上被傷成這樣，樊長玉覺得難過。\n謝徵還沒從她說的跟她回去幾個字中回過神來，抬眸見她眼底的淚，蒼白乾裂的唇角微抿，說：「別哭。」\n他知道樊長玉為什麼道歉，也知道她心中的愧疚，想告訴樊長玉一切，眼下時機、場合又都不對，終是開不了口。\n這是他第一次見樊長玉哭，心口的地方像是被什麼東西絞著，又像是泡在了暖融融的溫泉水裡，很奇異又很陌生的感覺。\n他想幫她擦擦淚，再抱抱她，但不知是不是這些天一直繃在腦子裡那根弦鬆掉了，身體的疲憊和損傷加倍湧了上來，手腳像是灌了鉛，他半撐著想坐起來都艱難。\n樊長玉看出他想動，按著他肩膀把他按了回去，紅著眼道：「你別動，等大夫來給你處理傷口。」\n轉頭又急切朝帳外喊：「軍醫呢，軍醫來了嗎？」\n謝徵看著她的側臉，視線落到她放在床側的那隻手上，指尖遲疑虛握了上去，又說了一句：「別哭。」\n樊長玉忍著眼眶的澀意，低頭看了一眼他虛握住自己的手，五指用力回握了回去，手心和他帶著薄繭的大掌貼得緊緊的，她的手暖烘烘的，他掌心卻因虛弱帶著幾分微涼，但被她這麼緊緊握著，似乎也有了淡淡的暖意。\n她們從相識到現在，這還是第一次牽手。\n像是一種無聲的默契在這次牽手中達成，樊長玉用明澈又堅定的一雙眼望著他說：「我沒哭，你別怕，我們帶了很多傷藥上山，軍醫肯定能治好你的。」\n軍醫在樊長玉又一次叫人時，就忙看向公孫鄞，公孫鄞似乎沒能聽到想聽的，神情頗為失望，這才帶著軍醫一同進帳去了。\n軍醫心中頗不是滋味，暗道這軍師果真是個面善心惡的，侯爺沒責罰那女子，他竟還失望！\n公孫鄞總是一身白袍，手上又拿著扇子，極為好認，他一進帳，傷兵們明顯就拘謹起來。\n公孫鄞笑容和煦道：「諸位將士歇著便是，我此番前來，只是看看大家傷勢如何，傷藥是否夠用。」\n目光卻不動聲色地往樊長玉那邊斜去了。\n樊長玉聽到動靜就往門口看去，她也是第一次見公孫鄞，瞧出他應該是個當官的，只是謝徵正傷著，她無暇顧及，直接看向一旁的軍醫，招呼道：「軍醫，你快給他看看！」\n她這一抬頭，公孫鄞剛好瞧清她正臉，含笑的狐狸眼往上挑了挑，顯然很是意外。\n這女子模樣生得不差，但乍一眼瞧去只覺老實巴交的，像是那些門閥大族裡死了親娘又不得生父看中，被其他姐妹從小欺負到大的不受寵貴女。\n不同於嬌弱得像朵花似的「我見猶憐」，而是像在路邊撿到一隻乖順小狗，光是看著，就能莫名讓人軟了心腸，任誰也不會信她竟是個能提刀殺豬的。\n公孫鄞想想自己之前聽到的那些關於她的話，心下只覺怪異，他視線落到樊長玉手臂上，眉毛更是擰了擰，這細胳膊細腿的，能拎起一個成年男子扔出幾丈遠？\n莫不是那親兵胡說的？\n公孫鄞目光掃向挪到角落裡去的親兵，親兵同他眼神對上，明顯沒弄懂他的疑問，表情很是茫然。\n公孫鄞索性收回目光，不期望能從親兵那副蠢樣裡得到什麼答案了。\n軍醫已挎著藥箱去樊長玉那邊，他從進門就小心翼翼地朝主位上看去，沒瞧見謝徵，大鬆一口氣，心說難怪沒聽侯爺發怒。\n此刻放下藥箱，挽起袖子正要把脈，看清躺在軍床上的是何人時，腿肚子瞬間發軟，腦子裡也跟打翻了一罐漿糊似的，神情震驚又茫然。\n侯……侯爺怎在此處？\n莫非這女子方才的話就是對侯爺說的？\n軍醫狠狠抽了幾口涼氣。\n樊長玉見軍醫一副驚悚的表情杵在原地，趕緊又催促：「軍醫？」\n軍醫回過神看了樊長玉一眼，艱難咽了咽口水，同軍床上的謝徵視線對上，坐到一旁的簡易木凳上去把脈時，不僅手抖得幾乎把不住脈搏，兩腿也直打擺子。\n他聽了這麼多不該聽的，轉頭該不會被侯爺殺人滅口吧？\n樊長玉看軍醫渾身都在發抖，擔心他給謝徵把錯脈，一臉擔憂問：「軍醫，您沒事吧？」\n就這一會兒工夫，軍醫額前汗珠子都跟滾珠一樣了，他抬起袖子胡亂擦了擦，被謝徵看著，勉強擠出個笑臉道：「沒事……沒事……」\n好不容易把完脈，樊長玉當即就問起謝徵的情況，軍醫揩著汗道：「侯……」\n這個字一出口，就驚覺侯爺的親衛打了個眼色，軍醫趕緊改口：「後生可畏，這傷離臟腑只差毫釐，實乃兇險，只是身體底子好，才能拖這麼些天，但還是得及時用藥，好生將養。失血過多這些日子大抵會頻頻頭暈，最好……最好是能吃些葷食進補。」\n把完脈要給謝徵的傷口清理腐肉重新傷上藥，樊長玉見軍醫還是有些手抖，怕他一個不小心傷到謝徵，提出自己來。\n軍醫手抖只是被嚇的，這會兒正在努力平復，他也萬不敢讓謝徵有絲毫損失，只是又不放心讓樊長玉一個生手來操刀。\n謝徵在此時開口：「就讓內子來吧。」\n軍醫心中瞬間又掀起了驚濤駭浪，原來這女子是他們那素未謀面的侯夫人！\n樊長玉驟然聽到這麼個稱呼，也愣了愣，但沒說什麼。\n軍醫一直到坐到一旁的矮凳上指揮樊長玉刮腐肉時，嘴角的鬍子都還在打顫。\n公孫鄞顯然也極其意外，他美名其曰關照受傷將士，堂而皇之地留了下來，挨了謝徵幾記眼刀都沒挪動腳步，視線一直在樊長玉和謝徵身上睃巡。\n樊長玉拿起匕首放到火上烤，所有注意力都放到了謝徵胸口的腐肉上，壓根沒看周圍的人。\n親兵拿了乾淨的棉布帕子讓謝徵咬著，謝徵沒要。\n樊長玉拿起匕首，另一隻手已輕摁在了他胸膛上，問他：「怕不怕？」\n謝徵說：「你動手就是。」\n樊長玉突然覺得眼窩泛酸，她壓下這一刻心頭的所有情緒，全神貫注颳起他胸口的腐肉，下刀極穩，嘴角也抿得極緊。\n謝徵只一瞬不瞬地看著樊長玉，仿佛胸口的傷，自己的性命，都只是無關緊要的事。\n兩人額角都沁出了汗，卻都一聲不吭。\n樊長玉察覺手心也有汗時，找人拿了帕子胡亂擦了擦手和匕首把，便又埋頭繼續割傷口的腐肉。\n謝徵渾身肌肉繃得像石塊一樣硬，手臂到額角的青筋都凸了起來，有汗水從他眼皮墜下，他卻連眼都沒眨一下。\n整個軍帳也沒人說話，安靜得出奇。\n公孫鄞持扇立在一旁，眼底的戲謔和嘴角的笑都收了起來。\n很奇妙的感覺，前一刻他還覺著，這女子和謝徵，容貌上雖般配，可論起家世，於這女子也不知是福是禍。\n這一刻，他突然又覺得，這世間，除了這女子，大概也沒有第二個人，能讓謝徵放心把性命交出去了。\n他連命都可以給她，將來又豈會讓她在魚龍混雜的京中受半分委屈？\n至於這女子配不配得上謝徵，她都能讓謝徵心甘至此，又哪輪得到旁人去置喙她好不好，配不配？\n他用扇骨在掌心輕敲了兩下，嘴角又淺淺彎了起來。\n謝徵胸膛上最後一塊腐肉被刮完，樊長玉整個後背幾乎已叫汗水溼透，她扭頭對軍醫道：「好了。」\n軍醫忙灑了一瓶金創藥，又把在這期間搗好的草藥給謝徵敷了上去，交代這些天最好別下床，在傷口完全癒合前，也別拿重物。\n樊長玉一直沉默地立在一旁。\n公孫鄞看夠了熱鬧，在謝徵又一次冷冷朝他看來時，才慢條斯理同傷兵們說了幾句寬慰的話，給了謝徵一個會替他保守秘密的眼神後，施施然起身跟著軍醫一起離去。\n人都走了，親兵怕被樊長玉覺出異常，不好意思杵在裡面，也跟著去了外邊。\n樊長玉這才小聲問謝徵：「疼嗎？」\n謝徵搖頭，說：「不疼。」\n樊長玉眼眶還是隱隱有些發紅，她之前煎的藥，就有抑制傷口發炎的作用，謝徵這傷，也可以喝。\n她端來一碗，一勺一勺舀起餵給謝徵，看他虛弱成這樣，有些難過地道：「你早些籤那和離書就好了。」\n謝徵一口藥汁嗆到喉嚨裡，瞬間咳得撕心裂肺。`

            num: 74,
            title: `第74章第74章`,
            content: `樊長玉忙放下碗去幫他拍後背：「怎麼嗆著了？」\n這不拍還好,一拍，謝徵直接伏在床邊吐出一口暗紅色的血來。\n樊長玉被嚇得不輕，她看看自己的手,又看看謝徵，扭頭就朝帳外大喊：「軍醫！快叫軍醫，有人吐血了！」\n守在帳外的親兵聞聲掀開帳簾一看,瞧見地上的血跡，拔腿就去追走出軍帳沒多久的軍醫。\n大帳內的其他傷兵見狀,亦是議論紛紛，有說謝徵這是迴光返照的，也有讓樊長玉別太擔心,等軍醫來看過再說的。\n樊長玉用帕子胡亂給謝徵擦了擦嘴角的血跡,一隻手緊緊攥著他的,口中喃喃道：「沒事的，沒事的……」\n不知是在說給謝徵聽,還是在說給自己聽。\n謝徵一口淤血堵在胸口多日，這一番咳嗽，倒是將那口血帶了出來,胸口的窒悶感驟然減輕,連呼吸都順暢了許多，只是因為咳得太用力，大抵扯到了傷口,紗布上隱隱又浸出了血色。\n他看了一眼樊長玉緊抓著自己的手,原本沒多少血色的唇因為剛才咳血而多了抹豔色，卻襯得他臉色愈發蒼白,看得人莫名揪心。\n他半垂著眼,有些虛弱地道：「你要同我和離？」\n樊長玉眼淚汪汪：「不離了不離了！」\n她嗓音裡甚至帶了幾分哽咽：「你入贅給我才被徵兵抓走的,要是那天我們好好說話，你籤了和離書，官兵就不會帶你走，你也不會傷成這樣了。你別怕，你都這樣了，我不會不管你的，來的路上我都想好了，你要是死在了這裡，我就幫你收屍，你家裡已經沒人了，以後逢年過節，我也會給你燒供奉……」\n說到後面，她可能是真的怕眼前這人會死在這裡，眼淚大顆大顆掉落在被面上，砸出一個個小溼印。\n一隻手按在她後背，她被用力摁進一個帶著血腥味和草藥味的懷抱。\n樊長玉怕壓著他傷口，兩手按著他肩膀想推開他，謝徵卻更用力收緊雙臂，將她嚴絲合縫箍進了自己懷中，下顎擱在她因為哭不利索還微微有些顫抖的肩頭，啞聲道：「別動。」\n樊長玉怕加重他的傷勢，不敢再動，胸腔卻充斥著莫名的情緒，讓她胸口發悶，眼淚不受控制地滾落，砸在他肩頭的衣料上。\n謝徵說：「別哭，你還能來找我，我很高興。」\n頓了頓，又道：「那天的事，對不起。」\n樊長玉知道他說的是什麼，抿了抿唇正要說話，帳簾在此時被掀開，親兵火急火燎地帶著軍醫走進來，公孫鄞怕謝徵有什麼閃失，也跟著過來看一眼，瞧見這副情景，一時間全都神色各異杵在了原地。\n樊長玉聞聲扭頭一看，發現其他傷兵也正目不轉睛地盯著他們，臉上一紅，趕緊把謝徵摁回了床上，動作太過迅猛，引來他一聲悶哼，樊長玉趕緊訕訕收回手：「弄痛你了？」\n謝徵白著張臉說沒事。\n帳內受傷的老兵笑著替他們解圍：「小夫妻倆才經歷了一場生離死別，後怕著呢！」\n其他傷兵也善意地鬨笑兩聲。\n軍醫上前問了謝徵咳血之症，又給謝徵重新把脈後，不敢託大，只言是體虛所致，身體元氣大傷，需要進補調養。\n「體虛啊……」公孫鄞揶揄看了謝徵一眼，抬手摸了摸下巴，說：「讓火頭營給受傷的將士們做點葷食，都好生補補。」\n帳內的傷兵們全都千恩萬謝。\n公孫鄞又道：「傷勢重的和傷勢輕的分到不同營帳照料，也方便軍醫那邊煎藥。」\n他說著就一指謝徵：「正好下午將士們給上山的薊州將士新搭了幾頂帳篷，離這邊不遠，這人就轉到新帳去。」\n謝徵一道眼風冷冷掃過去，公孫鄞賊兮兮地衝他一笑。\n謝徵有傷在身，幾名親兵扮做小卒，直接連人帶床把他抬到了新搭的軍帳裡。\n樊長玉跟過去，意外地發現那邊軍帳雖放置了不少軍床，眼下卻還沒其他人住。\n公孫鄞解釋說後邊發現了傷勢嚴重的將士，會陸續安排到這邊來。\n樊長玉去火頭營幫忙領傷病營的飯菜時，公孫鄞才坐到了謝徵對面的一張軍床上，挑眉問他：「我是單獨再給那姑娘安排個軍帳住，還是讓她就留在你這兒？」\n謝徵剛才喝了一碗藥，這會兒嘴裡還苦得緊，他坐起來倒了杯水喝下，捏著杯子垂眸沉思片刻，說：「另給她安排地方。」\n公孫鄞笑道：「也行，差點忘了，還有個小崽在我那裡，她姐姐來了，讓她們姐妹倆住一起也好。」\n想到之前掀開帳簾看到的那一幕，沒忍住調侃：「你這一槍傷得倒也值了，人家姑娘都為你哭了，哪能是沒有情意的……」\n說到此處，他話音忽而頓了頓，看向謝徵：「隨元青知道她和你的關係後，都能想到抓她妹妹來威脅你。若是魏嚴也聽到了風聲……他的手段你是知道的。」\n謝徵捏著陶杯的五指驟然收緊，道：「今日的事，封鎖消息，一個也不許外傳。」\n公孫鄞道：「知情的只有軍醫和你幾個親衛，那幾個親衛是你一手提拔上來的，嘴嚴得很，軍醫我已敲打過了，這兩日也暗中讓人盯著的，出不了什麼問題。就是帳內那些傷兵，都知道那姑娘是來找你的了，若是讓他們知曉了你身份，怕是有些難辦……」\n謝徵說：「那就先瞞著。」\n公孫鄞又問：「樊姑娘那邊呢？」\n謝徵眼皮半抬：「我自會找機會向她說明一切。」\n公孫鄞道：「你有打算就行。」\n他離去後，謝徵卻枕著手臂望著帳頂失神了半天。\n他並不確定樊長玉知道一切後，還會決定和他在一起。\n樊長玉會接納那個一無所有的言正，卻不一定會選擇背負著血海深仇的謝徵。\n她如今對他的好，很大一部分源於對他的愧疚，覺得是他為了不給她和鄰居們添麻煩，才被迫從軍。\n等她知道他原本也是要回軍中的，這份愧疚便該蕩然無存了。\n她有多在乎她妹妹，他也知道，但因為他的緣故，她妹妹落入歹人之手，險些命懸一線。\n她會不會怨他，他尚不清楚，不過可以肯定是，如果她選擇跟著他，以後大抵還會遇到這樣的事。\n以她的性子，便是為了她妹妹此生能安穩無虞，恐怕也會同他劃清界限。她是喜歡寧靜的，就像她曾經說的那樣，尋個踏實謙遜的讀書人當夫婿，平平淡淡過一輩子。\n眼下她對他的這份好，就像是他偷來的一樣。\n當了賊，就總有敗露的一天。\n他明白後果的，可想起她望著自己哭時的模樣，她說的那些話，心口處那團血肉就悸動不能自已。\n他從來沒有這麼迫切地想得到、又這麼害怕失去過什麼。\n有一瞬謝徵甚至想，他如果真的只是言正就好了。\n最終嘴角只扯出了個嘲意十足的弧度。\n-\n樊長玉端著吃著回來，就見謝徵一隻手搭在眼前，像是睡著了。\n等她走進，他卻又放下手臂，朝她看了過來。\n樊長玉衝他笑：「你醒啦？火頭營那邊抓了不少野雞，給受傷的將士們燉了雞湯，你快趁熱喝。」\n她一隻手端著大碗，一隻手去扶他，謝徵臉色因失血過多而過分蒼白，眼下又因幾天未眠青黑一片，但五官實在是生得太好，都這般了還有一股頹廢憔悴的美感，顯得格外脆弱。\n謝徵靠著枕頭坐起來後，本想伸手端過碗自己喝，樊長玉卻像之前給他餵藥一樣，用勺子舀起餵給他。\n謝徵遲疑了片刻，張嘴喝下，然後就不動聲色皺起了眉。\n——好燙。\n但樊長玉似乎壓根沒注意到這個問題，畢竟在這之前她也沒給人餵過湯藥，她爹娘離世那會兒，長寧都五歲了，壓根不用她操心她吃飯喝藥的問題。\n之前的藥是冷了好一陣的，這湯才從火頭營端過來，又是木碗，她不太能感知到溫度。\n第二勺送到謝徵唇邊時，他唇角動了動，欲言又止，卻還是張嘴喝了下去，然後伸手欲接過湯碗：「我自己來吧。」\n樊長玉看著他病懨懨的臉色，心生憐意，沒給，用木勺在湯碗裡攪了攪，再次舀起來一勺餵過去，說：「你傷這麼重，好好休息，我餵你就是。」\n謝徵看著送到眼前的那一勺熱氣騰騰的湯，最終還是認命喝了下去。\n等餵完那一碗雞湯，他舌頭都被燙木了。\n樊長玉看著空蕩蕩的碗，卻詭異地升起一股成就感。\n她把人照顧得真好！\n謝徵想倒杯冷茶，她也搶著去倒，遞過去時困惑道：「你才喝完一碗雞湯，還是渴麼？」\n謝徵胡亂扯了個理由：「腥味有些重，壓壓味。」\n碗裡還剩一點湯底，樊長玉抿了一口，發現雞湯裡壓根沒放鹽，腥得幾乎難以下口。\n她皺著臉道：「大概是火頭營那邊太忙了，忘記了放鹽，你怎麼不早些跟我說。」\n謝徵沉默了一息，臉色變得有些凝重，道：「沒有鹽。」\n樊長玉一愣，隨即明白了他的意思，他們這支軍隊本是要打一仗就跑的，糧草都沒備，又怎麼可能備鹽。\n薊州援軍送來的，也只有糧食和藥材。\n在這裡，活命就是奢望了，誰還在乎東西好不好吃。\n上山前，陶老頭就同她說過山上的困境了，一線峽離崇州近，長信王在盧城兵敗後，孤注一擲圍了一線峽，就是想用斷糧的方式把山上的燕州軍逼到絕境。\n連日大雨，雖水淹長信王五萬人馬，卻也讓山上不少將士淋雨受了寒。\n長信王知道唐培義帶兵圍崇州只是個假把式，才只撤回山下一半兵馬以防萬一，但就算撤回了一半兵馬，現在山下也還剩兩萬崇州軍，這時候大軍下山，就算有游離在外的那兩三千援軍相助，也是以卵擊石。\n樊長玉不知道等山上的糧食吃完了會面臨什麼樣的局面，只看著謝徵認真道：「你別擔心，我聽說武安侯謀略過人，他打了那麼多勝仗，不可能就這麼被反賊困死在山上的。退一萬步講，就算咱們吃光了山上的糧食，反賊攻上山來了，只要我還有力氣，我就會背著你逃的。」\n謝徵心中百味陳雜，看著她問：「都到那步田地了，你保全自己就是，帶著我做什麼？」\n樊長玉理所當然地道：「我說了以後會養你啊。」\n這句話不知道觸動了謝徵哪一根心弦，他定定地看了她許久，忽而道：「樊長玉，你沒必要因為愧疚，為我做到這地步。」\n「我從軍，不是怕你和你的鄰居惹上麻煩，只是我要的權勢都在這裡。我受傷，也是為了在戰場上掙軍功，跟你無關，你在愧疚什麼？」\n這一刻他的神情幾乎是有些冷漠的。\n樊長玉不太明白他為何突然變成了這樣有些陌生的模樣，問他：「你不想我來找你？」\n謝徵黑眸冷沉，強壓下那一份奢望：「如果只是因為愧疚，你不該來這裡，你不欠我什麼。」\n樊長玉有點明白他的意思了，她抿了抿唇道：「之前在那邊軍帳裡，我話沒說完，我來找你前，就想過你是死是活的兩種局面了。你走時我把你打得那麼慘，還說了重話，然後我就再也沒見過你了，每次想起來，我都挺難受的，也確實很愧疚。」\n她頓了頓，抬起眼看向謝徵，像是有些迷茫：「但來找你，好像也不止是因為愧疚。你不知道，我也差點死過一次了，清平縣和臨安鎮都被屠了，之前冒充徵糧官兵的那個反賊混在山匪裡，要找我尋仇，他們人多，我打不過他們，就把長寧和趙大娘她們藏了起來，我被那混蛋卸掉了一條胳膊，還險些被山匪頭子溺死在水裡。後來長寧又被人劫走了，我在找長寧的路上遇見了趙大叔，他說你來了這兒，我怕你死在這裡，想著不管怎樣，來看看吧。你要是死了，我就把你埋了，要是沒死，就好好跟你說會兒話吧，跟你說長寧不見了，我找不到她，不過我會繼續去找的……」\n她絮絮叨叨跟他說他走後自己經歷的一切，視線莫名變得有些模糊，她眨了一下眼，一大滴淚珠就這麼滾落出去。\n真奇怪，明明她從小到大都很少哭的。\n看不清面前的人是何神色，只下一瞬就被人大力擁入了懷中，比之前那次抱得還要緊，勒得她身上骨頭都有些發疼。\n他按著她腦後讓她靠在他肩頭，力道兇狠得指尖泛白，想說什麼，喉頭動了動，卻又歸於沉默，沉沉閉上了眼，一切都在了這個無聲的擁抱裡。\n血腥味和藥味混雜在一起的味道並不好聞，但此刻這個懷抱卻讓樊長玉眼窩裡的酸意更甚，胸口充斥著一股從未有過的，類似委屈的情緒。\n爹娘去世後，她吃過很多苦頭，但從來都沒對旁人訴過苦，也不會在人前掉一滴淚。\n只在今日，借著這個擁抱的姿勢趴在他肩頭痛痛快快哭了一場。\n-\n帳外，公孫鄞領著長寧走到此處，聽見裡邊的聲音，進去也不是，不進去也不是，一臉糾結。`
        },

            num: 75,
            title: `第75章第75章`,
            content: `長寧辨出是樊長玉在哭,邁著小短腿就要進去，被公孫鄞提溜住了衣領。\n她困惑仰起頭，就見公孫鄞對她做了個「噓」的手勢。\n公孫鄞領著她走遠幾步,才半蹲下對她道：「讓你阿姐跟你姐夫說會兒話。」\n長寧乖乖點頭，臉上的嬰兒肥消下去不少，顯得一雙眼愈發大了,她在不熟的人面前話很少,公孫鄞明顯還在「不熟」這個範疇之內。\n公孫鄞想起謝徵的打算，問她：「小丫頭,你還記得你姐夫是怎麼把你救回來的嗎？」\n長寧一想起那個雨夜的廝殺場面，小臉就有些發白,當時黑燈瞎火的，她又驚嚇過度，記憶都是混亂的,努力想了想,答道：「壞人想殺寧娘，姐夫打壞人……」\n公孫淺淺嘆了口氣,這麼小的孩子被抓著上戰場,沒嚇成個痴兒都是她心性夠堅定了，又哪還能記得戰場上那些細節,他摸了摸長寧發頂,說：「不怕，都過去了,壞人也被你姐夫抓到了。」\n長寧臉色這才緩和了些,用力點頭，「嗯」了一聲，隨即又仰起頭,攥著衣角緊張問公孫鄞：「我姐夫會死嗎？」\n公孫鄞「噗嗤」笑道：「小丫頭，你知道什麼叫禍害遺千年嗎？」\n長寧搖頭。\n公孫鄞以扇掩在嘴角笑道：「你姐夫在旁人眼中，大概就是那類禍害，他命硬著呢，哪是這麼容易死的。」\n知道謝徵不會死，長寧就放心了，轉過頭眼巴巴地望著帳簾。\n公孫鄞趁機問：「你阿姐跟你姐夫感情很好吧？」\n長寧想了想，點頭。\n公孫鄞半點不以套小孩的話為恥，繼續問：「有多好？」\n長寧睜著雙黑白分明的大眼道：「爹娘不在了，寧娘受了委屈會在阿姐跟前哭，阿姐只在姐夫跟前哭呢。」\n這話讓公孫鄞愣了愣。\n長寧扳著手指繼續數：「家裡來了地痞無賴鬧事，姐夫打瘸他們腿把人趕走，阿姐殺豬賣豬肉賺了銀子，就給姐夫買新衣裳，買髮帶，姐夫喝藥怕苦，阿姐還給買糖……」\n公孫鄞表情變得很是怪異，原來之前在盧城他找的那老丈說的是真的，謝九衡真給人當了上門女婿，還吃起了軟飯！\n他還想再問什麼，隔著厚實一道門帘，忽而也覺著後背發涼。\n公孫鄞果斷對長寧道：「小孩，你自己呆在這裡等你姐姐出來，我還有點事，就先走了。」\n言罷起身就要走。\n帳內。\n樊長玉把這段時日裡積攢下來的情緒通過這場大哭發洩完後，直起身子揩了揩眼道：「我好像聽見長寧的聲音了。」\n謝徵早就聽見帳外的動靜了，他從帳門口收回冷沉的視線，道：「她就在外邊，方才沒來得及同你說在軍中，你去火頭營時，我便託人把她帶過來了。」\n樊長玉一愣，不及多問什麼，趕緊掀開帳簾往外看去，果不其然瞧見了兩手託腮乖乖蹲在不遠處地上望著這邊的長寧，還有做賊心虛剛邁出幾步遠的公孫鄞。\n樊長玉驚喜道：「寧娘！」\n長寧看見樊長玉，一雙眼也瞬間變得亮晶晶的，奔過去一頭撞進她懷裡，兩手死死抱著樊長玉的腰，甕聲甕氣喚她：「阿姐……」\n這兩個字一喊出來，她大眼睛裡蓄起的淚珠子就止不住了，吧嗒吧嗒直往下掉。\n樊長玉問她：「你怎會在這裡？」\n視線卻不自主瞥向了幾步開外鬼鬼祟祟欲走的公孫鄞。\n都被瞧見了，公孫鄞也不好再裝作若無其事離開，收回邁出一半的腳，扇面一搖，又是那副羽扇綸巾的倜儻模樣：「這女童誤落敵手，被救後暫收容於軍中，聽聞是言小兄弟妻妹，特帶了過來。」\n樊長玉連忙道謝，又蹲下幫長寧擦淚，看著她消瘦了不少的臉頰，心疼道：「對不起，阿姐沒能早些找到你，讓你受苦了。」\n長寧搖頭，趴在她肩頭哭得打了個嗝兒。\n樊長玉抱著長寧邀公孫鄞暫且進帳坐坐，公孫鄞暗忖謝徵都知道了自己在外邊了，現在走也不合適，便借著探病一道跟進去了。\n進帳後，長寧看到半躺在軍床上胸前纏著帶血紗布的謝徵，癟著嘴喚了聲：「姐夫。」\n繼而抹著眼淚對樊長玉道：「姐夫為了救寧娘，被壞蛋打傷了。」\n樊長玉偏頭看向謝徵，顯然有些迷糊了：「你是為了救寧娘受的傷？」\n謝徵尚未做好在此時告知樊長玉一切的準備，唇角微抿，不知如何答話。\n一向巧舌如簧的公孫鄞也清楚這個謊話不好編，正有些頭疼，就聽長寧抽噎著道：「寧娘被壞蛋當成大官的女兒抓走，壞蛋還把寧娘放馬背上去殺人，黑漆漆的，好大的雨，雷聲也大，寧娘很怕，後來聽見姐夫的聲音了，就叫姐夫，姐夫來救寧娘時，壞蛋把寧娘往天上扔，姐夫為了接住寧娘，被壞蛋捅了好大一個血口子……」\n她說起這些顯然還後怕得厲害，小臉發白，手也緊緊地攥著樊長玉的衣物，像是找到了什麼倚靠，以此來抵抗那一夜帶給她的恐懼。\n樊長玉原本猜測是隨元青劫走長寧，大抵是找自己私底下尋仇，卻沒想到長寧經歷了這麼多，光是聽著長寧說這些，她就恨不能把長寧口中那壞蛋大卸八塊。\n她心疼地拍著妹妹的背脊，安撫道：「寧娘不怕，都過去了。」\n心中卻有些奇怪長寧怎會突然被誤當成了某個大官的女兒。\n長寧看到樊長玉心裡就踏實了，想起自己被帶走時，俞寶兒為了保護她，攥著她衣服不肯放手，被僕婦們拖拽時，他手上生生被掀翻了好幾個指甲，又沒忍住紅了眼眶：「寶兒也在那裡，阿姐，可以救寶兒和他娘嗎？」\n樊長玉困惑道：「你是說俞掌柜和寶兒？」\n長寧點頭。\n樊長玉問：「俞掌柜和寶兒不是去江南了麼？你在哪裡見到的他們？」\n長寧抽噎著答：「寶兒和他娘也跟寧娘一樣，被那群壞蛋關在了那裡。」\n公孫鄞並不知俞淺淺母子是何人，面上有惑，謝徵卻清楚長寧被劫走那些時日，是在隨元青手上的，神色微深。\n那位女掌柜同長信王府有關係？\n樊長玉心眼直，迷茫道：「莫非俞掌柜和寶兒也是被誤當成了什麼大官的家眷？」\n她看向公孫鄞：「這位大人，敢問我妹妹是怎麼被誤當成大官的女兒被抓走的？」\n公孫鄞看了謝徵一眼，打起太極：「清平縣遭難後，薊州府那邊暫時安置災民的客棧是官府驛站，一向只接納到訪的朝廷官員，想來是反賊那邊情報有誤，才錯劫走了令妹。」\n這個回復聽起來是說得通的，但樊長玉想到家中不見了的那張畫，心中還是覺著有些怪異。\n公孫鄞適時道：「軍中都是些粗人，不擅照料孩子，給樊姑娘在隔壁安排了住處，樊姑娘可帶著幼妹先過去安置。」\n樊長玉剛找到妹妹，自是有許多話想問的，她看了一眼躺在床上的謝徵，道：「那你先好好休息，我帶寧娘下去梳洗梳洗。」\n長寧退燒後，就一直被放在公孫鄞那邊，山上條件艱苦，親兵們又是一群莽漢，誰也不擅長照顧孩子，每頓只儘量哄著長寧吃飯，洗臉什麼的，長寧還能自己來，至於扎頭髮發，她頭頂的揪揪已經徹底成了個雞窩了。\n樊長玉前腳一走，謝徵便對公孫鄞道：「用海東青給燕州傳信，讓他們查一查被困於長信王府上的俞姓母子。」\n公孫鄞不解道：「那俞姓母子有來頭？」\n謝徵道：「我初見那孩子時，便覺著和當今龍椅上那位有幾分像。」\n公孫鄞一驚，隨即擰眉道：「你懷疑那是龍種？」\n當今龍椅上那位，是先帝最小的兒子，登基時方才八歲，生母乃一低賤宮婢，無任何外戚勢力。\n皇位能落到他頭上，只是因為魏嚴選中了他當那個傀儡皇帝，但如今傀儡幼帝也長大了，又有帝師李太傅一黨扶持，難免生了扳倒魏嚴，收回皇權，重振朝綱的心思。\n不過明眼人都瞧得出，就算皇帝借李太傅的勢扳倒了魏嚴，李黨在朝中，無非也是成為下一個魏黨罷了。\n這大胤的皇權，早就被門閥世家架空了，雖推行了科舉，但寒門在朝堂上所佔的位置，實在是太輕了。\n再者，龍椅上那位，實在是沒有一國之君的樣子，在權臣跟前懦弱，在宮人面前又暴躁易怒，難當大任。\n謝徵道：「那趙姓商賈言是為當年死在東宮的皇孫做事，我之前在清平縣，卻發現他有一處宅院，就置在那俞姓女掌柜家附近。若皇孫真有其人，通過那俞姓母子，興許能查出些什麼。」\n公孫鄞當即就道：「我這就去傳信。」\n若那俞姓母子是皇孫的人，被困於長信王府，指不定也是長信王抓她們去威脅皇孫的？\n他都快走出大帳門口了，卻又回過頭看著謝徵：「九衡，若皇孫當真還活著，你……是要擁立承德太子的血脈嗎？」龍椅上那位在得知謝徵和魏嚴反目後，便想下嫁一位公主拉攏謝徵，只是謝徵如今仍在西北，京城那邊才不好太大張旗鼓罷了。\n但帝王心思，自古難猜。\n龍椅上那位雖早就暗示過謝徵，扳倒魏嚴後，魏嚴的位置就是他的，可真到了那時候，謝徵會不會是他下一個想除掉的人，誰又說得清呢？\n更何況皇帝身邊，早有李太傅穩坐一把手。\n論起名正言順，承德太子的血脈在如今的皇室中，比誰都更有資格坐那把龍椅。\n再退一萬步講，僅憑當年的錦州之戰，謝徵和皇孫都有共同的敵人，就更適合結盟。\n帳內沉默了許久，才傳來謝徵冷沉的嗓音：「你看皇帝待魏嚴如何？」\n只一句話，便讓公孫鄞意識到了其關鍵所在，魏嚴一手扶持龍椅上那位，最初雖是想讓他當傀儡皇帝，但曾幾何時，魏嚴也的確是龍椅上那位最大的靠山。\n謝徵若擁立皇孫，能立下的從龍之功，不亞於當年魏嚴對龍椅上那位的恩情。\n可他本身就已兵權在握，皇孫若登大寶，還能賞他什麼？\n封賞不了了，猜忌和戒備便會與日俱增。\n公孫鄞設身處地替謝徵想了一番，忽而擰眉道：「我算是發現了，你如今的境遇，不管坐上龍椅的是誰，成事前都會卯足勁兒拉攏你，可一旦塵埃落定，你又是第一批要被鳥盡弓藏的。」\n謝徵沒做聲。\n公孫鄞喪氣地往回走幾步，坐到了謝徵對面破罐子破摔道：「你就給我個準話吧，你到底是怎麼想的，你要是沒給自己想好後路，我先給自己找個下家得了，省得到時候被你連累。」\n暮色已沉，謝徵看著帳內跳動的那一盞燈火道：「西北一亂，民間十室九空，好兒郎埋骨黃沙。如今的大胤還沒到要重整河山的地步，同北厥人打也就罷了，為了一己私慾跟自己人開戰……」\n他冷嗤一聲：「對不住那些便是死也該死在關外的將士。」\n顯然是極看不上長信王的行徑。\n公孫鄞挑眉：「你想當個純臣？」\n謝徵漫不經心一抬眸：「你不覺著，我這樣的，該叫權臣麼？」\n公孫鄞一噎，隨即道：「權不權臣的，你還是先想想怎麼解眼下之圍吧！」\n謝徵問：「今日帶上山的糧草夠吃多久？」\n公孫鄞道：「往飽腹了吃，夠半月，混著野菜煮粥，能撐一月。」\n謝徵思忖片刻後道：「隨元青還在我們手上，山上地形複雜，長信王圍而不攻，無非是想把我們困死在山上。他們要是也沒了糧草，就耗不下去了。」\n公孫鄞一驚：「你想打長信王糧草的主意？」！`

            title: `第76章第76章`,
            content: `樊長玉帶著長寧去了公孫鄞撥給她們姐妹二人的營帳後,便先打水回來給長寧梳洗了一番。\n她一邊給長寧扎小揪揪，一邊問：「寧娘還記得是怎麼被抓走的嗎？」\n長寧扳著手指頭仔細回想：「阿姐把我們藏在地窖裡，後來趙大娘帶著寧娘逃,路上遇到了官兵，走了很遠的路把我們送去了一個客棧，趙大娘說那是薊州城，咱們安全了。」\n樊長玉聽出長寧口中的客棧就是薊州官府那邊暫時安置她們的驛站，忙問：「後來呢？」\n長寧想到自己在驛站被帶走的事還是有些後怕，眼眶又紅了一圈：「後來客棧突然起火了，有壞蛋砍了趙大娘一刀，把寧娘綁起來堵住嘴關進箱子裡帶走……」\n說到此處，她沒忍住哭出聲：「阿姐，趙大娘流了好多血，趙大娘是不是也死了？」\n樊長玉輕拍著她後背哄道：「趙大娘沒事,趙大娘現在還在薊州呢，你回去就能見到她了。」\n長寧這才止住了哭聲。\n樊長玉問她：「寧娘被那些歹人裝進箱子裡,用馬車帶出城的嗎？」\n長寧點頭，又說：「寧娘被放出來時，到處都是山，他們扔掉了箱子和馬車,騎馬帶寧娘走,到了一個很大的宅子，把寧娘關進一個黑乎乎的屋子裡,好幾天後才有一個很兇的嬤嬤帶寧娘出去了，那個嬤嬤讓寧娘陪寶兒玩。」\n樊長玉有些不解：「寶兒不是跟你一樣被關起來了嗎？」\n長寧想了想說：「是被關起來了，但是那些很兇的嬤嬤丫鬟又都在哄寶兒玩，她們叫寶兒小少爺,不過寶兒不搭理她們。寶兒說，有個壞人把他娘關起來了，他只有聽話，才能再見到他娘。」\n樊長玉越聽越迷糊，長寧所說的這類關起來，聽起來倒像是幽禁。\n而且那些下人叫寶兒小少爺，難不成俞淺淺的夫婿是那府上的人？\n樊長玉再不聰明，也知道這事跟反賊沾邊了，只怕不簡單。\n長寧倒是仰起頭問樊長玉：「阿姐，等姐夫傷好了，我們一起去把寶兒和俞嬸嬸救出來好不好？」\n樊長玉說：「等下山了，阿姐就去崇州打探消息。」\n長寧這才又高興起來了。樊長玉注意到她脖子上用紅線拴著什麼東西，問：「這是什麼？」\n長寧掏出來，是個十分精巧的小豬玉墜，她說：「離開前寶兒給我的，他上次給我的那個，放在家裡了。他說我給他的草編蟈蟈他一直都帶著的，他重新給我這個小豬墜子，讓我也一直戴著。」\n之前給的那塊玉墜塊頭有些大，造型又是一把玉鎖，俞寶兒平日裡掛在衣服外邊沒啥，長寧掛在衣服外邊，就顯得有些不倫不類。\n未免惹人眼紅，也怕長寧跟巷子裡的孩子玩時不小心把玉鎖磕碰壞了，樊長玉就讓長寧把玉鎖放在了家中。\n她捏起這小豬玉墜仔細看了看，哪怕不懂玉，也能明顯感覺到這玉墜的質地比之前那玉鎖的質地溫潤，想來價值不菲，玉墜底部還刻了個「寶」字，像是專門訂做的。\n樊長玉猜測這是俞淺淺從前給俞寶兒準備的什麼禮物，至於為何雕刻成了小豬模樣，看俞寶兒年歲和長寧相仿，大概俞寶兒也是屬豬的？\n她覺著這玉墜的意義對俞寶兒來說，可能比上次那塊玉墜還重要些。\n兩個孩子他鄉遇故知，大概也是把彼此當唯一的玩伴了。\n樊長玉幫長寧把玉墜塞進她衣領裡，說：「那你就好生戴著，莫要弄丟了。等救出寶兒和她娘，你再把這玉墜還給寶兒，這份禮物太貴重了，寶兒還小，咱們不能收，知道嗎？」\n長寧點頭，「像上次一樣，俞嬸嬸同意了送的，寧娘就可以收，對嗎？」\n樊長玉笑著摸摸她的頭：「對。」\n長寧這些天都沒怎麼睡過一個好覺，這一晚呆在樊長玉身邊，沒說多久話就直打哈欠。\n樊長玉哄睡了長寧，想著白天見到言正時，他身上一些血跡都還沒擦洗，便打了一盆水去他帳中。\n他一貫是個愛乾淨的人，若不是傷成這樣，他肯定忍不了身上那些藥草殘汁和血漬的味道。\n樊長玉過去時，謝徵帳內果然還亮著燈。\n她不知在她走後，這邊軍帳有沒有轉來新的傷兵，在門口喊了聲：「言正，你睡了嗎？」\n「還未。」裡邊傳來一道低沉的嗓音。\n樊長玉便端著水盆進去了，這一掀開帳簾，才發現謝徵赤著上身，正往腰間一圈一圈地重新纏著紗布，旁邊桌上放了兩個倒空了的金創藥瓶。\n他額前墜著冷汗，大概忍痛讓他心情有些糟糕，往門口看來時，神色有些冷淡，看清是樊長玉，眸色才緩和了些，「你怎過來了？」\n樊長玉說：「我來給你送盆擦身的水。」\n她注意到他換下來的紗布又被鮮血染紅了一大片，想到之前的那個擁抱，面露愧色：「是之前擠壓到了傷口嗎？」\n謝徵已打好了紗布的結，披上衣袍說：「不是。」\n他雖否認了，樊長玉卻還是覺著心虛，想到他是為救長寧才受的傷，更為愧疚，看他有要把袍子系帶都系上的架勢，便道：「你先別穿，我幫你擦擦吧。」\n謝徵眉頭下意識皺起：「你幫我？」\n樊長玉只是覺得這種事也不是第一次做了，她剛撿到他那會兒，都直接按著他上藥呢，沒什麼好避諱的，便大方點頭道：「你傷口不能沾水，後背你自己又擦不到，你要是覺得難為情，我去外邊找個小兄弟來幫你也成。」\n謝徵已經重新解開了系帶，說：「你來就是。」\n墨色的衣袍敞開，在燭火下拖曳出深色的影子，結實而勻稱的肌理色澤如暖玉，從他肩頭斜纏至肋下的紗布襯著他冷淡的眉眼，讓人覺著脆弱卻又強硬。\n樊長玉擰了帕子，先一點點給他擦臉。\n謝徵坐在床頭，似乎沒料到她會先擦臉，微愣了一瞬。\n樊長玉動作放得很輕，極有耐心地幫他擦淨臉上的血漬和髒汙，笑著說：「我撿到你那會兒，你比現在髒多了，一張臉被血糊得看不出個原樣。」\n謝徵沒說話，只靜靜地看著樊長玉的一舉一動。\n她五官是生得極好的，在燭火下，整個人都像覆上了一層柔光，只是看著她，便覺心中所有的焦躁都平息了下來。\n擦完臉，樊長玉又重新擰了帕子擦他上半身，帕子在快擦到纏著紗布的地方頓住，抬手隔著紗布輕輕摸了摸那道橫貫整個胸口的傷疤，低聲道：「一定很疼吧？」\n謝徵依然只答：「不疼。」\n樊長玉便不說話了，片刻後抬起頭來時，眼眶帶著淡淡的紅意。\n謝徵抬手幫她把一縷碎發別到耳後，看了她一會兒，忽而垂首在她眼皮上落下一吻。\n輕得讓樊長玉感覺像是被羽毛拂過一樣。\n她不太適應地眨了一下眼，怔怔看著謝徵，對於這突來的親密，明顯很不習慣，但也並不排斥。\n她發呆的時候，眼神澄澈又無辜，還帶著一點很好欺負的老實。\n謝徵嗓音在寂靜的軍帳內有些沉：「一直看著我做什麼？」\n樊長玉沉默了片刻，語出驚人：「你親我？」\n帳簾沒掩嚴實，山風從外邊灌進來，燭火搖曳，二人投下的影子也被扯得凌亂。\n謝徵看著她，淺淺「嗯」了聲，眸色卻深得令人心驚。\n接下來又是長久的沉默。\n直到樊長玉突然直起身子，在他腦門上飛快地碰了一下，說：「扯平了。」\n然後端起水盆就離開了大帳。\n謝徵望著她的背影，久久沒能回過神來。\n他明明更過分地吻過她，感受到還殘留在額前那一點溫軟，卻無論如何也擋不住這一刻心底的愉悅，嘴角都淺淺翹了起來-\n樊長玉回去後一宿沒睡好，跟言正認識這麼久以來，她幾乎都是把言正當做家人朋友一樣看待，所以他上次突然輕薄了她，她才那般生氣。\n不僅是因為他的無禮，還因為自己一直信賴他，他卻辜負了這份信任。\n但經歷了這麼多事後，當時那點怒氣早就消乾淨了，她只希望自己珍視的每一個人都好好的。\n知道他在山上生死不明，她下意識地想找到他。\n至於找到後怎麼辦，她想的是像從前一樣生活，家裡多他一張嘴，她又不是養不起。\n可今天晚上的事，突然讓她有些混亂了，他又親了她，但她並不生氣，只是較勁兒往他腦門上來了一口！\n樊長玉煩躁地在床上翻了個身，發現捲走了長寧身上的被子，又趕緊翻回去，把被子重新給長寧蓋好。\n一直到四更天，她才總算淺淺入眠。\n天亮後，樊長玉頂著個熊貓眼起床，給長寧梳洗後，去火頭營幫傷兵們領吃的，聽火頭營那邊抱怨說這兩天沒打到什麼野味，沒法給傷病營開小灶了。\n樊長玉記著軍醫說的謝徵的身體得好好進補，不吃肉怎麼補？\n她打算用過早飯就跟著負責打獵的將士們一起去林子深處轉轉，看能不能獵到什麼好東西。\n給謝徵送藥和送早飯，因為昨晚的事，她怕見面了更尷尬，便都交給其他將士去做了。\n公孫鄞一大早去找謝徵匯報公事，發現他脾氣不是一般的臭，旁敲側擊一番打聽，得知是樊長玉一早上都沒去謝徵那裡，心中很是奇怪，便轉悠著去找樊長玉。\n樊長玉已經準備好東西要進山了，正打算先把長寧送謝徵那兒去，讓他幫忙看著，公孫鄞一過來，她就託公孫鄞把長寧帶過去。\n公孫鄞得知樊長玉要進山打獵，很是意外，怕她一個姑娘家有什麼閃失，還暗中多派了兩個親衛跟去。\n領著長寧去找謝徵時，發現她頭頂那兩個歪得七扭八扭的揪揪，醜得實在是扎眼。\n他沒忍住問：「小丫頭，你阿姐今早沒給你梳頭嗎？」\n長寧摸了摸自己的揪揪說：「梳了呀，還重新紮了揪揪呢！」\n公孫鄞：「……」\n這是怎麼做到梳頭了比沒梳還醜的？\n他忍了一路，最終還是沒忍住，把長寧頭上的揪揪拆掉重扎。\n面對其他親兵的困惑，跟謝徵跟得最久的親兵小聲解釋：「公孫先生有時候就見不得不規整的東西，像那小孩頭髮扎得一高一低的，能讓公孫先生難受一整天。」！`

            title: `第77章第77章`,
            content: `一場春雨後,山上草木愈發蔥鬱。\n將士們近日時常四處打獵，對附近林中已很是熟稔，挖了陷阱也做了一些捕獸器,不過大概是接連多日都在附近狩獵，連著去了好幾處事先布置好的陷阱,都沒什麼收穫。\n這一路走來，樊長玉甚至連兔子都沒看見一隻。\n帶隊的小將道：「要想獵到好東西,只怕得散開往林子更深處去找。」\n他沉吟片刻，把跟來的百來人,按每十人分一小隊，小部分留在之前狩獵過的林子裡繼續找獵物,其餘人則跟著去更深處的山脈。\n樊長玉和公孫鄞暗中派來的那兩個親兵被分到了一組，一起在外圍打獵，明顯是得了授意,怕樊長玉跟著去林子深處遇到什麼危險。\n樊長玉倒是提出過跟要去老林裡的兵卒換，但那小將一句軍令下來，她知道這是在軍中，自己還是一副薊州小卒的扮相，便也不好再堅持。\n一行人在林子裡兜兜轉轉走了一圈,只獵到幾隻野雞,掏了雞窩,倒是撿了不少野雞蛋,一名小卒把衣服脫下來才兜著走了。\n樊長玉有過跟她父親進山打獵的經驗，一路上目光都在警惕地巡視周遭,雨後的山地土壤溼軟,很容易留下痕跡。\n她注意到往深處的林子灌木交接處,有什麼大型動物爬坡扒拉地上松針葉的痕跡,對小隊的人道：「這像是野豬的足跡，跟著這足跡走，指不定能找到豬窩。」\n親兵一看得進密林，有些為難：「可是樊姑娘，楊校尉命我等在外圍狩獵待命……」\n樊長玉想了想說：「要不這樣，你們在外邊等我，我一個人進去看看，我並非你們軍中人，楊校尉的軍令自然也管不到我，這樣一來就不算違反軍令了。」\n兩個親兵暗暗叫苦，心說楊校尉讓他們不跟去密林，就是怕樊長玉有什麼閃失，他們要是讓樊長玉一個人進林子裡，那才是嫌命長了。\n其中一名親兵道：「那樊姑娘你等在外邊，我們找幾個弟兄進去找找野豬窩就是。」\n軍中的斥侯心細如髮，跟著痕跡找不會出什麼漏子。\n他們這百般阻撓的行徑讓樊長玉感覺自己跟來像是拖後腿一樣，她看著那名親兵道：「我跟著我爹去山裡打獵過多次，有經驗，你們也不必因為我是女子，就百般顧忌。我要是會添麻煩，就不會跟你們一起來了。」\n其實樊長玉心中已經有點後悔了，她覺著這些人婆婆媽媽的，早知道她就自己行動了。\n兩名親兵無法辯駁，這一路上也發現了樊長玉並非嬌貴女子，走了這麼遠的路，她甚至連呼吸都不帶喘的，顯然是個練家子，一番遲疑後，跟著樊長玉一起進了密林。\n古木參天，又是清晨，林間帶著些雨後的霧氣，兩名親兵不斷喊話讓後邊的人更緊些。\n樊長玉沿著痕跡走一段路，就會用殺豬刀在路邊的樹幹上砍一刀做個標記。\n等她注意到一顆松樹上的爪痕時，忽而頓住腳步，半蹲下去看那痕跡，皺眉道：「好像不是野豬……」\n她話音剛落，前方就傳來一聲石破天驚的巨吼。\n一頭壯碩的黑熊立在不遠處，嘴裡叼著半個帶血的不知什麼鳥兒的翅膀看著他們，眼睛裡帶著腥氣，明顯在護食。\n親兵和小卒們心頭髮毛，一名親兵拽起樊長玉的袖子就往後退：「樊姑娘快走，是黑熊！」\n樊長玉跟著她爹套野豬野牛有經驗，黑熊卻還沒獵過。\n親兵們心慌不已，她皺眉卻只是在盤算要不要獵，殺這頭黑熊應該得費不少功夫，她沒吃過熊肉，不知道這東西殺了是不是渾身都可以吃，不然只拿熊掌，那也太不划算了些。\n被帶著往後退時，她糾結了片刻，扭頭同兩個親兵道：「要不還是殺了吧，好不容易才找到的獵物。」\n親兵和小卒們都傻眼看著樊長玉，一時間竟猜不透她是被嚇傻了，還是純粹的無知者無畏。\n猛獸之中，素來以熊虎最為難獵，他們僅十人，所帶兵器又不過些刀劍和普通弓箭，連大弩和長矛都沒有，談何獵熊？\n大抵是他們撤走的動作激到了黑熊，黑熊突然一甩頭扔開嘴裡那隻鶴鳥，直直地朝他們撲了過來。\n眾人皆驚，趕緊四散逃竄讓黑熊不便追捕。\n靈巧些的直接如獼猴一般竄上了樹，黑熊直接以身撞樹，撞得碗口粗的大樹倒伏下來，攀在樹上的小卒也驚叫一聲砸下。\n未免那小卒命喪熊掌之下，樊長玉心知黑熊四肢靈巧，不便用捆豬索套，卻還是摘下腰間的長繩朝黑熊脖頸套去。\n她一腳蹬著一顆蒼天古木，兩手將繩索在手心各挽了一圈，使出吃奶勁兒往後一拽。\n黑熊被套住脖子，一巴掌沒來得及拍下，就被繩索上的巨力拽得整個熊身往後一仰，砸在地上發出「碰」一聲巨響。\n驚慌失措的小卒們見狀，無不大吃一驚，未料到樊長玉竟有如此神力，回過神來後紛紛上前去幫忙拖拽繩索。\n兩名親兵實戰經驗更豐富，趕緊拿起手上武器朝黑熊扎去。\n黑熊大掌左右翻滾拍打，讓兩名親衛不敢近身，沒能傷其胸腹，只在背部扎了兩道血口子，但黑熊皮糙肉厚，這點傷殃及不了他性命，反而惹得黑熊狂性大發，利爪直接抓斷了繩索。\n樊長玉和卯足了勁兒拽繩索的小卒們都摔了個趔趄。\n沒了勒喉的繩索牽制，黑熊狂躁進攻起兩名親兵，兩名親兵明顯不能跟黑熊硬抗，只全靠敏捷在熊掌底下苟延殘喘，卻仍衝著樊長玉這邊喊話：「快帶樊姑娘走！」\n樊長玉哪能就這麼棄他們走，她直接掄起厚重的砍骨刀就向著黑熊擲去，扎入了黑熊後背，卻因砍入不夠深，仍沒能要他命。\n不過這一舉動，也把黑熊的注意力全都吸引了過來，黑熊轉頭衝著樊長玉咆哮一聲，扭頭就撲向了她。\n樊長玉讓小卒們四散跑，自己則引著黑熊向竹林那邊退去，期間殺豬刀在黑熊胸口劃了一刀，可惜刺得並不深。\n黑熊在吃痛之下，一路狂躁地拍倒周邊灌木，樊長玉退到竹林邊上後，便提刀砍下一根粗竹，幾下削出一個尖銳的矛尖兒，不退反進，抱著竹矛直接衝向了黑熊。\n竹矛佔據了長度上的優勢，隔著一丈遠的距離，又有助跑的慣性，照著之前劃出的傷口刺穿了黑熊心臟，黑熊痛苦狂嘯一聲，一抓揮斷了竹矛。\n樊長玉一腳踏在一旁的竹子上借力躍起，殺豬刀再狠狠送進了黑熊胸口的傷口處，腥臭的血濺了樊長玉一身，她臉上也被濺到了不少。\n她卻連眼都沒眨一下，兇狠得仿佛當真是一頭和黑熊殊死搏鬥的豹子。\n黑熊轟然倒地後，樊長玉才抖了抖殺豬刀上的血跡，近乎自言自語嘀咕道：「獵熊果然更費勁些。」\n早些年她爹為了補貼家用，上山打獵時也獵過熊，不過那時候她還不知道獵熊是這麼兇險的事。\n親兵和小卒們此時才趕了過來，看著死在地上的黑熊和衣襟上被濺到不少血的樊長玉，一個個下意識咽了咽口水，震驚中又帶了幾分茫然，只覺跟做夢似的。\n眼前這看起來和善又乖巧的姑娘，竟然獨自獵了一頭熊？\n傳回軍中只怕沒人會信，這究竟是個什麼怪胎？\n兩個親兵之前跟著謝徵去清平縣，見過樊長玉在船上單手扔人，表情尚可控些，只是突然不約而同地對視了一眼：今後這姑娘要是跟他們侯爺動起手來，也不知是誰輸誰贏？\n樊長玉用衣袖抹了一把臉上的血跡，眼中的殺氣褪去，又成了那副老實無害的樣子，問他們：「是只砍熊掌回去，還是把整隻熊都帶回去？」\n幾個小卒都沒什麼主意，還是一個親兵道：「山上糧草本就不甚充足，一起帶回去得了。」\n大家一致同意，很快砍竹子藤條綁成了一個簡易拖車，把死掉的黑熊放了上去。\n小卒和親兵們輪換著拉，回去倒也沒再讓樊長玉出什麼力。\n只是拉著重物返程難免變慢，路上遇到獵了頭野豬回來的小將，對方得知樊長玉獵了頭黑熊，亦是差點驚掉下巴。\n一行人帶著喜悅又複雜的心情往回走，剛出林子就聽到山下求援的角聲。\n那名小將道：「壞了！反賊在攻山！」\n他很快點了十幾人繼續把獵物帶回去，剩下的人跟他去上山的要道支援。\n不出意料地，樊長玉還是被安排繼續運送獵物，她本來也不想跟去山下的，奈何她鼻子靈，聞到了烤肉香。\n她問親兵和小卒們：「你們聞到什麼香味了沒？」\n許久未曾吃過一頓真正飽飯的兵卒們皆是咽了咽口水，在山上吃了多日的清粥菜羹，他們現在一想到鹽味嘴裡都能分泌出唾液來，更何況是這麼濃鬱的肉香。\n親兵找了一名小跑著上山報信的兵卒問話後，答道：「反賊一邊攻山，一邊在山下烤炙肉食勸我等投誠，以此亂我軍軍心。」\n樊長玉覺得這招太損了，也不知陶老頭和燕、薊兩州的援軍在山下能不能想什麼辦法。\n親兵看出樊長玉在擔心，道：「燕州兒郎都是有骨氣的，莫說山上如今還有存糧，便是只剩草根樹皮，也不會被反賊這等低劣的手段勸降！」\n這裡正是營地和山林的交界處，視野開闊，往山下看去，甚至能看到山腳下盤踞的反賊的帳篷數量。\n樊長玉只覺崇州軍的帳篷數量比山上的帳篷多出兩倍不止，皺眉道：「反賊人多，路都被他們封死了。」\n親兵卻說：「姑娘莫要只看反賊營帳排布，反賊撤走一半兵力，本該減少營帳，但反賊並未拔營，一來是怕我們從山上夜襲，多布置些營帳可混淆視線，二來是給新兵示威，讓咱們的新兵以為山下人馬眾多，怯戰。」\n樊長玉來的路上聽陶老頭說過一些關於打仗的東西，不過那時候沒有具體的參照物，她聽得一知半解的。\n此時聽得燕州軍中一個小卒都懂這麼多，不由贊道：「你知道的真多！」\n親兵自知一時多言了，怕壞事，忙道：「在軍營裡久了，多多少少都知道些。」\n樊長玉好奇問：「那你們怎麼分辨他們具體的人數？」\n親兵答：「看炊煙。帳篷數量可以作假，生火做飯的炊煙卻做不得假，多少人吃飯要多少口灶，一估人數就出來了。」\n樊長玉便看了看山下冒濃煙的地方，又看看山後只有寥寥幾道炊煙的地方，拔出了自己的殺豬刀，睜著一雙老實巴交的杏眸，很誠懇地提議：「那邊人少，要不我們去那邊偷襲？」`

            title: `第78章第78章`,
            content: `遠處烽火連天,山上的中軍帳內卻還是一片沉寂。\n公孫鄞快步走向帳中，言語間難掩激動之色：「你讓山腳下的將士們刮樹皮、挖草根，營造山上糧草已告罄的假象,反賊果真中計了！以為我們斷糧多日，故意殺豬宰羊大肆烤肉，以此亂我們軍心！」\n謝徵身上的傷並不輕鬆，臉色仍有些發白，松垮套著一件外袍,靠坐在床頭，隱約可見裡邊纏繞在肩頭的白色布帶，指尖捏著一張山地的輿圖,清雋的眉眼間帶著幾分慵懶,抬眸問：「信給山下的援軍送去了？」\n公孫鄞道：「昨日便讓海東青送去了。」\n謝徵丟開手上輿圖,道：「弄出點動靜,拖住反賊兵力,以便山下的援軍燒糧草。」\n他似想起身,但一動之下，胸口處的傷便刺痛得厲害,謝徵好看的眉眼間染上霜色，問：「隨元青近日如何？」\n公孫鄞說：「一直風吹雨淋的，一天一碗稀粥吊著他的性命，昨日似乎還發熱了，我瞧著死不了,便沒讓軍醫去看。」\n冷風一下一下吹拂著帳簾，淡薄的天光傾斜進來,落在謝徵臉上,他冷冷一扯唇角：「押隨元青去陣前,反賊烤肉，你們也烤便是。」\n公孫鄞聽出他這番話是何意，搖頭失笑：「這火烤在隨元青身上，怕是得燒到長信王心上了。有他這麼個餌在，不愁反賊不上鉤。」\n這是一出調虎離山之計，讓反賊誤以為他們缺糧，前來誘降，又把隨元青這個砝碼推出去，拖住反賊大部分兵力，留在山下接應的燕、薊兩州援軍就能趁機直搗黃龍，火燒反賊糧草。\n一旦反賊也沒了糧草，任反賊囤於上下的兵馬有多少，且再耗個一兩日，便該攻守易形了。\n公孫鄞離開了大帳，正要帶隨元青去陣前，一名親兵忽而飛奔回來，哭喪著臉道：「公孫先生，大事不好了！樊姑娘往後山偷襲敵營去了！」\n公孫鄞臉色驟變，趕緊回望了一眼大帳的方向，確定距離夠遠，謝徵應該沒聽見，才喝道：「她不是打獵去了麼？怎又去了敵營？」\n親兵道：「咱們在打獵回來的路上，聽到了山腳告急的角聲，樊姑娘一聽後山守衛薄弱，就殺過去了。」\n公孫鄞來回踱了幾步，很快給出應對之法：「侯爺重傷未愈，此事先莫要讓侯爺知曉，你趕緊帶一百輕騎追去，務必要保那姑娘周全。」\n親兵半點不敢耽擱，得了命令便去點兵。\n公孫鄞則是有些頭疼地喃喃道：「在這緊要關頭，可千萬別出什麼岔子……」\n-\n後山。\n樊長玉和剩下的那名親衛連帶八名小卒趴在灌木掩映的土包上，頭戴一頂用樹枝和藤條編成的簡易帽子。\n樊長玉盯著那條延伸向山腳的羊腸小道有一會兒了，沒忍住困惑開口：「這邊都沒守軍的嗎？」\n親衛答：「都隱蔽在山林間。」\n樊長玉「哦」了一聲，正尋思著她們去敵營那邊，是不是還得這邊山口的守衛同意才行，就見一隊巡邏的友軍從蜿蜒的山道上走來了，他們兵服上帶著新鮮的血跡，一邊走一邊四處張望，手中的弓還架著箭，瞧著有些怪異。\n樊長玉盯著山路看了半天，也沒看清他們是從哪兒冒出來的，她小聲問一旁的親衛：「這是換崗？」\n親衛似乎也覺著有些奇怪，用手掩在唇邊發出幾聲尖銳的鳥叫聲，霎時間，亂箭如飛蝗一般朝著這邊灌木叢扎了過來。\n親衛臉色大變，想拉著樊長玉找掩護，樊長玉動作卻更快，就地一滾，躲到了一棵大樹後邊去。\n也有小卒驚慌失措之下，想站起來跑被射成了個靶子的。\n樊長玉看著不久前還跟著一起狩獵的人，轉眼間就倒在了地上，身上流出汩汩的鮮血，眼睛至死都沒合上，她唇角不由抿緊，心底十分不是滋味，豹子一樣的目光投向了射箭的那些人。\n她便是再遲鈍，也看出這波人有問題。\n他們身上那些帶血的兵服，八成都是從燕州軍身上扒下來的。\n一波亂箭之後，那群人持著刀劍往這邊探來，似想確定他們都死了沒。\n躲在樊長玉對面一棵樹後的親衛用嘴型示意樊長玉一會兒逮著機會就逃，樊長玉抿著唇沒做回應。\n在扮成燕州軍的反賊距她們還有數步之遙時，親衛大喝一聲殺了出去，沒死的小卒握著刀把的兩隻手都還在打顫，卻也跟著大喝了一聲壯膽，舉刀衝了出去。\n樊長玉瞧見其中一個看著只是個半大少年的，也要跟著往外衝，一把提溜住了他衣領，少年踢著兩腿掙扎道：「你是個姑娘家，且逃命去！燕州兒郎死也要拉一個墊背的！」\n樊長玉瞥他一眼，說：「你，回去報信。」\n她瞅準了方位大力一扔，少年直接被她扔出去老遠。\n幾名反賊發現了她，提刀往這邊走來，樊長玉見狀，拔出自己的放血刀和砍骨刀，刀鋒用力一銼，發出刺耳的金屬摩擦聲，腳下也壓根不避，反而兩手各拎一柄刀，向著反賊直衝了過去。\n親衛功夫過硬，逼退圍殺他的反賊後，擔心樊長玉，回頭看了一眼，就見樊長玉一刀劈倒一個，雖避開了要害，被她劈過的反賊，卻半天也沒能再爬起來。\n她一個人，手拎兩把殺豬刀，跟個小旋風似的在人堆裡打轉，原本是反賊追殺他們，現在卻隱隱有了她追著反賊打的架勢。\n親衛看得迷迷瞪瞪的，心中不住地感慨，他們侯爺喜歡的，果真不是一般姑娘。\n被樊長玉扔出人堆的少年也看傻了眼，回神後趕緊一骨碌爬起來，趕回去報信：反賊做了兩手準備，在前邊大張旗鼓罵陣，在後山偷偷摸摸搞突襲！\n跑出沒多遠，就跟另一名回去報信的親兵遇上了，那少年看到他帶人來，幾乎是喜極而泣，指著身後道：「快！快！反賊假扮成咱們的人上山來了！」\n親兵想到公孫鄞的交代，忙帶著一百輕騎趕去幫忙。\n有了援軍，假扮燕州軍上山的反賊很快被制服。\n斥侯去後山的各處據點查探後，回來沉重搖頭道：「咱們的人都被亂箭射死了。」\n跟樊長玉並肩作戰的那名親兵，氣得對著被綁起來的反賊兵頭子左右開弓揍了兩拳。\n兵頭子被打得吐出一口血沫，大笑道：「弟兄們上山來，好歹拉了這麼多個墊背的，值了！」\n親兵又照著他鼻骨狠揍了一拳。\n一番審問後，也很快問出他們是如何上山的。\n這夥人換上從戰場上燕州死卒身上扒下來的燕州兵服，假稱是游離在山下的那支援軍，騙得山上守軍放鬆警惕，靠近後便以亂箭射殺。\n他們此番上山的目的，便是為了趁著前邊大亂，救回隨元青。\n兩名親兵都提議把這夥反賊帶回軍營去，交與軍師和武安侯定奪。\n樊長玉又看了一眼山下冒炊煙的地方，說：「他們都上山來了，山下應該沒人了吧？」\n前去搬救兵的親兵生怕樊長玉還沒死心，道：「樊姑娘，反賊兵馬眾多，在山下的兵力部署複雜，不宜……」\n「你等會兒。」\n樊長玉突然打斷他的話，拎著一名被綁起來的小卒就走遠了。\n她把那小卒扔到一棵樹後，指著山下問：「你們山下還有多少人？都藏在哪兒？」\n小卒傲氣道：「老子不是那等貪生怕死之輩……」\n話音未落，狠勁兒十足的一拳就已經砸在了他鼻骨上。\n小卒慘叫一聲，鼻翼下方很快流出兩管鼻血。\n樊長玉虎著臉繼續問：「說不說？」\n「這個山口只餘一千人馬，守在山下等著接應。」\n樊長玉把人拖了回去，被俘的小卒們只聽得打人的慘叫聲，沒聽到具體的談話，見被帶回去的那名小卒被鼻血糊了滿臉，一時間都心有戚戚。\n樊長玉又拎了另一名小卒過去問同樣的話。\n這法子還是她從前聽王捕頭說過的，王捕頭說縣衙裡審犯人，怕犯人串口供，就會分開來審，這樣就很容易辨出是真話還是撒謊了。\n她問了三四個，得到的都是這樣的答案後，才對兩名親兵道：「山下只剩一千人，都守在山腳下。」\n兩名親兵對視一眼，其中一人道：「樊姑娘且稍等片刻，容我再回去帶些人馬。」\n那名親兵繼續回去搬援兵後，樊長玉和先前一起作戰的那名親兵帶著百十來名謝徵一手訓練出的輕騎摸下了山，暗中觀察守在山下的那一千反賊的動向。\n山路陡峭，騎兵們都沒騎馬，但能成為騎兵，身體素質本就比步兵更為強悍，以一敵二不在話下，這也是親兵放心樊長玉下山來的原因。\n他們原本是要等那名親兵再搬點人馬來後再動手的，可遠處疾馳來一匹駿馬，馬背上的斥侯似乎同那反賊小頭目說了什麼，守在山腳下的一千反賊忽而譁啦啦地掉頭跟著那名斥侯走了。\n樊長玉問：「他們怎麼走了？」\n親兵也不知是何緣由，只道：「興許是前山出了什麼變故。」\n打架搖人這個道理樊長玉還是懂的，她當即就道：「那咱們得想辦法把這波人拖住，不然前山那邊打不過怎麼辦？」\n親兵尚有些猶豫，樊長玉已經目標很明確地朝著反賊扎在這處山口的軍帳跑去了。\n親兵怕樊長玉有什麼閃失，只得跟著去，其餘兵卒也一窩蜂地衝了出去。\n樊長玉衝進反賊的軍帳裡，啥也沒要，只翻箱倒櫃地找鹽。\n等找到反賊囤放糧食和鹽的地方後，樊長玉扛起兩袋鹽就跑。\n其餘將士見狀，也跟著扛糧食。\n反賊剛走遠，就瞧見山上的燕州軍下來搶糧了，趕緊又撤回來想圍剿樊長玉她們。\n這只是反賊的一個小屯兵點，所囤的糧食並不多，跟來的百來十名將士，人手一袋都沒扛滿。\n親兵跟在謝徵身邊徵戰多年，一見反賊掉頭就讓大傢伙兒趕緊跑，還放火燒了那些空帳篷。\n怕樊長玉扛著兩袋鹽跑得吃力，又拿過一袋自己扛著走。\n樊長玉就跟土匪下山似的，手上一空，想到長寧和言正晚上都沒個被褥搭在身上睡，把人家掛在帳篷裡的披風都扯了兩件跑。\n路過反賊做飯的地方，瞧見有個專程用來饞山上燕州軍的烤全羊還架在火堆上，把披風往鹽袋子上一搭，又騰出手去扯起掛烤全羊的橫木。\n追回來的反賊看她左手扛一袋鹽，右手舉著烤全羊還跑得飛快，一時間也是看的目瞪口呆。\n騎在馬背上的反賊小頭目拉弓就要朝樊長玉放箭。\n追上來的斥侯大喝道：「將軍，山下那支燕州軍和薊州軍要燒糧倉，將軍莫要延誤了戰機！」\n小頭目大罵一聲：「山上的燕賊都下山來搶老子糧食了！把老子大營都燒了你看不見？」\n那一箭放出去，射程太遠，加上親兵喊了一聲小心，樊長玉直接拿抗在肩上的那袋鹽做擋，成功攔下了那支箭。\n氣急敗壞的反賊們好不容易快追上扛著糧食跑的樊長玉一行人了，前去搬救兵的那名親兵又帶著山上的燕州軍趕來了。\n山上的燕州軍以亂箭將反賊逼停在射程之外，最終那一千崇州軍只能氣急敗壞地看著樊長玉等人扛著糧食和鹽上了山。\n樊長玉一股腦爬到半山腰，才發現遠處燃起了濃煙。\n她喘著氣問：「反賊要燒那邊的山？」\n親兵看到那濃煙升起的方位，卻是大喜過望，直接把一袋鹽放地上，癱坐下來笑道：「連日大雨，山上草木溼透，反賊燒不了山，是咱們的人燒了反賊的糧草！」\n樊長玉帶他們去搶糧，誤打誤撞拖延了山下那一千人馬，也算是無形中幫了去燒糧草的友軍一把。\n他看向樊長玉，眼中有了敬佩之色：「樊姑娘此番也算立了大功了！」\n-\n紙終究是沒包住火，公孫鄞突然撥了大批人馬去後山，讓謝徵警覺起來，他問：「後山出事了？」\n公孫鄞神色一僵，道：「有反賊假扮成咱們的人偷渡上山，不過已全部落網，派人過去只是增防。」\n謝徵眯了眯眸子：「她打獵還沒回來？」\n公孫鄞心知是瞞不下去了，嘆了聲，如實道：「樊姑娘在後山。」\n謝徵眸色驟冷，喝道：「胡鬧！既知那邊兇險，還讓她留在那邊作甚？」\n他強撐著就要起身，公孫鄞忙上前按住他：「我已命謝七和小五跟過去了，也派了一百輕騎過去，很快就能帶樊姑娘回來的……」\n謝徵沉著臉正要拂開他的手，一名親兵卻在此時風風火火進帳來，難掩激動地道：「侯爺，樊姑娘回來了！」\n謝徵神色稍緩，公孫鄞也鬆了一口氣，片刻後瞧見一手抱著紅絨披風、一手拎著烤全羊進帳來的樊長玉時，二人突然齊齊陷入了沉默。\n帶著崇州徽記的披風，哪來的？`

            num: 79,
            title: `第79章第79章`,
            content: `樊長玉回到營地,其他戰利品自有管理軍需的小將去清點，她先拿著禦寒的披風和烤羊肉去找言正。\n一進帳發現公孫鄞也在，還很是奇怪,道：「公孫先生又來探望傷兵了啊？」\n她聽營地裡的其他將士們都叫這俊美儒雅的男子「公孫先生」，料想他應該跟陶老頭一樣，是個謀士之類的官，便也跟著這樣叫了。\n公孫鄞乾巴巴答了聲是。\n樊長玉道：「正好帶了只烤全羊回來，一會兒可以一起吃羊肉。」\n她說完徑直朝謝徵走去,因為今日出去走這一遭，收穫頗豐的喜悅早把昨夜那點不自在蓋過去了，把披風抖開蓋在謝徵身上時,笑眯眯說：「給你找了件夜裡禦寒的衣物。」\n沒瞧見長寧,她拿著剩下的一件披風困惑道：「寧娘呢？」\n謝徵看著那披風上再明顯不過的崇州徽印,好看的眉頭皺起,正想問哪來的,因為樊長玉的問話,只得先答道：「她困了，我託人帶她回去歇著了。」\n公孫鄞看著樊長玉手上的烤全羊,不太確定地道：「樊姑娘這是獵回來一頭羊，已經烤好了？」\n樊長玉睜著一雙老實巴交的大眼說：「從山下反賊手裡搶來的。」\n公孫鄞險些被自己的口水嗆到，謝徵面色則是陡然難看了起來，視線鎖著樊長玉，語氣不太好地道：「你下山去了？」\n樊長玉點頭：「對啊。」\n謝徵沉喝道：「胡鬧,山下多危險！」\n樊長玉知道謝徵是擔心自己涉險，見他語氣不善倒也沒生氣,只道：「我是想去看看我能不能幫上什麼忙,反賊的人都聚在山前,那後山肯定人少嘛，咱們山上不缺吃的，但缺鹽啊，下去搶點鹽回來也好。」\n謝徵長眉緊鎖，知道樊長玉當真下了山還同反賊交過手，整顆心都是提起來的，眼下她人雖好好地站在自己跟前，他心中卻難免後怕，語氣也愈發嚴厲：「後山地勢陡峭，不利行軍，反賊不到萬不得已，不會選擇從後山攻上來。今日大軍是想火燒反賊糧草，貿然下山搶糧，打草驚蛇了只會影響大計，你不在軍中，不受軍規約束，若是闖下大禍，不知要填進去多少將士的性命，今後切不可再魯莽行事。」\n樊長玉聽他說這些重話，臉上的笑容慢慢收了起來，盯著謝徵看了一會兒後，放下烤全羊一言不發出去了。\n公孫鄞看著重新合上的帳簾，回看謝徵一眼，道：「人家平安歸來了，你可勁兒地訓什麼話？你還真把她當你手底下的兵將了？」\n謝徵沉沉閉上眼，道：「戰場不是兒戲。」\n公孫鄞嘆了聲，心知他這是關心則亂。\n那頭謝徵已沉聲吩咐：「把謝七和謝五叫來。」\n謝七和謝五便是公孫鄞派去保護樊長玉的那兩名親衛，都是跟著謝徵在戰場上歷練了多年的。\n不出片刻，還在同軍需官交接搶回來的軍糧的謝七和謝五，便全趕過來了。\n二人臉上原本還有些喜色，瞧見謝徵面沉如霜，這才意識到問題所在，趕緊收斂了神色，跪下垂首道：「屬下知罪。」\n謝徵一想到樊長玉方才負氣離開的背影，心口就堵得慌，加上傷口一動就扯著疼，讓他心緒愈發不佳，抬眼時，黑長的眼睫掃出的弧度也帶了幾分凌厲，近乎氣笑道：「知罪？知罪你們還跟著她胡鬧？讓你們護她周全，你們護著她去了反賊窩？視軍規為何物？」\n謝五是跟著樊長玉留在後山並肩作戰的那名親衛，他唇角動了動，道：「侯爺息怒，屬下等跟著樊……夫人去後山，本是想讓夫人在山上看看就好了，怕勸不住夫人，才稟了公孫先生，哪知正巧碰上反賊假扮成咱們的人偷摸上山來。屬下本想護著夫人突圍，哪想夫人竟是個女中豪傑，殺敵甚勇，將上山的反賊盡數拿下後。夫人又審了幾名反賊的小卒，摸清山下的兵力布防後，才想著以牙還牙，殺他們一個措手不及，替山上慘死的那些弟兄報仇。奈何謝七回去搬的援軍還未至，山下那波反賊便有回撤之勢，夫人擔心是前山出了什麼變故，為了拖住後山的反賊，才貿然去搶了反賊的營帳。」\n他頓了頓，繼續道：「夫人帶著我們搶了粗鹽五袋，糧食六十二袋，無一人傷亡。屬下失職，甘願受罰，懇請侯爺莫要怪罪夫人。」\n謝徵聽得這些細節，一時並未再出言，濃黑的長睫垂在眼瞼，蓋住了眼底所有情緒。\n公孫鄞見狀道：「樊姑娘見機行事，並非魯莽，下山之舉，也是功大於過，侯爺關心則亂，不知情便罷了，既知曉了其中原委，莫要寒了樊姑娘的心才是。」\n謝徵半闔著眼，這才出聲：「下去。」\n話明顯是對兩名親衛說的。\n兩名親衛退出去後，公孫鄞看著謝徵道：「隨元青雖被反賊救走，但掛著他這個餌在前山吊著長信王重兵，燕、薊兩州的援軍才能成功火燒糧草。沒了糧草，反賊撐不了多少時日，樊姑娘誤打誤撞也算幫你完成了這個大計。人已經被你兇走了，自個兒想想怎麼哄吧。」\n謝徵薄唇輕抿，並未出言，但眉宇間明顯多了幾分自厭的情緒。\n公孫鄞搖搖頭，出了大帳，想著還是當個和事佬去幫謝徵勸勸，跟附近站崗的哨兵打聽起樊長玉的去向，得知樊長玉往火頭營去了，便慢悠悠跟了過去。\n到了地方，才發現整個火頭營熱火朝天的，一群軍漢圍成一圈起鬨，不知在看什麼。\n公孫鄞走近了一瞧，發現是樊長玉在殺豬。\n打獵帶回來的那頭野豬，是被將士們直接五花大綁抬回來的，沒直接給刺死。\n連下了多日的陰雨，今天可算出了個日頭，陽光並不耀眼，灑落下來，在人群裡挽著袖子殺豬的樊長玉，卻連頭髮絲都仿佛散發著一層朦朧金光。\n公孫鄞正覺著樊長玉這一刻的神情沉靜又美好，下一刻就見她手起刀落，被捆得結結實實的野豬嚎叫一聲，脖頸處頓時血如注湧。\n公孫鄞臉色白了白，趕緊避開眼，暗道這姑娘大概也只有謝徵才消受得起。\n圍觀的軍漢們連聲叫好。\n「樊姑娘這殺豬的手法好！一刀斃命！」\n「瞧瞧這一大盆豬血，咱今天又能給將士們多做一個菜了！」\n樊長玉收了刀，聽著這些誇讚，覺得是對自己殺豬技術的肯定，也跟著啟唇笑了笑。\n一抬頭瞧見公孫鄞站在人堆裡，像是專程來找自己的，她跟夥夫長說了幾句，便擠開人堆朝這邊走來了，問：「先生是來找我的？」\n公孫鄞不好表現得太過明顯，乾咳一聲道：「來火頭營看看，正巧碰上你在殺豬。」\n他說到這裡頓了頓，才道出此行的真正目的：「你夫婿那些話，你莫要放心上，他就是個刀子嘴豆腐心，怕你下山去遇上什麼意外。戰場上兇險萬分，你看他那一身傷，便知每場仗都是拿命去搏的，你此番平安歸來也就罷了，你要是有個什麼好歹，他傷成那樣，想來救你都是心有餘力不足。」\n樊長玉找了個石墩坐下，說：「我沒生他氣，我就是聽他說了那些，才發覺自己好像好心辦了壞事。就像先生說的，這次僥倖全身而退罷了，要是沒能回來，還害死了其他將士，那可就真成了個罪人了，那些將士家中也還有妻兒老母在盼著他們回去啊，我光是想想便覺得心口沉得慌。」\n樊長玉能說出這樣一番話來，實在是讓公孫鄞意外，他道：「樊姑娘雖為女流，心性卻不輸男兒，樊姑娘所言，也正是將才難得的道理。」\n見樊長玉似乎有些困惑，他解釋道：「為將者，所做的每一個決定都關係著底下兵將的生死，但沒有那一場仗是不流一滴血，不死一個人就能打完的，為將者制定的戰術，也只能拿少部分人的死，去換大部分人的生。勝敗更是兵家常事，一場仗若敗了，主將心性不堅，此生怕是也再難有什麼建樹了。」\n樊長玉突然覺得那些當將軍的，不僅是武藝厲害，心性上更令人敬佩。\n她看著公孫鄞道：「多謝先生開導我。」\n公孫鄞想著以謝徵那副臭脾氣，大概是拉不下臉來哄人的，道：「是你那夫婿怕你惱他，託我過來看看。」\n樊長玉撿了根小棍戳著地上的泥巴，悶突突說：「沒惱他，他受了那麼重的傷，肯定是經歷過戰場上的生死，怕我闖禍害死了其他人，才跟我說這些。我……挺羞愧的。」\n公孫鄞詫異一揚眉，如實道：「他就是怕你出事。」\n樊長玉戳著地面的動作微頓，還是低垂著腦袋不說話。\n公孫鄞一時間也不知這姑娘在想什麼，道：「話已經給樊姑娘帶到了，我還有些瑣事，便先告辭了。」\n他正要走，卻聽得火頭營那邊的人大著嗓門議論：「可惜了在這山上獵到這麼一頭黑熊，放山下佐料齊全，老子能給做出一道全熊宴來！」\n公孫鄞腳下打了個轉，往那邊去，問：「獵了一頭熊？」\n聽得他的聲音，火頭營的軍漢們朝他看來，見他一襲白衣，玉樹臨風之貌，便猜到了他身份，忙給他騰出一條路來，紛紛喚道：「軍師。」\n公孫鄞見那頭黑熊體型碩大，沒個猛將帶頭，只怕難以拿下，贊道：「今日大挫崇州反賊，這熊可真是個好彩頭，哪位將軍獵下的？」\n邊上的火頭軍興奮道：「樊姑娘獵下的！」\n公孫鄞：？？？`

            title: `第80章第80章`,
            content: `豔陽高照,公孫鄞看著幾步開外的樊長玉，突然覺得可能是自己耳朵出了問題。\n他難以置信般再問了一遍：「誰獵的？」\n火頭營眾人笑呵呵道：「就是樊姑娘啊！」\n公孫鄞看看壯碩如小山的黑熊，又看看細胳膊細腿的樊長玉，顯然很難想像樊長玉是怎麼獵殺的這頭黑熊。\n先前聽樊長玉下了山,偷襲了敵營,還搶回了諸多糧食，在公孫鄞認知裡,大概也就是樊長玉跟著謝五他們涉險了一趟,出謀劃策指引謝五他們去搶的東西。\n殺豬因為有了之前從趙木匠那裡打聽來的消息做心裡鋪墊，方才宰那頭野豬又有不少火頭營小卒按著的,他也只覺樊長玉不同於一般女子。\n眼下突然被告知樊長玉獵了一頭熊，公孫鄞對自己過往的認知生出了一絲迷茫，他問：「樊姑娘怎麼獵的？」\n現場有一名小卒是上午跟著樊長玉一起去打獵的,當即興奮搶著答道：「咱們在林子裡發現了大型猛獸的足跡,本以為是頭野豬來著,跟著那足跡走,想去找豬窩，哪料到竟然摸熊窩裡去了！這熊有多大大伙兒也瞧見了，當時那嘴裡還叼著一隻禽鳥呢,咬得血肉模糊的,一雙兇性未退的黑眼珠子就直勾勾盯著咱們,愣是給嚇出一身冷汗來！」\n這小卒是個口才了得的,描述起遇到這黑熊時的情景，那叫一個繪聲繪色,聽得圍做一堆的火頭營眾人跟著倒吸一口涼氣,心中顫顫,緊張得不行。\n公孫鄞也不動聲色搓了搓手臂上浮起來的雞皮疙瘩。\n那小卒繼續道：「咱們哪見過那架勢,手上拿的也只是些刀劍和尋常弓箭，打起來怕是連熊皮都刺不穿，趕緊就四散跑開。那黑熊一見咱們跑，兇性一發就追了上來，一個弟兄躲無可躲爬上了樹，那黑熊力氣大得啊，撞了兩下碗口粗的樹就直接倒了。咱去打獵的弟兄幾個都以為書上那個弟兄必死無疑，哪曾想，樊姑娘把腰間的繩索解下來，飛快打了個繩套，一甩過去就套住了黑熊的脖子！」\n眾人仿佛也跟那被捏住了脖子的雞似的，大氣不敢喘一聲。\n小卒還比划起樊長玉當時的動作：「樊姑娘一腳蹬在一棵大樹上，兩手拽著那繩索死命往後一拉，嘿呀！那黑熊直接被樊姑娘拽了個仰趴！」\n火頭營的兵卒們爆發出一陣吸氣聲。\n「那得多大的手勁兒？」\n有剛圍過來聽這故事的，沒現場見過那場景，質疑道：「真的假的？誰能有那麼大力氣？何況還是個姑娘家。」\n小卒喝道：「咱們跟前打獵的那幾人親眼所見！還能有假不成？」\n邊上的人幫腔道：「樊姑娘可不是一般姑娘家！我今日跟著樊姑娘去搶過反賊的營帳，你是沒瞧見，那百八十斤的鹽袋子，樊姑娘往肩上一撂就是兩袋！還能騰出手去搜刮披風，順帶把反賊在山下靠的羊也給拿走了！」\n有人見過一小卒扛著鹽袋子舉著烤全羊跑的英姿，卻不知那就是樊長玉，一時間圍做一團的軍漢們驚嘆有之，震驚有之，各種讚揚聲不絕於耳。\n當初跟著樊長玉一起運送糧食上山的薊州軍道：「扛百來斤鹽算什麼！之前薊州上遊修大壩，要採挖土石，將近三百多斤的一筐石頭，樊姑娘從山上一直背到了大壩邊上！當晚那消息就在咱們營地裡傳遍了，負責採挖土石的那校尉，還賞了樊姑娘一隻烤雞！」\n眾人的吸氣聲更大了些，公孫鄞握著扇子沒說話，但表情明顯已逐漸呆滯。\n樊長玉接受著眾人的注目禮，頗有些不習慣，想說什麼，又感覺這場合說什麼都不合適，只能一臉老實巴交地任眾人打量。\n方才說話的薊州軍感覺宣揚樊長玉的事跡也是給薊州長面子，繼續道：「水淹盧城反賊那一仗，看起來借了天時地利，必勝無疑，可裡邊也兇險著呢！咱們囤了數萬人在巫河上遊修大壩，稍不注意就能被反賊的斥侯察覺出動向，只能日日死盯著反賊斥侯，發現一個截殺一個。可大戰前夕，反賊派出一支騎兵突襲了咱們營地，掩護斥侯跑了！那消息一旦傳回反賊軍中可不得了啊，水淹反賊這一計就廢了！當時有三名斥侯跑了，也是樊姑娘一介女流，在雨夜裡隻身橫翻巫嶺，截殺了那三名斥侯！」\n這項軍功無論在哪兒，都算不得小。\n一時間圍在火頭營的兵卒們，看樊長玉的目光裡全是敬意。\n樊長玉瞅著這些神色激動望著自己的人，只能誠懇又老實地點頭致意，內心其實茫然得一比。\n那說樊長玉獵熊的小卒顯然也被樊長玉的功績給震驚到了，磕磕絆絆說完後半段：「這黑熊，後來被樊姑娘削了根竹矛刺穿了心肺，又用她方才殺豬的那刀補了一刀，就死透了。」\n樊長玉跟著公孫鄞離開火頭營時，就感覺玉樹蘭芝的公孫先生好像變成了個糟老頭子，他背負著雙手，走幾步又回頭看自己一眼，好像認知遭到了什麼衝擊一般。\n在不知他第幾次回頭看來時，樊長玉終於忍不住開口：「公孫先生，您沒事吧？」\n公孫鄞麻木搖頭：「我沒事。」\n樊長玉皺著眉，很誠懇地道：「您瞧著似乎不太好。」\n公孫鄞說：「是有點。」\n他看怪物一樣看著樊長玉，像是十分不解：「所以你下個山，你那夫婿在擔心個什麼勁兒？」\n在知道樊長玉的事跡之前，謝徵的擔心，他是能理解的。\n聽說了之後，他不理解了！\n樊長玉動了動唇角，道：「他……」\n公孫鄞抬手止住了她要說的話，明顯還沒從一連串的震驚中回過神來，道：「樊姑娘，我想先一個人靜會兒。」\n樊長玉「哦」了一聲，走出老遠又回頭看了一眼坐在矮坡上發呆懷疑人生的公孫鄞，頗為苦惱地撓了撓頭。\n她好像給公孫先生帶去了不小的困擾？\n樊長玉溜溜達達回了暫住的地方，因為之前謝徵說了一堆教訓她的話，她心裡明白是一回事，可不知為何，還是有些悶悶的，至少眼下是不想再去他那裡的，便去看長寧。\n午憩的長寧已經醒了，謝五送了分好的烤羊排過來，長寧坐在帳門口的小馬紮上，一手拿著根羊排啃著，不過啃得很不專心，兩隻黑葡萄似的大眼只顧盯著謝五，聽他講自家阿姐今日的戰績。\n樊長玉隔老遠就看到了長寧，因著營地裡的人都穿著兵服，謝五又是背對著她的，一時間也沒認出來，只喚了聲：「寧娘。」\n長寧一聽見樊長玉的聲音，就兩眼晶亮望了過來，興奮道：「阿姐回來了！」\n謝五也面帶笑意打了個招呼：「樊姑娘。」\n樊姑娘點頭：「是小五兄弟啊，你怎過來了？」\n樊長玉今日才跟謝五和謝七熟絡了幾分，但並不知道他們姓氏，只知道他們一個喚小五，一個喚阿七，貌似是兄弟。\n謝五道：「那隻羊弟兄們重新烤熱了，拆了幾根羊排給樊姑娘送來，要不是樊姑娘，弟兄們今日可沒這口福。」\n樊長玉道了謝，謝五便藉口還有事，先走了。\n樊長玉在他離去後，才摸了摸長寧的頭，笑問：「跟方才那大哥哥說了什麼，高興成這樣？」\n長寧拿著羊排都沒忍住手舞足蹈：「他說阿姐可厲害了！一人就殺死了一頭大黑熊！阿姐還殺去壞人那裡了，搶了壞人的糧食和烤羊！」\n她仰起頭，黑亮的大眼裡滿是憧憬：「要是能告訴寶兒這些就好了，他說起關他的那個壞人牙齒就發抖，告訴他，他應該就沒那麼怕了，阿姐會去救他和俞嬸嬸的！」\n樊長玉也有些擔心俞淺淺的處境，寬慰長寧道：「嗯，等下山了，咱們就去救人。」\n長寧高興得又啃了一口羊排，邊跟著樊長玉往屋子裡走邊說：「等把寶兒和嬸嬸救出來了，以後她們繼續開酒樓，阿姐蓋豬棚、開豬肉鋪子，寧娘也跟著阿姐學殺豬，掙好多好多銀子！」\n樊長玉被小孩子的願景逗得啼笑皆非，挽唇道：「好啊。」\n長寧扳著手指頭數了數，發現不對勁兒，苦惱道：「那姐夫做什麼？」\n樊長玉因為這句無忌的童言微微失神了一瞬，長寧卻已想到了自認為最好的安排，高興道：「姐夫去鄉下的豬棚養豬！」\n門外，去而復返的謝五突然狂咳起來。\n樊長玉掀開帳簾一看，見謝五如芒在背立在門口，困惑到：「小五兄弟還有事？」\n謝五想到自己回去復命時，說樊長玉也回來了，只是沒去他那邊，謝徵那個冷得能殺人的眼神，趕緊道：「言兄弟傷勢頗重，身邊又沒個人照應，剛剛我幫軍醫去送藥，才得知他躺了一天，想喝口水，都沒人幫忙燒一壺……」\n他有點編不下去了，尷尬得就此打住了話頭。\n樊長玉心說前不久公孫先生不才去那邊探望過傷員麼，但轉念一想，公孫先生畢竟是當官的，言正只是個小卒，怎敢勞煩公孫先生給他端茶送水。\n她是見過言正那傷的，一時間心頭頗有些不是滋味，道：「多謝小兄弟，我一會兒就過去。」\n謝五這才心虛離開了。\n長寧也眼巴巴看著樊長玉：「阿姐，姐夫想喝水都沒人給他倒的嗎？姐夫好可憐。」\n樊長玉尋思著今日又打了一場惡戰，傷兵帳那邊肯定會添傷員的，帶長寧過去不方便，便交代她：「你乖乖呆在帳篷裡，不要亂跑，阿姐過去看看。」\n長寧點頭：「寧娘很乖的，寧娘哪兒也不去。」\n樊長玉這才動身去謝徵那邊，果真如謝五所言，這邊冷清的不得了，別說慶功的人不見一個，就是新的傷兵也沒安置過來。\n樊長玉掀簾進去時，就見謝徵靠坐在床頭，面色蒼白，瞌著眼似在淺寐，掀開帳簾傾洩而入的天光，恰好落在他鴉羽一般的黑睫上，毛茸茸的，莫名顯出一股孩童般的脆弱來。\n大概是感知到了光源，幾乎是掀開帳簾的瞬間，謝徵便掀開眼皮看了過來，面上那一絲孩童似的脆弱也蕩然無存，目光冷銳且陰鬱，看清來者是樊長玉，才微微怔住，片刻後垂下眼道：「我以為，你不想見我了。」\n樊長玉抿著唇，沒回話，進了大帳後，徑直去桌上拎茶壺，入手果然是空的。\n她腳下轉了個步，拎著茶壺就要出去，忽聽得身後傳來一聲：「等等。」`
        },

            num: 81,
            title: `第81章第81章`,
            content: `樊長玉回過頭,看向半張臉都隱匿在光影中的謝徵。\n背光的緣故，看不清他這一刻面上是何神情，嗓音卻比素日裡低沉了許多：「先前對你說了重話,抱歉。」\n他驕傲了半生,難得有主動低頭的時候。\n樊長玉還是沒說話，直接掀開帳簾出去了。\n謝徵望著還在輕晃的帳簾，唇角逐漸抿緊。\n片刻後，樊長玉又拎著水壺回來了,壺嘴裡冒著熱氣,明顯是剛灌進的熱水。\n她沒理會謝徵臉上那一瞬間的錯愣，拿起桌上的木杯倒了一杯水遞過去：「喝麼？」\n謝徵接過杯子,剛燒開的水滾燙,他沒往唇邊送,捏在手中,說了句遲來的答謝：「多謝你尋來的披風。」\n樊長玉看了一眼他搭在身前的那件紅絨披風，仍不接話,只問：「身上的藥換過了嗎？」\n謝徵大半張臉都陷在杯口升騰的熱氣裡,長睫如扇,遲疑片刻,搖了搖頭，面上泛著冷意的白,恍若一輪掛在霜林裡的寒月，悽清又冷淡,眉眼間鐫刻著一份厭世的疏離，一副要在這裡自生自滅的樣子。\n樊長玉覺得這大概就是生了一副好皮囊的好處,見他這般,她心中竟莫名有些不忍。\n她以為是傷員太多了,軍醫顧及不到他，一言不發起身去找軍醫拿藥。\n今日一場大戰後，山上的確又添了不少傷員，隨軍的幾名軍醫都在營地裡四處奔走，給謝徵看診的那名軍醫本也是要按點去給他換藥的，被謝徵一句「先去看其他將士」給攆走了。\n軍醫們都知道謝徵的脾性，他身上的藥又是昨晚才換過的，便沒再堅持，此刻見樊長玉找過來，心底反而大鬆一口氣，趕緊把今日要換的草藥和要煎服的藥都拿給樊長玉了。\n拿著幾包藥回去後，樊長玉看著靠坐在床頭的謝徵，硬邦邦道：「脫衣服。」\n謝徵看著她手中的藥，沒多問什麼，順從地褪下了身上那件單衣。\n比起樊長玉剛撿到他那會兒，他眼下明顯結實了許多，腰腹肌肉形狀明顯，塊壘分明，只是那一道道或深或淺的疤，同樣扎眼。\n樊長玉板著臉給他拆從肩頭斜纏至肋下的紗布，動作卻是儘量放輕了的。\n最裡層的紗布被草藥汁和鮮血染了個色，氣味也不太好聞，看到那比起之前稍好了些，卻仍猙獰不已的傷口時，樊長玉心中五味陳雜，別開了眼。\n她拿著草藥就要往上敷，卻被人握住了手，手背傳來的溫熱觸感讓她頭皮一炸，整條手臂的血仿佛都在逆流，不由皺眉朝謝徵看去。\n對方眼底似乎有許多情緒，卻又全都看不分明，只平和道：「傷口瘮人了些，我自己來。」\n樊長玉聽到這話，唇角下壓，手上微微使勁兒，把草藥給他敷了上去，謝徵看了一眼自己被掙脫的手，垂著眼不知在想些什麼。\n敷好藥，樊長玉拿乾淨的紗布一圈一圈給他纏住傷口時，才悶悶說了句：「我不是怕你那道傷口。」\n謝徵因為樊長玉這句話微微失神，不及說什麼，便又聽樊長玉又道了句：「把你左肩的頭髮撥開。」\n他因臥床多日，束起的發早亂了，碎發垂落不少下來，要將紗布纏過肩頭時，得將他散落下來的亂發拂開，樊長玉騰不出手。\n謝徵照她說的拂開了，卻還是有一些碎發殘留下來。\n樊長玉把紗布繞過去，接上之前的話：「我是怕你死。」\n謝徵長睫微抬，寒星似的一雙眼裡，似有些許怔愣。\n眼前的姑娘低喃著：「那麼重的傷，差一點就扎進臟腑，當時得多疼啊……」\n謝徵一瞬不瞬盯著她的眉眼，只覺自己心口像是催生了一棵長倒鉤的樹，樹根每往他心底多生長一寸，就總帶起酸漲的痛意，樹梢伸展的枝丫卻又讓他感受到一種繾綣的溫柔，於是愈發野蠻地抽枝展葉。\n他說：「我不會死。」\n他還沒娶到她，怎麼捨得死？\n樊長玉好像天生就不會撒謊，明澈的杏眸看著眼前這個哪怕虛弱卻俊美兇戾依舊的人，道：「是人都會死的。」\n謝徵笑了笑，說：「我知道。」\n他真正笑起來的時候，是極其驚豔的，樊長玉不知他為什麼突然笑，被他那個笑容晃了一下眼，皺了皺眉繼續給他纏紗布。\n謝徵問她：「不生我氣了？」\n樊長玉手上動作微頓，道：「原本也沒生氣，我不是軍營裡的人，不懂規矩，你說的那些又沒錯。」\n話是冠冕堂皇了，不過樊長玉想起自己先前的舉動，面上也有點掛不住。\n她的確是生氣了，但不明白自己為什麼生氣。\n她下山搶了鹽解決山上的頭等大事後，順手拿了兩件披風時，心裡想的是言正和長寧。\n但滿心歡喜回來，等來的卻是一頓劈頭蓋臉的斥責，她知道言正說得有道理，心底卻還是控制不住地難受，有一股類似委屈的情緒。\n錯了就是錯了，有什麼好委屈的？\n樊長玉覺得自己變得很奇怪，甚至有些不像自己了，才連忙躲了出去。\n放在從前，她不會這麼和言正計較的，畢竟言正嫌棄鄙視她也不是一天兩天了。\n現在她會因為他的話難受。\n樊長玉不知道是哪裡出了問題，她好像變壞了，知錯能改才是對的。\n謝徵聽到她這番話，也微微一愣，隨即道：「是我之前的話重了些，你去後山，並沒有魯莽行事，相反還撞破了反賊的詭計，功遠大於過。」\n樊長玉只是靦腆笑笑，少了二人從前相處時的親近隨意，甚至多了幾分對待外人一般的客氣疏離。\n給他包紮好後，她退開一步坐到圓凳上，垂下眼道：「晚上會有人給你送藥過來，你記得喝。明天我也託小五兄弟過來幫你換藥擦身，你好生休養，缺什麼就跟小五說，聽說你同他原本也是一個伍的，熟人也好有個照應。」\n謝徵終於聽出了幾分不對勁兒，好看的眉頭一皺，「什麼意思？」\n樊長玉隨意扯了個藉口：「山上受傷的將士增多了，軍醫們忙不過來，我去幫忙打下手，抽不出空來這邊了，寧娘這兩天我都讓她自個兒在帳內，不要去外邊。」\n一直到樊長玉離開，謝徵都沒再說一句話。\n樊長玉心裡也不太好受，她一個人跑去僻靜的矮坡處坐著發了一會兒呆。\n她知道以言正要強的性子，是拉不下臉讓她再去照顧他的，就算誤會她可能是嫌棄他一身傷了，也不會再多問什麼。\n但她現在心裡的確是亂糟糟的，樊長玉不知道自己這是怎麼了，她眼下唯一能想到的辦法，就是先離言正遠遠的。\n-\n公孫鄞用了一個下午才接受了謝徵看上的姑娘跟他一樣是個怪胎的事實，去找謝徵商議接下來的戰事時，為免撞槍口上，他先問了一直躲在暗處站哨的謝五，得知樊長玉去看過謝徵了，還給換了藥，心說再怎麼也該把毛兒給順好了的。\n一進帳，瞧見謝徵的臉色，公孫鄞卻恨不得立馬轉身走。\n這副死人臉，哪裡是捋順了毛兒的，簡直是用漿糊給逆毛抹了一遍！\n那視線都冷得能掉冰渣子！\n公孫鄞輕咳一聲，問：「聽說樊姑娘來過了？」\n謝徵冷沉的視線一轉向他，公孫鄞頓覺今晚穿的衣裳太過單薄了些，春寒實在是冷得浸骨頭。\n他搓了搓手臂問：「你們又吵架了？不是，我追去火頭營給你說了一堆好話，謝九衡你堂堂八尺男兒，就不能服個軟，好好哄一哄人家？」\n謝徵靠坐在圈椅上，案前還擺著沒處理完的公文，神色間滿是陰鬱和自厭：「我道歉了。」\n公孫鄞道：「姑娘家嘛，當然得低聲下氣去哄，你別臭著一副臉給人家賠不是……」\n謝徵一看過來，公孫鄞就禁了聲。\n好一會兒，謝徵才道：「我好好道歉了，她也說不生氣，但又說接下來都不會過來了。」\n公孫鄞幾乎是一口篤定道：「這不明擺著還生氣呢！」\n一看謝徵神色間似還有些困惑，公孫鄞就忍不住道：「女人不都這樣口是心非麼！她說不生氣了，其實就是生氣！她都說接下來幾天不會過來了，你還沒聽出來麼？」\n謝徵生平頭一回喜歡一個姑娘，也不懂女兒家的心思，問：「怎樣才能讓她消氣？」\n公孫鄞想了想道：「其實樊姑娘生氣也不是沒理由的，她一身好武藝，來這裡之前，薊州上遊修大壩的事叫反賊斥侯探了去，她就有膽量一人在雨夜橫翻巫嶺去截殺斥侯，今晨去打獵，又隻身獵了一頭熊回來，此等悍勇，便是你麾下重將裡，也挑不出幾個來。聽小五所言，樊姑娘決定追擊反賊，也是探清對方兵力後才下的決策，智勇雙全不說，此舉立下的也是實打實的戰功，你不管不顧，劈頭蓋臉給人一頓訓斥，人家樊姑娘能不生氣嗎？」\n樊長玉之前怕謝徵擔心，對自己在薊州的經歷都只三言兩語帶過，謝徵並不知她的那些事跡。\n此刻聽說了，再得知她隻身獵熊，心中不無驚異，卻又愈發沉默。\n公孫鄞見狀，嘆了聲：「樊姑娘非一般女子，我知你那日那些話是關心則亂出於好意，但今後也切莫把鴻鵠當燕雀。我同樊姑娘接觸雖還不多，卻也感覺得到她是個心地極軟的姑娘，為今之計，你不若示示弱。」\n謝徵好看的眉眼間露出一抹惑色：「示弱？」\n-\n第二日，樊長玉果真如昨日對謝徵說的那般，去軍醫那邊幫忙了。\n她搶鹽殺熊的事，昨夜就已在軍中傳遍了。\n一去傷兵帳，就有不少將士主動同她打招呼，發現她是個容貌姣好的姑娘家，愈發驚訝。\n軍醫知道樊長玉的身份，連包紮傷員都不敢讓樊長玉做，把她打發去煎藥。\n有傷兵道：「可惜了樊姑娘不是男兒身，否則以樊姑娘這一身武藝，靠著軍功都能掙個將軍噹噹！」\n本朝也有過女將軍，但都是將門出身的。\n尋常女子，就算有一身好武藝，連軍籍都入不了，又何談上陣殺敵掙取軍功。\n一漢子道：「也不知將來哪位弟兄有福氣，要是能娶到樊姑娘，祖墳上何止是冒青煙，那是直接起火了！」\n當即有人拐了那漢子一手肘，低聲道：「瞎說什麼呢，樊姑娘已經有夫婿了！」\n不知情的忙問：「樊姑娘嫁人了？」\n謝七說是過來幫忙，但主要還是暗中保護樊長玉的，他端著剛煎好的一鍋藥進來，就聽見一群人議論樊長玉議論得熱火朝天，一下子就替自家生起氣來，道：「樊姑娘千裡迢迢來這山上，就是為了尋他夫婿的。」\n立馬有傷兵問：「樊姑娘的夫婿是誰，尋到了嗎？」\n謝七神氣一仰脖，正要答話，卻被一名聽過些許風聲的傷兵搶著答了：「尋到了，不過聽說快死了，只還吊著一口氣。」\n謝七：「……」\n眾人先是唏噓，隨即又七嘴八舌議論起來，甚至還有幾個在樊長玉進來時，不動聲色理了理頭髮的。\n那目光殷切得，仿佛都在盼著樊長玉那「還吊著一口氣」的夫君別再掙扎了，早些斷氣。\n從傷兵營退出去後，謝七沒忍住趕緊去找謝徵打小報告。\n-\n另一頭，樊長玉剛把軍醫命人送來的藥煎上，謝五就急匆匆來尋她：「樊姑娘！不好了！你夫婿突然咳血了，你快回去看看吧！」\n樊長玉心中也是一驚，忙問：「怎麼咳血了？」\n謝五不敢看樊長玉的眼睛，只哭喪著一張臉道：「我也不知道，我一進去送藥，就發現他咳得身上被褥上全是血！」\n樊長玉心說這麼個咳法，那還得了，趕緊叫了之前給謝徵看診的那名軍醫隨自己一道回去看看。\n跟著她一起煎藥的小卒，正是之前被她扔出重圍的那少年。\n少年看著樊長玉和軍醫匆忙離去的背影，唏噓道：「樊姐姐的夫婿真要死了啊？」`
        },

            num: 82,
            title: `第82章第82章`,
            content: `帳內,謝徵看著自己衣襟、披風上的雞血，皺了皺眉，「血會不會太多了？」\n公孫鄞一邊指揮著謝七把那隻剛宰掉的野雞拿去火頭營煲湯,一邊道：「你又不是沒去傷病營看過,那些傷兵缺胳膊少腿的都有，哪個不是一身血？樊姑娘在傷病營幫忙見得多了，不多弄些，唬不到她怎麼辦？」\n說話間,眼尖地瞅見披風邊上還有一根野雞掙扎時撲騰下來沒收拾乾淨的絨毛,趕緊給摘了下來。\n發現謝徵臉色雖蒼白，眼下也有淡淡的青黑,卻一點沒高熱的樣子,又忍不住道：「昨夜你吹了一宿冷風,又用冷水洗了頭髮,怎麼還是一點發燒的跡象都沒有？」\n謝徵：「……」\n公孫鄞破罐子破摔道：「罷了罷了，就這樣演一出苦肉計應當也夠了。」\n帳外響起謝五的聲音：「就在裡邊！」\n公孫鄞趕緊退後,坐到了一旁的凳子上,露出一副悲憫神色。\n樊長玉跟著軍醫匆匆進帳後,一眼就瞧見了謝徵蒼白孱弱地躺在床上,衣襟上一大團鮮血刺目不已。\n她心下一緊，連忙上前：「言正！」\n謝徵雙目緊閉,薄唇乾裂，臉色蒼白如雪,碎發亂糟糟地散落在額前，眼下也一片淡青色,看著憔悴又狼狽。\n樊長玉只覺心口像是被一雙大手攥緊了,披風上那一團暗色的血跡刺得她眼窩泛起絲絲酸意。\n不過一晚上罷了,怎麼昨日還好好的人，突然就這樣了？\n殘存的理智支撐著她讓開一步，轉頭就對軍醫道：「您快給他把脈看看！」\n軍醫也被這陣仗給嚇到了，生怕謝徵有什麼好歹，連忙搭上謝徵的手腕去探脈，感知到指下的脈搏跳動時，軍醫神色裡露出些許異樣，一抬頭卻見對面的公孫鄞遞了個眼神過來。\n軍醫趕緊沉吟一聲，露出一副凝重的表情繼續把脈，看得樊長玉一顆心突突的。\n好一陣，軍醫才收回手道：「樊姑娘，你夫婿這病症兇險得緊吶！」\n樊長玉忙道：「軍醫，還請您救救他！」\n軍醫捋著山羊須為難道：「他咳血咳成這樣，想來之前的傷，還是在肺部積了不少淤血，必須得滋陰潤肺，外加失血過多又肝火旺，還得養血止血。我且先下幾味藥給他煎服下去，但日後身邊最好是時刻有人看著，以免他在昏迷中咳血，嗆血而亡。」\n樊長玉現在整個人都後怕不已，忙道：「我會寸步不離看著他的。」\n軍醫下去配藥去了，樊長玉看著躺在一片血色中的謝徵，鼻尖也開始泛酸，心中不可避免地自責起來。\n言正重傷未愈，自己昨日置什麼氣，作甚說以後都不來這邊了？\n言正要是就此有什麼好歹，她可能會內疚一輩子。\n公孫鄞一見樊長玉臉色，就知這苦肉計是成了，適時出聲寬慰道：「樊姑娘莫要太過擔心，言小兄弟定會吉人天相的。」\n樊長玉一進帳，所有注意力都放在謝徵身上了，此時才發現公孫鄞也在，道：「公孫先生也過來了？」\n公孫鄞說起謊話來臉不紅氣不喘：「言小兄弟突然咳血，小五一時慌了神，正巧我在附近巡營，便讓他先去尋軍醫，我替他看著言小兄弟片刻。」\n樊長玉代謝徵向公孫鄞道謝，公孫鄞笑道：「都是我大胤上陣殺敵的好兒郎，留得性命才能繼續護我大胤河山，有何言謝的。既然有樊姑娘守在這裡，我便不多留了。」\n送走公孫鄞後，樊長玉搬了個小馬扎坐到謝徵床邊，悶悶道：「你一定要好好的啊。」\n大概是離得太近了，樊長玉聞著那披風上的鮮血味，突然用力吸了吸鼻子。\n她經常殺豬，對豬血的味道很敏感，這些日子又刀口舔血，對人血的味道也不陌生，這被褥上的血，不僅腥味重，怎麼還有一股淡淡的雞毛味兒？\n她湊近了些正要仔細聞，「昏迷多時」的謝徵忽而長睫輕扇，虛弱掀開了眸子。\n樊長玉瞬間把什麼都忘到腦後去了，驚喜出聲：「言正，你醒了？」\n謝徵定定看了她一會兒，才道：「你來了。」\n嗓音破碎喑啞，像是咳得太厲害傷到了喉嚨。\n只這麼一句話，又說得樊長玉心頭頗不是滋味，她給他掖了掖被角道：「軍醫說你咳血是內傷，需要好生調理，以後我都守在這裡，你安心養傷就是。」\n謝徵蒼白的唇上沾著血色，愈顯孱弱，緩緩道：「我聽說了你在薊州的事。」\n樊長玉不知他說這些是何意，一時沒做聲，只聽他有些吃力地繼續說：「經歷了這麼多，你早已不是當初臨安鎮上那個只知殺豬買肉的尋常女子，你歸來後，一味指責你，是我不對。」\n聽他又一次因為昨日說的那些重話道歉，倒弄得樊長玉愈發羞愧起來，垂下眼悶聲道：「你教訓我的話沒錯，我和下山的那些將士能全身而退，只是運氣好，如果不是阿七兄弟及時搬了救兵來，可能我和那些去搶敵營的將士，都得被踏死在反賊的馬蹄下。」\n她做足了心裡準備，終於有勇氣抬頭直視謝徵道：「被你教訓後莫名其妙生你的氣，是我心胸狹隘，我會改的。」\n這一刻她滿心都是愧疚，見謝徵唇邊仍有不少血跡，出門就要打熱水來給他擦洗。\n謝徵看著她離去的背影，眉頭輕擰。\n怎麼扯到心胸狹隘上去了？\n等謝五端了煎好的藥送來，也是樊長玉接過一勺一勺餵給謝徵。\n從反賊營帳裡薅回來的那件厚實披風，謝徵當做了被褥，眼下沾上了血跡，樊長玉知道他愛乾淨，回自個兒住的地方，把她和長寧晚上蓋的那件披風拿過來，先給謝徵蓋著，準備把染了血汙的披風和謝徵身上那件血衣一起拿去洗掉。\n謝五生怕樊長玉在洗這些時發現什麼端倪，搶著拿去洗了。\n到了晚間，樊長玉要守著謝徵，又不放心長寧一個人在帳中，眼瞧著這邊軍帳裡還有多餘的軍床，就把長寧也接了過來，讓長寧跟著自己一起在這邊睡。\n她重新鋪床時，困惑道：「幾個傷兵營帳裡都擠了不少人，怎地這邊空著這麼多床位沒送人過來。」\n幾個軍醫避著謝徵都來不及，又哪裡敢把傷兵放這邊軍帳來。\n山上不管是燈油還是蠟燭都寶貴，一到夜裡，所有的軍帳裡幾乎都是燃火盆子照明。\n火舌舔舐著夜色，謝徵半張臉都鍍上一層暖黃的火光，清雋的眉眼好似墨筆勾畫，臉部輪廓線條分明，他微側著頭，看著鋪床的樊長玉，一本正經地胡說八道：「不知，興許軍醫們自有安排。」\n樊長玉對軍營裡的管理也了解不多，沒再深思這個問題，鋪好床讓困得直打瞌睡的長寧睡下後，對謝徵道：「你夜裡要喝水或是要起夜，就叫我一聲。」\n謝徵聽到「起夜」兩個字，耳尖燙了一下，錯愣看向樊長玉。\n樊長玉接觸他的眼神，一下子福臨心至，臉也跟著燙了起來，轉過身道：「想什麼呢，你叫我，我去叫附近巡營的軍爺來幫忙。」\n為了方便照顧謝徵，樊長玉帶著長寧睡的那張床就在謝徵邊上，中間只隔著三尺不到的距離。\n她這些日子太累了，幾乎是一沾床板就睡著。\n謝徵聽著姐妹倆的呼吸聲都綿長後，才轉頭朝床側看去，火盆子裡還剩一截段木燒著，微弱的火苗一抖一抖的，火光波痕一般浮照在樊長玉臉上，讓那張恬靜的面容也多了幾分說不出的綺麗。\n一股悸動在心口萌芽，來勢洶洶，像是萬蟻噬咬，謝徵盯著樊長玉因為側躺被壓得微微嘟起的唇看了許久，眼底的暗色比夜色更粘稠，但他終究什麼也沒做，移開視線，轉向另一側沉沉閉上了眼。\n-\n第二日，這邊營帳裡就被撥來了一批新的傷兵，有的傷了手，有的傷了腳，反正不是全躺在軍床上動不了的，彼此之間都能照應。\n樊長玉便攬下了給這些傷兵煎藥的活，也方便白天在這裡照顧謝徵，晚上她還是帶著長寧在自己帳篷裡睡，謝徵便託付新來的那些傷兵幫忙照看一二。\n新來的傷兵們都很好說話，平日裡也不怎麼吵，樊長玉覺得跟自己之前照料過的那些傷兵不太一樣，但想著千人千面，也沒當回事。\n殊不知，這些傷兵，都是謝徵前一夜聽了樊長玉的問話後，讓公孫鄞把親衛隊裡受傷的人轉移了過來。\n一轉眼，小半月便過去了。\n樊長玉照料傷兵閒暇時，便掏出自己包袱裡的幾本書研讀，正好言正就在身邊，有現成的夫子，她不懂的就能直接問他。\n謝徵見樊長玉捧的是一本《孟子》，問：「《論語》學完了？」\n樊長玉如實道：「學完了。」\n當初遇山匪時，她護著李懷安的那一幕幕湧上心頭，謝徵狹長的鳳目微微挑起，問：「自己看書學的？」\n樊長玉說：「裡面的文章精妙，許多地方看了註解還是想不明白，我在薊州上遊修大壩時，遇到一位老先生，老先生面冷心善，教我學完的。」\n說起陶老頭，樊長玉面上多了幾分敬意：「你不知道，那位老人家也是位了得的人物，他後來還成了軍中的幕僚，就是上了歲數，膝下沒個兒女，他唯一的學生又不管他了，怪可憐見的，他跟我一塊在山上挖石頭時，天天罵他那學生呢！」\n不是跟李懷安學的，謝徵心裡舒坦了，聽樊長玉說之前被誤當做細作抓去挖石頭修大壩的經歷，心中又有幾分微妙。\n計策是他出的，但負責修大壩的人馬，都是賀敬元那邊的，他當時人在燕州，還真不知樊長玉被看押在了那裡。\n最終他只對樊長玉方才的話點評了幾句：「他那學生既不尊師，他如今得勢了，教訓他那學生就是。」\n樊長玉看謝徵一眼，不太高興地說：「陶老先生嘴上雖不饒人，胸襟可寬廣著呢。」\n謝徵聽到那老先生姓陶時，指腹划過書頁時微頓了一下，問：「他叫什麼？」\n樊長玉說：「不知道，他只說他姓陶。」\n天下姓陶之人何其多，謝徵想了一下樊長玉說的那老頭天天罵他那白眼狼學生，這跟陶太傅可以說毫無干係了。\n老師歸隱多年，若是出山，也會來找他才是。\n他斂下思緒，道：「既對你有恩，將來提拔他一二便是。」\n話一出口，就見樊長玉神色怪異地盯著自己。\n謝徵自知失言，不及補救，便聽樊長玉擰著眉道：「陶老先生已經是唐將軍麾下的幕僚了，你能提拔他什麼？你又不是將軍。這話莫要亂說，要是叫陶老先生知道了，多不好。」\n謝徵一噎，隨後道：「我說的是將來。」\n樊長玉神色似有些無奈：「你就這麼確定自己能當將軍？」\n謝徵神色微動，從書卷上抬起眼：「我若是當了個比將軍還大的官呢？」\n樊長玉很困惑：「比將軍還大的官是什麼？」\n謝徵狀似無意地說：「封侯拜相。」\n樊長玉也不看書了，問他：「傷口還疼麼？」\n被無微不至照顧了多日的謝徵不知樊長玉突然問這話是何意，斟酌道：「還好，只是稍一運勁兒便刺疼得厲害。」\n其實已經好得七七八八了，只要不使猛勁兒，基本上不會太疼。\n樊長玉把放涼藥碗遞過去，「先喝藥吧，養好傷再想封候拜將的事。」\n謝徵：「……」\n-\n又過了兩日，謝徵的傷還是沒個「起色」，被一堆軍事和京城那邊的摺子煩得頭痛不已的公孫鄞頂著青黑的兩眼殺氣騰騰去探病。\n樊長玉有些時日沒見到他了，驟然見到兩眼青黑雙目無神的公孫鄞，還嚇了一跳：「公孫先生這是怎麼了？」\n公孫鄞身上殺氣收了收，勉強擠出個溫文爾雅的笑容：「瑣事纏身，忙了些。」\n樊長玉道：「公孫先生還是要多注意身體啊。」\n公孫鄞笑著應好，又問：「你夫婿傷勢如何了？」\n樊長玉想了想道：「軍醫說他內傷頗重，得慢慢養，他傷口處還是疼。」\n公孫鄞維持著臉上的笑容，但怎麼看怎麼咬牙切齒：「是嗎？我去看看。」\n正好樊長玉得去煎藥，公孫鄞一進帳，揮退屋內跟著躺了小半月、傷口痂都開始脫落，只能纏著繃帶繼續裝病的那些親衛，看著臉上蓋著一本書午憩的謝徵，後槽牙磨得咯吱響，一把薅下那本書，咆哮道：「你這傷再好不了，老子就得活活累死在那一堆公文裡了！」\n當初出謀劃策的時候有多賣力，現在公孫鄞就有多後悔。\n這廝是真休養去了，自己卻累得像那拉磨的驢一樣。\n不！驢都比他輕鬆！\n他這是做了什麼孽啊！挖坑給自己跳！\n沒了遮擋光線的書卷，刺眼的天光讓謝徵眉頭一皺，懶散掀開眸子時，大抵是這些日子吃得好睡得也好，恢復了元氣，那張臉實在是俊美逼人，看得公孫鄞眼都紅了，恨不能掐著他脖子索命。\n曾幾何時，他才是玉樹臨風、仙氣飄飄的那個！謝九衡一躲這裡裝病，未免叫樊長玉察覺，從此筆墨都不帶動的，頂了天叫同樣裝病的親衛前來給他傳個話，指使他做事。\n公孫鄞現在一閉上眼，就是堆在他案前沒批完的那堆公文，簡直要他命了！\n謝徵坐起來，並未理會公孫鄞的抓狂，瞥了一眼被他抓皺的書，疲懶一抬眸子，眸色似已有幾分不愉：「拿來。」\n公孫鄞見他這般，不由看了一眼封皮，發現寫著《孟子》二字，只覺怪異，道：「四書你開蒙不久便學了，怎麼在山上還帶著這書？」\n他狐疑道：「這麼看重，別是什麼不正經的書吧？」\n隨手一翻，發現裡面逐字逐句都做了詳細的註解，雖然改換了字體，但公孫鄞還是一眼認出那是謝徵的筆跡。\n不及多看，書已被謝徵劈手奪了回去。\n公孫鄞頓時更悲憤了：「我學你的筆跡替你批公文，手都快寫斷了，你閒著沒事註解了整整一本《孟子》？」\n謝徵並未過多解釋，只道：「我書庫裡七賢的孤本，回去後自取。」\n公孫鄞瞬間不嚎了，手中摺扇一開，頂著熊貓眼笑眯眯搖扇奉承：「替侯爺分憂，實乃謀臣本分。」\n謝徵似乎早就知道他什麼秉性了，對這變臉程度半點不意外，吩咐起正事：「崇州被唐昭義所帶的兩萬薊州軍圍著，送不出糧草來，山下的反賊攻了這麼多天的山，糧草耗盡，早已疲敝，是時候一網打盡了。」\n山上的燕州軍這些天在休養恢復元氣，山下的崇州軍卻是從兩日前就開始挖草根掛樹皮了。\n糧草被燒後擺在崇州軍眼前的尚有三個選擇，一是回崇州，二是剿滅山上的燕州軍，三則是不戰先逃，保存實力。\n第一個選擇回崇州，有兩萬薊州軍守在崇州城外，山下的反賊不脫一層皮，壓根進不去崇州城。就算殺回了崇州，後面等燕州和薊州的主力軍合圍崇州，那也是死路一條。\n長信王老謀深算，當日只撤回一半兵馬，可能就是預料到過會有今日的局面，山下的一半崇州軍，就是他給崇州留的生路。\n薊州已經固守，賀敬元正在調大軍往崇州來，崇州若保不住，一線峽山下的崇州軍，只要殺出去，找一座穩定的城池落腳，便又能東山再起。\n而統領那支軍隊的，正是長信王的心腹大將石越。\n當日為了火燒崇州軍糧草，謝徵故意以隨元青做餌，拖住了反賊大部分兵力，最後石越拿人頭堆到了山口，雖救回隨元青，卻也折損不少兵力，加上糧草被燒，簡直是雪上加霜。\n石越以為山上的燕州軍沒了隨元青這個人質，又被困多日，早沒有戰意，在得知糧草被燒，氣急敗壞下令連攻了半月的山，奈何一線峽地勢險要，生生又賠了不少兵力進去。\n遊蕩在山下的那支燕、薊兩州的援軍又是騎兵，一直在山林裡轉悠，神龍見首不見尾的，便是同崇州軍狹路相逢了，那隊騎兵打得過就打，打不過就跑，兩條腿的步兵又追不上四條腿的騎兵，讓崇州將領們氣得牙痒痒。\n如今山下糧草告罄，山上的燕州軍防守卻還是跟鐵桶一樣，石越也意識到自己終究是沒法把武安侯困死在這山上，立下這當世奇功，很快調整了作戰計劃，在夜裡行軍，先暗中撤走一部分兵馬。\n強攻未果，為今之計，當然還是保存實力為上。\n-\n山上一下子陷入了備戰的緊張氛圍，樊長玉在傷病營和火頭營都聽到了關於這一仗的各種議論聲。\n駐軍在不斷被調往各處山口，一出大帳，就能看到軍旗在營地各處翻滾，軍旗下方湧動的人潮奔向指定的陣地。\n所有傷兵只要是還能拿得動刀的都要各自歸營，謝徵自然也要。\n樊長玉光是瞧著陣仗便知這一仗兇險無比，但言正身上的傷一運勁兒就刺痛不已，只怕連兵刃都拿不了，這上了戰場不是送死麼？\n她想到言正身上那個被戳出的血窟窿，心中就焦慮難安。`

            num: 83,
            title: `第83章第83章`,
            content: `大軍開拔前,下令火頭營生火做飯，讓將士們飽餐一頓。\n樊長玉去幫忙殺豬，還在繼續傳頌她事跡的火頭營老兵同別處調來幫忙的新兵道：「樊姑娘可有木蘭之勇！」\n那新兵是個大字不識的,摸了摸腦袋問：「木蘭是誰？」\n老兵嫌棄看新兵一眼：「你連花木蘭都不知道？南北時期的大英雄，她爹膝下沒個兒子，一把年紀遇上朝廷徵兵,她怕她爹死在戰場上，就女扮男裝替父從軍十一載,立下赫赫戰功！」\n新兵驚訝道：「一個女兒家，是怎麼混在軍營裡十一年都沒人知道的？」\n這個問題顯然把老兵問住了,老兵不耐煩道：「戲文裡都是這麼寫的,人家就是有那本事,最後還得了皇帝親封呢！」\n說者無意，聽者有心。\n樊長玉從得知大軍要開拔,一顆懸起的心就沒放下過。\n此刻聽了那老兵說了花木蘭的故事，她擦拭殺豬刀上血跡的動作一頓,心底隱隱浮現一個大膽的想法。\n她之前見小五對言正似乎頗為親近，一問才知他們曾是同一個伍的。她知道言正脾氣不好,怕言正得罪人,在戰場上沒個幫襯,問起他們隊伍裡的其他人,本想幫言正打理好袍澤關係，怎料言正說其他人都死了,只剩他和小五。\n此番全軍出動,他和小五還得被分去其他營。\n重新編隊,一個熟人也沒有,戰場上想有個照應愈發艱難。\n以言正的傷,此番只怕有去無回，若是她替言正去打這一仗，言正幫她帶著長寧跟著火頭營的後勤軍在後邊，興許還能最大程度保住性命。\n自己頂替言正上戰場，他這不算當逃兵。再者，新營裡除了小五，沒人認識言正，小五肯定會保密的，自己代他上戰場壓根不會叫其他人發覺，等回來後，同言正換回來就是了。\n心中這個念頭一起，無論如何也壓不下去了。\n這一路走來，她失去了太多的親人朋友，光是想想言正被亂刀砍死在戰場上的樣子，她心口就像是被什麼攥緊了。\n離開火頭營後，樊長玉徑直去了傷病營。\n軍醫不在，那個半大少年在給傷勢重迄今下不得床的傷兵們煎藥。\n少年叫武三斤，聽說是她娘在逃難的時候生下他的，大人在逃荒路上都瘦骨嶙峋，又哪有營養給孩子，他生下來只有三斤，他爹娘都以為他養不活了，沒想到他卻好好地長大了，他爹娘便給他取名叫三斤。\n他從軍後，因為個頭小，被分配到了後勤軍中。\n此刻見了樊長玉，武三斤立馬熱絡打招呼：「長玉姐，你是來找韓軍醫的嗎？韓軍醫出去了。」\n韓軍醫便是給謝徵看診的那名軍醫。\n樊長玉說：「我是來找你的。」\n武三斤拿著扇火的棕櫚扇，面露疑惑：「找我？」\n樊長玉做賊心虛的時候，臉上的表情愈發正氣凜然，問：「你知道蒙汗藥放哪裡嗎？」\n武三斤這些日子一直在傷病營打雜，對於藥品的放置地方再清楚不過，他道：「知道啊，長玉姐你拿蒙汗藥做什麼？」\n樊長玉繼續一臉正氣道：「我想去獵幾頭野豬，等著給大軍凱旋後接風用，把蒙汗藥拌進粗糠裡做個陷阱，更容易獵些。」\n武三斤不疑有他，很快去帳內取了一包藥粉遞給樊長玉：「這些夠獵十頭野豬了。」\n樊長玉道了謝，把藥粉往懷裡一揣便離去。\n-\n大帳內，裝病多日的親衛們都已換上甲冑。\n謝五向謝徵稟報前線的戰況：「咱們的先鋒部隊已截住反賊，只等主力軍圍過去，不過有斥侯來報，反賊昨天夜裡便已偷偷撤走了部分兵馬，隨元青亦在其中。」\n謝徵眸色驟沉，「命陳良點一千精騎前去追擊。」\n謝五抱拳：「屬下這就去傳令。」\n守在門外的謝七忽而道：「夫人過來了！」\n謝徵和屋內一眾親兵面色皆是微微一變。\n樊長玉捧著一盅湯進帳，就發現裡邊的傷兵全都穿戴整齊，像是隨時準備歸營。\n他們拘謹同樊長玉打過招呼後，便拿著各自的東西離去了。\n謝五瞄了一眼樊長玉和謝徵，也起身道：「我也先回去準備準備。」\n帳內只剩樊長玉和謝徵兩人，樊長玉把手中的湯放到桌上，問他：「你東西準備得如何了？」\n謝徵好笑道：「上戰場除了兵器，還有什麼要備的。」\n樊長玉拿起他掛在床頭的那身殘甲，看了一眼甲冑的破敗程度，眉心皺起：「你的甲衣破成這樣怎麼穿，我給你補補。」\n這身小卒甲衣是之前謝五尋來的，傷病營裡的其他傷兵都是把甲衣放在自己床頭掛著的，他們床頭不放身甲衣，難免叫樊長玉懷疑。\n謝徵原本還在思索戰局，目光不經意落到樊長玉身上，看她穿針引線的樣子，不自覺便看入了神。\n上一次他從軍，跟樊長玉連一句正式的道別都沒有，此番出徵，倒是突然體會到了柔腸百轉的滋味。\n二人誰都沒有說話，樊長玉垂著眉眼專心縫補那件殘破的甲衣，一縷碎發垂下，貼著她白皙的側臉，小巧瑩白的耳朵在烏髮間若隱若現，這一刻的神情溫柔而恬靜。\n當然，如果看那針腳，就不太溫柔也不太恬靜了。\n可惜謝徵沒看到，他目光在樊長玉半隱在烏髮下的耳垂上停駐了很久，心口似有一頭惡獸橫衝直撞，鬼使神差地抬手幫她把那縷碎發挽至耳後，指腹觸到她瑩白小巧的耳朵時，樊長玉抬頭看了他一眼。\n心底那股惡念突然就壓不住了，本該移開的指尖，忽而用了些力道繞去她腦後。\n他低頭吻了她，溫柔又不太溫柔。\n一隻手用力插入樊長玉發間，因為她沒拒絕，分開時他額角青筋凸起一條，呼吸都是滾燙的，眼睛裡透著一層紅，像是一頭恨不得將她生吞卻又挨於時機不得不停下的惡狼。\n「等我回來。」他清越的嗓音啞了。\n樊長玉唇被他咬得有些木木地疼，想一巴掌拍過去又忍下了，她真心實意和他商量：「言正，我替你上戰場吧？」\n謝徵俊秀的眉幾乎是立即皺了起來：「說什麼傻話？」\n樊長玉說：「你傷還沒好，萬一在戰場上刀都揮不動怎麼辦？」\n謝徵想到之前撒的謊，面上不太自然地道：「我是步兵陣裡的刀兵，只負責清繳被先鋒部隊衝散的殘兵，沒什麼危險的。」\n樊長玉看他態度堅決，似有些失望，道：「那你萬事小心。」\n又問：「你是刀兵第幾營，跟著哪位將軍的？」\n謝徵沒料到樊長玉在軍中數日，對軍營裡的編制都熟悉了起來，他知道不該再瞞下去，可如今箭在弦上，只得繼續扯了個謊：「左衛軍第三營李鐮將軍麾下。」\n樊長玉暗暗記下了，又去桌上把那盅雞湯捧了過來：「這是我抓了一隻野雞偷偷給你燉的，你喝了就和小五兄弟一起回營吧。」\n謝徵不疑有他，幾口喝完了雞湯。\n樊長玉看著他，神色似有些複雜，道：「我不在的時候，勞你替我照看一下長寧。」\n整個世界都開始顛倒，謝徵終於反應過來不對勁兒，變了臉色：「你……」\n但身體已瞬間疲軟了下來，剛邁開步子便倒了下去，樊長玉一把扶住了他，對著昏迷過去的人低聲道：「我不想你死。」\n樊長玉怕有人查傷兵帳，查出謝徵的身份，背著謝徵先去了自己和長寧住的軍帳。\n長寧看到樊長玉背上的謝徵，白著張臉道：「阿姐，姐夫又要死了嗎？」\n樊長玉微微一噎，道：「沒，他就是暫時昏睡過去了，大概半個時辰後就能醒來。寧娘乖乖在帳內守著你姐夫，要是遇上危險，你姐夫又還沒醒，你就拿針戳醒他。」\n武三斤遞給她的蒙汗藥，她用了能迷暈一頭野豬的量。\n主要言正意志力堅於常人，她怕普通劑量迷不倒他。\n樊長玉遞給長寧一根針後，又把綁在褲腿上的匕首解下來遞給她：「以防萬一，這把匕首你也拿著。記住遇到危險第一時間戳醒你姐夫，用針戳別用匕首，他醒了就能護著你的。」\n長寧一手捏著繡花針，一手拿著匕首用力點頭，卻又忍不住問：「阿姐呢？」\n樊長玉道：「阿姐去打抓走寧娘和寶兒的那些壞人，打完壞人就回來。」\n長寧拉住樊長玉一片衣角，黑葡萄眼水汪汪的，滿是擔心：「那阿姐要小心。」\n樊長玉摸摸她的頭：「放心吧，阿姐去給你報仇！」\n她交代完長寧，摸出殺豬刀和砍骨刀往腰間一別，便出了大帳，往左衛軍大營去，也是趕巧，竟在路上就碰上了謝五。\n謝五見她穿著燕州兵服時，心中就已有了個不妙的猜測，結巴道：「樊……樊姑娘。」\n樊長玉疑惑道：「小五兄弟還沒歸營嗎？」\n謝五僵硬道：「我……我去找言大哥。」\n樊長玉四下瞄了一眼，一把拽過謝五低聲道：「小五兄弟也知道，我夫婿重傷未愈，他上戰場無疑是送死，我替我夫婿出徵，小五兄弟只當不知這回事，等此戰歸來，我再同我夫婿換回去，沒人會知道的。」\n謝五心說怎麼可能會沒人知道！\n雖然作戰計劃是一早就制定好的，幾路大軍都在有條不紊地往山下撥，可侯爺要是自始至終都沒露面，這也說不過去啊！\n偏偏他此刻又不敢擅作主張告知樊長玉謝徵真正的身份，只勸道：「樊姑娘莫要糊塗，這可是犯了軍中大忌，要砍頭的！」\n樊長玉看著謝五，那雙偏圓溜的杏眼誠摯又果決，卻又似狩獵的虎豹一般，透著絲絲涼意，她說：「抱歉，小五兄弟，我只是不想我夫婿枉死在戰場上，他若是沒負傷，我也不會出此下策。眼下讓他上戰場，殺敵還不如我，此舉也不會給大軍帶來什麼損失。至於違反軍令後的責罰，我回來後一力承擔就是，我夫婿是被我下藥迷暈的，為了不牽連小五兄弟，我把小五兄弟也打暈在這裡吧。」\n謝五見樊長玉已經抬起了手，趕緊道：「我幫樊姑娘保守秘密，我們一起去殺敵，戰場上好歹還有個照應。」\n樊長玉不解他怎麼這麼快改變了主意，但他都這麼說了，她還是收回了掌，道：「那我們歸營吧。」\n謝五大鬆一口氣，真動起手來，他肯定不是這姑娘對手。\n為今之計，也只能先傳消息給其他親衛去尋謝徵，他自己則跟著樊長玉，以便保護她。\n謝五吹出幾聲尖銳的哨響，樊長玉突然扭頭看向他：「你吹哨做什麼？」\n謝五生生被嚇出一身冷汗，正好天際有一隻蒼鷹飛過，他抬手指了指，僵笑道：「之前聽軍營裡一個老兵說訓鷹就是用這樣的哨聲給鷹指示，我看是不是真的。」\n樊長玉問：「對沒被訓過的鷹也管用？」\n謝五指著天上那隻鷹僵硬道：「試了一下，看樣子沒用。」\n樊長玉大失所望，她還想著要是有用，回頭她也學學，給長寧再抓一隻隼呢。\n-\n中路大軍已經開拔，樊長玉尋著旌旗找到了左衛軍第三營，她和謝五站到隊伍後面時，各伍長正在清點各自所帶的小卒人數。\n著全甲的校尉則立在陣前，端的是威風凜凜。\n隊伍最後面的伍長清點人數到樊長玉和謝五這裡時，喝道：「你們是那個伍的，怎站到老子隊伍裡來了？」\n謝五半點不怵，高聲答：「步兵營裡打散了重編過來的。」\n他這麼做就是為了把第三營的校尉李鐮給引過來。\n果不其然，李鐮在陣前瞧見隊伍後邊的騷動，昂首闊步走來，沉喝：「大軍開拔在即，吵嚷什麼？」\n那伍長道：「將軍，隊伍裡多出來兩人，他們說是從別處重編過來的。」\n李鐮早些年也是親衛隊的，後來能獨當一面了，就被謝徵下放到左衛營來了，他自是認得謝五的。\n親衛隊裡被賜了謝姓的，從前都是死士，無名無姓，他們也是對謝徵最忠誠的那一批人。\n謝五一衝李鐮打眼色，李鐮對於他和另一名面生的小卒為何會出現在自己隊伍裡，便也不多問，以為他是要執行什麼秘密任務，只罵那伍長：「前些日子守山老子折了那麼多人馬，好不容易才分到人過來，你還嫌老子隊伍裡人多了是吧？」\n那名伍長被罵了，立馬不吭聲了。\n原本還探頭探腦打量樊長玉和謝五的那些兵卒，也趕緊站好，不敢再張望。\n得虧樊長玉之前打交道的那些兵卒都是火頭營和傷兵營的，其他營的人都只聽過她的名諱，卻沒見過她。\n此刻她穿著殘破的戰甲低著頭站在隊伍裡，兵卒們只覺這新來的小子跟個瘦猴似的，也沒人多留意她。\n李鐮負手重回隊伍前邊，謝五見狀急的不行，正想提示李鐮，讓他想法子把自己和樊長玉踢出隊伍，畢竟他總不能真讓樊長玉上戰場，怎料前方軍陣騷動，一名斥侯快馬回來報信：「石越帶人把先鋒部隊撕開了一道口子，正要南逃，傳軍師之令，左衛軍即刻前去支援先鋒軍。」\n左衛軍都尉沉喝一聲：「左衛軍前三營，全速行軍！」\n原本站得整整齊齊的軍陣，立馬五人並行一路急跑奔赴戰場。\n-\n謝徵的親衛隊為了傳遞一些簡單消息，常以哨音做暗號。\n那類尖銳又急促的，便是說謝徵可能有危險。\n聽到謝五哨音的親衛們，瞬間趕去尋謝徵，發現他沒在之前住的傷兵帳裡，又尋著蛛絲馬跡在周邊搜索，很快就找到了樊長玉姐妹倆的軍帳。\n長寧一直捏著繡花針守在謝徵邊上，聽到急促的腳步聲靠近軍帳時，趕緊拿繡花針戳了謝徵一下。\n昏迷中的人幾乎是瞬間睜開了眼，親衛掀開帳簾看到謝徵也是大喜，顧不得長寧還在場，喚了聲：「侯爺！」\n謝徵臉色陰沉得可怕，起身就要往帳外走去，卻因蒙汗藥的藥力還沒過，渾身脫力，他及時扶住了床柱才穩住身形。\n親衛忙過去扶他：「侯爺，您怎麼了？」\n謝徵瞥見長寧放在床邊的匕首，直接拿起用力划過掌心，鮮血順著匕首尖兒滴落在地，長寧嚇得短促地低叫了一聲，小臉發白。\n這股痛意明顯讓謝徵身上的藥力消減了下去，他面色卻更沉，問親衛：「左衛軍李鐮的軍隊現在何處？」\n親衛答：「石越麾下不知何時招了一員猛將，天生巨力，無人可擋，石越以此將開路，硬生生撕開了咱們先鋒部隊，軍師讓左衛軍去補先鋒軍被扯開的口子了。」\n謝徵便一刻都坐不住了，大步走出營帳，冷聲吩咐：「取我戰甲來！再點五百精騎！」\n他此番派出的先鋒在他麾下是數一數二的猛將，若是先鋒都沒能攔下石越，這場仗怕是不太樂觀。\n很快便有親衛捧著他那一套沉重的玄鱗甲前來替他穿上，長寧愣愣地追出軍帳來，看到謝徵冰寒的臉色，一聲「姐夫」到了嘴邊又咽了回去。\n她從來沒見過姐夫這樣嚇人的臉色，像是要把誰生吞了一樣，都不像她記憶裡的姐夫了。\n而且這些人叫她姐夫侯爺，侯爺又是什麼？\n親衛牽來謝徵的戰馬，他系上玄色的披風，冷聲吩咐身邊的親衛：「傳信給公孫鄞，讓他把後方的口袋紮緊，前鋒那邊不用調兵過去了。」\n翻上馬背時，看了一眼小白菜似的立在軍帳門口的長寧，對謝七道：「看好她。」\n謝七抱拳應是，謝徵已一夾馬腹揚鞭離去，十幾名親衛也瞬間跟了上去。\n長寧眼裡含著一泡淚，想哭又不敢哭，為什麼姐夫醒來後變得這麼兇了？\n謝七也沒帶小孩的經驗，笨拙哄了哄，長寧大概是確定了他是不會兇自己的人，頓時哇地一聲哭了出來：「我要阿姐——」\n謝七沒瞧見樊長玉，心中也很是奇怪，問她:「那你阿姐去哪兒了？」\n長寧哽咽道：「阿姐說她去打壞人了。」\n謝七心中一個咯噔，繼續問：「侯爺……就是你姐夫是怎麼到這裡來的？」\n長寧抽噎了一下：「阿姐背回來的。」\n謝七一哽，突然明白他家侯爺醒來後為何是那樣一副要吃人的臉色了。\n他看了看長寧，覺得還是先帶小孩遠離這是非之地為好，道：「別哭了，我帶你去看野雞好不好？」\n長寧還是抽噎不止，她害怕了，口中就一直念叨著要阿姐，謝七把看野豬看野牛，山上能想到的野物說了個遍，說到看隼時，長寧抽噎聲才一停，睜著一雙淚汪汪的大眼問：「隼隼？」\n謝七一看有戲，趕緊道：「白頭矛隼，張開翅膀有這麼大呢，要去看嗎？」\n長寧看他比劃的大小，點頭：「要。」\n為了方便在最快的時間內獲取信件，海東青這些日子一直都是親衛們在輪流照料，無論日夜，只要海東青帶了信回來，就會有當值的親衛把信呈給謝徵。\n這兩天正好是謝七當值，他覺得把這小孩帶過去，人和隼一併看好了，倒也省事。\n-\n樊長玉不知道兩軍交戰的戰場選在什麼地方，只覺這一路跑來，原本還是山地綠樹，後邊就只能看到踩踏得寸草不生的禿地了，隔老遠就能聽到前方震耳欲聾的廝殺聲，海潮一般，一浪高過一浪傳來。\n風颳過山崗，都帶著陣陣血腥味。\n這算是樊長玉真正參與的第一次大規模作戰，她自己沒感覺到怕，但心跳就是莫名其妙地加快了，被護腕裹實的手臂上，雞皮疙瘩也浮起一層。\n她和小五站在隊伍中後位置，看不清前方的戰場是個什麼光景，只聽不知是哪位將軍吼破了音大喊一聲：「騎兵陣衝鋒！」\n然後又是一片殺吼聲響起，震得人耳膜發疼，地動從前方的山坳處傳來，整個大地仿佛都在跟著顫抖。\n樊長玉覺得小五似乎比自己還緊張，他對樊長玉道：「樊姑娘，一會兒上了戰場，你進跟著我，切忌莫要冒險！」\n樊長玉應了一聲好，但她們前邊的步兵陣也跟著發出了爆吼聲，瞬間把她的聲音淹沒了下去，所有人都在拔刀往前衝。\n這時候已完全聽不見軍令了，幾乎是看到前邊的人幹什麼，就跟著幹什麼。\n樊長玉心跳聲如擂鼓，大概是在緊張的情況下，渾身血如逆湧，甚至連長途奔襲的疲倦都感知不到，跟著大軍如洪水一般注入了戰場。\n遍地都是死人，他們幾乎是踩著屍體往前衝，跟殺紅了眼的反賊短兵相接的時候，那一聲聲嘶吼，簡直就是壯膽用的。\n跑在樊長玉前邊的一個小卒，被一名拿長矛的反賊捅了個對穿，那小卒的伍長正是之前質疑樊長玉和謝五身份的那人，他面目猙獰大吼一聲，提著環首刀朝那反賊照臉一刀劈了下去，一時間血沫飛濺。\n剩下的三名小卒都猩紅著眼緊跟著那伍長衝殺，一個被貫倒了，幾人便合力去救。\n樊長玉對於自己劫糧草那日公孫鄞的那番話，理解突然更深刻了些。\n不僅是當將軍的會把底下將士的性命當成自己的責任，小到一個伍長、什長，也在盡全力護著自己的兵。\n她對著一個個活生生的人，還是做不到切瓜砍菜一般刀刀致命地去砍殺，只避開要害處下手，確保讓對方失去作戰能力就行。\n那名伍長險些被削掉腦袋時，樊長玉替他格開了那致命一刀，他回頭看了樊長玉一眼，什麼都沒說，帶著滿臉的血繼續同反賊拼殺。\n反賊中一個騎馬的將軍衝殺到了他們這群纏鬥的步兵裡，人借馬勢，長槍一路挑殺，捅死了不少燕州兵卒。\n便是沒死的，被他挑倒後，身後的崇州小卒們瞬間圍上去補刀，一時間燕州的步兵們明顯出於弱勢。\n謝五畢竟是軍中人，瞧得火大，眼見樊長玉功夫過硬，周邊小卒無人能傷到她，便在那反賊將領衝殺過來時，一把拽住馬鞍整個人借力翻起，手中長刀劈斬了下去。\n馬背上的反賊趕緊拿起手中長槍擋下這一擊，但謝五人已穩穩落在了馬背上，那反賊將領手中的長柄兵刃在此時反而不好使，叫謝五以匕首割喉推下馬去。\n「小子納命來！」反賊另中一名將領見狀衝殺過來，手中一對釘錘舞得獵獵生風，這一路奔來，馬下的小卒，叫他那對釘錘砸飛出去無數，顯然是個力大無窮的。\n謝五的功夫以敏捷見長，不敢與之硬碰，趕緊棄馬避開，李鐮見小卒被那名反賊將領殺得太狠，想阻止那名反賊將領。\n豈料手中馬槊跟對方一碰，頓時連人帶馬後退幾步，虎口劇痛，幾乎握不住兵刃，李鐮臉色瞬間變了變。\n那反賊將領哈哈大笑，「不痛快不痛快，這手怎麼軟得跟麵條似的？」\n遠處不知是哪位將軍瞧見李鐮在迎戰那反賊將領，喝道：「李將軍當心，那賊子一身蠻力，都尉大人都叫他打落下馬了。」\n聞得此言，李鐮心中大駭，在那反賊將領執錘衝來時，勉強與之過了幾招，只覺此人實在是力大無窮，那一對釘錘不僅重，在他手中還格外靈敏，一旦被砸中，非死即傷。\n在對方再次猛攻來時，他及時橫槊抵擋，卻不及對方那一身怪力，還是叫釘錘砸到了身上，當即吐出一口血來，好在被卸掉了大半力道，才沒當場斃命。\n「一個能打的都沒有！」\n那反賊大將狂妄大喝一身，第二錘就要砸下時，忽不知從何處飛來一截繩索，穩穩套在了他頸間，大力一拉，反賊將領兩腳扣緊馬鐙，又棄掉一釘錘，用手拽住繩索同對方拔河，才沒被當場拽下馬背去。\n他斜眼朝繩索的源頭看去，卻發現拉著繩子的是一名瘦弱的燕軍小卒。\n李鐮瞅準這機會，馬槊刺了過去，那反賊將領右手執釘錘一擋，李鐮手中兵刃就險些被打飛出去。\n這一擊不成，他也不再戀戰，趕緊撤馬離開。\n反賊將領小山似的一尊壓在馬背上，一臉橫肉兇煞地看著樊長玉，兩手抓住繩索用力一扯，試圖把他眼中那瘦弱的燕軍小卒拽過去。\n樊長玉猝不及防被他拽了個趔趄，隨即兩腳用力往地上一踏，腳下就像是往地底扎了根一般，再拽不動她一步。\n那反賊將領不信邪，雙手運勁兒發狠猛拽，一名反賊小卒也趁機拿長矛捅向樊長玉，樊長玉瞅準時機鬆了繩索，再一腳踹開那小卒。\n繩索這頭沒了牽引，反賊將領因為重心失衡，一個仰翻從馬背上摔了下去。\n眼尖的燕軍小卒們趕緊拿矛去扎，那反賊將領看著肥碩，身形卻靈活，往地上一滾，摸了把刀割斷套住脖子的繩索，然後再攥住一名小卒的長矛，直接連人帶矛把那小卒舉起來，當做大擺錘掄了一圈，逼退圍攻他的燕軍後，把人朝著燕軍多的地方砸了過去，頓時倒了一片。\n燕軍損失慘重，小卒們也沒了一開始那股不怕死的拼勁兒，明顯開始怯戰。\n那反賊將領撿起自己掉落的兩把釘錘，一邊踩螞蟻似的隨手掄錘砸死燕州小卒，一邊徑直朝樊長玉走來，咧嘴獰笑道：「那瘦猴，你手上倒還有幾分勁兒，讓爺爺瞧瞧，你吃得下爺爺幾錘！」\n謝五砍掉一名反賊小卒的脖子，歇斯底裡衝樊長玉大喊：「快跑！」\n樊長玉是想跑的，但看到那反賊大將手中的釘錘一掄一擺，便是幾名燕軍小卒被砸得頭破血流，腦漿迸濺，跟個破布袋一樣倒飛出去，謝五為了掩護他，也義無反顧衝向了那反賊將領，她便無論如何都邁不開腳了。\n她棄了手上那柄撿來的環首刀，摸出自己腰間的黑鐵砍骨刀和放血刀，一長一短兩柄刀鋒用力一銼，在金屬刺耳的摩擦聲裡，疾步衝向了那名反賊將領，目光冷若暴雨裡亮白的閃電。\n謝五仗著身形靈巧在反賊大將身上割了一道口子，卻被對方用力貫到了地上，頓時只覺半邊身體都失去知覺了，眼見那一記釘錘就要照他面門砸下，他想著自己腦袋大抵也會被砸得紅白飛濺，下意識閉上了眼，卻沒等來那致命一擊，只聽到一道令人牙酸的金屬碰撞大響。\n謝五虛虛睜開眼，便見樊長玉單膝半跪於地，以兩柄黑鐵殺豬刀交叉生生架住了那反賊將領落下的釘錘。\n她牙關咬得緊緊的，半個膝蓋都陷入了地裡。\n謝五眼眶當即就是一熱，樊長玉從牙縫裡對他擠出一個字：「走！」\n謝五也不墨跡，滾身避開釘錘攻擊範圍時，還向著那反賊大將擲了一柄匕首。\n反賊大將本要錘向樊長玉的另一柄釘錘，不得已用來揮開那匕首。\n樊長玉趁機脫身，同時手中兩柄殺豬刀向上一翻，刀鋒下壓在反賊大將手背切出一道深可見骨的血口子。\n反賊大將吃痛揮錘橫掃過來時，樊長玉一個後躍避開釘錘。\n反賊大將瞥了一眼自己手背還在淌血的口子，臉上橫肉絞緊，喝道：「找死！」\n言罷更是不再管手上的傷勢，錘風發愈發狠厲，只為取樊長玉性命。\n他手上的釘錘是實心的，重八百十斤，樊長玉方才為救謝五去接那一錘，虎口都被震得一陣撕裂巨痛，殺豬刀長度不夠，重量也不夠，跟他的釘錘碰上實在不佔優勢。\n眼下樊長玉便也不再去接他的錘，只一味閃躲，偶爾實在躲不開，硬碰了幾錘，虎口流出的血染紅了刀把，再又一次避無可避，只能硬碰時，手中的放血刀刀被大力一撞，脫落出去。\n反賊將領見樊長玉兵器都沒了一柄，反倒愈發興奮，「老子非把你砸成一攤肉餅不可！」\n樊長玉腳尖挑起一柄落在地上的大刀代替放血刀，怎料跟那釘錘大力一撞，那柄軍用大刀直接斷成了兩截。\n左衛軍都尉被那反賊將領釘錘所傷，再也爬不上馬背，被親兵們暫且搶到安全地帶，看著戰場上樊長玉和那反賊將領打了幾個回合，意外道：「那小卒是那個營的？」\n身邊親兵皆道不知。\n左衛軍都尉細看後道：「他若有個趁手兵器，興許能與那賊將一戰，來人，把我的陌刀拿與他!」\n親兵取了他的長柄雕花陌刀正要拿與樊長玉，心急如焚的謝五已徑直衝了過來，大喝一聲：「左衛軍都尉嚴毅何在！」\n左衛軍都尉認出他是謝徵親衛，忙帶著傷下地道：「末將在。」\n謝五雙目通紅，指著樊長玉的方向，「快派兵去救夫人！」\n左衛軍都尉愣在當場：「夫人？」\n謝五已顧不得那麼多了，道：「同那賊將交手的，是侯爺的夫人！」\n左衛軍都尉頓時只覺幾個腦袋都不夠自己砍的，但身上的傷實在是連兵刃都拿不動了，只能點了幾名小將帶兵去援。\n謝五找他要了一匹馬，也要趕回去支援樊長玉，左衛軍都尉把陌刀塞給他：「興許用得上！」\n謝五顧不上那麼多了，提著陌刀一路揮開反賊小卒，朝著樊長玉衝去。\n另一邊，樊長玉撿了好幾把大刀都是被折斷的命運，在那又一錘揮來時，一個閃躲不及，頭盔叫他的釘錘給颳了去，她髮髻沒散，但明顯能看得出是個女兒家。\n反賊將領似乎沒料到跟自己過了這麼多招的是個姑娘家，哪怕狼狽成這樣，那模樣瞧著也是上乘的，他哈哈大笑道：「女人？搶回去！崇州將士們今夜人人都可以當新郎官了！」\n崇州兵卒們都歡呼怪叫起來，戰意愈猛。\n那反賊將領似乎也不想打死樊長玉了，只圖生擒她，錘風不如之前駭人，卻愈發難纏。\n樊長玉面色冰冷，劈手從一名崇州小卒手中奪了根長矛當武器，武器一長，她攻勢瞬間凌厲，招式大開大合，竟逼得反賊將領後退了幾步，只是對方一用猛勁兒，她手中的長矛便直接斷裂開來。\n反賊將領譏嘲一般仰天哈哈大笑起來。\n樊長玉臉上被擦出一道血痕，她扔開手中的斷矛，眼神發狠地盯著反賊將領右手的釘錘——他右手被自己劃了一道深可見骨的口子，奪他右手的釘錘更容易些。\n身後突然傳來一聲：「接刀！」\n樊長玉回頭一看，便瞧見一柄長柄陌刀向著自己擲了過來。\n她探手欲去接，反賊將領卻直接掄錘揮了過來，樊長玉若再伸手去接刀，必然會被他的釘錘砸到手。\n她索性做了假把式去接陌刀，實則腳尖繃勁兒，狠狠一腳踹在了反賊掄
