ไร เขาเป็นใคร?” ริมฝีปากของฟู่จ้าวหนิงโค้งขึ้นเป็นรอยยิ้ม “ไห่ฉางจุน เธอจำไม่ได้เหรอว่าฉันตบเธอไปก่อนหน้านี้? คิดว่าพวกเราเป็นคนที่จะมานั่งคุยกันอย่างสุภาพได้งั้นเหรอ?” ไห่ฉางจุนคนนี้ต้องเสียสติไปแล้วแน่ๆ “แล้วก็ เธอควรย้ายออกจากตระกูลฟู่ไปซะเมื่อกลับไป ตระกูลฟู่ไม่ได้เป็นของลูกพี่ลูกน้องเธอ” เธออยากจะไล่คนในตระกูลฟู่ออกไปให้หมด</p>\n<p>ถ้าไห่ฉางจุนอยากจะยุ่งเกี่ยวกับเซียวหลานหยวน เธอไม่ควรคิดที่จะอยู่บ้านของเธอด้วยซ้ำ ไม่อย่างนั้นพวกเขาทั้งสามคนจะต้องเข้าไปพัวพันกับเรื่องยุ่งยากแน่ๆ “เธอ!” ไห่ฉางจุนส่งเสียงฮึดฮัดเมื่อเห็นฟู่จ้าวหนิงหลับตาหลังจากพูดจบ แสดงให้เห็นว่าไม่อยากสนใจเธออีกต่อไป เธอจึงหันหลังเดินไปเปิดม่านเพื่อดูความวุ่นวายบนถนน เมื่อมาถึงบ้านขององค์ชายใหญ่ ชิงอี้ก็รออยู่ที่ประตูพอดี “ฝ่าบาท คุณหนูไห่” “องค์ชายของท่านอยู่ไหน” ฟู่จ้าวหนิงถาม “ฉันต้องการพบพระองค์” “องค์ชายกำลังชงชาอยู่ในศาลาในสวน ข้าจะพาฝ่าบาทและคุณหนูไห่ไปที่นั่น” ฟู่จ้าวหนิงเหลือบมองชิงอี้ “องค์ชายของท่านช่างมีน้ำใจจริงๆ” แม้ว่าพระองค์จะไม่สบาย</p>\n<p>แต่ก็ยังต้องการมาต้อนรับไห่ฉางจุนด้วยพระองค์เอง ชิงอี้ไม่อาจปฏิเสธได้ เธอจะบอกว่าองค์ชายต้องการไหมโลหิตหัวใจของไห่ฉางจุนหรือ?</p>\n<p>สมุนไพรที่องค์ชายต้องการจะไม่รั่วไหล เพื่อป้องกันไม่ให้ใครนำสูตรยาไปวิเคราะห์อาการขององค์ชาย ยิ่งไปกว่านั้น เขายิ่งกังวลว่าจะมีคนรู้ว่าองค์ชายต้องการสมุนไพรอะไรบ้าง และแอบมาดักเอา ทำให้พวกเขาไม่สามารถรวบรวมสิ่งของที่จำเป็นได้ เมื่อพวกเขาไปที่พันธมิตรยาโลกเพื่อซื้อสมุนไพร พวกเขาได้เซ็นสัญญา พันธมิตรยาโลกซึ่งรับงานนี้แล้ว มีหน้าที่ต้องเก็บรายชื่อสมุนไพรไว้เป็นความลับอย่างที่สุด อย่างไรก็ตาม ไห่ฉางจุนรู้สึกว่าเธอได้ค้นพบบางสิ่งที่แปลกประหลาด “ฟู่จ้าวหนิง เมื่อเจ้าเข้าไปในบ้านขององค์ชายจุน เจ้าได้รับการต้อนรับเหมือนแขก เช่นเดียวกับข้า เจ้าไม่รู้ด้วยซ้ำว่าองค์ชายจุนอยู่ที่ไหน ในฐานะเจ้าหญิง</p>\n<p>เจ้าก็ยังต้องการคนนำทาง” หัวใจของชิงอี้เต้นแรงเมื่อได้ยินเช่นนี้ มันคงไม่ใช่ปัญหา เพราะฟู่จ้าวหนิงเองก็ไม่คุ้นเคยกับบ้านขององค์ชายจุนเช่นกัน แต่ทำไมคำพูดของไห่ฉางจุนถึงรู้สึกเหมือนเป็นการตบหน้าฟู่จ้าวหนิง “เจ้าหญิง...” ชิงอี้อยากจะอธิบาย แต่ไม่รู้จะพูดอะไร ฟู่จ้าวหนิงดูเหมือนจะไม่สนใจ “อืม จริงด้วย” เธอกล่าวพลางมองไห่ฉางจุนอย่างเยาะเย้ย “รสนิยมของฉันต่างจากคุณหนูไห่ ฉันอยากจะเข้าหาผู้ชายหล่อๆ ที่ฉันเห็นทุกคนเลย” “ชอบผู้ชายหล่อๆ มันผิดตรงไหน? แล้วฉันต้องชอบคนขี้เหร่ด้วยเหรอ?” ไห่ฉางจุนหัวเราะเยาะ “ใช่ นั่นเป็นเรื่องของเธอ และไม่ว่าฉันจะรู้จักบ้านขององค์ชายจุนหรือไม่ ก็เป็นเรื่องของฉัน</p>\n<p>ทำไมเธอถึงพูดเรื่องไร้สาระแบบนี้?” “เธอ—” ไห่ฉางจุนคิดว่าฟู่จ้าวหนิงนี่ไม่น่าคบจริงๆ “ฝ่าบาท!” สาวใช้สวยสองคนรีบวิ่งไปหาฟู่จ้าวหนิงราวกับนกน้อยสองตัวที่กำลังมีความสุข เมื่อฟู่จ้าวหนิงเห็นสีหน้ามีความสุขของหงจั่วและเฟินซิง สีหน้าของเธอก็อ่อนลงเล็กน้อย สาวใช้สองคนนี้ดีกับเธอจริงๆ “ช่วยเอาของว่างมาให้หน่อยได้ไหมคะ ฉันหิวแล้ว” ฟู่จ้าวหนิงยังไม่ได้กินอะไรเลย และความคิดที่จะต้องรับมือกับไอ้หมาอย่างเซียวหลานหยวนทำให้เธอรู้สึกหิวอย่างเหลือเชื่อ “ฝ่าบาท ข้าจะไปเอาของว่างจากครัวมาเดี๋ยวนี้” หงจั่วรีบตอบ เฟินซิงรีบเสริมว่า “ฝ่าบาท ข้าจะไปเอาชามา ชาหลงจิงได้ไหมคะ” “ได้ทั้งสองอย่าง ขอบคุณ”</p>\n<p>นางกำนัลทั้งสองโค้งคำนับไห่ฉางจุนอย่างไม่ใส่ใจอีกครั้ง แล้วรีบวิ่งออกไป พวกเธอไม่ได้มองชิงอี้เลยตลอดเวลา ชิงอี้เมินเฉยต่อเขา “...” เกิดอะไรขึ้น?</p>\n<p>เขาไม่อยู่เหรอ? ช่วงนี้นางกำนัลสองคนนี้กล้าขึ้นเรื่อยๆ พวกเธอมักจะงอนเขาเพราะรู้สึกว่าเขาทำผิดต่อองค์หญิง ชิงอี้พาฟู่จ้าวหนิงและไห่ฉางจุนไปยังศาลา ม่านที่กันลมพลิ้วไหวเบาๆ เซียวหลานหยวนสวมชุดผ้าไหมสีม่วงมีปกขนจิ้งจอกสีขาว ใบหน้าครึ่งหนึ่งถูกแกะสลักอย่างสมบูรณ์แบบราวกับหยก หน้ากากเงินทำให้เขามีออร่าลึกลับและสง่างาม ข้างๆ เขา เตาถ่านดินเผาสีแดงขนาดเล็กกำลังเดือดปุดๆ ด้วยน้ำร้อนที่กำลังเดือดปุดๆ ถาดน้ำชากระเบื้องเคลือบสีขาววางชุดถ้วยชาลายมังกร ทำให้สถานะของเขาชัดเจนขึ้นทันที ใครจะกล้าใช้ชุดถ้วยชาลายมังกรกัน? ชุดถ้วยชานี้เห็นได้ชัดว่าเป็นของขวัญจากราชวงศ์ ฟู่จ้าวหนิงรู้สึกขบขันและหงุดหงิดเล็กน้อย เซียวหลานหยวนกำลังชงชาอยู่ตรงนั้น แต่หงจั่วและเฟินซิงยังรีบมาชงชาให้เธออีก?</p>\n<p>ช่างเถอะ เธอคิดว่าเธอคงไม่ดื่มชาที่เจ้าคนเลวเซียวหลานหยวนชงอยู่ดี ถึงแม้เธอจะมีข้อติเขาอยู่บ้าง แต่ฟู่จ้าวหนิงก็ต้องยอมรับว่าเขาดูเหมือนภาพวาด ชายหนุ่มรูปงามกำลังชงชา ไห่ฉางจุนแทบจะน้ำลายไหล “องค์ชายจุน ข้ามาแล้ว!” ไห่ฉางจุนวิ่งมาอย่างมีความสุข คว้าเก้าอี้ตรงข้ามองค์ชายจุน แล้วเลิกคิ้วอย่างมีชัยให้ฟู่จ้าวหนิง “คุณหนูไห่” เซียวหลานหยวนทักทายเธอ จากนั้นเงยหน้ามองฟู่จ้าวหนิง “ฝ่าบาททรงฉลองพระองค์บางเหลือเกิน หนาวหรือคะ?” ฟู่จ้าวหนิงสวมเสื้อผ้าเก่า ไม่เก่าเท่าเมื่อวาน แต่ก็ยังค่อนข้างบาง ดูแล้วค่อนข้างหนาวในสภาพอากาศฤดูใบไม้ร่วงที่กำลังจะมาถึง “ข้าสุขภาพแข็งแรงและมีพลัง</p>\n<p>ไม่เหมือนฝ่าบาทที่ป่วยและพิการ สวมเสื้อโค้ทกันหนาวมีปกขนสัตว์ตั้งแต่ยังไม่ถึงฤดูใบไม้ร่วงอย่างเป็นทางการเลย” ฟู่จ้าวหนิงตอบกลับอย่างไม่สุภาพ เมื่อเห็นเสื้อผ้าของเซียวหลานหยวนและได้ยินคำพูดของฟู่จ้าวหนิง ไห่ฉางจุนก็รู้ว่ามีบางอย่างผิดปกติ ไม่จำเป็นต้องแต่งตัวแบบนั้นในสภาพอากาศเช่นนี้ “องค์ชาย ท่านป่วยหรือ? เกิดอะไรขึ้นกับท่าน?” พฟฟ์ ชิงอี้ที่ยืนอยู่ข้างๆ สะดุ้งเล็กน้อยเมื่อได้ยินคำพูดเหล่านั้น สายตาของเธอมองไปยังไห่ฉางจุนด้วยความไม่พอใจ หญิงศักดิ์สิทธิ์แห่งตระกูลโมโรคนนี้เป็นอะไรไป?</p>\n<p>มีใครกล้าพูดจาหยาบคายเช่นนี้หรือ? “ร่างกายของข้าค่อนข้างอ่อนแอ” เซียวหลานหยวนตอบอย่างตรงไปตรงมา “คนในเมืองหลวงหลายคนรู้เรื่องนี้” “อ่า งั้นให้ข้าตรวจมือเจ้าดู ข้ามีทักษะทางการแพทย์อยู่บ้าง แต่ทักษะทางการแพทย์ของเราต่างจากเจ้า ข้าจำเป็นต้องตรวจดูฝ่ามือและนิ้วมือข้างซ้ายของเจ้า” เมื่อเห็นชายหนุ่มรูปงามและสูงส่งเช่นนี้บอกว่าตนเองอ่อนแอ ไห่ฉางจุนก็รู้สึกสงสารเขาในทันทีและรีบเรียก “ยื่นมือมาให้ข้าดูเร็ว ข้าจำเป็นต้องรู้ว่ามือของเจ้าเย็นแค่ไหนในตอนนี้” ฟู่จ้าวหนิงเดินมานั่งลงข้างๆ เขาแล้ว เธอมองเซียวหลานหยวนอย่างหยอกล้อ “เห็นไหมว่าหญิงสาวคนนี้หลงใหลเจ้ามากแค่ไหน? ในเมื่อเป็นรักแรกพบ ก็รีบๆ จีบเธอสิ</p>\n<p>ถ้าต่างฝ่ายต่างจีบกัน เธอคงขอหย่าได้ง่ายกว่าเยอะ” ภายใต้สายตาของไห่ฉางจุน เซียวหลานหยวนเหลือบมองมือของเธอที่วางอยู่บนโต๊ะรอเขาอยู่ แต่แล้วก็หันไปหาฟู่จ้าวหนิง เขาเอื้อมมือไปจับมือของฟู่จ้าวหนิง “เจ้าหญิงของข้าก็มีความรู้เรื่องการแพทย์เช่นกัน ให้เธอได้เห็นว่ามือของข้านั้นเย็นเฉียบเพียงใด”</p>"}, "54": {"chapter_number": 54, "chapter_title": "第54章你休了傅昭寧", "content": "<p>ฟู่จ้าวหนิงไม่ทันตั้งตัวกับการกระทำของเซียวหลานหยวน เธอจึงหลบไม่ทันและถูกเขาคว้ามือไว้ เธอรู้สึกราวกับว่ามือของเธอแข็งเป็นน้ำแข็ง มือของเซียวหลานหยวนเย็นมาก! นี่มันไม่ปกติเลย! เขาแต่งตัวหนา มีเตาถ่านเล็กๆ กำลังเผาถ่านและต้มน้ำอยู่ข้างๆ ไม่มีลมพัดในศาลา และก็เกือบจะเดือนกันยายนแล้ว แต่เขากลับเย็นชาเหมือนน้ำแข็งจริงๆ นี่มันจะปกติได้อย่างไร? เซียวหลานหยวนตั้งใจจะยั่วฟู่จ้าวหนิงเท่านั้นเอง เพราะเมื่อเห็นไห่ฉางจุนยื่นมือมาหาเขาและบอกว่าอยากลองทดสอบความเย็นของมือเขา ฟู่จ้าวหนิงก็แสดงสีหน้าตื่นเต้นอย่างเห็นได้ชัด ราวกับว่ากำลังรอชมการแสดงที่ดี เธอคงลืมไปว่าเธอเป็นภรรยาในราชสำนักของเขา</p>\n<p>แต่เมื่อเขาจับมือของฟู่จ้าวหนิงแล้ว เขาก็ไม่อยากปล่อย เพราะมือของเธอนั้นอบอุ่น นุ่มนวล และไร้กระดูก ความอบอุ่นของเธอช่วยบรรเทาความรู้สึกหนาวเย็นทั่วร่างกายของเขา และในที่สุดเขาก็สามารถถอนหายใจโล่งอกได้ หลังจากที่อดทนมานาน “เสี่ยวหลานหยวน ปล่อยมือ” ฟู่จ้าวหนิงพูดด้วยเสียงกัดฟัน “ฝ่าบาททรงรู้สึกเขินอายต่อหน้าคนนอกบ้างหรือ?” เสี่ยวหลานหยวนลุกขึ้นและขยับเข้ามาใกล้เธอ นิ้วของเขาสอดประสานกับนิ้วของเธอ รอยยิ้มปรากฏบนริมฝีปากของเขาขณะที่เขามองไปที่ไห่ฉางจุน “คุณหนูไห่จะไม่หัวเราะเราใช่ไหมครับ?” ไห่ฉางจุนหลงใหลในรอยยิ้มของเขาอย่างสิ้นเชิง พระเจ้า!</p>\n<p>รอยยิ้มขององค์ชายช่างหล่อเหลาเหลือเกิน! ในขณะนั้น ซือตูไป๋ถูกลืมไปโดยสิ้นเชิง “ข้าจะไม่หัวเราะ แต่ข้าจะหึง!” เธอวางคางลงบนมือ มองดูมือที่ประสานกันของพวกเขา “องค์ชาย ท่านเชิญข้ามาที่นี่วันนี้ ท่านไม่ได้บอกว่าท่านชอบข้าหรือ?” ชิงอี้ตกใจมากพออยู่แล้วกับการที่องค์ชายจับมือฟู่จ้าวหนิงแน่น แต่คำพูดของไห่ฉางจุนทำให้เธอพูดไม่ออก มันชัดเจนขนาดนั้นเลยเหรอ? “ใช่ เซียวหลานหยวน เจ้าตกหลุมรักเธอตั้งแต่แรกเห็นไม่ใช่เหรอ?” ฟู่จ้าวหนิงพูดพลางพยายามสะบัดมือของเซียวหลานหยวนออก แต่ดูเหมือนมือของเธอจะติดแน่นจนขยับไม่ได้ รู้สึกเหมือนกำลังจับก้อนน้ำแข็ง มือชาไปหมด เซียวหลานหยวนนี่มันคนเลวชัดๆ เขาต้องทำแบบนี้แน่ๆ เขาอยากจะทำให้เธอแข็งตาย “ข้ามาคุยเรื่องบางอย่างกับเจ้า เจ้ามีผู้หญิงที่ชอบอยู่แล้วนี่ ข้าจะทำให้เจ้าสมหวังได้ไหม?</p>\n<p>เราหย่ากันดีไหม” ทันทีที่ฟู่จ้าวหนิงพูดจบ หงจั่วและเฟินซิงก็เดินเข้ามา คนหนึ่งถือขนม อีกคนถือชา พอได้ยินเช่นนั้น มือของเฟินซิงก็สั่นและเกือบทำถ้วยชาหล่น พวกเธอมององค์ชายด้วยสายตาไม่พอใจ เจ้าชายตกหลุมรักหญิงสาวจากท้องทะเลคนนี้หรือ? เรื่องนี้ต้องทำให้เจ้าหญิงเสียใจมากแน่ๆ มิเช่นนั้นทำไมเธอถึงขอหย่า? เจ้าชายทำแบบนี้ได้อย่างไร! &quot;เยี่ยม!</p>\n<p>เยี่ยม!&quot; ไห่ฉางจุนปรบมือและตะโกนทันที &quot;แล้วถ้าข้าเป็นพระสนมล่ะ?&quot; เซียวหลานหยวนจ้องมองฟู่จ้าวหนิง เธอต้องการหย่าจริงๆหรือ? &quot;อะไรกัน เจ้าคิดว่าข้าเป็นคนที่เจ้าเรียกและไล่ไปได้ตามใจชอบหรือ? เจ้าหยุดรถม้าของข้ากลางถนนเมื่อเจ้าต้องการข้าและบอกว่าเจ้าอยากเป็นพระสนม และเมื่อเจ้าไม่ต้องการข้า เจ้าก็บอกว่าเจ้าอยากหย่า&quot; เขามองฟู่จ้าวหนิงราวกับว่าเธอเป็นผู้หญิงใจร้ายที่ใช้แล้วทิ้งเขาไป &quot;ฟู่จ้าวหนิง การแต่งงานไม่ใช่เรื่องที่จะมองข้ามไปได้ โดยเฉพาะการแต่งงานของข้า&quot; &quot;อย่างไรก็ตาม ตอนนี้เราไม่มีความสัมพันธ์กันแล้ว เจ้าไม่ชอบข้าและข้าก็ไม่ชอบเจ้า เราถือว่าความสัมพันธ์ก่อนหน้านี้เป็นการร่วมมือกัน ตอนนี้เราต่างได้สิ่งที่ต้องการแล้ว ก็แยกทางกันด้วยดีเถอะ&quot; ฟู่จ้าวหนิงรู้สึกว่าคำพูดของเธอฟังดูเหมือนผู้หญิงใจร้ายไปหน่อย แต่!</p>\n<p>การแต่งงานของเซียวหลานหยวนกับเธอเห็นได้ชัดว่าเป็นเพียงการระบายความแค้นที่มีต่อเซียวจินเฉินและภรรยาของเขามาที่เธอ เพื่อแก้แค้น! ราวกับว่าพวกเขามีความรู้สึกดีๆ ต่อกันจริงๆ “ฉันเพิ่งแต่งงานได้ไม่กี่วัน และกับผู้หญิงที่น่าสมเพชจากตระกูลฟู่แบบนี้ แค่นี้ก็อับอายมากพอแล้ว ถ้าฉันหย่ากับเธอในอีกไม่กี่วันข้างหน้า คนทั้งเมืองคงหัวเราะเยาะฉันแน่ หย่าเหรอ? เป็นไปไม่ได้” เขาโน้มตัวเข้าไปใกล้และกระซิบข้างหูฟู่จ้าวหนิง “ฟู่จ้าวหนิง ฉันยังอยากรออยู่กับคุณจนกว่าพ่อแม่ของคุณจะกลับมา” “คุณ!” “ถ้าพวกท่านเจ็บปวดและทุกข์ทรมาน แล้วฉันหย่ากับคุณ ฉันจะซ้ำเติมความเจ็บปวดให้พวกท่าน คุณคิดว่ามันจะสนุกกว่าไหม? คุณอยากหย่าเหรอ?</p>\n<p>กล้าคิดอย่างนั้นได้อย่างไร?” สำหรับคนภายนอก เซียวหลานหยวนกำลังกระซิบกับฟู่จ้าวหนิงอย่างสนิทสนม รอยยิ้มของเขานั้นอบอุ่น และน้ำเสียงของเขาก็ลึกและมีเสน่ห์ ราวกับกำลังกระซิบอะไรบางอย่างที่ซาบซึ้งใจ ดวงตาของหงจั่วและเฟินซิงแทบจะเดือดพล่านด้วยความอิจฉา “ใช่ๆ ฝ่าบาท แบบนั้นแหละ ท่านต้องเกลี้ยกล่อมพระสนมให้ดี” ฟู่จ้าวหนิงกลับกัดฟัน มือข้างหนึ่งถูกเซียวหลานหยวนจับไว้ ส่วนอีกมือหนึ่งก็คว้าเข็มเงินมาจิ้มลงไปที่จุดฝังเข็มบนหน้าอกของเขา “ฝ่าบาท!” ชิงอี้เห็นการเคลื่อนไหวของฟู่จ้าวหนิงและแสงสีเงินวาบขึ้น ใบหน้าของเธอซีดเผือดด้วยความตกใจ และกำลังจะรีบวิ่งเข้าไป แต่เซียวหลานหยวนคว้าข้อมือของฟู่จ้าวหนิงไว้</p>\n<p>เธอจึงจิ้มเข็มเข้าไปไม่ได้ เซียวหลานหยวนมองลงไปที่เข็มระหว่างนิ้วมือของเธอ ยิ้มแทนที่จะโกรธ “พระสนมต้องการฝังเข็มให้ข้าหรือ? คุณหนูไห่ยังอยู่ที่นี่ ไม่สะดวก รอจนถึงคืนนี้ก่อนดีกว่า” “ข้าจะฝังเข็มที่เท้าให้ท่าน!” ฟู่จ้าวหนิงกัดฟันด้วยความโกรธ “เอาล่ะ เลิกเล่นตลกได้แล้ว คุณหนูไห่กับฉันต้องคุยเรื่องสำคัญกันก่อน” น้ำเสียงของเซียวหลานหยวนแฝงไปด้วยความเอ็นดู ฟู่จ้าวหนิงตัวสั่นสะท้าน รีบสลัดความรู้สึกไร้สาระนี้ออกไป เธอคงถูกเขาทำให้เย็นชาเข้าแล้ว ทำไมเธอถึงมีภาพลวงตาที่น่ากลัวเช่นนี้!</p>\n<p>สีหน้าของไห่ฉางจุนดูแย่ลงไปอีก เมื่อกี้เธอยังมีความสุขอยู่เลย แต่พอเห็นองค์ชายจุนสนิทสนมกับฟู่จ้าวหนิงต่อหน้าต่อตา เธอก็รู้สึกเหมือนถูกหลอก องค์ชายจุนเชิญเธอไปที่วังทันทีที่พบกัน เห็นได้ชัดว่าเขาไม่ได้สนใจเธอ “คุณต้องการคุยอะไรกับข้า?” น้ำเสียงของเธอเย็นชา “ขอให้ข้าพูดให้ชัดเจน ถ้าคุณไม่ถือว่าข้าเป็นคนของคุณ ข้าจะไม่ยอมตกลงอะไรทั้งนั้น” เธอพูดอย่างดูถูก “คุณหนูไห่ คุณต้องการดอกไม้ราตรีหักหรือไม่?” “ใช่” “ถ้าข้าได้ดอกไม้ราตรีหักแล้ว ข้าจะแลกกับอะไรได้บ้าง?” ไห่ฉางจุนมองเขาอย่างสงสัย “เจ้าต้องการแลกเปลี่ยนอะไร?” “ไหมโลหิตหัวใจ...” “เจ้าฝันไป!” ก่อนที่เขาจะพูดจบ ไห่ฉางจุนก็กระโดดขึ้นมาพร้อมกับตบมือลงบนโต๊ะ “เจ้าต้องการไหมโลหิตหัวใจของข้าหรือ? เจ้าเป็นเจ้าชายชั่วร้าย!</p>\n<p>เจ้ารู้ตัวตนของข้า!” ฟู่จ้าวหนิงก็จ้องมองเซียวหลานหยวนด้วยดวงตาเบิกกว้าง ลืมดึงมือออกชั่วขณะ “ดอกไม้ราตรีหัก ข้าจะแลกกับไหมโลหิตหัวใจ ดอกไม้ราตรีหักนั้นหาได้ยากสำหรับเจ้า แต่เจ้าสามารถหาไหมโลหิตหัวใจได้ในตระกูลของเจ้า” เซียวหลานหยวนกล่าว “เจ้าพูดราวกับว่ามันง่าย! นั่นมันเมื่อก่อน ตอนนี้ไหมโลหิตหัวใจใกล้สูญพันธุ์แล้ว เจ้าคิดว่าการหาตัวหนึ่งมันง่ายอย่างนั้นหรือ? ไม่มีทาง!” ไห่ฉางจุนจ้องมองเขา “ถ้าเจ้าต้องการจริงๆ เจ้าต้องแต่งงานกับข้า! และข้าต้องการเป็นภรรยาเอกของเจ้า หย่ากับฟู่จ้าวหนิงซะ!” หัวใจของชิงอี้เต้นแรงจนแทบจะหลุดออกมาจากอก ฟู่จ้าวหนิงมองเสี่ยวหลานหยวนด้วยสายตาอ้อนวอน “ฉันคิดว่าเป็นความคิดที่ดี ทำไมคุณไม่ตกลงตามคำขอของเธอล่ะ?”</p>"}, "55": {"chapter_number": 55, "chapter_title": "第55章你沒有別的選擇", "content": "<p>เซียวหลานหยวนรู้สึกทั้งขบขันและโมโหเมื่อเห็นสีหน้าของฟู่จ้าวหนิง ด้วยเหตุผลบางอย่าง การที่เห็นเธออยากหย่าอย่างเหลือเกิน อยากกำจัดเขาออกไปอย่างสิ้นหวัง กลับยิ่งทำให้เขาลังเลที่จะยอมตามใจเธอ “ผมเป็นคนซื่อสัตย์และภักดี เราเพิ่งแต่งงานกัน จะทิ้งเธอไปได้อย่างไรหลังจากเริ่มต้นความสัมพันธ์แล้ว มันจะทำลายชื่อเสียงของผม” เซียวหลานหยวนจับมือเธอ ยกขึ้น และหัวเราะเบาๆ “ดูสิ เจ้าหญิงของผม มือของเราเข้ากันได้อย่างลงตัว การจับมือแบบนี้ช่างเหมาะสมเหลือเกิน เราจะจับมือกันและใช้ชีวิตร่วมกันไหม?” คำพูดของเซียวหลานหยวนอ่อนโยนและเปี่ยมด้วยความรักอย่างเหลือเชื่อ ราวกับว่าเขารักเธออย่างแท้จริง</p>\n<p>ฟู่จ้าวหนิงอดไม่ได้ที่จะตัวสั่น หากเธอไม่รู้เรื่องความบาดหมางของเขากับตระกูลฟู่มาก่อน และหากเขาไม่ได้สารภาพเมื่อวานนี้ว่าทำไมเขาถึงตกลงแต่งงานกับเธอ เธอเกือบจะเชื่อเขาแล้ว! “เฮ้!” ไห่ฉางจุนทนไม่ไหวอีกต่อไป เธอตบมือลงบนโต๊ะอย่างแรง ทำให้ถ้วยชาบนโต๊ะกระเด็น “องค์ชายจุน ท่านทำเกินไปแล้ว!</p>\n<p>ถึงแม้ข้าจะชอบท่านมาก แต่ท่านจะรังแกข้าแบบนี้ไม่ได้! ท่านเรียกข้ามาที่นี่เพื่อมาดูท่านสองคนหวานแหววกันหรือ? ข้าไม่ดูเด็ดขาด!” เธอพูดอย่างโกรธเคือง แล้วมองไปที่ฟู่จ้าวหนิง “แล้วเจ้า ฟู่จ้าวหนิง เจ้ากำลังหลอกข้าอยู่หรือ? เจ้ารู้ไหมว่าสามีของเจ้าต้องการแค่ไหมโลหิตหัวใจของข้า?</p>\n<p>ดังนั้นเมื่อข้าบอกว่าจะยกเขาให้ข้า เมื่อข้าบอกว่าเขาเชิญข้ามาที่นี่เพราะเขาชอบข้า เจ้าก็แค่มาดูเฉยๆ ใช่ไหม?” “ข้าจะจำเจ้าไว้! เจ้ารู้เรื่องยาใช่ไหม? ถ้าเจ้าเก่งกาจขนาดนั้น อย่ามาเล่นพนันยาแบบนี้ ถ้าเจ้ากล้ามาเล่น ข้าจะทำให้เจ้าเสียทุกอย่าง!” “หึ!” ไห่ฉางจุนตะโกนเสียงดัง แล้วหันหลังเดินจากไปอย่างโมโห ชิงอี้พยายามห้ามเธอ “คุณหนูไห่ มันไม่ใช่แบบนั้น...” องค์ชายของพวกเขาไม่ได้ตั้งใจจะหลอกเธอ เขาแค่ต้องการพูดคุยเรื่องไหมโลหิตใจเท่านั้น อย่าเข้าใจผิด อย่าโกรธเลย แต่ไห่ฉางจุนกลับไม่สนใจเขาเลย จ้องมองเขาอย่างดุร้ายและด่าทอว่า “พวกแกมันไร้ประโยชน์!” จากนั้นเธอก็รีบหนีไปอย่างรวดเร็ว หงจั่วและเฟินซิงมองหน้ากันด้วยความงุนงง ชิงอี้มองไปที่องค์ชายจุนอย่างหมดหนทาง “ฝ่าบาท ทำไมฝ่าบาทถึงทำให้คุณหนูไห่โกรธมากขนาดนี้?</p>\n<p>เธอจะขายไหมโลหิตใจให้พวกเราได้อย่างไร?” นี่เป็นครั้งแรกที่เจ้านายของพวกเขาทำเรื่องผิดพลาดแบบนี้ ก่อนหน้านี้ ไม่ว่าเขาต้องการอะไรหรือต้องเผชิญหน้ากับใคร เจ้านายของพวกเขาก็สามารถบรรลุเป้าหมายได้อย่างง่ายดายและเงียบๆ แต่เกิดอะไรขึ้นวันนี้? ทำไมเจ้านายของพวกเขาถึงไปยั่วยุคุณหนูไห่แบบนั้น? “องค์ชายต้องขายร่างกายเพื่อแลกกับไหมถึงได้ไหม?” เขาเหลือบมองชิงอี้อย่างไม่แยแส ชิงอี้ตกใจและรีบก้มหน้าลง “ข้ารู้ความผิดของตนเอง” มันไม่เกี่ยวอะไรกับเขาเลยที่จะไปตั้งคำถามกับการกระทำขององค์ชาย รอยยิ้มบนริมฝีปากของเซียวหลานหยวนจางหายไปในที่สุด เขาปล่อยมือของฟู่จ้าวหนิง หยิบผ้าเช็ดหน้าผ้าฝ้ายสีขาวออกมาจากเสื้อคลุม</p>\n<p>แล้วเช็ดมืออย่างระมัดระวังและช้าๆ ราวกับว่าเขาจับมือของฟู่จ้าวหนิงมานานจนมือสกปรก ฟู่จ้าวหนิงรู้สึกขบขันและรำคาญกับการกระทำของเขา “คุณจะไม่หยุดแสดงละครบ้างหรือคะ องค์ชาย คุณไม่ได้ตั้งใจจะจับมือฉันและใช้ชีวิตร่วมกับฉันหรือคะ” เธอถามด้วยน้ำเสียงกัดฟัน “การกระทำของข้าเมื่อกี้นี้ตั้งใจจะให้เจ้าได้คิดดู เจ้าคิดอย่างไรกับการที่เราเป็นคู่รักที่ให้เกียรติกันในที่สาธารณะ แต่รักษาระยะห่างเมื่อไม่มีใครอยู่รอบข้าง” ขณะที่เซียวหลานหยวนพูด เขาก็ยกกาต้มน้ำเล็กบนเตาถ่านขึ้นแล้วโยนผ้าเช็ดหน้าลงไปในกองไฟ เปลวไฟลุกไหม้ผ้าเช็ดหน้าในทันที ควันพวยพุ่งขึ้นมา ฟู่จ้าวหนิงจ้องมองเขาอย่างไม่พอใจ</p>\n<p>เขาคิดว่าแม้แต่ผ้าเช็ดหน้าสำหรับเช็ดมือก็ยังไม่สะอาดพอหรือไง?</p>\n<p>“ไม่ ฉันไม่สนใจ” “ไม่ใช่เรื่องของเธอ” เซียวหลานหยวนหัวเราะอีกครั้ง “ที่จริงแล้ว วันนั้นเธอไม่มีทางเลือก ถ้าเธอไม่เลือกคนอื่นแต่งงานด้วยบนถนนและวิ่งกลับไปที่ตระกูลฟู่ ปู่ของเธอคงตายไปแล้ว” ดังนั้น ฟู่จ้าวหนิงจึงไม่มีเหตุผลที่จะเสียใจที่เลือกเขาเป็นสามี นอกจากนี้ ไม่มีใครอื่นจะยอมตกลง “ถึงแม้เธอจะเลือกคนอื่น พวกเขาก็คงไม่กล้าล่วงเกินคฤหาสน์ขององค์ชายเซียว เซียวเหยียนจิงยังพูดว่า ‘มาดูกันว่าเธอจะแต่งงานกับใครได้บ้าง’ เขากำลังข่มขู่เธอและคนอื่นๆ อย่างชัดเจน ใครก็ตามที่กล้าแต่งงานกับเธอจะต้องขัดขืนเขา เธอคิดว่าจะมีใครกล้าขัดขืนเขาและยอมแต่งงานกับเธอหรือ?” ฟู่จ้าวหนิงกัดฟัน เธอรู้ว่าเขาพูดความจริง</p>\n<p>มิเช่นนั้นทำไมเธอถึงเลือกเขาในตอนนั้น? “แต่ถ้าฉันกลับบ้านตอนนั้น คุณปู่คงรับมือกับเรื่องนี้ไม่ไหว” “เธอหลอกตัวเองอยู่” เซียวหลานหยวนเริ่มชงชาและพูดอย่างใจเย็น “เขาผ่านวันนั้นมาได้เพราะเขารู้สึกผ่อนคลาย คิดว่าเธอได้แต่งงานเข้าตระกูลเซียวเรียบร้อยแล้ว เขาสามารถกินและนอนได้อย่างเต็มที่ในช่วงสองสามวันนั้น ทำให้เขาสามารถอดทนได้จนกระทั่งเธอกลับไปอีกสามวันเพื่อทำการฝังเข็มให้เขา” “ลองกลับไปในวันแต่งงานของเธอสิ” เขาพูดถูก ฟู่จ้าวหนิงสูดหายใจเข้าลึกๆ เพราะคุณปู่ของเธอคัดค้านการแต่งงานของเธอกับเซียวหลานหยวนอย่างมาก เธอเริ่มสงสัยว่าการตัดสินใจของเธอในวันนั้นถูกต้องหรือไม่ เธอแต่งงานอย่างไม่รอบคอบหรือเปล่า</p>\n<p>แต่ตอนนี้เมื่อเซียวหลานหยวนได้ทบทวนสถานการณ์กับเธอแล้ว เธอก็สงบลง เธอไม่มีทางเลือกในวันนั้นจริงๆ เพราะเธอเพิ่งย้ายชาติมาและไม่มีเวลาเตรียมตัวหรือวางแผนอะไรให้เหมาะสม “คุณปู่ต้องการให้ฉันหย่ากับคุณ” ฟู่จ้าวหนิงมองเขา “ฉันจะไม่ยอม” เซียวหลานหยวนยิ้มและวางถ้วยชาไว้ตรงหน้า “ดื่มชาหน่อยสิ” “เฟินซิง เอาชามาให้ฉัน ฉันอยากดื่มชาที่เธอชง!” ฟู่จ้าวหนิงส่งเสียงฮึดฮัดและเรียกเฟินซิง เธอจะไม่ดื่มชาที่เขาชง “ค่ะ ฝ่าบาท” เฟินซิงรีบนำชามาให้ หงจั่วก็วางขนมไว้ตรงหน้าฟู่จ้าวหนิงเช่นกัน “ฝ่าบาท นี่คือขนมที่ดีที่สุดจากเชฟหลวงของเรา โปรดลองชิมดู” หลังจากวางของลง พวกเขาก็รีบถอยไปอยู่ด้านหลังฟู่จ้าวหนิง</p>\n<p>ยืนเท้าแขนไว้ข้างลำตัว พร้อมที่จะเชื่อฟังได้ทุกเมื่อ ฟู่จ้าวหนิงหยิบชาขึ้นมาจิบ “อืม ชาของเฟินซิงอร่อยจริงๆ” จากนั้นเธอก็หยิบขนมขึ้นมาชิม “ขนมนี้หวานแต่ไม่มัน และมีกลิ่นดอกหอมหมื่นลี้อ่อนๆ อร่อยจริงๆ” หลังจากพูดจบ เธอก็เลิกคิ้วและเหลือบมองเซียวหลานหยวน “ดูเหมือนว่าสาวใช้สองคนนี้จะห่วงใยท่านมากทีเดียว” เซียวหลานหยวนไม่ได้โกรธ แต่กลับคิดว่าเธอค่อนข้างไร้เดียงสา “ถ้าอย่างนั้นก็ให้พวกนางเป็นสาวใช้ชั้นหนึ่งของท่านไปเถอะ” “ค่ะ ฝ่าบาท” สาวใช้หน้าแดงและผมสีชมพูต่างดีใจและรีบตอบตกลงอย่างรวดเร็ว เกรงว่าองค์ชายจุนจะเปลี่ยนใจ ในฐานะหัวหน้าสาวใช้ของเจ้าหญิง พวกนางเพียงแค่ต้องเชื่อฟังฝ่าบาทเท่านั้น</p>\n<p>ฟู่จ้าวหนิงรู้สึกว่าเธอไม่ค่อยเข้าใจความคิดของเซียวหลานหยวนเท่าไหร่ เขาไม่ชอบเธออย่างชัดเจนและมีเรื่องบาดหมางกับพ่อแม่ของเธอ แล้วทำไมเขาถึงไม่หย่ากับเธอ?</p>\n<p>เป็นเพราะความหยิ่งผยองของเขาจริงๆ หรือ? ในขณะนั้นเอง แพทย์หลวงเสินก็มาถึงพร้อมกับศิษย์ของเขา และคนดูแลพระราชวังก็รีบมาในเวลานั้นเช่นกัน “ฝ่าบาท คนของจักรพรรดิผู้สละราชสมบัติมาถึงแล้ว!”</p>"}, "56": {"chapter_number": 56, "chapter_title": "第56章一致對外", "content": "<p>เมื่อได้ยินเช่นนั้น กำลังใจของแพทย์หลวงเสินก็เบิกบานขึ้นทันที เขาได้รับมอบหมายให้ประจำอยู่ในลานที่ค่อนข้างเงียบสงบ และเพิ่งมาพบพระชายาจุนหลังจากได้ยินว่าฟู่จ้าวหนิงมาถึงแล้ว เขาไม่คาดคิดว่าจะมาถึงได้ตรงเวลาขนาดนี้! จักรพรรดิผู้ทรงสละราชสมบัติส่งคนมา! เขารู้ดีว่าทำไมจักรพรรดิถึงส่งเขามาที่พระราชวังขององค์ชายจุน: เพื่อดูว่าสามคนนั้นคือคนสนิทของจักรพรรดิผู้ทรงสละราชสมบัติหรือไม่ และพวกเขาส่งอะไรมาให้องค์ชายจุน เขากังวลว่าอาจจะพลาดการพบพวกเขา แต่โชคชะตากลับนำพา พวกเขามาถึงในขณะที่เขากำลังจะออกไปพอดี “เชิญพวกเขาไปที่ห้องโถงด้านหน้า” องค์ชายจุนไม่คาดคิดว่าพวกเขาจะมาถึงเร็วขนาดนี้</p>\n<p>เขาจึงลุกขึ้นเตรียมจะไปที่ห้องโถงด้านหน้า แต่ทันใดนั้นก็รู้สึกถึงความมืดมิดตรงหน้า ดวงตาชา จมูกคัน และร่างกายเซไปมา ฟู่จ้าวหนิงซึ่งอยู่ใกล้เขาที่สุดก็ลุกขึ้นตามไปด้วยโดยสัญชาตญาณ เธอลังเลว่าจะไปก่อนหรือจะตามเขาไปที่ห้องโถงด้านหน้า เมื่อเห็นองค์ชายจุนล้มลงมาหาเธอ มือของเธอเคลื่อนไหวเร็วกว่าความคิด และเอื้อมมือไปโอบกอดเซียวหลานหยวน “ฝ่าบาท!” ชิงอี้และหงจั่วเฟินซิงอุทานด้วยความประหลาดใจ พวกเขาทั้งหมดถอนหายใจโล่งอกเมื่อเห็นฟู่จ้าวหนิงรับเซียวหลานหยวนไว้ได้ ถ้าหากองค์ชายล้มลงแบบนั้นจะเป็นอย่างไร?</p>\n<p>เซียวหลานหยวนลงกระแทกฟู่จ้าวหนิงอย่างแรง ฟู่จ้าวหนิงรู้สึกว่าร่างกายของเขาทั้งตัวเย็นเฉียบราวกับน้ำแข็ง ทำให้เธอตัวสั่น “ฝ่าบาท องค์ชายมีน้ำมูกไหล!” ชิงอี้อุทานด้วยความตกใจ เธอเคยเห็นองค์ชายไอเป็นเลือดมาหลายครั้ง แต่ครั้งนี้เป็นครั้งแรกที่เธอเห็นเขาเลือดกำเดาไหล! ชิงอี้ตกใจ ฟู่จ้าวหนิงก็หัวใจเต้นแรงเช่นกัน ปกติแล้วเลือดกำเดาไหลมักจะเกิดขึ้นเมื่อเลือดในร่างกายมีมากและไหลเวียนไม่ดี แต่ร่างกายของเซียวหลานหยวนนั้นเย็นเฉียบอย่างเห็นได้ชัด เธอยังรู้จากชีพจรของเขาว่าเขามีสารพิษหลายชนิดในร่างกาย และร่างกายของเขาก็อ่อนแออย่างมาก ทำไมจู่ๆ เขาถึงเลือดกำเดาไหล? &quot;เจ้าชายจุนเป็นอะไรไป?</p>\n<p>เป็นอะไรไป?&quot; แพทย์หลวงเสินซึ่งอยู่ไม่ไกลเห็นเหตุการณ์นี้ แม้ว่าเขาจะไม่ได้ยินคำพูดของพวกเขา แต่เขาก็เห็นเจ้าชายจุนล้มลงไปในอ้อมแขนของฟู่จ้าวหนิงอย่างชัดเจน และเขาก็รีบวิ่งเข้าไปหา สีหน้าของชิงอี้เปลี่ยนไปอีกครั้งเมื่อเห็นแพทย์หลวงเสินเข้ามาใกล้ ในตอนนี้ เขาทำได้เพียงไว้ใจฟู่จ้าวหนิง!</p>\n<p>เขาจึงลดเสียงลงและรีบพูดกับฟู่จ้าวหนิงว่า &quot;ฝ่าบาท นั่นคือแพทย์หลวงที่จักรพรรดิส่งมา ฝีมือการแพทย์ของเขายอดเยี่ยมมาก เราไม่สามารถให้เขาตรวจชีพจรของเจ้าชายได้&quot; ฟู่จ้าวหนิงเข้าใจความหมายของเขาในทันที เซียวหลานหยวนไม่ต้องการให้คนในวังรู้รายละเอียดเกี่ยวกับสุขภาพของเขา! แม้ว่าเธอจะไม่เข้าใจว่าทำไม ตราบใดที่เธอเป็นพระสนมจุน ไม่ว่าเธอจะมีความแค้นส่วนตัวอะไรกับเซียวหลานหยวน เธอก็ต้องยืนหยัดร่วมกันต่อต้านคนนอก นอกจากนี้ จักรพรรดิและจักรพรรดินียังเต็มไปด้วยความอาฆาตแค้นต่อเธอ “หยุดเขา” “เราหยุดแพทย์หลวงที่จักรพรรดิส่งมาไม่ได้!” ชิงอี้กล่าวอย่างเร่งรีบ “ถ้าองค์ชายยังคงปฏิเสธไม่ให้แพทย์หลวงตรวจชีพจร จักรพรรดิจะสงสัย” ช่างยุ่งยากเหลือเกิน!</p>\n<p>ฟู่จ้าวหนิงกัดฟัน ประคองเสี่ยวหลานหยวนด้วยมือข้างหนึ่ง และดึงเข็มยาวออกมาอีกข้างหนึ่ง แล้วแทงลงไปที่จุดฝังเข็มหลายจุดบนจมูกของเสี่ยวหลานหยวน “เช็ดเลือดกำเดาให้เขา” ชิงอี้รีบเดินไปข้างหลังเธอและเช็ดเลือดกำเดาขององค์ชายจุนด้วยแขนเสื้อของเธอโดยตรง “องค์ชายจุนเป็นลมหรือ? เร็วเข้า เร็ว ให้เขานั่งลง ฉันจะตรวจชีพจรให้ดีๆ” แพทย์หลวงเสินรีบวิ่งมา หายใจหอบหนักจากการวิ่งระยะสั้นๆ แทบไม่ได้ออกกำลังกายในวังเลย หงจั่วรีบไปทักทายเขา “แพทย์หลวงเสิน โปรดพักสักครู่” “ไม่จำเป็น ไม่จำเป็น ฉันไม่สำคัญ เจ้าชายจุนมีชาติกำเนิดสูงส่ง ไม่อาจล่าช้าได้แม้แต่น้อย ให้ฉันตรวจดูเขาอย่างรวดเร็ว”</p>\n<p>แพทย์หลวงเสินเอื้อมมือไปผลักหงจั่วออกไป ฟู่จ้าวหนิงหันหน้าเข้าหาแพทย์หลวงเสิน ขณะที่เจ้าชายจุนเอนตัวพิงเธอ ศีรษะวางบนไหล่ของเธอ หลังหันไปทางแพทย์หลวงเสิน ฟู่จ้าวหนิงแทงเข็มเข้าไปที่หน้าอกของเขาอีกครั้ง จากนั้นดึงออก จับมือซ้ายของเซียวหลานหยวน และกดลงบนจุดฝังเข็มหลายจุดใกล้ปากเสือของเขาอย่างแน่นหนา ลมหายใจของเจ้าชายจุนเปลี่ยนไปเล็กน้อย “ท่านคือพระสนมจุนหรือ พระสนม โปรดช่วยเจ้าชายจุนนั่งลงช้าๆ” แพทย์หลวงเสินเหลือบมองฟู่จ้าวหนิง ชื่นชมความงามของเธออยู่ภายในใจ แต่ในขณะนี้ จิตใจของเขาจดจ่ออยู่กับการตรวจชีพจรของเจ้าชายจุนอย่างเต็มที่</p>\n<p>ฟู่จ้าวหนิงมองเห็นความตื่นเต้นและความปิติยินดีในสีหน้าของแพทย์หลวงเสิน พอเห็นเซียวหลานหยวนเป็นลม หมอหลวงเสินเลยได้โอกาสตรวจชีพจรและตรวจดูอาการ หมอหลวงเสินดีใจขนาดนั้นเลยเหรอ?</p>\n<p>“ท่านเป็นใคร?” ฟู่จ้าวหนิงไม่ยอมปล่อยมือองค์ชายจุน มองไปที่หมอหลวงเสินแล้วยิ้ม “ใครบอกท่านว่าองค์ชายเป็นลม? ฉันกับสามีกำลังคุยกันอยู่ แล้วก็อยากจะกอดกัน มันผิดตรงไหน? เกี่ยวอะไรกับท่าน?” ฮึ่ม! แม้แต่ชิงอี้ก็เกือบสำลักเครื่องดื่ม คำพูดของเจ้าหญิง...ช่างหน้าด้านเหลือเกิน เพิ่งจะปฏิเสธคำแนะนำขององค์ชายที่ให้ประพฤติตนอย่างสุภาพในที่สาธารณะไม่ใช่เหรอ?</p>\n<p>แล้วตอนนี้กลับมาเสแสร้งอีก? หมอหลวงเสินถึงกับอึ้ง เขาคิดว่าตัวเองได้ยินผิด เมื่อกี้เขาได้ยินอะไร? คู่รักกำลังคุยกันและอยากจะกอดกัน? หน้าด้านจริงๆ!</p>\n<p>“ข้าคือแพทย์หลวงที่จักรพรรดิส่งมา จักรพรรดิเป็นห่วงสุขภาพขององค์ชายจุน จึงสั่งให้ข้าอยู่เฝ้าองค์ชายจุนตลอดเวลา” ก่อนที่หมอเสินจะพูดจบ ฟู่จ้าวหนิงก็ขัดจังหวะด้วยเสียงฮึดฮัด “หมายความว่ายังไง ‘อยู่เฝ้าตลอดเวลา’? เจ้ากำลังสาปแช่งให้องค์ชายของข้าล้มลงเมื่อไหร่ก็ได้งั้นหรือ?” “ไม่ ไม่ ไม่ แน่นอน!” สีหน้าของหมอเสินเปลี่ยนไป “ข้าจะกล้าสาปแช่งองค์ชายจุนได้อย่างไร?” “เจ้าเป็นหมอ คนแบบไหนหรือเรื่องแบบไหนที่จะทำให้เจ้าต้องอยู่เฝ้าตลอดเวลา? แน่นอน ก็ต้องเป็นคนไข้ แน่นอน ต้องเป็นคนที่ป่วย” น้ำเสียงของฟู่จ้าวหนิงเย็นชา “นี่ไม่ใช่การสาปแช่งองค์ชายของข้าหรือ? ถึงแม้เขาจะอ่อนแอไปบ้าง แต่เขาก็ยังกิน นอน</p>\n<p>และหายใจได้ ทำไมเขาถึงต้องการแพทย์หลวงอยู่เฝ้าตลอดเวลา?” องค์ชายจุนที่ฟื้นคืนสติแล้ว: “...” ถ้าเขาหายใจไม่ได้ เขาก็คงตายไปแล้ว แต่พอได้ฟังฟู่จ้าวหนิงบิดเบือนความหมายของหมอเสินอย่างจงใจ เขากลับรู้สึกว่ามันน่าสนใจทีเดียว “นี่คือพระราชโองการของจักรพรรดิ” หมอเสินรู้สึกงงเล็กน้อยกับคำพูดของฟู่จ้าวหนิง จึงรีบเอ่ยถึงจักรพรรดิ “หมอเสินหลวง ท่านกำลังบอกว่าฝ่าบาททรงสาปแช่งองค์ชายของข้าหรือคะ” ฟู่จ้าวหนิงถามด้วยความประหลาดใจ เสียงของเธอดังขึ้นเล็กน้อย ขาของหมอเสินอ่อนแรงลง เขาทรุดตัวลงคุกเข่าเสียงดัง “ข้าข้าไม่ได้หมายความอย่างนั้นเด็ดขาด!” ข้อกล่าวหาที่ร้ายแรงเช่นนี้ ความผิดร้ายแรงเช่นนี้</p>\n<p>ถูกกล่าวหาใส่หัวเขาอย่างกะทันหัน เขารับมือไม่ไหว!</p>\n<p>“แล้วทำไมท่านถึงยืนยันว่าองค์ชายของข้าเป็นลมทั้งที่พระองค์สบายดี” ฟู่จ้าวหนิงบีบมือของเซียวหลานหยวนอย่างแรง เขาตื่นแล้ว ทำไมเขาไม่พูดอะไรเลย? กำลังดูละครอยู่หรือไง? เจ้าชายจุนรู้สึกชาตามจุดฝังเข็มจากการหยิกของเธอ จากนั้นเขาก็ลุกขึ้นยืนตรงและค่อยๆ หันหลังกลับ ดูเหมือนเขาจะผิดหวังเล็กน้อย เพราะเธอมีกลิ่นหอมอ่อนๆ ไม่ใช่น้ำหอมทั่วไปของหญิงสาว แต่เป็นกลิ่นยาที่ทำให้เขารู้สึกสดชื่น เขามองไปที่แพทย์หลวงเสิน “แพทย์หลวงเสิน ข้าก็อยากรู้เหมือนกัน ทำไมท่านถึงหวังให้ข้าเป็นลมนัก?”</p>"}, "57": {"chapter_number": 57, "chapter_title": "第57章她從不受氣", "content": "<p>แพทย์หลวงเสินรู้สึกว่าสมองและดวงตาของเขากำลังทำงานผิดปกติ เขาคิดว่าตัวเองลืมทุกอย่างที่อาจารย์สอนไปหมดแล้ว ท่าทางและการเคลื่อนไหวตอนที่องค์ชายจุนล้มลงนั้น ดูเหมือนว่าเขาจะหมดสติและเป็นลมไปจริงๆ! และชิงอี้กับนางกำนัลทั้งสองก็ต่างอุทานด้วยความตกใจ นอกจากนี้ ตอนที่เขามาถึง เขาก็เห็นองค์ชายจุนพิงฟู่จ้าวหนิงอย่างหนัก จุดรับน้ำหนักไม่ตรงกลาง มันไม่ใช่การที่เขายืนอยู่ด้วยความตั้งใจแน่ๆ จะเป็นอะไรไปได้นอกจากเป็นลม? แพทย์หลวงเสินคิดเสมอว่าจักรพรรดิเลือกเขาและส่งเขามาที่เรือนจำขององค์ชายจุนเพราะสติปัญญา การสังเกตที่เฉียบแหลม ความละเอียดรอบคอบ และทักษะทางการแพทย์ที่โดดเด่น</p>\n<p>แต่ตอนนี้เขากำลังตั้งคำถามถึงตัวตนของตัวเอง &quot;องค์ชายจุน ท่านไม่รู้สึกไม่สบายตรงไหนเลยหรือครับ?&quot; แม้จะถูกกดดันจากเจ้าชายจุน แพทย์หลวงเสินก็รวบรวมความกล้าถามว่า “ข้าเป็นข้าราชการต่ำต้อยที่ห่วงใยสุขภาพของฝ่าบาทอย่างแท้จริง พระพันปีหลวงและพระพันปีหลวงในวังทรงตรวจชีพจรของฝ่าบาทเป็นประจำ ข้าเป็นข้าราชการต่ำต้อยที่ขอตรวจชีพจรของฝ่าบาทได้หรือไม่” “ไม่ว่าอย่างไรก็ตาม โปรดยื่นพระหัตถ์มาตรวจชีพจรให้ฝ่าบาทเถิด!” แพทย์หลวงเสินมองเจ้าชายจุนด้วยความคาดหวัง แต่เจ้าชายจุนกลับยิ้มเล็กน้อยและปฏิเสธอย่างเย็นชา “แย่แล้ว” ชิงอี้รู้สึกว่าหัวใจของเขาสงบลงในที่สุด เขาอดไม่ได้ที่จะเหลือบมองฟู่จ้าวหนิง</p>\n<p>เขาเห็นเจ้าชายหมดสติขณะเช็ดเลือดกำเดาก่อนหน้านี้ และเขาไม่รู้ว่าฟู่จ้าวหนิงปลุกเจ้าชายให้ตื่นได้อย่างรวดเร็วได้อย่างไร แน่นอน การปลุกให้ตื่นอาจไม่ใช่เรื่องใหญ่ แต่การปลุกให้ตื่นได้อย่างรวดเร็ว แล้วยังดูมีพลังและความแข็งแรงของเจ้าชายเหมือนเดิม นั่นคือฝีมือของฟู่จ้าวหนิง ชิงอี้เคยเห็นองค์ชายเป็นลมมาหลายครั้งแล้ว และหลังจากฟื้นขึ้นมา องค์ชายก็มักจะอ่อนแรง ยืนไม่มั่นคง และพูดจาเบาหวิว แต่ตอนนี้ แม้แต่เขาก็ยังไม่เห็นว่าองค์ชายจุนมีอะไรผิดปกติ “หมอเสินไม่ได้ยินหรือว่ามีคนรอข้าอยู่?” องค์ชายจุนมองไปที่หมอเสิน “หรือว่าหมอเสินพยายามขัดขวางไม่ให้ข้าได้พบกับคนที่จักรพรรดิส่งมามอบของขวัญแต่งงาน?</p>\n<p>หรือนี่จะเป็นฝีมือของจักรพรรดิด้วย?” หมอเสินที่กำลังจะลุกขึ้นก็ยังคงคุกเข่าอยู่หลังจากได้ยินเช่นนั้น หลังของเขาเปียกโชกไปด้วยเหงื่อเย็น “ฝ่าบาท ข้าขออย่าได้กล้าเลยครับ” ทำไมทุกอย่างถึงถูกกล่าวโทษเป็นเขา? “อย่างไรก็ตาม ข้าไม่พอใจกับสิ่งที่หมอเสินพูดเมื่อกี้ หมอเสิน โปรดหลีกเลี่ยงข้าและอย่าเข้ามาใกล้ข้าในอีกไม่กี่วันข้างหน้า” องค์ชายจุนกล่าวพลางจับมือฟู่จ้าวหนิง “ไปกันเถอะ ฝ่าบาท ไปที่ห้องโถงด้านหน้ากันดูว่าพระจักรพรรดิส่งของขวัญแต่งงานอะไรมาให้บ้าง” ฟู่จ้าวหนิงพยายามอดกลั้นไม่สะบัดมือเขา พวกเขาเดินผ่านหมอเสินไปโดยไม่หันกลับไปมอง “ของขวัญแต่งงาน?” หลังจากเดินไปได้ไม่กี่ก้าว ฟู่จ้าวหนิงก็ถามเสียงเบา “อืม ท่านไม่รู้หรือ?</p>\n<p>พระจักรพรรดิเคยบอกข้าไว้แล้วว่าทรงเตรียมของขวัญแต่งงานไว้ให้ข้า ดังนั้นพระสนมก็ต้องได้รับด้วย” เจ้าชายจุนกล่าว ฟู่จ้าวหนิงเลิกคิ้ว “นั่นหมายความว่าข้าก็มีส่วนแบ่งในของขวัญชิ้นใหญ่ชิ้นนี้ด้วยหรือ?” เจ้าชายจุนเหลือบมองเธอแล้วพูดอย่างไม่ใส่ใจ “ทักษะการแพทย์ของเจ้าดูดีทีเดียว เจ้าอยากลองวัดชีพจรตัวเองดูไหม? เจ้าเพ้อเจ้อหรืออะไรทำนองนั้นหรือ?” *ชิ* ฟู่จ้าวหนิงเงียบไป ไม่ต้องการคุยกับเขาอีกต่อไป เมื่อมาถึงห้องโถงด้านหน้า คนรับใช้ก็ทักทายพวกเขาด้วยเสียงกระซิบว่า “ฝ่าบาท ทรงสบายดีหรือไม่? อาจารย์ฉีเฉินเสด็จมาแล้ว!” “หืม?” เจ้าชายจุนหยุดชะงัก ก้าวเดินของเขาสั่นคลอน ฟู่จ้าวหนิงมองเขาด้วยความงุนงง เกิดอะไรขึ้น?</p>\n<p>ดูเหมือนเขาจะประหลาดใจที่ได้ยินเรื่องอาจารย์ฉีเฉิน? “เจ้าเคยได้ยินเรื่องอาจารย์ฉีเฉินไหม?” เจ้าชายจุนถามเธอ ฟู่จ้าวหนิงส่ายหัว “ไม่ค่ะ” “พ่อของเจ้าเป็นศิษย์ฆราวาสในนามของท่านค่ะ” หลังจากพูดจบ เจ้าชายจุนก็ปล่อยมือเธอและก้าวเข้าไปในห้องโถงก่อน พ่อของเธอ? ฟู่จินเฉิน? ฟู่จินเฉินมีอาจารย์ที่เป็นพระ?</p>\n<p>เธอไม่รู้เรื่องพวกนี้เลยจริงๆ ท่านฟู่เฒ่าไม่ได้พูดอะไร และเธอก็ไม่รู้ว่าทำไมท่านถึงไม่เคยพูดถึงพ่อแม่ของเธอ “ฝ่าบาท โปรดเสด็จเข้ามาด้วย” คนรับใช้กล่าว “อาจารย์ฉีเฉินก็ทรงเอ่ยถึงฝ่าบาทเช่นกัน” “ตกลงค่ะ” ในเมื่อเธอมาถึงที่นี่แล้ว เธอก็ควรจะใช้โอกาสนี้ให้เป็นประโยชน์ ฟู่จ้าวหนิงก็เข้าไปเช่นกัน มีหลายคนนั่งอยู่ในห้องโถง โดยมีข้ารับใช้ยืนอยู่ข้างๆ พวกเขา ตอนแรกที่เธอเข้ามา บรรยากาศค่อนข้างคึกคัก แต่ทันทีที่ฟู่จ้าวหนิงเข้ามา สายตาของทุกคนก็จับจ้องมาที่เธอ ถ้าเป็นคนอื่นคงรู้สึกกดดันจนเดินไม่ไหว แต่ฟู่จ้าวหนิงกลับหยุดเพียงครู่เดียว ก่อนจะเดินต่อไปหาเซียวหลานหยวนและยืนอยู่ข้างๆ เขา</p>\n<p>สิ่งแรกที่เธอเห็นคือพระชรารูปหนึ่งสวมกะทะ คิ้วและขนตาของพระชราเป็นสีขาว ใบหน้าใจดีอย่างยิ่ง เมื่อมองมา ดวงตาของเขาก็ดูเปี่ยมไปด้วยความเมตตา ฟู่จ้าวหนิงรู้สึกได้ถึงรัศมีเล็กๆ รอบศีรษะของพระชราเมื่อมองไปที่เขา เธอจึงกระพริบตา นี่ต้องเป็นอาจารย์ฉีเฉินแน่ๆ ด้วยเหตุผลบางอย่าง นอกจากจะรู้สึกถึงความเมตตาที่เปล่งประกายแล้ว ฟู่จ้าวหนิงยังรู้สึกอบอุ่นใจเมื่อเห็นอาจารย์ฉีเฉินอีกด้วย นอกจากอาจารย์ฉีเฉินแล้ว ยังมีชายชราอีกคนหนึ่งที่ดูเหมือนนักปราชญ์ ผมและเคราเป็นสีขาวครึ่งหนึ่ง รอยย่นรอบดวงตาทำให้เขามีท่าทางจริงจัง ข้างๆ เขามีชายหนุ่มรูปงามหน้าตาดียืนอยู่ ถัดไปอีกที่นั่งหนึ่งเป็นหญิงชราสวมผ้าโพกหัว</p>\n<p>ดวงตาปรือ ปากเบ้เล็กน้อย ทำให้ดูเข้าถึงยาก ว่ากันว่าจักรพรรดิผู้ทรงสละราชสมบัติได้มอบหมายให้คนสามคนถือสัญลักษณ์ประจำตระกูล พวกนี้ต้องเป็นสามคนนั้นแน่ๆ ใช่ไหม? “เจ้าคือหญิงสาวตระกูลฟู่ที่หยุดรถม้าขององค์ชายจุนกลางถนนแล้วขอแต่งงานกับเจ้าใช่ไหม?” หญิงชราพูดขึ้นก่อน น้ำเสียงค่อนข้างเย็นชา ฟู่จ้าวหนิงสัมผัสได้ถึงความประชดประชันและความไม่พอใจ ดูเหมือนว่าในสายตาของหญิงชราคนนี้ การที่เจ้าเป็นฝ่ายขอแต่งงานเป็นเรื่องน่าอับอาย แต่พวกเขามาเพื่อเข้าเฝ้าองค์ชายจุนไม่ใช่หรือ?</p>\n<p>ทำไมถึงพูดกับเธอก่อน? “ข้าคือฟู่จ้าวหนิง” น้ำเสียงของฟู่จ้าวหนิงอ่อนลง “ถ้าข้าไม่เห็นด้วยตาตัวเอง ข้าคงไม่เชื่อว่าในโลกนี้จะมีคนที่ไม่เคารพมารยาทมากขนาดนี้” หญิงชราส่งเสียงฮึดฮัด เงยหน้าขึ้นมองฟู่จ้าวหนิงอย่างพิจารณา “พ่อแม่ของเจ้าไม่อยู่ที่นี่ ท่านฟู่ไม่ได้สอนเจ้าหรืออย่างไรว่าหญิงสาวที่ดีควรประพฤติตนอย่างไร เมื่อเจ้าพบพวกเรา เจ้าควรโค้งคำนับอย่างน้อยที่สุด” เจ้าชายจุนรู้สึกได้ทันทีว่าออร่าของฟู่จ้าวหนิงเย็นชาลง เด็กสาวคนนี้อารมณ์ไม่ดีนัก คงกำลังจะระเบิดออกมาแน่ๆ และแล้วเขาก็ได้ยินฟู่จ้าวหนิงหัวเราะ “ขอโทษนะ คุณปู่สอนมารยาทให้ฉัน แต่ฉันไม่รู้จักท่านด้วยซ้ำ ไม่รู้ว่าท่านเป็นคนดีหรือคนเลว</p>\n<p>การโค้งคำนับแบบนั้นมันเป็นการโค้งคำนับแบบไหนกัน ต่อให้ฉันกล้าโค้งคำนับ ท่านก็คงไม่รับหรอก” ในชีวิตสมัยใหม่ของเธอ ผู้คนชั้นสูงมากมายปฏิบัติต่อเธอด้วยความเคารพ เธอผู้ไม่เคยถูกดูหมิ่นมาก่อน จะถูกดูหมิ่นที่นี่ได้อย่างไร “อวดดี!” หญิงชราโกรธจัดทันที เธอทุบมือลงบนที่วางแขนและจ้องมองฟู่จ้าวหนิงด้วยความโกรธ</p>"}, "58": {"chapter_number": 58, "chapter_title": "第58章到底是誰放肆", "content": "<p>เซียวหลานหยวนพูดอย่างใจเย็นในขณะนั้น “ใครกันแน่ที่อวดดี?” แม้ว่าการแต่งงานของเขากับฟู่จ้าวหนิงจะไม่ใช่ด้วยเจตนาบริสุทธิ์ แต่ตอนนี้เธอก็เป็นพระสนมของจุน ยืนอยู่ข้างๆ เขา เขาสามารถรังแกเธอได้ด้วยตัวเอง แต่คนนอกอย่างเธอช่างกล้าเหลือเกิน “นี่คือที่ประทับขององค์ชายจุน ข้าก็ยืนอยู่ตรงนี้ นี่มันความหยิ่งยโสอะไรกัน ท่านหญิง?” ฟู่จ้าวหนิงตกตะลึงไปครู่หนึ่ง มองไปที่เซียวหลานหยวน เธอไม่คาดคิดว่าเขาจะมาเผชิญหน้ากับท่านหญิงโดยตรงเช่นนี้ จักรพรรดิผู้ทรงสละราชสมบัติได้ส่งคนมามอบของขวัญอันยิ่งใหญ่เช่นนี้ เขาไม่ควรแสดงความเคารพบ้างหรือ? ท่านหญิงก็นิ่งงันไปเช่นกัน เห็นได้ชัดว่าไม่เชื่อ “องค์ชายจุน?” “ท่านหญิงยังรู้ว่าข้าคือองค์ชายจุน” เซียวหลานหยวนกล่าวพลางดึงฟู่จ้าวหนิงไปยังที่นั่งหลักในห้องโถง ซึ่งทั้งสองก็นั่งลงอย่างสงบ “ทำไมท่านหญิงชิงต้องสนใจเด็กด้วย?</p>\n<p>พระอมิตาภะ” อาจารย์ฉีเฉินประสานมือและพูดขึ้นก่อนที่มาดามชิงจะทันได้พูดอะไร “คุณชายฟู่ไม่รู้จักพวกเราจริงๆ” “เด็กเหรอ? แต่งงานแล้วแต่ยังเป็นเด็กอีกเหรอ?” มาดามชิงหัวเราะเยาะและเหลือบมองฟู่จ้าวหนิง แต่ก็ไม่ได้พูดอะไรต่อ อาจารย์ผู้มีลักษณะเหมือนนักปราชญ์อาวุโสก็พูดขึ้นเช่นกัน “ไม่ว่าการแต่งงานครั้งนี้จะถูกจัดขึ้นอย่างไร ตอนนี้นางได้เป็นพระสนมของจุนแล้ว นางก็ยังต้องเรียนรู้มารยาทที่เหมาะสม” “กฎของโลกนี้ล้วนถูกสร้างขึ้นโดยมนุษย์ไม่ใช่หรือ? แค่ทำในสิ่งที่ถูกต้อง ทำไมต้องถูกผูกมัดด้วยกฎมากมาย? คุณชายฟู่ดูฉลาดเฉลียว เป็นเด็กที่ฉลาดและเจ้าเล่ห์” อาจารย์ฉีเฉินกล่าวเสริม ฟู่จ้าวหนิงยกนิ้วโป้งให้เขาทันที</p>\n<p>เธอชมเขาอย่างใจกว้าง “อาจารย์ ฉันคิดว่าท่านมีวิจารณญาณที่ยอดเยี่ยม” อาจารย์ฉีเฉินอดหัวเราะไม่ได้ รอยยิ้มก็แวบเข้ามาในดวงตาของเซียวหลานหยวน แต่เขาก็รีบระงับมันไว้ เขาสังเกตเห็นสีหน้าวิตกกังวลของคนรับใช้และชิงอี้ ชิงอี้กังวลจริงๆ ว่าองค์ชายจะกล้าเผชิญหน้ากับท่านหญิงชิงโดยตรงได้อย่างไร?</p>\n<p>จักรพรรดิผู้ทรงสละราชสมบัติได้มอบหมายภารกิจนี้ให้พวกเขาเมื่อกว่าสิบปีก่อน และไม่มีใครรู้ว่าพระองค์ทรงเตรียมอะไรไว้ หากทั้งสามคนปฏิเสธที่จะส่งมอบภารกิจนี้ล่ะ? ก่อนหน้านี้พวกเขาไม่ได้คิดถึงความเป็นไปได้นี้ แต่หลังจากเห็นท่านหญิงชิงและนักปราชญ์อาวุโส ชิงอี้และคนอื่นๆ ก็อดไม่ได้ที่จะรู้สึกกังวล กว่าสิบปีผ่านไปแล้ว จักรพรรดิผู้ทรงสละราชสมบัติก็จากไปนานแล้ว ใครจะรู้ว่าพระองค์ทรงเตรียมอะไรไว้ โชคดีที่หนึ่งในสามคนนั้นคืออาจารย์ฉีเฉิน ดูเหมือนว่าอาจารย์จะไม่โลภใช่ไหม? &quot;นอกจากอาจารย์ฉีเฉินแล้ว ข้าไม่เคยเห็นพวกท่านทั้งสองมาก่อนเลย พวกท่านควรแนะนำตัวหรือไม่?&quot; เซียวหลานหยวนกล่าว ในขณะนี้</p>\n<p>ออร่าอันน่าเกรงขามของตำแหน่งสูงของเขายังคงไม่ลดลง นักปราชญ์อาวุโสและท่านหญิงชิงสบตากันและลุกขึ้นยืน “ข้าสงสัยว่าองค์ชายจุนเคยได้ยินชื่อตระกูลหูแห่งปาฉินบ้างหรือไม่” นักปราชญ์ชราถาม “และตระกูลชิงแห่งมู่เฉิงด้วย” คุณหญิงชิงตอบ “ฮึ่ม—” ชิงอี้อดไม่ได้ที่จะอุทานออกมา สีหน้าของพ่อบ้านจงก็เปลี่ยนไปเล็กน้อย ฟู่จ้าวหนิงมองไปที่เซียวหลานหยวน ชายผู้นั้นสวมหน้ากาก สีหน้าจึงไม่ชัดเจน แต่ริมฝีปากของเขากลับนิ่งเฉย ราวกับไม่มีปฏิกิริยาใดๆ ตระกูลหูแห่งปาฉินและตระกูลชิงแห่งมู่เฉิง พวกเขามีความสำคัญถึงขนาดนั้นหรือ?</p>\n<p>ดูเหมือนเธอจะไม่เคยได้ยินชื่อมาก่อน แต่คนที่ได้รับความไว้วางใจจากจักรพรรดิผู้ทรงอำนาจให้ดูแลเรื่องสำคัญเช่นนี้ คงไม่ใช่ตระกูลธรรมดาๆ แน่นอน “ฝ่าบาท...” ชิงอี้เรียกองค์ชายจุนเบาๆ แม้แต่ฟู่จ้าวหนิงก็เข้าใจความหมายของเขา พวกเขาไม่ควรพยายามลดความตึงเครียดลงหรือ? เมื่อสักครู่ทั้งสองฝ่ายไม่ค่อยลงรอยกัน หากองค์ชายสามารถพูดอะไรที่ประนีประนอมได้ในตอนนี้ เพื่อเปิดทางให้อีกฝ่ายหนึ่งได้ ก็คงจะดีมาก น้ำเสียงของเซียวหลานหยวนยังคงไม่เปลี่ยนแปลง เขาพูดเพียงสองคำว่า “ข้าเคยได้ยินชื่อพวกเขา” แค่นั้นหรือ? ชิงอี้พูดไม่ออก แต่เขาไม่ได้พูดอะไรอีก กลับยืดหลังตรงและไม่แสดงสีหน้าใดๆ อีกต่อไป องค์ชายไม่ต้องการให้เกียรติคนเหล่านี้ และในฐานะผู้ใต้บังคับบัญชา เขาไม่อาจทำให้องค์ชายอับอายไปมากกว่านี้ได้ มันก็แค่ตระกูลหูและตระกูลชิงไม่ใช่หรือ?</p>\n<p>“อ่า แต่ข้าไม่เคยได้ยินมาก่อน” ฟู่จ้าวหนิงถามอย่างสงสัย “เป็นตระกูลที่มีอำนาจ สูงส่ง และมีอิทธิพลมากกว่าราชวงศ์หรือ? เหนือกว่าราชวงศ์หรือ?” “ไร้สาระ!” “อย่าพูดไร้สาระ!” คุณหญิงชิงและนักปราชญ์อาวุโสต่างเปลี่ยนสีหน้าและตะโกน พวกเขากล้าที่จะกล่าวหาอย่างร้ายแรงเช่นนี้ได้อย่างไร? ใครบอกว่าพวกเขาเหนือกว่าราชวงศ์? นี่เป็นการก่อกบฏหรือ?</p>\n<p>ฟู่จ้าวหนิงกางมือออก “ในเมื่อไม่ใช่ แล้วทำไมเจ้าถึงทำตัวหยิ่งยโสต่อหน้าองค์ชายจุน ราวกับว่าเจ้าเป็นบุคคลสำคัญที่สุดในโลก? ชิ!” เธอหัวเราะเยาะอย่างประชดประชัน คุณหญิงชิงผู้หยิ่งผยองและนักปราชญ์ชราต่างก็เสียหน้า “ผู้มีพระคุณหนุ่มฟู่ ข้าพเจ้าคือพระภิกษุผู้ต่ำต้อยนามว่าฉีเฉิน” อาจารย์ฉีเฉินยิ้มอย่างใจดี “สวัสดีค่ะ ท่านอาจารย์” ฟู่จ้าวหนิงโบกมือให้เขาอย่างอบอุ่น การปฏิบัติอย่างให้ความสำคัญเป็นพิเศษเช่นนี้ทำให้คนอีกสองคนรู้สึกไม่พอใจ ชายหนุ่มที่อยู่ข้างๆ นักปราชญ์ชรามองฟู่จ้าวหนิงด้วยความสงสัย เขาพบว่าฟู่จ้าวหนิงค่อนข้างน่าขบขัน องค์ชายจุนเหลือบมองเขา จากนั้นน้ำเสียงของเขาก็เย็นชาเล็กน้อย</p>\n<p>“พวกเจ้าทั้งสามมาที่นี่เพื่อคืนสิ่งของที่จักรพรรดิผู้ทรงสละราชสมบัติมอบหมายให้เก็บรักษาไว้หรือ?” “พระอมิตาภะ” อาจารย์ชิเฉินกล่าว “พระภิกษุผู้ต่ำต้อยรูปนี้มีของสำคัญอยู่จริง ๆ ซึ่งข้าพเจ้าได้นำมาคืนให้แก่เจ้าของโดยเฉพาะอย่างยิ่ง” ขณะที่พูด เขาก็หยิบกล่องขนาดเท่าฝ่ามือออกมาจากแขนเสื้อ กล่องนั้นแบนมากและดูเหมือนจะใส่ได้แค่จดหมายหรือสิ่งของเล็ก ๆ น้อย ๆ เท่านั้น กล่องดูธรรมดามาก ทันทีที่หยิบกล่องออกมา ฟู่จ้าวหนิงก็สังเกตเห็นว่านักปราชญ์ชราและมาดามชิงต่างจ้องมองกล่องนั้น ทำไมทั้งสองถึงทำราวกับว่าอยากจะรีบวิ่งไปแย่งมันมา?</p>\n<p>ฟู่จ้าวหนิงรู้สึกว่าการที่องค์ชายจุนหวางจะได้ของคืนอาจไม่ใช่เรื่องง่าย นี่แตกต่างจากที่เธอคิดไว้โดยสิ้นเชิง “มาดามชิงและข้าพเจ้าไม่มีของสำคัญใด ๆ พวกมันอยู่กับหัวหน้าครอบครัวของเรา” นักปราชญ์ชราเบี่ยงสายตาและกล่าวกับองค์ชายจุนว่า “พวกเราเป็นเพียงสาขาของตระกูลที่ยังคงอยู่ในเมืองหลวง เมื่อทราบเรื่องการแต่งงานขององค์ชายจุนและการที่เจ้าหญิงจุนผ่านการทดสอบแล้ว พวกเราจึงส่งข่าวไปยังตระกูลใหญ่ หัวหน้าตระกูลจะนำของกำนัลไปส่งที่เมืองหลวงด้วยตนเอง” ยุ่งยากขนาดนั้นเลยหรือ? “แล้วของกำนัลระหว่างสองตระกูลของท่านคืออะไร?” องค์ชายจุนถาม เขาเริ่มหมดความอดทน</p>\n<p>สงสัยว่าชายชราคิดอะไรอยู่ถึงได้ทำให้เรื่องยุ่งยากขนาดนี้ “พวกเราไม่รู้ มีแต่หัวหน้าตระกูลเท่านั้นที่รู้” อาจารย์ฉีเฉินยื่นกล่องให้ ชิงอี้รับกล่องมาตรวจสอบอย่างละเอียด แล้วจึงนำไปมอบให้องค์ชายจุน เซียวหลานหยวนรับกล่องมา รู้สึกถึงความเย็นยะเยือกของมัน เขารู้สึกหนาวอยู่แล้ว จึงรีบยัดกล่องใส่อ้อมแขนของฟู่จ้าวหนิงโดยไม่คิดอะไร ฟู่จ้าวหนิง: “...” อะไรนะ?</p>\n<p>เขาไม่กลัวว่าเธอจะซ่อนมันเหรอ? “เก็บไว้ก่อนเถอะ” เซียวหลานหยวนรู้ตัวว่าทำผิดพลาด ฟู่จ้าวหนิงอุทานว่า “อ๋อ” แล้ววางมือลงบนกล่อง “พระภิกษุผู้ต่ำต้อยอย่างข้าพเจ้าไม่รู้อะไรมากนัก ตอนนั้นข้าพเจ้าตกลงที่จะเก็บของที่ระลึกนี้ไว้ให้จักรพรรดิผู้ทรงสละราชสมบัติเพราะข้าพเจ้าปฏิเสธพระองค์ไม่ได้ ของที่ระลึกนี้จะต้องส่งมอบสามวันหลังจากงานแต่งงานขององค์ชายจุน ตอนนี้ธุระของข้าพเจ้าเสร็จสิ้นแล้ว ข้าพเจ้าจะไม่อยู่ที่นี่อีกต่อไป” อาจารย์ฉีเฉินลุกขึ้นยืนและมองไปที่ฟู่จ้าวหนิง “ผู้มีพระคุณหนุ่มฟู่ โปรดออกมาคุยกับพระภิกษุผู้ต่ำต้อยอย่างข้าพเจ้าสักครู่ได้ไหม”</p>"}, "59": {"chapter_number": 59, "chapter_title": "第59章這是你的歸處", "content": "<p>ฟู่จ้าวหนิงคิดอยู่ครู่หนึ่ง จากนั้นก็โยนกล่องให้ชิงอี้ ชิงอี้ตกใจและรีบรับไว้ “ฉันจะไปส่งอาจารย์ข้างนอก พวกเธอสองคนคุยกันต่อไปเถอะ” ยังไงก็ตาม ภารกิจของเธอก็น่าจะเสร็จแล้วไม่ใช่เหรอ? เธอไม่สนใจว่าเซียวหลานหยวนจะเถียงกับสองคนนั้นยังไง สุดท้ายแล้วเขาจะได้อะไรก็ไม่ใช่เรื่องของเธอ ฟู่จ้าวหนิงเห็นอาจารย์ฉีเฉินอยู่ข้างนอก ใต้ต้นไลแลคในสวน อาจารย์ฉีเฉินหยุดอยู่ตรงนั้น เขาหันมามองฟู่จ้าวหนิง จากนั้นก็เอื้อมมือออกไป นิ้วของเขายังคงถือลูกประคำอยู่ และลูบหัวฟู่จ้าวหนิง “!” ฟู่จ้าวหนิงเกือบจะตอบสนอง แต่เมื่อสบตากับสายตาที่เปี่ยมด้วยความเมตตาของอาจารย์ฉีเฉิน เธอก็ควบคุมตัวเองได้ เธอยืนอยู่ตรงนั้น</p>\n<p>ปล่อยให้อาจารย์ฉีเฉินลูบหัวเธอสามครั้ง ตุบ ตุบ ตุบ ฟู่จ้าวหนิงราวกับได้ยินเสียงแผ่วเบาจากระยะไกลสามครั้ง เหมือนเสียงระฆังโบราณ หรือเสียงสวดมนต์ของพุทธศาสนา ชั่วขณะหนึ่ง เธอรู้สึกสับสนงุนงง ลืมไปว่าตัวเองอยู่ที่ไหน ใครอยู่ข้างๆ และเสียงรอบข้างดูเหมือนจะหายไปหมด หลังจากนั้นไม่นาน เสียงของอาจารย์ฉีเฉินก็ดังขึ้น “ผู้มีพระคุณ” เมื่อได้ยินเสียงของเขา สายตาของฟู่จ้าวหนิงก็พลันมองเห็นเขาชัดเจนอีกครั้ง “อาจารย์?” “ท่านแค่เดินทางไกล ที่นี่คือบ้านที่แท้จริงของท่าน จงดูแลตัวเองด้วย” หลังจากพูดจบ อาจารย์ฉีเฉินก็พึมพำว่า “อมิตาภะ” แล้วหันหลังเดินจากไป ฟู่จ้าวหนิงตกตะลึง มองดูร่างของเขาที่เดินจากไป</p>\n<p>เธอรู้สึกถึงการเปลี่ยนแปลงในจิตใจอย่างกะทันหัน ก่อนหน้านี้ ดูเหมือนว่าเธอจะใช้ชีวิตเป็นตัวแทนของ “คุณหนูฟู่” และเธอยังมีความเห็นอกเห็นใจอาจารย์ฟู่ผู้เฒ่า มองเขาเหมือนปู่ของเธอ แต่ตอนนี้ เธอรู้สึกว่าเธอเป็น “คุณหนูฟู่” อย่างแท้จริง เธอคิดถึงตระกูลฟู่และรู้สึกถึงความเป็นส่วนหนึ่ง ดูเหมือนว่าในที่สุดเธอก็ได้หลอมรวมเข้ากับร่างนี้อย่างสมบูรณ์แล้ว อาจารย์ฉีเฉินหมายความว่าอย่างไร ตัวตนก่อนหน้านี้ของเธอในฐานะอัจฉริยะทางการแพทย์ ประสบการณ์ในชาตินั้น เป็นเพียงการเดินทางที่เธอผ่านมาใช่หรือไม่?</p>\n<p>เธอกลับมาแล้วหรือ? กลับคืนสู่ตัวตนเดิมของเธอ? เธอคือฟู่จ้าวหนิงใช่หรือไม่? ฟู่จ้าวหนิงคือเธอใช่หรือไม่?</p>\n<p>ลมพัดมาเบาๆ ทำให้ฟู่จ้าวหนิงรู้สึกตัวมากขึ้น เธอรีบออกไปเพื่อตามหาอาจารย์ฉีเฉินและสอบถามข้อมูลเพิ่มเติม แต่กลับเห็นเพียงรถม้าธรรมดาๆ คันหนึ่งแล่นออกไปไกลๆ ฟู่จ้าวหนิงรู้สึกอย่างบอกไม่ถูกว่า จุดประสงค์หลักของอาจารย์ฉีเฉินในครั้งนี้คือการทำให้เธอลำบาก อาจารย์ฉีเฉินรู้ตัวตนของเธอหรือไม่? &quot;ฝ่าบาท เกิดอะไรขึ้นหรือคะ?&quot; เฟินซิงรีบวิ่งเข้ามามองเธอด้วยความเป็นห่วง เจ้าหญิงยืนอยู่คนเดียวที่ประตู ไม่รู้จะทำอย่างไร &quot;ไม่มีอะไรค่ะ&quot; ฟู่จ้าวหนิงหันกลับมาและยิ้มเล็กน้อยให้เธอ &quot;เข้าไปข้างในเถอะ&quot; เมื่อเธอเข้าไป คนข้างในก็ออกมาหมดแล้ว กลุ่มคนนั้นมีจำนวนมากและดูน่าเกรงขาม</p>\n<p>แต่สีหน้าของพวกเขากลับดูไม่ค่อยพอใจนัก อาจเป็นเพราะพวกเขากำลังเก็บความโกรธที่มีต่อเซียวหลานหยวนเอาไว้ พวกเขาเดินเข้ามาหาเธอ และเมื่อเห็นฟู่จ้าวหนิง สีหน้าของพวกเขาก็ดูลังเลอย่างเห็นได้ชัด แต่พวกเขาก็ยังโค้งคำนับให้เธอ “พระสนมจุน ลาก่อน” ฟู่จ้าวหนิงโบกมืออย่างเกียรติคร้านและไม่ใส่ใจนัก หลังจากที่พวกเขาจากไป เธอก็รีบวิ่งเข้าไปในห้องโถงและเห็นเซียวหลานหยวนเอนหลังพิงเก้าอี้เท้าแขน ไม่สามารถนั่งตัวตรงได้เลย เขาใช้มือข้างหนึ่งค้ำศีรษะและเงยหน้ามองเธอ “กว่าตระกูลหูและชิงจะส่งของกำนัลมาคงต้องใช้เวลาสักพัก ถึงตอนนั้น ข้าก็ยังต้องการพระสนมอยู่เคียงข้าง</p>\n<p>ดังนั้นอย่าพูดเรื่องการหย่าร้างหรือการแยกทางกันอีกเลย” เขาคิดว่าเธอเข้ามาเพื่อจะพูดเรื่องการหย่าร้างอีกครั้ง จึงขวางทางเธอไว้ก่อนที่เธอจะพูดอะไร ฟู่จ้าวหนิงเดินไปนั่งลงข้างๆ เขา “ในเมื่อตอนนี้หย่าไม่ได้ คุณก็ควรจะมีชีวิตอยู่ต่อไปก่อน ฉันไม่อยากให้สามีของฉันตายในคืนวันแต่งงาน” ฟู่จ้าวหนิงคิดออกแล้ว ฐานะพระสนมของจุนมีทั้งข้อดีและข้อเสีย ในเมื่อตอนนี้หย่าไม่ได้ เธอจึงพยายามทำให้สถานการณ์สงบลงก่อน แต่ถ้าองค์ชายจุนตายเพียงไม่กี่วันหลังแต่งงาน จะต้องมีข่าวลือมากมายในเมืองหลวงที่ส่งผลเสียต่อเธออย่างแน่นอน ผู้คนจะกล่าวหาว่าเธอสาปแช่งสามีให้ตาย ยิ่งไปกว่านั้น</p>\n<p>จักรพรรดิและจักรพรรดินีก็กำลังจับตามององครักษ์เงามังกรและตราประทับแห่งอาณาจักรจ้าวที่อยู่ในครอบครองขององค์ชายจุนอย่างชัดเจน ถ้าหากเขาตาย และจักรพรรดิไม่สามารถรับช่วงต่อสิ่งเหล่านั้นได้อย่างราบรื่น เธอซึ่งเป็นหญิงอ่อนแอที่มีฐานะเป็นพระสนมของจุนจะต้องเผชิญกับพายุร้ายมากมายอย่างแน่นอน ดังนั้นเขาจึงห้ามตายในตอนนี้เด็ดขาด แต่เขากลับเป็นลมและเลือดกำเดาไหล ร่างกายยังเย็นเฉียบ เมื่อเธอตรวจชีพจร เธอก็รู้ว่าเขาใกล้ตายแล้ว เซียวหลานหยวนรู้สึกจุกในอก ไม่อยากให้สามีตายในคืนแต่งงานงั้นหรือ?</p>\n<p>แต่เขาอดทนต่อไปไม่ไหวแล้ว เขาอดทนอยู่ต่อหน้าคนเหล่านั้นได้ก็เพราะพลังใจอันน่าเกรงขามของเขาเท่านั้น ตอนนี้ การหลอกฟู่จ้าวหนิงเป็นไปไม่ได้แล้ว “ไปหาไหมโลหิตมาให้ข้า แล้วข้าจะทำสิบอย่างให้ท่าน” เซียวหลานหยวนคว้ามือเธอไว้ เลือดซึมออกมาจากมุมปากเล็กน้อย ชิงอี้ตกใจ “ฝ่าบาท!” ฟู่จ้าวหนิงสบตากับเซียวหลานหยวนและตกลงอย่างรวดเร็ว “ตกลง!” ชิงอี้เบิกตาโตมองฟู่จ้าวหนิงอีกครั้ง นั่นคือไหมโลหิต ไม่ใช่สิ่งที่หาได้ง่ายๆ ไห่ฉางจุนคงไม่ให้เธอ แล้วเธอจะไปหามันมาจากไหน? ไห่ฉางจุนไม่ชอบเธออย่างชัดเจน ดังนั้นเขาไม่มีทางยอมให้ไหมโลหิตกับเธอแน่ๆ ฝ่าบาทจะมอบเรื่องสำคัญเช่นนี้ให้ฝ่าบาทได้อย่างไร?</p>\n<p>ฟู่จ้าวหนิงหลุดจากการจับกุมของเสี่ยวหลานหยวนแล้วจึงพูดกับชิงอี้ว่า “ส่งเขากลับไปนอน คราวนี้เราต้องฝังเข็มทั่วทั้งตัว” “ครับ” ชิงอี้ไม่กล้าชักช้า รีบพาเสี่ยวหลานหยวนกลับไปที่ห้องพัก ฟู่จ้าวหนิงสั่งการหลายอย่าง “เตรียมอ่างน้ำร้อนสองอ่าง ผ้าขนหนูสะอาด เหล้าแรงหนึ่งเหยือก ตะเกียงน้ำมัน และให้หงจั่วกับเฟินซิงมาด้วย บดหมึกและเตรียมกระดาษ ฉันจะอ่านใบสั่งยาให้ฟัง แล้วพวกเจ้าสองคนไปเอายามาเร็วๆ” ​​เมื่อเห็นท่าทีและน้ำเสียงที่จริงจังของฟู่จ้าวหนิง ชิงอี้จึงยืดหลังตรงโดยไม่รู้ตัวและรีบตอบว่า “ครับ!” เขารู้สึกว่าเมื่อฟู่จ้าวหนิงเริ่มรักษาคนไข้ เธอก็เหมือนคนละคน แผ่รัศมีแห่งความน่าเกรงขามและโน้มน้าวใจ</p>\n<p>ทำให้ผู้คนเชื่อและเชื่อฟังเธอโดยไม่รู้ตัว หงจั่วและเฟินซิงก็มาถึงเช่นกัน ขณะที่ฟู่จ้าวหนิงกำลังอ่านตำรับยา เธอก็ล้างมือ เช็ดให้แห้ง แล้วคว้าปกเสื้อของเซียวหลานหยวน ดึงเปิดออกทั้งสองข้างอย่างคล่องแคล่ว หงจั่วและเฟินซิงหันมาเมื่อได้ยินเสียงและเห็นหน้าอกเปลือยเปล่าขององค์ชาย สองสาวรีบหันหน้าไปทันที หูแดงก่ำ “พระสนม…” เซียวหลานหยวนอ่อนแรงเกินกว่าจะคว้ามือเธอไว้ได้ สติของเขากำลังเลือนลาง ในช่วงเวลาก่อนที่เขาจะหมดสติ เขาเห็นสีหน้าจริงจังและมุ่งมั่นของฟู่จ้าวหนิง ไม่มีร่องรอยของอารมณ์ใดๆ ในดวงตาของเธอ นี่คือหมอที่แท้จริง นี่คือความรู้สึกของเซียวหลานหยวนในขณะที่เขาหมดสติ</p>\n<p>เขารู้สึกสบายใจอย่างยิ่งที่ได้มอบตัวเองให้ฟู่จ้าวหนิง ฟู่จ้าวหนิงหยิบเข็มเงินออกมา ฆ่าเชื้อแต่ละเล่มด้วยไฟ แล้วนั่งข้างเตียงของเซียวหลานหยวนเพื่อทำการฝังเข็ม หงจั่วและเฟินซิงเงยหน้ามองเธอเป็นครั้งคราว เฝ้ามองเข็มของเธอที่ขยับขึ้นลง การเคลื่อนไหวที่รวดเร็วและพลิ้วไหว การแทงเข็มที่เด็ดขาดและแม่นยำ ราวกับว่าเธอเคยทำเช่นนี้มานับครั้งไม่ถ้วน ในขณะนั้นเอง ทหารองครักษ์หลายคนกำลังคุ้มกันรถม้าไปยังที่พักขององค์ชายจุน หญิงสาวสองคน อายุประมาณสิบแปดหรือสิบเก้าปี นั่งอยู่ในรถม้า</p>"}, "60": {"chapter_number": 60, "chapter_title": "第60章兩個大丫鬟", "content": "<p>“จินเสวี่ย ฉันเป็นห่วงองค์ชายมากในช่วงสองสามวันที่ผ่านมา” หญิงสาวผู้พูดนั้นงดงามและเปล่งประกาย สวมชุดสีขาวประดับด้วยสีชมพูและม่วง ท่าทางของเธอดูสง่างาม ไม่มีใครสงสัยเลยว่าเธอเป็นลูกสาวของตระกูลร่ำรวย หญิงสาวที่นั่งอยู่ตรงข้ามมีใบหน้ากลมเล็กน้อย มีลักยิ้มและดวงตาที่ยิ้มแย้ม ทำให้เธอดูมีเสน่ห์ แต่คิ้วของเธอค่อนข้างคมเกินไป ทำให้เสน่ห์ของเธอลดลงไปบ้าง และเมื่อเธอไม่ยิ้ม เธอก็อาจดูโกรธเล็กน้อย แต่ไม่ต้องสงสัยเลยว่าทั้งสองสาวนั้นสวยงามมาก “ฉันก็เป็นห่วงองค์ชายเช่นกัน ฉันสงสัยว่าผู้ดูแลจงได้อบรมสั่งสอนคนรับใช้ในคฤหาสน์อย่างเหมาะสมหรือไม่ตลอดหลายปีที่ผ่านมา</p>\n<p>เราปล่อยให้พวกเขาประมาทและละเลยการดูแลองค์ชายไม่ได้” “ถ้าหากไม่มีใครส่งข้อความมาเร่งให้องค์ชายเสด็จกลับเมืองหลวงอย่างเร่งด่วน องค์ชายก็คงไม่ต้องทิ้งพวกเราไว้ข้างหลัง และองค์ชายจะทนการเดินทางที่เร่งรีบเช่นนี้ได้อย่างไร” “ค่ะ พี่ไป๋ซวง ท่านรู้ไหมว่าใครส่งข้อความไปให้องค์ชาย ทำไมองค์ชายถึงเชื่อฟังคนที่เขียนข้อความนั้น” สองสาวใช้ที่ว่านี้คือจินเสวี่ยและไป๋ซวง สาวใช้ชั้นหนึ่งของคฤหาสน์องค์ชายจุน ชิงอี้และคนอื่นๆ ไม่สามารถทำงานละเอียดถี่ถ้วนได้เท่าสาวใช้ เช่น ซักผ้า เย็บปักถักร้อย ชงชา เสิร์ฟอาหาร และจัดบ้าน ดังนั้นงานเหล่านี้จึงตกเป็นของจินเสวี่ยและไป๋ซวงมาโดยตลอด ตลอดหลายปีที่ผ่านมา</p>\n<p>พวกเธอติดตามองค์ชายจุนไปยังยอดเขาโย่วชิงและแทบจะไม่เคยกลับไปเมืองหลวงเลย เมื่อได้ยินคำถามของจินเสวี่ย ไป๋ซวงจึงส่ายหัว “ฉันจะไปรู้เรื่องพวกนี้ได้อย่างไร” พวกเธอไม่มีสิทธิ์ที่จะถามเรื่องพวกนี้ “จริงด้วย” จินเสวี่ยเปิดม่านรถม้าและมองไปข้างหน้า “พี่ไป่ซวง เรามาถึงวังแล้ว” เมื่อได้ยินว่าจินเสวี่ยและไป่ซวงกลับมาแล้ว คุณชายจงก็ถอนหายใจโล่งอกทันทีและออกมาต้อนรับพวกเธอ “จินเสวี่ย ไป่ซวง ในที่สุดพวกเธอก็มาถึงแล้ว” “คุณชายจง นานแล้วนะที่เราไม่ได้เจอกัน ท่านยังดูไม่เปลี่ยนไปเลย” จินเสวี่ยยิ้มให้เขา การกลับมายังวังทำให้รู้สึกเหมือนได้กลับบ้าน และเธอก็รู้สึกผ่อนคลายขึ้นมาก</p>\n<p>เพราะเธอและไป่ซวงเป็นนางกำนัลชั้นหนึ่งในวัง และในแง่หนึ่ง เพราะพวกเธอรับใช้องค์ชายมาโดยตลอด สถานะของพวกเธอจึงสูงกว่าคุณชายจงเสียอีก เหล่าข้ารับใช้ต่างเข้ามาโค้งคำนับพวกเธอ ไป่ซวงมองดูพวกเขาโค้งคำนับเธอ และความรู้สึกคลุมเครือว่าตัวเองเป็นนายหญิงของวังก็ผุดขึ้นมาในใจ เธอส่ายหัวอย่างลับๆ ไล่ความคิดไร้สาระนี้ออกไปอย่างรวดเร็ว “พวกเจ้าสองคนยิ่งสวยขึ้นเรื่อยๆ ตามอายุ ตอนนี้สวยกว่าคุณหนูผู้สูงศักดิ์ทั้งหลายเสียอีก” ผู้ดูแลจงอดไม่ได้ที่จะชมสองสาวใช้ผู้สง่างามและงดงาม ไป๋ซวงยิ้ม “ผู้ดูแลจงนี่พูดจาดีจริงๆ ช่วงนี้” เธอมองไปรอบๆ คฤหาสน์ นอกจากดอกไม้และต้นไม้ที่ดูสูงและเขียวชอุ่มขึ้นแล้ว</p>\n<p>ก็ไม่มีอะไรเปลี่ยนแปลงไป ซึ่งทำให้เธอพอใจ “โชคดีที่ผู้ดูแลจงอยู่ที่นี่ คฤหาสน์จึงได้รับการดูแลเป็นอย่างดี” ไป๋ซวงกล่าว ผู้ดูแลจงรู้สึกว่ามีบางอย่างผิดปกติ แต่ก็บอกไม่ถูก “องค์ชายอยู่ที่ไหน” ไป๋ซวงถามอย่างเร่งรีบ จินเสวี่ยซึ่งกำลังสั่งให้คนรับใช้ขนของเข้ามาก็ถามขึ้นเช่นกัน “ครับ องค์ชายอยู่ในคฤหาสน์หรือเปล่าครับ” “ครับ องค์ชายอยู่ในห้องบรรทม” ก่อนที่เขาจะพูดจบ ไป๋ซวงและจินเสวี่ยก็เดินไปยังห้องบรรทมขององค์ชายโดยไม่ได้นัดหมายล่วงหน้า “คนรับใช้จง กรุณาย้ายของพวกนั้นไปที่ลานบ้านของเราก่อน เราต้องรีบไปเข้าเฝ้าองค์ชาย” “ฉันสงสัยว่าใครเป็นคนปรนนิบัติองค์ชายในช่วงสองสามวันที่ผ่านมา</p>\n<p>และชาที่ชงนั้นถูกใจองค์ชายหรือไม่” คนรับใช้จงมองอย่างเหม่อลอย โบกมืออย่างเปล่าประโยชน์ เขาอ้าปากจะพูด แต่จินเสวี่ยและไป๋ซวงก็เดินจากไปแล้ว รีบร้อนนักหรือ? เขายังไม่ได้บอกพวกเธอเลยว่ามีเจ้าหญิงอยู่ในวังแล้ว อย่างไรก็ตาม คนรับใช้จงไม่ได้ใส่ใจมากนัก สาวใช้สองคนนี้รับใช้องค์ชายมาตลอด ควรจะสุภาพและรู้จักหน้าที่ของตน พวกเธอยังไม่ทันได้พักผ่อนหลังจากกลับมาก็รีบไปปรนนิบัติองค์ชายแล้ว นี่แสดงให้เห็นว่าพวกเธอห่วงใยองค์ชายมากเพียงใด ไม่แปลกใจเลยที่องค์ชายพาพวกเธอมาด้วย ฟู่จ้าวหนิงแทบจะตรึงเสี่ยวหลานหยวนไว้กับที่ นอกจากหน้าอกแล้ว ยังมีแขนและขาของเขาอีกด้วย “ไปดูซิว่าชิงอี้เตรียมยาเสร็จหรือยัง ถ้าเสร็จแล้ว</p>\n<p>ต้ม 70% เป็นยาต้มสำหรับอาบน้ำให้เสี่ยวหลานหยวน ส่วนอีก 30% ที่เหลือ ต้มในหม้อสมุนไพรอีก 15 นาที แล้วใส่เปลือกส้มแห้งสักสองสามชิ้นและดอกฟริทิลลาเรียสักช้อน ต้มต่ออีก 15 นาที แล้วเทใส่ชามนำมาให้” หงจั่วและเฟินซิงไม่กล้ามองไปทางองค์ชายจุน พอได้ยินคำพูดของฟู่จ้าวหนิงก็รีบตอบและถอยออกไป แง้มประตูไว้เล็กน้อย ทันทีที่นางกำนัลทั้งสองออกไป จินเสวี่ยและไป๋ซวงก็มาถึง ยามที่ประจำอยู่ในลานบ้านไม่ได้ออกมาขัดขวางพวกเธอเมื่อเห็นว่าเป็นจินเสวี่ยและไป๋ซวง พวกเขาทุกคนรู้ว่าสองคนนี้เป็นนางกำนัลประจำขององค์ชาย จินเสวี่ยและไป๋ซวงเข้าไปในลานบ้านและมองไปรอบๆ “ทำไมเราไม่ไปดูชิงอี้ล่ะ” ชิงอี้ควรจะอยู่ข้างๆ</p>\n<p>องค์ชายตลอดเวลา ในขณะนั้น ฟู่จ้าวหนิงที่อยู่ในห้องได้หยิบยาบำรุงหัวใจออกมาจากห้องยาและฉีดเข้าไปในตัวเสี่ยวหลานหยวน ยานี้ก็เป็นยาที่เธอทำไว้ก่อนหน้านี้และมีค่ามาก หากจำเป็น มันสามารถช่วยชีวิตผู้ป่วยจากความตายได้โดยตรง ยาฉีดบำรุงหัวใจชนิดนี้เคยมีผู้มีอำนาจและร่ำรวยหลายคนมอบให้เธอ โดยแต่ละครั้งมีราคาหลายล้าน “ถือว่าเป็นการต่อรองราคาสำหรับคุณ” ฟู่จ้าวหนิงกล่าวกับเสี่ยวหลานหยวนหลังจากดึงเข็มออก หากไม่ใช่เพราะเขาให้สัญญาไว้สิบอย่าง เธอคงไม่เต็มใจที่จะใช้ยาฉีดบำรุงหัวใจกับเขา เธอดึงเข็มเงินทั้งหมดออกจากตัวเขา ใส่กลับเข้าไปในถุงเข็ม และวางแผนที่จะฆ่าเชื้ออย่างถูกต้องในภายหลัง เมื่อเธอเก็บถุงเข็มเสร็จ</p>\n<p>เธอก็ลุกขึ้นยืนและยืดไหล่ เตรียมที่จะดึงเสื้อผ้าขององค์ชายจุนขึ้น เมื่อมีเสียงชัดเจนดังมาจากประตู “ฝ่าบาท ข้าพเจ้าบ่าวสาวไป๋ซวง บ่าวสาวจินเสวี่ย และข้าพเจ้ากลับมาแล้ว” จากนั้นก็มีเสียงอีกเสียงหนึ่งกล่าวว่า “ฝ่าบาท ชิงอี้ไม่ได้อยู่ข้างนอก พวกเราเข้าไปได้ไหม” ฟู่จ้าวหนิงมองไปที่เซียวหลานหยวนซึ่งยังคงหลับตาอยู่ และตอบว่า “ไม่ได้” เธอได้ยินหงจั่วและเฟินซิงพูดถึงจินเสวี่ยและไป๋ซวง พวกเขาเป็นหัวหน้าบ่าวสาวของเซียวหลานหยวน และเธอได้ยินมาว่าเนื่องจากเซียวหลานหยวนรีบกลับไปยังเมืองหลวงก่อน บ่าวสาวทั้งสองจึงตามหลังมาพร้อมกับเสบียง พวกเขากลับมาถึงคฤหาสน์แล้วหรือยัง?</p>\n<p>แต่เซียวหลานหยวนเพิ่งเสร็จสิ้นการฝังเข็ม และตอนนี้จุดฝังเข็มของเขาเปิดออก รูขุมขนขยาย และในไม่ช้าเขาก็จะเหงื่อออกมาก ร่างกายของเขาอ่อนแอที่สุด และเขาไม่สามารถสัมผัสกับลมหรือความหนาวเย็น หรือฝุ่นละอองหรือเชื้อโรคได้ จินเสวี่ยและไป๋ซวงเพิ่งกลับมาจากการเดินทางไม่กี่วัน และฟู่จ้าวหนิงยังไม่เคยเห็นพวกเขามาก่อน เธอไม่รู้ว่าพวกเขาเป็นหวัดหรือป่วยเป็นโรคอะไร หรืออาจจะเปื้อนฝุ่นมาจากการเดินทาง การที่พวกเขาเข้ามาตอนนี้จึงไม่เหมาะสม แต่เธอกลับพูดเพียงสองคำ ซึ่งดังราวกับฟ้าร้องในท้องฟ้าแจ่มใสสำหรับจินเสวี่ยและไป๋ซวง “พวกเจ้าเป็นใคร? ทำไมพวกเจ้าถึงอยู่ในห้องขององค์ชาย?!” จินเสวี่ยและไป๋ซวงมองหน้ากันด้วยความตกใจ แล้วรีบวิ่งเข้าไปพร้อมกัน</p>"}, "61": {"chapter_number": 61, "chapter_title": "第61章我會扎死他", "content": "<p>นางกำนัลสองคนรีบวิ่งเข้ามาและเห็นฟู่จ้าวหนิงยืนอยู่ข้างเตียง จากนั้นพวกเธอก็เห็นองค์ชายจุนนอนอยู่บนเตียง สิ่งที่น่าตกใจคือ เสื้อผ้าขององค์ชายจุนไม่ได้ดึงให้เรียบร้อย กางเกงถูกพับขึ้นสูง เสื้อคลุมเปิดออก และเขานอนอยู่ตรงนั้นดูอ่อนแอและบอบบางอย่างเหลือเชื่อ ฟู่จ้าวหนิงที่ยืนอยู่ข้างเตียงเช็ดเหงื่อจากหน้าผากหลังจากนวดและฝังเข็ม ผมของเธอยุ่งเล็กน้อย เธอยืนอยู่ตรงนั้นโน้มตัวลง ดูเหมือนเพิ่งลุกจากเตียง จินเสวี่ยและไป๋ซวงเห็นเช่นนั้นก็รู้สึกราวกับหัวใจถูกกระแทกหลายครั้ง จิตใจว่างเปล่า มีแต่ความโกรธและความตื่นตระหนก “ฝ่าบาท!” ไป๋ซวงรีบวิ่งเข้ามาอย่างกระวนกระวาย “เจ้าโจรหญิงชั่ว เตรียมตายได้เลย!”</p>\n<p>อย่างไรก็ตาม จินเสวี่ยจ้องมองและชักดาบอ่อนจากเอวของเธอ แทงปลายดาบไปที่ฟู่จ้าวหนิง เจ้าชายจุน ชายผู้สง่างามและเหนือโลกราวกับเซียนที่ถูกเนรเทศ กลับมาถูกหญิงเช่นนี้แตะต้อง! &quot;เดี๋ยวก่อน...&quot; เมื่อเห็นปฏิกิริยาของพวกนาง ฟู่จ้าวหนิงก็รู้ว่าสาวใช้ทั้งสองไม่รู้เรื่องความสัมพันธ์ของเธอกับเจ้าชายจุนและเข้าใจผิด ดังนั้นถึงแม้จินเสวี่ยจะโจมตีเธอ เธอก็ไม่โกรธและพยายามอธิบาย เพื่อแสดงให้จินเสวี่ยเห็นว่าเธอปลอดภัย ฟู่จ้าวหนิงถึงกับยกมือขึ้น แต่จินเสวี่ยไม่ให้โอกาสเธออธิบาย &quot;ฉันจะตัดมือแก!&quot; จินเสวี่ยจำได้ว่าเธอเคยฉีกเสื้อผ้าของเจ้าชาย จึงกัดฟันด้วยความเกลียดชัง</p>\n<p>ดาบของเธอวาบเฉียบคมและเล็งไปที่ข้อมือของฟู่จ้าวหนิงอย่างแม่นยำ &quot;ฉันแต่งงานกับเซียวหลานหยวนแล้ว!&quot; ฟู่จ้าวหนิงดึงมือกลับ หันหลัง และรีบขวางทางของไป๋ซวง &quot;อย่าเข้ามาใกล้ฉัน!&quot; ตอนนี้ไป๋ซวงไม่สามารถแตะต้องเซียวหลานหยวนได้ เธอไม่อยากให้ความพยายามทั้งหมดที่ผ่านมาสูญเปล่า “ยัยโจรหน้าด้าน!</p>\n<p>ฝันกลางวันอะไรกัน!” ใบหน้าของจินเสวี่ยแดงก่ำด้วยความโกรธ “แกยังกล้าเรียกองค์ชายด้วยชื่ออีกเหรอ!” ใบหน้าของไป๋ซวงก็เย็นชาเช่นกัน เธอใช้ฝ่ามือฟาดไปที่หน้าอกของฟู่จ้าวหนิง สาวใช้ทั้งสองคนถูกเซียวหลานหยวนพามาด้วย เพราะพวกเธอมีฝีมือด้านการต่อสู้ ไม่ใช่คนอ่อนแอหรือบอบบาง อย่างไรก็ตาม ฟู่จ้าวหนิงที่กำลังถูกพวกเธอโจมตีอยู่นั้น ไม่ได้ชื่นชมฝีมือการต่อสู้ของพวกเธอเลย สาวใช้ทั้งสองคนดูเหมือนจะประสานงานกันโจมตีอยู่บ่อยครั้ง จึงทำให้พวกเธอทำงานเป็นทีมได้อย่างยอดเยี่ยม ดาบของจินเสวี่ยเล็งไปที่ข้อมือ หัวใจ และลำคอของฟู่จ้าวหนิงอย่างต่อเนื่อง การโจมตีของเธอรวดเร็วและโหดเหี้ยม “ตายซะ! ฉันจะฆ่าแก!”</p>\n<p>ไป๋ซวงไม่ได้พูดอะไร แต่การโจมตีแต่ละครั้งนั้นร้ายแรง พวกเธอใช้รูปแบบการต่อสู้ที่ดุเดือดและไม่หยุดยั้ง มุ่งมั่นที่จะฆ่าเธอ แม้แต่คนที่มีอารมณ์ดีที่สุดก็ทนไม่ได้ โดยเฉพาะอย่างยิ่งเพราะอารมณ์ของฟู่จ้าวหนิงนั้นไม่เคยดีอยู่แล้ว หลังจากหลบหลีกการโจมตีไปมากกว่าสิบครั้ง ฟู่จ้าวหนิงก็ชักเข็มเงินออกมาอย่างกะทันหัน ขยับเท้า และด้วยลีลาการเคลื่อนไหวที่คาดเดาไม่ได้ เธอก็หันกลับมาปรากฏตัวด้านหลังไป๋ซวงในทันที เธอแทงเข็มเงินลงไปที่จุดกดดันบนหลังของไป๋ซวง ไป๋ซวงรู้สึกว่าร่างกายของเธอชาไปหมด การเคลื่อนไหวหยุดชะงักลงอย่างฉับพลัน และเธอก็ล้มลงกับพื้นเสียงดังตุ๊บ “เจ้าใช้เข็มพิษ!</p>\n<p>ข้าจะฆ่าเจ้า!” จินเสวี่ยตกใจและโกรธจัดเมื่อเห็นเข็มเงินบนหลังของไป๋เสวี่ย “พอได้แล้วกับเรื่องไร้สาระ เจ้าควรมีฝีมือบ้าง” ฟู่จ้าวหนิงเยาะเย้ยพลางย่อตัวลงและกวาดขาเข้าหาเธอ จินเสวี่ยกระโดดขึ้นเพื่อหลบขาของเธอทันที แต่ขณะที่เธอกระโดด เข็มเงินอีกเล่มในมือของฟู่จ้าวหนิงก็พุ่งเข้าหาเธอ “เจ้า—” ก่อนที่จินเสวี่ยจะพูดจบ เข็มก็แทงเข้าที่จุดฝังเข็มหน้าอกของเธอ ทำให้เธอตัวแข็งทื่อ ล้มลงกับพื้นเสียงดังตุ๊บ ฟู่จ้าวหนิงเตะข้อมือเธอ ทำให้เธอปล่อยดาบออกมา ดาบถูกฟู่จ้าวหนิงเตะกระเด็นไป “มีคน—” จินเสวี่ยไม่คาดคิดมาก่อนว่าฟู่จ้าวหนิงจะทรงพลังขนาดนี้ ใบหน้าของเธอเปลี่ยนไปอย่างกะทันหัน และเธอก็คิดที่จะขอความช่วยเหลือ แต่เธอก็รู้สึกแปลกใจมาก ทำไมชิงอี้ถึงไม่อยู่ที่นี่? ทำไมทหารยามข้างนอกถึงยังไม่รีบเข้ามา?</p>\n<p>“ทหารยาม!” ฟู่จ้าวหนิงเตะจุดฝังเข็มของเธอด้วยปลายเท้าในขณะที่เธอร้องออกมา ทำให้จินเสวี่ยพูดไม่ออก เธอทำได้เพียงจ้องมองฟู่จ้าวหนิงด้วยความโกรธ เธอต้องการฆ่าเธอ! โจรหญิงไร้ยางอายคนนี้กล้าขอความช่วยเหลือหรือ? “ฝ่าบาท!” ในขณะนั้นเอง เหล่าทหารยามที่อยู่ด้านนอกก็รีบวิ่งเข้ามา เมื่อจินเสวี่ยได้ยินพวกเขาเรียกฟู่จ้าวหนิงว่า &quot;ฝ่าบาท&quot; ดวงตาของเธอก็เบิกกว้างราวกับจานรองแก้ว พวกเขาเรียกเธอว่าอะไรนะ? พวกเขาบ้าไปแล้วหรือ?</p>\n<p>หรือว่าเธอเป็นภรรยาของเจ้าชายอีกองค์หนึ่ง? ฟู่จ้าวหนิงมองทหารยามอย่างเย็นชา &quot;พวกเจ้าควรทิ้งหูไปซะเถอะ มันไร้ประโยชน์อยู่แล้ว&quot; การต่อสู้ดำเนินมาได้สักพักแล้ว ต้องมีเสียงดังอยู่ข้างในแน่ๆ พวกเขาต้องได้ยิน แต่ก็ไม่ได้เข้ามา พวกเขาต้องรู้แล้วว่าจินเสวี่ยและไป๋ซวงกำลังโจมตีเธอ ไม่ใช่ว่าพวกเขาไม่เป็นห่วงเสี่ยวหลานหยวน ทหารยามดูอึดอัดเล็กน้อย คนหนึ่งอธิบายว่า &quot;ฝ่าบาท องค์ชายมีพระราชดำรัสว่าห้ามใครเข้าห้องนี้โดยไม่ได้รับอนุญาต&quot; &quot;อย่างนั้นหรือ?&quot; ฟู่จ้าวหนิงมองพวกเขา &quot;งั้นพวกเจ้าคิดว่ามันไม่ใช่เรื่องใหญ่ถ้าสองสาวใช้จะฆ่าข้าที่นี่หรือ?&quot; “ฝ่าบาท จินเสวี่ยและไป๋ซวงเป็นนางกำนัลที่องค์ชายไว้วางใจที่สุด พวกนางจะไม่ทำร้ายองค์ชายหรอก พวกนางอาจแค่มาทดสอบฝ่าบาท” “ทดสอบอะไรกัน!” ฟู่จ้าวหนิงเตะเขา เสียงดังสนั่น ยามกระเด็นออกไปนอกประตู พวกเขาต้องการทดสอบเธอสินะ?</p>\n<p>ในเมื่อเป็นนางกำนัลของเซียวหลานหยวนที่โจมตีเธอ พวกเขาจึงอยากรู้ว่าเธอเก่งแค่ไหน จึงรอฟังว่าเกิดอะไรขึ้น เมื่อเธอจัดการนางกำนัลทั้งสองลงได้แล้ว พวกเขากลัวว่าเธอจะทำร้ายพวกเขา จึงรีบเข้าไป แน่นอนว่าคนในวังองค์ชายนั้นช่างไม่ธรรมดา พวกเขาไม่ได้ปฏิบัติต่อเธอเหมือนเจ้าหญิงเลยสักนิด “ฝ่าบาท!” ชิงอี้รีบกลับมาในขณะนั้น ยาที่ฟู่จ้าวหนิงต้องการนั้นหาได้ยาก บางอย่างต้องไปเอาจากในวัง และบางอย่างต้องไปจากคลินิกหลายแห่ง เขาจึงส่งคนออกไปและไม่สามารถกลับมาได้ทันที เมื่อกลับมาถึงที่พักอย่างไม่คาดคิด เขาก็เห็นฟู่จ้าวหนิงกำลังเตะยามคนหนึ่งออกไปนอกประตู ชิงอี้ตกใจมาก รีบวิ่งเข้าไปดูก็เห็นสาวใช้สองคนนอนอยู่บนพื้น</p>\n<p>ไป๋ซวงนอนคว่ำหน้า ส่วนจินเสวี่ยก็นอนนิ่งตัวแข็งทื่อ ยามที่เหลือจ้องมองฟู่จ้าวหนิงอย่างตั้งใจ ท่าทางของพวกเขาบ่งบอกว่ากำลังเตรียมพร้อมที่จะโจมตีได้ทุกเมื่อ หัวใจของชิงอี้จมดิ่งลงเมื่อเห็นภาพนี้ เกิดอะไรขึ้นถึงได้เกิดเรื่องแบบนี้ขึ้นอย่างรวดเร็วหลังจากที่เขาจากไป? เมื่อเห็นองค์ชายจุนอยู่บนเตียง สีหน้าของเขาก็เปลี่ยนไปอีกครั้ง สีหน้าของฟู่จ้าวหนิงเย็นชาและเยาะเย้ย “เจ้ากลับมาได้ทันเวลาพอดี ข้าจะไม่จัดการเรื่องที่นี่อีกต่อไปแล้ว เจ้าจัดการกันเองเถอะ แต่เมื่อเสี่ยวหลานหยวนตื่นขึ้นมา อย่าลืมบอกข้าให้ส่งสารนี้ไปให้เขาด้วย เขาเป็นหนี้ข้าสิบอย่าง ถ้าเขาผิดสัญญาแม้แต่ข้อเดียว ข้าจะฆ่าเขาด้วยเข็มพิษ!”</p>"}, "62": {"chapter_number": 62, "chapter_title": "第62章對王妃不公平", "content": "<p>หลังจากพูดจบ ฟู่จ้าวหนิงก็เอื้อมมือไปดึงเข็มเงินออกจากตัวของไป๋ซวงและจินเสวี่ย แล้วจากไปพร้อมกับสีหน้าเย็นชา เมื่อหงจั่วและเฟินซิงมาถึง องค์ชายจุนก็ฟื้นแล้ว “เกิดอะไรขึ้น?” เมื่อองค์ชายจุนฟื้นขึ้นมา ชิงอี้เพิ่งคลายจุดฝังเข็มบนตัวของจินเสวี่ยและไป๋เสวี่ยอย่างพิถีพิถัน จุดฝังเข็มที่ฟู่จ้าวหนิงใช้แปลกไป ไม่ใช่วิธีการกดจุดฝังเข็มที่พวกเขาใช้กันเป็นประจำ ในตอนแรก เขาไม่สามารถทำให้สาวใช้ทั้งสองฟื้นตัวได้ และเขาก็เหงื่อท่วมตัว แม้หลังจากคลายจุดฝังเข็มแล้ว สาวใช้ทั้งสองก็ยังดูอ่อนแรงและเซื่องซึมหลังจากลุกขึ้นนั่ง ไป๋ซวงอาการหนักกว่าเพราะล้มลงโดยตรง จมูกแดง บวม และมีเลือดออก สาวใช้ที่เดิมทีสวยงามมาก</p>\n<p>ตอนนี้ดูน่าสงสาร ไป๋ซวงยกมือขึ้นแตะจมูกที่มีเลือดไหล น้ำตาคลอเบ้า เธอไม่กล้าเงยหน้าขึ้นมอง กลัวว่าองค์ชายจะรังเกียจเธอหากเห็นสภาพเช่นนี้ “ฝ่าบาท...” จินเสวี่ยอดไม่ได้ที่จะร้องไห้ “ข้าและไป๋ซวงไม่สามารถปกป้องฝ่าบาทได้อย่างเหมาะสม!” องค์ชายจุนค่อยๆ ลุกขึ้นนั่ง ชิงอี้ได้คลุมผ้าห่มให้เขาก่อนที่จะคลายแรงกดจุดของนางกำนัลทั้งสอง แต่ตอนนี้เมื่อเขาลุกขึ้นนั่ง ผ้าห่มก็เลื่อนลง และเขารู้สึกหนาวที่หน้าอก องค์ชายจุนมองลงไปที่ตัวเอง ใบหน้าของเขามืดลง “ไอ ไอ ไอ” เขาไอออกมาสองสามครั้งด้วยความโกรธ รีบจัดเสื้อผ้าให้เรียบร้อย “ฟู่จ้าวหนิงอยู่ที่ไหน?” องค์ชายจุนไม่สนใจคำพูดของจินเสวี่ยเลย มองไปที่ชิงอี้</p>\n<p>เขาคาดหวังว่าจะเห็นฟู่จ้าวหนิงอยู่ข้างเตียงเป็นอย่างแรกเมื่อตื่นขึ้นมา แต่เกิดอะไรขึ้น? เกิดอะไรขึ้นขณะที่เขาหมดสติ?</p>\n<p>“ฝ่าบาท” ชิงอี้กล่าวอย่างยากลำบาก “ดูเหมือนว่าพระสนมจะกลับไปที่ตระกูลฟู่แล้ว” “กลับไปที่ตระกูลฟู่อีกแล้วเหรอ?” “เป็นเพราะจินเสวี่ยและไป๋ซวงกลับมาแล้ว พวกเธอไม่รู้ว่าพระสนมเป็นใคร พอเห็นพระสนมอยู่ในห้ององค์ชาย จึงเกิดความเข้าใจผิด” หงจั่วที่ยืนอยู่ข้างๆ มองด้วยความไม่พอใจเมื่อได้ยินเช่นนั้น เธอรวบรวมความกล้าและพูดโต้แย้งคำพูดของชิงอี้ “องค์ชาย นี่ไม่ใช่ความเข้าใจผิดเล็กน้อย! พี่ไป๋ซวงและพี่จินเสวี่ยพยายามฆ่าพระสนม และพวกเธอก็ทะเลาะกันในห้ององค์ชาย!” เธอและเฟินซิงแทบจะคลั่งด้วยความโกรธหลังจากได้ยินเรื่องที่เกิดขึ้น อย่างไรก็ตาม จินเสวี่ยและไป๋ซวงเคยมีฐานะสูงกว่าพวกเธอมาก จึงไม่กล้าพูดออกมา</p>\n<p>แต่ในที่สุดพระสนมก็กลับมา และตอนนี้ก็ถูกขับไล่ออกไปอีก พวกเธอก็โกรธมากเช่นกัน “ความเข้าใจผิด?” องค์ชายจุนมองไปที่จินเสวี่ยและไป๋ซวง นางกำนัลทั้งสองคุกเข่าลงทันที “ฝ่าบาท ข้าเห็นตั้งแต่เข้ามาแล้ว ข้าเห็น...” จินเสวี่ยไม่สามารถเรียกนางว่า “พระสนม” ได้ เธอเต็มไปด้วยความโกรธและความไม่พอใจ และไม่ต้องการยอมรับตัวตนของฟู่จ้าวหนิง “เจ้าหมายถึงฟู่จ้าวหนิงหรือ?” เสียงขององค์ชายจุนเย็นชา ในขณะนี้ เขาก็สังเกตเห็นว่าร่างกายของเขากำลังฟื้นตัว เขาไม่รู้ว่าฟู่จ้าวหนิงทำอะไร แต่เขารู้สึกได้อย่างชัดเจนว่ามือของเขาอุ่นขึ้น และร่างกายของเขาก็อุ่นขึ้นเช่นกัน แต่ปฏิเสธไม่ได้เลยว่าฝีมือทางการแพทย์ของนางนั้นยอดเยี่ยม</p>\n<p>ไม่มีข้อสงสัยใดๆ ในเรื่องนั้น “ใช่ ตอนนั้นนางอยู่คนเดียวในห้อง และเสื้อผ้าของฝ่าบาทก็… ยุ่งเหยิงเล็กน้อย ข้าและพี่สาวไป๋ซวงคิดว่านางเป็นโจรหญิง พยายามฉวยโอกาสจากฝ่าบาท เพราะเป็นห่วงฝ่าบาท เราจึงใจร้อนและเข้าทำร้ายนาง” จินเสวี่ยพูดพลางร้องไห้และชี้ไปที่ไป๋ซวง “นางโหดร้ายมาก ฝ่าบาท ดูสิว่าพี่ไป๋ซวงบาดเจ็บสาหัสแค่ไหน” ไป๋ซวงเงยหน้าขึ้น ดวงตาแดงก่ำจากการร้องไห้ จมูกบวมและคราบเลือดที่เช็ดไม่ออกทำให้ความงามเดิมของนางหายไป นางเดือดดาลด้วยความเกลียดชัง นางไม่คาดคิดว่าจะได้เห็นองค์ชายเป็นเช่นนี้ในทันทีที่ได้พบกันอีกครั้งหลังจากแยกจากกันเพียงไม่กี่วัน “พี่ไป๋ซวงและพี่จินเสวี่ยต้องโหดร้ายกับพระสนมมากแน่ๆ”</p>\n<p>หงจั่วอดไม่ได้ที่จะพูดซ้ำ จินเสวี่ยและไป๋ซวงหันมามองนาง สาวใช้ชั้นสองคนนี้เบื่อชีวิตแล้วหรือไง?</p>\n<p>นี่เป็นครั้งที่สองแล้วที่นางพูดปกป้องฟู่จ้าวหนิง นางไม่รู้ด้วยซ้ำหรือว่าพวกเขาอยู่ฝ่ายไหน? หงจั่วยืดหลังตรง ตอนนี้นางเป็นหัวหน้าสาวใช้ หัวหน้าสาวใช้ชั้นหนึ่งข้างพระสนม สถานะของพวกเขาก็เหมือนกัน ทำไมนางต้องกลัวจินเสวี่ยและไป๋ซวงด้วย? เฟินซิงที่ยืนอยู่ข้างๆ ก็กล่าวว่า “ข้าเห็นพ้องกับหงจั่วค่ะ” “พวกเจ้า...” จินเสวี่ยโกรธจัด เธอยกมือขึ้นชี้ไปที่พวกเขา แต่กลับยกแขนไม่ขึ้น เธออดไม่ได้ที่จะมองไปที่องค์ชายจุนอีกครั้ง และร้องไห้ออกมา “ฝ่าบาท คุณหนูฟู่ใช้เข็มพิษชนิดหนึ่ง ตอนนี้ข้ายกแขนไม่ขึ้นเลยค่ะ” องค์ชายจุนมองพวกเขา ก้มหน้าลง และกล่าวว่า “พวกเจ้าทำร้ายพระสนม และพระนางก็เมตตาแล้วที่ไม่ปลิดชีพพวกเจ้า ไปซะ” “ฝ่าบาท?” จินเสวี่ยและไป๋ซวงต่างตกตะลึง องค์ชายไม่ต้องการจะหาความยุติธรรมให้พวกเธอหรือ?</p>\n<p>ยิ่งไปกว่านั้น องค์ชายคิดจริงๆ หรือว่าฟู่จ้าวหนิงมีสิทธิ์ที่จะฆ่าพวกเธอ? “ไป” ชิงอี้รีบกระซิบสั่ง สองสาวใช้คงไม่รู้เรื่องราวทั้งหมด “ช่วยพวกเขากลับไป” เขาพูดกับหงจั่วและเฟินซิง หงจั่วและเฟินซิงกัดริมฝีปากล่างและทำได้เพียงช่วยคนใดคนหนึ่งออกมาอย่างช่วยไม่ได้ หลังจากออกจากห้องนอนขององค์ชายจุนแล้ว ไป๋ซวงก็หยุด หายใจเข้าลึกๆ แล้วตบหน้าหงจั่วอย่างแรง เสียง &quot;แปะ&quot; ดังขึ้น หงจั่วหน้าแดงก่ำทันที &quot;พี่ไป๋ซวงทำได้ดีมาก! ถ้าแขนฉันไม่อ่อนแรง ฉันคงจะซัดพวกทรยศสองคนนี้เละเทะไปเหมือนกัน!&quot; จินเสวี่ยพูดอย่างโกรธเคือง หงจั่วขยับตัว แต่เฟินซิงรีบดึงเธอกลับมา &quot;หงจั่ว อย่าใจร้อน&quot; พวกเธอไม่รู้ว่าองค์ชายหมายความอย่างไรกับพระสนม และองค์ชายก็ยังไม่ได้ลงโทษจินเสวี่ยและไป๋ซวง แม้ว่าพวกเธอจะโกรธแค้น แต่จะทำอะไรได้ &quot;ใครคือคนทรยศ?</p>\n<p>เจ้าแค่แตะต้องพระสนม นั่นเป็นความผิดร้ายแรง!&quot; หงจั่วถูกเฟินซิงดึงตัวไว้ ทำให้เธอโต้ตอบไม่ได้ แต่เธอกัดฟันพูดกับไป๋ซวงว่า “พระสนม? เราไม่รู้ว่าเธอได้เป็นพระสนมมาได้อย่างไร แต่เราไม่เคยได้ยินชื่อฟู่จ้าวหนิงมาก่อนเลย! ในเมืองหลวง ผู้หญิงที่เราไม่เคยได้ยินชื่อมาก่อนจะมีพื้นฐานครอบครัวที่ดีได้อย่างไร? ใครก็ได้จะได้เป็นพระสนมงั้นหรือ?” ไป๋ซวงกัดฟัน “องค์ชายเพิ่งกลับมาไม่กี่วัน เขาก็แต่งงานแล้ว ต้องมีเบื้องหลังอะไรสักอย่างแน่ แต่ไม่ใช่เพราะเขาอยากแต่งงานกับผู้หญิงแบบนี้แน่นอน!” หัวใจของเธอแตกสลาย เธอรับเรื่องนี้ไม่ได้เลย “ยังไม่ทันได้ไม่นาน องค์ชายก็แต่งงานแล้ว!</p>\n<p>ไม่น่าเชื่อเลย ไร้สาระสิ้นดี!” “แกนั่นแหละที่เป็นแค่คนธรรมดา!” หงจั่วคำราม “ไม่ว่าฐานะของเจ้าหญิงจะเป็นอย่างไร เจ้าก็เป็นแค่คนรับใช้ แต่เจ้าหญิงไม่ใช่! ไม่ว่าด้วยเหตุผลใดที่องค์ชายแต่งงานกับเจ้าหญิง ตอนนี้เจ้าหญิงก็เป็นพระสนมแล้ว ได้รับการยอมรับจากจักรพรรดิด้วย!” “พี่ไป๋ซวง อย่าไปเถียงกับสองคนนั้นเลย กลับไปที่วังกันเถอะ” จินเสวี่ยดึงไป๋ซวงออกไป พวกเขาจำเป็นต้องไปดูว่าเกิดอะไรขึ้น หลังจากที่พวกเขาออกไปแล้ว หงจั่วก็เอามือปิดหน้าและกระทืบเท้าด้วยความโกรธ รู้สึกผิดต่อฟู่จ้าวหนิง “เฟินซิง ทำไมองค์ชายไม่ลงโทษพวกเขาล่ะ?” พวกเขาก่อความผิดพลาดใหญ่หลวงขนาดนี้ มันไม่ยุติธรรมกับเจ้าหญิงเลยถ้าองค์ชายไม่ลงโทษพวกเขา เฟินซิงถอนหายใจ “ฉันก็ไม่เข้าใจเหมือนกัน ฉันแค่อยากไปกับเจ้าหญิงจริงๆ”</p>"}, "63": {"chapter_number": 63, "chapter_title": "第63章我要這匹馬", "content": "<p>ฟู่จ้าวหนิงกลับมาถึงบ้านตระกูลฟู่ ก่อนที่จะเข้าไป เธอก็ได้ยินเสียงเอะอะโวยวาย เสียงตะโกน และเสียงม้าร้อง ม้าป่าตัวนั้นหรือ? เธอรู้สึกได้ทันทีว่ามีบางอย่างผิดปกติ จึงรีบผลักประตูเปิดออก ฝูงชนจำนวนมากมารวมตัวกันที่สนามหลังบ้าน สร้างความวุ่นวายไม่น้อย บางคนถือเชือก บางคนถือไม้ บางคนถือดาบ และบางคนแบกฟาง ทุกคนต่างจ้องมองไปที่ม้าตัวนั้น “เร็วเข้า เอ้อโกว เจ้าถนัดขว้างหินไม่ใช่เหรอ? ทุบขาหน้ามันเลย!” เด็กชายอายุประมาณสิบสามหรือสิบสี่ปีปีนขึ้นไปบนกองหิน ยืนอยู่ด้านบน และสั่งการฝูงชนจากด้านบน “แต่อย่าทำร้ายมันนะ ไม่อย่างนั้นข้าจะขี่มันได้อย่างไรในอนาคต?” “คุณชายหก ลองใช้เข็มพิษดูไหม?”</p>\n<p>มีคนดึงท่อไม้ไผ่ออกมาอย่างกระตือรือร้นที่จะลอง ม้าตัวนั้นถูกล้อมรอบด้วยทุกคน โดยมีเข็มพิษเหล็กกระจายอยู่บนพื้นเป็นวงกลม ดูเหมือนมันจะรับรู้ถึงอันตราย มันจึงวนเวียนอยู่เป็นวงกลมเล็กๆ พ่นลมหายใจเฮือกใหญ่ ราวกับว่ามันเพิ่งวิ่งควบอย่างรุนแรงมา “อู๊!</p>\n<p>อู๊! อู๊!” ฟู่จ้าวหนิงโกรธจัดเมื่อเห็นภาพตรงหน้า และดวงตาของเธอก็ลุกโชนด้วยความโกรธเมื่อเห็นเสี่ยวเถาถูกคนรับใช้จับตัวไว้และปิดปากแน่น เสี่ยวเถาเองก็เห็นเธอแล้วและเริ่มร้องไห้เบาๆ “พวกเจ้าทำอะไร?!” ฟู่จ้าวหนิงตะโกนอย่างเย็นชา ทันใดนั้นทุกคนก็หันมามองเธอ คนรับใช้ที่จับเสี่ยวเถาไว้ก็ปล่อยมือโดยไม่รู้ตัว เสี่ยวเถาจึงฉวยโอกาสนั้นวิ่งไปหาฟู่จ้าวหนิง เสียงของเธอสั่นเครือด้วยน้ำตา “คุณหนู ข้าบอกแล้วว่าม้าตัวนั้นเป็นของท่าน แต่คุณชายหกยืนยันว่ามันไม่มีอาน เป็นม้าป่า มันวิ่งเข้ามาเอง และใครก็ตามที่เห็นก็เป็นเจ้าของมัน เขายืนยันที่จะเอาม้าไป” เมื่อเสี่ยวเถามาถึงฟู่จ้าวหนิง</p>\n<p>ฟู่จ้าวหนิงสังเกตเห็นรอยมือบนใบหน้าของเธออย่างชัดเจน ผมของเธอยุ่งเหยิง และเสียงของเธอก็แหบพร่า เห็นได้ชัดว่ามาจากการตะโกน “คุณชายหก?” คุณชายหกเป็นลูกชายสุดที่รักของมาดามฟู่ มาดามฟู่ที่สามมีลูกสาวสองคนและลูกชายหนึ่งคน แต่ลูกชายคนแรกของเธอเสียชีวิตตั้งแต่อายุยังน้อยด้วยโรคภัยไข้เจ็บ ต่อมาเธอจึงให้กำเนิดคุณชายหก เนื่องจากโศกนาฏกรรมในอดีต เธอจึงรักและเอ็นดูลูกชายคนเล็กอย่างฟู่หย่งหนิงมาก เธออาจจะยอมให้คนอื่นรังแกเธอได้ แต่ถ้าใครกล้าแตะต้องลูกชายของเธอ เธอจะต่อสู้จนตาย ดังนั้นเกือบทุกคนในตระกูลฟู่จึงตามใจและตามใจคุณชายหก คุณชายหก ฟู่หย่งหนิง ก็ถูกตามใจจนเสียคนเช่นกัน</p>\n<p>มักจะทำตัวหยิ่งยโสและเอาแต่ใจในบ้าน ได้ทุกอย่างที่ต้องการ ฟู่หย่งหนิงเคยมาที่สวนหลังบ้านบ่อยๆ เพื่อรบกวนคุณปู่ฟู่และคนอื่นๆ แต่ต่อมาไม่มีอะไรในบ้านหลักที่ดึงดูดความสนใจของเขาได้อีกต่อไป นอกจากนี้ เนื่องจากท่านอาจารย์ฟู่ชราป่วยบ่อย ท่านหญิงฟู่ที่สามจึงบอกให้เขามาน้อยลงเพื่อหลีกเลี่ยงการติดโรค ดังนั้นเขาจึงไม่ค่อยได้มาที่หลังบ้าน วันนี้ฟู่หย่งหนิงยังคงรู้สึกไม่สบายใจกับสิ่งที่ท่านหญิงฟู่ที่สองพูด เธอเล่าให้เขาฟังว่ามีม้าที่สง่างามมากอยู่ที่นั่น ฟู่หย่งหนิงเพิ่งไปเที่ยวกับกลุ่มหนุ่มๆ ที่มีฐานะดีสองคน ซึ่งสองคนนั้นมีม้าชั้นดีและมักจะอวดพวกมันอยู่บ่อยๆ</p>\n<p>เมื่อฟู่หย่งหนิงได้ยินจากท่านหญิงที่สองว่ามีม้าชั้นดีอยู่ที่นี่ เขาก็อดใจไม่ไหว เขาจึงเรียกเพื่อนทั้งสองมาช่วยประเมินม้า บอกพวกเขาว่ามันเป็นของเขา ก่อนที่ท่านหนุ่มทั้งสองจะมาถึง ฟู่หย่งหนิงวางแผนที่จะเทียมม้าก่อนที่จะจูงมันไปที่ลานหน้าบ้าน แต่เขาไม่คาดคิดว่ามันจะดุร้ายและไม่เชื่องขนาดนี้ เขาส่งคนไปมากมายและลองทุกวิธีแล้ว แต่ก็ยังควบคุมมันไม่ได้ “ฟู่จ้าวหนิง!” ที่นั่น ฟู่หย่งหนิงลงมาจากเนินเขาเทียมแล้วและกำลังพุ่งตรงไปยังฟู่จ้าวหนิง เขาไม่ได้สูงเท่าฟู่จ้าวหนิง แต่เพราะเขากินดีมาตั้งแต่เด็ก จึงค่อนข้างอ้วนท้วนสมบูรณ์ “ฉันได้ยินมาจากเสี่ยวเถาว่านี่คือม้าที่คุณขี่กลับมาใช่ไหม?”</p>\n<p>ฟู่หย่งหนิงจ้องมองฟู่จ้าวหนิง เขาอดไม่ได้ที่จะรู้สึกว่าฟู่จ้าวหนิงดูเปลี่ยนไปเล็กน้อย “นี่คือม้าที่ฉันขี่กลับมา แล้วคุณจะมาแย่งม้าของฉันหรือฆ่ามัน?” ฟู่จ้าวหนิงดึงเสี่ยวเถาไปข้างหลังเธอ “ไปที่นั่น ใส่บังเหียนและสายบังเหียนให้ม้าตัวนี้ แล้วเอามาให้ฉัน!” ฟู่หย่งหนิงพูดอย่างไม่แยแส อย่างไรก็ตาม ทุกคนในตระกูลฟู่ก็ยอมเขาเสมอ เขาจึงชินกับการพูดด้วยน้ำเสียงแบบนี้ ฟู่จ้าวหนิงมองไปที่ชายหนุ่มผู้หยิ่งยโส แล้วก็ยกมือขึ้นตบหัวเขา ฟู่หย่งหนิงตกตะลึง “คุณพาคนมารังแกคนของฉัน แล้วคุณยังจะมาขโมยม้าของฉันอีกเหรอ?</p>\n<p>คุณคิดว่าฉันจะปล่อยให้คุณลอยนวลไปได้งั้นหรือ?” ฟู่จ้าวหนิงเสกเข็มเงินออกมาได้ และก่อนที่ฟู่หย่งหนิงจะทันได้ตั้งตัว เธอก็แทงเข็มลงไปที่คอของเขาอย่างรวดเร็ว “อ๊า—” ฟู่หย่งหนิงกรีดร้อง พยายามจะข่วนหน้าเธอ แต่ฟู่จ้าวหนิงดึงเข็มออกแล้วเตะเข่าเขา ก่อนจะถอยหลังไปสองก้าวอย่างรวดเร็ว ฟู่หย่งหนิงทรุดลงกับพื้นเสียงดังตุ๊บ เขามองด้วยตาโต อ้าปากค้าง พยายามจะด่าฟู่จ้าวหนิงอย่างโกรธจัด แต่ไม่ว่าจะขยับปากอย่างไรก็ไม่มีเสียงออกมา “!” ฟู่หย่งหนิงตกใจสุดขีด รีบลุกขึ้นยืน ชี้ไปที่ฟู่จ้าวหนิงแล้วก็ชี้ไปที่ปากของตัวเอง “ในเมื่อเจ้าก็มีนามสกุลฟู่เหมือนกัน ข้าจะทำให้เจ้าเป็นใบ้แค่สิบวันเท่านั้น</p>\n<p>ถ้าเจ้ากล้าทำอะไรบุ่มบ่ามอีก คิดจะขโมยของข้าหรือรังแกคนข้า ข้าจะทำให้เจ้าพูดไม่ได้อีกเลย!” ฟู่จ้าวหนิงกล่าวพลางกวาดสายตามองไปยังเหล่าคนรับใช้ ที่นี่มีคนรับใช้มากมาย ทุกคนอยู่ภายใต้การควบคุมของชายหนุ่มฟู่หย่งหนิง กล่าวอีกนัยหนึ่ง ตระกูลฟู่เลี้ยงดูคนมากมาย อาศัยอยู่ในบ้านของเธอ ใช้ข้าวของของเธอ และได้รับค่าจ้างรายเดือนจากร้านของเธอ แต่พวกเขากลับรังแกครอบครัวของลูกชายคนโต! “คุณหนู เจ้าเอาเข็มแทงคุณชายหก!</p>\n<p>ถ้าท่านหญิงสามรู้เข้า ท่านจะไม่ให้อภัยเจ้าแน่!” คนรับใช้คนหนึ่งรีบวิ่งเข้ามาช่วยพยุงฟู่หย่งหนิงขึ้น คนอื่นๆ ก็มารุมล้อม จ้องมองฟู่จ้าวหนิงอย่างดุร้าย “คุณหนู เจ้าต้องการให้เราจัดการ หรือจะไปขอโทษท่านหญิงสามกับพวกเรา?” “มัดเธอไว้แล้วพาไปพบท่านหญิงสาม!” “เราควรเอาเข็มนี่แทงเธอดีไหม?” คนรับใช้ที่ถือกระบอกไม้ไผ่พูดขึ้น เข็มนั้นคุณหนูไห่ให้ฟู่จ้าวหนิงเป็นของขวัญ โดยอ้างว่าใช้สำหรับยิงม้า พวกเขาทุกคนอยากรู้ว่ามันจะทำอะไรกับคนได้บ้าง “เจ้ากล้า!” ใบหน้าของเสี่ยวเถาแดงก่ำด้วยความโกรธ กำหมัดแน่น ตัวสั่นเทาไปทั้งตัว พวกนี้ทำเกินไปแล้ว! นี่มันลูกสาวคนโตของตระกูลฟู่นะ! &quot;อย่าลืมว่าตัวเองเป็นใคร!&quot; &quot;พวกเรามาจากรุ่นที่สองและสามของตระกูล!</p>\n<p>พวกเราเป็นใครกัน? ตอนนี้เราก็ยังเรียกเธอว่า &#39;คุณหนู&#39; จนกว่าบ้านหลังนี้จะขายได้...&quot; ก่อนที่คนรับใช้คนหนึ่งจะพูดจบ ก็มีคนเหยียบเท้าเขาอย่างรวดเร็ว แต่ฟู่จ้าวหนิงกลับรู้สึกว่ามีบางอย่างผิดปกติ &quot;บ้านหลังนี้จะขายเหรอ? ใครบอกอย่างนั้น?&quot;</p>"}, "64": {"chapter_number": 64, "chapter_title": "第64章這是第一件事", "content": "<p>เหล่าคนรับใช้ต่างก็ไม่กล้าพูดอะไรต่อ คนรับใช้ที่พูดไปก่อนหน้านี้รู้สึกไม่ค่อยพอใจนัก เพราะเห็นว่าฟู่จ้าวหนิงไม่กลัวพวกเขาแล้ว และไม่โกรธหรือหมดหนทางเหมือนก่อน จึงอดใจไม่ไหว แต่การถูกคนข้างๆ เหยียบย่ำทำให้เขาได้สติกลับมา สาขาที่สองและสามของตระกูลรู้เรื่องนี้แล้ว แต่เก็บเป็นความลับจากสาขาใหญ่จนกว่าเรื่องจะคลี่คลาย ถ้าเขาเผลอหลุดปากและทำให้เรื่องพัง สาขาที่สองและสามจะลงโทษเขาอย่างหนัก คนรับใช้ที่มีไฝดำที่คางแอบตกใจและมองไปที่ฟู่จ้าวหนิง เขาคิดว่าถึงฟู่จ้าวหนิงจะรู้ก็ไม่เป็นไรหรอก หลายปีที่ผ่านมา สาขาใหญ่ก็ถูกสาขาที่สองและสามกดดันมาตลอดไม่ใช่เหรอ? &quot;ไม่มีอะไรหรอก คุณหนู</p>\n<p>ไปหาคุณหญิงคนที่สามกับพวกเราเถอะ&quot; &quot;อ่าๆ!&quot; ฟู่หย่งหนิงกระโดดขึ้นลงอีกครั้ง นิ้วของเขาเกือบจะจิ้มหน้าฟู่จ้าวหนิง ใบหน้าของเขาแดงก่ำไปหมดแล้ว และเขาก็โกรธมากจนรู้สึกเหมือนจะระเบิดเป็นไฟ แต่ที่แปลกคือเขาพูดอะไรไม่ออก ปากของเขาอ้าและหุบอยู่ตลอดเวลา เมื่อเห็นสภาพของเขา ทุกคนที่อยู่ตรงนั้นก็เริ่มตื่นตระหนก ตอนแรกพวกเขาคิดว่าฟู่หย่งหนิงแค่ข้อเท้าพลิกและจะพูดได้ในไม่ช้า แต่เห็นได้ชัดว่าอาการของเขาไม่ดี “เร็วเข้า เร็วไปรายงานคุณหญิงคนที่สาม!” พวกเขารีบแบกฟู่หย่งหนิงขึ้นหลังและรีบวิ่งไปข้างหน้า “คุณชายคนที่หก อย่ารีบไป ไปหาหมอก่อน แล้วค่อยมาจัดการเรื่องนี้กับเธอ!” ฟู่จ้าวหนิงหนีไม่พ้น</p>\n<p>พวกเขาต้องพาคุณชายคนที่หกไปหาคุณหญิงคนที่สามก่อน ทุกคนรีบวิ่งออกไป เหลือเพียงฟู่จ้าวหนิงและเสี่ยวเถาที่ยังคงอยู่ในสวนหลังบ้าน เสี่ยวเถาโกรธ วิตกกังวล และเป็นห่วง “คุณหนู ทำไมไม่กลับไปที่วังก่อนล่ะ คราวนี้คุณหนูทำร้ายคุณชายหก ฉันเกรงว่าคุณหญิงสามจะไปฟ้องต่อหน้าคุณชายสาม แล้วเขาจะต้องมาตำหนิคุณหนูแน่ๆ” คุณหญิงสองและสามมักจะใช้กลอุบายแบบนี้เฉพาะในวังเท่านั้น แต่คุณชายสองและสามไม่มีทางสุภาพกับฟู่จ้าวหนิงหรอก ยิ่งกว่านั้น พวกเขายังมีคนรับใช้ที่เก่งกาจและดุดันอยู่รอบตัวอีกด้วย คุณหนูจึงอ่อนแอเกินไป “นี่บ้านของฉัน ทำไมฉันต้องจากไป?” ฟู่จ้าวหนิงก็โกรธไม่แพ้กัน ตระกูลสาขาที่สองและสาม และญาติๆ</p>\n<p>ที่เอาแต่เกาะกินตระกูลฟู่สายหลัก!</p>\n<p>มันมากเกินไปแล้ว! เธอมองไปที่ม้าและเรียกมัน “มานี่” ม้าร้องและวิ่งเหยาะๆ มาหาเธอ กระโดดข้ามเหล็กแหลมบนพื้นอย่างสง่างาม ลงพื้นเสียงดังตุบ ก่อนจะทรงตัวแล้วเดินตรงไปหาฟู่จ้าวหนิง “กลัวเหรอ?” ฟู่จ้าวหนิงเอื้อมมือไปโอบคอและลูบหัวม้าเบาๆ เซียวเถาเฝ้ามองม้าตัวนี้ที่ท่านชายหกและคนอื่นๆ เพิ่งดุเรื่องนิสัยดื้อรั้น มาคลอเคลียกับฝ่ามือของฟู่จ้าวหนิง เธอตกตะลึง “คุณหนู ทำไมม้าตัวนี้ถึงเชื่อฟังคุณหนู?” ฟู่จ้าวหนิงยิ้ม “ฉันเคยช่วยเหลือสัตว์มามากมาย และตั้งแต่นั้นมา สัตว์ฉลาดเหล่านี้ก็เลยรักฉัน” “อ๋อ?” เซียวเถาตกใจเล็กน้อย นั่นหมายความว่าอย่างไร? คุณหนูเคยช่วยเหลือสัตว์มากมายขนาดนั้นตั้งแต่เมื่อไหร่?</p>\n<p>ฟู่จ้าวหนิงไม่ได้อธิบายเพิ่มเติม อย่างไรก็ตาม เธอไม่ได้โกหก เธอเคยช่วยเหลือม้า กวาง และนกมากมายในช่วงไฟป่าจริงๆ ตัวเธอเองเกือบจะตายในกองไฟ แต่มีม้าตัวหนึ่งพาเธอออกมาจากเปลวไฟ เธอไม่รู้ว่าทำไม แต่หลังจากนั้น เธอก็รู้สึกผูกพันเป็นพิเศษกับสัตว์เหล่านี้ เธอไม่คาดคิดมาก่อนว่าแม้หลังจากย้ายร่างมาอยู่ในร่างของลูกสาวคนโตตระกูลฟู่แล้ว ความผูกพันนี้จะยังคงอยู่ ฟู่จ้าวหนิงนึกถึงสิ่งที่อาจารย์ฉีเฉินเคยบอกเธอขึ้นมาทันที และเธอก็หยุดคิดอีกครั้ง หรือว่าจะเป็นอย่างที่อาจารย์ฉีเฉินบอก เธอถูกกำหนดให้มาอยู่ที่นี่?</p>\n<p>“คุณหนู ท่านควรไปได้แล้ว” เสี่ยวเถาพูดด้วยความกังวลใจอย่างมาก นึกถึงว่าท่านอาจารย์สามและคุณหญิงสามรักและเอ็นดูคุณชายหกมากแค่ไหน “คุณปู่กับท่านอาจารย์และคุณหญิงอยู่ที่นี่กันหมดแล้ว ฉันจะไปได้อย่างไร?” ฟู่จ้าวหนิงมองไปรอบๆ จากนั้นก็สะบัดข้อมือ ส่งเข็มสีเงินพุ่งไปที่ต้นไม้ *ฟิ้ว* ชายหนุ่มในชุดองครักษ์จากบ้านขององค์ชายจุนกระโดดลงมาจากต้นไม้ เขามองฟู่จ้าวหนิงด้วยความตกใจ “เสี่ยวหลานหยวนบอกว่าส่งคนมาเฝ้าคุณปู่ นี่คือทั้งหมดที่เขาทำเหรอ?” ฟู่จ้าวหนิงมององครักษ์ด้วยน้ำเสียงประชดประชัน “ฝ่าบาททรงมีพระราชดำรัสสั่งให้ข้าคุ้มครองท่านผู้เฒ่าฟู่ แต่ตอนนี้ท่านผู้เฒ่าฟู่ปลอดภัยแล้ว...” ยามอธิบายอย่างอ่อนแรง</p>\n<p>คนเหล่านั้นไม่ได้ตั้งใจจะทำร้ายท่านผู้เฒ่าฟู่ ดังนั้นเขาจึงเพียงแค่เฝ้าดูโดยไม่เข้าไปยุ่งเกี่ยว ฝ่าบาทตรัสว่าเขาไม่ควรเข้าไปยุ่งเกี่ยวกับเรื่องของตระกูลฟู่ ยกเว้นความเป็นความตายของท่านผู้เฒ่าฟู่ แต่เขาก็ตกใจ ฟู่จ้าวหนิงจะหาเขาเจอได้อย่างไรในเมื่อเขาซ่อนตัวได้ดีขนาดนี้ “ไร้สาระ! เจ้าคงไม่รู้ด้วยซ้ำว่าม้าตัวนี้เป็นของใครใช่ไหม?” ฟู่จ้าวหนิงรู้สึกว่ามันเป็นเรื่องตลกอย่างแท้จริง “นี่คือม้าอันล้ำค่าที่องค์ชายจุนต้องการจะฝึก” ไอ้คนชั่วเซียวหลานหยวน บอกว่าจะส่งคนมาเฝ้าบ้าน แต่กลับทำแบบนี้?</p>\n<p>ยิ่งไปกว่านั้น เขายังจำม้าที่เซียวหลานหยวนนำกลับมาไม่ได้ด้วยซ้ำ ซึ่งหมายความว่ายามคนนี้อยู่ในระดับล่างสุดขององครักษ์ขององค์ชายจุน การส่งคนแบบนี้มาแสดงให้เห็นถึงการขาดความเคารพอย่างชัดเจน ฟู่จ้าวหนิงคิดในใจว่าเซียวหลานหยวนทำผิดซ้ำเติมอีก ยามมองม้าด้วยความประหลาดใจและรู้สึกหงุดหงิด นี่คือม้าชั้นดีที่พวกเขากำลังพูดถึง! เขาเพิ่งเห็นคนเหล่านั้นพยายามทำร้ายมัน “ฝ่าบาท โปรดอภัยให้ข้าพเจ้าด้วย” ยามก้มศีรษะลง “ข้าพเจ้าต้องกลับไปรับโทษ” (บทนี้ยังไม่จบ โปรดคลิกหน้าถัดไปเพื่ออ่านเนื้อหาที่น่าตื่นเต้นต่อไป!) ถ้าจงเจี้ยนรู้เรื่องนี้ เขาจะต้องถูกลงโทษอย่างแน่นอน เขาทำผิดพลาด</p>\n<p>ดังนั้นเขาจึงต้องกลับไปรับโทษด้วยความสมัครใจ “เดี๋ยวก่อน” ฟู่จ้าวหนิงเรียกเขาขณะที่กำลังจะออกไป “นำม้าตัวนี้กลับไปที่วังและขอให้จงเจี้ยนช่วยส่งข้อความให้ข้าด้วย” ยามมองเธอ “ให้จงเจี้ยนถามเซียวหลานหยวนว่าข้าขอยืมม้าตัวนี้สักครู่ได้ไหม” ฟู่จ้าวหนิงขอความช่วยเหลือจากจงเจี้ยน เพราะยามที่วังทำให้เธอมีทัศนคติที่ดีต่อจงเจี้ยนมากขึ้น ตอนนี้ตระกูลฟู่กำลังยุ่งเหยิง และสาขาที่สองและสามก็กำลังวางแผนอะไรบางอย่างอย่างชัดเจน เธอต้องออกไปข้างนอกบ่อยๆ และจำเป็นต้องมีคนอยู่บ้านเพื่อปกป้องปู่และคนอื่นๆ เธอไว้ใจจงเจี้ยนมากกว่า ยามตกใจ เขาต้องการให้จงเจี้ยนมาด้วยตัวเองหรือ?</p>\n<p>&quot;ฝ่าบาท จงเจี้ยนเป็นหัวหน้าหน่วยที่หนึ่ง&quot; กล่าวอีกนัยหนึ่ง จงเจี้ยนเป็นหัวหน้าของยามเหล่านี้ องค์ชายคงไม่ยอมให้หัวหน้ามาปกป้องชายชราที่นอนป่วยอยู่บนเตียงด้วยตัวเองอย่างแน่นอน &quot;แค่เอาข่าวกลับไป&quot; หลังจากฟู่จ้าวหนิงพูดจบ เธอกระซิบกับม้าสองสามคำ ตบหลังมันเบาๆ แล้วพูดว่า &quot;ไปเถอะ เป็นเด็กดี&quot; ม้าก็เดินตามยามไป หลังจากกลับมา ยามก็อธิบายสถานการณ์ให้จงเจี้ยนฟัง จงเจี้ยนมองม้าที่กลับมา น้ำเสียงของเขากลายเป็นจริงจัง &quot;ไปรับโทษเฆี่ยนสิบครั้ง&quot; ยามทำผิดพลาดจริงๆ ทำภารกิจไม่สำเร็จและถูกฟู่จ้าวหนิงจับได้ บังคับให้เขาเปิดเผยตัวตน &quot;ครับ&quot; จงเจี้ยนสูดหายใจเข้าลึกๆ แล้วไปหาองค์ชายจุน ตอนแรกเขาคิดว่าองค์ชายจะไม่ยอมรับคำขอแน่ๆ แต่ไม่คาดคิด พอพูดจบองค์ชายจุนก็พยักหน้า “ข้าเห็นด้วย ไปที่ตระกูลฟู่แล้วบอกฟู่จ้าวหนิงเรื่องนี้เป็นเรื่องแรก” เรื่องแรก? เรื่องแรกอะไรกัน?</p>\n<p>จงเจี้ยนไม่เข้าใจ แต่เขารู้ว่านี่ไม่ใช่สิ่งที่เขาจะขอร้องได้ เขาจึงรับคำสั่งทันทีแล้วไปที่ตระกูลฟู่ “เสี่ยวหลานหยวนไม่เสียอะไรเลยจริงๆ!” ฟู่จ้าวหนิงสบถ</p>"}, "65": {"chapter_number": 65, "chapter_title": "第65章萬一他死了呢", "content": "<p>ฟู่จ้าวหนิงช่วยชีวิตเซียวหลานหยวนและสัญญาว่าจะไปเอาไหมโลหิตหัวใจคืนมาให้เขาแลกกับการขอความช่วยเหลือสิบอย่างจากเซียวหลานหยวน แต่ฟู่จ้าวหนิงไม่ได้คาดคิดว่านี่จะเป็นความช่วยเหลือครั้งแรก เจ้าชายคนนี้ช่างเจ้าเล่ห์และใจแคบจริงๆ “ฝ่าบาท โปรดอย่าลังเลที่จะขอให้ข้าทำอะไรก็ได้ตามพระประสงค์” จงเจี้ยนกล่าวเมื่อเห็นความไม่พอใจและความวุ่นวายใจของฟู่จ้าวหนิงที่มีต่อเจ้าชาย “ข้าพาคนมาสามคน รวมสี่คนแล้ว แค่นี้พอไหม?” “หืม? สี่คน?” ฟู่จ้าวหนิงตื่นเต้นขึ้นมาทันที “เซียวหลานหยวนจะให้คนมาสี่คนเลยเหรอ?” “อ๋อ” จงเจี้ยนส่ายหัว “ไม่ ข้าสามารถเรียกคนมาเองได้เมื่อมีภารกิจ” “ท่านเป็นหัวหน้าของพวกเขาหรือ?” “ก็ว่าได้” จงเจี้ยนพยักหน้า ฟู่จ้าวหนิงจึงเข้าใจว่าทำไมองครักษ์ถึงมองเธอแบบนั้นตอนที่เธอขอให้จงเจี้ยนมาด้วย เขาคิดในใจว่า “เจ้าอยากให้ผู้บัญชาการของเราไปคุ้มครองปู่ของเจ้าจริงหรือ?</p>\n<p>นี่คือหัวหน้าองครักษ์ของวังองค์ชายจุนนะ!” ไม่แปลกใจเลยที่เซียวหลานหยวนพูดแบบนั้นเป็นอย่างแรก การยืมลูกน้องคนสำคัญของเขามานั้นยุ่งยากกว่าการยืมองครักษ์ธรรมดามาก เธอรู้สึกดีขึ้นเล็กน้อย “ตอนนี้ฉันยุ่งอยู่ พวกเจ้าทุกคนต้องไปคุ้มครองปู่ของฉันและคนในวัง รวมถึงสาวใช้และลุงจงด้วย ถ้าฉันต้องการอะไรอีก ฉันจะบอก” “ค่ะ” “ว่าแต่” ฟู่จ้าวหนิงมองดูพวกเขา “ทำไมพวกเจ้าไม่เปลี่ยนเสื้อผ้าล่ะ? ปิดบังตัวตนของพวกเจ้าไว้ ปู่จะได้ไม่รู้ว่าพวกเจ้ามาจากวังองค์ชายจุน” เธอเกรงว่าปู่ของเธอจะโกรธถ้าเห็นคนจากวังองค์ชายจุน “แล้วเราควรใช้ชื่ออะไรดีล่ะ?” ฟู่จ้าวหนิงคิดอยู่ครู่หนึ่ง</p>\n<p>แล้วก็พลันนึกถึงเพื่อนคนหนึ่งในอดีต—เพื่อนที่หาได้ยากจริงๆ ฟางซื่อฉิง ลูกสาวของเจ้าของที่ดินผู้มั่งคั่ง ซึ่งครอบครัวของเธอเป็นเจ้าของที่ดินผืนใหญ่ชานเมือง เธอได้พบกับจงเจี้ยนขณะเก็บสมุนไพร นายท่านฟางมักคิดว่าลูกสาวของเขาสวยงามเป็นพิเศษ และเกรงว่าจะมีอะไรเกิดขึ้นกับเธอ จึงซื้อคนรับใช้ให้เธอมากมาย รวมถึงคนรับใช้ที่มีฝีมือด้านศิลปะการต่อสู้หลายคน “เจ้ารู้จักนายท่านฟางต้าฟู่จากนอกเมืองหรือ” ฟู่จ้าวหนิงถาม เธอไม่คาดคิดว่าจงเจี้ยนจะรู้จัก “บอกไปว่าเจ้าเป็นคนรับใช้ของคุณหญิงฟาง คนที่ข้ายืมมา” จงเจี้ยนพยักหน้าอย่างช่วยไม่ได้</p>\n<p>เขาไม่เคยคิดมาก่อนว่าเหล่าองครักษ์ผู้สง่างามของคฤหาสน์องค์ชายจุนจะแสร้งทำเป็นคนรับใช้ของคนรวยหน้าใหม่ “ฝ่าบาท เราไปเปลี่ยนเสื้อผ้ากันก่อนเถอะ” “เรียกข้าว่าคุณหญิงฟู่ต่อไปนะ” เพราะฟางซื่อฉิงยังไม่รู้ว่าเธอแต่งงานเข้ามาในคฤหาสน์องค์ชายจุน “ค่ะ” ฟู่จ้าวหนิงไปพบนายท่านฟู่ คุณปู่ฟู่ดูอารมณ์ดีขึ้นอย่างเห็นได้ชัด แต่เขาก็ยังลุกจากเตียงไม่ได้ พิงเตียงอยู่ตลอดเวลา มองออกไปนอกประตู เมื่อเห็นฟู่จ้าวหนิง ดวงตาของเขาก็เป็นประกาย “คุณปู่” เมื่อเห็นว่าเขาตื่นแล้ว ฟู่จ้าวหนิงก็รีบเข้ามาจับชีพจร คุณปู่ฟู่หลบมือของเธอ มองไปที่เธอ “จ้าวหนิง เจ้าไปหาองค์ชายจุนหรือ?</p>\n<p>เจ้าได้ยกเลิกการหมั้นหมายแล้วหรือ?” แน่นอน เขายังจำเรื่องการยกเลิกการหมั้นหมายได้ “คุณปู่ ท่านน่าจะรู้ว่าการหย่าร้างกับองค์ชายไม่ใช่เรื่องง่าย แต่ดูฉันสิ ตอนนี้ฉันสบายดีไหม? ฉันกินอิ่มและแต่งตัวอบอุ่น เห็นได้ชัดว่าองค์ชายจุนไม่ได้ทำอะไรฉัน” คุณปู่ฟู่ค่อยๆ จัดผมที่ปรกหน้าของเธอให้เข้าที่ แล้วถอนหายใจ “ที่จริงแล้ว คุณปู่เข้าใจความรู้สึกของคุณ การแต่งงานกับเซียวเหยียนจิงและการยกเลิกการแต่งงานในภายหลังนั้นก็เพื่อฉันทั้งหมด การหยุดรถม้าขององค์ชายจุนกลางถนนเพื่อแต่งงานกับเขาก็เพื่อฉันเช่นกัน” คุณปู่ฟู่ลูบหน้าอกของเขาเบาๆ “คุณปู่ ฉันจะควบคุมอารมณ์และพยายามมีชีวิตอยู่ต่อไปอีกหน่อย</p>\n<p>ฉันจะไม่หงุดหงิดหรือโมโหง่ายอีกต่อไป” ฟู่จ้าวหนิงมองไปที่รอยย่นที่มุมตาของเขาและรู้สึกเศร้าเล็กน้อย หลังจากถูกอาจารย์ฉีเฉินตบหัวสามครั้ง เธอก็รู้สึกจริงๆ ว่าความรู้สึกที่มีต่อตระกูลฟู่และคุณปู่ฟู่ลึกซึ้งขึ้นมาก การเห็นคุณปู่ฟู่เป็นเช่นนี้ เธอก็รู้สึกเศร้าเช่นกัน “ฉันรู้ว่าฉันต้องทำให้คุณตกใจมาก่อน จ้าวหนิง อย่าโทษคุณปู่เลย” “ไม่ ฉันจะโทษคุณปู่ได้อย่างไร” “ปู่ไม่มีเวลาเล่าเรื่องครอบครัวและองค์ชายจุนให้เจ้าฟังก่อนหน้านี้ ข้าคิดว่ามันไม่จำเป็นหรอก เพราะเราคงไม่มีโอกาสได้เจอกับองค์ชายจุนในชาตินี้ องค์ชายจุนเป็นสมาชิกชั้นสูงของราชวงศ์ ส่วนตระกูลฟู่ของเราตกต่ำถึงขนาดเป็นพ่อค้าไม่ได้ด้วยซ้ำ</p>\n<p>ข้าคิดว่าเราคงไม่มีโอกาสได้เจอกัน” น้ำตาคลอเบ้าในดวงตาของท่านฟู่ “แต่ชีวิตนั้นคาดเดาไม่ได้ ใครจะไปคาดคิดว่าเจ้าจะได้แต่งงานกับเขาแบบนี้” ในตอนนี้ ท่านฟู่เริ่มหายใจหอบ แม้ว่าเขาควรจะควบคุมอารมณ์ แต่เรื่องนี้เป็นเรื่องใหญ่สำหรับเขา และยากที่จะควบคุมตัวเองได้จริงๆ ฟู่จ้าวหนิงไม่อยากให้เขาเสียใจและพูดมาก จึงรีบพูดว่า “ปู่คะ องค์ชายจุนบอกเหตุผลที่ยอมแต่งงานกับหนูแล้ว เขาไม่ได้อยากทรมานหรือทำร้ายหนู เขาแค่คิดว่าพ่อแม่ของหนูยังไม่ตายและจะกลับมาในสักวันหนึ่ง” ดวงตาของปู่ฟู่เบิกกว้างด้วยความไม่เชื่อ “เขาพูดอย่างนั้นเหรอ?</p>\n<p>เขาบอกเธอจริงๆ เหรอ?” “ใช่ เขาพูดบางอย่าง” ฟู่จ้าวหนิงกล่าว “เขาแค่อยากให้ฉันอยู่ข้างๆ เขา เพื่อที่ว่าถ้าวันหนึ่งพ่อแม่ของฉันกลับมา พวกเขาอาจจะไม่อยากทิ้งฉัน และจะต้องไปหาเขาเพื่ออธิบายความจริงเกี่ยวกับสิ่งที่เกิดขึ้นในตอนนั้น” ปู่ฟู่ตกตะลึงอยู่นานหลังจากได้ยินคำพูดของเธอ “ปู่คะ หนูจะบอกปู่ค่ะ สุขภาพขององค์ชายจุนยังไม่ค่อยดีนัก” ฟู่จ้าวหนิงกล่าวเบาๆ “ดังนั้นเขาจึงรังแกหนูไม่ได้ หนูแค่ดำรงตำแหน่งองค์ชายจุนอยู่ตอนนี้ มันไม่สำคัญหรอก บางทีเขาอาจจะแค่รอไปเรื่อยๆ แล้วก็ตายไปเองก็ได้?” “จริงเหรอ?” ปู่ฟู่มองเธอ “เขาไม่ได้รังแกเธอเหรอ?” “ไม่ ไม่ค่ะ” ปู่ฟู่ถอนหายใจโล่งอก “นอกจากนี้ เมื่อปู่หายดีแล้ว</p>\n<p>เราค่อยคิดหาวิธีอื่น ตอนนี้ปู่ต้องการฉันในฐานะเจ้าหญิง ดังนั้นปู่จะไม่ทำร้ายฉันหรอก ฉันจะพยายามอย่างเต็มที่เพื่อเรียนแพทย์ และถ้าฉันรักษาปู่ได้ในอนาคต บางทีฉันอาจจะยุติความบาดหมางนี้ได้” ฟู่จ้าวหนิงเกลี้ยกล่อมคุณปู่ฟู่ อาจเป็นเพราะเธอมีสุขภาพดีและร่าเริงขึ้นมาก คุณปู่ฟู่จึงเชื่อเธอ “งั้นเจ้าต้องสัญญากับปู่ว่าเมื่อมีโอกาส เจ้าจะต้องหย่ากับปู่ จ้าวหนิง ถึงแม้ปู่จะไม่แค้นเคืองกับเรื่องที่เกิดขึ้นในอดีต แต่ปู่ก็ยังมีความแค้นสะสมมาหลายปี เป็นไปไม่ได้ที่ปู่จะปฏิบัติต่อเจ้าดีนัก นอกจากนี้ ด้วยฐานะของปู่ ถึงแม้ปู่จะหายดีแล้ว ใครจะรู้ว่าปู่จะมีสนมและเมียน้อยอีกกี่คน”</p>\n<p>“ปู่หวังเพียงว่าเจ้าจะพบชายที่ใจดีและซื่อสัตย์ที่เข้าใจเจ้าและใช้ชีวิตอย่างสงบสุข ปู่ไม่อยากให้เจ้าเข้าไปยุ่งเกี่ยวกับการทะเลาะวิวาทภายในราชวงศ์” ณ จุดนี้ ฟู่จ้าวหนิงจึงตกลงโดยไม่ลังเล หลังจากปลอบโยนท่านอาจารย์ฟู่และให้ยาแล้ว ฟู่จ้าวหนิงก็กลับไปที่บ้านเพื่อคิดว่าจะหาหนอนไหมโลหิตหัวใจได้จากที่ไหน ในห้องของฟู่หย่งหนิงที่อยู่ด้านหน้าสามห้อง หมอเฒ่าลุกขึ้นยืนด้วยสีหน้าเคร่งขรึม ส่ายหัวแล้วพูดว่า &quot;อาการป่วยของท่านอาจารย์น้อยที่หกนั้นแปลกประหลาด ข้าช่วยไม่ได้&quot; ท่านหญิงฟู่ที่สามเริ่มร้องไห้</p>"}, "66": {"chapter_number": 66, "chapter_title": "第66章飛走了", "content": "<p>“เราจะทำยังไงดี?” คุณหญิงคนที่สามโกรธจัดและไล่หมอแก่คนนั้นออกไป หมอเถื่อนอะไรกัน! “ไปตามหมอคนอื่นมา! หมอหลี่ นั่นแหละ ไปตามหมอหลี่มา!” คุณหญิงคนที่สามตะโกน ไห่ฉางจุนก็วิ่งมาเช่นกัน และเหล่าคนรับใช้ก็รีบวิ่งออกมา เกือบจะชนเธอ “เกิดอะไรขึ้น?” ทันทีที่เห็น คุณหญิงคนที่สามก็มีดวงตาเป็นประกาย เธอรีบคว้ามือเขาไว้ “ท่านหญิงผู้ศักดิ์สิทธิ์ ช่วยดูหย่งหนิงของข้าหน่อยได้ไหม เขาพูดไม่ได้!” ดวงตาของไห่ฉางจุนเป็นประกาย “เขาไม่ได้กำลังจะไปจับม้าเหรอ? ทำไมเขาถึงพูดไม่ได้โดยไม่มีเหตุผล?” “ทั้งหมดเป็นความผิดของยัยฟู่จ้าวหนิงนั่น ยัยนั่นบอกว่าม้าเป็นของยัยนั่น แล้วก็เอาเข็มมาจิ้มมัน หย่งหนิงของข้าโดนเข็มของยัยนั่นแทงจนเจ็บ และตอนนี้เขาพูดไม่ได้แล้ว” คุณหญิงคนที่สามก็อยากจะตามหาฟู่จ้าวหนิงเพื่อสะสางเรื่องราวเช่นกัน แต่เธอกลัวว่ามันจะส่งผลเสียต่อสุขภาพของลูกชาย เธอจึงทำได้เพียงอดทน “เธอใช้เข็มเหรอ?</p>\n<p>เธอแค่จิ้มเขามั่วๆ จริงๆ เหรอ?” ไห่ฉางจุนนึกถึงฉากที่ฟู่จ้าวหนิงช่วยชีวิตคนบนถนน และอดไม่ได้ที่จะเดินไปข้างเตียงเพื่อดูฟู่หย่งหนิง ฟู่จ้าวหนิงไม่ใช่ผู้เชี่ยวชาญด้านการแพทย์เหรอ? เธอสามารถใช้เข็มปิดจุดฝังเข็มได้ด้วยเหรอ? ถ้าเป็นเช่นนั้น ฟู่จ้าวหนิงก็เก่งกว่าที่เธอคิดไว้เสียอีก! อย่างไรก็ตาม คุณหญิงคนที่สามไม่เชื่อว่าฟู่จ้าวหนิงจะมีความรู้ด้านการแพทย์หรือเทคนิคการปิดจุดฝังเข็มใดๆ เธอเฝ้าดูฟู่จ้าวหนิงเติบโตมา เธอจะไม่รู้ข้อจำกัดของเธอได้อย่างไร?</p>\n<p>ฟู่จ้าวหนิงไม่รู้อะไรเลย โง่เหลือเชื่อ และมักจะทำให้ตัวเองดูโง่เสมอ! “นางต้องจิ้มเขามั่วซั่วแน่ๆ! เข็มมันอันตรายมาก จะทำแบบนั้นไม่ได้หรอก
