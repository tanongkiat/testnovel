าจะไม่ไว้ใจท่าน?” องค์ชายจุนกล่าวอย่างใจเย็น “ถ้าข้าไม่มา เจ้าคงถูกพวกนั้นรังแกไปแล้ว เจ้าหาสมุนไพรได้ถึงสิบชนิด เจ้าคิดว่าพวกนั้นจะยอมรับง่ายๆหรือ?” “ข้าต้องขอบคุณท่าน...</p>\n<p>เฮ้!” ก่อนที่ฟู่จ้าวหนิงจะพูดจบ องค์ชายจุนก็ทรุดตัวลงมาหาเธอแล้ว</p>"}, "40": {"chapter_number": 40, "chapter_title": "第40章王爺好像被那啥了", "content": "<p>เมื่อเห็นเจ้าชายจุนกำลังจะล้มลงบนโต๊ะเล็กๆ ฟู่จ้าวหนิงจึงรีบเอื้อมมือไปประคองเขา ลุกขึ้นนั่งข้างๆ แล้วหยิบหมอนเล็กๆ มาให้เขาพิง “ฝ่าบาท เกิดอะไรขึ้นกับเจ้าชาย?” เสียงของชิงอี้ดังขึ้นอีกครั้ง “เขากำลังจะตาย!” ฟู่จ้าวหนิงตอบพลางเตรียมหยิบเข็มและยาจากห้องยา เมื่อชิงอี้กำลังจะเปิดม่านเข้าไปดู เธอก็สะบัดปากอย่างเย็นชาทันที “อย่าเข้ามา! ยังอยากให้ฉันช่วยเขาอีกหรือ?” มือของชิงอี้ชะงัก ลังเลที่จะเปิดม่าน “ฝ่าบาท ตอนนี้ท่านเป็นเจ้าหญิงของเราแล้ว โปรดช่วยเจ้าชายด้วย!” “หุบปาก!” ฟู่จ้าวหนิงเพิ่งรู้ตัวว่าชิงอี้ช่างพูดเสียจริง ตอนแรกเธอนึกว่าเขาเป็นหนุ่มที่ค่อนข้างจริงจัง ชิงอี้จึงหุบปากอีกครั้ง</p>\n<p>ฟู่จ้าวหนิงหยิบยาฉีดบำรุงหัวใจออกมา มองไปที่องค์ชายจุน กัดฟันแน่น คลายเข็มขัด ยกเสื้อคลุมขึ้น แล้วพลิกตัวเขา มองดูที่ขอบกางเกง เธอเตรียมใจไว้แล้ว เธอตัดสินใจแล้วว่าจะไม่ปฏิบัติต่อเขาในฐานะสามีในนาม แต่จะปฏิบัติต่อเขาในฐานะคนไข้!</p>\n<p>ด้วยความคิดนั้น เธอจึงดึงเข็มออกมา หาจุดที่เหมาะสม ฆ่าเชื้อด้วยสำลี แล้วแทงเข็มเข้าไป เธอแทงเข็มเข้าไปแล้วดึงออกอย่างรวดเร็ว เธอโยนเข็มฉีดยากลับเข้าไปในห้องยา รู้สึกเสียดายเล็กน้อย ยาบำรุงหัวใจนี้เป็นสิ่งที่เธอทำเอง มีประสิทธิภาพอย่างเหลือเชื่อในสถานการณ์ฉุกเฉิน การใช้เข็มกับองค์ชายจุนแบบนี้ เธอสงสัยว่าเธอจะสามารถทำมันขึ้นมาได้อีกหรือไม่ หลังจากฉีดยาแล้ว เธอพลิกตัวเขา ถอดเสื้อคลุมออก แล้วหยิบเข็มเงินออกมาเพื่อทำการฝังเข็มที่จุดต่างๆ บนหน้าอกของเขา เดิมทีนางตั้งใจจะทำการฝังเข็มทั่วร่างกาย แต่การอยู่ในรถม้าทำให้ไม่สะดวก นางจึงทำได้เพียงเน้นไปที่จุดสำคัญที่สุดก่อน</p>\n<p>การช่วยชีวิตเขาเป็นสิ่งสำคัญที่สุด รถมาชะลอความเร็วลง แต่เมื่อพวกเขากลับมาถึงที่ประทับขององค์ชายจุน เขาก็ฟื้นขึ้นมาแล้ว คราวนี้เมื่อตื่นขึ้นมา เขารู้สึกมึนงงไปชั่วขณะ เป็นความรู้สึกที่เขาอธิบายไม่ถูก แต่ในวินาทีที่เขาหมดสติไป เขาก็ได้ลิ้มรสความขมขื่นของความตายอย่างแท้จริง ชั่วขณะหนึ่ง เขาคิดว่าตัวเองอาจจะตาย แต่แล้วเขาก็ฟื้นขึ้นมา “ฝ่าบาท ฝ่าบาททรงรู้สึกอย่างไรบ้าง” ชิงอี้ถามเขาอย่างระมัดระวัง ในใจยังคงนึกถึงภาพที่เห็นเมื่อฟู่จ้าวหนิงยกม่านขึ้นและก้าวลงมาหลังจากรถม้าหยุด ฉลองพระองค์ขององค์ชายเปิดออก เผยให้เห็นหน้าอกที่กว้างใหญ่ และชายฉลองพระองค์ดูยับย่น ราวกับว่าถูกยกขึ้นก่อนหน้านี้</p>\n<p>นอนอยู่ตรงนั้น เขาดูเหมือนคนลามกที่เพิ่ง... เอ่อ คุณก็รู้ “ข้าไม่เป็นไร” เจ้าชายจุนมองดูเสื้อผ้าของตัวเองซึ่งดูยับยู่ยี่เล็กน้อย แต่คิดว่าเขาคงถูกดึงไปนิดหน่อยตอนที่ฟู่จ้าวหนิงช่วยเขาตอนที่เขาเป็นลม เขาจึงไม่ได้ใส่ใจมากนัก เขาจึงลุกขึ้นนั่ง แต่ไม่เห็นฟู่จ้าวหนิง “เธออยู่ไหน” “ฝ่าบาทหมายถึงเจ้าหญิงใช่ไหม” ชิงอี้รีบพูด “เจ้าหญิงบอกว่าเธอเป็นห่วงท่านฟู่ผู้เฒ่าและจำเป็นต้องกลับไปที่ตระกูลฟู่ก่อน เธอต้องการให้ฝ่าบาทมาพักผ่อนที่คฤหาสน์ อย่าลุกขึ้นโดยไม่จำเป็น” เจ้าชายจุนขมวดคิ้ว “เธอหนีไปก่อนที่ข้าจะตื่นด้วยซ้ำ” “อืม ใช่” ชิงอี้เสริม “เจ้าหญิงยืมม้าป่าตัวนั้นอีกแล้ว” และคราวนี้</p>\n<p>เจ้าหญิงขี่ม้าตัวนั้นหนีไปได้อย่างง่ายดาย ม้าป่าที่ไม่มีใครเข้าใกล้ได้นั้นเหมือนแกะต่อหน้าเธอ เชื่อฟังมาก เจ้าชายจุนยิ้มมุมปากเล็กน้อย ฟู่จ้าวหนิงขี่ม้าควบไปตามถนนยาว กลับไปยังตระกูลฟู่อย่างรวดเร็ว คราวนี้เธอยังคงไปที่ประตูหลัง ทันทีที่ลงจากม้า เธอก็เห็นว่าประตูเปิดอยู่ และมีเสียงคนดึงและลากอยู่ข้างใน “ไปไม่ได้!</p>\n<p>ถ้าไป ฉันจะไม่รู้ว่าจะตอบคำถามของท่านอาจารย์อย่างไร!” “แต่คุณหนูสั่งก่อนไปว่า ถ้าเกิดอะไรขึ้น ฉันต้องไปหาเธอ” “ยามสองคนนั้นไม่ได้บอกว่าคุณหนูขึ้นไปเก็บสมุนไพรบนภูเขาหลายวันแล้วเหรอ? เจ้าจะไปหาเธอที่ไหน?” ฟู่จ้าวหนิงจำเสียงผู้ชายได้ว่าเป็นเสียงของลุงจง และเสียงผู้หญิงเป็นเสียงของป้าจง คุณนายฟู่กลัวเธอในวันนั้น ดังนั้นเธอจึงไม่กล้าที่จะไม่ส่งป้าจงกลับไป เธอจูงม้าผ่านประตูหลัง “ลุงจง ท่านกำลังตามหาฉันหรือ?” ลุงจงเงยหน้าขึ้นอย่างรวดเร็วและตื่นเต้นเมื่อเห็นเธอ “คุณหนูกลับมาแล้ว!” หญิงวัยกลางคนอีกคนหนึ่งที่ดูเรียบง่ายและมีความสามารถคือป้าจง</p>\n<p>พวกเธอเป็นคนรับใช้ที่ภักดีเพียงไม่กี่คนที่เหลืออยู่ในตระกูลฟู่ “คุณหนู!” ป้าจงเห็นเธอจึงรีบเดินเข้าไปกอดเธอแน่นและร้องไห้ออกมา “ฉันคิดว่าฉันจะไม่ได้เจอคุณหนูอีกแล้ว!” ฟู่จ้าวหนิงไม่ค่อยถูกกอดแน่นขนาดนี้มาก่อน และชั่วขณะหนึ่งเธอก็ตกใจเล็กน้อย แต่กลิ่นหอมจางๆ ที่โชยออกมาจากป้าจงทำให้เธอได้สติ เธอจึงรีบผละออกจากป้าจงและกดไหล่ของเธอไว้เพื่อไม่ให้เธอขยับ “คุณหนู?” “คุณหนูมาหาฉันหรือคะ?</p>\n<p>คุณปู่เป็นอะไรไปคะ?” ฟู่จ้าวหนิงถามพลางจับข้อมือป้าจงไว้แน่นขณะพาเธอเข้าไปข้างใน มองเผินๆ ชีพจรของป้าจงดูปกติดี แต่เธอมีชื่อเสียงในเรื่องความสามารถในการตรวจจับปัญหาที่ซ่อนอยู่ ดังนั้นฟู่จ้าวหนิงจึงสังเกตเห็นบางอย่างผิดปกติในชีพจรของป้าจง “ปู่ขอให้ข้าตามหาคุณหนูมาสองวันแล้ว คุณหนูไม่ได้อธิบายชัดเจนว่าแต่งงานกับตระกูลไหนตอนที่กลับมาวันนั้น” ลุงจงเดินตามหลังไปพลางอธิบายไปด้วย “แต่ตอนที่คนของท่านหญิงรองพาแม่เสือกลับมา พวกเขาบอกว่าคุณหนูแต่งงานกับเจ้าชายจุน!” พวกเขาไม่อยากเชื่อ เจ้าชายจุนไม่ได้อยู่ในเมืองหลวงมาหลายปีแล้ว และคุณหนูก็ไม่เคยติดต่อกับเขาเลย</p>\n<p>เธอจะแต่งงานกับเจ้าชายจุนได้อย่างไรโดยไม่มีเหตุผลเช่นนี้? “ท่านอาจารย์ใหญ่รู้สึกกังวลหลังจากได้ยินเรื่องนี้ จึงส่งเสี่ยวเถาออกไปสอบถาม” ลุงจงกล่าว แล้วมองไปที่ฟู่จ้าวหนิงด้วยความกังวล “เขาได้ยินเรื่องเกี่ยวกับวันแต่งงานของคุณหนู และท่านอาจารย์ใหญ่ตกใจมาก อยากจะไปที่คฤหาสน์ของเจ้าชายจุนเพื่อตามหาคุณหนูด้วยตัวเอง” ฟู่จ้าวหนิงดึงมือออกจากชีพจรของลุงจง “ปู่ตกใจมากเมื่อได้ยินว่าฉันเป็นภรรยาของเจ้าชายจุน?” “นายท่านบอกว่าองค์ชายจุนไม่คิดจะแต่งงานกับคุณหนูจริงๆ และคุณหนูจะต้องเดือดร้อนถ้าแต่งงานกับเขา วันนี้เขาขอให้ฉันไปหาคุณหนูอีกครั้ง ถ้าฉันไม่ไป เขาจะไปที่คฤหาสน์ขององค์ชายจุนเองถึงแม้จะป่วยก็ตาม”</p>\n<p>ฟู่จ้าวหนิงรู้สึกงุนงงเล็กน้อย “ฉันจะไปเยี่ยมคุณปู่” หลังจากเดินไปได้ไม่กี่ก้าว เธอก็นึกอะไรบางอย่างขึ้นได้ “ช่วงสองสามวันที่ผ่านมา มีญาติฝ่ายอื่นมาสร้างปัญหาหรือเปล่า?” “ไม่มี...” “เมื่อกี้มีคุณตาคนไหนพาหมอมาด้วยไม่ใช่เหรอ?” คุณตาจีไม่ได้บอกว่าจะมาเยี่ยมคุณปู่ที่บ้านฟู่ให้เธอเหรอ?</p>\n<p>เขาอยู่ไหน? “อ๋อ? ไม่มี” ฟู่จ้าวหนิงรู้สึกว่าคุณตาจีดูไม่เหมือนคนรักษาคำพูด มีอะไรเกิดขึ้นกับเขาหรือเปล่า? เธอรีบไปที่ห้องของคุณปู่ฟู่ เสี่ยวเถารินน้ำร้อนให้เขา มือของคุณปู่ฟู่ยังคงสั่นเทาขณะรับถ้วย จากนั้นเขาก็เห็นฟู่จ้าวหนิงรีบวิ่งเข้ามา มือของเขาสั่นเทาจนทำน้ำร้อนหกใส่ผ้าห่มทั้งถ้วย “อาหนิง!” “คุณปู่!” ฟู่จ้าวหนิงรีบวิ่งเข้ามา และเสี่ยวเถาจัดการเก็บผ้าห่มให้เรียบร้อย คุณปู่ฟู่รอไม่ไหวอีกต่อไป เขาจับมือเธอแน่นและถามด้วยเสียงสั่นเครือว่า “บอกท่านปู่มาสิ เธอแต่งงานกับเสี่ยวหลานหยวนจริงหรือ?”</p>"}, "41": {"chapter_number": 41, "chapter_title": "第41章一定要和離", "content": "<p>ฟู่จ้าวหนิงรู้สึกประหลาดใจเล็กน้อย เธอไม่รู้จักชื่อขององค์ชายจุน แต่ดูเหมือนว่าปู่ของเธอจะรู้จักเขา “ค่ะ...” เธอพูดไปได้เพียงคำเดียว คุณปู่ฟู่ก็ดูตื่นตระหนกอย่างมาก พูดอย่างกระวนกระวายและเร่งรีบว่า “ยกเลิกการหมั้น! ยกเลิกการหมั้นกับเขา!” ฟู่จ้าวหนิงตกตะลึง “คุณปู่คะ มันไม่ใช่การหมั้น เราแต่งงานกันแล้ว!” พวกเขาแต่งงานกันแล้ว ทำไมถึงพูดเรื่องการยกเลิกการหมั้น? ดวงตาของคุณปู่ฟู่แดงก่ำ น้ำตาไหลอาบแก้ม “งั้นก็หย่าสิ!” “คุณปู่คะ?” เสี่ยวเถาและคนอื่นๆ ต่างตกตะลึง คุณปู่แบบไหนกันที่จะแนะนำให้หลานสาวหย่าหลังจากแต่งงานได้เพียงไม่กี่วัน? “จ้าวหนิง เธอ...</p>\n<p>เธอได้ร่วมหลับนอนกับเสี่ยวหลานหยวนแล้วหรือยัง?” คุณปู่ฟู่จับมือเธอแน่น ฟู่จ้าวหนิงส่ายหัวทันที “ยังค่ะ” “ดีแล้ว ดีแล้ว! หย่ากับเขาเถอะ ยังไม่สายเกินไป” คุณชายฟู่พยายามลุกขึ้น “ฉันจะไปที่วังอีกครั้งเพื่อเข้าเฝ้าฮ่องเต้ และให้พระองค์ทรงตัดสินเรื่องการหย่า” ฟู่จ้าวหนิงเริ่มสงสัยในปฏิกิริยาของเขามากขึ้นเรื่อยๆ ตระกูลฟู่มีความแค้นอะไรกับองค์ชายจุนหรือเปล่า? แต่ความกระตือรือร้นที่จะแต่งงานของเธอก็เพื่อหลีกเลี่ยงการทำให้ปู่ของเธอไม่พอใจ หากการแต่งงานครั้งนี้ทำให้เขากระวนกระวายและไม่สบายใจเช่นนี้ มันก็จะไร้ความหมาย ฟู่จ้าวหนิงปลอบโยนเขาก่อน</p>\n<p>ขณะที่แอบกดจุดฝังเข็มของคุณชายฟู่เพื่อช่วยให้เลือดและหัวใจของเขาสงบลง หลังจากคุณชายฟู่สงบลงบ้างแล้ว เธอก็ตกลงและนวดให้เขาจนเขาสงบลง ภายใต้การนวดของเธอ คุณชายฟู่เผลอหลับไป เสี่ยวเถาและคนอื่นๆ ที่กังวลใจอยู่ก็ถอนหายใจโล่งอก พวกเขากลัวจริงๆ ว่าคุณชายจะหายใจไม่ออกเพราะความกระวนกระวายเช่นนี้ โชคดีที่คุณหนูมีวิธีแก้ปัญหา ฟู่จ้าวหนิงกำลังจะถามลุงจงและคนอื่นๆ ว่าพวกเขารู้หรือไม่ว่าทำไมปู่ของเธอถึงอยากให้เธอหย่ากับเจ้าชายจุนนัก แต่เธอก็หันไปเห็นคุณปู่จี หมอ และลูกศิษย์หมออีกสองคนยืนอยู่ที่ประตู ดวงตาของพวกเขาดูเหมือนจะเป็นประกายขณะมองมาที่เธอ โดยเฉพาะคุณปู่จีและลูกศิษย์หมอจ้องมองเธออย่างตั้งใจ</p>\n<p>ราวกับว่าพวกเขาเห็นชิ้นเนื้อขนาดใหญ่ ฟู่จ้าวหนิงรู้สึกถึงอารมณ์ที่พลุ่งพล่านอยู่ภายใน “ศิษย์ เข้ามา เข้ามา” คุณปู่จีที่ยืนอยู่ที่ประตูไม่ได้เข้ามา แต่เรียกเธอด้วยเสียงเบาๆ “คุณหนู พวกเขาเข้ามาได้อย่างไร พวกเขาเป็นคนที่เจ้ารู้จักหรือเปล่า” เสี่ยวเถาตกใจ พวกเขามุ่งความสนใจไปที่คุณปู่ฟู่และไม่ได้สังเกตว่ามีคนมามากมาย “ใช่ค่ะ” ฟู่จ้าวหนิงพาปู่ของเธอเข้านอนแล้วออกไปข้างนอก เมื่อออกมาข้างนอก เธอสังเกตเห็นว่ากลุ่มคนเหล่านั้นดูค่อนข้างยุ่งเหยิง เสื้อผ้าของชายชราจีขาดวิ่นและเต็มไปด้วยฝุ่น เช่นเดียวกับหมอและแพทย์ฝึกหัดอีกสองคน แขนเสื้อของแพทย์ฝึกหัดคนหนึ่งขาด และมีเศษหญ้าติดอยู่บนผม</p>\n<p>“เกิดอะไรขึ้นกับพวกเจ้า?” “อย่าพูดถึงเลย ศิษย์ของข้า!</p>\n<p>รถเกวียนเสียและพลิกคว่ำลงไปในคูน้ำ ถ้าเราไม่ได้เจอกับชายหนุ่มคนหนึ่งกับคนรับใช้ของเขา เราคงกลับมาไม่ได้” ชายชราจีถอนหายใจ จากนั้นก็เริ่มโกรธเล็กน้อย “รถเกวียนของข้าต้องถูกยุ่งเกี่ยวแน่ๆ สมาคมแพทย์นี่น่าสงสัยที่สุด!” สมาคมแพทย์? “ท่านมีศัตรูด้วยเหรอ?” “แน่นอนสิ! ไม่ใช่ไอ้คนนามสกุลหลี่คนนั้นเหรอ?” ชายชราจีพูดอย่างเยาะเย้ย “พวกเจ้าไม่เป็นไรเหรอ?” “พวกเราไม่เป็นไร เราจะซ่อมเสื้อผ้าเมื่อกลับไปถึง” หมอหวังที่ยืนอยู่ใกล้ๆ มองไปที่ชายชราจี จากนั้นก็มองไปที่ฟู่จ้าวหนิง ดูเหมือนเขาจะค้นพบความลับที่น่าเหลือเชื่อบางอย่าง ก่อนหน้านี้ท่านเฒ่าจีเคยไปที่ภูเขาลั่วเยว่ โดยบอกว่ารับศิษย์มาคนหนึ่ง และท่านก็ค่อนข้างภูมิใจในตัวเอง แต่เมื่อฟู่จ้าวหนิงออกมา ท่านดูเหมือนจะไม่รู้จักเธอเลย แถมยังเรียกเธอว่า &quot;เด็กน้อย&quot; แล้วเมื่อกี้ท่านเรียกเธอว่าอะไรนะ?</p>\n<p>ศิษย์! ฟู่จ้าวหนิงคนนี้เป็นศิษย์ของท่านเฒ่าจีอย่างชัดเจน และท่านเฒ่าจีไปที่นั่นเพื่อช่วยเหลือเธอโดยเฉพาะ! แต่ตอนนี้ความสนใจของท่านไม่ได้อยู่ที่ความลับนั้น แต่กลับเป็น— &quot;พระชายาจุน เทคนิคที่ท่านใช้นวดท่านเฒ่าฟู่เมื่อกี้นั้นยอดเยี่ยมมาก!&quot; ท่านรอให้ท่านเฒ่าจีพูดกับฟู่จ้าวหนิงต่อไม่ไหว จึงรีบขัดจังหวะ &quot;นี่คือหมอหวังครับ อ้อ อาจารย์ของข้าเชิญเขามาตรวจคุณปู่ของท่านโดยเฉพาะ เราให้เขาตรวจดูก่อนดีไหมครับ?&quot; ฟู่จ้าวหนิงตอนแรกอยากจะปฏิเสธ แต่แล้วเธอก็คิดว่าเธอไม่รู้จักทักษะทางการแพทย์ของแพทย์ในอาณาจักรจ้าว ดังนั้นการเรียนรู้จากพวกเขาก็คงเป็นเรื่องดี เธอจึงพยักหน้า</p>\n<p>“งั้นกรุณาให้หมอหวังตรวจดูปู่ของข้าด้วย ส่วนเทคนิคที่ข้าใช้เมื่อกี้นี้ เราค่อยคุยกับหมอหวังทีหลังก็ได้” “จริงเหรอ?” เสียงของหมอหวังดังขึ้นแปดอ็อกเทฟด้วยความตื่นเต้น “พระสนมจุน ไม่ต้องสุภาพขนาดนั้นก็ได้ ข้าจะไปเดี๋ยวนี้!” หมอหวังรีบเข้าไปตรวจชีพจรของท่านผู้เฒ่าฟู่ ท่านผู้เฒ่าจีดึงฟู่จ้าวหนิงกลับมา “ประตูหลังบ้านของท่านไม่ได้ปิด พวกเราเห็นท่านขี่ม้าผ่านมาแต่ไกลจึงตามไป พวกเราตะโกนขอความช่วยเหลือแต่ไม่ได้ยินเสียงท่าน จึงเข้ามาเอง” ก่อนที่ฟู่จ้าวหนิงจะพูดอะไรต่อ เขาก็เสริมว่า “ตามเข้ามาไม่ใช่เรื่องใหญ่ใช่ไหม?</p>\n<p>ข้าแค่จะบอกว่า พวกเราได้ยินมาว่าปู่ของท่านต้องการให้ท่านหย่ากับเจ้าชายจุน” เรื่องนี้... ฟู่จ้าวหนิงขมวดคิ้ว เธอไม่เคยคาดคิดมาก่อนว่าสามีที่เธอเลือกจากข้างถนนเพื่อเอาใจปู่ของเธอ จะกลายเป็นสาเหตุที่ทำให้ปู่ของเธอต้องการให้เธอหย่ากับเขา “คุณปู่จี...” “เรียกข้าว่าอาจารย์ ไม่ว่าท่านจะเห็นด้วยหรือไม่ ข้าตัดสินใจแล้วว่าจะรับท่านเป็นศิษย์” คุณปู่จีจ้องมองเธอ “ออกไปสอบถามเกี่ยวกับพันธมิตรการแพทย์โลกดูสิ ทักษะทางการแพทย์ของท่านเกิดขึ้นอย่างลึกลับหรือ? ข้าได้ยินข่าวลือเกี่ยวกับท่านมาหลายวันแล้ว หากท่านยอมรับข้าเป็นอาจารย์และเข้าร่วมเป็นสมาชิกของพันธมิตรการแพทย์</p>\n<p>ข้าจะหาเหตุผลมาอธิบายทักษะทางการแพทย์ของท่าน” “เหตุผลที่จะหลอกคนได้อย่างแน่นอน เป็นอย่างไรบ้าง?” เขาไม่อาจพลาดศิษย์ที่เหมาะสมเช่นนี้ได้ หากเธอไม่คว้าโอกาสนี้ไว้ตอนนี้ คนอื่นอาจแย่งเธอไปในภายหลัง เธอมีทักษะทางการแพทย์ หากเธอเข้าร่วมสมาคมการแพทย์ เขาจะต้องเสียใจอย่างมาก ฟู่จ้าวหนิงเห็นได้อย่างชัดเจนถึงความเอาใจใส่และความช่วยเหลือที่ท่านผู้เฒ่าจีมอบให้เธอที่ภูเขาลั่วเยว่ “เอาล่ะ ไว้ค่อยว่ากันทีหลัง ข้าแค่อยากถามว่าท่านเคยได้ยินเรื่องความขัดแย้งในอดีตระหว่างตระกูลฟู่ของเรากับคฤหาสน์ขององค์ชายจุนบ้างหรือไม่?” ท่านผู้เฒ่าจีส่ายหัว “ข้าไม่เคยได้ยินเรื่องนี้มาก่อน ข้าไม่ค่อยได้เข้าเมืองหลวงบ่อยนัก</p>\n<p>ข้าเคยเดินทางไปทั่วบ่อยๆ ใช้เวลานานๆ อยู่ในภูเขา หรือไม่ก็ดูแลสวนสมุนไพรที่สำนักยา ข้าไม่เคยได้ยินเรื่องนี้จริงๆ” “แต่เจ้ารู้จักองค์ชายจุนหรือ?” “ข้ารู้จักบ้าง ท่านไม่รู้จักเลยหรือ?” ท่านผู้เฒ่าจีมองเธอด้วยความประหลาดใจ “เจ้าแต่งงานโดยไม่รู้เรื่องอะไรเลยจริงๆหรือ?” ฟู่จ้าวหนิงพยักหน้าอย่างช่วยไม่ได้ ตอนนี้เธอกำลังไตร่ตรองว่าการแต่งงานครั้งนี้เร็วเกินไปหรือไม่ แต่ในตอนนั้น เธอเพิ่งได้รับความทรงจำของนางสาวฟู่ และในใจของเธอมีเพียงความคิดเดียวคือ เธอต้องแต่งงาน เธอต้องทำให้คุณปู่สบายใจ และเธอไม่อาจปล่อยให้ท่านเสียใจได้ หากเธอมีเวลาคิดทบทวนอีกสักสองสามวัน เธอคงไม่แต่งงานอย่างเร่งรีบเช่นนี้</p>\n<p>“องค์ชายจุนจะมีอะไรผิดปกติหรือ?</p>\n<p>เขาไม่ใช่แค่โอรสของจักรพรรดิที่อาศัยอยู่ในแคว้นนอกเมืองหลวง และกำลังพักฟื้นอยู่ไม่ใช่หรือ ถึงยังไม่กลับมา?” &quot;ฮึ่ม!&quot; ชายชราจีหัวเราะออกมาเสียงดังเมื่อได้ยินคำพูดของเธอ จ้องมองเธอด้วยความไม่เชื่อ &quot;เจ้าชายจุนเป็นน้องชายของจักรพรรดิ! เขาเป็นโอรสของจักรพรรดิองค์ก่อน! เจ้ากล้าแต่งงานกับเขาโดยที่ยังไม่รู้แม้กระทั่งตัวตนของเขางั้นหรือ?&quot;</p>"}, "42": {"chapter_number": 42, "chapter_title": "第42章東西不給她", "content": "<p>ฟู่จ้าวหนิงรู้สึกสับสนเล็กน้อย ก่อนหน้านี้เธอไม่ได้ใส่ใจอะไรมากนัก เพียงแต่สังเกตว่าองค์ชายจุนดูอ่อนกว่าองค์จักรพรรดิมาก และทั้งสองก็คล้ายคลึงกันอยู่บ้าง นอกจากนี้ น้ำเสียงขององค์จักรพรรดิเมื่อพูดกับองค์ชายจุนก็อ่อนโยนและเข้าถึงง่ายราวกับผู้ใหญ่ (ถึงแม้ว่าอาจจะเป็นการแสดงก็ได้) ดังนั้นเธอจึงคิดว่าเขาเป็นองค์ชาย เธอไม่คาดคิดเลยว่าเขาจะเป็นลุงขององค์ชายจุน! นี่อาจเป็นเหตุผลที่เซียวเหยียนจิงไม่กล้าทำอะไรบุ่มบ่ามกับเขาหรือเปล่า? ฐานะของเขาเป็นปัจจัยหนึ่ง องค์ชายจุนเป็นผู้ใหญ่กว่าเซียวเหยียนจิง แม้ว่าจะมีอายุใกล้เคียงกันก็ตาม “เจ้าไม่รู้แม้กระทั่งว่าเขาเป็นใคร ดังนั้นเจ้าคงไม่รู้ว่าจริงๆ แล้วเขาเคยอยู่นอกวังก่อนอายุสองขวบใช่ไหม?</p>\n<p>ข้าได้ยินมาว่าก่อนที่เขาจะถูกพาตัวกลับเข้าวัง เขาอ่อนแอมาก และมีข่าวลือว่าองค์ชายอาจจะไม่รอด ต่อมาเขาก็ถูกวางยาพิษอีกครั้งในวัง” “ถูกวางยาพิษ?” “ใช่ ดูเหมือนว่ามันจะเกิดขึ้นตอนที่เขายังอายุไม่กี่ขวบ ว่ากันว่ามันสร้างความวุ่นวายมาก จักรพรรดิผู้ทรงสละราชสมบัติทรงพิโรธและสั่งให้ทำการสอบสวนอย่างละเอียดทั่วทั้งวัง ในเวลานั้น มีงานเลี้ยงใหญ่จัดขึ้นในวัง และครอบครัวของเหล่าขุนนางจำนวนมากก็อยู่ที่นั่น พวกเขาถูกกักตัวไว้ในวังเป็นเวลาหนึ่งวันหนึ่งคืนเพื่อสอบสวน” เฒ่าจีลดเสียงลงขณะพูด “มีคนตายไปจำนวนมาก หลังจากนั้น สุขภาพขององค์ชายจุนก็ทรุดโทรมลงไปอีก</p>\n<p>เหตุผลที่ฉันรู้เรื่องนี้ก็เพราะแพทย์หลวงในวังได้ติดต่อกับพันธมิตรยา เพื่อขอรับยาสำหรับองค์ชายจุน” “พวกเขาเคยส่งยาให้วังครั้งหนึ่ง แต่ต่อมาคนขององค์ชายจุนก็ติดต่อกับพันธมิตรยาอีกครั้ง คราวนี้ต้องการสมุนไพรหายากยิ่งกว่าเดิม โอ้พระเจ้า รายชื่อนั้นยาวเหยียด!” เฒ่าจีโบกมือและดีดลิ้นสองครั้ง “สมุนไพรเหล่านั้นหาไม่ง่ายนัก พันธมิตรยาหามาให้เขาได้บ้างแล้ว และพวกเขายังคงค้นหาส่วนที่เหลืออยู่ ผ่านมาแล้วกว่าสิบปี นี่เป็นหนึ่งในธุรกรรมไม่กี่อย่างที่พันธมิตรยาไม่สามารถดำเนินการให้สำเร็จได้เป็นเวลานาน” เขาหันไปมองฟู่จ้าวหนิงและยิ้มอย่างสะใจ “นี่เป็นความลับภายในของพันธมิตรยา สิ่งที่คนนอกไม่สามารถบอกได้</p>\n<p>ตอนนี้คุณได้ยินแล้ว คุณก็เหมือนเป็นหนึ่งในพวกเราแล้ว” ฟู่จ้าวหนิงพูดไม่ออก จะเป็นแบบนี้หรือ? พวกเขาไม่ได้พูดคุยกันต่อ เพราะหมอหวังตรวจชีพจรของท่านอาจารย์ฟู่เสร็จแล้วและออกมา เขามองฟู่จ้าวหนิงด้วยสีหน้ากังวล “หมอหวัง บอกผมมาเถอะ” ฟู่จ้าวหนิงกล่าว “สุขภาพของท่านอาจารย์ฟู่เริ่มทรุดโทรมลงแล้วครับ ท่านคงทำงานหนักมาหลายปี สะสมโรคภัยไข้เจ็บเก่าๆ มากมาย ทั้งพลังชี่และเลือดพร่อง กระเพาะอาหารและปอดเสียหายในระดับต่างๆ กัน ตับและถุงน้ำดีมีปัญหา ม้ามอ่อนแอ และท่านก็เคยบาดเจ็บมาก่อนที่ยังไม่หายดี ดังนั้นทุกอย่างจึงสะสมมา...” ทุกครั้งที่หมอหวังพูดจบ ใบหน้าของท่านอาจารย์จี่ก็ยิ่งมืดมนลง</p>\n<p>เขาหันไปมองฟู่จ้าวหนิงด้วยความกังวล “พระสนมจุน โปรดอยู่เป็นเพื่อนท่านอาจารย์ด้วย” หมอหวังกล่าวสรุปด้วยเสียงสั่นเครือ “หมายความว่าท่านปู่ของข้ารักษาไม่หายแล้วหรือครับ?” “เช่นนี้...” หมอหวังไม่กล้าพูดต่อ ฟู่จ้าวหนิงโบกมือ “ขอบคุณมากค่ะ หมอหวัง ดิฉันแค่กดจุดเหล่านี้ให้ท่านปู่เพื่อ...” เธออธิบายให้หมอหวังฟังอย่างคร่าวๆ และดวงตาของเขาก็เป็นประกายเมื่อได้ฟัง “เยี่ยมมาก เยี่ยมมาก!</p>\n<p>เทคนิคนี้สามารถทำให้คนไข้ที่กระสับกระส่ายสงบลงได้อย่างรวดเร็ว และจุดฝังเข็มหลายจุดก็มีฤทธิ์ผ่อนคลายและช่วยให้หลับได้ ฉันไม่คิดเลยว่าคุณจะเพิ่มจุดฝังเข็มที่ช่วยให้รู้สึกสบายตัวได้อีกด้วย! มันวิเศษมากจริงๆ ที่ใช้ได้ที่นี่! แต่แรงกด...” “แรงกดต้องปรับตามสถานการณ์และคนไข้แต่ละคน ต้องอาศัยการฝึกฝนและการสังเกต” ฟู่จ้าวหนิงไม่ได้พูดอะไรต่อ เธอเล่าเรื่องทั้งหมดนี้ให้หมอหวังฟังเพราะเธอเพิ่งตกลง และฝีมือการแพทย์ของหมอหวังนั้นค่อนข้างดีทีเดียว เขาอธิบายอาการของท่านผู้เฒ่าฟู่ได้อย่างละเอียด ตอนนี้ฟู่จ้าวหนิงเข้าใจแล้วว่าฝีมือของหมอหวังนั้นถือว่าดีมากในเมืองหลวง เพราะท่านผู้เฒ่าจีเลือกเขา อย่างไรก็ตาม</p>\n<p>หมอหวังไม่สามารถรักษาปู่ของเธอได้ แต่เธอทำได้ หมอหวังได้เรียนรู้เทคนิคของเธอแล้ว จึงกระตือรือร้นที่จะศึกษาเพิ่มเติม เขาจึงกล่าวลาและจากตระกูลฟู่ไปพร้อมกับศิษย์ของเขา ท่านผู้อาวุโสจีเกรงว่าฟู่จ้าวหนิงจะเสียใจ จึงปลอบโยนเธอว่า “ศิษย์ของข้า อย่าเสียใจไปเลย ถ้าหากวิธีอื่นไม่ได้ผล เราก็แค่ใช้ยาเพื่อยืดชีวิตปู่ของเจ้าก็ได้!</p>\n<p>ยาอะไรที่เจ้าต้องการ ข้าจะกลับไปที่พันธมิตรยาและหามาให้!” “ฉันต้องจ่ายด้วยเหรอคะ?” ฟู่จ้าวหนิงถาม “เอ่อ...” ท่านผู้อาวุโสจีดูเขินอายขึ้นมาทันที “คือ ข้าเป็นผู้อาวุโสในพันธมิตรยา แต่พันธมิตรยามีกฎว่า สมาชิกจะได้รับส่วนลด 20% สำหรับสมุนไพร แต่เจ้าก็ยังต้องจ่ายเงินอยู่ดี” สมุนไพรที่เธอต้องการนั้นราคาไม่ถูก ฟู่จ้าวหนิงไม่ได้ตั้งใจจะใช้ประโยชน์จากพันธมิตรยามากขนาดนั้น และเธอก็ไม่มีเงินมากขนาดนั้นด้วย ดังนั้น เธอจึงต้องพึ่งพาตัวเองในการเก็บสมุนไพรและทำยาเพื่อค่อยๆ สะสมทรัพยากร “มิเช่นนั้น ข้าจะกลับไปหาหัวหน้าพันธมิตร เขาอาจจะรู้เรื่องความสัมพันธ์ระหว่างตระกูลฟู่กับองค์ชายจุนในตอนนั้น</p>\n<p>หัวหน้าพันธมิตรอยู่ที่เมืองหลวงหลายปี” ท่านผู้อาวุโสจีกล่าว “ตกลง งั้นข้าจะรบกวนท่านอาจารย์” “ไม่ต้องสุภาพไป… เจ้าเรียกข้าว่าอะไรนะ?” ท่านผู้เฒ่าจีเบิกตากว้างด้วยความตื่นเต้น “อาจารย์ ท่านไม่ได้บอกว่าอยากรับข้าเป็นศิษย์เหรอ?” ฟู่จ้าวหนิงกระพริบตา เธอถูกล่อลวงด้วยข้อเสนอของท่านผู้เฒ่าจีให้หาเหตุผลมาหลอกทุกคนเกี่ยวกับทักษะทางการแพทย์ที่เกิดขึ้นอย่างกะทันหันของเธอ ยิ่งไปกว่านั้น เธอจำเป็นต้องเรียนรู้เกี่ยวกับสมุนไพรของอาณาจักรจ้าวจากท่านผู้เฒ่าจี การเรียนรู้ไม่มีที่สิ้นสุด และเธอไม่ควรหยิ่งยโสคิดว่าตนเองเหนือกว่าทุกคนที่นี่ “ฮ่าฮ่าฮ่า! ดี!</p>\n<p>อาจารย์ของเจ้าจะรีบกลับไปที่พันธมิตรยาเพื่อสอบถามให้เจ้า!” ท่านผู้เฒ่าจีดีใจจนลืมทุกอย่างไปหมด ตอนนี้เขาอยากกลับไปที่สวนสมุนไพรของตนเองเพื่อเก็บสมุนไพรที่ท่านผู้เฒ่าฟู่อาจต้องการและนำมาให้ศิษย์ตัวน้อยของเขา! ท่านผู้เฒ่าฟู่ป่วยหนัก เขาไม่อาจรอได้! บทนี้ยังไม่จบ โปรดคลิกหน้าถัดไปเพื่ออ่านเนื้อหาที่น่าตื่นเต้นต่อไป! ท่านผู้เฒ่าจีรีบวิ่งออกไป ฟู่จ้าวหนิงไม่มีเวลาแม้แต่จะถามคำถามเพิ่มเติมอีกสองสามข้อ สาขาอื่นๆ ของตระกูลฟู่ก็เงียบสงบและไม่มีใครมาสร้างปัญหาให้ฟู่จ้าวหนิงอีกแล้ว “คุณหนู พวกเขาอาจกำลังวางแผนอะไรไม่ดีอยู่” เสี่ยวเถาเป็นห่วงมาก ฟู่จ้าวหนิงขมวดคิ้ว “ฉันจะหาของมาให้พวกเธอใช้ป้องกันตัวเองในช่วงสองสามวันนี้” “คุณหนูจะไม่กลับไปที่คฤหาสน์ขององค์ชายจุนหรือคะ?” “กลับ?” ฟู่จ้าวหนิงงุนงง นี่คือบ้านของเธอไม่ใช่หรือ?</p>\n<p>ที่คฤหาสน์ขององค์ชายจุน เธอเป็นเพียงแขกที่พักอยู่ในลานร้างชั่วคราว การใช้คำว่า “กลับ” นั้นไม่เหมาะสม ยิ่งไปกว่านั้น ตราบใดที่เธอยังคงดำรงตำแหน่งพระสนมขององค์ชายจุน องค์ชายจุนก็สามารถได้รับสิ่งของที่เป็นของจักรพรรดิได้ เธอจะอยู่ที่ไหนจึงไม่สำคัญสำหรับเขา บางทีหลังจากเรื่องนี้จบลง องค์ชายจุนอาจจะต้องการหย่ากับเธอด้วยซ้ำ หย่า? ฝันไปเถอะ ถ้าจะแยกจากกันก็คงเป็นการหย่าร้าง ฟู่จ้าวหนิงขอให้เสี่ยวเถาไปเอาหญ้ามาให้ม้ากิน แล้วจึงกลับไปที่ลานบ้านของเธอ นี่เป็นครั้งแรกที่เธอได้เข้ามาในห้องของนางฟู่ ห้องค่อนข้างเรียบง่าย เฟอร์นิเจอร์และการตกแต่งดูเก่าและธรรมดามาก ตระกูลฟู่เคยมีฐานะสูงส่ง</p>\n<p>เธอไม่รู้ว่าทำไมถึงตกต่ำลงมาถึงขนาดนี้ ฟู่จ้าวหนิงหยิบสมุนไพร ปิดประตู แล้วเข้าไปในห้องปรุงยาเพื่อเริ่มปรุงยาให้คุณปู่ สิ่งที่เธอไม่รู้ก็คือ พระนางซูสีไทรหลังจากได้ยินสิ่งที่หมอหลี่พูด ก็ทรงโลภในโสมม่วงของนางเช่นกัน “ถึงแม้ฟู่จ้าวหนิงจะผ่านการทดสอบ สมุนไพรเหล่านั้นก็ควรถูกยึดและส่งคืนคลังหลวง เดิมทีมีไว้สำหรับการทดสอบ ไม่ใช่สำหรับใช้ส่วนตัวของนาง” “พระนางซูสีไทรตรัสถูกต้องแล้ว” หมอหลี่พยักหน้าอย่างแรง อย่างไรก็ตาม จักรพรรดิกลับรู้สึกไม่พอใจ เขาถามขันทีที่อยู่ข้างๆ ว่า &quot;เมื่อไหร่คนของจักรพรรดิจะไปที่พำนักขององค์ชายจุน?&quot; เขายังอยากรู้ด้วยว่าพ่อของเขาได้ทิ้งอะไรไว้ให้เซียวหลานหยวนบ้าง!</p>"}, "43": {"chapter_number": 43, "chapter_title": "第43章窮得叮噹響", "content": "<p>สิ่งที่จักรพรรดิผู้ทรงสละราชสมบัติได้มอบไว้ให้เจ้าชายจุน—กุญแจและสถานที่—ถูกมอบหมายให้แก่บุคคลสามคน โดยแต่ละคนมีสัญลักษณ์ประจำตัว แผนการจะสำเร็จได้ก็ต่อเมื่อทั้งสามคนมาถึงพร้อมกันและได้รับสิ่งของทั้งสามชิ้น อย่างไรก็ตาม แม้แต่จักรพรรดิเองก็ยังไม่ทรงทราบว่าบุคคลทั้งสามนั้นเป็นใคร จักรพรรดิและจักรพรรดินีได้ทรงสอบถามพระพันปีหลวงอย่างลับๆ แต่พระพันปีหลวงก็ไม่ทรงทราบเช่นกัน นี่เป็นสาเหตุของความไม่พอใจอย่างมากสำหรับจักรพรรดิ พระองค์ทรงเป็นผู้ที่มีคุณสมบัติเหมาะสมที่สุดที่จะสืบทอดราชบัลลังก์ และในที่สุดราชบัลลังก์ก็ตกเป็นของพระองค์ แต่จักรพรรดิผู้ทรงสละราชสมบัติกลับโปรดปรานเจ้าชายจุนอย่างเห็นได้ชัด</p>\n<p>พระมารดาของเจ้าชายจุนเป็นจักรพรรดินีองค์แรก พระพันปีหลวงองค์ปัจจุบันเสด็จเข้าวังในภายหลัง โดยไม่ต้องแข่งขันกับสนมคนอื่นๆ ขึ้นครองราชย์โดยตรง และยังมีเจ้าชายจุนที่เกิดนอกวัง ในครอบครัวทั่วไป เจ้าชายจุนจะถูกมองว่าเป็นบุตรนอกสมรส จักรพรรดิผู้ทรงสละราชสมบัติทรงให้กำเนิดพระองค์นอกพระราชวังอย่างลับๆ และทรงนำพระองค์กลับเข้าพระราชวังเมื่อพระชนมายุสองขวบเท่านั้น แม้จะมีเจ้าชายหลายพระองค์อยู่เหนือกว่าพระองค์แล้ว แต่พระองค์ก็ยังได้รับการเอาใจราวกับสมบัติล้ำค่า จักรพรรดิและจักรพรรดินีทรงเชื่อว่าพวกเขาได้ค้นพบความจริงแล้ว นั่นคือ พระพันปีหลวงทรงถูกบังคับให้ยอมรับโอรสองค์นี้</p>\n<p>และในขณะที่ทุกคนต่างกล่าวอ้างต่อสาธารณชนว่าเขาเป็นโอรสแท้ๆ ของพระนาง แต่พระนางกลับทรงเกลียดชังพระองค์อย่างลับๆ “อีกไม่นานพวกเขาก็จะรู้ว่าฟู่จ้าวหนิงผ่านการทดสอบแล้ว” ขันทีผู้รับใช้จักรพรรดิมานานกล่าวหลังจากครุ่นคิดอย่างรอบคอบ “แต่ไม่มีใครรู้ว่าพวกเขาจะปรากฏตัวเมื่อใด บางทีเราอาจส่งคนไปเฝ้าที่ประทับของเจ้าชายจุนได้หรือไม่?” ชายทั้งสามคนสามารถปรากฏตัวได้ทุกเมื่อ และหากจักรพรรดิต้องการทราบว่าจักรพรรดิผู้ทรงสละราชสมบัติทรงทิ้งอะไรไว้ให้เจ้าชายจุน พระองค์ก็จำเป็นต้องมีคนคอยเฝ้าดู “ใช่ เราควรส่งคนไป เจ้าชายจุนไม่สบายใช่ไหม ข้าต้องเป็นห่วง ส่งแพทย์หลวงเสินไปเฝ้าดูเจ้าชายจุนที่พระราชวังด้วย”</p>\n<p>จักรพรรดิพยักหน้า ที่จริงแล้วมันเป็นเพียงคำพูดอ้อมๆ ว่าให้แพทย์หลวงเสินคอยดูแลสถานการณ์ พระนางซูสีไทเฟิลก็มีความคิดเช่นกัน “ฟู่จ้าวหนิง ทายาทที่ตกอับ ย่อมไม่รู้มารยาทในราชสำนักเลย ตอนนี้นางได้เป็นพระชายาของจุนและเป็นสมาชิกราชวงศ์แล้ว นางจำเป็นต้องเรียนรู้กฎระเบียบและมารยาทของวัง ดังนั้นข้าจะส่งครูผู้มีความสามารถไปสอนที่พระราชวังของเจ้าชายจุน” หมอหลี่คิดว่าความคิดของพระนางซูสีไทเฟิลนั้นยอดเยี่ยม ครูสอนพิเศษยังสามารถทำให้ฟู่จ้าวหนิงลำบากและได้บทเรียนได้อีกด้วย! “ฝ่าบาททรงพระกรุณาธิคุณมาก ทรงห่วงใยฟู่จ้าวหนิงมากขนาดนี้” “แน่นอน” พระนางซูสีไทเฮาเย้ยหยัน แต่ในใจกลับรู้สึกโกรธแค้น ฟู่จ้าวหนิง</p>\n<p>ทายาทตกอับ กลับมาเป็นพี่สะใภ้เสียแล้ว จะไม่โกรธได้อย่างไร?</p>\n<p>ฟู่จ้าวหนิงไม่รู้ว่าพระนางซูสีไทเฮาส่งครูมาทำให้เธอลำบาก คืนนั้นเธอนอนหลับสนิทที่บ้านตระกูลฟู่ หลังจากอยู่บนภูเขามาสามวัน เธอเหนื่อยล้ามาก เพราะนอกจากจะต้องหาและขุดสมุนไพรแล้ว ยังต้องรับมือกับสัตว์ป่าและงูพิษ แถมยังมีคนต้องการฆ่าเธออีกด้วย ดังนั้นเธอจึงนอนหลับจนถึงบ่ายวันรุ่งขึ้น เมื่อตื่นขึ้นมาเธอยังงัวเงียเล็กน้อยและจำไม่ได้ว่าอยู่ที่ไหน “เสี่ยวเถา” เธอเรียก และเสี่ยวเถาที่กำลังงีบหลับอยู่ข้างนอกก็ลุกขึ้น “คุณหนู ผมอยู่นี่ คุณหนูตื่นแล้วเหรอ?” เธอถอนหายใจโล่งอก เพราะฟู่จ้าวหนิงนอนหลับนานจริงๆ และเธอกังวลว่าอาจมีอะไรเกิดขึ้น เธออยากแอบเข้าไปดูหลายครั้งว่าฟู่จ้าวหนิงยังมีชีวิตอยู่หรือไม่ “ค่ะ</p>\n<p>เอาน้ำร้อนมาให้หน่อย” “ค่ะ เดี๋ยวมาค่ะ!” เสี่ยวเถาเร่งรีบวิ่งไปจัดการ “เสี่ยวเถา คุณหนูตื่นแล้วหรือยังคะ” ป้าจงถาม “ค่ะ” “งั้นฉันต้องรีบอุ่นอาหารแล้ว” ป้าจงก็รีบไปจัดการเช่นกัน ลุงจงกำลังให้อาหารม้าและกวาดลานบ้าน พอได้ยินว่าฟู่จ้าวหนิงตื่นแล้วก็ยิ้มออกมา ด้วยเหตุผลบางอย่าง เมื่อฟู่จ้าวหนิงนอนหลับ ทุกคนดูเหมือนจะกังวลใจ พอได้ยินว่าเธอตื่นแล้วก็โล่งอกทันที หลังจากฟู่จ้าวหนิงล้างหน้าเสร็จ ป้าจงก็เอาอาหารมาให้แล้ว “คุณปู่พูดอะไรบ้างไหมตอนตื่นแล้ว” “หลังจากคุณปู่ตื่น เราบอกเขาว่าคุณนอนในห้อง แต่เขาก็ไม่ได้พูดอะไรเลย เขาคงอยากรอจนกว่าคุณจะตื่นก่อนถึงจะพูด” เสี่ยวเถาพูด “คุณปู่ดูอารมณ์ดีขึ้น</p>\n<p>เขาทานยาที่คุณหนูให้ไปสองเม็ด กินอะไรนิดหน่อยตอนเที่ยง แล้วก็งีบหลับ” ป้าจงและคนอื่นๆ รู้สึกว่ายาขวดเล็กๆ ที่ฟู่จ้าวหนิงให้เมื่อวานได้ผลดีมาก เพราะคุณปู่ฟู่สามารถกินอาหารได้หลังจากทานไปสองเม็ดเมื่อคืนและวันนี้ ก่อนหน้านี้เขากินอะไรไม่ได้เลย “ฉันจะไปดูคุณปู่ก่อน” “คุณหนู คุณยังไม่ได้กินอะไรเลยตั้งแต่กลับมาเมื่อวาน รีบกินก่อนเถอะ คุณปู่ยังนอนอยู่” เสี่ยวเถาห้ามไว้ ฟู่จ้าวหนิงรู้สึกเขินเล็กน้อยจึงเดินไปที่โต๊ะเพื่อกินก่อน แต่เมื่อเห็นอาหารบนโต๊ะ ฟู่จ้าวหนิงก็ขมวดคิ้ว “นี่คือทั้งหมดที่คุณกินมาหลายวันแล้วเหรอ?” ป้าจงนำข้าวมาให้เธอหนึ่งชาม ชามนั้นไม่เต็มนัก และมีสีเหลืองอ่อนๆ มีจุดดำๆ อยู่</p>\n<p>ไม่มีกลิ่นข้าวเลย แต่กลับมีกลิ่นอับแปลกๆ เห็นได้ชัดว่าเป็นข้าวเก่า ไม่รู้ว่าทิ้งไว้นานแค่ไหนแล้ว มีผักสองจาน จานหนึ่งสด แต่ปรุงโดยไม่ใช้น้ำมัน จึงดูไม่เหลืองเท่าไหร่ อีกจานเป็นผักดองสีเข้มๆ ที่ระบุไม่ได้ว่าเป็นอะไร ฟู่จ้าวหนิงนึกย้อนไปถึงความทรงจำ ก่อนแต่งงาน ตระกูลฟู่ยังมีอาหารดีๆ กินบ้าง นี่มันอะไรกัน? แล้วนี่คือสิ่งที่พวกเขาเสิร์ฟให้เธอ ใครจะรู้ว่าลุงจงและคนอื่นๆ กินอะไรกัน ป้าจงและเสี่ยวเถาเหลือบมองกันและก้มหน้าลง “ข้าวของเราอยู่ไหน?” ฟู่จ้าวหนิงวางตะเกียบลงอย่างแรง แม้ว่าเธอจะหิวมาก แต่เธอก็ไม่ได้ตั้งใจจะอดอาหารจากการล่าสัตว์และย่างเนื้อ ในเมื่อสภาพความเป็นอยู่บนภูเขาย่ำแย่ขนาดนี้</p>\n<p>“อย่าบอกนะว่าคุณปู่ก็กินของแบบนี้ด้วย” สุขภาพของคุณปู่ฟู่ก็ย่ำแย่อยู่แล้ว ถ้ากินของแบบนี้เข้าไปอีกก็จะยิ่งทำให้กระเพาะอาหารที่บอบบางของท่านแย่ลงไปอีก “คุณหนู ที่แท้ก็เพราะข้าวสวยของเราใกล้หมดแล้ว คุณปู่กลัวหนูจะรู้ และเป็นห่วงว่าหนูจะกินข้าวสวยที่ชอบไม่ได้อีก เลยรีบให้หนูแต่งงานเข้าไปอยู่ในคฤหาสน์ขององค์ชายเซียว คิดว่าอย่างน้อยหนูจะได้ใช้ชีวิตอย่างสุขสบายที่นั่น...” ส่วนเรื่องอื่นๆ ก็ไม่สำคัญ ขอแค่มีกินก็พอแล้ว แต่พวกเขาไม่คาดคิดเลยว่าการแต่งงานของฟู่จ้าวหนิงจะเป็นแบบนี้ และจะกลับบ้านในอีกไม่กี่วัน “เงินในบ้านหมดแล้วเหรอ?” ฟู่จ้าวหนิงไม่เคยสนใจเรื่องพวกนี้มาก่อน</p>\n<p>และไม่รู้เลยว่าตระกูลฟู่จะตกอยู่ในสภาพเช่นนี้ “คุณปู่ใช้เงินไปกับยาและหมอมากมายตลอดหลายปีที่ผ่านมา และยังเป็นหนี้คลินิกและร้านขายยาอีกหลายแห่ง ก่อนที่คุณหนูจะแต่งงาน คุณปู่ได้ถอนเงินเก็บทั้งหมดออกมา บอกว่าจะจ่ายหนี้ทั้งหมดเพื่อไม่ให้ใครมาทวงหนี้จากท่าน” ป้าจงเช็ดน้ำตา “ตอนนี้พวกเขายากจนจริงๆ”</p>"}, "44": {"chapter_number": 44, "chapter_title": "第44章她不回來嗎", "content": "<p>ฟู่จ้าวหนิงลุกขึ้นยืน ใบหน้าซีดเผือดด้วยความโกรธ “ตระกูลฟู่ยังมีร้านค้าอยู่อีกเหรอ อยู่ที่ไหนกัน” “ร้านค้า…” ป้าจงและเสี่ยวเถาเหลือบมองกันด้วยความกังวล “คุณหนู ช่วงไม่กี่ปีมานี้หนูไม่ได้เรียนรู้เรื่องธุรกิจมากนัก ภรรยาคนที่สองและสามจึงมาบอกท่านอาจารย์ใหญ่ว่าจะให้ท่านอาจารย์ใหญ่ดูแลร้านค้าและส่งผลกำไรให้ทุกปี” พวกเธอต้องการป้องกันไม่ให้ท่านอาจารย์ใหญ่ที่กำลังป่วยและฟู่จ้าวหนิงสาวน้อยไร้เดียงสาทำลายร้านค้า “ท่านอาจารย์ใหญ่ให้สัญญาร้านค้ากับคุณหนูใหญ่เป็นส่วนหนึ่งของสินสอด คุณหนูใหญ่เป็นคนถือสัญญาเหล่านั้นขึ้นไปบนเกี้ยวในวันนั้น หนูไม่รู้หรือไง” เสี่ยวเถาจ้องมองฟู่จ้าวหนิงอย่างแปลกใจ กล่องสินสอด? ภาพหลายภาพแวบเข้ามาในความคิดของฟู่จ้าวหนิง แต่เธอก็เริ่มปวดหัวทันที ตอนนี้เธอเพิ่งนึกออก: คุณหนูฟู่ตายบนเกี้ยวในวันนั้นได้อย่างไร?</p>\n<p>ดูเหมือนเธอจะจำอะไรไม่ได้เลย สิ่งสุดท้ายที่เธอจำได้คือการนั่งอยู่หน้าโต๊ะเครื่องแป้งในห้องนี้ กำลังสวมผ้าคลุมสีแดงบนศีรษะด้วยตัวเอง แล้ว... เมื่อตื่นขึ้นมา เธอก็พบว่าตัวเองอยู่ในโลกนี้ “ฉันออกไปขึ้นเกี้ยวเจ้าสาวคนเดียวในวันนั้นเหรอ?” ฟู่จ้าวหนิงถาม เซียวเถาตกใจและกังวล “คุณหนู เกิดอะไรขึ้นคะ ลืมเรื่องที่เกิดขึ้นในวันนั้นไปแล้วหรือ?” ฟู่จ้าวหนิงได้แต่หาข้อแก้ตัว “วันนั้นบนถนน หลี่จือเหยาชนเข้ากับเกี้ยวเจ้าสาว คนแบกเกี้ยวคงตกใจ เกี้ยวเลยสั่นแรง ฉันถูกเขย่าอย่างแรงจนหัวกระแทกกับโครงเกี้ยว จนเป็นก้อนใหญ่เลยค่ะ” ขณะที่พูด เธอก็เอื้อมมือไปจับศีรษะ และก็พบว่ามีก้อนใหญ่จริงๆ เธอรู้สึกแบบนั้นในคืนนั้น แต่ตอนนั้นคิดว่าอาจจะเป็นคุณหนูฟู่ที่ชนเข้า แต่พอคิดย้อนกลับไป การกระแทกนั้นรุนแรงมาก เธอควรจะตรวจสอบเกี้ยวเจ้าสาวก่อน!</p>\n<p>ใช่แล้ว เก้าอี้หามเจ้าสาวนั้นเคยเก็บไว้ที่บ้านขององค์ชายจุน เธอสงสัยว่าพวกเขาจะกำจัดมันไปแล้วหรือยัง “แรงกระแทกค่อนข้างรุนแรง ดังนั้นตอนตื่นขึ้นมาฉันเลยรู้สึกเวียนหัวนิดหน่อย และจำอะไรไม่ค่อยได้” เซียวเถาเอื้อมมือไปจับศีรษะอย่างประหม่า และแน่นอน เธอก็รู้สึกถึงรอยนูนเช่นกัน “พระเจ้าช่วย ผ่านไปหลายวันแล้ว รอยนูนนี้ยังอยู่เลย คุณหนูต้องบาดเจ็บสาหัสมากแน่ๆ!” ป้าจงอดไม่ได้ที่จะเดินเข้ามาจับดู เพื่อให้พวกเขามั่นใจ ฟู่จ้าวหนิงจึงยอมให้พวกเขาตรวจสอบอย่างละเอียด “ไม่แปลกใจเลยที่ฉันบอกว่าคุณหนูดูแปลกๆ หลังจากกลับมา เธอคงตกใจกับรอยนูนนั้น” เซียวเถาพูดด้วยความเสียใจ</p>\n<p>“เคยมีกรณีที่คนหัวกระแทกแล้วเป็นอัมพาตทางจิต” “ไร้สาระ! คุณหนูจะเป็นอัมพาตทางจิตได้อย่างไร” ป้าจงรีบพูด “คุณหนูดูเหมือนจะฉลาดขึ้นมากหลังจากกระแทก” เมื่อได้ยินพวกเขาเชื่ออย่างง่ายดายว่าเธอ &quot;ได้รับบาดเจ็บ&quot; ฟู่จ้าวหนิงก็ทั้งขำและหงุดหงิด แต่ก็ช่วยให้เธอไม่ต้องลำบากมากนัก &quot;คุณหนูได้รับการช่วยเหลือขึ้นเกี้ยวโดยคุณหนูสี่และคุณหนูหกในวันนั้น เธอยังถือกล่องสินสอดด้วย&quot; เสี่ยวเถาหันไปมองฟู่จ้าวหนิง เสียงของเธอสั่นเล็กน้อย &quot;คุณหนู กล่องสินสอดไม่ได้หายไปใช่ไหมคะ?&quot; ข้างใน นอกจากโฉนดที่ดินของร้านค้าสองแห่งที่เหลืออยู่ของตระกูลฟู่แล้ว</p>\n<p>ยังมีเครื่องประดับหลายชิ้นที่ท่านผู้เฒ่าฟู่เก็บสะสมไว้ให้ฟู่จ้าวหนิง และเงินเหรียญอีกจำนวนหนึ่ง ท่านผู้เฒ่าไม่มีเงินเหลือแล้ว แต่เนื่องจากฟู่จ้าวหนิงกำลังจะแต่งงานเข้าสู่ตระกูลขององค์ชายเซียวและจะเป็นพระสนม เธอจึงต้องการเงินเหรียญเพื่อตอบแทนคนรับใช้ ดังนั้นเขาจึงส่งเธอไปแลกเงิน ฟู่จ้าวหนิงไม่พบอะไรในกล่องสินสอด แต่เธอก็รู้ว่าท่านผู้เฒ่าจะมอบทรัพย์สินที่เหลือทั้งหมดให้เธอ เธอสงสัยว่าทำไมเจ้านายเก่าถึงไม่ให้อะไรเธอเลยตอนแต่งงาน ปรากฏว่ากล่องสินสอดหายไป “คุณหนูสี่ คุณหนูหก?” คุณหนูสี่ฟู่เจียวเจียวมาจากตระกูลรุ่นที่สอง และคุณหนูหกฟู่เป่าเจินมาจากตระกูลรุ่นที่สาม</p>\n<p>สองคนนี้เป็นญาติที่ปกติขี้เกียจเล่นกับเธอ แต่ในวันนั้นกลับมาช่วยเธอขึ้นเกี้ยวเจ้าสาวงั้นเหรอ?</p>\n<p>“แล้วปู่ก็กินอาหารแบบนี้ด้วยเหรอ?” เสียงของฟู่จ้าวหนิงเย็นชาลง “ค่ะ...” ป้าจงก้มหน้าลง ท้องของเธอกับเสี่ยวเถาก็ร้องจ๊อกๆ “พวกเจ้าไม่กินเหรอ?” ใบหน้าของฟู่จ้าวหนิงเย็นชาลงไปอีก ถ้าเธอไม่กลับมา ตระกูลฟู่ที่เหลือจะอดตายกันหมดหรือ? “คุณหนู เรากินแล้ว...” เสียงของเสี่ยวเถาเบาลง พวกเขากินแล้ว แต่เป็นแค่โจ๊กกับผักดองนิดหน่อย ไม่อิ่มท้องเลยหิวอีกแล้วในเวลาแค่ชั่วโมงเดียว “ไปกันเถอะ ไปข้างหน้า!” ฟู่จ้าวหนิงรีบวิ่งออกไปนอกประตู ตั้งใจจะไปหาภรรยาคนที่สองและสาม รวมถึงฟู่เจียวเจียวและฟู่เป่าเจิ้น ขณะนั้นเอง ลุงจงก็เดินตามมาด้วยจงเจี้ยน จงเจี้ยนแบกของมากมายไว้บนหลัง มัดด้วยเถาวัลย์และเชือกฟาง</p>\n<p>เพราะของที่ต้องแบกมีไม่มาก เขาแบกของกองใหญ่ และมือของเขาก็ถือของอีกหลายอย่าง “คุณหนู เขาบอกว่ากำลังตามหาคุณ” ดวงตาของลุงจงยังคงพร่ามัวเล็กน้อย เพราะนอกจากกองหญ้าแล้ว จงเจี้ยนยังแบกไก่ฟ้า กระต่าย และตะกร้าฟางที่ดูเหมือนจะเต็มไปด้วยรังไข่นกป่าขนาดใหญ่ ฟู่จ้าวหนิงเพิ่งนึกออกเมื่อเห็นสิ่งเหล่านี้ “ทำไมท่านถึงกลับมาช้าจัง?” เธอคิดว่าจงเจี้ยนน่าจะกลับมาเมื่อวานแล้ว แต่เธอกลับรอจนถึงตอนนี้ เสียงของจงเจี้ยนแหบเล็กน้อย “มีธุระบางอย่างทำให้ข้าติดขัด” พระเจ้าเท่านั้นที่รู้ว่าเขากังวลแค่ไหนที่จะถูกคนรับใช้ในวังองค์ชายจุนเห็นขณะแบกของทั้งหมดนี้ เขาเป็นยามของวัง แบกไก่ในมือซ้าย กระต่ายในมือขวา</p>\n<p>และฟางกองใหญ่ไว้บนหลัง “วางของลง ขอบคุณสำหรับความเหนื่อยยาก เดี๋ยวข้าจะจ่ายให้ทีหลัง” ฟู่จ้าวหนิงเห็นไก่ฟ้า กระต่าย และไข่สัตว์ป่า จึงยัดใส่มือป้าจงและลุงจง “ไปทำอาหารอร่อยๆ กินกันเถอะ” ป้าจงกลืนน้ำลายลงคอเมื่อเห็นของเหล่านี้ นานแค่ไหนแล้วที่พวกเขาไม่ได้กินเนื้อสัตว์!</p>\n<p>“ครับ!” จงเจี้ยนมองดูพวกเขา คนรับใช้ในวังฟู่หิวจนตาเขียวเพราะความหิวหรือไง พวกเขาตื่นเต้นมากที่ได้เห็นของเหล่านี้ “ของส่งเรียบร้อยแล้วครับ คุณหนูฟู่ ข้าจะกลับไปรายงานที่วังองค์ชายแล้ว” จงเจี้ยนหันหลังจะจากไป แต่ฟู่จ้าวหนิงหยุดเขาไว้ “กลับไปถามคนดูแลบ้านว่าเกี้ยวเจ้าสาวของฉันยังอยู่ไหม ถ้ายังอยู่ ให้บอกเขาว่าอย่าให้ใครแตะต้อง และให้เก็บรักษาไว้เช่นเดิม ฉันจะกลับไปดูเมื่อมีเวลา” “ค่ะ” แม้ว่าจงเจี้ยนจะไม่เข้าใจว่าทำไมเธอถึงอยากกลับไปดูเกี้ยวเจ้าสาว แต่เขาก็ยังถ่ายทอดคำพูดของเธอ คนดูแลบ้านจงตกตะลึงไปครู่หนึ่ง “วันรุ่งขึ้น องค์ชายสั่งให้คนสับเกี้ยวเจ้าสาวเป็นชิ้นๆ แล้วเผาเป็นฟืน” จงเจี้ยน: “...” ทำไมล่ะ? “องค์ชายตรัสว่าเกี้ยวเจ้าสาวนั้นเดิมทีมีไว้สำหรับนำไปไว้ในวังขององค์ชายเซียว จึงไม่จำเป็นต้องเก็บไว้” “งั้นคุณหนูฟู่คงผิดหวัง” “ยังเรียกเธอว่าคุณหนูฟู่อีกเหรอ?</p>\n<p>เธอผ่านการทดสอบแล้ว และตอนนี้เธอก็เป็นพระสนมของเราแล้ว” คนดูแลบ้านจงเหลือบมองไปข้างหลัง “พระสนมยังไม่กลับมาหรือ? เธอยังไม่กลับมาเมื่อคืนนี้...” คนดูแลบ้านนึกถึงความเป็นไปได้ขึ้นมาทันที และสีหน้าของเขาก็เปลี่ยนไป “หรือว่าพระสนมจะไม่กลับมาแล้ว?” “เมื่อคืนนางไม่ได้กลับไปที่วังหรือ?” เสียงขององค์ชายจุนดังมาจากด้านหลัง ฟู่จ้าวหนิงพักอยู่ที่ลานบ้านเจียนเจีย และองค์ชายจุนไม่ได้สนใจนางเลย เขาคงไม่รู้ว่านางไม่ได้กลับมาจนกระทั่งเมื่อคืนที่เขาถาม “ฝ่าบาท” จงเจี้ยนและคนรับใช้รีบโค้งคำนับ องค์ชายจุนมองไปที่จงเจี้ยน “นางอยู่ที่บ้านตระกูลฟู่หรือ? นางบอกว่าจะไม่กลับมาแล้วหรือ?”</p>"}, "45": {"chapter_number": 45, "chapter_title": "第45章聖女她來了", "content": "<p>“อาการของท่านอาจารย์ฟู่ไม่ค่อยดีนัก คุณหนูฟู่... ไม่สิ พระสนมคงเป็นห่วงท่าน” จงเจี้ยนพูดแทนฟู่จ้าวหนิงโดยไม่รู้ตัว “ตอนที่พวกเขาอยู่ที่ภูเขาลั่วเยว่ พระสนมพบสมุนไพรหลายชนิด เธอบอกว่าทั้งหมดเป็นสิ่งที่ท่านอาจารย์ฟู่สามารถใช้ได้ แต่ร่างกายของท่านต้องทนต่อฤทธิ์ของยาเหล่านั้นก่อนจึงจะผ่านช่วงเวลาที่ยากลำบากนี้ไปได้ แล้วค่อยฟื้นตัว” องค์ชายจุนมองเขา “พระสนมคุยกับเจ้ามากทีเดียวบนภูเขาหรือ?” “ฝ่าบาท ไม่มากนัก เพียงแต่ข้าถามมาก และบางครั้งพระสนมก็ไม่มีทางเลือกอื่นนอกจากต้องตอบข้า” องค์ชายจุนหันหลังกลับ “ไปเตรียมตัวมาที่ห้องทำงานของข้า”</p>\n<p>เขาอยากรู้ว่าฟู่จ้าวหนิงพบสมุนไพรบนภูเขามากแค่ไหนในช่วงไม่กี่วันที่ผ่านมา และสิ่งที่เธอทำทำให้จงเจี้ยนต้องพูดแทนเธอโดยไม่รู้ตัว “ครับ” จงเจี้ยนรีบไปเตรียมตัว เขาไม่ได้อาบน้ำมาสามวันแล้วและหลบซ่อนตัวอยู่ในภูเขา เขาเริ่มรู้สึกไม่สบายใจ ขณะที่เขากำลังเตรียมตัวและเล่าเรื่องที่เกิดขึ้นบนภูเขาให้องค์ชายจุนฟัง ก็มีคนจากวังมาถึงแล้ว หมอหลวงเสินและยายซุนมาถึงที่ประทับขององค์ชายจุนทีละคน เมื่อเสนาบดีจงเห็นพวกเขาก็เริ่มปวดหัว ก่อนที่องค์ชายจะเสด็จกลับ ที่ประทับขององค์ชายจุนเงียบสงัดอย่างน่าประหลาด แทบจะร้างผู้คน แต่สองสามวันที่ผ่านมากลับคึกคักมาก อย่างไรก็ตาม</p>\n<p>ที่ประทับขององค์ชายจุนไม่มีธรรมเนียมการต้อนรับแขก “หมอหลวงเสิน ยายซุน องค์ชายของเราโปรดปรานความเงียบสงบ ดังนั้นจึงไม่อนุญาตให้ใครอยู่ต่อ ท่านทั้งหลายควรกลับไป” เมื่อเห็นเสนาบดีจงไล่ไปทันที หมอหลวงเสินและยายซุนก็มีสีหน้าบึ้งตึง ที่ประทับขององค์ชายจุนช่างหยิ่งยโสเหลือเกิน คนอย่างพวกเขาที่ได้รับพระราชทานพระราชโองการย่อมได้รับการเอาใจและปฏิบัติอย่างดี ทำไมจึงถูกไล่ไปอย่างเย็นชาเช่นนี้ “ฝ่าบาททรงเป็นห่วงพระอาการประชวรขององค์ชายจุน เกรงว่าอาจหาหมอรักษาได้ยาก จึงทรงมีพระราชดำรัสให้ข้าพเจ้าประทับอยู่ที่พระราชวังขององค์ชายจุนตลอดเวลา ข้าพเจ้ากลับไปไม่ได้” “พระนางซูสีไทเฮาตรัสว่า</p>\n<p>องค์หญิงจุนเพิ่งเสด็จเข้าสู่ราชวงศ์และอาจยังไม่ทราบธรรมเนียมในพระราชวัง จึงทรงส่งข้าพเจ้ามาสอนกฎระเบียบในพระราชวัง นี่เป็นพระประสงค์อันดีของพระนางซูสีไทเฮา และข้าพเจ้ากลับไปไม่ได้” จงเจี้ยนคนรับใช้ขมวดคิ้ว องค์ชายจุนกำลังตั้งใจฟังเรื่องราวของจงเจี้ยนเกี่ยวกับฟู่จ้าวหนิงที่ล่ากระต่ายป่าตัวใหญ่ด้วยเข็มปักผ้า แล้วไปหาเครื่องเทศมากมายบนภูเขา กระต่ายที่ฟู่จ้าวหนิงย่างนั้นมีกลิ่นหอมน่ารับประทานอย่างเหลือเชื่อ จงเจี้ยนยังกล่าวถึงฝีมือการถลกหนังของฟู่จ้าวหนิงที่ยอดเยี่ยม หนังกระต่ายยังคงสภาพสมบูรณ์ และเธอยังเก็บขนกระต่ายหลายชิ้นไปฟอกเป็นถุงมือและรองเท้าอีกด้วย เจ้าชายจุนฟังด้วยความสนใจอย่างยิ่ง</p>\n<p>และชั่วขณะหนึ่ง พระองค์รู้สึกเสียดายที่ไม่ได้ขึ้นไปบนภูเขาด้วยพระองค์เอง เมื่อได้ยินคนรับใช้กล่าวถึงว่าพระเถระเสินและยายซุนจะย้ายเข้ามาอยู่ในวังของเจ้าชายจุน พระองค์จึงตรัสอย่างไม่แยแสว่า “ถ้าอย่างนั้นก็จัดหาที่ที่เงียบสงบกว่านี้ให้พวกท่าน อย่าให้พวกท่านมาอยู่ต่อหน้าข้าหากไม่จำเป็น” “ครับ” คนรับใช้เดินออกไปและพบกับหงจั่วและเฟินซิงที่รออยู่ข้างนอก นางกำนัลทั้งสองมองเขาด้วยความคาดหวัง “คนรับใช้ พวกเราได้ยินมาว่าคุณหนูฟู่ขุดสมุนไพรได้สิบชนิดแล้ว และตอนนี้เป็นเจ้าหญิงของเราอย่างแท้จริงแล้ว หลังจากกลับไปแล้ว เจ้าหญิงจะยังคงอาศัยอยู่ในวังเจี้ยนเจียหรือไม่” “นี่...” คนรับใช้ลังเล</p>\n<p>“ฝ่าบาทไม่ได้ตรัสว่าเจ้าหญิงควรย้ายไปอยู่ที่วังเฉาหยุน” วังเฉาหยุนก็เป็นหนึ่งในวังหลักในสวนหลังบ้าน ใกล้กับวังของเจ้าชาย เดิมทีนั้นตั้งใจจะจัดไว้ให้คุณหญิงเจ้าของบ้าน แต่เนื่องจากองค์ชายจุนยังไม่ได้ออกคำสั่งใดๆ พวกเขาจึงไม่กล้าจัดการอะไร “คนรับใช้ ถ้ามีโอกาสช่วยไปทูลองค์ชายให้หน่อยได้ไหม” เฟินซิงกล่าว คนรับใช้ไม่รู้ว่าทำไมสาวใช้สองคนนี้ถึงชอบฟู่จ้าวหนิงนัก จึงพยักหน้าเห็นด้วย เขาไปเตรียมที่พักให้กับแพทย์หลวงเสินและยายซุน แต่ไม่นานนักก็มีคนรับใช้คนหนึ่งวิ่งเข้ามา “คนรับใช้ ยายซุนได้ยินว่าพระสนมไม่อยู่ในวัง จึงพาคนไปที่ตระกูลฟู่ บอกว่าจะไปรับพระสนมกลับมา” “อะไรนะ?”</p>\n<p>หน้าของคนรับใช้ซีดเผือดด้วยความโกรธ “ยายซุนนี่คิดว่าตัวเองสำคัญนักหนา!</p>\n<p>เมื่อไหร่กันที่แกจะมาตัดสินใจเรื่องที่ประทับขององค์ชายได้?” “ไปบอกองค์ชายเดี๋ยวนี้” เมื่อได้ยินเช่นนั้น องค์ชายจุนก็หยุดไปครู่หนึ่ง “ปล่อยนางไป ข้าอยากรู้ว่าฟู่จ้าวหนิงจะรับมือกับหญิงชราแปลกประหลาดและแข็งกระด้างในวังนี้ได้หรือไม่” “ฝ่าบาท เราได้รับข่าวว่านางกำนัลศักดิ์สิทธิ์แห่งเผ่าโมโรได้เดินทางมาถึงเมืองหลวงแห่งอาณาจักรจ้าวแล้ว!” ทหารองครักษ์คนหนึ่งรีบวิ่งเข้ามา “ในเมื่อนางกำนัลศักดิ์สิทธิ์มาถึงแล้ว นางต้องนำหนอนไหมโลหิตหัวใจมาด้วย” เมื่อได้ยินข่าวนี้ สีหน้าของเจ้าชายจุนก็อ่อนลงเล็กน้อย เขาเคาะนิ้ว “หนอนไหมโลหิตหัวใจ!”</p>\n<p>หนอนไหมโลหิตหัวใจเป็นหนึ่งในส่วนผสมของตำรับยาเพื่อกำจัดพิษที่เหลืออยู่ในร่างกายและรักษาอาการเจ็บป่วยเรื้อรังของเขา หลังจากค้นหามาหลายปี ในที่สุดพวกเขาก็ได้รู้เรื่องราวของเผ่าสันโดษที่ชื่อว่าเผ่าโมโร ทุกๆ สิบปี เผ่านี้จะเลือกนางกำนัลศักดิ์สิทธิ์ หญิงสาวที่สามารถหาและเลี้ยงหนอนไหมโลหิตหัวใจได้ เมื่อเลี้ยงจนโตแล้ว หนอนไหมโลหิตหัวใจก็จะอยู่กับนางกำนัลศักดิ์สิทธิ์เสมอ อย่างไรก็ตาม เผ่าโมโรไม่ค่อยออกไปไหน และนางกำนัลศักดิ์สิทธิ์ซึ่งมีฐานะสูงก็ไม่ค่อยปรากฏตัว พวกเขายังไม่รู้เลยว่าตระกูลโมโรอยู่ที่ไหน คราวนี้ระหว่างเดินทางกลับเมืองหลวง</p>\n<p>พวกเขาได้รับข่าวว่าเทพธิดาแห่งตระกูลโมโรจะเข้าร่วมพิธีการพนันยาที่จะจัดขึ้นในเร็วๆ นี้ “ในที่สุดเธอก็มาแล้ว ไปหาดูสิว่าเธอพักอยู่ที่ไหน” “ครับ” ไม่ว่าจะต้องแลกด้วยอะไร เขาก็ต้องได้หนอนไหมโลหิตหัวใจมาให้ได้ ฟู่จ้าวหนิงทำการฝังเข็มให้ท่านผู้เฒ่าฟู่อีกครั้ง เปลี่ยนผ้าพันแผลให้ไทเกอร์ แล้วคว้าไม้เท้าไปตามหาภรรยาคนที่สองและสาม แต่ในขณะนั้น ประตูหน้าบ้านตระกูลฟู่เปิดกว้าง และคุณหญิงคนที่สามกำลังรออยู่ที่ประตูพร้อมกับคนรับใช้ “พวกเธอคงจะมาถึงเร็วๆ นี้แล้วใช่ไหมคะ” คุณหญิงคนที่สามดูวิตกกังวลมาก คนรับใช้ข้างๆ เธอก็ชะเง้อคอมองตรงไปข้างหน้า “นับเป็นเกียรติอย่างยิ่งที่เทพธิดาได้มาพักในบ้านของเราในครั้งนี้</p>\n<p>ต้องใช้ความพยายามมากทีเดียว” คุณหญิงคนที่สามกระซิบกับคนรับใช้ของเธอ “เมื่อก่อน ดิฉันสามารถออกจากเผ่าโมโรและแต่งงานกับตระกูลฟูได้ก็เพราะความช่วยเหลือของเทพธิดาผู้ศักดิ์สิทธิ์ เธอเก่งมาก ถ้าเราปฏิบัติต่อเธอดีในครั้งนี้ เธอจะตอบแทนเราในอนาคตอย่างแน่นอน” ชิงเอ๋อร์ สาวใช้พยักหน้า “มาแล้วค่ะ ท่านหญิง มาๆ” รถมาค่อยๆ แล่นเข้ามาใกล้ หลังคารถแกะสลักเป็นรูปนกอินทรีดำ ซึ่งเป็นสัญลักษณ์ของเผ่าโมโร แม้ว่าคนภายนอกโดยทั่วไปจะไม่รู้จักก็ตาม นอกจากนกอินทรีดำแล้ว รถมาก็ดูธรรมดา แต่ถ้ามองใกล้ๆ จะเห็นว่ารถมานั้นมั่นคงมาก รถมาจอดตรงหน้าพวกเขา คนขับเป็นหญิงวัยกลางคน “ท่านหญิง เรามาถึงแล้วค่ะ” เธอกล่าวกับคนข้างใน</p>\n<p>ม่านถูกเปิดออก และสาวใช้สวยสองคนลงจากรถก่อน จากนั้นก็ช่วยหญิงสาวคนหนึ่งลง หญิงสาวคนนี้อายุประมาณยี่สิบปี ผมสีดำยาวสลวยประดับด้วยดอกไม้สด สวมชุดสีดำ และมีใบหน้าที่สวยงามโดดเด่น “ท่านหญิงศักดิ์สิทธิ์...” ท่านหญิงคนที่สามรีบเดินไปทักทาย “ท่านไม่จำเป็นต้องเรียกข้าอย่างนั้นข้างนอก เรียกข้าด้วยชื่อก็พอแล้ว ตอนนี้ข้าเป็นหลานสาวห่างๆ ของท่าน” ท่านหญิงศักดิ์สิทธิ์กล่าว “ค่ะ งั้นข้าจะเรียกท่านว่าฉางจุนอย่างไม่ละอายใจเลย” ไห่ฉางจุนพยักหน้าและเดินตามท่านหญิงคนที่สามและคนอื่นๆ เข้าไปในบริเวณบ้านตระกูลฟู่ อย่างไรก็ตาม เมื่อเข้าไปข้างในแล้ว เธอไม่พอใจกับลานที่ท่านหญิงคนที่สามจัดเตรียมไว้ให้</p>\n<p>“ข้าจะเลือกที่พักเอง” ท่านหญิงคนที่สามไม่มีทางเลือกอื่นนอกจากต้องตามเธอไป และได้พบกับฟู่จ้าวหนิงที่กำลังถือไม้เท้าอยู่</p>"}, "46": {"chapter_number": 46, "chapter_title": "第46章真是個烏龍", "content": "<p>ลมพัดมาจากทางของฟู่จ้าวหนิง จมูกของไห่ฉางจุนกระตุก ดวงตาเป็นประกาย และจ้องมองไปที่ฟู่จ้าวหนิง “เธอเป็นใคร?” น้ำเสียงของเธอตื่นเต้นเล็กน้อย คุณนายฟู่เองก็ตกตะลึงเมื่อเห็นฟู่จ้าวหนิง เธอเคยได้ยินจากน้องสะใภ้ว่าฟู่จ้าวหนิงเป็นคนละคน และค่อนข้างดุร้าย สองสามวันที่ผ่านมา เพื่อรอไห่ฉางจุน เธอไม่อยากมีเรื่องกับฟู่จ้าวหนิง เธอไม่คาดคิดว่าจะมาเจอกันที่นี่ “เธอคือฟู่จ้าวหนิง หลานสาวคนโตของหัวหน้าตระกูลฟู่” คุณนายฟู่รู้สึกไม่ดีเมื่อเห็นท่าทีของฟู่จ้าวหนิง “ฉางจุน เราไปทางอื่นกันเถอะ นิสัยของจ้าวหนิงไม่ดีแน่” “ไม่ เธอมีกลิ่นสมุนไพรที่ฉันต้องการ!” ไห่ฉางจุนรีบเดินตรงไปยังฟู่จ้าวหนิง “ฟู่จ้าวหนิง!”</p>\n<p>“คุณเป็นใคร?” ฟู่จ้าวหนิงจำคนคนนี้ไม่ได้ แต่หญิงสาวในชุดดำเรียกชื่อเธอ ดวงตาเป็นประกาย ฟู่จ้าวหนิงรู้สึกไม่สบายใจเล็กน้อย คนนี้มาจากไหนกัน? “ฉันชื่อไห่ฉางจุน คุณมีกลิ่นมะลิราตรีติดตัว คุณมีมะลิราตรีใช่ไหม?” ไห่ฉางจุนพูดตรงๆ ฟู่จ้าวหนิงรู้สึกประหลาดใจเล็กน้อย เธอมีมะลิราตรี แต่ไม่ได้พกติดตัว มือและแขนเสื้อของเธอเปื้อนเล็กน้อยขณะปรุงยา และเวลาผ่านไปกว่าครึ่งชั่วโมงแล้ว หญิงสาวคนนี้ยังได้กลิ่นได้อย่างไร และแม้แต่จากระยะไกลขนาดนี้?</p>\n<p>จมูกแบบไหนกัน! แต่มะลิราตรีหายากมาก ต่อให้มีก็คงไม่ยอมรับ “ไม่” ฟู่จ้าวหนิงกล่าว พยายามเดินเลี่ยง แต่ไห่ฉางจุนก็ขวางทางเธอไว้ทันที “ข้าได้กลิ่นหอมของดอกมะลิราตรีอย่างชัดเจน เจ้าหลอกข้าไม่ได้หรอก! ข้ามั่นใจอย่างยิ่งว่าเจ้ามีดอกมะลิราตรี!” “เจ้าเป็นอะไรกัน?” เซียวเถาจ้องมองไห่ฉางจุน “คุณหนูยังไม่รู้จักเจ้าเลยด้วยซ้ำ” “ข้าต้องการซื้อดอกมะลิราตรีของเจ้า บอกราคามาเลย!” ไห่ฉางจุนไม่สนใจเซียวเถา ครั้งนี้เธอมาที่เมืองหลวงไม่เพียงแต่เพื่อหาคนที่เธอชอบที่มีสายเลือดบริสุทธิ์เท่านั้น แต่ยังเพื่อหาดอกมะลิราตรีด้วย เธอไม่คาดคิดว่าจะได้มาง่ายๆ เธอได้กลิ่นหอมของมันทันทีที่มาถึงเมืองหลวง “ข้าบอกแล้วว่าข้าไม่มี</p>\n<p>หลบไป” ดอกมะลิราตรีเป็นสมุนไพรที่ท่านอาจารย์ฟู่ต้องการ มีเพียงไม่กี่กรัมเท่านั้นที่สามารถสกัดได้ และเธอจะไม่ยอมให้ใครได้ไปอย่างเด็ดขาด “จ้าวหนิง ดูเหมือนว่าฉางจุนจะเป็นแขกด้วย เจ้าเรียกเธอว่าญาติ หรือเรียกเธอว่าพี่ไห่ก็ได้” คุณหญิงคนที่สามไม่คาดคิดว่าไห่ฉางจุนจะมาขออะไรจากฟู่จ้าวหนิงโดยตรง แต่เจ้า “ต้นกระบองเพชรดอกหัก” นั่นคืออะไรกันแน่?</p>\n<p>เธอไม่เคยได้ยินมาก่อน “คุณหญิงคนที่สามใช่ไหม? ฟู่เป่าเจินอยู่ที่ไหน?” ฟู่จ้าวหนิงมาตามหาฟู่เจียวเจียวและฟู่เป่าเจิน เธอต้องเอาหีบสินสอดคืน มันเป็นเงินที่ปู่ของเธอเก็บออมมาอย่างยากลำบากเพื่อเป็นสินสอด พวกนี้พยายามจะเอาทุกอย่างไปจากตระกูลฟู่ “เป่าเจิน? เธอไม่อยู่ในคฤหาสน์ เธอและเจียวเจียวไปที่ภูเขาเฉาหยุน” “พวกเขาหนีไปเร็วมากเลยเหรอ?” ฟู่จ้าวหนิงจ้องมองคุณหญิงคนที่สาม แต่คุณหญิงคนที่สามไม่แสดงท่าทีใดๆ ดูเหมือนจะไม่สนใจและราวกับว่าไม่รู้เรื่องอะไรเลย แต่ฟู่เป่าเจินรู้เรื่องวันแต่งงานของเธอ คุณหญิงคนที่สามจะไม่รู้ได้อย่างไร? “จ้าวหนิง แค่ให้ดอกไม้ที่ฉางจุนต้องการไปเถอะ เธอไม่ได้เอาฟรีหรอก</p>\n<p>เธอจะจ่ายเงินให้เจ้า” คุณหญิงคนที่สามมองฟู่จ้าวหนิงแล้วรู้สึกว่าเธอดูแตกต่างจากเมื่อก่อน แต่ก็อธิบายไม่ถูก เธอไม่ได้แย่เหมือนที่คุณหญิงคนที่สองเคยบรรยายไว้ “นี่เป็นการขายแบบบังคับหรือไง” ฟู่จ้าวหนิงเลิกคิ้ว “ฉันบอกว่าไม่ไม่ใช่เหรอ?</p>\n<p>ท่านไม่เข้าใจภาษาคนหรือไง?” “ฉันจะให้ท่านหนึ่งพันตำลึง!” ไห่ฉางจุนพูดขึ้นมาทันที ดวงตาของคุณหญิงคนที่สามเบิกกว้าง หนึ่งพันตำลึง? ดอกไม้ชนิดไหนกันที่ราคาหนึ่งพันตำลึง? เธอเริ่มสนใจ! “จ้าวหนิง หนึ่งพันตำลึง!</p>\n<p>ท่านอาจารย์ต้องไปหาหมอซื้อยาไม่ใช่เหรอ? เจ้ามีหนึ่งพันตำลึงไม่ใช่เหรอ? รีบเอาดอกไม้ให้ฉางจุนไปเร็ว” คุณหญิงคนที่สามพูดอย่างเร่งรีบ “ไม่ ต่อให้เจ้าบอกว่าหมื่นตำลึงวันนี้ ข้าก็ไม่ให้เจ้าหรอก” ฟู่จ้าวหนิงหันหลังและจากไป ฟู่เป่าเจิ้นและฟู่เจียวเจียวพยายามหลีกเลี่ยงเวลานี้อย่างแน่นอนและได้จากไปแล้ว แต่พวกเขาไม่สามารถกำจัดสิ่งเหล่านั้นได้ในเวลาอันสั้น เธอจึงรอได้ “หยุดอยู่ตรงนั้น!” ไห่ฉางจุนรีบวิ่งตามฟู่จ้าวหนิงไปอีกครั้ง เธอจำเป็นต้องใช้ดอกไม้ราตรีหัก! ร่างกายของเธอแข็งแกร่งเป็นพิเศษ สามารถดึงดูดและบำรุงเลี้ยงไหมโลหิตได้ แต่ก็ทำให้เธอเสี่ยงต่อการตกเลือดอย่างรุนแรงและหัวใจหยุดเต้นระหว่างคลอดบุตร</p>\n<p>มีเพียงดอกไม้ราตรีหักเท่านั้นที่จะช่วยให้เธอรอดพ้นจากวิกฤตระหว่างคลอดบุตรได้ เหล่าหญิงพรหมจรรย์คนก่อนๆ เกือบทั้งหมดเคยประสบกับเรื่องนี้ หญิงพรหมจรรย์คนก่อน แม่ของเธอ เสียชีวิตจากภาวะตกเลือดหลังคลอด และในตอนนั้น ดอกไม้ราตรีหักก็ไม่มีให้ใช้แล้ว เธออายุยี่สิบเอ็ดปีแล้ว หากเธอไม่หาชายที่จะให้กำเนิดบุตรในเร็วๆ นี้ ตำแหน่งหญิงพรหมจรรย์คนต่อไปของเธออาจตกเป็นของคนอื่น เธอจำเป็นต้องลงจากภูเขาเพื่อหาชายที่เหมาะสมที่จะให้กำเนิดบุตร และเธอก็จำเป็นต้องหาดอกไม้ราตรีหักให้เจอด้วย!</p>\n<p>“นี่คือบ้านตระกูลฟู่หรือคะ? พระชายาจุนประทับอยู่ที่นี่หรือเปล่าคะ?” มีคนตะโกนมาจากข้างนอก คุณหญิงสามรู้สึกรำคาญเมื่อได้ยินเสียงนั้น “คนเฝ้าประตูเป็นอะไรไป? แอบอู้ไปอีกแล้วเหรอ? ประตูยังไม่ปิด!” ปล่อยให้คนเข้ามาโดยไม่บอกกล่าว!</p>\n<p>“เจ้าเป็นใคร? ไม่มีมารยาทเลย บุกเข้ามาในบ้านคนอื่นแบบนี้!” คุณหญิงสามหันไปดุ แต่แล้วก็เห็นคุณยายซุนหน้าตาเคร่งขรึม สวมชุดคลุมพระราชวังปักดิ้นทอง จึงหยุดชะงักไปครู่หนึ่ง “ฉันนามสกุลซุน ฉันเป็นครูสอนพระราชินี ประตูบ้านท่านไม่ปิด และฉันมีธุระด่วน จึงเข้ามาหาคนค่ะ” “โอ้ คุณยายซุน!” คุณหญิงสามรีบทำท่าทางตื่นเต้นเกินเหตุ “นับเป็นเกียรติอย่างยิ่งสำหรับตระกูลฟู่ของเรา ที่มีครูจากพระราชวังมาเยือน!” ฟู่จ้าวหนิงหยุดพูดเมื่อได้ยินคำพูดของคุณยายซุน ไห่ฉางจุนหันกลับมามองคนที่ออกมาจากวังด้วยความสงสัยเล็กน้อย ย่าซุนเหลือบมองพวกเขา มองคนหนึ่งแล้วก็มองอีกคน ก่อนจะพูดกับไห่ฉางจุนอย่างเย็นชาว่า “พระชายาจุน</p>\n<p>ในเมื่อตอนนี้ท่านได้เข้าราชวงศ์แล้ว จะกลับไปบ้านพ่อแม่ในวันแต่งงานไม่ได้หรอกค่ะ ผิดกฎ ถ้าคนนอกได้ยินเรื่องนี้ พวกเขาจะพูดถึงองค์ชายจุนว่าอย่างไร โปรดกลับไปที่วังขององค์ชายจุนกับข้าด้วย” ไห่ฉางจุนชี้ไปที่ตัวเอง “ฉันเหรอ?</p>\n<p>พระชายาจุน?” ฟู่จ้าวหนิงรู้สึกขบขันและหงุดหงิดเล็กน้อย ตอนแรกเธอโกรธคำพูดของย่าซุน แต่พอเห็นว่าย่าซุนเข้าใจผิด เธอก็รู้สึกขำ “ย่าซุน เธอ...” คุณหญิงคนที่สามกำลังจะอธิบาย แต่ย่าซุนก็ขัดจังหวะเสียก่อน “ข้าได้ยินมาว่าพระชายาจุนสวยมาก แต่ในฐานะพระชายาแล้ว ไม่ควรพึ่งพาความงามเพียงอย่างเดียว” เธอเคยได้ยินมาว่าฟู่จ้าวหนิงสวยมาก และชุดสีดำก็ดูดีมากเมื่อเธอสวมใส่ ในขณะที่ใบหน้าของสาวใช้นั้นสกปรก เธอจึงเข้าใจผิดคิดว่าไห่ฉางจุนเป็นสาวใช้ ฟู่จ้าวหนิงหันหลังจะเดินจากไป เสี่ยวเถาจึงสังเกตเห็นรอยเปื้อนบนใบหน้าของเธอ “คุณหนู หน้าของคุณ...”</p>"}, "47": {"chapter_number": 47, "chapter_title": "第47章臉皮可真厚", "content": "<p>ตอนนั้นเองที่เสี่ยวเถาจึงสังเกตเห็นรอยสีเขียวเข้มบนใบหน้าของฟู่จ้าวหนิง และเห็นว่านายหญิงของเธอเปลี่ยนมาใส่ชุดเก่าเพราะจะไปซื้อยา ชุดเก่านี้เป็นชุดที่นายหญิงเคยใส่ไปซื้อยาที่เชิงเขา ดังนั้นจึงหลีกเลี่ยงไม่ได้ที่จะมีคราบเปื้อนที่ซักไม่ออก และบางส่วนก็ขาดและเย็บปะชุน ฟู่จ้าวหนิงไม่เคยใส่ใจเรื่องรูปลักษณ์ของตัวเองที่บ้าน แต่ตอนนี้แม้แต่คุณยายซุนยังเข้าใจผิดคิดว่าเธอเป็นคนอื่น ฟู่จ้าวหนิงจึงเข้าใจสิ่งที่คุณยายซุนหมายถึง เธอรู้สึกขบขันขึ้นมาทันที “ฉันได้ยินมาว่าคุณยายซุนเป็นคนสนิทของพระนาง” ฟู่จ้าวหนิงถามพลางหันหลังกลับ คุณยายซุนยกเปลือกตาขึ้นเล็กน้อย “ใช่” “และเป็นครูสอนพิเศษ สอนเจ้าหญิง นางกำนัล</p>\n<p>และสตรีอื่นๆ ใช่ไหม” “แน่นอน” คุณยายซุนยืดหลังตรงขึ้นอีกขณะพูดสามคำนั้นด้วยสีหน้าหยิ่งผยอง เธอไม่ใช่ครูสอนพิเศษธรรมดา! แม้แต่เหล่าสตรีที่เข้ามาในวังก็ยังได้รับการฝึกฝนจากเธอ “ดูเหมือนว่ายายซุนจะมีสายตาเฉียบคมมาก แต่ฉันเริ่มคิดว่าเจ้าตาบอดเสียแล้ว” ฟู่จ้าวหนิงพูดพร้อมกับยิ้มเยาะ เธอโกรธมาก เธอจะให้เกียรติยายซุนได้อย่างไร?</p>\n<p>พระนางซู่ทรงส่งครูสอนพิเศษคนนี้มา เห็นได้ชัดว่าตั้งใจจะทำให้เรื่องยากลำบากสำหรับเธอและสั่งสอนเธอ ยายซุนคนนี้ช่างยุ่งเหยิงจริงๆ แม้ว่าองค์ชายจุนจะไม่ได้ส่งใครไปเรียกเธอกลับ ยายซุนก็มาที่ประตูบ้านของเธอโดยตรง และเรียกร้องอย่างแข็งขันให้พาเธอกลับไป สีหน้าของยายซุนเปลี่ยนไป เธอจึงมองฟู่จ้าวหนิงอย่างพิจารณา เธอสังเกตเห็นว่าหญิงสาวที่แต่งตัวมอซอ ใบหน้าแทบไม่ได้ล้างหน้าคนนี้ กลับมีรูปร่างที่สวยงามและท่าทางที่สง่างามกว่าหญิงสาวในชุดดำ และท่าทางของเธอก็ดูสง่ากว่า ใบหน้าของฟู่จ้าวหนิงดูประณีตกว่า ยิ่งไปกว่านั้น หญิงสาวในชุดดำมีใบหน้าที่คมชัดและโดดเด่นเกินไป ทำให้เธอดูไม่เหมือนคนเมืองหลวงเท่าไหร่</p>\n<p>ส่วนหญิงสาวที่แต่งตัวมอซอมีใบหน้าที่บอบบางกว่า มีเส้นสายที่อ่อนโยนกว่า ทำให้เธอดูเหมือนคนเมืองหลวงมากกว่า “คุณคือฟู่จ้าวหนิงงั้นเหรอ?!” คุณยายซุนอุทาน “อะไรนะ? คุณเพิ่งบอกว่าคุณยายซุนเป็นครูสอนพิเศษ เป็นคนมีระเบียบวินัยที่สุด ถ้าจำไม่ผิด ตอนนี้ฉันเป็นพระสนมที่ถูกต้องตามกฎหมายของจุนแล้ว คุณยายซุนเรียกฉันด้วยชื่อจริงแบบนี้ มันดูไม่เหมาะสมไปหน่อยเหรอ?” ฟู่จ้าวหนิงเลิกคิ้วขึ้น เพียงเพราะใครบางคนถูกส่งมาโดยพระนางซูสีไทเฮา ก็ต้องประจบประแจงขนาดนั้นเลยเหรอ?</p>\n<p>ช่างน่าขัน คุณยายซุนเสียใจที่เรียกชื่อเธอ เธอรู้ว่าเธอผิด แต่เธอก็ตกใจเกินกว่าจะตอบสนองได้ทันที อย่างไรก็ตาม เธอตอบสนองอย่างรวดเร็วด้วยการโค้งคำนับอย่างเป็นทางการต่อฟู่จ้าวหนิงทันที “โปรดอภัยให้ข้าด้วย ฝ่าบาท ข้าตกใจมากและพูดผิดไป ข้าแน่ใจว่าฝ่าบาทจะไม่ลงโทษข้าด้วยเรื่องเล็กน้อยเช่นนี้” ฟู่จ้าวหนิงส่ายหัว “ไม่ เจ้าผิด ข้าจะลงโทษ” ย่าซุนตกตะลึง ไม่เข้าใจว่าเธอหมายถึงอะไร “กลับไปที่วัง ข้าจะขอให้องค์ชายจุนส่งคนไปบอกพระนางว่าครูที่ส่งมานั้นไม่รู้จักมารยาทและไม่มีคุณสมบัติที่จะสอนข้า” “องค์ชายจุน!” ย่าซุนตกตะลึง ใบหน้าซีดเผือดด้วยความโกรธ</p>\n<p>เธอไม่อยากเชื่อเลยว่าฟู่จ้าวหนิงต้องการส่งเธอกลับไปที่วังเพียงเพราะเรื่องนี้! “อะไรนะ ข้าผิดหรือ?” ทันใดนั้นก็มีเสียงอีกเสียงหนึ่งดังขึ้น เสียงขององค์ชายจุนเสี่ยวหลานหยวน “ฉันคิดว่าพระราชสวามีพูดถูกแล้ว ชิงอี้ ส่งคนไปรับคุณยายซุนกลับวัง ถ้าสายเกินไป ให้คุณยายซุนหาที่พักแล้วกลับวังตอนรุ่งเช้า” “ค่ะ” ทหารองครักษ์สองคนเดินเข้ามาและส่งสัญญาณให้คุณยายซุน “คุณยายซุน โปรดเถอะ” ท่าทีของพวกเขานั้นเด็ดเดี่ยวมาก เห็นได้ชัดว่าไม่เปิดโอกาสให้คุณยายซุนขัดขืน คุณยายซุนกัดฟันแน่น ตัวสั่นด้วยความโกรธ แต่ก็ทำอะไรไม่ได้ องค์ชายจุนเสด็จมาด้วยพระองค์เอง ท่านจะกล้าพูดอะไรได้อีก “ค่ะ ข้าพเจ้าจะกลับไปเดี๋ยวนี้</p>\n<p>โปรดขอให้องค์ชายจุนและพระราชสวามีอภัยให้ข้าพเจ้าในครั้งนี้ ข้าพเจ้าจะกลับไปวังและชี้แจงต่อพระนางเจ้า โปรดขอให้พระราชสวามีอย่าส่งใครไปชี้แจง” คุณยายซุนทั้งโกรธและกลัว ถ้าพระนางเจ้ารู้ว่าท่านเพิ่งออกมาและเพิ่งได้พบกับฟู่จ้าวหนิงเพียงครั้งเดียว พระนางเจ้าคงพิโรธมาก “คุณยายซุนกำลังสอนฉันและองค์ชายจุนให้ประพฤติตัวอย่างไรหรือ?” สายตาของฟู่จ้าวหนิงละจากองค์ชายจุนเสียที เธอตกใจไม่แพ้กัน ไม่คาดคิดว่าองค์ชายจุนจะมาที่ตระกูลฟู่ด้วยพระองค์เอง เมื่อมองไปที่มาดามฟู่และคนอื่นๆ ทุกคนต่างจ้องมองเขาด้วยตาโต ตกตะลึงไปหมด “ข้ารับใช้ไม่กล้าหรอก!” “ออกไป” องค์ชายจุนกล่าวอย่างไม่แยแส ย่าซุนจากไปอย่างน่าอนาถ</p>\n<p>มาด้วยความฮึกเหิม แต่กลับจากไปอย่างหัวทิ่มสลาย มาดามฟู่เองก็ตกใจกับการเปลี่ยนแปลงของฟู่จ้าวหนิง ตอนนี้เธอเชื่อคำพูดของพี่สะใภ้แล้ว!</p>\n<p>ฟู่จ้าวหนิงเปลี่ยนไปอย่างสิ้นเชิงจริงๆ แต่เธอก็ยังตกใจกับองค์ชายจุน นี่คือองค์ชายจุน! เหลือบไปเห็นไห่ฉางจุนจ้องมององค์ชายจุนอย่างเหม่อลอย ดวงตาเป็นประกายด้วยความหลงใหลอย่างไม่ปิดบัง มาดามฟู่รู้สึกได้ทันทีว่ามีบางอย่างผิดปกติ สีหน้าของไห่ฉางจุนบ่งบอกอย่างชัดเจนว่าเธอหลงรักองค์ชายจุน! แต่เจ้าชายจุนสวมหน้ากากครึ่งหน้า ดวงตา หน้าผาก และจมูกถูกปิดบัง เหลือเพียงริมฝีปากและคางเท่านั้นที่มองเห็นได้ แค่นั้นก็ทำให้ไห่ฉางจุนหลงเสน่ห์มากแล้วหรือ? “ท่านคือเจ้าชายจุนหรือ?” ไห่ฉางจุนพูดขึ้นอย่างกระทันหัน เจ้าชายจุนเหลือบมองเธอ “ใช่” “เจ้าชายจุน ท่านหล่อเหลามาก!</p>\n<p>ท่านหล่อที่สุดเท่าที่ฉันเคยเห็นมาเลย ฉันชื่อไห่ฉางจุน พรุ่งนี้เราไปเดทกันไหม?” ดวงตาของไห่ฉางจุนเป็นประกายขณะมองเจ้าชายจุน ดวงตาของเธอคมกริบราวกับจมูกของเธอ! แม้ว่าชายคนนี้จะสวมหน้ากาก แต่เธอมั่นใจอย่างยิ่งว่าเขาหล่อเหลาเป็นพิเศษ! แม้จะมองไม่เห็นคิ้วและดวงตา แต่ลักษณะใบหน้าของเขาก็ยังเห็นได้ชัด รูปทรงของจมูกชัดเจน—สูง ตรง มีริมฝีปากที่สมบูรณ์แบบหนาปานกลาง เส้นคางของเขาสวยงามจนแม้แต่จิตรกรที่เก่งที่สุดก็ไม่อาจวาดได้ นอกจากใบหน้าและลักษณะใบหน้าแล้ว รูปร่างของชายคนนี้ก็โดดเด่นเช่นกัน: สูง สง่างาม ไม่ผอมหรือบางเกินไป—สมบูรณ์แบบอย่างแท้จริง เป็นเรื่องแปลกในเผ่าของพวกเขา ผู้หญิงทุกคนสวยงาม แต่ผู้ชายโดยทั่วไปแล้วไม่ค่อยน่าดึงดูดเท่าไหร่ คนที่หน้าตาดีมักเตี้ยและรูปร่างไม่สมส่วน ส่วนคนที่มีรูปร่างดีมักมีใบหน้าที่ไม่น่าดึงดูด มิเช่นนั้นแล้วทำไมเธอถึงลงมาจากภูเขาเพื่อเลือกผู้ชาย?</p>\n<p>หัวหน้าเผ่าและผู้อาวุโสก็กำลังครุ่นคิดถึงคำถามนี้เช่นกัน พวกเขากล่าวว่าพวกเขาจำเป็นต้องเลือกผู้ชายที่ดีจากภายนอกเพื่อมีลูกและส่งกลับไปยังเผ่า เพื่อให้ลูกหลานรุ่นต่อๆ ไปมีความสวยงามมากขึ้นเรื่อยๆ เธอมาพร้อมกับภารกิจ เซียวเถาที่หายจากอาการตกใจกับการปรากฏตัวอย่างกะทันหันของจุนหวางแล้ว อยากจะลุกขึ้นต่อสู้ทันทีที่ได้ยินคำพูดของเธอ ผู้หญิงคนนี้มาจากไหน? จะมีผู้หญิงไร้ยางอายเช่นนี้ได้อย่างไร? เธอชวนคนแปลกหน้าออกเดท และนี่คือสามีของนายหญิงของเธอ! เซียวเถาโกรธจัด เจ้าชายจุนไม่มีทางตกลงอย่างแน่นอน!</p>"}, "48": {"chapter_number": 48, "chapter_title": "第48章早就滿門抄斬了", "content": "<p>เจ้าชายจุนมองไปที่ฟู่จ้าวหนิง “พรุ่งนี้ พระสนมของข้าจะพานางสาวไปเยี่ยมบ้านเจ้าชายจุนในฐานะแขก พระสนมว่าอย่างไร?” ฟู่จ้าวหนิงขมวดคิ้ว “ข้ากลับไปพรุ่งนี้ไม่ได้ ออกไปคุยกันก่อนเถอะ” ตอนนั้นเองฟู่จ้าวหนิงจึงนึกขึ้นได้ว่าเธอควรจะคุยกับชายผู้นี้อย่างจริงจังเกี่ยวกับแผนการในอนาคตของพวกเขา “เดี๋ยวก่อน!” ไห่ฉางจุนเรียกพวกเขา “พวกท่านเป็นสามีภรรยากันหรือ?” ในที่สุดเสี่ยวเถาก็ได้โอกาส แม้ว่าเธอจะกลัวเล็กน้อยต่อหน้าเจ้าชายจุน แต่เธอก็รีบตะโกนออกไป “นี่คือเจ้าชายจุน สามีของนางสาวของเรา!” “งั้นเจ้าผู้หญิงหน้าด้าน ไปให้พ้นซะ!” ความคิดของไห่ฉางจุนแตกต่างจากคนส่วนใหญ่ เธอกล่าวกับเจ้าชายจุนอย่างมีความสุข “งั้นท่านช่วยไปคุยกับนางสาวและขอให้นางสาวมอบดอกไม้ราตรีหักให้ข้าหน่อยได้ไหม ข้าต้องการดอกไม้ราตรีหัก!” ดอกไม้ราตรีหัก? เจ้าชายจุนมองไปที่ฟู่จ้าวหนิงด้วยความประหลาดใจอย่างแท้จริง เธอมีดอกไม้ราตรีหักหรือ?</p>\n<p>“ข้าไม่ได้ดมกลิ่นผิดเลย เธอมีกลิ่นของดอกไม้ราตรีหักติดตัวอยู่จริงๆ” ไห่ฉางจุนกล่าวกับองค์ชายจุนอย่างจริงจัง องค์ชายจุนมองไปที่ฟู่จ้าวหนิง ฟู่จ้าวหนิงไม่สนใจไห่ฉางจุนและหันหลังเดินออกไปก่อน “ตามข้ามา” เสี่ยวเถาเริ่มรู้สึกไม่สบายใจ เธอจะไปพูดกับองค์ชายจุนแบบนั้นได้อย่างไร องค์ชายจุนจะโกรธหรือเปล่า แต่เมื่อเห็นว่าองค์ชายจุนไม่พูดอะไร เธอก็เลยเดินตามเขาไป เสี่ยวเถาอ้าปากแล้วรีบเดินตามไป พวกเขาเดินผ่านสวนขนาดใหญ่ไปยังลานบ้านใกล้ประตูหลัง ซึ่งตอนนี้เป็นอาณาเขตของบ้านหลังใหญ่แล้ว องค์ชายจุนมองไปรอบๆ แล้วพูดว่า “ข้าได้ยินมาว่าตระกูลฟู่สร้างขึ้นโดยปู่ของเจ้า</p>\n<p>ข้าไม่คิดว่าเจ้ากำลังจะถูกบีบออกจากตระกูลฟู่แล้ว” “ท่านมาเยาะเย้ยหรือ” ฟู่จ้าวหนิงพาเขาไปยังศาลาเล็กๆ นอกลานบ้านของเธอ มันเป็นสถานที่เงียบสงบ แทบไม่มีใครผ่านมา “ข้าจะไปชงชา” เสี่ยวเถารีบวิ่งออกไป นางไม่รู้ว่าจะเผชิญหน้ากับเจ้าชายอย่างไร จึงรีบวิ่งหนีไป นางสงสัยว่านายท่านตื่นหรือยัง ถ้านายท่านรู้ว่าเจ้าชายจุนมาที่บ้าน นางสงสัยว่าเขาจะตื่นเต้นอีกหรือไม่ “เจ้ามีดอกมะลิราตรีติดตัวมาด้วยหรือ? เจ้าไปหามาจากภูเขาจันทร์ตกหรือ?” ฟู่จ้าวหนิงตกใจ ไม่คาดคิดว่าคำถามแรกของเขาจะเป็นแบบนี้ “อะไรนะ เจ้าก็อยากได้ดอกมะลิราตรีด้วยเหรอ?” “ไห่ฉางจุนไม่ได้ต้องการเหรอ?” เจ้าชายจุนส่ายหัว</p>\n<p>“อาการป่วยของข้าไม่น่าจะต้องใช้สมุนไพรนี้” ฟู่จ้าวหนิงพิจารณาเขา “เจ้าตกหลุมรักไห่ฉางจุนตั้งแต่แรกเห็นหรือ?” “หมายความว่ายังไง?” “มิเช่นนั้น เจ้าก็อยากได้ดอกมะลิราตรีมาให้เธอนักหรือ?</p>\n<p>เธอเพิ่งบอกว่าอยากได้ เจ้าก็รีบไปเอามาให้เธอเพื่อเอาใจเธองั้นเหรอ?” ฟู่จ้าวหนิงรู้สึกถูกเยาะเย้ยเล็กน้อย ถึงแม้ว่าผู้ชายในราชวงศ์นี้จะมีภรรยาและสนมหลายคน แต่การปกปิดเรื่องนี้ต่อหน้าภรรยาที่เพิ่งแต่งงานของเขานั้นมันโจ่งแจ้งเกินไป “ฟู่จ้าวหนิง สิ่งที่คุณพูดนั้นรุนแรงไปหน่อยนะ” ริมฝีปากขององค์ชายจุนขมวดแน่น ดูไม่ค่อยพอใจนัก “อย่างไรก็ตาม ไม่ว่าคุณจะพยายามเอาใจไห่ฉางจุนหรือไม่นั้นไม่ใช่เรื่องของข้า แต่ข้าไม่มีดอกไม้ราตรีหัก” “ไห่ฉางจุนบอกว่าเธอได้กลิ่นมันจากคุณ” ฟู่จ้าวหนิงขมวดคิ้ว เขาเชื่อใจไห่ฉางจุนมากขนาดนั้นเลยเหรอ? นี่เป็นการพบกันครั้งแรกของพวกเขาไม่ใช่เหรอ? พวกเขายังไม่รู้จักกันด้วยซ้ำ นอกจากนี้ เขายังบอกว่าเขาชอบความสงบและจะไม่ส่งคนไปที่บ้านขององค์ชายจุนง่ายๆ ไม่ใช่เหรอ?</p>\n<p>เขาเพิ่งเชิญไห่ฉางจุนไปที่บ้านขององค์ชายจุนในวันพรุ่งนี้ “คุณเจอมันที่ภูเขาลั่วเยว่เหรอ? ข้าไม่ได้ตั้งใจจะเอาไปจากคุณ ข้าแค่ต้องการรู้ว่าคุณเจอมันที่ไหนเพื่อที่ข้าจะได้ส่งคนไปตามหาอีกครั้ง” เจ้าชายจุนรู้สึกหงุดหงิดเล็กน้อย จริงๆ แล้วนั่นคือสิ่งที่เขาหมายถึง เขาไม่ได้ตั้งใจจะแย่งดอกไม้ราตรีหักของนางไป แต่ถ้านางบอกเขาได้ว่าพบมันที่ไหน เขาจะส่งคนไปตามหาอีกครั้ง “ถามจงเจี้ยนสิ” ฟู่จ้าวหนิงเองก็ไม่อยากยอมรับเช่นกัน เพราะเธอเพิ่งยืนยันว่าเธอไม่มีมัน และถ้าเธอยอมรับตอนนี้ ใครจะรู้ว่าเขาโกหกเพื่อบอกความจริงหรือเปล่า? อาการป่วยของปู่ของเธอต้องการดอกมะลิราตรี และเธอจะไม่ให้มันกับใครอื่น</p>\n<p>เจ้าชายจุนกัดฟันเงียบๆ “เจ้าจะไม่กลับไปที่วังหรือ?” ดูเหมือนเธอจะตั้งใจไม่ฟังเขา ดังนั้นเจ้าชายจุนจึงเปลี่ยนเรื่อง “นี่คือสิ่งที่ข้าต้องการจะคุยกับเจ้า” ฟู่จ้าวหนิงมองเขา “ที่จริงแล้ว ท่านก็ต้องแต่งงานเหมือนกัน ท่านต้องการภรรยาเอก ตอนนี้ข้าผ่านการทดสอบแล้ว ข้าได้ช่วยท่านทำอะไรบางอย่างสำเร็จแล้ว ข้าคิดว่าข้าควรอยู่ในตระกูลฟู่ต่อไป ปู่ของข้าต้องการข้า” “ไม่มีเหตุผลอะไรที่เจ้าหญิงจุนจะต้องอยู่บ้านพ่อแม่ตลอดไป นอกจากนี้ เจ้าต้องไปอยู่ด้วยเมื่อจักรพรรดิส่งคนมา” “ถ้าอย่างนั้นเมื่อพวกเขามา ก็ส่งคนไปบอกพวกเขา แล้วฉันจะไป” ฟู่จ้าวหนิงขมวดคิ้ว “อธิบายสถานการณ์ของปู่ให้พวกเขาฟัง</p>\n<p>ฉันเชื่อว่าพวกเขาจะเข้าใจใช่ไหม” “ไม่ พวกเขาจะไม่เข้าใจ” “หมายความว่ายังไง” ฟู่จ้าวหนิงตกใจ เจ้าชายจุนยิ้มอย่างมีเลศนัย “เว้นแต่ว่าฉันรักพวกเจ้าทั้งสองและตั้งใจจะแต่งงานกับพวกเจ้า พวกเขาจะไม่เชื่อว่าฉันแต่งงานกับลูกสาวของตระกูลฟู่จริงๆ” ฟู่จ้าวหนิงยิ่งไม่เข้าใจ เจ้าชายจุนโต้กลับ “ปู่ของเจ้าไม่รู้หรือว่าเจ้าจะแต่งงานกับฉัน?</p>\n<p>ถ้าเขารู้ เขาจะไม่ขอให้เจ้าทิ้งฉันไปหรือ?” ดวงตาของฟู่จ้าวหนิงเบิกกว้าง เธอเข้าใจในทันที “ท่านรู้จักตระกูลฟู่หรือ? ท่านรู้จักปู่ของข้าหรือ? ท่านก็รู้ด้วยว่าถ้าปู่รู้ว่าข้าจะแต่งงานกับท่าน ปู่จะต้องคัดค้านแน่?” เขารู้ทุกอย่าง! เขารู้ทุกอย่าง!</p>\n<p>ฟู่จ้าวหนิงรู้สึกมึนงงไปหมด เธอจะไปคิดได้อย่างไรว่าสามีของเธอ ซึ่งเธอเลือกอย่างหุนหันพลันแล่นบนถนน จะบังเอิญมีความเกี่ยวข้องกับตระกูลฟู่? ชายคนนี้รู้ตั้งแต่แรก แต่กลับไม่พูดอะไรเลย แถมยังร่วมมือกับเธอ แต่งงานกับเธอ และจัดพิธีแต่งงานให้! “ข้ารู้” องค์ชายจุนนั่งลงบนเก้าอี้หิน แล้วชี้ให้เธอนั่งลงด้วย ฟู่จ้าวหนิงสูดหายใจเข้าลึกๆ เธอไม่ใช่คนโกรธง่าย แต่เซียวหลานหยวนช่างน่ารังเกียจเหลือเกิน เขาคิดร้ายกับเธอได้อย่างใจเย็นขนาดนี้ได้อย่างไร? “เอาเถอะ เธอเดินเข้ามาพัวพันกับเรื่องยุ่งยากนี้เอง แต่โชคดีที่เธอรู้เรื่องทั้งหมดนี้ตั้งแต่แรกได้อย่างไร?!” ฟู่จ้าวหนิงสงบสติอารมณ์ลงแล้วนั่งลงตรงข้ามเขา</p>\n<p>“ท่านแค้นอะไรปู่ของข้าหรือ?” เซียวหลานหยวนส่ายหัว “ข้าไม่ได้แค้นเคืองท่านผู้อาวุโสฟู่เลย ในเมื่อท่านเรียนแพทย์มาและยังตรวจชีพจรข้าด้วย ท่านก็น่าจะบอกได้ว่ายังมีพิษหลงเหลืออยู่ในร่างกายข้าใช่ไหม?” “ใช่” “ตอนนั้นในงานเลี้ยงในวัง ข้ายังเด็กและถูกวางยาพิษ ตอนที่พี่เลี้ยงเข้ามา มีคนอยู่ในห้องเพียงคนเดียว คนนั้นคือแม่ของท่าน ฟู่หลินซือ” เซียวหลานหยวนมองเธอ “ตอนนี้ท่านเข้าใจแล้วหรือ?” ฟู่จ้าวหนิงมองเขาด้วยความตกใจ นึกถึงสิ่งที่ท่านผู้อาวุโสจีเคยบอกเธอก่อนหน้านี้ เหตุการณ์ที่ทำให้วังตกตะลึงในตอนนั้น ซึ่งว่ากันว่าทำให้ฮ่องเต้ต้องประหารชีวิตคนจำนวนมาก</p>\n<p>แท้จริงแล้วเป็นตัวการสำคัญในเรื่องอื้อฉาวของตระกูลฟู่งั้นหรือ?!</p>\n<p>“เป็นเธอที่วางยาพิษเขาหรือ? หลักฐานชัดเจนแล้วหรือ?” ฟู่จ้าวหนิงถามย้ำทันที “ถ้ายืนยันได้ว่าเป็นเธอ ครอบครัวของเธอทั้งหมดคงถูกประหารชีวิตไปนานแล้วในข้อหาวางยาพิษองค์ชาย ทำไมท่านถึงมาแก้แค้นข้าตอนนี้?” เซียวหลานหยวนอดไม่ได้ที่จะชื่นชมเธอเล็กน้อย ปฏิกิริยาของเธอนั้นรวดเร็วมาก เธอเข้าใจประเด็นสำคัญในทันที เขาเชื่อว่าฟู่จ้าวหนิงไม่รู้เรื่องราวที่เกิดขึ้นในตอนนั้น มิเช่นนั้นเธอคงจำเขาไม่ได้เมื่อได้ยินชื่อ และคงไม่กล้าพูดว่าอยากแต่งงานกับเขา</p>"}, "49": {"chapter_number": 49, "chapter_title": "第49章已經有仇怨了", "content": "<p>“ตอนนั้นไม่มีหลักฐานจริง ๆ แต่ข้าถามคนที่อยู่ในเหตุการณ์แล้ว ทุกคนต่างบอกว่าคุณนายฟู่หลินก็อธิบายไม่ได้เหมือนกัน เธอดูตื่นตระหนกและรู้สึกผิด ไม่ได้แก้ตัวอะไรเลย” องค์ชายจุนมองไปที่เธอ “ยิ่งไปกว่านั้น ไม่นานหลังจากนั้น พ่อแม่ของคุณก็หายตัวไปเฉย ๆ” “หายตัวไป?” ฟู่จ้าวหนิงตกตะลึงอีกครั้ง พ่อแม่ของเธอหายตัวไป? แต่ในความทรงจำของเธอ ทุกคนในตระกูลฟู่ต่างบอกว่าพ่อแม่ของเธอเสียชีวิตแล้ว คุณปู่ฟู่ไม่เคยพูดถึงพ่อแม่ของเธอเลย ในความทรงจำของหนูน้อยฟู่ เธอเป็นเด็กกำพร้าที่ต้องพึ่งพาปู่เพื่อความอยู่รอด “ดูเหมือนว่าคุณจะไม่รู้อะไรเลยจริง ๆ” องค์ชายจุนสังเกตสีหน้าของเธออย่างระมัดระวัง จากสีหน้าของเธอ</p>\n<p>เขารู้ว่าเธอไม่รู้อะไรเลยเกี่ยวกับสิ่งที่เกิดขึ้นในตอนนั้น หรือเกี่ยวกับพ่อแม่ของเธอ “หลังจากอุบัติเหตุของข้า ฟู่หลินซือถูกคุมขังชั่วคราว ต่อมาพ่อของคุณใช้เงินไปเยี่ยมเธอ และในวันเดียวกันนั้นเอง ทั้งสองก็หายตัวไป น่าขันที่พวกเขาได้รับอนุญาตให้เข้าวังได้ก็เพราะพ่อของข้าและเจ้าชายอีกหลายองค์ประสบอุบัติเหตุขณะเดินทางปลอมตัว และพ่อแม่ของคุณช่วยชีวิตพวกเขาไว้” คุณหนูฟู่รู้เรื่องนี้บ้างเล็กน้อย เธอเคยได้ยินปู่ของเธอพูดถึงว่าพ่อแม่ของเธอช่วยชีวิตฮ่องเต้ไว้ นั่นเป็นเหตุผลที่เธอพยายามทุกวิถีทางเพื่อขอให้ฮ่องเต้เข้ามาแทรกแซงและบังคับให้เซียวเหยียนจิงแต่งงานกับเธอ</p>\n<p>แต่ฮ่องเต้ก็ส่งข่าวมาว่าหลังจากเหตุการณ์นี้ ราชวงศ์ไม่ได้เป็นหนี้บุญคุณตระกูลฟู่เลย “ถ้าไม่ใช่เพราะพ่อแม่ของคุณช่วยชีวิตพวกเขาไว้ ฟู่หลินซืออาจจะถูกประหารชีวิตไปแล้วในวันที่ข้าประสบอุบัติเหตุ ด้วยความกตัญญู เราจึงแค่คุมขังเธอไว้และจะสอบสวนเธอในภายหลัง ใครจะไปคิดว่าเธอจะหนีออกมาได้” เจ้าชายจุนถอดหน้ากากออกและชี้ไปที่ตัวเอง “แต่เพราะเหตุการณ์วางยาพิษนั้น ทำให้ฉันเกือบตายเกือบทุกปีมาหลายปีแล้ว ฉันเข้านอนดึกโดยไม่รู้ว่าจะได้ตื่นขึ้นมาในวันพรุ่งนี้หรือไม่ ร่างกายที่บอบช้ำนี้เหมือนเส้นด้ายที่ห้อยอยู่ในอากาศ ทนทุกข์ทรมานมาปีแล้วปีเล่า” “งั้นเจ้าก็ตกลงแต่งงานกับข้าเพื่อแก้แค้นงั้นหรือ?”</p>\n<p>ฟู่จ้าวหนิงกัดฟัน “ถ้าฟู่หลินไม่หนีไปตอนนั้น บางทีเราอาจจะสืบสวนเรื่องนี้ได้อย่างละเอียด ระบุยาพิษ และหาวิธีรักษาที่ถูกต้องได้ แต่เธอกลับหนีไป” องค์ชายจุนดูผ่อนคลายขึ้นในตอนนี้ วางข้อศอกลงบนโต๊ะขณะมองเธอ “การที่เธอหนีไปนั้นแทบจะเท่ากับการสารภาพผิด เพราะมีคำหนึ่งที่เรียกว่า &#39;หนีความยุติธรรม&#39; เมื่อเจ้าหยุดรถม้าของข้าและบอกว่าเจ้าเป็นธิดาของตระกูลฟู่ เมื่อนึกย้อนไปถึงตอนที่เจ้าเป็นสนมขององค์ชายจุน ข้าจึงสงสัยว่าฟู่หลินกลับมาแล้วหรือยัง” “ตระกูลฟู่ กำลังวางแผนอะไรอีกแล้วหรือ?</p>\n<p>ข้าอยากรู้ด้วยว่าจุดประสงค์ของเจ้าในการเป็นพระสนมขององค์ชายจุนคืออะไร ถ้าฟู่หลินไม่กลับมา ปฏิกิริยาของเธอจะเป็นอย่างไรเมื่อเธอรู้ว่าลูกสาวของเธอแต่งงานกับข้า?” “ตอนนั้นข้ายังเด็กและไม่รู้เรื่องอะไรเลย พอถึงเวลาที่ข้าอยากจะสืบหาความจริง ทุกอย่างก็เปลี่ยนไปหมดแล้ว และข้าก็หาอะไรไม่เจอเลย ดังนั้นคนที่รู้ความจริงก็มีแต่พ่อแม่ของเจ้า ข้ารอให้พวกท่านปรากฏตัวมาหลายปีแล้ว” “ยังไงก็ตาม ข้าอาจตายได้ทุกเมื่อ ดังนั้นการเล่นสนุกไปก็ไม่เสียหายอะไร บังเอิญข้าก็ต้องแต่งงานเพื่อจะได้สิ่งที่จักรพรรดิพระราชทานให้ด้วย” แค่เล่นสนุกเฉยๆ! ฟู่จ้าวหนิงรู้สึกแน่นหน้าอกเมื่อได้ยินคำพูดขององค์ชายจุน อย่างไรก็ตาม</p>\n<p>เธอได้มอบตัวเองให้เขาแล้ว และในตอนนั้น เธอก็รู้สึกขอบคุณที่เขาตกลง ดังนั้นแม้แต่การดุด่าเสี่ยวหลานหยวนของเธอก็ดูอ่อนไปบ้าง “บางทีพวกเขาอาจจะตายไปแล้วก็ได้” ฟู่จ้าวหนิงกล่าวอย่างเย็นชา ความเย็นชาเช่นนี้ทำให้เซียวหลานหยวนตกใจจนพูดไม่ออกชั่วขณะ แม้ว่าเขาจะไม่ได้เจอพ่อแม่มาตั้งแต่โตพอที่จะเข้าใจโลกแล้ว แต่เวลาพูดถึงพวกท่าน เขาก็ควรจะแสดงความเย็นชามากกว่านี้ไม่ใช่เหรอ?</p>\n<p>ราวกับว่าเขากำลังพูดถึงคนแปลกหน้า “ผมไม่รู้ว่าทำไม แต่ผมมั่นใจว่าพวกท่านยังไม่ตาย ยิ่งไปกว่านั้น ตลอดหลายปีที่ผ่านมา ไม่มีใครเคยเห็นใครที่หน้าตาคล้ายพวกท่านเลย แม้แต่ศพก็ไม่มี” ดังนั้น การหายตัวไปของพ่อแม่ฟู่จ้าวหนิงจึงเต็มไปด้วยปริศนา ในขณะนั้น เซียวเถารีบวิ่งเข้ามาโดยไม่เสิร์ฟชาด้วยซ้ำ “คุณหนู ท่านเจ้าของบ้านรู้แล้ว...” เซียวเถาเหลือบมององค์ชายจุน ไม่แน่ใจว่าจะพูดกับเขาอย่างไรดี จึงลังเลก่อนจะพูดว่า “รู้ว่าองค์ชายจุนอยู่ที่นี่ ตื่นเต้นมากอยากจะวิ่งเข้ามา จนตกเตียงและเป็นลม โปรดไปดูเขาหน่อย!” ฟู่จ้าวหนิงตกใจและรีบวิ่งไปหาทันที โดยไม่สนใจองค์ชายจุนเลย</p>\n<p>เซียวหลานหยวนมองตามร่างที่วิ่งจากไปของเขาและปรับหน้ากากให้เข้าที่ เมื่อเห็นว่าเขาให้ความสำคัญกับปู่ของเธอมากเพียงใด แต่กลับเย็นชาเมื่อพูดถึงพ่อแม่ของเธอ ดูเหมือนว่าฟู่จินเฉินและฟู่หลินซือจะไม่ได้กลับไปเยี่ยมหรือติดต่อครอบครัวเลยตลอดหลายปีที่ผ่านมา พวกเขาไม่แม้แต่จะใส่ใจพ่อและลูกสาวของพวกเขาเลยหรือ? “ฝ่าบาท เราไปพบเขากันเถอะ” ชิงอี้เดินเข้ามาใกล้ในที่สุด เซียวหลานหยวนเงียบไปครู่หนึ่งแล้วส่ายหัว “เขาตื่นเต้นมากที่ได้ยินว่าข้ามา ถ้าข้าไปปรากฏตัวต่อหน้าเขาจริงๆ เขาอาจจะไม่ทันได้หายใจก่อนที่จะไปพบกับราชาแห่งนรก ฟู่จ้าวหนิงยังมีประโยชน์กับข้าอยู่ ดังนั้นข้าจะไม่สร้างศัตรูกับเธอในตอนนี้”</p>\n<p>ชิงอี้พูดไม่ออก แต่ท่านอาจารย์ สิ่งที่ท่านพูดกับคุณหนูฟู่เมื่อครู่ดูเหมือนจะสร้างความบาดหมางขึ้นมาไม่ใช่หรือ?</p>\n<p>“ไปกันเถอะ กลับไปที่คฤหาสน์” เดิมที เขาไม่อยากสนใจคุณยายซุนเลยตอนที่ท่านมาที่ตระกูลฟู่ แต่พอคุณยายซุนจากไป เขาก็ได้รับข่าวว่าเทพธิดาแห่งเผ่าโมโรได้ย้ายเข้ามาอยู่ที่ตระกูลฟู่แล้ว เพื่อเห็นแก่หนอนไหมโลหิตหัวใจ แน่นอนว่าเขาต้องมาดู ระหว่างทางกลับ ชิงอี้ครุ่นคิดอยู่ครู่หนึ่งแล้วอดไม่ได้ที่จะถามองค์ชายจุนว่า “ฝ่าบาท ท่านคิดว่าพระสนมมีดอกไม้ราตรีหักติดตัวอยู่จริงหรือคะ?” แม้แต่ไห่ฉางจุนยังต้องการมันมาก แล้วฟู่จ้าวหนิงมีจริงหรือ? “เทพธิดาแห่งเผ่าโมโรมีพรสวรรค์พิเศษมาโดยตลอด ในเมื่อนางบอกว่าได้กลิ่นดอกไม้ราตรีหักแล้ว แสดงว่านางต้องมีมันแน่นอน” เซียวหลานหยวนก็ประหลาดใจมากเช่นกัน</p>\n<p>เขาไม่คิดว่าฟู่จ้าวหนิงจะมีฝีมือขนาดนี้ ไม่เพียงแต่จะรวบรวมยาได้ครบทั้งสิบชนิดภายในสามวันและรอดชีวิตจากการโจมตีมากมาย แต่เธอยังพบสิ่งที่หายากอย่างดอกไม้ราตรีหักอีกด้วย เขายิ่งอยากรู้เรื่องฟู่จ้าวหนิงมากขึ้นเรื่อยๆ เธอสมกับชื่อเสียงในฐานะลูกสาวของฟู่จินเฉินจริงๆ เธอมาช่วยได้อย่างไม่คาดคิด ฟู่จ้าวหนิงรีบไปดูแลท่านฟู่ และหลังจากทำการรักษาอย่างเร่งด่วน ทั้งฝังเข็มและให้ยา เธอก็สามารถทำให้สภาพของท่านทรงตัวได้ จากนั้นเธอก็ฉีดยาให้ท่านหลับอีกครั้ง หลังจากนั้น เธอก็รีบไปที่ห้องของเธอและเข้าไปในห้องปรุงยา เธอต้องปรุงยาจากดอกมะลิราตรีให้เสร็จในคืนนั้น เพื่อให้คุณปู่ได้ทานในเช้าวันพรุ่งนี้</p>\n<p>ฟู่จ้าวหนิงยุ่งอยู่กับการปรุงยาจนไม่ได้นอนเลยทั้งคืน และคิดถึงสถานการณ์ของฟู่จินเฉินและภรรยาไม่ทัน จนกระทั่งรุ่งเช้า เธอก็เตรียมโสมม่วง ดอกมะลิราตรี และสมุนไพรอื่นๆ เสร็จ และรีบนำไปให้ท่านฟู่ทันที ท่านฟู่ยังคงหลับอยู่ ร่างกายและจิตใจของท่านอ่อนล้ามากแล้ว หากกระตุ้นหรือทำให้หลับอีก ก็คงปลุกยาก ท่านอ่อนเพลียเกินไป ฟู่จ้าวหนิงถอนหายใจโล่งอกหลังจากให้ยาเขาเสร็จแล้ว เธอพิงข้างเตียงของท่านอาจารย์ฟู่ครู่หนึ่ง และในขณะที่เธอยังง่วงอยู่ ท่านอาจารย์ฟู่ก็เอื้อมมือไปแตะศีรษะเธอพลางเรียกเธอด้วยเสียงแหบพร่าว่า &quot;จ้าวหนิง ไปหาองค์ชายจุนแล้วขอหย่าวันนี้เลย&quot;</p>"}, "50": {"chapter_number": 50, "chapter_title": "第50章把你男人讓給我", "content": "<p>หลังจากออกจากห้องของเจ้านายเก่า ฟู่จ้าวหนิงยืนอยู่ที่ลานบ้านและมองดูท้องฟ้า เธอเป็นกังวลมาก เมื่อครู่เห็นใบหน้าซีดเซียวของเจ้านายเก่า เธอก็ยอมทำตามคำขอของเขา เจ้านายเก่าเชื่อมั่นว่าการแต่งงานขององค์ชายจุนกับเธอเป็นการแก้แค้น เป็นการทรมานเธอ และเป็นการระบายความเกลียดชังที่มีต่อพ่อแม่ของเธอ เขาย่อมจะไม่ปฏิบัติต่อเธอดีอย่างแน่นอน ดังนั้น แม้ว่าเขาจะกังวลเกี่ยวกับชื่อเสียงของฟู่จ้าวหนิงหลังการหย่าร้าง และอนาคตของเธอ เขาก็ยังยืนกรานให้เธอหย่ากับเขา แต่หลังจากได้รู้ความคิดของเซียวหลานหยวนเมื่อวานนี้ ฟู่จ้าวหนิงก็สงสัยว่าผู้ชายคนนั้นจะยอมหย่าจริงๆ หรือไม่</p>\n<p>เธอจึงเก็บความกังวลเหล่านั้นไว้และไปนอนพักผ่อน เธอหลับไปได้ไม่นานก็มีคนมาเคาะประตู “ฟู่จ้าวหนิง ลุกขึ้นเร็ว” เซียวเถาจ้องมองไห่ฉางจุนอย่างโกรธเคืองที่กำลังเคาะประตูห้องของเจ้านายอย่างแรง ผู้หญิงคนนี้มาอีกแล้ว! เธอพยายามห้ามไห่ฉางจุน แต่ไห่ฉางจุนโบกมือและตบไหล่เธอเบาๆ ทำให้เธอขยับไม่ได้ “ฟู่จ้าวหนิง ลุกขึ้น!</p>\n<p>องค์ชายจุนขอให้เจ้าพาข้าไปที่วังวันนี้!” เมื่อได้ยินเช่นนั้น ฟู่จ้าวหนิงก็ลุกขึ้นนั่งบนเตียง เดิมทีเธอไม่ได้ตั้งใจจะพาไห่ฉางจุนไปที่วังองค์ชายจุน แต่เธอได้ให้สัญญากับปู่ว่าจะไปหาเซียวหลานหยวนเพื่อยกเลิกการหมั้นหมาย ดังนั้นเธอจึงตัดสินใจพาไห่ฉางจุนไปด้วย เมื่อเห็นว่าเซียวหลานหยวนสนใจไห่ฉางจุนมากเมื่อวานนี้ บางทีไห่ฉางจุนอาจจะช่วยได้? “ฉันจะพาคุณไปเดี๋ยวนี้” ฟู่จ้าวหนิงเปลี่ยนเสื้อผ้า หยิบของบางอย่าง แล้วออกไป ทันทีที่ก้าวออกไปข้างนอก เธอก็เห็นเซียวเถา ยืนนิ่งอยู่ตรงนั้น ดวงตาเบิกกว้าง ใบหน้ามืดมน “เจ้าทำอะไรกับเซียวเถาของข้า?” วันนี้ไห่ฉางจุนสวมชุดสีฟ้าอ่อน ดูแต่งตัวอย่างพิถีพิถันและเปล่งประกาย พูดตามตรง ไห่ฉางจุนนั้นงดงามมากจริงๆ เธอยิ้ม หยิบขวดขึ้นมา เปิดฝา แล้วโบกไปมาใต้จมูกของเสี่ยวเถา เธอตบไหล่เสี่ยวเถาเบาๆ “ใครบอกให้เธอห้ามฉันไม่ให้เรียกเธอออกมา?</p>\n<p>ในเมื่อเธอรับปากว่าจะพาฉันไปที่คฤหาสน์องค์ชายจุน ฉันจะปล่อยเธอไป ไม่เป็นไรหรอก” ฟู่จ้าวหนิงยกมือขึ้นตบหน้าเธอ รอยยิ้มของไห่ฉางจุนหายไปในทันที สีหน้าของเธอมืดมนลง เธอจ้องมองฟู่จ้าวหนิงด้วยฟันที่กัดแน่น “เจ้ากล้าตีข้าหรือ?” สาวใช้สองคนที่รออยู่ใกล้ๆ ก็ตกตะลึงเช่นกัน คุณหญิงฟู่ที่เพิ่งมาถึงพร้อมขบวนผู้ติดตามเห็นเหตุการณ์ เธอตะโกน “จ้าวหนิง เจ้าบ้าไปแล้วหรือ?!” กล้าดียังไงมาตีเทพธิดา? เทพธิดาได้รับการเอาใจและทะนุถนอมในตระกูลมาตั้งแต่เด็ก แม้แต่ผู้นำตระกูลก็ยังไม่กล้าพูดจาหยาบคายกับเธอ ฟู่จ้าวหนิงกลับตบหน้าเธอ น้ำเสียงของฟู่จ้าวหนิงเย็นชา “แล้วไงล่ะ ถ้าเจ้าทำร้ายนาง? เจ้าคงไม่เข้าใจหรอก</p>\n<p>นี่คือตระกูลฟู่ แม้แต่สาวใช้ในตระกูลฟู่ก็เป็นคนในครอบครัว ในขณะที่เจ้าเป็นแค่คนนอก ตามกฎของข้า ไม่เคยมีกรณีที่คนนอกรังแกคนในครอบครัวเดียวกันมาก่อน” เซียวเถาจ้องมองเธอด้วยดวงตาแดงก่ำเล็กน้อย “คุณหญิง...” รู้สึกดีจังที่ได้รับการปกป้องแบบนี้ เซียวเถาเกือบจะร้องไห้ “ฉันไม่ใช่คนในตระกูลฟู่หรือ?</p>\n<p>ฉางจุนก็เป็นคนในครอบครัวของฉัน นางจะเป็นคนนอกได้อย่างไร? ฟู่จ้าวหนิง อย่าคิดว่าเจ้าจะทำอะไรผิดกฎหมายได้เพียงเพราะตอนนี้เจ้าเป็นพระสนมของจุน!” คุณหญิงฟู่ตะโกนอย่างโกรธเคือง “เจ้ามีนามสกุลฟู่หรือ?” ฟู่จ้าวหนิงมองเธอ “เราอดทนกับเจ้ามานานเกินไปแล้ว เจ้าเลยมีความคิดที่ไม่เหมาะสมใช่ไหม? ตอนนี้ข้าบอกเจ้าเลยว่า ข้าจะสะสางบัญชีกับฟู่เป่าเจินเมื่อนางกลับมา ถ้าเจ้ากล้าพอ ก็บอกนางไปตรงๆ ว่าอย่ากลับมาอีก” “เป่า... เป่าเจินไม่ได้ทำอะไรท่านเลย...” คำพูดของมาดามฟู่เจือด้วยความรู้สึกผิดเล็กน้อย และเธอไม่สามารถพูดต่อได้ภายใต้สายตาของฟู่จ้าวหนิง ไห่ฉางจุนเอามือปิดหน้าและหายใจเข้าลึกๆ “ถ้าไม่ใช่เพราะองค์ชายจุน ข้าคงไม่ปล่อยท่านไปวันนี้แน่ ตอนนี้ท่านได้ระบายความโกรธแล้ว พาข้าไปที่วังองค์ชายได้ไหม” ไห่ฉางจุนทนได้งั้นเหรอ?</p>\n<p>ดูเหมือนว่าเธอจะจับตามองเจ้าหมาเจ้าเล่ห์อย่างเซียวหลานหยวนจริงๆ “ไปกันเถอะ” ฟู่จ้าวหนิงกล่าวกับเซียวเถา “ดูแลปู่ของเจ้าให้ดี คอยจับตาดูท่านให้แน่น เก็บยาพิษที่ข้าให้เจ้าไว้ให้ดี ถ้าใครกล้ามารังแกใครก็แค่ปาใส่ไป อย่าโง่เหมือนก่อน แม้ว่าเจ้าจะทำให้ใครพิการ ตาบอด หรือเสียโฉม ข้าจะรับผิดชอบแทนคุณหนูเอง อย่ากลัวเลย” หลังจากพูดจบ เธอก็เหลือบมองมาดามฟู่ มาดามฟู่ตัวสั่น คำพูดของฟู่จ้าวหนิงชัดเจนว่าหมายถึงเธอ! ยัยเด็กเหลือขอนี่หาพิษมาให้เสี่ยวเถาได้ยังไง? เธอได้ความสามารถในการหาพิษมาจากไหน? อย่างไรก็ตาม หลังจากฟู่จ้าวหนิงออกไปพร้อมกับไห่ฉางจุนแล้ว คุณหญิงฟู่ก็ยังไม่กล้าเข้าไปฟ้องท่านผู้เฒ่าฟู่ ถ้าหากมีพิษจริง ๆ ล่ะ?</p>\n<p>แล้วฟู่จ้าวหนิงยังจำเรื่องที่เกิดขึ้นในวันแต่งงานของเธอได้หรือเปล่า? เธอต้องรีบไปหาเป่าเจิ้นและคนอื่น ๆ เมื่อออกมานอกบริเวณบ้านตระกูลฟู่ ฟู่จ้าวหนิงนึกได้ว่าม้ายังอยู่ที่สนามหลังบ้าน เธอลืมขี่มันกลับไปที่คฤหาสน์ขององค์ชายพร้อมกับไห่ฉางจุน แต่เธอไม่มีรถม้า เธอต้องเดินเหรอ? ขณะที่เธอยืนอยู่ที่ประตูด้วยสีหน้าบึ้งตึง รถมาก็มาจอด “ฝ่าบาท องค์ชายทรงมีพระราชดำรัสให้ข้าไปรับฝ่าบาทและนางไห่” “โอ้ องค์ชายจุนช่างเอาใจใส่! เขาต้องมารับข้าแน่ ๆ!” ดวงตาของไห่ฉางจุนเป็นประกายด้วยความรักในทันที โดยไม่รอฟู่จ้าวหนิง เธอก็ขึ้นรถม้าไปก่อน ฟู่จ้าวหนิงคิดว่าเซียวหลานหยวนคงเรียกรถม้ามารับไห่ฉางจุน เพราะก่อนหน้านี้ตอนที่เธอจะไป เขาก็ไม่ได้ใส่ใจเธอเลยสักนิด หรือว่าเจ้าคนเลวเซียวหลานหยวนจะตกหลุมรักไห่ฉางจุนตั้งแต่แรกเห็นกันแน่?</p>\n<p>เธอขึ้นรถม้าและนั่งตรงข้ามไห่ฉางจุน ฟู่จ้าวหนิงนอนไม่หลับมาทั้งคืน เพิ่งได้นอนพักผ่อนไปเมื่อสักครู่ จึงหลับตาลงทันทีที่ขึ้นรถม้า เพื่อพักผ่อนอีกสักหน่อย เพราะเธอกับไห่ฉางจุนไม่มีอะไรจะคุยกัน แต่ไห่ฉางจุนกลับเตะเท้าเธอ “เฮ้ เมื่อคืนฉันได้ยินจากลูกพี่ลูกน้องว่าเธอเพิ่งแต่งงานกับองค์ชายจุนเมื่อไม่กี่วันก่อน และเธอก็ไปแย่งเขามาจากข้างถนน เธอไม่รู้จักองค์ชายจุนมาก่อนใช่ไหม?” เมื่อคืนนี้ เธอรบเร้าท่านหญิงฟู่เรื่ององค์ชายจุน แต่ท่านหญิงฟู่เองก็ไม่รู้เรื่องเกี่ยวกับองค์ชายจุนมากนัก บอกเพียงเรื่องวันแต่งงานของพวกเขา และเรื่ององค์ชายเซียวกับหลี่จือเหยาเท่านั้น “แล้วมันเกี่ยวอะไรกับเจ้าล่ะ?”</p>\n<p>“พวกเจ้าเพิ่งแต่งงานกัน คงยังไม่มีความสัมพันธ์กันมากนัก ขอฉันเสนอข้อตกลงกับเจ้าหน่อย เจ้าให้ดอกไม้ราตรีหักและองค์ชายจุนกับฉัน แล้วฉันจะแลกเปลี่ยนอะไรบางอย่างกับเจ้า!” ไห่ฉางจุนเชิดคางขึ้น มองอย่างหยิ่งผยอง “ลูกพี่ลูกน้องของฉันบอกว่าปู่ของเจ้ากำลังจะตาย ฉันสามารถให้เจ้ารับปู่ไปอยู่กับตระกูลเราสักพักได้ ที่นั่นมีบ่อน้ำพุสมุนไพร ถ้าปู่ของเจ้าได้แช่น้ำในบ่อน้ำพุสักครึ่งปี สุขภาพของท่านจะดีขึ้นมาก” บ่อน้ำพุสมุนไพร? ปู่ของท่านอ่อนแอและบอบบาง การแช่น้ำในบ่อน้ำพุอย่างต่อเนื่องไม่เหมาะกับท่าน ยาใดๆ ก็ไม่เหมาะกับท่านเช่นกัน “ฉันไม่ต้องการ” “แล้วเจ้าต้องการอะไร?” “ฉันต้องการให้เจ้าหุบปาก”</p>\n<p>ฟู่จ้าวหนิงหลับตาลงอีกครั้ง “ถ้าเจ้าส่งเสียงอีกแม้แต่ครั้งเดียว ข้าจะเตะเจ้าลงจากรถม้า แล้วเจ้าก็ไปที่คฤหาสน์ขององค์ชายเอง” “เจ้า—” ก่อนที่ไห่ฉางจุนจะพูดจบ รถมาก็หักเลี้ยวอย่างกะทันหัน และมีเสียงร้องอุทานดังขึ้นข้างนอก ฟู่จ้าวหนิงก็ถูกเหวี่ยงไปกระแทกกับผนังรถม้า เธอรีบคว้าขาไว้เพื่อทรงตัว แต่แล้วก็มีเสียงเด็กร้องไห้ดังขึ้นข้างนอก</p>"}, "51": {"chapter_number": 51, "chapter_title": "第51章我替你守著", "content": "<p>“อ๊า! ลูกของข้า! ช่วยด้วย! ช่วยลูกของข้าด้วย!” เสียงร้องแหลมของหญิงสาวดังตามมา เสียงเอะอะโวยวายดังขึ้นข้างนอก “ฝ่าบาท รถม้าของเราชนกับรถม้าคันหน้า แต่ข้างหน้าคงมีอะไรมาขวางทาง” เสียงคนขับรถม้าดังลอดเข้ามา ไห่ฉางจุนรีบพูดอย่างไม่ใส่ใจ “อ้อมไปทางอื่นก็ได้” เธอไม่สนใจว่าข้างนอกเกิดอะไรขึ้น เธอจำเป็นต้องไปถึงที่ประทับขององค์ชายจุน นับตั้งแต่ได้พบองค์ชายจุนเมื่อวานนี้ เธอฝันถึงชายผู้นั้นตลอดทั้งคืน คิดถึงวิธีที่จะเปิดเผยใบหน้าที่แท้จริงของเขา อย่างไรก็ตาม ฟู่จ้าวหนิงรีบยกม่านรถม้าขึ้นแล้วกระโดดลงมา ข้างหน้ามีรถม้าอยู่จริง แต่การชนไม่รุนแรงนัก เพราะรถม้าคันหน้าหยุดกะทันหัน</p>\n<p>พวกเขาจึงเบรกไม่ทันและชนเข้ากับรถคันหน้า แต่พวกม้าที่ลากรถม้าขององค์ชายจุนดูเหมือนจะมึนงงเล็กน้อย ข้างหน้ามีรถม้าอีกคันหนึ่ง และมีคนหลายคนนอนอยู่ข้างๆ ในกลุ่มนั้นมีหญิงสาวคนหนึ่งอุ้มเด็กอายุประมาณสามหรือสี่ขวบไว้ เด็กกำลังร้องไห้คร่ำครวญ ตัวท่อนบนของเด็กพิงอยู่กับเธอ แต่ขาข้างหนึ่งบิดงอผิดรูป ผู้คนมากมายมารุมดู “เกิดอะไรขึ้น?” “ดูเหมือนว่าม้าในรถม้าจะล้มลงกะทันหัน เด็กจึงกลิ้งตกลงมาจากรถม้า ขาอาจได้รับบาดเจ็บ” “ตอนที่ม้าล้มลง มันชนคนเหล่านี้ล้มไปด้วย และเมื่อเด็กกลิ้งลงมา เขาก็ถูกคนสองคนเหยียบซ้ำ ขาจึงได้รับบาดเจ็บ” ฟู่จ้าวหนิงรีบเดินไปที่ข้างกายเด็กและเอื้อมมือไปแตะขาของเขา</p>\n<p>หญิงสาวเงยหน้าขึ้นมามอง และเมื่อเห็นว่าเป็นหญิงสาวสวย เธอก็รีบปัดมือของฟู่จ้าวหนิงออก “สาวน้อย!</p>\n<p>เจ้าต้องการทำอะไร?” “พี่สะใภ้ ขอฉันดูเด็กหน่อย” ฟู่จ้าวหนิงกล่าว ดวงตาของเด็กปิดสนิท ใบหน้าซีดเผือด และหมดสติไปแล้ว ดูเหมือนเป็นไปไม่ได้ที่เขาจะบาดเจ็บแค่ขา “คุณหนู อย่าทำให้เรื่องแย่ลงไปกว่านี้เลย! ลูกของฉันเป็นแบบนี้แล้ว รีบไปตามหมอมาเร็ว!” หญิงสาวไม่ยอมให้ฟู่จ้าวหนิงเห็นเด็ก คนรอบข้างก็พูดแทรกขึ้นมา “ผู้หญิงใจแคบคนนี้มาจากไหนกัน?” “ใช่แล้ว อายุขนาดนี้ แทนที่จะอยู่บ้านเย็บปักถักร้อย กลับมายุ่งเรื่องนี้ทำไม?” “คุณหนู หลบไปหน่อย มีคนไปตามหมอมาแล้ว” ฟู่จ้าวหนิงเห็นว่าเด็กหายใจเร็วและหน้าซีดเล็กน้อย เธอรู้สึกหนาวสั่นไปทั้งตัว จึงคว้าข้อมือหญิงสาวไว้ “พี่สะใภ้ ไม่ทันแล้ว! เด็กมีปัญหาเรื่องหัวใจ ไม่ใช่แค่หกล้ม!</p>\n<p>ให้ฉันดูหน่อย!” “คุณพูดเหลวไหล...” หญิงสาวอยากจะถามฟู่จ้าวหนิงว่าเธอพูดเหลวไหลอะไร แต่เมื่อเห็นสีหน้าจริงจังและสายตาเฉียบคมของฟู่จ้าวหนิง เธอก็พูดต่อไม่ได้ ในขณะนั้น ฟู่จ้าวหนิงรับเด็กจากอ้อมแขนของเธอ วางเด็กราบลงบนพื้น และฉีกเสื้อผ้าของเด็กออก “หลบไป! อย่ามาเบียดเสียดกันตรงนี้!” เธอไม่ได้เงยหน้าขึ้นมามองด้วยซ้ำ แต่ตะโกนเสียงดัง คนขับรถม้าจากวังหลวงก็มาถึงในเวลานั้นเช่นกัน เมื่อได้ยินคำพูดของฟู่จ้าวหนิง เขาก็รีบช่วยเคลียร์ฝูงชน “หลีกทาง ถอยไป ถอยไป” อย่างไรก็ตาม เขาไม่สามารถเคลื่อนย้ายคนจำนวนมากได้ด้วยตัวเอง และบางคนก็ยังคงเบียดเข้ามาดูว่าฟู่จ้าวหนิงกำลังทำอะไร พยายามจะมองให้ใกล้ขึ้นเรื่อยๆ</p>\n<p>ในขณะนั้นเอง ข้าราชบริพารสองคนก็เข้ามาช่วยเคลียร์ฝูงชนเช่นกัน ร่างหนึ่งยืนอยู่ด้านหลังฟู่จ้าวหนิง คอยกันไม่ให้คนเดินผ่านไปมา ฟู่จ้าวหนิงรู้สึกได้ทันทีว่ามีพื้นที่ว่างด้านหลังเธอ เพราะเธอรู้สึกถึงเสียงและฝูงชนด้านหลัง ซึ่งอาจรบกวนเธอได้ “ข้าจะเฝ้าดูอยู่ ไม่มีใครมารบกวนเจ้า” เสียงอ่อนโยนดังขึ้น เป็นเขาเองหรือ?</p>\n<p>ซือตูไป๋ ฟู่จ้าวหนิงจำเสียงของซือตูไป๋ได้ทันที แต่เธอก็ไม่ได้หันไปมอง เธอก้มลงเอาหูแนบหน้าอกเด็ก และใช้มือข้างหนึ่งแตะหน้าอกเบาๆ ฟังเสียงของเขา หญิงสาวนั่งอยู่บนพื้นข้างๆ ฟู่จ้าวหนิงอย่างหมดหนทาง ไม่รู้จะทำอย่างไรดี แต่ในเวลานี้ก็ไม่มีหมอมา เธอจึงดูเหมือนไม่มีทางเลือกอื่นนอกจากต้องไว้ใจฟู่จ้าวหนิง โดยเฉพาะหลังจากที่ชายหนุ่มผู้สุภาพและสง่างามคนนั้นปรากฏตัวและอยู่กับฟู่จ้าวหนิง เธอยิ่งคาดหวังกับฟู่จ้าวหนิงมากขึ้น ชายหนุ่มคนนี้ไม่ใช่คนธรรมดาอย่างแน่นอน เขาไว้ใจหญิงสาวคนนี้มาก เธอต้องมีความรู้ทางการแพทย์จริงๆ ใช่ไหม? ฟู่จ้าวหนิงหยิบกล่องเข็มออกมาจากอก เปิดถุงผ้า และดึงเข็มยาวออกมา</p>\n<p>เธอแทงเข็มเข้าไปในหน้าอกของเด็กอย่างระมัดระวัง ควบคุมความลึก “อ่า—” หญิงสาวอดไม่ได้ที่จะกรีดร้องเมื่อเห็นเช่นนั้น และพยายามวิ่งเข้าไปห้ามฟู่จ้าวหนิงโดยสัญชาตญาณ การแทงเข็มเข้าไปในอกอย่างไม่ระมัดระวังแบบนี้มันโอเคเหรอ?</p>\n<p>“พี่สะใภ้ อย่าขยับ” เสียงของซือตูไป๋มีพลังปลอบโยนอย่างประหลาด และหญิงสาวก็หยุดขยับจริงๆ ฟู่จ้าวหนิงแทงเข็มเข้าไปอีกหลายเล่ม จากนั้นก็ดึงเข็มปักออกมาแทงนิ้วเด็ก บีบเลือดออกมาหยดหนึ่ง น้ำตาของหญิงสาวเอ่อล้นขึ้นมาทันที หัวใจของเธอเต้นแรง เธอเห็นเด็กสาวคนนี้ทรมานเป่าเอ๋อร์แบบนี้ ถ้าเกิดอะไรขึ้นกับเป่าเอ๋อร์จริงๆ เธอ... ไห่ฉางจุนที่รออยู่ในรถม้าอย่างใจร้อน ในที่สุดก็ลงจากรถและเดินเข้ามา “ทำอะไรกันอยู่ อย่ามาเสียเวลาธุระของฉันเพราะคนไม่เกี่ยวข้อง รีบไปกันเถอะ!” ไห่ฉางจุนพูดจบก็มีคนเอื้อมมือมาห้ามไม่ให้เธอเข้าใกล้ฟู่จ้าวหนิง เธอเงยหน้าขึ้นมองเห็นใบหน้าของซือตูไป๋ ดวงตาของเธอก็เบิกกว้างทันที “ว้าว คุณชาย คุณหล่อมาก” ถึงแม้องค์ชายจุนจะดูสมบูรณ์แบบตั้งแต่หัวจรดเท้า แต่เธอก็เห็นเพียงครึ่งเดียวของเขาเท่านั้น แต่คุณชายคนนี้ไม่ได้สวมหน้ากาก!</p>\n<p>เขาเหมือนดวงจันทร์ที่สว่างไสว บริสุทธิ์และเจิดจรัส ส่องประกายเข้าสู่หัวใจของเธอตั้งแต่แรกเห็น หาก และเธอหมายถึงหาก เธอไม่สามารถเอาชนะใจองค์ชายจุนได้ คุณชายคนนี้ก็ถือเป็นตัวเลือกสำรองได้! “ขอบคุณสำหรับคำชมค่ะ คุณหนู” ซือตูไป๋ยิ้มอย่างอ่อนโยนพลางยังคงขวางทางเธออยู่ โชคดีที่มีซือตูไป๋อยู่ตรงนั้น ไห่ฉางจุนจึงไม่รีบร้อนที่จะไปที่บ้านขององค์ชายจุน เธอจึงไม่สนใจสิ่งที่ฟู่จ้าวหนิงกำลังทำอยู่และเริ่มคุยกับซือตูไป๋ ฟู่จ้าวหนิงทำการฝังเข็มเสร็จแล้ว เธอค่อยๆ นวดมือของเด็กแล้วกดที่หน้าอกของเขา “ไอ” เด็กน้อยดูเหมือนจะไอออกมาอย่างกะทันหัน ตื่นขึ้นมาพร้อมกับเสียงไอ “แม่—” เขาร้องเรียก “แม่” ทันทีที่ตื่นขึ้น จากนั้นก็ร้องไห้ออกมา “เป่าเอ๋อร์!</p>\n<p>แม่มาแล้ว แม่มาแล้ว!” หญิงสาวทั้งประหลาดใจและดีใจ น้ำตาคลอเบ้าขณะที่เธอกอดเขาแน่น “พี่สะใภ้ อย่าขยับเขานะ ขาเขาเคล็ดจริงๆ” ฟู่จ้าวหนิงกล่าว หญิงสาวปล่อยเด็กทันที ตอนนี้เธอฟังและเชื่อทุกอย่างที่ฟู่จ้าวหนิงพูด “คุณหนู ช่วยดูน้องหนูหน่อยได้ไหมครับ” เด็กน้อยร้องไห้อีกครั้ง “แม่ครับ เจ็บมากเลย...”</p>"}, "52": {"chapter_number": 52, "chapter_title": "第52章兩個人挑一挑", "content": "<p>“เป่าเอ๋อร์ เป็นเด็กดีนะ ถ้าไม่ขยับ เดี๋ยวแม่จะดูว่าขาหนูเจ็บตรงไหน แล้วแม่จะให้ลูกอมอร่อยๆ กินนะ โอเคไหม?” ฟู่จ้าวหนิงยื่นมือไปหาเป่าเอ๋อร์ราวกับมีเวทมนตร์ เมื่อเปิดมือออกก็เผยให้เห็นลูกอมที่ห่อด้วยกระดาษสีสันสดใส ไม่มีใครในที่นั้นเคยเห็นลูกอมแบบนี้มาก่อน และทุกคนก็ต่างหลงใหลในขนมชิ้นเล็กๆ นั้นทันที แม้แต่ผู้ใหญ่ก็ยังตะลึง ไม่ต้องพูดถึงเด็กเลย เป่าเอ๋อร์ลืมเสียงร้องไห้ไปทันทีเมื่อเห็นลูกอมที่สวยงาม มองดูแล้วเขายังคงงงงวยเล็กน้อย “นี่คือลูกอมเหรอ?” “ใช่ เอาไปสิ แกะดูเองนะว่าข้างในมีอะไร โอเคไหม?” เสียงของฟู่จ้าวหนิงอ่อนโยนและนุ่มนวล ทำให้เด็กผ่อนคลายลงโดยไม่รู้ตัว</p>\n<p>เขายื่นมือออกไปรับลูกอมและแกะห่ออย่างระมัดระวัง ทันใดนั้น ฟู่จ้าวหนิงก็เอื้อมมือไปบีบขาของเขา ค่อยๆ นวดกระดูกขาจากบนลงล่าง เมื่อเธอบีบเข่าของเขา เด็กก็ร้องออกมาด้วยความเจ็บปวดอีกครั้ง “เป่าเอ๋อร์ อย่าร้องไห้นะ...” หญิงสาวเรียกหาลูก แต่ในใจของเธอกลับเจ็บปวดจนน้ำตาไหลอาบแก้ม เธอหันไปมองฟู่จ้าวหนิง “คุณหนู?” “ขาซ้ายของเขาหัก” ฟู่จ้าวหนิงกล่าวอย่างแผ่วเบา “เราต้องหาอะไรมาช่วยพยุงไว้ก่อน แต่ก่อนหน้านั้น ข้าต้องจัดกระดูกให้เขาก่อน” ใบหน้าของหญิงสาวซีดเผือด “คุณหนู หมอมาแล้ว!” คนขับรถม้าวิ่งหอบมาพร้อมกับหมอชราเคราขาว หญิงสาวมองไปที่หมอชรา แล้วมองไปที่ฟู่จ้าวหนิง พร้อมกับกัดฟัน</p>\n<p>“มีหมอกำลังรักษาเป่าเอ๋อร์อยู่ค่ะ” เธอหันไปมองฟู่จ้าวหนิงอย่างอ้อนวอน “คุณหนู โปรดอย่าทำร้ายเขามากนัก เป่าเอ๋อร์คงเจ็บปวดมาก” ฟู่จ้าวหนิงมองไปที่หมอชราเช่นกัน “คุณหมอ มีผ้าพันแผลไหมครับ?” “อ๋อ? มีครับ” แม้ว่าหมอชราจะเห็นเด็กหญิงตัวเล็ก ๆ นั่งยอง ๆ อยู่ข้างเด็ก แต่เขาก็ยังตอบคำถามของเธอโดยสัญชาตญาณ “เจ้ามีเฝือกไหมคะ” “เฝือก?</p>\n<p>เฝือกอะไร? ไม่มี...” ซือตูไป๋ตอบในขณะนั้น “ฉันมีอยู่ในรถม้า อาเปียน ไปเอามาเร็ว ๆ” ฟู่จ้าวหนิงสังเกตเห็นว่าเด็กรับใช้ตัวน้อยของซือตูไป๋ ซึ่งดูเหมือนจะมีปัญหากับเธอ ยังคงยืนอยู่ข้าง ๆ เธอ อาเปียนทำหน้าบูดบึ้งและไม่พูดอะไร วิ่งกลับไปที่รถม้าเพื่อไปเอาของ ฟู่จ้าวหนิงจึงรู้ว่ารถม้าของพวกเขาคือรถม้าที่ถูกรถม้าขององค์ชายชนก่อนหน้านี้ “พี่สาว” เป่าเอ๋อร์ร้องไห้ น้ำตาคลอเบ้า ขณะที่เขาชูขนมในมือให้ฟู่จ้าวหนิงดู “นี่เป็นสีเขียว ขนมนี้กินได้จริงหรือครับ” เสียงเด็กของเขายังคงเจือปนไปด้วยเสียงสะอื้น “ใช่ ลองชิมดูสิ” ฟู่จ้าวหนิงเห็นว่าอาเปียนนำของมาแล้ว พวกเขาเรียกมันว่าเฝือก</p>\n<p>แต่ที่จริงแล้วมันก็แค่แผ่นไม้ไผ่ไม่กี่แผ่น และมันก็ดูไม่เหมือนเฝือกจริงๆ มันดูเหมือน...ถาดน้ำชาสี่เหลี่ยมเล็กๆ มากกว่า แต่ก็ใช้ได้ ขณะที่คุยกับเป่าเอ๋อร์ เธอก็เอื้อมมือทั้งสองข้างไปจับขาของเขา หาเป้าหมาย และด้วยการสัมผัสที่เบาและรวดเร็ว เสียงดังเป๊าะเบาๆ ขาที่บิดของเด็กชายก็เหยียดตรง เขาเปลี่ยนสีหน้าเล็กน้อย ปากเม้ม แล้วก็เอาลูกอมเข้าปาก “เอามาให้ฉัน” ฟู่จ้าวหนิงรับเฝือกมา ยึดให้แน่น แล้วพันผ้าพันแผลอย่างชำนาญ การเคลื่อนไหวของเธอรวดเร็วและดูสง่างามเล็กน้อย ซือตูไป๋มองไปที่ไห่ฉางจุนที่กำลังคุยกับเขาอยู่ ก็ลืมเรื่องทั้งหมดไป ไห่ฉางจุนกระทืบเท้าแล้วมองไปที่ฟู่จ้าวหนิง เด็กน้อยแปลกๆ</p>\n<p>คนนี้มีอะไรพิเศษนักหนา เธอถึงต้องอุตส่าห์ทำถึงขนาดนี้ แค่ผ้าพันแผลธรรมดาก็คงพอแล้ว ขาของเขาจะโตตามปกติหรือไม่ก็ไม่ใช่เรื่องของเธอ ผู้หญิงในเมืองนี้ช่างจู้จี้จุกจิกเหลือเกิน ไม่มีใครซื่อตรงเหมือนเธอมากนัก ดวงตาของหมอเฒ่าเป็นประกายหลังจากเห็นเทคนิคของฟู่จ้าวหนิง “คุณหนู เทคนิคการดามกระดูกและเสริมขาของคุณช่างน่าทึ่งจริงๆ” แม้ว่าเธอจะเป็นเพียงเด็กสาว แต่เขาก็ชื่นชมเธอ ฟู่จ้าวหนิงยิ้มและอุ้มเป่าเอ๋อร์ขึ้นมา หญิงสาวก็ลุกขึ้นและขอบคุณเขาอย่างมากมาย “คุณหนู ฉันจะมาขอบคุณคุณที่บ้านในวันอื่นแน่นอน คุณอยู่ไหนคะ ฉัน...” “พี่สะใภ้ ลูกชายฉันหัวใจไม่ค่อยแข็งแรง รับมือกับแรงกระแทกไม่ได้ และตอนนี้ขาเขาก็บาดเจ็บ</p>\n<p>พี่ควรพาเขากลับบ้านไปพัก” ฟู่จ้าวหนิงขัดจังหวะเธอและมองไปที่หมอเฒ่า “มีบางอย่างที่ต้องให้ความสนใจ หมอคนนี้ควรจะรู้ ทำไมพี่ไม่ขอให้เขากลับไปกับคุณและให้เขาอธิบายรายละเอียดให้คุณฟังล่ะคะ” เธอไม่มีเวลามากนักที่จะกลับบ้านพร้อมกับคนบาดเจ็บ คุณหมอชราผู้นี้ไม่ได้ดูถูกเธอเพราะอายุยังน้อย และยังให้ยืมสำลีโดยไม่ลังเลเลย แสดงว่าเขาต้องเป็นคนดีแน่ๆ พอได้ยินอย่างนั้น หญิงสาวก็รู้สึกสงสารเด็กมาก จึงขอบคุณคุณหมอซ้ำแล้วซ้ำเล่าก่อนจะรับเด็กไปดูแล มีคนเดินผ่านไปมาอีกสองสามคนที่ล้มลง แต่ก็ไม่เป็นไร อย่างไรก็ตาม พวกเขาเห็นฟู่จ้าวหนิงช่วยเด็กจึงอยากเข้ามามุงดู “คุณหนูคะ ช่วยดูพวกเราด้วย!</p>\n<p>ฉันคิดว่าหลังฉันพลิกหลังจากล้ม” “คุณหนูคะ ช่วยดูเท้าฉันก่อนค่ะ” เด็กสาวคนนี้ไม่คิดค่าบริการ พวกเขาสังเกตเห็น! คนเหล่านั้นกำลังจะล้อมฟู่จ้าวหนิง แต่ฟู่จ้าวหนิงเหลือบมองพวกเขาแล้วรีบเดินไปยังรถม้าขององค์ชาย “ไปกันเถอะ” “พวกคุณไปที่คลินิกก็ได้” ซือตูไป๋หยุดคนเหล่านั้นและให้ฟู่จ้าวหนิงขึ้นรถม้า ไห่ฉางจุนมองเขา “คุณชาย ชื่ออะไร และอาศัยอยู่ที่ไหน ข้ากำลังจะไปบ้านองค์ชายจุน คุณอยากไปด้วยไหม” “บ้านองค์ชายจุน?” ดวงตาของซือตูไป๋เป็นประกาย “ใช่ ใช่” “คุณชายรู้จักองค์ชายจุนไหม” “รู้จักครับ ท่านเชิญผมไปบ้านด้วยตัวเอง คุณอยากไปกับผมไหม” ไห่ฉางจุนเชิญเขาอย่างกระตือรือร้น หากคุณชายผู้นี้ได้ยืนเคียงข้างองค์ชายจุน ช่างเป็นภาพที่งดงามและน่ารื่นรมย์ยิ่งนัก!</p>\n<p>ยิ่งไปกว่านั้น หากพวกเขายืนด้วยกัน เธอจะสามารถเปรียบเทียบได้ง่ายขึ้นว่าใครเหมาะสมกับเธอมากกว่ากัน “ผมมีธุระต้องไปทำ ผมจะไม่ไปบ้านองค์ชายกับท่านครับ เชิญเถอะครับ คุณหนู” ซือตูไป๋กล่าวพลางเดินผ่านเธอไปยังรถม้าของฟู่จ้าวหนิงและเคาะข้างเบาๆ ฟู่จ้าวหนิงเปิดม่าน “ขอบคุณสำหรับเมื่อครู่ คุณชายซือตู” “ถ้าคุณหนูฟู่ต้องการขอบคุณข้า ช่วยหยิบถาดน้ำชาให้หน่อยได้ไหมคะ? จริงๆ แล้วนั่นไม่ใช่เขียงหรอกค่ะ มันเป็นแค่ที่วางกาน้ำชาและถ้วยชาเฉยๆ” ดวงตาของซือตูไป๋ฉายรอยยิ้มอ่อนโยน “คุณชายซือตู ทำไมคุณไม่ตามคุณผู้หญิงคนนั้นไปขอถาดน้ำชาจากเธอล่ะครับ? ยังไงก็เพื่อเป่าเอ๋อร์นะครับ” ฟู่จ้าวหนิงกล่าว ซือตูไป๋ตกใจ</p>\n<p>เขาคาดว่าฟู่จ้าวหนิงจะตอบตกลงทันที แต่เขาไม่คิดว่าเธอจะปฏิเสธตรงๆ แบบนี้ เด็กสาวคนนี้แตกต่างจากเด็กสาวทั่วไปจริงๆ อาเปียนก็เดินเข้ามา เมื่อได้ยินคำพูดของฟู่จ้าวหนิงก็แสดงความไม่พอใจ “คุณชายของเราเอาถาดน้ำชาออกมาก็เพราะคุณนี่นา!</p>\n<p>ทำไมถึงได้งกขนาดนี้?” “คุณชายซือตู ข้าจะเอามาให้ท่านเอง” ไห่ฉางจุนเดินเข้ามาและกล่าวตามฟู่จ้าวหนิงทันทีว่า “คุณชายซือตู” “ขอบคุณครับ คุณหนู ผมแค่ล้อเล่นครับ ผมมีสาวเสิร์ฟน้ำชาเหลือเฟือ” ซีตูไป๋ยิ้ม โบกมือลา แล้วหันไปขึ้นรถม้า “คุณชายซีตู—” “ท่านยังจะไปบ้านองค์ชายจุนอีกหรือครับ?”</p>"}, "53": {"chapter_number": 53, "chapter_title": "第53章本王手很冰", "content": "<p>เมื่อกลับขึ้นรถม้าแล้ว ไห่ฉางจุนยังคงจ้องมองฟู่จ้าวหนิงอย่างพิจารณา “นี่ เธอรู้จักยาเหรอ? เก่งมากไหม?” ฟู่จ้าวหนิงไม่ตอบ ไห่ฉางจุนรู้สึกโกรธขึ้นมาทันทีเมื่อเห็นสีหน้าของเธอ ฟู่จ้าวหนิงคนนี้ช่างไม่น่าคบหาเอาเสียเลย! “งั้นบอกมาสิ ชื่อเต็มของคุณชายซือตูคืออะ
