อาจริง ๆ นะ โดนเจ้าชายเสี่ยวทิ้งกลางถนน เกี้ยวเจ้าสาวก็แทบจะอยู่หน้าประตูแล้ว ยังต้องส่งเธอกลับบ้านอีก! น่าอับอายจริง ๆ!” “โอ้ พระเจ้า ถ้าเป็นฉัน ฉันคงไม่กล้ามีชีวิตอยู่ต่อไปหรอก” “ถ้าคุณหญิงคนที่สองยังอายที่จะมีชีวิตอยู่ ทำไมเจ้าไม่ตายไปซะเลยล่ะ?” เสียงเย็นชาดังขึ้น และด้วยเสียงดังสนั่น ประตูที่เปิดอยู่ครึ่งหนึ่งก็ถูกผลักชนกำแพง ทุกคนในห้องหันไปมองที่ประตูอย่างรวดเร็ว ฟู่จ้าวหนิงในชุดแต่งงานเดินเข้ามาจากยามค่ำคืน ดวงตาของเธอดูเย็นชา คุณหญิงฟู่ถึงกับอ้าปากค้าง พูดไม่ออกในทันที ทำไมฟู่จ้าวหนิงถึงกลับมาตอนนี้? “คุณหนู!” เสี่ยวเถาอุทานออกมาทั้งน้ำตาเมื่อเห็นเธอ ว้าววว คุณหนูกลับมาเวลานี้จริงๆ! คุณหนูถูกองค์ชายเสี่ยวทิ้งจริงๆหรือ?</p>\n<p>ฟู่จ้าวหนิงเดินเข้ามาคว้าข้อมือของสาวใช้แล้วบีบแรง “อ๊า!” สาวใช้แล้วร้องด้วยความเจ็บปวด ปล่อยมือจากเสี่ยวเถา ฟู่จ้าวหนิงจึงเตะเธออย่างแรง สาวใช้ล้มลงกับพื้นร้องอีกครั้ง คุณหญิงฟู่ตกใจและโกรธจัด “จ้าวหนิง! เจ้าก่อกบฏหรือ?” “เสี่ยวเถา!” ฟู่จ้าวหนิงพูดกับเสี่ยวเถาด้วยเสียงทุ้มต่ำ “คว้าไม้กวาดแล้วไล่พวกมันออกไป ข้าจะรับผิดชอบทุกอย่างที่เกิดขึ้น!” แม้ว่าตอนนี้เธออยากจะฆ่าคุณหญิงรองเสียเหลือเกิน แต่สภาพของท่านผู้เฒ่าฟู่กำลังอยู่ในขั้นวิกฤต และเธอไม่มีเวลาให้เสียเปล่า ดังนั้นฟู่จ้าวหนิงจึงไม่สนใจคำพูดของคุณหญิงรองเลย “ค่ะ!” แม้ว่าเสี่ยวเถาจะตกใจกับการเปลี่ยนแปลงของเธอ แต่เธอก็โกรธจัดแล้ว เธอทำตามคำสั่งทันที วิ่งไปที่ประตู คว้าไม้กวาด แล้วฟาดไปที่คุณหญิงรองและสาวใช้ของเธออย่างแรง “ออกไป!</p>\n<p>ออกไป!” คุณหญิงรองตกใจและโกรธจัด รีบหลบ “เสี่ยวเถา ยัยหญิงไร้ยางอาย กล้าดียังไงมาแตะต้องข้า! คอยดูนะ อย่าให้ข้าได้ตัวแกไป ข้าจะขายแกไปซ่องโสเภณีที่เลวร้ายที่สุด!” “ออกไป!” เสี่ยวเถาร้องขณะวิ่งไปหาพวกเธอ ฟู่จ้าวหนิงไม่สนใจพวกเธอ วิ่งไปที่ข้างเตียงและคุกเข่าลงบนพื้น “ท่านปู่!” ทันทีที่เธอเห็นท่านอาจารย์ฟู่ น้ำตาเธอก็เอ่อล้น จมูกแสบ และเธอกลั้นน้ำตาไว้ไม่อยู่ ท่านอาจารย์ฟู่ทำให้เธอนึกถึงคุณปู่! “คุณหนู...” ลุงจงก็ร้องออกมาเช่นกัน “ลุงจง ฉันว่าลุงทำเถอะ” ฟู่จ้าวหนิงเช็ดน้ำตาอย่างแรง เสียงของเธอทุ้มต่ำลง มีพลังแห่งความสงบที่ทำให้ทุกคนต้องทำตาม “คุณหนู?” “ไปเตรียมน้ำร้อนและเหล้าข้าว ไปที่คลินิกตรงทางเข้าซอยแล้วไปยืมเข็มเงินจากหมอซ่ง” ฟู่จ้าวหนิงพูดอย่างชัดเจน หยุดไปครู่หนึ่ง กัดฟัน เอื้อมมือไปหยิบปิ่นปักผมทองคำจากผมของเธอแล้วยื่นให้ “ไม่สิ ซื้อจากเขาเลย!</p>\n<p>แล้วก็ซื้อโสมที่มีอายุอย่างน้อยสามสิบปีขึ้นไป แล้วให้เขาหั่นให้ทันที ทำนี่ก่อน แล้วรีบกลับมา” ขณะที่มือของลุงจงสั่นเทาขณะรับปิ่นปักผมทองคำ ฟู่จ้าวหนิงก็ลุกขึ้นช่วยพยุงนายฟู่ขึ้น แล้วเอื้อมมือไปดึงปกเสื้อของเขาออก ฝ่ามือของเธอคลำหาจุดนั้นและกดลง ปิ่นปักผมทองคำนี้เป็นของคฤหาสน์องค์ชายจุน เธอเลือกอันนี้ตอนที่ทำผมและปักไว้ เดิมทีเธอไม่ได้ต้องการอะไรจากคฤหาสน์องค์ชายจุนเลย อันนี้ควรจะคืน แต่ตอนนี้เรื่องเร่งด่วน เธอไม่มีทางเลือกนอกจากต้องใช้มันไปก่อน ในภายหลังเธอจะหาเงินมาไถ่ปิ่นปักผมและคืนให้องค์ชายจุน จงป๋อจ้องมองปิ่นปักผมทองคำในมือ ฝีมือการประดิษฐ์นั้นประณีต หรูหรา และมีราคาแพง</p>\n<p>น้ำหนักของมันบ่งบอกอย่างชัดเจนว่าไม่ใช่สิ่งที่ครอบครัวธรรมดาจะซื้อหาได้ คุณหญิงของเขาไม่ได้สวมปิ่นปักผมแบบนี้ในวันนี้ “ไปเร็ว!” ฟู่จ้าวหนิงตะโกนเสียงทุ้ม จงป๋อสะดุ้งตื่น หันหลังกลับ และวิ่งออกไปอย่างเร่งรีบ เขาไปถึงประตูหลังและพบว่าม้าตัวหนึ่งไม่มีอาน แต่เขาไม่สามารถกังวลเรื่องนั้นได้ในตอนนี้ เขาเปิดประตูอย่างรวดเร็ว และในขณะนั้นเอง รถมาจอดอยู่ด้านนอก เจ้าชายจุนสวมหน้ากากก้าวลงมาจากรถม้า</p>"}, "14": {"chapter_number": 14, "chapter_title": "第14章當了他家首飾", "content": "<p>เจ้าชายจุนมองไปที่ลุงจง ลุงจงถึงกับอึ้งไป หลายปีมาแล้วที่ไม่เพียงแต่ประตูหลังจะว่างเปล่า แม้แต่ประตูหน้าของบ้านตระกูลฟู่ก็ไม่เคยมีแขกผู้มีเกียรติมาเยือนเลย แต่ชายหนุ่มตรงหน้าเขานั้นสูงสง่า สวมชุดผ้าไหมปักดิ้นทองหรูหรา แผ่รัศมีแห่งชนชั้นสูงออกมา หน้ากากครึ่งหน้ายิ่งเพิ่มความลึกลับให้กับเขา ในขณะที่อีกข้างของใบหน้านั้นคมชัด มีรูปหน้าหล่อเหลา บ่งบอกถึงสถานะพิเศษของเขาอย่างชัดเจน “เจ้า…” สายตาของเจ้าชายจุนเหลือบไปเห็นปิ่นปักผมทองคำในมือ ชิงอี้ก็สังเกตเห็นเช่นกัน สีหน้าของเธอเปลี่ยนไปเล็กน้อย “เจ้าจะเอาปิ่นปักผมนี้ไปไหน” เสียงของเจ้าชายจุนเย็นชา ลุงจงจึงรีบซ่อนปิ่นปักผมไว้ข้างหลังโดยสัญชาตญาณ</p>\n<p>“นี่…นี่เป็นของท่านหญิง…” ใช่แล้ว เขาไม่อาจเลื่อนสิ่งที่ท่านหญิงสั่งได้! ลุงจงรีบปิดประตูอีกครั้ง กัดฟัน และโค้งคำนับองค์ชายจุน “ขออภัยด้วย แขกผู้มีเกียรติ แต่ข้ามีธุระต้องไปทำ จึงไม่สามารถให้ท่านเข้าไปได้ในตอนนี้!” ไม่ว่าใครจะมา เขาก็ไม่มีเวลาให้รอ!</p>\n<p>พูดจบ ลุงจงก็คว้าปิ่นปักผมแล้ววิ่งไป “ตามไปดูสิ” เสียงขององค์ชายจุนทุ้มต่ำลง พวกเขาวิ่งหนีไปพร้อมกับข้าวของขององค์ชายจุนจริงหรือ? “ใช่” ยามคนหนึ่งรีบวิ่งตามไป องค์ชายจุนเหลือบมองประตูหลังที่ทรุดโทรมแล้วยิ้มเยาะ “ข้าไม่เคยคิดเลยว่าตระกูลฟู่ที่เคยรุ่งเรืองจะตกต่ำถึงขนาดนี้ แม้แต่ท่านผู้เฒ่าฟู่ผู้ทรงอำนาจในอดีตก็ยังต้องใช้ประตูหลังที่ผุพังเช่นนี้” “ท่านอาจารย์ เราเข้าไปดูกันไหม?” ชิงอี้ถาม “ข้าจะไม่เข้าไป เจ้าเข้าไปดูเองเถอะ” องค์ชายจุนกล่าวอย่างไม่แยแส “ประตูหลังของตระกูลฟู่แห่งนี้ไม่คู่ควรกับข้าเลย” “ครับ” ชิงอี้สั่งให้องครักษ์คนอื่นๆ ดูแลองค์ชายให้ดี จากนั้นก็ผลักประตูบ้านตระกูลฟู่เปิดออก</p>\n<p>เซียวเถาไล่คุณหญิงรองและคนอื่นๆ ออกไปหมดแล้ว เธอโยนไม้กวาดลงแล้วเข้าไปในห้อง ก็เห็นฟู่จ้าวหนิงกำลังกดหน้าอกของท่านผู้เฒ่าฟู่ เธอตกใจทันที “คุณหนู!” “จุดเทียนทั้งหมดแล้วเอามาไว้ที่นี่” ฟู่จ้าวหนิงสั่งด้วยเสียงทุ้มต่ำ ห้องมืดมาก “อ๋อ?</p>\n<p>ค่ะ” เซียวเถายังคงงุนงงอยู่ จึงทำตามคำสั่งโดยสัญชาตญาณ ฟู่จ้าวหนิงปล่อยมือเธอแล้วคลำชีพจรของท่านผู้เฒ่าฟู่ เมื่อคลำชีพจรได้ หัวใจของเธอก็ตกวูบ ท่านผู้เฒ่าฟู่เป็นโรคเดียวกับปู่ของเธอ! ที่แย่กว่านั้นคือ เขาถูกวางยาพิษ ยาพิษนั้นต้องออกฤทธิ์ช้า สะสมมาหลายปีจนในที่สุดก็ออกฤทธิ์ นอกจากนี้ เขายังขาดสารอาหารอย่างรุนแรง เลือดและพลังปราณพร่อง และมีอาการป่วยทางกระเพาะอาหารอย่างรุนแรง ฟู่จ้าวหนิงกัดฟัน “จ้าวหนิง...” คุณปู่ฟู่พึมพำชื่อเธอ ฟู่จ้าวหนิงรีบคว้ามือเขาไว้ “คุณปู่ ฉันอยู่นี่ จ้าวหนิงอยู่นี่!” คุณปู่ฟู่ลืมตาขึ้นอย่างยากลำบาก เห็นเธอตัวแดงก่ำ น้ำตาก็ไหลออกมาทันที “เจ้า เจ้า</p>\n<p>ตระกูลเซียวเลิกหมั้นแล้วเหรอ?” “คุณปู่ เซียวเหยียนจิงไม่ใช่คนดี ฉันไม่อยากแต่งงานกับเขาอีกแล้ว เขาไม่คู่ควรกับคำมั่นสัญญาตลอดชีวิตของฉัน...” ฟู่จ้าวหนิงรีบปลอบเขา “ฮึ่ม” เลือดไหลออกจากปากคุณปู่ฟู่อีกครั้ง หัวใจของฟู่จ้าวหนิงเต้นแรง เธอรีบร้องออกมาอีกครั้ง “คุณปู่ ฉันไม่ได้ถูกปฏิเสธ!</p>\n<p>ฉันเจอคนที่ฉันอยากแต่งงานด้วยจริงๆ และฉันได้แต่งงานกับเขาแล้ว! เขาดีกว่าเซียวเหยียนจิงเป็นร้อยเท่า เป็นพันเท่า! จริงๆ! เขาให้สัญญาว่าจะดูแลฉันอย่างดี ดังนั้นโปรดอย่ากังวล อย่าเครียดเลย...” เธอไม่สนใจอะไรอีกแล้ว ในตอนนี้ ตราบใดที่เธอสามารถปลอบโยนและให้กำลังใจคุณปู่ได้ เธอก็จะทำทุกอย่าง!</p>\n<p>ยังไงก็ตาม องค์ชายจุนก็ไม่อยู่ที่นี่ และเขาก็คงไม่ได้ยินเธอ! “จริงเหรอ จริงเหรอ?” เสียงของคุณปู่ฟู่แผ่วเบามาก ราวกับว่าเขากำลังจะสิ้นลมหายใจ ชิงอี้มาถึงประตูแล้ว เห็นเหตุการณ์ข้างใน และได้ยินสิ่งที่ฟู่จ้าวหนิงกำลังจะพูด “จริง ๆ ค่ะ! คุณปู่ ฉันไม่ได้โกหกคุณปู่ ฉันรู้ว่าเซียวเหยียนจิงไม่ดีพอ ฉันเลยตัดสินใจปฏิเสธการหมั้นของเขา ฉันปฏิเสธที่จะเข้าไปในคฤหาสน์ขององค์ชายเซียว สามีของฉันผ่านมาเห็นแล้วคิดว่าฉันทำถูกแล้ว เขาชื่นชมฉันมากและตกหลุมรักฉันตั้งแต่แรกเห็น...” เธอกำลังพูดเรื่องไร้สาระอะไรกันเนี่ย? ฟู่จ้าวหนิงหยุดพูดไปครู่หนึ่ง</p>\n<p>แต่เมื่อเห็นว่าคุณปู่ฟู่ดูเหมือนจะหลงใหลในคำพูดเพ้อเจ้อของเธอและพยายามตั้งสติ เธอก็พูดต่อโดยไม่ลังเล “คุณปู่ โปรดระวังตัวด้วยนะคะ เมื่อคุณปู่ตื่นขึ้นมา สามีของฉันจะมาเยี่ยมคุณปู่ เราแต่งงานกันอย่างถูกต้องแล้ววันนี้ เรากราบไหว้ฟ้าดินอย่างเหมาะสม ครอบครัวของเขามั่งคั่งมาก ไม่เหมาะสมที่ฉันจะกลับบ้านคืนนี้ แต่สามีของฉันรู้ว่าฉันเป็นห่วงคุณปู่ เขาเลยเร่งให้ฉันกลับบ้านเร็ว ๆ เขาอยากมาด้วย แต่ฉันไม่ยอมให้เขามา” ชิงอี้ที่ประตูส่งเสียงฮึดฮัด คิดว่าตัวเองอาจจะประสาทหลอนไปแล้ว คุณหนูฟู่พูดอะไรกันแน่?</p>\n<p>เจ้านายของเธอตกหลุมรักเธอตั้งแต่แรกเห็นหรือ? และเขาอยากจะมาด้วยหรือ? &quot;ท่านเป็นใคร?&quot; เสี่ยวเถาเห็นเขาแล้วตกใจเกือบทำเทียนในมือหล่น ฟู่จ้าวหนิงหันกลับมา สีหน้าของเธอเปลี่ยนไปเมื่อเห็นชิงอี้ เธอรีบมองไปข้างหลังชิงอี้ แต่ไม่เห็นใคร จึงถอนหายใจโล่งอก เธอรู้แล้ว! องค์ชายจุนจะตามเธอมาเองได้อย่างไร?</p>\n<p>แต่เธอขี่ม้าออกจากบ้านองค์ชายจุน ดังนั้นบ้านองค์ชายจุนจึงส่งคนมาตามเธอเป็นเรื่องปกติ ตอนนี้เธอกลัวว่าชิงอี้จะได้ยินและเปิดเผยความลับของเธอ &quot;ฉัน...&quot; &quot;เขาชื่อชิงอี้ เขาเป็นองครักษ์ของสามีฉัน!&quot; ฟู่จ้าวหนิงขัดจังหวะชิงอี้ พูดก่อนเขาว่า “คุณปู่ เห็นไหม ฉันไม่ได้โกหกคุณปู่ สามีของฉันเป็นห่วงฉันมากถึงขนาดส่งองครักษ์มาคุ้มกันฉันกลับมา ไม่ต้องห่วง ฉันสบายดีจริงๆ วางใจได้เลย เมื่อคุณปู่รู้สึกดีขึ้น ฉันจะพาสามีมาที่นี่แน่นอน เพื่อให้คุณปู่ได้เจอเขาอย่างเต็มที่ คุณปู่ถามอะไรเขาก็ได้นะ โอเคไหม?” “ชิงอี้ เธอคิดว่าฉันโกหกคุณปู่เหรอ?” ฟู่จ้าวหนิงจับมือคุณปู่ฟู่แน่น แล้วหันไปมองชิงอี้</p>\n<p>ชิงอี้เห็นแววตาอ้อนวอนของเธอ เขาอ้าปาก เหลือบมองคุณปู่ฟู่ที่นอนอยู่บนเตียงแทบจะหมดสติ แล้วพยักหน้าอย่างไม่รู้ตัว “ไม่ คุณหนูฟู่พูดความจริง” เสี่ยวเถาที่มองเขาด้วยความระแวงและหวาดกลัวอยู่ก่อนหน้านี้ ถอนหายใจโล่งอกเมื่อได้ยินเช่นนั้น น้ำตาแห่งความดีใจไหลอาบแก้มอีกครั้ง “คุณหนู ดีใจจังที่คุณหนูปลอดภัย” คุณชายคนนั้นเป็นคนแบบไหน และทำไมเขาถึงพาคุณหนูไปแต่งงานกลางถนนแบบนั้น—นั่นไม่ใช่คำถามที่จะถามในตอนนี้ ดูเหมือนว่าวิธีนี้จะได้ผล คุณชายฟู่โล่งใจขึ้นอย่างเห็นได้ชัด และหายใจได้สะดวกขึ้น “เสี่ยวเถา รีบไปต้มน้ำเร็ว” ฟู่จ้าวหนิงไม่สนใจชิงอี้อีกต่อไป</p>\n<p>และใช้เทคนิคพิเศษของเธอในการกดจุดฝังเข็มของคุณชายฟู่อีกครั้ง ชิงอี้ยืนอยู่ตรงนั้น ไม่รู้จะทำยังไงสักพัก หลังจากคิดอยู่ครู่หนึ่ง เธอก็หันหลังเดินออกไป ด้านนอกประตูหลัง ลุงจงรีบวิ่งกลับมาพร้อมกับสิ่งที่ฟู่จ้าวหนิงขอ เกือบจะชนเขา “เข้าไปก่อน คุณหนูรออยู่” เมื่อเห็นสีหน้ากังวลของเขา ชิงอี้ก็อดไม่ได้ที่จะพูด จงป๋อไม่สนใจว่าเขาเข้ามาทำไม คุณชายในรถม้าข้างนอกยังไม่ไป แต่คุณหนูกำลังรอของพวกนี้อยู่ เมื่อเห็นเขากลับมา ฟู่จ้าวหนิงจึงถามอย่างเร่งรีบว่า &quot;เจ้าเอาเข็มเงินมาด้วยหรือ? แล้วโสมฝานล่ะอยู่ที่ไหน?&quot;</p>"}, "15": {"chapter_number": 15, "chapter_title": "第15章王爺對我一見鍾情", "content": "<p>“คุณหนู ทุกอย่างมาครบแล้ว!” ลุงจงรีบนำสิ่งของมาให้ ฟู่จ้าวหนิงนำเหล้ามาแช่เข็มเงิน แล้วนำไปอุ่นด้วยเปลวเทียน จากนั้นให้ลุงจงช่วยถอดเสื้อผ้าของท่านผู้เฒ่าฟู่ เธอนำโสมฝานหนึ่งชิ้นวางไว้ใต้ลิ้นของท่านผู้เฒ่าฟู่ “เสี่ยวเถา เอาไปอีกสองสามชิ้นทำน้ำโสมด้วยนะ” “ครับ” เสี่ยวเถารีบไปทำตาม พวกเขาทุกคนรู้สึกว่าฟู่จ้าวหนิงเปลี่ยนไปมาก แต่ก็ไม่มีเวลาคิดให้รอบคอบ ยิ่งไปกว่านั้น ไม่ว่าฟู่จ้าวหนิงจะพูดอะไร พวกเขาก็ทำตามโดยไม่รู้ตัวเสมอ ฟู่จ้าวหนิงถือเข็มเงินและตั้งใจแทงเข็มลงไปในจุดฝังเข็มของท่านผู้เฒ่าฟู่ “อ่า—” ลุงจงเกือบจะร้องออกมาด้วยความตกใจเมื่อเห็นการกระทำของเธอ แต่ก็รีบหุบปากทันที</p>\n<p>คุณหนูไม่เคยเรียนแพทย์มาก่อน กล้าดียังไงมาฝังเข็มให้ท่านผู้เฒ่า? แต่สีหน้าจริงจังและมุ่งมั่นของฟู่จ้าวหนิงทำให้เขาไม่กล้าเข้าไปรบกวนเธอโดยไม่รู้ตัว การเคลื่อนไหวของฟู่จ้าวหนิงนั้นรวดเร็วมาก หลังจากแทงเข็มไปหนึ่งเล่ม มือของเธอก็ไม่หยุดและแทงเข็มอีกเล่มทันที เธอแทงเข็มอย่างรวดเร็วโดยไม่ลังเลหรือหยุดเพื่อหาจุดฝังเข็ม คุณชายฟู่หมดสติไปอีกครั้ง และไม่ตอบสนองใดๆ ตลอดการฝังเข็มของฟู่จ้าวหนิง หัวใจของลุงจงเต้นแรง ในขณะเดียวกัน ชิงอี้อยู่ข้างนอกข้างรถม้า กำลังเล่าสิ่งที่เขาเห็นให้องค์ชายจุนฟัง ขณะที่เขากำลังฟัง องค์ชายจุนก็ขัดจังหวะเขา “ท่านบอกว่าฟู่จ้าวหนิงบอกคุณชายฟู่ว่าจะแต่งงานกับข้า</p>\n<p>และเธอโกหกเพื่อเอาใจเขา เธอโกหกอะไรบ้าง?” ใบหน้าของชิงอี้แข็งทื่อ เขาตั้งใจจะพูดถึงเรื่องนี้อย่างคร่าวๆ เท่านั้น ไม่ต้องการอธิบายมากเกินไปให้องค์ชายฟัง แต่องค์ชายกลับหยิบยกประเด็นสำคัญนี้ขึ้นมา เขาควรพูดตอนนี้หรือไม่?</p>\n<p>ตอนแรกเจ้าชายจุนไม่ได้คิดอะไรมาก แค่สงสัยเฉยๆ แต่พอเห็นปฏิกิริยาของชิงอี้ เขาก็เริ่มสงสัย “พูดมา! ฟู่จ้าวหนิงพูดว่าอะไร? พูดซ้ำคำต่อคำเลย” เขาอยากฟังว่าฟู่จ้าวหนิงจะอธิบายสถานการณ์ของเธออย่างไร ชิงอี้ไม่มีทางเลือกนอกจากต้องเล่าคำพูดของฟู่จ้าวหนิงให้เจ้าชายจุนฟังอย่างละเอียดทุกคำ ความเงียบเข้าปกคลุมรถม้าชั่วครู่หลังจากเจ้าชายจุนฟังจบ “ฮึ่ม” หลังจากเงียบไปนาน เสียงของเจ้าชายจุนก็เย็นชาลง “ข้าชื่นชมเธอมากหรือ? ข้าตกหลุมรักเธอตั้งแต่แรกเห็น?</p>\n<p>และข้ายังคิดอยากจะไปส่งเธอกลับด้วยหรือ?” “ฝ่าบาท คุณหนูฟู่คงแค่อยากให้ท่านผู้เฒ่าฟู่สบายใจ...” “หมายความว่าเธอเรียกเขาว่า ‘สามี’ ด้วยเหรอ?” “อืม ใช่” “ฮึ่ม ผู้หญิงคนนี้ช่างหน้าด้านจริงๆ” มีเสียงเคลื่อนไหวอยู่ใกล้ๆ และสีหน้าของเจ้าชายจุนก็เปลี่ยนไปเล็กน้อย “ดูเหมือนจะมีคนจับตามองตระกูลฟู่” เดิมทีเขาตั้งใจจะเข้าไปดูว่าฟู่จ้าวหนิงจะใช้กลอุบายอะไรอีกบ้าง มิเช่นนั้นเขาคงปล่อยให้เธออยู่ที่ตระกูลฟู่ต่อไปแล้ว เพราะอย่างไรเธอก็อยากกลับมาเอง เขามีพระสนมอยู่แล้ว หากพระสนมไม่ประทับอยู่ในวัง เขาก็คงมีความสุขที่จะได้ใช้ชีวิตอย่างสงบสุข แต่เนื่องจากไม่รู้ว่าใครแอบจับตาดูตระกูลฟู่อยู่</p>\n<p>เขาจึงปล่อยให้ฟู่จ้าวหนิงอยู่ไม่ได้ “เข้าไปบอกฟู่จ้าวหนิงว่ารถม้ากำลังรออยู่ บอกให้เธอกลับวังหลังจากทำธุระเสร็จแล้ว” องค์ชายจุนกล่าวพลางเอนหลังพิงหมอนนุ่มๆ และนวดขมับ เขาใช้เวลาทั้งวันเดินทางกลับเมืองหลวง แล้วก็แต่งงานอย่างไม่ทราบสาเหตุ จึงไม่ได้พักผ่อนอย่างเต็มที่ “ฝ่าบาททรงประสงค์จะเสด็จกลับก่อนหรือไม่” “ข้าจะรออยู่ที่นี่ การแสดงต้องเนียนมาก ฟู่จ้าวหนิงกังวลเรื่องต้องรีบกลับไปตระกูลฟู่ในคืนวันแต่งงานของคุณปู่ ข้าจึงจะรอให้เธอกลับไปด้วยกัน นี่คือวิธีการแสดงใช่ไหม” ชิงอี้ไม่กล้าตอบ เขาจึงกระโดดลงจากรถม้าและเข้าไปในบ้านของตระกูลฟู่ “ฝ่าบาท ปิ่นปักผมทองคำถูกซื้อคืนแล้ว เมื่อครู่นี้</p>\n<p>คนรับใช้ของตระกูลฟู่ได้นำปิ่นปักผมทองคำไปจำนำที่คลินิกข้างหน้า แลกกับเข็มเงินหนึ่งชุด เหล้าองุ่นหนึ่งขวด และโสมอายุสามสิบปี” “ใช้เงินเท่าไหร่ในการไถ่ถอน?” องค์ชายจุนรับปิ่นปักผมทองคำจากยาม แสงเทียนในรถม้าส่องกระทบปิ่นปักผม ทำให้มันแกว่งไหวเป็นแสงสีทอง ตรงกลางของปิ่นปักผมนี้ประดับด้วยไข่มุกและอัญมณีชั้นดี เขารู้สึกว่าฟู่จ้าวหนิงมองไม่ชัด มิเช่นนั้น ปิ่นปักผมชิ้นนี้จะแลกเปลี่ยนได้ราคาถูกขนาดนี้ได้อย่างไร? นี่เป็นของหายากจากคฤหาสน์ของเจ้าชายจุน เธอช่างกล้าใช้มันเป็นหลักประกันเสียจริง “รายงานต่อท่านอาจารย์ ราคาหนึ่งพันตำลึง” “ฮึ่ม เจ้าไปได้แล้ว” ตกลง ฟู่จ้าวหนิงเป็นหนี้เขาหนึ่งพันตำลึงในคืนแต่งงาน</p>\n<p>คนในคลินิกคงสังเกตเห็นเครื่องแต่งกายที่แปลกตาขององครักษ์ของเขา จึงไม่กล้าคิดราคาเกินจริง คิดราคาที่สูงกว่าของชิ้นอื่นเล็กน้อย มิเช่นนั้น ด้วยมูลค่าของปิ่นปักผมชิ้นนี้เพียงอย่างเดียว พวกเขาคงไม่ยอมคืนให้ในราคาต่ำกว่าสามถึงห้าพันตำลึงหรอก เขาหลับตาลงและในที่สุดก็ไอออกมา เมื่อชิงอี้เข้ามา เธอเห็นว่าฟู่จ้าวหนิงเพิ่งทำการฝังเข็มเสร็จ ตอนนี้ร่างกายของท่านอาจารย์ฟู่เต็มไปด้วยเข็ม ดูน่ากลัวทีเดียว เขาผอมแห้งมาก แทบจะเหลือแต่กระดูก และเข็มเย็นๆ ที่แทงลงไปในร่างกายที่ทรุดโทรมของเขายิ่งทำให้เขาน่าสงสารมากขึ้นไปอีก ดวงตาของฟู่จ้าวหนิงแดงก่ำ เธอได้ยินเสียงฝีเท้าของชิงอี้แต่ไม่ได้เงยหน้าขึ้นมอง</p>\n<p>เธอเอื้อมมือไปหยิบเข็มขึ้นมาค่อยๆ บิด การฝังเข็มนี้ไม่ใช่แค่การแทงเข็มลงไปเท่านั้น แต่เธอยังต้องบิดและสะบัดเข็มเพื่อกระตุ้นจุดฝังเข็มให้แรงขึ้น ช่วยให้ร่างกายไหลเวียนโลหิตและพลังชี่ได้เร็วที่สุด ฟื้นฟูพลังชีวิต เข็มฝังเข็มชุดนี้ต้องใช้ความละเอียดอ่อนมาก ฟู่จ้าวหนิงจึงไม่สนใจสิ่งอื่นใดเลย ชิงอี้เห็นเธอมุ่งมั่นเช่นนั้นจึงไม่กล้าพูดอะไร ท่าทีที่จริงจังและสงบของฟู่จ้าวหนิงทำให้เขารู้สึกเกรงขามอย่างประหลาด เขาจึงยืนดูอยู่ข้างๆ มือของฟู่จ้าวหนิงนิ่งมาก ความเร็วและแรงของการเคลื่อนไหวของเข็มแต่ละเล่มแทบจะเหมือนกันทุกประการ ชิงอี้สังเกตเห็นว่าจำนวนครั้งที่เข็มแต่ละเล่มสั่นนั้นเท่ากันเป๊ะ</p>\n<p>เขาตกใจและประทับใจในฝีมือของฟู่จ้าวหนิงมากขึ้นเรื่อยๆ หากท่านฟู่สามารถฟื้นตัวได้จริง ก็หมายความว่าองค์ชายของพวกเขาก็อาจรอดได้เช่นกัน!</p>\n<p>ฟู่จ้าวหนิงอาจรักษาองค์ชายได้จริงๆ เมื่อคิดเช่นนั้น หัวใจของชิงอี้ก็เต้นระรัวด้วยความตื่นเต้น เขาตั้งสติรอให้ฟู่จ้าวหนิงเริ่มทำการฝังเข็ม เหงื่อเม็ดเล็กๆ ปรากฏขึ้นบนหน้าผากของฟู่จ้าวหนิง แสดงให้เห็นว่าเธอเหนื่อยล้ามาก ลุงจงและเสี่ยวเถาเฝ้าดูอยู่ข้างๆ เธอ ไม่กล้าส่งเสียงใดๆ ออกมา หลังจากผ่านไปประมาณครึ่งชั่วโมง ฟู่จ้าวหนิงก็ถอนเข็มออกทั้งหมด แล้วเอื้อมมือไปพลิกตัวท่านฟู่ไปด้านข้างเตียง เธอใช้มือกดและดันหลังของเขา และท่านฟู่ก็อาเจียนเป็นเลือดออกมาทันที “ท่านฟู่!” “คุณหนู นี่...” ลุงจงและเสี่ยวเถาตกใจจนแทบกระโดดขึ้นจากเตียง แม้แต่หัวใจของชิงอี้ก็เต้นแรงจนแทบหลุดออกมาจากอก เกิดอะไรขึ้น?</p>\n<p>ฟู่จ้าวหนิงช่วยพยุงนายท่านฟู่ให้นอนลงอย่างเรียบร้อย แล้วถอนหายใจโล่งอก “ไม่เป็นไรหรอก นี่คือเลือดพิษที่สะสมอยู่แล้วอาเจียนออกมาเอง จะทำให้คุณปู่รู้สึกดีขึ้น” โชคดีที่เธอทานอาหารอิ่มหนำสำราญที่บ้านขององค์ชายจุนแล้ว ตอนนี้จึงมีเรี่ยวแรงเหลือเฟือ มิเช่นนั้นเธอคงกลับมาไม่ไหวแน่ๆ ด้วยท้องว่าง “เลือดพิษ?” ชิงอี้เข้าใจประเด็นสำคัญทันที</p>"}, "16": {"chapter_number": 16, "chapter_title": "第16章人被賣了", "content": "<p>ฟู่จ้าวหนิงไม่ได้ตอบคำถามของชิงอี้ นี่เป็นเรื่องของครอบครัวเธอ และไม่จำเป็นต้องอธิบายให้ชิงอี้ฟังอย่างละเอียด เธอยังไม่รู้ว่าองค์ชายจุนเป็นคนแบบไหน “ตอนนี้ไม่เป็นไรแล้ว” ฟู่จ้าวหนิงกล่าวกับลุงจง “กรุณาช่วยเช็ดตัวคุณปู่ด้วยน้ำอุ่นหน่อยค่ะ” “คุณหนู ไม่ต้องสุภาพกับข้ามากขนาดนั้นก็ได้” ลุงจงเช็ดน้ำตาด้วยความดีใจเมื่อได้ยินว่าคุณปู่ไม่เป็นไรแล้ว “ป้าจงกับพี่หูอยู่ไหนคะ” ในที่สุดฟู่จ้าวหนิงก็มีเรี่ยวแรงถามคำถามนี้ ป้าจงและลูกชาย หูจื่อ น่าจะอยู่ที่นี่ แต่เธอกลับมานานแล้ว และถึงแม้จะมีเรื่องวุ่นวายเกิดขึ้น เธอก็ยังไม่เห็นพวกเขา เมื่อได้ยินเธอถาม น้ำตาของลุงจงก็เอ่อล้นขึ้นอีกครั้ง</p>\n<p>และใบหน้าของเสี่ยวเถาก็ซีดเผือด “พวกเขาอยู่ไหนกัน” ฟู่จ้าวหนิงรู้จากปฏิกิริยาของพวกเขาว่าต้องมีอะไรเกิดขึ้นแน่ๆ ไม่อย่างนั้นป้าจงและหูจื่อคงมาเฝ้าอยู่ตรงนี้แล้ว ทำไมคุณหญิงรองถึงยอมให้คนของตัวเองทำแบบนี้ได้? ลุงจงซื่อสัตย์และซื่อตรง แต่ป้าจงค่อนข้างดุ และหูจื่อก็แข็งแกร่งอย่างเหลือเชื่อ เมื่อมีพวกเขาอยู่ด้วย คนรับใช้จากบ้านอื่นๆ จึงไม่กล้าทำอะไรเกินเลย “คุณหนู ว้า!” เสี่ยวเถาอดไม่ได้ที่จะร้องไห้ “เกิดอะไรขึ้น?</p>\n<p>บอกแม่ก่อนร้องไห้!” น้ำเสียงของฟู่จ้าวหนิงเข้มงวดขึ้น น้ำตาของเสี่ยวเถาหยุดไหลทันที เธอรีบเล่าให้ฟัง “หลังจากเกี้ยวของคุณหนูออกไปแล้ว คุณหญิงรองส่งคนไปตามป้าจง แต่ป้าจงไม่กลับมานานมาก พี่หูไปที่บ้านรองเพื่อตามหา แต่เขาบอกว่าป้าจงทำเรื่องไม่ดี ไม่เพียงแต่ขโมยปิ่นปักผมของคุณหญิงรอง แต่ยังทำแจกันสองหูแตกอีกด้วย” “แล้วหลังจากนั้นล่ะ?” น้ำเสียงของฟู่จ้าวหนิงเย็นชาลงกว่าเดิม ชิงอี้ขมวดคิ้วและเงียบไป “คุณหญิงรองบอกว่าตระกูลฟู่เลี้ยงคนรับใช้แบบนี้ไม่ไหว เลยขายป้าจงไปซะเลย เสือไปทะเลาะกับคุณหญิงรอง โดนคนรับใช้ของคุณหญิงรองซ้อมจนเกือบตาย เลยเอาไปขังไว้ในโรงเก็บฟืน แล้วบอกว่าจะขายเสือพรุ่งนี้ด้วย”</p>\n<p>“เหลือเชื่อ!” ทางฝั่งคุณหญิงใหญ่ ปกติแล้วพวกเธอพึ่งพาป้าจงที่ปากร้ายกับเสือที่แข็งแรงไว้คุ้มครอง ก่อนหน้านี้ ตอนที่เธออยู่ด้วย คุณหญิงรองไม่กล้าทำร้ายคนรับใช้ของเธอหญิงใหญ่ แต่ตอนนี้พวกเธอมีโอกาสแล้ว เธอออกจากบ้านไปโจมตีป้าจงกับเสือทันที! คุณหญิงรองยังมายั่วยุคุณชายฟู่อีก!</p>\n<p>ถ้าเธอกลับมาช้ากว่านี้ คุณหญิงใหญ่คงแย่แน่ๆ คุณชายฟู่คงช็อกตาย ส่วนครอบครัวของลุงจงสามคนกับเสี่ยวเถาคงถูกขายไปหมดแล้ว ตระกูลฟู่ย่อมเป็นของท่านหญิงรองอย่างแน่นอน “พวกเขาคงลืมไปแล้วว่าตระกูลฟู่เป็นของใคร!” ฟู่จ้าวหนิงโกรธจัด เธอพูดกับลุงจงว่า “ลุงจงอยู่ที่นี่ดูแลคุณยายด้วยนะ ฉันจะไปพาพี่หู่กลับมา! เสี่ยวเถา ไปกันเถอะ” “คุณหนู?” เสี่ยวเถาลังเล คุณหนูเปลี่ยนไปมากจริงๆ เมื่อก่อนถ้าคุณหนูเจอเรื่องแบบนี้ เธอคงได้แต่โกรธจัด ถึงแม้เธอจะสาปแช่งตระกูลสาขาที่สอง แต่เธอก็ไม่กล้าลงมือทำอะไรจริงๆ เธอจะรอจนกว่านายท่านจะหายดีก่อนแล้วค่อยไปตามหาตระกูลสาขาที่สองด้วยตัวเอง “หยิบเครื่องมือมา”</p>\n<p>ฟู่จ้าวหนิงหยิบถุงเข็มเงินขึ้นมาเช่นกัน ขณะที่เธอกำลังจะออกไป เธอก็เห็นชิงอี้ ดวงตาของฟู่จ้าวหนิงเป็นประกาย “ชิงอี้ ฉันขอยืมตัวเธอสักครู่ได้ไหม?” ชิงอี้: “...” ท่านหญิงรองกลับไปที่ลานบ้านแล้ว สาวใช้กำลังทายาให้บาดแผลเล็กๆ บนใบหน้าของเธอ ทันทีที่ปลายนิ้วของเธอแตะลงไป เธอก็ร้องด้วยความเจ็บปวดและยกมือขึ้นตบหน้าสาวใช้ “ตบ!” “ยัยโสเภณีสารเลว แกเบาๆ หน่อยไม่ได้เหรอ?” สาวใช้ก้มหน้าลงและไม่กล้าส่งเสียงใดๆ ออกมา เธอค่อยๆ ขยับตัวอย่างเบามือ “ยัยฟู่จ้าวหนิงนั่น ฉันไม่รู้ว่าอะไรเข้าสิงเธอ เธอกลับมาแล้ว!</p>\n<p>แล้วยัยนั่นยังกล้าแตะต้องฉันอีก!” หญิงสาวสวยแต่ดูขี้อายเล็กน้อย ดวงตาคมกริบ เดินเข้ามาพร้อมกับสาวใช้ “ท่านแม่ ฟู่จ้าวหนิงกลับมาจริงๆ เหรอคะ? ทุกคนบอกว่าเธอแต่งงานกับองค์ชายจุนไม่ใช่เหรอ? บอกหนูมาเร็วๆ ว่าองค์ชายจุนเป็นใคร? หนูได้ยินมาว่าแม้แต่คุณชายเซียวก็ยังไม่กล้ายุ่งกับเขาเลย!” หญิงสาวคนนี้คือฟู่หมิงจู ลูกสาวคนเล็กของภรรยาคนที่สอง เกิดตอนที่เธออายุเกินสามสิบ เธอรักและเอ็นดูเด็กสาวคนนี้มาก จึงตั้งชื่อให้เธอว่าฟู่หมิงจู เมื่อเห็นฟู่หมิงจู สีหน้าดุร้ายของภรรยาคนที่สองก็อ่อนลงบ้าง “หมิงจู เจ้าแอบออกไปเล่นอีกแล้วหรือไง เพิ่งกลับมาตอนนี้?</p>\n<p>แม่บอกแล้วไงว่าข้างนอกมีคนไม่ดีเยอะแยะ เจ้าอยู่ข้างนอกดึกไม่ได้ ต้องกลับก่อนมืด ทำไมเจ้าไม่ฟังล่ะ?” “โอ้ แม่จ๋า รีบเล่าเรื่ององค์ชายจุนให้หนูฟังเร็ว!” “เจ้าพูดอะไรนะ? ฟู่จ้าวหนิงแต่งงานกับองค์ชายจุนแล้วเหรอ?” คุณหญิงคนที่สองเพิ่งรู้ตัวว่าพูดอะไรออกไป เธอก็ตกใจทันที ข่าวที่เธอได้ยินมาคือ ฟู่จ้าวหนิงทะเลาะกับองค์ชายเซียวกลางถนน การหมั้นหมายจึงถูกยกเลิก และเธอยังไปทำให้หลี่จือเหยาขุ่นเคืองอีกด้วย จากนั้น ด้วยความที่อยากจะแก้แค้นองค์ชายเซียว ฟู่จ้าวหนิงจึงเลือกผู้ชายคนหนึ่งบนถนนแล้วไปแต่งงานกับเขา แต่ผู้ชายคนนั้นคือองค์ชายจุนงั้นเหรอ? เป็นไปได้อย่างไร?! “ใช่ ทุกคนข้างนอกพูดกันแบบนั้น เรื่องจบแล้ว!” “เป็นไปไม่ได้ เป็นไปไม่ได้อย่างแน่นอน” คุณหญิงคนที่สองไม่เชื่อเลยสักนิด “เจ้าคิดว่าในเมืองต้าจ้าวมีเจ้าชายมากมายขนาดนั้นเลยเหรอ?</p>\n<p>วิ่งไปทั่วถนนแล้วจะคว้าใครก็ได้เหรอ? ถึงทำได้ เจ้าจะแต่งงานกับฟู่จ้าวหนิงแบบนั้นได้ยังไง?” “แต่ทุกคนก็พูดแบบนั้นนี่คะ แม่ไม่รู้จักองค์ชายจุนเหรอคะ?” ความฝันของฟู่หมิงจูคือการได้แต่งงานกับเชื้อพระวงศ์และเป็นเจ้าหญิง ความจริงที่ว่าทายาทขององค์ชายเซียวหมั้นหมายกับฟู่จ้าวหนิงทำให้เธออิจฉามาสิบปีแล้ว แม้ว่าเซียวเหยียนจิงจะไม่ใช่เจ้าชายในตอนนี้ แต่เขาก็เป็นทายาท และเขาจะต้องสืบทอดตำแหน่งในอนาคตอย่างแน่นอน ยิ่งไปกว่านั้น องค์ชายเซียวก็หล่อเหลามาก แต่โชคร้ายที่ต่อให้เธอพยายามเอาชนะใจเขาอย่างไร เขาก็ไม่สนใจเธอเลย ฟู่หมิงจูคิดว่าคงเป็นเพราะองค์ชายเซียวเป็นคนดี และหลังจากหมั้นหมายกับฟู่จ้าวหนิงแล้ว เขาก็ไม่สนใจคนอื่น วันนี้ เมื่อฟู่หมิงจูได้ยินข่าวว่าฟู่จ้าวหนิงได้ยกเลิกการหมั้นกับองค์ชายเซียวกลางถนน เธอก็ดีใจมากในตอนแรก แต่แล้วเธอก็ได้ยินว่าฟู่จ้าวหนิงกลับไปแต่งงานกับองค์ชายจุน!</p>\n<p>“องค์ชายจุน ไม่ใช่องค์รัชทายาท? นั่นหมายความว่าฟู่จ้าวหนิงเป็นเจ้าหญิงแล้วสินะ?” ฟู่หมิงจูหึงหวงอย่างบ้าคลั่ง เธอเคยลืมองค์รัชทายาทเซียวไปแล้ว และตอนนี้อยากรู้แต่ว่าองค์ชายจุนเป็นใคร! คุณหญิงรองยังคงไม่เชื่อ “องค์ชายจุน ใช่องค์ชายจุน แต่ไม่เคยมาที่เมืองหลวงเลย ไม่มีใครพูดถึงเขาเลยตลอดหลายปีที่ผ่านมา เขาคงเป็นแค่องค์ชายที่ไม่มีอำนาจอะไรมากนัก ประเภทที่แม้แต่ในวังก็ไม่เคารพ?” สิบสองปีก่อน ครอบครัวของคุณหญิงรองเป็นเพียงครอบครัวธรรมดาในเมืองเล็กๆ ที่หาเลี้ยงชีพอย่างยากลำบาก ต่อมาพวกเขาได้รู้ว่าท่านฟู่ผู้เฒ่าประสบความสำเร็จในเมืองหลวง จึงย้ายไปอยู่ที่นั่นเพื่อพึ่งพาเขา ก่อนหน้านั้น</p>\n<p>ด้วยสถานะของพวกเขา พวกเขาไม่สามารถเข้าถึงราชวงศ์ได้ ดังนั้นถึงแม้คุณหญิงรองจะเคยได้ยินชื่อเจ้าชายจุน แต่เธอก็ไม่รู้รายละเอียดอะไรเกี่ยวกับพระองค์เลย “แต่ทุกคนภายนอกพูดกันว่า แม้แต่องค์รัชทายาทเซียวก็ยังไม่กล้าขึ้นเสียงต่อหน้าเจ้าชายจุน” ฟู่หมิงจูอุทาน</p>"}, "17": {"chapter_number": 17, "chapter_title": "第17章雋王是老頭", "content": "<p>“หรือว่าเป็นเพราะองค์ชายจุนทรงมีพระชนมายุสูงกว่าและอายุมากกว่าเขา?” คุณหญิงรองคาดเดา “องค์ชายเซียวก็ต้องปฏิบัติตามกฎและเคารพผู้ใหญ่ไม่ใช่หรือ? นั่นมันอยู่บนท้องถนน เด็กหนุ่มอย่างเขาจะไปมีเรื่องกับคนแก่ได้อย่างไร? ถ้ามีคนไปฟ้องฮ่องเต้ล่ะ?” ฟู่หมิงจูตกตะลึง “อย่างนั้นหรือ?” “แน่นอน! เจ้าเคยได้ยินเรื่ององค์ชายของฮ่องเต้ที่ได้รับพระราชทานบรรดาศักดิ์ชั้นสูงมาแล้วไม่ใช่หรือ?” ฟู่หมิงจูคิดทบทวนและตระหนักว่ามันเป็นความจริง เธอจึงตื่นเต้นอีกครั้ง “ท่านแม่ แต่ทุกคนบอกว่าหลังจากฟู่จ้าวหนิงทะเลาะกับองค์ชายเซียว เธอก็หันไปแต่งงานกับองค์ชายจุน!” ริมฝีปากของคุณหญิงรองกระตุก เธอดึงแผลบนใบหน้า ความเจ็บปวดทำให้เธอนึกถึงพฤติกรรมของฟู่จ้าวหนิงก่อนหน้านี้ ทำให้เธอขบฟันด้วยความเกลียดชัง “เจ้าไม่รู้หรือไงว่าฟู่จ้าวหนิงดื้อรั้นขนาดไหน?</p>\n<p>ก่อนหน้านี้ปู่ของเธอกำลังจะตายและบอกว่าเป็นห่วงเธอ เธอก็เลยไปรอองค์ชายเซียวทุกวันอย่างหน้าด้านๆ ยืนกรานจะแต่งงานกับเขา แม้ว่าสำนักขององค์ชายเซียวจะไม่ยอมรับการหมั้นหมาย เธอก็ยังดื้อรั้นขนาดนี้ พอองค์ชายเซียวปฏิเสธการหมั้นหมายต่อหน้าสาธารณชน เธอก็รู้สึกเสียหน้า แล้วทำไมเธอไม่คว้าใครก็ได้มาแต่งงานด้วยล่ะ?” ฟู่หมิงจูอึ้งไปครู่หนึ่ง ก่อนจะตอบไปโดยไม่รู้ตัวว่า “แต่เขาเป็นองค์ชายนะ เธอคงไม่เล่นๆ แน่นอน” ยังไงก็ตาม ฟู่จ้าวหนิงได้แต่งงานกับองค์ชายและกลายเป็นเจ้าหญิง เธอก็เลยอิจฉามาก “ทั้งหมดนั้นต้องเป็นเพราะความแค้นแน่ๆ อีกอย่าง คุณชายเซียวที่เรานับถือเหมือนผู้ใหญ่ อายุเท่าไหร่แล้ว? ท่านคิดว่าชายชราที่แก่ชราและว่างงานขนาดนั้น เจ้าชายที่คนในเมืองหลวงหลายคนไม่เคยได้ยินชื่อมาก่อน จะไม่มีเจ้าหญิงมาก่อนหรือ?</p>\n<p>เขาไม่มีสนมและผู้หญิงคนอื่นๆ ในบ้านหรือ?” คุณหญิงคนที่สองเริ่มมั่นใจมากขึ้นเรื่อยๆ ว่าการคาดเดาของเธอถูกต้อง “เป็นไปได้มากว่าเขามีลูกชายที่ถูกต้องตามกฎหมาย ลูกชายที่เกิดนอกสมรส และลูกที่เกิดนอกสมรสมากมาย แม้ว่าฟู่จ้าวหนิงจะแต่งงานเข้ามา เธอก็จะเป็นภรรยาคนที่สอง และเป็นแม่เลี้ยงด้วยซ้ำ” สาวใช้ข้างๆ อดไม่ได้ที่จะร่วมคาดเดา “ใช่ ใช่ บางทีคุณชายและคุณหญิงทุกคนในคฤหาสน์ขององค์ชายจุนอาจจะอายุมากกว่าคุณหนูจ้าวหนิง!” “ใช่แล้ว” คุณหญิงคนที่สองยังคงปลอบโยนลูกสาวคนเล็กของเธอต่อไป “แล้วทำไมองค์ชายจุนถึงยอมแต่งงานกับฟู่จ้าวหนิงกลางถนนหลังจากถูกห้ามแบบนั้นล่ะ?” ฟู่หมิงจูถามอย่างงงๆ “ทำไม?”</p>\n<p>“ไม่ใช่เพราะเขาหลงเสน่ห์ใบหน้าของฟู่จ้าวหนิงหรอกหรือ! ฟู่จ้าวหนิงใช้ใบหน้าแบบนั้นหลอกล่อผู้ชายมานับไม่ถ้วนแล้ว” ฟู่หมิงจูกัดฟัน นี่เป็นหนึ่งในเหตุผลที่ทำให้เธออิจฉาฟู่จ้าวหนิง ใบหน้าของฟู่จ้าวหนิงงดงามจริงๆ ตั้งแต่เด็กจนโต เมื่อใดก็ตามที่พวกเขาอยู่ด้วยกัน สายตาของทุกคนจะจับจ้องไปที่ใบหน้าของฟู่จ้าวหนิง แม้ว่าเธอจะแต่งตัวงดงามกว่าฟู่จ้าวหนิงก็ตาม “คอยดูเถอะ แค่ใบหน้ากับนิสัยดื้อรั้นแบบนี้ ฟู่จ้าวหนิงจะอยู่ในวังองค์ชายได้อย่างไร?</p>\n<p>วันนี้เธอยังวิ่งกลับมาอีก บางทีเธออาจจะทำให้องค์ชายจุนโกรธแล้วก็ได้ อีกไม่กี่วันเธอคงถูกไล่ออก” “ฟู่จ้าวหนิงกลับมาจริงๆ เหรอ?” “โอ้ ไม่นะ!” สาวใช้คนหนึ่งวิ่งเข้ามาอย่างตื่นตระหนก “คุณหญิงรอง คุณหนูใหญ่บุกเข้ามา!” “อะไรนะ? บุกเข้ามา?” คุณหญิงรองโกรธจัดและรีบวิ่งออกมาพร้อมกับคนรับใช้ แน่นอนว่าฟู่จ้าวหนิงเดินเข้ามาในลานบ้านพร้อมกับเสี่ยวเถา ทั้งสองนายหญิงและคนรับใช้ต่างก็ถืออาวุธ ตามมาด้วยชายหนุ่มคนหนึ่งที่แต่งกายอย่างสง่างาม คุณหญิงรองที่กำลังจะสบถคำสาปแช่งอย่างรุนแรงก็กลั้นเอาไว้เมื่อเห็นชิงอี้ ต่อหน้าคนนอก เธอรักษาภาพลักษณ์ของพี่สาวที่รักหลานสาวและหลานชายเสมอ และคุณหญิงรองแห่งตระกูลฟู่ก็ไม่อาจเสียความสงบได้ แต่ทำไมชายจากนอกตระกูลฟู่ถึงบุกรุกเข้ามาในเวลานี้?</p>\n<p>อย่างน้อยชิงอี้ก็ไม่ได้ตามเธอเข้ามาในลานบ้าน แต่หยุดอยู่ข้างนอก มันไม่เหมาะสมที่ผู้ชายจะเข้ามาในลานบ้านของผู้หญิงในเวลากลางดึกเช่นนี้ ดวงตาของฟู่หมิงจูแดงก่ำด้วยความหึงหวงเมื่อเห็นฟู่จ้าวหนิงในชุดแต่งงาน ชุดแต่งงานนี้ไม่ใช่ชุดที่ฟู่จ้าวหนิงสวมเข้าวังเจ้าชายเซียวในวันนี้อย่างแน่นอน ชุดนี้งดงามและหรูหรากว่ามาก มีงานปักด้ายทองอันประณีต ไม่เหมือนชุดเก่าๆ ที่ดูโทรมๆ “จ้าวหนิง ข้าได้ยินมาว่าเจ้าทิ้งเจ้าชายเซียวไปคบกับเจ้าชายแก่” ความสนใจของฟู่หมิงจูจดจ่ออยู่กับฟู่จ้าวหนิง เธอไม่ได้สังเกตเห็นชิงอี้เลย “เจ้าชาย… องค์โต?” ฟู่จ้าวหนิงพูดซ้ำคำนำหน้าชื่อนั้น</p>\n<p>นึกถึงใบหน้าที่หล่อเหลาหาที่เปรียบมิได้ของเจ้าชายจุน “ดูเหมือนเธอจะอายุยี่สิบต้นๆ ไม่น่าจะแก่ใช่ไหมคะ?” เพราะเสียงของฟู่หมิงจูดังมาก ชิงอี้ที่อยู่นอกประตูบ้านจึงได้ยินอย่างชัดเจนและตกใจ เจ้านายของพวกเธอแก่แล้วหรือในวัยนี้? “คุณหญิงรอง ข้ามาขอพบท่านค่ะ” ฟู่จ้าวหนิงไม่สนใจฟู่หมิงจูและจ้องมองคุณหญิงรองอย่างตั้งใจ “จ้าวหนิง วันนี้เจ้าเพิ่งแต่งงานเข้าวังหลวง แต่เจ้าไม่เคารพผู้ใหญ่เลยหรือ?</p>\n<p>เจ้าไม่แม้แต่จะเรียกเธอว่า ‘ป้าใหญ่’ ด้วยซ้ำ?” คุณหญิงรองขมวดคิ้ว “พอเถอะ ไร้สาระ ข้าไม่มีความอดทนที่จะเถียงกับเจ้าแล้ว เจ้าขายป้าจงไปที่ไหน? เจ้าขังหูจื่อไว้ที่ไหน?” “ป้าใหญ่ไม่รู้เรื่องที่คุณพูดหรอก แต่คุณแต่งงานแล้ว ลูกสาวที่แต่งงานแล้วก็เหมือนน้ำที่หกจากถ้วย คุณไม่ควรมายุ่งเรื่องของตระกูลฟู่ ถ้าคุณสนใจจริงๆ ก็ดูแลปู่ของคุณเถอะ คนรับใช้ต่ำต้อยสองคนไม่ต้องการให้คุณมาวุ่นวายด้วยหรอก” คุณหญิงรองปิดปากและหัวเราะ เธอรู้สึกพอใจมากที่เห็นฟู่จ้าวหนิงกระวนกระวาย ฟู่จ้าวหนิงแต่งงานแล้ว ตระกูลฟู่ก็จะตกอยู่ในมือของเธอในที่สุด การที่เธอจัดการกับคนรับใช้สองคนนั้นมันผิดตรงไหน? &quot;เสี่ยวเถา</p>\n<p>พี่หูถูกขังไว้ที่ไหน?&quot; ฟู่จ้าวหนิงถามเสี่ยวเถาตรงๆ &quot;ในโรงเก็บฟืนตรงนั้น&quot; เสี่ยวเถาแอบมาดูและรู้ว่าพวกเขาขังพี่หูไว้ที่ไหน พอได้ยินฟู่จ้าวหนิงถาม เธอก็ชี้ไปทางนั้นทันที ทางนั้นคือห้องครัวเล็กๆ ข้างลานบ้านของท่านหญิงรอง &quot;ไปกันเถอะ&quot; ฟู่จ้าวหนิงตัดสินใจพาพี่หูออกมาก่อน พอเห็นเธอพาเสี่ยวเถาไปทางนั้น ท่านหญิงรองก็ตกใจและไม่สนใจชิงอี้ สั่งคนรับใช้และสาวใช้ทันที &quot;หยุดเธอ!</p>\n<p>พวกเจ้าตายกันหมดหรือ?&quot; สาวใช้และคนรับใช้กระโจนเข้าใส่ฟู่จ้าวหนิงทันที พวกเธอเคยทำแบบนี้มาหลายครั้งแล้ว หยุดฟู่จ้าวหนิงพร้อมกับหยิก บิด เตะ และข่วนร่างกายเธอด้วยเล็บ บ้านของท่านหญิงรองเต็มไปด้วยคนรับใช้ชั่วร้ายที่ถูกเธอควบคุมไว้ เมื่อนึกถึงเหตุการณ์ในอดีตของมิสฟู่ ฟู่จ้าวหนิงก็รู้สึกโกรธจัด เธอคว้าไม้กวาดแล้วเหวี่ยงใส่พวกนั้นอย่างแรง ฟู่! ฟู่! ฟู่! เธอเหวี่ยงไม้กวาดเร็วมากจนเกิดภาพติดตา ปัง!</p>\n<p>ปัง! ปัง! ไม้กวาดฟาดใส่พวกคนรับใช้ชั่วอย่างไม่ปราณี ทำให้พวกเขาร้องด้วยความเจ็บปวด “โอ๊ย!” “อ๊า! เจ็บจัง!” “หน้าฉัน!” ฟู่จ้าวหนิงใช้ไม้กวาดราวกับดาบใหญ่ฟาดพวกนั้นจนร้องออกมาด้วยความเจ็บปวด ในขณะเดียวกัน เธอก็เตะสาวใช้คนหนึ่ง เสียงดังตุบ สาวใช้คนนั้นล้มลงกับพื้น สะดุดล้มทับคนอื่นๆ ที่ตามมา กองรวมกันเป็นภูเขาเนื้อ</p>"}, "18": {"chapter_number": 18, "chapter_title": "第18章打斷腿", "content": "<p>ฟู่จ้าวหนิงรีบวิ่งไปที่ประตูโรงเก็บฟืนซึ่งถูกล็อกด้วยไม้ ดึงไม้นั้นออก แล้วเตะประตูเปิดออก “ปัง!” กลิ่นเลือดโชยฟุ้งไปทั่วโรงเก็บฟืนมืด เมื่อได้กลิ่น ฟู่จ้าวหนิงก็เปลี่ยนสีหน้าทันที “ชิงอี้!” ชิงอี้ที่ตกใจกับการถูกฟู่จ้าวหนิงทำร้ายอย่างรุนแรงก็สะดุ้งตื่นเมื่อได้ยินเสียงร้องของเธอและรีบวิ่งเข้ามา ฟู่จ้าวหนิงดึงตะเกียงที่แขวนอยู่ข้างนอกลงมาส่องข้างใน ในมุมหนึ่งของโรงเก็บฟืนมีคนนอนอยู่ สวมเสื้อคลุมผ้าสีน้ำเงินเก่าๆ กางเกงเปื้อนเลือด เสื้อผ้าขาดวิ่นหลายแห่ง เขานอนนิ่งอยู่ตรงนั้น ดูเหมือนจะไร้ชีวิต “คุณหนู นั่นพี่หู!” น้ำตาของเสี่ยวเถาไหลอีกครั้งเมื่อเห็นหูจื่อเป็นแบบนี้ พวกเขาทำร้ายพี่หูจนตายหรือ?</p>\n<p>ฟู่จ้าวหนิงรีบเดินเข้าไป เอื้อมมือไปแตะที่คอของหูจื่อ หัวใจของเธอก็โล่งขึ้น “เขายังไม่ตาย ชิงอี้ ช่วยพาเขากลับไปที่บ้านเราหน่อย” “ครับ” ชิงอี้ไม่พูดอะไรมาก รีบวิ่งมาแบกหูจื่อไว้บนหลังแล้วเดินออกไปข้างนอกอย่างรวดเร็ว ขาของหูจื่อเต็มไปด้วยเลือด แต่ดูเหมือนเขาจะไม่สนใจ กลับกัน เขาถอนหายใจในใจ ขาของเขาหักอย่างเห็นได้ชัด ชายหนุ่มคนนี้คงกลายเป็นคนพิการหลังจากได้รับการช่วยเหลือ ดูเหมือนว่าคุณหนูฟู่จะลำบากมากจริงๆ ที่ต้องรับภาระหนักเช่นนี้ “หยุด!</p>\n<p>อย่าไป!” คุณหญิงคนที่สองสั่งให้คนหยุดชิงอี้ “เจ้าเป็นใคร? เจ้ามีสิทธิ์อะไรมายุ่งเรื่องของตระกูลฟู่? เจ้าอยู่กับจ้าวหนิงดึกดื่นขนาดนี้ เจ้ามีความสัมพันธ์ลับๆ กับเธอหรือเปล่า?” ฟู่หมิงจูมองชิงอี้อย่างพิจารณาหลังจากได้ยินเช่นนั้น ดวงตาของเธอก็เบิกกว้าง ชิงอี้ค่อนข้างหล่อเหลา ทักษะการต่อสู้ของเขาทำให้เขามีรูปร่างสูงใหญ่และน่าเกรงขาม และในฐานะองครักษ์ขององค์ชายจุน เขามีอำนาจและบารมีมากกว่าคนธรรมดา ทำให้เขาดูสง่างามกว่าคุณชายจากตระกูลต่ำต้อยส่วนใหญ่ ฟู่หมิงจูรู้สึกตื่นเต้นขึ้นมาทันที ทำไมชายหนุ่มคนนี้ถึงกลับมากับฟู่จ้าวหนิง? นี่จะเป็นคนรักของฟู่จ้าวหนิงจริงๆ หรือ?</p>\n<p>เธอรีบพูดกับภรรยาคนที่สองว่า “แม่คะ หรือว่าจ้าวหนิงถูกองค์ชายจุนทิ้งอีกแล้วและไปหาผู้ชายคนใหม่? แต่ทำไมผู้ชายคนนี้ถึงมากับเธอ?” ชิงอี้คนนี้จะเป็นคนรักของฟู่จ้าวหนิงจริงๆ หรือ? ถ้าฟู่จ้าวหนิงสามารถหาองค์ชายจุนมาแต่งงานได้ทันทีหลังจากถูกองค์ชายเซียวทิ้งกลางถนน เธอก็ต้องหาคนที่สามได้แน่นอน ภรรยาคนที่สองจ้องมองชิงอี้ด้วยตาโต “ใช่ ทำไมคนนี้ถึงกลับมา?” เธอนึกขึ้นได้และอุทานออกมา “คุณคงไม่ได้มาที่นี่เพื่อแต่งงานเข้าตระกูลใช่ไหม?!” ฟู่จ้าวหนิงจำเป็นต้องแต่งงานเพื่อเห็นแก่ปู่ของเธอ แต่ในเมื่อไม่มีใครยอมแต่งงานกับเธอ เธอก็เลยหาคนมาแต่งงานในตระกูลแทนงั้นหรือ? ชิงอี้ถึงกับพูดไม่ออก</p>\n<p>เขาประทับใจแม่ลูกคู่นี้จริงๆ “หลบไป” เขาอุ้มหูจื่อไว้ในมือข้างหนึ่ง และโบกมือไล่ภรรยาคนที่สองและฟู่หมิงจูด้วยมืออีกข้าง ทันใดนั้นภรรยาคนที่สองและฟู่หมิงจูก็รู้สึกเหมือนมีแรงผลักที่มองไม่เห็นผลักพวกเขาออกไป “โอ๊ย!” ฟู่หมิงจูเสียหลักล้มลงไปทับภรรยาคนที่สอง ทำให้เธอล้มลงไปด้วย เสียง “แตก” ทำให้ข้อเท้าของภรรยาคนที่สองบิด และเธอร้องด้วยความเจ็บปวด ฟู่จ้าวหนิงหยิบไม้จากโรงเก็บฟืนออกมา เมื่อเห็นว่าชิงอี้พาหูจื่อออกไปแล้ว เธอก็ไม่รู้สึกกังวลอีกต่อไป เธอถือไม้ไว้ในมือข้างหนึ่ง ตบเบาๆ บนฝ่ามืออีกข้าง และเดินไปหาภรรยาคนที่สองทีละก้าว “ใครทำขาหูจื่อหัก?” เซียวเถาที่เดินตามหลังมา</p>\n<p>ชี้ไปที่สาวใช้ร่างใหญ่ทันทีเมื่อได้ยินคำถาม “คุณหนู นั่นเธอ!” สาวใช้ตกใจและถอยหลังไปสองก้าวโดยสัญชาตญาณ “คุณหญิงรอง...” คุณหญิงรองต้องรีบลุกขึ้นเพื่อปกป้องพวกเขา!</p>\n<p>“ฉัน… ฉันแค่บอกให้เขาถูกขัง ใครบอกให้เขาก่อเรื่องวุ่นวายแบบนี้ ยืนกรานถามฉันว่าป้าจงอยู่ที่ไหน?” คุณหญิงรองพูดออกมาโดยสัญชาตญาณ “นั่นเธอ! เธอบอกว่าถ้าขาของหูจื่อหัก เธอจะบอกเขาได้ว่าป้าจงอยู่ที่ไหน และหูจื่อจะไม่กล้าหนีไปไหน” สาวใช้มองคุณหญิงรองด้วยความไม่เชื่อ เธอจงรักภักดีต่อคุณหญิงรองอย่างชัดเจน ต้องการเพียงแค่แบ่งเบาภาระและแก้แค้นให้เธอ แต่ตอนนี้คุณหญิงรองกลับโทษเธอทุกเรื่อง? คุณหญิงรองพยายามลุกขึ้นยืนอย่างรวดเร็วและมองเธอด้วยสายตาตำหนิ เธอจะทำอย่างไรถ้าเธอยอมรับ? ฟู่จ้าวหนิงจะทำอย่างไรได้?</p>\n<p>สาวใช้เข้าใจความหมายของนายหญิงรองทันทีและตอบกลับว่า “คุณหนู เสือเป็นคนรับใช้ที่ชั่วร้ายและดื้อรั้น สมควรได้รับการลงโทษ” คุณหนูทำได้เพียงตะโกนเท่านั้น เธอจะทำอะไรเขาได้? “คนรับใช้ชั่วร้าย? คนรับใช้ดื้อรั้น?” ฟู่จ้าวหนิงเดินเข้ามาหาเธอ “เขาชั่วร้ายและดื้อรั้นเหมือนเจ้าหรือ?” “ฉันมาจากตระกูลสาขาที่สอง...” ก่อนที่สาวใช้จะพูดจบ ฟู่จ้าวหนิงก็เหวี่ยงไม้ลงมาฟาดที่ขาของเธอ *แตก!* “อ๊า!” สาวใช้ร้องและล้มลงกับพื้น ทุกคนตกตะลึง! เสี่ยวเถาเบิกตาโตและปิดปาก “พวกเจ้าคงลืมไปแล้วว่าเดิมทีตระกูลฟู่ไม่มีสาขาหลัก สาขาที่สอง หรือสาขาที่สาม” ฟู่จ้าวหนิงชี้ไม้ไปที่นายหญิงรอง “พวกเจ้าเคยอาศัยอยู่ในเมืองเล็กๆ</p>\n<p>และมาพึ่งพาปู่ของข้าก็เพราะท่านประสบความสำเร็จในเมืองหลวง” “ปู่ของข้าให้เจ้ามาอยู่ด้วยเพราะคิดว่าความเจริญรุ่งเรืองของครอบครัวเป็นสิ่งที่ดี แต่แล้วครอบครัวเราก็ประสบปัญหาและเสื่อมถอยลงเรื่อยๆ ตอนนี้เจ้าคิดว่าตัวเองเป็นเจ้าของตระกูลฟู่แล้วหรือ?” “อย่าลืมนะ บ้านทั้งหลังนี้เป็นของปู่ของข้า!</p>\n<p>พวกเจ้าแค่มาอาศัยอยู่ใต้หลังคาของคนอื่นเท่านั้น พวกเจ้าควรจะรู้จักฐานะของตัวเอง หรือไม่ก็ออกไปซะ” ฟู่จ้าวหนิงพูดแต่ละคำอย่างชัดเจน คุณหญิงรองและฟู่หมิงจูตกตะลึงราวกับจะเป็นลม ฟู่จ้าวหนิงพูดอะไรนะ! เธอต้องการไล่พวกเขาออกไปจริงๆหรือ? พวกเขาลืมไปแล้วจริงๆหรือว่าตระกูลฟู่เป็นของใคร ตลอดหลายปีที่ผ่านมา การยอมตามใจของท่านผู้เฒ่าฟู่ทำให้พวกเขามีภาพลวงตาว่าที่แห่งนี้เป็นของพวกเขาทั้งหมด ตอนนี้คำพูดของฟู่จ้าวหนิงทำให้พวกเขาตื่นขึ้นมาอย่างกะทันหัน “ใครก็ตามที่กล้าก่อเรื่องในลานบ้านของเราอีก ฉันจะหักขาพวกมัน! และฉันต้องการให้ป้าจงกลับมาภายในหนึ่งชั่วโมง มิเช่นนั้น...” ฟู่จ้าวหนิงมองไปที่คุณหญิงรอง พร้อมกับทำท่าทางราวกับจะฆ่าเธอ คุณหญิงรองแทบจะเป็นลม นี่คือฟู่จ้าวหนิงหรือ?</p>\n<p>เธอเสียสติไปแล้วหรือ? ฟู่จ้าวหนิงพูดต่ออีกประโยค โยนไม้เท้าทิ้งไป “เสี่ยวเถา ไปกันเถอะ” เสี่ยวเถามึนงงไปหมด และเดินตามฟู่จ้าวหนิงกลับไปที่ลานบ้านของท่านอาจารย์โดยไม่รู้ตัว เธอมองตามหลังฟู่จ้าวหนิงตลอดทาง ไม่สามารถตั้งสติได้ คุณหนูหักขาผู้หญิงใจร้ายคนนั้นจริงๆหรือ? “คุณหนู ถ้าคุณหญิงรองไม่พาป้าจงกลับมาล่ะคะ?” เสี่ยวเถายังคงกังวล ฟู่จ้าวหนิงหน้ามืดลง “เธอไม่กล้าหรอก” คุณหญิงรองต้องพาป้าจงกลับมาก่อนถึงจะหาทางจัดการกับเธอได้ &quot;จ้าวหนิง...&quot; ท่านอาจารย์ฟู่เรียกชื่อเธออย่างแผ่วเบา</p>"}, "19": {"chapter_number": 19, "chapter_title": "第19章夫君對我好", "content": "<p>ฟู่จ้าวหนิงรีบวิ่งไปที่ข้างเตียง คุกเข่าลง และจับมือเขา “ท่านปู่ ผมอยู่นี่ครับ” คุณปู่ฟู่ค่อยๆ ลืมตาขึ้น แสงในดวงตายังคงพร่ามัวเล็กน้อย ก่อนจะค่อยๆ กลับมามองเห็นได้ชัดเจนขึ้น ลุงจงที่กำลังเช็ดน้ำตาด้วยความเสียใจที่เห็นลูกชายอยู่ในสภาพย่ำแย่ ก็ดีใจมากที่เห็นว่าคุณปู่ฟื้นขึ้นมาจริงๆ “คุณปู่ฟื้นแล้ว!” พวกเขาคิดว่าคุณปู่คงไม่รอดแล้ว แต่ไม่คาดคิดเลยว่าคุณหนูช่วยเขาไว้ได้! คุณหนูช่างน่าทึ่งจริงๆ! “จ้าวหนิง สิ่งที่ป้าทวดของเจ้าพูดเป็นความจริงหรือเปล่า?” คุณปู่ฟู่จับมือของฟู่จ้าวหนิงแน่น เขารู้สึกถึงชิ้นโสมในปาก รสหวานของโสมทำให้เขารู้สึกดีขึ้นเล็กน้อย แต่ในขณะนี้เขาไม่สนใจเรื่องนั้น</p>\n<p>เขาเพียงต้องการรู้ว่าหลานสาวสุดที่รักของเขาถูกสำนักเจ้าชายเซียวปฏิเสธจริงๆ หรือไม่ “เจ้าชายเสี่ยว...เจ้าชายเสี่ยวปฏิเสธเจ้ากลางถนนจริงหรือ?” คุณปู่ฟู่ถามอย่างรีบร้อน จากนั้นก็ไอออกมา เสียงไอของเขาเหมือนกังหันลมหมุนอยู่ในลำคอ ปอดของเขามีเสียงเหมือนมีรูพรุน ทำให้ทุกคนใจหายวาบ คุณปู่ฟู่จ้าวหนิงรีบใช้นิ้วโป้งและนิ้วชี้กดลง “คุณปู่ ไม่ต้องห่วงค่ะ!</p>\n<p>ฉันบอกแล้วไม่ใช่เหรอ? ตอนนี้ฉันแต่งงานกับคนที่ดีกว่าแล้ว เสี่ยวเหยียนจิงไม่ดีพอสำหรับฉัน ฉันเป็นคนที่ไม่ต้องการเขาเอง สามีของฉันดีกว่าเขามาก!” “จริงเหรอ?” คุณปู่ฟู่คิดว่าเธอกำลังฝันอยู่เมื่อได้ยินคำพูดของเธอ “จริงด้วย ชิงอี้ เชิญมานี่สักครู่” คุณปู่ฟู่จ้าวหนิงหันไปมองชิงอี้ทันที ชิงอี้: ฉันต้องถูกใช้ซ้ำอีกแล้วเหรอ? ถึงแม้จะคิดอย่างนั้น เธอก็ยังเดินไปที่ข้างเตียง “คุณปู่คะ นี่คือทหารองครักษ์ที่สามีส่งมาคุ้มครองหนู ชื่อชิงอี้ สามีรู้ว่าหนูเป็นห่วงคุณปู่ จึงส่งหนูมาพร้อมกับโสมและสมุนไพรมาให้ คุณปู่ได้ลองชิมโสมบ้างหรือยังคะ?” ดวงตาของท่านปู่ฟู่สว่างขึ้นเล็กน้อย และพยักหน้าอย่างยากลำบาก</p>\n<p>มีโสมอยู่จริง ๆ แต่เขายังคงมองไปที่ชิงอี้ สายตาที่เต็มไปด้วยคำถามนั้นชัดเจน ชิงอี้เข้าใจความหมายเบื้องหลังสายตาของเขา เขาถามว่าสิ่งที่ฟู่จ้าวหนิงพูดเป็นความจริงหรือไม่ ฟู่จ้าวหนิงก็มองเขาเช่นกัน “ชิงอี้ รีบไปบอกคุณปู่สิคะ สามีกับหนูได้แต่งงานกันแล้วหรือยัง?</p>\n<p>ครอบครัวของเขามีฐานะดีไหม? เขาดีกับหนูไหม?” คำตอบของทั้งสามคำถามดูเหมือนจะเป็นใช่ทั้งหมด เพราะอย่างไรก็ตาม องค์ชายก็ต้องการเจ้าหญิง และคุณหนูฟู่ก็ปรากฏตัวขึ้นพอดี องค์ชายไม่มีเหตุผลที่จะปฏิบัติต่อเธออย่างไม่ดี การปฏิบัติต่อเธอด้วยความสุภาพก็เพียงพอแล้วไม่ใช่หรือ? เมื่อถูกทั้งปู่และหลานมองมาพร้อมกัน ชิงอี้รู้สึกกดดันเล็กน้อย “ครับ คุณปู่ ไม่ต้องห่วงนะครับ” แม้จะกดดัน แต่เขาก็ยังพูดออกไป ความดันโลหิตของคุณปู่ฟู่ที่อัดอั้นอยู่ในลำคอค่อยๆ ลดลง และเขาก็ถอนหายใจยาว “จ้าวหนิง คุณปู่ไม่รู้ว่าเกิดอะไรขึ้นกับเจ้า…” “คุณปู่ ถ้าอยากรู้ก็ดูแลตัวเองดีๆ นะ เดี๋ยวก็รู้เองเมื่อหายดีแล้ว” “โอเคๆ</p>\n<p>ผมไม่เป็นไรหรอก…” คุณปู่ฟู่ก็หลับไปอีกครั้งก่อนที่จะพูดจบ “คุณหนู คุณปู่…?” ลุงจงและเสี่ยวเถาต่างตกใจ ฟู่จ้าวหนิงตรวจชีพจรของคุณปู่ฟู่อีกครั้งแล้วถอนหายใจ “คราวนี้ท่านหายดีแล้ว แต่ยังอ่อนเพลียจากการฝังเข็มและหลับไปอีกแล้ว ไม่เป็นไร ให้ท่านพักผ่อนเถอะ” เมื่อได้ยินว่าคุณปู่ฟู่หลับแล้ว ลุงจงและเสี่ยวเถาก็ถอนหายใจโล่งอก ฟู่จ้าวหนิงเรียกคุณลุงจงมาคุยด้วยเสียงเบา “คุณลุงจง ฉันจะไปดูอาการบาดเจ็บของเสือเอง ไปที่คลินิกซื้อยาและของที่คุณปู่ต้องการด้วยนะคะ” จากนั้นฟู่จ้าวหนิงก็ถอดกำไลทองประดับอัญมณีออกจากข้อมือ “เอาไปแลกสิ บอกเจ้าของร้านให้เก็บไว้ ฉันจะไปเอาคืนภายในไม่กี่วัน” “ค่ะ”</p>\n<p>คุณลุงจงเคยทำแบบนี้มาก่อนแล้วจึงไม่ถามอะไรอีก เขาหยิบกำไลแล้วเหน็บไว้ในแขนเสื้อ จากนั้นก็มองฟู่จ้าวหนิงด้วยความคาดหวัง “คุณหนู ขาของเสือบาดเจ็บหนักหรือเปล่าครับ?” เสือถูกวางลงบนโซฟาด้านข้าง ฟู่จ้าวหนิงเดินเข้าไปคว้าขากางเกงของเสือด้วยมือทั้งสองข้างอย่างเด็ดขาด แล้วฉีกออกอย่างแรง “ฉีก!” ขากางเกงของเสือขาดกระจุย ชิงอี้ตกตะลึง คุณหนูฟู่ช่างไม่ธรรมดาจริงๆ เป็นคนดุร้ายจริงๆ “เสี่ยวเถา ไปเอาน้ำร้อนมาหน่อย ลุงจง ไปซื้อยามาก่อนนะ อาจจะต้องไปหลายรอบ ซื้อยาทำความสะอาดแผลและยาห้ามเลือดมาก่อน” ฟู่จ้าวหนิงไม่แม้แต่จะเงยหน้าขึ้นมามอง แถมยังสั่งงานชิงอี้อีก “ชิงอี้ ไปหาไม้กระดานตรงๆ สองแผ่น” “ครับ คุณหนู!”</p>\n<p>ลุงจงคว้ากำไลแล้ววิ่งออกไป ในรถม้าข้างนอก องค์ชายจุนลืมตาขึ้น “ไป ตามพวกเขาไปอีกครั้ง” เขาได้ยินเสียงคนรับใช้วิ่งออกไปอีกครั้ง ลุงจงไม่สนใจและวิ่งไปที่คลินิกอีกครั้ง เขากลับมาพร้อมยาจำนวนมากในเวลาไม่นานและรีบเข้าไปข้างใน ยามก็กลับมาอย่างรวดเร็วและยื่นกำไลทองคำให้องค์ชายจุน “ฝ่าบาท ครั้งนี้เขาจำนำกำไลนี้ไว้ ซื้อยาและผ้าพันแผลมาก่อน และบอกกับเจ้าของร้านว่าเขาต้องการยาเพิ่มในภายหลัง ข้าได้บอกกับเจ้าของร้านแล้วว่าให้มอบให้เขาเมื่อยาเพิ่มแล้ว และจ่ายเงินทีหลัง” เจ้าชายจุนมองกำไลในมือ วางมันไว้ข้างๆ ปิ่นปักผมอันก่อนหน้า เห็นได้ชัดว่าเป็นชุดเดียวกัน เยี่ยมมาก</p>\n<p>มันจะช่วยชดเชยเครื่องประดับสองชิ้นจากบ้านของเจ้าชายจุนเมื่อเขากลับไป “อืม” ฟู่จ้าวหนิงฆ่าเชื้อหูจื่อด้วยเหล้า แล้วรีบแทงเข็มห้าหรือหกเล่มเข้าไปในขาของหูจื่อ ชิงอี้หาแผ่นไม้ที่เหมาะสมได้จริงๆ เธอให้เสี่ยวเถาไปล้างและเช็ดให้แห้ง จากนั้นก็เอื้อมมือไปคลำกระดูกขาที่หักของหูจื่อทีละนิ้วๆ สีหน้าของเธอดูจริงจัง เทคนิคของเธอเชี่ยวชาญและมีประสบการณ์ แผ่รัศมีแห่งความมุ่งมั่นที่ทำให้ไม่มีใครกล้ารบกวนเธอ ชิงอี้มองดูเธอ แล้วเห็นเธอกำขาของหูจื่อด้วยมือทั้งสองข้างและออกแรงอย่างกะทันหัน—แตก!</p>\n<p>กระดูกกลับเข้าที่แล้ว! ฟู่ ชิงอี้อ้าปากค้าง “แผ่นไม้ ผ้าพันแผล” ฟู่จ้าวหนิงพูดด้วยเสียงทุ้ม เสี่ยวเถารีบส่งของให้ ฟู่จ้าวหนิงใช้แผ่นไม้สองแผ่นประคองขาของหูจื่อและพันด้วยผ้าพันแผล กระบวนการทั้งหมดดำเนินไปโดยไม่มีการหยุดชะงักหรือลังเลใดๆ “ลุงจง ขาของหูจื่อต้องได้รับการดูแลอย่างดีนับจากนี้ไป กระดูกหักต้องใช้เวลาร้อยวันในการฟื้นตัว อย่าให้เขาเคลื่อนไหวมากเกินไป” ฟู่จ้าวหนิงลุกขึ้นยืน คิดอยู่ครู่หนึ่ง แล้วกล่าวว่า “คุณหญิงรองจะไปรับป้าจงกลับมา ข้าต้องกลับก่อน พวกท่านทุกคนอยู่บ้านดูแลคุณปู่และหูจื่อให้ดีตลอดสามวัน หากมีใครมาก่อเรื่อง ให้ปิดประตูให้สนิทและอย่าไปสนใจ รอข้ากลับมา”</p>\n<p>“ถ้าพวกมันกล้าบุกเข้ามา ให้คว้ามีดมาฟันพวกมันให้หมด ข้าจะรับผิดชอบทุกอย่างที่เกิดขึ้น!” เดิมทีฟู่จ้าวหนิงลังเลที่จะจากไปแบบนี้ แต่เธอก็ได้ไปเข้าเฝ้าจักรพรรดิและจักรพรรดินีแล้ว และเป็นไปไม่ได้ที่จะไม่ขึ้นไปบนเขาลั่วเยว่ในวันพรุ่งนี้ “ไม่ต้องห่วงครับ คุณหนู ข้ารับใช้คนนี้จะปกป้องเจ้านาย แม้ว่าข้าจะต้องแลกด้วยชีวิตก็ตาม” ลุงจงรีบกล่าว “ข้าด้วย!” เสี่ยวเถาพยักหน้าอย่างแรงเช่นกัน หลังจากอธิบายวิธีการเตรียมและเปลี่ยนยาแล้ว ฟู่จ้าวหนิงก็หันหลังกลับทุกๆ สามก้าวและมุ่งหน้าไปยังประตูหลัง เมื่อเห็นม้าป่า เธอก็ถอนหายใจโล่งอก “โชคดีที่มันไม่หนีไป มิฉะนั้นฉันคงไม่รู้ว่าจะชดเชยให้องค์ชายอย่างไร”</p>\n<p>เสียงขององค์ชายจุนดังมาจากประตู “เจ้าหญิงน้อยของข้า กลับไปได้แล้วใช่ไหม”</p>"}, "20": {"chapter_number": 20, "chapter_title": "第20章給她報仇", "content": "<p>ฟู่จ้าวหนิงจึงรู้ว่าองค์ชายจุนเสด็จมาด้วยพระองค์เอง เมื่อเห็นชิงอี้ เธอก็คิดว่าชิงอี้มาคนเดียว “เราบอกแล้วไม่ใช่เหรอว่ายังไม่แน่ใจว่านางเป็นพระสนมเอกหรือเปล่า?” ฟู่จ้าวหนิงรู้สึกผิดเล็กน้อยเมื่อเห็นองค์ชายจุน เธอพยายามระงับความอยากที่จะลูบผมตัวเอง บางทีองค์ชายจุนอาจจะไม่ทันสังเกตเครื่องประดับผมและกำไลของเธอ? ถ้าหากเขาพบว่าเธอใช้เครื่องประดับที่ยืมมาจากบ้านขององค์ชายจุนในวันแต่งงานล่ะ? พรุ่งนี้เธอต้องไปเก็บสมุนไพรอย่างขยันขันแข็งในหุบเขาลั่วเยว่เพื่อนำของสองชิ้นนั้นไปแลกคืนที่คลินิก “ท่านอาจารย์ ม้าป่าตัวนี้...” ชิงอี้เดินเข้ามาอย่างเก้ๆ กังๆ “ข้าเอามันกลับไปไม่ได้”</p>\n<p>เขาคิดว่าฟู่จ้าวหนิงจะต้องนั่งรถม้าไปกับองค์ชายอย่างแน่นอน และเขาจะต้องเป็นคนพาม้าป่าตัวนี้กลับไป แต่ทันทีที่เขาเข้าใกล้ ม้าก็เริ่มหายใจหอบและเดินอย่างกระสับกระส่าย ดูเหมือนจะเตะเขาได้ทุกเมื่อ ชิงอี้ตกใจและทำอะไรไม่ถูก ทำไมถึงอนุญาตให้คุณหนูฟู่ขี่ม้าตัวนี้ได้?</p>\n<p>แม้ไม่มีอาน เธอยังขี่ได้เร็วราวกับสายลมจากบ้านขององค์ชายจุนไปยังตระกูลฟู่ได้? องค์ชายจุนมองฟู่จ้าวหนิงด้วยสายตาที่เต็มไปด้วยความสงสัย ฟู่จ้าวหนิงแตะปลายจมูก “ฉันจะขี่กลับเอง” เธอหันหลังเดินไปหาม้า เอื้อมมือไปแตะคอของมัน แล้วขึ้นขี่อย่างคล่องแคล่ว องค์ชายจุนและชิงอี้มองดูเธอร้องเบาๆ แล้วควบม้าออกไปอย่างรวดเร็วอีกครั้ง ม้าไม่ขัดขืนเลย! “ชิงอี้ นี่คือสิ่งที่เจ้าเรียกว่าราชาแห่งม้าป่าผู้หยิ่งยโสและกล้าหาญหรือ? สายเลือดบริสุทธิ์ที่สาบสูญ?</p>\n<p>ราชาแห่งม้า?” เสียงขององค์ชายจุนเย็นชาดุจน้ำแข็ง ชิงอี้ก้มหน้าลง ไม่กล้าตอบ “ช่างเถอะ กลับไปที่บ้านกันเถอะ” องค์ชายจุนลดม่านรถม้าลง แล้วเอื้อมมือไปหยิบกำไลทองคำฝังลาย นิ้วของเขาสัมผัสพื้นผิวเบาๆ ขณะที่เขาก้มหน้าลงครุ่นคิด วันนี้หลี่จือเหยาเดินทางกลับบ้าน และทันทีที่เปลี่ยนเสื้อผ้าเสร็จ เธอก็รีบวิ่งเข้าไปในคลินิกของหมอหลี่ ร้องไห้สะอึกสะอื้นเล่าให้หมอฟังว่าเธอถูกดูถูกและถูกรังแก หมอหลี่ผู้รักลูกสาวมากฟังเรื่องราวของเธอและมองดูเสื้อผ้าที่ขาดวิ่นที่เธอนำมา ใบหน้าของเขาเปลี่ยนเป็นโกรธจัด เคราสั่นเทา “แย่มาก! นี่มันแย่ที่สุด! ลูกสาวของฉัน ลูกสาวของหลี่เหวินฉาน ถูกรังแกถึงขนาดนี้!” “พ่อ! ฉันอายเกินกว่าจะเจอใคร!</p>\n<p>ว้าาา ฉันไม่อยากมีชีวิตอยู่อีกแล้ว” หลี่จือเหยาร้องไห้ เธอไม่เคยถูกดูถูกเหยียดหยามมากขนาดนี้มาก่อนในชีวิต เธอจะกล้าไปเจอใครอีกได้อย่างไร? “เหยาเอ๋อร์ อย่าร้องไห้ อย่าร้องไห้ มันทำให้ฉันเจ็บปวดใจ!” หมอหลี่รีบปลอบโยนเธอ “ไม่ต้องห่วง ไม่มีใครข้างนอกกล้าหัวเราะเยาะเจ้าหรอก ข้าจะไปที่สมาคมแพทย์ผู้ใจบุญเดี๋ยวนี้ แล้วเรียกแพทย์ทุกคนในเมืองหลวงมา ใครก็ตามที่กล้าหัวเราะเยาะเจ้า จะไม่มีโอกาสซื้อยาหรือพบแพทย์ในเมืองหลวงอีกเลย!” “หนูอยากให้ฟู่จ้าวหนิงตายอย่างทรมาน พ่อ! หนูทนรับความอัปยศนี้ไม่ได้! พ่อต้องแก้แค้นให้หนู!” หลี่จือเหยาร้องไห้จนตาบวม “แก้แค้น แก้แค้น!</p>\n<p>พ่อจะแก้แค้นให้เจ้าอย่างแน่นอน เจ้าอยากให้เธอตายแบบไหน? ข้ารู้จักกับเจ้าเมืองดี ข้าจะให้เขาจับเธอไปขังคุก และให้ผู้คุมปฏิบัติกับเธออย่างดี!” สีหน้าของหมอหลี่ดุร้ายอย่างยิ่งขณะพูด ไม่ว่าอย่างไร เขาก็จะไม่ปล่อยให้ใครก็ตามที่รังแกลูกสาวสุดที่รักของเขาลอยนวลไปได้ “ไม่ค่ะ ท่านพ่อ ปล่อยให้เธอตายแบบนี้มันง่ายเกินไปสำหรับเธอ ฉันอยากให้เธอเจอชะตากรรมที่เลวร้ายยิ่งกว่าความตาย ให้ชื่อเสียงของเธอเสียหายยับเยิน ให้คนทั้งเมืองหัวเราะเยาะ ให้ถูกปฏิบัติเหมือนหนูข้างถนน!” หลี่จือเหยาเกลียดหน้าฟู่จ้าวหนิงอย่างสุดซึ้ง “เอาล่ะ เอาล่ะ อะไรก็ได้ที่คุณพูด คุณรออยู่ที่บ้าน ฉันจะส่งคนไปสืบเรื่องของตระกูลฟู่เพื่อหาทางรักษาให้เธอ!” ดวงตาของหมอหลี่หม่นหมอง สิ่งที่เขาทนไม่ได้ที่สุดคือเหยาเอ๋อร์เลี้ยงดูเขามาอย่างชัดเจน แต่ฟู่จ้าวหนิงกลับไม่ให้ความสำคัญกับเขา!</p>\n<p>เธอควรจะตัวสั่นด้วยความกลัวและแสดงความเคารพไม่ใช่เหรอ? หลังจากหมอหลี่จากไป หลี่จือเหยาเพิ่งนึกขึ้นได้ว่าเธอยังไม่ทันได้พูดถึงเรื่องที่ฟู่จ้าวหนิงไปขอให้ชายคนหนึ่งแต่งงานใหม่ และชายคนนั้นก็คือองค์ชายจุน! แต่แล้วเธอก็คิดว่า แล้วถ้าเขาเป็นองค์ชายจุนล่ะ? เจ้าชายจุนก็ไม่ต่างอะไรจากจักรพรรดิและจักรพรรดินีไม่ใช่เหรอ?</p>\n<p>พ่อของนางเป็นบุคคลที่แม้แต่จักรพรรดินียังให้ความเคารพ! เมื่อคิดเช่นนี้ หลี่จือเหยาจึงรู้สึกว่ามันไม่ใช่เรื่องใหญ่ นางจึงสั่งน้ำมูก เตรียมรับประทานอาหารมื้อใหญ่และรอให้พ่อของนางมาแก้แค้นให้ ในขณะเดียวกัน ที่บ้านพักขององค์ชายเซียว ในห้องนอนขององค์รัชทายาท ประตูถูกเตะเปิดด้วยเสียง &quot;ปัง&quot; ทำให้เซียวเหยียนจิงเงยหน้าขึ้นอย่างรวดเร็วและตะโกนด้วยความโกรธว่า &quot;ไอ้สารเลวคนไหนกล้าทำแบบนี้...ลุง?&quot; คนที่เข้ามาคือเซียวชิงซาน ลุงขององค์ชายเซียวและลุงของเซียวเหยียนจิง เซียวชิงซานไม่ได้อาศัยอยู่ในบ้านพักขององค์ชายเซียว เพราะพวกเขาเป็นเพียงญาติกัน อย่างไรก็ตาม</p>\n<p>เนื่องจากเซียวเหยียนจิงรักเขามากตั้งแต่ยังเด็ก และมักจะวิ่งไปบ้านลุงของเขาหลายวันหลังจากถูกพ่อลงโทษ เซียวชิงซานจึงให้ความเคารพเขาเสมอ แม้แต่ตอนที่องค์ชายเซียวยังเด็ก ลุงของเขานี่เองที่เป็นคนสอนขี่ม้าและยิงธนูให้ ดังนั้นเซียวชิงซานจึงมีตำแหน่งสูงในบ้านขององค์ชายเซียว วันนี้เป็นวันแต่งงานของเซียวเหยียนจิง และแน่นอนว่าครอบครัวของเซียวชิงซานได้รับเชิญ อย่างไรก็ตาม ก่อนที่เกี้ยวเจ้าสาวจะเข้าไปในบ้านขององค์ชายเซียว ฟู่จ้าวหนิงก็ได้ยกเลิกการหมั้นกับเขาบนถนนแล้ว หลังจากทราบเหตุผล องค์ชายเซียวจึงรีบส่งคนไปแจ้งครอบครัวของเซียวชิงซานว่าไม่ต้องมาก็ได้ เพราะจะไม่มีงานเลี้ยงแต่งงาน</p>\n<p>แต่ไม่คาดคิดว่าเซียวชิงซานจะรีบมาสายขนาดนี้ “ท่านยังถือว่าข้าเป็นลุงใหญ่ของท่านอยู่อีกหรือ?” เซียวชิงซานโกรธจัดเมื่อเห็นเซียวเหยียนจิงสวมชุดสีขาวล้วน “ทำไมท่านถึงปล่อยให้การแต่งงานครั้งนี้ล้มเหลว?</p>\n<p>ข้าได้ยินมาว่าท่านไม่ได้ไปรับเจ้าสาวที่ตระกูลฟู่ในวันนี้ และท่านก็ไม่ได้เตรียมชุดมงคลสำหรับวันแต่งงานด้วยซ้ำ แค่สวมชุดสีขาวล้วน ทำให้คุณหนูฟู่โกรธ” เซียวเหยียนจิงไม่คาดคิดว่าเซียวชิงซานจะโกรธขนาดนี้ “ท่านลุง ไม่ได้ยินเรื่องที่เกิดขึ้นหรือ? ข้า องค์รัชทายาทผู้ทรงเกียรติแห่งตระกูลเซียว ได้แสดงความใจกว้างด้วยการทำตามข้อตกลงการแต่งงานและแต่งงานกับฟู่จ้าวหนิงแล้ว ก่อนหน้านี้ตอนที่นางรบเร้าให้ข้าแต่งงาน นางบอกว่าถ้าข้าไม่ไปร่วมพิธีก็ไม่เป็นไร ข้าก็แค่ทำตามที่นางบอก!” เซียวเหยียนจิงรู้สึกเจ็บปวดภายในใจอยู่แล้ว วันนี้เขายังเดือดดาลด้วยความโกรธ ในขณะเดียวกันเขาก็เสียหน้าและกลายเป็นตัวตลกของคนทั้งเมือง เขาแทบจะระเบิดออกมา “ไร้สาระ!</p>\n<p>เจ้าไม่ไปเพียงเพราะนางบอกว่าเจ้าไม่ต้องไปจริงๆ หรือ? นั่นหมายความว่านางกำลังจะยกเลิกการหมั้นกับเจ้าแล้วใช่ไหม?” เซียวชิงซานผิดหวังอย่างมาก “ยกเลิกไปเลย! ต่อให้นางไม่ยกเลิกการหมั้น ข้า องค์รัชทายาท ก็จะหย่ากับนางอยู่ดี!” องค์รัชทายาทแห่งตระกูลเซียวรีบวิ่งเข้ามา “ท่านลุง เรื่องมาถึงขนาดนี้แล้ว ทำไมท่านถึงโกรธขนาดนี้?” องค์รัชทายาทแห่งตระกูลเซียวมีอายุอยู่ในวัยกลางคน แต่มีฐานะดีและดูแลตัวเองเป็นอย่างดี ยังคงดูสง่างามและเป็นผู้ใหญ่ เซียวเหยียนจิงหน้าตาเหมือนท่านมาก เห็นได้ชัดว่าเป็นพ่อลูกกัน “ฉันเคยบอกเจ้าแล้วไม่ใช่เหรอ? ตอนที่เหยียนจิงยังหนุ่ม ฉันให้พระชั้นสูงคำนวณชะตาชีวิตของเขา ชะตาของเขาต้องการการสนับสนุนจากหญิงสาวจากตระกูลฟู่ ถ้าเขาได้แต่งงานกับหญิงสาวจากตระกูลฟู่ เขาจะมั่นคงและเจริญรุ่งเรืองในอนาคต!”</p>"}, "21": {"chapter_number": 21, "chapter_title": "第21章新房不讓進了", "content": "<p>ฟู่ชิงซานห่วงใยหลานชายคนนี้อย่างจริงใจ “นั่นมันไร้สาระ” เจ้าชายเซียวรู้สึกไม่พอใจเล็กน้อยที่เห็นเขาดูถูกลูกชายตัวเองแบบนั้น “ตอนนั้นลุงยืนกรานให้คุณหญิงฟู่แต่งงานกับเหยียนจิงและหลานสาวของเธอ ดูสภาพของตระกูลฟู่ตอนนี้สิ! ฐานะของพวกเขาไม่เคยเหมาะสมกับเราเลย” เขาโกรธฟู่จ้าวหนิงมากหลังจากได้ยินเรื่องราวในวันนี้ คฤหาสน์ของเจ้าชายเซียวถูกเยาะเย้ยเพราะเธอ ตระกูลฟู่กำลังตกต่ำ และฟู่จ้าวหนิงก็อกตัญญูจริงๆ “ใช่แล้ว ท่านปู่ ท่านไม่อยากให้ข้าแต่งงานกับเจ้าหญิงที่มีฐานะทางสังคมเท่าเทียมกับคฤหาสน์ของเจ้าชายหรือครับ?” เซียวเหยียนจิงพูดออกมาด้วยความกระวนกระวายและเจ็บปวดในอก “ท่านปู่ เป็นเพราะท่านเคยมีอดีตกับคุณหญิงฟู่ตอนหนุ่มๆ หรือเปล่าครับ...” “เซียวเหยียนจิง!” ฟู่ชิงซานคำรามด้วยความไม่เชื่อ เจ้าเด็กนี่กล้าดียังไงมาใช้เรื่องแบบนี้มาเยาะเย้ยและสงสัยท่าน?</p>\n<p>“ท่านลุง วันนี้เหยียนจิงบาดเจ็บอยู่แล้ว ข้าได้ส่งคนไปตามหมอหลี่มาตรวจอาการแล้ว ท่านมาแต่ไม่แม้แต่จะดูอาการบาดเจ็บหรืออาการของเขาเลย กลับมาดุด่าเขาแบบนั้น ท่านไม่กลัวว่าเหยียนจิงจะเสียใจบ้างหรือ?” “หมายความว่าท่านก็เสียใจด้วยหรือ?” ใบหน้าของฟู่ชิงซานมืดครึ้มลง เขาไม่อยากโต้เถียงอีกต่อไปแล้ว เพราะอย่างไรฟู่จ้าวหนิงก็เป็นพระสนมของจุนแล้ว “ก็ได้ ข้ายุ่งเรื่องคนอื่น ข้าจะไปแล้วนะ” ฟู่ชิงซานหันหลังเดินจากไป สิ่งที่ทำให้เขารู้สึกหนาวสั่นคือทั้งองค์ชายเซียวและเซียวเหยียนจิงไม่ได้พยายามห้ามเขา พวกเขาปล่อยให้เขาไปเฉยๆ “ท่านพ่อ ท่านปู่...” ฟู่เหยียนจิงพูดหลังจากที่พวกเขาจากไปแล้ว องค์ชายเซียวโบกมือ</p>\n<p>“ท่านแก่แล้ว ท่านเกษียณจากราชการนานแล้ว ส่วนเจ้า เจ้าต้องคิดหาวิธีกู้หน้าคืน!” “ตราบใดที่ข้าได้แต่งงานกับพระสนมที่ดีกว่าฟู่จ้าวหนิงร้อยเท่า ข้าก็จะกู้ศักดิ์ศรีที่เสียไปได้เอง” เซียวเหยียนจิงครุ่นคิดอยู่ทั้งคืนและในที่สุดก็คิดแผนออก “ท่านไม่อยากแต่งงานกับหลี่จือเหยาหรือ?” องค์ชายเซียวขมวดคิ้ว เขาไม่ค่อยกระตือรือร้นนัก เพราะถึงแม้หลี่จือเหยาจะมีบิดาเป็นแพทย์ผู้มีชื่อเสียง แต่เธอก็ไม่มีอะไรจะเสนอมากนัก และนิสัยก็ไม่น่าคบหา หากเธอไม่ก่อเรื่องก่อน ราชวงศ์เซียวก็คงไม่ได้รับความอัปยศอดสูเช่นนี้ “เธอจะคู่ควรกับข้าได้อย่างไร?” เซียวเหยียนจิงกล่าวอย่างภาคภูมิใจ “ข้าอยากแต่งงานกับองค์หญิงหลิงเล่อ!”</p>\n<p>องค์หญิงหลิงเล่อต่างหากที่คู่ควรกับเขา “ดี!” ดวงตาขององค์ชายเซียวเป็นประกาย ผู้สมัครคนนี้มีคุณสมบัติเหมาะสม แต่แล้วเขาก็คิด “แต่เราต้องไม่ทำให้แพทย์หลี่ขุ่นเคือง” “ไม่เป็นไร ข้าสามารถควบคุมหลี่จือเหยาได้ อย่างแย่ที่สุด หลังจากแต่งงานกับเจ้าหญิงหลิงเล่อแล้ว ข้าก็จะรับหลี่จือเหยามาเป็นสนม” เขาก็ไม่ยอมปล่อยหมอหลี่ไปเช่นกัน! เมื่อเห็นว่าเขามีแผนแล้ว เจ้าชายเซียวก็ถอนหายใจโล่งอกและตบไหล่เขาเบาๆ “ถูกต้องแล้ว ดีแล้วที่ท่านคิดและตั้งใจเช่นนี้” เซียวเหยียนจิงกล่าวเสริม “แต่ข้าจะปล่อยฟู่จ้าวหนิงไปแบบนี้ไม่ได้!</p>\n<p>พรุ่งนี้เธอก็จะไปภูเขาลั่วเยว่ไม่ใช่เหรอ? ข้าจะทำให้เธอเสียใจ!” มีแต่เขาเท่านั้นที่สามารถยกเลิกการหมั้นได้ ฟู่จ้าวหนิงจะมีโอกาสได้อย่างไร? เธอยังกล้าดูถูกเขาแล้วยังไปแต่งงานกับองค์ชายจุนอีก! “ถูกต้องแล้ว เราปล่อยให้เธอเป็นสนมขององค์ชายจุนไม่ได้จริงๆ” เจ้าชายเซียวกล่าวด้วยน้ำเสียงหนักแน่น ฟู่จ้าวหนิงไม่รู้ว่ามีคนกี่คนที่พยายามสร้างความยากลำบากให้เธอ แต่เธอรู้ได้อย่างแน่นอนว่าการเดินทางไปค้นหายาบนภูเขาลั่วเยว่จะไม่ราบรื่น เมื่อกลับมาถึงที่พักขององค์ชายจุน เธอพาม้ากลับไปที่คอก และคนรับใช้ก็ตะลึงเมื่อเห็นมัน ม้าตัวนี้เชื่อฟังเธอจริงๆ หรือ?</p>\n<p>หลังจากฟู่จ้าวหนิงจากไป คนรับใช้ก็ลองหยิบอานม้าขึ้นมาและเดินเข้าไปหาม้า พูดเบาๆ อย่างจริงจังว่า “มาเถอะ ม้าที่ดี เป็นเด็กดี ฉันจะใส่อานให้ หลังจากใส่อานแล้ว เจ้าจะเป็นม้าประจำบ้านขององค์ชายจุน จากนี้ไปเจ้าจงลืมความดื้อรั้นของเจ้าไปซะ” “ฮี้!” ม้าสะดุ้งและกระโดด ทำให้เขาตกใจมากจนถอยหลังไปหลายก้าวทันที ไม่ได้! เจ้าหญิงทำได้อย่างไร? ฟู่จ้าวหนิงกลับไปที่ห้องหอ แต่ก็ถูกหยุดไว้ก่อนจะเข้าไปในลานบ้าน “คุณหนูฟู่ ท่านเข้าไปที่นี่ไม่ได้” ฟู่จ้าวหนิงตกตะลึง นี่คือห้องหอ เธอเพิ่งออกมาจากที่นี่ แล้วตอนนี้กลับไม่ได้รับอนุญาตให้เข้าไปหรือ? “เจ้าหญิง...คุณหนูฟู่!” หงจั่วรีบวิ่งเข้ามา</p>\n<p>เมื่อได้ยินการเปลี่ยนคำเรียกขานอย่างกะทันหัน ฟู่จ้าวหนิงก็เข้าใจ เพราะการทดสอบการค้นหายาที่ภูเขาลั่วเยว่ เธออาจไม่ได้เป็นภรรยาขององค์ชายจุนจริงๆ ตอนนี้ คนในวังได้รับคำสั่งไม่ให้เรียกเธอว่า “เจ้าหญิง” ชั่วคราว “คุณหนูฟู่ คืนนี้มีการทำความสะอาดลานบ้านของคุณ อีกไม่นานก็จะเสร็จแล้ว ทำไมคุณไม่ไปกับผมก่อนล่ะ?” หงจั่วลังเลเล็กน้อยที่จะมองฟู่จ้าวหนิง รู้สึกผิดเล็กน้อย ฟู่จ้าวหนิงได้ทำพิธีแต่งงานกับองค์ชายเรียบร้อยแล้ว เมื่อผู้หญิงผ่านพิธีนี้แล้ว เธอก็แต่งงานอย่างเป็นทางการแล้ว จะไม่ถือว่าเป็นทางการได้อย่างไร?</p>\n<p>แต่มันเป็นพระประสงค์ของฮ่องเต้ และพวกเขาทำอะไรไม่ได้ หลังจากฟู่จ้าวหนิงออกไปแล้ว ขุนนางก็มาขอให้เตรียมลานรับรองสำหรับเธอ อย่างไรก็ตาม เวลาไม่เพียงพอ มันยังไม่พร้อม แต่องค์ชายจะต้องนอนเมื่อเสด็จกลับมาในคืนนี้ และพวกเขาไม่สามารถให้คุณหนูฟู่เข้าไปนอนในห้องนอนของพระองค์ได้ “ตกลง พาฉันไปที่นั่น” โชคดีที่ฟู่จ้าวหนิงไม่ได้ทำให้เรื่องยุ่งยากเลย และปล่อยให้เธอเป็นคนนำทาง หงจั่วถอนหายใจโล่งอก พวกเขาเดินมาได้ไกลพอสมควร หงจั่วก้มหน้าถือตะเกียงอธิบายภาพรวมของที่ประทับขององค์ชายให้ฟู่จ้าวหนิงฟัง เธอพูดอะไรมากกว่านี้ไม่ได้ นอกจากบอกว่าฟู่จ้าวหนิงไปที่ไหนได้บ้างและไปที่ไหนไม่ได้บ้าง</p>\n<p>“เพราะองค์ชายเสด็จกลับมาไม่บ่อย ที่ประทับจึงไม่ค่อยมีแขก ดังนั้นจึงไม่มีห้องรับแขกเตรียมไว้ ลานบ้านมักจะถูกปิดกั้น” การหาที่พักให้ฟู่จ้าวหนิงในเวลาอันสั้นนั้นค่อนข้างยุ่งยาก ก่อนหน้านี้ตอนที่องค์ชายไม่อยู่ ที่ประทับก็ค่อนข้างเล็ก ดังนั้นการจัดลานบ้านเล็กๆ ให้คุณหนูฟู่ดูเหมือนจะมากเกินไปหน่อยไม่ใช่หรือ? หงจั่วรู้สึกผิดมากขึ้นเรื่อยๆ ขณะที่พูด ไม่กล้าสบตาฟู่จ้าวหนิง “ฉันเข้าใจ ไม่เป็นไรค่ะ” ฟู่จ้าวหนิงไม่ได้คาดหวังอะไรมากกับองค์ชายจุน มันเป็นเพียงความสัมพันธ์ทางธุรกิจ เธอคาดหวังว่าเขาจะปฏิบัติต่อเธอเหมือนคนรักอันล้ำค่าในชั่วข้ามคืนหรือ?</p>\n<p>แต่หงจั่วรู้สึกว่ามีบางอย่างผิดปกติ คุณหนูฟู่ควรจะโกรธ เศร้า อับอาย และไม่สบายใจ ทำไมคุณหนูฟู่ถึงสงบและเยือกเย็นเช่นนี้? ลานเล็กๆ ที่คนรับใช้หามานั้นเรียกว่าลานเจียนเจีย ซึ่งค่อนข้างเล็ก สิ่งที่น่าอึดอัดที่สุดคือวัชพืชและต้นไม้ในลานไม่ได้ถูกตัดแต่งมากนัก และมีเพียงห้องด้านข้างสามห้อง: ห้องหลักอยู่ตรงกลาง ห้องด้านข้างซ้ายและขวา และห้องเก็บของเล็กๆ ที่มุม มันดูโทรมจริงๆ ฟู่จ้าวหนิงสังเกตเห็นความเย็นชาขององค์ชายจุนที่มีต่อเธออย่างกะทันหัน มันเป็นความตั้งใจหรือเปล่า? คฤหาสน์ขององค์ชายจุนนั้นใหญ่โตมาก เธอไม่เชื่อว่าพวกเขาหาลานที่เหมาะสมให้เธออยู่ไม่ได้! ขณะนั้น โคมไฟแขวนอยู่ใต้ชายคาบ้าน</p>\n<p>และเทียนก็จุดอยู่ในห้องโถงใหญ่ เฟินซิงยังคงยุ่งอยู่กับการทำความสะอาดและจัดระเบียบภายในบ้าน “คุณหนูฟู่...” หงจั่วเพิ่งจะอ้าปากเสนอให้ฟู่จ้าวหนิงไปดูว่ามีอะไรหายไปบ้างจะได้ไปขอจากคนดูแลบ้าน ทันใดนั้นก็มีเสียงหนูร้องและวิ่งออกมาจากพงหญ้าที่มุมห้อง มุ่งตรงไปยังฟู่จ้าวหนิง</p>"}, "22": {"chapter_number": 22, "chapter_title": "第22章這是自作多情", "content": "<p>“จี๊ด!” “อ๊า!” หงจั่วตกใจ แต่ก็ยังกรีดร้องและเหวี่ยงโคมไฟใส่หนู เธอพยายามปกป้องฟู่จ้าวหนิงโดยสัญชาตญาณ ฟู่จ้าวหนิงสะบัดข้อมือ เข็มพุ่งไปที่หนู “จี๊ด!” หนูร้องเสียงแหลม กระตุกสองสามครั้งบนพื้น แล้วก็แน่นิ่ง ฟู่จ้าวหนิงตบไหล่หงจั่วเบาๆ “อย่ากลัวเลย” หงจั่วมองเธออย่างว่างเปล่า จมูกของเธอรู้สึกร้อน โอ้ คุณนายฟู่ช่างใจดีเหลือเกิน คุณนายฟู่มีฝีมือเจ๋งจริงๆ! โคมไฟที่เธอขว้างใส่หนูตกลงพื้น เทียนข้างในลุกไหม้ทะลุโคมไฟกระดาษ กอวัชพืชก็ลุกไหม้ด้วย และชั่วขณะหนึ่งเปลวไฟก็ส่องสว่างลานบ้านที่มืดสลัว เฟินซิงรีบวิ่งมาพร้อมกับอ่างน้ำและราดลงบนไฟ เสียงดังฉ่า ไฟดับลง ควันดำลอยขึ้น กลิ่นไม่พึงประสงค์ “คุณหนูฟู่</p>\n<p>คุณไม่เป็นไรใช่ไหมคะ?” ฟู่จ้าวหนิงส่ายหัว “ฉันไม่เป็นไรค่ะ” เธอก้าวเข้าไปในห้อง ห้องหลักแบ่งออกเป็นสองส่วน คือส่วนในและส่วนนอก โดยมีซุ้มประตูโค้งครึ่งวงกลมคั่นอยู่ ซุ้มประตูนั้นควรจะมีผ้าม่านโปร่ง แต่ตอนนี้กลับว่างเปล่า ทำให้มองเห็นเตียงในห้องด้านในได้อย่างชัดเจน เตียงก็เรียบง่ายมาก ผ้าม่านโปร่งยังไม่ได้แขวน และมีผ้าห่มกองหนึ่งวางอยู่บนเตียงโดยไม่ได้ปู ในห้องด้านนอก มีโต๊ะสี่เหลี่ยม เก้าอี้กลมสี่ตัว อ่างล้างหน้า และโต๊ะเครื่องแป้งเล็กๆ ที่ว่างเปล่า อีกด้านหนึ่งเป็นตู้เสื้อผ้าไม้สูงประมาณหนึ่งเมตรครึ่ง ประตูเปิดอยู่ อาจเป็นเพราะเพิ่งเช็ดทำความสะอาดและกำลังผึ่งลมอยู่</p>\n<p>มีหน้าต่างในห้องหันหน้าเข้าหาโต๊ะสี่เหลี่ยม หน้าต่างก็เปิดอยู่เช่นกัน ไม่มีผ้าม่าน และกระดาษปิดหน้าต่างก็เต็มไปด้วยฝุ่น มีบางมุมที่ลอกออก นี่คือที่พักขององค์ชายจุน ฟู่จ้าวหนิงถอนหายใจเบาๆ บ้านหลังนี้แทบจะไม่มีอะไรเลย พิงค์สตาร์และเรดเบลซเดินตามเธอเข้ามา แลกเปลี่ยนสายตากัน “คุณหนูฟู่ พรุ่งนี้เราจะไปถามคนดูแลบ้านว่าเราสามารถหาบ้านหลังอื่นได้ไหม” พวกเธอรู้สึกผิดเล็กน้อยเมื่อเข้ามาในบ้านเจียนเจียครั้งแรก ฟู่จ้าวหนิงส่ายหัวอย่างใจเย็น “ไม่จำเป็น” เธอเคยอยู่ในที่ที่แย่กว่านี้มาก่อน เมื่อเธอหายดีและช่วยปู่ของเธอได้แล้ว เธอค่อยคุยเรื่องการหย่ากับองค์ชายจุน การแยกทางกันอย่างเด็ดขาดก็คงจะดี</p>\n<p>ตอนนี้เธอแค่มาอยู่ที่นี่ ในฐานะแขก เธอจะมีสิทธิ์เลือกมากได้อย่างไร พิงค์สตาร์และเรดเบลซคิดว่าเธอใจเย็นเกินไป แต่พวกเธอเป็นเพียงสาวใช้ชั้นสองในคฤหาสน์ขององค์ชายและไม่มีสิทธิ์ออกความเห็น “คุณหนูฟู่ เรามาจัดบ้านให้เรียบร้อยอีกหน่อยเถอะ” บ้านหลังนี้ไม่มีคนอยู่อาศัยมานานเกินไปแล้ว มันดูไร้ชีวิตชีวา แม้แต่ตามมุมและหลังประตูยังมีราขึ้นเป็นหย่อมๆ ฟู่จ้าวหนิงเงยหน้ามองเพดานและเห็นใยแมงมุมสองสามเส้น ห้องก็ค่อนข้างชื้น ปกติแล้วห้องแบบนี้จะต้องทำความสะอาดอย่างละเอียด รมควันด้วยสมุนไพร และระบายอากาศสองวันก่อนจะปลอดภัยที่จะย้ายเข้าไปอยู่ แต่ฟู่จ้าวหนิงขี้เกียจเกินกว่าจะไปเถียงกับคนในคฤหาสน์ขององค์ชาย</p>\n<p>โชคดีที่สาวใช้สองคนนั้นเก่งและทำงานอย่างมีประสิทธิภาพ พวกเธอจัดการเก็บกวาดเท่าที่ทำได้ จัดเตียง ติดผ้าม่าน หาผ้าปิดหน้าต่างมาปิดช่องว่างชั่วคราว และนำเทียนมาสองสามเล่ม—พอสำหรับคืนนี้ หลังจากวุ่นวายกันเสร็จแล้ว กลางคืนก็มาเยือน องค์ชายจุนไม่ได้ส่งใครมาพูดอะไรเพิ่มเติม ไม่มีอะไรเคลื่อนไหวอีก ฟู่จ้าวหนิงวางแผนไว้ว่าจะสอบถามเรื่องการเดินทางไปภูเขาลั่วเยว่ในวันรุ่งขึ้นหลังจากกลับจากคฤหาสน์ตระกูลฟู่ แต่องค์ชายจุนดูเหมือนจะไม่ต้องการจัดการเรื่องนี้ เธอจึงต้องพึ่งพาตัวเอง “คุณหนูฟู่ พวกเราขอตัวก่อนนะคะ พักผ่อนให้สบายนะคะ” หงจั่วและเฟินซิงโค้งคำนับให้เธอ ฟู่จ้าวหนิงตกใจ</p>\n<p>“ท่านไม่ได้พักอยู่ที่บ้านเจียนเจียเหรอคะ” คำถามของเธอทำให้หงจั่วและเฟินซิงยิ่งรู้สึกอึดอัด “คนดูแลบอกว่าเราจะพักที่เดิมค่ะ ไม่ได้ถูกจัดมาให้ดูแลท่านโดยเฉพาะ” ฟู่จ้าวหนิงเข้าใจ เธอคิดว่าสาวใช้สองคนนี้ถูกจัดมาให้ดูแลเธอ แต่ตอนนี้ดูเหมือนว่าเธอจะคิดไปเอง เธอไม่ได้รับการปฏิบัติเหมือนแขกด้วยซ้ำ “คุณหนูฟู่ หากท่านต้องการอะไร โปรดเรียกพวกเราได้เลย เราจะพยายามมาช่วยค่ะ” “ขอบคุณค่ะ แต่ตอนนี้ยังไม่สะดวกค่ะ อย่างไรก็ตาม ช่วยเตรียมของใช้บางอย่างให้ฉันพรุ่งนี้เช้าได้ไหมคะ ฉันจะเอากลับหลังจากใช้เสร็จแล้ว ถือว่าเป็นการยืมก็แล้วกันค่ะ” หงจั่วและเฟินซิงสบตากัน “โปรดแจ้งให้ฉันทราบด้วยนะคะ”</p>\n<p>ฟู่จ้าวหนิงเอ่ยถึงเรื่องบางอย่าง และหลังจากตกลงกันและจากไป เธอก็ถอดเสื้อคลุมออกแล้วนอนลงบนเตียง มันเป็นเตียงชั่วคราว ไม่นุ่มมากนัก แต่โชคดีที่เธออดทนต่อความยากลำบากและสภาพแวดล้อมที่โหดร้ายมามากมายระหว่างภารกิจพิเศษ มันเป็นวันที่เหน็ดเหนื่อยจริงๆ เมื่อนอนลง ฟู่จ้าวหนิงก็ไม่มีเรี่ยวแรงที่จะคิดอะไรอีกและหลับไปทันที “คุณหนูฟู่!” เสียงเคาะประตูอย่างรวดเร็วทำให้ฟู่จ้าวหนิงสะดุ้งตื่น เธอลุกขึ้นนั่งอย่างกะทันหัน จำเสียงของหงจั่วได้ “มีอะไรเหรอ?” “ทางวังส่งองครักษ์มาคุ้มกันท่านที่ภูเขาลั่วเยว่!” ฟู่จ้าวหนิงขมวดคิ้ว แต่ไม่ลังเล รีบลงจากเตียงทันที “เข้ามาสิ เตรียมเสื้อผ้าไว้ให้ข้าแล้วหรือยัง?”</p>\n<p>หงจั่วผลักประตูเปิดออก ถือห่อของขนาดใหญ่ และรีบเดินเข้ามา “เมื่อคืนเรายังเตรียมของที่ท่านขอไม่ทันเลยค่ะ เลยเอามาให้แค่สองชุดสำหรับดิฉันกับเฟินซิง อย่าถือสาเลยนะคะ!” เธอแกะห่อของออก หยิบเสื้อผ้าชุดหนึ่งออกมา แล้วยื่นให้ฟู่จ้าวหนิง ฟู่จ้าวหนิงไม่ได้รับสินสอดใดๆ ตอนแต่งงานเข้าตระกูล เมื่อวานเธอยังไม่ทันได้คิดรายละเอียด เธอมีชุดแต่งงานแค่ชุดเดียว การขึ้นไปบนภูเขาแบบลำบากแบบนี้คงไม่สะดวกแน่ๆ โชคดีที่เสื้อผ้าของสาวใช้ค่อนข้างเบา เธอจึงเปลี่ยนชุดทันทีโดยไม่ลังเล หงจั่วและเฟินซิงมีรูปร่างพอๆ กับเธอ หรืออาจจะอ้วนกว่านิดหน่อย เสื้อผ้าของพวกเธอจึงพอดีกับฟู่จ้าวหนิง</p>\n<p>เพียงแค่ต้องรัดเข็มขัดให้แน่นขึ้นเท่านั้น “เฟินซิงไปเอาพลั่วเล็กๆ กับตะกร้ามา แต่ทหารองครักษ์เร่งรีบมาก ไม่รู้ว่าเธอจะไปทันหรือเปล่า” หงจั่วรู้สึกกังวลอย่างมาก จากนั้นก็ชี้ไปที่ห่อกระดาษน้ำมัน “ครัวยังไม่ได้เริ่มเตรียมอาหารเช้าเลย มีแค่ซาลาเปาเหลือจากเมื่อคืนสองลูก ฉันรีบขอจากแม่ครัวมาแล้ว” เธอยังหยิบผ้าและเข็มปักผ้าที่ฟู่จ้าวหนิงพูดถึงมาด้วย ไม่มีเวลาเหลือสำหรับอย่างอื่นแล้ว “นี่รองเท้าของฉัน…” ฟู่จ้าวหนิงยังคงสวมรองเท้าคู่โปรดสีแดงของเธออยู่ รองเท้านุ่มแต่พื้นบาง ไม่เหมาะกับการขึ้นเขาอย่างแน่นอน เธอลองสวมรองเท้าที่หงจั่วเอามา แต่พบว่ามันใหญ่เกินไป เท้าของเธอเรียวเกินไปที่จะใส่ได้</p>\n<p>“เราจะทำอย่างไรดี?” ดวงตาของหงจั่วแดงก่ำด้วยความกังวล เสียงของชิงอี้ดังมาจากลานด้านนอกแล้ว “คุณหนูฟู่ ทหารองครักษ์เร่งให้ท่านออกเดินทางโดยด่วน” ฟู่จ้าวหนิงสูดหายใจเข้าลึกๆ เก็บของสะพายไหล่ สวมรองเท้าคู่โปรด แล้วเดินออกไป ทันทีที่เธอเปิดประตู เธอก็รู้ว่ามันยังมืดสนิทอยู่ รุ่งอรุณยังไม่มาถึง ไม่แปลกเลยที่เธอรู้สึกเหมือนนอนหลับไปเพียงไม่นาน นี่คือสัญญาณแห่งความตาย!</p>"}, "23": {"chapter_number": 23, "chapter_title": "第23章不配嫁給他", "content": "<p>คนในวังเห็นได้ชัดว่าไม่อยากให้ฟู่จ้าวหนิงสบายใจ นอกวังหลวง เหล่าองครักษ์รออยู่แล้วหลายสิบคน ขี่ม้าชั้นดี ถือดาบยาว และมีสีหน้าเคร่งขรึม ราวกับว่าพวกเขากลัวว่าเธอจะหนีไป เช้าเดือนกันยายนยังคงค่อนข้างหนาว “พร้อมหรือยัง? พระนางซู่ทรงมีพระราชดำรัสว่าการเดินทางไปภูเขาลั่วเยว่นั้นไกลมาก นางฟู่ไม่ควรชักช้า ควรออกเดินทางโดยเร็วที่สุด” องครักษ์ที่พูดมีคิ้วหนาและดำ ทำให้ดูดุร้ายและเข้าถึงยาก ขณะพูด เขามองฟู่จ้าวหนิงสองสามครั้ง ชิงอี้บอกฟู่จ้าวหนิงว่า “นี่คือรองแม่ทัพหลิว” ฟู่จ้าวหนิงหันไปมองในวังหลวง ชิงอี้เข้าใจผิด หลังจากคิดอยู่ครู่หนึ่งจึงอธิบายว่า “องค์ชายจะไม่เสด็จออกมา” เธอคิดว่าเธอกำลังรอองค์ชายจุนเสด็จออกมาส่งหรืออย่างไร?</p>\n<p>ฟู่จ้าวหนิงรู้สึกขบขัน “คุณหนูฟู่ รีบไปเถอะ รถม้าพร้อมแล้ว อย่ามัวแต่ชักช้า พวกเราคนรับใช้ไม่ได้อยู่เฉยๆ!” รองแม่ทัพหลิวกล่าวอย่างเย็นชา ในที่สุดฟู่จ้าวหนิงก็เห็นรถม้าอยู่ข้างหน้า นี่ไม่ใช่รถม้าของวังอย่างแน่นอน ดูเหมือนจะถูกยืมมาจากที่ไหนสักแห่ง รถมาคันเล็กดูบอบบางและทรุดโทรม ม่านคงกันลมไม่ได้ด้วยซ้ำ หงจูกัดริมฝีปากล่างเมื่อเห็นเช่นนี้ นี่มันของถูกเอาเปรียบเกินไป ฟู่จ้าวหนิงกล่าวว่า “เดี๋ยวก่อน” รองแม่ทัพหลิวกล่าวด้วยน้ำเสียงทุ้มต่ำ “คุณหนูฟู่ ข้าหวังว่าเจ้าจะรู้จักฐานะของตัวเอง อย่าคิดว่าตัวเองเป็นพระชายาของจุน! เจ้าหวังว่าองค์ชายจุนจะออกมาส่งเจ้าแต่เช้าหรือ? รู้จักฐานะของตัวเองบ้าง!”</p>\n<p>เขาได้รับคำสั่งให้ทำทุกวิถีทางเพื่อทำให้ฟู่จ้าวหนิงรำคาญ ไม่แสดงความเมตตาต่อเธอ และที่สำคัญที่สุดคือทำให้เธอถึงกับหมดหวังจนพูดว่าไม่อยากแต่งงานกับองค์ชายจุนอีกต่อไป “ถึงแม้คนในวังขององค์ชายจุนจะไม่ได้พูดอะไร แต่ข้าก็ยังต้องคำนึงถึงสุขภาพขององค์ชายจุน ร่างกายอันสูงส่งขององค์ชายจุนไม่ใช่สิ่งที่คนอย่างเจ้าจะเหยียบย่ำได้ เจ้าเข้ามาในวังขององค์ชายจุนแล้ว แต่เจ้ากลับไม่สนใจเขาเลย ข้าคิดว่าเจ้าไม่คู่ควรที่จะแต่งงานกับองค์ชายจุน” ฟู่จ้าวหนิงมองรองแม่ทัพหลิวด้วยความประหลาดใจ ทำไมชายคนนี้ถึงพูดเหมือนผู้หญิงที่กำลังวางแผนในวัง?</p>\n<p>เธอโต้กลับ “ข้าไม่คู่ควร แล้วท่านล่ะ?” คำพูดเหล่านี้ทำให้สีหน้าของรองแม่ทัพหลิวเปลี่ยนไปทันที “ฟู่จ้าวหนิง เจ้าพูดเรื่องไร้สาระอะไรอยู่?” ชิงอี้ที่ตั้งใจจะพูดอะไรบางอย่างก็ชะงักไปเมื่อได้ยินรองแม่ทัพหลิวพูดถึงสุขภาพขององค์ชายจุน แต่ตอนนี้ คำพูดของฟู่จ้าวหนิงทำให้ริมฝีปากของเธอขยับเล็กน้อย “ถึงแม้ฉันจะไม่คู่ควร แต่เมื่อวานฉันก็ได้เข้าพิธีแต่งงานกับจุนหวังต่อหน้าจักรพรรดิ จักรพรรดินี และพระพันปีหลวงแล้ว ส่วนเรื่องที่ว่าสถานะของฉันจะเปลี่ยนไปในอีกสามวันข้างหน้าหรือไม่นั้น ก็เป็นเรื่องอีกสามวันข้างหน้า อย่างน้อยตอนนี้ฉันก็ยังเป็นภรรยาของจุนหวังอยู่” “อะไรกัน ท่านรองแม่ทัพหลิว</p>\n<p>ท่านได้รับคำสั่งจากใครในวังถึงได้มาเห่าหอนที่ประตูจุนหวัง?” หงจูพูดเสียงแหลม ดวงตาเป็นประกายขณะมองไปที่ฟู่จ้าวหนิง คุณหนูฟู่ช่างกล้าหาญเหลือเกิน แต่เธอก็ต้องยอมรับว่า การที่ฟู่จ้าวหนิงเผชิญหน้ากับรองแม่ทัพหลิวโดยตรงทำให้เธอรู้สึกพอใจมาก! “ท่าน—” สีหน้าของรองแม่ทัพหลิวเปลี่ยนไปอีกครั้ง ฟู่จ้าวหนิงมองไปที่ชิงอี้ สายตาของเธอกลายเป็นเย็นชา “เมื่อวานนี้ องค์ชายของคุณตกลงเรื่องการแต่งงานด้วยพระองค์เอง และคฤหาสน์องค์ชายจุนก็เตรียมห้องจัดงานแต่งงานไว้แล้ว ตอนนี้หมาของคนอื่นก็บุกเข้ามาในบ้านคุณแล้ว คุณจะยืนดูเฉยๆ หรือ คุณเอาหน้าคฤหาสน์องค์ชายจุนไปตีกลองยังจะดีกว่าอีก คุณไม่ต้องการมันอยู่แล้ว”</p>\n<p>แม้แต่สีหน้าของชิงอี้ก็เปลี่ยนไป “คุณหนูฟู่!” เฟินซิงวิ่งออกมาอย่างเหนื่อยหอบ พร้อมกับถือตะกร้าที่น่าจะบรรจุเครื่องมือบางอย่าง สีหน้าของฟู่จ้าวหนิงอ่อนลงเมื่อเห็นว่าเธอเป็นคนนำของมาจริงๆ โชคดีที่ในคฤหาสน์องค์ชายจุนมีสาวใช้ที่ดีสองคน “เอามาให้ฉัน ขอบคุณ” ฟู่จ้าวหนิงรับของมาแล้วมองไปที่ชิงอี้อีกครั้ง “กลับไปบอกองค์ชายของคุณว่า ถ้าเขาเสียใจจริงๆ ก็ให้เขียนใบหย่า ฉันจะกลับมาในสามวัน และเราจะหย่ากันด้วยดี” เธอคิดจริงๆ หรือว่าเธอจะยึดติดกับองค์ชายจุน?</p>\n<p>ถึงแม้ว่าเธอจะเลือกเจ้าชายจุนและหยุดรถม้าของเขาไว้แล้ว แต่เขาก็ปฏิเสธได้! ถ้าเขาไม่ตกลงในตอนนั้น เธอก็คงหาคนอื่นอยู่ดี ทำไมเธอต้องทำตัวแบบนี้หลังจากตกลงไปแล้วด้วย? ฟู่จ้าวหนิงไม่ใช่คนใจร้อน ข้อตกลงหย่าร้างเนี่ยนะ? “คุณหนูฟู่ พวกเรา...” เขาอยากจะอธิบายอะไรบางอย่าง แต่ฟู่จ้าวหนิงไม่ฟังแล้ว เธอหยิบของแล้วตรงไปที่รถม้า เธอวางของลง จากนั้นก็กระโดดขึ้นไปบนรถม้าอย่างคล่องแคล่วและเด็ดขาด “ไปกันเถอะ พวกคุณยืนอยู่ตรงนั้นทำไม?” รองแม่ทัพหลิวขบฟัน ดูเหมือนว่าฟู่จ้าวหนิงจะพลิกสถานการณ์ สั่งการพวกเขาไปรอบ ๆ!</p>\n<p>ฟู่จ้าวหนิงคนนี้แตกต่างจากที่เขาจินตนาการไว้มาก แต่ยิ่งเธอมีเล็บแหลมคมมากเท่าไหร่ เขาก็ยิ่งสนใจที่จะฝึกเธอมากขึ้นเท่านั้น แน่นอน เขาก็อยากรู้ว่าฟู่จ้าวหนิงจะรอดชีวิตจากภูเขาลั่วเยว่ในอีกสามวันข้างหน้าได้หรือไม่ “ไปกันเถอะ!” รองแม่ทัพหลิวก็ขึ้นม้าเช่นกัน กลุ่มคนเหล่านั้นรีบออกไป เมื่อลับสายตาไปแล้ว ชิงอี้ก็หันกลับมาถามหงจั่วและเฟินซิงว่า “พวกเจ้าเตรียมอะไรไว้ให้คุณหนูฟู่บ้างคะ เมื่อคืนเธอพูดอะไรกับพวกเจ้าบ้าง” ไม่คาดคิดมาก่อน หงจั่วและเฟินซิงสบตากัน และสองสาวใช้ก็พูดพร้อมกันว่า “ข้าขอตัวก่อน” จากนั้นพวกเธอก็หันหลังกลับและรีบกลับไปยังคฤหาสน์ขององค์ชาย หายลับไปจากสายตาในสวน ชิงอี้ตกตะลึง เกิดอะไรขึ้น? พวกเธอไม่ได้ยินคำถามของเขาหรือ?</p>\n<p>หงจั่วและเฟินซิงเดินไปเรื่อยๆ จนกระทั่งรู้ตัวว่าอยู่ในลานเจียนเจีย มองดูวัชพืชที่ขึ้นรก พวกเธอก็ถอนหายใจอย่างเศร้าๆ พร้อมกัน “หงจั่ว ข้าผิดหวังในตัวชิงอี้เหลือเกิน” เฟินซิงพูดด้วยน้ำเสียงที่ค่อนข้างเสียใจ พวกเธอเคยชื่นชมชิงอี้อยู่บ้าง เพราะเขารูปงามและเป็นองครักษ์ชั้นหนึ่งที่คอยรับใช้องค์ชายมาโดยตลอด แต่พอเห็นพฤติกรรมของชิงอี้เมื่อกี้ หัวใจของพวกเขาก็เย็นชาลง หงจั่วเองก็หดหู่เช่นกัน “ฉันก็ด้วย” “ทำไมเขาไม่ปกป้องคุณหนูฟู่ล่ะ? รองแม่ทัพหลิวคนนั้นดูน่ารำคาญจัง เห็นได้ชัดว่ามาที่นี่เพื่อรังแกคุณหนูฟู่” “ต้องเป็นฝีมือของพระนางซูสีไทเฮาแน่ๆ” ขุนพลโผล่ออกมาจากพุ่มไม้ด้านหลังพวกเขาอย่างเงียบๆ และดุว่า “พวกเจ้าสองคนพูดจาไร้สาระอะไรกัน?</p>\n<p>ไม่เห็นแก่ชีวิตตัวเองบ้างหรือ? กล้าดียังไงมาพูดจาไม่ดีเกี่ยวกับพระนางซูสีไทเฮา! ถึงแม้พวกเขาจะอยู่ในวังของตัวเอง แต่ถ้าเรื่องนี้หลุดออกไป พวกเขาจะต้องเดือดร้อนแน่” “เรารู้ความผิดของเรา” สีหน้าของหงจั่วและเฟินซิงเปลี่ยนไป พวกเขารีบโค้งคำนับและขอโทษก่อนจะรีบจากไป ขุนพลมองดูร่างที่จากไปของพวกเขา ถอนหายใจ และหลังจากคิดอยู่ครู่หนึ่งก็ไปยังที่อยู่ขององค์ชายจุน องค์ชายจุนที่ควรจะพักผ่อนและยังไม่ตื่น กลับไปอยู่ในห้องทำงานแล้ว เมื่อได้ยินคนรับใช้เล่าเหตุการณ์ที่ประตูวังและการสนทนาระหว่างสาวใช้สองคน เขาก็เพียงแค่ส่งเสียงคราง คนรับใช้ยังคงไม่ค่อยเข้าใจ “ตั้งแต่ฝ่าบาททรงอภิเษกสมรสกับนางสาวฟู่ ทำไม...” องค์ชายจุนเหลือบมองเขา “คนรับใช้ ท่านเพิ่งเข้ามาอยู่ในวังตอนที่ข้าอายุสิบสองปี ท่านอาจไม่รู้ แต่พิษที่ข้าได้รับในวัยเด็กนั้นเกี่ยวข้องกับพ่อแม่ของฟู่จ้าวหนิง” คนรับใช้ตกใจ “อะไรนะ?!”</p>"}, "24": {"chapter_number": 24, "chapter_title": "第24章從她身上討點利錢", "content": "<p>“ฟู่จ้าวหนิงหยุดรถม้าของข้า ข้าจำเป็นต้องมีพระสนมจริงๆ เมื่อเห็นความกล้าหาญอัน extraordinary ของนาง และรู้ว่านางมีทักษะทางการแพทย์ ข้าจึงตกลงตามข้อเสนอของนาง” สายตาขององค์ชายจุนเหลือบไปมองกระดาษเสวียนบนโต๊ะ มือของเขายังคงเขียนต่อไปขณะที่เขาพูด ลายมือของเขานั้นแข็งแรงและคมชัด ขอบลายมือไม่ปกปิด “หลังจากตกลงแล้ว ข้าก็ได้รู้ว่าแท้จริงแล้วนางเป็นลูกสาวของตระกูลฟู่จากอดีต” คนรับใช้ยังคงงุนงง “แล้วทำไมองค์ชายถึงตกลงให้แต่งงานล่ะ?” องค์ชายจุนเผยรอยยิ้มเย็นชา “ทำไม? พวกเขาหายไปอย่างไร้ร่องรอย ก่อนที่จะตามหาพวกเขา ข้าจะรีดไถผลประโยชน์จากลูกสาวของพวกเขาเองไม่ได้หรือ?” นอกจากนี้ หากฟู่หยุนฉงและหลินหรงหลานกลับมาและพบว่าลูกสาวของพวกเขาแต่งงานกับเขา ใครจะรู้ว่าพวกเขาจะมีปฏิกิริยาอย่างไร?</p>\n<p>เพียงแค่จินตนาการถึงสถานการณ์นั้นก็ทำให้เขาคาดเดาได้บ้าง คนรับใช้เปิดปากอยากจะบอกว่าสิ่งที่เกิดขึ้นในตอนนั้นไม่เกี่ยวข้องกับนางฟู่ ในเวลานั้น นางฟู่ยังเป็นทารกอายุไม่ถึงหนึ่งขวบ เธอรู้เรื่องอะไรบ้าง? แต่ในขณะนั้นเอง เจ้าชายจุนก็ไอเป็นเลือดออกมา “ฝ่าบาท!” ชิงอี้ที่กลับมาเห็นก็ตกใจ “เราจะรอต่อไปไม่ได้แล้ว ต้องไปรับหมอหลี่!” ฟู่จ้าวหนิงถึงแม้รถม้าจะสั่นสะเทือนอย่างรุนแรงก็ยังหลับไปได้ เธอเหนื่อยล้าจากการเดินทางเมื่อวานและนอนไม่พอเมื่อคืน ตอนนี้พวกเขากำลังมุ่งหน้าเข้าไปในภูเขา เธอจึงต้องการพักผ่อนให้มากที่สุด เมื่อคณะของพวกเขาออกจากประตูเมือง คนอื่นๆ ก็ทยอยตามมาอย่างเงียบๆ</p>\n<p>หลังจากเดินทางอีกชั่วโมงครึ่ง พวกเขาก็มาถึงภูเขาลั่วเยว่ในที่สุด รองแม่ทัพหลิวมองไปที่ป่าและส่งสัญญาณให้รถม้าหยุด เขาเหลือบมองรถม้าที่ทรุดโทรมและเยาะเย้ย การเดินทางที่ขรุขระคงทำให้ฟู่จ้าวหนิงคลื่นไส้แล้ว แต่เธอคงไม่มีโอกาสได้พัก พวกเขากำลังผลักดันเธอเข้าไปในภูเขาแล้ว เขาอยากเห็นว่าฟู่จ้าวหนิงจะร้องไห้และทุกข์ทรมานแค่ไหนในอีกสามวันข้างหน้า “คุณหนูฟู่ ท่านยังไม่ลงจากรถม้าหรือครับ?</p>\n<p>อยากให้ผมช่วยไหมครับ?” รองแม่ทัพหลิวลงจากรถม้าและเดินไปที่ด้านหน้าของรถม้า ก่อนจะยกม่านขึ้นอย่างกะทันหัน เขาคาดว่าจะเห็นฟู่จ้าวหนิงหน้าซีดและมึนงง แต่กลับพบว่าเธอนอนหลับสนิท กอดห่อของไว้แน่น “คุณหนูฟู่!” รองแม่ทัพหลิวแทบจะระเบิดด้วยความโกรธ เขาจงใจเลือกเส้นทางที่ขรุขระ หวังจะทำให้ฟู่จ้าวหนิงอาเจียนอาหารเย็นเมื่อคืนออกมา แต่เธอยังนอนหลับได้ในสภาพแบบนี้! “ถึงแล้วหรือคะ?” ในที่สุดฟู่จ้าวหนิงก็ลืมตาขึ้น นั่งมองเขา เก็บของ และกระโดดลงจากรถม้า ดวงตาของรองแม่ทัพหลิวเป็นประกาย และขณะที่เธอกระโดดลงมา เขาก็แอบยื่นเท้าออกไป “อ้า!” เขารู้สึกเจ็บปวดอย่างรุนแรงจากหลังเท้าไปถึงสมอง โอ๊ย โอ๊ย โอ๊ย เจ็บจังเลย! &quot;เท้าฉัน!&quot; ฟู่จ้าวหนิงก้มลงมอง &quot;โอ้ ที่รัก ฉันขอโทษ ฉันไม่คิดว่าเท้าของคุณจะอยู่ใต้เท้าฉันตอนที่ฉันลงจากหลังม้า&quot; ฮึ่ม ฉันจะเหยียบแกให้ตาย!</p>\n<p>รองแม่ทัพหลิวจ้องมองร่างบอบบางของฟู่จ้าวหนิงและเริ่มตั้งคำถามถึงการมีอยู่ของเขา แม้ว่าเธอจะเหยียบเขา ทำไมร่างที่บอบบางของเธอถึงรู้สึกเหมือนก้อนหินหนักๆ ทำให้ขาของเขาปวดและชาไปหมด? สาวๆ สมัยนี้หนักกันหมดเลยหรือ? &quot;คุณหนูฟู่ หลบไป! ไปให้พ้น!&quot; รองแม่ทัพหลิวเหงื่อไหลท่วมหน้าผากและกัดฟัน ฟู่จ้าวหนิงดูเหมือนจะไม่รู้เรื่องอะไรเลย กระพริบตาครู่หนึ่งก่อนจะรู้ตัวว่าเกิดอะไรขึ้น เธอรีบหลบไปด้านข้าง &quot;อ่า ขอโทษ ฉันเกือบจะลืมไปแล้ว&quot; เธอจะลืมเรื่องแบบนั้นได้ยังไง!</p>\n<p>ฟู่จ้าวหนิงหันไปมองภูเขาเบื้องหน้า ภูเขานั้นสง่างามและงดงาม มีทิวทัศน์ที่สวยงามและมีสีสัน ในระยะไกล มีใบไม้สีเหลืองและต้นไม้สีแดง สีเขียวเฉดต่างๆ ถูกแต่งแต้มอย่างอ่อนโยง สลับซับซ้อนเป็นชั้นๆ สร้างทิวทัศน์ที่สวยงาม ป่าบนภูเขาเช่นนี้ย่อมมีดินอุดมสมบูรณ์ น้ำมากมาย และทรัพยากรมากมาย ดวงตาของเธอเป็นประกาย เธอคาดการณ์ได้ว่าเธอจะต้องพบอะไรบางอย่างในภูเขาเหล่านี้อย่างแน่นอน “นี่คือภูเขาลั่วเยว่ใช่ไหม” “ใช่แล้ว คุณหนูฟู่ อย่าชักช้า รีบเข้าไปในภูเขากันเถอะ เราจะตั้งค่ายพักแรมที่นี่ และคุณต้องออกมาจากที่นี่ภายในสามวัน” รองแม่ทัพหลิวแทบจะอดใจไม่ไหวที่จะกระโดดโลดเต้น มันเจ็บปวดเหลือเกิน</p>\n<p>“คุณไม่จำเป็นต้องส่งคนตามฉันไปหรือ” ฟู่จ้าวหนิงถาม “ไม่จำเป็น เราจะเฝ้าทางเข้าภูเขาอยู่ที่นี่ หากใครเข้ามาในสามวันนี้ เราจะหยุดพวกเขาไว้ นี่เป็นเพื่อประโยชน์ของคุณหนูฟู่ เพื่อป้องกันไม่ให้เธอพบเจอกับใครในภูเขา” แสงประกายเจ้าเล่ห์ฉายวาบในดวงตาของรองแม่ทัพหลิว “แน่นอน อาจจะมีนักล่าหรือคนเก็บสมุนไพรคนอื่นๆ อยู่ในภูเขาตอนนี้ พวกเขาอาจจะเข้าไปก่อนแล้วเราก็ไม่ได้ห้าม” “แล้วฉันจะตรวจสอบปริมาณและชนิดของสมุนไพรที่ฉันเก็บได้อย่างไร?” ฟู่จ้าวหนิงยังคงรู้สึกว่าควรสอบถามให้ชัดเจนก่อน ดังนั้นเธอจึงไม่รีบร้อนที่จะเข้าไปในภูเขา ยังไงเธอก็มีเวลาสามวัน “ในวันที่สาม</p>\n<p>จักรพรรดิจะส่งแพทย์หลวงและแพทย์ผู้มีชื่อเสียงจากสามัญชนหลายคนมาตรวจและนับยาในที่นั้นเลย คุณหนูฟู่ โปรดวางใจได้!” “ดีแล้ว ท่านจะมาปรากฏตัวที่นี่ในเวลาเดียวกันนี้ในอีกสามวันข้างหน้าใช่ไหม?” “แน่นอน ถ้าถึงเวลาแล้วคุณหนูฟู่ยังไม่กลับมา คุณหนูฟู่ก็แพ้” รองแม่ทัพหลิวเยาะเย้ยในใจ ยังคิดจะกลับมาภายในเวลาที่กำหนดอีกหรือ? ช่างเป็นความคิดที่ไร้เดียงสาเสียจริง ไม่ว่าเธอจะกลับมาอย่างปลอดภัยได้หรือไม่ก็อีกเรื่องหนึ่ง!</p>\n<p>“เช่นนั้น รองแม่ทัพหลิว ท่านรออยู่ที่นี่ก็ได้” หลังจากฟู่จ้าวหนิงอธิบายจบ เธอก็ไม่ลังเลอีกต่อไป หยิบตะกร้าแล้วเดินขึ้นเขาไป เมื่อร่างของเธอหายไปที่ทางเข้าทางขึ้นเขา รองแม่ทัพหลิวก็อดไม่ได้ที่จะลุกขึ้นยืน กุมเท้าไว้ “บ้าเอ๊ย ทำไมมันเจ็บขนาดนี้! เจ็บสุดๆ!” เขาถอดรองเท้าและถุงเท้าออก พบว่านิ้วเท้าทั้งห้าของเขาแดงและบวม เมื่อฟู่จ้าวหนิงเข้าไปในเขา เธอก็หยิบซาลาเปาออกมากินขณะเดิน หลังจากนอนหลับพักผ่อนในรถม้า เธอก็เต็มไปด้วยพลัง รองแม่ทัพหลิวคิดว่าแค่นี้ก็ทรมานเธอได้มากพอแล้ว โดยไม่รู้ว่าก่อนหน้านี้เธอเคยถูกองค์กรมืดจับตัวไปในฐานะผู้รักษาที่มีฝีมือ เธออดทนต่อการทรมานทั้งหมดที่พวกมันกระทำต่อเธอ</p>\n<p>ดังนั้นรถม้าที่พังจึงไม่ใช่เรื่องใหญ่สำหรับเธอ แม้ว่าเธอจะกินซาลาเปาอยู่ แต่ฟู่จ้าวหนิงก็ยังเดินเร็วอยู่ดี เมื่อเธอตัดสินใจได้แล้วว่าจะไปที่ไหน เธอก็ตรงไปยังภูเขาด้านหลัง ทิวทัศน์บนเนินเขาจันทร์เสี้ยวบนนั้นงดงามจริงๆ เธออาจจะไปเที่ยวที่นั่นสักวันเมื่อมีเวลาและเงิน แต่ตอนนี้ จุดหมายปลายทางของฟู่จ้าวหนิงคือหุบเขาจันทร์เสี้ยวล่าง เนินเขาจันทร์เสี้ยวบนนั้นมีผู้คนมาเที่ยวกันบ่อย และเส้นทางบนภูเขาก็เดินง่าย แต่ถึงกระนั้น ฟู่จ้าวหนิงก็ใช้เวลาถึงหนึ่งชั่วโมงครึ่งกว่าจะเห็นสะพานแขวน มองลงไป สะพานแขวนแกว่งไกวอย่างน่าหวาดเสียวไปตามลมในหุบเขาเบื้องล่าง เชือกสองเส้นที่หนาเท่าข้อมือเด็กใช้เป็นราวจับ</p>\n<p>และพื้นสะพานด้านล่างเป็นตาข่ายที่ไม่สม่ำเสมอที่ถักทอจากเถาวัลย์ เต็มไปด้วยรูพรุน หากก้าวพลาดเพียงก้าวเดียวก็อาจตกลงไปได้ ที่สำคัญที่สุดคือ เถาวัลย์บางส่วนดูแห้งและขาด ทำให้ดูบอบบางมาก สะพานแขวนนั้นไม่ยาวมากนัก น้อยกว่าสิบเมตร แต่ถ้าไม่มีความกล้าพอ ก็คงไม่กล้าข้ามไป ฟู่จ้าวหนิงมองลงไป หุบเขานั้นลึก มีลำธารไหลผ่านโขดหินด้านล่าง ถ้าใครตกลงมาจากสะพานแขวน พวกเขาคงพิการหรืออาจถึงตายได้ &quot;เจ้านาย เร็วเข้า!</p>\n<p>มีสาวน้อยอยู่ตรงนี้!&quot; เสียงหยาบคายดังขึ้นมาจากด้านหลังอย่างกะทันหัน</p>"}, "25": {"chapter_number": 25, "chapter_title": "第25章弄死她", "content": "<p>ฟู่จ้าวหนิงหันหลังกลับและวางตะกร้าลงอย่างใจเย็น ชายหนุ่มหลายคนโผล่ออกมาจากพุ่มไม้ไม่ไกลนัก คนที่พูดก่อนหน้านี้เป็นชายหน้าเหมือนพังพอน แต่ชายคนสุดท้ายที่ออกมานั้นสูงใหญ่และกำยำ พวกเขาทั้งหมดมองฟู่จ้าวหนิงด้วยความประหลาดใจ “เด็กสาวคนนี้สวยจริงๆ เจ้านาย ป้าของคุณไม่ได้คะยั้นคะยอให้คุณหาภรรยาหรือครับ พาเธอกลับไป แล้วคุณก็จะมีภรรยา ป้าของคุณจะได้ตายอย่างสงบ” ชายหนุ่มร่างเตี้ยผิวคล้ำพูดกับชายร่างสูงใหญ่ และคนอื่นๆ ก็พูดเสริม “เถียวจูพูดถูก!” “ฉันคิดว่าเป็นความคิดที่ดี!” “เอาเลย!” ฟู่จ้าวหนิงรู้สึกขบขันและขัดจังหวะพวกเขา “พวกคุณหมายถึงฉันเหรอ?” “เฮ้ เด็กสาวคนนี้กล้าหาญมาก</p>\n<p>เธอไม่กลัวพวกเราและยังพูดคุยกับพวกเราได้อีกด้วย!” ชายหน้าเหมือนพังพอนประหลาดใจ “ฉันต้องข้ามสะพานแขวน ถ้าอยากจะสู้ก็รีบมา ถ้าไม่ก็ไปซะ” ฟู่จ้าวหนิงเชิดคางขึ้น หนุ่มๆ เหล่านั้นโกรธจัดทันที พับแขนเสื้อขึ้นเตรียมโจมตี “ฉันทนไม่ได้! แม้แต่เด็กผู้หญิงตัวเล็กๆ ยังกล้าเถียงเราแบบนี้หรือ?” “ก่อนที่เธอจะมาเป็นน้องสะใภ้ เราต้องสั่งสอนเธอ!” “ใช่แล้ว ให้เธอรู้ว่าทำไมดอกไม้ถึงแดง!” หนุ่มๆ เดินเข้ามาหาฟู่จ้าวหนิงทีละก้าว “หนู เทียนจู หยุด!” ฟู่จ้าวหนิงประหลาดใจที่หัวหน้ากลุ่มร่างสูงใหญ่หยุดพวกเขาไว้ “หัวหน้า ไม่ได้นะ พวกคุณกลัวจริงๆ เหรอ?” คนที่ถูกเรียกว่า “หนู” คือเด็กหนุ่มหน้าเหมือนพังพอน</p>\n<p>สีหน้าของหัวหน้ามืดลง “ฉันสัญญากับแม่แล้วว่าจะไม่ทำอะไรบุ่มบ่ามอีก” “ป้าของเจ้าไม่ได้บอกเหรอว่าจะไม่สงบสุขจนกว่าเจ้าจะหาภรรยาได้?</p>\n<p>นี่ไม่ใช่ความบุ่มบ่ามหรอก หัวหน้า พวกเราแค่ฟังป้าของเจ้า” หนูพุ่งเข้าใส่ฟู่จ้าวหนิงอย่างกะทันหัน ไม่มีใครคาดคิดว่าเขาจะเคลื่อนไหวอย่างกระทันหันเช่นนี้ ทุกคนต่างตกตะลึง ฟู่จ้าวหนิงเห็นมือของฮ่าวจื่อกำลังดันเข้าหาหน้าอกของเธออย่างชัดเจน ในชั่วพริบตานั้น ดวงตาของเขาก็กลายเป็นดุร้าย ชายคนนี้ไม่ได้ต้องการจับตัวเธอ แต่ต้องการฆ่าเธอทันที! ฟู่จ้าวหนิงเห็นเจตนาของเขาและกำลังจะลงมือ แต่ทันใดนั้นหัวหน้าก็ว่องไวอย่างไม่น่าเชื่อ วิ่งไปด้านหลังฮ่าวจื่อและคว้าคอเสื้อของเขาไว้ “ฮ่าวจื่อ เจ้ากำลังจะทำอะไร?!” ฮ่าวจื่อไม่คาดคิดว่าหัวหน้าจะตอบสนองเร็วขนาดนี้ การกระชากอย่างกะทันหันเกือบทำให้เขาสำลัก “เจ้านายครับ</p>\n<p>ผมกำลังช่วยท่านหาภรรยาครับ!” เขาไอออกมา มองไปที่ฟู่จ้าวหนิงที่ยืนหันหลังพิงขอบหน้าผา รู้สึกหงุดหงิดอย่างมาก เขาเกือบจะผลักเด็กสาวคนนี้ตกหน้าผา “ที่นี่อันตราย ถ้าเจ้าผลักเธอตก เธอจะรอดไหม?” หัวหน้ามองไปที่ฟู่จ้าวหนิง “เจ้าควรออกไปจากที่นี่” ถึงแม้เขาจะคิดว่าฟู่จ้าวหนิงสวยมาก และอยากได้เธอมาเป็นภรรยาเพื่อเอาใจแม่ แต่...</p>\n<p>ถ้าแม่รู้ว่าเขาจับตัวเธอมา แม่คงไม่เพียงแต่ไม่พอใจ แต่อาจถึงขั้นถูกเขาฆ่าตายก็ได้ “เจ้านาย ตอนที่เราขึ้นมาหาเจ้านาย ป้าของท่านไอเป็นเลือดอีกแล้ว ทำไมท่านไม่รีบลงจากเขาแล้วกลับบ้านไปล่ะครับ” ฮ่าวจื่อเหลือบมองชายหนุ่มอีกคน แล้วดิ้นหลุดจากมือเจ้านาย เทียนจูมองฮ่าวจื่อแล้วพูดเสริมว่า “ใช่แล้ว เจ้านาย ท่านอยู่ในภูเขาหาเวชภัณฑ์มาสามวันแล้ว ป้าของท่านเป็นห่วงมาก ท่านควรกลับไปก่อน แล้วพวกเราจะอยู่หาเวชภัณฑ์ให้ท่าน” “แม่ของฉันไอเป็นเลือดอีกแล้วเหรอ? ฉันบอกให้พวกคุณไปดูอาการแม่เป็นระยะๆ แล้วทำไมพวกคุณถึงรีบขึ้นมาบนเขา?” “ก็เพราะป้าของท่านเป็นห่วงท่าน เลยคะยั้นคะยอให้พวกเราขึ้นมาหาท่านน่ะ” พอได้ยินพวกเขาพูดแบบนั้น หัวหน้าก็กังวลใจมาก เขาหันหลังวิ่งไป “งั้นฉันจะกลับไปหาแม่ก่อน!</p>\n<p>แกก็ไปด้วยสิ สาวน้อย ฮ่าวจื่อ อย่ารังแกแม่สิ” พอเห็นเขาวิ่งหนีไป ฮ่าวจื่อและคนอื่นๆ ก็มองหน้ากันหลังจากที่เขาหายไปจากสายตาและเดินเข้าไปหาฟู่จ้าวหนิง “หนู สาวน้อยคนนี้สวยจัง เสียดายจะผลักเธอลงไปให้ตายเฉยๆ พวกเราพี่น้องลองสนุกกันก่อนดีไหม?” เทียนจูมองฟู่จ้าวหนิง น้ำลายไหล “ฉันว่าดี” ตอนนี้หนูก็อยากจะไปหาฟู่จ้าวหนิงเหมือนกัน “ฉันไปก่อนดีไหม?” เหมือนเดิม เขาพุ่งเข้าหาฟู่จ้าวหนิงก่อนที่เขาจะพูดจบ แต่คราวนี้เขาไม่ได้จะผลักเธอลงไป แต่จะคว้ามือเธอไว้ “ก็ได้ แกไปก่อน” ฟู่จ้าวหนิงเยาะเย้ย คว้าข้อมือเขาแล้วเหวี่ยงเขาไปที่ขอบหน้าผาอย่างแรง “อ๊า!” หัวใจของหนูแทบระเบิดด้วยความกลัว เขายังไม่ทันได้ตั้งตัว</p>\n<p>ร่างของเขาก็ถูกเหวี่ยงออกไปเหมือนว่าว หมุนตัวแล้วลอยไปไกล โครม! หนูชนเข้ากับขอบหน้าผา ร่างของเขาร่วงลงอย่างรวดเร็ว ด้วยความหวาดกลัว เขาจึงกรีดร้องและคว้าหินที่ยื่นออกมาอย่างบ้าคลั่ง ช่วยชะลอการตกได้เล็กน้อย แต่เท้าของเขายังห้อยอยู่กลางอากาศ ลมพัดผ่านหู และหินที่ร่วงหล่นลงมาทำให้เขาสั่นเทา “ช่วยด้วย!</p>\n<p>ช่วยด้วย!” ในขณะนั้น หนูได้ลืมฟู่จ้าวหนิงไปโดยสิ้นเชิง เขาตะโกนใส่เทียนจูและคนอื่นๆ เทียนจูและคนอื่นๆ ต่างตกตะลึง พวกเขาประหลาดใจที่ฟู่จ้าวหนิงที่ดูบอบบางกลับมีพละกำลังมากมาย! “ยัยสารเลว แกอยากตายหรือไง?!” พวกเขาไม่สนใจหนูและกระโจนเข้าใส่ฟู่จ้าวหนิงพร้อมกัน “พอแล้ว!” ฟู่จ้าวหนิงพูดอย่างเย็นชา ยกเท้าขึ้นเตะเทียนจูอย่างแรงที่บริเวณนั้น *ตุ๊บ* ทุกคนดูเหมือนจะได้ยินเสียงที่น่าขนลุกของบางสิ่งแตกหัก “อ๊า!” เทียนจูจับตรงที่กระแทกไว้แน่น ทรุดลงกับพื้นด้วยความเจ็บปวด ร้องโหยหวนด้วยความเจ็บปวด คนอื่นๆ รู้สึกเสียวสันหลังวาบ ผู้หญิงตัวเล็กคนนี้โจมตีอย่างโหดเหี้ยม! ตอนนี้ พวกเขาจะกล้าคิดเรื่องไม่ดีกับเธอได้อย่างไร?</p>\n<p>“ฆ่าเธอ!” พวกเขามีเพียงความคิดเดียว: ผลักเธอลงไป แล้วพวกเขาก็จะได้กลับไปรับเงินรางวัล แล้วพวกเขาจะไม่ต้องเป็นอันธพาลข้างถนนที่ยากจนอีกต่อไป! มีคนเห็นก้อนหินและคว้ามันมาทันที มันต้องหนักอย่างน้อยเจ็ดหรือแปดปอนด์ มีปลายแหลม ขณะที่พวกผู้ชายพุ่งเข้าใส่ฟู่จ้าวหนิง ดวงตาของเขาฉายแววอาฆาต เขาชูก้อนหินขึ้นและเล็งปลายแหลมไปที่หัวของเธอ “อีสารเลว ตายซะ!” ในวินาทีต่อมา ข้อมือของเขาถูกจับไว้ และก้อนหินก็ไม่ตกลงมาอีกแม้แต่นิ้วเดียว เขาสบตากับฟู่จ้าวหนิงด้วยความหวาดกลัว “ฉันเกลียดพวกสารเลวที่พยายามจะดูถูกผู้หญิงเสมอ” ฟู่จ้าวหนิงจับข้อมือของชายคนนั้นแล้วบิดอย่างแรง ทำให้ก้อนหินที่ถืออยู่หมุนตามไปด้วย</p>\n<p>ปลายแหลมพุ่งตรงไปที่หน้าผากของเขา ในขณะเดียวกัน ฟู่จ้าวหนิงก็เตะชายอีกคนออกไป “ฉัน…ฉันผิดเอง ฉันจะไม่ทำอีกแล้ว…” เมื่อเห็นปลายแหลมของก้อนหินพุ่งเข้าหาหน้าผาก ขาของชายคนนั้นก็อ่อนแรงด้วยความกลัว “สายเกินไปแล้ว” ฟู่จ้าวหนิงฟาดมืออีกข้างลงบนก้อนหินอย่างแรง กระแทกเข้าที่หน้าผากของชายคนนั้น เลือดพุ่งออกมา เขาร้องเสียงดังและล้มลงกับพื้น *ฟิ้ว* เข็มแทงเข้าที่เข่าของชายอีกคนหนึ่งที่กำลังจะซุ่มโจมตีฟู่จ้าวหนิง เขาทรุดตัวลงทันที เข็มแทงเข้าที่เข่าของเขาเสียงดังตุบ ทำให้เขาร้องและดิ้นรนอยู่บนพื้น ฟู่จ้าวหนิงเหยียบลงไป “ใครส่งแกมา?”</p>"}, "26": {"chapter_number": 26, "chapter_title": "第26章她的製藥室", "content": "<p>“ไม่ ไม่ พวกเราคือ...” “ถ้าเจ้าไม่พูด ขาของเจ้าจะพิการ” ฟู่จ้าวหนิงกล่าวอย่างเย็นชา มีเพียงไม่กี่คนที่รู้ว่าเธอจะไปที่ภูเขาลั่วเยว่เพื่อหายา คนเหล่านั้นมาจากคฤหาสน์ขององค์ชายจุนหรือจากวัง ทำไมพวกเขาถึงจ้างพวกอันธพาลชั้นต่ำเช่นนี้มาดูถูกเธอ? “ข้าจะพูด ข้าจะพูด” อันธพาลคนนั้นกลัวจริงๆ ว่าขาของเขาจะพิการ นี่ไม่ใช่ลูกสาวคนโตที่ไร้ประโยชน์ของตระกูลฟู่ เธอเป็นปีศาจหญิงอย่างชัดเจน! “มีสาวใช้มาบอกเราว่าพวกเรากำลังจะไปที่ภูเขาเพื่อตามหาเจ้าในวันนี้ ถ้าเราฆ่าเจ้าได้ เราจะให้เงินเจ้าหนึ่งร้อยตำลึง ถ้าเราฆ่าเจ้าไม่ได้ เราจะทำลายชื่อเสียงของเจ้าและเอาชุดชั้นในของเจ้าไปแลกกับเงินแปดสิบตำลึง” ดังนั้น</p>\n<p>ในตอนแรกอันธพาลคนนั้นต้องการฆ่าเธอ เพราะการฆ่าเธอจะทำให้เขาได้เงินเพิ่มอีกยี่สิบตำลึง “เธอมาจากคฤหาสน์ไหน?” ฟู่จ้าวหนิงกดเท้าของอันธพาลลงแรงขึ้น ทำให้เขาร้องด้วยความเจ็บปวด “ฉันรู้ ฉันรู้ ดึงฉันขึ้นมาแล้วฉันจะบอก!” อันธพาลที่ห้อยอยู่ตรงขอบหน้าผาร้องออกมาด้วยเสียงสั่นเครือ เขากำลังจะยอมแพ้ ฟู่จ้าวหนิงไม่แม้แต่จะมองเขา หนูตัวนี้ช่างโหดร้ายและไร้ความปราณีที่สุด เธอไม่มีเจตนาที่จะปล่อยให้เขามีชีวิตอยู่ “ดึงฉันขึ้นมา...</p>\n<p>อ้า!” ในที่สุดหนูตัวนั้นก็ทนไม่ไหวและตกลงไป เสียงร้องของเขาก้องกังวานไปในอากาศว่างเปล่า อันธพาลที่ถูกฟู่จ้าวหนิงเหยียบย่ำรู้สึกเจ็บปวดใจและร้องออกมา “พวกเราแอบตามเธอไปและเห็นเธอเข้าไปในบ้านซ่ง!” บ้านซ่ง ฟู่จ้าวหนิงเข้าใจในทันที ฮ่า ซ่งหยวนหลินแค้นเธอมากขนาดนี้เลยเหรอ? “ได้โปรดช่วยขาฉันด้วย ฉันไม่อยากพิการ…” เมื่อได้ยินคำขอร้องของโจร ฟู่จ้าวหนิงก็เพียงแค่ดึงเท้ากลับ หยิบตะกร้าขึ้นมาอีกครั้ง แล้วหันหลังเดินไปยังสะพานแขวน “ปล่อยให้เป็นเรื่องของโชคชะตาเถอะ” คนเหล่านี้ไม่ได้ตาย แต่ทุกคนบาดเจ็บและขยับตัวไม่ได้ สิ่งที่พวกเขาจะเผชิญต่อไป ว่าพวกเขาจะลงจากภูเขาไปได้อย่างปลอดภัยหรือไม่นั้น</p>\n<p>ขึ้นอยู่กับโชคชะตาของพวกเขาเอง “กลับมา กลับมา!” โจรเห็นเธอก้าวขึ้นไปบนสะพานแขวนโดยไม่หันกลับมามอง สะพานโยกเยกอย่างน่าหวาดเสียว แต่เธอก็ไม่หยุดแม้แต่ครั้งเดียว เดินข้ามไปอย่างมั่นคงทีละก้าว ความสิ้นหวังเข้าครอบงำหัวใจของเขา เขาเต็มไปด้วยความเสียใจ หากพวกเขารู้ว่าฟู่จ้าวหนิงเป็นคนโหดเหี้ยมเช่นนี้ พวกเขาคงไม่รับงานนี้ด้วยเงินเพียงเล็กน้อยอย่างแน่นอน เท้าของเธอลอยอยู่กลางอากาศ สะพานโยกเยกอย่างน่าหวาดเสียว ลมพัดผ่านหู ทำให้ผมและเสื้อผ้าปลิวไสว ดูเหมือนว่ามันจะพัดเธอปลิวไปได้ทุกเมื่อ เธอถือสัมภาระของเธอไว้แน่น จับเชือกทั้งสองข้างไว้แล้วเหลือบมองลงไป หนูที่ตกลงมานั้นเป็นเพียงเงาเลือนราง</p>\n<p>ฟู่จ้าวหนิงยังคงสงบขณะข้ามสะพานแขวนทีละก้าว เธอไม่ได้หันกลับไปมองเทียนจูและคนอื่นๆ แต่รีบมุ่งหน้าไปยังหุบเขาจันทร์ล่าง คุณปู่ของเธอยังคงป่วยหนัก เธอไม่อาจเสียเวลาได้ ไม่นาน ฟู่จ้าวหนิงก็รู้สึกว่าหุบเขาจันทร์ล่างนั้นหนาวกว่าเนินเขาจันทร์บนมาก เมื่อมองขึ้นไป ท้องฟ้าก็ยิ่งมืดครึ้ม วันนี้ท้องฟ้ามืดครึ้ม เธอสังเกตพืชพรรณรอบข้างอย่างระมัดระวังและเลือกทิศทางที่จะเดิน ในภูเขา การเจริญเติบโตของพืชเป็นไปตามรูปแบบบางอย่าง ฟู่จ้าวหนิงเดินไปได้สักพักก่อนที่ชายสวมหน้ากากดำหลายคนจะมาถึงสะพานแขวน เทียนจูและคนอื่นๆ ยังคงดิ้นรนอยู่บนพื้น เมื่อเห็นพวกเขา ตอนแรกพวกเขาก็ดีใจมาก และคนหนึ่งอดไม่ได้ที่จะร้องออกมาว่า</p>\n<p>&quot;ช่วยด้วย!&quot; แต่หลังจากเห็นเครื่องแต่งกายของพวกเขา พวกเขาก็หนาวสั่นไปถึงกระดูกทันที คนพวกนี้ดูเหมือนมือสังหาร!</p>\n<p>&quot;ฟู่จ้าวหนิงอยู่ที่ไหน?&quot; ชายชุดดำคนหนึ่งชักดาบออกมาอย่างรวดเร็วและจ่อที่คอของเทียนจู &quot;ฉัน...ฉัน...ฉันไม่รู้...&quot; &quot;เธอข้ามไปแล้ว! เธอข้ามสะพานแขวนไปแล้ว!&quot; นักเลงอีกคนตะโกนออกมา พวกเขาสั่งให้คนพวกนี้ตามหาฟู่จ้าวหนิง! ชายชุดดำมองหน้ากัน &quot;ผู้หญิงคนนั้นวิ่งเร็วมาก?&quot; เดิมทีพวกเขาคิดว่าฟู่จ้าวหนิงจะช้าลงหลังจากเข้าไปในภูเขา แต่พวกเขาก็ไม่พบเธอเลยตลอดทาง และตอนนี้พวกเขารู้แล้วว่าเธอข้ามสะพานแขวนไปแล้ว &quot;เราควรทำอย่างไรกับพวกนี้?&quot; &quot;พวกมันคงมาสร้างปัญหาให้ผู้หญิงคนนั้นด้วย&quot; พวกเขามองหน้ากัน พวกเขาเห็นพวกนั้นแล้ว ใครจะรู้ว่าถ้าลงไปข้างล่างจะเปิดเผยอะไรออกมาบ้าง?</p>\n<p>ฆ่าพวกมันเสียดีกว่า ชายชุดดำแต่ละคนเตะเทียนจูและคนอื่นๆ ออกไป &quot;อ๊ะ!&quot; เสียงกรีดร้องดังก้องไปทั่วภูเขา ฟู่จ้าวหนิงได้ยินเสียงกรีดร้องอย่างเลือนราง หยุดและขมวดคิ้ว ทิศทางนี้มุ่งหน้าไปยังสะพานแขวน ถ้าพวกเขาไม่ตกอยู่ในอันตรายร้ายแรง คนเหล่านั้นคงไม่กรีดร้องน่ากลัวขนาดนั้น มีคนอื่นกำลังมาหรือ? พวกเขากำลังตามล่าเธออยู่หรือ? เธอ เด็กสาวผู้ยากไร้จากตระกูลที่ตกต่ำ จะไม่เป็นที่ต้อนรับจริงๆ หรือ? ฟู่จ้าวหนิงเห็นกอหญ้าเล็กๆ หลายกอขึ้นอยู่ในรอยแตกข้างหน้า ดวงตาของเธอเป็นประกาย เธอต้องหาอะไรมาป้องกันตัว เธอรีบเดินไปหยิบพลั่วเล็กๆ ออกมาขุดกอหญ้าออก เตรียมหาอะไรที่เหมาะสมมาบดขยี้มัน</p>\n<p>“ถ้าห้องปรุงยายังอยู่ตรงนี้ก็คงดี” ฟู่จ้าวหนิงพึมพำออกมาโดยไม่รู้ตัว ไม่นานหลังจากที่เธอเข้าเรียนในโรงเรียนแพทย์ทหาร คุณปู่ของเธอก็ไม่เสียดายเงินที่ซื้อห้องทำงานให้เธอ ซึ่งท่านได้ดัดแปลงเป็นห้องปรุงยาและห้องฝึกผ่าตัด เนื่องจากสถานที่นั้นอยู่ระหว่างการปรับปรุงขณะที่เธอเรียน และอุปกรณ์ที่ทันสมัยที่สุดชุดหนึ่งที่คุณปู่สั่งมาใช้เวลานานกว่าจะมาถึง ท่านจึงไม่เคยบอกเธอ เธอเพิ่งรู้ถึงการมีอยู่ของพรสวรรค์นี้ก็ตอนที่ปู่ของเธอกำลังจะตาย แต่ตอนนั้นเธอยังฝึกฝนไม่เสร็จและไม่สามารถเปิดห้องปรุงยาเพื่อช่วยชีวิตเขาได้ ต่อมา เมื่อใดก็ตามที่เธออารมณ์ไม่ดี เธอจะไปอยู่ในห้องปรุงยา ปรุงยาและทำการวิจัยอย่างบ้าคลั่ง</p>\n<p>ขณะที่ฟู่จ้าวหนิงกำลังคิดเช่นนั้น สายตาของเธอก็พร่ามัวลงทันที และในวินาทีต่อมา เธอก็พบว่าตัวเองอยู่ในห้องปรุงยาที่คุ้นเคย!</p>\n<p>เมื่อมองไปยังสภาพแวดล้อมที่คุ้นเคย อุปกรณ์ทดลอง โต๊ะเครื่องมือปรุงยา เสื้อคลุมสีขาวและมีดผ่าตัดของเธอ ฟู่จ้าวหนิงก็ตกตะลึง เกิดอะไรขึ้น? เธอควรจะอยู่ในหุบเขาจันทร
