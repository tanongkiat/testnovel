์ล่าง แล้วเธอจะออกไปได้อย่างไร? เธอไม่เห็นประตู! ประตูห้องปรุงยาถูกแทนที่ด้วยกำแพงสีขาว เธอออกมาจากหุบเขาจันทร์ล่างได้อย่างไร?</p>\n<p>ขณะที่เธอกำลังคิดเช่นนั้น สายตาของฟู่จ้าวหนิงก็พร่ามัวลงอีกครั้ง และเธอก็กลับมาอยู่ที่เดิม! “คุณปู่...” ฟู่จ้าวหนิงอดไม่ได้ที่จะลองพูดอีกสองสามครั้ง พบว่าห้องปรุงยาราวกับมีมิติเคลื่อนที่ตามความคิดของเธอ! เธอตกใจและคิดถึงคุณปู่มาก หรือว่าความรักของคุณปู่ที่มีต่อเธอได้มอบพลังเช่นนี้ให้กับห้องปรุงยา? “คุณปู่...</p>\n<p>จ้าวหนิงคิดถึงคุณปู่มาก” ฟู่จ้าวหนิงยังคงกำสมุนไพรสองสามกำมือไว้แน่น นั่งยองๆ บนพื้น น้ำตาเอ่อล้น “ฟิ้ว!” ทันใดนั้นก็มีบางอย่างพุ่งผ่านพุ่มไม้ข้างหน้า ขัดจังหวะความเศร้าโศกของฟู่จ้าวหนิง เธอรีบลุกขึ้น รวบรวมสติ โยนสมุนไพรลงตะกร้า คว้าพลั่ว แล้วรีบวิ่งไปยังต้นเสียง เธอสังเกตรอบๆ อย่างระมัดระวังและไม่เห็นใคร ดังนั้นเสียงนั้นต้องมาจากสัตว์แน่ๆ จังหวะดีทีเดียว เพราะเธอจะมาอยู่บนภูเขาสามวัน คนในวังไม่ให้เวลาเธอเตรียมอาหารเลย และที่พำนักขององค์ชายจุนก็ไม่น่าเชื่อถือ ดังนั้นนอกจากจะหาสมุนไพรแล้ว เธอยังต้องหาอาหารบนภูเขาอีกด้วย ฟู่จ้าวหนิงมองเห็นร่างสีเทาเล็กๆ ร่างหนึ่งแล้ว จึงใช้พลั่วขุดลงไป</p>"}, "27": {"chapter_number": 27, "chapter_title": "第27章是不是飄了", "content": "<p>กระต่ายป่าตัวหนึ่งถูกแทงด้วยพลั่ว อาหารเย็นเรียบร้อยแล้ว ฟู่จ้าวหนิงรีบเก็บกระต่ายไปเก็บไว้ เมื่อไม่มีใครอยู่แถวนั้น เธอก็แอบเข้าไปในห้องปรุงยา น่าเสียดายที่เธอมีเวชภัณฑ์เก็บไว้เพียงเล็กน้อย หากเธอรู้ว่าเธอจะถูกส่งตัวไปยังอาณาจักรจ้าวและห้องปรุงยาจะไปกับเธอด้วย เธอคงจะตุนสมุนไพรไว้เยอะๆ โชคดีที่เธอมีมีดผ่าตัดสองชุด อุปกรณ์ปรุงยา และเวชภัณฑ์ปฐมพยาบาลมากมาย ด้วยห้องปรุงยานี้ เธอสามารถกลั่นและสังเคราะห์สมุนไพรให้ได้มากที่สุดเท่าที่จะเป็นไปได้หลังจากที่หาเจอ ซึ่งจะมีประสิทธิภาพมากกว่าการต้มยาธรรมดาๆ! ความมั่นใจในการช่วยชีวิตปู่ของเธอเพิ่มขึ้นจาก 70% เป็น 90% ตราบใดที่เธอยังมีเวลา</p>\n<p>ตราบใดที่เธอสามารถหาสมุนไพรได้ครบ สมุนไพรที่เธอกำลังขุดอยู่นั้นเรียกว่า &quot;สมุนไพรระงับความรู้สึก&quot; และมันใช้งานง่าย เธอเพียงแค่ต้องนำไปตากแห้ง บดให้เป็นผงอย่างรวดเร็ว และเก็บไว้ หลังจากเตรียมผงสมุนไพรชาเสร็จ ฟู่จ้าวหนิงก็รีบออกจากห้องปรุงยาและออกไปหาสมุนไพรต่อ หุบเขามูนวัลเลย์เป็นแหล่งทรัพยากรที่อุดมสมบูรณ์จริงๆ หลังจากเดินไปครึ่งชั่วโมง ฟู่จ้าวหนิงก็ขุดเจอสมุนไพรสองชนิดแล้ว ทันใดนั้นเธอก็ได้ยินเสียงน้ำกระเซ็นกระทบหิน ซึ่งบ่งบอกว่าเป็นหน้าผา สถานที่แบบนี้อาจมีสมุนไพรหายากซ่อนอยู่ หรืออาจจะเป็นไม้โอ๊กคุณภาพสูง ฟู่จ้าวหนิงจึงรีบระบุทิศทางและวิ่งไปทางนั้น “ฟ่อ!”</p>\n<p>งูพิษตัวหนึ่งพุ่งลงมาจากกิ่งไม้ด้านบนอย่างกะทันหัน เตรียมจะกัดคอเธอ เมื่อได้ยินเสียงและได้กลิ่นเหม็น ฟู่จ้าวหนิงจึงรีบคว้าเข็มเย็บผ้าแล้วแทงงู เข็มแทงงูเข้าที่จุดสำคัญพอดี งูร่วงลงมา และฟู่จ้าวหนิงก็รับมันไว้ได้ เป็นงูห้าก้าว สีหน้าของเธอสงบ เธอโยนงูลงในตะกร้า เผื่อไว้ในกรณีที่หาพืชสมุนไพรสิบชนิดไม่เจอ หรือหากพวกมันสร้างปัญหาเพิ่มอีก เธอก็สามารถใช้ถุงน้ำดีของงูเป็นยาได้ ฟู่จ้าวหนิงถือเจ้างูไว้ในมือแล้ววิ่งต่อไปยังจุดหมาย แต่เธอยังวิ่งไปได้เพียงไม่กี่ก้าว ลมก็พัดกระหน่ำมาจากด้านหลัง คิ้วของเธอขมวดเข้าหากัน โดยไม่หันหลังกลับ เธอพุ่งตัวไปข้างหน้า ลงพื้นแล้วกลิ้งไปด้านข้างทันที</p>\n<p>อาวุธลับพุ่งเข้าใส่จุดที่เธอล้มลง ในที่สุดพวกชายชุดดำก็ตามทันฟู่จ้าวหนิง พวกเขาทั้งหมดต่างตกใจที่ฟู่จ้าวหนิงสามารถหลบอาวุธลับได้ ในช่วงเวลาสั้นๆ นั้น ฟู่จ้าวหนิงก็กระโดดขึ้นยืนและพุ่งไปข้างหน้า หญ้าบนภูเขาสูงและหนาทึบ หากเธอหายเข้าไปในนั้น พวกเขาก็จะหาเธอไม่เจอได้ง่ายๆ เธอรู้สึกว่ามีคนจำนวนมากกำลังเข้ามาใกล้ และพวกเขาทั้งหมดล้วนเชี่ยวชาญด้านศิลปะการต่อสู้และมีอาวุธ การเผชิญหน้าโดยตรงจะเป็นผลเสีย ทางที่ดีที่สุดคือจัดการพวกเขาทีละคน “ฆ่าเธอ!” ชายชุดดำเผยตัวออกมาทันทีและไล่ตาม ฟู่จ้าวหนิงพุ่งเข้าไปในพุ่มหญ้าสูง หมอบต่ำ และหลบหลีกไปตามพุ่มไม้ หายตัวไปจากสายตาของพวกเขาอย่างรวดเร็ว “นางอยู่ไหน?”</p>\n<p>ชายชุดดำคนหนึ่งสบถออกมา ชักดาบออกมา และแยกย้ายกันไปหลายทิศทาง หายตัวไปในพุ่มหญ้าเช่นกัน มีคนเดินผ่านจุดที่ฟู่จ้าวหนิงเพิ่งเดินผ่านไป คอและหลังมือของเขาสัมผัสกับหญ้า ตอนแรกเขาไม่รู้สึกอะไร แต่หลังจากเดินไปไม่กี่ก้าว เขาก็รู้สึกได้ว่ามีบางอย่างผิดปกติ คอและมือของเขาเริ่มแข็ง ทำให้ขยับตัวได้ยาก “หญ้าพวกนี้มีพิษ” เขาพูด กำลังจะเตือนเพื่อนร่วมทาง เมื่อฟู่จ้าวหนิงปรากฏตัวขึ้นข้างๆ เขาอย่างเงียบๆ แล้วใช้มีดผ่าตัดกรีดคอเขา นางยังไปไม่ไกลเลย!</p>\n<p>ดวงตาของชายชุดดำเบิกกว้าง และเขาก็ล้มลง ...คฤหาสน์หลี่ แพทย์ผู้มีชื่อเสียงหลี่นั่งอย่างสงบในห้องโถงดอกไม้เล็กๆ กำลังชงชา สาวใช้กำลังเล่นพิณอยู่ข้างๆ เขา และมีธูปจุดอยู่บนแท่นบูชา—กลิ่นหอมที่เขาปรุงเองนั้นช่างน่ารื่นรมย์และสดชื่น หมอหลี่จิบชาอย่างเอร็ดอร่อยพลางเลียริมฝีปาก คนรับใช้ข้างๆ ดูเป็นกังวล “ท่านอาจารย์ ท่านจะให้คนจากวังหลวงจุนรอจริงๆ หรือครับ?” คนจากวังหลวงจุนเพิ่งมาเชิญหมอหลี่ แต่พอได้ยินว่าเขาจะมารักษาองค์ชายจุน หมอหลี่ก็รีบมาที่ห้องโถงดอกไม้เล็กๆ และจัดเตรียมท่าทาง “ให้พวกเขารอไปก่อน ไปพาหนูน้อยมา ฉันต้องทำให้เหยาเอ๋อร์สงบลง” หมอหลี่ค่อนข้างพอใจกับตัวเอง หลี่จือเหยารีบวิ่งมา</p>\n<p>“ท่านพ่อ คนจากวังหลวงจุนมาเชิญท่าน!” หลี่จือเหยาตื่นเต้นมาก “พ่อของฉันเก่งจริงๆ!” “นั่นแหละที่พ่อบอกเจ้าเสมอว่าอาณาจักรจ้าวขาดแคลนแพทย์ และผู้ที่มีฝีมือทางการแพทย์ยอดเยี่ยมอย่างพ่อของเจ้านั้นยิ่งหายากกว่า” หมอหลี่พูดอย่างเย่อหยิ่งว่า “ข้าเคยพูดไปแล้ว แม้แต่พระราชินียังให้ความเคารพข้าเลย พวกเจ้าไม่ต้องกลัวองค์ชายจุนหรอก ดูสิ ตอนนี้องค์ชายจุนกำลังอ้อนวอนขอมาหาข้าไม่ใช่เหรอ?” “ท่านพ่อ ท่านพูดถูก!” หลี่จือเหยาเองก็เย่อหยิ่งเช่นกัน เกือบจะปรบมือและหัวเราะออกมาดังๆ “ใครบอกให้องค์ชายจุนแต่งงานกับยัยฟู่จ้าวหนิงนั่นกัน? องครักษ์ของเขายังเตะพี่เสี่ยวอีก!</p>\n<p>ท่านพ่อ อย่ารักษาเขาเลย ปล่อยให้เขาป่วยตายไปเถอะ” คนรับใช้ตกใจกลัว “ท่านอาจารย์ ท่านหญิง นั่นองค์ชายนะ! ไม่กลัวหัวขาดบ้างเหรอที่พูดแบบนั้น?” คนรับใช้รู้สึกว่าท่านอาจารย์หยิ่งยโสขึ้นมากในช่วงสองปีที่ผ่านมา “พูดสิ่งที่พวกเจ้าพูดเมื่อกี้อีกครั้งสิ” เสียงหนึ่งดังขึ้น พวกเขาทั้งหมดตกใจและหันไปมองที่ประตู เห็นองครักษ์ชุดดำยืนอยู่ตรงนั้นด้วยใบหน้าเย็นชาและเคร่งขรึม จ้องมองหลี่จือเหยาอย่างตั้งใจ “เจ้าพูดว่าใครควรตายเพราะโรคภัยไข้เจ็บ?” ยามชุดดำถามหลี่จือเหยาอย่างดุดัน หลี่จือเหยาผู้ถูกตามใจมาตั้งแต่เด็กไม่เคยเจอความอัปยศอดสูเช่นนี้มาก่อน “ถ้าข้าพูดอีกครั้งล่ะ?” เธอโต้กลับ มือเท้าสะเอว จ้องมองกลับอย่างโกรธแค้น “เจ้าคนรับใช้ต่ำต้อยกล้าดียังไงมาทำกับข้าเช่นนี้?</p>\n<p>เจ้าไม่รู้หรือว่าตัวเองอยู่ที่ไหน?” จากนั้นเธอก็เดินไปยืนข้างๆ หมอหลี่ “เจ้ารู้ไหมว่านี่ใคร? อย่าลืมว่าเจ้ามาที่นี่ทำไม ถ้าเจ้าจะขอความช่วยเหลือก็ควรทำตัวให้สมน้ำสมเนื้อ เจ้าไม่อยากให้พ่อของข้าช่วยเจ้าชายของเจ้าหรือ? มาคุกเข่าลงแล้วขอร้องพ่อของข้าสิ!” ยามชุดดำชักดาบออกมาทันที ร่างของเขาว่องไวไปที่ข้างๆ หลี่จือเหยา ก่อนที่หลี่จือเหยาจะทันได้ตอบโต้ เธอก็รู้สึกถึงดาบเย็นๆ ที่จ่ออยู่ที่คอ และเธอกรีดร้องด้วยความหวาดกลัว “อ๊ะ! ท่านพ่อ!” สีหน้าของหมอหลี่เปลี่ยนไป เขาลุกขึ้นยืนอย่างกะทันหัน “นี่บ้านของข้า!</p>\n<p>เจ้าต้องการอะไร?” ยามชุดดำพูดอย่างเย็นชาว่า “กรุณาเก็บข้าวของแล้วมากับข้าเถิด หมอหลี่” “ถ้าข้าไม่ไปล่ะคะ?” ยามชุดดำชักดาบออกมา เส้นผมสีดำสองสามเส้นร่วงลงมา ทำให้หลี่จือเหยาตกใจจนกรีดร้องอีกครั้ง ผมของเธอ! “ถ้าหมอหลี่กล้าชักช้าไปกว่านี้ ลูกสาวของท่านจะไม่เพียงแค่เสียผม แต่จะเสียหัว!” “หยุด หยุด! ข้าจะไปกับท่านเดี๋ยวนี้” หมอหลี่เดินตามพวกเขาไปยังบ้านขององค์ชายจุนด้วยสีหน้าบึ้งตึง เมื่อมาถึงบ้านขององค์ชายจุน องค์ชายจุนซีดเผือดและพิงเตียงอยู่ เมื่อได้ยินเสียงฝีเท้าข้างนอก เขาก็เอื้อมมือไปหยิบหน้ากากมาสวม หมอหลี่เข้ามาพร้อมกับศิษย์ของเขาและเห็นองค์ชายจุนสวมหน้ากาก ทันใดนั้นเขาก็รู้สึกหนาวสั่น</p>\n<p>ด้วยเหตุผลบางอย่าง แม้ว่าองค์ชายจุนจะสวมหน้ากากและนอนอยู่บนเตียง เขาก็ยังรู้สึกถึงแรงกดดันอยู่ดี เดิมทีหมอหลี่วางแผนจะตรวจร่างกายเจ้าชายจุนอย่างคร่าวๆ หรืออาจจะทำให้เขาลำบากใจและหวาดกลัว แต่ที่น่าประหลาดใจคือ เมื่อได้อยู่ต่อหน้าเจ้าชายจุนจริงๆ เขากลับไม่กล้าขยับเขยื้อนเลยสักนิด หลังจากตรวจชีพจรของเจ้าชายแล้ว เหงื่อเย็นๆ ก็ไหลท่วมหลังหมอหลี่ “เป็นอย่างไรบ้างครับ?” เจ้าชายจุนถาม</p>"}, "28": {"chapter_number": 28, "chapter_title": "第28章你是想死嗎", "content": "<p>หมอหลี่ถอยหลังไปสองก้าว ทำไมเขาถึงรู้สึกกดดันแค่เพียงได้ยินชื่อของเจ้าชายจุน? “ชีพจรของเจ้าชายจุนบางครั้งก็แรง บางครั้งก็อ่อน บางครั้งก็เร็ว บางครั้งก็ช้า พลังปราณและเลือดของเขาถูกปิดกั้น ปอดของเขาเย็น กระเพาะอาหารของเขาอ่อนแอ และม้ามของเขา… ก็อ่อนแอด้วย” “แล้วไงล่ะ?” เจ้าชายจุนถามอีกครั้ง เขาคิดว่าตัวเองเป็นหมอจากการเจ็บป่วยมานาน เขาสามารถคลำชีพจรและรู้ชีพจรของตัวเองได้ แต่การรู้ไม่ได้หมายความว่าเขาสามารถรักษาได้ ดังนั้นสิ่งที่เขาต้องการจากหมอหลี่ตอนนี้คือการรักษา หมอหลี่ถอยหลังไปอีกหนึ่งก้าวโดยไม่รู้ตัว “เอาล่ะ เจ้าชายจุนจำเป็นต้องใช้โสมและเห็ดหลินจือคุณภาพสูงเพื่อบำรุงพลังปราณและเลือด และเสริมสร้างม้ามและกระเพาะอาหารของเขา มีสมุนไพรที่จำเป็นอยู่ค่อนข้างมาก และยากที่จะระบุทั้งหมด แต่ฉันมีสูตรยาเม็ดบำรุงสิบอย่างที่น่าจะเหมาะสมกับฝ่าบาทมาก แม้ว่าสมุนไพรบางอย่างจะยังขาดอยู่…” “โสม?</p>\n<p>เห็ดหลินจือ? ยาเม็ดบำรุงสิบอย่าง?” เจ้าชายจุนพูดซ้ำคำพูดของเขาด้วยความขบขัน แม้แต่ชิงอี้ที่ยืนอยู่ใกล้ๆ ก็ยังรู้สึกหนาวสั่น นี่คือหมอเทพงั้นหรือ? “ใช่แล้ว สมุนไพรที่ขาดไปเล็กน้อยอาจหาได้จากแพทย์หลวง พรุ่งนี้ข้าจะไปที่พระราชวังและขอร้องพระนางซูสีไทรให้ทรงโปรดประทานสมุนไพรเหล่านั้นมาให้ข้า เพื่อที่ข้าจะได้ปรุงยาบำรุงสิบประการให้แก่องค์ชายจุน” หมอหลี่เรียกความมั่นใจกลับคืนมาและยืดหลังตรง เขาบอกองค์ชายจุนว่าเขาสามารถเข้าพระราชวังได้ทุกเมื่อและมีอิทธิพลต่อพระนางซูสีไทรมาก หากเขาต้องการสมุนไพรจากแพทย์หลวง พระนางซูสีไทรก็จะทรงโปรดประทานให้ ดังนั้น องค์ชายจุน เจ้าชายผู้ใช้ชีวิตอย่างสุขสบายที่อยู่ห่างไกลจากเมืองหลวงมานาน จะมีอะไรให้หยิ่งผยองนัก?</p>\n<p>เขากำลังใช้ลูกสาวสุดที่รักของเขามาข่มขู่! เขาจะทำให้เรื่องยาบำรุงสิบประการขององค์ชายจุนยากลำบากและบีบคั้นเอาทรัพย์สินของเขา! เมื่อคิดเช่นนั้น หมอหลี่ก็กลับมาเย่อหยิ่งอีกครั้ง “ท่านจะไปที่พระราชวังเพื่อขอสมุนไพรให้ข้าหรือ?” องค์ชายจุนถามอีกครั้ง “ใช่! แต่ก่อนที่ข้าจะปรุงยาบำรุงสิบชนิดให้องค์ชายจุน ทางบ้านขององค์ชายจุนต้องยอมรับข้อเรียกร้องข้อหนึ่งก่อน” “หมอหลี่ โปรดบอกข้ามา” น้ำเสียงขององค์ชายจุนอ่อนโยนลงเรื่อยๆ เมื่อได้ยินคำพูดของเขา ชิงอี้ก็รู้ว่าหมอหลี่ทำให้เจ้านายของเขาโกรธ “ต้องจัดการกับยามที่ส่งมาจากบ้านขององค์ชายจุนเพื่อไปตามข้ามาที่นี่!</p>\n<p>พูดตามตรง องค์ชายจุน ยามคนนั้นหยิ่งยโสและหยาบคายมาก เขาเอาดาบจ่อคอลูกสาวของข้า ตัดผมเธอ และขู่เอาชีวิตข้า! การมียามแบบนี้เป็นเรื่องน่าอับอายต่อชื่อเสียงขององค์ชายจุน” องค์ชายจุนเงียบไปครู่หนึ่ง “ถ้าอย่างนั้น ถ้าเขาไม่ขู่ท่านแบบนั้น ท่านก็คงไม่มารักษาข้าใช่ไหม?” หัวใจของหมอหลี่เต้นแรง เขาพูดอะไรผิดไปหรือเปล่า? ก่อนที่เขาจะพูดอะไร องค์ชายจุนก็สั่งอย่างใจเย็นว่า “ใครก็ได้ ไปที่บ้านหลี่ แล้วจับคุณหนูหลี่ผู้สูงศักดิ์คนนั้นเข้าคุก” “ครับ!” ยามข้างนอกตอบรับทันทีและหันหลังกลับไป หมอหลี่ตกใจ โกรธ และวิตกกังวล “องค์ชายจุน!” “ข้าอยากรู้ว่าลูกสาวหมอจะสูงส่งกว่าข้าได้แค่ไหน” องค์ชายจุนโบกมือ “ไปที่วังแล้วหาคนมาคอยคุ้มกันเจ้า” ชิงอี้คว้าตัวหมอหลี่และไล่เขาออกจากวังขององค์ชายจุน หมอหลี่จ้องมองประตูวังที่ปิดลงตรงหน้าด้วยความโกรธและความคับข้องใจ องค์ชายจุนคนนี้ ทำไมถึงเป็นแบบนี้ได้?</p>\n<p>“อาจารย์ เราจะทำอย่างไรดี?” ศิษย์ก็หวาดกลัวและตัวสั่นเช่นกัน แม้จะเป็นศิษย์ชั้นต่ำอย่างเขา แต่เขาก็รู้สึกว่าตัวเองเหนือกว่าคนอื่น มีคนกล่าวว่าแม้แต่คนเฝ้าประตูของอัครมหาเสนาบดีก็เป็นข้าราชการระดับเจ็ด และเขาก็รู้สึกเช่นนั้นเช่นกัน แต่วังขององค์ชายจุนกลับไม่ให้เกียรติพวกเขาเลย “รีบกลับ!” หมอหลี่รีบกลับบ้าน คนในวังขององค์ชายจุนกล้าที่จะจับลูกสาวของเขาไปขังคุกแบบนั้นหรือ? เขามีความสัมพันธ์ที่ดีมากกับเจ้าเมือง ถึงแม้หลี่จือเหยาจะถูกจับเข้าคุกจริง ๆ เขาก็สามารถช่วยเธอออกมาได้ทันที! “ฝ่าบาท ทุกคนต่างพูดกันว่าฝีมือการรักษาของหมอหลี่ในเมืองหลวงนั้นยอดเยี่ยมมากในช่วงไม่กี่ปีที่ผ่านมา</p>\n<p>นั่นเป็นเหตุผลที่พวกเรารีบกลับมา ตอนนี้ดูเหมือนว่าเขาจะเอาแต่พูดแต่ไม่ลงมือทำใช่ไหมคะ?” ชิงอี้กลับมายังที่พักขององค์ชายจุนหลังจากส่งคนอื่น ๆ กลับไปแล้ว น้ำเสียงของเธอเต็มไปด้วยความกังวล คำพูดของหมอหลี่ไม่ได้แตกต่างจากคำพูดของแพทย์คนอื่น ๆ ก่อนหน้านี้มากนัก นี่มันน่าผิดหวังจริง ๆ!</p>\n<p>องค์ชายจุนส่ายหัว “เขาอาจจะมองไม่เห็นก็ได้ ความเจ้าเล่ห์ของเขาอยู่ที่ว่าเขาอาจจะวินิจฉัยได้ว่าข้าถูกวางยาพิษด้วยสารพิษหลายชนิด และยังมีสาเหตุอื่น ๆ อีกด้วย แต่เขาไม่มั่นใจในการรักษา ดังนั้นเขาจึงไม่พูดถึงมัน” ชิงอี้ประหลาดใจ “หมายความว่าเขาตรวจวินิจฉัยแล้วจริง ๆ หรือคะ?” “มีเหตุผลที่เขาได้รับชื่อเสียงว่าเป็นแพทย์ผู้วิเศษ และสามารถกระทำการใดๆ ได้อย่างไม่ถูกลงโทษในเมืองหลวงมานานหลายปี โดยที่คลินิกและร้านขายยาใหญ่ๆ ทุกแห่งต่างก้มหัวให้เขา” แพทย์หลี่ไม่ใช่หมอเถื่อนอย่างแน่นอน “บ้าเอ๊ย! กล้าดียังไงถึงไม่พยายามอย่างเต็มที่เพื่อรักษาฝ่าบาท!” ชิงอี้โกรธจัด</p>\n<p>“สิ่งที่เขาพูดเกี่ยวกับการขาดสมุนไพรบางชนิดคงเป็นความจริง เขาไม่มีสมุนไพรเหล่านั้น” “งั้นวังล่ะ...” “วังจะให้ข้าหรือ?” เจ้าชายจุนเยาะเย้ย คนในวังคงหวังว่าเขาจะไม่สามารถหายาที่จำเป็นทั้งหมดมารักษาโรคได้ “ฝ่าบาท” ชิงอี้พลันนึกถึงฟู่จ้าวหนิง “คุณหนูฟู่บอกว่าเธอรู้จักการแพทย์ และตัวข้าเองก็เคยเห็นเธอรักษาท่านฟู่และคนรับใช้จากตระกูลฟู่ เธอตรวจชีพจร ฝังเข็ม ทายา และพันแผลให้เขา เทคนิคของเธอดูเชี่ยวชาญและมีประสบการณ์ ดังนั้นเธอต้องรู้จักการแพทย์จริงๆ” เจ้าชายจุนถอดหน้ากากออก แต่ก่อนที่เขาจะพูดอะไร เขาก็ไออีกครั้ง สีหน้าของชิงอี้เปลี่ยนไป เขาจะไอเป็นเลือดอีกแล้วหรือ?</p>\n<p>เจ้าชายเพิ่งใช้พลังภายในเพื่อระงับอาการไอ ถ้าเขาไออีกครั้ง... ความคิดนี้ยังไม่ทันเกิดขึ้น เจ้าชายจุนก็ไอเป็นเลือดออกมาอีกคำ “ฝ่าบาท!” “ส่งทหารองครักษ์ขึ้นไปบนภูเขา...” เจ้าชายจุนพูดได้เพียงครึ่งประโยคก่อนจะพยายามลุกขึ้นนั่ง ขัดสมาธิ และพยายามระงับอาการไอเป็นเลือด แม้ว่าเขาจะพูดไม่จบประโยค แต่ชิงอี้ก็เข้าใจความหมายของเขา “คนดูแล!” เขารีบเรียกคนดูแลเข้ามาเฝ้าเจ้าชายจุนและออกไปตามหาทหารองครักษ์ “นำคนไปที่ภูเขาลั่วเยว่เพื่อตามหาคุณหนูฟู่และปกป้องชีวิตของเธอ!” ชิงอี้สั่ง “ครับ” ทหารองครักษ์หลายคนหันหลังกลับทันทีและใช้พลังความเบาเพื่อออกจากวัง ในขณะนี้ ชิงอี้ก็รู้สึกเสียใจเล็กน้อย</p>\n<p>ถ้าเขารู้ว่าหมอหลี่เป็นแบบนี้ เขาคงไม่ปล่อยให้รองแม่ทัพหลิวปฏิบัติต่อฟู่จ้าวหนิงแบบนั้นเมื่อเช้านี้ ฟู่จ้าวหนิงโผล่ออกมาจากพุ่มไม้และเหลียวมองกลับไปยังพุ่มไม้สูงทึบ ไม่มีชายชุดดำคนไหนออกมาจากพุ่มไม้ได้ เธอจึงรีบเดินต่อไป ในที่สุดเธอก็มาถึงลำธารและเห็นหน้าผาหิน ลำธารไหลไปถึงขอบและไหลลงมาเป็นน้ำตก หมอกที่สะสมมาหลายปีทำให้หน้าผาชื้น มีมอสและหญ้าป่าหลากหลายชนิดขึ้นอยู่ รวมถึงดอกไม้ป่าที่ชอบน้ำบางชนิด ด้านหลังม่านน้ำมีส่วนที่ยื่นออกมาบนหน้าผา และมีต้นไม้เล็กๆ ต้นหนึ่งงอกออกมาจากรอยแตกของหินอย่างเฉียงๆ เจริญเติบโตอย่างอุดมสมบูรณ์ ฟู่จ้าวหนิงมีสายตาที่เฉียบคมและสังเกตเห็นทันทีว่ามีรูอยู่บนต้นไม้</p>\n<p>มีพืชเล็กๆ งอกอยู่ข้างใน และมีกลุ่มพืชที่มีดอกสีม่วงอยู่ใกล้ๆ ดวงตาของเธอเป็นประกายในทันที ฟู่จ้าวหนิงปีนขึ้นไปทันทีแล้วก้มลงมอง; ยังมีระยะห่างอีกหลายเมตรระหว่างพวกเขากับต้นไม้กลางหน้าผา ซึ่งสูงเกินกว่าจะเอื้อมถึง ในขณะที่ฟู่จ้าวหนิงกำลังนอนคิดหาทางออกอยู่นั้น ก็มีคนตะโกนใส่เธอว่า &quot;เฮ้!</p>\n<p>เด็กน้อย อยากตายหรือไง?&quot;</p>"}, "29": {"chapter_number": 29, "chapter_title": "第29章滾下來的老頭", "content": "<p>ฟู่จ้าวหนิงหันศีรษะไปเห็นชายชราคนหนึ่งแบกตะกร้ายาเดินโซเซมาทางเธอ เขาวิ่งลงเนินมาอย่างหอบเหนื่อย ดูเหมือนจะล้มได้ทุกเมื่อ ฟู่จ้าวหนิงยิ้มเล็กน้อยแล้วลุกขึ้นยืน “คุณปู่ ช้าลงหน่อย อย่าล้ม...” ก่อนที่เธอจะพูดจบ ชายชราก็สะดุดอะไรบางอย่างล้มลง ไม่เพียงแต่ล้มเท่านั้น แต่เขายังหยุดตัวเองไม่ได้และกลิ้งลงเนินไป “โอ้พระเจ้า! ฉันกำลังกลิ้งลงไป!” ชายชราร้องโวยวาย โบกมือไปมาอย่างสิ้นหวัง พยายามคว้าอะไรสักอย่างเพื่อหยุดตัวเอง แต่ก็ไม่เป็นผล “สาวน้อย จับฉันไว้! เร็วเข้า เร็วเข้า อ๊าาา ฉันเวียนหัวไปหมด!” “จับฉันไว้! ช่วยฉันด้วย...”</p>\n<p>ความเงียบสงบของป่าถูกทำลายลงอย่างสิ้นเชิงด้วยเสียงร้องของชายชราที่ยังคงร้องและคร่ำครวญขณะที่กลิ้งลงเนินไป ก้อนหินและวัชพืชบางส่วนถูกพัดปลิวไปกับการกลิ้งของเขา ฟู่จ้าวหนิงยิ้มเล็กน้อย เขาวางตะกร้าลงอย่างรวดเร็ว ก้าวไปข้างหน้าสองสามก้าว แล้วปักเท้าลงบนพื้นหินและรากไม้สองจุดอย่างมั่นคง มองดูชายชรากลิ้งลงเนิน เมื่อชายชรามาถึง ฟู่จ้าวหนิงก็คว้าตัวเขาไว้ด้วยมือทั้งสองข้างทันที ยึดตัวเองไว้เพื่อไม่ให้ล้มลงไปด้วย การกลิ้งของชายชราหยุดลงในที่สุด สายตาที่เคยหมุนติ้วก็เริ่มนิ่ง เขาอยู่นิ่งสักพักหนึ่ง หลับตาแน่น มือทั้งสองข้างปิดศีรษะ “คุณปู่?” ฟู่จ้าวหนิงเรียก ชายชราสะดุ้ง “คุณไม่เวียนหัวใช่ไหม?</p>\n<p>งั้นรีบขึ้นมาเร็ว แขนฉันเมื่อยแล้วที่ต้องประคองคุณแบบนี้” ฟู่จ้าวหนิงพูดอย่างหมดหนทาง จากนั้นชายชราก็ลืมตาขึ้นอย่างกะทันหัน มองท้องฟ้า แล้วมองฟู่จ้าวหนิง จากนั้นก็มองไปรอบๆ แล้วถอนหายใจโล่งอก “โอ้ ที่รัก หนูน้อย หนูช่วยชายชราไว้ได้จริงๆ!” เขาค่อยๆ ลุกขึ้นนั่งด้วยความช่วยเหลือของฟู่จ้าวหนิง ค่อยๆ ลดมือที่ยังคงสั่นเทาออกจากศีรษะ ใบหน้ายังคงแสดงความหวาดกลัวอยู่ “นั่นทำให้ฉันตกใจแทบตาย ฉันคิดว่าฉันจะตายที่นี่” ฟู่จ้าวหนิงรอจนกระทั่งเขานั่งลงก่อนจะปล่อยมือและถอยหลังไปสองก้าว ชายชราดูเหมือนจะมีอายุประมาณห้าสิบหรือหกสิบปี ผมหงอกครึ่งหนึ่ง มัดด้วยปิ่นปักผมไม้พีชธรรมดาๆ</p>\n<p>เสื้อคลุมผ้าของเขาแม้จะไม่ได้ปะชุน แต่ก็สีซีดจางจากการซัก และมีรอยฉีกขาดหลายแห่งจากการกลิ้งลงเนิน และเขาทำรองเท้าหายไปข้างหนึ่ง เธอมองขึ้นไปและมองหา จนพบรองเท้าในพุ่มวัชพืช เธอเดินไปหยิบขึ้นมาวางไว้ข้างเท้าของชายชรา ขณะที่เธอก้มลง เธอก็สังเกตเห็นรูในถุงเท้าผ้าของเขา มีนิ้วเท้าโผล่ออกมา ชายชรามองตามสายตาของเธอและรีบหยิบรองเท้าขึ้นมาสวม “มันต้องขาดมาก่อนหน้านี้แน่เลย!” เขากล่าว ฟู่จ้าวหนิงอดหัวเราะไม่ได้ “อืม เธอไม่ทันสังเกตว่าหลุมนั้นเก่ามาก ดูเหมือนว่าชายชราคนนี้ก็ลำบากเรื่องการเงินเหมือนกัน เลยขึ้นมาบนภูเขาเพื่อหาของกิน” ชายชราสวมรองเท้า มองดูมือที่พองเป็นแผลแล้วถอนหายใจ</p>\n<p>ก่อนหน้านี้เขาตะโกนเสียงดัง แต่เสียงถอนหายใจครั้งนี้กลับฟังดูสิ้นหวัง “คุณปู่ คุณมาทำอะไรที่ภูเขาลั่วเยว่คะ” ฟู่จ้าวหนิงถาม “คุณมาทำอะไรที่นี่คะ” ไม่คาดคิด ชายชราที่ดูสิ้นหวังกลับเงยหน้าขึ้นมาถามเธอกลับ พร้อมกับมองสำรวจเธอ “ฉันมาเก็บสมุนไพรค่ะ” ฟู่จ้าวหนิงเลิกคิ้วและพูดความจริง “คุณคิดจะลงไปดูว่ามีสมุนไพรดีๆ อยู่ตามต้นไม้บนหน้าผานั่นบ้างหรือเปล่าคะ” ชายชราจ้องมองเธอทันทีและเริ่มดุด่าว่า “ฉันบอกแล้วไง เด็กน้อย เจ้ากล้าหาญเกินไปหรือเปล่า? หน้าผานั่นอันตรายมาก สูงเสียดฟ้า เจ้าจะคว้าอะไรได้ถ้าเอื้อมมือลงไปแบบนั้น?</p>\n<p>ถ้าเจ้าพลัดตก เจ้าอาจกระดูกหักได้!” ก่อนที่ฟู่จ้าวหนิงจะพูดอะไร ชายชราก็พูดต่อทันที “ลมบนหน้าผานั่นจะแรงขึ้นในยามพลบค่ำ มันแปลกและแรงมาก ด้วยรูปร่างเล็ก ๆ ของเจ้า ลมพัดแรงแค่ครั้งเดียวก็อาจพัดเจ้าตกได้!” ลมแรงขึ้น? ฟู่จ้าวหนิงไม่รู้จัก แต่เธอมั่นใจว่าเธอจะไม่ตก และถึงแม้จะตก เธอก็สามารถคว้าต้นไม้ไว้ได้ทันเวลา เธอเคยทำแบบนี้มาหลายครั้งแล้ว แม้ว่าคำพูดของชายชราจะรุนแรง แต่เธอก็รู้ว่าเขาหวังดีจริง ๆ ดังนั้นฟู่จ้าวหนิงจึงไม่พูดอะไร “เจ้าไม่พอใจหรือ? อาจารย์ของเจ้าอยู่ที่ไหน? เจ้าได้อาจารย์ที่ไม่น่าไว้ใจมาบังคับให้เจ้าเก็บสมุนไพรหรือ?” เมื่อเห็นว่าเธอไม่ตอบ ชายชราก็จ้องมองเธออีกครั้ง</p>\n<p>ฟู่จ้าวหนิงสวมเสื้อผ้าของหงจั่วและคนอื่นๆ แม้ว่าเสื้อผ้าของสาวใช้ในคฤหาสน์องค์ชายจะทำจากผ้าที่ดีกว่าและสีสันสวยงามกว่าเสื้อผ้าของคนธรรมดา แต่ก็ยังเห็นได้ชัดว่าเป็นเสื้อผ้าของสาวใช้ ไม่ใช่เสื้อผ้าของหญิงสูงศักดิ์ แต่ก็ไม่ใช่เสื้อผ้าของหญิงสาวชาวนาธรรมดาเช่นกัน นั่นเป็นเหตุผลที่ชายชราเดาว่าเธออาจเป็นสาวใช้ของใครสักคน ฟู่จ้าวหนิงไม่ได้อธิบาย แต่เหลือบมองท้องฟ้าและแนะนำเขาว่า “คุณปู่ มันดึกแล้ว คุณควรรีบลงจากเขาเถอะ” เธอเห็นชายชรากลิ้งลงมาจากเขา แม้ว่าเขาจะมีร่างกายแข็งแรงและว่องไว แต่เขาก็ไม่ใช่ยอดฝีมือด้านการต่อสู้ ตอนนี้บนภูเขาไม่ปลอดภัยอย่างแน่นอน “ฉันยังหาสมุนไพรได้ไม่มากนัก ฉันจะไม่ลงจากเขา”</p>\n<p>ชายชราจ้องมองเธออย่างดุร้าย เดาเอาว่า “กลัวฉันจะขโมยสมุนไพรของเธอหรือ?</p>\n<p>ไม่ ใครหาเจอก็เก็บไว้ เธอจะมาบอกว่าเป็นของเธอไม่ได้!” “ฉันไม่ได้หมายความอย่างนั้น” ฟู่จ้าวหนิงกางมือออกอย่างช่วยไม่ได้ “บนภูเขามันไม่ปลอดภัยหรอกค่ะ” “เจ้าเคยไปภูเขาลั่วเยว่กี่ครั้งแล้ว?” ชายชราถามอีกครั้ง “ครั้งแรกค่ะ” ฟู่จ้าวหนิงตอบอย่างตรงไปตรงมา “ฉันมาที่นี่หลายสิบครั้งแล้ว ฉันมีประสบการณ์มากกว่าคุณเยอะ คุณเป็นใครถึงมาบอกว่ามันไม่ปลอดภัย คุณเป็นแค่เด็กผู้หญิงตัวเล็กๆ คุณควรจะเป็นคนที่ลงจากภูเขามากกว่า” “เอาล่ะ เอาล่ะ เจ้ามีประสบการณ์แล้ว เจ้าควรจะรู้มากกว่าว่าบนภูเขาตอนกลางคืนมันไม่ปลอดภัย ถ้าเจ้าไม่ลง ก็รีบหาที่พักคืนนี้เถอะ” ฟู่จ้าวหนิงอาจจะไม่มีความอดทนกับคนอื่นมากนัก</p>\n<p>แต่เพราะเธอเคยอยู่กับปู่ เธอจึงค่อนข้างอดทนกับคนแก่ “เด็กน้อย เราเป็นคนแปลกหน้ากัน แต่เจ้ากลับกังวลมากขนาดนี้” ชายชราพูดอย่างดูถูก ฟู่จ้าวหนิงไม่ได้พูดอะไรต่อ หยิบตะกร้าขึ้นมา และกำลังจะไปตรวจดูต้นไม้ต่อเมื่อได้ยินเสียงดังครืดคราด เธอหันไปเห็นชายชรากำลังกุมท้องอยู่ “ไม่ใช่ฉัน! ท้องฉันไม่ได้ร้อง!</p>\n<p>คนแก่ๆ อย่างฉันที่ขึ้นเขาไปเก็บสมุนไพรบ่อยๆ จะหิวได้ยังไงกัน?” ชายชราอุทานออกมาทันที ฟู่จ้าวหนิงกลั้นหัวเราะและหยิบซาลาเปาลูกสุดท้ายในตะกร้าออกมาให้เขา “ฉันเหลือซาลาเปาแค่ลูกเดียว มันเย็นแล้ว แต่ก็น่าจะยังอร่อยอยู่ เชิญรับประทานเถอะ” เธอคิดว่าชายชราจะสุภาพ แต่ที่น่าประหลาดใจคือ ชายชราที่เพิ่งบอกว่าตัวเองไม่หิว กลับเอื้อมมือไปรับซาลาเปา ยัดใส่ปากแล้วกัดคำใหญ่ “เห็นใจดีจังเลย ฉันจะไปช่วยขุดสมุนไพรด้วย” ชายชราพูดอย่างไม่ชัดเจนขณะกินซาลาเปา</p>"}, "30": {"chapter_number": 30, "chapter_title": "第30章你拜我為師吧", "content": "<p>ฟู่จ้าวหนิงปฏิเสธทันที “อย่าตามข้ามา” ดูเหมือนว่าไม่เพียงแต่ในวังเท่านั้น แต่คนอื่นๆ ก็อาจฉวยโอกาสนี้ฆ่าเธอได้เช่นกัน การที่ชายชราตามเธอไปนั้นอันตราย “ข้าเพิ่งบอกว่าเจ้ามีใจให้ข้า ทำไมเจ้าถึงใจร้ายขนาดนี้? เจ้าทนเห็นข้าอยู่คนเดียวในป่าลึกแบบนี้ได้หรือ?” ชายชรากินซาลาเปาหมดในไม่กี่คำ ราวกับได้พักหายใจ ฟู่จ้าวหนิงมองเขา “การที่เจ้าตามข้ามานั้นไม่ปลอดภัย” “หือ? ทำไม? เจ้าเป็นคนสร้างปัญหาหรือ?</p>\n<p>เจ้าไปยั่วยุคนชั่วหรือสัตว์ป่าหรือ? ทำไมการที่ข้าตามเจ้ามาถึงไม่ปลอดภัย?” ชายชราดูเหมือนจะสนใจขึ้นมาทันที พยายามถามคำตอบจากเธอ เธอไปยั่วยุชายชราช่างพูดหรือ? ฟู่จ้าวหนิงหยุดพูดและเดินไปที่ขอบหน้าผาอย่างระมัดระวังอีกครั้ง “ทำไมเจ้าไม่ฟังคำแนะนำเสียที สาวน้อย? ยังไม่ยอมแพ้อีกหรือ?” ชายชราเริ่มหมดความอดทนและตะโกนเรียกเธออีกครั้ง “กล้วยไม้สกุล Dendrobium nobile นั้นเก็บเกี่ยวได้เฉพาะตอนดึกเท่านั้น!” Dendrobium nobile?</p>\n<p>กล้วยไม้สกุล Dendrobium นั้นไม่ได้หายากนัก แต่กล้วยไม้สกุล *Dendrobium chrysanthum* นั้นมีสรรพคุณมากที่สุด หลังจากผ่านการทำให้บริสุทธิ์แล้ว คุณค่าทางยาของมันก็ยิ่งสูงขึ้น แต่ *Dendrobium chrysanthum* นั้นหายากมากในปัจจุบัน แทบจะสูญพันธุ์ไปแล้ว เธอไม่คาดคิดว่าจะมาเจอที่นี่! ยิ่งไปกว่านั้น ชายชรายังพูดถึง *Dendrobium chrysanthum* อย่างง่ายดาย แม้แต่แพทย์ส่วนใหญ่ก็อาจไม่รู้จักสมุนไพรหายากชนิดนี้ เขาถึงรู้ได้อย่างไร? “เอ๊ะ?” ชายชราก็ประหลาดใจกับปฏิกิริยาของเธอเช่นกัน “คุณหนู เจ้าก็รู้จัก *Dendrobium chrysanthum* ด้วยหรือ?” เมื่อได้ยินเช่นนั้น ฟู่จ้าวหนิงก็เข้าใจ</p>\n<p>ดูเหมือนว่าจะมีคนเพียงไม่กี่คนในเมืองหลวงของอาณาจักรจ้าวที่รู้จักดอกเบญจมาศ มิเช่นนั้นชายชราคงไม่ประหลาดใจขนาดนี้ แม้ว่าเธอจะรู้จักดอกเบญจมาศ แต่เธอก็ไม่เข้าใจจริงๆ ว่าทำไมต้องเก็บเกี่ยวตอนดึกดื่น ฟู่จ้าวหนิงจึงหันหลังกลับ “ฉันจะไม่ให้ดอกเบญจมาศนั้นแก่คุณ” เธอบอกกับชายชราตรงๆ “ก็ได้ๆ ฉันสู้คุณด้วยกระดูกแก่ๆ ของฉันไม่ได้หรอก!” ชายชราโบกมืออย่างหงุดหงิด “อย่าพูดเหมือนฉันจะแย่งมันไปจากเธอ ฉันเอาไม่ได้หรอก” “งั้นท่านชายชรา ช่วยบอกฉันได้ไหมว่าทำไมเราต้องรอจนถึงเที่ยงคืนถึงจะเก็บเกี่ยวได้” ใบหน้าของชายชราแข็งกร้าวขึ้น “เราไม่ได้เป็นญาติกันด้วยซ้ำ ทำไมฉันต้องบอกเธอแค่เพราะซาลาเปา?”</p>\n<p>ฟู่จ้าวหนิงไม่ได้โกรธเมื่อได้ยินเขาพูดเช่นนั้น “งั้นท่านชายชรา ท่านไปได้แล้ว” แค่นั้นเหรอ?</p>\n<p>จะไม่ถามอะไรอีกแล้วเหรอ? ชายชราเริ่มหมดความอดทน “จะไม่รบเร้าข้าบ้างเหรอ? อย่างน้อยก็ขอร้องข้าหน่อยก็ได้” “ฉันไม่เคยมีนิสัยขอร้องใครแบบง่ายๆ ในชีวิตเลย” ฟู่จ้าวหนิงกล่าว ดวงตาของชายชราเป็นประกาย เขาปรบมือ “นิสัยของเจ้าช่างถูกใจข้าเหลือเกิน เอาอย่างนี้ไหม เจ้ามาเป็นศิษย์ของข้า แล้วข้าจะบอกทุกสิ่งที่ข้ารู้และสอนทุกสิ่งที่ข้าทำได้ เจ้าสนใจไหม?” “เป็นศิษย์? ไม่สนใจ” “ทำไมเจ้าถึงเป็นแบบนี้ล่ะ เด็กน้อย?</p>\n<p>งั้นเราลองเปลี่ยนกันดู ข้าจะรับเจ้าเป็นศิษย์ของข้าเอง! เจ้าจะไม่มาเป็นศิษย์ของข้า แต่ข้าจะรับเจ้าเป็นศิษย์ของข้าเอง ตกลงไหม?” มันจะต่างกันตรงไหน? ฟู่จ้าวหนิงไม่มีความตั้งใจที่จะเป็นศิษย์เลย แต่ชายชราคนนี้ตั้งใจแน่วแน่ที่จะรับเธอเป็นศิษย์จริงๆ “นามสกุลของข้าคือจี ข้าเชี่ยวชาญด้านการเพาะปลูกสมุนไพร ข้าเห็นว่าเจ้ามีความสามารถและความสนใจในสมุนไพร และเจ้ายังมีกลิ่นของ ‘สมุนไพรแก้นอนไม่หลับ’ ติดตัวอีกด้วย คนที่แม้แต่รู้จัก ‘สมุนไพรแก้นอนไม่หลับ’ ก็มีคุณสมบัติเหมาะสมที่จะเป็นศิษย์ของข้าแล้ว!” ฟู่จ้าวหนิงตกใจในใจ เธอไม่คาดคิดว่าคุณปู่จีจะมีประสาทสัมผัสการดมกลิ่นที่เฉียบคมเช่นนี้! และเขายังรู้จัก</p>\n<p>‘สมุนไพรแก้นอนไม่หลับ’ อีกด้วย “เอาล่ะ ข้าขอประกาศให้เจ้าเป็นศิษย์ของข้าแล้ว ใครคัดค้านก็ไม่มีผล” คุณปู่จีเริ่มแสดงท่าทางไม่ละอายใจ “ศิษย์เอ๋ย ใครอยากจะสร้างปัญหาให้เจ้า?” ฟู่จ้าวหนิงไม่ได้ตอบ เพราะคุณปู่จีบอกว่าเดนโดรเบียมโนเบิลเก็บเกี่ยวได้เฉพาะตอนดึกเท่านั้น เธอจึงเชื่อเขา สมุนไพรชนิดนี้หายากมาก และปู่ของเธอก็ต้องการมัน ดังนั้นเธอจึงตั้งใจแน่วแน่ว่าจะต้องไปเอามาให้ได้ เมื่อเห็นว่าดึกแล้ว เธอจึงตัดสินใจอยู่รอที่นี่ ฟู่จ้าวหนิงเดินไปอีกหน่อยแล้วเลือกที่ที่มีหินล้อมรอบสามด้านและเป็นเนินลาดเพื่อพักผ่อน หลังจากวางตะกร้าลง เธอก็ไปหาฟืนแห้งมาก่อไฟ คุณปู่จีพูดไม่หยุดอยู่ข้างๆ เธอ พอไฟติดแล้ว</p>\n<p>ฟู่จ้าวหนิงก็หยิบพลั่วเล็กๆ ขึ้นมามองเขา “ฉันจะไปล่าสัตว์หาอาหาร คุณอย่าตามฉันมานะ” “ระวัง!” ก่อนที่เธอจะพูดจบ เธอก็รู้สึกได้ว่ามีคนกำลังเข้ามาใกล้ ในขณะนั้น คุณปู่จีก็คว้าอะไรบางอย่างจากกระเป๋าแล้วขว้างไปที่คนๆ นั้นพร้อมกับตะโกนว่า “ไอ้หมอนั่นมันคนชั่ว!” คนที่กระโดดออกมาไม่รู้ว่าตัวเองขว้างอะไรไป แต่ก็ฟาดดาบเข้าใส่ ปรากฏว่าเป็นถุงผ้าที่ฉีกขาดง่าย ผงสีดำกระจายไปทั่ว ฟู่จ้าวหนิงได้กลิ่นสมุนไพรมรณะทันที “ฉันจะพัด!” ลุงจีดึงพัดกระดาษยาวออกมาจากที่ไหนสักแห่ง สะบัดออก แล้วพัดไปทั่วบริเวณอย่างแรง ผงที่ลอยอยู่ในอากาศปลิวไปทางคนอื่นๆ “กลั้นหายใจ!” “ไอ้แก่สารเลวนั่นดักโจมตีเรา!” “อ่า ปากฉันชา...”</p>\n<p>คนข้างหลังเริ่มพูดจาไม่ชัดมากขึ้น ปากของพวกเขาก็ชาจากผงเช่นกัน แม้จะกลั้นหายใจก็ไร้ประโยชน์ แม้จะไม่สูดดมเข้าไป ผงก็จะทำให้ร่างกายชาและแข็งทื่ออย่างรวดเร็วหากสัมผัสกับผิวหนัง ในขณะนั้น ฟู่จ้าวหนิงรีบวิ่งเข้าไปคว้าดาบจากคนหนึ่ง แล้วจัดการพวกเขาในไม่กี่ครั้ง หันกลับมาเธอก็เห็นลุงจีมองมาที่เธอด้วยปากอ้าค้าง ดูเหมือนอยากจะพูดอะไรบางอย่างแต่ก็ลังเล “กลัวเหรอ?” ฟู่จ้าวหนิงเด็ดใบไม้สองสามใบมาเช็ดเลือดออกจากดาบ “ศิษย์ของฉัน ฉันเป็นห่วงเธอ เธออายุยังน้อยแต่ต้องใช้ชีวิตอย่างทุกข์ทรมานได้อย่างไร?” ท่านอาจารย์จีเห็นได้ชัดว่าคนพวกนี้ต้องการตัวฟู่จ้าวหนิง ทำไมไม่ฆ่าพวกมันไปเลยล่ะ?</p>\n<p>พวกมันจะต้องยืนอยู่เฉยๆ ให้ถูกฆ่างั้นหรือ? ฟู่จ้าวหนิงตกใจ คิดว่าท่านอาจารย์จีกลัวเธอ “แต่ท่านอาจารย์จี ข้าไม่คิดว่าท่านจะเก่งกาจในการใช้สมุนไพร ‘ทำให้หมดสภาพ’ ขนาดนี้” ผงนั้นไม่เพียงแต่มีสมุนไพรทำให้หมดสภาพเท่านั้น แต่ยังมีส่วนผสมอื่นๆ อีกด้วย ทำให้มีประสิทธิภาพมากกว่าการใช้สมุนไพรอย่างเดียว “เมื่อเรากลับไปที่เมืองแล้ว ข้าจะสอนเจ้าอย่างถูกต้อง และข้าสัญญาว่าจะไม่ยั้งมือ!” ท่านอาจารย์จีเริ่มภูมิใจ “ข้าจะไม่สอนใครถ้าเขาขอร้องข้า แต่ศิษย์ของข้า อย่างน้อยก็บอกชื่อเจ้าให้ข้าฟังหน่อย” เขาคงไม่รับศิษย์ที่แม้แต่ชื่อตัวเองก็ยังไม่รู้ “ข้าชื่อฟู่จ้าวหนิง” “ฟู่จ้าวหนิง? ชื่อเพราะจัง” ดวงตาของท่านอาจารย์จีเป็นประกายด้วยความยินดี ศิษย์ของเขาไม่ได้ปฏิเสธเขาหรือ?</p>\n<p>อย่างไรก็ตาม หลังจากครุ่นคิดอยู่ครู่หนึ่ง เขาก็รู้สึกว่ามีบางอย่างผิดปกติ “ทำไมชื่อนี้ถึงคุ้นหูจัง?” “ช่วยด้วย! ช่วยด้วย!” เสียงร้องขอความช่วยเหลือดังมาจากป่าใกล้ๆ ฟู่จ้าวหนิงมองไปทางนั้น “ทำไมวันนี้หุบเขาจันทร์ถึงคึกคักจัง?” คุณชายจีสงสัย “อ๊า! ช่วยด้วย! ช่วยด้วย!” เสียงร้องขอความช่วยเหลือจากป่าฟังดูสิ้นหวังยิ่งกว่าเดิม</p>"}, "31": {"chapter_number": 31, "chapter_title": "第31章不保證能救", "content": "<p>ลุงจีเดินไปตามทิศทางของเสียงได้ไม่ไกลนัก แล้วหันกลับมาเห็นฟู่จ้าวหนิงยังคงยืนอยู่ที่เดิม “ไม่ไปดูด้วยกันเหรอ?” “คุณปู่คะ คุณบอกว่าคุณแก่แล้วไม่ใช่เหรอ? ทำไมถึงมายุ่งเรื่องนี้ล่ะคะ?” ลุงจีจ้องมองอย่างไม่พอใจ “ฉันบอกแล้วไงจ๊ะ หนิงจื่อน้อย ปกติเราไม่ค่อยยุ่งเรื่องของคนอื่น แต่เราจะปล่อยให้คนตายอยู่เฉยๆ ไม่ได้นะ ไม่สิ รอไปก่อน ไปดูกันก่อนว่าเป็นใคร แล้วค่อยตัดสินใจว่าจะช่วยหรือไม่” เขาหยุดไปครู่หนึ่งแล้วเสริมว่า “ถ้าช่วยไม่ได้ เราก็วิ่งหนีเอา” ฟู่จ้าวหนิงเหลือบมองเสื้อผ้าที่ขาดวิ่นและบาดแผลเล็กน้อยหลายแห่งของเขา ส่ายหัวแล้ววิ่งตามไป “ช่วยด้วย! ใครก็ได้ช่วยเมียฉันด้วย!” เมื่อพวกเขาเข้าใกล้มากขึ้น ก็ได้ยินเสียงสั่นเครือของผู้ชายและเสียงครางเบาๆ ของผู้หญิงหลายคน ผู้หญิงเหรอ?</p>\n<p>ฟู่จ้าวหนิงเร่งฝีเท้าและวิ่งเข้าไปในป่า เมื่อมองดูร่างของหญิงสาวที่เดินจากไป อาจารย์จีก็พึมพำกับตัวเองด้วยความพึงพอใจ “นางนั้นโหดเหี้ยมแต่ก็อ่อนโยน ศิษย์เอกของข้าช่างน่าทึ่งจริงๆ” เบื้องหน้าในป่า ชายหนุ่มในชุดคลุมสีน้ำเงินถือดาบจ่อไปที่หมูป่า ด้านหลังเขา นอนอยู่บนพื้นหญ้าคือหญิงสาวคนหนึ่ง หมูป่าตัวเล็กกว่านอนอยู่บนพื้น ชายหนุ่มมีบาดแผลเลือดไหลที่ขาข้างหนึ่ง ทำให้ยืนลำบาก แต่เขาก็ยังพยายามทรงตัวอยู่ “พระเจ้า! เขาสู้กับหมูป่าเพียงลำพัง? แล้วเขายังไม่ตายอีกเหรอ?” อาจารย์จีมาถึงทันเวลาพอดี ตกตะลึงกับภาพตรงหน้า “ช่วย...ช่วยภรรยาของข้าด้วย! โปรดเถิด ท่านอาจารย์!” ชายหนุ่มในชุดคลุมสีน้ำเงินไม่กล้าหันไปมองพวกเขา กลัวว่าหากเสียสมาธิ หมูป่าจะพุ่งเข้าใส่ เขาจึงได้ยินแต่เสียงของอาจารย์จี ไม่รู้ว่าฟู่จ้าวหนิงก็อยู่ที่นั่นด้วย แต่เมื่อได้ยินเสียงของชายชรา หัวใจของเขาก็ตกวูบ ชายชราจะช่วยพวกเขาได้อย่างไร?</p>\n<p>ตอนนี้เขาได้แต่หวังว่าชายชราจะพาภรรยาของเขาไปได้ “ท่านผู้อาวุโส โปรดพาภรรยาของข้าไป! ข้าสัญญาว่าจะหยุดหมูป่าตัวนี้!” ก่อนที่เขาจะพูดจบ หมูป่าก็ฟื้นตัวและพุ่งเข้าหาพวกเขา เส้นทางของมันทำให้หญ้ากระจัดกระจายและพื้นดินสั่นสะเทือน ฟู่จ้าวหนิงกำดาบไว้ในมือ ดวงตาของเขาหรี่ลง และพุ่งไปข้างหน้า ชายหนุ่มยืนอยู่ตรงนั้น พยายามหลบหลีกอย่างสุดชีวิต หากเขาหลบ หมูป่าก็จะพุ่งตรงมาหาเขา และข้างหลังเขาก็คือภรรยาของเขา แต่แล้วเขาก็รู้สึกว่ามีมือคว้าคอเสื้อของเขา และเขาก็ถูกดึงไปด้านข้างอย่างแรง ร่างที่เพรียวบางขวางทางเขาไว้ ก่อนที่เขาจะทันได้เห็นว่าเกิดอะไรขึ้น หมูป่าก็พุ่งเข้าหาเขาแล้ว</p>\n<p>ฟู่จ้าวหนิงได้โปรยผงทำให้หมดสติไปจำนวนหนึ่ง และดาบของเธอก็เล็งไปที่ดวงตาของหมูป่า ทันใดนั้นเอง ดาบสามเล่มก็พุ่งผ่านอากาศพร้อมกันด้วยพลังภายใน และแทงเข้าที่หัวและคอของหมูป่า มีคนปรากฏตัวขึ้นตรงหน้าฟู่จ้าวหนิง คอยปกป้องเธอจากด้านหลัง “ทหารองครักษ์จากวังหลวงมาช้า คุณหนูฟู่ ท่านตกใจกลัว” ชายคนหนึ่งขวางทางฟู่จ้าวหนิงไว้ ขณะที่อีกสองคนจัดการกับหมูป่า ผู้ที่มีทักษะการต่อสู้จะพบว่าการต่อสู้กับหมูป่านั้นง่ายดาย ฟู่จ้าวหนิงถอนหายใจโล่งอก เธอเตรียมใจไว้แล้วว่าจะได้รับบาดเจ็บ เพราะการต่อสู้กับหมูป่าตัวใหญ่ขนาดนี้ด้วยรูปร่างที่ผอมบางของเธอนั้นค่อนข้างอันตราย แต่เธอก็ไม่ได้เตรียมตัวมาอย่างดีพอ</p>\n<p>ยาและอาวุธที่ซ่อนไว้ก็มีจำกัด จากนั้นความรู้สึกของเธอก็ซับซ้อนขึ้น เธอไม่ได้คาดคิดว่าวังหลวงจะส่งคนมา “ขอบคุณค่ะ” ฟู่จ้าวหนิงกล่าวขอบคุณทหารองครักษ์ทั้งสามคน เสียงดังตุบดังขึ้นด้านหลังเธอ เธอหันไปเห็นชายหนุ่มล้มลงกับพื้น พยายามลุกขึ้นยืน เลือดไหลทะลักออกมาจากบาดแผลที่ขา ทำให้เสื้อคลุมของเขาเปื้อนเลือดสีแดง “ขอบคุณที่ช่วยชีวิตผมนะ ภรรยาของผม...” ชายหนุ่มพยายามคลานไปหาหญิงสาวที่อยู่ด้านหลังเขา ชายชราจีทรุดตัวลงนั่งข้างๆ เธอแล้ว กำลังตรวจชีพจรของเธอ จงเจี้ยน องครักษ์จากบ้านขององค์ชายจุน สำรวจฟู่จ้าวหนิงก่อน เมื่อเห็นว่าเธอไม่ได้รับบาดเจ็บ เขาก็ถอนหายใจโล่งอก</p>\n<p>จากนั้นเขาก็ส่งสัญญาณให้องครักษ์อีกสองคนมาสมทบ ก่อนจะมองไปยังคนอื่นๆ ที่อยู่ตรงนั้น ฟู่จ้าวหนิงก็รีบเดินไปหาหญิงสาวที่หมดสติไปแล้ว “คุณปู่ คุณรู้จักยาบ้างไหมคะ” เธอถาม ชายชราจีดึงมือกลับ สีหน้าของเขาค่อนข้างเคร่งขรึม “ทารกในครรภ์อายุประมาณสี่เดือนแล้ว แต่สถานการณ์ไม่ดี คาดว่าคงไม่รอด” เขาแสดงความผิดหวังอย่างชัดเจน “ศิษย์ อาจารย์ของเจ้าเข้าใจเรื่องยาและสามารถใช้สมุนไพรได้หลายชนิด แต่ความรู้ทางการแพทย์นี้...” “ชายชราจี?” จงเจี้ยนมองไปที่ชายชราจีด้วยความตกใจ ไม่คิดว่าเขาจะอยู่ที่นี่ด้วย อาจารย์จีมองเขาเพียงแวบเดียวแล้วก็ไม่สนใจ เขาค้นเสื้อคลุมของตัวเองจนเจอขวดยาเล็กๆ หลายขวด เขาเลือกขวดหนึ่งออกมา</p>\n<p>เปิดออก แล้วเทยาเม็ดสีดำออกมา “ยาบำรุงเลือดนี้ให้เธอกินได้” เดิมทีเขาตั้งใจจะให้ฟู่จ้าวหนิงเป็นคนให้ยาหญิงสาว แต่ฟู่จ้าวหนิงหยิบยาขึ้นมาดมแล้วส่ายหัวคัดค้าน “เธอทานไม่ได้ เธอกำลังเลือดออกอยู่แล้ว ยานี้จะยิ่งทำให้เลือดไหลเร็วขึ้น ซึ่งจะเป็นอันตรายต่อเธอ” อาจารย์จีมองฟู่จ้าวหนิงด้วยความตกใจ “ศิษย์ของข้า เจ้ามีความรู้เรื่องยาหรือ?!” “คุณหนู โปรดช่วยภรรยาของข้าด้วย!” ชายหนุ่มลุกขึ้นไม่ได้ ใบหน้าเปื้อนน้ำตา สีหน้าอ้อนวอนขณะมองฟู่จ้าวหนิง “ข้าไม่สามารถรับประกันได้ว่าจะช่วยชีวิตเธอได้” เสียงของฟู่จ้าวหนิงเย็นชาและปราศจากความรู้สึกใดๆ “คุณหนู โปรดช่วยชีวิตภรรยาของข้าด้วย ส่วนลูกนั้น</p>\n<p>เรายังสามารถมีลูกด้วยกันได้ในอนาคต...” ชายหนุ่มกล่าวพลางทรุดตัวลงกับพื้นและร้องไห้อย่างเงียบๆ ฟู่จ้าวหนิงเหลือบมองเขาแล้วพูดกับท่านผู้เฒ่าจีว่า “ท่านมียาห้ามเลือดและยาสมานแผลอยู่บ้าง ทำไมไม่ไปทำแผลให้เขาหน่อยล่ะ?” “ครับ!</p>\n<p>ถ้าศิษย์ของข้าพูด ข้าจะไปทันที!” ท่านผู้เฒ่าจีรีบไปทำแผลให้ชายหนุ่ม จงเจี้ยนและคนอื่นๆ ยืนเฝ้าอยู่ใกล้ๆ ไม่กล้ารบกวนพวกเขา จงเจี้ยนอยู่ไม่ไกลจากฟู่จ้าวหนิง เมื่อเห็นเธอกำลังตรวจชีพจรของหญิงสาว ก้มหน้าลง แผ่รัศมีแห่งความมุ่งมั่นและจริงจังออกมา เขาอดไม่ได้ที่จะพูดด้วยน้ำเสียงที่อ่อนโยนลง เขาเคยได้ยินชิงอี้กล่าวว่าคุณหนูฟู่เชี่ยวชาญด้านการแพทย์ และตอนนี้ดูเหมือนจะเป็นความจริง ฟู่จ้าวหนิงไม่หันหน้ามามอง และพูดด้วยเสียงทุ้มต่ำว่า “พวกเธอ ถอดเสื้อผ้าชั้นนอกออก แล้วเอามาปิดบังบริเวณนี้ไว้” จงเจี้ยนตกใจ “ขอบคุณที่ช่วยค่ะ” ฟู่จ้าวหนิงกล่าวเสริม จงเจี้ยนมองไปที่ผู้หญิงคนนั้น</p>\n<p>และสังเกตเห็นทันทีว่ามีเลือดซึมออกมาจากชายกระโปรงของเธอ หัวใจของเขาเต้นแรง “ถอดเสื้อผ้าชั้นนอกออก!” เขาสั่งให้คนอื่นๆ ถอดเสื้อผ้าชั้นนอกออกเช่นกัน โดยใช้กิ่งไม้มาปิดบังตัวเอง และพวกเขาก็ล้อมรอบฟู่จ้าวหนิงและผู้หญิงคนนั้นไว้ ทำให้ฟู่จ้าวหนิงมีพื้นที่ค่อนข้างเป็นส่วนตัว ฟู่จ้าวหนิงหยิบกล่องยาฉีดและเข็มฉีดยาออกมาจากห้องยาของเธอทันที และฉีดยาระงับประสาทให้ผู้หญิงคนนั้น ยานี้เป็นยาที่เธอทำเอง ซึ่งใช้ในกรณีที่มีเลือดออกมาก และจะไม่ส่งผลกระทบต่อทารกในครรภ์ โชคดีที่เธอยังมียาเหลืออยู่ในห้องยา หลังจากฉีดยาแล้ว ฟู่จ้าวหนิงก็หยิบซองเข็มเงินออกมา ถอดเสื้อผ้าของหญิงสาว และทำการฝังเข็มเพื่อป้องกันการแท้งบุตร</p>\n<p>ในบ้านขององค์ชายจุน ชิงอี้รู้สึกวิตกกังวลอย่างมากเพราะองค์ชายจุนหมดสติไปหนึ่งชั่วโมงแล้วและยังไม่ฟื้น ในช่วงเวลาวิกฤตนี้ ทางวังจึงส่งขันทีไปแจ้งพระราชดำรัสของพระนางซูสีไทเฮา</p>"}, "32": {"chapter_number": 32, "chapter_title": "第32章畢竟三條命", "content": "<p>“พระราชโองการของพระนางซูสีไทร—เจ้าชายจุนไม่ยอมเสด็จมาปรากฏตัวเลยหรือ?” เสียงของขันทีแหลมสูงดังขึ้นขณะที่เขาพูดกับคนดูแลพระราชวังของเจ้าชายจุน “พระราชวังถูกปิดตาย ข้าพเจ้าขออนุญาตออกมาเป็นพิเศษ นี่เป็นเรื่องเร่งด่วน” “ท่านครับ เจ้าชายของเราประชวร จึงเสด็จเข้าบรรทมก่อนเวลา ข้าพเจ้าได้บอกท่านไปแล้วไม่ใช่หรือ? พระราชโองการของพระนางซูสีไทรก็เพียงพอแล้วที่จะให้ท่านบอกข้าพเจ้า เจ้าชายทรงมอบอำนาจให้ข้าพเจ้า หากเป็นเรื่องที่พระราชวังของเจ้าชายจุนสามารถทำได้ ข้าพเจ้าจะทำทุกอย่างเพื่อพระองค์ หากเป็นเรื่องที่ข้าพเจ้าทำไม่ได้ เราค่อยรายงานพระองค์พรุ่งนี้เมื่อพระองค์ทรงฟื้น” คนดูแลจงยังคงสงบ พระนางซูสีไทรทรงรีบร้อนเช่นนี้เพราะเจ้าชายกำลังจะมีสนมหรือ?</p>\n<p>ก่อนหน้านี้ พระองค์ทรงแสดงความเคารพและรักษาระยะห่างต่อพระราชวังของเจ้าชายจุน ไม่กล้าทำตัวสมพระเกียรติ แต่ตอนนี้ พระองค์ทรงกระวนกระวายถึงขนาดใช้ฐานะพระนางซูสีไทรกดดันพระราชวังของเจ้าชายจุน “เจ้าเป็นแค่คนรับใช้ชั้นต่ำ...” เสียงของขันทีดังขึ้นด้วยความโกรธจัด ขณะที่เขากำลังจะชี้ไปที่คนรับใช้เพื่อแสดงอำนาจ ทหารองครักษ์สองคนก็ก้าวออกมา จับด้ามดาบแน่นราวกับจะชักดาบ เสียงดาบกระทบกันดังสนั่นดับความโกรธของขันทีลงในทันที คนรับใช้จงผู้ไม่ยอมอ่อนน้อมหรือหยิ่งยโสกล่าวว่า “ข้าพเจ้าเป็นเพียงคนรับใช้ชั้นต่ำในวังขององค์ชายจุน แต่โปรดอย่าลืมว่าท่านก็เป็นแค่ขันทีชั้นต่ำในวังเช่นกัน” เขาโกรธจัด! ขันทีโมโหมาก</p>\n<p>แต่เขาก็ไม่กล้าก่อเรื่องในวังขององค์ชายจุน ก่อนมา พระนางซูสีไทเฮาตรัสว่า ถ้าเป็นไปได้ พระองค์จะพยายามลดความหยิ่งยโสขององค์ชายจุน แต่ต่อมาพระองค์ก็ทรงกำชับเขาว่าอย่าก่อเรื่องในวังขององค์ชายจุน ด้วยท่าทีที่แน่วแน่ของคนรับใช้ เขาจึงยอมถอยอย่างแท้จริง ขันทีถอนหายใจโล่งอก เสียงเบาลง “พระนางซูสีไทรทรงมีพระราชดำรัสเร่งด่วน ข้าจะไม่รบกวนองค์ชายจุนให้ลุกขึ้น ข้าจะไปแจ้งข่าวให้องค์ชายจุนทราบจากนอกห้อง และฟังคำตอบด้วยพระองค์เอง แล้วจึงกลับมารายงาน ท่านจงคิดอย่างไรครับ?” หากเขายังคงขัดขวางต่อไป พระนางซูสีไทรและคนอื่นๆ ก็จะเดาได้ว่าพระสุขภาพขององค์ชายจุนไม่ค่อยดีนัก ท่านจงจึงได้แต่พยักหน้า “ตกลง</p>\n<p>งั้นเชิญเข้าห้ององค์ชายจุนได้เลย ขันที” ขันทีถูกนำไปยังห้องขององค์ชายจุน ท่านจงเรียกไปที่ประตูหลายครั้ง และสักพักก็มีเสียงตอบกลับมาจากข้างใน “มีอะไรหรือ?” เสียงขององค์ชายจุนฟังดูอ muffled ขันทีตั้งใจฟัง พยายามแยกแยะว่าเป็นเสียงขององค์ชายจุนจริงหรือไม่ แต่องค์ชายจุนตรัสเพียงสองคำเท่านั้น “องค์ชายจุน โปรดส่งสารของพระนางซูสีไทรไปยังองค์ชาย: พิธีใหญ่การพนันและการแพทย์ในเมืองหลวงจะจัดขึ้นในอีกครึ่งเดือนข้างหน้า ในเวลานั้น เรายังต้องการหมอหลี่มาดูแลงานอยู่ ข้าได้ยินมาว่าหมอหลี่ทำให้องค์ชายโกรธ และหลี่จือเหยา บุตรสาวของหมอหลี่ ถูกคนขององค์ชายจับกุมและคุมขังไว้ โปรดเถิด ฝ่าบาท</p>\n<p>โปรดปล่อยตัวนางหลี่เพื่อเห็นแก่พิธีใหญ่การพนันและการแพทย์” ชิงอี้ที่เลียนเสียงองค์ชายจุนอยู่ในห้องแทบจะสบถออกมาเมื่อได้ยินเช่นนั้น หมอหลี่ถึงกับไปฟ้องพระนางซูสีไทรที่พระราชวัง!</p>\n<p>เพียงเพราะหลี่จือเหยาคนเดียว พระนางซูสีไทรยังส่งคนมาบีบบังคับองค์ชายในเวลากลางดึกเช่นนี้ “องค์ชายจุน?” ขันทีไม่ได้ยินคำตอบจึงถามซ้ำอีกครั้ง ชิงอี้ลังเล ไม่แน่ใจว่าองค์ชายจะยินยอมหรือไม่ เขานึกคำตอบไม่ออก ทันใดนั้น เสียงสองคำดังมาจากเตียงว่า “ข้าจะไม่ปล่อยมือ” เจ้าชายจุนตื่นขึ้นในจังหวะสำคัญนี้ ชิงอี้รีบวิ่งเข้าไปดู เห็นว่าใบหน้าของเจ้าชายจุนซีดเผือด และรอยแผลพิษบนใบหน้าดูน่ากลัวเป็นพิเศษ “ฝ่าบาท พระนางซูสีไทเฮาตรัสว่า...” “ออกไป” คำว่า “ออกไป” ที่เด็ดขาดนี้ยืนยันว่าเป็นเสียงของเจ้าชายจุน เขาไม่กล้าเถียงอีกต่อไป ก้มศีรษะลง และออกจากห้องของเจ้าชายจุนไป ทันทีที่ขันทีออกไป เจ้าชายจุนก็ไออีกครั้ง</p>\n<p>“ฝ่าบาท พิธีการพนันยาครั้งใหญ่จะนำแพทย์และพ่อค้ายาที่มีชื่อเสียงจากหลายประเทศมา เราน่าจะหาแพทย์และยาที่รักษาฝ่าบาทได้ในตอนนั้น” ชิงอี้รินน้ำร้อนให้เขาหนึ่งถ้วย พวกเขารีบกลับไปยังเมืองหลวงในเวลานี้ อันดับแรกเพื่อแต่งงานกับสนมและรับสิ่งที่จักรพรรดิองค์ก่อนได้ทิ้งไว้ให้เจ้าชาย และอันดับสองเพื่อเข้าร่วมพิธีการพนันยาครั้งใหญ่ “มีข่าวคราวอะไรจากภูเขาลั่วเยว่บ้างไหม?” รอยแผลพิษบนใบหน้าของเขาเริ่มคันอีกครั้ง เป็นอาการคันที่คนส่วนใหญ่ทนไม่ไหว แต่ถ้าสัมผัสหรือเกา รอยแผลก็จะลุกลาม เจ้าชายจุนกำผ้าห่มแน่น พยายามระงับความอยากเกา “ยังไม่ถึงเวลา” “ไม่มีข่าวคราวแสดงว่าเธอยังปลอดภัยดี”</p>\n<p>เจ้าชายจุนนึกถึงใบหน้าสดใสของฟู่จ้าวหนิง “ข้าไม่คิดว่าเธอจะเก่งกาจขนาดนี้” ครั้งนี้ เมื่อฟู่จ้าวหนิงเข้าไปในภูเขาเพื่อหาสมุนไพร พวกเขาทุกคนรู้ว่ามันอันตราย ตอนนี้ฟู่จ้าวหนิงผูกพันกับเขาอย่างมาก ใครก็ตามที่คิดจะทำร้ายเขา ใครก็ตามที่ไม่ต้องการให้เขาได้สิ่งของของจักรพรรดิผู้สละราชสมบัติ ก็คงอยากให้ฟู่จ้าวหนิงตาย “จงเจี้ยนน่าจะเจอคุณหนูฟู่แล้ว ด้วยจงเจี้ยนและคนอื่นๆ คอยคุ้มครอง คุณหนูฟู่น่าจะกลับมาอย่างปลอดภัย” ชิงอี้กล่าว “กลับมาอย่างปลอดภัยก็พอแล้วหรือ?” เจ้าชายจุนยิ้มในใจ ถ้าเธอหาสมุนไพรสิบชนิดไม่เจอ เธอคงลำบากมากเมื่อกลับมา บนภูเขา ฟู่จ้าวหนิงเก็บเข็มฝังเข็มและตรวจชีพจรของหญิงสาว</p>\n<p>ก่อนจะถอนหายใจโล่งอก เธอจัดเสื้อผ้าของหญิงสาวให้เรียบร้อย แต่ก็ขมวดคิ้วเมื่อเห็นชายกระโปรงเปื้อนเลือด ข้างนอก ชายชราจีได้ห้ามเลือดชายหนุ่มแล้ว มองดูบาดแผลของเขาด้วยความกังวลใจ “แผลนี้ใหญ่มาก ยาของข้าดีจึงห้ามเลือดไม่ได้ ตอนนี้เลือดหยุดแล้ว แต่แผลใหญ่มาก รักษาให้หายยาก ถ้าขยับตัวสักนิดก็คงเลือดไหลอีก” ฟู่จ้าวหนิงคลานออกมาและเหลือบมองบาดแผลของชายหนุ่ม “ต้องเย็บแผลนะ” “เย็บแผล?” ดวงตาของชายชราจีเบิกกว้าง หมายความว่าอย่างไร? เขาหมายความตามตัวอักษรเลยหรือ?</p>\n<p>“แต่ตอนนี้ยังไม่พร้อมที่จะเย็บแผล อีกทั้งลูกในท้องของหญิงคนนั้นก็ปลอดภัยแล้ว แต่เธอต้องเปลี่ยนเสื้อผ้าและกินยา การพักค้างคืนบนภูเขานั้นเป็นไปไม่ได้แน่นอน” ชายหนุ่มเงยหน้ามองฟู่จ้าวหนิง ดวงตาเป็นประกาย “คุณหนู ท่านหมายความว่าภรรยาและลูกของผมปลอดภัยดีใช่ไหมครับ?” “ตอนนี้ ตอนนี้พวกเขาปลอดภัยดี” ฟู่จ้าวหนิงหมุนข้อมือเพื่อบรรเทาอาการปวดจากการฝังเข็ม “แต่ท่านทั้งสองไม่สามารถพักค้างคืนบนภูเขาได้ มิฉะนั้นทั้งท่านและลูกในท้องจะไม่รอด” “ศิษย์ ท่านไม่จำเป็นต้องพูดตรงๆ อย่างนั้นก็ได้...” ท่านผู้เฒ่าจีกล่าวเบาๆ ฟู่จ้าวหนิงเหลือบมองเขา “ฉันจะบอกความจริงกับท่าน” “ท่านหญิง</p>\n<p>โปรดให้องครักษ์ของท่านพาภรรยาของข้าลงจากภูเขาด้วย ข้ามาที่เมืองหลวงเพื่อขอลี้ภัยกับลุงของข้า ข้าชื่อฉีหยุนไห่ เมื่อข้าได้พบลุงของข้าแล้ว ข้าจะตอบแทนความกรุณาของท่านและนายท่านอย่างแน่นอน” ฟู่จ้าวหนิงมองไปที่จงเจี้ยน ตอนนั้นมืดแล้ว จงเจี้ยนยืนเฝ้าอยู่ใกล้ๆ ขณะที่องครักษ์คนอื่นๆ ได้ก่อไฟแล้ว จงเจี้ยนเพิ่งยื่นคบไฟให้เธอเพื่อใช้ส่องสว่าง “นายท่านสั่งให้เราคุ้มครองคุณหนูฟู่” จงเจี้ยนกล่าว “พวกเจ้าจงทำเปลหามชั่วคราวแล้วพาคู่สามีภรรยาลงจากภูเขาไป” ฟู่จ้าวหนิงกล่าว “เพราะนี่คือชีวิตสามชีวิต” จงเจี้ยนลังเล “งั้นพวกเขาทั้งสี่คนก็ไป ข้าจะอยู่ที่นี่” ชิงอี้บอกให้พวกเขาเชื่อฟังคุณหนูฟู่เมื่อมาถึง “ช่างเถอะ</p>\n<p>ข้าไม่ต้องการการคุ้มครอง นอกจากนี้ ดูเหมือนว่ากฎคือไม่มีใครสามารถช่วยเหลือข้าได้?”</p>"}, "33": {"chapter_number": 33, "chapter_title": "第33章咱們不能輸", "content": "<p>คุณหญิงฉีกำลังตั้งครรภ์ และฟู่จ้าวหนิงยังคงห่วงใยลูกในท้อง มิเช่นนั้นเธอคงไม่เข้าไปยุ่งเกี่ยวมากขนาดนี้ เธออยากจะถามฉีหยุนไห่จริงๆ ว่าทำไมถึงมาเดินเตร่อยู่บนภูเขาในเวลานี้ ทั้งๆ ที่รู้ว่าภรรยากำลังตั้งครรภ์ แต่เธอก็ขี้เกียจเกินกว่าจะไปยุ่งเรื่องของคนอื่น “พวกเขาพาคุณชายฉีและภรรยาลงจากภูเขาแล้ว มิเช่นนั้นพวกเขาจะเข้าเมืองไม่ได้หลังจากลงมา” ประตูเมืองปิดแล้ว แต่ผู้ที่มีตราสัญลักษณ์ขององค์ชายจุนยังสามารถเข้าไปได้ “แต่คุณหญิงฟู่ โปรดให้ผมอยู่ด้วย ผมไม่รู้เรื่องสมุนไพรเลย ต่อให้ผมอยากช่วยก็ช่วยไม่ได้” จงเจี้ยนกล่าว “พาคุณลุงจีลงจากภูเขาไปด้วย” ฟู่จ้าวหนิงเหลือบมองคุณลุงจี “คุณลุง...คุณลุง...”</p>\n<p>จงเจี้ยนแทบกัดลิ้น เขาจ้องมองคุณลุงจีอย่างพูดไม่ออกกับสภาพที่ดูยุ่งเหยิงของเขา “คุณลุงจี คุณอยากลงจากภูเขาไปกับพวกเราไหม? ไม่ คุณลุงจี คุณต้องลงไปก่อน” จงเจี้ยนพลันนึกอะไรบางอย่างขึ้นมาได้ “ข้าไม่ได้จะลงจากภูเขา ข้าจะไปเก็บสมุนไพร เทศกาลพนันสมุนไพรใกล้จะมาถึงแล้ว ปีนี้ข้าจะแพ้ไม่ได้!” อารมณ์ของเฒ่าจีพลุ่งพล่านขึ้นมาทันที เขาจ้องมองจงเจี้ยนอย่างโกรธเคือง “เจ้าเป็นครอบครัวใคร?</p>\n<p>ทำไมถึงได้มีอำนาจขนาดนี้? ภูเขานี้เป็นของเจ้าหรือ? เจ้าคิดว่าข้าจะลงจากภูเขาเพราะเจ้าสั่งหรือ? มันจะน่าอับอายขนาดไหน?” “ฐานะของเจ้าจะส่งผลกระทบต่อคุณหนูฟู่ ถ้าคนรู้ว่าเจ้าอยู่บนภูเขากับคุณหนูฟู่ด้วย ไม่ว่าเธอจะเก็บสมุนไพรได้กี่ชนิด พวกเขาก็จะสงสัยว่าเจ้าช่วยเธอ” “อะไรนะ?” เฒ่าจีมองไปที่ฟู่จ้าวหนิง “เจ้ากำลังพนันหรืออะไรหรือ?” “เรื่องนี้อธิบายยาก...” จงเจี้ยนกล่าว “ไม่สิ อธิบายง่าย เฒ่าจีควรจะรู้เรื่องนี้ เฒ่าจี ข้าเป็นองครักษ์ขององค์ชายจุน คุณหนูฟู่เพิ่งแต่งงานกับองค์ชายของเรา” “โอ้พระเจ้า!” หลังจากที่จงเจี้ยนพูดเช่นนั้น ชายชราจีก็ตกตะลึงไปครู่หนึ่ง ก่อนจะเข้าใจในทันที</p>\n<p>เขามองฟู่จ้าวหนิงด้วยดวงตาเบิกกว้าง “ท่านแต่งงานกับองค์ชายจุนหรือ?” เขาดูตกใจมาก ฟู่จ้าวหนิงจึงรู้ในทันทีว่าชายชราจีผู้ดูยากจนคนนี้คงไม่ใช่คนธรรมดา เธอพยักหน้า “เขาบอกว่าฉันยังไม่ได้เป็นพระสนมขององค์ชายจุน” ชายชราจีกระทืบเท้า โน้มตัวเข้ามาใกล้ฟู่จ้าวหนิงแล้วกระซิบว่า “ช่างน่าเสียดาย ช่างน่าเสียดาย!</p>\n<p>ถ้าฉันรู้เร็วกว่านี้ ฉันคงห้ามไว้ได้แล้ว ถึงแม้องค์ชายจุนจะมีฐานะสูงส่ง แต่เขาก็มีปัญหามากมาย” ฟู่จ้าวหนิงเกือบจะหัวเราะออกมา “คุณปู่ เราเพิ่งเจอกันเอง ท่านจะรู้ได้อย่างไร” “จริงด้วย” คุณปู่จี้ถอนหายใจอย่างเสียใจ “ทั้งหมดเป็นความผิดของข้าเองที่มาที่ภูเขาลั่วเยว่ ถ้าข้าอยู่ที่เมือง ข้าคงได้เห็นความตื่นเต้นนั้นแล้ว องค์ชายจุนเสด็จกลับเมืองหลวงและทรงเข้าพิธีอภิเษกสมรส มันคงเป็นงานที่ยิ่งใหญ่และครึกครื้นมาก แต่ว่ามันไม่สมเหตุสมผลเลย องค์ชายจุนไม่ได้เสด็จกลับเมืองหลวงมาหลายปีแล้ว และข้าก็ไม่เคยได้ยินว่าพระองค์หมั้นหมายกับใครมาก่อน ทำไมพระองค์ถึงหมั้นหมายทันทีที่เสด็จกลับเมืองหลวงล่ะ?”</p>\n<p>เขาประหลาดใจมาก “ใครเป็นคนจัดหาคู่?” ฟู่จ้าวหนิงหยุดพูด “ข้าเอง” “อะไรนะ?” “ไม่มีพิธีการใหญ่โตอะไร ข้าแต่งงานตรงนั้นเลยบนถนน” ฟู่จ้าวหนิงกล่าวเสริม ริมฝีปากของจงเจี้ยนกระตุก พวกเขาไม่คาดคิดเลยว่าองค์ชายจะแต่งงานบนถนนเร็วขนาดนี้หลังจากเสด็จกลับเมืองหลวง คุณปู่จี้อยากรู้เรื่องนี้ แต่เขารู้ว่าตอนนี้ไม่ควรถามมากเกินไป “ตอนนี้เจ้าแต่งงานแล้ว เจ้าต้องรักษาตำแหน่งพระสนมจุนไว้ให้ได้ เราแพ้ไม่ได้!” ออร่าของท่านผู้เฒ่าจีทวีความเข้มข้นขึ้นทันที “เจ้ามั่นใจหรือว่าเจ้าจะหาสมุนไพรทั้งสิบชนิดได้?” เขาถามอย่างกล้าๆ กล้าๆ และฟู่จ้าวหนิงก็ตอบอย่างมั่นใจ “ค่ะ” เธอกล่าวอย่างมั่นใจโดยไม่ลังเลแม้แต่น้อย “ฮ่าฮ่าฮ่า!</p>\n<p>เก่งมาก!</p>\n<p>ฉันรู้แล้วว่าฉันไม่ได้คิดผิด!” ท่านผู้เฒ่าจีตบไหล่เธอเบาๆ “ดี งั้นเจ้าก็ตั้งใจหาสมุนไพรเถอะ ฉันจะลงไปข้างล่างและจัดการอุปสรรคต่างๆ ให้เจ้าเอง! จะต้องมีคนพยายามก่อวินาศกรรมลับหลังเจ้าแน่ๆ ปล่อยให้เป็นหน้าที่ของฉัน” ท่านผู้เฒ่าจีกล่าว จากนั้นก็ลงไปจากภูเขาพร้อมกับคนอื่นๆ เมื่อพวกเขาจากไป เหลือเพียงฟู่จ้าวหนิงและจงเจี้ยนเท่านั้น จงเจี้ยนอยากรู้และอยากถามเธอว่าเธอมาเป็นศิษย์ของอาจารย์จีได้อย่างไร แต่ฟู่จ้าวหนิงเหลือบมองท้องฟ้าและไม่คิดจะพูดกับเขาอีกต่อไป เธอจะไปขุดหาเดนโดรเบียมโนบิเล จงเจี้ยนรู้ว่าเขาช่วยอะไรไม่ได้ จึงได้แต่เดินตามเธอไปเงียบๆ ฟู่จ้าวหนิงหยิบไฟฉายแล้วรีบไปที่ริมน้ำ มองลอดขอบน้ำไป</p>\n<p>เธอก็เข้าใจแล้วว่าทำไมอาจารย์จีถึงบอกว่าขุดได้เฉพาะตอนกลางคืน เพราะแม้ในยามค่ำคืน เธอก็ยังเห็นพืชเรืองแสงจางๆ ปกคลุมอยู่รอบๆ โพรงต้นไม้ พืชชนิดนี้ดูเหมือนมอส ปกคลุมด้วยผงละเอียด และเป็นผงนี้เองที่เปล่งแสงออกมา เป็นแสงสีฟ้าอ่อนๆ ถ้าหากยังสว่างกว่านี้ เธอคงมองไม่เห็นแน่ๆ ตอนแรกที่ส่องไฟฉายลงไป เธอมองไม่เห็น แต่พอขยับไฟฉายออกไปก็เห็นชัดเจน ลมพัดมา ผงบางส่วนปลิวลงมา มันต้องเป็นพิษแน่ๆ ถ้าโดนผงนี้ เธอลองโยนกิ่งไม้ลงไปดู กิ่งไม้ก็ถูกปกคลุมไปด้วยผงสีฟ้าทันที มีเสียงฟู่และควันออกมา ในขณะเดียวกัน มีบางอย่างพุ่งออกมาจากโพรงต้นไม้ หักกิ่งไม้เป็นสองท่อน!</p>\n<p>ฟู่จ้าวหนิงไม่ทันเห็นว่ามันคืออะไร เธอก็เห็นกิ่งไม้ไหม้เกรียมและร่วงลงมาเป็นสองท่อน เธออุทานออกมาด้วยความตกใจ เฉพาะตอนกลางคืนเท่านั้นที่เธอสามารถขุดหาสมุนไพรได้? มันคืออะไรกันแน่? “คุณฟู่ ระวังด้วย” จงเจี้ยนพูดด้วยความเป็นห่วง “ไม่เป็นไร อย่าเข้ามาใกล้กว่านี้” ฟู่จ้าวหนิงขยับไฟฉายเข้าไปใกล้และตรวจสอบอย่างละเอียด ในที่สุดเธอก็พบกิ่งของ *Dendrobium nobile* (กล้วยไม้ชนิดหนึ่ง) หลายกิ่งงอกออกมาจากส่วนล่างของลำต้น มันมีสีเขียวมรกตสดใส มีดอกสีม่วงอ่อน ขึ้นเป็นช่อหนาแน่น ดวงตาของเธอเป็นประกาย เธอตั้งใจแน่วแน่ว่าจะต้องได้ *Dendrobium nobile* นี้มาให้ได้ ฟู่จ้าวหนิงคิดถึงสิ่งที่เธอสามารถนำมาใช้ในห้องปรุงยาของเธอ และเธอก็นึกขึ้นได้ เธอมีกล่องเจลแห้งเร็วที่เธอเก็บสะสมไว้!</p>\n<p>ในเวลานั้น เธอคิดที่จะทดลองดูว่ามีอะไรที่สามารถปิดผนึกสมุนไพรได้อย่างรวดเร็วโดยไม่ต้องใช้ภาชนะหรือไม่ ดังนั้นเธอจึงปรับปรุงกาวแห้งเร็ว และมีกาวแห้งเร็วอยู่เต็มกล่อง “จงเจี้ยน กรุณาหันหลังกลับ ฉันรู้สึกถูกคุกคามที่เธอมองฉันแบบนั้น” ฟู่จ้าวหนิงพยายามให้จงเจี้ยนหันหน้าหนี จงเจี้ยนหันกลับมา เธอหยิบขวดกาวแห้งเร็วขนาดใหญ่ออกมา เปิดฝา แล้วบีบลงไปในรูต้นไม้ เสียงดังฉ่า กาวแห้งเร็วทั้งขวดถูกบีบเข้าไป และมีบางอย่างพยายามกระโดดออกมา แต่ทันทีที่หัวโผล่ออกมา ตัวของมันก็ถูกปิดผนึกด้วยกาวที่แข็งตัวในทันที ฟู่จ้าวหนิงรีบบีบกาวอีกขวดเข้าไป เสียงดังฉ่า กาวกระจายไปทั่วหัวของสิ่งนั้น มันดิ้นรนอยู่ครู่หนึ่ง</p>\n<p>จากนั้นก็ค่อยๆ หยุดเคลื่อนไหว ผงต่างๆ ก็ถูกปกคลุมด้วยกาวและไม่ลอยลงมาอีก ฟู่จ้าวหนิงดีใจมาก มันได้ผล! ถ้าหากลุงจีไม่มีเวลา เขาคงขุดต้นเดนโดรเบียมโนบิเลนี้ขึ้นมาไม่ได้แน่ๆ ฟู่จ้าวหนิงสงสัยว่าเขาจะรู้มาก่อนหรือเปล่าว่ามีสัตว์มีพิษซ่อนอยู่ที่นี่ ฟู่จ้าวหนิงรีบปีนลงมาทันที เธอปีนขึ้นไปบนลำต้นไม้และขุดต้นเดนโดรเบียมโนบิเลออกมาอย่างรวดเร็ว ทันทีที่เธอนำมันไปใส่ในห้องเก็บสมุนไพร ก็มีเสียงดังโครมครามดังมาจากด้านบน เมื่อเงยหน้าขึ้น เธอก็เห็นร่างหนึ่งกำลังขว้างก้อนหินใส่เธอ!</p>"}, "34": {"chapter_number": 34, "chapter_title": "第34章救命的公子", "content": "<p>ไม่มีทางไปข้างหน้า ข้างหลัง ซ้าย หรือขวา! ตอนนี้ฟู่จ้าวหนิงยืนอยู่บนกิ่งไม้ที่ยื่นออกไปในอากาศ และก้อนหินขนาดเท่าแตงโมกำลังจะตกลงมาฆ่าเธอ ฟู่จ้าวหนิงรีบขยับไปสองสามก้าวไปยังยอดไม้ แต่ด้วยเสียงแตก ต้นไม้รับน้ำหนักไม่ไหว “ตุ๊บ!” ก้อนหินกระแทกลงบนต้นไม้อย่างแรง ตรงจุดที่เธอยืนอยู่ หลังจากกระแทกต้นไม้แล้ว มันก็ล้มลงอีกครั้ง ต้นไม้แตกและโยกเยก ฟู่จ้าวหนิงรู้สึกว่าส่วนที่กลวงของต้นไม้กำลังจะหัก ลมกระโชกแรงพัดวนรอบตัวเธอ เกือบจะพัดเธอปลิวไป ในขณะนั้นเอง ร่างหนึ่งกระโดดลงมาจากหน้าผาและเอื้อมมือมาคว้าฟู่จ้าวหนิง “คุณหนู ข้าจะพาคุณขึ้นไป” ต้นไม้ใต้เท้าของเธอรับน้ำหนักไม่ไหวและหัก ฟู่จ้าวหนิงรู้สึกเสียใจ</p>\n<p>เธอมีเชือกปีนเขาอยู่ในห้องยาที่สามารถยิงเข้าไปในหน้าผาได้ แต่เธอไม่ได้เอามันออกมาก่อน และตอนนี้คนนอกก็เอาคืนไม่ได้แล้ว เธอมีโอกาสที่จะช่วยตัวเองได้ แต่ตอนนี้เธอต้องคว้าแขนของชายคนนั้นไว้ทันที ชายคนนั้นคิดว่าจะจับมือเธอ แต่เธอกลับคว้าแขนเขาไว้แทน อย่างไรก็ตาม เขายังคงใช้ต้นไม้ที่ล้มลงเป็นที่พยุงตัวเพื่อกระโดดขึ้นไป “คุณชาย!” “คุณหนูฟู่!” สองคนวิ่งเข้ามาพร้อมกัน จงเจี้ยนถอนหายใจโล่งอกเมื่อเห็นฟู่จ้าวหนิงถูกดึงขึ้นมา อีกคนเกือบจะร้องออกมาว่า “คุณชาย คุณกระโดดลงมาแบบนี้ได้ยังไงโดยไม่รู้ว่าพวกเรา?” ฟู่จ้าวหนิงลงสู่พื้นอย่างมั่นคง และเมื่อเธอทรงตัวได้แล้ว เธอก็ปล่อยแขนเขาและถอยหลังไปสองก้าว</p>\n<p>ตอนนั้นเองที่เธอได้เห็นหน้าตาของผู้ช่วยชีวิตเธอ ริบบิ้นผูกผมของเขาประดับด้วยหยกขาวที่ร่วงหล่นลงบนผมสีดำของเขา คิ้วและดวงตาของเขาสวยงาม ริมฝีปากบางและอบอุ่น รูปร่างสูงเพรียว เขาเป็นคุณชายรูปงามและสง่างาม เด็กชายที่เกือบจะร้องไห้นั้นอายุประมาณสิบสี่หรือสิบห้าปี เขาแบกตะกร้าไม้ไผ่สานอย่างสวยงามไว้บนหลังและถือดาบสั้นสองเล่มไว้ในมือ ด้วยดวงตาและริมฝีปากกลมโต เขาดูเหมือนเด็กน้อยผู้บริสุทธิ์ อย่างไรก็ตาม คำพูดของเด็กน้อยนั้นไม่ได้อ่อนโยนอย่างที่คิด “เจ้าทำเรื่องอันตรายเช่นนี้ได้อย่างไร คนที่เจ้าช่วยอาจจะไม่ตอบแทนเจ้าเลยก็ได้” “อาเปียน การช่วยเหลือคนไม่ใช่เรื่องของการตอบแทน” คุณชายมองไปที่ฟู่จ้าวหนิง</p>\n<p>“เจ้ากลัวหรือครับ คุณหนู?” จงเจี้ยนยืนอยู่ข้างฟู่จ้าวหนิงแล้ว เมื่อเห็นว่าฟู่จ้าวหนิงปลอดภัย เขาก็โล่งใจ แต่ความกลัวที่ค้างคาอยู่ก่อนหน้านี้ยังไม่จางหายไป ฟู่จ้าวหนิงเห็นศพของชายชุดดำหลายคนนอนอยู่บนพื้นและรู้ว่ามีคนมาทำร้าย จงเจี้ยนจัดการกับคนมากมายด้วยตัวเองและไม่มีเวลามาช่วยเธอ “ขอบคุณค่ะ คุณชาย ฉันไม่เป็นไร” ฟู่จ้าวหนิงถอนหายใจในใจ วันนี้ภูเขาลั่วเยว่คึกคักมาก เธอเจอคนสารพัดได้อย่างไรกัน?</p>\n<p>“เกิดอะไรขึ้นกับเจ้า คุณหนู?” อาเปียนแสดงความไม่พอใจทันที “นายน้อยของข้าเสี่ยงอันตรายมากมายเพื่อช่วยเจ้า แล้วเจ้าแค่กล่าวขอบคุณอย่างไม่จริงใจงั้นหรือ?” ฟู่จ้าวหนิงหยุดพูดแล้วถามว่า “แล้วข้าควรจะขอบคุณเขาอย่างไร?” “เจ้าไม่ควรจะถามชื่อนายน้อยของเราก่อนหรือ เพื่อที่เจ้าจะได้ตอบแทนเขาอย่างเหมาะสมในภายหลัง?” อาเปียนกล่าว “แล้วข้าขอถามชื่อนายน้อยได้ไหมคะ?” “อาเปียน อย่าเสียมารยาท” นายน้อยดุเธอเบาๆ แล้วมองไปที่ฟู่จ้าวหนิง “อย่าถือสาเลย คุณหนู ข้าชื่อซือตูไป๋” “ขอบคุณค่ะ นายน้อยซือตู ข้าจะตอบแทนท่านอย่างแน่นอนเมื่อมีโอกาส” ฟู่จ้าวหนิงกล่าว “จริงเหรอ ไม่ต้องห่วง นามสกุลของเจ้าคือฟู่หรือ?” “ใช่ค่ะ”</p>\n<p>ฟู่จ้าวหนิงมองไปรอบๆ “คุณชายซือตู งั้นฉันขอตัวก่อนนะคะ” ตอนนี้เธอได้เดนโดรเบียมโนบิเลมาแล้ว เธอต้องรีบไปหายาอื่นๆ ต่อ หลังจากเดินไปได้ระยะหนึ่ง เธอยังได้ยินเสียงโกรธเคืองของอาเปียน “คุณชาย ดูเธอสิ เธอเป็นผู้หญิงใจร้ายจริงๆ คุณช่วยชีวิตเธอไว้ แต่เธอกลับหนีไป! เธอยังไม่ถามด้วยซ้ำว่าคุณอยู่ที่ไหน ในอนาคตเธอจะตอบแทนคุณยังไง?</p>\n<p>ฉันว่าเธอเป็นคนอกตัญญูจริงๆ” จงเจี้ยนเดินตามหลังฟู่จ้าวหนิงไปพลางขอโทษด้วยเสียงเบาๆ “คุณหนูฟู่ เป็นความผิดของฉันเองที่ไร้ประโยชน์และทำให้คุณหนูตกอยู่ในอันตราย” “คุณรู้จักซือตูไป๋ไหม” ฟู่จ้าวหนิงถาม “ไม่ค่ะ แต่มีตระกูลซือตูอยู่ในเจียงเป่ย พวกเขาเริ่มต้นจากร้านขายยา และมีสาขาทั่วประเทศ พวกเขารวยมาก ฉันสงสัยว่าซือตูไป๋อาจจะมาจากตระกูลซือตูนั้นหรือเปล่า” “อืม” ฟู่จ้าวหนิงตอบอย่างเรียบง่ายโดยไม่พูดอะไรเพิ่มเติม เธอควรจะพูดถึงเรื่องที่ว่าก่อนหน้านี้ได้กลิ่นสมุนไพรพิเศษจากซือตูไป๋หรือไม่? “ถ้าเขามาจากตระกูลซือตูในเจียงเป่ยจริง ๆ เขาต้องมาที่นี่เพื่อเทศกาลพนันยาแน่ ๆ” จงเจี้ยนกล่าวเสริม</p>\n<p>นี่เป็นครั้งที่สองที่ฟู่จ้าวหนิงได้ยินเรื่องเทศกาลพนันยา เธอได้ข้อมูลเกี่ยวกับเรื่องนี้มาจากความทรงจำของนางสาวฟู่และรู้สึกสนใจมาก “สมุนไพรสิบชนิดที่ฉันพบในภูเขาลั่วเยว่จะถูกส่งคืนให้ฉันหลังจากที่ฉันผ่านการทดสอบแล้วหรือไม่?” เธอถาม จงเจี้ยนตกตะลึง “ไม่มีใครถามเรื่องนั้น” เขาเองก็ไม่รู้เช่นกัน ฟู่จ้าวหนิงคิดอยู่ครู่หนึ่ง เธอต้องเตรียมพร้อมสำหรับทั้งสองความเป็นไปได้ไม่ว่าอย่างไรก็ตาม สามวันผ่านไปอย่างรวดเร็ว เช้าวันที่สี่ หมอกบาง ๆ ลอยขึ้นเหนือภูเขาลั่วเยว่ ที่ทางเข้าที่ฟู่จ้าวหนิงเข้าไปในภูเขาเมื่อไม่กี่วันก่อน มีผู้คนจำนวนมากมาถึงแล้ว</p>\n<p>รองแม่ทัพหลิวไม่ได้นอนหลับมาสามคืนแล้วและตอนนี้ก็ยิ่งกังวลมากขึ้น ไม่มีกลุ่มใดในสามกลุ่มที่เขาส่งเข้าไปในภูเขากลับมาพร้อมข่าวคราวใดๆ เท่าที่เขารู้ ไม่เพียงแต่เขาจะส่งคนไปในสามวันนี้เท่านั้น แต่ยังมีกลุ่มอื่นๆ อีกหลายกลุ่มที่เข้าไปด้วย เขาเฝ้ารักษาพื้นที่และส่งคนไปลาดตระเวนรอบๆ เป็นระยะ แต่เขาก็ไม่เห็นใครออกมาเลย นอกจากคู่สามีภรรยาที่ได้รับบาดเจ็บซึ่งถูกหามออกมาเมื่อสามวันก่อน เขาไม่รู้ว่าฟู่จ้าวหนิงตายหรือยังมีชีวิตอยู่ “รองแม่ทัพหลิว เวลาใกล้หมดแล้วหรือครับ?” คนที่ถามคำถามนี้คือหมอหลี่ ในเวลาเพียงสามวัน หมอหลี่ดูเหนื่อยล้า มีรอยคล้ำใต้ตาขนาดใหญ่และสีหน้าเศร้าหมอง เห็นได้ชัดว่าเขาอารมณ์ไม่ดี</p>\n<p>ลูกสาวสุดที่รักของเขาถูกขังไว้สามวัน ไม่มีใครกล้าขัดคำสั่งขององค์ชายใหญ่ เขาไม่ได้รับอนุญาตให้ไปพบเธอด้วยซ้ำ!</p>\n<p>ถ้าฟู่จ้าวหนิงออกมาได้ เขาจะยืนยันว่ายาของเธอยังไม่เพียงพอ ไม่ เขาจะทำให้แน่ใจว่าฟู่จ้าวหนิงจะได้รับความเป็นธรรมสำหรับความทุกข์ยากทั้งหมดที่เธอได้รับจากน้ำมือขององค์ชายจุน! นอกจากเขาแล้ว ยังมีแพทย์หลวงหลายคนและแพทย์ผู้มีชื่อเสียงอีกสามคนที่ได้รับการคัดเลือกจากในเมือง พวกเขาทั้งหมดเชื่อฟังเขา! ฟู่จ้าวหนิงจะหนีออกไปไม่ได้! แน่นอน ถ้าฟู่จ้าวหนิงออกมาในสภาพบาดเจ็บ เขาก็สามารถใช้โอกาสนี้ในการรักษาเธอเพื่อสั่งสอนเธอ ทำให้แน่ใจว่าบาดแผลของเธอจะไม่มีวันหาย เขาเตรียมยาพิษและยาต่างๆ ไว้มากมาย!</p>\n<p>แพทย์หลี่มองไปที่แพทย์หลวงและแพทย์เหล่านั้น พวกเขาทั้งหมดพยักหน้าเล็กน้อย แสดงว่าจะทำตามแผนที่เขาวางไว้ในวันนี้ “เหลือเวลาอีกครึ่งธูป ถ้าฟู่จ้าวหนิงไม่ปรากฏตัวก่อนธูปจะไหม้หมด เธอจะแพ้” รองแม่ทัพหลิวก็เริ่มกังวลเล็กน้อยในขณะนี้ เสียงล้อรถม้าใกล้เข้ามา รถขององค์ชายจุนค่อยๆ แล่นมาอยู่ตรงหน้าพวกเขา “องค์ชายจุนให้ความสำคัญกับฟู่จ้าวหนิงมากขนาดนี้เลยเหรอ? มาด้วยพระองค์เองเลยเหรอ?” ดวงตาของหมอเทพหลี่แทบจะกลายเป็นพิษเมื่อเห็นรถม้าขององค์ชายจุน รองแม่ทัพหลิวพัดธูปที่กำลังลุกไหม้ เพื่อให้ธูปไหม้เร็วขึ้น ฟู่จ้าวหนิงยังไม่ปรากฏตัว องค์ชายจุนเปิดม่านรถม้าและมองไปยังทางเข้า</p>"}, "35": {"chapter_number": 35, "chapter_title": "第35章天下藥盟", "content": "<p>“ฝ่าบาท จงเจี้ยนไม่ได้ส่งข่าวคราวใดๆ มาตั้งแต่เมื่อวานแล้ว” ชิงอี้กระซิบกับองค์ชายจุน เมื่อวานก่อนหน้านั้น จงเจี้ยนส่งข่าวมาว่าคุณหนูฟู่ แม้จะประสบปัญหาบนภูเขา แต่ก็อาการดีขึ้นแล้ว แต่ตั้งแต่เมื่อวานก็ไม่มีข่าวคราวใดๆ อีกเลย “อืม รอสักครู่” องค์ชายจุนกล่าว “สองสามวันที่ผ่านมา เราหยุดกลุ่มคนไว้ได้มากกว่าสิบกลุ่มแล้ว” ชิงอี้กล่าวอย่างกังวล “แต่เบื้องหลังพวกเขายังมีคนกลุ่มเล็กๆ อยู่...” คนกลุ่มเล็กๆ เหล่านั้น แน่นอนว่าหมายถึงผู้ที่มีคุณสมบัติและสถานะที่จะต่อต้านองค์ชายของพวกเขา คนเหล่านั้นไม่ต้องการให้ฟู่จ้าวหนิงทำภารกิจสำเร็จและลงจากภูเขาได้อย่างราบรื่น พวกเขากำลังเล็งเป้าหมายไปที่องค์ชายจุน</p>\n<p>แต่พวกเขาไม่รู้ว่ามีบุคคลระดับล่างหรือผู้ที่มีความแค้นส่วนตัวกับฟู่จ้าวหนิงอยู่ด้วย “ไม่มีจงเจี้ยนอยู่ด้วยหรือ?” ชิงอี้อยากจะพูดว่าจงเจี้ยนคนเดียวอาจจะไม่สามารถปกป้องคุณหนูฟู่ได้ แต่เมื่อเห็นว่าองค์ชายจุนไม่ต้องการพูดอะไรเพิ่มเติม เขาก็เงียบไป เสียงฝีเท้าของม้าที่กำลังวิ่งเข้ามาใกล้ ผู้คนมากันมากขึ้น คนที่มาในครั้งนี้ล้วนสวมชุดคลุมผ้าไหมสีกากี เข็มขัดสีดำ และดาบกับฝักดาบทั้งหมดมีลวดลายแกะสลักรูปสัตว์ร้ายสีดำเหมือนกันหมด พวกเขาสวมสนับข้อมือสีดำ รองเท้าบูทสีดำ และแม้แต่อานม้าก็เป็นสีดำ ทำให้พวกเขาดูสง่างามและเคร่งขรึม “องครักษ์เงามังกร!” สีหน้าของรองแม่ทัพหลิวและคนอื่นๆ</p>\n<p>เปลี่ยนไปเมื่อเห็นผู้มาใหม่ ไม่ใช่หรือว่าองครักษ์เงามังกรจะมาถึงบ้านขององค์ชายจุนหลังจากประกาศผลแล้ว? พวกเขาวางแผนที่จะตัดสิทธิ์ฟู่จ้าวหนิงก่อนที่องครักษ์เงามังกรจะมาถึง เพื่อให้การแต่งงานขององค์ชายจุนเป็นโมฆะและเขาจะไม่สามารถรับของขวัญจากจักรพรรดิได้ แต่ตอนนี้องครักษ์เงามังกรมาถึงภูเขาลั่วเยว่แล้ว นั่นจะทำให้พวกเขาเข้าไปแทรกแซงได้ยากขึ้นไม่ใช่หรือ?</p>\n<p>“หมอหลี่ เราควรทำอย่างไรดี?” แพทย์หลวงหลายคนเปลี่ยนสีหน้าเล็กน้อยและถามหมอหลี่ด้วยเสียงเบาๆ นี่เป็นครั้งแรกที่หมอหลี่ได้เห็นองครักษ์เงามังกร พวกเขาเป็นองครักษ์ลับที่จักรพรรดิองค์ก่อนทรงตั้งขึ้นเอง ซึ่งจะไม่สืบทอดไปยังผู้สืบทอดพร้อมกับราชบัลลังก์ พวกเขาจะเชื่อฟังเฉพาะผู้ที่ครอบครองตราประทับแห่งอาณาจักรจ้าวเท่านั้น และตราประทับแห่งอาณาจักรจ้าวในขณะนี้อยู่ในมือขององค์ชายจุน “องค์ชายจุนบ้าไปแล้ว! เรียกองครักษ์เงามังกรมาด้วยเรื่องเล็กน้อยแบบนี้ อะไรกันเนี่ย!” หมอหลี่กัดฟันด้วยความโกรธ ความน่าเกรงขามขององครักษ์เงามังกรทำให้เขากลัวจนแทบหายใจไม่ออก “ระวังหน่อย นี่เรื่องที่คุณพูดได้เหรอ?”</p>\n<p>แพทย์หลวงรีบเตือนเขา หากองค์ชายจุนหรือองครักษ์เงามังกรได้ยิน พวกเขาจะต้องเดือดร้อนแน่ “ไม่เป็นไรหรอก ต่อให้องครักษ์เงามังกรมา พวกเขาก็ไม่รู้เรื่องการแพทย์หรือยาอะไรหรอก ฮ่า...” หมอหลี่หัวเราะอย่างเจ้าเล่ห์ ในขอบเขตความเชี่ยวชาญของเขา เขามีทางเลือกมากมาย จะมีอะไรให้ต้องกลัว?</p>\n<p>อย่างไรก็ตาม ก่อนที่เขาจะพูดจบ เขาก็เห็นองครักษ์เงามังกรลงจากม้าและยืนอยู่กับองค์ชายจุน รถม้าหลายคันมาถึงด้านหลังพวกเขา และชายชราในชุดคลุมผ้าไหมสีน้ำเงินเข้มก้าวออกมาจากรถม้าคันแรก เขาดูเรียบง่ายแต่สง่างาม เสื้อผ้าของเขาใหม่เอี่ยม และเขากำลังถือตาชั่งยาทองคำบริสุทธิ์ขนาดเล็กอยู่ “ทำไมชายชราคนนี้ถึงมาด้วย?” ใบหน้าของหมอหลี่มืดลงทันทีที่เห็นชายคนนี้ อย่างไรก็ตาม คนอื่นๆ ไม่กล้าประมาทและรีบวิ่งเข้าไปทักทายชายชรา “ท่านผู้อาวุโสจี ท่านมาที่นี่ด้วยเรื่องอะไร?” “ท่านผู้อาวุโสจี นานแล้วที่เราไม่ได้พบท่าน” “ท่านผู้อาวุโสจี...” ชิงอี้เห็นชายชราก็พูดกับองค์ชายจุนด้วยความประหลาดใจ “ฝ่าบาท</p>\n<p>ท่านผู้อาวุโสจีก็มาด้วย” องค์ชายจุนมองไป ท่านผู้อาวุโสจีแห่งพันธมิตรยาโลก พันธมิตรยาโลกควบคุมการหมุนเวียนสมุนไพรเกือบ 80% ยิ่งไปกว่านั้น พันธมิตรยาโลกยังมีผู้เชี่ยวชาญมากมายในการระบุ ค้นหา และเตรียมสมุนไพร หากคุณขาดแคลนยาใด ๆ คุณสามารถไปที่พันธมิตรยาโลกได้ และพวกเขาจะช่วยหาให้คุณได้ แน่นอนว่าต้องใช้เวลาและความพยายาม ท่านผู้อาวุโสจีซินเหว่ยแห่งพันธมิตรยาโลกเป็นผู้เชี่ยวชาญที่รู้จักสมุนไพรหลายร้อยชนิดและมีความชำนาญในการแปรรูปวัตถุดิบยาต่าง ๆ ดังนั้นเขาจึงได้รับความเคารพนับถือไม่ว่าเขาจะไปที่ใด ผู้คนมากมายเคารพนับถือเขาและไม่กล้าล่วงเกินเขา แม้แต่แพทย์หลวงและแพทย์ผู้มีชื่อเสียงจากประเทศต่าง ๆ</p>\n<p>ก็ต้องการสร้างความสัมพันธ์ที่ดีกับเขา เพราะบางครั้งแม้แต่แพทย์ที่เก่งที่สุดก็ไม่สามารถช่วยชีวิตได้หากปราศจากยาที่ถูกต้อง ท่านจีซินเหว่ยไม่ค่อยปรากฏตัวให้เห็นบ่อยนัก ใช้เวลาส่วนใหญ่อยู่ในภูเขาเพื่อค้นหา ขุด และเตรียมสมุนไพร แต่ในวันนี้เขาอยู่ที่นี่ รองแม่ทัพหลิวและคนอื่น ๆ ต่างรู้สึกว่าท่านผู้อาวุโสจีไม่ได้มาที่นี่เพื่อฟู่จ้าวหนิงอย่างแน่นอน “หุบเขาจันทร์ตอนล่างน่าจะมีสมุนไพรดี ๆ มากมาย ดังนั้นท่านผู้อาวุโสจีคงอยากขึ้นไปบนภูเขาเพื่อเก็บพวกมันมาใช่ไหม?” หมอหลี่เยาะเย้ย “คนแก่ขนาดนี้ ยังขึ้นไปบนภูเขาทุกวันอีกเหรอ? ใครจะรู้ว่าเมื่อไหร่จะตกเขาตาย หรือถูกสัตว์ป่าจับไปกิน?”</p>\n<p>เขาและผู้อาวุโสจีมีความบาดหมางกันมานาน ผู้อาวุโสจีไม่สนใจคนอื่นๆ ผลักฝูงชนออกไป และเดินตรงไปยังเจ้าชายจุน เขาสำรวจเจ้าชายจุน มองหน้ากากของเขาด้วยความดูถูก “เจ้าชายจุน ผ่านมาแล้วกว่าสิบปีนะ” กว่าสิบปีที่แล้ว คนของเจ้าชายจุนไปที่พันธมิตรยาโลกเพื่อขอยา โดยระบุรายการสมุนไพรยาวเหยียด ดูเหมือนว่าปรมาจารย์ผู้นี้จะถูกสาป สมุนไพรหลายชนิดที่เขาต้องการนั้นหายากและหาได้ยาก มันเป็นคำสั่งที่ยากที่สุดที่พันธมิตรของพวกเขาเคยได้รับ และพวกเขายังหาสมุนไพรไม่ครบทั้งหมด อย่างไรก็ตาม ชีวิตของเจ้าชายจุนนั้นค่อนข้างแข็งแกร่ง เขาอยู่รอดมาได้จนถึงตอนนี้ “ผู้อาวุโสจีมาที่นี่ทำไม?”</p>\n<p>เจ้าชายจุนรู้สึกว่าสีหน้าของผู้อาวุโสจีแปลกๆ ราวกับมีความสนิทสนมกันเล็กน้อย?</p>\n<p>ที่จริงแล้ว อารมณ์ของผู้อาวุโสจีไม่ค่อยดีนัก เขาไม่เคารพคนส่วนใหญ่ มีคนมากมายพยายามเข้าใกล้เขา แต่เขากลับเมินเฉยต่อพวกเขาไม่ว่าจะมีฐานะอย่างไรก็ตาม “ข้ากำลังรอศิษย์ที่ดีของข้าอยู่!” ท่านผู้เฒ่าจีเชิดคางขึ้นเล็กน้อยด้วยท่าทางภาคภูมิใจ เจ้าชายจุนตกตะลึง “ท่านผู้เฒ่าจีรับศิษย์แล้วหรือ?” ทุกคนต่างประหลาดใจกับข่าวนี้ “ท่านผู้เฒ่าจี ท่านรับศิษย์แล้วหรือ? ท่านผู้เฒ่าจีชอบอัจฉริยะหนุ่มแบบไหนกัน?” นับตั้งแต่ศิษย์เอกของท่านผู้เฒ่าจีเสียชีวิต เขาก็ประกาศว่าจะไม่รับศิษย์อีกต่อไป ยิ่งไปกว่านั้น หลายคนต้องการส่งหลานชายหรือหลานสาวไปเป็นศิษย์ในสำนักแพทย์ แต่เขาก็ปฏิเสธทั้งหมด กล่าวโดยสรุป ท่านผู้เฒ่าจีดูเหมือนจะไม่ชอบใครเลย ตอนนี้เขากลับรับศิษย์แล้วหรือ?</p>\n<p>“ศิษย์ของข้านั้นฉลาดมาก และข้าก็ชอบเธอมาก ข้าจะแนะนำให้พวกท่านทุกคนรู้จักเมื่อเธอออกมา” ท่านผู้เฒ่าจีหัวเราะอย่างสนุกสนาน “อย่างไรก็ตาม ต่อจากนี้ไปเจ้าต้องให้เกียรติเธอบ้าง เจ้าก็รู้ว่าข้าเกลียดการที่ใครมารังแกศิษย์ของข้า” ก่อนหน้านี้เขาเมินเฉยต่อคำทักทายของทุกคน แต่ตอนนี้เมื่อพูดถึงศิษย์ของเขา สีหน้าของเขาก็... ชิ ทุกคนต่างแสดงท่าทางสงสัยมากขึ้นว่าศิษย์ที่ท่านเฒ่าจีให้ความสำคัญมากนั้นเป็นใคร “ว่าแต่ สมาคมยาโลกได้แตกแขนงออกไปเป็นร้านขายยาถงฟู่ไม่ใช่เหรอ? ตอนนี้ร้านขายยาถงฟู่มีอยู่ทั่วโลก และควบคุมสมุนไพรจำนวนมาก สมาคมยาโลกคงไม่สำคัญอีกต่อไปแล้วใช่ไหม?” หมอหลี่ชอบแย้งท่านเฒ่าจี</p>\n<p>ทุกคนเงียบลงเมื่อเขาพูดถึงร้านขายยาถงฟู่ เพราะหัวหน้าตระกูลซือตู ผู้ก่อตั้งร้านขายยาถงฟู่ ได้ทรยศต่อสมาคมยาโลก ในช่วงไม่กี่ปีที่ผ่านมา การเติบโตของพวกเขารวดเร็วมาก พยายามอย่างต่อเนื่องที่จะไล่ตามสมาคมยาโลกที่ถูกกดดันอยู่บ้าง “ไอ้แก่คนนี้มาจากไหนกัน?</p>\n<p>เหม็นตั้งแต่เปิดปากพูดเลย!” ท่านเฒ่าจีเหลือบมองเขา &quot;ธูปหอมมาก แต่กำลังจะดับแล้ว!&quot; มีคนตะโกนขึ้นมาทันที ในขณะนั้น ฟู่จ้าวหนิงยังไม่ปรากฏตัว</p>"}, "36": {"chapter_number": 36, "chapter_title": "第36章你是不是故意的", "content": "<p>“อีกนิดเดียว!” “ฟู่จ้าวหนิงมาไม่ทันแล้ว” รองแม่ทัพหลิวและหมอหลี่ต่างดีใจกันใหญ่ บางคนมองไปที่องค์ชายจุน รู้สึกสงสารเขาเล็กน้อย พวกเขาไม่คาดคิดว่างานแต่งงานขององค์ชายจุนจะเร่งรีบและกระทันหันเช่นนี้ และสุดท้ายก็คงไม่มีความหมายอะไร ฟู่จ้าวหนิงน่าจะตายบนภูเขาลั่วเยว่แล้ว และถึงแม้จะไม่ตาย เธอก็คงมาไม่ทัน เธออาจจะได้เป็นพระสนมขององค์ชายจุน แต่ตอนนี้ทุกอย่างก็ไร้ประโยชน์ ทุกคนจ้องมองไปที่ธูปเล็กๆ นั้น อีกนิดเดียวก็จะดับแล้ว ชิงอี้ก็กลั้นหายใจอย่างกังวลใจ จ้องมองไปที่เส้นทางบนภูเขาที่นำไปสู่ทางเข้า องค์ชายจุนมีแววตาที่ลึกซึ้ง นี่คือคนที่กล้าหยุดรถม้าของเขาบนถนนและบอกว่าอยากเป็นพระสนมของเขาหรือ? “ร่าเริงจังเลยนะ?</p>\n<p>ทุกคนรอฉันอยู่เหรอ?” เสียงใสไพเราะของหญิงสาวดังขึ้นมาทันที มาจากต้นไม้ข้างทางเข้าภูเขา “ใครกัน?” ทุกคนเงยหน้ามองไปที่ต้นไม้และเห็นหญิงสาวนั่งอยู่บนกิ่งไม้หนา มีตะกร้าวางอยู่ข้างๆ เธอเหมือนเพิ่งตื่นจากการงีบหลับ นั่งตัวตรงและยืดเส้นยืดสาย “ฟู่จ้าวหนิง!” รองแม่ทัพหลิวอุทานด้วยความประหลาดใจ “นี่คือฟู่จ้าวหนิงหรือ? เธอกำลังทำอะไรอยู่ตรงนั้น?” ต้นไม้ใหญ่ต้นนั้นอยู่ไม่ไกลจากพวกเขา กิ่งก้านและใบไม้เขียวชอุ่ม และก่อนหน้านี้ไม่มีใครได้ยินเสียงอะไรจากที่นั่นเลย แต่ตอนนี้ฟู่จ้าวหนิงดูเหมือนจะนอนหลับอยู่บนต้นไม้นั้นมานานแล้ว “คุณหนูฟู่!” หัวใจของชิงอี้ที่เคยเต้นแรงก็พลันสงบลง “ฝ่าบาท ฝ่าบาทไม่เห็นใครอยู่ตรงนั้นบ้างหรือ?” ชิงอี้อดไม่ได้ที่จะหันไปถามองค์ชายจุน พลังภายในขององค์ชายนั้นลึกซึ้งมาก เขาน่าจะสัมผัสได้ถึงใครบางคนบนต้นไม้นั้น องค์ชายจุนมีสีหน้าแข็งกร้าวขึ้นเล็กน้อย ใช่แล้ว เขาไม่ทันสังเกต!</p>\n<p>หรือบางทีพลังปราณของฟู่จ้าวหนิงอาจจะอ่อนมาก ๆ? แม้จะนอนอยู่บนต้นไม้ เธอก็ไม่มีท่าทีตึงเครียดหรือหวาดกลัวเลย? หรือเป็นเพราะลมแรงเกินไป พัดใบไม้ปลิวและกลบเสียงหายใจของเธอ? ฟู่จ้าวหนิงสะพายตะกร้าไว้บนไหล่ กอดลำต้นไม้ และค่อย ๆ เลื่อนตัวลงมา เธอปล่อยมือจากต้นไม้เล็กน้อยแล้วกระโดดลงมา ลงพื้นอย่างมั่นคง เธอเดินตรงไปหาพวกเขา ท้องฟ้ายังไม่สว่างเต็มที่ เธอปรากฏตัวออกมาท่ามกลางแสงยามเช้าและหมอกบาง ๆ ดูสง่างามและสวยงามราวกับนางฟ้าจากภูเขา ทันทีที่เธอมาถึงรองแม่ทัพหลิว ธูปก็ดับลงสนิท ฟู่จ้าวหนิงมองเห็นสีหน้าตึงเครียดของรองแม่ทัพหลิวแล้วยิ้มอย่างสดใส “รองแม่ทัพหลิว เกือบไปแล้ว!</p>\n<p>ฉันมาทันเวลาพอดีเลยใช่ไหม?” องค์ชายจุนบังเอิญเห็นรอยยิ้มและแววตาเจ้าเล่ห์ของเธอ เขารู้สึกว่าเธออาจจะทำอย่างนั้นโดยตั้งใจ “เจ้าจงใจทำอย่างนั้นหรือ?” รองแม่ทัพหลิวถามด้วยน้ำเสียงกัดฟัน “เห็นได้ชัดว่านางลงจากภูเขาไปนานแล้ว แต่ก็ไม่ปรากฏตัว ทำให้พวกเราต้องรออยู่ที่นี่มากมาย” มันมากเกินไปแล้ว! ก่อนหน้านี้เขาทั้งตื่นเต้นและกังวลใจมาก หลังจากนั้นก็ดีใจจนเกินจะรับมือไหว เขานึกว่านางจะไม่รอด! อารมณ์ที่ขึ้นๆ ลงๆ แบบนี้แทบจะรับไม่ไหว! “หือ?</p>\n<p>รองแม่ทัพหลิว เจ้าจะสงสัยข้าอย่างนั้นได้อย่างไร?” ฟู่จ้าวหนิงมองด้วยความประหลาดใจ “ตอนที่ข้ากลับมา มันยังมืดอยู่เลย กลางดึก ข้ากลัวว่าจะปลุกพวกเจ้าทุกคน และข้าก็ไม่รู้ว่าข้าได้ตรวจยาหลังจากออกมาดึกขนาดนั้นหรือเปล่า อีกอย่าง ข้าเหนื่อยและง่วงมาก จึงคิดว่าจะหาที่นอนรอจนถึงรุ่งเช้า” “ก็ข้านอนจนถึงตอนนี้ เกือบจะเลยเวลานัดแล้ว เจ้าจะบอกว่าข้าจงใจทำอย่างนั้นได้อย่างไร?” ท่าทีของฟู่จ้าวหนิงทำให้รองแม่ทัพหลิวโกรธจัด เขาคิดว่าเธอทำไปโดยเจตนา แต่เขาไม่มีหลักฐาน! &quot;เอาล่ะ เจ้าเจอทุกคนแล้วใช่ไหม? ทีนี้เจ้าเริ่มตรวจสอบยาที่ข้าขุดขึ้นมาได้แล้วใช่ไหม?&quot; ฟู่จ้าวหนิงเห็นองค์ชายจุนอยู่ตรงนั้นแล้ว</p>\n<p>สายตาของเธอเหลือบมองไปรอบๆ แล้วก็เห็นท่านอาจารย์จีอยู่ข้างๆ องค์ชายจุน เธอตกตะลึง ท่านอาจารย์จีเปลี่ยนเสื้อผ้าและดูเหมือนบุคคลระดับสูงและทรงอำนาจ ท่านอาจารย์จีโบกมือให้เธออย่างตื่นเต้น จากนั้นก็ยกนิ้วชี้ขึ้นมาแตะริมฝีปากเป็นการบอกให้เงียบและขยิบตาให้เธอ &quot;ศิษย์รัก อย่าเพิ่งสนใจพวกเรา ข้าจะพูดแทนเจ้าทีหลัง!&quot; เขาพาหมอมาด้วยหลายคน &quot;คุณหนูฟู่ เจ้าเก็บสมุนไพรครบทั้งสิบชนิดจริงหรือ?&quot; น้ำเสียงของหมอหลี่ทุ้มต่ำขณะที่เขามองสำรวจฟู่จ้าวหนิง นี่คือคนที่ทำร้ายจือเหยา เธอค่อนข้างสวย แต่เขาจะไม่ปล่อยให้ใครก็ตามที่ทำร้ายจือเหยาลอยนวลไป!</p>\n<p>“ใช่ ไม่อย่างนั้นฉันจะกลับมาทำไม” สายตาของฟู่จ้าวหนิงก็เหลือบไปมองใบหน้าของเขาเช่นกัน “คุณต้องเป็นหมอหลี่ใช่ไหม หลี่จือเหยาหน้าตาคล้ายคุณนิดหน่อย ว่าแต่ ฉันสงสัยว่าคุณหนูหลี่หมั้นกับองค์ชายเซียวหรือเปล่า” การเอ่ยถึงเรื่องนี้ทำให้ทุกคนนึกถึงข่าวลือที่แพร่สะพัดในเมืองหลวง: องค์ชายเซียวกับคุณหนูหลี่ที่ดูโทรมๆ ถูกพบเห็นว่ากำลังกอดกันอยู่บนถนน ชิ หมอหลี่มีลูกสาวที่ฉาวโฉ่แบบนี้ ช่างน่าอับอายจริงๆ เส้นเลือดบนหน้าผากของหมอหลี่ปูดขึ้น “ฟู่จ้าวหนิง เจ้ากล้าพูดเรื่องนี้อีกหรือ ถ้าไม่ใช่เพราะเจ้า...” ก่อนที่เขาจะพูดจบ เสียงขององค์ชายจุนก็ขัดจังหวะ “หมอหลี่ ระวังคำพูดหน่อย เธอยังเป็นพระสนมของข้า เจ้ามีสิทธิ์เรียกเธอด้วยชื่อเต็มหรือ” หมอหลี่พูดไม่ออก “เอาล่ะ! คุณหนูฟู่ เอาสมุนไพรทั้งหมดที่ขุดขึ้นมาออกมาวางให้หมด!</p>\n<p>แต่เราตกลงกันไว้แล้วว่าต้องเป็นสมุนไพรสิบชนิด สมุนไพรธรรมดาไม่นับ พวกหญ้าลิ้นงูและต้นกล้วยเป็นของที่ใครๆ ก็ขุดได้ พวกนั้นไม่นับ” “งั้นจะนับหรือไม่นับก็ขึ้นอยู่กับท่านแล้วงั้นหรือ?” ฟู่จ้าวหนิงโต้กลับ “แน่นอนว่าไม่ใช่ เราจะไม่รังแกคนแบบนั้น ทุกอย่างทำตามกฎ พวกนี้เป็นแพทย์หลวง และสามคนนี้เป็นแพทย์ประจำเมืองที่มีชื่อเสียง เราจะปรึกษาหารือและตัดสินด้วยกัน!” สายตาของฟู่จ้าวหนิงกวาดมองไปทั่วใบหน้าของแพทย์หลวงและแพทย์ประจำเมือง “ดูเหมือนว่าพวกเขาทั้งหมดจะเป็นคนของท่าน” ช่างน่าขัน! นี่คือสิ่งที่ท่านเรียกว่าความยุติธรรมหรือ? “ข้าบังเอิญมาเห็นเหตุการณ์วุ่นวายนี้</p>\n<p>ข้ามีคุณสมบัติที่จะเป็นผู้พิพากษาได้หรือไม่?” ในขณะนั้น ท่านผู้เฒ่าจีเหยียดหลังตรงและก้าวไปข้างหน้า แพทย์ที่ท่านพามาก็เดินตามมา ทุกคนรู้จักแพทย์เหล่านี้หลายคน; พวกเขาทั้งหมดมาจากคลินิกประจำตระกูล คนที่ทำงานกับสมุนไพรทุกวัน “หมอเหล่านี้ก็สั่งยาอยู่ทุกวัน พวกเขารู้จักสมุนไพรมากมาย ให้พวกเขาเข้าร่วมกับเราเถอะ พวกคุณมีคนอยู่ตรงนั้นเก้าคน และกับผมก็มีหมอหกคน ตกลงไหมครับ” ท่านผู้เฒ่าจีกล่าวพร้อมรอยยิ้ม “ท่านผู้เฒ่าจีพูดถูก ยิ่งคนมาก ยิ่งยุติธรรมมากขึ้น” เจ้าชายจุนกล่าว เขาพูดจบแล้ว และคนที่ยืนอยู่ตรงหน้าพวกเขาก็คือท่านผู้เฒ่าจีแห่งพันธมิตรยา แม้แต่แพทย์หลวงก็ยังไม่กล้าพูดอะไร หมอหลี่กัดฟัน “เอาล่ะ</p>\n<p>เริ่มกันเลย!</p>\n<p>คุณหนูฟู่ โต๊ะยาวถูกจัดเตรียมไว้ที่นี่แล้ว กรุณานำสมุนไพรที่คุณขุดมาวางทีละอย่าง”</p>"}, "37": {"chapter_number": 37, "chapter_title": "第37章季老頭真礙事", "content": "<p>ฟู่จ้าวหนิงพยักหน้า หยิบตะกร้าลงจากโต๊ะยาว แล้วหยิบสมุนไพรออกมา ทุกคนเดินตามไปยืนข้างโต๊ะ สายตาจับจ้องไปที่การเคลื่อนไหวของเธอ สมุนไพรชนิดแรกที่ฟู่จ้าวหนิงหยิบออกมาคือพืชเป็นกอที่ดูเหมือนวัชพืช ชิงอี้ก็เดินมาเช่นกัน องค์ชายจุนหยุดชั่วครู่ จากนั้นก็ลงจากรถม้าและเดินเข้ามาอย่างช้าๆ เขาเดินไปที่ข้างๆ ฟู่จ้าวหนิงและมองดูพืชเป็นกอนั้น— &quot;วัชพืชนี้ชื่ออะไร?&quot; ฟู่จ้าวหนิงเงยหน้ามองเขา จากนั้นก็เอื้อมมือไปผลักเขาออกไป &quot;อย่าเข้าใกล้มากเกินไป&quot; องค์ชายจุนตกใจ เธอผลักเขาเหรอ? เธอผลักเขาจริงๆ! คนอื่นๆ ที่เห็นการกระทำของฟู่จ้าวหนิงต่างก็เบิกตาโต &quot;สมุนไพรบางชนิดเป็นพิษ</p>\n<p>ก่อนแปรรูปมันจะปล่อยควันพิษออกมา ร่างกายของท่านอ่อนแอ จึงเข้าใกล้ไม่ได้&quot; ฟู่จ้าวหนิงอธิบายอย่างใจดี &quot;หึ&quot; หมอหลี่หัวเราะเยาะ “คุณพูดราวกับว่ารู้ไปหมดทุกเรื่อง ถ้าคุณขุดสมุนไพรพิษขึ้นมาได้จริง ๆ คุณจะกลับมาเองได้เหรอ?” เธอรู้วิธีหลีกเลี่ยงควันพิษหรืออย่างไร?</p>\n<p>หรือว่าเธอมีภูมิคุ้มกันต่อพิษทุกชนิด? น่าหัวเราะจริง ๆ เธอรู้วิธีหลอกลวงคน “แค่คุณทำไม่ได้ ไม่ได้หมายความว่าฉันทำไม่ได้” ฟู่จ้าวหนิงเหลือบมองเขา นี่คือหมอหลี่ ดูฉลาดแกมโกงเสียจริง แม้ว่าการตัดสินหนังสือจากปกจะเป็นเรื่องผิด แต่สุภาษิตที่ว่า “รูปลักษณ์ภายนอกสะท้อนจิตใจ” ก็ยังมีส่วนจริงอยู่บ้าง อย่างไรก็ตาม การที่สามารถเลี้ยงดูลูกสาวอย่างหลี่จือเหยาได้ หมอหลี่คนนี้ดูไม่ค่อยมีฐานะเท่าไหร่ “หยิ่งยโส” หมอหลี่สบถ แต่ด้วยองค์ชายจุนอยู่ด้วย เขาจึงไม่กล้าพูดอะไรมากกว่านั้น องค์ชายจุนไม่ได้โกรธเมื่อเธอผลักเขาออกไปก่อนหน้านี้ ซึ่งแสดงว่าเขายังคงมีความอดทนต่อฟู่จ้าวหนิงอยู่บ้าง</p>\n<p>ตอนนี้ไม่มีใครรู้ว่าองค์ชายจุนคิดอย่างไรกับฟู่จ้าวหนิงกันแน่ “บางคนพูดเรื่องไร้สาระมากเกินไป” คุณปู่จีก็เดินเข้ามา เร่งให้ฟู่จ้าวหนิงรีบหยิบยาออกจากตะกร้า เขาอยากรู้ว่าฟู่จ้าวหนิงขุดต้นเดนโดรเบียมโนบิเลขึ้นมาจริงหรือไม่ “นี่คือชิงเหยียนเฉา (สมุนไพรแก้เจ็บคอ) หรือ?” แพทย์หลวงคนหนึ่งถามขึ้นทันทีพลางชี้ไปที่กอหญ้าป่าที่ฟู่จ้าวหนิงเพิ่งหยิบออกมา “อะไรนะ?</p>\n<p>ชิงเหยียนเฉา?” เหล่าแพทย์ต่างตกใจเล็กน้อย ชิงเหยียนเฉา ตามชื่อก็บอกอยู่แล้วว่าใช้รักษาอาการเจ็บคอและมีสรรพคุณทางยาที่ดีเยี่ยม แม้ว่าจะไม่สามารถรักษาโรคที่ร้ายแรงได้ แต่ประสิทธิภาพของมันเหนือกว่าสมุนไพรอื่นๆ ที่มีสรรพคุณคล้ายกัน ทำให้มันมีคุณค่ามาก ยิ่งไปกว่านั้น เนื่องจากชิงเหยียนเฉามีลักษณะคล้ายหญ้าป่ามาก หลายคนจึงไม่รู้จัก แม้แต่แพทย์ผู้มีประสบการณ์ก็อาจมองข้ามหรือเข้าใจผิดได้ง่าย ดังนั้น ชิงเหยียนเฉาจึงขายดีมากในร้านขายยาหรือคลินิกต่างๆ ราคาก็ไม่ถูกเช่นกัน แค่กอชิงหยานเฉาขนาดใหญ่แค่นี้ก็น่าจะขายได้สิบตำลึงเงินแล้ว “ใช่เลย!” คุณปู่จีมองดูแล้วก็พยักหน้าทันที “ใช่แล้ว มันคือชิงหยานเฉา”</p>\n<p>สมุนไพรตัวแรกย่อมเป็นสิ่งที่ดีเสมอ ฟู่จ้าวหนิงรีบหยิบสมุนไพรอื่นๆ ออกจากตะกร้าแล้ววางลงบนโต๊ะ ทุกครั้งที่เธอหยิบสมุนไพรออกมา ดวงตาของคุณปู่จีก็จะเบิกกว้างขึ้นเล็กน้อย เมื่อเธอหยิบออกมาครบสิบชนิด ดวงตาของเขาก็แทบจะโปนออกมาเป็นจานรอง “โหระพาขาว? สะระแหน่เขียว?</p>\n<p>ดอกไม้ร้อยชีวิต?” คนอื่นๆ ก็รู้จักบ้างหนึ่งหรือสองอย่าง แม้ว่าจะระบุไม่ได้ทั้งหมด แต่การรู้จักเพียงหนึ่งหรือสองอย่างก็เพียงพอที่จะทำให้พวกเขาประหลาดใจ “นั่นคือเห็ดหลินจือหรือ?” “ไม่ มันไม่ใช่เห็ดหลินจือธรรมดา เห็นประกายสีม่วงบนหมวกเห็ดหลินจือไหม? นี่น่าจะเป็นเห็ดหลินจือสีม่วงที่ขึ้นจากตอไม้พร้อมกับสมุนไพรติดอยู่! ของหายาก ยาบำรุงชั้นดี!” “นี่คือแองเจลิกา ดาฮูริกา และเชอร์รี่พันไม้!” จากชื่อที่พวกเขาเรียก ฟู่จ้าวหนิงก็รู้ว่าสมุนไพรบางชนิดมีชื่อแตกต่างจากในรุ่นหลัง แต่ก็ไม่สำคัญ เธอรู้จักพวกมันทั้งหมดและรู้สรรพคุณทางยา ส่วนชื่อของสมุนไพรเหล่านี้ในอาณาจักรจ้าว เธอจะเข้าใจได้ในที่สุด</p>\n<p>เจ้าชายจุนเห็นสภาพที่ค่อนข้างวุ่นวายของแพทย์หลวง จึงโน้มตัวไปข้างหน้าเพื่อแอบดูตะกร้าของฟู่จ้าวหนิง อย่างไรก็ตาม ฟู่จ้าวหนิงสังเกตเห็นการเคลื่อนไหวของเขาในทันทีและดึงตะกร้าไปด้านหลังอย่างชัดเจน ป้องกันไม่ให้เขาเห็น เจ้าชายจุน: “...” ปฏิบัติกับเขาเหมือนขโมยงั้นหรือ?</p>\n<p>“สมุนไพรที่ฉันขุดขึ้นมาเป็นอย่างไรบ้าง? ได้มาตรฐานทั้งหมดหรือไม่?” ฟู่จ้าวหนิงถาม เธอมองไปที่หมอหลี่ ซึ่งสีหน้าของเขาดูเคร่งขรึม “ของพวกนี้...” “อืม!” หมอจีไออย่างหนัก “หลี่ ฉันยืนอยู่ตรงนี้ ลองโกหกหน้าตายดูสิ” หมอหลี่โกรธจัด เขาไม่คาดคิดมาก่อนว่าฟู่จ้าวหนิงจะขุดสมุนไพรหายากได้มากมายขนาดนี้ โสมสีม่วงนั้นดูเหมือนจะมีอายุสามสิบหรือสี่สิบปี หายากมาก แม้แต่ตัวเขาเองก็ยังอยากได้! ถ้าไม่มีชายชราจีอยู่ที่นี่ เขาคงพูดอะไรก็ได้ตามใจชอบ ไม่ว่าจะดีหรือร้าย อย่างไรก็ตาม พวกเขาทั้งหมดเป็นคนของเขา และแพทย์หลวงก็เชื่อฟังพระนางซูสีไทเฮาอย่างแน่นอน พวกเขาไม่ได้อยู่ข้างฟู่จ้าวหนิงหรือองค์ชายจุน แต่ตอนนี้ ชายชราจีผู้นี้ ที่เรียกตัวเองว่า &quot;ราชาแห่งยา&quot; มาถึงแล้ว พร้อมกับพาแพทย์อาวุโสหลายคนมาด้วย ทุกคนล้วนเป็นผู้เชี่ยวชาญและจับตามองอยู่ เรื่องนี้จึงยากที่จะคาดเดาได้!</p>\n<p>&quot;อย่างไรก็ตาม ในบรรดาสมุนไพรสิบชนิดที่ฉันเห็นอยู่นี้ ไม่มีชนิดไหนด้อยคุณภาพเลย พวกมันล้วนเป็นสมุนไพร และเป็นสมุนไพรหายากด้วย!&quot; ชายชราจีกล่าวเสียงดังพลางชี้ไปที่โสมสีม่วง “โสมม่วงต้นนี้ต้นเดียวก็พิสูจน์ได้แล้วว่าเด็กสาวคนนี้มีความรู้เรื่องสมุนไพรมาก ดูสิ คนที่ไม่ชำนาญจะขุดโสมม่วงทั้งต้นออกมาได้ยังไง? โสมต้นนี้สมบูรณ์แบบมาก ไม่มีรากหรือเส้นขนขาดหายเลย ไม่มีรอยเสียหายใดๆ!” ทุกคนจึงสังเกตเห็น พวกเขาก้าวเข้าไปดูใกล้ๆ พร้อมกับแอบทึ่ง มันสมบูรณ์แบบจริงๆ! โสมม่วงต้นนี้อยู่ในสภาพสมบูรณ์ รากทุกรากอยู่ครบ ไม่มีรอยหัก มีแต่ผู้เชี่ยวชาญเท่านั้นที่จะขุดมันออกมาได้อย่างระมัดระวังเช่นนี้</p>\n<p>สายตาของพวกเขามองไปยังฟู่จ้าวหนิงเปลี่ยนไป คุณฟู่ที่ดูไม่เก่งกาจคนนี้เปลี่ยนไปอย่างสิ้นเชิง “เอาล่ะ โสมม่วงต้นนี้ผ่านการทดสอบ” หมอหลี่กัดฟันและยอมรับ คุณปู่จีหัวเราะเสียงดัง “หมายความว่ายังไง โสมม่วงผ่านการทดสอบ?</p>\n<p>แล้วพวกนี้ล่ะ? สมุนไพรแก้ไอไม่ผ่านเหรอ?” “ขึ้นฉ่ายไม่ผ่านเหรอ?” “ต้นมะตูมพันไม้ไม่ผ่านเหรอ?” “ถอนหายใจเขียวๆ พวกเจ้าของร้านขายยาไม่ต้องการดอกไม้ร้อยชีวิตเหรอ?” “แล้วเถาขมกับดอกเบญจมาศกลางคืนนั่น ปกติพวกแกหาซื้อได้เหรอ? หรือแม้แต่เก็บเองได้หรือเปล่า?” ชายชราจีชี้ไปที่สมุนไพรแต่ละชนิดพลางถามคำถาม หมอหลี่และคนอื่นๆ หน้าแดงก่ำไปหมด แต่พูดอะไรไม่ออก ชายชราจีรู้จักสมุนไพรทุกชนิด แล้วจะทำยังไงได้! ทันใดนั้น รองแม่ทัพหลิวก็อุทานขึ้น “เดี๋ยวก่อน คุณหนูฟู่ขุดสมุนไพรพวกนี้เองจริงๆ เหรอ?” ทันใดนั้น ดวงตาของหมอหลี่ก็เป็นประกาย “ใช่แล้ว อย่างที่ทุกคนรู้กัน คุณหนูฟู่ไม่รู้อะไรเลยมาก่อน แล้วทำไมจู่ๆ ถึงรู้จักสมุนไพรมากมายขนาดนี้?”</p>"}, "38": {"chapter_number": 38, "chapter_title": "第38章雋王挺狠的", "content": "<p>การทดสอบนี้ ตามกฎแล้ว กำหนดให้ฟู่จ้าวหนิงต้องหาสมุนไพรด้วยตัวเอง แต่เธอมีความสามารถนั้นหรือไม่? เฒ่าจีจ้องมองรองแม่ทัพหลิว “เธอไม่ได้ออกมาคนเดียวหรือ?” “เฒ่าจี นั่นไม่ได้พิสูจน์ว่าเธอขุดมันขึ้นมาเอง” รองแม่ทัพหลิวแบมือ “วังส่งท่านมาเฝ้าทางเข้าเพื่อป้องกันไม่ให้คนอื่นเข้าไป ถ้าไม่มีใครเข้าไปในภูเขาแล้วใครจะช่วยเธอได้?” เฒ่าจีกล่าวเสริม จากนั้นรองแม่ทัพหลิวก็มองไปที่องค์ชายจุน “ยากที่จะบอก เราแค่เฝ้าทางเข้า แต่ก็อาจมีคนส่งคนแอบเข้าไปจากที่อื่นได้ไม่ใช่หรือ?” น้ำเสียงขององค์ชายจุนเฉยเมย “งั้นตอนที่ท่านพูดแบบนั้น ท่านมองมาที่ข้า ท่านสงสัยข้าหรือ?” “ข้าไม่กล้าหรอก”</p>\n<p>แม้ว่ารองแม่ทัพหลิวจะบอกว่าเขาไม่กล้า แต่สีหน้าของเขาก็แสดงให้เห็นอย่างชัดเจนว่าเขาหมายถึงองค์ชายจุน เขามั่นใจว่าองค์ชายจุนไม่สามารถพิสูจน์อะไรได้ในตอนนี้ แต่ในชั่วพริบตาต่อมา แสงเย็นยะเยือกก็วาบขึ้นตรงหน้าเขา รองแม่ทัพหลิวตกใจและรีบหลบ แต่ก็สายเกินไป ดาบแทงเข้าที่ท้องของเขา เลือดพุ่งกระฉูด “อ้า!” คนที่ยืนอยู่ข้างๆ รองแม่ทัพหลิวต่างตกใจและรีบถอยห่างออกไป รองแม่ทัพหลิวก้มหน้าลงอย่างไม่อยากจะเชื่อ และในขณะที่เขากำลังมอง ดาบก็ถูกชักออกมาอีกครั้งด้วยเสียงดังฟู่ เจ้าชายจุนโยนดาบเปื้อนเลือดกลับไปให้ชิงอี้ หยิบผ้าเช็ดหน้าออกมาเช็ดนิ้วอย่างระมัดระวังพลางพูดอย่างใจเย็นว่า</p>\n<p>“ข้าไม่ได้กลับมายังเมืองหลวงหลายปีแล้ว และตอนนี้รองผู้บัญชาการองครักษ์ธรรมดาๆ กล้ามาเหยียบหัวข้า” อืม ใครให้เขามากล้าขนาดนั้น?</p>\n<p>รองแม่ทัพหลิวกุมท้องด้วยมือทั้งสองข้าง เลือดพุ่งออกมา ดวงตาที่พร่ามัวมองไปที่หมอหลี่ ใบหน้าของหมอหลี่ซีดเผือด เจ้าชายจุนเป็นคนน่ากลัวขนาดนั้นเลยหรือ? ในขณะนี้ เจ้าชายจุนมองไปที่ฟู่จ้าวหนิงและพูดอีกครั้ง “เจ้าบอกว่าเจ้ารู้จักยาไม่ใช่เหรอ? ในเมื่อพวกเขาสงสัยว่าเจ้าไม่รู้จักสมุนไพรพวกนี้ และสงสัยว่ามีคนอื่นช่วยเจ้า ข้าจะให้โอกาสเจ้าพิสูจน์ ในนั้นมีสมุนไพรห้ามเลือดอยู่ใช่ไหม?” ฟู่จ้าวหนิงได้สติในที่สุด “ท่านต้องการให้ข้าห้ามเลือดเขาหรือ?” เธอเพิ่งรู้ตัวว่าองค์ชายจุนอันตราย เขาดูเย็นชาและป่วยเรื้อรัง เธอคิดว่าเขาเป็นแค่คนเย็นชา แต่ใครจะรู้ว่าเขามีด้านที่โหดร้ายและรุนแรง! “ดาบของข้าพลาดเป้า</p>\n<p>ข้าจะไว้ชีวิตเขา แต่ว่าเจ้าจะหยุดเลือดได้หรือไม่นั้นขึ้นอยู่กับเจ้า” ฟู่จ้าวหนิงเม้มริมฝีปากและหยิบสมุนไพรขึ้นมาทันที ยื่นมือไปคว้าชิงอี้ ชิงอี้ตกใจและยังไม่ทันได้ตั้งตัว ดาบที่เขาเพิ่งเช็ดเลือดออกไปก็กลับมาอยู่ในมือของฟู่จ้าวหนิงแล้ว ชิงอี้: ...</p>\n<p>เอาล่ะ ฉันไม่มีศักดิ์ศรีเลยหรือไง? เขาไม่กล้าพูดอะไรเมื่อเจ้าชายจู่ๆ ก็คว้าดาบของเขาไป แต่ทำไมฟู่จ้าวหนิงถึงคว้าดาบของเขาได้ง่ายขนาดนี้? และนี่เป็นครั้งที่สองแล้ว! ฟู่จ้าวหนิงกำดาบของเธอแน่นและเริ่มฟันพุ่มสมุนไพรด้วยความเร็วราวสายฟ้าแลบ ชิงอี้แทบจะร้องไห้ ดาบอันล้ำค่าของเขากลายเป็นมีดทำครัวไปแล้วหรือ?</p>\n<p>ฟู่จ้าวหนิงใช้ดาบฟันสมุนไพรได้อย่างไร? และคล่องแคล่วขนาดนี้? ทุกคนต่างจ้องมองฟู่จ้าวหนิงด้วยความไม่เชื่อในฝีมืออันเหนือธรรมดาของเธอ ฟู่จ้าวหนิงไม่สนใจปฏิกิริยาของพวกเขา เธอหยิบใบไม้หนาๆ จากตะกร้าสมุนไพรมาหนึ่งกำมือแล้วโยนลงไปในกองสมุนไพร จากนั้นก็ฟันต่อ เมื่อท่านผู้เฒ่าจีเห็นใบไม้ที่เธอเพิ่มเข้าไป ดวงตาของเขาก็เป็นประกาย และเขามองฟู่จ้าวหนิงราวกับว่าเขาพบสมบัติ “ฉันบอกแล้วไง คุณหนู เจ้าพบดอกบัวไม้!” “อะไรนะ? ดอกบัวไม้เป็นสมุนไพรที่ดีที่สุดสำหรับการรักษาบาดแผล!” แพทย์หลวงอุทานว่า &quot;ตอนนี้พระราชวังต้องการดอกบัวกลีบไม้เป็นอย่างยิ่ง&quot; ฟู่จ้าวหนิงเพียงแค่โยนดอกบัวกำมือหนึ่งเข้าไปแล้วสับมัน!</p>\n<p>ฟู่จ้าวหนิงคว้ายามาได้กำมือใหญ่ เดินเข้าไปหารองแม่ทัพหลิว แล้วเตะเข้าที่หน้าอกของเขา ทำให้เขาล้มลงไปกองกับพื้นเสียงดังตุ๊บ &quot;นี่...&quot; ทุกคนต่างตกตะลึงกับการกระทำของเธอ อ้าปากค้าง แม้แต่องค์ชายจุนก็อดหัวเราะไม่ได้ ตรงไปตรงมาและโหดร้ายขนาดนี้เลยเหรอ? &quot;ฟู่จ้าวหนิง!&quot; รองแม่ทัพหลิวเกือบจะเป็นลมเพราะความเจ็บปวด การล้มลงกับพื้นทำให้เลือดไหลออกจากบาดแผลหนักขึ้นไปอีก ฟู่จ้าวหนิงมองลงไปที่เขาอย่างเย็นชาแล้วพูดว่า &quot;หุบปากซะ ถ้าอยากมีชีวิตรอด&quot; รองแม่ทัพหลิวยังคงเงียบ &quot;ท่านจี ช่วยข้าหน่อย&quot; ฟู่จ้าวหนิงเหลือบมององค์ชายจุน แล้วหันไปมองหาอีกครั้งก่อนจะมองไปที่ท่านจี</p>\n<p>&quot;ฉีกเสื้อผ้าของเขาออก&quot; &quot;ตกลง ตกลง!&quot; จีผู้เฒ่าวิ่งเข้ามาคว้ากรรไกรเล็ก ๆ ที่เหน็บไว้ที่เอวแล้วตัดเสื้อผ้าของรองแม่ทัพหลิวออก ทันทีที่ตัดเสร็จ ฟู่จ้าวหนิงก็ทายาในมือลงบนแผลของเขาอย่างรวดเร็ว แล้วกดลงด้วยมือ รองแม่ทัพหลิวเกือบเป็นลมเพราะความเจ็บปวด ผู้หญิงคนนี้หยาบกระด้างเกินไป!</p>\n<p>อย่างไรก็ตาม เลือดหยุดไหลอย่างรวดเร็ว “เลือดหยุดไหลจริง ๆ!” “ยาได้ผลจริง ๆ สมุนไพรพวกนี้คุณภาพดีเยี่ยม” เหล่าแพทย์พูดคุยกันอย่างตื่นเต้น ลืมความน่ากลัวจากการแทงเงียบ ๆ ขององค์ชายจุนไปชั่วขณะ สายตาขององค์ชายจุนยังคงจ้องมองไปที่ฟู่จ้าวหนิง ก่อนจะหันไปหาหมอหลี่ “ทีนี้ เราจะพิสูจน์ได้ไหมว่าเธอรู้จักสมุนไพรพวกนี้?” หมอหลี่พยายามโต้แย้ง แต่องค์ชายจุนก็เสริมอย่างเย็นชา ก่อนที่เขาจะพูดอะไรได้ “ถ้ารองแม่ทัพหลิวคนเดียวไม่เพียงพอที่จะพิสูจน์ได้ ข้าก็ไม่รังเกียจที่จะหาคนอีกสองสามคนมาช่วยตรวจสอบ” การตรวจสอบนี้จะทำได้อย่างไร? คงไม่ใช่การแทงโดยตรงอีกแล้วใช่ไหม? หรืออาจจะเกี่ยวข้องกับการวางยาพิษคนสักสองสามคน? ดูเหมือนว่าองค์ชายจุนจะทำเรื่องแบบนั้นได้จริงๆ!</p>\n<p>น่ากลัวมาก! หมอหลี่กัดฟัน “ก็ได้ ถึงแม้เธอจะรู้จักสมุนไพรพวกนี้และมีทักษะทางการแพทย์บ้าง แต่สมุนไพรหลายชนิดก็ขึ้นในที่อันตราย ด้วยแขนขาเล็กๆ ของเธอ เธอคงขุดมันขึ้นมาเองไม่ได้หรอก” ดังนั้น คงมีคนอื่นช่วยเธอขุดสมุนไพรเหล่านั้น องค์ชายจุนหัวเราะ “ฟู่จ้าวหนิง อยากปีนต้นไม้ขึ้นไปให้พวกเขาดูอีกรอบไหม?” ฟู่จ้าวหนิงอดไม่ได้ที่จะกลอกตาใส่เขา เขาพยายามจะให้เธอแสดงโชว์หรือไง? “ไม่จำเป็นหรอก” ฟู่จ้าวหนิงเดินไปที่โต๊ะยาว ใส่สมุนไพรทั้งหมดลงในตะกร้า จากนั้นก็กำหมัดแล้วฟาดลงบนโต๊ะอย่างแรง เสียงดังสนั่น โต๊ะทั้งตัวหักเป็นสองท่อนและพังลงมา ความเงียบปกคลุมไปทั่วบริเวณ พลังหมัดของฟู่จ้าวหนิง... &quot;แขนขาเล็กเหรอ?</p>\n<p>หมอหลี่หมายถึงฉันเหรอ?&quot; ฟู่จ้าวหนิงโบกกำปั้นใส่หมอหลี่ สีหน้าเหมือนจะบอกว่า &quot;ลองต่อยฉันตรงนี้สิ!&quot; หยิ่งยโสเกินไป! หมอหลี่โกรธจนริมฝีปากบิดเบี้ยวเป็นรอยยิ้มน่าเกลียด ในขณะที่ท่านจี้ตบต้นขาตัวเองแล้วหัวเราะออกมา &quot;เฮ้ เจ้าเด็กเหลือขอ เจ้ามีเรื่องกับข้า!&quot; เขาดีใจและภูมิใจมาก เขาและชายนามสกุลหลี่มักเป็นศัตรูกันมาตลอด และเขาเคยโกรธเคืองชายคนนี้มานับครั้งไม่ถ้วน ตอนนี้ศิษย์ตัวน้อยของเขาได้แก้แค้นให้แล้ว ด้วยการตบหน้าชายชรานามสกุลหลี่อย่างจัง มันรู้สึกดีมาก น่าพอใจอย่างเหลือเชื่อ “ยังมีใครสงสัยฉันอีกหรือ? ฉันอยู่ในภูเขามาสามวันสามคืนแล้ว หิวโหยและเหนื่อยล้า คุณคิดว่าฉันจะยังถามคุณแบบนี้ต่อไปอีกหรือ?</p>\n<p>ใครที่ยังสงสัยอยู่ก็มาอยู่บนภูเขากับฉันสักสามวันก็ได้ สนใจไหม?” ฟู่จ้าวหนิงเริ่มหมดความอดทนเล็กน้อย</p>"}, "39": {"chapter_number": 39, "chapter_title": "第39章跟要死了一樣", "content": "<p>หมอหลี่และแพทย์หลวงคนอื่นๆ ต่างมองหน้ากันอย่างหมดหวัง จำใจยอมรับผลลัพธ์ “...งั้นคุณหนูฟู่ก็สอบผ่านแล้วสินะ” “ขอแสดงความยินดีด้วยนะ คุณหนูฟู่” ท่านจี้หัวเราะเสียงดัง เหลือบมององค์ชายจุน “เดี๋ยวก่อน เราควรเรียกเธอว่าเจ้าหญิงจุนไม่ใช่เหรอ?” ฮึ่ม ถึงแม้เขาจะรู้สึกเสียดายที่ศิษย์น้อยของเขาต้องมาคู่กับองค์ชายจุน แต่เธอก็แต่งงานแล้ว และพิธีวิวาห์ก็จัดขึ้นแล้ว ดังนั้นเธอต้องรักษาตำแหน่งภรรยาเอกของเธอไว้ให้มั่นคง! “ขอแสดงความยินดีด้วยนะ เจ้าหญิงจุน” ทุกคนเปลี่ยนคำเรียกขานอย่างไม่ใส่ใจ ฟู่จ้าวหนิงมองไปที่องค์ชายจุนโดยไม่รู้ตัวในขณะนั้น องค์ชายจุนไม่ได้พูดอะไร</p>\n<p>แต่ชิงอี้กลับยิ้มกว้างและเรียกฟู่จ้าวหนิงอย่างกระฉับกระเฉงว่า “ขอแสดงความยินดีด้วยนะ เจ้าหญิง!” ฟู่จ้าวหนิงไม่ได้ตอบอะไร ก้มลงหยิบตะกร้า “ฉันขอติดรถม้าไปด้วยได้ไหมคะ?” เธออยากกลับไปบ้านตระกูลฟู่ใจจะขาด นางได้ปรุงยาเม็ดขวดหนึ่งบนภูเขา โดยตั้งใจจะนำไปให้ท่านปู่ก่อน ก่อนที่องค์ชายจุนจะพูดอะไรได้ ชายชราจีก็อุทานอย่างยินดีว่า “นั่งในรถม้าของข้า!</p>\n<p>นั่งในรถม้าของข้า! ไปคุยเรื่องสมุนไพรกันในรถม้า!” “ตกลง” ฟู่จ้าวหนิงไม่ลังเลและรีบตามเขาไปที่รถม้า ชายชราจีเดินอย่างหยิ่งผยอง ราวกับว่าหางของเขากำลังกระดิก “ฝ่าบาท!” ชิงอี้สะดุ้งตื่นและรีบเรียกฟู่จ้าวหนิง จากนั้นเขาก็มองไปที่องค์ชายจุนและกล่าวว่า “ฝ่าบาท โปรดนำรถม้าจากที่ประทับขององค์ชายมาให้ด้วย” องค์ชายเกือบเอาชีวิตไม่รอดในครั้งที่แล้ว โชคดีที่องครักษ์พาพวกเขาทั้งสองลงมาและอธิบายว่าพวกเขาได้พบกับชายชราจีบนภูเขา พวกเขาจึงรีบไปหาชายชราจีและซื้อยาเม็ดจากเขา ซึ่งช่วยควบคุมอาการขององค์ชายได้ชั่วคราว อย่างไรก็ตาม ท่านผู้เฒ่าจีก็กล่าวว่า ประสิทธิภาพของยาจะลดลงอย่างมากหลังจากรับประทานไปสามเม็ด</p>\n<p>และพวกเขาไม่สามารถพึ่งพาการรับประทานยาอย่างต่อเนื่องได้ ตอนนี้พวกเขากำลังรอฟู่จ้าวหนิงกลับมารักษาองค์ชายอย่างใจจดใจจ่อ ฟู่จ้าวหนิงหันไปมององค์ชายจุน องค์ชายจุนหยุดชั่วครู่ก่อนจะพูดว่า “ข้าส่งคนไปเฝ้าดูท่านผู้เฒ่าฟู่แล้ว ตอนนี้ทุกอย่างเรียบร้อยดี” แสดงว่าเขาใจอ่อนก่อนแล้วสินะ?</p>\n<p>ฟู่จ้าวหนิงถอนหายใจโล่งอกเล็กน้อย เธอรีบกลับไปที่ตระกูลฟู่เพราะกังวลว่าคนอื่นๆ จะทำอะไร ตอนนี้องค์ชายจุนบอกว่าส่งคนไปเฝ้าดูตระกูลฟู่แล้ว ความกังวลนั้นก็หายไป ฟู่จ้าวหนิงพูดกับท่านผู้เฒ่าจีว่า “คุณปู่ ข้าจะไปดูท่านก่อน” “ตกลง ตกลง” ท่านผู้เฒ่าจีลดเสียงลง “แต่ด้วยอาจารย์ของเจ้าคอยสนับสนุนอยู่ อย่ากลัวไปเลย เจ้าเป็นห่วงปู่หรือ? ข้าจะไปเยี่ยมปู่ที่ตระกูลฟู่ก่อน ไม่ต้องห่วง” ฟู่จ้าวหนิงรู้สึกอบอุ่นในหัวใจ “ขอบคุณค่ะ ท่านปู่” “ไม่ต้องขอบคุณหรอก เจ้าเป็นศิษย์ที่ดีของข้า คราวหน้าอย่าลืมเรียกข้าว่าอาจารย์นะ” ท่านอาจารย์จีกล่าวอย่างมีความสุขขณะเดินจากไป พร้อมกับเรียกหมอคนหนึ่งไปด้วย “หมอหวัง มาเร็ว</p>\n<p>มาเร็ว มาเร็ว ไปตรวจคนไข้ให้ข้าหน่อย เดี๋ยวข้าเลี้ยงเครื่องดื่ม” หมอรู้สึกปลื้มใจและรีบตามไป ฟู่จ้าวหนิงขึ้นรถม้าขององค์ชายจุน องครักษ์เงามังกรคุ้มกันรถม้าออกไป แพทย์หลวงมองดูพวกเขาจากไปอย่างกังวลใจและถามว่า “เราจะยังได้สมุนไพรเหล่านั้นอยู่ไหม?” เดิมทีพวกเขาไม่ได้คิดถึงสมุนไพรที่ฟู่จ้าวหนิงขุดขึ้นมา แต่ตอนนี้เมื่อเห็นสมบัติที่ฟู่จ้าวหนิงขุดขึ้นมา พวกเขาก็ต่างอยากได้กันหมด หมอหลี่ก็อยากได้เช่นกัน เดิมทีเขาตั้งใจจะใช้ทหารองครักษ์นำโดยรองแม่ทัพหลิวเข้ายึดของเหล่านั้น แต่เจ้าชายจุนกลับนำทหารองครักษ์เงามังกรมาด้วย มันน่าโมโหจริงๆ!</p>\n<p>แม้ว่าทหารองครักษ์เงามังกรจะยังไม่ขยับเขยื้อนหลังจากมาถึง แต่เพียงแค่ใบหน้าไร้อารมณ์ของพวกเขาก็เพียงพอที่จะทำให้ทหารองครักษ์หวาดกลัว รองแม่ทัพหลิวและคนของเขาไม่กล้าขยับเขยื้อน “แค่บอกว่าเราต้องการเก็บสมุนไพรเหล่านั้น นั่นเป็นกฎ ฉันจะไปที่วังเพื่อเข้าเฝ้าพระนางซูสีไทเฮาและบอกพระองค์เอง เมื่อรู้ว่าเจ้าชายจุนแทงรองแม่ทัพหลิวด้วยดาบ ไม่เพียงแต่พระนางซูสีไทเฮาเท่านั้น แต่แม้แต่จักรพรรดิก็คงจะพิโรธ” หมอหลี่เยาะเย้ย อย่างไรก็ตาม เขาต้องการโสมม่วงนั่น! แม้ว่าพระนางซูสีไทเฮาจะเอาไป เขาก็ยังสามารถแอบเอามาใช้ได้ทุกเมื่อที่พระนางต้องการ นอกจากนี้ยังมีสมุนไพรอื่นๆ อีกมากมาย เหมาะสำหรับร้านขายยาของเขาเอง</p>\n<p>พวกเขารีบเก็บของและมุ่งหน้ากลับไป ภายในรถม้าที่เรือนขององค์ชายจุน ฟู่จ้าวหนิงสูดหายใจเข้าลึกๆ แล้วเอนตัวไปด้านข้าง “ท่านไม่คิดจะถามบ้างเหรอว่าจงเจี้ยนไปไหน” เธอมองไปที่องค์ชายจุน เพราะอย่างไรเขาก็เป็นลูกน้องของเขา “จงเจี้ยนไปไหน” องค์ชายจุนถามตามเธอ ฟู่จ้าวหนิงยิ้ม “ฉันขอให้เขาช่วยขนของบางอย่าง ดังนั้นเขาจะลงจากเขาช้าหน่อย” องค์ชายจุนหยุดชั่วครู่ แล้วถามว่า “สมุนไพรหรือ” หืม?</p>\n<p>เขาเดาถูกจริงๆ “ใช่” ในเมื่อฟู่จ้าวหนิงยืมองครักษ์ของเขามา เธอก็ไม่ได้คิดจะปิดบังเขา จงเจี้ยนจะต้องรายงานทุกอย่างให้เขาฟังในภายหลังอย่างแน่นอน “ไอ ไอ” องค์ชายจุนไอ และเสียงที่วิตกกังวลของชิงอี้ดังมาจากข้างนอก “ฝ่าบาท โปรดตรวจดูองค์ชายโดยด่วน” ภายนอกองค์ชายดูเหมือนจะสบายดี แต่เขารู้สึกว่าองค์ชายกำลังแสร้งทำเป็นเข้มแข็ง เพราะก่อนหน้านี้เขาอาเจียนเป็นเลือด และไอเป็นเลือดหลายครั้ง ฟู่จ้าวหนิงมองไปที่องค์ชายจุน “ถอดหน้ากากออกเสีย ไม่อย่างนั้นฉันจะดูสีหน้าของเขาได้อย่างไร? คุณไม่รู้หรือว่าการวินิจฉัยคนไข้ต้องสังเกต ฟัง ถาม และคลำชีพจร?” เธอพูดกับเขาอย่างตรงไปตรงมาจริงๆ</p>\n<p>องค์ชายจุนกัดฟันและถอดหน้ากากออกอยู่ดี ฟู่จ้าวหนิงนั่งตัวตรงและใช้ปลายนิ้วเรียกเขา “เข้ามาใกล้ๆ” องค์ชายจุนโน้มตัวมาตามคำสั่ง “มือ” เขาวางมือลงบนโต๊ะเล็กๆ ในรถม้า ฟู่จ้าวหนิงดึงแขนเสื้อของเขาขึ้น จับมือเขาและดึงเขาเข้ามาใกล้ขึ้นเล็กน้อย แต่ทันทีที่เธอจับมือเขา เธอก็รู้สึกหนาวสั่น นี่เพิ่งจะปลายเดือนสิงหาคม แต่มือของเขากลับเย็นผิดปกติ เมื่อเธอจับมือเขา องค์ชายจุนอยากจะสะบัดมือออกโดยไม่รู้ตัว แต่สุดท้ายเขาก็ยับยั้งตัวเองไว้ “มือของคุณเย็นแบบนี้เสมอหรือ?” ฟู่จ้าวหนิงถามขณะที่คลำชีพจรของเขา “ช่วงนี้อากาศค่อนข้างเย็นครับ ก่อนหน้านี้ก็ไม่อุ่น แต่ก็ไม่เย็นขนาดนี้” องค์ชายจุนตอบ</p>\n<p>ฟู่จ้าวหนิงจับชีพจรของเขาและมองเขาด้วยความตกใจ “เมื่อไม่กี่วันก่อนชีพจรของท่านยังไม่แรงขนาดนี้เลย วันนี้เหมือนท่านจะใกล้ตายแล้ว!” ชิงอี้ที่นั่งอยู่ข้างนอกเกือบจะตกจากรถม้าเมื่อได้ยินคำพูดของเธอ ไม่นะ นี่มันน่ากลัวเกินไป!</p>\n<p>“ฝ่าบาท พระสุขภาพขององค์ชายจุนเป็นอะไรไปครับ?” “เงียบ!” องค์ชายจุนตะคอกใส่เขาด้วยความโกรธที่ควบคุมไม่อยู่ เขาช่างพูดช่างถามเสียจริง ชิงอี้จึงหุบปากแน่น “ไม่ควรพูดรายละเอียดในรถม้าแบบนี้ ท่านรู้สึกว่าเลือดและพลังของท่านไหลเวียนไม่ดีหรือเปล่า? ไม่ใช่แค่เพียงมือที่เย็น แต่ทั้งตัวก็เย็นไปหมดใช่ไหม? และท่านก็เวียนศีรษะ อ่อนเพลีย และบางครั้งก็หายใจไม่ออกด้วย?” ฟู่จ้าวหนิงถามคำถามเหล่านี้ และหลังจากเห็นองค์ชายจุนพยักหน้า เธอก็เยาะเย้ยว่า “เจ้ากล้าออกมาที่นี่ในสถานการณ์แบบนี้หรือ? เจ้ากังวลมากหรือว่าข้าจะสอบไม่ผ่าน จะทำให้เจ้าอับอาย และจะไม่ได้ของขวัญอันยิ่งใหญ่จากจักรพรรดิ?” “ข้าไม่รู้จักท่านเลย</p>\n<p>ก่อนแต่งงาน เราแทบจะเป็นคนแปลกหน้ากันด้วยซ้ำ ไม่แปลกหรือที่ข้
