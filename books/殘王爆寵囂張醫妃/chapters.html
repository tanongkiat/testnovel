    <script>
        const chaptersData = {"1": {"chapter_number": 1, "chapter_title": "第1章撕了她的嫁衣", "content": "<p>อาณาจักรจ้าว เมืองหลวง บนถนนที่พลุกพล่าน หญิงสาวแต่งกายงดงามคนหนึ่งพร้อมด้วยองครักษ์ ได้ขวางขบวนแห่แต่งงานอย่างดุดัน “หลีกไป! นี่คือลูกสาวคนโตของหมอหลี่! ถ้าคิดจะมายุ่งกับเธอ พวกเจ้าจะต้องเสียใจ!” ผู้คนต่างพากันหลบหลีกด้วยความกลัวว่าจะถูกลูกหลง พวกเขามองดูขบวนแห่แต่งงานที่ดูโทรมๆ ด้วยความสงสาร “เจ้าสาวใครกัน? เธอไปทำอะไรให้คุณหนูหลี่โกรธ?” “พวกเจ้าไม่รู้หรือ?</p>\n<p>วันนี้เป็นวันอภิเษกสมรสขององค์ชายเซียวกับคุณหนูฟู่ คุณหนูฟู่จึงอยู่ในเกี้ยวเจ้าสาว” เสียงดังปัง เกี้ยวถูกหยุดอย่างแรงโดยองครักษ์ของตระกูลหลี่ มันสั่นสะเทือนอย่างรุนแรง และมีเสียงตุบๆ ดังมาจากข้างใน เหมือนเสียงหัวกระแทกกับของแข็ง “ลากฟู่จ้าวหนิงออกมา! ถอดชุดแต่งงานของนางออก!” คุณหนูหลี่สั่งอย่างหยิ่งผยองพลางจ้องมองไปที่เกี้ยว ทันใดนั้นเอง เหล่าทหารองครักษ์ก็รีบวิ่งเข้ามา ยื่นมือออกไปยกม่านขึ้นโดยไม่พูดอะไรสักคำ แม่สื่อรีบวิ่งเข้ามาห้าม “ไม่! เจ้าสาวจะลงจากเกี้ยวกลางคันได้อย่างไร? มันเป็นลางร้าย ครอบครัวของสามีจะไม่ชอบเธอ” ผู้คนที่อยู่รอบข้างต่างตกใจ คุณหนูหลี่จะลากเจ้าสาวลงจากเกี้ยวกลางถนนจริงหรือ?</p>\n<p>และยังจะถอดชุดแต่งงานของเธออีก? “ใครก็ตามที่กล้าขัดขวางข้าคือผู้ขัดขืนพระบิดาของข้า! หากเจ้าเจ็บป่วยหรือบาดเจ็บ อย่าหวังว่าพระบิดาของข้าจะรักษาเจ้า! ด้วยคำสั่งเดียวของพระบิดาของข้า ร้านขายยาในเมืองหลวงทั้งหมดจะไม่ขายยาให้เจ้า!</p>\n<p>พี่เซียวไม่อยากแต่งงานกับฟู่จ้าวหนิงเลย เป็นผู้หญิงหน้าด้านคนนี้ที่บังคับเขา! พวกเจ้ายืนอยู่ตรงนั้นทำไม? รีบถอดชุดแต่งงานของเธอออก!” แม่สื่อถูกเตะกระเด็นไปด้านข้าง และเหล่าทหารองครักษ์ก็รีบยกม่านเกี้ยวขึ้น ดึงเจ้าสาวในชุดแต่งงานสีแดงสดและผ้าคลุมหน้าออกมา แล้วเริ่มถอดเสื้อผ้าของเธอออก “นี่มันเกินไป! ถ้าเสื้อผ้าของเธอถูกถอดออก คุณหนูฟู่จะรอดได้ยังไง…?” ผู้คนรอบข้างต่างตกตะลึง บางคนจ้องมองเจ้าสาวด้วยตาโต “ดูสิ ดูสิ!</p>\n<p>ดูสิว่าคุณหนูฟู่ผิวขาวเนียนขนาดไหน!” “ขาวราวหิมะเลย!” อันธพาลคนหนึ่งในฝูงชนหัวเราะอย่างชั่วร้าย ผู้คนมารวมตัวกันมากขึ้นเรื่อยๆ จนปิดกั้นถนนทั้งหมด “คุณหลี่ทำแบบนี้ไม่ได้! โปรดปล่อยคุณหนูฟู่ไปเถอะ! ถ้าเรื่องนี้รั่วไหลออกไป แม้แต่คุณชายเซียวก็จะเสียหน้า…” แม่สื่อทรุดตัวลงนั่งกับพื้น ตบต้นขาตัวเองและร้องโหยหวน “ถ้าเราถอดชุดแต่งงานของเธอออก คุณหนูฟู่จะรอดได้ยังไง?!” “ทำไมคนเหล่านี้ที่มาส่งเจ้าสาวถึงหลบซ่อนและไม่ห้ามเธอ?” บางคนสงสัย “ไม่มีใครจากตระกูลฟู่มาส่งเธอเลยเหรอ? คุณหนูฟู่ไม่มีสาวใช้หรือคนรับใช้เลยเหรอ?” “ทำไมเจ้าสาวถึงไม่ขยับตัว?”</p>\n<p>บางคนทนไม่ไหวอีกต่อไปและรีบวิ่งไปที่บ้านของตระกูลเซียวเพื่อขอความช่วยเหลือ มันอยู่ไม่ไกลจากที่นี่ เสียง &quot;ฉีก&quot; ดังขึ้น ทำให้ชุดแต่งงานของเจ้าสาวถูกฉีกออกอย่างแรง ในขณะที่จ้าวหนิงได้สติ เธอก็รู้สึกว่ามีคนกำลังฉีกเสื้อผ้าของเธอ ก่อนที่เธอจะลืมตา ความโกรธก็พลุ่งพล่านขึ้นมา เธอจึงกำหมัดแน่นและชกคนนั้นอย่างแรง พร้อมกับเตะด้วยเข่าไปด้วย &quot;ปัง!&quot; &quot;อ๊า!!&quot; หนึ่งในสององครักษ์ที่กำลังฉีกชุดแต่งงานของเธอถูกเตะเข้าที่ตา ส่วนอีกคนอาการหนักกว่านั้น อวัยวะเพศของเขาแตกละเอียดทันที ใบหน้าของเขาซีดเผือด เสียงกรีดร้องดังก้องไปทั่วท้องฟ้า จ้าวหนิงดึงผ้าคลุมหน้าสีแดงของเธอออก</p>\n<p>ลุกขึ้นยืนด้วยความช่วยเหลือจากเก้าอี้หามเจ้าสาว และสำรวจเหตุการณ์ตรงหน้า เธอจำได้ว่าเพิ่งผ่าตัดบุคคลผู้ทรงอำนาจคนหนึ่งเสร็จ การผ่าตัดนานสิบสี่ชั่วโมง หลังจากออกจากห้องผ่าตัด เธอก็หลับไปทันที แล้วเธอตื่นขึ้นมาได้อย่างไรในฐานะคุณหนูคนที่สามของตระกูลฟู่?</p>\n<p>ความทรงจำของจ้าวหนิงหลั่งไหลเข้ามาในความคิดของเธอ ทำให้ภาพตรงหน้าพร่ามัว “ฟู่จ้าวหนิง! ยัยเด็กไร้ยางอาย กล้าดียังไงมาขัดขืน!” คุณหนูหลี่พุ่งเข้าหาเธอ เข็มยาวห้อยอยู่ที่นิ้วมือ เธอชูเข็มขึ้นเตรียมจะแทงจ้าวหนิงที่ศีรษะ พ่อของเธอเป็นหมอที่มีชื่อเสียง ดังนั้นเธอจึงเรียนรู้เทคนิคการฝังเข็มมาบ้าง ด้วยเข็มเพียงเล่มเดียว ฟู่จ้าวหนิงก็จะหมดสติทันที เมื่อเธอหมดสติแล้ว เธอจะถอดเสื้อผ้าของเธอออก เหลือไว้เพียงชุดชั้นใน! “อ๊า!” ผู้คนรอบข้างร้องออกมาด้วยความตกใจ แสงเย็นจากเข็มวาบขึ้น จ้าวหนิงหรี่ตาลง แล้วชกไปที่หน้าอกของคุณหนูหลี่ ตุ๊บ เล็กไปหน่อย แต่ค่อนข้างนุ่ม จ้าวหนิงยังหมุนและบดขยี้หน้าอกของเธอด้วย “เมื่อกี้แกพูดว่าอะไรนะ ‘หน้าอกเล็ก’?” จ้าวหนิงเหลือบมองหน้าอกของเธอ “อืม เล็กไปหน่อย” “อ๊า!</p>\n<p>เจ็บ! ฟู่ จ้าว หนิง พวกแก...” ใบหน้าของมิสหลี่บิดเบี้ยวด้วยความเจ็บปวด มือที่ยกขึ้นอ่อนแรงลง เข็มหล่นลงพื้น เธออดไม่ได้ที่จะกุมหน้าอกและก้มตัวลง ฟู่จ้าวหนิงกล้าดียังไง! ฟู่จ้าวหนิงหน้าด้านขนาดนี้! ผู้คนรอบข้างต่างตกตะลึง “ฟู่จ้าวหนิง!” เสียงผู้ชายดังขึ้นอย่างโกรธเกรี้ยว ชายหนุ่มในชุดคลุมผ้าไหมรีบวิ่งเข้ามา เมื่อเห็นภาพตรงหน้า ความโกรธของเขาก็พลุ่งพล่าน เขาจ้องมองจ้าวหนิง “เจ้าไม่มีความละอายใจบ้างหรือ?</p>\n<p>ใครบอกให้เจ้าเปิดผ้าคลุมหน้า? เจ้ายังไม่ได้เข้าบ้านหรือทำพิธีแต่งงานเลยด้วยซ้ำ แต่กลับปล่อยให้คนมากมายเห็นเจ้าเปิดผ้าคลุมหน้าแล้ว ไม่โชคร้ายบ้างหรือ? เจ้าไม่เคารพข้าเลยหรือ?” เขามองไปที่ชุดของฟู่จ้าวหนิงที่ฉีกขาด ใบหน้าของเขามืดลง “ชุดแต่งงานของเธอยังขาดอีก แล้วเธอยังกล้ามายืนอยู่ตรงนี้อีกเหรอ? เธอทำให้ตระกูลเซียวเสื่อมเสียชื่อเสียงไปหมด!</p>\n<p>คนหน้าด้านอย่างเธออยากจะแต่งงานกับคนในตระกูลเซียวงั้นเหรอ?” จ้าวหนิงหรี่ตาลงอย่างดุร้าย “โอ้ พระเจ้า คุณชายเซียวมาแล้ว! เขาจะมาขอเลิกหมั้นหรือไง?” “แต่ถ้าเป็นอย่างนั้น คุณหนูฟู่จะได้แต่งงานได้ยังไง?” ก่อนหน้านี้เธอถูกดูถูก ชุดแต่งงานขาด แล้วการหมั้นก็ถูกยกเลิกกลางถนน ชื่อเสียงและความบริสุทธิ์ของคุณหนูฟู่พังพินาศหมดแล้ว เธอจะแต่งงานได้อีกได้ยังไง? “พี่เซียว” คุณหนูหลี่โน้มตัวเข้าหาคุณชายเซียว น้ำตาคลอเบ้า เสียงสั่นเครือด้วยความสะอื้นไห้ “ฟู่จ้าวหนิงตีฉัน เจ็บมาก...” คุณชายเซียวโอบกอดเธอไว้โดยสัญชาตญาณ “จือเหยา เธอไม่เป็นไรใช่ไหม? ฟู่จ้าวหนิงตีเธอตรงไหน?” คำถามนี้ทำให้หลี่จือเหยาพูดไม่ออก นี่เป็นสิ่งที่เธอพูดได้หรือเปล่า?</p>\n<p>“ฟู่จ้าวหนิง! จือเหยาแค่ต้องการระบายความโกรธเพราะทนไม่ได้ที่ท่านบังคับให้ข้าแต่งงาน ท่านทำร้ายเธอได้อย่างไร ข้าไม่เคยคิดเลยว่านอกจากจะโง่เขลา ไร้เหตุผล โลภ และฉวยโอกาสแล้ว ท่านยังมีนิสัยชอบทำร้ายคนอีก!” เจ้าชายเซียวตะโกนด้วยความโกรธ “ข้าจะไม่แต่งงานกับท่านเด็ดขาด กลับไป!” “อ๋อ? พี่เซียว แต่ฟู่จ้าวหนิงถูกพาตัวออกจากตระกูลฟู่ไปแล้ว คุณปู่ของเธอก็ป่วย ถ้าส่งเธอกลับไป ท่านผู้เฒ่าฟู่จะไม่ตกใจจนแทบตายหรือ?”</p>"}, "2": {"chapter_number": 2, "chapter_title": "第2章你就是一個渣男", "content": "<p>ความคิดของจ้าวหนิงลอยไปถึงภาพของท่านอาจารย์ฟู่ผู้บอบบาง ฟู่จ้าวหนิงและคุณชายเซียวหมั้นหมายกันแล้ว แต่สุขภาพของท่านอาจารย์ฟู่ทรุดโทรมลงทุกวัน ความปรารถนาสูงสุดของท่านคือการได้เห็นหลานสาวแต่งงานกับตระกูลเซียว เพื่อที่เธอจะได้มีคนคอยช่วยเหลือในอนาคต อย่างไรก็ตาม ตระกูลเซียวไม่เคยพูดถึงเรื่องการแต่งงานเลย ช่วงหลังมานี้อาการของท่านอาจารย์ฟู่ทรุดโทรมลงอย่างรวดเร็ว ท่านมักจะเป็นลม เมื่อท่านฟื้นขึ้นมา ท่านก็จะจับมือเธอไว้ด้วยความเป็นห่วงเรื่องการแต่งงาน ฟู่จ้าวหนิงเป็นห่วงมาก เธอจึงรบเร้าคุณชายเซียวทุกวัน หลังจากถูกปฏิเสธหลายครั้ง เธอยังถึงขั้นอ้างถึงบุญกุศลของพ่อแม่ที่ช่วยชีวิตองค์รัชทายาท</p>\n<p>เพื่อขอพระราชทานอภัยโทษจากฮ่องเต้ คุณชายเซียวไม่มีทางเลือกอื่นนอกจากต้องแต่งงานกับฟู่จ้าวหนิง เซียวเหยียนจิงนั้นเป็นหนึ่งในชายหนุ่มที่หล่อเหลาที่สุดในเมืองหลวง มีคิ้วคมกริบ ดวงตากลมโต จมูกโด่ง และริมฝีปากสวยงาม ใบหน้าของเขานั้นหล่อเหลาเป็นพิเศษ รูปร่างสูงเพรียวบาง ประกอบกับเสื้อคลุมผ้าไหมที่เข้ารูป ทำให้เขาดูสง่างามมาก ไม่น่าแปลกใจเลยที่หลี่จือเหยาจะหลงใหลเขานัก เมื่อนึกถึงสถานการณ์ของตระกูลฟู่ เสียงของจ้าวหนิงจึงเย็นชาขณะจ้องมองไปยังคุณชายเซียวอย่างตั้งใจ “เจ้ากล้าขัดขืนพระราชดำรัสหรือ?” เมื่อได้ยินคำพูดของนาง ใบหน้าขององค์ชายเซียวก็มืดมนลง และเขาก็ตอบโต้ด้วยความโกรธ “ฟู่จ้าวหนิง</p>\n<p>เจ้าเอาแต่ใช้จักรพรรดิมาข่มขู่ข้า!” เขาเดือดดาล หลี่จือเหยาจึงรีบร้องออกมา “พี่เซียว อย่ากลัวไปเลย! พ่อของข้ามีอิทธิพลกับจักรพรรดิมาก ข้าจะให้พ่อไปที่วังและพูดจาดีๆ กับจักรพรรดิ พระองค์จะไม่ตำหนิเจ้าแน่นอน!” “หมอศักดิ์สิทธิ์หลี่ หรือ...” ฟู่จ้าวหนิงลิ้มรสคำว่า “หมอศักดิ์สิทธิ์” ด้วยสีหน้าเยาะเย้ยเล็กน้อย “สมัยนี้ หมอเทพทรงอำนาจจริงๆ” “หมอเทพหลี่ทรงอำนาจ แต่เจ้าช่างไร้ศีลธรรม!” เซียวเหยียนจิงกล่าวอย่างเย็นชา “ฟู่จ้าวหนิง เจ้าลงจากเกี้ยวกลางถนน เปิดผ้าคลุมหน้า ปล่อยให้คนมากมายเห็นสภาพที่ยุ่งเหยิงเช่นนี้ เจ้าเสียหน้าและเสียเกียรติไปหมดแล้ว แม้ว่าฮ่องเต้จะตำหนิข้า ข้าก็จะไม่แต่งงานกับเจ้า!”</p>\n<p>คนรอบข้างต่างตกตะลึง เกี้ยวใกล้จะถึงประตูแล้ว เธอกลับยกเลิกการหมั้นแล้วหรือ?</p>\n<p>“คุณหนูฟู่ เราจะทำอย่างไรดี? ข้าได้ยินมาว่าท่านฟู่ผู้เฒ่าอาการไม่ดี เขาจะตายเพราะเรื่องนี้จริงๆ หรือ เหมือนที่หลี่จือเหยาบอก?” “เซียวเหยียนจิง เจ้าคิดว่าข้าอยากแต่งงานกับเจ้าหรือ? ถ้าไม่ใช่เพราะข้อตกลงการแต่งงานระหว่างตระกูลเซียวและฟู่ และถ้าไม่ใช่เพราะความประสงค์ของปู่ ข้าสามารถเลือกใครก็ได้จากข้างถนน และพวกเขาก็ยังดีกว่าเจ้า” ฟู่จ้าวหนิงกล่าวอย่างชัดเจน ทุกคนจ้องมองเธอด้วยความไม่เชื่อ “จริงเหรอ? คุณหนูฟู่ตามตื้อคุณชายเซียวทุกวัน บอกว่าอยากแต่งงาน ไม่ใช่เพราะเธอชอบเขาเหรอ?” “คุณหนูหลี่เคยบอกว่าคุณหนูฟู่คลั่งไคล้คุณชายเซียวและยืนกรานจะแต่งงานกับเขา แต่ตอนนี้ดูไม่เหมือนอย่างนั้นเลย” “คุณหนูฟู่ไม่ชอบคุณชายเซียวเหรอ?” เซียวเหยียนจิงได้ยินบทสนทนารอบข้างและกัดฟันด้วยความโกรธ ฟู่จ้าวหนิงโกหก!</p>\n<p>ก่อนหน้านี้เธอหลงรักเขาอย่างชัดเจน ดวงตาของเธอแสดงออกถึงความหลงใหลในตัวเขามากขนาดนั้น ทำไมเขาถึงมองไม่เห็นล่ะ? เขาเป็นคนต้องยกเลิกการหมั้นเอง เธอมีสิทธิ์อะไรมาดูถูกเขา! “ฟู่จ้าวหนิง อย่าคิดว่าแค่เพราะคุณแกล้งทำ ฉันจะมองคุณต่างไป! การแต่งงานครั้งนี้จะไม่เกิดขึ้นในวันนี้เด็ดขาด ต่อให้คุณคุกเข่าอ้อนวอน ฉันก็จะไม่เปลี่ยนใจ!” “ฉันอยากจะขอบคุณที่คุณไม่แต่งงานกับฉันงั้นเหรอ!” จ้าวหนิงส่ายหัว รู้สึกโชคดีมากที่มาเกิดทันเวลา มิเช่นนั้น ถ้าเธอมาเกิดหลังจากที่ทั้งสองทำพิธีแต่งงานเสร็จหรือเข้าไปในห้องหอแล้ว เธอคงจะรู้สึกรังเกียจ สายตาของเธอเหลือบมองหลี่จือเหยา เธอไม่จำเป็นต้องแต่งงานกับเธอ แต่เธอจะสะสางเรื่องราวตรงนี้เลย!</p>\n<p>ฟู่จ้าวหนิงเอื้อมมือไปคว้าคอเสื้อของหลี่จือเหยา ดึงเธอออกจากอ้อมแขนของเซียวเหยียนจิง เธอหันหลังกลับและผลักเธออย่างแรงลงบนเกี้ยวเจ้าสาว “อ๊า! พี่เซียว—” หลี่จือเหยาร้องเสียงดัง เธอยังไม่ทันได้ตั้งตัว แต่ทำไมฟู่จ้าวหนิงที่ปกติอ่อนแอถึงได้ว่องไวและแข็งแรงขนาดนี้? “ฟู่จ้าวหนิง คุณทำอะไร ปล่อยจือเหยา!” เซียวเหยียนจิงรีบก้าวไปข้างหน้าเพื่อแย่งหลี่จือเหยาไป แต่ฟู่จ้าวหนิงเร็วกว่ามาก เธอคว้าเสื้อผ้าของหลี่จือเหยาด้วยมือทั้งสองข้างแล้วฉีกออก ฉีก! เสื้อผ้าของหลี่จือเหยาขาดในทันที เผยให้เห็นผิวขาวเนียน ฟู่จ้าวหนิงถือผ้าชิ้นหนึ่งไว้ในมือ โบกเบาๆ เหมือนผ้าเช็ดหน้า “อ๊าาาา!” หลี่จือเหยาร้องออกมาทันที</p>\n<p>หันกลับมากอดเธอไว้ “ฟู่จ้าวหนิง!!” “ใช่ ฉันอยู่นี่ ปกติฉันไม่ใช่คนที่จะทำร้ายผู้หญิง การฉีกเสื้อผ้าคนอื่นแบบนี้มันไม่เหมาะสมจริงๆ” ฟู่จ้าวหนิงเลิกคิ้วและถอยหลังไปหนึ่งก้าว “แต่มันยุติธรรมดี และฉันจะไปไม่ได้ถ้าไม่เอาคืน!” เธอเป็นคนเจ้าเล่ห์และจะสะสางเรื่องให้จบในทันที “ฟู่จ้าวหนิง!” เซียวเหยียนจิงตกตะลึงกับปฏิกิริยาของเธอ และตะโกนอย่างโกรธเคืองทันทีหลังจากได้สติ “เสี่ยวเหยียนจิง อย่างแรกเลย วันนี้เป็นวันแต่งงานของคุณ เจ้าบ่าวควรจะมารับเจ้าสาว แต่คุณกลับไม่มา” ฟู่จ้าวหนิงมองเขาอย่างเย็นชา “อย่างที่สอง ในฐานะเจ้าบ่าว คุณควรจะสวมชุดแต่งงาน แต่ดูสิว่าคุณใส่อะไร!</p>\n<p>ชุดคลุมสีขาว เหมือนชุดไว้ทุกข์ คนที่รู้ก็จะเข้าใจว่าคุณพยายามทำให้ฉันอับอาย ฟู่จ้าวหนิง ส่วนคนที่ไม่รู้ก็จะคิดว่ามีคนในครอบครัวของคุณตายไปแล้ว” “ฮึ่ม!” มีคนอดหัวเราะออกมาไม่ได้ และคนอื่นๆ ก็หัวเราะตามไปด้วย จริงหรือ คุณชายเสี่ยวแต่งงานวันนี้ แล้วเขากลับใส่ชุดสีขาวโพลน? “อย่างที่สาม อย่างแรกที่คุณทำคือถามฉันเรื่องการยกผ้าคลุมหน้าและฉีกชุดแต่งงาน โดยไม่ถามด้วยซ้ำว่าใครทำ อะไรกัน ทำร้ายคนอื่นเป็นเรื่องน่าอายหรือ เป็นเหยื่อเป็นเรื่องน่าละอายหรือ? ถุยถุย การอบรมเลี้ยงดูของตระกูลเสี่ยวของคุณช่างน่าทึ่งจริงๆ!” “ประการที่สี่ คู่หมั้นของคุณยืนอยู่ตรงนี้แล้ว คุณยังรีบไปปลอบหลี่จือเหยาอีกเหรอ</p>\n<p>คุณไม่รู้จักระยะห่างที่เหมาะสมระหว่างชายหญิงบ้างเลยเหรอ หลี่จือเหยาขวางเกี้ยวแต่งงานของฉันบนถนน ทำลายความสุขในวันนี้ แต่คุณก็ไม่โกรธเลย เอาแต่เรียกเธอว่า ‘จือเหยา จือเหยา’ ในเมื่อพวกคุณสนิทสนมกันขนาดนั้น ทำไมไม่สละเกี้ยวแล้วอุ้มเธอกลับไปล่ะ?” ทุกประโยคที่ฟู่จ้าวหนิงพูด ใบหน้าของเซียวเหยียนจิงก็ยิ่งมืดมนลง สายตาของฝูงชนรอบข้างทำให้เขารู้สึกเหมือนถูกเข็มแทงที่หลังจนแทบยืนไม่ไหว ทำไมยัยฟู่จ้าวหนิงนี่ถึงได้ฉลาดแกมโกงขนาดนี้วันนี้?</p>\n<p>“สรุปแล้ว” ฟู่จ้าวหนิงมองไปที่เซียวเหยียนจิง จากนั้นก็มองไปที่หลี่จือเหยา “เจ้ามันก็แค่คนหยาบคาย ไร้ศีลธรรม เจ้าชู้ และไร้การศึกษา เจ้ากับคุณหนูหลี่ที่อยู่ข้างๆ เจ้า ที่กล้าทำตัวหยิ่งผยองและไร้ยางอายก็เพราะพ่อเป็นหมอเทพน่ะ เป็นคู่ที่เหมาะสมกันราวกับฟ้าลิขิต เป็นพรจากสวรรค์ที่พวกเจ้าสองคนอยู่ด้วยกัน ป้องกันไม่ให้พวกเจ้าทำร้ายผู้อื่น” “ก่อนหน้านี้ข้าตาบอด และข้าขอโทษที่รบกวนท่าน แต่ตอนนี้ข้าได้ลืมตาและคิดทบทวนแล้ว สัญญาการแต่งงานระหว่างตระกูลเซียวและตระกูลฟู่ถือเป็นโมฆะ นับจากนี้ไปเราจะแยกทางกัน หากบังเอิญเจอกันอีก โปรดอยู่ห่างๆ ข้าด้วย!”</p>"}, "3": {"chapter_number": 3, "chapter_title": "第3章死也閉不上眼", "content": "<p>ด้วยเสียงคำรามที่ดังสนั่น เซียวเหยียนจิงรู้สึกเลือดขึ้นหน้า พุ่งพล่านไปทั่วร่างกาย “ฟู่! จ้าว! หนิง!” เขาขบฟันแน่น เอ่ยชื่อฟู่จ้าวหนิงออกมาทีละคำ กล้าดียังไงมาดูถูกเขาแบบนี้! คนรอบข้างต่างตกตะลึง จากนั้นก็มองมาที่ทั้งสองคนและพยักหน้าโดยไม่รู้ตัว พวกเขาคิดว่าคุณหนูฟู่พูดถูก เซียวเหยียนจิงจ้องมองเธออย่างดุร้าย “ฟู่จ้าวหนิง แกอย่าได้เสียใจทีหลัง!</p>\n<p>ฉันอยากเห็นว่าแกจะวิ่งกลับบ้านไปแบบหงายท้องยังไง! อย่าลืมปู่ของแกนะ เขากำลังจะตายอยู่แล้วไม่ใช่เหรอ? แกคิดเหรอว่าพอแกเข้าไปในบ้านแล้วรู้ว่าแกยกเลิกการหมั้นและแต่งงานไม่ได้ เขาจะตายทันที?” ฟู่จ้าวหนิงมองเขาด้วยสายตาที่ลุกเป็นไฟ ไอ้สารเลวเซียวเหยียนจิงนี่ ยังกล้ามาขู่เธออีก! แต่ฟู่จ้าวหนิงก็รู้ว่าเขาพูดถูก ในตอนนี้ คุณปู่ฟู่ทนการยั่วยุแม้เพียงเล็กน้อยไม่ไหวแล้ว เมื่อเห็นเธอนิ่งเงียบ เซียวหยานจิงก็เยาะเย้ยอีกครั้ง “อีกอย่าง ฉันจำคำดูถูกที่เธอพูดกับฉันได้หมดแล้ว อย่าแม้แต่คิดจะหาคู่ครองเลย” เขาอยากรู้ว่าตระกูลไหนจะกล้าแต่งงานกับฟู่จ้าวหนิง!</p>\n<p>หลี่จือเหยาพยักหน้าอย่างแรงเมื่อได้ยินคำพูดของเขาและเสริมว่า “ใช่แล้ว! คุณปู่ฟู่เป็นคนที่ห่วงใยเธอมากที่สุดไม่ใช่เหรอ? เขาจะนอนไม่หลับจนกว่าเธอจะยังไม่ได้แต่งงาน!” “เป๊าะ!” ฟู่จ้าวหนิงยกมือขึ้นตบหน้าหลี่จือเหยาอย่างแรง ด่าปู่ของเธองั้นเหรอ? “อ๊า!</p>\n<p>กล้าดียังไงมาตีฉัน?” ใบหน้าของหลี่จือเหยาแดงก่ำขึ้นทันที และขณะที่เธอกำลังจะพุ่งเข้าใส่ฟู่จ้าวหนิง เสียงของชายหนุ่มผู้เคร่งขรึมและเปี่ยมไปด้วยพลังภายในก็ดังเข้าหูทุกคน กลบเสียงเอะอะโวยวายของพวกเขาไปในทันที “องค์ชายจุนเสด็จกลับเมืองหลวงแล้ว คนเดินเท้าหลีกทาง!” ผู้คนบนถนนต่างตกตะลึงในตอนแรก จากนั้นบางคนก็เริ่มได้สติและตกใจในทันที “องค์ชายจุน! องค์ชายจุนเสด็จกลับเมืองหลวงแล้ว!” “สวรรค์! องค์ชายจุนหายดีแล้วหรือ? พระองค์สามารถออกจากยอดเขาโย่วชิงได้แล้วหรือ?” องค์ชายจุน?</p>\n<p>จ้าวหนิงพยายามนึกถึงข้อมูลเกี่ยวกับองค์ชายจุน แต่กลับพบว่าคุณหนูฟู่ไม่รู้จักพระองค์เลย แต่เมื่อเธอมองไปที่เซียวเหยียนจิง เธอก็เห็นสีหน้าของเขาเปลี่ยนไป จากนั้นเธอก็ได้ยินเสียงนั้นอีกครั้ง “ใครขวางทาง ฆ่า!” คำพูดเหล่านั้นเย็นชาและโหดเหี้ยม ทำให้ฝูงชนที่รวมตัวกันอยู่บนถนนตัวสั่น พวกเขารีบหลบไปด้านข้างและคุกเข่าลงโดยไม่รู้ตัว ขณะที่ทุกคนคุกเข่าอยู่บนถนน มีเพียงฟู่จ้าวหนิง เซียวเหยียนจิง และหลี่จือเหยาเท่านั้นที่โดดเด่นออกมา ในขณะนั้น ฟู่จ้าวหนิงเห็นรถม้าคันหนึ่งค่อยๆ แล่นเข้ามา รถมานั้นเป็นสีดำสนิท มีรูปนกอินทรีและกิ่งไม้แกะสลักอยู่บนตัวรถ และมีรูปสัตว์ร้ายแกะสลักอยู่ที่มุมทั้งสี่</p>\n<p>ผ้าม่านปักลายสีม่วงเข้มและสีทองยังคงนิ่งสนิท บดบังทิวทัศน์ภายในรถม้าจนมิด ม้าสามตัวที่ลากรถม้านั้นสูงและแข็งแรง ขนสีดำเงางามทั้งหมด แผ่รัศมีแห่งความน่าเกรงขามออกมา ที่ด้านหน้าของรถม้ามีทหารหนุ่มรูปงามคนหนึ่งขี่อยู่ ใบหน้าเย็นชาและเคร่งขรึม มีดาบยาวเหน็บอยู่ที่เอว ดูเหมือนว่าเขาจะเป็นคนที่พูดไว้ก่อนหน้านี้ ด้านหลังรถม้ามีผู้ขี่ม้าอีกสิบสองคน ทุกคนแต่งกายเหมือนกันและถือดาบแบบเดียวกัน กลุ่มทั้งหมดนี้—คน ม้า และรถม้า—แผ่รัศมีแห่งความเข้าถึงยาก เย็นชา และมีอำนาจออกมา ทหารหนุ่มที่อยู่ด้านหน้าเหลือบมองไปยังฟู่จ้าวหนิงและพวกพ้องของเธอ ขณะที่หลี่จือเหยาจะพูด เซียวเหยียนจิงก็ดึงเธอลงไปคุกเข่าทันที</p>\n<p>ฟู่จ้าวหนิงตกใจ ฐานะ ตำแหน่ง และบารมีขององค์ชายจุนนั้นสูงกว่าเซียวเหยียนจิงมาก! ดังนั้นเซียวเหยียนจิงจึงไม่สามารถข่มขู่เขาได้ใช่ไหม?</p>\n<p>“องค์ชายจุนแต่งงานแล้วหรือคะ?” ฟู่จ้าวหนิงรีบเอื้อมมือไปแตะตัวแม่สื่อที่กำลังคุกเข่าอยู่แล้วถามเบาๆ ดูเหมือนว่าแม่สื่อจะเป็นคนเดียวที่อยู่ข้างเธอ “โอ้ คุณหนูฟู่ รีบคุกเข่าลงเร็ว! องค์ชายจุนจะแต่งงานได้อย่างไร? แน่นอนว่าไม่เกิดขึ้นหรอก” แม่สื่อพูดเสียงสั่นเครือพลางดึงกระโปรงของฟู่จ้าวหนิงเพื่อส่งสัญญาณให้เธอคุกเข่า “ไอ ไอ ไอ” เสียงไอเบาๆ ดังมาจากในรถม้า ฟู่จ้าวหนิงหูดีจึงได้ยิน ยิ่งไปกว่านั้น เธอยังสังเกตเห็นว่าสีหน้าขององครักษ์รูปงามที่อยู่ด้านหน้าขบวนเปลี่ยนไปเล็กน้อยเมื่อได้ยินเสียงไอ และเขาก็หันไปมองที่รถม้า ความคิดหนึ่งผุดขึ้นมาในใจเธอ เธอจึงรีบเดินตรงไปกลางถนน ขวางรถม้าไว้</p>\n<p>ยามมองมาที่เธอทันที มือของเขากำด้ามดาบแน่น “หลบไป!” ฟู่จ้าวหนิงไม่ถอย แต่กลับเดินเข้าไปหาเขา เสียงเบา “ฉันช่วยบรรเทาอาการไอของคุณได้!” เพราะอีกฝ่ายกำลังจะชักดาบ เธอจึงพูดอย่างรวดเร็ว เซียวหยานจิงมองฟู่จ้าวหนิงด้วยความตกใจ ผู้หญิงคนนี้เป็นบ้าไปแล้วหรือ?</p>\n<p>เขาบอกแล้วว่าใครก็ตามที่ขวางทางจะต้องตาย แต่เธอยังไปที่บ้านเขาอีก เธอเสียใจกับการยกเลิกการหมั้นมากจนไม่อยากมีชีวิตอยู่อีกต่อไปแล้วหรือ? “ไอ ไอ ไอ ไอ...” บางทีโชคชะตาอาจอยู่ข้างฟู่จ้าวหนิง เพราะทันทีที่เธอพูดจบ ก็มีเสียงไออัดดังมาจากในรถม้า มือของยามที่กำลังชักดาบอยู่ก็ชะงัก ฟู่จ้าวหนิงรีบเสริมว่า “คนไข้เคยตกน้ำมาก่อนหรือเปล่า?” เมื่อได้ยินเช่นนั้น สีหน้าของทหารยามก็เปลี่ยนไปอีกครั้ง “ท่านเป็นใคร?” “ข้ามาจากตระกูลฟู่แห่งเขตตะวันออกของเมือง ข้าชื่อฟู่จ้าวหนิง” ตระกูลฟู่? ทหารยามได้ยินเสียงไอจากในรถม้าจึงกัดฟัน “งั้นก็ขึ้นรถม้ามา—” แต่ก่อนที่เขาจะพูดจบ เสียงของฟู่จ้าวหนิงก็ดังขึ้น การออกเสียงของเธอนั้นชัดเจนอย่างเหลือเชื่อ เธอพูดประโยคที่ทำให้ทุกคนตกตะลึง “องค์ชายจุน ท่านต้องการพระสนมหรือไม่?</p>\n<p>พระสนมที่จะไม่สร้างปัญหาให้ท่าน และฉลาดและมีความสามารถ!” ฮิส— ดวงตาของเซียวเหยียนจิงเบิกกว้าง เขาไม่สนใจอะไรทั้งสิ้น กระโดดขึ้นยืนและเดินตรงไปดึงฟู่จ้าวหนิงออกไป “ฟู่จ้าวหนิง คุณบ้าไปแล้วหรือ! คุณยังใส่ชุดแต่งงานที่ควรจะใส่ในวันแต่งงานของเราอยู่เลย แล้วเพิ่งจะยกเลิกการหมั้น—” ฟู่จ้าวหนิงสะบัดมือเขาออก ก้าวถอยหลังไปหนึ่งก้าว โดยไม่รู้ตัวว่าตัวเองขยับเข้าไปใกล้รถม้ามากขึ้น เธอได้กลิ่นยา “หลีกเลี่ยงปัญหา ฉลาดและเก่งกาจ? คุณหมายถึงตัวเองหรือ?” เสียงทุ้มดังมาจากในรถม้า เสียงแหบเล็กน้อยจากการไอ ทำให้ฟู่จ้าวหนิงรู้สึกคันหู เสียงนั้นช่างไพเราะเหลือเกินไม่ใช่หรือ? แต่เธอก็ไม่ลืมที่จะตอบ</p>\n<p>พูดอย่างหนักแน่นว่า “ใช่ ฉันเอง” ชายในรถม้าดูเหมือนจะหัวเราะเบาๆ “เซียวเหยียนจิง ทายาทแห่งคฤหาสน์เจ้าชายเซียว ขอถวายความเคารพแด่องค์ชายจุน” เซียวเหยียนจิงกล่าวอย่างรีบร้อน “องค์ชายจุน ฟู่จ้าวหนิงผู้นี้ช่างไร้ยางอายและโง่เขลาเหลือเกิน ยังกล้ามารบกวนท่านอีก—” ท่านต้องไม่ปล่อยให้นางลอยนวลไปเด็ดขาด!</p>"}, "4": {"chapter_number": 4, "chapter_title": "第4章我們今天就拜堂", "content": "<p>“คฤหาสน์ขององค์ชายเซียว?” ชายในรถม้าฟังคำพูดสามคำนั้นอย่างตั้งใจ น้ำเสียงของเขาเปลี่ยนไปทันที “ไปให้พ้น” เซียวเหยียนจิงตกใจและโกรธจัด เขารู้จักตัวตนของเขา แต่ยังบอกให้เขาไปให้พ้นอีกหรือ? “เจ้าไม่ได้ยินที่องค์ชายตรัสหรือ?” ยามตบหัวม้า ม้าจึงยกขาหน้าขึ้นเตะเซียวเหยียนจิงกระเด็นไป “อ๊า!” เซียวเหยียนจิงถูกม้าเตะและล้มลงตรงหน้าหลี่จือเหยา เธอรีบช่วยเขาขึ้น “พี่เซียว!” เธอลุกขึ้นยืนอย่างกะทันหัน จ้องมองรถม้าด้วยความโกรธ “องค์ชายจุนอะไรกัน! ข้าไม่เคยได้ยินชื่อเขามาก่อนเลย! แม้แต่องค์รัชทายาทของข้ายังรักและตามใจข้าเลย เจ้าจะเหนือกว่าองค์รัชทายาทของข้าได้อย่างไร?</p>\n<p>ข้าจะบอกเจ้า พ่อของข้าคือเซียนแพทย์หลี่!” ยามที่ชักดาบออกมาแล้วถึงกับชะงักเมื่อได้ยินคำว่า “เซียนแพทย์หลี่” เขาหันไปมองฟู่จ้าวหนิง ลังเลอยู่ครู่หนึ่ง “องค์ชายจุนไม่อาจรอได้ เจ้าโง่นี่ทำผิดฐานดูหมิ่นองค์ชาย ข้าจะสั่งสอนมันแทนองค์ชาย” ฟู่จ้าวหนิงกล่าวด้วยเสียงทุ้มต่ำ ชักดาบองครักษ์ออกมาแล้วเดินตรงไปหาหลี่จือเหยาในไม่กี่ก้าว ดาบวาบขึ้นพร้อมกับเสียงฉีกขาด หลี่จือเหยารู้สึกหนาวสั่นไปทั้งตัว เธอจึงก้มหน้าลงกรีดร้อง กุมหน้าอกแล้วพุ่งเข้าใส่อ้อมแขนของเซียวหยานจิง ฟู่จ้าวหนิงก่อนหน้านี้ได้ฉีกปกเสื้อของเธอ แต่ยังมีเสื้อชั้นในอยู่ข้างใต้ ตอนนี้เขาใช้ดาบฟันเสื้อชั้นในขาดกระจุย “อึ้ง—”</p>\n<p>เซียวหยานจิงหายใจได้เต็มที่แล้วจึงพุ่งเข้าใส่เขา ทำให้เลือดสูบฉีดในอกและเขาก็หมดสติไป ตุบ เขาไม่สามารถลุกขึ้นยืนได้หลังจากเป็นลม และหลี่จือเหยาร้องเสียงดังขณะที่เธอล้มลงไปทับเขาบนพื้น คนที่อยู่บนถนนต่างมองด้วยความตกใจ “อ่า—” ฟู่จ้าวหนิงส่ายหัว “ไม่เหมาะสม ไม่เคารพ โอ้ พระเจ้า ไม่ควรไปสนใจสิ่งที่ไม่เหมาะสม ถ้าองค์ชายเซียวกับคุณหนูหลี่ไม่แต่งงานกันก็คงไม่สมเหตุสมผลไม่ใช่หรือ” เธอหันไปและยื่นดาบด้วยมือทั้งสองข้าง “ขอโทษค่ะ นี่ดาบคืนค่ะ” ยามยังคงงุนงง เขาตกตะลึงอย่างสิ้นเชิง! เขาเป็นปรมาจารย์ด้านศิลปะการต่อสู้ระดับห้า และฟู่จ้าวหนิงกลับแย่งดาบไปจากเขาได้!</p>\n<p>ถึงแม้เขาจะไม่ได้ตั้งรับ แต่นั่นก็ไม่ใช่เหตุผลที่สมควรที่จะแย่งดาบไปก่อนที่เขาจะทันได้ตั้งตัว! เขายังจำไม่ได้ด้วยซ้ำว่าดาบไปอยู่ในมือเธอได้อย่างไร! ยามมองไปที่ฟู่จ้าวหนิงด้วยความสงสัยในตัวเองอย่างมาก “ฟู่จ้าวหนิง” คนในรถม้าดูเหมือนจะมองเห็นสิ่งที่เกิดขึ้นข้างนอก และค่อยๆเอ่ยชื่อออกมาด้วยน้ำเสียงครุ่นคิด “เจ้าต้องการเป็นราชินีของข้าหรือ?” “ถ้าท่านต้องการราชินีจริงๆ!” ฟู่จ้าวหนิงตอบทันที “ตกลง” ชายในรถม้าตอบด้วยคำเดียว “ชิงอี้” ชื่อขององครักษ์คือชิงอี้ เมื่อได้ยินคำพูดขององค์ชาย ชิงอี้ก็กลับมาสู่ความเป็นจริง เหลือบมองฟู่จ้าวหนิง และประกาศทันที “นับจากนี้เป็นต้นไป นางสาวฟู่จ้าวหนิงแห่งตระกูลฟู่ ได้รับเลือกให้เป็นคู่หมั้นขององค์ชายจุน งานแต่งงานจะจัดขึ้นในวันมงคล!” ตูม!</p>\n<p>ทั้งถนนก็โห่ร้องโกลาหล ไม่น่าเชื่อ? เรื่องนี้เป็นจริงหรือ? นางสาวฟู่กลายเป็นพระชายาในอนาคตขององค์ชายจุนแล้วหรือ? ใครกันที่บอกว่า “นางสาวฟู่ถึงคราวซวย”?</p>\n<p>ก้าวออกมา! ฟู่จ้าวหนิงนึกถึงสภาพที่เกือบจะไร้ชีวิตของปู่ของเธอเมื่อตอนที่เธอออกจากบ้านในวันนี้ เธอหลับตาลง รวบรวมความกล้า และกล่าวกับชายในรถม้าว่า “ไม่ใช่คู่หมั้น แต่เป็นพระสนม! ไม่มีเวลาไหนดีไปกว่าวันนี้แล้ว ฉันคำนวณแล้วว่าวันนี้เป็นฤกษ์ดี องค์ชายจุน เรามาจัดพิธีอภิเษกสมรสกันวันนี้เลย!” เธอจะกลับไปอยู่กับตระกูลฟู่ในวันนี้ไม่ได้เด็ดขาด วันนี้เธอจะต้องเป็นพระสนมขององค์ชายจุน! ก่อนอื่น เธอต้องทำให้ชีวิตของท่านปู่มั่นคงและป้องกันไม่ให้ท่านต้องทุกข์ทรมานไปมากกว่านี้ หากการเป็นพระสนมจุนไม่ใช่เรื่องง่ายในอนาคต เธอก็จะหย่า!</p>\n<p>เธอจะไม่ยอมถูกผูกมัดด้วยสถานะนี้ใช่ไหม? แม้แต่ชิงอี้ผู้เย็นชาตามปกติก็ยังพูดตะกุกตะกัก “คุณ...คุณหมายความว่านี่เป็นการแต่งงานที่ถูกบังคับเหรอ?” เขาตามไม่ทัน! คุณฟู่ เมื่อกี้เรายังเป็นคนแปลกหน้ากันอยู่เลย คุณยังไม่เคยพบองค์ชายของเราด้วยซ้ำ คุณพูดจริงเหรอ? ฟู่จ้าวหนิงมองเขาอย่างจริงจังและกระพริบตา “ชิงอี้ ช่วงนี้คุณปัสสาวะบ่อยนะ เดี๋ยวฉันจะไปดูให้” &quot;พึ่ม!!&quot; ชิงอี้เกือบตกจากม้า เสียงหัวเราะเบาๆ ปนกับเสียงไอมาจากในรถม้า &quot;วันนี้เข้าบ้านตระกูลได้นี่นา งั้นอย่าเพิ่งขึ้นรถม้าเลย เราต้องขึ้นเกี้ยวเจ้าสาวดีกว่า ชิงอี้ ไปงานแต่งงานกันเถอะ&quot; ริมฝีปากของชิงอี้กระตุกเล็กน้อย แต่เธอก็ทรงตัวและร้องเรียกอีกครั้ง &quot;บ้านองค์ชายจุนกำลังต้อนรับพระชายา!</p>\n<p>พระชายาโปรดขึ้นเกี้ยวเจ้าสาวด้วย!&quot; &quot;อะไรนะ? พระเจ้าช่วย...&quot; &quot;นี่...นี่...อ่า หยิกฉันหน่อยสิ! จริงเหรอเนี่ย?&quot; &quot;โอ๊ย!! เจ็บจัง!&quot; มีคนอดไม่ได้ที่จะหยิกต้นขาตัวเอง ฟู่จ้าวหนิงมองไปที่รถม้าที่ปิดสนิทและชมเชยด้วยรอยยิ้มกว้าง &quot;องค์ชายจุน ท่านช่างเด็ดเดี่ยวและกล้าหาญเหลือเกิน ท่านเป็นคนที่สามารถทำสิ่งยิ่งใหญ่ได้แน่นอน!&quot; หลังจากพูดจบ ฟู่จ้าวหนิงก็หันหลังกลับและวิ่งกลับไปที่เกี้ยวของตนเองอย่างมีความสุข ช่วยแม่สื่อลุกขึ้น หยิบผ้าคลุมสีแดงที่พื้นขึ้นมาปัดฝุ่น แล้วสวมลงบนศีรษะอย่างเป็นธรรมชาติและตั้งใจ แค่นั้นเอง เธอก็เป็นเจ้าสาวอีกครั้งแล้ว!</p>\n<p>&quot;แม่สื่อ รีบโบกผ้าเช็ดหน้าสีแดงเร็ว!&quot; &quot;ขอบคุณที่ช่วยไว้ คนแบกเกี้ยว เกี้ยวจะออกแล้ว เกี้ยวจะออกแล้ว! พวกท่านรู้จักทางไปบ้านองค์ชายจุนหรือไม่? ถ้าไม่รู้จัก ก็ให้ตามเกี้ยวองค์ชายจุนไป&quot; ฟู่จ้าวหนิงกล่าวขณะขึ้นไปนั่งบนเกี้ยว เธอได้ยินเสียงแม่สื่อเรียกให้เกี้ยวออก ได้ยินเสียงรถม้าขององค์ชายจุนเคลื่อนที่ และได้ยินเสียงดนตรีเฉลิมฉลองดังขึ้นอีกครั้ง เกี้ยวเคลื่อนไปข้างหน้าอย่างสั่นคลอน ฟู่จ้าวหนิงถอนหายใจยาว ดีแล้ว จากนี้ไปเธอจะเป็นคุณหนูแห่งตระกูลฟู่ เป็นเจ้าหญิงแห่งบ้านองค์ชายจุน เมื่อตอนที่เธอเริ่มเรียนแพทย์ครั้งแรก คุณปู่ของเธอซึ่งต้องพึ่งพาเธอในการดำรงชีวิตล้มป่วยหนัก</p>\n<p>และแม้จะใช้เงินเก็บทั้งหมดของครอบครัวไปแล้วก็ไม่สามารถช่วยชีวิตเขาได้ เมื่อคุณปู่เสียชีวิต เธอรู้สึกเหมือนฟ้าถล่มลงมา ในเวลานั้น เธอคิดนับครั้งไม่ถ้วนว่า ถ้าเธอเรียนแพทย์เร็วกว่านี้ เธอจะสามารถช่วยชีวิตคุณปู่ได้หรือไม่ นี่จึงเป็นเหตุผลที่ทำให้เธอเรียนแพทย์อย่างบ้าคลั่งในเวลาต่อมา ในวงการแพทย์ เธอมีชื่อเสียงมากในด้านความรู้ที่รอบด้านเกี่ยวกับแง่มุมทางการแพทย์และเภสัชวิทยาต่างๆ เมื่อได้ยินว่าหัวหน้าตระกูลฟู่ล้มป่วยหนัก ฟู่จ้าวหนิงจึงอยากช่วยชีวิตเขาไม่ว่าจะด้วยวิธีใดก็ตาม แม้กระทั่งการเลือกชายข้างถนนมาแต่งงาน เดิมทีเธอมีกำหนดจะแต่งงานกับเจ้าชายเซียว</p>\n<p>แต่ฟู่จ้าวหนิงได้เผชิญหน้ากับรัชทายาทเซียวต่อหน้าสาธารณชน และหลังจากที่เขาขู่ว่าจะทำให้เธอเป็นโสดตลอดไป เธอก็ได้กลายเป็นพระสนมของจุน!</p>\n<p>ข่าวนี้แพร่กระจายไปทั่วเมืองหลวงภายในเวลาไม่ถึงชั่วโมง และก่อให้เกิดการถกเถียงอย่างร้อนแรงไปทั่วเมืองในทันที แน่นอนว่า รายละเอียดเกี่ยวกับการที่เซียวเหยียนจิงและหลี่จือเหยาโอบกอดและล้มลงกับพื้นก็ถูกซุบซิบกันซ้ำแล้วซ้ำเล่า เมื่อเกี้ยวเจ้าสาวมาถึงหน้าประตูคฤหาสน์ขององค์ชายจุน ฟู่จ้าวหนิงก็ถูกช่วยลงจากเกี้ยว เธอได้ยินเสียงปืนใหญ่ดังสนั่น บรรยากาศแห่งความสุข และพรมแดงถูกปูไว้ที่เท้าของเธอ “ยินดีต้อนรับ องค์หญิง!” เสียงตะโกนพร้อมกันดังขึ้น</p>"}, "5": {"chapter_number": 5, "chapter_title": "第5章他臉上的疤", "content": "<p>แม่สื่อประคองมือของเธอไว้พลางพูดด้วยเสียงสั่นเครือว่า “ฝ่าบาท โปรดเดินอย่างระมัดระวัง โอ้ ดูสิ! พรมแดงถูกปูไว้หน้าเกี้ยวเจ้าสาวแล้ว เหล่าข้ารับใช้และสาวใช้ยืนเรียงรายอยู่หน้าทางเข้า แต่งกายด้วยชุดใหม่เอี่ยมทั้งหมด ช่างงดงามเหลือเกิน!” “ฉันไม่เคยคิดเลยว่าในเวลาอันสั้นเช่นนี้ ที่ประทับขององค์ชายจุนจะเตรียมทุกอย่างพร้อมได้!” ฟู่จ้าวหนิงถูกช่วยพยุงเข้าไปข้างใน ฟังคำพูดที่ตื่นเต้นของแม่สื่อแล้ว หัวใจของเธอก็เต็มไปด้วยความประหลาดใจ นี่คงเป็นการเตรียมการทันทีหลังจากที่องค์ชายจุนตกลงแต่งงานบนถนน แล้วส่งคนรีบกลับไปที่ประทับเพื่อแจ้งคำสั่ง พระเจ้า เธอประมาทองค์ชายจุนที่ไม่เป็นที่รู้จักคนนี้ไปหรือ?</p>\n<p>ด้วยคำถามนี้ในใจ ฟู่จ้าวหนิงถูกนำไปยังห้องโถงดอกไม้ ซึ่งมีสาวใช้สองคนเข้ามาแทนที่แม่สื่อ “ข้าเฟิงซิง ข้ารับใช้ขอถวายความเคารพแด่ฝ่าบาท” “ข้าหงจั่ว ข้ารับใช้ขอถวายความเคารพแด่ฝ่าบาท” นางกำนัลทั้งสองพูดด้วยน้ำเสียงใสกระจ่าง โค้งคำนับฟู่จ้าวหนิงและอธิบายสถานการณ์ “ฝ่าบาท ขณะนี้ห้องจัดเลี้ยงและห้องหอตกแต่งอยู่ องค์ชายต้องเปลี่ยนฉลองพระองค์ และข่าวการเสกสมรสต้องรายงานต่อฮ่องเต้ จะมีคนจากวังมาเร็วๆ นี้ โปรดรอสักครู่ ฝ่าบาท” “มีการจัดงานฉลองใหญ่ในวัง ดังนั้นจึงมีแขกมากมาย เจ้าหน้าที่ได้ส่งคนไปส่งบัตรเชิญแล้ว แขกน่าจะมาถึงเร็วๆ นี้” เวลาผ่านไปนานขนาดนี้แล้ว มีแขกมาแล้วหรือ?</p>\n<p>นี่จะเป็นงานแต่งงานที่ยิ่งใหญ่จริงๆ หรือ? “ฝ่าบาท เจ้าหน้าที่ได้ส่งคนไปเอาชุดแต่งงานใหม่มาแล้ว จะนำมาส่งให้ฝ่าบาทเปลี่ยนในเร็วๆ นี้ โปรดเลือกเครื่องประดับและเครื่องประดับศีรษะจากนี้” แม้ว่าเธอจะยังสวมผ้าคลุมหน้าสีแดงอยู่ แต่ก็มีถาดมาวางให้เธอ และเมื่อมองลงไป ก็ยังเห็นเครื่องประดับระยิบระยับหลายชิ้นวางอยู่บนนั้น ดวงตาของแม่สื่อแทบจะพร่ามัวไปกับผ้าคลุมหน้าเจ้าสาว! ฟู่จ้าวหนิงก็เวียนหัวเช่นกัน นี่คือการแต่งงานที่เธอกำลังจะมี แต่เธอไม่คาดคิดว่าจะเกิดเหตุการณ์เช่นนี้ขึ้นเมื่อเข้าไปในวังขององค์ชาย เธอคิดว่าเมื่อเข้าไปในวังแล้ว เธอจะถูกพาไปเข้าเฝ้าองค์ชายทันที เพื่อปรนนิบัติพระองค์ แล้วจึงเจรจาอย่างใจเย็นและเป็นกลาง องค์ชายจุนกำลังวางแผนอะไรกันแน่?</p>\n<p>ขณะที่เธอกำลังถูกนางกำนัลสองคนพาไปเปลี่ยนชุดแต่งงานใหม่ สวมเครื่องประดับ และเปลี่ยนผ้าคลุมหน้าสีแดง หลังจากรับประทานอาหารและพักผ่อนสักครู่ ห้องจัดงานแต่งงานก็พร้อมแล้ว “องค์จักรพรรดิเสด็จมาแล้ว!” “พระมเหสีเสด็จมาแล้ว!” “พระสนมซู่เสด็จมาแล้ว!” ฟู่จ้าวหนิงได้ยินเสียงตะโกนจากข้างนอกและรู้สึกปวดหัว เธอจะต้องเข้าเฝ้าองค์จักรพรรดิโบราณทันทีหลังจากจุติมาเกิดหรือ? ต้องมาไกลขนาดนี้เลยเหรอ?! องค์ชายจุนมีอิทธิพลมากขนาดนั้นเลยเหรอ? “แม่ทัพใหญ่เสด็จมาเพื่อแสดงความยินดี!” “ท่านมาร์ควิสแห่งผิงหยางเสด็จมาเพื่อแสดงความยินดี!” “ท่านรัฐมนตรีคลัง ท่านรองรัฐมนตรีสงคราม และท่านรองรัฐมนตรีพิธีการเสด็จมาเพื่อแสดงความยินดี!” ฟู่จ้าวหนิงแทบล้มลง ริมฝีปากของเธอกระตุก แขกมากันครบหมดแล้ว!</p>\n<p>นี่มันรวดเร็วขนาดไหนกัน?! แม่สื่อกลืนน้ำลายอย่างประหม่า ไม่สิ ฝ่ามือของเธอกลับเหงื่อออก คฤหาสน์ของเจ้าชายเซียว ที่ฟู่จ้าวหนิงจะแต่งงานด้วย ดูเหมือนจะเกินเอื้อมสำหรับเธอแล้ว แต่คฤหาสน์ของเจ้าชายจุนแห่งนี้— ข้างนอกคึกคักและเสียงดัง แต่บรรยากาศในห้องโถงดอกไม้กลับเงียบสงบอย่างประหลาด ฟู่จ้าวหนิงรู้สึกถึงความเงียบสงัดรอบตัวเธอทันที ขณะที่เธอกำลังสงสัยว่าเกิดอะไรขึ้น เสียงทุ้มต่ำของผู้ชายก็ดังขึ้น “พวกเจ้าออกไปก่อน” “ค่ะ ฝ่าบาท” หัวใจของแม่สื่อเต้นแรงอย่างบ้าคลั่ง ขณะที่เธอถูกเฟินซิงและหงจั่วดึงออกไป และประตูก็ปิดลง เจ้าชายจุนเดินตรงไปยังฟู่จ้าวหนิง มือข้างหนึ่งยกผ้าคลุมสีแดงขึ้นทันที ฟู่จ้าวหนิงเงยหน้าขึ้นมองเขาด้วยความตกตะลึง เธอไม่คาดคิดว่าทุกอย่างจะเป็นไปตามแผน และตอนนี้องค์ชายจุนกลับเป็นคนยกผ้าคลุมของเธอขึ้นก่อน!</p>\n<p>ฟู่จ้าวหนิงสบกับดวงตาคู่หนึ่งที่ลึกราวกับทะเล คิ้วยาวจรดขมับ ดวงตาเป็นประกาย จมูกโด่ง และริมฝีปากดุจไข่มุก ชายผู้นี้หล่อเหลาเหลือเกิน! อย่างไรก็ตาม เธอเห็นเขาเพียงครึ่งเดียวเท่านั้น ร่องรอยซับซ้อนคล้ายใยแมงมุมเกาะอยู่ครึ่งหน้า ทำให้ใบหน้าที่หล่อเหลาอย่างน่าทึ่งนี้ดูน่ากลัวขึ้นมาทันที การเห็นเพียงครึ่งหน้าในยามค่ำคืนคงทำให้คนส่วนใหญ่หวาดกลัว หล่อเหลาครึ่งเดียว มีเสน่ห์เย้ายวนราวกับผีสิง นี่คือเหตุผลที่องค์ชายจุนไม่เคยปรากฏตัวต่อหน้าสาธารณชนใช่หรือไม่? เธอจ้องมองเขาอย่างตั้งใจ “ทำไมเจ้าไม่กรีดร้องล่ะ?” องค์ชายจุนถามด้วยความประหลาดใจ เขาคาดว่าเธอจะหวาดกลัวเมื่อเห็นใบหน้าของเขา แล้วเธอจะเปลี่ยนใจและไม่อยากเป็นสนมขององค์ชายจุนหรือ?</p>\n<p>แต่จักรพรรดิและจักรพรรดินีประทับอยู่ ณ ที่นั้น รวมถึงแขกผู้มีเกียรติด้วย หากนางเปลี่ยนใจในตอนนี้ จะเป็นความผิดร้ายแรงอย่างยิ่ง แม้จักรพรรดิจะไม่ได้ตรัสอะไรเลย พระองค์ก็จะทรงรู้สึกว่าถูกเยาะเย้ยและออกพระราชกฤษฎีกาลงโทษนาง ใครจะรู้ว่านางจะจ้องมองพระพักตร์ของพระองค์อย่างตั้งใจเช่นนี้? “ท่านเห็นข้ากลัวหรือ?” ฟู่จ้าวหนิงโต้กลับ จากนั้นก็เอื้อมมือไปแตะใบหน้าของพระองค์ นิ้วของนางสัมผัสกับรอยแผลเป็นที่บิดเบี้ยวและน่าเกลียดน่ากลัว แพทย์สาวตอบสนองโดยสัญชาตญาณ ต้องการตรวจดูรอยแผลเป็นนั้น “เจ้ากล้าดียังไง!!” องค์ชายจุนตกใจ รีบปัดมือของนางออกไปและถอยหลังไปหนึ่งก้าว แต่ด้วยความตกใจ เขาจึงไออย่างรุนแรง “ไอ ไอ ไอ...” ฟู่จ้าวหนิงลุกขึ้นยืน จับข้อมือของเขา และวางนิ้วสามนิ้วลงบนชีพจรของเขา “ฉันจะตรวจร่างกายคุณ แต่ไม่ว่าคุณจะทำอะไรในวันนี้ ต่อให้ฮ่องเต้เสด็จมา ก็ทำลายชีวิตสมรสของฉันไม่ได้หรอก!</p>\n<p>ยังไงก็ตาม ฉันจะอยู่ที่วังขององค์ชายจุนจนถึงวันที่ฉันกลับแน่นอน!” เธอรู้แล้วว่าองค์ชายจุนมีแผนการอื่น แต่เธอก็จะไม่ยอมร่วมมือ! “ฟู่จ้าวหนิง ไม่มีใครในตระกูลฟู่รู้จักยา ฉันขอแนะนำคุณอย่า… ไอ ไอ ไอ ไอ!” ความเจ็บปวดแล่นผ่านมือของเขาอย่างกะทันหัน สีหน้าขององค์ชายจุนเปลี่ยนไป และอาการไอของเขาก็หยุดลงทันที! “เห็นไหม? ฉันรู้จักยา และอาการของคุณค่อนข้างซับซ้อน คุณต้องไปหาหมอ!” ฟู่จ้าวหนิงปล่อยมือของเขา ถอยหลังไปหนึ่งก้าว และมองเขาอย่างภาคภูมิใจด้วยคางที่เชิดขึ้น “ให้ฉันเป็นองค์ชายจุน แล้วฉันจะรักษาคุณ เราต่างได้สิ่งที่ต้องการ!” องค์ชายจุนประหลาดใจอย่างมาก เขาพยายามกลั้นไอมาทั้งวันด้วยความอดทนอย่างเหลือเชื่อ แต่ถึงแม้จะไม่ไอ เขาก็รู้สึกไม่สบายอย่างมาก—เจ็บหน้าอก และคันคอ แต่ตอนนี้อาการเหล่านั้นกลับดีขึ้น!</p>\n<p>ขณะที่องค์ชายจุนกำลังจะพูด เสียงเย่อหยิ่งดังออกมาจากนอกประตู “พระนางซูสีไทเฮาทรงมีพระราชดำรัสให้ฟู่จ้าวหนิงเข้าพบ!” “ปัง!!” ประตูถูกเตะเปิดอย่างแรง หญิงชราสองคนรีบวิ่งเข้ามา ตะโกนอย่างเย็นชาโดยไม่แม้แต่จะเห็นว่าเป็นใคร “พวกเราได้รับคำสั่งให้ตบฟู่จ้าวหนิง!” หญิงชราทั้งสองพุ่งเข้าหาฟู่จ้าวหนิงด้วยความเร็วราวกับสายลม ท่าทางของพวกเธอแสดงให้เห็นอย่างชัดเจนว่าพวกเธอตั้งใจจะจับเธอกดลงและตบเธอซ้ำๆ! ฟู่จ้าวหนิงหันหลังและหลบไปอยู่ด้านหลังองค์ชายจุนทันที นิ้วของเธอจิ้มไปที่หลังส่วนล่างของเขา ก่อนที่องค์ชายจุนจะทันได้ตอบสนองต่อพฤติกรรมที่ไร้ยางอายของเธอ หญิงชราทั้งสองก็มาอยู่ตรงหน้าเขาแล้ว</p>\n<p>มือของพวกเธอยกขึ้นเตรียมตบเขา “อวดดี!” องค์ชายจุนตำหนิพลางเตะกลับ เสียงดังตุบ หญิงชราคนหนึ่งถูกเตะล้มลงกับพื้นอย่างแรง ฟันหน้าหลุดไปซี่หนึ่ง ร่างสองร่างรีบวิ่งเข้ามาจากข้างนอก; คนหนึ่งขวางทางเจ้าชายจุน ส่วนอีกคนตบหญิงชราอีกคนกระเด็นไป เหตุการณ์ทั้งหมดเกิดขึ้นในพริบตาเดียว ตั้งแต่ต้นจนจบ หญิงชราทั้งสองไม่ได้เห็นหน้าเจ้าชายจุนอย่างชัดเจนเลย เห็นเพียงฟู่จ้าวหนิงหลบอยู่หลังชายคนนั้น</p>"}, "6": {"chapter_number": 6, "chapter_title": "第6章沒見過這麼猛的", "content": "<p>“ฝ่าบาท ฝ่าบาทไม่เป็นอะไรหรือคะ?” ชิงอี้หันไปมององค์ชายจุนด้วยความกังวล “ลากเขาออกไป” องค์ชายจุนกล่าวด้วยน้ำเสียงเรียบเฉย “ค่ะ!” นางกำนัลทั้งสองพยายามตะโกน แต่ก็ถูกจับตัวและลากออกไปทันที จากนั้นชิงอี้จึงหันกลับมามองพระพักตร์องค์ชายจุนอย่างรวดเร็ว แล้วเห็นฟู่จ้าวหนิงแอบมองอยู่ด้านหลัง เขาจึงงุนงง หญิงสาวที่สามารถแย่งดาบจากมือเขาได้อย่างรวดเร็ว กลับต้องหวาดกลัวอยู่ต่อหน้านางกำนัลสองคนเช่นนี้? แต่เขาก็คิดว่ามันไม่น่าแปลกใจ เพราะพวกเธอเป็นคนของพระมเหสี ฟู่จ้าวหนิงจะกล้าต่อสู้กับคนของพระมเหสีได้อย่างไร? “ฝ่าบาท เราจะจัดพิธีอภิเษกสมรสกันไหมคะ?” เขาถาม ทันทีที่ได้ยินคำถาม</p>\n<p>ฟู่จ้าวหนิงก็ก้าวออกมาจากด้านหลังองค์ชายจุน “ท่านไม่คิดจะจัดพิธีอภิเษกสมรสจริงๆหรือคะ?” ชิงอี้เงียบไป แต่ดวงตาของเขากลับเต็มไปด้วยความประหลาดใจเมื่อมองไปที่เธอ เขาคิดว่าที่ฟู่จ้าวหนิงไม่กรีดร้องก่อนหน้านี้เพราะเธอยังไม่เห็นหน้าองค์ชาย แต่ตอนนี้เธอกลับมององค์ชายด้วยสีหน้าปกติ เห็นได้ชัดว่าเธอเห็นแล้ว เธอไม่กลัวแผลเป็นขององค์ชายหรือ?</p>\n<p>&quot;พิธีวิวาห์กำลังจะเริ่มขึ้น&quot; องค์ชายจุนมองฟู่จ้าวหนิงอย่างตั้งใจ &quot;แน่ใจนะว่าจะไม่เสียใจทีหลัง?&quot; &quot;ฉันจะรับผิดชอบต่อการเลือกของฉัน&quot; ฟู่จ้าวหนิงกล่าว &quot;แต่ฉันหวังว่าองค์ชายจุนจะเข้าใจว่าความร่วมมือควรอยู่บนพื้นฐานของความร่วมมือ ฉันหวังว่าจะไม่มีการกระทำที่ชั่วร้ายเช่นนี้อีก&quot; &quot;การกระทำที่ชั่วร้าย?&quot; ชิงอี้เข้าใจและกำลังจะอธิบายให้องค์ชายจุนฟัง แต่เขาก็หันหลังและจากไป &quot;เตรียมตัวให้พร้อม&quot; ชิงอี้รีบตามไป หลังจากออกไปแล้ว องค์ชายจุนก็หยิบหน้ากากครึ่งหน้าออกมาสวมปิดแผลเป็น “ฝ่าบาท นางสาวฟู่เข้าใจผิดอะไรไปหรือเปล่า?</p>\n<p>เดิมทีคฤหาสน์ขององค์ชายกำลังเตรียมงานพิธีอภิเษกสมรสของฝ่าบาท แต่ฝ่าบาทไม่คาดคิดว่าจักรพรรดิ พระพันปีหลวง และพระราชินีจะเสด็จมาด้วย” องค์ชายไม่ต้องการให้นางสาวฟู่ปรากฏตัวต่อหน้าพวกเขาเช่นนี้ เพราะนางจะกลายเป็นเป้าหมาย “ชิงอี้” องค์ชายจุนขัดจังหวะ “ในความคิดของเจ้า ข้าเป็นคนดีหรือ?” ฮะ?</p>\n<p>“ข้าเพียงแต่ไม่อยากให้ตระกูลฟู่ล่มสลายเร็วเกินไป และข้าก็ไม่อยากให้นางตายด้วยน้ำมือของคนอื่น” องค์ชายจุนกล่าวเช่นนั้นแล้วก็เดินจากไป ตอนนี้พิธีอภิเษกสมรสได้รับการยืนยันแล้ว เขาก็จำเป็นต้องเปลี่ยนชุดแต่งงาน หลังจากองค์ชายจุนจากไป ฟู่จ้าวหนิงก็ถอนหายใจโล่งอก ตอนนี้เธอรู้แล้วว่าการบุกเข้าไปในคฤหาสน์ขององค์ชายจุนนั้นซับซ้อนกว่าที่เธอคิดไว้มาก แต่เธอไม่อาจเสี่ยงชีวิตปู่ของเธอได้ ตราบใดที่เธอสามารถทำให้สถานการณ์สงบลงและให้เวลาตัวเองได้พักฟื้น เธอก็สามารถจัดการเรื่องเหล่านี้ได้ในภายหลัง ตราบใดที่ครอบครัวของเธอยังอยู่ ก็ไม่มีอุปสรรคใดที่เอาชนะไม่ได้ “เฟินซิง หงจั่ว</p>\n<p>เข้ามาช่วยฉันจัดของให้เรียบร้อยอีกหน่อย” เฟินซิงและหงจั่วที่ยืนรออยู่ข้างนอกก้มหน้าลงสบตากัน ตอบรับ และรีบเข้ามาทันที พวกเขาชอบคุณหนูฟู่คนนี้ แม้สถานการณ์จะเป็นเช่นนี้ เธอก็ไม่ตื่นตระหนกหรือร้องไห้ ไม่หวาดกลัวหรือกังวล และยังคงสงบและทำงานต่อไปได้ “ในเมื่อมีคนจากวังมา พวกเจ้าสองคนควรระวัง หากมีอะไรที่ไม่เหมาะสมกับข้า ให้รีบแก้ไขหรือเอาออกไป” ฟู่จ้าวหนิงสั่ง พวกเธอยังคงไม่ไว้ใจองค์ชายจุน แต่เธอไว้ใจสาวใช้ทั้งสองคนเพราะสายตาที่เฉียบคมของพวกเธอ ในกรณีที่เกิดปัญหา สาวใช้ก็พร้อมที่จะเสียสละ และเธอเชื่อว่ามีเพียงคนโง่ที่สุดเท่านั้นที่จะทำร้ายเธอในเวลานี้ “ค่ะ” เฟินซิงและหงจั่วรีบลงมือทำงาน</p>\n<p>ขณะที่พวกเธอกำลังยุ่งอยู่ ฟู่จ้าวหนิงก็ถามขึ้นอย่างไม่ตั้งใจว่า “ช่วยเล่าเรื่ององค์ชายให้ข้าฟังหน่อยได้ไหมคะ ข้าอยากรู้เพิ่มเติมจะได้เข้ากับพระองค์ได้ง่ายขึ้นในภายหลัง” เธอไม่ได้คาดหวังว่าสองสาวใช้จะเล่าอะไรให้เธอฟังจริงๆ จากการพบกันครั้งแรก เธอก็รู้แล้วว่าองค์ชายจุนไม่ใช่คนที่จะเข้ากับคนง่ายแน่ๆ และอาจจะเป็นคนไม่ดีด้วยซ้ำ สาวใช้ของเขาคงไม่กล้าพูดถึงเขามากนัก แต่ถ้าหากพวกเธอพูดล่ะ? แม้เพียงไม่กี่คำก็อาจจะให้ข้อมูลเชิงลึกแก่เธอได้บ้าง อย่างไรก็ตาม เฟินซิงและหงจั่วตอบพร้อมกันว่า “พวกเราเคยพบองค์ชายเพียงไม่กี่ครั้งเท่านั้น” เอ่อ...</p>\n<p>“แสดงว่าองค์ชายของท่านไม่ค่อยได้กลับมาเลยเหรอคะ? ท่านไม่มีข้ารับใช้ส่วนตัวเหรอคะ?” เมื่อได้ยินคำว่า “ข้ารับใช้ส่วนตัว” เฟินซิงและหงจั่วก็รีบส่ายหัว “พวกเราคนรับใช้พักอยู่ที่องค์ชายค่ะ องค์ชายทรงพักฟื้นอยู่ที่ยอดเขายู่ชิง และข้ารับใช้ส่วนตัวของพระองค์ก็คือสาวใช้ชั้นหนึ่ง พี่จินเสวี่ยและพี่ไป๋ซวงค่ะ” ดูเหมือนว่าจินเสวี่ยและไป๋ซวงจะเป็นนางกำนัลคนโปรดขององค์ชาย ฟู่จ้าวหนิงจดชื่อทั้งสองไว้ หงจั่วกล่าวว่า &quot;พี่จินเสวี่ยและพี่ไป๋ซวงกำลังเดินทางมา องค์ชายเสด็จกลับเมืองหลวงก่อน&quot; ในห้องจัดงานแต่งงาน เทียนแต่งงานสีแดงถูกจุดขึ้น บนที่นั่งสูงสุดมีคู่สามีภรรยาวัยกลางคนนั่งอยู่</p>\n<p>ซึ่งก็คือจักรพรรดิและจักรพรรดินีผู้ทรงเกียรติที่สุดแห่งอาณาจักรจ้าว พระรูปงามของจักรพรรดิยังคงปรากฏให้เห็นอย่างชัดเจน พระองค์ทรงสวมฉลองพระองค์มังกรสีเหลืองสดใส ซึ่งเน้นย้ำถึงพระบารมีอันสูงส่ง เมื่อพิจารณาอย่างใกล้ชิด องค์ชายจุนมีพระพักตร์คล้ายคลึงกับพระองค์เล็กน้อย จักรพรรดินีทรงสวมฉลองพระองค์นกฟีนิกซ์อันงดงาม ประดับด้วยปิ่นปักผมนกฟีนิกซ์สีแดงทอง พระองค์ทรงเปล่งประกายด้วยเครื่องประดับ แสดงถึงความสง่างามและอ่อนช้อยอย่างแท้จริง ถัดไปเล็กน้อย พระพันปีประทับอยู่ในเก้าอี้อันโอ่อ่า เธอดูสงบเสงี่ยมและค่อนข้างเฉื่อยชา มีคนนำหมอนมาให้ เธอนั่งครึ่งเอนหลังครึ่งนั่ง</p>\n<p>ข้าราชการจำนวนมากมารวมตัวกันอยู่ด้านนอกหอประชุม บางคนสวมชุดราชการ บางคนสวมชุดลำลอง และบางคนยังคงจัดเตรียมรูปลักษณ์ของตนอยู่ งานแต่งงานขององค์ชายจุนมาถึงอย่างกะทันหัน หากไม่ใช่เพราะการเสด็จกลับเมืองหลวงขององค์ชายจุนเป็นเหตุการณ์สำคัญ และหากพวกเขาไม่ได้สร้างความวุ่นวายบนท้องถนน โดยมีผู้คนจากหลายบ้านเรือนเห็น พวกเขาก็คงไม่มีเวลามาถึงที่นี่ ผู้ที่มาถึงที่นี่ได้ในตอนนี้ล้วนได้รับข้อมูลมาเป็นอย่างดี บางคนถึงกับทิ้งสนมไว้ข้างหลังและรีบมา ในขณะที่บางคนกำลังฟังดนตรีอยู่ในโรงน้ำชาและยังไม่กลับบ้านก่อนที่จะมาที่นี่ “คุณหนูฟู่คนนี้โด่งดังชั่วข้ามคืนจริงๆ” “ไม่ใช่เหรอ?</p>\n<p>เธอเลิกหมั้นกับตระกูลองค์ชายเซียวกลางถนนเลย และเกี้ยวแต่งงานก็เกือบจะถึงประตูวังองค์ชายเซียวแล้ว” “แล้วเธอก็หยุดรถม้าขององค์ชายจุนและกลายเป็นภรรยาขององค์ชายจุน ฉันมีชีวิตอยู่มาสามสิบกว่าปีแล้ว ไม่เคยได้ยินเรื่องดราม่าอะไรแบบนี้มาก่อนเลย” “เธอทำให้คุณหนูหลี่ขุ่นเคือง คุณคิดว่าหมอหลี่จะปล่อยเธอไปหรือ?” มีคนลดเสียงลง ไม่ค่อยมีความหวังเกี่ยวกับฟู่จ้าวหนิง “ใช่ อย่าลืม องค์ชายจุนก็ต้องการรักษาจากหมอหลี่ด้วย” ทุกคนส่ายหัวและถอนหายใจในใจ ราวกับจะมองเห็นจุดจบที่น่าอนาถของฟู่จ้าวหนิง “ฉันสงสัยว่างานแต่งงานวันนี้จะราบรื่นหรือไม่ และพิธีจะเสร็จสมบูรณ์ได้หรือไม่” “ถึงเวลาอันเป็นมงคลแล้ว</p>\n<p>ยินดีต้อนรับคู่บ่าวสาว” คนรับใช้ในวังขององค์ชายจุน สวมชุดคลุมผ้าไหมใหม่เอี่ยม ก้าวออกมาข้างหน้า เสียงดังชัดเจน โชคดีที่เขาได้เตรียมเสื้อผ้าใหม่สำหรับทุกคนในวังไว้ล่วงหน้าสำหรับการกลับมายังเมืองหลวงขององค์ชาย และตอนนี้พวกเขาก็สามารถสวมใส่ได้อย่างสมบูรณ์แบบ เขาไม่รู้ว่าคนอื่นคิดอย่างไร แต่คนรับใช้รู้เพียงว่าเจ้าชายได้เลือกเจ้าหญิงมาเป็นคู่ครองเมื่อเสด็จกลับเมืองหลวง ซึ่งนับเป็นลางดี! หญิงสาวที่กล้าแต่งงานกับเจ้าชายย่อมเป็นเจ้าหญิงที่ดี เสียงดนตรีอันไพเราะดังขึ้น และเจ้าชายจุนก็ปรากฏตัวเป็นคนแรก ในห้องจัดงานแต่งงาน พระพันปีหลวงค่อยๆ ลุกขึ้นนั่งตัวตรง มองดูร่างสูงสง่า</p>\n<p>แสงไฟส่องกระทบชุดแต่งงานสีแดงสด ทำให้พระนางทรงชุ่มฉ่ำเล็กน้อย “อาหยวนของเราก็ได้ภรรยาแล้ว” พระนางตรัสเบาๆ</p>"}, "7": {"chapter_number": 7, "chapter_title": "第7章豈不是跟鬼一樣", "content": "<p>ไม่มีใครได้ยินคำพูดของพระพันปีหลวง เมื่อพระพันปีหลวงเห็นองค์ชายจุนเสด็จเข้ามาในชุดแต่งงาน เมฆดำก็พลุ่งพล่านขึ้นในพระเนตรของพระนางอย่างรวดเร็ว ลูกชายของหญิงต่ำต้อยคนนั้น ไอ้คนต่ำช้าคนนั้น ได้แต่งงานกับเจ้าหญิง! ไม่ได้เด็ดขาด! วันนี้พระนางจะทำให้พวกเขาพลาดพลั้ง! คิดเช่นนั้น พระพันปีหลวงก็ค่อยๆ ยิ้มและหันไปทางจักรพรรดิ กระซิบว่า &quot;ฝ่าบาททรงเป็นห่วงพระสุขภาพขององค์ชายจุนอยู่เสมอ ดูสิ พระองค์โตเป็นหนุ่มหล่อเหลาไม่ใช่หรือ?&quot; ไอ้คนชั่วอายุสั้นนั่น ทำไมมันดูไม่เหมือนจะตายเร็วเลยล่ะ?</p>\n<p>จักรพรรดิหัวเราะเสียงดัง &quot;ถึงแม้ทุกคนจะบอกว่าอายหยวนกับจักรพรรดิองค์ก่อนหน้าตาคล้ายกันมากในวัยหนุ่ม แต่ถ้ามองดูพวกเราแล้ว พวกเราพี่น้องก็มีอะไรที่คล้ายคลึงกันอยู่บ้าง&quot; เมื่อได้ยินจักรพรรดิเอ่ยถึงจักรพรรดิองค์ก่อน ความเกลียดชังของพระพันปีหลวงก็ยิ่งทวีความรุนแรงขึ้น เป็นเพราะเจ้าสิ่งมีชีวิตที่น่าเวทนานี้หน้าตาคล้ายกับจักรพรรดิผู้ทรงสละราชสมบัติมาก จึงได้รับการคุ้มครองจากจักรพรรดิผู้ทรงสละราชสมบัติมาตั้งแต่เด็ก และรอดพ้นจากความตายมาได้หลายครั้ง จักรพรรดิผู้ทรงสละราชสมบัติทรงเกรงว่าสุขภาพที่อ่อนแอของพระโอรสจะทำให้พระองค์ไม่ได้รับผลประโยชน์ใดๆ เมื่อเติบโตขึ้น จึงได้ออกพระราชกฤษฎีกาไว้ว่า</p>\n<p>เมื่อพระโอรสบรรลุนิติภาวะและอภิเษกสมรส จะมีของขวัญชิ้นใหญ่ส่งมาให้ แม้แต่จักรพรรดิเองก็ยังไม่ทรงทราบว่าจักรพรรดิผู้ทรงสละราชสมบัติได้ทิ้งอะไรไว้ให้องค์ชายจุน วันนี้ วันอภิเษกสมรสขององค์ชายจุน ของขวัญชิ้นใหญ่ที่จักรพรรดิผู้ทรงสละราชสมบัติได้ทิ้งไว้คงจะมาถึงในไม่ช้า และแน่นอนว่าทุกคนต้องมาร่วมงาน เหล่าขุนนางต่างมององค์ชายจุนด้วยความสงสัย ในช่วงยี่สิบปีที่ผ่านมา องค์ชายจุนเสด็จกลับเมืองหลวงเพียงไม่กี่ครั้ง ทุกครั้งก็รีบร้อน ไม่ว่าจะโดยรถม้าหรือเกี้ยว และมีเพียงไม่กี่คนที่เคยเห็นพระพักตร์ของพระองค์ แต่ตอนนี้ เมื่อเห็นพระพักตร์อันหล่อเหลาและสง่างามขององค์ชายจุน พวกเขาก็ไม่อาจละสายตาไปจากพระองค์ได้</p>\n<p>“เขาดูเหมือนจักรพรรดิตอนหนุ่มมากเลยนะ” ขุนนางชราคนหนึ่งอุทาน “แต่ทำไมองค์ชายจุนถึงใส่หน้ากากล่ะ?” หน้ากากขององค์ชายจุนนั้นทำขึ้นเป็นพิเศษ ปิดบังใบหน้าเพียงเล็กน้อย ไม่ได้ปกปิดอะไรมากนัก แต่มันก็ยังเป็นหน้ากากอยู่ดี ทุกคนต่างตกใจ “มีคนเคยบอกว่าองค์ชายจุนถูกวางยาพิษและได้พบกับหมอผี ชีวิตของเขารอดมาได้ แต่ยาพิษไปถึงใบหน้าและขับออกไม่หมด ทำให้ใบหน้าเน่าเปื่อย นี่อาจเป็นสาเหตุหรือเปล่า?” มีคนกระซิบเล่าเรื่องราวที่พวกเขาเคยได้ยินมา ฮิส—งั้นองค์ชายจุนก็มีใบหน้าครึ่งหนึ่งที่ดูเหมือนผีงั้นเหรอ? มันต้องน่ากลัวมากแน่ๆ ไม่อย่างนั้นทำไมเขาถึงต้องใส่หน้ากาก?</p>\n<p>“ฉันสงสัยว่าคุณหนูฟู่จะได้เห็นองค์ชายจุนหรือยัง…” “นี่ไง! เจ้าสาวมาแล้ว!” มีคนอุทาน ในสวนตรงมุมห้อง สาวใช้สองคนประคองฟู่จ้าวหนิงขณะที่เธอก้าวเข้ามาอย่างสง่างาม ในชุดแต่งงานสีแดงสดปักด้ายทอง รูปร่างสูงเพรียวของเธอดูโดดเด่น ก้าวเดินที่ช้าและสง่างามทำให้เธอดูราวกับภาพวาด หลายคนรู้จักฟู่จ้าวหนิง เพราะเธอคอยรบกวนเซียวเหยียนจิงอยู่ตลอด และหลายคนก็หัวเราะเยาะเธอ แต่ก่อนหน้านี้ไม่มีใครสังเกตว่าฟู่จ้าวหนิงยังไม่ปรากฏตัว แต่เพียงแค่ท่าเดินที่อ่อนช้อยก็เพียงพอที่จะดึงดูดใจผู้คนมากมาย องค์ชายจุนมองฟู่จ้าวหนิงที่ถูกพามาอยู่ตรงหน้า เขาสัมผัสได้ว่าลมหายใจของเธอคงที่ ไม่เกร็ง และดูผ่อนคลาย</p>\n<p>ปราศจากความตึงเครียด “ฝ่าบาท” หงจั่วส่งปลายผ้าคลุมสีแดงด้านหนึ่งให้เขา ขณะที่ฟู่จ้าวหนิงถืออีกด้านหนึ่ง องค์ชายจุนรับมาและกระซิบกับฟู่จ้าวหนิงว่า “ตอนนี้ยังไม่สายเกินไปที่จะถอนตัว” “ถ้าฝ่าบาทไม่ประสงค์จะถอนตัว ก็ขอให้ดำเนินการพิธีแต่งงานต่อไป” เสียงของฟู่จ้าวหนิงดังมาจากใต้ผ้าคลุมสีแดง ชัดเจนและหนักแน่น “ตกลง” เจ้าชายจุนถือผ้าคลุมหน้าสีแดงนำเธอเข้าไปในหอพิธีแต่งงาน ที่ซึ่งทั้งสองยืนอยู่ต่อหน้าพระพันปีหลวงและจักรพรรดิ แม้จะมีผ้าคลุมหน้าสีแดงปิดบังใบหน้า ฟู่จ้าวหนิงก็แทบจะรู้สึกได้ถึงสายตาของผู้คนมากมายที่จับจ้องมาที่เธอ “งานแต่งงานของเจ้าชายจุนควรจะเป็นงานที่ยิ่งใหญ่และอลังการ</p>\n<p>แต่กลับถูกจัดอย่างเร่งรีบ พวกเขาจัดหอพิธีแต่งงานอย่างเรียบง่ายเหมือนคนธรรมดา ไม่ได้ส่งคำเชิญอย่างเหมาะสม ไม่ได้เชิญแขกให้เพียงพอ และไม่มีขบวนแห่เจ้าสาวสีแดงยาวสิบไมล์เพื่อต้อนรับเจ้าสาวคนใหม่ ไม่มีแม้แต่การแห่รอบเมืองสามรอบ มันเป็นเรื่องน่าอับอายสำหรับเจ้าชายจุนจริงๆ” พระพันปีหลวงมองดูเจ้าชายจุนและฟู่จ้าวหนิงที่ยืนอยู่ด้วยกัน ความไม่พอใจของพระองค์ยิ่งทวีความรุนแรงขึ้นทุกขณะ ด้วยเหตุผลบางอย่างที่อธิบายไม่ได้ ทั้งสองดูเหมาะสมกันอย่างลงตัว พระนางถอนหายใจเบาๆ มองไปที่ฟู่จ้าวหนิง “แต่ข้าไม่เคยนึกฝันเลยว่าในเมืองหลวงต้าจ้าวของเรา จะมีผู้หญิงอย่างนางฟู่</p>\n<p>ที่ในวันแต่งงานกลับยกเลิกการหมั้นกลางถนนแล้วไปหาคู่ครองคนใหม่ได้อย่างหน้าด้านๆ...” ทุกคนที่อยู่ในที่นั้นต่างกลั้นหายใจ กลัวจะเอ่ยเสียงออกมา ฟู่จ้าวหนิงใจเต้นแรง นี่แหละคือสิ่งที่พระนางต้องการจะสื่อโดยอ้อมว่านางไร้ยางอายและไม่มีมารยาทใช่หรือไม่?</p>\n<p>หรือว่าพระนางกำลังบอกว่าองค์ชายจุนถูกกระทำไม่เป็นธรรมเพราะนาง หรือว่าพระนางกำลังเยาะเย้ยเขาที่ไปแต่งงานกับผู้หญิงที่สร้างความวุ่นวายไปทั่วเมืองในวันเดียว? ฟู่จ้าวหนิงไม่ใช่คนที่จะเก็บความโกรธไว้ พระนางยังพูดไม่ทันจบก็พูดขึ้นมาด้วยน้ำเสียงที่คล้ายกับพระนาง “จ้าวหนิงไม่คาดคิดว่าข่าวจะไปถึงวังเร็วขนาดนี้ แต่ในเมื่อพระนางเจ้าฯ พระมเหสีทรงทราบแล้ว พระองค์คงรู้สึกดูถูกและรังเกียจเจ้าชายเซียว ไอ้สารเลวนั่น ที่ไม่มางานแต่งงาน ใส่ชุดไว้ทุกข์อยู่ที่บ้าน แล้วยังไปคลุกคลีกับผู้หญิงคนอื่นอย่างโจ่งแจ้งบนถนนอีก ใช่ไหม?” ทุกคนจ้องมองเธอด้วยความตกใจ คุณหนูฟู่กล้าพูดในเวลานี้หรือ? และกล้าเผชิญหน้ากับพระมเหสีโดยตรง?</p>\n<p>ผู้หญิงที่ยกเลิกการหมั้นกลางถนนแล้วแต่งงานใหม่—ความกล้าหาญของเธอนั้นหาที่เปรียบไม่ได้จริงๆ! ฟู่จ้าวหนิงกล่าวต่อ “จ้าวหนิงกับเจ้าชายเซียวไม่ได้ติดต่อกันมากนักตั้งแต่แรกอยู่แล้ว ไม่ต้องพูดถึงความรักใคร่เลย มันเป็นเพราะข้อตกลงการแต่งงานระหว่างตระกูลของเรา และด้วยความห่วงใยสุขภาพของปู่ของฉัน ฉันจึงรู้สึกว่าจำเป็นต้องทำตามสัญญาหมั้นกับเจ้าชายเซียว” ดวงตาของเจ้าชายจุนเป็นประกายเมื่อได้ยินเช่นนั้น ไม่ได้ติดต่อกับเจ้าชายเซียวมากนัก? เธอหมายความว่าเธอไม่ชอบเซียวเหยียนจิงหรือ? “แต่จ้าวหนิงโชคดีมาก ก่อนที่เกี้ยวจะเข้าไปในวังขององค์ชายเซียว ข้าก็ได้เห็นธาตุแท้ขององค์ชายเซียวแล้ว และยังได้พบกับชายผู้มีความสามารถโดดเด่นอย่างองค์ชายจุน การเลือกไข่มุกเหนือตาปลา จ้าวหนิงทำอะไรผิดหรือ?</p>\n<p>พระนางคิดว่าการที่จ้าวหนิงเลือกองค์ชายจุนนั้นผิดหรือ?” พระนางหันไปทางองค์ชายจุนขณะตรัส องค์ชายจุนมีสีหน้ามืดมนเล็กน้อย พระนางซูสีไทเฮาเฝ้ามองจ้าวหนิงมาตลอด เด็กสาวคนนี้ใช้ตรรกะที่ผิดพลาดอย่างชัดเจน และเธอก็กำลังบีบบังคับพระนางซูสีไทเฮาไม่ให้ตรัสว่าพระนางผิด มิเช่นนั้นก็เท่ากับว่าพระองค์ด้อยกว่าเซียวเหยียนจิง องค์ชายเซียวกับองค์จักรพรรดิเป็นเพียงญาติกัน บุตรของญาติเทียบไม่ได้กับโอรสองค์เล็กสุดที่องค์จักรพรรดิทรงรักมากที่สุด พระอนุชาขององค์จักรพรรดิเอง แม้ว่าพระนางซูสีไทเฮาจะไม่โปรดปรานองค์ชายจุน ก็ไม่สามารถตรัสต่อหน้าองค์จักรพรรดิได้ “คุณหนูฟู่ช่างปากร้ายจริงๆ”</p>\n<p>น้ำเสียงของพระนางเจือด้วยความเย็นชา “ข้าแค่รู้สึกสงสารองค์ชายจุน ที่ต้องแต่งงานอย่างเร่งรีบและไม่ได้จัดงานฉลองใหญ่โต คุณหนูฟู่ก็พูดพล่ามไปเรื่อย ปากนางช่างไม่ธรรมดาจริงๆ” “เอาล่ะ เอาล่ะ ในเมื่ออาหยวนเต็มใจแล้ว เราก็ไม่ต้องสงสารเขาอีกต่อไปแล้ว” พระพันปีหลวงตรัสขึ้น “นี่ไม่ใช่ฤกษ์ดีหรือ? ถึงเวลาจัดพิธีวิวาห์แล้ว” เมื่อพระพันปีหลวงตรัส พระนางก็ไม่สามารถพูดอะไรได้อีก ไม่ว่าพระองค์จะไม่เต็มใจเพียงใด แต่จักรพรรดิกลับมององค์ชายจุนอย่างจริงจัง “เสี่ยวหลานหยวน ข้าถามเจ้า เจ้าอยากแต่งงานกับฟู่จ้าวหนิงจริงๆ หรือ?</p>\n<p>เจ้าคิดเรื่องนี้ให้รอบคอบแล้วหรือยัง?” ก่อนที่องค์ชายจุนจะตอบ มีคนตะโกนอย่างเร่งด่วนจากข้างนอกว่า “เขาจะไม่แต่งงานกับนาง!”</p>"}, "8": {"chapter_number": 8, "chapter_title": "第8章還有考驗呢", "content": "<p>ร่างสีแดงพุ่งเข้ามาในห้องจัดงานแต่งงานราวกับสายลม ทันทีที่มาถึง กลิ่นหอมก็อบอวลไปทั่ว พระนางซูสีไทเฮาเห็นผู้มาใหม่ก็รู้สึกโล่งใจทันที ทุกอย่างเรียบร้อยแล้ว เมื่อนางมาถึง การแต่งงานก็จะไม่เกิดขึ้นในวันนี้ พระนางซูสีไทเฮาอุทานด้วยความยินดีว่า “โอ้ เจ้าหญิงหยวนหลินเสด็จกลับเมืองหลวงแล้วหรือ? โรงเรียนชิงฮวาปิดเทอมหรือ?” โรงเรียนชิงฮวาเป็นโรงเรียนหญิงล้วนที่มีชื่อเสียงในอาณาจักรจ้าว นักเรียนหญิงที่เข้าเรียนล้วนมีความสามารถพิเศษ และเจ้าหญิงหยวนหลินก็เป็นหนึ่งในผู้ที่มีชื่อเสียงที่สุด อย่างไรก็ตาม เจ้าหญิงหยวนหลินมีนิสัยค่อนข้างไม่ดีและหวงแหนมาก “เขาเป็นคนรักของท่านหรือ?” องค์ชายจุนขมวดคิ้ว</p>\n<p>เมื่อเห็นผ้าไหมสีแดงในมือของเขาตึงขึ้นทีละน้อย ฟู่จ้าวหนิงเดินเข้าไปหาเขาและถามเบาๆ “ไม่” แม้ว่าองค์ชายจุนอยากจะถามว่า “จะเป็นหรือไม่เป็นก็ไม่ต่างกัน” แต่สุดท้ายเขาก็ตอบนางตรงๆ “อ้อ งั้นข้าก็จะไม่รู้สึกผิด” ฟู่จ้าวหนิงเพิ่งนึกถึงปัญหานี้ขึ้นมาในตอนนี้ ถึงแม้เจ้าชายจุนจะยังไม่เคยแต่งงานมาก่อน ใครจะรู้ว่าเขามีคนรักหรือหญิงสาวที่อยากแต่งงานด้วยหรือไม่?</p>\n<p>แต่ในเมื่อเขาสัญญาว่าจะแต่งงานกับเธอแล้ว ความรับผิดชอบจึงตกเป็นของเขา ซ่งหยวนหลินตอบคำถามของพระนางซู่ว่า “ฝ่าบาท สำนักไม่ได้ปิดทำการในช่วงวันหยุด ข้าพเจ้ากลับมาหลังจากถามอาจารย์แล้ว เพราะได้ยินว่าพี่หลานหยวนกลับไปที่เมืองหลวงแล้ว” แม้ว่าเธอจะกำลังตอบคำถามของพระนางซู่ แต่สายตาของเธอก็จ้องมองไปที่เจ้าชายจุนอย่างหลงใหล “พี่หลานหยวน ข้าพเจ้าคือหยวนหลิน” “คุณหนูซ่ง” น้ำเสียงของเจ้าชายจุนเย็นชามาก “ถ้าเจ้ามาแสดงความยินดีในงานแต่งงานของข้า ก็จงหลีกทางไป ถ้าเจ้ามาก่อเรื่อง ก็จงออกไป” เมื่อได้ยินเขาพูดกับซ่งหยวนหลินอย่างหยาบคายเช่นนั้น ฟู่จ้าวหนิงก็เข้าใจว่าเกิดอะไรขึ้น “พี่หลานหยวน</p>\n<p>ท่านจะมาไล่ข้าไปได้อย่างไร?” ซ่งหยวนหลินไม่ได้โกรธเลยแม้แต่น้อย “ข้าจะไม่ไป! ข้าสัญญากับพี่หยุนเหยาไว้แล้วว่าจะปกป้องท่านเพื่อเธอ ยังไงก็ตาม ท่านห้ามแต่งงานกับผู้หญิงคนอื่นก่อนที่พี่หยุนเหยาจะกลับมาเด็ดขาด!” หยุนเหยาอีกคนปรากฏตัวขึ้น เมื่อได้ยินชื่อหยุนเหยา ฟู่จ้าวหนิงก็นึกถึงเธอขึ้นมา ซ่งหยุนเหยาเป็นหญิงงามอันดับหนึ่งของเมืองหลวง และมีความสามารถมากด้วย แต่ก่อนหน้านี้ฟู่จ้าวหนิงมุ่งเน้นไปที่การหาแพทย์และยามาดูแลปู่ของเธอ และตระกูลฟู่ก็อยู่ห่างไกลจากคนเหล่านั้นเกินกว่าที่เธอจะสนใจ ดังนั้นเธอจึงเคยได้ยินชื่อซ่งหยุนเหยาแต่ไม่รู้อะไรเกี่ยวกับเธอเลย ผ้าไหมสีแดงในมือของเธอถูกกำแน่นขึ้นทันที</p>\n<p>ฟู่จ้าวหนิงขมวดคิ้ว เมื่อได้ยินชื่อซ่งหยุนเหยา องค์ชายจุนก็ประหม่างั้นหรือ?</p>\n<p>ซ่งหยุนเหยาคนนี้จะเป็นคนรักของเขาหรือ? ซ่งหยวนหลินเห็นริมฝีปากขององค์ชายจุนเม้มแน่นก็รู้สึกสะใจมาก “พี่หลานหยวนจะลืมพี่หยุนเหยาไม่ได้หรอกใช่ไหม? เจ้าควรไล่ผู้หญิงคนนี้ออกไปจากคฤหาสน์เดี๋ยวนี้! คนแบบไหนกันที่จะมาแทนที่พี่หยุนเหยาได้?” ซ่งหยวนหลินพูดพลางเอื้อมมือไปดึงผ้าคลุมหน้าสีแดงของฟู่จ้าวหนิงออก ก่อนที่ลมจะพัดถึงตัว ฟู่จ้าวหนิงก็หลบไปด้านข้างขององค์ชายจุนแล้ว ถ้าผ้าคลุมหน้าของเธอถูกดึงขึ้นสามครั้งในวันเดียว เธอคงโกรธมากแน่ๆ แม้แต่พิธีการก็ยังทำไม่เสร็จสักที องค์ชายจุนยกมือขึ้นปัดมือของซ่งหยวนหลินไว้ “ไอ ไอ” หลังจากปัดมือซ่งหยวนหลินแล้ว องค์ชายจุนก็ไอออกมา</p>\n<p>การไอของเขาเปลี่ยนสีหน้าของพระพันปีหลวงทันที ดวงตาของพระองค์แสดงความไม่พอใจเล็กน้อยขณะมองไปที่ซ่งหยวนหลิน “หยวนหลิน เจ้าเด็กน้อย” ซ่งหยวนหลินตบมือองค์ชายจุนเบาๆ ด้วยความรู้สึกประหม่าเล็กน้อย ทุกคนรู้ว่าองค์ชายจุนบอบบางและอ่อนแอ แต่ความโกรธของพระองค์กลับพุ่งเป้าไปที่ฟู่จ้าวหนิง ยัยสารเลวนี่กล้ามาหลบอยู่ข้างหลังพี่หลานหยวนงั้นเหรอ?!</p>\n<p>ขณะที่กำลังจะระเบิดความโกรธออกมา ก็ได้ยินพระพันปีเรียกชื่อ จึงรีบกลั้นคำสาปแช่งไว้แล้วหันไปมองพระพันปี พระนางเองก็มองพระพันปีด้วยความสงสัย พระพันปีจะมาปกป้ององค์ชายจุนหรือ? แต่เห็นได้ชัดว่าพระพันปีไม่ชอบองค์ชายจุนเหมือนกับพระนาง พระนางประหลาดใจอยู่แล้วที่พระพันปีอาสามาช่วยในวันนี้ แล้วตอนนี้ยังจะมาช่วยให้องค์ชายจุนได้แต่งงานอย่างราบรื่นอีกหรือ? &quot;พระพันปี ท่านรักน้องสาวของข้ามากที่สุด! ท่านรู้ว่าหยุนเหยาจะเป็นภรรยาขององค์ชายจุน จะปล่อยให้พี่หลานหยวนแต่งงานกับคนอื่นได้อย่างไร?&quot; ซ่งหยวนหลินเดินไปที่ข้างพระพันปี นั่งย่อตัวลง แล้วเอนกายพิงตักอย่างเอ็นดู ทำทีอ้อนวอน</p>\n<p>พระพันปีทรงระงับความอยากที่จะเตะนางออกไป ทรงลูบพระเศียรนางเบาๆ แล้วตรัสว่า “น้องสาวของเจ้า หยุนเหยา หายไปจากเมืองหลวงนานมากโดยไม่กลับมา ข้าได้ยินข่าวร้ายมา” หัวใจของซ่งหยวนหลินเต้นแรงขึ้นทันที แต่พระพันปีกลับทรงแสดงสีหน้าเข้าใจแล้ว พระพันปีทรงได้รับข่าวแล้วหรือ?</p>\n<p>นี่ต้องเป็นเพราะพระองค์ทรงพิโรธซ่งหยุนเหยา จึงทรงจงใจไม่ห้ามองค์ชายจุน ว่ากันว่าการที่ซ่งหยุนเหยาหายไปจากเมืองหลวงนานนั้นเป็นเพราะการพบกับองค์รัชทายาทแห่งอาณาจักรต้าเหอ และความสัมพันธ์ของทั้งสองดูผิดปกติ ทำให้พระพันปีผู้ทรงรักและเอ็นดูนางมาโดยตลอดรู้สึกถูกทรยศ เพราะลูกสาวสุดที่รักของพระพันปีแต่งงานกับคนในอาณาจักรต้าเหอและเสียชีวิตด้วยโรคร้าย ความสัมพันธ์ใกล้ชิดของซ่งหยุนเหยากับองค์รัชทายาทแห่งอาณาจักรต้าเหอจึงเท่ากับการทรยศพระพันปี! พระพันปีหลวงทรงบังคับให้องค์ชายจุนแต่งงานด้วยความแค้น พระนางฟู่จ้าวหนิงทรงเข้าใจ และอดไม่ได้ที่จะโกรธซ่งหยุนเหยา</p>\n<p>ทำไมนางถึงไม่เก็บความสัมพันธ์กับองค์รัชทายาทแห่งอาณาจักรต้าเหอเป็นความลับ ทำไมต้องรายงานไปถึงอาณาจักรจ้าว และยังไปถึงพระบาทของพระพันปีหลวงอีกด้วย “พระพันปีหลวง...” พระนางฟู่จ้าวหนิงกำลังจะตรัส แต่พระพันปีหลวงก็ทรงเรียกอย่างใจร้อนว่า “พิธีอภิเษก!” “ถึงเวลาอันเป็นมงคลแล้ว ขั้นแรก กราบไหว้ฟ้าดิน” “ขั้นที่สอง กราบไหว้บิดามารดา” “สามีภรรยากราบไหว้กัน!” ฟู่จ้าวหนิงรู้สึกราวกับว่าคำพูดของนางกำนัลนั้นเร่งความเร็วอยู่ มันเร็วมาก!</p>\n<p>นางกำนัลแห่งวังองค์ชายจุนกลัวว่าพิธีแต่งงานจะไม่สำเร็จในวันนี้หรือ? เพราะมันเร็วมาก เธอจึงรู้สึกเวียนหัวเล็กน้อยจากการกราบไหว้ เมื่อสามีภรรยากราบไหว้กัน เธอก็เกือบจะชนหน้าผากขององค์ชายจุน ในชั่วขณะนั้น เธอคิดว่าได้ยินเสียงหัวเราะเบาๆ ของเจ้าชายจุน? &quot;พิธีเสร็จสิ้นแล้ว พาพวกเขาทั้งสองไปที่ห้องหอ!&quot; นางกำนัลถอนหายใจโล่งอกอย่างเห็นได้ชัดเมื่อพูดเช่นนั้น ทุกอย่างเรียบร้อยแล้ว เจ้าชายของพวกเขาได้แต่งงานแล้ว คฤหาสน์ของพวกเขามีเจ้าหญิง! พวกเขารอคอยและหวังถึงวันนี้มานานแสนนาน!</p>\n<p>พระนางกำนัลกัดฟันและจ้องมองซ่งหยวนหลิน เธอคิดว่าซ่งหยวนหลินจะสร้างปัญหาได้ แต่ถึงขนาดนี้หรือ? &quot;เดี๋ยวก่อน&quot; เธอพูด ฟู่จ้าวหนิงกำลังจะถูกหงจั่วและเฟินซิงช่วยพาเข้าไปในห้องหอ แต่เมื่อได้ยินเช่นนั้น นางกำนัลทั้งสองก็ต้องห้ามเธอไว้ &quot;จักรพรรดิผู้ทรงสละราชสมบัติทรงมีเงื่อนไขสำหรับการเป็นพระชายาของจุน พวกเจ้าลืมกันไปแล้วหรือ?&quot; พระนางกำนัลไม่อยากพูดถึงเรื่องนี้ เพราะการเอ่ยถึงจักรพรรดิผู้ทรงสละราชสมบัติย่อมทำให้เรื่องที่จุนได้รับของขวัญอันยิ่งใหญ่จากพระองค์ต้องถูกพูดถึงไปด้วย แต่ตอนนี้เธอไม่มีทางเลือก จักรพรรดิดูเหมือนจะเพิ่งนึกขึ้นได้ในตอนนี้ “อ่า ใช่ เคยมีเรื่องแบบนั้นด้วย”</p>\n<p>สีหน้าของจุนยังคงไม่เปลี่ยนแปลง แต่ฟู่จ้าวหนิงกลับสัมผัสได้ถึงความผันผวนทางอารมณ์ของเขาอย่างประหลาด “ฟู่จ้าวหนิง” จักรพรรดิกล่าว “จักรพรรดิองค์ก่อนเคยตรัสว่า ใครก็ตามที่ต้องการเป็นพระสนมของจุน ต้องหาสมุนไพรอย่างน้อยสิบชนิดบนภูเขาลั่วเยว่ภายในสามวัน” พระนางซูสีไทเฮายิ้มอย่างช้าๆ</p>"}, "9": {"chapter_number": 9, "chapter_title": "第9章殺人誅心啊", "content": "<p>ไม่มีใครรู้ว่าทำไมจักรพรรดิผู้ทรงสละราชสมบัติถึงตั้งเงื่อนไขเช่นนั้นในตอนนั้น แต่ตอนนี้พระนางซูสีไทเฮาคิดว่าเป็นเงื่อนไขที่ยอดเยี่ยม ไม่มีใครในตระกูลฟู่เป็นหมอ ฟู่จ้าวหนิงนั้นว่ากันว่าตั้งแต่เด็กช่วยปู่หาสมุนไพร แต่หลายคนในเมืองหลวงรู้ว่าเธอโง่เหลือเชื่อ เธอจำสมุนไพรไม่ได้เลย หมอบอกเธอว่าต้องใช้สมุนไพรอะไรบ้าง วาดรูป แล้วเธอก็ขึ้นไปบนเขาเพื่อหา นั่นหมายความว่าเธอหาสมุนไพรที่ถูกต้องเจอหรือเปล่า? ไม่เลยสักนิด ฟู่จ้าวหนิงจะขุดสมุนไพรมาเป็นจำนวนมากแล้วนำไปที่ร้านขายยาเพื่อให้หมอตรวจสอบว่ามีสมุนไพรที่ถูกต้องอยู่หรือไม่ เธอยังเคยปรุงยาผิดให้แก่ท่านปู่ฟู่ด้วย</p>\n<p>เรื่องราวเหล่านี้ยังคงแพร่หลายเป็นเรื่องตลกในเมืองหลวง และเซียวเหยียนจิงไม่ชอบฟู่จ้าวหนิงเพราะเรื่องนี้ คิดว่าเธอเป็นคนโง่ที่ทำให้คนอื่นหัวเราะเยาะ การแต่งงานกับคนโง่เช่นนี้ทำให้เขากลายเป็นตัวตลก พระนางซูสีไทเฮาอยากจะหัวเราะออกมาดังๆ ในตอนนี้ เงื่อนไขของจักรพรรดิผู้สละราชสมบัติช่างแยบยลจริงๆ!</p>\n<p>&quot;ฝ่าบาท ข้าลืมเรื่องนี้ไปเสียสนิท&quot; พระพันปีหลวงตรัสด้วยน้ำเสียงเย็นชาและโกรธเล็กน้อย &quot;ในเมื่อเจ้าจำได้แล้ว ทำไมไม่ตรัสก่อนพิธีอภิเษกสมรส? ตอนนี้คุณหนูฟู่ก็เป็นภรรยาของอาหยวนแล้ว&quot; พระพันปีหลวงทรงทำเช่นนี้โดยเจตนา! แม้ว่าพระองค์จะไม่ต้องการให้องค์ชายจุนแต่งงาน แต่การเห็นพระองค์ถูกผูกมัดกับคนไร้ประโยชน์อย่างฟู่จ้าวหนิงก็ดูน่าขบขันไม่น้อย และจะทำให้ฟู่จ้าวหนิงลำบากใจด้วย พระพันปีหลวงทรงยิ้มขอโทษ &quot;ฝ่าบาท ข้าเพิ่งนึกออก ข้าลืมไปก่อนหน้านี้&quot; พระพันปีหลวงไม่เชื่อพระองค์! &quot;บางทีคุณหนูฟู่อาจจะหาสมุนไพรสิบชนิดบนภูเขาลั่วเยว่ได้จริงๆ ก็ได้?</p>\n<p>ถ้าหาไม่ได้&quot; พระพันปีหลวงทรงยิ้มอีกครั้ง พลางเหลือบมองฟู่จ้าวหนิงราวกับห่วงใยเธอจริงๆ &quot;องค์ชายจุนก็รับคุณหนูฟู่เป็นสนมก็ได้ ไม่ใช่เรื่องที่เป็นไปไม่ได้&quot; ทุกคนรู้สึกหนาวสั่น รอยยิ้มของพระนางซู่เป็นเพียงเรื่องตลกที่โหดร้าย! คุณหนูฟู่มีความสุขอย่างยิ่งที่ได้แต่งงานและเป็นภรรยาขององค์ชายจุน แต่ตอนนี้เพียงแค่ไม่กี่คำ พระนางซู่ก็ต้องการลดฐานะเธอให้เป็นเพียงสนมชั้นต่ำ! สนมกับเจ้าหญิงนั้นแตกต่างกันราวโลก แต่ฟู่จ้าวหนิงจะทำอย่างไรได้เมื่อไม่มีผู้มีอำนาจคอยสนับสนุน? ซ่งหยวนหลินหัวเราะเบาๆ และปรบมือพลางกล่าวว่า &quot;พระราชดำรัสของฝ่าบาทช่างยอดเยี่ยมจริงๆ!&quot; แม้ว่าเธอจะไม่พอใจที่เห็นใครบางคนอยู่เคียงข้างองค์ชายจุน แต่มันก็เป็นเพียงสนมชั้นต่ำ เธอไม่สนใจ!</p>\n<p>นอกจากนี้ การฆ่าสนมในภายหลังก็เป็นเรื่องง่ายๆ ไม่ใช่หรือ? แม้ว่าฟู่จ้าวหนิงจะยังไม่ได้พบพระนางซู่ แต่ใบหน้าของเธอยังคงถูกปกคลุมด้วยผ้าคลุมสีแดง เธอก็ได้สาปแช่งพระนางซู่ในใจไปแล้วสิบแปดครั้ง องค์ชายจุนดูเหมือนจะเป็นตัวปัญหา! แต่ในตอนนี้ เธอไม่มีทางออก พวกเขาต้องการให้เธอเป็นสนม? เธอจะปิดประตูนั้นเสีย!</p>\n<p>“ข้าเห็นด้วย” ฟู่จ้าวหนิงกล่าวอย่างชัดเจน เจ้าชายจุนขมวดคิ้ว “ในเมื่อข้าได้แต่งงานกับเจ้าแล้ว ข้าจะไม่ยอมให้เจ้าเป็นสนม เรื่องนี้...” “อาหยวน” จักรพรรดิขัดจังหวะเขา “นี่คือพระประสงค์ของจักรพรรดิผู้ทรงสละราชสมบัติ เจ้าคิดจะขัดขืนหรือ? จักรพรรดิผู้ทรงสละราชสมบัติทรงรักเจ้าที่สุด” เจ้าชายจุนกัดฟันในใจ เมื่อเห็นเขานิ่งเงียบ พระนางจึงตรัสว่า “เช่นนั้นก็แล้วแต่ พรุ่งนี้ทางวังจะส่งคนไปคุ้มกันคุณหนูฟู่ไปยังภูเขาลั่วเยว่ คุณหนูฟู่ เจ้าสามารถเข้าไปในภูเขาได้เพียงลำพัง และสมุนไพรสิบชนิดนั้นอย่างน้อยครึ่งหนึ่งต้องเป็นสมุนไพรหายาก ไม่ใช่สมุนไพรธรรมดาที่หาได้ทั่วไป มีปัญหาอะไรไหม?” ก่อนที่ฟู่จ้าวหนิงจะตอบ</p>\n<p>ซ่งหยวนหลินก็พูดขึ้นก่อน “นี่คือพระราชโองการของจักรพรรดิผู้สละราชสมบัติ ตกลงกันไว้แล้วว่านางต้องไปบนภูเขาเพียงลำพังเพื่อหาสมุนไพร ถ้านางไม่เห็นด้วย ก็จงออกไปให้เร็วที่สุด อย่ามาเกาะติดพี่หลานหยวนอย่างหน้าด้านๆ” “ข้าไม่มีปัญหา” ฟู่จ้าวหนิงกล่าว “เอาล่ะ ถือว่าวันนี้เป็นวันแต่งงานของเจ้าแล้วกัน ข้าขออวยพรให้นางฟู่ประสบความสำเร็จในการค้นหาสมุนไพรทั้งสิบชนิด และได้ดำรงตำแหน่งพระสนมเอกอย่างมั่นคง” พระนางซู่ทรงผ่อนคลายลงอย่างสิ้นเชิง “ส่งพระสนมเอกกลับไปที่ห้องหอ” องค์ชายจุนตรัสกับฟู่จ้าวหนิง “ค่ะ” ฟู่จ้าวหนิงถูกนำตัวไปยังห้องหอ การแต่งงานถือว่าเสร็จสมบูรณ์แล้ว และนางก็ได้เป็นพระสนมเอก</p>\n<p>แต่ในเมื่อพระนางซู่ทรงทำเช่นนี้ ตำแหน่งพระสนมเอกจึงยังคงไม่มั่นคงนัก หงจั่วและเฟินซิงสบตากัน ทั้งคู่รู้สึกว่าฟู่จ้าวหนิงคงตกใจและหวาดกลัวมาก ในฐานะนางกำนัล พวกเธอไม่รู้จะพูดอะไร แต่ทันใดนั้น ฟู่จ้าวหนิงก็พูดขึ้นมา “มีอะไรให้กินบ้างไหมคะ?</p>\n<p>ไปหาอะไรมาให้ข้ากินก่อน” ฟู่จ้าวหนิงอดทนมาจนถึงตอนนี้และรู้สึกเหมือนตัวเองกำลังจะอดตาย ก่อนที่จะจุติมาเกิด นางฟู่คงไม่ค่อยได้กินอะไรมากนัก และหลังจากความวุ่นวายมานานขนาดนี้ เธอก็หิวมากแล้ว เพราะความหิวโหย เธอจึงไม่มีเรี่ยวแรงที่จะพูดอะไรกับพระนางซูสีไทเฮาอีกต่อไป “ข้าจะไปเอาอาหารมาให้พระสนมเดี๋ยวนี้” เฟินซิงรีบหันหลังและเดินออกไป ฟู่จ้าวหนิงยกผ้าคลุมหน้าสีแดงขึ้นเองและถอนหายใจโล่งอก “พระสนม ไม่รอให้องค์ชายเสด็จมาแล้วใช้ตาชั่งเปิดผ้าคลุมหน้าก่อนหรือคะ?” หงจั่วตกใจ “พระองค์เปิดไปแล้วครั้งหนึ่งก่อนพิธีอภิเษกสมรส” ฟู่จ้าวหนิงพูดอย่างไม่ใส่ใจ เธอมองไปรอบๆ ห้องหอ ห้องนั้นกว้างขวาง เตียงก็ใหญ่เช่นกัน</p>\n<p>แกะสลักและประดับด้วยลูกปัด ผ้าห่มสีแดงปักลายเป็ดแมนดารินและใบบัวด้วยด้ายสีทองและสีแดง โรยด้วยถั่วลิสง พุทราแดง และลำไย เธอหยิบพุทราแดงสองลูกขึ้นมากินอย่างไม่ใส่ใจ “หวานดีทีเดียว” หงจั่วอ้าปาก แต่ไม่อยากพูดว่ากินไม่ได้ เพราะเจ้าหญิงทานไปแล้ว “หงจั่วรู้จักภูเขาลั่วเยว่ไหมคะ” คุณหนูฟู่เคยไปภูเขาลั่วเยว่มาแล้ว แต่ไม่กล้าไปไกลคนเดียว เธอแค่ไปหาสมุนไพรที่เชิงเขา 2 ครั้ง กลับมามือเปล่าทั้งสองครั้ง “ข้ารู้จัก ภูเขาลั่วเยว่มีเรื่องเล่ามากมาย” “ข้าไม่อยากฟังเรื่องเล่า บอกข้ามาว่ามันอันตรายแค่ไหน และคนแบบไหนที่มักจะไปที่นั่น” (บทนี้ยังไม่จบ โปรดคลิกหน้าถัดไปเพื่ออ่านเนื้อหาที่น่าตื่นเต้นต่อ!) “ค่ะ”</p>\n<p>“ภูเขาลั่วเยว่แบ่งออกเป็นสองส่วน มีหน้าผาอยู่ตรงกลางภูเขาแบ่งออกเป็นส่วนๆ ส่วนที่อยู่ใกล้เมืองหลวงเรียกว่าเนินเขาจันทร์บน และส่วนที่อยู่ลึกเข้าไปในภูเขาเรียกว่าหุบเขาจันทร์ล่าง เนินเขาจันทร์บนมีทิวทัศน์สวยงาม ผู้คนมากมายจึงไปเที่ยวเล่นที่นั่นเมื่ออากาศดี รวมถึงคนตัดไม้และนักล่าสัตว์” “แต่หุบเขาจันทร์ล่างนั้นเงียบสงบกว่ามาก ดูอันตรายจากอีกฟากหนึ่งของหน้าผา ดังนั้นโดยทั่วไปแล้วไม่มีใครกล้าไปที่นั่น” ฟู่จ้าวหนิงหยิบถั่วลิสงสองสามเม็ดจากเตียงแล้วใส่ปากทีละเม็ด ถามไปพลางว่า “ข้ามหน้าผาได้ง่ายไหมคะ?” “ไม่ยาก มีสะพานแขวนเชื่อมระหว่างเนินเขาจันทร์บนกับหุบเขาจันทร์ล่าง</p>\n<p>ผู้ที่มีทักษะการต่อสู้สามารถข้ามได้อย่างง่ายดาย แต่ฝ่าบาท…” หงจั่วจ้องมองฟู่จ้าวหนิงด้วยความกังวล “สะพานแขวนนั้นโยกเยกและน่าจะชำรุด แค่คิดก็รู้สึกอันตรายมากแล้ว” ฟู่จ้าวหนิงจะข้ามไปได้ไหม? เด็กผู้หญิงส่วนใหญ่คงกลัวสะพานแขวนนั้น ไม่ต้องพูดถึงการข้ามเลย แค่เห็นก็คงขาอ่อนแล้ว “มีใครเจอสมุนไพรบนเนินเขาจันทร์เสี้ยวบ้างไหม?” ฟู่จ้าวหนิงอยากรู้ หงจั่วคิดอยู่ครู่หนึ่ง “หมอในเมืองและคนจนบางคนก็ไปขุดสมุนไพรมาขาย พวกเขากล้าขึ้นไปบนเนินเขาซ่างเยว่ก็เจอแต่สมุนไพรทั่วไปอย่างหญ้านาและหญ้าลิ้นงู ข้าไม่เคยได้ยินว่าเจออย่างอื่น และก็ไม่มีหลายชนิดนัก” เฟินซิงรีบนำอาหารมาให้: ไข่หวานหนึ่งชามและลูกข้าวเหนียวเล็กๆ</p>\n<p>ทำจากข้าวเหนียวสอดไส้ถั่วลิสง หวาน เหนียว และอร่อยมาก “ฝ่าบาท ข้าถามคนในครัวแล้ว พวกเขาบอกว่าถึงจะมีสมุนไพรบนเนินเขาซ่างเยว่ ก็คงถูกเก็บไปหมดแล้ว” เฟินซิงกล่าวอย่างรีบร้อน</p>"}, "10": {"chapter_number": 10, "chapter_title": "第10章把她丟出去", "content": "<p>“ดูเหมือนว่าคงเป็นไปได้ยากที่จะหาสมุนไพรสิบชนิดบนเนินเขาซ่างเยว่” ฟู่จ้าวหนิงส่ายหัวและถอนหายใจ “คำนวณผิดไปแล้ว คำนวณผิดไปแล้ว” เธอไม่ได้คาดคิดว่าการเลือกองค์ชายจุนและการแต่งงานจะทำให้เกิดปัญหามากมายขนาดนี้ แต่เมื่อนึกถึงท่านผู้เฒ่าฟู่ เธอก็รู้สึกดีขึ้นทันที ก็แค่หาสมุนไพรไม่ใช่เหรอ? แม้จะไม่มีทุนทรัพย์ เธอก็ยังจะไปหาอยู่ดี สถานการณ์ของตระกูลฟู่ค่อนข้างยุ่งยาก ตอนนี้ไม่มีเงินเลย การซื้อสมุนไพรก็แพงเกินไป ถ้ามีสมุนไพรบนภูเขาลั่วเยว่ เธอน่าจะไปขุดมาเองได้ฟรีๆ เมื่อคิดเช่นนี้ ฟู่จ้าวหนิงก็สงบลงอีกครั้ง “ยาเม็ดพวกนี้อร่อยมาก” หงจั่วและเฟินซิงเป็นห่วงเธอเมื่อเห็นเธอสงบเช่นนี้</p>\n<p>ตอนนี้เธอดูเหมือนเจ้าหญิงที่ไร้ความเย่อหยิ่ง ไม่น่ากลัวเลย พวกเขาทุกคนหวังว่าฟู่จ้าวหนิงจะสามารถรักษาตำแหน่งภรรยาขององค์ชายจุนไว้ได้ ในห้องจัดงานแต่งงาน จักรพรรดิยังคงคิดที่จะถามเจ้าชายจุนเพิ่มเติม แต่พระพันปีหลวงรู้สึกเวียนหัวเล็กน้อย “ฝ่าบาท พระนางเจ้าข้า บางทีเราควรกลับวังกันดีกว่าไหม งานแต่งงานของอาหยวนจัดอย่างเร่งรีบ และไม่มีงานเลี้ยงฉลองด้วย” พระพันปีหลวงดูเหมือนจะไม่ค่อยพอใจที่จะอยู่ที่นี่ “นี่...” จักรพรรดิยังคงรู้สึกผิดเล็กน้อยที่งานแต่งงานของเจ้าชายจุนนั้นดูฟุ่มเฟือย และพวกเขาก็ทำไปเพียงตามพิธีการเท่านั้น “ฝ่าบาท” พระพันปีหลวงลุกขึ้นยืน “พระพันปีหลวงพูดถูกแล้ว ถ้าเราอยู่ที่นี่</p>\n<p>ทุกคนจะรู้สึกอึดอัด ทำไมเราไม่กลับก่อนล่ะ อีกสามวันใครจะรู้ว่าคนที่แต่งงานในวันนี้จะเป็นพระมเหสีเอกหรือสนม ถ้าหนูฟู่เป็นได้แค่สนมจริงๆ ก็ไม่ยุติธรรมเลยที่เราทุกคนต้องมาอยู่ที่นี่เพื่อเลือกสนมของเจ้าชายจุน เทียบกับการแต่งงานที่เหมาะสมในอนาคตของเจ้าหญิง” หลังจากพูดจบ พระพันปีหลวงก็หัวเราะเยาะอย่างเย็นชาในใจ นางมั่นใจอยู่แล้วว่าฟู่จ้าวหนิงคงทำภารกิจนั้นไม่สำเร็จแน่ ถ้าฟู่จ้าวหนิงไม่ตายบนภูเขาลั่วเยว่ นางก็คงได้แต่เป็นสนม!</p>\n<p>สนม? พระนางซึ่งเป็นพระมเหสีต้องมาอยู่ที่นี่เพื่อฉลองให้สนมด้วยหรือ? ใครกันที่อนุญาตให้นางมาอยู่ที่นี่? เมื่อได้ยินนางพูดเช่นนั้น จักรพรรดิก็ลุกขึ้นยืน “คำพูดของพระมเหสีฟังดูมีเหตุผล อาหยวน งั้นข้าขอตัวกลับวังก่อน” องค์ชายจุนโค้งคำนับเล็กน้อย “ดูแลท่านด้วย” จักรพรรดิขมวดคิ้ว พระองค์ควรจะพูดอะไรเกี่ยวกับการดูแลเขา?</p>\n<p>ทำไมพระองค์ถึงไม่พูดให้สุภาพอย่าง “ขอถวายความเคารพแด่จักรพรรดิ” เสียที? อาหยวนไม่ได้ถูกเลี้ยงดูในวังตั้งแต่ยังเล็ก มันไม่ดีเลยจริงๆ พระพันปี พระจักรพรรดิ และพระมเหสีสามารถกลับไปได้ แต่แขกที่มาฉลองกลับไม่กล้าไป หากไม่ใช่เพราะเงื่อนไขที่พระนางซูสีเพิ่งนึกขึ้นได้ จักรพรรดิและพระพันปีหลวงก็คงยังต้องประทับอยู่ที่นี่เพื่อดูแลเจ้าชายจุน ทำไม? เพราะเจ้าชายจุนทรงครอบครองโทเค็นยกเว้นโทษประหาร ดาบหลวง และตราประทับแห่งอาณาจักรจ้าว ซึ่งทั้งหมดนี้ได้รับพระราชทานเป็นพิเศษจากจักรพรรดิผู้ทรงสละราชสมบัติ ตราประทับแห่งอาณาจักรจ้าวมีอำนาจมหาศาล แม้แต่จักรพรรดิเองก็ต้องระมัดระวัง</p>\n<p>เพราะมันสามารถสั่งการหน่วยองครักษ์เงามังกรหลวงได้โดยตรง ซึ่งเป็นหน่วยองครักษ์ลับที่ทรงพลังที่สุดของราชวงศ์จ้าว เว้นแต่เจ้าชายจุนจะก่อการกบฏหรือความผิดร้ายแรงที่ทำให้ราชวงศ์เสื่อมเสีย และมีหลักฐานที่ชัดเจน จักรพรรดิก็ไม่สามารถเพิกถอนตราประทับแห่งอาณาจักรจ้าวได้ มิเช่นนั้นแล้ว การที่เจ้าชายจุนครอบครองตราประทับนี้ ก็จะเป็นเหมือนดาบที่แขวนอยู่เหนือพระเศียรของจักรพรรดิอยู่เสมอ แขกผู้มีไหวพริบเฉียบแหลมจึงก้าวออกมาแสดงความยินดี “ขอแสดงความยินดีกับการแต่งงานของเจ้าชายจุน!</p>\n<p>ขอให้ทั้งสองมีชีวิตที่ยืนยาวและมีความสุขร่วมกัน” “วันนี้เป็นเรื่องน่ายินดีอย่างยิ่ง! ขอแสดงความยินดีกับเจ้าชายจุน!” “เจ้าชายจุนดูเปล่งปลั่งสดใส เขาเป็นคนที่มีกำลังใจสูงจริงๆ” “ขอให้เจ้าชายจุนมีโอรสในเร็ววัน” ไม่ว่าฟู่จ้าวหนิงจะหาสมุนไพรสิบชนิดได้ภายในสามวันหรือไม่นั้นไม่ใช่เรื่องที่พวกเขาต้องกังวล พวกเขาได้ทำพิธีแต่งงานเสร็จสิ้นแล้ว และจนกว่าเจ้าชายจุนจะตรัส ฟู่จ้าวหนิงก็คือสนมของเขา ซ่งหยวนหลินไม่อยากจากไป แต่การได้ยินคนเหล่านี้อวยพรราวกับว่ามันเป็นเรื่องฟรีๆ ทำให้เธอรู้สึกไม่สบายใจ “ฮึ่ม คอยดูเถอะ! ฟู่จ้าวหนิงไม่คู่ควรแม้แต่จะเป็นสนม!” ซ่งหยวนหลินกัดฟัน กระทืบเท้า</p>\n<p>และเบียดเข้าไปข้างเจ้าชายจุน “พี่หลานหยวน ฉันไม่รู้ว่าท่านหลงรักฟู่จ้าวหนิงมากขนาดนี้ได้อย่างไร แต่ท่านต้องมีสติ คืนนี้ท่านห้ามนอนกับนาง—” ก่อนที่เธอจะพูดจบ เจ้าชายจุนก็ขัดจังหวะเธอ “ซ่งหยวนหลิน” เสียงของเขาเย็นชา “ข้าไม่เคยอนุญาตให้เจ้าเรียกข้าแบบนั้น เจ้าเรียกข้าว่าองค์ชายจุนเหมือนคนอื่นๆ ก็ได้ หรือถ้าไม่ได้ ก็เรียกข้าว่าฝ่าบาทก็ได้ ความสัมพันธ์ของเราไม่ได้ใกล้ชิดขนาดนั้น” “พี่หลานหยวน...” ซ่งหยวนหลินมองเขาด้วยความไม่เชื่อ “ชิงอี้ ไล่เธอออกไป” เมื่อเห็นว่าเธอไม่มีท่าทีสำนึกผิด องค์ชายจุนจึงไม่เสียเวลาพูดกับเธอและเรียกชิงอี้มาทันที ชิงอี้รีบมาและเอื้อมมือไปจับซ่งหยวนหลิน</p>\n<p>ซ่งหยวนหลินทั้งกังวลและโกรธ แต่เมื่อเห็นว่าองค์ชายจุนไม่มีความเมตตา เขาก็เลยสั่งให้ชิงอี้ไล่เธอออกไปจริงๆ!</p>\n<p>“ข้าจะไปเอง!” เพื่อรักษาศักดิ์ศรีสุดท้ายของเธอ ซ่งหยวนหลินจึงเดินอย่างหนักหน่วงและโกรธจัด หันหลังและออกจากวังไป หลังจากจากไป ซ่งหยวนหลินหันกลับไปมองประตูวังขององค์ชายจุน กัดฟันพูดด้วยความเกลียดชังว่า “ฟู่จ้าวหนิง ทั้งหมดเป็นเพราะเจ้า! รอเดี๋ยว ข้าจะทำให้เจ้าตายบนภูเขาลั่วเยว่!” ความตายที่น่าสยดสยอง! แม้ว่าพี่หลานหยวนจะไม่ค่อยสนใจเธอมาก่อน แต่เขาก็ไม่เคยแสดงความเคารพเธอแบบนี้มาก่อนเลย ถึงขั้นพยายามให้ทหารไล่เธอออกไป! พี่หลานหยวนช่างใจร้ายเหลือเกิน ต้องเป็นเพราะฟู่จ้าวหนิงแน่ๆ ซ่งหยวนหลินหันหลังกลับด้วยความโกรธ เธอต้องจัดการทุกอย่างทันที ในอีกสามวันข้างหน้า</p>\n<p>เธอจะทำให้แน่ใจว่าฟู่จ้าวหนิงจะได้พบกับประสบการณ์ที่เลวร้ายและน่าเศร้าก่อนตาย แขกทุกคนต่างรู้สึกกระวนกระวายใจเมื่อเห็นท่าทีเย็นชาขององค์ชายจุนที่มีต่อซ่งหยวนหลิน พนักงานเสิร์ฟรีบวิ่งมา “ฝ่าบาท งานเลี้ยงฉลองสมรสพร้อมแล้ว” “เชิญแขกทุกท่านเข้าที่นั่ง” องค์ชายจุนกล่าว “เชิญแขกผู้มีเกียรติทุกท่าน เชิญรับประทานอาหารและเครื่องดื่มในคืนนี้ ที่พำนักขององค์ชายจุนได้เตรียมเหล้าชั้นเลิศชนิดหนึ่งชื่อ หยุนเนียนเจิ้นเหนียง ไว้ให้รับประทาน” คนรับใช้เชิญแขกทุกท่านไปยังห้องโถงดอกไม้ เมื่อได้ยินคำว่า “หยุนเนียนเจิ้นเหนียง” ทุกคนต่างตกใจ “เหล้าชั้นเลิศที่สุดของตระกูลหยุนหรือ?</p>\n<p>นับตั้งแต่ตระกูลหยุนล่มสลายไป เหล้าหยุนเนียนเจิ้นเหนียงหนึ่งเหยือกมีราคาสูงถึงหลายหมื่นตำลึง!” ผู้เชี่ยวชาญด้านไวน์คนหนึ่งรีบกล่าวขึ้น “จริงอยู่ที่เหยือกหนึ่งราคาหมื่นตำลึง แต่มันมีค่าเกินกว่าจะประเมินราคาได้ ไม่มีใครสามารถซื้อหยุนเนียนเจิ้นเหนียงได้หรอก” นี่เป็นสถานการณ์ที่น่าเจ็บปวดสำหรับผู้ที่ชื่นชอบการดื่ม มีรสนิยมสูง และให้ความสำคัญกับชื่อเสียง ทุกๆ เทศกาลไหว้พระจันทร์หรือปีใหม่ เมื่อทุกคนดื่มกันอย่างสนุกสนาน ก็มักจะมีคนพูดถึงหยุนเนียนเจิ้นเหนียงขึ้นมาเสมอ ไม่มีใครคาดคิดว่าวันนี้ที่ประทับขององค์ชายจุนจะนำเหล้าหยุนเนียนเจิ้นเหนียงออกมา! ในงานเลี้ยงฉลองสมรส เมื่อเห็นนางกำนัลนำเหล้าสามเหยือกออกมา ทุกคนต่างตกตะลึง “ไม่ใช่แค่เหยือกเดียว ไม่ใช่แค่เหยือกเดียว!” องค์ชายจุนนำเหล้าหยุนเนียนเจิ้นเหนียงออกมาสามเหยือกในคราวเดียว—ช่างใจกว้างเหลือเกิน!</p>\n<p>เหล้าสามเหยือกนี้ทำให้บรรยากาศในงานเลี้ยงครึกครื้นขึ้นทันที ทุกคนต่างมีความสุข และคำอวยพรก็จริงใจยิ่งขึ้น อย่างไรก็ตาม ไม่มีใครกล้าชนแก้วกับองค์ชายจุนหรือชักชวนให้เขาดื่ม เพราะทุกคนรู้ว่าองค์ชายจุนนั้นอ่อนแอและเจ็บป่วยมาตั้งแต่เด็ก และใช้เวลาหลายปีพักฟื้นอยู่ไกลบ้าน “ส่งเหล้าไปให้ฟู่จ้าวหนิงลองชิมสักแก้วสิ ตอนนี้นางเป็นราชินีของข้าแล้ว แขกทุกคนเคยดื่มเหล้าอันล้ำค่าของหยุนเนียนมาแล้ว นางน่าจะรู้รสชาติบ้าง” องค์ชายจุนครุ่นคิดอยู่ครู่หนึ่ง “ครับ” เหล้าองุ่นหนึ่งกาเล็ก ๆ ถูกนำมาที่ห้องหอ หงจั่วรินเหล้าให้ฟู่จ้าวหนิง และเมื่อฟู่จ้าวหนิงได้กลิ่นหอมก็อุทานว่า &quot;เอ๊ะ!&quot;</p>"}, "11": {"chapter_number": 11, "chapter_title": "第11章藏了個寂寞", "content": "<p>“เหล้าชนิดนี้...” “ฝ่าบาท องค์ชายทรงโปรดปรานฝ่าบาทอย่างแน่นอน” หงจั่วและเฟินซิงตื่นเต้นมาก แอบยิ้มขณะมองฟู่จ้าวหนิง “นี่คือเหล้าหายากของหยุนเนียน ขวดหนึ่งราคากว่าหมื่นตำลึงเงิน และองค์ชายยังทรงระลึกถึงการส่งขวดเล็กๆ มาให้ฝ่าบาทด้วย” ฟู่จ้าวหนิงรับเหล้ามาจิบเล็กน้อยก่อนจะดื่มรวดเดียวหมด เมื่อเห็นนางดื่มอย่างกล้าหาญเช่นนั้น สาวใช้ทั้งสองก็ตกตะลึง “นี่คือเหล้าสมุนไพร” ฟู่จ้าวหนิงกล่าวพลางลิ้มรส “ใช่ หยุนเนียนเจิ้นเหนียงไม่เพียงแต่มีรสชาติเข้มข้น กลมกล่อม หวานสดชื่น และรสชาติที่ติดตรึงใจไม่รู้จบ แต่ยังประกอบด้วยสมุนไพรถึงเก้าชนิด หลายคนได้ทำการวิจัยหยุนเนียนเจิ้นเหนียงมาหลายปีแล้ว</p>\n<p>และระบุได้เจ็ดชนิด แต่ยังไม่มีใครสามารถระบุอีกสองชนิดที่เหลือได้ เหล้าที่ได้จึงมีรสชาติไม่เหมือนใคร” หงจั่วได้กลิ่นหอมของเหล้าองุ่นจึงพูดต่อว่า “นี่แหละคือเหตุผลที่เหล้าองุ่นนี้แพงและหายาก” เฟินซิงกล่าวว่า “ฝ่าบาท เหล้าองุ่นนี้มีคุณค่าทางโภชนาการสูง ไม่ทำให้มึนเมา และไม่ทำให้ปวดหัว ฝ่าบาทดื่มได้อีกสักสองแก้ว” ฟู่จ้าวหนิงถามว่า “พวกเจ้าจะดื่มหรือ” หงจั่วและเฟินซิงรีบโบกมือ “นี่เป็นของที่องค์ชายมอบให้ฝ่าบาทโดยเฉพาะ พวกเราดื่มไม่ได้” “ฝ่าบาท ตอนนี้พวกเราดื่มเหล้าไม่ได้ค่ะ” เมื่อเห็นท่าทีประหม่า ฟู่จ้าวหนิงจึงไม่บังคับ ที่ประทับขององค์ชายต้องมีกฎระเบียบ ฟู่จ้าวหนิงดื่มเหล้าแก้วที่สองรวดเดียวหมด</p>\n<p>ดวงตาเป็นประกาย เธอรู้แล้วว่าสมุนไพรทั้งเก้าชนิดในเหล้าองุ่นนี้คืออะไร! เธอจะสามารถปรุงเหล้าองุ่นชั้นเลิศของหยุนเนียนได้!</p>\n<p>ด้วยวิธีนี้ เธอจะรู้ว่าจะหาเงินก้อนแรกได้จากที่ไหน แต่ก่อนอื่น เธอต้องหาสมุนไพรทั้งเก้าชนิดนั้นให้เจอก่อน จังหวะเหมาะเจาะพอดี เธอสามารถไปที่ภูเขาลั่วเยว่เพื่อตามหาพวกเขาได้ภายในสามวันข้างหน้า แม้ว่าอาการของจักรพรรดิผู้สละราชสมบัติจะไม่ชัดเจน เธอก็ตั้งใจที่จะไปที่ภูเขาลั่วเยว่ด้วยพระองค์เอง งานเลี้ยงแต่งงานคึกคักอย่างเหลือเชื่อด้วยเหล้าอันล้ำค่าของหยุนเนียน โดยเฉพาะหลังจากที่องค์ชายจุนจากไป เมื่อมีพระองค์อยู่ ทุกคนรู้สึกอึดอัดและกดดันเล็กน้อย เมื่อมีพระองค์จากไป ทุกคนก็ลืมทุกสิ่งทุกอย่างไปชั่วขณะและมุ่งความสนใจไปที่การดื่มเหล้า องค์ชายจุน เซียวหลานหยวน กลับไปที่ห้องทำงานของพระองค์</p>\n<p>ชิงอี้ตามพระองค์เข้าไป ลังเลอยู่ครู่หนึ่ง แล้วถามว่า “ท่านอาจารย์ คืนนี้ท่านจะพักที่ไหนคะ?” งานแต่งงานขององค์ชายจุนถูกจัดขึ้นอย่างเร่งรีบเกินไป เมื่อข่าวมาถึงพระองค์ พระองค์ยังไม่ทันได้อธิบายอย่างชัดเจน ขุนพลได้ตกแต่งลานบ้านของพระองค์ให้เป็นห้องหอ และตอนนี้เจ้าสาว ฟู่จ้าวหนิง ซึ่งมีสถานะค่อนข้างลำบาก ก็มาอยู่ที่นั่นแล้ว เขาควรจะไล่เธอออกไปอีกหรือไม่? องค์ชายจุนขมวดคิ้วและถอดหน้ากากออก ถึงแม้ว่ารอยแผลเป็นบนใบหน้าของเขาจะอยู่มานานแล้ว แต่หลังจากสวมหน้ากากไปสักพักมันก็จะคันและเจ็บ และถ้าเขาอดใจไม่ไหวที่จะเกา รอยแผลเป็นก็จะเน่าและติดเชื้อ เขาคิดถึงปัญหานี้ไว้แล้วเช่นกัน</p>\n<p>“ให้ใครสักคนเตรียมลานบ้านให้เธอ” เซียวหลานหยวนไม่ได้ตั้งใจจะนอนร่วมห้องกับฟู่จ้าวหนิง และไม่ได้ตั้งใจจะร่วมหลับนอนกับเธอด้วย “ครับ แต่เกรงว่าวันนี้จะสายเกินไปแล้ว” ชิงอี้เหลือบมองท้องฟ้า คฤหาสน์วุ่นวายมาเกือบทั้งวันแล้ว และตอนนี้งานเลี้ยงแต่งงานเพิ่งจะจบลง คนรับใช้ยังต้องดูแลงานเลี้ยง และต้องทำความสะอาดหลังจากส่งแขกกลับไปแล้ว กว่าจะเตรียมห้องให้ฟู่จ้าวหนิงเสร็จก็คงมืดแล้ว เซียวหลานหยวนเหลือบมองเขา “ท่านได้ให้ใครสักคนไปสืบประวัติตระกูลฟู่แล้วหรือยัง” ฟู่จ้าวหนิงคนนี้แตกต่างจากคุณหนูฟู่ที่พวกเขาเคยได้ยินมาอย่างสิ้นเชิง “ข้าสืบแล้วครับ” เซียวหลานหยวนกำลังจัดการเรื่องเหล่านี้อยู่ในห้องทำงาน</p>\n<p>แต่ฟู่จ้าวหนิงรออยู่นานโดยไม่เห็นเขามา เมื่อความมืดมาเยือน เทียนสีแดงอีกสองเล่มก็ถูกจุดขึ้นในห้องหอ หงจั่วและเฟินซิงออกไปตรวจสอบ และแขกทุกคนก็กลับไปหมดแล้ว แต่องค์ชายจุนยังไม่ปรากฏตัว ฟู่จ้าวหนิงรอไม่ไหวอีกต่อไป “องค์ชายยังอยู่ในห้องโถงหรือคะ?” เฟินซิงส่ายหัว “ฉันเพิ่งไปดูมา องค์ชายออกจากงานเลี้ยงไปนานแล้วค่ะ” “ฉันก็คิดอย่างนั้นเหมือนกัน จะไปดื่มกับแขกในสภาพที่แข็งแรงแบบนี้ได้ยังไง!” ฟู่จ้าวหนิงลุกขึ้นยืน “แล้วเขาอยู่ที่ไหนล่ะคะ?” องค์หญิงกำลังเร่งให้องค์ชายมาดื่มฉลองหรือเปล่า?</p>\n<p>“เรื่องนี้ฉันก็ไม่รู้เหมือนกัน” พวกเขาไม่กล้าถามถึงที่อยู่ขององค์ชาย ฟู่จ้าวหนิงมองไปบนฟ้าและตัดสินใจว่าเธอรอไม่ไหวอีกต่อไปแล้ว เธอจึงเปิดประตูและออกไป “องค์หญิง!” เฟินซิงและหงจั่วรีบตามมา ฟู่จ้าวหนิงถูกช่วยพยุงเข้าไปในลานบ้านโดยมีผ้าคลุมหน้า ทำให้เธอมองไม่เห็นอะไรชัดเจนมาก่อน แต่เมื่อออกมาแล้ว เธอก็รู้ว่าลานบ้านนั้นกว้างใหญ่มาก มีแปลงดอกไม้สวยงาม ทางเดินหินสีฟ้า และกอไผ่และต้นกล้วยสีเขียวอยู่ทั่วทุกหนทุกแห่ง ศาลาหลังหนึ่งโผล่ออกมาจากมุมหนึ่ง เชื่อมต่อกับทางเดินยาวที่นำไปสู่ห้องปีกอีกด้านหนึ่ง โคมไฟสีแดงแขวนอยู่ในลานบ้าน ประดับด้วยริบบิ้นสีแดงอย่างสวยงาม แต่กลับว่างเปล่าอย่างสิ้นเชิง</p>\n<p>ฟู่จ้าวหนิงคิดว่าที่ประทับขององค์ชายจุนคงเลือกลานบ้านใดก็ได้มาตกแต่งห้องหอ แต่ตอนนี้ดูเหมือนว่านี่จะเป็นห้องนอนขององค์ชายจุนเสียแล้ว? เธอเห็นผู้คนหลังจากออกจากลานบ้าน แต่ไม่เห็นตัวเอง เธอพบว่ามีทหารยามซ่อนตัวอยู่ในเงามืด ทหารยามสองคนนั้นมีหน้าที่เฝ้าห้องนอนขององค์ชายจุน พวกเขาซ่อนตัวได้ดีมาก และนอกจากองค์ชายและชิงอี้แล้ว ก็ไม่มีใครสังเกตเห็นพวกเขาเลย อย่างไรก็ตาม พวกเขาเห็นฟู่จ้าวหนิงเดินตรงมาที่ซ่อนของพวกเขา ยาม A: &quot;...&quot; &quot;ยามหนุ่ม&quot; ฟู่จ้าวหนิงผลักพุ่มต้นกล้วยที่บังตัวเขาออกไปแล้วถามว่า &quot;เจ้ารู้ไหมว่าองค์ชายจุนอยู่ที่ไหน?&quot; ยาม A งุนงงไปหมด พูดไม่ออกในทันที</p>\n<p>ยิ่งไปกว่านั้น ฟู่จ้าวหนิงสวยงามมากอยู่แล้ว และตอนนี้ในชุดเจ้าสาว ใบหน้าของเธอยิ่งเปล่งประกายและน่าหลงใหลมากขึ้นไปอีก การที่ใบหน้าสดใสเช่นนี้ปรากฏขึ้นตรงหน้าเขาอย่างกะทันหันนั้นทำให้เขาตะลึงงัน เมื่อเห็นว่าเขาไม่มีปฏิกิริยาใดๆ ฟู่จ้าวหนิงจึงคิดว่าเขาไม่รู้ว่าองค์ชายจุนอยู่ที่ไหน เธอจึงถอนหายใจและชี้ไปที่ยาม B &quot;ถ้าเจ้าไม่รู้ ข้าจะไปถามชายหนุ่มคนนั้นเอง&quot; ยาม B ซึ่งถูกชี้ตำแหน่งซ่อนอย่างแม่นยำนั้นพูดไม่ออก อย่าเข้ามาใกล้กว่านี้!</p>\n<p>ฟู่จ้าวหนิงเดินตรงมาหาเขาแล้ว เมื่อเงยหน้าขึ้น ยาม B กำลังนอนครึ่งตัวอยู่บนโขดหิน เสื้อผ้าของเขากลมกลืนไปกับโขดหินอย่างแนบเนียน เขาสามารถยืนนิ่งๆ ได้ และเหล่าข้ารับใช้ที่เดินผ่านไปมาหลายคนก็ไม่ทันสังเกตเห็นเขา แต่ฟู่จ้าวหนิงกลับเห็นเขาในทันทีโดยไม่ต้องมองเลยด้วยซ้ำ เมื่อมองลงไปที่ใบหน้าของฟู่จ้าวหนิงที่เงยขึ้น ยามบีก็หน้าแดง พวกเขาติดตามองค์ชายจุนไปยังยอดเขาโย่วชิงตลอดทั้งปี แทบจะไม่เคยเห็นแม้แต่ยุงตัวเมียเลย และค่อนข้างไร้เดียงสา “ท่านทราบหรือไม่ว่าองค์ชายจุนอยู่ที่ไหน ข้ามีธุระด่วนกับพระองค์” ข้ารับใช้บังเอิญเห็นเหตุการณ์นี้เมื่อเขามาถึง หัวใจของเขาเต้นแรง และเขาก็รีบเดินเข้าไปหา “ฝ่าบาท!”</p>\n<p>“ท่านคงเป็นข้ารับใช้สินะ” ฟู่จ้าวหนิงจำเสียงของเขาได้ “มาได้จังหวะพอดี องค์ชายจุนอยู่ที่ไหน” ข้ารับใช้จำคำสั่งขององค์ชายจุนได้ “องค์ชายจุนมีธุระราชการต้องทำคืนนี้” เมื่อได้ยินเช่นนั้น ฟู่จ้าวหนิงก็เข้าใจ องค์ชายจุนไม่ต้องการพบเธอ “พระองค์ยุ่งอยู่กับธุระ แต่ข้าอยากกลับไปที่ตระกูลฟู่ ท่านช่วยจัดรถม้าให้หน่อยได้ไหม” ฟู่จ้าวหนิงไม่ได้ยืนกรานที่จะพบองค์ชายจุน</p>"}, "12": {"chapter_number": 12, "chapter_title": "第12章她是不是瘋了", "content": "<p>คนรับใช้ตกตะลึง คืนวันแต่งงานมืดแล้ว เจ้าสาวกำลังจะกลับบ้านพ่อแม่หรือ? &quot;ฝ่าบาท เรื่องนี้ไม่เหมาะสม หากท่านประสงค์จะกลับ วันเสด็จกลับคืออีกสามวัน...&quot; &quot;ฉันรอไม่ไหวแล้ว&quot; ฟู่จ้าวหนิงรู้สึกหัวใจเต้นแรง เธอไม่มีเวลาพูดอะไรต่อ หันไปหาหงจั่วและเฟินซิง &quot;คอกม้าอยู่ที่ไหน?&quot; แม้ว่าสาวใช้ทั้งสองจะไม่เข้าใจว่าเธอกำลังทำอะไร แต่เมื่อได้ยินน้ำเสียงที่กังวล พวกเธอก็ชี้ไปทางนั้นโดยสัญชาตญาณ &quot;ทางนั้น...&quot; ฟู่จ้าวหนิงรีบยกกระโปรงขึ้นแล้ววิ่งไปทางนั้น &quot;ฝ่าบาท ฝ่าบาท!&quot; เฟินซิงและหงจั่วตกใจและรีบวิ่งตามเธอไป คนรับใช้ได้สติและรีบสั่งทหารองครักษ์ว่า &quot;ไปรายงานองค์รัชทายาท&quot; เขาเองก็วิ่งตามฟู่จ้าวหนิงไปเช่นกัน เธอกำลังทำอะไรกันแน่?</p>\n<p>ฟู่จ้าวหนิงวิ่งเร็วมาก แต่คฤหาสน์ขององค์ชายนั้นใหญ่โตเกินไป กว่าจะถึงคอกม้าก็มืดค่ำแล้ว เด็กเลี้ยงม้าตกใจ “เจ้า...” “ยืมม้าหน่อย!” หัวใจของฟู่จ้าวหนิงเต้นแรงขึ้นกว่าเดิม เธอไม่สนใจเขา เหลือบมองม้าสีแดงตัวหนึ่งแล้วรีบวิ่งไปปลดบังเหียนออก ใบหน้าของคนรับใช้เปลี่ยนไป เขาร้องออกมาด้วยความตกใจ “อย่าแตะต้องม้าตัวนั้น! มันเป็นม้าป่าที่ไม่เชื่อง!” มันอาจจะเตะคนตายได้ถ้าไม่ระวัง! ม้าตัวนี้ไม่เคยถูกฝึกเลยตั้งแต่ถูกนำกลับมา และไม่มีใครในคฤหาสน์กล้าเข้าใกล้ มันเกือบตายตอนไปให้อาหาร แต่เขาก็ร้องไม่ทัน ฟู่จ้าวหนิงหัวใจเต้นแรงจนสติว่างเปล่า แต่ในใจลึกๆ เหมือนมีเสียงบอกให้เธอรีบกลับไป รีบกลับไป</p>\n<p>ม้าสีแดงเพลิงร้องเสียงดัง พอได้ยินเสียงนี้ คนรับใช้ที่ก่อนหน้านี้มีความรู้สึกไม่ชอบเสียงนี้ ก็หันหลังวิ่งไปขอความช่วยเหลือ “ใครก็ได้ เร็วเข้า!” เขาไม่สามารถปราบม้าป่าตัวนี้ได้ด้วยตัวเอง มีเพียงองครักษ์ฝีมือดีเท่านั้นที่จะทำได้ เจ้าชายจุนได้ยินรายงานจากองครักษ์แล้วว่าฟู่จ้าวหนิงต้องการกลับไปยังตระกูลฟู่ในเวลานี้ ทันใดนั้นก็มีคนวิ่งเข้ามาด้วยฝีเท้าที่ว่องไว พูดด้วยความกังวลว่า “ท่านอาจารย์ เจ้าหญิงต้องการม้าป่าตัวนั้น!” “นางบ้าไปแล้ว!” เจ้าชายจุนลุกขึ้นยืนอย่างกะทันหัน ร่างของเขาหายไปอย่างรวดเร็วราวกับผี ม้าป่าตัวนั้นได้มาด้วยความยากลำบาก เขาให้คุณค่ากับความดุร้ายและความภาคภูมิใจในปัจจุบันของมัน</p>\n<p>รวมถึงสายเลือดบริสุทธิ์ของมันด้วย เมื่อฝึกแล้ว มันจะเป็นม้าศึกที่แข็งแกร่งและทรงพลัง แต่ตอนนี้มันยังไม่ถูกฝึก!</p>\n<p>ธรรมชาติที่ดุร้ายของม้าตัวนี้ยังไม่ถูกฝึก และมันก้าวร้าวมาก ฟู่จ้าวหนิงอาจกำลังหาเรื่องตายอยู่ก็ได้ ที่คอกม้า ฟู่จ้าวหนิงสังเกตเห็นความดุร้ายของม้าตัวนี้ตั้งแต่แรกเห็นแล้ว แต่เธอไม่มีเวลาเลือกม้าตัวอื่น นอกจากนี้ นี่เป็นม้าตัวเดียวที่ดึงดูดสายตาเธอตั้งแต่แรกเห็น บางทีอาจมีเพียงม้าตัวนี้เท่านั้นที่วิ่งเร็วพอ! ม้ายังไม่ได้ใส่บังเหียน ฟู่จ้าวหนิงรีบวิ่งเข้าไปและเอื้อมมือไปสัมผัสคอของมัน ทันทีที่ม้าเริ่มขยับตัว เธอก็รีบขึ้นขี่ เอื้อมมือไปลูบคอมันอีกครั้ง ตัวเธอโน้มลงเล็กน้อย “เป็นเด็กดี ฟังฉันนะ ฉันต้องการความช่วยเหลือ” ม้าพ่นลมหายใจออกมา กีบหน้ากระโดด และพุ่งออกจากคอก “ฮี้!” “เด็กดี ไป!”</p>\n<p>ทันทีที่คนดูแลคอกม้าตะโกนขอความช่วยเหลือ ม้าที่กระฉับกระเฉงก็วิ่งผ่านพวกเขาไปแล้ว โดยแบกฟู่จ้าวหนิงไปด้วย ทำให้เกิดลมพัดแรงจนแสบตา “หยุด!” เสียงของยามสั่นเครือ องค์ชายจุนมาถึงช้าเกินไป ทันใดนั้นก็เห็นด้านหลังของฟู่จ้าวหนิง ในยามพลบค่ำ ลมเย็นสบาย เธอขี่ม้าสีแดงฉาน ผมสีดำดุจปุยเมฆ ชุดแต่งงานพลิ้วไหวตามลม กระโปรงบานกว้างเน้นเอวคอดของเธอ เธอเร่งม้าไปข้างหน้าแล้ว “ฝ่าบาท!” ชิงอี้รีบวิ่งเข้ามาเห็นเหตุการณ์นั้น ใบหน้าซีดเผือดด้วยความตกใจ “ฝ่าบาท เจ้าหญิงขี่ม้าเป็นด้วย!” “ม้าตัวนั้นไม่มีอานด้วยซ้ำ!” ฟู่จ้าวหนิงขี่ได้เร็วมาก มองจากด้านหลังแล้ว เธอทรงตัวได้อย่างมั่นคง</p>\n<p>แสดงว่าทักษะการขี่ม้าของเธอนั้นยอดเยี่ยม!</p>\n<p>ฟู่จ้าวหนิงคนนี้ใช่คนเดียวกับที่พวกเขาเคยได้ยินมาหรือเปล่า? “เตรียมรถม้า” องค์ชายจุนกัดฟัน ตอนนี้ฟู่จ้าวหนิงแทบจะเป็นเจ้าหญิงของเขาแล้ว และวันนี้เป็นวันแต่งงาน หากเกิดอะไรขึ้นกับเธอข้างนอก เขาคงหนีความรับผิดชอบไปไม่ได้ ยิ่งไปกว่านั้น พรุ่งนี้เธอจะไปที่ภูเขาลั่วเยว่ และวันนี้เธอก็ได้ให้คำมั่นสัญญากับฮ่องเต้ไว้แล้วด้วย ถ้าเกิดอะไรขึ้นแล้วเธอไปไม่ได้ในวันพรุ่งนี้ พระราชินีจะต้องกล่าวหาว่าเธอหลอกลวงจักรพรรดิอย่างแน่นอน เขาไม่มีทางเลือกอื่นนอกจากต้องตามเธอไป ฟู่จ้าวหนิงควบม้าอย่างรวดเร็วไปตามถนนสายยาว ก่อนที่ผู้คนบนถนนจะทันเห็นว่าเป็นใคร เธอก็หายไปแล้ว เธออาศัยความทรงจำมาถึงบ้านตระกูลฟู่ในที่สุด</p>\n<p>เธอเคยได้ยินมาว่าตระกูลฟู่เคยเป็นตระกูลที่มีชื่อเสียงมาก สร้างความเจริญรุ่งเรืองให้กับตระกูลทั้งหมด ท่านฟู่ผู้เฒ่าเคยมีผู้คนมากมายรายล้อม และหลานๆ กับญาติๆ ต่างก็ให้ความเคารพและนับถืออย่างสูงสุด อย่างไรก็ตาม ตระกูลฟู่ประสบกับความโชคร้ายเมื่อกว่าสิบปีที่แล้ว เสื่อมถอยลงอย่างรวดเร็ว ภายในไม่กี่ปี ทรัพย์สินมหาศาลของพวกเขาก็ถูกขายไป และคนในตระกูลก็ตัดขาดความสัมพันธ์กับครอบครัว ท่านฟู่ผู้เฒ่ายังคงอาศัยอยู่ในคฤหาสน์หลังใหญ่สไตล์สวน แต่ลานบ้านส่วนใหญ่ถูกคนในตระกูลเข้าไปอยู่อาศัยด้วยเหตุผลต่างๆ ท่านนายฟู่ผู้เฒ่า พร้อมด้วยฟู่จ้าวหนิง ได้ย้ายไปอยู่ที่ลานบ้านเรียบง่ายใกล้ประตูหลัง</p>\n<p>พวกเขาเข้าออกทางประตูหลัง ไม่ใช่ประตูหลัก ฟู่จ้าวหนิงขี่ม้ามาถึงประตูหลังแล้ว เธอรีบลงจากม้าและวิ่งไปเคาะประตูเสียงดังปังๆๆ หลังจากเคาะอยู่พักหนึ่งก็ไม่มีใครมาเปิดประตู ทำให้ฟู่จ้าวหนิงรู้สึกใจหาย ท่านนายฟู่ยังมีคนรับใช้หลายคน ได้แก่ คู่สามีภรรยาที่รับใช้เขามาหลายปี ลูกชายของพวกเขาก็รับใช้ในตระกูลฟู่ และสาวใช้ชื่อเสี่ยวเถาที่อยู่กับเขา แต่เพราะเธอรีบร้อนที่จะแต่งงานเข้าวังองค์ชายเสี่ยว ท่านนายฟู่จึงไม่มีคนรับใช้เพียงพอ จึงต้องเก็บเสี่ยวเถาไว้ด้วย บ้านของพวกเขาอยู่ใกล้ประตูหลังมาก และลุงจงคนรับใช้ชราก็มักจะมาเฝ้าบ้าน เธอเคาะประตูเสียงดังมาก ลุงจงที่เดินตรวจตราบ่อยๆ ย่อมได้ยินเสียงเธออย่างแน่นอน</p>\n<p>ปกติเขาจะมาเปิดประตูให้ตรงเวลาเสมอ ทำไมตอนนี้ถึงไม่มีเสียงตอบรับเลยล่ะ?</p>\n<p>ฟู่จ้าวหนิงหันไปหาม้าที่กระฉับกระเฉงแล้วเรียก “มานี่ ฉันต้องการความช่วยเหลือ” ม้าก็เดินมาหา ฟู่จ้าวหนิงสั่งให้ม้าไปยืนข้างกำแพงบ้าน จากนั้นก็ปีนขึ้นไปบนหลังม้าและยืนขึ้น ม้าตัวสูงและแข็งแรง ขนเงางามเรียบลื่น แต่เธอก็สามารถยืนบนหลังม้าได้อย่างมั่นคง กระโดดขึ้นไปและปีนกำแพงอย่างคล่องแคล่ว เธอกระโดดลงมา จากนั้นก็รีบเปิดประตูและจูงม้าเข้าไปข้างใน นี่คือม้าขององค์ชายจุน เธอจะปล่อยให้มันหายไปไม่ได้ หลังจากปิดประตูแล้ว ฟู่จ้าวหนิงก็รีบไปยังบ้านของท่านฟู่ บริเวณนั้นเงียบสงบ ไม่มีแสงไฟ บ้านสองหลังตั้งอยู่ติดกัน หนึ่งหลังเป็นบ้านของท่านฟู่และครอบครัวของลุงจงที่มีสมาชิกสามคน</p>\n<p>และอีกหลังเป็นบ้านของเธอและเสี่ยวเถา บ้านของเธอและเสี่ยวเถามืดสนิทในเวลานี้ แต่มีแสงไฟสลัวๆ อยู่ในบ้านของท่านฟู่ ฟู่จ้าวหนิงวิ่งเข้ามา และเมื่อเข้าใกล้ก็ได้ยินเสียงพูดคุยดังมาจากลานบ้าน “ลุงคะ อยากออกไปฟังหน่อยไหมคะ ว่าในเมืองหลวงเขาพูดถึงจ้าวหนิงกันยังไงบ้าง”</p>"}, "13": {"chapter_number": 13, "chapter_title": "第13章祖父吐血了", "content": "<p>“คุณหญิงคนที่สอง โปรดหยุดเถอะ! คุณชายหายใจแทบไม่ออกแล้ว!” เสียงสะอื้นของหญิงสาวนั้นน่าเวทนา “หญิงชั่วช้า เจ้ากำลังสาปแช่งลุงของเจ้าหรือ? เขาเป็นแบบนี้มาสองปีแล้ว เสียงร้องไห้ของเจ้าทำให้คนคิดว่าเขากำลังจะตาย!” เสียงผู้หญิงที่แข็งกร้าวดังขึ้นอีกครั้ง “นอกจากนี้ ข้าพูดผิดหรือ? จ้าวหนิงเป็นลูกคนเดียวของตระกูลสายใหญ่ ลุงของเจ้าเลี้ยงดูเธอด้วยความเอาใจใส่และลำบากอย่างมาก และตอนนี้เธอกลับก่อเรื่องที่น่าอับอายและผิดศีลธรรมเช่นนี้ ข้าต้องไปบอกลุงของเจ้า” “จ้าวหนิงคนนั้นช่างอกตัญญูเสียจริง เธอยังไปล่วงเกินคุณหญิงหลี่อีกด้วย ลุงของเจ้าจะไม่มีเงินซื้อยาที่ร้านขายยาอีกต่อไปแล้ว ถ้าเขาเกิดตกใจและหายใจไม่ออก เขาจะต้องไม่มีหมอรักษาแน่นอน!</p>\n<p>หมอหลี่มีอิทธิพลมากในเมืองหลวง หมอทุกคนเชื่อฟังเขา ถ้าเขาสั่ง หมอคนไหนก็จะไม่มารักษาลุงของเจ้าอีก” “จ้าวหนิงยังไปล่วงเกินองค์ชายเซียวอีกด้วย องค์ชายเซียวตรัสว่าจ้าวหนิงจะไม่มีวันได้แต่งงาน บางทีจ้าวหนิงที่ถูกปฏิเสธการหมั้นหมายอาจเสียใจจนไม่กล้ากลับมา และฆ่าตัวตายไปแล้ว” “ฮึ่ม!” ชายชราผมหงอกบนเตียงอาเจียนเป็นเลือดออกมาเต็มปาก ลุงจงที่เฝ้าอยู่ข้างๆ ร้องออกมาด้วยความตกใจ “ท่านอาจารย์!” “คุณหญิงรอง! ทำไมท่านต้องมายั่วยุท่านอาจารย์ด้วย? คุณหนูของเราไปที่คฤหาสน์ขององค์ชายเซียวด้วยเกี้ยวเจ้าสาวโดยไม่มีปัญหาอะไร องค์ชายเซียวสัญญาว่าจะดูแลเธอเป็นอย่างดี</p>\n<p>ตอนนี้เธอแต่งงานกับองค์ชายเซียวและใช้ชีวิตอย่างสุขสบายในฐานะภรรยาของเขา แต่ท่านยังต้องมาพูดจาไร้สาระต่อหน้าท่านอาจารย์อีก ท่านคิดจะทำอะไร!” เซียวเถาตะโกนออกมาด้วยความทนไม่ไหวอีกต่อไป พยายามผลักคุณหญิงรองฟู่ให้ออกไป ก่อนที่มือของเธอจะทันได้แตะต้องคุณหญิงฟู่คนที่สอง สาวใช้ที่อยู่ข้างๆ คุณหญิงฟู่คนที่สองก็คว้ามือของเธอไว้และบิดอย่างแรง “ยัยเด็กเหลือขอ แกกล้าดียังไงมาทำร้ายคุณหญิงของเรา!</p>\n<p>ให้ฉันสั่งสอนแก!” มือของเสี่ยวเถาถูกบิดจนเกือบหัก เธอเกือบจะกรีดร้องด้วยความเจ็บปวด แต่เมื่อนึกได้ว่าคุณชายกำลังอาเจียนเป็นเลือด เธอรู้ว่าการกรีดร้องจะยิ่งทำให้เขาทุกข์ทรมานมากขึ้น เธอจึงกัดริมฝีปากแน่น น้ำตาไหลอาบแก้มด้วยความเจ็บปวด คุณหญิงคนที่สองแสร้งทำเป็นเอาผ้าเช็ดหน้าปิดปากเธอและหัวเราะเบาๆ “เสี่ยวเถา เธอเข้าใจฉันผิดแล้ว ฉันไม่ได้แต่งเรื่องขึ้นมา มันเกิดขึ้นทั่วทุกหนทุกแห่ง วันนี้เธอไม่ได้ออกไปไหน เธอจึงไม่ได้ยินข่าว พอฉันได้ยิน ฉันก็รีบไปบอกลุงของฉันแล้ว” คุณชายฟู่บนเตียงอาเจียนเป็นเลือดอีกอึกใหญ่ สติของเขาเริ่มเลือนลาง เกือบจะเป็นลม</p>\n<p>เขาอยากจะตื่นขึ้นมาถามคุณหญิงคนที่สองว่าจ้าวหนิงเป็นอย่างไรบ้างและอยู่ที่ไหน แต่เขากลับรู้สึกเหมือนคลื่นแห่งความมืดมิดกำลังถาโถมเข้ามา คุณปู่ฟู่รู้สึกว่าชีวิตของเขากำลังจะจบลง เขามองเห็นความมืดมิดของโลกใต้พิภพได้ด้วยซ้ำ “จ้าวหนิง...” “ลุงคะ พูดอะไรหน่อยสิ! ลุงควรบอกเสี่ยวเถาและคนอื่นๆ ให้ไปตามหาเธอเดี๋ยวนี้เลย—ริมแม่น้ำ ที่บ่อน้ำ หรือแม้แต่ใต้ต้นไม้ที่คดงอต้นนั้น!</p>\n<p>เ
